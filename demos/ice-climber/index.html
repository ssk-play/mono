<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GrayBox — Demo: Ice Climber</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #0a0a0a;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100vh;
    font-family: monospace;
    overflow: hidden;
  }
  #frame {
    background: #111;
    border: 3px solid #333;
    border-radius: 8px;
    padding: 12px;
    box-shadow: 0 0 40px rgba(0,0,0,0.8), inset 0 0 20px rgba(0,0,0,0.5);
  }
  canvas {
    display: block;
    image-rendering: pixelated;
    image-rendering: crisp-edges;
  }
  #controls {
    margin-top: 12px;
    color: #6b6b6b;
    font-size: 11px;
    text-align: center;
    letter-spacing: 1px;
  }
  #controls span { color: #b0b0b0; }
</style>
</head>
<body>
<div id="frame">
  <canvas id="screen"></canvas>
</div>
<div id="controls">
  <span>←→</span> MOVE &nbsp;&nbsp; <span>Z</span> JUMP &nbsp;&nbsp; <span>ENTER</span> START
</div>
<script>
(() => {
  "use strict";

  // ============================================================
  // GrayBox Runtime (inline)
  // ============================================================
  const W = 320;
  const H = 240;
  const FPS = 30;
  const COLORS = ["#1a1a1a", "#6b6b6b", "#b0b0b0", "#e8e8e8"];
  const canvas = document.getElementById("screen");
  canvas.width = W;
  canvas.height = H;
  function fitCanvas() {
    var maxW = window.innerWidth - 40;
    var maxH = window.innerHeight - 60;
    var s = Math.min(maxW / W, maxH / H);
    canvas.style.width = (W * s) + "px";
    canvas.style.height = (H * s) + "px";
  }
  fitCanvas();
  window.addEventListener("resize", fitCanvas);
  const ctx = canvas.getContext("2d");
  ctx.imageSmoothingEnabled = false;
  const buf = ctx.createImageData(W, H);
  const buf32 = new Uint32Array(buf.data.buffer);

  function hexToABGR(hex) {
    const r = parseInt(hex.slice(1, 3), 16);
    const g = parseInt(hex.slice(3, 5), 16);
    const b = parseInt(hex.slice(5, 7), 16);
    return (255 << 24) | (b << 16) | (g << 8) | r;
  }
  const COLOR_U32 = COLORS.map(hexToABGR);

  const sprites = {};
  const tilemap = {};

  const keyMap = {
    "ArrowUp": "up", "ArrowDown": "down", "ArrowLeft": "left", "ArrowRight": "right",
    "w": "up", "s": "down", "a": "left", "d": "right", "ㅈ": "up", "ㄴ": "down", "ㅁ": "left", "ㅇ": "right",
    "z": "a", "Z": "a", "x": "b", "X": "b", "ㅋ": "a", "ㅌ": "b",
    "Enter": "a", " ": "a"
  };
  const keys = {};
  const keysPrev = {};

  document.addEventListener("keydown", e => {
    const k = keyMap[e.key];
    if (k) { keys[k] = true; e.preventDefault(); }
  });
  document.addEventListener("keyup", e => {
    const k = keyMap[e.key];
    if (k) { keys[k] = false; e.preventDefault(); }
  });

  let audioCtx = null;
  const channels = [null, null];
  const channelGains = [null, null];
  function ensureAudio() {
    if (!audioCtx) {
      audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      for (let i = 0; i < 2; i++) {
        channelGains[i] = audioCtx.createGain();
        channelGains[i].gain.value = 0.15;
        channelGains[i].connect(audioCtx.destination);
      }
    }
  }

  const NOTE_NAMES = ["C","C#","D","D#","E","F","F#","G","G#","A","A#","B"];
  function noteToFreq(noteStr) {
    const match = noteStr.match(/^([A-G]#?)(\d)$/);
    if (!match) return 440;
    const name = match[1];
    const octave = parseInt(match[2]);
    const semitone = NOTE_NAMES.indexOf(name);
    if (semitone === -1) return 440;
    const midi = (octave + 1) * 12 + semitone;
    return 440 * Math.pow(2, (midi - 69) / 12);
  }

  const FONT_W = 4;
  const FONT_H = 7;
  const FONT = {};
  const fontData = {
    "A":"0110100110011111100110011001","B":"1110100110101110100110011110",
    "C":"0110100110001000100001100110","D":"1100101010011001100110101100",
    "E":"1111100010001110100010001111","F":"1111100010001110100010001000",
    "G":"0111100010001011100101100111","H":"1001100110011111100110011001",
    "I":"1110010001000100010001001110","J":"0111001000100010001010100100",
    "K":"1001101011001100101010011001","L":"1000100010001000100010001111",
    "M":"1001111111011001100110011001","N":"1001110111011001100110011001",
    "O":"0110100110011001100110010110","P":"1110100110011110100010001000",
    "Q":"0110100110011001101101100001","R":"1110100110011110101010011001",
    "S":"0111100010000110000110001110","T":"1111001000100010001000100010",
    "U":"1001100110011001100110010110","V":"1001100110011001100101100110",
    "W":"1001100110011001101111011001","X":"1001100101100110011010011001",
    "Y":"1001100101100010001000100010","Z":"1111000100100100100010001111",
    "0":"0110100111011011101110010110","1":"0100110001000100010001001110",
    "2":"0110100100010010010010001111","3":"1110000100010110000110011110",
    "4":"1001100110011111000100010001","5":"1111100010001110000100011110",
    "6":"0110100010001110100110010110","7":"1111000100010010010001001000",
    "8":"0110100110010110100110010110","9":"0110100110010111000100010110",
    " ":"0000000000000000000000000000",
    ".":"0000000000000000000001000100",
    ",":"0000000000000000001000101000",
    "!":"0100010001000100000000000100",
    "?":"0110100100010010000000000010",
    "-":"0000000000001110000000000000",
    "+":"0000001001001110010000100000",
    ":":"0000010001000000010001000000",
    "/":"0001000100100010010010001000",
    "*":"0000101001001110010010100000",
    "#":"0101111101011111010100000000",
    "(":"0010010010001000010001000010",
    ")":"0100001000010001000100100100",
    "=":"0000000011110000111100000000",
    "'":"0100010010000000000000000000",
    "\"":"1010101000000000000000000000",
    "<":"0010010010001000010000100010",
    ">":"1000010000100001001001001000",
    "_":"0000000000000000000000001111",
  };
  for (const [ch, bits] of Object.entries(fontData)) {
    FONT[ch] = [];
    for (let i = 0; i < bits.length; i++) FONT[ch].push(parseInt(bits[i]));
  }

  const API = {};
  API._init = null;
  API._update = null;
  API._draw = null;
  API.frame = 0;

  API.cls = function(c = 0) { buf32.fill(COLOR_U32[c] || COLOR_U32[0]); };
  API.pix = function(x, y, c) {
    x = Math.floor(x); y = Math.floor(y);
    if (x < 0 || x >= W || y < 0 || y >= H) return;
    buf32[y * W + x] = COLOR_U32[c] || COLOR_U32[0];
  };
  API.line = function(x0, y0, x1, y1, c) {
    x0=Math.floor(x0); y0=Math.floor(y0); x1=Math.floor(x1); y1=Math.floor(y1);
    const dx=Math.abs(x1-x0), dy=Math.abs(y1-y0);
    const sx=x0<x1?1:-1, sy=y0<y1?1:-1;
    let err=dx-dy;
    while(true) {
      API.pix(x0,y0,c);
      if(x0===x1&&y0===y1) break;
      const e2=2*err;
      if(e2>-dy){err-=dy;x0+=sx;}
      if(e2<dx){err+=dx;y0+=sy;}
    }
  };
  API.rect = function(x,y,w,h,c) {
    API.line(x,y,x+w-1,y,c); API.line(x+w-1,y,x+w-1,y+h-1,c);
    API.line(x+w-1,y+h-1,x,y+h-1,c); API.line(x,y+h-1,x,y,c);
  };
  API.rectf = function(x,y,w,h,c) {
    x=Math.floor(x); y=Math.floor(y);
    const col=COLOR_U32[c]||COLOR_U32[0];
    for(let py=Math.max(0,y);py<Math.min(H,y+h);py++)
      for(let px=Math.max(0,x);px<Math.min(W,x+w);px++)
        buf32[py*W+px]=col;
  };
  API.circ = function(cx,cy,r,c) {
    let x=r,y=0,d=1-r; cx=Math.floor(cx); cy=Math.floor(cy);
    while(x>=y){
      API.pix(cx+x,cy+y,c);API.pix(cx-x,cy+y,c);
      API.pix(cx+x,cy-y,c);API.pix(cx-x,cy-y,c);
      API.pix(cx+y,cy+x,c);API.pix(cx-y,cy+x,c);
      API.pix(cx+y,cy-x,c);API.pix(cx-y,cy-x,c);
      y++; if(d<0){d+=2*y+1;}else{x--;d+=2*(y-x)+1;}
    }
  };
  API.circf = function(cx,cy,r,c) {
    cx=Math.floor(cx); cy=Math.floor(cy);
    const col=COLOR_U32[c]||COLOR_U32[0]; const r2=r*r;
    for(let py=-r;py<=r;py++) for(let px=-r;px<=r;px++)
      if(px*px+py*py<=r2){ const sx=cx+px,sy=cy+py;
        if(sx>=0&&sx<W&&sy>=0&&sy<H) buf32[sy*W+sx]=col; }
  };
  API.sprite = function(id, data) {
    const arr = new Uint8Array(64); let i = 0;
    for (const ch of data) { if (ch>='0'&&ch<='3') { arr[i++]=parseInt(ch); if(i>=64) break; } }
    sprites[id] = arr;
  };
  API.spr = function(id, x, y, flipX, flipY) {
    const s=sprites[id]; if(!s) return;
    x=Math.floor(x); y=Math.floor(y);
    for(let py=0;py<8;py++) for(let px=0;px<8;px++){
      const sx=flipX?7-px:px, sy=flipY?7-py:py;
      const c=s[sy*8+sx], dx=x+px, dy=y+py;
      if(dx>=0&&dx<W&&dy>=0&&dy<H) buf32[dy*W+dx]=COLOR_U32[c];
    }
  };
  API.sprAlpha = function(id, x, y, flipX, flipY) {
    const s=sprites[id]; if(!s) return;
    x=Math.floor(x); y=Math.floor(y);
    for(let py=0;py<8;py++) for(let px=0;px<8;px++){
      const sx=flipX?7-px:px, sy=flipY?7-py:py;
      const c=s[sy*8+sx]; if(c===0) continue;
      const dx=x+px, dy=y+py;
      if(dx>=0&&dx<W&&dy>=0&&dy<H) buf32[dy*W+dx]=COLOR_U32[c];
    }
  };
  API.text = function(str, x, y, c) {
    str=String(str).toUpperCase(); let cx=Math.floor(x); const cy=Math.floor(y);
    const col=COLOR_U32[c]||COLOR_U32[3];
    for(const ch of str){
      const glyph=FONT[ch];
      if(glyph) for(let py=0;py<FONT_H;py++) for(let px=0;px<FONT_W;px++)
        if(glyph[py*FONT_W+px]){ const dx=cx+px,dy=cy+py;
          if(dx>=0&&dx<W&&dy>=0&&dy<H) buf32[dy*W+dx]=col; }
      cx+=FONT_W+1;
    }
  };
  API.mget = function(cx,cy) { return tilemap[cx+","+cy]||0; };
  API.mset = function(cx,cy,id) { tilemap[cx+","+cy]=id; };
  API.map = function(mx,my,mw,mh,sx,sy) {
    for(let ty=0;ty<mh;ty++) for(let tx=0;tx<mw;tx++){
      const id=API.mget(mx+tx,my+ty); if(id>0) API.spr(id,sx+tx*8,sy+ty*8); }
  };
  const VALID_KEYS = {up:1,down:1,left:1,right:1,a:1,b:1};
  API.btn = function(k) { if(!VALID_KEYS[k]) console.warn("GrayBox: invalid key \""+k+"\". Use: up/down/left/right/a/b"); return !!keys[k]; };
  API.btnp = function(k) { if(!VALID_KEYS[k]) console.warn("GrayBox: invalid key \""+k+"\". Use: up/down/left/right/a/b"); return !!keys[k] && !keysPrev[k]; };
  API.note = function(ch, noteStr, dur) {
    ensureAudio(); if(ch<0||ch>1) return; API.stop(ch);
    const osc=audioCtx.createOscillator(); osc.type="square";
    osc.frequency.value=noteToFreq(noteStr);
    osc.connect(channelGains[ch]); osc.start();
    osc.stop(audioCtx.currentTime+dur); channels[ch]=osc;
  };
  API.stop = function(ch) {
    if(ch===undefined){API.stop(0);API.stop(1);return;}
    if(channels[ch]){try{channels[ch].stop();}catch(e){} channels[ch]=null;}
  };
  API.rnd = function(max) { return Math.random()*max; };
  API.flr = Math.floor;
  API.abs = Math.abs;
  API.min = Math.min;
  API.max = Math.max;
  API.sin = Math.sin;
  API.cos = Math.cos;

  function tick() {
    if (API._update) API._update();
    if (API._draw) API._draw();
    ctx.putImageData(buf, 0, 0);
    for (const k in keys) keysPrev[k] = keys[k];
    API.frame++;
  }

  // ============================================================
  // Ice Climber Game
  // ============================================================
  const { cls, pix, line, rect, rectf, circ, circf, sprite: defSprite,
          spr, sprAlpha, text, btn, btnp, note, stop, rnd, flr, abs: _abs,
          min, max: _max, sin, cos } = API;

  // --- Sprites ---

  // 1: Player - Ice Climber (parka climber with hammer)
  defSprite(1,
    "00333000" +
    "03222300" +
    "03232300" +
    "00333000" +
    "03333302" +
    "00333020" +
    "00300300" +
    "03300330"
  );

  // 2: Player jumping (hammer raised)
  defSprite(2,
    "20333000" +
    "02222300" +
    "00232300" +
    "00333000" +
    "00333300" +
    "00333000" +
    "00311300" +
    "00300300"
  );

  // 3: Ice block (platform tile)
  defSprite(3,
    "33333333" +
    "22332233" +
    "22222222" +
    "33223322" +
    "33333333" +
    "22332233" +
    "22222222" +
    "33223322"
  );

  // 4: Breaking ice block (cracked)
  defSprite(4,
    "33033033" +
    "22032030" +
    "02222020" +
    "33020322" +
    "30333030" +
    "02030233" +
    "22020022" +
    "33003300"
  );

  // 5: Polar bear enemy
  defSprite(5,
    "03300330" +
    "33333333" +
    "31333133" +
    "33333333" +
    "33333333" +
    "03333300" +
    "03300330" +
    "03300330"
  );

  // 6: Bird enemy (Topi/Nitpicker style)
  defSprite(6,
    "00030000" +
    "00033000" +
    "00333300" +
    "03313300" +
    "33333330" +
    "30333030" +
    "00030000" +
    "00300300"
  );

  // 7: Vegetable bonus (eggplant)
  defSprite(7,
    "00010000" +
    "00232000" +
    "02222200" +
    "02222200" +
    "02222200" +
    "02222200" +
    "00222000" +
    "00020000"
  );

  // 8: Vegetable bonus (carrot)
  defSprite(8,
    "00030300" +
    "00033000" +
    "00222000" +
    "00222000" +
    "00122000" +
    "00012000" +
    "00012000" +
    "00001000"
  );

  // 9: Vegetable bonus (mushroom)
  defSprite(9,
    "00333000" +
    "03222300" +
    "32323230" +
    "33333330" +
    "00121000" +
    "00121000" +
    "00121000" +
    "00222000"
  );

  // 10: Mountain wall tile (left)
  defSprite(10,
    "22111111" +
    "22211111" +
    "22221111" +
    "22221111" +
    "22111111" +
    "22211111" +
    "22221111" +
    "22221111"
  );

  // 11: Mountain wall tile (right)
  defSprite(11,
    "11111122" +
    "11111222" +
    "11112222" +
    "11112222" +
    "11111122" +
    "11111222" +
    "11112222" +
    "11112222"
  );

  // 12: Cloud/summit platform
  defSprite(12,
    "00222200" +
    "02333320" +
    "23333332" +
    "33333333" +
    "33333333" +
    "23333332" +
    "02333320" +
    "00222200"
  );

  // 13: Life icon
  defSprite(13,
    "00000000" +
    "00330000" +
    "03223000" +
    "03233000" +
    "00333002" +
    "00330020" +
    "00000000" +
    "00000000"
  );

  // 14: Icicle decoration
  defSprite(14,
    "33333333" +
    "23322332" +
    "02200220" +
    "02200220" +
    "02000020" +
    "02000020" +
    "00000020" +
    "00000000"
  );

  // 15: Snow particle
  defSprite(15,
    "00000000" +
    "00000000" +
    "00030000" +
    "00333000" +
    "00030000" +
    "00000000" +
    "00000000" +
    "00000000"
  );

  // 16: Condor (bonus stage bird at summit)
  defSprite(16,
    "30000003" +
    "33000033" +
    "33300333" +
    "33333333" +
    "03333330" +
    "00333300" +
    "00311300" +
    "00300300"
  );

  // 17: Ice block with snow top
  defSprite(17,
    "33333333" +
    "33333333" +
    "22332233" +
    "22222222" +
    "33223322" +
    "33333333" +
    "22332233" +
    "22222222"
  );

  // 18: Hammer hit effect
  defSprite(18,
    "00300030" +
    "03000300" +
    "00000000" +
    "30000003" +
    "00000000" +
    "03000300" +
    "00300030" +
    "00000000"
  );

  // 19: Moving platform (cloud)
  defSprite(19,
    "00000000" +
    "00222200" +
    "02333320" +
    "23333332" +
    "33333333" +
    "23333332" +
    "00000000" +
    "00000000"
  );

  // --- Game constants ---
  const TILE = 8;
  const PLAY_LEFT = 21;
  const PLAY_RIGHT = W - 21;
  const PLAY_W = PLAY_RIGHT - PLAY_LEFT;
  const GRAVITY = 0.35;
  const JUMP_FORCE = -5.5;
  const MOVE_SPEED = 2.0;
  const LAYER_H = 30; // vertical distance between platform layers
  const LAYERS_PER_STAGE = 8; // number of platform layers per mountain stage
  const TOTAL_STAGES = 8;

  // --- Game state ---
  let state = "title";
  let player, platforms, enemies, bonusItems, particles, snowflakes;
  let score, lives, stage, cameraY, targetCameraY;
  let deathTimer, stageCompleteTimer, bonusTimer;
  let highestPlayerY; // tracks highest Y player reached (lower = higher on screen)
  let stageTopY; // Y coordinate of the summit
  let stageBottomY; // Y coordinate of the starting ground
  let breakEffects; // visual effects for breaking blocks
  let titleBounce;
  let mountainHeight; // total height of current mountain
  let bonusStage; // is this the bonus stage at top?
  let bonusScore;
  let flashTimer;

  function resetGame() {
    score = 0;
    lives = 3;
    stage = 1;
    titleBounce = 0;
    startStage();
  }

  function startStage() {
    platforms = [];
    enemies = [];
    bonusItems = [];
    particles = [];
    snowflakes = [];
    breakEffects = [];
    deathTimer = 0;
    stageCompleteTimer = 0;
    bonusTimer = 0;
    bonusStage = false;
    bonusScore = 0;
    flashTimer = 0;

    mountainHeight = LAYERS_PER_STAGE * LAYER_H;
    stageBottomY = mountainHeight + 30;
    stageTopY = -15;

    // Player starts at bottom
    player = {
      x: W / 2 - 4,
      y: stageBottomY - 16,
      vx: 0,
      vy: 0,
      onGround: false,
      jumping: false,
      facing: 1, // 1=right, -1=left
      headHit: false,
      headHitTimer: 0,
      invincible: 0,
      animTimer: 0
    };

    cameraY = stageBottomY - H + 30;
    targetCameraY = cameraY;
    highestPlayerY = player.y;

    // Generate ground
    for (let x = PLAY_LEFT; x < PLAY_RIGHT; x += TILE) {
      platforms.push({ x: x, y: stageBottomY, type: "solid", broken: false });
    }

    // Generate platform layers
    for (let layer = 1; layer <= LAYERS_PER_STAGE; layer++) {
      const layerY = stageBottomY - layer * LAYER_H;
      generatePlatformLayer(layerY, layer);
    }

    // Generate summit area
    const summitY = stageBottomY - (LAYERS_PER_STAGE + 1) * LAYER_H;
    for (let x = PLAY_LEFT; x < PLAY_RIGHT; x += TILE) {
      platforms.push({ x: x, y: summitY, type: "summit", broken: false });
    }

    // Snowflakes
    for (let i = 0; i < 30; i++) {
      snowflakes.push({
        x: rnd(W),
        y: rnd(mountainHeight + H) - H,
        speed: 0.3 + rnd(0.7),
        drift: rnd(6.28),
        size: flr(rnd(2))
      });
    }
  }

  function generatePlatformLayer(y, layer) {
    // Create a row of breakable ice blocks with some gaps
    const gapCount = 1 + flr(rnd(2)) + flr(stage / 3);
    const tileCount = flr(PLAY_W / TILE);
    const gaps = new Set();

    // Create gaps (2-3 tiles wide)
    for (let g = 0; g < gapCount; g++) {
      const gapStart = 1 + flr(rnd(tileCount - 3));
      const gapW = 2 + flr(rnd(2));
      for (let i = 0; i < gapW; i++) gaps.add(gapStart + i);
    }

    for (let t = 0; t < tileCount; t++) {
      if (!gaps.has(t)) {
        const isSnowy = layer >= LAYERS_PER_STAGE - 2;
        platforms.push({
          x: PLAY_LEFT + t * TILE,
          y: y,
          type: "ice",
          broken: false,
          breakTimer: 0,
          snowy: isSnowy
        });
      }
    }

    // Add enemies on some layers
    if (layer > 1 && layer < LAYERS_PER_STAGE && rnd(1) < 0.5 + stage * 0.05) {
      const ex = PLAY_LEFT + 16 + flr(rnd(PLAY_W - 40));
      const etype = rnd(1) < 0.6 ? "bear" : "bird";
      enemies.push({
        x: ex,
        y: y - 10,
        type: etype,
        vx: (rnd(1) < 0.5 ? 1 : -1) * (etype === "bear" ? 0.7 : 1.2),
        vy: 0,
        alive: true,
        animTimer: 0,
        layer: layer
      });
    }

    // Moving cloud platform on some layers
    if (layer > 2 && rnd(1) < 0.3) {
      platforms.push({
        x: PLAY_LEFT + flr(rnd(PLAY_W - 40)),
        y: y - 15,
        type: "cloud",
        broken: false,
        moveDir: rnd(1) < 0.5 ? 1 : -1,
        moveSpeed: 0.5 + rnd(0.5),
        startX: 0
      });
      // Set startX after creation
      platforms[platforms.length - 1].startX = platforms[platforms.length - 1].x;
    }
  }

  function startBonusStage() {
    bonusStage = true;
    bonusTimer = 300; // 10 seconds
    bonusItems = [];
    bonusScore = 0;

    // Scatter vegetables at the summit area
    const summitY = stageBottomY - (LAYERS_PER_STAGE + 1) * LAYER_H;
    for (let i = 0; i < 12; i++) {
      bonusItems.push({
        x: PLAY_LEFT + 16 + flr(rnd(PLAY_W - 40)),
        y: summitY - 8 - flr(rnd(45)),
        type: 7 + flr(rnd(3)), // sprites 7,8,9
        collected: false,
        bob: rnd(6.28)
      });
    }
  }

  // --- Sound effects ---
  function jumpSound() { note(0, "E5", 0.06); setTimeout(() => note(0, "G5", 0.04), 50); }
  function breakSound() { note(1, "C3", 0.05); setTimeout(() => note(1, "E3", 0.04), 30); }
  function hitSound() { note(0, "C6", 0.03); note(1, "E4", 0.05); }
  function deathSound() {
    note(0, "C4", 0.12); note(1, "G2", 0.15);
    setTimeout(() => { note(0, "A2", 0.2); note(1, "E2", 0.2); }, 120);
  }
  function collectSound() { note(0, "C5", 0.05); setTimeout(() => note(0, "E5", 0.05), 60); setTimeout(() => note(0, "G5", 0.08), 120); }
  function stageClearSound() {
    note(0, "C5", 0.1); setTimeout(() => note(0, "E5", 0.1), 100);
    setTimeout(() => note(0, "G5", 0.1), 200); setTimeout(() => note(0, "C6", 0.2), 300);
  }
  function enemyKillSound() { note(1, "A4", 0.06); setTimeout(() => note(1, "C5", 0.04), 40); }

  function addParticle(x, y, c) {
    particles.push({
      x: x, y: y,
      vx: rnd(4) - 2, vy: -1 - rnd(3),
      life: 10 + flr(rnd(10)),
      color: c
    });
  }

  function addBreakEffect(x, y) {
    breakEffects.push({ x: x, y: y, timer: 8 });
    for (let i = 0; i < 4; i++) addParticle(x + 4, y + 4, 2 + flr(rnd(2)));
  }

  function killPlayer() {
    if (player.invincible > 0) return;
    lives--;
    deathSound();
    for (let i = 0; i < 12; i++) addParticle(player.x + 4, player.y + 4, 2 + flr(rnd(2)));
    if (lives <= 0) {
      deathTimer = 90;
    } else {
      deathTimer = 60;
    }
  }

  // ============================================================
  // Update
  // ============================================================
  API._update = function() {
    titleBounce = sin(API.frame * 0.06) * 4;

    // Update snowflakes
    for (const s of snowflakes) {
      s.y += s.speed;
      s.x += sin(s.drift + API.frame * 0.03) * 0.3;
      if (s.y > cameraY + H + 10) {
        s.y = cameraY - 10;
        s.x = rnd(W);
      }
    }

    if (state === "title") {
      if (btnp("a") || btnp("a")) {
        state = "play";
        resetGame();
        note(0, "C5", 0.08);
        setTimeout(() => note(0, "E5", 0.08), 80);
        setTimeout(() => note(0, "G5", 0.12), 160);
      }
      return;
    }

    if (state === "gameover") {
      // Update particles
      for (let i = particles.length - 1; i >= 0; i--) {
        const p = particles[i]; p.x += p.vx; p.y += p.vy; p.vy += 0.1; p.life--;
        if (p.life <= 0) particles.splice(i, 1);
      }
      if (btnp("a") || btnp("a")) state = "title";
      return;
    }

    if (state === "stageclear") {
      stageCompleteTimer--;
      if (bonusStage) {
        bonusTimer--;
        if (bonusTimer <= 0) {
          bonusStage = false;
          stageCompleteTimer = 0;
        }
      }
      if (stageCompleteTimer <= 0 && !bonusStage) {
        stage++;
        if (stage > TOTAL_STAGES) {
          state = "gameover"; // victory
          stageCompleteTimer = 999;
        } else {
          state = "play";
          startStage();
        }
      }
      // Update particles
      for (let i = particles.length - 1; i >= 0; i--) {
        const p = particles[i]; p.x += p.vx; p.y += p.vy; p.vy += 0.1; p.life--;
        if (p.life <= 0) particles.splice(i, 1);
      }
      return;
    }

    // --- Play state ---

    // Death handling
    if (deathTimer > 0) {
      deathTimer--;
      // Update particles
      for (let i = particles.length - 1; i >= 0; i--) {
        const p = particles[i]; p.x += p.vx; p.y += p.vy; p.vy += 0.1; p.life--;
        if (p.life <= 0) particles.splice(i, 1);
      }
      if (deathTimer <= 0) {
        if (lives <= 0) {
          state = "gameover";
        } else {
          // Respawn at a safe platform near where they died
          player.x = W / 2 - 4;
          player.y = highestPlayerY + LAYER_H;
          player.vy = 0;
          player.vx = 0;
          player.onGround = false;
          player.invincible = 60;
        }
      }
      return;
    }

    if (player.invincible > 0) player.invincible--;
    if (player.headHitTimer > 0) player.headHitTimer--;
    player.animTimer++;

    // Bonus stage logic
    if (bonusStage) {
      bonusTimer--;
      // Collect vegetables
      for (let i = bonusItems.length - 1; i >= 0; i--) {
        const b = bonusItems[i];
        if (b.collected) continue;
        b.bob += 0.08;
        const by = b.y + sin(b.bob) * 3;
        if (player.x + 7 > b.x && player.x < b.x + 8 &&
            player.y + 7 > by && player.y < by + 8) {
          b.collected = true;
          score += 200;
          bonusScore += 200;
          collectSound();
          for (let j = 0; j < 5; j++) addParticle(b.x + 4, by + 4, 3);
        }
      }
      if (bonusTimer <= 0 || bonusItems.every(b => b.collected)) {
        bonusStage = false;
        state = "stageclear";
        stageCompleteTimer = 90;
        stageClearSound();
      }
    }

    // Player movement
    if (btn("left")) {
      player.vx = -MOVE_SPEED;
      player.facing = -1;
    } else if (btn("right")) {
      player.vx = MOVE_SPEED;
      player.facing = 1;
    } else {
      player.vx *= 0.7;
      if (_abs(player.vx) < 0.1) player.vx = 0;
    }

    // Jump
    if (btnp("a") && player.onGround) {
      player.vy = JUMP_FORCE;
      player.onGround = false;
      player.jumping = true;
      jumpSound();
    }

    // Apply gravity
    player.vy += GRAVITY;
    if (player.vy > 8) player.vy = 8;

    // Move horizontally
    player.x += player.vx;

    // Wall collision
    if (player.x < PLAY_LEFT) player.x = PLAY_LEFT;
    if (player.x > PLAY_RIGHT - 8) player.x = PLAY_RIGHT - 8;

    // Wrap around
    // (original IC lets you wrap; we use walls instead for clarity)

    // Move vertically
    const oldY = player.y;
    player.y += player.vy;
    player.onGround = false;
    player.headHit = false;

    // Platform collision
    for (let i = platforms.length - 1; i >= 0; i--) {
      const p = platforms[i];
      if (p.broken) continue;

      const px = p.x, py = p.y;
      const pw = (p.type === "cloud") ? 8 : TILE;
      const ph = TILE;

      // Player feet landing on top of platform (falling down)
      if (player.vy >= 0 && oldY + 8 <= py + 2 && player.y + 8 > py &&
          player.x + 6 > px && player.x + 2 < px + pw) {
        player.y = py - 8;
        player.vy = 0;
        player.onGround = true;
        player.jumping = false;
      }

      // Player head hitting bottom of platform (jumping up) - break ice!
      if (player.vy < 0 && oldY >= py + ph - 2 && player.y < py + ph &&
          player.x + 6 > px && player.x + 2 < px + pw) {
        if (p.type === "ice") {
          // Break the ice block!
          p.breakTimer = 6;
          addBreakEffect(p.x, p.y);
          breakSound();
          score += 10;
          player.headHit = true;
          player.headHitTimer = 8;

          // Check for enemy standing on this block
          for (const e of enemies) {
            if (e.alive && e.y + 8 >= py - 4 && e.y + 8 <= py + 4 &&
                e.x + 4 > px - 2 && e.x + 4 < px + pw + 2) {
              e.alive = false;
              e.vy = -4;
              score += 100;
              enemyKillSound();
              for (let j = 0; j < 6; j++) addParticle(e.x + 4, e.y + 4, 2);
            }
          }

          // Schedule block removal
          setTimeout(() => { p.broken = true; }, 200);
        } else if (p.type === "solid" || p.type === "summit") {
          // Solid blocks stop upward movement
          player.y = py + ph;
          player.vy = 0;
        }
      }
    }

    // Update cloud platforms (move them)
    for (const p of platforms) {
      if (p.type === "cloud" && !p.broken) {
        p.x += p.moveDir * p.moveSpeed;
        if (p.x < PLAY_LEFT + 8 || p.x > PLAY_RIGHT - 16) {
          p.moveDir *= -1;
        }
        // Move player with platform if standing on it
        if (player.onGround && player.y + 8 >= p.y - 1 && player.y + 8 <= p.y + 3 &&
            player.x + 6 > p.x && player.x + 2 < p.x + 8) {
          player.x += p.moveDir * p.moveSpeed;
        }
      }
    }

    // Update breakTimer on platforms
    for (const p of platforms) {
      if (p.breakTimer > 0) p.breakTimer--;
    }

    // Camera follows player upward smoothly
    targetCameraY = player.y - H * 0.6;
    // Only scroll up, not down (unless player falls far)
    if (targetCameraY < cameraY - 10) {
      cameraY += (targetCameraY - cameraY) * 0.08;
    }
    // But allow scrolling down if player falls
    if (player.y > cameraY + H * 0.8) {
      cameraY += (player.y - H * 0.8 - cameraY) * 0.12;
    }

    // Track highest position
    if (player.y < highestPlayerY) {
      highestPlayerY = player.y;
    }

    // Fall off bottom of visible area = death
    if (player.y > cameraY + H + 20) {
      killPlayer();
    }

    // Check if player reached summit
    const summitY = stageBottomY - (LAYERS_PER_STAGE + 1) * LAYER_H;
    if (player.y < summitY + 8 && !bonusStage && state === "play") {
      if (stageCompleteTimer === 0) {
        startBonusStage();
        stageClearSound();
      }
    }

    // Update enemies
    for (let i = enemies.length - 1; i >= 0; i--) {
      const e = enemies[i];
      e.animTimer++;

      if (!e.alive) {
        e.vy += GRAVITY;
        e.y += e.vy;
        if (e.y > cameraY + H + 30) {
          enemies.splice(i, 1);
        }
        continue;
      }

      // Move horizontally
      e.x += e.vx;

      // Bounce off walls
      if (e.x < PLAY_LEFT + 4) { e.x = PLAY_LEFT + 4; e.vx = _abs(e.vx); }
      if (e.x > PLAY_RIGHT - 12) { e.x = PLAY_RIGHT - 12; e.vx = -_abs(e.vx); }

      // Birds also bob up and down
      if (e.type === "bird") {
        e.y += sin(e.animTimer * 0.1) * 0.5;
      }

      // Player collision with enemy
      if (player.invincible <= 0 &&
          player.x + 6 > e.x && player.x + 2 < e.x + 8 &&
          player.y + 6 > e.y && player.y + 2 < e.y + 8) {
        // If player is falling onto enemy, kill enemy
        if (player.vy > 0 && player.y + 8 < e.y + 5) {
          e.alive = false;
          e.vy = -3;
          player.vy = JUMP_FORCE * 0.6;
          score += 100;
          enemyKillSound();
          for (let j = 0; j < 6; j++) addParticle(e.x + 4, e.y + 4, 2);
        } else {
          killPlayer();
        }
      }
    }

    // Update particles
    for (let i = particles.length - 1; i >= 0; i--) {
      const p = particles[i];
      p.x += p.vx; p.y += p.vy; p.vy += 0.08; p.life--;
      if (p.life <= 0) particles.splice(i, 1);
    }

    // Update break effects
    for (let i = breakEffects.length - 1; i >= 0; i--) {
      breakEffects[i].timer--;
      if (breakEffects[i].timer <= 0) breakEffects.splice(i, 1);
    }

    // Flash timer
    if (flashTimer > 0) flashTimer--;
  };

  // ============================================================
  // Draw
  // ============================================================
  API._draw = function() {
    cls(0);

    if (state === "title") {
      // Mountain background
      drawMountainBg(0);

      // Snowflakes on title
      for (const s of snowflakes) {
        pix(flr(s.x), flr(s.y % H), 3);
      }

      const ty = 45 + titleBounce;

      // Title shadow + text
      text("ICE CLIMBER", 134, flr(ty) + 2, 1);
      text("ICE CLIMBER", 133, flr(ty), 3);

      // Subtitle
      rectf(107, flr(ty) + 12, 107, 1, 2);

      // Player sprite on title
      sprAlpha(1, W / 2 - 4, flr(ty) + 24 + flr(sin(API.frame * 0.1) * 3));

      // Enemies
      sprAlpha(5, W / 2 - 30, flr(ty) + 26 + flr(sin(API.frame * 0.08 + 1) * 2));
      sprAlpha(6, W / 2 + 22, flr(ty) + 24 + flr(sin(API.frame * 0.08 + 2) * 2));

      // Ice platforms
      for (let x = 107; x < 214; x += 8) {
        sprAlpha(3, x, flr(ty) + 36);
      }

      if (flr(API.frame / 20) % 2 === 0) text("PRESS A TO START", 120, 150, 3);

      // Instructions
      text("CLIMB THE ICE MOUNTAIN!", 103, 172, 2);
      text("A:JUMP  LEFT/RIGHT:MOVE", 103, 184, 2);
      text("BREAK ICE FROM BELOW!", 108, 195, 2);

      text(TOTAL_STAGES + " MOUNTAINS TO CONQUER", 105, 211, 1);
      text("GRAYBOX DEMO V0.1", 118, 229, 1);
      return;
    }

    if (state === "gameover") {
      drawMountainBg(0);

      for (const p of particles) pix(flr(p.x), flr(p.y), p.color);

      if (stage > TOTAL_STAGES) {
        // Victory!
        text("CONGRATULATIONS!", 120, 75, 3);
        text("YOU CONQUERED ALL", 118, 94, 2);
        text(TOTAL_STAGES + " MOUNTAINS!", 130, 105, 2);
        text("FINAL SCORE: " + score, 110, 128, 3);
      } else {
        text("GAME OVER", 138, 90, 3);
        text("SCORE: " + score, 128, 109, 2);
        text("MOUNTAIN: " + stage, 130, 120, 2);
      }
      if (flr(API.frame / 20) % 2 === 0) text("PRESS A TO CONTINUE", 113, 165, 3);
      return;
    }

    // --- Play / Stage Clear rendering ---

    // Sky gradient background
    const skyTop = 0;
    for (let y = 0; y < H; y++) {
      const screenY = y + cameraY;
      // Darker at bottom, lighter at top
      const t = 1 - (screenY - stageTopY) / (stageBottomY - stageTopY);
      if (t > 0.7) rectf(0, y, W, 1, 0);
      else if (t > 0.3) {} // default black
      else rectf(0, y, W, 1, 0);
    }

    // Draw mountain walls on sides
    for (let y = -8; y < H + 8; y += 8) {
      const worldY = y + flr(cameraY);
      // Left wall
      for (let x = 0; x < PLAY_LEFT; x += 8) {
        const shade = (x + worldY) % 16 < 8 ? 10 : 10;
        sprAlpha(10, x, y);
      }
      // Right wall
      for (let x = PLAY_RIGHT; x < W; x += 8) {
        sprAlpha(11, x, y);
      }
    }

    // Draw snowflakes
    for (const s of snowflakes) {
      const sy = flr(s.y - cameraY);
      if (sy >= -4 && sy <= H + 4) {
        pix(flr(s.x), sy, 3);
        if (s.size > 0) pix(flr(s.x) + 1, sy, 2);
      }
    }

    // Draw platforms
    for (const p of platforms) {
      if (p.broken) continue;
      const sy = flr(p.y - cameraY);
      if (sy < -10 || sy > H + 10) continue;

      if (p.type === "ice") {
        if (p.breakTimer > 0) {
          sprAlpha(4, p.x, sy); // cracking
        } else if (p.snowy) {
          sprAlpha(17, p.x, sy);
        } else {
          sprAlpha(3, p.x, sy);
        }
      } else if (p.type === "solid") {
        sprAlpha(3, p.x, sy);
      } else if (p.type === "summit") {
        sprAlpha(12, p.x, sy);
      } else if (p.type === "cloud") {
        sprAlpha(19, p.x, sy);
      }
    }

    // Draw bonus items
    for (const b of bonusItems) {
      if (b.collected) continue;
      const sy = flr(b.y + sin(b.bob) * 3 - cameraY);
      if (sy >= -10 && sy <= H + 10) {
        sprAlpha(b.type, b.x, sy);
      }
    }

    // Draw break effects
    for (const e of breakEffects) {
      const sy = flr(e.y - cameraY);
      sprAlpha(18, e.x, sy);
    }

    // Draw enemies
    for (const e of enemies) {
      const sy = flr(e.y - cameraY);
      if (sy < -10 || sy > H + 10) continue;

      const flipX = e.vx < 0;
      if (e.type === "bear") {
        sprAlpha(5, flr(e.x), sy, flipX);
      } else {
        // Bird with wing flap animation
        const wingFrame = flr(e.animTimer / 6) % 2 === 0;
        sprAlpha(6, flr(e.x), sy + (wingFrame ? -1 : 0), flipX);
      }

      // Dead enemies flash
      if (!e.alive && flr(API.frame / 2) % 2 === 0) {
        rectf(flr(e.x), sy, 8, 8, 3);
      }
    }

    // Draw player
    if (deathTimer <= 0) {
      const sy = flr(player.y - cameraY);
      // Blink when invincible
      if (player.invincible <= 0 || flr(API.frame / 3) % 2 === 0) {
        const flipX = player.facing < 0;
        if (player.jumping || !player.onGround) {
          sprAlpha(2, flr(player.x), sy, flipX);
        } else {
          // Walking animation
          const walkFrame = flr(player.animTimer / 5) % 2;
          sprAlpha(1, flr(player.x), sy + (walkFrame && _abs(player.vx) > 0.3 ? -1 : 0), flipX);
        }
      }

      // Hammer hit visual
      if (player.headHitTimer > 0) {
        sprAlpha(18, flr(player.x) - 2, sy - 10);
      }
    }

    // Draw particles
    for (const p of particles) {
      const sy = flr(p.y - cameraY);
      if (sy >= 0 && sy < H) pix(flr(p.x), sy, p.color);
    }

    // --- HUD ---
    rectf(0, 0, W, 14, 0);
    rectf(0, 14, W, 1, 1);

    text("SCORE:" + score, 4, 4, 3);
    text("MT." + stage, W / 2 - 15, 4, 2);

    // Lives
    for (let i = 0; i < lives; i++) sprAlpha(13, W - 40 + i * 10, 3);

    // Height indicator on right side
    if (state === "play" || state === "stageclear") {
      const barX = W - 10;
      const barTop = 20;
      const barH = H - 30;
      rectf(barX, barTop, 4, barH, 1);

      // Player position on bar
      const progress = 1 - (player.y - stageTopY) / (stageBottomY - stageTopY);
      const markerY = barTop + barH - flr(progress * barH);
      rectf(barX - 1, markerY - 1, 6, 3, 3);

      // Summit marker
      rectf(barX, barTop, 4, 2, 3);
    }

    // Stage announcement
    if (state === "play" && API.frame < 90) {
      const msgAlpha = API.frame < 60 ? 3 : (API.frame < 75 ? 2 : 1);
      text("MOUNTAIN " + stage, 133, 105, msgAlpha);
      text("START!", 145, 119, msgAlpha);
    }

    // Bonus stage overlay
    if (bonusStage) {
      const timeLeft = flr(bonusTimer / 30);
      text("BONUS! " + timeLeft + "S", 135, 20, 3);
      text("GET VEGGIES!", 130, 30, 2);
    }

    // Stage clear
    if (state === "stageclear") {
      text("STAGE CLEAR!", 130, 98, 3);
      text("BONUS: " + bonusScore, 130, 113, 2);
      if (stageCompleteTimer < 60 && flr(API.frame / 15) % 2 === 0) {
        text("NEXT MOUNTAIN...", 120, 135, 2);
      }
    }
  };

  function drawMountainBg(offsetY) {
    // Simple mountain silhouette background for title/gameover
    for (let x = 0; x < W; x += 2) {
      const h1 = 60 + sin(x * 0.02) * 30 + sin(x * 0.05) * 15;
      const h2 = 90 + sin(x * 0.015 + 1) * 22 + sin(x * 0.04) * 11;
      // Far mountains
      for (let y = H - flr(h1); y < H; y++) {
        if (y >= 0 && y < H) { pix(x, y, 1); pix(x + 1, y, 1); }
      }
      // Near mountains
      for (let y = H - flr(h2 * 0.6); y < H; y++) {
        if (y >= 0 && y < H) { pix(x, y, 1); if (x + 1 < W) pix(x + 1, y, 1); }
      }
    }
    // Snow caps
    for (let x = 0; x < W; x++) {
      const h1 = 60 + sin(x * 0.02) * 30 + sin(x * 0.05) * 15;
      const peakY = H - flr(h1);
      if (peakY >= 0 && peakY < H) {
        pix(x, peakY, 3);
        if (peakY + 1 < H) pix(x, peakY + 1, 2);
      }
    }
  }

  // ============================================================
  // Boot
  // ============================================================
  if (API._init) API._init();
  setInterval(tick, 1000 / FPS);
  document.addEventListener("keydown", ensureAudio, { once: true });
  document.addEventListener("click", ensureAudio, { once: true });
})();
</script>
</body>
