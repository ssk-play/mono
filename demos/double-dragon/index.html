  function resetGame() {

      state: "idle", // idle, walk, punch, kick, jumpkick, hurt, dead

  function spawnSectionWeapons() {
    weapons = [];
    const sec = SECTIONS[section];
    if (sec && sec.weapons) {
      for (const w of sec.weapons) {
        weapons.push({ x: w.x, y: w.y, type: w.type, picked: false });
      }
    }
  }

  function spawnEnemy(type, worldX, worldY) {
    const stats = ENEMY_STATS[type];
    enemies.push({
      type: type,
      x: worldX, y: worldY,
      hp: stats.hp, maxHp: stats.hp,
      facing: -1,
      state: "idle",
      stateTimer: 0,
      atkCooldown: 30 + flr(rnd(30)),
      hurtTimer: 0,
      flashTimer: 0,
      dead: false,
      deathTimer: 0,
    });
  }

  function addEffect(x, y, type) {
    effects.push({ x: x, y: y, type: type, timer: 8 });
  }

  function addParticles(x, y, count, color) {
    for (let i = 0; i < count; i++) {
      particles.push({
        x: x, y: y,
        vx: rnd(4) - 2, vy: -rnd(3) - 1,
        life: 8 + flr(rnd(12)),
        color: color || (flr(rnd(3)) + 1),
      });
    }
  }

  // --- Collision helpers ---
  // Circle vs circle collision (for round objects like hit effects, weapons)
  function circCollide(x1, y1, r1, x2, y2, r2) {
    const dx = x1 - x2;
    const dy = y1 - y2;
    const dist = dx * dx + dy * dy;
    const rSum = r1 + r2;
    return dist < rSum * rSum;
  }

  // Rect AABB collision (for character hitboxes)
  function rectCollide(ax, ay, aw, ah, bx, by, bw, bh) {
    return ax < bx + bw && ax + aw > bx && ay < by + bh && ay + ah > by;
  }

  // Sound effects
  function punchSound() { note(0, "C4", 0.04); setTimeout(() => note(0, "E3", 0.03), 30); }
  function kickSound() { note(0, "G3", 0.05); setTimeout(() => note(0, "C3", 0.04), 30); }
  function hitSound() { note(1, "C3", 0.06); setTimeout(() => note(1, "E2", 0.05), 40); }
  function weaponSound() { note(0, "A3", 0.06); setTimeout(() => note(0, "E4", 0.03), 20); }
  function pickupSound() { note(0, "C5", 0.06); setTimeout(() => note(0, "E5", 0.06), 80); }
  function hurtSound() { note(1, "A2", 0.1); }
  function deathSound() {
    note(0, "C3", 0.12); note(1, "G2", 0.12);
    setTimeout(() => { note(0, "A2", 0.18); note(1, "E2", 0.18); }, 120);
  }

    note(0, "C5", 0.1);
    setTimeout(() => note(0, "E5", 0.1), 100);
    setTimeout(() => note(0, "G5", 0.1), 200);
    setTimeout(() => note(0, "C6", 0.2), 300);
  }
  function goSound() { note(0, "E5", 0.08); setTimeout(() => note(0, "G5", 0.1), 80); }

  function playerAttack() {
    const isJumpKick = player.jumping;
    const isPunch = !isJumpKick && btn("a");
    const isKick = !isJumpKick && btn("b");

    // Attack hitbox dimensions (updated for 16x16 sprites)
    let atkRange = 22;
    let atkDmg = 1;
    let atkW = 24;
    let atkH = 20;

    if (player.weapon === "bat") { atkRange = 30; atkDmg = 3; atkW = 32; atkH = 22; }
    else if (player.weapon === "knife") { atkRange = 28; atkDmg = 4; atkW = 30; atkH = 20; }
    else if (isKick) { atkRange = 26; atkDmg = 2; atkW = 28; atkH = 20; }
    else if (isJumpKick) { atkRange = 28; atkDmg = 3; atkW = 30; atkH = 20; }

    const atkX = player.facing === 1 ? player.x + 10 : player.x - atkW + 6;
    const atkY = player.y - (isJumpKick ? 10 : 0);

    let hitAny = false;
    for (const e of enemies) {
      if (e.dead || e.hurtTimer > 0) continue;
      const ex = e.x - scrollX;
      const ey = e.y;
      // Use center+radius circle collision for attack hits
      const atkCx = atkX + atkW / 2;
      const atkCy = atkY + atkH / 2;
      const atkR = atkW / 2;
      const eCx = ex + 8;  // center of 16x16 sprite
      const eCy = ey + 8;
      const eR = 7;         // character body radius
      if (circCollide(atkCx, atkCy, atkR, eCx, eCy, eR) && _abs(atkY - ey) < 20) {
        e.hp -= atkDmg;
        e.hurtTimer = 12;
        e.flashTimer = 8;
        e.state = "hurt";
        e.stateTimer = 12;
        e.facing = player.x < ex ? -1 : 1;

        // Knockback
        const kb = isJumpKick ? 4 : (player.weapon ? 3 : 2);
        e.x += player.facing * kb;

        addEffect(ex + (player.facing === 1 ? 12 : -4), ey, "hit");
        addParticles(ex + 8, ey + 4, 4, 3);
        hitAny = true;

        if (e.hp <= 0) {
          e.dead = true;
          e.deathTimer = 30;
          score += ENEMY_STATS[e.type].pts;
          addParticles(ex + 8, ey + 8, 8, 2);
          if (e.type === "boss") {
            bossDeathSound();
            shakeTimer = 15;
          } else {
            hitSound();
          }
          // Combo bonus
          player.combo++;
          player.comboTimer = 60;
          if (player.combo >= 3) {
            score += player.combo * 50;
          }
        } else {
          hitSound();
        }
      }
    }

    if (player.weapon && hitAny) {
      player.weaponTimer--;
      if (player.weaponTimer <= 0) {
        player.weapon = null;
      }
      weaponSound();
    } else if (hitAny) {
      if (isKick) kickSound(); else punchSound();
    } else {
      if (isKick) kickSound(); else punchSound();
    }
  }

  function enemyAttack(e) {
    const ex = e.x - scrollX;
    const stats = ENEMY_STATS[e.type];
    // Circle collision for enemy attacks
    const eCx = ex + 8;
    const eCy = e.y + 8;
    const pCx = player.x + 8;
    const pCy = player.y + 8;
    if (circCollide(eCx, eCy, stats.atkRange / 2, pCx, pCy, 7) && _abs(e.y - player.y) < 20) {
      if (player.invuln <= 0 && player.state !== "hurt") {
        player.hp -= stats.atkDmg;
        player.state = "hurt";
        player.stateTimer = 15;
        player.invuln = 20;
        shakeTimer = 5;
        flashTimer = 4;
        hurtSound();
        addEffect(player.x + (e.facing * 10), player.y, "hit");
        addParticles(player.x + 8, player.y + 4, 3, 1);

        if (player.hp <= 0) {
          player.hp = 0;
          lives--;
          if (lives > 0) {
            player.hp = player.maxHp;
            player.state = "idle";
            player.invuln = 60;
            deathSound();
          } else {
            player.state = "dead";
            deathSound();
          }
        }
      }
    }
  }

    update() {

      }
      if (Mono.frame % 8 === 0) {
        addParticles(flr(rnd(W)), flr(rnd(75)) + 75, 5, flr(rnd(3))+1);
      }
      if (btnp("start") || btnp("a") || btnp("start")) { Mono.go(TITLE); return; }
    },
    draw() { drawWinScreen(); }
  });

  Mono.scene(PLAY, {
    init() { resetGame(); },
    update() {
    titleBlink++;

    // --- Play state ---
    const sec = SECTIONS[section];

    // Timers
    if (shakeTimer > 0) shakeTimer--;
    if (flashTimer > 0) flashTimer--;
    if (player.invuln > 0) player.invuln--;
    if (player.comboTimer > 0) { player.comboTimer--; if (player.comboTimer <= 0) player.combo = 0; }

    // Player dead check
    if (player.state === "dead") {
      if (btnp("a") || btnp("start")) { Mono.go(GAMEOVER); return; }
      return;
    }

    // Player state timer
    if (player.stateTimer > 0) {
      player.stateTimer--;
      if (player.stateTimer <= 0 && (player.state === "punch" || player.state === "kick" || player.state === "jumpkick" || player.state === "hurt")) {
        player.state = "idle";
      }
    }

    // Jump physics
    if (player.jumping) {
      player.jumpVY += 0.5;
      player.jumpY += player.jumpVY;
      if (player.jumpY >= 0) {
        player.jumpY = 0;
        player.jumping = false;
        player.jumpVY = 0;
      }
    }

    // Player input (only when not in attack/hurt animation)
    if (player.state === "idle" || player.state === "walk") {
      let moving = false;

      if (btn("left")) {
        player.x -= PLAYER_SPEED;
        player.facing = -1;
        moving = true;
      }
      if (btn("right")) {
        player.x += PLAYER_SPEED;
        player.facing = 1;
        moving = true;
      }
      if (btn("up")) {
        player.y -= PLAYER_VSPEED;
        moving = true;
      }
      if (btn("down")) {
        player.y += PLAYER_VSPEED;
        moving = true;
      }

      // Clamp Y to walkable area (updated for 16px sprite height)
      player.y = _max(GROUND_Y, min(GROUND_Y + GROUND_H - SPR, player.y));
      // Clamp X to screen bounds (updated for 16px sprite width)
      player.x = _max(4, min(W - SPR - 4, player.x));

      player.state = moving ? "walk" : "idle";

      // Jump kick: Up + A
      if (btn("up") && btnp("a") && !player.jumping) {
        player.jumping = true;
        player.jumpVY = -6;
        player.jumpY = 0;
        player.state = "jumpkick";
        player.stateTimer = 20;
        // Attack happens mid-jump
        setTimeout(() => { if (player.state === "jumpkick") playerAttack(); }, 150);
        kickSound();
      }
      // Punch: A
      else if (btnp("a") && !player.jumping) {
        player.state = "punch";
        player.stateTimer = 10;
        playerAttack();
      }
      // Kick: B
      else if (btnp("b") && !player.jumping) {
        player.state = "kick";
        player.stateTimer = 12;
        playerAttack();
      }
    }

    // Scrolling logic
    const liveEnemies = enemies.filter(e => !e.dead);
    allEnemiesDead = liveEnemies.length === 0 && waveIndex > 0;

    // Check if we should spawn next wave
    if (sec && waveIndex < sec.waves.length) {
      const wave = sec.waves[waveIndex];
      if (scrollX >= wave.trigger) {
        for (const ed of wave.enemies) {
          const wx = ed.x < 0 ? scrollX + ed.x : scrollX + ed.x;
          spawnEnemy(ed.type, wx, ed.y);
        }
        waveIndex++;
      }
    }

    // Can scroll if no alive enemies
    if (allEnemiesDead && waveIndex < sec.waves.length) {
      goTimer++;
      if (goTimer > 30) { goSound(); goTimer = -60; }
    }

    // Scroll right when player reaches edge and enemies are dead
    const canScroll = liveEnemies.length === 0;
    if (canScroll && player.x > SCROLL_EDGE && scrollX < sec.length) {
      const scrollAmt = player.x - SCROLL_EDGE;
      scrollX += scrollAmt;
      player.x = SCROLL_EDGE;
    }

    // Section complete check
    if (waveIndex >= sec.waves.length && liveEnemies.length === 0 && !sectionClear) {
      sectionClear = true;
      goTimer = 0;
    }
    if (sectionClear) {
      goTimer++;
      if (goTimer > 90) {
        section++;
        if (section >= SECTIONS.length) {
          addParticles(W/2, H/2, 30, 3);
          bossDeathSound();
          Mono.go(WIN); return;
        }
        scrollX = 0;
        waveIndex = 0;
        sectionClear = false;
        goTimer = 0;
        player.x = 40;
        spawnSectionWeapons();
      }
    }

    // Weapon pickup (circle collision: player center vs weapon center)
    for (const w of weapons) {
      if (w.picked) continue;
      const wx = w.x - scrollX;
      const pCx = player.x + 8;
      const pCy = player.y + 8;
      const wCx = wx + 8;
      const wCy = w.y + 8;
      if (circCollide(pCx, pCy, 10, wCx, wCy, 8)) {
        player.weapon = w.type;
        player.weaponTimer = w.type === "bat" ? 8 : 6;
        w.picked = true;
        pickupSound();
      }
    }

    // Update enemies
    for (let i = enemies.length - 1; i >= 0; i--) {
      const e = enemies[i];

      if (e.dead) {
        e.deathTimer--;
        if (e.deathTimer <= 0) {
          enemies.splice(i, 1);
        }
        continue;
      }

      if (e.hurtTimer > 0) { e.hurtTimer--; continue; }
      if (e.flashTimer > 0) e.flashTimer--;

      const ex = e.x - scrollX;
      const stats = ENEMY_STATS[e.type];
      const dx = player.x - ex;
      const dy = player.y - e.y;
      const dist = Math.sqrt(dx * dx + dy * dy);

      e.facing = dx > 0 ? 1 : -1;

      // AI
      e.atkCooldown--;
      if (e.state === "hurt") {
        // Already handled by hurtTimer
      } else if (dist < stats.atkRange && e.atkCooldown <= 0) {
        // Attack
        e.state = "attack";
        e.stateTimer = 15;
        e.atkCooldown = stats.atkCooldown + flr(rnd(20));
        enemyAttack(e);
      } else if (dist > stats.atkRange * 0.8) {
        // Move toward player
        e.state = "walk";
        const moveX = dx / (dist || 1) * stats.speed;
        const moveY = dy / (dist || 1) * stats.speed * 0.7;
        e.x += moveX;
        e.y += moveY;
        e.y = _max(GROUND_Y, min(GROUND_Y + GROUND_H - SPR, e.y));
      } else {
        e.state = "idle";
        // Circle around player a bit
        if (rnd(1) < 0.03) {
          e.y += (rnd(1) < 0.5 ? 1 : -1) * stats.speed * 2;
          e.y = _max(GROUND_Y, min(GROUND_Y + GROUND_H - SPR, e.y));
        }
      }

      if (e.stateTimer > 0) {
        e.stateTimer--;
        if (e.stateTimer <= 0 && e.state === "attack") e.state = "idle";
      }
    }

    // Effects
    for (let i = effects.length - 1; i >= 0; i--) {
      effects[i].timer--;
      if (effects[i].timer <= 0) effects.splice(i, 1);
    }

    // Particles
    for (let i = particles.length - 1; i >= 0; i--) {
      const p = particles[i];
      p.x += p.vx; p.y += p.vy; p.vy += 0.1; p.life--;
      if (p.life <= 0) particles.splice(i, 1);
    }
    },
    draw() { drawPlayScreen(); }
  });

  // ============================================================
  // Draw
  // ============================================================
  function drawBackground() {
    const sx = flr(scrollX);

    // Sky
    rectf(0, 0, W, GROUND_Y - 30, 0);

    // Buildings (parallax - slower scroll)
    const buildScroll = flr(sx * 0.3);
    for (let bx = -buildScroll % 48; bx < W + 48; bx += 48) {
      const bh = 30 + ((flr((bx + buildScroll) / 48) * 7) % 23);
      const by = GROUND_Y - 30 - bh;
      // Building body (16x16 tiles)
      for (let ty = 0; ty < flr(bh / SPR); ty++) {
        for (let tx = 0; tx < 3; tx++) {
          const worldTx = flr((bx + buildScroll) / 48);
          if (ty % 2 === 1 && tx === 1 && worldTx % 2 === 0) {
            sprT(61, bx + tx * SPR, by + ty * SPR); // window
          } else {
            sprT(60, bx + tx * SPR, by + ty * SPR); // wall
          }
        }
      }
    }

    // Mid-ground buildings (closer parallax)
    const midScroll = flr(sx * 0.6);
    for (let bx = -midScroll % 64; bx < W + 64; bx += 64) {
      const idx = flr((bx + midScroll) / 64);
      const bh = 15 + (idx * 13 % 15);
      const by = GROUND_Y - 30 - bh;
      for (let ty = 0; ty < flr(bh / SPR) + 1; ty++) {
        for (let tx = 0; tx < 4; tx++) {
          if (ty === flr(bh / SPR) && tx >= 1 && tx <= 2 && idx % 3 === 0) {
            sprT(62, bx + tx * SPR, by + ty * SPR); // door
          } else if (ty % 2 === 0 && tx >= 1 && tx <= 2 && (tx + idx) % 3 === 0) {
            sprT(61, bx + tx * SPR, by + ty * SPR);
          } else {
            sprT(60, bx + tx * SPR, by + ty * SPR);
          }
        }
      }
    }

    // Sidewalk line
    rectf(0, GROUND_Y - 30, W, 2, 2);

    // Ground area (sidewalk) - 16x16 tiles
    for (let ty = 0; ty < (GROUND_H + 30) / SPR + 1; ty++) {
      for (let tx = 0; tx < W / SPR + 2; tx++) {
        if (ty <= 1) {
          sprT(63, tx * SPR - (sx % SPR), GROUND_Y - 28 + ty * SPR);
        } else {
          sprT(64, tx * SPR - (sx % SPR), GROUND_Y - 28 + ty * SPR);
        }
      }
    }

    // Road dashes
    for (let dx = -(sx % 24); dx < W; dx += 24) {
      rectf(dx, GROUND_Y + 15, 11, 2, 1);
    }

    // Props (lamp posts, trashcans) - updated spacing for 16px tiles
    const propScroll = sx;
    for (let px = -(propScroll % 96); px < W + 96; px += 96) {
      sprT(66, px + 10, GROUND_Y - 30 - SPR); // lamp
      if ((flr((px + propScroll) / 96)) % 3 === 0) {
        sprT(65, px + 48, GROUND_Y - 28); // trashcan near sidewalk
      }
      if ((flr((px + propScroll) / 96)) % 4 === 1) {
        sprT(68, px + 64, GROUND_Y - 28); // crate
      }
    }
  }

  function drawCharacter(x, y, jumpY, sprStand, sprWalk1, sprWalk2, sprAtk, sprKick, charState, timer, facing, flashT) {
    // Shadow (centered under character)
    sprT(51, x, y + 10);

    const drawY = y + jumpY;
    const flipX = facing === -1;

    if (flashT > 0 && flr(Mono.frame / 2) % 2 === 0) return; // flash effect

    let sprId = sprStand;
    if (charState === "walk") {
      sprId = (flr(Mono.frame / 5) % 2 === 0) ? sprWalk1 : sprWalk2;
    } else if (charState === "punch" || charState === "attack") {
      sprId = sprAtk;
    } else if (charState === "kick") {
      sprId = sprKick;
    } else if (charState === "jumpkick") {
      sprId = 6;
    } else if (charState === "hurt") {
      // Draw hurt (flash)
      if (flr(timer / 2) % 2 === 0) sprId = sprStand;
    }

    sprT(sprId, flr(x), flr(drawY), flipX);

    // Debug hitbox: rect for character body
    dbg(flr(x), flr(drawY), SPR, SPR);
  }

  function drawHealthBar(x, y, hp, maxHp, w) {
    rectf(x, y, w, 3, 0);
    rect(x, y, w, 3, 1);
    const hpW = flr((hp / maxHp) * (w - 2));
    if (hpW > 0) {
      const col = hp > maxHp * 0.3 ? 2 : (flr(Mono.frame / 4) % 2 === 0 ? 2 : 1);
      rectf(x + 1, y + 1, hpW, 1, col);
    }
  }

  function drawTitleScreen() {
    cls(0);

    {
      // Title screen
      rectf(0, 0, W, H, 0);

      // City silhouette
      for (let bx = 0; bx < W; bx += 21) {
        const bh = 23 + ((bx * 7) % 38);
        rectf(bx, H/2 + 23 - bh, 20, bh, 1);
        // Windows
        for (let wy = H/2 + 24 - bh; wy < H/2 + 23; wy += 8) {
          for (let wx = bx + 3; wx < bx + 19; wx += 6) {
            if ((wx + wy) % 13 < 7) rectf(wx, wy, 4, 4, 0);
          }
        }
      }
      rectf(0, H/2 + 23, W, H/2 - 23, 1);

      // Ground
      rectf(0, H/2 + 38, W, 4, 2);

      // Title text
      const ty = 45 + sin(Mono.frame * 0.04) * 3;

      // Big title with shadow
      text("DOUBLE DRAGON", 129, flr(ty) + 1, 1);
      text("DOUBLE DRAGON", 128, flr(ty), 3);

      // Subtitle
      rectf(93, flr(ty) + 9, 133, 1, 2);
      text("STREETS OF FURY", 123, flr(ty) + 15, 2);

      // Player figures on title (adjusted for 16px sprites)
      const px1 = 112 + sin(Mono.frame * 0.06) * 3;
      sprT(1, flr(px1), flr(ty) + 30);
      sprT(10, flr(px1) + 48, flr(ty) + 30, true);
      sprT(15, flr(px1) + 68, flr(ty) + 28, true);

      // Blink start text
      if (flr(titleBlink / 18) % 2 === 0) {
        text("PRESS START", 133, 158, 3);
      }

      // Controls
      text("A=PUNCH  B=KICK  UP+A=JUMP KICK", 80, 188, 2);
      text("ARROWS=MOVE", 133, 197, 2);

      // Credits (ensure within 240 height)
      text("MONO DEMO V0.1", 118, 228, 1);
    }
  }

  function drawGameOverScreen() {
    cls(0);
    rectf(0, 0, W, H, 0);
    for (const p of particles) pix(flr(p.x), flr(p.y), p.color);

    text("GAME OVER", 138, 75, 3);
    text("FINAL SCORE: " + score, 123, 98, 2);
    text("SECTION: " + (section + 1), 130, 111, 2);

    if (flr(titleBlink / 18) % 2 === 0) {
      text("PRESS START", 133, 150, 3);
    }
  }

  function drawWinScreen() {
    cls(0);
    rectf(0, 0, W, H, 0);
    for (const p of particles) pix(flr(p.x), flr(p.y), p.color);

    text("CONGRATULATIONS!", 120, 60, 3);
    text("YOU DEFEATED ALL ENEMIES!", 98, 83, 2);
    text("FINAL SCORE: " + score, 123, 105, 3);

    sprT(1, 153, 128 + sin(Mono.frame * 0.1) * 2);

    if (flr(titleBlink / 18) % 2 === 0) {
      text("PRESS START", 133, 173, 3);
    }
  }

  function drawPlayScreen() {
    cls(0);

    const shakeX = shakeTimer > 0 ? flr(rnd(5)) - 2 : 0;
    const shakeY = shakeTimer > 0 ? flr(rnd(5)) - 2 : 0;

    // --- Play state rendering ---

    // Flash effect (white flash on hit)
    if (flashTimer > 0 && flr(flashTimer / 2) % 2 === 0) {
      cls(3);
    }

    // Background with shake
    drawBackground();

    // Sort all visible entities by Y for depth ordering
    const drawList = [];

    // Player
    drawList.push({ type: "player", y: player.y });

    // Enemies
    for (const e of enemies) {
      const ex = e.x - scrollX;
      if (ex > -SPR && ex < W + SPR) {
        drawList.push({ type: "enemy", ref: e, y: e.y });
      }
    }

    // Weapons
    for (const w of weapons) {
      if (w.picked) continue;
      const wx = w.x - scrollX;
      if (wx > -SPR && wx < W + SPR) {
        drawList.push({ type: "weapon", ref: w, y: w.y });
      }
    }

    // Sort by Y
    drawList.sort((a, b) => a.y - b.y);

    // Draw sorted
    for (const d of drawList) {
      if (d.type === "weapon") {
        const w = d.ref;
        const wx = w.x - scrollX;
        // Bobbing animation
        const bob = sin(Mono.frame * 0.15) * 2;
        sprT(w.type === "bat" ? 40 : 41, flr(wx), flr(w.y + bob));
        // Debug: circle collision for weapon pickup
        dbgC(flr(wx) + 8, flr(w.y + bob) + 8, 8);
      } else if (d.type === "enemy") {
        const e = d.ref;
        const ex = e.x - scrollX;

        if (e.dead) {
          // Death animation: flash and fade
          if (e.deathTimer > 15 || flr(e.deathTimer / 3) % 2 === 0) {
            const sprBase = e.type === "thug" ? 10 : e.type === "big" ? 15 : e.type === "knife" ? 20 : 30;
            sprT(sprBase, flr(ex), flr(e.y), e.facing === -1);
          }
          continue;
        }

        let sprBase, sprW1, sprAtk;
        if (e.type === "thug") { sprBase = 10; sprW1 = 11; sprAtk = 12; }
        else if (e.type === "big") { sprBase = 15; sprW1 = 16; sprAtk = 17; }
        else if (e.type === "knife") { sprBase = 20; sprW1 = 21; sprAtk = 22; }
        else { sprBase = 30; sprW1 = 31; sprAtk = 32; } // boss

        drawCharacter(ex, e.y, 0, sprBase, sprW1, sprBase, sprAtk, sprAtk, e.state, e.stateTimer, e.facing, e.flashTimer);

        // Debug: circle collision for enemy body
        dbgC(flr(ex) + 8, flr(e.y) + 8, 7);

        // Enemy health bar (boss gets bigger bar)
        if (e.type === "boss") {
          drawHealthBar(ex - 4, e.y - 10, e.hp, e.maxHp, 24);
        } else if (e.hp < e.maxHp) {
          drawHealthBar(ex, e.y - 8, e.hp, e.maxHp, 16);
        }
      } else if (d.type === "player") {
        if (player.state === "dead") {
          // Draw fallen
          if (flr(Mono.frame / 8) % 2 === 0) sprT(1, flr(player.x), flr(player.y + 4), player.facing === -1);
          continue;
        }

        // Invulnerability flash
        if (player.invuln > 0 && flr(player.invuln / 3) % 2 === 0) continue;

        let pSprStand = 1, pSprW1 = 2, pSprW2 = 3, pSprAtk = 4, pSprKick = 5;
        if (player.weapon === "bat") pSprAtk = 45;
        else if (player.weapon === "knife") pSprAtk = 46;

        drawCharacter(player.x, player.y, player.jumpY, pSprStand, pSprW1, pSprW2, pSprAtk, pSprKick, player.state, player.stateTimer, player.facing, 0);

        // Debug: circle collision for player body
        dbgC(flr(player.x) + 8, flr(player.y) + 8, 7);
        // Debug: player pickup radius
        dbgC(flr(player.x) + 8, flr(player.y) + 8, 10);

        // Weapon indicator
        if (player.weapon) {
          text(player.weapon === "bat" ? "BAT" : "KNIFE", flr(player.x) - 2, flr(player.y) - 12, 3);
        }
      }
    }

    // Effects
    for (const e of effects) {
      sprT(50, flr(e.x), flr(e.y));
      // Debug: hit effect area
      dbgC(flr(e.x) + 8, flr(e.y) + 8, 8);
    }

    // Particles
    for (const p of particles) {
      pix(flr(p.x), flr(p.y), p.color);
    }

    // --- HUD ---
    // HUD background bar
    rectf(0, 0, W, 16, 0);

    // Player health label + bar
    text("BILLY", 4, 2, 3);
    drawHealthBar(4, 9, player.hp, player.maxHp, 40);

    // Lives icons (16x16 sprites, spaced to fit without overflow)
    for (let i = 0; i < lives; i++) {
      sprT(55, 48 + i * 18, 0);
    }

    // Score (centered)
    const scoreStr = "SCORE:" + score;
    text(scoreStr, 140, 2, 2);

    // Section indicator (right-aligned, ensure within 320px)
    const secStr = "SECTION " + (section + 1) + "/3";
    text(secStr, W - 68, 2, 2);

    // Debug: HUD bar area
    dbg(0, 0, W, 16);

    // Combo display
    if (player.combo >= 2 && player.comboTimer > 0) {
      text(player.combo + " HIT COMBO!", 127, 24, 3);
      if (player.combo >= 3) {
        text("+" + (player.combo * 50), 140, 32, 2);
      }
    }

    // GO arrow when enemies cleared and more waves coming
    if (allEnemiesDead && waveIndex < SECTIONS[section].waves.length && !sectionClear) {
      const goX = min(W - 40, W - 33 + sin(Mono.frame * 0.15) * 5);
      text("GO", flr(goX), H / 2 - 15, 3);
      // Arrow
      line(flr(goX) + 11, H/2 - 13, flr(goX) + 15, H/2 - 13, 3);
      line(flr(goX) + 13, H/2 - 15, flr(goX) + 15, H/2 - 13, 3);
      line(flr(goX) + 13, H/2 - 11, flr(goX) + 15, H/2 - 13, 3);
    }

    // Section clear text
    if (sectionClear && goTimer < 90) {
      if (section < SECTIONS.length - 1) {
        text("SECTION CLEAR!", 125, H / 2 - 15, 3);
      } else {
        text("FINAL BOSS DEFEATED!", 110, H / 2 - 15, 3);
      }
      text("+" + ENEMY_STATS.boss.pts + " BONUS", 128, H / 2 - 5, 2);
    }

    // Boss warning
    const sec2 = SECTIONS[section];
    if (sec2 && waveIndex === sec2.waves.length - 1) {
      const bossAlive = enemies.some(e => e.type === "boss" && !e.dead);
      if (bossAlive) {
        if (flr(Mono.frame / 10) % 2 === 0) {
          text("!! BOSS !!", W/2 - 17, 19, 3);
        }

        // Boss health bar at top
        const boss = enemies.find(e => e.type === "boss" && !e.dead);
        if (boss) {
          text("BOSS", W/2 - 10, 25, 1);
          drawHealthBar(W/2 - 20, 32, boss.hp, boss.maxHp, 40);
        }
      }
    }
  }

  // ============================================================
  // Boot
  Mono.go(TITLE);
  Mono.boot("screen");
})();
</script>
