<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GrayBox — Demo: Columns</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #0a0a0a;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100vh;
    font-family: monospace;
    overflow: hidden;
  }
  #frame {
    background: #111;
    border: 3px solid #333;
    border-radius: 8px;
    padding: 12px;
    box-shadow: 0 0 40px rgba(0,0,0,0.8), inset 0 0 20px rgba(0,0,0,0.5);
  }
  canvas {
    display: block;
    image-rendering: pixelated;
    image-rendering: crisp-edges;
  }
  #controls {
    margin-top: 12px;
    color: #6b6b6b;
    font-size: 11px;
    text-align: center;
    letter-spacing: 1px;
  }
  #controls span { color: #b0b0b0; }
</style>
</head>
<body>
<div id="frame">
  <canvas id="screen"></canvas>
</div>
<div id="controls">
  <span>&larr;&rarr;</span> MOVE &nbsp;&nbsp; <span>&darr;</span> SOFT DROP &nbsp;&nbsp; <span>&uarr;</span> HARD DROP &nbsp;&nbsp; <span>A</span> CYCLE
</div>
<script src="../../runtime/engine.js"></script>
<script>
(() => {
  "use strict";
  const W = GrayBox.WIDTH, H = GrayBox.HEIGHT;
  const { cls, pix, line, rect, rectf, circ, circf, sprite: defSprite,
          spr, text, btn, btnp, note, stop, rnd, flr, abs: _abs,
          min, max: _max, sin, cos } = GrayBox;

  // --- Constants ---
  const COLS = 6;
  const ROWS = 13;
  const CELL = 15;
  const BOARD_X = 120;
  const BOARD_Y = 16;
  const BOARD_W = COLS * CELL;
  const BOARD_H = ROWS * CELL;
  const NUM_JEWELS = 4;

  // --- Jewel Sprites (8x8, 4 distinct patterns) ---
  // Jewel 1: Solid diamond
  defSprite(1,
    "00010000" +
    "00131000" +
    "01323100" +
    "13233210" +
    "13233210" +
    "01323100" +
    "00131000" +
    "00010000"
  );
  // Jewel 2: Crosshatch
  defSprite(2,
    "20202020" +
    "02020200" +
    "20202020" +
    "02020200" +
    "20202020" +
    "02020200" +
    "20202020" +
    "02020200"
  );
  // Jewel 3: Circle / ring
  defSprite(3,
    "00111000" +
    "01000100" +
    "10000010" +
    "10033010" +
    "10033010" +
    "10000010" +
    "01000100" +
    "00111000"
  );
  // Jewel 4: Horizontal stripes
  defSprite(4,
    "33333330" +
    "00000000" +
    "11111110" +
    "00000000" +
    "33333330" +
    "00000000" +
    "11111110" +
    "00000000"
  );

  // --- Game State ---
  const { TITLE, PLAY, GAMEOVER } = GrayBox.SCENE;
  let board;
  let score, level, linesCleared, chain;
  let dropInterval, dropTimer;
  let piece;
  let nextJewels;
  let flashTimer, flashCells;
  let gravityPhase;
  let gravityTimer;
  let gameOver;
  let hiScore = 0;
  let titleAnim = 0;

  // DAS (delayed auto-shift) for left/right
  let dasDir = 0;
  let dasTimer = 0;
  const DAS_DELAY = 10;
  const DAS_REPEAT = 3;

  function newBoard() {
    board = [];
    for (let r = 0; r < ROWS; r++) {
      board[r] = [];
      for (let c = 0; c < COLS; c++) board[r][c] = 0;
    }
  }

  function randomJewel() { return flr(rnd(NUM_JEWELS)) + 1; }

  function makeNextJewels() {
    return [randomJewel(), randomJewel(), randomJewel()];
  }

  function spawnPiece() {
    piece = {
      col: flr(COLS / 2) - 1,
      row: -2,
      jewels: nextJewels.slice()
    };
    nextJewels = makeNextJewels();
    dropTimer = 0;
    // Check if spawn is blocked
    if (board[0][piece.col] !== 0 || board[1][piece.col] !== 0) {
      gameOver = true;
      gameOverSound();
    }
  }

  function resetGame() {
    newBoard();
    score = 0;
    level = 1;
    linesCleared = 0;
    chain = 0;
    dropInterval = 20;
    dropTimer = 0;
    flashTimer = 0;
    flashCells = [];
    gravityPhase = false;
    gravityTimer = 0;
    gameOver = false;
    dasDir = 0;
    dasTimer = 0;
    nextJewels = makeNextJewels();
    spawnPiece();
  }

  // --- Collision ---
  function canMove(col, rowInt) {
    for (let i = 0; i < 3; i++) {
      const r = rowInt + i;
      const c = col;
      if (c < 0 || c >= COLS) return false;
      if (r >= ROWS) return false;
      if (r >= 0 && board[r][c] !== 0) return false;
    }
    return true;
  }

  function lockPiece() {
    const rowInt = flr(piece.row);
    for (let i = 0; i < 3; i++) {
      const r = rowInt + i;
      if (r >= 0 && r < ROWS) {
        board[r][piece.col] = piece.jewels[i];
      }
    }
    piece = null;
    chain = 0;
    startMatchCheck();
  }

  // --- Match detection ---
  function findMatches() {
    const matched = new Set();
    // Horizontal
    for (let r = 0; r < ROWS; r++) {
      for (let c = 0; c <= COLS - 3; c++) {
        const v = board[r][c];
        if (v === 0) continue;
        if (board[r][c+1] === v && board[r][c+2] === v) {
          let end = c + 2;
          while (end + 1 < COLS && board[r][end+1] === v) end++;
          for (let i = c; i <= end; i++) matched.add(r + "," + i);
        }
      }
    }
    // Vertical
    for (let c = 0; c < COLS; c++) {
      for (let r = 0; r <= ROWS - 3; r++) {
        const v = board[r][c];
        if (v === 0) continue;
        if (board[r+1][c] === v && board[r+2][c] === v) {
          let end = r + 2;
          while (end + 1 < ROWS && board[end+1][c] === v) end++;
          for (let i = r; i <= end; i++) matched.add(i + "," + c);
        }
      }
    }
    // Diagonal: top-left to bottom-right
    for (let r = 0; r <= ROWS - 3; r++) {
      for (let c = 0; c <= COLS - 3; c++) {
        const v = board[r][c];
        if (v === 0) continue;
        if (board[r+1][c+1] === v && board[r+2][c+2] === v) {
          let end = 2;
          while (r+end+1 < ROWS && c+end+1 < COLS && board[r+end+1][c+end+1] === v) end++;
          for (let i = 0; i <= end; i++) matched.add((r+i) + "," + (c+i));
        }
      }
    }
    // Diagonal: top-right to bottom-left
    for (let r = 0; r <= ROWS - 3; r++) {
      for (let c = 2; c < COLS; c++) {
        const v = board[r][c];
        if (v === 0) continue;
        if (board[r+1][c-1] === v && board[r+2][c-2] === v) {
          let end = 2;
          while (r+end+1 < ROWS && c-end-1 >= 0 && board[r+end+1][c-end-1] === v) end++;
          for (let i = 0; i <= end; i++) matched.add((r+i) + "," + (c-i));
        }
      }
    }
    return matched;
  }

  function startMatchCheck() {
    const matched = findMatches();
    if (matched.size > 0) {
      chain++;
      flashCells = [];
      matched.forEach(key => {
        const [r, c] = key.split(",").map(Number);
        flashCells.push({ r, c });
      });
      const pts = flashCells.length * 10 * chain;
      score += pts;
      if (score > hiScore) hiScore = score;
      flashTimer = 20;
      gravityPhase = true;
      // Match sound — pitch rises with chain
      const notes = ["C5","E5","G5","C6","E6"];
      note(0, notes[min(chain - 1, 4)], 0.1);
      if (chain > 1) {
        note(1, "G5", 0.06);
      }
    } else {
      gravityPhase = false;
      chain = 0;
      if (!gameOver) {
        spawnPiece();
      }
    }
  }

  function clearAndGravity() {
    let cleared = 0;
    for (const cell of flashCells) {
      if (board[cell.r][cell.c] !== 0) cleared++;
      board[cell.r][cell.c] = 0;
    }
    linesCleared += cleared;
    // Level up every 20 jewels cleared
    const newLevel = flr(linesCleared / 20) + 1;
    if (newLevel > level) {
      level = newLevel;
      dropInterval = _max(3, 20 - (level - 1) * 2);
      note(0, "C6", 0.06);
      setTimeout(() => note(0, "E6", 0.06), 60);
      setTimeout(() => note(0, "G6", 0.1), 120);
    }
    flashCells = [];
    flashTimer = 0;

    // Apply gravity
    for (let c = 0; c < COLS; c++) {
      let writeRow = ROWS - 1;
      for (let r = ROWS - 1; r >= 0; r--) {
        if (board[r][c] !== 0) {
          board[writeRow][c] = board[r][c];
          if (writeRow !== r) board[r][c] = 0;
          writeRow--;
        }
      }
      for (let r = writeRow; r >= 0; r--) board[r][c] = 0;
    }

    gravityTimer = 8;
  }

  // --- Sound effects ---
  function moveSound() { note(1, "A4", 0.02); }
  function dropSound() { note(1, "C3", 0.05); }
  function cycleSound() { note(0, "E5", 0.03); }
  function gameOverSound() {
    note(0, "C3", 0.15);
    note(1, "G2", 0.15);
    setTimeout(() => { note(0, "A2", 0.2); note(1, "E2", 0.2); }, 150);
  }

  // --- Drawing helpers ---
  function drawJewelScaled(px, py, type, flash) {
    if (py < BOARD_Y - CELL || py >= BOARD_Y + BOARD_H) return;
    // Cell background
    rectf(px + 1, py + 1, CELL - 2, CELL - 2, 0);
    if (flash && GrayBox.frame % 4 < 2) {
      // Flash white
      rectf(px + 2, py + 2, CELL - 4, CELL - 4, 3);
    } else {
      drawJewelInner(px, py, type);
    }
  }

  function drawJewelInner(px, py, type) {
    const s = sprites[type];
    if (!s) return;
    // Draw 8x8 sprite at 1x, centered in CELL
    const ox = px + (CELL - 8) / 2;
    const oy = py + (CELL - 8) / 2;
    for (let sy = 0; sy < 8; sy++) {
      for (let sx = 0; sx < 8; sx++) {
        const c = s[sy * 8 + sx];
        const fx = ox + sx;
        const fy = oy + sy;
        if (fx >= 0 && fx < W && fy >= 0 && fy < H)
          buf32[fy * W + fx] = COLOR_U32[c];
      }
    }
  }

  function drawBoard() {
    // Border
    rectf(BOARD_X - 2, BOARD_Y - 2, BOARD_W + 4, BOARD_H + 4, 1);
    rectf(BOARD_X - 1, BOARD_Y - 1, BOARD_W + 2, BOARD_H + 2, 0);

    // Subtle grid dots
    for (let c = 1; c < COLS; c++) {
      for (let r = 1; r < ROWS; r++) {
        pix(BOARD_X + c * CELL, BOARD_Y + r * CELL, 1);
      }
    }

    // Draw placed jewels
    const flashSet = new Set(flashCells.map(c => c.r + "," + c.c));
    for (let r = 0; r < ROWS; r++) {
      for (let c = 0; c < COLS; c++) {
        if (board[r][c] !== 0) {
          const px = BOARD_X + c * CELL;
          const py = BOARD_Y + r * CELL;
          const isFlashing = flashSet.has(r + "," + c) && flashTimer > 0;
          drawJewelScaled(px, py, board[r][c], isFlashing);
        }
      }
    }
  }

  function drawPiece() {
    if (!piece) return;
    for (let i = 0; i < 3; i++) {
      const r = piece.row + i;
      const py = BOARD_Y + flr(r) * CELL;
      const px = BOARD_X + piece.col * CELL;
      if (flr(r) >= 0) {
        drawJewelScaled(px, py, piece.jewels[i], false);
      }
    }
  }

  function drawGhostPiece() {
    if (!piece) return;
    let ghostRow = flr(piece.row);
    while (canMove(piece.col, ghostRow + 1)) ghostRow++;
    if (ghostRow <= flr(piece.row)) return;
    for (let i = 0; i < 3; i++) {
      const r = ghostRow + i;
      if (r >= 0 && r < ROWS) {
        const px = BOARD_X + piece.col * CELL;
        const py = BOARD_Y + r * CELL;
        rect(px + 2, py + 2, CELL - 4, CELL - 4, 1);
      }
    }
  }

  function drawNextPreview() {
    const nx = BOARD_X + BOARD_W + 19;
    const ny = BOARD_Y + 12;
    text("NEXT", nx + 3, ny - 10, 2);
    rectf(nx - 2, ny - 2, CELL + 4, CELL * 3 + 4, 1);
    rectf(nx, ny, CELL, CELL * 3, 0);
    for (let i = 0; i < 3; i++) {
      const px = nx;
      const py = ny + i * CELL;
      rectf(px + 1, py + 1, CELL - 2, CELL - 2, 0);
      drawJewelInner(px, py, nextJewels[i]);
    }
  }

  function drawHUD() {
    const lx = 15;
    text("SCORE", lx, BOARD_Y + 3, 2);
    text(String(score), lx, BOARD_Y + 12, 3);

    text("HI-SCORE", lx, BOARD_Y + 27, 2);
    text(String(hiScore), lx, BOARD_Y + 36, 3);

    text("LEVEL", lx, BOARD_Y + 56, 2);
    text(String(level), lx, BOARD_Y + 65, 3);

    text("LINES", lx, BOARD_Y + 80, 2);
    text(String(linesCleared), lx, BOARD_Y + 89, 3);

    if (chain > 1 && gravityPhase) {
      text("CHAIN", lx, BOARD_Y + 111, 2);
      text("X" + String(chain), lx, BOARD_Y + 120, 3);
    }

    // Jewel legend on right side
    const rx = BOARD_X + BOARD_W + 19;
    const ry = BOARD_Y + 82;
    text("JEWELS", rx, ry, 2);
    for (let i = 0; i < NUM_JEWELS; i++) {
      const px = rx + 2;
      const py = ry + 10 + i * 16;
      drawJewelInner(px, py, i + 1);
    }
  }

  // --- Update ---
  function tryMove(dir) {
    if (!piece) return false;
    if (canMove(piece.col + dir, flr(piece.row))) {
      piece.col += dir;
      moveSound();
      return true;
    }
    return false;
  }

  function updatePlay() {
    if (gameOver) {
      if (btnp("a")) {
        GrayBox.go(TITLE); return;
      }
      return;
    }

    // Flash/gravity phase
    if (gravityPhase) {
      if (flashTimer > 0) {
        flashTimer--;
        if (flashTimer <= 0) {
          clearAndGravity();
        }
      } else if (gravityTimer > 0) {
        gravityTimer--;
        if (gravityTimer <= 0) {
          startMatchCheck();
        }
      }
      return;
    }

    if (!piece) return;

    // Move left/right with DAS
    if (btnp("left")) {
      tryMove(-1);
      dasDir = -1;
      dasTimer = 0;
    } else if (btnp("right")) {
      tryMove(1);
      dasDir = 1;
      dasTimer = 0;
    }

    if (btn("left") && dasDir === -1) {
      dasTimer++;
      if (dasTimer > DAS_DELAY && dasTimer % DAS_REPEAT === 0) tryMove(-1);
    } else if (btn("right") && dasDir === 1) {
      dasTimer++;
      if (dasTimer > DAS_DELAY && dasTimer % DAS_REPEAT === 0) tryMove(1);
    }

    if (!btn("left") && dasDir === -1) { dasDir = 0; dasTimer = 0; }
    if (!btn("right") && dasDir === 1) { dasDir = 0; dasTimer = 0; }

    // Cycle jewels (Z / a button)
    if (btnp("a")) {
      const temp = piece.jewels[2];
      piece.jewels[2] = piece.jewels[1];
      piece.jewels[1] = piece.jewels[0];
      piece.jewels[0] = temp;
      cycleSound();
    }

    // Hard drop (up)
    if (btnp("up")) {
      let r = flr(piece.row);
      while (canMove(piece.col, r + 1)) r++;
      piece.row = r;
      dropSound();
      lockPiece();
      return;
    }

    // Drop timing
    let speed = 1;
    if (btn("down")) speed = 4;

    dropTimer += speed;
    if (dropTimer >= dropInterval) {
      dropTimer = 0;
      const nextRow = flr(piece.row) + 1;
      if (canMove(piece.col, nextRow)) {
        piece.row = nextRow;
      } else {
        if (flr(piece.row) < 0) {
          gameOver = true;
          gameOverSound();
          return;
        }
        dropSound();
        lockPiece();
      }
    }
  }

  // --- Title Screen ---
  function drawTitle() {
    cls(0);
    titleAnim++;
    const t = titleAnim;

    // Background falling jewels (decorative)
    for (let i = 0; i < 15; i++) {
      const x = (i * 37 + 15) % W;
      const y = ((t * (1 + (i % 3)) + i * 53) % (H + 40)) - 20;
      const type = (i % NUM_JEWELS) + 1;
      const s = sprites[type];
      if (s) {
        for (let sy = 0; sy < 8; sy++)
          for (let sx = 0; sx < 8; sx++) {
            const c = s[sy * 8 + sx];
            if (c > 0) {
              const dx = flr(x) + sx;
              const dy = flr(y) + sy;
              if (dx >= 0 && dx < W && dy >= 0 && dy < H)
                buf32[dy * W + dx] = COLOR_U32[1];
            }
          }
      }
    }

    // Title text
    const cx = W / 2;
    text("C O L U M N S", cx - 50, 52, 3);

    // Animated jewels row
    for (let i = 0; i < NUM_JEWELS; i++) {
      const ax = cx - 30 + i * 16;
      const ay = 75 + sin(t * 0.08 + i * 1.5) * 4;
      drawJewelInner(flr(ax), flr(ay), i + 1);
    }

    // Separator line
    line(cx - 47, 97, cx + 47, 97, 1);

    text("MATCH 3 OR MORE", cx - 52, 109, 2);
    text("IN ANY DIRECTION!", cx - 55, 119, 2);

    if (flr(t / 18) % 2 === 0) {
      text("PRESS A TO START", cx - 65, 146, 3);
    }

    if (hiScore > 0) {
      text("HI-SCORE: " + hiScore, cx - 40, 172, 2);
    }

    text("ARROWS: MOVE / DROP", cx - 60, 201, 1);
    text("A: CYCLE JEWEL ORDER", cx - 63, 213, 1);
    text("UP: HARD DROP", cx - 43, 225, 1);
  }

  function drawPlay() {
    cls(0);

    // Subtle background pattern
    for (let y = 0; y < H; y += 8) {
      for (let x = 0; x < W; x += 8) {
        if ((x + y) % 16 === 0) pix(x, y, 1);
      }
    }

    drawBoard();
    if (!gravityPhase && piece) {
      drawGhostPiece();
      drawPiece();
    }
    drawNextPreview();
    drawHUD();

    if (gameOver) {
      // Darken the board
      for (let py = BOARD_Y; py < BOARD_Y + BOARD_H; py++) {
        for (let px = BOARD_X; px < BOARD_X + BOARD_W; px++) {
          if ((px + py) % 2 === 0) buf32[py * W + px] = COLOR_U32[0];
        }
      }
      const gx = BOARD_X + BOARD_W / 2 - 22;
      const gy = BOARD_Y + BOARD_H / 2 - 15;
      rectf(gx - 4, gy - 4, 60, 38, 0);
      rect(gx - 4, gy - 4, 60, 38, 2);
      text("GAME OVER", gx, gy, 3);
      text("SCORE: " + score, gx - 2, gy + 10, 2);
      if (flr(GrayBox.frame / 18) % 2 === 0) {
        text("PRESS A", gx - 2, gy + 21, 2);
      }
    }
  }

  // --- Title Scene ---
  GrayBox.scene(TITLE, {
    init() {},
    update() {
      titleAnim++;
      if (btnp("a")) { GrayBox.go(PLAY); return; }
    },
    draw() { drawTitle(); }
  });

  // --- Play Scene ---
  GrayBox.scene(PLAY, {
    init() { resetGame(); },
    update() { updatePlay(); },
    draw() { drawPlay(); }
  });

  // Start game loop
  GrayBox.go(TITLE);
  GrayBox.boot("screen");
})();
</script>
</body>
</html>
