  <span>←→</span> MOVE &nbsp;&nbsp; <span>A</span> JUMP

<script>
(() => {
  "use strict";
  const W = Mono.WIDTH, H = Mono.HEIGHT;
  const { cls, pix, line, rect, rectf, circ, circf, sprite: defSprite,
          spr, sprT, text, btn, btnp, note, stop, rnd, flr, abs: _abs,
          min, max: _max, sin, cos, dbg, dbgC } = Mono;

  // --- Helper: upscale 8x8 sprite data to 16x16 (256 chars) ---
  function up(d){let o="";for(let r=0;r<8;r++){let row="";for(let c=0;c<8;c++){const ch=d[r*8+c];row+=ch+ch;}o+=row+row;}return o;}

  // 10: Mountain wall tile (left)

  // 11: Mountain wall tile (right)

  // 12: Cloud/summit platform
  defSprite(12, up(

  // 13: Life icon
  defSprite(13, up(

    "00330000" +

  ));

  // 14: Icicle decoration
  defSprite(14, up(
    "33333333" +
    "23322332" +
    "02200220" +

  // 15: Snow particle
  defSprite(15, up(

  ));

  // 16: Condor (bonus stage bird at summit)
  defSprite(16, up(
    "30000003" +

    "00311300" +
    "00300300"
  ));

  // 17: Ice block with snow top
  defSprite(17, up(
    "33333333" +
    "33333333" +
    "22332233" +
    "22222222" +
    "33223322" +
    "33333333" +
    "22332233" +
    "22222222"
  ));

  // 18: Hammer hit effect
  defSprite(18, up(
    "00300030" +
    "03000300" +
    "00000000" +
    "30000003" +
    "00000000" +
    "03000300" +
    "00300030" +
    "00000000"
  ));

  // 19: Moving platform (cloud)
  defSprite(19, up(
    "00000000" +
    "00222200" +
    "02333320" +
    "23333332" +
    "33333333" +
    "23333332" +
    "00000000" +
    "00000000"
  ));

  // --- Game constants ---
  const TILE = 16;
  const PLAY_LEFT = 32;
  const PLAY_RIGHT = W - 32;
  const PLAY_W = PLAY_RIGHT - PLAY_LEFT;
  const GRAVITY = 0.35;
  const JUMP_FORCE = -5.5;
  const MOVE_SPEED = 2.0;
  const LAYER_H = 48; // vertical distance between platform layers
  const LAYERS_PER_STAGE = 8;
  const TOTAL_STAGES = 8;

  // Hitbox constants for player (inset from 16x16 sprite)
  const PL_HBX = 2;    // hitbox x offset from player.x
  const PL_HBY = 2;    // hitbox y offset from player.y
  const PL_HBW = 12;   // hitbox width
  const PL_HBH = 14;   // hitbox height

  // --- Collision helpers ---
  // Circle-vs-rect overlap (for round enemies vs rect platforms/player)
  function circRectOverlap(cx, cy, r, rx, ry, rw, rh) {
    const closestX = Math.max(rx, Math.min(cx, rx + rw));
    const closestY = Math.max(ry, Math.min(cy, ry + rh));
    const dx = cx - closestX;
    const dy = cy - closestY;
    return (dx * dx + dy * dy) <= (r * r);
  }

  // Circle-vs-circle overlap
  function circCircOverlap(cx1, cy1, r1, cx2, cy2, r2) {
    const dx = cx1 - cx2;
    const dy = cy1 - cy2;
    const rr = r1 + r2;
    return (dx * dx + dy * dy) <= (rr * rr);
  }

  // --- Game state ---
  const { TITLE, PLAY, CLEAR, GAMEOVER } = Mono.SCENE;
  let player, platforms, enemies, bonusItems, particles, snowflakes;
  let score, lives, stage, cameraY, targetCameraY;
  let deathTimer, stageCompleteTimer, bonusTimer;
  let highestPlayerY;
  let stageTopY;
  let stageBottomY;
  let breakEffects;
  let titleBounce;
  let mountainHeight;
  let bonusStage;
  let bonusScore;
  let flashTimer;

  function resetGame() {
    score = 0;
    lives = 3;
    stage = 1;
    titleBounce = 0;
    startStage();
  }

  function startStage() {
    platforms = [];
    enemies = [];
    bonusItems = [];
    particles = [];
    snowflakes = [];
    breakEffects = [];
    deathTimer = 0;
    stageCompleteTimer = 0;
    bonusTimer = 0;
    bonusStage = false;
    bonusScore = 0;
    flashTimer = 0;

    mountainHeight = LAYERS_PER_STAGE * LAYER_H;
    stageBottomY = mountainHeight + 50;
    stageTopY = -20;

    // Player starts at bottom
    player = {
      x: W / 2 - 8,
      y: stageBottomY - TILE,
      vx: 0,
      vy: 0,
      onGround: false,
      jumping: false,
      facing: 1,
      headHit: false,
      headHitTimer: 0,
      invincible: 0,
      animTimer: 0
    };

    cameraY = stageBottomY - H + 40;
    targetCameraY = cameraY;
    highestPlayerY = player.y;

    // Generate ground
    for (let x = PLAY_LEFT; x < PLAY_RIGHT; x += TILE) {
      platforms.push({ x: x, y: stageBottomY, type: "solid", broken: false });
    }

    // Generate platform layers
    for (let layer = 1; layer <= LAYERS_PER_STAGE; layer++) {
      const layerY = stageBottomY - layer * LAYER_H;
      generatePlatformLayer(layerY, layer);
    }

    // Generate summit area
    const summitY = stageBottomY - (LAYERS_PER_STAGE + 1) * LAYER_H;
    for (let x = PLAY_LEFT; x < PLAY_RIGHT; x += TILE) {
      platforms.push({ x: x, y: summitY, type: "summit", broken: false });
    }

    // Snowflakes
    for (let i = 0; i < 30; i++) {
      snowflakes.push({
        x: rnd(W),
        y: rnd(mountainHeight + H) - H,
        speed: 0.3 + rnd(0.7),
        drift: rnd(6.28),
        size: flr(rnd(2))
      });
    }
  }

  function generatePlatformLayer(y, layer) {
    const gapCount = 1 + flr(rnd(2)) + flr(stage / 3);
    const tileCount = flr(PLAY_W / TILE);
    const gaps = new Set();

    for (let g = 0; g < gapCount; g++) {
      const gapStart = 1 + flr(rnd(tileCount - 3));
      const gapW = 1 + flr(rnd(2));
      for (let i = 0; i < gapW; i++) gaps.add(gapStart + i);
    }

    for (let t = 0; t < tileCount; t++) {
      if (!gaps.has(t)) {
        const isSnowy = layer >= LAYERS_PER_STAGE - 2;
        platforms.push({
          x: PLAY_LEFT + t * TILE,
          y: y,
          type: "ice",
          broken: false,
          breakTimer: 0,
          snowy: isSnowy
        });
      }
    }

    // Add enemies on some layers
    if (layer > 1 && layer < LAYERS_PER_STAGE && rnd(1) < 0.5 + stage * 0.05) {
      const ex = PLAY_LEFT + TILE + flr(rnd(PLAY_W - TILE * 3));
      const etype = rnd(1) < 0.6 ? "bear" : "bird";
      enemies.push({
        x: ex,
        y: y - TILE,
        type: etype,
        vx: (rnd(1) < 0.5 ? 1 : -1) * (etype === "bear" ? 0.7 : 1.2),
        vy: 0,
        alive: true,
        animTimer: 0,
        layer: layer
      });
    }

    // Moving cloud platform on some layers
    if (layer > 2 && rnd(1) < 0.3) {
      platforms.push({
        x: PLAY_LEFT + flr(rnd(PLAY_W - TILE * 3)),
        y: y - 20,
        type: "cloud",
        broken: false,
        moveDir: rnd(1) < 0.5 ? 1 : -1,
        moveSpeed: 0.5 + rnd(0.5),
        startX: 0
      });
      platforms[platforms.length - 1].startX = platforms[platforms.length - 1].x;
    }
  }

  function startBonusStage() {
    bonusStage = true;
    bonusTimer = 300;
    bonusItems = [];
    bonusScore = 0;

    const summitY = stageBottomY - (LAYERS_PER_STAGE + 1) * LAYER_H;
    for (let i = 0; i < 10; i++) {
      bonusItems.push({
        x: PLAY_LEFT + TILE + flr(rnd(PLAY_W - TILE * 3)),
        y: summitY - TILE - flr(rnd(60)),
        type: 7 + flr(rnd(3)),
        collected: false,
        bob: rnd(6.28)
      });
    }
  }

  // --- Sound effects ---
  function jumpSound() { note(0, "E5", 0.06); setTimeout(() => note(0, "G5", 0.04), 50); }
  function breakSound() { note(1, "C3", 0.05); setTimeout(() => note(1, "E3", 0.04), 30); }
  function hitSound() { note(0, "C6", 0.03); note(1, "E4", 0.05); }
  function deathSound() {
    note(0, "C4", 0.12); note(1, "G2", 0.15);
    setTimeout(() => { note(0, "A2", 0.2); note(1, "E2", 0.2); }, 120);
  }
  function collectSound() { note(0, "C5", 0.05); setTimeout(() => note(0, "E5", 0.05), 60); setTimeout(() => note(0, "G5", 0.08), 120); }
  function stageClearSound() {
    note(0, "C5", 0.1); setTimeout(() => note(0, "E5", 0.1), 100);
    setTimeout(() => note(0, "G5", 0.1), 200); setTimeout(() => note(0, "C6", 0.2), 300);
  }
  function enemyKillSound() { note(1, "A4", 0.06); setTimeout(() => note(1, "C5", 0.04), 40); }

  function addParticle(x, y, c) {
    particles.push({
      x: x, y: y,
      vx: rnd(4) - 2, vy: -1 - rnd(3),
      life: 10 + flr(rnd(10)),
      color: c
    });
  }

  function addBreakEffect(x, y) {
    breakEffects.push({ x: x, y: y, timer: 8 });
    for (let i = 0; i < 4; i++) addParticle(x + 8, y + 8, 2 + flr(rnd(2)));
  }

  function killPlayer() {
    if (player.invincible > 0) return;
    lives--;
    deathSound();
    for (let i = 0; i < 12; i++) addParticle(player.x + 8, player.y + 8, 2 + flr(rnd(2)));
    if (lives <= 0) {
      deathTimer = 90;
    } else {
      deathTimer = 60;
    }
  }

  function updateSnow() {
    titleBounce = sin(Mono.frame * 0.06) * 4;
    for (const s of snowflakes) {
      s.y += s.speed;
      s.x += sin(s.drift + Mono.frame * 0.03) * 0.3;
      if (s.y > cameraY + H + 10) { s.y = cameraY - 10; s.x = rnd(W); }
    }
  }
  function updateParts() {
    for (let i = particles.length - 1; i >= 0; i--) {
      const p = particles[i]; p.x += p.vx; p.y += p.vy; p.vy += 0.1; p.life--;
      if (p.life <= 0) particles.splice(i, 1);
    }
  }

  // --- Player hitbox helpers ---
  function plHB() {
    return { x: player.x + PL_HBX, y: player.y + PL_HBY, w: PL_HBW, h: PL_HBH };
  }

  // --- Enemy center/radius (circle hitbox) ---
  function enemyCirc(e) {
    return { cx: e.x + 8, cy: e.y + 8, r: 7 };
  }

  // --- Bonus item center/radius (circle hitbox) ---
  function bonusCirc(b, by) {
    return { cx: b.x + 8, cy: by + 8, r: 6 };
  }

  // --- Title Scene ---
  Mono.scene(TITLE, {
    init() { resetGame(); },
    update() {
      updateSnow();
      if (btnp("start") || btnp("a")) {
        resetGame();
        note(0, "C5", 0.08);
        setTimeout(() => note(0, "E5", 0.08), 80);
        setTimeout(() => note(0, "G5", 0.12), 160);
        Mono.go(PLAY); return;
      }
    },
    draw() { drawTitleScene(); }
  });

  // --- Game Over Scene ---
  Mono.scene(GAMEOVER, {
    init() {},
    update() {
      updateSnow();
      updateParts();
      if (btnp("start") || btnp("a")) { Mono.go(TITLE); return; }
    },
    draw() { drawGameOverScene(); }
  });

  // --- Stage Clear Scene ---
  Mono.scene(CLEAR, {
    init() {},
    update() {
      updateSnow();
      stageCompleteTimer--;
      if (bonusStage) {
        bonusTimer--;
        if (bonusTimer <= 0) { bonusStage = false; stageCompleteTimer = 0; }
      }
      if (stageCompleteTimer <= 0 && !bonusStage) {
        stage++;
        if (stage > TOTAL_STAGES) {
          stageCompleteTimer = 999;
          Mono.go(GAMEOVER); return;
        } else {
          startStage();
          Mono.go(PLAY); return;
        }
      }
      updateParts();
    },
    draw() { drawStageClearScene(); }
  });

  // --- Play Scene ---
  Mono.scene(PLAY, {
    init() {},
    update() {
    updateSnow();

    // Death handling
    if (deathTimer > 0) {
      deathTimer--;
      for (let i = particles.length - 1; i >= 0; i--) {
        const p = particles[i]; p.x += p.vx; p.y += p.vy; p.vy += 0.1; p.life--;
        if (p.life <= 0) particles.splice(i, 1);
      }
      if (deathTimer <= 0) {
        if (lives <= 0) {
          Mono.go(GAMEOVER); return;
        } else {
          player.x = W / 2 - 8;
          player.y = highestPlayerY + LAYER_H;
          player.vy = 0;
          player.vx = 0;
          player.onGround = false;
          player.invincible = 60;
        }
      }
      return;
    }

    if (player.invincible > 0) player.invincible--;
    if (player.headHitTimer > 0) player.headHitTimer--;
    player.animTimer++;

    // Bonus stage logic
    if (bonusStage) {
      bonusTimer--;
      for (let i = bonusItems.length - 1; i >= 0; i--) {
        const b = bonusItems[i];
        if (b.collected) continue;
        b.bob += 0.08;
        const by = b.y + sin(b.bob) * 3;
        // Circle-vs-rect collision for bonus pickup
        const bc = bonusCirc(b, by);
        const ph = plHB();
        if (circRectOverlap(bc.cx, bc.cy, bc.r, ph.x, ph.y, ph.w, ph.h)) {
          b.collected = true;
          score += 200;
          bonusScore += 200;
          collectSound();
          for (let j = 0; j < 5; j++) addParticle(b.x + 8, by + 8, 3);
        }
      }
      if (bonusTimer <= 0 || bonusItems.every(b => b.collected)) {
        bonusStage = false;
        stageCompleteTimer = 90;
        stageClearSound();
        Mono.go(CLEAR); return;
      }
    }

    // Player movement
    if (btn("left")) {
      player.vx = -MOVE_SPEED;
      player.facing = -1;
    } else if (btn("right")) {
      player.vx = MOVE_SPEED;
      player.facing = 1;
    } else {
      player.vx *= 0.7;
      if (_abs(player.vx) < 0.1) player.vx = 0;
    }

    // Jump
    if (btnp("a") && player.onGround) {
      player.vy = JUMP_FORCE;
      player.onGround = false;
      player.jumping = true;
      jumpSound();
    }

    // Apply gravity
    player.vy += GRAVITY;
    if (player.vy > 8) player.vy = 8;

    // Move horizontally
    player.x += player.vx;

    // Wall collision
    if (player.x < PLAY_LEFT) player.x = PLAY_LEFT;
    if (player.x > PLAY_RIGHT - TILE) player.x = PLAY_RIGHT - TILE;

    // Move vertically
    const oldY = player.y;
    player.y += player.vy;
    player.onGround = false;
    player.headHit = false;

    // Platform collision
    for (let i = platforms.length - 1; i >= 0; i--) {
      const p = platforms[i];
      if (p.broken) continue;

      const px = p.x, py = p.y;
      const pw = (p.type === "cloud") ? TILE : TILE;
      const ph = TILE;

      // Player feet landing on top of platform (falling down)
      if (player.vy >= 0 && oldY + TILE <= py + 3 && player.y + TILE > py &&
          player.x + PL_HBX + PL_HBW > px && player.x + PL_HBX < px + pw) {
        player.y = py - TILE;
        player.vy = 0;
        player.onGround = true;
        player.jumping = false;
      }

      // Player head hitting bottom of platform (jumping up) - break ice!
      if (player.vy < 0 && oldY >= py + ph - 3 && player.y < py + ph &&
          player.x + PL_HBX + PL_HBW > px && player.x + PL_HBX < px + pw) {
        if (p.type === "ice") {
          p.breakTimer = 6;
          addBreakEffect(p.x, p.y);
          breakSound();
          score += 10;
          player.headHit = true;
          player.headHitTimer = 8;

          // Check for enemy standing on this block (circle-vs-rect)
          for (const e of enemies) {
            if (e.alive) {
              const ec = enemyCirc(e);
              if (ec.cy + ec.r >= py - 6 && ec.cy - ec.r <= py + 6 &&
                  ec.cx + ec.r > px - 2 && ec.cx - ec.r < px + pw + 2) {
                e.alive = false;
                e.vy = -4;
                score += 100;
                enemyKillSound();
                for (let j = 0; j < 6; j++) addParticle(e.x + 8, e.y + 8, 2);
              }
            }
          }

          setTimeout(() => { p.broken = true; }, 200);
        } else if (p.type === "solid" || p.type === "summit") {
          player.y = py + ph;
          player.vy = 0;
        }
      }
    }

    // Update cloud platforms (move them)
    for (const p of platforms) {
      if (p.type === "cloud" && !p.broken) {
        p.x += p.moveDir * p.moveSpeed;
        if (p.x < PLAY_LEFT + TILE || p.x > PLAY_RIGHT - TILE * 2) {
          p.moveDir *= -1;
        }
        // Move player with platform if standing on it
        if (player.onGround && player.y + TILE >= p.y - 2 && player.y + TILE <= p.y + 4 &&
            player.x + PL_HBX + PL_HBW > p.x && player.x + PL_HBX < p.x + TILE) {
          player.x += p.moveDir * p.moveSpeed;
        }
      }
    }

    // Update breakTimer on platforms
    for (const p of platforms) {
      if (p.breakTimer > 0) p.breakTimer--;
    }

    // Camera follows player upward smoothly
    targetCameraY = player.y - H * 0.6;
    if (targetCameraY < cameraY - 10) {
      cameraY += (targetCameraY - cameraY) * 0.08;
    }
    if (player.y > cameraY + H * 0.8) {
      cameraY += (player.y - H * 0.8 - cameraY) * 0.12;
    }

    // Track highest position
    if (player.y < highestPlayerY) {
      highestPlayerY = player.y;
    }

    // Fall off bottom of visible area = death
    if (player.y > cameraY + H + 20) {
      killPlayer();
    }

    // Check if player reached summit
    const summitY = stageBottomY - (LAYERS_PER_STAGE + 1) * LAYER_H;
    if (player.y < summitY + TILE && !bonusStage) {
      if (stageCompleteTimer === 0) {
        startBonusStage();
        stageClearSound();
      }
    }

    // Update enemies
    for (let i = enemies.length - 1; i >= 0; i--) {
      const e = enemies[i];
      e.animTimer++;

      if (!e.alive) {
        e.vy += GRAVITY;
        e.y += e.vy;
        if (e.y > cameraY + H + 30) {
          enemies.splice(i, 1);
        }
        continue;
      }

      // Move horizontally
      e.x += e.vx;

      // Bounce off walls
      if (e.x < PLAY_LEFT + 4) { e.x = PLAY_LEFT + 4; e.vx = _abs(e.vx); }
      if (e.x > PLAY_RIGHT - TILE - 4) { e.x = PLAY_RIGHT - TILE - 4; e.vx = -_abs(e.vx); }

      // Birds bob up and down
      if (e.type === "bird") {
        e.y += sin(e.animTimer * 0.1) * 0.5;
      }

      // Player collision with enemy (circle enemy vs rect player)
      if (player.invincible <= 0) {
        const ec = enemyCirc(e);
        const ph = plHB();
        if (circRectOverlap(ec.cx, ec.cy, ec.r, ph.x, ph.y, ph.w, ph.h)) {
          // If player is falling onto enemy, kill enemy
          if (player.vy > 0 && player.y + TILE < e.y + 10) {
            e.alive = false;
            e.vy = -3;
            player.vy = JUMP_FORCE * 0.6;
            score += 100;
            enemyKillSound();
            for (let j = 0; j < 6; j++) addParticle(e.x + 8, e.y + 8, 2);
          } else {
            killPlayer();
          }
        }
      }
    }

    // Update particles
    for (let i = particles.length - 1; i >= 0; i--) {
      const p = particles[i];
      p.x += p.vx; p.y += p.vy; p.vy += 0.08; p.life--;
      if (p.life <= 0) particles.splice(i, 1);
    }

    // Update break effects
    for (let i = breakEffects.length - 1; i >= 0; i--) {
      breakEffects[i].timer--;
      if (breakEffects[i].timer <= 0) breakEffects.splice(i, 1);
    }

    // Flash timer
    if (flashTimer > 0) flashTimer--;
    },
    draw() { drawPlayScene(); }
  });

  function drawTitleScene() {
    cls(0);
      drawMountainBg(0);

      // Snowflakes on title
      for (const s of snowflakes) {
        pix(flr(s.x), flr(s.y % H), 3);
      }

      const ty = 40 + titleBounce;

      // Title shadow + text
      text("ICE CLIMBER", 118, flr(ty) + 2, 1);
      text("ICE CLIMBER", 117, flr(ty), 3);

      // Subtitle line
      rectf(95, flr(ty) + 12, 130, 1, 2);

      // Player sprite on title
      sprT(1, W / 2 - 8, flr(ty) + 22 + flr(sin(Mono.frame * 0.1) * 3));

      // Enemies
      sprT(5, W / 2 - 36, flr(ty) + 24 + flr(sin(Mono.frame * 0.08 + 1) * 2));
      sprT(6, W / 2 + 24, flr(ty) + 22 + flr(sin(Mono.frame * 0.08 + 2) * 2));

      // Ice platforms
      for (let x = 95; x < 226; x += TILE) {
        sprT(3, x, flr(ty) + 42);
      }

      if (flr(Mono.frame / 20) % 2 === 0) text("PRESS START", 120, 148, 3);

      // Instructions
      text("CLIMB THE ICE MOUNTAIN!", 83, 168, 2);
      text("A:JUMP  LEFT/RIGHT:MOVE", 83, 180, 2);
      text("BREAK ICE FROM BELOW!", 88, 192, 2);

      text(TOTAL_STAGES + " MOUNTAINS TO CONQUER", 85, 212, 1);
      text("MONO DEMO V0.1", 118, 229, 1);
  }

  function drawGameOverScene() {
    cls(0);
      drawMountainBg(0);

      for (const p of particles) pix(flr(p.x), flr(p.y), p.color);

      if (stage > TOTAL_STAGES) {
        text("CONGRATULATIONS!", 100, 75, 3);
        text("YOU CONQUERED ALL", 98, 94, 2);
        text(TOTAL_STAGES + " MOUNTAINS!", 118, 105, 2);
        text("FINAL SCORE: " + score, 100, 128, 3);
      } else {
        text("GAME OVER", 128, 90, 3);
        text("SCORE: " + score, 118, 109, 2);
        text("MOUNTAIN: " + stage, 120, 120, 2);
      }
      if (flr(Mono.frame / 20) % 2 === 0) text("PRESS START", 113, 165, 3);
  }

  function drawStageClearScene() { drawPlayScene(); }

  function drawPlayScene() {
    cls(0);

    // Sky gradient background
    for (let y = 0; y < H; y++) {
      const screenY = y + cameraY;
      const t = 1 - (screenY - stageTopY) / (stageBottomY - stageTopY);
      if (t > 0.7) rectf(0, y, W, 1, 0);
      else if (t > 0.3) {} // default black
      else rectf(0, y, W, 1, 0);
    }

    // Draw mountain walls on sides
    for (let y = -16; y < H + 16; y += 16) {
      const worldY = y + flr(cameraY);
      // Left wall
      for (let x = 0; x < PLAY_LEFT; x += 16) {
        sprT(10, x, y);
      }
      // Right wall
      for (let x = PLAY_RIGHT; x < W; x += 16) {
        sprT(11, x, y);
      }
    }

    // Draw snowflakes
    for (const s of snowflakes) {
      const sy = flr(s.y - cameraY);
      if (sy >= -4 && sy <= H + 4) {
        pix(flr(s.x), sy, 3);
        if (s.size > 0) pix(flr(s.x) + 1, sy, 2);
      }
    }

    // Draw platforms
    for (const p of platforms) {
      if (p.broken) continue;
      const sy = flr(p.y - cameraY);
      if (sy < -18 || sy > H + 18) continue;

      if (p.type === "ice") {
        if (p.breakTimer > 0) {
          sprT(4, p.x, sy);
        } else if (p.snowy) {
          sprT(17, p.x, sy);
        } else {
          sprT(3, p.x, sy);
        }
      } else if (p.type === "solid") {
        sprT(3, p.x, sy);
      } else if (p.type === "summit") {
        sprT(12, p.x, sy);
      } else if (p.type === "cloud") {
        sprT(19, p.x, sy);
      }
      // Debug: rect hitbox for each platform
      dbg(p.x, sy, TILE, TILE);
    }

    // Draw bonus items
    for (const b of bonusItems) {
      if (b.collected) continue;
      const by = b.y + sin(b.bob) * 3;
      const sy = flr(by - cameraY);
      if (sy >= -18 && sy <= H + 18) {
        sprT(b.type, b.x, sy);
        // Debug: circle hitbox for bonus items
        dbgC(b.x + 8, sy + 8, 6);
      }
    }

    // Draw break effects
    for (const e of breakEffects) {
      const sy = flr(e.y - cameraY);
      sprT(18, e.x, sy);
    }

    // Draw enemies
    for (const e of enemies) {
      const sy = flr(e.y - cameraY);
      if (sy < -18 || sy > H + 18) continue;

      const flipX = e.vx < 0;
      if (e.type === "bear") {
        sprT(5, flr(e.x), sy, flipX);
      } else {
        const wingFrame = flr(e.animTimer / 6) % 2 === 0;
        sprT(6, flr(e.x), sy + (wingFrame ? -1 : 0), flipX);
      }

      // Dead enemies flash
      if (!e.alive && flr(Mono.frame / 2) % 2 === 0) {
        rectf(flr(e.x), sy, TILE, TILE, 3);
      }

      // Debug: circle hitbox for enemies
      if (e.alive) dbgC(flr(e.x) + 8, sy + 8, 7);
    }

    // Draw player
    if (deathTimer <= 0) {
      const sy = flr(player.y - cameraY);
      if (player.invincible <= 0 || flr(Mono.frame / 3) % 2 === 0) {
        const flipX = player.facing < 0;
        if (player.jumping || !player.onGround) {
          sprT(2, flr(player.x), sy, flipX);
        } else {
          const walkFrame = flr(player.animTimer / 5) % 2;
          sprT(1, flr(player.x), sy + (walkFrame && _abs(player.vx) > 0.3 ? -1 : 0), flipX);
        }
      }

      // Hammer hit visual
      if (player.headHitTimer > 0) {
        sprT(18, flr(player.x) - 4, sy - 16);
      }

      // Debug: rect hitbox for player
      dbg(flr(player.x) + PL_HBX, sy + PL_HBY, PL_HBW, PL_HBH);
    }

    // Draw particles
    for (const p of particles) {
      const sy = flr(p.y - cameraY);
      if (sy >= 0 && sy < H) pix(flr(p.x), sy, p.color);
    }

    // --- HUD ---
    rectf(0, 0, W, 16, 0);
    rectf(0, 16, W, 1, 1);

    text("SCORE:" + score, 4, 4, 3);
    text("MT." + stage, W / 2 - 15, 4, 2);

    // Lives (cap to prevent overflow)
    const maxLivesShown = min(lives, 5);
    for (let i = 0; i < maxLivesShown; i++) sprT(13, W - 56 + i * 12, 1);

    // Height indicator on right side
    {
      const barX = W - 12;
      const barTop = 22;
      const barH = H - 36;
      rectf(barX, barTop, 4, barH, 1);

      const progress = 1 - (player.y - stageTopY) / (stageBottomY - stageTopY);
      const markerY = barTop + barH - flr(progress * barH);
      rectf(barX - 1, markerY - 1, 6, 3, 3);

      // Summit marker
      rectf(barX, barTop, 4, 2, 3);
    }

    // Stage announcement
    if (Mono.frame < 90) {
      const msgAlpha = Mono.frame < 60 ? 3 : (Mono.frame < 75 ? 2 : 1);
      text("MOUNTAIN " + stage, 120, 105, msgAlpha);
      text("START!", 138, 119, msgAlpha);
    }

    // Bonus stage overlay
    if (bonusStage) {
      const timeLeft = flr(bonusTimer / 30);
      text("BONUS! " + timeLeft + "S", 125, 22, 3);
      text("GET VEGGIES!", 120, 32, 2);
    }

    // Stage clear
    if (stageCompleteTimer > 0) {
      text("STAGE CLEAR!", 118, 98, 3);
      text("BONUS: " + bonusScore, 120, 113, 2);
      if (stageCompleteTimer < 60 && flr(Mono.frame / 15) % 2 === 0) {
        text("NEXT MOUNTAIN...", 108, 135, 2);
      }
    }
  }

  function drawMountainBg(offsetY) {
    for (let x = 0; x < W; x += 2) {
      const h1 = 60 + sin(x * 0.02) * 30 + sin(x * 0.05) * 15;
      const h2 = 90 + sin(x * 0.015 + 1) * 22 + sin(x * 0.04) * 11;
      for (let y = H - flr(h1); y < H; y++) {
        if (y >= 0 && y < H) { pix(x, y, 1); pix(x + 1, y, 1); }
      }
      for (let y = H - flr(h2 * 0.6); y < H; y++) {
        if (y >= 0 && y < H) { pix(x, y, 1); if (x + 1 < W) pix(x + 1, y, 1); }
      }
    }
    for (let x = 0; x < W; x++) {
      const h1 = 60 + sin(x * 0.02) * 30 + sin(x * 0.05) * 15;
      const peakY = H - flr(h1);
      if (peakY >= 0 && peakY < H) {
        pix(x, peakY, 3);
        if (peakY + 1 < H) pix(x, peakY + 1, 2);
      }
    }
  }

  Mono.go(TITLE);
  Mono.boot("screen");
})();
</script>
