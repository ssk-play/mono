<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GrayBox — Demo: Asteroids</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #0a0a0a;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100vh;
    font-family: monospace;
    overflow: hidden;
  }
  #frame {
    background: #111;
    border: 3px solid #333;
    border-radius: 8px;
    padding: 12px;
    box-shadow: 0 0 40px rgba(0,0,0,0.8), inset 0 0 20px rgba(0,0,0,0.5);
  }
  canvas {
    display: block;
    image-rendering: pixelated;
    image-rendering: crisp-edges;
  }
  #controls {
    margin-top: 12px;
    color: #6b6b6b;
    font-size: 11px;
    text-align: center;
    letter-spacing: 1px;
  }
  #controls span { color: #b0b0b0; }
</style>
</head>
<body>
<div id="frame">
  <canvas id="screen"></canvas>
</div>
<div id="controls">
  <span>&larr;&rarr;</span> ROTATE &nbsp;&nbsp; <span>&uarr;</span> THRUST &nbsp;&nbsp; <span>Z</span> SHOOT &nbsp;&nbsp; <span>X</span> HYPERSPACE &nbsp;&nbsp; <span>ENTER</span> START
</div>
<script>
(() => {
  "use strict";

  // ============================================================
  // GrayBox Runtime (inline)
  // ============================================================
  const W = 480;
  const H = 320;
  const FPS = 30;
  const COLORS = ["#1a1a1a", "#6b6b6b", "#b0b0b0", "#e8e8e8"];
  const canvas = document.getElementById("screen");
  canvas.width = W;
  canvas.height = H;
  function fitCanvas() {
    var maxW = window.innerWidth - 40;
    var maxH = window.innerHeight - 60;
    var s = Math.min(maxW / W, maxH / H);
    canvas.style.width = (W * s) + "px";
    canvas.style.height = (H * s) + "px";
  }
  fitCanvas();
  window.addEventListener("resize", fitCanvas);
  const ctx = canvas.getContext("2d");
  ctx.imageSmoothingEnabled = false;
  const buf = ctx.createImageData(W, H);
  const buf32 = new Uint32Array(buf.data.buffer);

  function hexToABGR(hex) {
    const r = parseInt(hex.slice(1, 3), 16);
    const g = parseInt(hex.slice(3, 5), 16);
    const b = parseInt(hex.slice(5, 7), 16);
    return (255 << 24) | (b << 16) | (g << 8) | r;
  }
  const COLOR_U32 = COLORS.map(hexToABGR);

  const sprites = {};
  const tilemap = {};

  const keyMap = {
    "ArrowUp": "up", "ArrowDown": "down", "ArrowLeft": "left", "ArrowRight": "right",
    "w": "up", "s": "down", "a": "left", "d": "right",
    "z": "a", "Z": "a", "x": "b", "X": "b",
    "Enter": "start", " ": "a"
  };
  const keys = {};
  const keysPrev = {};

  document.addEventListener("keydown", e => {
    const k = keyMap[e.key];
    if (k) { keys[k] = true; e.preventDefault(); }
  });
  document.addEventListener("keyup", e => {
    const k = keyMap[e.key];
    if (k) { keys[k] = false; e.preventDefault(); }
  });

  let audioCtx = null;
  const channels = [null, null];
  const channelGains = [null, null];
  function ensureAudio() {
    if (!audioCtx) {
      audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      for (let i = 0; i < 2; i++) {
        channelGains[i] = audioCtx.createGain();
        channelGains[i].gain.value = 0.15;
        channelGains[i].connect(audioCtx.destination);
      }
    }
  }

  const NOTE_NAMES = ["C","C#","D","D#","E","F","F#","G","G#","A","A#","B"];
  function noteToFreq(noteStr) {
    const match = noteStr.match(/^([A-G]#?)(\d)$/);
    if (!match) return 440;
    const name = match[1];
    const octave = parseInt(match[2]);
    const semitone = NOTE_NAMES.indexOf(name);
    if (semitone === -1) return 440;
    const midi = (octave + 1) * 12 + semitone;
    return 440 * Math.pow(2, (midi - 69) / 12);
  }

  const FONT_W = 4;
  const FONT_H = 7;
  const FONT = {};
  const fontData = {
    "A":"0110100110011111100110011001","B":"1110100110101110100110011110",
    "C":"0110100110001000100001100110","D":"1100101010011001100110101100",
    "E":"1111100010001110100010001111","F":"1111100010001110100010001000",
    "G":"0111100010001011100101100111","H":"1001100110011111100110011001",
    "I":"1110010001000100010001001110","J":"0111001000100010001010100100",
    "K":"1001101011001100101010011001","L":"1000100010001000100010001111",
    "M":"1001111111011001100110011001","N":"1001110111011001100110011001",
    "O":"0110100110011001100110010110","P":"1110100110011110100010001000",
    "Q":"0110100110011001101101100001","R":"1110100110011110101010011001",
    "S":"0111100010000110000110001110","T":"1111001000100010001000100010",
    "U":"1001100110011001100110010110","V":"1001100110011001100101100110",
    "W":"1001100110011001101111011001","X":"1001100101100110011010011001",
    "Y":"1001100101100010001000100010","Z":"1111000100100100100010001111",
    "0":"0110100111011011101110010110","1":"0100110001000100010001001110",
    "2":"0110100100010010010010001111","3":"1110000100010110000110011110",
    "4":"1001100110011111000100010001","5":"1111100010001110000100011110",
    "6":"0110100010001110100110010110","7":"1111000100010010010001001000",
    "8":"0110100110010110100110010110","9":"0110100110010111000100010110",
    " ":"0000000000000000000000000000",
    ".":"0000000000000000000001000100",
    ",":"0000000000000000001000101000",
    "!":"0100010001000100000000000100",
    "?":"0110100100010010000000000010",
    "-":"0000000000001110000000000000",
    "+":"0000001001001110010000100000",
    ":":"0000010001000000010001000000",
    "/":"0001000100100010010010001000",
    "*":"0000101001001110010010100000",
    "#":"0101111101011111010100000000",
    "(":"0010010010001000010001000010",
    ")":"0100001000010001000100100100",
    "=":"0000000011110000111100000000",
    "'":"0100010010000000000000000000",
    "\"":"1010101000000000000000000000",
    "<":"0010010010001000010000100010",
    ">":"1000010000100001001001001000",
    "_":"0000000000000000000000001111",
  };
  for (const [ch, bits] of Object.entries(fontData)) {
    FONT[ch] = [];
    for (let i = 0; i < bits.length; i++) FONT[ch].push(parseInt(bits[i]));
  }

  const API = {};
  API._init = null;
  API._update = null;
  API._draw = null;
  API.frame = 0;

  API.cls = function(c = 0) { buf32.fill(COLOR_U32[c] || COLOR_U32[0]); };
  API.pix = function(x, y, c) {
    x = Math.floor(x); y = Math.floor(y);
    if (x < 0 || x >= W || y < 0 || y >= H) return;
    buf32[y * W + x] = COLOR_U32[c] || COLOR_U32[0];
  };
  API.line = function(x0, y0, x1, y1, c) {
    x0=Math.floor(x0); y0=Math.floor(y0); x1=Math.floor(x1); y1=Math.floor(y1);
    const dx=Math.abs(x1-x0), dy=Math.abs(y1-y0);
    const sx=x0<x1?1:-1, sy=y0<y1?1:-1;
    let err=dx-dy;
    while(true) {
      API.pix(x0,y0,c);
      if(x0===x1&&y0===y1) break;
      const e2=2*err;
      if(e2>-dy){err-=dy;x0+=sx;}
      if(e2<dx){err+=dx;y0+=sy;}
    }
  };
  API.rect = function(x,y,w,h,c) {
    API.line(x,y,x+w-1,y,c); API.line(x+w-1,y,x+w-1,y+h-1,c);
    API.line(x+w-1,y+h-1,x,y+h-1,c); API.line(x,y+h-1,x,y,c);
  };
  API.rectf = function(x,y,w,h,c) {
    x=Math.floor(x); y=Math.floor(y);
    const col=COLOR_U32[c]||COLOR_U32[0];
    for(let py=Math.max(0,y);py<Math.min(H,y+h);py++)
      for(let px=Math.max(0,x);px<Math.min(W,x+w);px++)
        buf32[py*W+px]=col;
  };
  API.circ = function(cx,cy,r,c) {
    let x=r,y=0,d=1-r; cx=Math.floor(cx); cy=Math.floor(cy);
    while(x>=y){
      API.pix(cx+x,cy+y,c);API.pix(cx-x,cy+y,c);
      API.pix(cx+x,cy-y,c);API.pix(cx-x,cy-y,c);
      API.pix(cx+y,cy+x,c);API.pix(cx-y,cy+x,c);
      API.pix(cx+y,cy-x,c);API.pix(cx-y,cy-x,c);
      y++; if(d<0){d+=2*y+1;}else{x--;d+=2*(y-x)+1;}
    }
  };
  API.circf = function(cx,cy,r,c) {
    cx=Math.floor(cx); cy=Math.floor(cy);
    const col=COLOR_U32[c]||COLOR_U32[0]; const r2=r*r;
    for(let py=-r;py<=r;py++) for(let px=-r;px<=r;px++)
      if(px*px+py*py<=r2){ const sx=cx+px,sy=cy+py;
        if(sx>=0&&sx<W&&sy>=0&&sy<H) buf32[sy*W+sx]=col; }
  };
  API.sprite = function(id, data) {
    const arr = new Uint8Array(64); let i = 0;
    for (const ch of data) { if (ch>='0'&&ch<='3') { arr[i++]=parseInt(ch); if(i>=64) break; } }
    sprites[id] = arr;
  };
  API.spr = function(id, x, y, flipX, flipY) {
    const s=sprites[id]; if(!s) return;
    x=Math.floor(x); y=Math.floor(y);
    for(let py=0;py<8;py++) for(let px=0;px<8;px++){
      const sx=flipX?7-px:px, sy=flipY?7-py:py;
      const c=s[sy*8+sx], dx=x+px, dy=y+py;
      if(dx>=0&&dx<W&&dy>=0&&dy<H) buf32[dy*W+dx]=COLOR_U32[c];
    }
  };
  API.text = function(str, x, y, c) {
    str=String(str).toUpperCase(); let cx=Math.floor(x); const cy=Math.floor(y);
    const col=COLOR_U32[c]||COLOR_U32[3];
    for(const ch of str){
      const glyph=FONT[ch];
      if(glyph) for(let py=0;py<FONT_H;py++) for(let px=0;px<FONT_W;px++)
        if(glyph[py*FONT_W+px]){ const dx=cx+px,dy=cy+py;
          if(dx>=0&&dx<W&&dy>=0&&dy<H) buf32[dy*W+dx]=col; }
      cx+=FONT_W+1;
    }
  };
  API.mget = function(cx,cy) { return tilemap[cx+","+cy]||0; };
  API.mset = function(cx,cy,id) { tilemap[cx+","+cy]=id; };
  API.map = function(mx,my,mw,mh,sx,sy) {
    for(let ty=0;ty<mh;ty++) for(let tx=0;tx<mw;tx++){
      const id=API.mget(mx+tx,my+ty); if(id>0) API.spr(id,sx+tx*8,sy+ty*8); }
  };
  API.btn = function(k) { return !!keys[k]; };
  API.btnp = function(k) { return !!keys[k] && !keysPrev[k]; };
  API.note = function(ch, noteStr, dur) {
    ensureAudio(); if(ch<0||ch>1) return; API.stop(ch);
    const osc=audioCtx.createOscillator(); osc.type="square";
    osc.frequency.value=noteToFreq(noteStr);
    osc.connect(channelGains[ch]); osc.start();
    osc.stop(audioCtx.currentTime+dur); channels[ch]=osc;
  };
  API.stop = function(ch) {
    if(ch===undefined){API.stop(0);API.stop(1);return;}
    if(channels[ch]){try{channels[ch].stop();}catch(e){} channels[ch]=null;}
  };
  API.rnd = function(max) { return Math.random()*max; };
  API.flr = Math.floor;
  API.abs = Math.abs;
  API.min = Math.min;
  API.max = Math.max;
  API.sin = Math.sin;
  API.cos = Math.cos;

  function tick() {
    if (API._update) API._update();
    if (API._draw) API._draw();
    ctx.putImageData(buf, 0, 0);
    for (const k in keys) keysPrev[k] = keys[k];
    API.frame++;
  }

  // ============================================================
  // Asteroids Game
  // ============================================================
  const { cls, pix, line, rect, rectf, circ, circf, sprite: defSprite,
          spr, text, btn, btnp, note, stop, rnd, flr, abs: _abs,
          min, max: _max, sin, cos } = API;

  const TWO_PI = Math.PI * 2;
  const DEG = Math.PI / 180;

  // --- Sprites ---
  // 7: Explosion frame 1
  defSprite(7,
    "00000000" +
    "00200100" +
    "01002000" +
    "00031000" +
    "00130200" +
    "01000010" +
    "00100000" +
    "00000000"
  );
  // 8: Explosion frame 2
  defSprite(8,
    "20010020" +
    "01000010" +
    "00203200" +
    "03033030" +
    "00232000" +
    "01000300" +
    "20001001" +
    "00200010"
  );

  // --- Helper: wrap position ---
  function wrap(obj) {
    if (obj.x < -20) obj.x += W + 40;
    if (obj.x > W + 20) obj.x -= W + 40;
    if (obj.y < -20) obj.y += H + 40;
    if (obj.y > H + 20) obj.y -= H + 40;
  }

  // --- Draw polygon (vector-style) ---
  function drawPoly(pts, cx, cy, angle, scale, color) {
    const c = cos(angle), s = sin(angle);
    const transformed = pts.map(p => ({
      x: cx + (p[0] * c - p[1] * s) * scale,
      y: cy + (p[0] * s + p[1] * c) * scale
    }));
    for (let i = 0; i < transformed.length; i++) {
      const a = transformed[i];
      const b = transformed[(i + 1) % transformed.length];
      line(a.x, a.y, b.x, b.y, color);
    }
  }

  // Ship polygon (triangle pointing up at angle 0 = right)
  const SHIP_PTS = [
    [10, 0], [-7, -6], [-4, 0], [-7, 6]
  ];
  const THRUST_PTS = [
    [-4, -3], [-9, 0], [-4, 3]
  ];

  // Asteroid shape templates (randomized per asteroid)
  function makeAsteroidShape() {
    const pts = [];
    const n = 8 + flr(rnd(4));
    for (let i = 0; i < n; i++) {
      const angle = (i / n) * TWO_PI;
      const r = 0.7 + rnd(0.6);
      pts.push([cos(angle) * r, sin(angle) * r]);
    }
    return pts;
  }

  // UFO shape
  const UFO_PTS = [
    [-5, -2], [-2, -5], [2, -5], [5, -2],
    [8, 0], [5, 2], [-5, 2], [-8, 0]
  ];
  const UFO_LINE = [[-8, 0], [8, 0]]; // middle line

  // --- Game state ---
  let state = "title";
  let ship, bullets, asteroids, particles, debris, stars;
  let ufo, ufoBullets, ufoTimer;
  let score, lives, level;
  let shootCooldown, respawnTimer, hyperTimer;
  let hiScore = 0;
  let titlePulse = 0;
  let shakeTimer = 0;
  let extraLifeThreshold;
  let beatTimer, beatInterval, beatToggle;

  function resetGame() {
    ship = { x: W / 2, y: H / 2, angle: -Math.PI / 2, vx: 0, vy: 0, alive: true, invuln: 90 };
    bullets = [];
    asteroids = [];
    particles = [];
    debris = [];
    ufoBullets = [];
    ufo = null;
    ufoTimer = 300 + flr(rnd(300));
    score = 0;
    lives = 3;
    level = 0;
    shootCooldown = 0;
    respawnTimer = 0;
    hyperTimer = 0;
    extraLifeThreshold = 10000;
    beatTimer = 0;
    beatInterval = 30;
    beatToggle = false;
    stars = [];
    for (let i = 0; i < 60; i++) {
      stars.push({ x: flr(rnd(W)), y: flr(rnd(H)), b: flr(rnd(2)) + 1 });
    }
    spawnWave();
  }

  function spawnWave() {
    level++;
    const count = min(4 + level, 12);
    for (let i = 0; i < count; i++) {
      spawnAsteroid(3, null);
    }
    beatInterval = _max(10, 30 - level * 2);
  }

  function spawnAsteroid(size, pos) {
    let x, y;
    if (pos) {
      x = pos.x;
      y = pos.y;
    } else {
      // Spawn at edges away from ship
      const side = flr(rnd(4));
      if (side === 0) { x = rnd(W); y = -15; }
      else if (side === 1) { x = W + 15; y = rnd(H); }
      else if (side === 2) { x = rnd(W); y = H + 15; }
      else { x = -15; y = rnd(H); }
    }
    const speed = (1.0 + rnd(1.5)) * (1 + level * 0.08);
    const angle = rnd(TWO_PI);
    asteroids.push({
      x, y,
      vx: cos(angle) * speed,
      vy: sin(angle) * speed,
      size, // 3=large, 2=medium, 1=small
      radius: size === 3 ? 16 : size === 2 ? 8 : 4,
      shape: makeAsteroidShape(),
      rot: rnd(TWO_PI),
      rotSpeed: (rnd(0.04) - 0.02)
    });
  }

  function splitAsteroid(ast) {
    const pts = ast.size === 3 ? 20 : ast.size === 2 ? 50 : 100;
    score += pts;
    if (score >= extraLifeThreshold) {
      extraLifeThreshold += 10000;
      lives++;
      note(0, "C5", 0.08);
      setTimeout(() => note(0, "E5", 0.08), 80);
      setTimeout(() => note(0, "G5", 0.08), 160);
      setTimeout(() => note(0, "C6", 0.12), 240);
    }
    if (ast.size > 1) {
      const newSize = ast.size - 1;
      for (let i = 0; i < 2; i++) {
        spawnAsteroid(newSize, { x: ast.x, y: ast.y });
      }
    }
    // Debris particles
    const n = ast.size * 4;
    for (let i = 0; i < n; i++) {
      const a = rnd(TWO_PI);
      const sp = rnd(3) + 0.5;
      particles.push({
        x: ast.x, y: ast.y,
        vx: cos(a) * sp + ast.vx * 0.3,
        vy: sin(a) * sp + ast.vy * 0.3,
        life: 8 + flr(rnd(12)),
        color: flr(rnd(2)) + 2
      });
    }
    // Add line debris
    for (let i = 0; i < ast.size * 2; i++) {
      const a = rnd(TWO_PI);
      const sp = rnd(2) + 0.5;
      debris.push({
        x: ast.x, y: ast.y,
        vx: cos(a) * sp, vy: sin(a) * sp,
        len: 2 + rnd(ast.radius * 0.5),
        angle: rnd(TWO_PI), rotSpeed: rnd(0.2) - 0.1,
        life: 10 + flr(rnd(15)),
        color: 2
      });
    }
  }

  function addExplosion(x, y, count) {
    for (let i = 0; i < count; i++) {
      const a = rnd(TWO_PI);
      const sp = rnd(3) + 0.5;
      particles.push({
        x, y,
        vx: cos(a) * sp, vy: sin(a) * sp,
        life: 10 + flr(rnd(15)),
        color: flr(rnd(3)) + 1
      });
    }
  }

  // --- Sounds ---
  function shootSound() { note(0, "C6", 0.03); }
  function thrustSound() {
    if (audioCtx && channels[1] && channels[1]._thrust) return;
    ensureAudio();
    // Low rumble
    note(1, "C2", 0.06);
  }
  function hitSound(size) {
    if (size === 3) { note(1, "C2", 0.1); }
    else if (size === 2) { note(1, "E3", 0.08); }
    else { note(1, "G4", 0.06); }
  }
  function deathSound() {
    note(0, "C3", 0.15); note(1, "G2", 0.15);
    setTimeout(() => { note(0, "A2", 0.2); note(1, "E2", 0.2); }, 130);
    setTimeout(() => { note(0, "F2", 0.25); }, 260);
  }
  function ufoSound() { note(1, "A4", 0.05); }
  function hyperSound() {
    note(0, "G5", 0.05);
    setTimeout(() => note(0, "D5", 0.05), 50);
    setTimeout(() => note(0, "A4", 0.06), 100);
  }
  function beatSound(high) {
    if (high) note(1, "D3", 0.06);
    else note(1, "C3", 0.06);
  }

  // --- Collision detection ---
  function dist(a, b) {
    const dx = a.x - b.x, dy = a.y - b.y;
    return Math.sqrt(dx * dx + dy * dy);
  }

  resetGame();

  // ============================================================
  // Update
  // ============================================================
  API._update = function() {
    if (state === "title") {
      titlePulse++;
      if (btnp("a") || btnp("start")) {
        state = "play";
        resetGame();
        note(0, "C5", 0.08);
        setTimeout(() => note(0, "E5", 0.08), 80);
        setTimeout(() => note(0, "G5", 0.12), 160);
      }
      return;
    }

    if (state === "gameover") {
      // Update particles
      for (let i = particles.length - 1; i >= 0; i--) {
        const p = particles[i];
        p.x += p.vx; p.y += p.vy; p.vx *= 0.98; p.vy *= 0.98; p.life--;
        if (p.life <= 0) particles.splice(i, 1);
      }
      for (let i = debris.length - 1; i >= 0; i--) {
        const d = debris[i];
        d.x += d.vx; d.y += d.vy; d.angle += d.rotSpeed; d.life--;
        if (d.life <= 0) debris.splice(i, 1);
      }
      if (btnp("a") || btnp("start")) {
        state = "title";
      }
      return;
    }

    // --- Play state ---
    if (shakeTimer > 0) shakeTimer--;

    // Heartbeat
    beatTimer--;
    if (beatTimer <= 0) {
      beatToggle = !beatToggle;
      beatSound(beatToggle);
      // Speed up when fewer asteroids
      const astCount = asteroids.length;
      beatInterval = _max(6, flr(30 - (12 - astCount) * 1.5) - level);
      beatTimer = beatInterval;
    }

    // --- Ship controls ---
    if (ship.alive && hyperTimer <= 0) {
      // Rotation
      if (btn("left")) ship.angle -= 0.1;
      if (btn("right")) ship.angle += 0.1;

      // Thrust
      if (btn("up")) {
        ship.vx += cos(ship.angle) * 0.15;
        ship.vy += sin(ship.angle) * 0.15;
        if (API.frame % 4 === 0) thrustSound();
      }

      // Speed cap
      const spd = Math.sqrt(ship.vx * ship.vx + ship.vy * ship.vy);
      if (spd > 5) {
        ship.vx = (ship.vx / spd) * 5;
        ship.vy = (ship.vy / spd) * 5;
      }

      // Friction
      ship.vx *= 0.995;
      ship.vy *= 0.995;

      // Shoot
      if (shootCooldown > 0) shootCooldown--;
      if (btnp("a") && shootCooldown <= 0 && bullets.length < 4) {
        const bSpeed = 7;
        bullets.push({
          x: ship.x + cos(ship.angle) * 10,
          y: ship.y + sin(ship.angle) * 10,
          vx: cos(ship.angle) * bSpeed + ship.vx * 0.3,
          vy: sin(ship.angle) * bSpeed + ship.vy * 0.3,
          life: 40
        });
        shootCooldown = 6;
        shootSound();
      }

      // Hyperspace (B button)
      if (btnp("b")) {
        hyperTimer = 20;
        ship.x = 30 + rnd(W - 60);
        ship.y = 30 + rnd(H - 60);
        ship.vx *= 0.3;
        ship.vy *= 0.3;
        hyperSound();
        // Small chance of death on hyperspace
        if (rnd(1) < 0.05) {
          killShip();
        }
      }
    }

    if (hyperTimer > 0) hyperTimer--;

    // Move ship
    if (ship.alive) {
      ship.x += ship.vx;
      ship.y += ship.vy;
      wrap(ship);
      if (ship.invuln > 0) ship.invuln--;
    }

    // Respawn timer
    if (!ship.alive) {
      respawnTimer--;
      if (respawnTimer <= 0) {
        if (lives > 0) {
          ship.alive = true;
          ship.x = W / 2;
          ship.y = H / 2;
          ship.vx = 0;
          ship.vy = 0;
          ship.angle = -Math.PI / 2;
          ship.invuln = 90;
        } else {
          if (score > hiScore) hiScore = score;
          state = "gameover";
        }
      }
    }

    // Move bullets
    for (let i = bullets.length - 1; i >= 0; i--) {
      const b = bullets[i];
      b.x += b.vx; b.y += b.vy; b.life--;
      wrap(b);
      if (b.life <= 0) bullets.splice(i, 1);
    }

    // Move asteroids
    for (const a of asteroids) {
      a.x += a.vx; a.y += a.vy;
      a.rot += a.rotSpeed;
      wrap(a);
    }

    // --- UFO ---
    ufoTimer--;
    if (!ufo && ufoTimer <= 0 && asteroids.length > 0) {
      const small = rnd(1) < 0.3 + level * 0.05;
      const side = rnd(1) < 0.5 ? -10 : W + 10;
      ufo = {
        x: side, y: 30 + rnd(H - 60),
        vx: side < 0 ? 1.5 : -1.5,
        vy: 0,
        small: small,
        radius: small ? 6 : 10,
        timer: 0,
        shootTimer: 40 + flr(rnd(30)),
        dirTimer: 30 + flr(rnd(40)),
        pts: small ? 1000 : 200
      };
    }

    if (ufo) {
      ufo.x += ufo.vx;
      ufo.y += ufo.vy;
      ufo.timer++;

      // Change vertical direction
      ufo.dirTimer--;
      if (ufo.dirTimer <= 0) {
        ufo.vy = rnd(2) - 1;
        ufo.dirTimer = 30 + flr(rnd(40));
      }

      // Keep in vertical bounds
      if (ufo.y < 20) ufo.vy = _abs(ufo.vy);
      if (ufo.y > H - 20) ufo.vy = -_abs(ufo.vy);

      // UFO sound
      if (ufo.timer % 8 === 0) ufoSound();

      // UFO shoots
      ufo.shootTimer--;
      if (ufo.shootTimer <= 0 && ship.alive) {
        let angle;
        if (ufo.small) {
          // Small UFO aims at player
          angle = Math.atan2(ship.y - ufo.y, ship.x - ufo.x) + (rnd(0.3) - 0.15);
        } else {
          // Big UFO shoots randomly
          angle = rnd(TWO_PI);
        }
        ufoBullets.push({
          x: ufo.x, y: ufo.y,
          vx: cos(angle) * 3.5,
          vy: sin(angle) * 3.5,
          life: 60
        });
        ufo.shootTimer = ufo.small ? 25 + flr(rnd(20)) : 35 + flr(rnd(25));
      }

      // UFO leaves screen
      if (ufo.x < -20 || ufo.x > W + 20) {
        ufo = null;
        ufoTimer = 300 + flr(rnd(400));
      }
    }

    // Move UFO bullets
    for (let i = ufoBullets.length - 1; i >= 0; i--) {
      const b = ufoBullets[i];
      b.x += b.vx; b.y += b.vy; b.life--;
      if (b.life <= 0 || b.x < -5 || b.x > W + 5 || b.y < -5 || b.y > H + 5) {
        ufoBullets.splice(i, 1);
      }
    }

    // --- Collisions ---

    // Bullets vs asteroids
    for (let i = bullets.length - 1; i >= 0; i--) {
      const b = bullets[i];
      let hit = false;
      for (let j = asteroids.length - 1; j >= 0; j--) {
        const a = asteroids[j];
        if (dist(b, a) < a.radius) {
          hitSound(a.size);
          splitAsteroid(a);
          asteroids.splice(j, 1);
          hit = true;
          break;
        }
      }
      if (hit) bullets.splice(i, 1);
    }

    // Bullets vs UFO
    if (ufo) {
      for (let i = bullets.length - 1; i >= 0; i--) {
        const b = bullets[i];
        if (dist(b, ufo) < ufo.radius) {
          score += ufo.pts;
          addExplosion(ufo.x, ufo.y, 20);
          hitSound(3);
          shakeTimer = 8;
          ufo = null;
          ufoTimer = 400 + flr(rnd(300));
          bullets.splice(i, 1);
          break;
        }
      }
    }

    // Ship vs asteroids
    if (ship.alive && ship.invuln <= 0 && hyperTimer <= 0) {
      for (let j = asteroids.length - 1; j >= 0; j--) {
        const a = asteroids[j];
        if (dist(ship, a) < a.radius + 5) {
          splitAsteroid(a);
          asteroids.splice(j, 1);
          killShip();
          break;
        }
      }
    }

    // Ship vs UFO
    if (ship.alive && ship.invuln <= 0 && hyperTimer <= 0 && ufo) {
      if (dist(ship, ufo) < ufo.radius + 5) {
        addExplosion(ufo.x, ufo.y, 15);
        ufo = null;
        ufoTimer = 400 + flr(rnd(300));
        killShip();
      }
    }

    // UFO bullets vs ship
    if (ship.alive && ship.invuln <= 0 && hyperTimer <= 0) {
      for (let i = ufoBullets.length - 1; i >= 0; i--) {
        const b = ufoBullets[i];
        if (dist(b, ship) < 6) {
          ufoBullets.splice(i, 1);
          killShip();
          break;
        }
      }
    }

    // UFO bullets vs asteroids (they can destroy asteroids too)
    for (let i = ufoBullets.length - 1; i >= 0; i--) {
      const b = ufoBullets[i];
      for (let j = asteroids.length - 1; j >= 0; j--) {
        const a = asteroids[j];
        if (dist(b, a) < a.radius) {
          splitAsteroid(a);
          asteroids.splice(j, 1);
          ufoBullets.splice(i, 1);
          break;
        }
      }
    }

    // Update particles
    for (let i = particles.length - 1; i >= 0; i--) {
      const p = particles[i];
      p.x += p.vx; p.y += p.vy; p.vx *= 0.97; p.vy *= 0.97; p.life--;
      if (p.life <= 0) particles.splice(i, 1);
    }

    // Update debris
    for (let i = debris.length - 1; i >= 0; i--) {
      const d = debris[i];
      d.x += d.vx; d.y += d.vy; d.angle += d.rotSpeed; d.life--;
      if (d.life <= 0) debris.splice(i, 1);
    }

    // Wave clear
    if (asteroids.length === 0 && !ufo) {
      spawnWave();
      note(0, "C5", 0.08);
      setTimeout(() => note(0, "G5", 0.1), 100);
    }
  };

  function killShip() {
    ship.alive = false;
    lives--;
    addExplosion(ship.x, ship.y, 25);
    // Ship debris lines
    for (let i = 0; i < 6; i++) {
      const a = rnd(TWO_PI);
      const sp = rnd(2) + 0.5;
      debris.push({
        x: ship.x, y: ship.y,
        vx: cos(a) * sp + ship.vx * 0.3,
        vy: sin(a) * sp + ship.vy * 0.3,
        len: 3 + rnd(5), angle: rnd(TWO_PI),
        rotSpeed: rnd(0.15) - 0.075,
        life: 20 + flr(rnd(20)), color: 3
      });
    }
    deathSound();
    shakeTimer = 12;
    respawnTimer = 60;
    ship.vx = 0;
    ship.vy = 0;
  }

  // ============================================================
  // Draw
  // ============================================================
  API._draw = function() {
    cls(0);

    // Screen shake offset
    let sx = 0, sy = 0;
    if (shakeTimer > 0) {
      sx = flr(rnd(5)) - 2;
      sy = flr(rnd(5)) - 2;
    }

    // Stars background
    for (const s of stars) pix(s.x + sx, s.y + sy, s.b);

    if (state === "title") {
      drawTitle();
      return;
    }

    if (state === "gameover") {
      drawGameOver();
      return;
    }

    // --- Play state rendering ---

    // Asteroids
    for (const a of asteroids) {
      const col = a.size === 3 ? 3 : a.size === 2 ? 2 : 2;
      drawPoly(a.shape, a.x + sx, a.y + sy, a.rot, a.radius, col);
    }

    // UFO
    if (ufo) {
      const s2 = ufo.small ? 0.7 : 1.0;
      drawPoly(UFO_PTS, ufo.x + sx, ufo.y + sy, 0, s2, 3);
      // Middle line
      line(flr(ufo.x - 8 * s2 + sx), flr(ufo.y + sy), flr(ufo.x + 8 * s2 + sx), flr(ufo.y + sy), 2);
      // Dome
      const dw = ufo.small ? 2 : 3;
      line(flr(ufo.x - dw + sx), flr(ufo.y - 2 * s2 + sy), flr(ufo.x + sx), flr(ufo.y - 5 * s2 + sy), 2);
      line(flr(ufo.x + sx), flr(ufo.y - 5 * s2 + sy), flr(ufo.x + dw + sx), flr(ufo.y - 2 * s2 + sy), 2);
    }

    // UFO bullets
    for (const b of ufoBullets) {
      pix(flr(b.x + sx), flr(b.y + sy), 3);
      pix(flr(b.x + sx) + 1, flr(b.y + sy), 2);
      pix(flr(b.x + sx), flr(b.y + sy) + 1, 2);
    }

    // Player bullets
    for (const b of bullets) {
      pix(flr(b.x + sx), flr(b.y + sy), 3);
      pix(flr(b.x + sx) + 1, flr(b.y + sy), 3);
      pix(flr(b.x + sx), flr(b.y + sy) + 1, 2);
    }

    // Ship
    if (ship.alive && hyperTimer <= 0) {
      // Blink during invulnerability
      if (ship.invuln <= 0 || flr(API.frame / 3) % 2 === 0) {
        drawPoly(SHIP_PTS, ship.x + sx, ship.y + sy, ship.angle, 1, 3);

        // Thrust flame
        if (btn("up")) {
          const flicker = 0.6 + rnd(0.8);
          const tc = flr(API.frame / 2) % 2 === 0 ? 3 : 2;
          const c2 = cos(ship.angle), s2 = sin(ship.angle);
          const bx = ship.x - c2 * 5 + sx;
          const by = ship.y - s2 * 5 + sy;
          const tx = bx - c2 * 6 * flicker;
          const ty = by - s2 * 6 * flicker;
          const px = -sin(ship.angle) * 3;
          const py = cos(ship.angle) * 3;
          line(flr(bx + px), flr(by + py), flr(tx), flr(ty), tc);
          line(flr(bx - px), flr(by - py), flr(tx), flr(ty), tc);
          // Thrust particles
          if (API.frame % 2 === 0) {
            particles.push({
              x: tx, y: ty,
              vx: -c2 * rnd(2) + rnd(1) - 0.5,
              vy: -s2 * rnd(2) + rnd(1) - 0.5,
              life: 4 + flr(rnd(6)),
              color: flr(rnd(2)) + 1
            });
          }
        }
      }
    }

    // Particles
    for (const p of particles) pix(flr(p.x + sx), flr(p.y + sy), p.color);

    // Debris lines
    for (const d of debris) {
      const dx = cos(d.angle) * d.len * 0.5;
      const dy = sin(d.angle) * d.len * 0.5;
      const c = d.life < 5 ? 1 : d.color;
      line(flr(d.x - dx + sx), flr(d.y - dy + sy), flr(d.x + dx + sx), flr(d.y + dy + sy), c);
    }

    // HUD
    drawHUD();
  };

  function drawHUD() {
    text("SCORE", 4, 3, 2);
    text(String(score), 4, 11, 3);

    text("HI", W - 60, 3, 2);
    text(String(_max(hiScore, score)), W - 60, 11, 3);

    // Lives (small ship icons)
    for (let i = 0; i < lives; i++) {
      const lx = 4 + i * 14;
      const ly = 24;
      drawPoly(SHIP_PTS, lx + 4, ly + 4, -Math.PI / 2, 0.5, 2);
    }

    // Level indicator
    text("LV" + level, W / 2 - 10, 3, 1);
  }

  function drawTitle() {
    // Large vector title "ASTEROIDS"
    const cy = 80 + sin(API.frame * 0.04) * 4;

    // Draw some floating asteroids in the background
    const t = API.frame * 0.01;
    for (let i = 0; i < 5; i++) {
      const ax = (100 + i * 90 + t * 20 * (i + 1)) % (W + 40) - 20;
      const ay = 40 + i * 50 + sin(t * 2 + i) * 20;
      const sz = 8 + i * 3;
      const shape = [
        [cos(0)*0.8, sin(0)*0.8], [cos(0.8)*1, sin(0.8)*1],
        [cos(1.6)*0.7, sin(1.6)*0.7], [cos(2.4)*0.9, sin(2.4)*0.9],
        [cos(3.2)*1.1, sin(3.2)*1.1], [cos(4.0)*0.8, sin(4.0)*0.8],
        [cos(4.8)*1, sin(4.8)*1], [cos(5.6)*0.7, sin(5.6)*0.7]
      ];
      drawPoly(shape, ax, ay, t + i, sz, 1);
    }

    // Title text
    text("ASTEROIDS", 185, flr(cy), 3);
    // Shadow
    text("ASTEROIDS", 186, flr(cy) + 1, 1);

    // Decorative line
    rectf(160, flr(cy) + 11, 160, 1, 2);

    // Ship display
    const shipX = W / 2;
    const shipY = flr(cy) + 35;
    drawPoly(SHIP_PTS, shipX, shipY, -Math.PI / 2 + sin(API.frame * 0.05) * 0.3, 1.5, 3);

    // Blinking start text
    if (flr(API.frame / 20) % 2 === 0) {
      text("PRESS A TO START", 170, 190, 3);
    }

    // Score table
    text("- SCORE TABLE -", 175, 220, 2);
    text("LARGE  ASTEROID   20", 155, 234, 2);
    text("MEDIUM ASTEROID   50", 155, 244, 2);
    text("SMALL  ASTEROID  100", 155, 254, 2);
    text("LARGE  UFO       200", 155, 264, 2);
    text("SMALL  UFO      1000", 155, 274, 2);

    if (hiScore > 0) {
      text("HI SCORE: " + hiScore, 180, 290, 1);
    }

    text("GRAYBOX DEMO V0.1", 168, 308, 1);
  }

  function drawGameOver() {
    // Particles and debris still animate
    for (const p of particles) pix(flr(p.x), flr(p.y), p.color);
    for (const d of debris) {
      const dx = cos(d.angle) * d.len * 0.5;
      const dy = sin(d.angle) * d.len * 0.5;
      line(flr(d.x - dx), flr(d.y - dy), flr(d.x + dx), flr(d.y + dy), d.life < 5 ? 1 : d.color);
    }

    text("GAME OVER", 195, 110, 3);
    text("SCORE: " + score, 190, 135, 2);
    text("LEVEL: " + level, 200, 150, 2);

    if (score > hiScore) {
      if (flr(API.frame / 10) % 2 === 0) {
        text("NEW HI SCORE!", 180, 170, 3);
      }
    }

    if (flr(API.frame / 20) % 2 === 0) {
      text("PRESS A TO CONTINUE", 158, 210, 3);
    }
  }

  // ============================================================
  // Boot
  // ============================================================
  if (API._init) API._init();
  setInterval(tick, 1000 / FPS);
  document.addEventListener("keydown", ensureAudio, { once: true });
  document.addEventListener("click", ensureAudio, { once: true });
})();
</script>
</body>
</html>
