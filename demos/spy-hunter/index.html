<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GrayBox — Demo: Spy Hunter</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #0a0a0a;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100vh;
    font-family: monospace;
    overflow: hidden;
  }
  #frame {
    background: #111;
    border: 3px solid #333;
    border-radius: 8px;
    padding: 12px;
    box-shadow: 0 0 40px rgba(0,0,0,0.8), inset 0 0 20px rgba(0,0,0,0.5);
  }
  canvas {
    display: block;
    image-rendering: pixelated;
    image-rendering: crisp-edges;
  }
  #controls {
    margin-top: 12px;
    color: #6b6b6b;
    font-size: 11px;
    text-align: center;
    letter-spacing: 1px;
  }
  #controls span { color: #b0b0b0; }
</style>
</head>
<body>
<div id="frame">
  <canvas id="screen"></canvas>
</div>
<div id="controls">
  <span>←→</span> STEER &nbsp;&nbsp; <span>↑</span> ACCEL &nbsp;&nbsp; <span>A</span> SHOOT &nbsp;&nbsp; <span>B</span> OIL/SMOKE
</div>
<script src="../../runtime/engine.js"></script>
<script>
(() => {
  "use strict";
  const W = GrayBox.WIDTH, H = GrayBox.HEIGHT;
  const { cls, pix, line, rect, rectf, circ, circf, sprite: defSprite,
          spr, sprT, text, btn, btnp, note, stop, rnd, flr, abs: _abs,
          min, max: _max, sin, cos } = GrayBox;

  // --- Sprites ---

  // 1: Player spy car (top-down, facing up)
  defSprite(1,
    "00300300" +
    "03333300" +
    "33233230" +
    "33333330" +
    "33233230" +
    "33333330" +
    "03300330" +
    "01300310"
  );

  // 2: Enemy road blocker car (wider, aggressive)
  defSprite(2,
    "01000100" +
    "01111100" +
    "13111310" +
    "11111110" +
    "13111310" +
    "11111110" +
    "01100110" +
    "01100110"
  );

  // 3: Bulletproof enforcer car (armored, dark)
  defSprite(3,
    "00100100" +
    "01111100" +
    "11111110" +
    "12111210" +
    "11111110" +
    "11111110" +
    "01100110" +
    "00100100"
  );

  // 4: Civilian car (innocent looking, light)
  defSprite(4,
    "00200200" +
    "02222200" +
    "23222320" +
    "22222220" +
    "23222320" +
    "22222220" +
    "02200220" +
    "00200200"
  );

  // 5: Helicopter (top-down with rotors)
  defSprite(5,
    "30000030" +
    "03000300" +
    "00313100" +
    "01131110" +
    "01131110" +
    "00313100" +
    "03000300" +
    "30000030"
  );

  // 6: Weapon van (power-up vehicle)
  defSprite(6,
    "00333300" +
    "03333330" +
    "32323230" +
    "33333330" +
    "32323230" +
    "33333330" +
    "03300330" +
    "01300310"
  );

  // 7: Player bullet
  defSprite(7,
    "00000000" +
    "00030000" +
    "00030000" +
    "00020000" +
    "00020000" +
    "00000000" +
    "00000000" +
    "00000000"
  );

  // 8: Explosion frame 1
  defSprite(8,
    "00000000" +
    "00300100" +
    "01002000" +
    "00031000" +
    "00130200" +
    "01000010" +
    "00100000" +
    "00000000"
  );

  // 9: Explosion frame 2
  defSprite(9,
    "20010020" +
    "01000010" +
    "00203200" +
    "03033030" +
    "00232000" +
    "01000300" +
    "20001001" +
    "00200010"
  );

  // 10: Oil slick puddle
  defSprite(10,
    "00000000" +
    "00000000" +
    "00111000" +
    "01111100" +
    "01111100" +
    "00111000" +
    "00000000" +
    "00000000"
  );

  // 11: Bomb (helicopter drops)
  defSprite(11,
    "00000000" +
    "00010000" +
    "00030000" +
    "00131000" +
    "00131000" +
    "00030000" +
    "00000000" +
    "00000000"
  );

  // 12: Life icon (small car)
  defSprite(12,
    "00000000" +
    "00300300" +
    "03333300" +
    "33233230" +
    "33333330" +
    "03300330" +
    "00000000" +
    "00000000"
  );

  // 13: Smoke cloud
  defSprite(13,
    "00000000" +
    "00220000" +
    "02222000" +
    "22222200" +
    "02222220" +
    "00222200" +
    "00022000" +
    "00000000"
  );

  // 14: Tree (roadside decoration)
  defSprite(14,
    "00010000" +
    "00111000" +
    "01111100" +
    "01111100" +
    "00111000" +
    "00010000" +
    "00010000" +
    "00010000"
  );

  // 15: Bridge railing piece
  defSprite(15,
    "11111111" +
    "10000001" +
    "11111111" +
    "00100100" +
    "00100100" +
    "00100100" +
    "00100100" +
    "00100100"
  );

  // --- Game Constants ---
  const ROAD_W = 107;         // road width in pixels
  const ROAD_CENTER = W / 2;  // center of screen
  const ROAD_LEFT = ROAD_CENTER - ROAD_W / 2;
  const ROAD_RIGHT = ROAD_CENTER + ROAD_W / 2;
  const LANE_W = ROAD_W / 4;  // 4 lanes

  // --- Scenes ---
  const { TITLE, PLAY, GAMEOVER } = GrayBox.SCENE;

  let player, bullets, enemies, explosions, particles, oilSlicks, bombs, smokeTrails;
  let score, lives, distance, scrollSpeed, baseSpeed;
  let roadOffset, roadCurve, roadCurveTarget, roadCurveSpeed;
  let treesLeft, treesRight;
  let weaponVan, hasOil, hasSmoke, oilCount, smokeCount;
  let shootCooldown, invincible;
  let bridgeMode, bridgeTimer;
  let forkMode, forkTimer, forkDir;
  let spawnTimer, heliSpawnTimer;
  let civilianPenaltyTimer;
  let titleCarY;

  function laneX(lane) {
    return ROAD_LEFT + lane * LANE_W + LANE_W / 2 - 4;
  }

  function resetGame() {
    player = { x: ROAD_CENTER - 4, y: H - 30, lane: 1, speed: 0 };
    bullets = [];
    enemies = [];
    explosions = [];
    particles = [];
    oilSlicks = [];
    bombs = [];
    smokeTrails = [];
    score = 0;
    lives = 3;
    distance = 0;
    baseSpeed = 2.5;
    scrollSpeed = baseSpeed;
    roadOffset = 0;
    roadCurve = 0;
    roadCurveTarget = 0;
    roadCurveSpeed = 0;
    shootCooldown = 0;
    invincible = 0;
    bridgeMode = false;
    bridgeTimer = 0;
    forkMode = false;
    forkTimer = 0;
    forkDir = 0;
    spawnTimer = 40;
    heliSpawnTimer = 200;
    weaponVan = null;
    hasOil = false;
    hasSmoke = false;
    oilCount = 0;
    smokeCount = 0;
    civilianPenaltyTimer = 0;

    treesLeft = [];
    treesRight = [];
    for (let i = 0; i < 12; i++) {
      treesLeft.push({ y: i * 30 + flr(rnd(10)) });
      treesRight.push({ y: i * 30 + flr(rnd(10)) });
    }
  }

  function addExplosion(x, y) {
    explosions.push({ x, y, timer: 14 });
    for (let i = 0; i < 6; i++)
      particles.push({
        x: x + 4, y: y + 4,
        vx: rnd(4) - 2, vy: rnd(4) - 2,
        life: 6 + flr(rnd(8)),
        color: flr(rnd(3)) + 1
      });
  }

  function shootSound() { note(0, "E5", 0.03); }
  function hitSound() { note(1, "C3", 0.06); setTimeout(() => note(1, "E3", 0.05), 40); }
  function deathSound() {
    note(0, "C3", 0.12); note(1, "G2", 0.12);
    setTimeout(() => { note(0, "A2", 0.18); note(1, "E2", 0.18); }, 120);
  }
  function pickupSound() {
    note(0, "C5", 0.08);
    setTimeout(() => note(0, "E5", 0.08), 80);
    setTimeout(() => note(0, "G5", 0.1), 160);
  }
  function penaltySound() {
    note(0, "A2", 0.15); note(1, "D2", 0.15);
  }
  function oilSound() { note(1, "F3", 0.1); }
  function smokeSound() { note(1, "A3", 0.08); setTimeout(() => note(1, "C4", 0.06), 60); }
  function engineSound() {
    // Subtle engine hum based on speed
    if (GrayBox.frame % 8 === 0 && scrollSpeed > 2) {
      note(1, scrollSpeed > 3.5 ? "A2" : "E2", 0.03);
    }
  }

  function spawnEnemy() {
    const types = ["blocker", "enforcer", "civilian"];
    // Weight civilians more, make enforcers rarer
    const weights = [3, 1 + flr(distance / 3000), 4];
    const total = weights.reduce((a, b) => a + b, 0);
    let r = rnd(total);
    let type = "civilian";
    for (let i = 0; i < types.length; i++) {
      r -= weights[i];
      if (r <= 0) { type = types[i]; break; }
    }

    const lane = flr(rnd(4));
    const sprId = type === "blocker" ? 2 : type === "enforcer" ? 3 : 4;
    const speed = type === "civilian" ? scrollSpeed * 0.6 :
                  type === "blocker" ? scrollSpeed * 0.3 :
                  scrollSpeed * 0.85;

    enemies.push({
      x: laneX(lane),
      y: -12,
      type,
      sprId,
      speed,
      lane,
      hp: type === "enforcer" ? 3 : 1,
      swerveTimer: type === "blocker" ? 30 + flr(rnd(40)) : 0,
      swerveDir: 0,
    });
  }

  function spawnHelicopter() {
    enemies.push({
      x: ROAD_LEFT + rnd(ROAD_W - 8),
      y: -12,
      type: "helicopter",
      sprId: 5,
      speed: scrollSpeed * 0.4,
      lane: -1,
      hp: 2,
      bombTimer: 40 + flr(rnd(30)),
      swerveTimer: 0,
      swerveDir: 0,
    });
  }

  function spawnWeaponVan() {
    if (weaponVan) return;
    const lane = 1 + flr(rnd(2));
    weaponVan = {
      x: laneX(lane),
      y: -12,
      speed: scrollSpeed * 0.7,
      lane,
    };
  }

  function playerDie() {
    lives--;
    addExplosion(player.x, player.y);
    deathSound();
    invincible = 90; // 3 seconds invincibility
    player.y = H - 30;
    player.x = ROAD_CENTER - 4;
    scrollSpeed = baseSpeed;
    if (lives <= 0) {
      GrayBox.go(GAMEOVER);
    }
  }

  function boxCollide(ax, ay, aw, ah, bx, by, bw, bh) {
    return ax < bx + bw && ax + aw > bx && ay < by + bh && ay + ah > by;
  }

  // --- Title Scene ---
  GrayBox.scene(TITLE, {
    init() { resetGame(); titleCarY = H; },
    update() {
      titleCarY -= 1.5;
      if (titleCarY < -20) titleCarY = H + 20;
      if (btnp("a") || btnp("a")) {
        note(0, "C5", 0.1);
        setTimeout(() => note(0, "E5", 0.1), 100);
        setTimeout(() => note(0, "G5", 0.15), 200);
        GrayBox.go(PLAY); return;
      }
    },
    draw() {
      cls(0);
      const curveOff = flr(roadCurve);
      const rl = ROAD_LEFT + curveOff;
      const rr = ROAD_RIGHT + curveOff;
      rectf(rl, 0, ROAD_W, H, 1);
      rectf(rl, 0, 3, H, 3); rectf(rr - 3, 0, 3, H, 3);
      for (let ly = -16; ly < H; ly += 16) { const dy = flr((ly + (GrayBox.frame * 2) % 16)); for (let lane = 1; lane < 4; lane++) { const lx = rl + lane * LANE_W; rectf(lx, dy, 2, 8, 2); } }
      for (let ty = 0; ty < H; ty += 30) { const dy = (ty + flr(GrayBox.frame * 1.5) % 30); sprT(14, rl - 10, dy % H, false, false); sprT(14, rr + 4, (dy + 15) % H, false, false); }
      sprT(1, ROAD_CENTER - 4 + sin(GrayBox.frame * 0.03) * 7, flr(titleCarY), false, false);
      const ty = 38 + sin(GrayBox.frame * 0.04) * 4;
      text("SPY HUNTER", 123, flr(ty), 3); rectf(113, flr(ty) + 10, 93, 1, 2);
      text("TOP SECRET MISSION", 113, flr(ty) + 20, 2);
      text("ARROWS  STEER/ACCEL", 113, 113, 2); text("A  SHOOT FORWARD", 113, 122, 2); text("B  OIL/SMOKE", 113, 131, 2);
      text("-TARGETS-", 130, 150, 2);
      sprT(2, 120, 161); text("BLOCKER    50", 130, 162, 2);
      sprT(3, 120, 171); text("ENFORCER  100", 130, 173, 2);
      sprT(5, 120, 182); text("CHOPPER   200", 130, 183, 2);
      sprT(4, 120, 192); text("CIVILIAN  NO!", 130, 194, 1);
      if (flr(GrayBox.frame / 20) % 2 === 0) text("PRESS A", 130, 214, 3);
      text("GRAYBOX DEMO V0.1", 113, 231, 1);
    }
  });

  // --- Game Over Scene ---
  GrayBox.scene(GAMEOVER, {
    init() {},
    update() {
      for (let i = particles.length - 1; i >= 0; i--) { const p = particles[i]; p.x += p.vx; p.y += p.vy; p.vy += 0.08; p.life--; if (p.life <= 0) particles.splice(i, 1); }
      if (btnp("a") || btnp("a")) { GrayBox.go(TITLE); return; }
    },
    draw() {
      cls(0);
      const curveOff = flr(roadCurve);
      const rl = ROAD_LEFT + curveOff;
      rectf(rl, 0, ROAD_W, H, 1);
      for (const p of particles) pix(flr(p.x), flr(p.y), p.color);
      text("GAME OVER", 130, 80, 3); text("SCORE: " + score, 130, 100, 2);
      text("DISTANCE: " + flr(distance), 113, 112, 2);
      if (flr(GrayBox.frame / 20) % 2 === 0) text("PRESS A", 130, 150, 3);
    }
  });

  // --- Play Scene ---
  GrayBox.scene(PLAY, {
    init() { resetGame(); },
    update() {

    // Increase difficulty over time
    baseSpeed = 2.5 + distance / 8000;
    if (baseSpeed > 5) baseSpeed = 5;

    // Player steering
    if (btn("left")) player.x -= 2.5;
    if (btn("right")) player.x += 2.5;

    // Player acceleration
    if (btn("up")) {
      scrollSpeed = min(baseSpeed + 2, scrollSpeed + 0.08);
    } else {
      scrollSpeed = _max(baseSpeed, scrollSpeed - 0.04);
    }

    // Clamp player to road (with small margin for shoulder)
    const roadL = ROAD_LEFT + roadCurve + 3;
    const roadR = ROAD_RIGHT + roadCurve - 10;
    player.x = _max(roadL, min(roadR, player.x));

    // Off-road detection
    if (player.x <= roadL + 2 || player.x >= roadR - 2) {
      scrollSpeed = _max(1.5, scrollSpeed - 0.15); // slow down off road
    }

    // Distance = score
    distance += scrollSpeed;
    score = flr(distance / 10);

    // Road curve
    if (GrayBox.frame % 120 === 0) {
      roadCurveTarget = rnd(40) - 20;
    }
    roadCurve += (roadCurveTarget - roadCurve) * 0.01;

    // Scroll road offset for lane markings
    roadOffset = (roadOffset + scrollSpeed) % 16;

    // Update trees
    for (const t of treesLeft) {
      t.y += scrollSpeed;
      if (t.y > H + 10) t.y -= H + 30;
    }
    for (const t of treesRight) {
      t.y += scrollSpeed;
      if (t.y > H + 10) t.y -= H + 30;
    }

    // Bridge mode
    if (bridgeMode) {
      bridgeTimer -= scrollSpeed;
      if (bridgeTimer <= 0) bridgeMode = false;
    } else if (!forkMode && rnd(1) < 0.001 && distance > 2000) {
      bridgeMode = true;
      bridgeTimer = 300;
    }

    // Fork mode
    if (forkMode) {
      forkTimer -= scrollSpeed;
      if (forkTimer <= 0) forkMode = false;
    } else if (!bridgeMode && rnd(1) < 0.0005 && distance > 5000) {
      forkMode = true;
      forkTimer = 400;
      forkDir = rnd(1) < 0.5 ? -1 : 1;
    }

    // Shooting
    if (shootCooldown > 0) shootCooldown--;
    if (btnp("a") && shootCooldown <= 0 && bullets.length < 3) {
      bullets.push({ x: player.x + 0, y: player.y - 6 });
      shootCooldown = 6;
      shootSound();
    }

    // Oil slick (B button)
    if (btnp("b") && hasOil && oilCount > 0) {
      oilSlicks.push({ x: player.x, y: player.y + 10, life: 180 });
      oilCount--;
      if (oilCount <= 0) hasOil = false;
      oilSound();
    }
    // Smoke screen (B button when no oil but has smoke)
    if (btnp("b") && !hasOil && hasSmoke && smokeCount > 0) {
      for (let i = 0; i < 5; i++) {
        smokeTrails.push({ x: player.x + rnd(8) - 2, y: player.y + 8 + i * 6, life: 90 });
      }
      smokeCount--;
      if (smokeCount <= 0) hasSmoke = false;
      smokeSound();
    }

    // Update bullets
    for (let i = bullets.length - 1; i >= 0; i--) {
      bullets[i].y -= 7;
      if (bullets[i].y < -8) bullets.splice(i, 1);
    }

    // Update oil slicks
    for (let i = oilSlicks.length - 1; i >= 0; i--) {
      oilSlicks[i].y += scrollSpeed;
      oilSlicks[i].life--;
      if (oilSlicks[i].life <= 0 || oilSlicks[i].y > H + 10) oilSlicks.splice(i, 1);
    }

    // Update smoke
    for (let i = smokeTrails.length - 1; i >= 0; i--) {
      smokeTrails[i].y += scrollSpeed * 0.5;
      smokeTrails[i].life--;
      if (smokeTrails[i].life <= 0 || smokeTrails[i].y > H + 10) smokeTrails.splice(i, 1);
    }

    // Update bombs
    for (let i = bombs.length - 1; i >= 0; i--) {
      const b = bombs[i];
      b.y += b.vy;
      b.vy += 0.1;
      // Check bomb-player collision
      if (invincible <= 0 && boxCollide(player.x, player.y, 8, 8, b.x, b.y, 6, 6)) {
        bombs.splice(i, 1);
        playerDie();
        continue;
      }
      if (b.y > H + 10) {
        bombs.splice(i, 1);
        continue;
      }
      // Bomb hits ground - explode
      if (b.y > b.targetY) {
        addExplosion(b.x - 2, b.y - 2);
        bombs.splice(i, 1);
      }
    }

    // Spawn enemies
    spawnTimer--;
    if (spawnTimer <= 0) {
      spawnEnemy();
      spawnTimer = _max(15, 50 - flr(distance / 1500));
    }

    // Spawn helicopters
    heliSpawnTimer--;
    if (heliSpawnTimer <= 0 && distance > 1500) {
      spawnHelicopter();
      heliSpawnTimer = 200 + flr(rnd(150));
    }

    // Spawn weapon van
    if (!weaponVan && GrayBox.frame % 300 === 0 && (!hasOil && !hasSmoke) && rnd(1) < 0.5) {
      spawnWeaponVan();
    }

    // Update weapon van
    if (weaponVan) {
      weaponVan.y += weaponVan.speed;
      // Player drives into van = pickup
      if (boxCollide(player.x, player.y, 8, 8, weaponVan.x, weaponVan.y, 8, 8)) {
        pickupSound();
        if (!hasOil) {
          hasOil = true;
          oilCount = 3;
        } else {
          hasSmoke = true;
          smokeCount = 3;
        }
        weaponVan = null;
      } else if (weaponVan && weaponVan.y > H + 10) {
        weaponVan = null;
      }
    }

    // Update enemies
    for (let i = enemies.length - 1; i >= 0; i--) {
      const e = enemies[i];

      if (e.type === "helicopter") {
        // Helicopter floats and drops bombs
        e.y += e.speed;
        e.x += sin(GrayBox.frame * 0.05 + i) * 0.8;
        e.bombTimer--;
        if (e.bombTimer <= 0 && e.y > 15 && e.y < H - 45) {
          bombs.push({
            x: e.x + 2,
            y: e.y + 8,
            vy: 1,
            targetY: player.y + rnd(20) - 10,
          });
          e.bombTimer = 50 + flr(rnd(30));
          note(0, "G3", 0.04);
        }
      } else {
        // Ground vehicles scroll down
        e.y += scrollSpeed - e.speed;

        // Blocker swerving behavior
        if (e.type === "blocker") {
          e.swerveTimer--;
          if (e.swerveTimer <= 0) {
            // Swerve toward player
            e.swerveDir = player.x > e.x ? 1.5 : -1.5;
            e.swerveTimer = 20 + flr(rnd(30));
          }
          e.x += e.swerveDir * 0.5;
          e.x = _max(ROAD_LEFT + roadCurve + 2, min(ROAD_RIGHT + roadCurve - 10, e.x));
        }

        // Enforcer rams toward player
        if (e.type === "enforcer") {
          if (e.y > 0 && _abs(e.y - player.y) < 60) {
            const dx = player.x - e.x;
            e.x += (dx > 0 ? 1 : -1) * 0.6;
            e.speed = scrollSpeed * 0.95; // match player speed
          }
        }
      }

      // Off screen removal
      if (e.y > H + 20 || e.y < -30) {
        enemies.splice(i, 1);
        continue;
      }

      // Check oil slick collision (spin out enemies)
      for (let j = oilSlicks.length - 1; j >= 0; j--) {
        const o = oilSlicks[j];
        if (e.type !== "helicopter" && boxCollide(e.x, e.y, 8, 8, o.x, o.y, 8, 6)) {
          addExplosion(e.x, e.y);
          if (e.type !== "civilian") score += 50;
          enemies.splice(i, 1);
          oilSlicks.splice(j, 1);
          hitSound();
          i = -1; // break outer
          break;
        }
      }
      if (i < 0) continue;

      // Check smoke trail (makes enemies swerve away)
      for (const s of smokeTrails) {
        if (e.type !== "helicopter" && boxCollide(e.x, e.y, 8, 8, s.x - 4, s.y - 4, 16, 12)) {
          e.x += (e.x < player.x ? -3 : 3);
        }
      }

      // Bullet-enemy collision
      for (let j = bullets.length - 1; j >= 0; j--) {
        const b = bullets[j];
        if (boxCollide(b.x, b.y, 4, 6, e.x, e.y, 8, 8)) {
          bullets.splice(j, 1);

          if (e.type === "civilian") {
            // Penalty for shooting civilians
            score = _max(0, score - 100);
            civilianPenaltyTimer = 60;
            penaltySound();
            addExplosion(e.x, e.y);
            enemies.splice(i, 1);
            break;
          }

          if (e.type === "enforcer") {
            e.hp--;
            if (e.hp <= 0) {
              addExplosion(e.x, e.y);
              score += 100;
              hitSound();
              enemies.splice(i, 1);
            } else {
              note(1, "A4", 0.03);
            }
            break;
          }

          // Blocker or helicopter
          e.hp--;
          if (e.hp <= 0) {
            addExplosion(e.x, e.y);
            score += e.type === "helicopter" ? 200 : 50;
            hitSound();
            enemies.splice(i, 1);
          }
          break;
        }
      }
    }

    // Enemy-player collision
    if (invincible <= 0) {
      for (let i = enemies.length - 1; i >= 0; i--) {
        const e = enemies[i];
        if (e.type === "helicopter") continue; // helicopters don't collide directly
        if (boxCollide(player.x + 1, player.y + 1, 6, 6, e.x + 1, e.y + 1, 6, 6)) {
          if (e.type === "civilian") {
            // Bumping civilian - penalty
            score = _max(0, score - 50);
            civilianPenaltyTimer = 40;
            penaltySound();
            addExplosion(e.x, e.y);
            enemies.splice(i, 1);
          } else {
            // Enemy car collision = death
            addExplosion(e.x, e.y);
            enemies.splice(i, 1);
            playerDie();
          }
          break;
        }
      }
    }

    // Invincibility countdown
    if (invincible > 0) invincible--;

    // Civilian penalty display timer
    if (civilianPenaltyTimer > 0) civilianPenaltyTimer--;

    // Explosions
    for (let i = explosions.length - 1; i >= 0; i--) {
      explosions[i].timer--;
      if (explosions[i].timer <= 0) explosions.splice(i, 1);
    }

    // Particles
    for (let i = particles.length - 1; i >= 0; i--) {
      const p = particles[i];
      p.x += p.vx; p.y += p.vy; p.vy += 0.05; p.life--;
      if (p.life <= 0) particles.splice(i, 1);
    }

    // Engine sound
    engineSound();
    },
    draw() {
      cls(0);
      const curveOff = flr(roadCurve);
      const rl = ROAD_LEFT + curveOff;
      const rr = ROAD_RIGHT + curveOff;

      // --- Play state rendering ---

      // Grass/ground
      // Left grass
    rectf(0, 0, rl, H, 0);
    // Right grass
    rectf(rr, 0, W - rr, H, 0);
    // Road surface
    rectf(rl, 0, ROAD_W, H, 1);

    // Bridge rendering
    if (bridgeMode) {
      // Water on sides
      for (let wy = 0; wy < H; wy += 2) {
        const waveOff = sin((wy + GrayBox.frame * 2) * 0.1) * 3;
        for (let wx = 0; wx < rl; wx += 4) {
          pix(wx + flr(waveOff), wy, (wx + wy + GrayBox.frame) % 8 < 4 ? 1 : 0);
        }
        for (let wx = rr; wx < W; wx += 4) {
          pix(wx + flr(waveOff), wy, (wx + wy + GrayBox.frame) % 8 < 4 ? 1 : 0);
        }
      }
      // Bridge railings
      for (let by = -16; by < H; by += 8) {
        const dy = (by + flr(roadOffset)) % (H + 16) - 8;
        rectf(rl, dy, 3, 8, 2);
        rectf(rr - 3, dy, 3, 8, 2);
        // Railing posts
        if (dy % 16 < 8) {
          rectf(rl - 2, dy + 2, 2, 4, 2);
          rectf(rr, dy + 2, 2, 4, 2);
        }
      }
    } else {
      // Shoulder lines (white)
      rectf(rl, 0, 3, H, 3);
      rectf(rr - 3, 0, 3, H, 3);

      // Trees on sides
      for (const t of treesLeft) {
        sprT(14, rl - 10 + curveOff, flr(t.y));
      }
      for (const t of treesRight) {
        sprT(14, rr + 4 + curveOff, flr(t.y));
      }
    }

    // Fork rendering
    if (forkMode) {
      const forkX = ROAD_CENTER + curveOff + forkDir * 27;
      // Draw diverging road
      for (let fy = 0; fy < H; fy += 2) {
        const spread = (H - fy) * 0.3 * forkDir;
        rectf(flr(forkX + spread) - 13, fy, 27, 2, 1);
      }
    }

    // Lane dashes (animated scrolling)
    for (let ly = -16; ly < H; ly += 16) {
      const dy = flr(ly + roadOffset);
      if (dy < 0 || dy > H) continue;
      for (let lane = 1; lane < 4; lane++) {
        const lx = rl + lane * LANE_W;
        rectf(lx, dy, 2, 8, 2);
      }
    }

    // Oil slicks
    for (const o of oilSlicks) {
      sprT(10, flr(o.x), flr(o.y));
    }

    // Smoke trails
    for (const s of smokeTrails) {
      sprT(13, flr(s.x), flr(s.y));
    }

    // Weapon van
    if (weaponVan) {
      sprT(6, flr(weaponVan.x), flr(weaponVan.y));
      // Flashing indicator
      if (flr(GrayBox.frame / 6) % 2 === 0) {
        text("VAN", flr(weaponVan.x) - 2, flr(weaponVan.y) - 8, 3);
      }
    }

    // Enemies
    for (const e of enemies) {
      sprT(e.sprId, flr(e.x), flr(e.y));
      // Enforcer damage flash
      if (e.type === "enforcer" && e.hp < 3 && flr(GrayBox.frame / 4) % 2 === 0) {
        pix(flr(e.x) + 4, flr(e.y) + 4, 3);
      }
    }

    // Bombs
    for (const b of bombs) {
      sprT(11, flr(b.x), flr(b.y));
      // Bomb shadow
      pix(flr(b.x) + 2, flr(b.targetY), 1);
      pix(flr(b.x) + 3, flr(b.targetY), 1);
    }

    // Player bullets
    for (const b of bullets) sprT(7, flr(b.x), flr(b.y));

    // Player (blink when invincible)
    if (invincible <= 0 || flr(GrayBox.frame / 3) % 2 === 0) {
      sprT(1, flr(player.x), flr(player.y));
    }

    // Explosions
    for (const e of explosions) {
      const sprId = e.timer > 7 ? 8 : 9;
      sprT(sprId, flr(e.x), flr(e.y));
    }

    // Particles
    for (const p of particles) pix(flr(p.x), flr(p.y), p.color);

    // --- HUD ---
    rectf(0, 0, W, 11, 0);
    text("SCORE:" + score, 3, 2, 3);

    // Speed indicator
    const speedBar = flr((scrollSpeed / 5) * 27);
    text("SPD", W / 2 - 23, 2, 2);
    rectf(W / 2 - 7, 3, 28, 4, 1);
    rectf(W / 2 - 7, 3, speedBar, 4, 3);

    // Lives
    for (let i = 0; i < lives; i++) sprT(12, W - 30 + i * 10, 2);

    // Weapon indicators
    if (hasOil) {
      text("OIL:" + oilCount, 3, H - 8, 2);
    }
    if (hasSmoke) {
      text("SMK:" + smokeCount, hasOil ? 36 : 3, H - 8, 2);
    }

    // Civilian penalty warning
    if (civilianPenaltyTimer > 0) {
      if (flr(GrayBox.frame / 4) % 2 === 0) {
        text("CIVILIAN HIT! -100", 113, 23, 3);
      }
    }

    // Distance marker
    text("DIST:" + flr(distance / 10), W / 2 + 27, 2, 2);

    // Bridge indicator
    if (bridgeMode) {
      text("BRIDGE", W / 2 - 10, 15, 3);
    }
    }
  });

  GrayBox.go(TITLE);
  GrayBox.boot("screen");
})();
</script>
