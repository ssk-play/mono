  // --- Grid constants (updated for 16x16 sprites) ---
  const GRID_W = 14;     // grid columns (playfield fits 14*16=224 in ~240 zone)
  const GRID_H = 13;     // grid rows (13*16=208 +18 HUD = 226 < 240)
  const CELL = 16;       // cell size in pixels (16x16)
  const FIELD_X = 48;    // playfield x offset (centered: (320-224)/2 = 48)
  const FIELD_Y = 18;    // playfield y offset (leave room for HUD)
  const SKY_ROWS = 1;    // top rows are sky (no dirt)

  // Dirt grid: 0=empty(tunnel), 1=dirt
  let dirt = [];
  // Rock data
  let rocks = [];
  // Player
  let player, playerDir, playerMoving, playerPumpDir;
  // Hose
  let hose, hoseDir, hoseLen, hoseMaxLen, hoseActive, hoseCooldown;
  // Enemies
  let enemies;
  // Particles/effects
  let particles, scorePopups;
  // Game state
  const { TITLE, PLAY, CLEAR, GAMEOVER } = Mono.SCENE;
  let score, lives, level, levelTimer, respawnTimer;
  let levelClearShowing = false;
  let lastEnemyEscaping;
  // Walk sound timer
  let walkSndTimer;

  function initDirt() {
    dirt = [];
    for (let y = 0; y < GRID_H; y++) {
      dirt[y] = [];
      for (let x = 0; x < GRID_W; x++) {
        dirt[y][x] = y >= SKY_ROWS ? 1 : 0;
      }
    }
  }

  function digAt(gx, gy) {
    if (gx >= 0 && gx < GRID_W && gy >= SKY_ROWS && gy < GRID_H) {
      dirt[gy][gx] = 0;
    }
  }

  function isDirt(gx, gy) {
    if (gx < 0 || gx >= GRID_W || gy < 0 || gy >= GRID_H) return false;
    if (gy < SKY_ROWS) return false;
    return dirt[gy][gx] === 1;
  }

  function isTunnel(gx, gy) {
    if (gx < 0 || gx >= GRID_W || gy < 0 || gy >= GRID_H) return false;
    if (gy < SKY_ROWS) return true;
    return dirt[gy][gx] === 0;
  }

  function gridToPixel(gx, gy) {
    return { x: FIELD_X + gx * CELL, y: FIELD_Y + gy * CELL };
  }

  function pixelToGrid(px, py) {
    return { x: flr((px - FIELD_X) / CELL), y: flr((py - FIELD_Y) / CELL) };
  }

  // --- Collision helpers ---
  // AABB rect collision
  function rectOverlap(x1, y1, w1, h1, x2, y2, w2, h2) {
    return x1 < x2 + w2 && x1 + w1 > x2 && y1 < y2 + h2 && y1 + h1 > y2;
  }

  // Circle collision (center+radius)
  function circCollide(cx1, cy1, r1, cx2, cy2, r2) {
    const dx = cx1 - cx2;
    const dy = cy1 - cy2;
    const distSq = dx * dx + dy * dy;
    const rSum = r1 + r2;
    return distSq < rSum * rSum;
  }

  // Entity center helpers (16x16 sprites)
  function entityCX(e) { return e.px + 8; }
  function entityCY(e) { return e.py + 8; }

  function resetGame() {
    score = 0;
    lives = 3;
    level = 0;
    startLevel();
  }

  function startLevel() {
    level++;
    levelTimer = 0;
    respawnTimer = 0;
    lastEnemyEscaping = false;
    walkSndTimer = 0;
    particles = [];
    scorePopups = [];
    enemies = [];
    rocks = [];
    hose = null;
    hoseActive = false;
    hoseCooldown = 0;

    initDirt();

    // Player starts at top center
    player = {
      gx: flr(GRID_W / 2), gy: SKY_ROWS,
      px: 0, py: 0, // pixel position
      dir: 0, // 0=right,1=left,2=up,3=down
      moving: false,
      moveT: 0,
      targetGx: 0, targetGy: 0,
      alive: true,
      dieTimer: 0
    };
    player.px = FIELD_X + player.gx * CELL;
    player.py = FIELD_Y + player.gy * CELL;

    // Carve initial tunnels (horizontal paths at various depths)
    // Tunnel row 1
    for (let x = 2; x < GRID_W - 2; x++) {
      digAt(x, SKY_ROWS + 2);
    }
    // Tunnel row 2
    for (let x = 1; x < GRID_W - 1; x++) {
      digAt(x, SKY_ROWS + 5);
    }
    // Tunnel row 3
    for (let x = 3; x < GRID_W - 3; x++) {
      digAt(x, SKY_ROWS + 8);
    }
    // Tunnel row 4 (deeper)
    for (let x = 1; x < GRID_W - 1; x++) {
      digAt(x, SKY_ROWS + 11);
    }
    // Vertical connector left
    for (let y = SKY_ROWS + 2; y <= SKY_ROWS + 5; y++) digAt(3, y);
    // Vertical connector right
    for (let y = SKY_ROWS + 5; y <= SKY_ROWS + 8; y++) digAt(GRID_W - 4, y);
    // Player start tunnel (from sky down)
    for (let y = SKY_ROWS; y <= SKY_ROWS + 2; y++) {
      digAt(flr(GRID_W / 2), y);
      digAt(flr(GRID_W / 2) - 1, y);
    }

    // Spawn enemies
    const numPookas = min(3 + level, 5);
    const numFygars = min(1 + flr(level / 2), 3);

    // Enemy spawn positions (on tunnels)
    const spawnPositions = [
      { gx: 3, gy: SKY_ROWS + 2 },
      { gx: GRID_W - 4, gy: SKY_ROWS + 2 },
      { gx: 2, gy: SKY_ROWS + 5 },
      { gx: GRID_W - 3, gy: SKY_ROWS + 5 },
      { gx: 4, gy: SKY_ROWS + 8 },
      { gx: GRID_W - 5, gy: SKY_ROWS + 8 },
      { gx: 3, gy: SKY_ROWS + 11 },
      { gx: GRID_W - 4, gy: SKY_ROWS + 11 },
    ];

    for (let i = 0; i < numPookas + numFygars && i < spawnPositions.length; i++) {
      const sp = spawnPositions[i];
      const type = i < numPookas ? "pooka" : "fygar";
      enemies.push({
        type: type,
        gx: sp.gx, gy: sp.gy,
        px: FIELD_X + sp.gx * CELL,
        py: FIELD_Y + sp.gy * CELL,
        dir: flr(rnd(4)),
        moving: false,
        moveT: 0,
        targetGx: sp.gx, targetGy: sp.gy,
        speed: 0.6 + level * 0.08,
        inflate: 0, // 0=normal, 1-3 pump stages, 3=pop
        deflateTimer: 0,
        ghost: false,
        ghostTimer: 0,
        ghostTarget: null,
        alive: true,
        escaping: false,
        fireTimer: 0,
        fireActive: false,
        fireLen: 0,
        fireDir: 0,
        moveDelay: flr(rnd(30)),
        crushable: true,
      });
    }

    // Spawn rocks
    const rockPositions = [
      { gx: 5, gy: SKY_ROWS + 1 },
      { gx: GRID_W - 6, gy: SKY_ROWS + 4 },
      { gx: 4, gy: SKY_ROWS + 7 },
      { gx: GRID_W - 5, gy: SKY_ROWS + 10 },
    ];
    for (let i = 0; i < min(2 + flr(level / 2), 4); i++) {
      if (i < rockPositions.length) {
        const rp = rockPositions[i];
        rocks.push({
          gx: rp.gx, gy: rp.gy,
          px: FIELD_X + rp.gx * CELL,
          py: FIELD_Y + rp.gy * CELL,
          state: "idle", // idle, shaking, falling, landed
          shakeTimer: 0,
          fallSpeed: 0,
          crushedEnemies: 0,
          landTimer: 0,
        });
        // Ensure dirt around rock is present
        dirt[rp.gy][rp.gx] = 0; // rock occupies this cell
      }
    }
  }

  // --- Sound effects ---
  function pumpSound() { note(0, "G5", 0.04); }
  function popSound() {
    note(0, "C4", 0.06);
    setTimeout(() => note(0, "E3", 0.08), 50);
  }
  function crushSound() {
    note(0, "C3", 0.1); note(1, "G2", 0.1);
  }
  function deathSound() {
    note(0, "E3", 0.12); note(1, "C3", 0.15);
    setTimeout(() => { note(0, "C3", 0.2); }, 120);
  }
  function levelClearSound() {
    note(0, "C5", 0.08);
    setTimeout(() => note(0, "E5", 0.08), 80);
    setTimeout(() => note(0, "G5", 0.08), 160);
    setTimeout(() => note(0, "C6", 0.12), 240);
  }
  function walkSound() {
    note(1, "A5", 0.02);
  }
  function digSound() {
    note(1, "C4", 0.03);
  }

  // --- Movement helpers ---
  const DX = [1, -1, 0, 0];
  const DY = [0, 0, -1, 1];

  function canMoveEntity(gx, gy, dir, allowDig) {
    const nx = gx + DX[dir];
    const ny = gy + DY[dir];
    if (nx < 0 || nx >= GRID_W || ny < 0 || ny >= GRID_H) return false;
    // Check rocks
    for (const r of rocks) {
      if (r.state !== "landed" && r.gx === nx && r.gy === ny) return false;
    }
    if (allowDig) return true;
    return isTunnel(nx, ny);
  }

  function moveStep(entity, speed) {
    if (!entity.moving) return;
    const tx = FIELD_X + entity.targetGx * CELL;
    const ty = FIELD_Y + entity.targetGy * CELL;
    const dx = tx - entity.px;
    const dy = ty - entity.py;
    const dist = Math.sqrt(dx * dx + dy * dy);
    if (dist < speed + 0.5) {
      entity.px = tx;
      entity.py = ty;
      entity.gx = entity.targetGx;
      entity.gy = entity.targetGy;
      entity.moving = false;
    } else {
      entity.px += (dx / dist) * speed;
      entity.py += (dy / dist) * speed;
    }
  }

  function startMove(entity, dir, allowDig) {
    if (entity.moving) return false;
    const nx = entity.gx + DX[dir];
    const ny = entity.gy + DY[dir];
    if (nx < 0 || nx >= GRID_W || ny < 0 || ny >= GRID_H) return false;
    // Check rocks
    for (const r of rocks) {
      if (r.state !== "landed" && r.gx === nx && r.gy === ny) return false;
    }
    if (!allowDig && !isTunnel(nx, ny)) return false;
    entity.targetGx = nx;
    entity.targetGy = ny;
    entity.moving = true;
    entity.dir = dir;
    return true;
  }

  function addScorePopup(x, y, pts) {
    scorePopups.push({ x: x, y: y, pts: pts, timer: 40 });
  }

  function addParticles(x, y, count, col) {
    for (let i = 0; i < count; i++) {
      particles.push({
        x: x + rnd(16), y: y + rnd(16),
        vx: rnd(3) - 1.5, vy: rnd(3) - 1.5,
        life: 8 + flr(rnd(12)),
        color: col || (flr(rnd(3)) + 1)
      });
    }
  }

  // --- Scenes ---
  Mono.scene(TITLE, {
    init() {},
    update() {
      if (btnp("start") || btnp("a")) {
        note(0, "C5", 0.08);
        setTimeout(() => note(0, "E5", 0.08), 80);
        setTimeout(() => note(0, "G5", 0.12), 160);
        Mono.go(PLAY); return;
      }
    },
    draw() { drawTitle(); }
  });

  Mono.scene(GAMEOVER, {
    init() {},
    update() {
      for (let i = particles.length - 1; i >= 0; i--) {
        const p = particles[i]; p.x += p.vx; p.y += p.vy; p.vy += 0.06; p.life--;
        if (p.life <= 0) particles.splice(i, 1);
      }
      if (btnp("start") || btnp("a")) { Mono.go(TITLE); return; }
    },
    draw() { drawGameOver(); }
  });

  Mono.scene(CLEAR, {
    init() { levelTimer = 0; levelClearShowing = true; },
    update() {
      levelTimer++;
      if (levelTimer > 90) {
        startLevel();
        Mono.go(PLAY); return;
      }
    },
    draw() { drawPlayState(); }
  });

  Mono.scene(PLAY, {
    init() { resetGame(); levelClearShowing = false; },
    update() {
    // --- Play state ---
    levelTimer++;

    // Respawn delay
    if (!player.alive) {
      respawnTimer++;
      for (let i = particles.length - 1; i >= 0; i--) {
        const p = particles[i]; p.x += p.vx; p.y += p.vy; p.vy += 0.06; p.life--;
        if (p.life <= 0) particles.splice(i, 1);
      }
      if (respawnTimer > 60) {
        if (lives <= 0) {
          Mono.go(GAMEOVER); return;
        }
        player.alive = true;
        player.gx = flr(GRID_W / 2);
        player.gy = SKY_ROWS;
        player.px = FIELD_X + player.gx * CELL;
        player.py = FIELD_Y + player.gy * CELL;
        player.moving = false;
        respawnTimer = 0;
      }
      return;
    }

    // Player movement
    let wantDir = -1;
    if (btn("right")) wantDir = 0;
    else if (btn("left")) wantDir = 1;
    else if (btn("up")) wantDir = 2;
    else if (btn("down")) wantDir = 3;

    if (!hoseActive) {
      if (wantDir >= 0) {
        player.dir = wantDir;
        if (!player.moving) {
          if (startMove(player, wantDir, true)) {
            // Dig as we move
            const tg = { x: player.targetGx, y: player.targetGy };
            if (isDirt(tg.x, tg.y)) {
              digAt(tg.x, tg.y);
              digSound();
            } else {
              walkSndTimer++;
              if (walkSndTimer % 6 === 0) walkSound();
            }
          }
        }
      }
      moveStep(player, 2.0);
    }

    // Hose / pump mechanic (Z / A button)
    if (hoseCooldown > 0) hoseCooldown--;

    if (btnp("a") && !hoseActive && hoseCooldown <= 0 && !player.moving) {
      hoseActive = true;
      hoseLen = 0;
      hoseDir = player.dir;
      hoseMaxLen = 4; // cells reach
      pumpSound();
    }

    if (hoseActive) {
      if (btn("a")) {
        hoseLen = min(hoseLen + 0.3, hoseMaxLen);
        // Check if hose hits an enemy
        const hLen = flr(hoseLen);
        for (let d = 1; d <= hLen; d++) {
          const hx = player.gx + DX[hoseDir] * d;
          const hy = player.gy + DY[hoseDir] * d;
          // Stop at dirt
          if (isDirt(hx, hy)) { hoseLen = d - 0.5; break; }
          // Check enemy hit
          for (const e of enemies) {
            if (e.alive && e.gx === hx && e.gy === hy && !e.ghost) {
              // Pump enemy
              e.inflate++;
              e.deflateTimer = 45; // ticks before deflating
              pumpSound();
              if (e.inflate >= 3) {
                // Pop!
                e.alive = false;
                const depthBonus = flr((e.gy - SKY_ROWS) / 4);
                const pts = (e.type === "fygar" ? 300 : 200) + depthBonus * 100;
                score += pts;
                addScorePopup(e.px, e.py, pts);
                addParticles(e.px, e.py, 10, 3);
                popSound();
              }
              hoseActive = false;
              hoseCooldown = 8;
              break;
            }
          }
          if (!hoseActive) break;
        }
      } else {
        // Released button
        hoseActive = false;
        hoseCooldown = 6;
      }
    }

    // Enemy deflation
    for (const e of enemies) {
      if (!e.alive) continue;
      if (e.inflate > 0) {
        e.deflateTimer--;
        if (e.deflateTimer <= 0) {
          e.inflate--;
          e.deflateTimer = 45;
        }
      }
    }

    // Enemy AI
    for (const e of enemies) {
      if (!e.alive || e.inflate > 0) continue;

      e.moveDelay--;
      if (e.moveDelay > 0) continue;
      e.moveDelay = 0;

      // Check if should ghost
      if (!e.ghost && !e.moving) {
        e.ghostTimer++;
        // Ghost when stuck or periodically
        const canMoveAnywhere = [0,1,2,3].some(d => canMoveEntity(e.gx, e.gy, d, false));
        if (!canMoveAnywhere || (e.ghostTimer > 120 + flr(rnd(120)))) {
          e.ghost = true;
          e.ghostTimer = 60 + flr(rnd(60)); // ghost duration
          // Pick target: move toward player
          e.ghostTarget = { gx: player.gx, gy: player.gy };
        }
      }

      if (e.ghost) {
        // Move through dirt toward player
        e.ghostTimer--;
        if (e.ghostTimer <= 0 && isTunnel(e.gx, e.gy)) {
          e.ghost = false;
          e.ghostTimer = 0;
        }
        // Move toward player through anything
        if (!e.moving) {
          const dx = player.gx - e.gx;
          const dy = player.gy - e.gy;
          let bestDir = 0;
          if (_abs(dx) > _abs(dy)) {
            bestDir = dx > 0 ? 0 : 1;
          } else {
            bestDir = dy > 0 ? 3 : 2;
          }
          const nx = e.gx + DX[bestDir];
          const ny = e.gy + DY[bestDir];
          if (nx >= 0 && nx < GRID_W && ny >= 0 && ny < GRID_H) {
            e.targetGx = nx;
            e.targetGy = ny;
            e.moving = true;
            e.dir = bestDir;
          }
        }
        moveStep(e, e.speed * 0.7);
      } else {
        // Normal tunnel movement
        if (!e.moving) {
          // Last enemy escapes to surface
          const aliveCount = enemies.filter(en => en.alive).length;
          if (aliveCount === 1 && !e.escaping) {
            e.escaping = true;
            lastEnemyEscaping = true;
          }

          if (e.escaping) {
            // Move toward top
            if (e.gy > SKY_ROWS) {
              // Try up first
              if (canMoveEntity(e.gx, e.gy, 2, false)) {
                startMove(e, 2, false);
              } else {
                // Try to find path sideways
                const dirs = [0, 1, 2, 3].filter(d => canMoveEntity(e.gx, e.gy, d, false));
                if (dirs.length > 0) {
                  const best = dirs.sort((a, b) => {
                    const ay = e.gy + DY[a], by = e.gy + DY[b];
                    return ay - by; // prefer lower y (upward)
                  })[0];
                  startMove(e, best, false);
                } else {
                  // Ghost to escape
                  e.ghost = true;
                  e.ghostTimer = 40;
                }
              }
            } else {
              // At surface - run off screen
              if (e.gx < GRID_W / 2) {
                if (canMoveEntity(e.gx, e.gy, 1, false)) startMove(e, 1, false);
                else startMove(e, 0, false);
              } else {
                if (canMoveEntity(e.gx, e.gy, 0, false)) startMove(e, 0, false);
                else startMove(e, 1, false);
              }
              if (e.gx <= 0 || e.gx >= GRID_W - 1) {
                e.alive = false; // escaped
              }
            }
          } else {
            // Chase player through tunnels
            const dx = player.gx - e.gx;
            const dy = player.gy - e.gy;
            let preferred = [];
            if (_abs(dx) > _abs(dy)) {
              preferred = dx > 0 ? [0, 3, 2, 1] : [1, 2, 3, 0];
            } else {
              preferred = dy > 0 ? [3, 0, 1, 2] : [2, 1, 0, 3];
            }
            const reverseDir = e.dir ^ 1;
            let moved = false;
            for (const d of preferred) {
              if (d === reverseDir && preferred.filter(dd => canMoveEntity(e.gx, e.gy, dd, false)).length > 1) continue;
              if (canMoveEntity(e.gx, e.gy, d, false)) {
                startMove(e, d, false);
                moved = true;
                break;
              }
            }
            if (!moved) {
              if (canMoveEntity(e.gx, e.gy, reverseDir, false)) {
                startMove(e, reverseDir, false);
              }
            }
          }
        }
        moveStep(e, e.speed);
      }

      // Fygar fire breath
      if (e.type === "fygar" && !e.ghost && !e.moving && !e.escaping && e.inflate === 0) {
        e.fireTimer--;
        if (e.fireTimer <= 0) {
          e.fireTimer = 60 + flr(rnd(90));
          const dx = player.px - e.px;
          if ((e.dir === 0 && dx > 0) || (e.dir === 1 && dx < 0)) {
            e.fireActive = true;
            e.fireLen = 0;
            e.fireDir = e.dir;
          }
        }
      }
      if (e.fireActive) {
        e.fireLen += 0.4;
        if (e.fireLen >= 3) {
          e.fireActive = false;
          e.fireLen = 0;
        }
        // Check fire hit player (circle collision on fire segments)
        const fireReach = flr(e.fireLen);
        for (let d = 1; d <= fireReach; d++) {
          const fx = e.gx + DX[e.fireDir] * d;
          const fy = e.gy;
          if (isDirt(fx, fy)) break;
          // Circle collision: fire center vs player center
          const fireCX = FIELD_X + fx * CELL + 8;
          const fireCY = FIELD_Y + fy * CELL + 8;
          if (player.alive && circCollide(fireCX, fireCY, 7, entityCX(player), entityCY(player), 6)) {
            killPlayer();
            break;
          }
        }
      }
    }

    // Enemy-player collision (circle-based for round Pooka, rect for Fygar)
    for (const e of enemies) {
      if (!e.alive || !player.alive) continue;
      if (e.inflate > 0) continue;
      if (e.type === "pooka") {
        // Pooka is round - circle collision
        if (circCollide(entityCX(e), entityCY(e), 7, entityCX(player), entityCY(player), 6)) {
          killPlayer();
        }
      } else {
        // Fygar - rect collision
        if (rectOverlap(e.px + 2, e.py + 2, 12, 12, player.px + 2, player.py + 2, 12, 12)) {
          killPlayer();
        }
      }
    }

    // Rock physics
    for (const r of rocks) {
      if (r.state === "landed") continue;

      if (r.state === "idle") {
        // Check if dirt below has been removed
        const below = r.gy + 1;
        if (below < GRID_H && !isDirt(r.gx, below)) {
          r.state = "shaking";
          r.shakeTimer = 20;
        }
      }

      if (r.state === "shaking") {
        r.shakeTimer--;
        if (r.shakeTimer <= 0) {
          r.state = "falling";
          r.fallSpeed = 0;
        }
      }

      if (r.state === "falling") {
        r.fallSpeed = min(r.fallSpeed + 0.3, 4);
        r.py += r.fallSpeed;
        // Update grid position
        const newGy = flr((r.py - FIELD_Y + 8) / CELL);
        r.gy = newGy;
        r.gx = flr((r.px - FIELD_X + 8) / CELL);

        // Check collision with enemies (circle for Pooka, rect for Fygar)
        for (const e of enemies) {
          if (!e.alive) continue;
          const rockCX = r.px + 8;
          const rockCY = r.py + 8;
          let hit = false;
          if (e.type === "pooka") {
            hit = circCollide(rockCX, rockCY, 7, entityCX(e), entityCY(e), 7);
          } else {
            hit = rectOverlap(r.px + 1, r.py + 1, 14, 14, e.px + 2, e.py + 2, 12, 12);
          }
          if (hit) {
            e.alive = false;
            r.crushedEnemies++;
            addParticles(e.px, e.py, 8, 2);
            crushSound();
            const pts = r.crushedEnemies === 1 ? 1000 : r.crushedEnemies * 1000;
            score += pts;
            addScorePopup(e.px, e.py, pts);
          }
        }

        // Check collision with player (rect)
        if (player.alive) {
          if (rectOverlap(r.px + 1, r.py + 1, 14, 14, player.px + 2, player.py + 2, 12, 12)) {
            killPlayer();
          }
        }

        // Check landing
        const checkGy = flr((r.py - FIELD_Y + 16) / CELL);
        if (checkGy >= GRID_H || (isDirt(r.gx, checkGy) && r.py >= FIELD_Y + (checkGy - 1) * CELL)) {
          r.state = "landed";
          r.landTimer = 30;
          r.py = FIELD_Y + (checkGy - 1) * CELL;
          r.gy = checkGy - 1;
          crushSound();
          addParticles(r.px, r.py + 16, 6, 1);
        }
        // Also stop at bottom
        if (r.py >= FIELD_Y + (GRID_H - 1) * CELL) {
          r.state = "landed";
          r.py = FIELD_Y + (GRID_H - 1) * CELL;
          r.gy = GRID_H - 1;
        }
      }
    }

    // Particles
    for (let i = particles.length - 1; i >= 0; i--) {
      const p = particles[i];
      p.x += p.vx; p.y += p.vy; p.vy += 0.05; p.life--;
      if (p.life <= 0) particles.splice(i, 1);
    }

    // Score popups
    for (let i = scorePopups.length - 1; i >= 0; i--) {
      scorePopups[i].y -= 0.5;
      scorePopups[i].timer--;
      if (scorePopups[i].timer <= 0) scorePopups.splice(i, 1);
    }

    // Check level clear
    const aliveEnemies = enemies.filter(e => e.alive);
    if (aliveEnemies.length === 0 && player.alive) {
      levelClearSound();
      Mono.go(CLEAR); return;
    }
    },
    draw() { drawPlayState(); }
  });

  function killPlayer() {
    if (!player.alive) return;
    player.alive = false;
    lives--;
    respawnTimer = 0;
    hoseActive = false;
    addParticles(player.px, player.py, 12, 3);
    deathSound();
  }

  // ============================================================
  // Play Draw
  // ============================================================
  function drawPlayState() {
    cls(0);

    // --- Draw playfield ---

    // Sky (top rows - lighter color)
    rectf(FIELD_X, FIELD_Y, GRID_W * CELL, SKY_ROWS * CELL, 0);

    // Draw dirt
    for (let gy = SKY_ROWS; gy < GRID_H; gy++) {
      for (let gx = 0; gx < GRID_W; gx++) {
        const px = FIELD_X + gx * CELL;
        const py = FIELD_Y + gy * CELL;
        if (dirt[gy][gx] === 1) {
          // Dirt - vary shade by depth
          const depth = gy - SKY_ROWS;
          let col;
          if (depth < 3) col = 2;       // light dirt
          else if (depth < 7) col = 1;  // medium dirt
          else col = 1;                  // dark dirt
          // Draw dirt cell with subtle pattern
          rectf(px, py, CELL, CELL, col);
          // Add texture dots (scaled for 16x16 cells)
          if ((gx + gy) % 3 === 0) pix(px + 4, py + 4, col === 2 ? 3 : 2);
          if ((gx + gy) % 5 === 0) pix(px + 10, py + 10, col === 2 ? 3 : 2);
          if ((gx + gy) % 4 === 1) pix(px + 12, py + 2, col === 2 ? 1 : 2);
        } else {
          // Tunnel - dark background
          rectf(px, py, CELL, CELL, 0);
        }
      }
    }

    // Draw tunnel borders (edges where dirt meets tunnel)
    for (let gy = SKY_ROWS; gy < GRID_H; gy++) {
      for (let gx = 0; gx < GRID_W; gx++) {
        if (dirt[gy][gx] === 0) {
          const px = FIELD_X + gx * CELL;
          const py = FIELD_Y + gy * CELL;
          // Draw subtle edge highlights
          if (gx > 0 && dirt[gy][gx - 1] === 1) {
            for (let yy = 0; yy < CELL; yy++) pix(px, py + yy, 1);
          }
          if (gx < GRID_W - 1 && dirt[gy][gx + 1] === 1) {
            for (let yy = 0; yy < CELL; yy++) pix(px + CELL - 1, py + yy, 1);
          }
          if (gy > SKY_ROWS && dirt[gy - 1] && dirt[gy - 1][gx] === 1) {
            for (let xx = 0; xx < CELL; xx++) pix(px + xx, py, 1);
          }
          if (gy < GRID_H - 1 && dirt[gy + 1] && dirt[gy + 1][gx] === 1) {
            for (let xx = 0; xx < CELL; xx++) pix(px + xx, py + CELL - 1, 1);
          }
        }
      }
    }

    // Draw depth indicators on the left side
    for (let i = 0; i < 4; i++) {
      const ly = FIELD_Y + (SKY_ROWS + i * 3) * CELL;
      rectf(FIELD_X - 3, ly, 3, 8, 2);
    }

    // Draw surface (flowers/plants on sky row)
    for (let gx = 0; gx < GRID_W; gx++) {
      const px = FIELD_X + gx * CELL;
      const py = FIELD_Y + (SKY_ROWS - 1) * CELL;
      if (gx % 3 === 0) {
        // Little plant (scaled up)
        pix(px + 6, py + 10, 2);
        pix(px + 6, py + 8, 2);
        pix(px + 4, py + 6, 2);
        pix(px + 8, py + 6, 2);
        pix(px + 6, py + 4, 3);
      }
    }

    // Playfield border
    rect(FIELD_X - 1, FIELD_Y - 1, GRID_W * CELL + 2, GRID_H * CELL + 2, 1);

    // Draw rocks
    for (const r of rocks) {
      if (r.state === "landed" && r.landTimer <= 0) continue;
      if (r.state === "landed") { r.landTimer--; }
      const rx = r.state === "shaking" ? r.px + flr(rnd(3)) - 1 : r.px;
      const sprId = r.state === "shaking" || r.state === "falling" ? 12 : 11;
      spr(sprId, flr(rx), flr(r.py));
      // Debug hitbox: rock rect
      Mono.dbg(r.px + 1, r.py + 1, 14, 14);
    }

    // Draw enemies
    for (const e of enemies) {
      if (!e.alive) continue;
      const ex = flr(e.px);
      const ey = flr(e.py);

      if (e.ghost) {
        // Ghost mode: flicker
        if (Mono.frame % 4 < 2) {
          spr(15, ex, ey);
        }
      } else if (e.inflate > 0) {
        // Inflated
        const sprBase = e.type === "pooka" ? 5 : 8;
        const inflSpr = sprBase + min(e.inflate, 2);
        spr(inflSpr, ex, ey);
      } else {
        // Normal
        const sprId = e.type === "pooka" ? 5 : 8;
        const flipX = e.dir === 1;
        spr(sprId, ex, ey, flipX);
      }

      // Debug hitboxes: circle for Pooka, rect for Fygar
      if (e.type === "pooka") {
        Mono.dbgC(entityCX(e), entityCY(e), 7);
      } else {
        Mono.dbg(e.px + 2, e.py + 2, 12, 12);
      }

      // Draw fygar fire
      if (e.fireActive && e.type === "fygar") {
        const fireReach = flr(e.fireLen);
        for (let d = 1; d <= fireReach; d++) {
          const fx = ex + DX[e.fireDir] * d * CELL;
          const fy = ey;
          spr(16, fx, fy, e.fireDir === 1);
          // Debug: circle for fire segment
          Mono.dbgC(fx + 8, fy + 8, 7);
        }
      }
    }

    // Draw hose
    if (hoseActive && hoseLen > 0) {
      const hLen = flr(hoseLen);
      const startX = player.px + 8 + DX[hoseDir] * 8;
      const startY = player.py + 8 + DY[hoseDir] * 8;
      const endX = startX + DX[hoseDir] * hLen * CELL;
      const endY = startY + DY[hoseDir] * hLen * CELL;
      // Draw hose line
      line(flr(startX), flr(startY), flr(endX), flr(endY), 3);
      line(flr(startX), flr(startY) + 1, flr(endX), flr(endY) + 1, 2);
      // Hose tip (circle)
      circf(flr(endX), flr(endY), 3, 3);
      // Debug: hose tip
      Mono.dbgC(flr(endX), flr(endY), 3);
    }

    // Draw player
    if (player.alive) {
      const pSpr = player.dir === 0 ? 1 : player.dir === 1 ? 2 : player.dir === 2 ? 3 : 4;
      spr(pSpr, flr(player.px), flr(player.py));
      // Debug: player hitbox (circle since player is round-ish)
      Mono.dbgC(entityCX(player), entityCY(player), 6);
    }

    // Particles
    for (const p of particles) {
      pix(flr(p.x), flr(p.y), p.color);
    }

    // Score popups
    for (const sp of scorePopups) {
      const alpha = sp.timer > 10 ? 3 : 2;
      text(String(sp.pts), flr(sp.x) - 4, flr(sp.y), alpha);
    }

    // HUD (within 320x240 bounds)
    rectf(0, 0, W, 16, 0);
    text("SCORE:" + score, 3, 3, 3);
    text("LV:" + level, 140, 3, 2);
    // Lives icons: spaced properly to stay within 320 width (each icon 16px + 2px gap)
    for (let i = 0; i < lives; i++) spr(14, W - 56 + i * 18, 0);

    // Level clear message
    if (levelClearShowing) {
      const msgX = FIELD_X + flr((GRID_W * CELL - 110) / 2);
      const msgY = FIELD_Y + flr((GRID_H * CELL - 24) / 2);
      rectf(msgX, msgY, 110, 24, 0);
      rect(msgX, msgY, 110, 24, 3);
      text("ROUND CLEAR!", msgX + 12, msgY + 8, 3);
    }

    // Bottom info (within bounds)
    text("ROUND " + level, 3, H - 10, 1);
  }

  function drawTitle() {
    // Background with some dirt feel
    rectf(0, 0, W, H, 0);

    // Decorative dirt layers
    for (let y = 90; y < H; y += 2) {
      const shade = y > 150 ? 1 : 2;
      for (let x = 0; x < W; x += 3) {
        if (rnd(1) < 0.3) pix(x, y, shade);
      }
    }

    const ty = 28 + sin(Mono.frame * 0.04) * 3;

    // Title
    text("DIG DUG", 130, flr(ty), 3);
    text("DIG DUG", 131, flr(ty) + 1, 1);
    rectf(100, flr(ty) + 12, 120, 1, 2);

    // Show characters (16x16 sprites)
    const bx = W / 2 - 44;
    const by = flr(ty) + 20;
    spr(1, bx, by + sin(Mono.frame * 0.06) * 3);
    spr(5, bx + 24, by + 2 + sin(Mono.frame * 0.06 + 1) * 3);
    spr(8, bx + 48, by + sin(Mono.frame * 0.06 + 2) * 3);
    spr(11, bx + 72, by + 2 + sin(Mono.frame * 0.06 + 3) * 2);

    if (flr(Mono.frame / 20) % 2 === 0) {
      text("PRESS START", 118, 120, 3);
    }

    // Score table
    text("-HOW TO PLAY-", 115, 140, 2);
    spr(5, 90, 152); text("POOKA   200 PTS", 110, 156, 2);
    spr(8, 90, 170); text("FYGAR   300 PTS", 110, 174, 2);
    spr(11, 90, 188); text("ROCK  1000 PTS", 110, 192, 2);

    text("DIG TUNNELS  PUMP ENEMIES", 70, 212, 2);
    text("DROP ROCKS FOR BONUS!", 82, 222, 2);

    text("MONO DEMO V0.1", 118, 232, 1);
  }

  function drawGameOver() {
    cls(0);
    for (const p of particles) pix(flr(p.x), flr(p.y), p.color);

    text("GAME OVER", 125, 75, 3);
    text("SCORE: " + score, 115, 98, 2);
    text("ROUND: " + level, 118, 111, 2);

    if (flr(Mono.frame / 20) % 2 === 0) {
      text("PRESS START", 118, 150, 3);
    }
  }

  // ============================================================
  // Boot
  // ============================================================
  Mono.go(TITLE);
  Mono.boot("screen");
})();
</script>
