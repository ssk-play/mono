<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GrayBox — Demo: Balloon Fight</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #0a0a0a;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100vh;
    font-family: monospace;
    overflow: hidden;
  }
  #frame {
    background: #111;
    border: 3px solid #333;
    border-radius: 8px;
    padding: 12px;
    box-shadow: 0 0 40px rgba(0,0,0,0.8), inset 0 0 20px rgba(0,0,0,0.5);
  }
  canvas {
    display: block;
    image-rendering: pixelated;
    image-rendering: crisp-edges;
  }
  #controls {
    margin-top: 12px;
    color: #6b6b6b;
    font-size: 11px;
    text-align: center;
    letter-spacing: 1px;
  }
  #controls span { color: #b0b0b0; }
</style>
</head>
<body>
<div id="frame">
  <canvas id="screen"></canvas>
</div>
<div id="controls">
  <span>←→</span> MOVE &nbsp;&nbsp; <span>A</span> FLAP
</div>
<script src="../../runtime/engine.js"></script>
<script>
(() => {
  "use strict";
  const W = GrayBox.WIDTH, H = GrayBox.HEIGHT;
  const { cls, pix, line, rect, rectf, circ, circf, sprite: defSprite,
          spr, sprT, text, btn, btnp, note, stop, rnd, flr, abs: _abs,
          min, max: _max, sin, cos } = GrayBox;

  // --- Sprites ---

  // 1: Player body (facing right) — little guy with helmet and arms out
  defSprite(1,
    "00222000" +
    "02332200" +
    "02222200" +
    "00233000" +
    "02233200" +
    "00222000" +
    "00200200" +
    "00200200"
  );

  // 2: Balloon (round, tied at bottom)
  defSprite(2,
    "00333000" +
    "03333300" +
    "33333330" +
    "33333330" +
    "03333300" +
    "00333000" +
    "00030000" +
    "00030000"
  );

  // 3: Enemy body (facing right) — bird-like enemy
  defSprite(3,
    "00111000" +
    "01221100" +
    "01111100" +
    "00122000" +
    "01122100" +
    "00111000" +
    "00100100" +
    "00100100"
  );

  // 4: Enemy balloon
  defSprite(4,
    "00222000" +
    "02222200" +
    "22222220" +
    "22222220" +
    "02222200" +
    "00222000" +
    "00020000" +
    "00020000"
  );

  // 5: Parachute
  defSprite(5,
    "02222200" +
    "23333320" +
    "33333330" +
    "20000020" +
    "02000200" +
    "00202000" +
    "00020000" +
    "00000000"
  );

  // 6: Platform tile (grassy top, solid below)
  defSprite(6,
    "22222222" +
    "33333333" +
    "31313131" +
    "11111111" +
    "11111111" +
    "11111111" +
    "11111111" +
    "11111111"
  );

  // 7: Water surface tile (wavy)
  defSprite(7,
    "00000000" +
    "00000000" +
    "00200020" +
    "02020202" +
    "20002000" +
    "01010101" +
    "10001000" +
    "01010101"
  );

  // 8: Cloud tile
  defSprite(8,
    "00000000" +
    "00222000" +
    "02222200" +
    "22222222" +
    "22222222" +
    "02222220" +
    "00000000" +
    "00000000"
  );

  // 9: Lightning bolt
  defSprite(9,
    "00003300" +
    "00033000" +
    "00330000" +
    "03333300" +
    "00033000" +
    "00330000" +
    "03300000" +
    "00000000"
  );

  // 10: Fish (in water, jumps up to eat)
  defSprite(10,
    "00000000" +
    "00110000" +
    "01111020" +
    "11111120" +
    "01111020" +
    "00110000" +
    "00000000" +
    "00000000"
  );

  // 11: Life icon (small balloon)
  defSprite(11,
    "00000000" +
    "00330000" +
    "03333000" +
    "03333000" +
    "00330000" +
    "00300000" +
    "00000000" +
    "00000000"
  );

  // 12: Bubble (for water)
  defSprite(12,
    "00000000" +
    "00000000" +
    "00220000" +
    "02002000" +
    "02002000" +
    "00220000" +
    "00000000" +
    "00000000"
  );

  // 13: Flapping wing frame (arms up)
  defSprite(13,
    "00222000" +
    "02332200" +
    "02222200" +
    "20233020" +
    "02233200" +
    "00222000" +
    "00200200" +
    "00200200"
  );

  // 14: Enemy flap frame
  defSprite(14,
    "00111000" +
    "01221100" +
    "01111100" +
    "10122010" +
    "01122100" +
    "00111000" +
    "00100100" +
    "00100100"
  );

  // --- Constants ---
  const GRAVITY = 0.12;
  const FLAP_POWER = -1.8;
  const MAX_FALL = 2.5;
  const MAX_RISE = -3.0;
  const MOVE_SPEED = 1.5;
  const WATER_Y = 216;
  const PLAT_H = 8;

  // --- Platforms ---
  // Each: {x, y, w} where w is in tiles (8px each)
  const PLATFORMS = [
    // Bottom row near water
    { x: 0, y: 204, w: 5 },
    { x: 277, y: 204, w: 5 },
    // Middle platforms
    { x: 53, y: 165, w: 7 },
    { x: 197, y: 165, w: 7 },
    // Upper middle
    { x: 112, y: 126, w: 8 },
    // Top platforms
    { x: 27, y: 90, w: 5 },
    { x: 224, y: 90, w: 5 },
    // Very top
    { x: 117, y: 57, w: 7 },
  ];

  // --- Clouds (spawn lightning) ---
  const CLOUDS = [
    { x: 40, y: 22, w: 3 },
    { x: 133, y: 15, w: 4 },
    { x: 240, y: 22, w: 3 },
  ];

  // --- Game State ---
  const { TITLE, PLAY, GAMEOVER } = GrayBox.SCENE;
  let player, enemies, particles, bubbles;
  let score, lives, wave, waveTimer, waveMsg;
  let lightnings, fishObj;
  let invTimer;
  let titleBlink;

  function makePlayer() {
    return {
      x: 160, y: 150, vx: 0, vy: 0,
      balloons: 2,
      facing: 1, // 1=right, -1=left
      flapAnim: 0,
      dead: false,
      respawnTimer: 0,
    };
  }

  function resetGame() {
    player = makePlayer();
    enemies = [];
    particles = [];
    bubbles = [];
    lightnings = [];
    score = 0;
    lives = 3;
    wave = 0;
    waveTimer = 0;
    waveMsg = 0;
    invTimer = 0;
    fishObj = { x: 160, y: WATER_Y + 16, state: "hidden", timer: 0, targetX: 0, vy: 0 };
    spawnWave();
  }

  function spawnWave() {
    wave++;
    waveMsg = 90;
    const count = min(2 + wave, 8);
    for (let i = 0; i < count; i++) {
      const px = 40 + (i % 4) * 67 + rnd(27);
      const py = 30 + flr(i / 4) * 45 + rnd(22);
      enemies.push({
        x: px, y: py, vx: (rnd(1) > 0.5 ? 1 : -1) * (0.5 + rnd(0.8)),
        vy: -0.5 + rnd(1),
        balloons: 1 + (wave > 2 && rnd(1) > 0.5 ? 1 : 0),
        facing: 1,
        flapAnim: 0,
        flapTimer: flr(rnd(30)),
        state: "flying", // "flying", "falling", "grounded"
        parachuteTimer: 0,
        reinflateTimer: 0,
        pts: 500,
        speed: 0.5 + wave * 0.08 + rnd(0.3),
      });
    }
  }

  function flapSound() { note(0, "E5", 0.03); }
  function popSound() { note(1, "G5", 0.05); setTimeout(() => note(1, "C5", 0.05), 30); }
  function bumpSound() { note(0, "C3", 0.06); }
  function splashSound() { note(0, "D3", 0.1); note(1, "A2", 0.1); }
  function deathSound() {
    note(0, "C3", 0.12); note(1, "G2", 0.12);
    setTimeout(() => { note(0, "A2", 0.18); note(1, "E2", 0.18); }, 120);
  }
  function lightningSound() { note(1, "B5", 0.04); setTimeout(() => note(1, "D6", 0.03), 30); }
  function waveClearSound() {
    note(0, "C5", 0.1);
    setTimeout(() => note(0, "E5", 0.1), 100);
    setTimeout(() => note(0, "G5", 0.1), 200);
    setTimeout(() => note(0, "C6", 0.15), 300);
  }

  function addParticles(x, y, count, col) {
    for (let i = 0; i < count; i++) {
      particles.push({
        x: x, y: y,
        vx: rnd(4) - 2, vy: rnd(3) - 2,
        life: 8 + flr(rnd(12)),
        color: col || (flr(rnd(3)) + 1),
      });
    }
  }

  function platformCollision(x, y, w, h, vy) {
    // Only collide when moving down
    if (vy < 0) return null;
    for (const p of PLATFORMS) {
      const pw = p.w * 8;
      if (x + w > p.x && x < p.x + pw && y + h >= p.y && y + h <= p.y + 6) {
        return p;
      }
    }
    return null;
  }

  function wrap(x) {
    if (x < -12) return W;
    if (x > W) return -12;
    return x;
  }

  // --- Title Scene ---
  GrayBox.scene(TITLE, {
    init() {},
    update() {
      if (btnp("a") || btnp("a")) {
        GrayBox.go(PLAY);
        note(0, "C5", 0.1);
        setTimeout(() => note(0, "E5", 0.1), 100);
        setTimeout(() => note(0, "G5", 0.15), 200);
      }
    },
    draw() {
      cls(0);
      drawBackground();

      // Title
      const blink = (GrayBox.frame % 40) < 30;
      text("BALLOON FIGHT", 126, 60, 3);
      text("GRAYBOX EDITION", 123, 72, 2);

      // Animated balloons on title
      const by = 98 + sin(GrayBox.frame * 0.08) * 8;
      drawBalloons(127, by, 2, 3);
      sprT(1, 131, by + 16, false, false);
      drawBalloons(180, by + 5, 1, 2);
      sprT(3, 184, by + 21, true, false);

      if (blink) text("PRESS A", 133, 150, 3);
      text("A TO FLAP  ARROWS TO MOVE", 98, 172, 1);
      text("POP ENEMY BALLOONS!", 113, 188, 2);
    }
  });

  // --- Play Scene ---
  GrayBox.scene(PLAY, {
    init() {
      resetGame();
    },
    update() {
    // --- Play State ---
    if (waveMsg > 0) waveMsg--;
    if (invTimer > 0) invTimer--;

    // --- Player ---
    if (!player.dead) {
      // Horizontal movement
      if (btn("left")) { player.vx -= 0.25; player.facing = -1; }
      if (btn("right")) { player.vx += 0.25; player.facing = 1; }
      player.vx *= 0.92; // friction
      if (_abs(player.vx) > MOVE_SPEED) player.vx = player.vx > 0 ? MOVE_SPEED : -MOVE_SPEED;

      // Flapping (A button)
      if (btnp("a") && player.balloons > 0) {
        player.vy = _max(MAX_RISE, player.vy + FLAP_POWER);
        player.flapAnim = 8;
        flapSound();
      }

      // Gravity
      player.vy += GRAVITY;
      if (player.vy > MAX_FALL) player.vy = MAX_FALL;
      if (player.balloons <= 0) player.vy += 0.05; // fall faster with no balloons

      // Flap animation countdown
      if (player.flapAnim > 0) player.flapAnim--;

      // Move
      player.x += player.vx;
      player.y += player.vy;

      // Screen wrap horizontal
      player.x = wrap(player.x);

      // Platform collision
      const plat = platformCollision(player.x + 1, player.y, 6, 16, player.vy);
      if (plat) {
        player.y = plat.y - 16;
        player.vy = 0;
      }

      // Water death
      if (player.y > WATER_Y - 4) {
        killPlayer();
      }

      // Ceiling
      if (player.y < -8) { player.y = -8; player.vy = 0.5; }

    } else {
      // Respawn timer
      player.respawnTimer--;
      if (player.respawnTimer <= 0) {
        if (lives > 0) {
          player = makePlayer();
          player.x = 160; player.y = 75;
          invTimer = 90; // brief invincibility
        } else {
          GrayBox.go(GAMEOVER);
          return;
        }
      }
    }

    // --- Enemies ---
    let aliveEnemies = 0;
    for (let i = enemies.length - 1; i >= 0; i--) {
      const e = enemies[i];

      if (e.state === "flying") {
        aliveEnemies++;
        // AI movement - flap periodically, drift toward player
        e.flapTimer--;
        if (e.flapTimer <= 0) {
          e.vy = _max(-2.5, e.vy - 1.2);
          e.flapAnim = 6;
          e.flapTimer = 15 + flr(rnd(25));
        }

        // Drift toward player somewhat
        if (!player.dead) {
          let dx = player.x - e.x;
          // Handle screen wrap
          if (_abs(dx) > W / 2) dx = dx > 0 ? dx - W : dx + W;
          e.vx += (dx > 0 ? 0.03 : -0.03) * e.speed;
        }

        e.vy += GRAVITY;
        if (e.vy > 2.0) e.vy = 2.0;
        e.vx *= 0.96;
        if (_abs(e.vx) > 1.5) e.vx = e.vx > 0 ? 1.5 : -1.5;

        e.facing = e.vx > 0 ? 1 : -1;
        if (e.flapAnim > 0) e.flapAnim--;

        e.x += e.vx;
        e.y += e.vy;
        e.x = wrap(e.x);

        // Platform collision for enemies
        const ePlat = platformCollision(e.x + 1, e.y, 6, 16, e.vy);
        if (ePlat) {
          e.y = ePlat.y - 16;
          e.vy = 0;
        }

        // Ceiling bounce
        if (e.y < 0) { e.y = 0; e.vy = 0.5; }

        // Water — enemy dies
        if (e.y > WATER_Y - 4) {
          addParticles(e.x, WATER_Y - 4, 6, 2);
          splashSound();
          score += e.pts;
          enemies.splice(i, 1);
          continue;
        }

        // Collision with player
        if (!player.dead && invTimer <= 0) {
          const px = player.x, py = player.y;
          const ex = e.x, ey = e.y;
          // Check if player is hitting enemy from above (player feet above enemy balloon top)
          if (_abs(px - ex) < 10) {
            if (py + 8 < ey + 4 && py + 16 > ey - 8 && player.vy >= 0) {
              // Player lands on enemy — pop a balloon
              e.balloons--;
              popSound();
              addParticles(e.x + 4, e.y - 4, 5, 3);
              player.vy = -2.5; // bounce up
              score += 200;
              if (e.balloons <= 0) {
                e.state = "falling";
                e.vy = -1;
                e.parachuteTimer = 20;
              }
            } else if (ey + 8 < py + 4 && ey + 16 > py - 8 && e.vy >= 0) {
              // Enemy lands on player — pop player balloon
              player.balloons--;
              popSound();
              addParticles(player.x + 4, player.y - 4, 5, 3);
              e.vy = -2.5;
              if (player.balloons <= 0) {
                killPlayer();
              }
            }
          }
        }
      }

      if (e.state === "falling") {
        // Parachute descent
        e.parachuteTimer--;
        if (e.parachuteTimer <= 0) {
          e.vy = 0.5; // slow fall with parachute
        } else {
          e.vy = _max(-1, e.vy);
        }
        e.vy += 0.02;
        if (e.vy > 0.8) e.vy = 0.8;
        e.x += e.vx * 0.3;
        e.y += e.vy;
        e.x = wrap(e.x);

        // Land on platform
        const ePlat2 = platformCollision(e.x + 1, e.y, 6, 16, e.vy);
        if (ePlat2) {
          e.y = ePlat2.y - 16;
          e.vy = 0;
          e.state = "grounded";
          e.reinflateTimer = 150 + flr(rnd(100)); // time before re-inflating
        }

        // Water
        if (e.y > WATER_Y - 4) {
          addParticles(e.x, WATER_Y - 4, 6, 2);
          splashSound();
          score += e.pts;
          enemies.splice(i, 1);
          continue;
        }

        // Player can bump grounded/falling enemies
        if (!player.dead && invTimer <= 0) {
          if (_abs(player.x - e.x) < 10 && _abs(player.y - e.y) < 14) {
            // Bump enemy — launch them
            e.vx = player.vx * 2 + (player.x < e.x ? 2 : -2);
            e.vy = -2;
            bumpSound();
            score += 100;
          }
        }
      }

      if (e.state === "grounded") {
        aliveEnemies++;
        e.reinflateTimer--;
        if (e.reinflateTimer <= 0) {
          // Re-inflate and start flying again
          e.balloons = 1;
          e.state = "flying";
          e.vy = -1.5;
          e.flapTimer = 10;
          e.speed = _max(e.speed, 0.6 + wave * 0.1); // gets faster
        }

        // Player can bump
        if (!player.dead && invTimer <= 0) {
          if (_abs(player.x - e.x) < 10 && _abs(player.y - e.y) < 14) {
            e.vx = player.vx * 2 + (player.x < e.x ? 3 : -3);
            e.vy = -2.5;
            e.state = "falling";
            e.parachuteTimer = 0;
            bumpSound();
            score += 100;
          }
        }
      }
    }

    // Check for wave clear
    if (aliveEnemies === 0 && enemies.length === 0) {
      waveTimer++;
      if (waveTimer > 60) {
        waveTimer = 0;
        waveClearSound();
        spawnWave();
      }
    } else {
      waveTimer = 0;
    }

    // --- Lightning ---
    // Random lightning from clouds
    if (flr(rnd(180)) === 0 && lightnings.length < 2) {
      const cloud = CLOUDS[flr(rnd(CLOUDS.length))];
      const lx = cloud.x + flr(rnd(cloud.w * 8));
      lightnings.push({
        x: lx, y: cloud.y + 16,
        timer: 20,
        segments: generateLightning(lx, cloud.y + 16, lx + rnd(20) - 10, cloud.y + 60),
      });
      lightningSound();
    }

    for (let i = lightnings.length - 1; i >= 0; i--) {
      lightnings[i].timer--;
      if (lightnings[i].timer <= 0) {
        lightnings.splice(i, 1);
        continue;
      }
      const l = lightnings[i];
      // Check if lightning hits player
      if (!player.dead && invTimer <= 0 && l.timer > 10) {
        for (const seg of l.segments) {
          if (_abs(player.x + 4 - seg.x) < 8 && _abs(player.y + 8 - seg.y) < 10) {
            killPlayer();
            break;
          }
        }
      }
      // Check if lightning hits enemies
      for (let j = enemies.length - 1; j >= 0; j--) {
        const e = enemies[j];
        if (e.state !== "flying") continue;
        for (const seg of l.segments) {
          if (_abs(e.x + 4 - seg.x) < 8 && _abs(e.y + 8 - seg.y) < 10) {
            e.balloons = 0;
            e.state = "falling";
            e.vy = -1;
            e.parachuteTimer = 20;
            addParticles(e.x, e.y, 5, 3);
            break;
          }
        }
      }
    }

    // --- Fish ---
    fishObj.timer--;
    if (fishObj.state === "hidden" && fishObj.timer <= 0) {
      // Check if anyone is near the water
      let target = null;
      if (!player.dead && player.y > WATER_Y - 40) {
        target = player;
      }
      if (!target) {
        for (const e of enemies) {
          if (e.y > WATER_Y - 40) { target = e; break; }
        }
      }
      if (target) {
        fishObj.state = "jumping";
        fishObj.x = target.x;
        fishObj.targetX = target.x;
        fishObj.y = WATER_Y + 8;
        fishObj.vy = -4.5;
        splashSound();
      }
      fishObj.timer = 60 + flr(rnd(120));
    }
    if (fishObj.state === "jumping") {
      fishObj.vy += 0.2;
      fishObj.y += fishObj.vy;
      if (fishObj.y > WATER_Y + 8) {
        fishObj.state = "hidden";
        fishObj.timer = 90 + flr(rnd(120));
        addParticles(fishObj.x, WATER_Y - 2, 4, 2);
      }
      // Eat player
      if (!player.dead && _abs(player.x - fishObj.x) < 12 && _abs(player.y - fishObj.y) < 12) {
        killPlayer();
      }
      // Eat enemies
      for (let i = enemies.length - 1; i >= 0; i--) {
        const e = enemies[i];
        if (_abs(e.x - fishObj.x) < 12 && _abs(e.y - fishObj.y) < 12) {
          score += e.pts;
          enemies.splice(i, 1);
        }
      }
    }

    // --- Particles ---
    for (let i = particles.length - 1; i >= 0; i--) {
      const p = particles[i]; p.x += p.vx; p.y += p.vy; p.vy += 0.06; p.life--;
      if (p.life <= 0) particles.splice(i, 1);
    }

    // --- Bubbles (decorative, from water) ---
    if (flr(rnd(15)) === 0) {
      bubbles.push({ x: flr(rnd(W)), y: WATER_Y, vy: -0.3 - rnd(0.5), life: 30 + flr(rnd(30)) });
    }
    for (let i = bubbles.length - 1; i >= 0; i--) {
      const b = bubbles[i]; b.y += b.vy; b.x += sin(GrayBox.frame * 0.1 + i) * 0.3; b.life--;
      if (b.life <= 0) bubbles.splice(i, 1);
    }
    },
    draw() {
      cls(0);
      // --- Play state drawing ---
      drawBackground();

      // Draw clouds
      for (const c of CLOUDS) {
        for (let t = 0; t < c.w; t++) {
          sprT(8, c.x + t * 8, c.y, false, false);
        }
      }

      // Draw lightning
      for (const l of lightnings) {
        const bright = l.timer > 10 ? 3 : 2;
        for (const seg of l.segments) {
          line(seg.x, seg.y, seg.x2, seg.y2, bright);
        }
      }

      // Draw platforms
      drawPlatforms();

      // Draw enemies
      for (const e of enemies) {
        if (e.state === "flying") {
          drawBalloons(e.x - 2, e.y - 10, e.balloons, 2);
          const bodySprite = e.flapAnim > 0 ? 14 : 3;
          sprT(bodySprite, e.x, e.y + 4, e.facing < 0, false);
        } else if (e.state === "falling") {
          sprT(5, e.x - 2, e.y - 4, false, false);
          sprT(3, e.x, e.y + 6, e.facing < 0, false);
        } else if (e.state === "grounded") {
          const blink = e.reinflateTimer < 40 && (GrayBox.frame % 6 < 3);
          sprT(3, e.x, e.y + 4, e.facing < 0, false);
          if (blink) {
            circf(e.x + 4, e.y, 2, 2);
          }
        }
      }

      // Draw player
      if (!player.dead) {
        const vis = invTimer > 0 ? (GrayBox.frame % 4 < 2) : true;
        if (vis) {
          drawBalloons(player.x - 2, player.y - 10, player.balloons, 3);
          const bodySprite = player.flapAnim > 0 ? 13 : 1;
          sprT(bodySprite, player.x, player.y + 4, player.facing < 0, false);
        }
      }

      // Draw fish
      if (fishObj.state === "jumping") {
        sprT(10, fishObj.x, fishObj.y, false, false);
      }

      // Draw water
      drawWater();

      // Draw bubbles
      for (const b of bubbles) {
        sprT(12, b.x, b.y, false, false);
      }

      // Draw particles
      for (const p of particles) pix(p.x, p.y, p.color);

      // HUD
      rectf(0, 0, W, 12, 0);
      text("SCORE " + score, 4, 3, 3);
      text("WAVE " + wave, 147, 3, 2);
      for (let i = 0; i < lives; i++) {
        sprT(11, 267 + i * 12, 2, false, false);
      }

      // Wave message
      if (waveMsg > 0) {
        text("WAVE " + wave, 140, 112, 3);
      }
    }
  });

  // --- Game Over Scene ---
  GrayBox.scene(GAMEOVER, {
    init() {},
    update() {
      for (let i = particles.length - 1; i >= 0; i--) {
        const p = particles[i]; p.x += p.vx; p.y += p.vy; p.vy += 0.08; p.life--;
        if (p.life <= 0) particles.splice(i, 1);
      }
      if (btnp("a") || btnp("a")) GrayBox.go(TITLE);
    },
    draw() {
      cls(0);
      drawBackground();
      drawPlatforms();
      drawWater();
      for (const p of particles) pix(p.x, p.y, p.color);
      text("GAME OVER", 138, 90, 3);
      text("SCORE  " + score, 130, 112, 2);
      const blink = (GrayBox.frame % 40) < 30;
      if (blink) text("PRESS A", 133, 135, 3);
    }
  });

  function killPlayer() {
    if (player.dead) return;
    player.dead = true;
    player.respawnTimer = 60;
    lives--;
    addParticles(player.x, player.y, 10, 3);
    deathSound();
    if (lives <= 0) {
      GrayBox.go(GAMEOVER);
      return;
    }
  }

  function generateLightning(x1, y1, x2, y2) {
    const segs = [];
    const steps = 6;
    let cx = x1, cy = y1;
    const dx = (x2 - x1) / steps, dy = (y2 - y1) / steps;
    for (let i = 0; i < steps; i++) {
      const nx = cx + dx + rnd(12) - 6;
      const ny = cy + dy;
      segs.push({ x: cx, y: cy, x2: nx, y2: ny });
      cx = nx; cy = ny;
    }
    return segs;
  }



  function drawBalloons(x, y, count, col) {
    if (count >= 2) {
      // Two balloons side by side
      circf(x + 2, y + 3, 4, col);
      circf(x + 10, y + 3, 4, col);
      // Strings
      line(x + 2, y + 7, x + 5, y + 14, col > 1 ? col - 1 : 1);
      line(x + 10, y + 7, x + 7, y + 14, col > 1 ? col - 1 : 1);
    } else if (count === 1) {
      // One balloon centered
      circf(x + 6, y + 3, 4, col);
      line(x + 6, y + 7, x + 6, y + 14, col > 1 ? col - 1 : 1);
    }
  }

  function drawBackground() {
    // Stars in sky
    const starSeed = [23,67,112,189,234,301,378,410,456,45,99,150,267,340,390,440,10,80,175,290,360,425];
    for (let i = 0; i < starSeed.length; i++) {
      const sx = starSeed[i] % W;
      const sy = (starSeed[i] * 7 + i * 23) % (WATER_Y - 30);
      const bright = (i % 3 === 0) ? 2 : 1;
      const twinkle = ((GrayBox.frame + i * 11) % 60) < 50;
      if (twinkle) pix(sx, sy, bright);
    }
  }

  function drawPlatforms() {
    for (const p of PLATFORMS) {
      for (let t = 0; t < p.w; t++) {
        sprT(6, p.x + t * 8, p.y, false, false);
      }
    }
  }

  function drawWater() {
    // Water surface
    for (let tx = 0; tx < 40; tx++) {
      sprT(7, tx * 8, WATER_Y, (tx % 2 === 0), false);
    }
    // Deep water fill
    rectf(0, WATER_Y + 8, W, H - WATER_Y - 8, 0);
    // Water pattern lines
    for (let y = WATER_Y + 10; y < H; y += 6) {
      for (let x = 0; x < W; x += 12) {
        const off = sin((GrayBox.frame * 0.05) + x * 0.02 + y * 0.1) * 4;
        line(x + off, y, x + 6 + off, y, 1);
      }
    }
  }

  GrayBox.go(TITLE);
  GrayBox.boot("screen");
})();
</script>
