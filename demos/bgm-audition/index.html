<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GrayBox — BGM Audition</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #0a0a0a;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100vh;
    font-family: monospace;
    overflow: hidden;
  }
  #frame {
    background: #111;
    border: 3px solid #333;
    border-radius: 8px;
    padding: 12px;
    box-shadow: 0 0 40px rgba(0,0,0,0.8), inset 0 0 20px rgba(0,0,0,0.5);
  }
  canvas {
    display: block;
    image-rendering: pixelated;
    image-rendering: crisp-edges;
  }
</style>
</head>
<body>
<div id="frame">
  <canvas id="c" width="320" height="240"></canvas>
</div>
<script src="../../runtime/engine.js"></script>
<script src="../../runtime/bgm-library.js"></script>
<script>
'use strict';

const { cls, rectf, rect, line, text, btn, btnp, bgm, bgmStop, BGM } = GrayBox;

const W = 320, H = 240;

// Build entries from library
const allEntries = Object.keys(BGM).map(function(key) {
  var p = BGM[key];
  return { key: key, name: key.replace(/_/g, " "), bpm: p.bpm, style: p.style, tags: p.tags || [], preset: p };
});

// Collect all unique tags
const allTags = [];
(function() {
  var seen = {};
  // "ALL" is the default filter
  allTags.push("ALL");
  for (var i = 0; i < allEntries.length; i++) {
    var tags = allEntries[i].tags;
    for (var j = 0; j < tags.length; j++) {
      if (!seen[tags[j]]) {
        seen[tags[j]] = true;
        allTags.push(tags[j]);
      }
    }
  }
})();

let tagCursor = 0;
let activeTag = "ALL";
let filtered = allEntries.slice();
let cursor = 0;
let playing = false;
let playingKey = null;
let vizBeat = 0;
let vizTimer = 0;
let scrollOffset = 0;
let mode = "tags"; // "tags" or "list"

const VISIBLE_ROWS = 7;
const ROW_H = 16;
const LIST_Y = 52;

function filterByTag(tag) {
  activeTag = tag;
  if (tag === "ALL") {
    filtered = allEntries.slice();
  } else {
    filtered = allEntries.filter(function(e) { return e.tags.indexOf(tag) >= 0; });
  }
  cursor = 0;
  scrollOffset = 0;
}

GrayBox._init = function() {
  tagCursor = 0;
  activeTag = "ALL";
  filtered = allEntries.slice();
  cursor = 0;
  playing = false;
  playingKey = null;
  scrollOffset = 0;
  mode = "tags";
};

GrayBox._update = function() {
  if (mode === "tags") {
    // Tag selector mode
    if (btnp("left")) tagCursor = (tagCursor - 1 + allTags.length) % allTags.length;
    if (btnp("right")) tagCursor = (tagCursor + 1) % allTags.length;
    if (btnp("up")) tagCursor = (tagCursor - 6 + allTags.length) % allTags.length;
    if (btnp("down")) tagCursor = (tagCursor + 6) % allTags.length;
    if (btnp("a")) {
      filterByTag(allTags[tagCursor]);
      if (filtered.length > 0) mode = "list";
    }
  } else {
    // List mode
    if (btnp("up")) {
      cursor = (cursor - 1 + filtered.length) % filtered.length;
    }
    if (btnp("down")) {
      cursor = (cursor + 1) % filtered.length;
    }

    if (cursor < scrollOffset) scrollOffset = cursor;
    if (cursor >= scrollOffset + VISIBLE_ROWS) scrollOffset = cursor - VISIBLE_ROWS + 1;

    if (btnp("a")) {
      if (playing && playingKey === filtered[cursor].key) {
        bgmStop();
        playing = false;
        playingKey = null;
      } else {
        bgmStop();
        bgm(filtered[cursor].preset);
        playing = true;
        playingKey = filtered[cursor].key;
      }
    }

    if (btnp("b")) {
      bgmStop();
      playing = false;
      playingKey = null;
      mode = "tags";
    }
  }

  // Viz
  if (playing && playingKey) {
    var entry = null;
    for (var i = 0; i < filtered.length; i++) {
      if (filtered[i].key === playingKey) { entry = filtered[i]; break; }
    }
    if (entry) {
      var framesPerBeat = Math.round(30 * 60 / entry.bpm);
      vizTimer++;
      if (vizTimer >= framesPerBeat) { vizTimer = 0; vizBeat++; }
    }
  } else {
    vizBeat = 0;
    vizTimer = 0;
  }
};

GrayBox._draw = function() {
  cls(0);

  // Header
  text("BGM LIBRARY", 112, 3, 3);

  if (mode === "tags") {
    drawTagScreen();
  } else {
    drawListScreen();
  }
};

function drawTagScreen() {
  text("SELECT A TAG", 104, 16, 1);
  rectf(16, 26, W - 32, 1, 1);

  // Tag grid
  var cols = 6;
  var tagW = 46;
  var tagH = 12;
  var gapX = 3;
  var gapY = 2;
  var startX = (W - (cols * tagW + (cols - 1) * gapX)) / 2;
  var startY = 32;

  for (var i = 0; i < allTags.length; i++) {
    var col = i % cols;
    var row = Math.floor(i / cols);
    var x = startX + col * (tagW + gapX);
    var y = startY + row * (tagH + gapY);
    var selected = i === tagCursor;
    var isActive = allTags[i] === activeTag;

    var label = allTags[i].toUpperCase();
    if (label.length > 8) label = label.substring(0, 8);
    if (selected) {
      rectf(x, y, tagW, tagH, 2);
      text(label, x + 2, y + 2, 0);
    } else if (isActive) {
      rectf(x, y, tagW, tagH, 1);
      text(label, x + 2, y + 2, 3);
    } else {
      rect(x, y, tagW, tagH, 1);
      text(label, x + 2, y + 2, 2);
    }
  }

  // Count
  var count = activeTag === "ALL" ? allEntries.length : filtered.length;
  text(count + " TRACKS", 130, H - 30, 1);

  // Controls
  text("ARROWS:MOVE  A:SELECT", 56, H - 16, 1);
  text(allEntries.length + " TOTAL", 120, H - 6, 1);
}

function drawListScreen() {
  // Tag label
  text("[" + activeTag.toUpperCase() + "]", 16, 16, 2);
  text(filtered.length + " TRACKS", W - 80, 16, 1);
  rectf(16, 26, W - 32, 1, 1);

  // Column headers
  text("TRACK", 20, 30, 1);
  text("STYLE", 168, 30, 1);
  text("BPM", W - 44, 30, 1);

  rectf(16, 40, W - 32, 1, 1);

  if (filtered.length === 0) {
    text("NO TRACKS FOUND", 96, 100, 2);
  }

  // List
  for (var i = 0; i < VISIBLE_ROWS; i++) {
    var idx = scrollOffset + i;
    if (idx >= filtered.length) break;

    var y = LIST_Y + i * ROW_H;
    var entry = filtered[idx];
    var selected = idx === cursor;
    var isPlaying = playingKey === entry.key;

    if (selected) rectf(14, y - 1, W - 28, ROW_H - 1, 1);

    // Playing indicator
    if (isPlaying) {
      var beat = vizBeat % 4;
      text(beat < 2 ? ">" : ".", 8, y, 3);
    }

    // Name (truncate if needed)
    var name = entry.name;
    if (name.length > 18) name = name.substring(0, 17) + ".";
    text(name, 20, y, selected ? 3 : (isPlaying ? 3 : 2));

    // Style
    text(entry.style.toUpperCase(), 168, y, selected ? 2 : 1);

    // BPM
    text(String(entry.bpm), W - 40, y, selected ? 2 : 1);
  }

  // Scroll indicators
  if (scrollOffset > 0) text("...", 152, LIST_Y - 8, 1);
  if (scrollOffset + VISIBLE_ROWS < filtered.length) text("...", 152, LIST_Y + VISIBLE_ROWS * ROW_H, 1);

  // Bottom section
  var bottomY = LIST_Y + VISIBLE_ROWS * ROW_H + 6;
  rectf(16, bottomY, W - 32, 1, 1);

  // Tags of selected entry
  if (filtered.length > 0) {
    var selEntry = filtered[cursor];
    var tagStr = selEntry.tags.join(" ");
    text(tagStr, 16, bottomY + 6, 1);
  }

  // Waveform visualizer
  var vizY = bottomY + 16;
  if (playing) {
    var vizW = W - 32;
    for (var j = 0; j < vizW; j += 2) {
      var p1 = (vizBeat * 0.5 + j * 0.08);
      var p2 = (vizBeat * 0.3 + j * 0.12);
      var val = Math.sin(p1) * 10 + Math.sin(p2) * 6;
      var c = Math.abs(val) > 10 ? 3 : Math.abs(val) > 5 ? 2 : 1;
      rectf(16 + j, vizY + 12 - Math.max(0, val), 1, Math.abs(val), c);
    }
  } else {
    rectf(16, vizY + 12, W - 32, 1, 1);
  }

  // Controls
  text("UP/DN:SEL A:PLAY B:BACK", 36, H - 6, 1);
}

GrayBox.boot("c");
</script>
</body>
</html>
