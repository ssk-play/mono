<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GrayBox — Demo: Tron Light Cycles</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #0a0a0a;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100vh;
    font-family: monospace;
    overflow: hidden;
  }
  #frame {
    background: #111;
    border: 3px solid #333;
    border-radius: 8px;
    padding: 12px;
    box-shadow: 0 0 40px rgba(0,0,0,0.8), inset 0 0 20px rgba(0,0,0,0.5);
  }
  canvas {
    display: block;
    image-rendering: pixelated;
    image-rendering: crisp-edges;
  }
  #controls {
    margin-top: 12px;
    color: #6b6b6b;
    font-size: 11px;
    text-align: center;
    letter-spacing: 1px;
  }
  #controls span { color: #b0b0b0; }
</style>
</head>
<body>
<div id="frame">
  <canvas id="screen"></canvas>
</div>
<div id="controls">
  <span>ARROWS</span> TURN &nbsp;&nbsp; <span>Z</span> BOOST &nbsp;&nbsp; <span>ENTER</span> START
</div>
<script>
(() => {
  "use strict";

  // ============================================================
  // GrayBox Runtime (inline)
  // ============================================================
  const W = 320;
  const H = 240;
  const FPS = 30;
  const COLORS = ["#1a1a1a", "#6b6b6b", "#b0b0b0", "#e8e8e8"];
  const canvas = document.getElementById("screen");
  canvas.width = W;
  canvas.height = H;
  function fitCanvas() {
    var maxW = window.innerWidth - 40;
    var maxH = window.innerHeight - 60;
    var s = Math.min(maxW / W, maxH / H);
    canvas.style.width = (W * s) + "px";
    canvas.style.height = (H * s) + "px";
  }
  fitCanvas();
  window.addEventListener("resize", fitCanvas);
  const ctx = canvas.getContext("2d");
  ctx.imageSmoothingEnabled = false;
  const buf = ctx.createImageData(W, H);
  const buf32 = new Uint32Array(buf.data.buffer);

  function hexToABGR(hex) {
    const r = parseInt(hex.slice(1, 3), 16);
    const g = parseInt(hex.slice(3, 5), 16);
    const b = parseInt(hex.slice(5, 7), 16);
    return (255 << 24) | (b << 16) | (g << 8) | r;
  }
  const COLOR_U32 = COLORS.map(hexToABGR);

  const sprites = {};
  const tilemap = {};

  const keyMap = {
    "ArrowUp": "up", "ArrowDown": "down", "ArrowLeft": "left", "ArrowRight": "right",
    "w": "up", "s": "down", "a": "left", "d": "right", "ㅈ": "up", "ㄴ": "down", "ㅁ": "left", "ㅇ": "right",
    "z": "a", "Z": "a", "x": "b", "X": "b", "ㅋ": "a", "ㅌ": "b",
    "Enter": "start", " ": "a"
  };
  const keys = {};
  const keysPrev = {};

  document.addEventListener("keydown", e => {
    const k = keyMap[e.key];
    if (k) { keys[k] = true; e.preventDefault(); }
  });
  document.addEventListener("keyup", e => {
    const k = keyMap[e.key];
    if (k) { keys[k] = false; e.preventDefault(); }
  });

  let audioCtx = null;
  const channels = [null, null];
  const channelGains = [null, null];
  function ensureAudio() {
    if (!audioCtx) {
      audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      for (let i = 0; i < 2; i++) {
        channelGains[i] = audioCtx.createGain();
        channelGains[i].gain.value = 0.15;
        channelGains[i].connect(audioCtx.destination);
      }
    }
  }

  const NOTE_NAMES = ["C","C#","D","D#","E","F","F#","G","G#","A","A#","B"];
  function noteToFreq(noteStr) {
    const match = noteStr.match(/^([A-G]#?)(\d)$/);
    if (!match) return 440;
    const name = match[1];
    const octave = parseInt(match[2]);
    const semitone = NOTE_NAMES.indexOf(name);
    if (semitone === -1) return 440;
    const midi = (octave + 1) * 12 + semitone;
    return 440 * Math.pow(2, (midi - 69) / 12);
  }

  const FONT_W = 4;
  const FONT_H = 7;
  const FONT = {};
  const fontData = {
    "A":"0110100110011111100110011001","B":"1110100110101110100110011110",
    "C":"0110100110001000100001100110","D":"1100101010011001100110101100",
    "E":"1111100010001110100010001111","F":"1111100010001110100010001000",
    "G":"0111100010001011100101100111","H":"1001100110011111100110011001",
    "I":"1110010001000100010001001110","J":"0111001000100010001010100100",
    "K":"1001101011001100101010011001","L":"1000100010001000100010001111",
    "M":"1001111111011001100110011001","N":"1001110111011001100110011001",
    "O":"0110100110011001100110010110","P":"1110100110011110100010001000",
    "Q":"0110100110011001101101100001","R":"1110100110011110101010011001",
    "S":"0111100010000110000110001110","T":"1111001000100010001000100010",
    "U":"1001100110011001100110010110","V":"1001100110011001100101100110",
    "W":"1001100110011001101111011001","X":"1001100101100110011010011001",
    "Y":"1001100101100010001000100010","Z":"1111000100100100100010001111",
    "0":"0110100111011011101110010110","1":"0100110001000100010001001110",
    "2":"0110100100010010010010001111","3":"1110000100010110000110011110",
    "4":"1001100110011111000100010001","5":"1111100010001110000100011110",
    "6":"0110100010001110100110010110","7":"1111000100010010010001001000",
    "8":"0110100110010110100110010110","9":"0110100110010111000100010110",
    " ":"0000000000000000000000000000",
    ".":"0000000000000000000001000100",
    ",":"0000000000000000001000101000",
    "!":"0100010001000100000000000100",
    "?":"0110100100010010000000000010",
    "-":"0000000000001110000000000000",
    "+":"0000001001001110010000100000",
    ":":"0000010001000000010001000000",
    "/":"0001000100100010010010001000",
    "*":"0000101001001110010010100000",
    "#":"0101111101011111010100000000",
    "(":"0010010010001000010001000010",
    ")":"0100001000010001000100100100",
    "=":"0000000011110000111100000000",
    "'":"0100010010000000000000000000",
    "\"":"1010101000000000000000000000",
    "<":"0010010010001000010000100010",
    ">":"1000010000100001001001001000",
    "_":"0000000000000000000000001111",
  };
  for (const [ch, bits] of Object.entries(fontData)) {
    FONT[ch] = [];
    for (let i = 0; i < bits.length; i++) FONT[ch].push(parseInt(bits[i]));
  }

  const API = {};
  API._init = null;
  API._update = null;
  API._draw = null;
  API.frame = 0;

  API.cls = function(c = 0) { buf32.fill(COLOR_U32[c] || COLOR_U32[0]); };
  API.pix = function(x, y, c) {
    x = Math.floor(x); y = Math.floor(y);
    if (x < 0 || x >= W || y < 0 || y >= H) return;
    buf32[y * W + x] = COLOR_U32[c] || COLOR_U32[0];
  };
  API.gpix = function(x, y) {
    x = Math.floor(x); y = Math.floor(y);
    if (x < 0 || x >= W || y < 0 || y >= H) return -1;
    const v = buf32[y * W + x];
    for (let i = 0; i < 4; i++) if (COLOR_U32[i] === v) return i;
    return -1;
  };
  API.line = function(x0, y0, x1, y1, c) {
    x0=Math.floor(x0); y0=Math.floor(y0); x1=Math.floor(x1); y1=Math.floor(y1);
    const dx=Math.abs(x1-x0), dy=Math.abs(y1-y0);
    const sx=x0<x1?1:-1, sy=y0<y1?1:-1;
    let err=dx-dy;
    while(true) {
      API.pix(x0,y0,c);
      if(x0===x1&&y0===y1) break;
      const e2=2*err;
      if(e2>-dy){err-=dy;x0+=sx;}
      if(e2<dx){err+=dx;y0+=sy;}
    }
  };
  API.rect = function(x,y,w,h,c) {
    API.line(x,y,x+w-1,y,c); API.line(x+w-1,y,x+w-1,y+h-1,c);
    API.line(x+w-1,y+h-1,x,y+h-1,c); API.line(x,y+h-1,x,y,c);
  };
  API.rectf = function(x,y,w,h,c) {
    x=Math.floor(x); y=Math.floor(y);
    const col=COLOR_U32[c]||COLOR_U32[0];
    for(let py=Math.max(0,y);py<Math.min(H,y+h);py++)
      for(let px=Math.max(0,x);px<Math.min(W,x+w);px++)
        buf32[py*W+px]=col;
  };
  API.circ = function(cx,cy,r,c) {
    let x=r,y=0,d=1-r; cx=Math.floor(cx); cy=Math.floor(cy);
    while(x>=y){
      API.pix(cx+x,cy+y,c);API.pix(cx-x,cy+y,c);
      API.pix(cx+x,cy-y,c);API.pix(cx-x,cy-y,c);
      API.pix(cx+y,cy+x,c);API.pix(cx-y,cy+x,c);
      API.pix(cx+y,cy-x,c);API.pix(cx-y,cy-x,c);
      y++; if(d<0){d+=2*y+1;}else{x--;d+=2*(y-x)+1;}
    }
  };
  API.circf = function(cx,cy,r,c) {
    cx=Math.floor(cx); cy=Math.floor(cy);
    const col=COLOR_U32[c]||COLOR_U32[0]; const r2=r*r;
    for(let py=-r;py<=r;py++) for(let px=-r;px<=r;px++)
      if(px*px+py*py<=r2){ const sx=cx+px,sy=cy+py;
        if(sx>=0&&sx<W&&sy>=0&&sy<H) buf32[sy*W+sx]=col; }
  };
  API.sprite = function(id, data) {
    const arr = new Uint8Array(64); let i = 0;
    for (const ch of data) { if (ch>='0'&&ch<='3') { arr[i++]=parseInt(ch); if(i>=64) break; } }
    sprites[id] = arr;
  };
  API.spr = function(id, x, y, flipX, flipY) {
    const s=sprites[id]; if(!s) return;
    x=Math.floor(x); y=Math.floor(y);
    for(let py=0;py<8;py++) for(let px=0;px<8;px++){
      const sx=flipX?7-px:px, sy=flipY?7-py:py;
      const c=s[sy*8+sx], dx=x+px, dy=y+py;
      if(dx>=0&&dx<W&&dy>=0&&dy<H) buf32[dy*W+dx]=COLOR_U32[c];
    }
  };
  API.text = function(str, x, y, c) {
    str=String(str).toUpperCase(); let cx=Math.floor(x); const cy=Math.floor(y);
    const col=COLOR_U32[c]||COLOR_U32[3];
    for(const ch of str){
      const glyph=FONT[ch];
      if(glyph) for(let py=0;py<FONT_H;py++) for(let px=0;px<FONT_W;px++)
        if(glyph[py*FONT_W+px]){ const dx=cx+px,dy=cy+py;
          if(dx>=0&&dx<W&&dy>=0&&dy<H) buf32[dy*W+dx]=col; }
      cx+=FONT_W+1;
    }
  };
  API.mget = function(cx,cy) { return tilemap[cx+","+cy]||0; };
  API.mset = function(cx,cy,id) { tilemap[cx+","+cy]=id; };
  API.map = function(mx,my,mw,mh,sx,sy) {
    for(let ty=0;ty<mh;ty++) for(let tx=0;tx<mw;tx++){
      const id=API.mget(mx+tx,my+ty); if(id>0) API.spr(id,sx+tx*8,sy+ty*8); }
  };
  API.btn = function(k) { return !!keys[k]; };
  API.btnp = function(k) { return !!keys[k] && !keysPrev[k]; };
  API.note = function(ch, noteStr, dur) {
    ensureAudio(); if(ch<0||ch>1) return; API.stop(ch);
    const osc=audioCtx.createOscillator(); osc.type="square";
    osc.frequency.value=noteToFreq(noteStr);
    osc.connect(channelGains[ch]); osc.start();
    osc.stop(audioCtx.currentTime+dur); channels[ch]=osc;
  };
  API.stop = function(ch) {
    if(ch===undefined){API.stop(0);API.stop(1);return;}
    if(channels[ch]){try{channels[ch].stop();}catch(e){} channels[ch]=null;}
  };
  API.rnd = function(max) { return Math.random()*max; };
  API.flr = Math.floor;
  API.abs = Math.abs;
  API.min = Math.min;
  API.max = Math.max;
  API.sin = Math.sin;
  API.cos = Math.cos;

  function tick() {
    if (API._update) API._update();
    if (API._draw) API._draw();
    ctx.putImageData(buf, 0, 0);
    for (const k in keys) keysPrev[k] = keys[k];
    API.frame++;
  }

  // ============================================================
  // Tron Light Cycles Game
  // ============================================================
  const { cls, pix, line, rect, rectf, circ, circf, sprite: defSprite,
          spr, text, btn, btnp, note, stop, rnd, flr, abs: _abs,
          min, max: _max, sin, cos, gpix } = API;

  // --- Sprites ---
  // 1: Player cycle facing right
  defSprite(1,
    "00000000" +
    "00333300" +
    "03333330" +
    "33322330" +
    "33333330" +
    "03333300" +
    "00333000" +
    "00000000"
  );
  // 2: AI cycle
  defSprite(2,
    "00000000" +
    "00111100" +
    "01111110" +
    "11122110" +
    "11111110" +
    "01111100" +
    "00111000" +
    "00000000"
  );
  // 3: Explosion frame 1
  defSprite(3,
    "00000000" +
    "00200100" +
    "01002000" +
    "00031000" +
    "00130200" +
    "01000010" +
    "00100000" +
    "00000000"
  );
  // 4: Explosion frame 2
  defSprite(4,
    "20010020" +
    "01000010" +
    "00203200" +
    "03033030" +
    "00232000" +
    "01000300" +
    "20001001" +
    "00200010"
  );
  // 5: Crown/trophy
  defSprite(5,
    "00000000" +
    "30300300" +
    "33333330" +
    "33333330" +
    "03333300" +
    "03333300" +
    "03333300" +
    "00000000"
  );
  // 6: Boost icon
  defSprite(6,
    "00000000" +
    "00030000" +
    "00330000" +
    "03330000" +
    "00330000" +
    "00030000" +
    "00000000" +
    "00000000"
  );

  // --- Arena constants ---
  const ARENA_X = 5;
  const ARENA_Y = 15;
  const ARENA_W = W - 10;
  const ARENA_H = H - 22;
  const ARENA_R = ARENA_X + ARENA_W - 1;
  const ARENA_B = ARENA_Y + ARENA_H - 1;

  // --- Direction helpers ---
  // 0=up, 1=right, 2=down, 3=left
  const DX = [0, 1, 0, -1];
  const DY = [-1, 0, 1, 0];

  // --- Grid for trail collision (1px resolution within arena) ---
  let grid; // Uint8Array: 0=empty, 1=player trail, 2+=AI trails

  function gridIdx(x, y) {
    return (y - ARENA_Y) * ARENA_W + (x - ARENA_X);
  }
  function gridGet(x, y) {
    if (x < ARENA_X || x > ARENA_R || y < ARENA_Y || y > ARENA_B) return 255;
    return grid[gridIdx(x, y)];
  }
  function gridSet(x, y, v) {
    if (x >= ARENA_X && x <= ARENA_R && y >= ARENA_Y && y <= ARENA_B)
      grid[gridIdx(x, y)] = v;
  }

  // --- Game state ---
  let state = "title";
  let round, playerScore, aiScore, winsNeeded;
  let cycles; // array of cycle objects
  let explosions, particles;
  let roundTimer, roundMessage;
  let baseSpeed, speedIncrement;
  let numAI;
  let boostFuel, boostMax, boostActive, boostCooldown;
  let titlePulse;
  let crashedIds; // set of crashed cycle indices this round

  function makeCycle(id, x, y, dir, isPlayer, color) {
    return {
      id, x, y, dir, isPlayer, color,
      alive: true, speed: 1, trail: [],
      moveAccum: 0,
      turnCooldown: 0
    };
  }

  function resetGrid() {
    grid = new Uint8Array(ARENA_W * ARENA_H);
  }

  function spawnPositions(count) {
    // Place cycles evenly spaced in the arena
    const positions = [];
    const cx = flr(ARENA_X + ARENA_W / 2);
    const cy = flr(ARENA_Y + ARENA_H / 2);
    const margin = 40;

    // Player always starts left side going right
    positions.push({ x: ARENA_X + margin, y: cy, dir: 1 });

    if (count >= 2) {
      // First AI starts right side going left
      positions.push({ x: ARENA_R - margin, y: cy, dir: 3 });
    }
    if (count >= 3) {
      // Second AI starts top going down
      positions.push({ x: cx, y: ARENA_Y + margin, dir: 2 });
    }
    if (count >= 4) {
      // Third AI starts bottom going up
      positions.push({ x: cx, y: ARENA_B - margin, dir: 0 });
    }
    return positions;
  }

  function startRound() {
    resetGrid();
    explosions = [];
    particles = [];
    crashedIds = new Set();

    const totalCycles = 1 + numAI;
    const positions = spawnPositions(totalCycles);
    cycles = [];

    // Player
    const pp = positions[0];
    cycles.push(makeCycle(1, pp.x, pp.y, pp.dir, true, 3)); // color 3 = bright

    // AIs
    for (let i = 1; i < totalCycles; i++) {
      const ap = positions[i];
      cycles.push(makeCycle(i + 1, ap.x, ap.y, ap.dir, false, 2)); // color 2 = medium
    }

    // Place initial positions on grid
    for (const c of cycles) {
      const gv = c.isPlayer ? 1 : c.id;
      gridSet(c.x, c.y, gv);
    }

    boostFuel = boostMax;
    boostActive = false;
    boostCooldown = 0;
    roundTimer = 0;
    roundMessage = 90;
  }

  function resetGame() {
    round = 0;
    playerScore = 0;
    aiScore = 0;
    winsNeeded = 3; // best of 5
    baseSpeed = 1.5;
    speedIncrement = 0.2;
    boostMax = 60;
    numAI = 1;
    titlePulse = 0;
    nextRound();
  }

  function nextRound() {
    round++;
    // More AI opponents in later rounds
    if (round >= 4) numAI = 3;
    else if (round >= 3) numAI = 2;
    else numAI = 1;

    startRound();
  }

  function addExplosion(x, y) {
    explosions.push({ x, y, timer: 18 });
    for (let i = 0; i < 16; i++) {
      particles.push({
        x: x, y: y,
        vx: rnd(6) - 3, vy: rnd(6) - 3,
        life: 8 + flr(rnd(15)),
        color: flr(rnd(3)) + 1
      });
    }
  }

  // --- Sound effects ---
  function turnSound() { note(0, "G5", 0.03); }
  function crashSound() {
    note(0, "C3", 0.15); note(1, "G2", 0.15);
    setTimeout(() => { note(0, "A2", 0.2); }, 100);
  }
  function boostSound() { note(1, "E5", 0.04); }
  function winSound() {
    note(0, "C5", 0.1);
    setTimeout(() => note(0, "E5", 0.1), 100);
    setTimeout(() => note(0, "G5", 0.1), 200);
    setTimeout(() => note(0, "C6", 0.2), 300);
  }
  function loseSound() {
    note(0, "E3", 0.15);
    setTimeout(() => note(0, "C3", 0.2), 150);
  }
  function roundStartSound() {
    note(0, "C4", 0.08);
    setTimeout(() => note(0, "E4", 0.08), 80);
    setTimeout(() => note(0, "G4", 0.1), 160);
  }

  // --- AI Logic ---
  function aiThink(c) {
    const speed = getCurrentSpeed();
    const lookAhead = flr(12 + speed * 5);

    // Check what's ahead, left, and right
    const ahead = c.dir;
    const left = (c.dir + 3) % 4;
    const right = (c.dir + 1) % 4;

    const aheadDist = scanDir(c.x, c.y, ahead, lookAhead);
    const leftDist = scanDir(c.x, c.y, left, lookAhead);
    const rightDist = scanDir(c.x, c.y, right, lookAhead);

    // If ahead is clear enough, keep going (with some randomness)
    if (aheadDist >= lookAhead && rnd(1) < 0.85) return;

    // Danger ahead - pick best turn
    if (aheadDist < 4) {
      // Urgent turn
      if (leftDist > rightDist) {
        c.dir = left;
      } else if (rightDist > leftDist) {
        c.dir = right;
      } else {
        c.dir = rnd(1) < 0.5 ? left : right;
      }
      return;
    }

    if (aheadDist < lookAhead * 0.6) {
      // Try to be strategic: head toward open space
      // Add some randomness for variety
      if (rnd(1) < 0.4) {
        if (leftDist > rightDist + 3) c.dir = left;
        else if (rightDist > leftDist + 3) c.dir = right;
        else if (rnd(1) < 0.5) c.dir = left;
        else c.dir = right;
      }
    }

    // Occasionally make aggressive moves toward player
    if (rnd(1) < 0.08 && aheadDist > 15) {
      const player = cycles[0];
      if (player.alive) {
        // Try to cut off player
        const dx = player.x - c.x;
        const dy = player.y - c.y;
        if (_abs(dx) > _abs(dy)) {
          const wantDir = dx > 0 ? 1 : 3;
          if (wantDir !== (c.dir + 2) % 4) { // not reverse
            const dist = scanDir(c.x, c.y, wantDir, lookAhead);
            if (dist > 10) c.dir = wantDir;
          }
        } else {
          const wantDir = dy > 0 ? 2 : 0;
          if (wantDir !== (c.dir + 2) % 4) {
            const dist = scanDir(c.x, c.y, wantDir, lookAhead);
            if (dist > 10) c.dir = wantDir;
          }
        }
      }
    }
  }

  function scanDir(x, y, dir, maxDist) {
    const dx = DX[dir];
    const dy = DY[dir];
    for (let d = 1; d <= maxDist; d++) {
      const nx = x + dx * d;
      const ny = y + dy * d;
      if (nx <= ARENA_X || nx >= ARENA_R || ny <= ARENA_Y || ny >= ARENA_B) return d - 1;
      if (gridGet(nx, ny) !== 0) return d - 1;
    }
    return maxDist;
  }

  function getCurrentSpeed() {
    return baseSpeed + (round - 1) * speedIncrement;
  }

  // --- Init ---
  resetGame();

  // ============================================================
  // Update
  // ============================================================
  API._update = function() {
    titlePulse++;

    if (state === "title") {
      if (btnp("start") || btnp("a")) {
        state = "play";
        resetGame();
        roundStartSound();
      }
      return;
    }

    if (state === "gameover") {
      // Update particles
      for (let i = particles.length - 1; i >= 0; i--) {
        const p = particles[i];
        p.x += p.vx; p.y += p.vy; p.vy += 0.06; p.life--;
        if (p.life <= 0) particles.splice(i, 1);
      }
      if (btnp("start") || btnp("a")) state = "title";
      return;
    }

    if (state === "roundend") {
      // Update particles
      for (let i = particles.length - 1; i >= 0; i--) {
        const p = particles[i];
        p.x += p.vx; p.y += p.vy; p.vy += 0.06; p.life--;
        if (p.life <= 0) particles.splice(i, 1);
      }
      for (let i = explosions.length - 1; i >= 0; i--) {
        explosions[i].timer--;
        if (explosions[i].timer <= 0) explosions.splice(i, 1);
      }
      roundTimer++;
      if (roundTimer > 90) {
        // Check for match end
        if (playerScore >= winsNeeded) {
          state = "gameover";
          particles = [];
          return;
        }
        if (aiScore >= winsNeeded) {
          state = "gameover";
          particles = [];
          return;
        }
        state = "play";
        nextRound();
        roundStartSound();
      }
      return;
    }

    // --- Play state ---
    if (roundMessage > 0) {
      roundMessage--;
      if (roundMessage === 60) roundStartSound();
      return; // freeze during countdown
    }

    roundTimer++;

    // Player input
    const player = cycles[0];
    if (player.alive) {
      if (btnp("up") && player.dir !== 2) { player.dir = 0; turnSound(); }
      else if (btnp("down") && player.dir !== 0) { player.dir = 2; turnSound(); }
      else if (btnp("left") && player.dir !== 1) { player.dir = 3; turnSound(); }
      else if (btnp("right") && player.dir !== 3) { player.dir = 1; turnSound(); }

      // Boost
      if (boostCooldown > 0) boostCooldown--;
      if (btn("a") && boostFuel > 0 && boostCooldown <= 0) {
        boostActive = true;
        boostFuel--;
        if (API.frame % 6 === 0) boostSound();
      } else {
        boostActive = false;
        // Regenerate fuel slowly
        if (boostFuel < boostMax && !btn("a")) boostFuel = min(boostMax, boostFuel + 0.2);
      }
    }

    // AI thinking
    for (let i = 1; i < cycles.length; i++) {
      const c = cycles[i];
      if (!c.alive) continue;
      if (API.frame % 3 === 0) aiThink(c); // think every 3 frames
    }

    // Move all cycles
    const speed = getCurrentSpeed();
    const playerSpeed = boostActive ? speed * 1.7 : speed;

    for (const c of cycles) {
      if (!c.alive) continue;

      const s = c.isPlayer ? playerSpeed : speed;
      c.moveAccum += s;

      while (c.moveAccum >= 1 && c.alive) {
        c.moveAccum -= 1;

        const nx = c.x + DX[c.dir];
        const ny = c.y + DY[c.dir];

        // Check collision
        if (nx <= ARENA_X || nx >= ARENA_R || ny <= ARENA_Y || ny >= ARENA_B || gridGet(nx, ny) !== 0) {
          // Crash!
          c.alive = false;
          crashedIds.add(c.id);
          addExplosion(c.x, c.y);
          crashSound();
          if (c.isPlayer && boostActive) {
            boostActive = false;
            boostCooldown = 30;
          }
        } else {
          // Move forward
          c.x = nx;
          c.y = ny;
          const gv = c.isPlayer ? 1 : c.id;
          gridSet(c.x, c.y, gv);
          c.trail.push({ x: c.x, y: c.y });
        }
      }
    }

    // Update explosions
    for (let i = explosions.length - 1; i >= 0; i--) {
      explosions[i].timer--;
      if (explosions[i].timer <= 0) explosions.splice(i, 1);
    }
    // Update particles
    for (let i = particles.length - 1; i >= 0; i--) {
      const p = particles[i];
      p.x += p.vx; p.y += p.vy; p.vy += 0.06; p.life--;
      if (p.life <= 0) particles.splice(i, 1);
    }

    // Check round end conditions
    const playerAlive = cycles[0].alive;
    const anyAIAlive = cycles.slice(1).some(c => c.alive);

    if (!playerAlive || !anyAIAlive) {
      // Determine winner
      if (!playerAlive && !anyAIAlive) {
        // Draw - no points
      } else if (playerAlive) {
        playerScore++;
        winSound();
      } else {
        aiScore++;
        loseSound();
      }
      state = "roundend";
      roundTimer = 0;
    }
  };

  // ============================================================
  // Draw
  // ============================================================
  API._draw = function() {
    cls(0);

    if (state === "title") {
      drawTitle();
      return;
    }

    if (state === "gameover") {
      drawGameOver();
      return;
    }

    // --- Draw arena and game ---
    drawArena();
    drawTrails();
    drawCycles();
    drawExplosions();
    drawParticles();
    drawHUD();

    if (roundMessage > 0) {
      drawCountdown();
    }

    if (state === "roundend") {
      drawRoundResult();
    }
  };

  function drawTitle() {
    // Background grid effect
    const t = API.frame * 0.02;
    for (let x = 0; x < W; x += 16) {
      for (let y = 0; y < H; y++) {
        if ((y + flr(t * 20)) % 16 === 0) pix(x, y, 1);
      }
    }
    for (let y = 0; y < H; y += 16) {
      for (let x = 0; x < W; x++) {
        if ((x + flr(t * 10)) % 16 === 0) pix(x, y, 1);
      }
    }

    // Vanishing point perspective lines
    const cx = W / 2;
    const cy = H / 2 + 30;
    for (let i = 0; i < 12; i++) {
      const angle = (i / 12) * Math.PI * 2 + t;
      const ex = cx + cos(angle) * 200;
      const ey = cy + sin(angle) * 150;
      line(flr(cx), flr(cy), flr(ex), flr(ey), 1);
    }

    // Title background box
    rectf(80, 41, 160, 38, 0);
    rect(80, 41, 160, 38, 2);
    rect(82, 43, 156, 34, 1);

    // Title text
    const bounce = sin(API.frame * 0.06) * 3;
    text("TRON", 150, flr(48 + bounce), 3);
    text("LIGHT CYCLES", 130, flr(60 + bounce), 2);

    // Animated light cycles on title
    const bikeY = 98;
    const bikeX1 = flr((API.frame * 2) % (W + 100)) - 50;
    const bikeX2 = W - bikeX1 + 50;

    // Trails behind title bikes
    for (let i = 0; i < 40; i++) {
      pix(bikeX1 - i, bikeY + 3, i < 20 ? 3 : 2);
      pix(bikeX1 - i, bikeY + 4, i < 20 ? 3 : 2);
    }
    for (let i = 0; i < 40; i++) {
      pix(bikeX2 + i, bikeY + 13, i < 20 ? 2 : 1);
      pix(bikeX2 + i, bikeY + 14, i < 20 ? 2 : 1);
    }
    spr(1, bikeX1, bikeY);
    spr(2, bikeX2, bikeY + 10, true);

    // Instructions
    if (flr(API.frame / 20) % 2 === 0) {
      text("PRESS START", 133, 131, 3);
    }

    // Rules
    rectf(87, 150, 147, 64, 0);
    rect(87, 150, 147, 64, 1);
    text("HOW TO PLAY", 133, 155, 2);
    text("ARROWS: TURN YOUR CYCLE", 103, 167, 2);
    text("Z: BOOST SPEED", 125, 176, 2);
    text("AVOID WALLS AND TRAILS", 105, 185, 2);
    text("TRAP YOUR OPPONENT!", 113, 194, 2);
    text("BEST OF 5 ROUNDS", 120, 203, 1);

    text("GRAYBOX DEMO V0.1", 118, 229, 1);
  }

  function drawGameOver() {
    // Background
    for (let i = 0; i < 30; i++) {
      const x = flr(rnd(W));
      const y = flr(rnd(H));
      pix(x, y, 1);
    }

    drawParticles();

    const won = playerScore >= winsNeeded;

    rectf(80, 60, 160, 105, 0);
    rect(80, 60, 160, 105, won ? 3 : 1);
    rect(82, 62, 156, 101, won ? 2 : 1);

    if (won) {
      spr(5, 147, 69);
      spr(5, 165, 69);
      text("YOU WIN!", 140, 81, 3);
    } else {
      text("GAME OVER", 138, 75, 3);
      text("DEREZZING...", 130, 86, 1);
    }

    text("PLAYER: " + playerScore, 125, 105, 3);
    text("CPU:    " + aiScore, 125, 116, 2);
    text("ROUNDS: " + round, 125, 128, 1);

    if (flr(API.frame / 20) % 2 === 0) {
      text("PRESS START", 133, 150, 3);
    }
  }

  function drawArena() {
    // Arena border - double line for style
    rect(ARENA_X, ARENA_Y, ARENA_W, ARENA_H, 2);
    rect(ARENA_X + 1, ARENA_Y + 1, ARENA_W - 2, ARENA_H - 2, 1);

    // Corner accents
    const cLen = 8;
    // Top-left
    line(ARENA_X, ARENA_Y, ARENA_X + cLen, ARENA_Y, 3);
    line(ARENA_X, ARENA_Y, ARENA_X, ARENA_Y + cLen, 3);
    // Top-right
    line(ARENA_R, ARENA_Y, ARENA_R - cLen, ARENA_Y, 3);
    line(ARENA_R, ARENA_Y, ARENA_R, ARENA_Y + cLen, 3);
    // Bottom-left
    line(ARENA_X, ARENA_B, ARENA_X + cLen, ARENA_B, 3);
    line(ARENA_X, ARENA_B, ARENA_X, ARENA_B - cLen, 3);
    // Bottom-right
    line(ARENA_R, ARENA_B, ARENA_R - cLen, ARENA_B, 3);
    line(ARENA_R, ARENA_B, ARENA_R, ARENA_B - cLen, 3);

    // Subtle grid dots
    for (let gx = ARENA_X + 13; gx < ARENA_R; gx += 13) {
      for (let gy = ARENA_Y + 15; gy < ARENA_B; gy += 15) {
        pix(gx, gy, 1);
      }
    }
  }

  function drawTrails() {
    // Draw trails directly from grid for O(arena) performance
    const aw = ARENA_W;
    const ax = ARENA_X;
    const ay = ARENA_Y;
    const c3 = COLOR_U32[3];
    const c2 = COLOR_U32[2];
    for (let gy = 0; gy < ARENA_H; gy++) {
      const rowOff = gy * aw;
      const screenRow = (ay + gy) * W + ax;
      for (let gx = 0; gx < aw; gx++) {
        const v = grid[rowOff + gx];
        if (v === 1) buf32[screenRow + gx] = c3;
        else if (v > 1) buf32[screenRow + gx] = c2;
      }
    }
  }

  function drawCycles() {
    for (const c of cycles) {
      if (!c.alive) continue;

      // Draw cycle head as a bright block with direction indicator
      const hx = c.x;
      const hy = c.y;

      if (c.isPlayer) {
        // Player - 3x3 bright head
        for (let dy = -1; dy <= 1; dy++) {
          for (let dx = -1; dx <= 1; dx++) {
            pix(hx + dx, hy + dy, 3);
          }
        }
        // Direction indicator
        pix(hx + DX[c.dir] * 2, hy + DY[c.dir] * 2, 3);

        // Boost glow
        if (boostActive) {
          pix(hx + DX[c.dir] * 3, hy + DY[c.dir] * 3, flr(API.frame / 2) % 2 === 0 ? 3 : 2);
          // Side glow
          const perpX = DY[c.dir];
          const perpY = -DX[c.dir];
          pix(hx - DX[c.dir] * 2 + perpX, hy - DY[c.dir] * 2 + perpY, 2);
          pix(hx - DX[c.dir] * 2 - perpX, hy - DY[c.dir] * 2 - perpY, 2);
        }
      } else {
        // AI - 3x3 medium head
        for (let dy = -1; dy <= 1; dy++) {
          for (let dx = -1; dx <= 1; dx++) {
            pix(hx + dx, hy + dy, 2);
          }
        }
        pix(hx + DX[c.dir] * 2, hy + DY[c.dir] * 2, 2);
        // Center bright
        pix(hx, hy, 3);
      }
    }
  }

  function drawExplosions() {
    for (const e of explosions) {
      const sprId = e.timer > 9 ? 3 : 4;
      spr(sprId, flr(e.x) - 4, flr(e.y) - 4);

      // Extra explosion ring
      const r = 18 - e.timer;
      if (r > 0 && r < 15) {
        circ(flr(e.x), flr(e.y), r, e.timer > 6 ? 3 : 2);
      }
    }
  }

  function drawParticles() {
    for (const p of particles) {
      pix(flr(p.x), flr(p.y), p.color);
    }
  }

  function drawHUD() {
    // Top bar background
    rectf(0, 0, W, 14, 0);
    line(0, 14, W, 14, 1);

    // Round info
    text("ROUND " + round, 3, 2, 2);

    // Score
    const scoreStr = "P:" + playerScore + "  CPU:" + aiScore;
    text(scoreStr, 133, 2, 3);

    // Wins needed
    text("FIRST TO " + winsNeeded, 133, 8, 1);

    // Boost meter
    text("BOOST", 247, 2, boostActive ? 3 : 1);
    const meterX = 267;
    const meterW = 40;
    const meterH = 5;
    rect(meterX, 7, meterW, meterH, 1);
    const fillW = flr((boostFuel / boostMax) * (meterW - 2));
    if (fillW > 0) {
      rectf(meterX + 1, 8, fillW, meterH - 2, boostActive ? 3 : 2);
    }

    // Speed indicator
    const spd = getCurrentSpeed();
    text("SPD:" + (flr(spd * 10) / 10), 3, 8, 1);

    // Round score dots
    const dotY = 8;
    const dotStartX = 207;
    for (let i = 0; i < winsNeeded; i++) {
      const filled = i < playerScore;
      if (filled) rectf(dotStartX + i * 8, dotY, 5, 5, 3);
      else rect(dotStartX + i * 8, dotY, 5, 5, 1);
    }
    text("V", dotStartX + winsNeeded * 8 + 2, dotY - 1, 1);
    for (let i = 0; i < winsNeeded; i++) {
      const filled = i < aiScore;
      const dx = dotStartX + (winsNeeded + 1) * 8 + 4 + i * 8;
      if (filled) rectf(dx, dotY, 5, 5, 2);
      else rect(dx, dotY, 5, 5, 1);
    }
  }

  function drawCountdown() {
    const t = roundMessage;
    let msg = "";
    let col = 2;

    if (t > 60) {
      msg = "ROUND " + round;
      col = 3;
      if (numAI > 1) {
        text(numAI + " OPPONENTS", 133, 128, 2);
      }
    } else if (t > 30) {
      msg = "READY";
      col = 2;
    } else if (t > 0) {
      msg = "GO!";
      col = 3;
    }

    if (msg) {
      const tw = msg.length * 5;
      const mx = flr((W - tw) / 2);
      const my = 113;

      // Background box
      rectf(mx - 10, my - 5, tw + 20, 16, 0);
      rect(mx - 10, my - 5, tw + 20, 16, col);

      text(msg, mx, my, col);
    }
  }

  function drawRoundResult() {
    const playerAlive = cycles[0].alive;
    const anyAIAlive = cycles.slice(1).some(c => c.alive);

    let msg, col;
    if (!playerAlive && !anyAIAlive) {
      msg = "DRAW!";
      col = 1;
    } else if (playerAlive) {
      msg = "YOU WIN THE ROUND!";
      col = 3;
    } else {
      msg = "DEREZZZED!";
      col = 2;
    }

    const tw = msg.length * 5;
    const mx = flr((W - tw) / 2);
    const my = 109;

    rectf(mx - 15, my - 8, tw + 30, 24, 0);
    rect(mx - 15, my - 8, tw + 30, 24, col);
    text(msg, mx, my, col);

    text("P:" + playerScore + " - CPU:" + aiScore, mx + 10, my + 10, 2);
  }

  // ============================================================
  // Boot
  // ============================================================
  if (API._init) API._init();
  setInterval(tick, 1000 / FPS);
  document.addEventListener("keydown", ensureAudio, { once: true });
  document.addEventListener("click", ensureAudio, { once: true });
})();
</script>
</body>
