  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #0a0a0a;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100vh;
    font-family: monospace;
    overflow: hidden;
  }
  #frame {
    background: #111;
    border: 3px solid #333;
    border-radius: 8px;
    padding: 12px;
    box-shadow: 0 0 40px rgba(0,0,0,0.8), inset 0 0 20px rgba(0,0,0,0.5);
  }
  canvas {
    display: block;
    image-rendering: pixelated;
    image-rendering: crisp-edges;
  }
  #controls {
    margin-top: 12px;
    color: #6b6b6b;
    font-size: 11px;
    text-align: center;
    letter-spacing: 1px;
  }
  #controls span { color: #b0b0b0; }
</style>

  // --- Building / Level Layout ---
  // The building has 30 floors. Each floor is 24px tall (3 tile rows).
  // The viewport scrolls vertically to follow the player.
  // Building width: 40 tiles (320px). Each floor has walls, floor, doors, elevator shafts.

  const FLOOR_H = 24; // pixels per floor
  const NUM_FLOORS = 30;
  const BUILDING_H = NUM_FLOORS * FLOOR_H; // total pixel height
  const BUILDING_W = W; // 320px

  // Elevator shafts: defined by x-tile positions (each shaft is 1 tile = 8px wide)
  // We'll have 4 elevator shafts at various x positions
  const SHAFT_POSITIONS = [5, 15, 25, 35]; // tile-x positions for elevator shafts
  const SHAFT_W = 8; // pixels

  // Escalator positions (pairs: from floor to floor-1)
  const ESCALATOR_POSITIONS = [10, 20, 30]; // tile-x

  // Floor layout
  // Each floor has: left wall, floor platform, doors, right wall
  // Doors: red doors have documents, normal doors are decorative
  // Lamps on each floor

  const { TITLE, PLAY, GAMEOVER, WIN } = GrayBox.SCENE;
  let player, bullets, eBullets, enemies, explosions, particles;
  let elevators, doors, lamps, escalators;
  let score, lives, camY, docsCollected, docsTotal;
  let shootCooldown, invincible, invTimer;
  let titleBlink;

  // Building generation
  function generateBuilding() {
    doors = [];
    lamps = [];
    elevators = [];
    escalators = [];
    docsTotal = 0;

    // Create elevators for each shaft
    for (let si = 0; si < SHAFT_POSITIONS.length; si++) {
      const sx = SHAFT_POSITIONS[si] * 8;
      // Each shaft has 1-2 elevator cars
      const numCars = si < 2 ? 2 : 1;
      for (let c = 0; c < numCars; c++) {
        const startFloor = flr(rnd(NUM_FLOORS - 4)) + 2;
        elevators.push({
          x: sx,
          y: startFloor * FLOOR_H - 8,
          shaftIdx: si,
          speed: 0,
          targetY: startFloor * FLOOR_H - 8,
          moving: false,
          hasPlayer: false,
          dir: 0, // -1 up, 1 down, 0 stopped
          minY: 1 * FLOOR_H - 8,
          maxY: (NUM_FLOORS - 1) * FLOOR_H - 8
        });
      }
    }

    // Create escalators
    for (let ei = 0; ei < ESCALATOR_POSITIONS.length; ei++) {
      const ex = ESCALATOR_POSITIONS[ei] * 8;
      // Place escalators on some floors
      for (let f = 2; f < NUM_FLOORS - 1; f += 4 + flr(rnd(3))) {
        escalators.push({
          x: ex,
          floor: f,
          topY: (f - 1) * FLOOR_H,
          bottomY: f * FLOOR_H
        });
      }
    }

    // Create doors on each floor
    for (let f = 1; f < NUM_FLOORS - 1; f++) {
      const floorY = f * FLOOR_H;
      // Place 2-4 doors per floor
      const numDoors = 2 + flr(rnd(3));
      const usedX = new Set();

      for (let d = 0; d < numDoors; d++) {
        let dx;
        let attempts = 0;
        do {
          dx = (2 + flr(rnd(36))) * 8;
          attempts++;
        } while (attempts < 20 && (
          usedX.has(dx) ||
          SHAFT_POSITIONS.some(sp => _abs(dx - sp * 8) < 16) ||
          ESCALATOR_POSITIONS.some(ep => _abs(dx - ep * 8) < 16)
        ));
        if (attempts >= 20) continue;
        usedX.add(dx);

        // ~30% chance of being a red (document) door
        const isRed = rnd(1) < 0.3;
        if (isRed) docsTotal++;

        doors.push({
          x: dx,
          y: floorY - 8, // door sits on the floor
          floor: f,
          isRed: isRed,
          open: false,
          collected: false,
          openTimer: 0
        });
      }

      // Place lamps on each floor
      const numLamps = 3 + flr(rnd(3));
      for (let l = 0; l < numLamps; l++) {
        const lx = (3 + flr(rnd(34))) * 8;
        lamps.push({
          x: lx,
          y: floorY - 18, // lamps hang from ceiling
          floor: f,
          lit: true
        });
      }
    }

    // Ensure at least some red doors
    if (docsTotal < 5) {
      for (let i = 0; i < doors.length && docsTotal < 8; i++) {
        if (!doors[i].isRed && rnd(1) < 0.5) {
          doors[i].isRed = true;
          docsTotal++;
        }
      }
    }
  }

  function resetGame() {
    player = {
      x: W / 2 - 4,
      y: 1 * FLOOR_H - 8, // Start near top (floor 1)
      vx: 0,
      vy: 0,
      dir: 1, // 1=right, -1=left
      onGround: true,
      onElevator: null,
      ducking: false,
      jumping: false,
      shooting: false,
      shootTimer: 0,
      walkFrame: 0,
      enteringDoor: false,
      enterDoorTimer: 0,
      dead: false,
      deathTimer: 0
    };
    bullets = [];
    eBullets = [];
    enemies = [];
    explosions = [];
    particles = [];
    score = 0;
    lives = 3;
    docsCollected = 0;
    shootCooldown = 0;
    invincible = 0;
    invTimer = 0;
    camY = 0;

    generateBuilding();
    spawnEnemies();
    updateCamera();
  }

  function spawnEnemies() {
    // Spawn enemies on various floors
    enemies = [];
    for (let f = 2; f < NUM_FLOORS - 1; f++) {
      // 40% chance per floor to have an enemy
      if (rnd(1) < 0.4) {
        const ex = (3 + flr(rnd(34))) * 8;
        enemies.push({
          x: ex,
          y: f * FLOOR_H - 8,
          floor: f,
          dir: rnd(1) < 0.5 ? 1 : -1,
          state: "patrol", // patrol, chase, shooting, riding, dead
          hp: 1,
          walkFrame: 0,
          shootTimer: 60 + flr(rnd(90)),
          shootCooldown: 0,
          onElevator: null,
          stateTimer: 0,
          alertTimer: 0,
          speed: 0.6 + rnd(0.4)
        });
      }
    }
  }

  function respawnEnemy() {
    // Respawn an enemy at a random floor far from player
    const pFloor = flr(player.y / FLOOR_H);
    let f;
    let attempts = 0;
    do {
      f = 2 + flr(rnd(NUM_FLOORS - 3));
      attempts++;
    } while (_abs(f - pFloor) < 5 && attempts < 20);

    const ex = (3 + flr(rnd(34))) * 8;
    enemies.push({
      x: ex,
      y: f * FLOOR_H - 8,
      floor: f,
      dir: rnd(1) < 0.5 ? 1 : -1,
      state: "patrol",
      hp: 1,
      walkFrame: 0,
      shootTimer: 60 + flr(rnd(90)),
      shootCooldown: 0,
      onElevator: null,
      stateTimer: 0,
      alertTimer: 0,
      speed: 0.6 + rnd(0.4)
    });
  }

  function updateCamera() {
    // Camera follows player vertically, centered
    const targetY = player.y - H / 2 + 16;
    camY += (targetY - camY) * 0.12;
    camY = _max(0, min(BUILDING_H - H, camY));
  }

  function getFloorY(floor) {
    return floor * FLOOR_H;
  }

  function isOnFloor(x, y) {
    // Check if position is on a solid floor
    const floor = flr((y + 8) / FLOOR_H);
    if (floor < 0 || floor >= NUM_FLOORS) return false;
    const floorPixelY = floor * FLOOR_H;
    // Check if not in an elevator shaft
    for (const sp of SHAFT_POSITIONS) {
      const sx = sp * 8;
      if (x + 4 > sx && x + 4 < sx + 8) {
        // In a shaft - only "on floor" if there's an elevator here
        return false;
      }
    }
    return _abs(y + 8 - floorPixelY) < 3;
  }

  function isInShaft(x) {
    for (let i = 0; i < SHAFT_POSITIONS.length; i++) {
      const sx = SHAFT_POSITIONS[i] * 8;
      if (x + 4 > sx - 2 && x + 4 < sx + 10) return i;
    }
    return -1;
  }

  function findElevatorAt(x, y) {
    for (const e of elevators) {
      if (_abs(e.x - x) < 10 && _abs(e.y - y) < 6) return e;
    }
    return null;
  }

  function addExplosion(x, y) {
    explosions.push({ x: x, y: y, timer: 12 });
    for (let i = 0; i < 6; i++)
      particles.push({
        x: x + 4, y: y + 4,
        vx: rnd(4) - 2, vy: rnd(4) - 2,
        life: 6 + flr(rnd(10)),
        color: flr(rnd(3)) + 1
      });
  }

  // --- Sounds ---
  function shootSound() { note(0, "C6", 0.04); }
  function hitSound() { note(1, "C3", 0.06); setTimeout(() => note(1, "E3", 0.05), 40); }
  function doorSound() { note(0, "E4", 0.06); setTimeout(() => note(0, "G4", 0.04), 50); }
  function docSound() {
    note(0, "C5", 0.08);
    setTimeout(() => note(0, "E5", 0.06), 60);
    setTimeout(() => note(0, "G5", 0.08), 120);
  }
  function deathSound() {
    note(0, "C3", 0.12); note(1, "G2", 0.12);
    setTimeout(() => { note(0, "A2", 0.18); note(1, "E2", 0.18); }, 120);
  }
  function elevatorSound() { note(1, "A3", 0.03); }
  function crushSound() { note(1, "C2", 0.15); note(0, "E2", 0.1); }
  function lampSound() { note(1, "F5", 0.03); }
  function winSound() {
    note(0, "C5", 0.1);
    setTimeout(() => note(0, "E5", 0.1), 100);
    setTimeout(() => note(0, "G5", 0.1), 200);
    setTimeout(() => note(0, "C6", 0.2), 300);
  }

  // --- Title Scene ---
  GrayBox.scene(TITLE, {
    init() {},
    update() {
      if (btnp("a") || btnp("a")) {
        resetGame();
        note(0, "C5", 0.1);
        setTimeout(() => note(0, "E5", 0.1), 100);
        setTimeout(() => note(0, "G5", 0.15), 200);
        GrayBox.go(PLAY); return;
      }
    },
    draw() {
      cls(0);
      drawTitle();
    }
  });

  // --- Game Over Scene ---
  GrayBox.scene(GAMEOVER, {
    init() {},
    update() {
      for (let i = particles.length - 1; i >= 0; i--) {
        const p = particles[i]; p.x += p.vx; p.y += p.vy; p.vy += 0.08; p.life--;
        if (p.life <= 0) particles.splice(i, 1);
      }
      if (btnp("a") || btnp("a")) { GrayBox.go(TITLE); return; }
    },
    draw() {
      cls(0);
      drawGameOver();
    }
  });

  // --- Win Scene ---
  GrayBox.scene(WIN, {
    init() {},
    update() {
      if (btnp("a") || btnp("a")) { GrayBox.go(TITLE); return; }
    },
    draw() {
      cls(0);
      drawWin();
    }
  });

  // --- Play Scene ---
  GrayBox.scene(PLAY, {
    init() {},
    update() {
    // --- Play state ---
    if (player.dead) {
      player.deathTimer--;
      if (player.deathTimer <= 0) {
        lives--;
        if (lives <= 0) {
          GrayBox.go(GAMEOVER);
          return;
        }
        // Respawn at current floor
        const f = flr(player.y / FLOOR_H);
        player.x = W / 2 - 4;
        player.y = f * FLOOR_H - 8;
        player.dead = false;
        player.onElevator = null;
        player.ducking = false;
        player.jumping = false;
        player.vx = 0;
        player.vy = 0;
        player.onGround = true;
        invincible = 60;
      }
      // Update particles during death
      for (let i = particles.length - 1; i >= 0; i--) {
        const p = particles[i]; p.x += p.vx; p.y += p.vy; p.vy += 0.08; p.life--;
        if (p.life <= 0) particles.splice(i, 1);
      }
      updateCamera();
      return;
    }

    if (invincible > 0) invincible--;

    // --- Player movement ---
    const wasOnElevator = player.onElevator;

    if (player.onElevator) {
      // Riding an elevator
      const elev = player.onElevator;

      if (btn("up")) {
        elev.dir = -1;
        elev.moving = true;
        if (GrayBox.frame % 10 === 0) elevatorSound();
      } else if (btn("down")) {
        elev.dir = 1;
        elev.moving = true;
        if (GrayBox.frame % 10 === 0) elevatorSound();
      } else {
        elev.dir = 0;
        elev.moving = false;
      }

      if (elev.moving) {
        elev.y += elev.dir * 1.5;
        elev.y = _max(elev.minY, min(elev.maxY, elev.y));
        player.y = elev.y;
      }

      // Check if at a floor - can step off
      const nearFloor = flr((elev.y + 8) / FLOOR_H);
      const floorPixY = nearFloor * FLOOR_H;
      const snapDist = _abs(elev.y + 8 - floorPixY);

      if (snapDist < 4) {
        if (btn("left")) {
          player.onElevator = null;
          player.x -= 10;
          player.y = floorPixY - 8;
          player.dir = -1;
          player.onGround = true;
          elev.moving = false;
          elev.dir = 0;
          elev.hasPlayer = false;
        } else if (btn("right")) {
          player.onElevator = null;
          player.x += 10;
          player.y = floorPixY - 8;
          player.dir = 1;
          player.onGround = true;
          elev.moving = false;
          elev.dir = 0;
          elev.hasPlayer = false;
        }
      }

      // Can shoot while on elevator
      if (shootCooldown > 0) shootCooldown--;
      if (btnp("a") && shootCooldown <= 0) {
        bullets.push({ x: player.x + (player.dir > 0 ? 8 : -4), y: player.y + 0, dir: player.dir });
        shootCooldown = 10;
        shootSound();
        player.shooting = true;
        player.shootTimer = 8;
      }

    } else {
      // On foot
      player.ducking = false;

      if (btn("left")) {
        player.x -= 1.8;
        player.dir = -1;
        player.walkFrame += 0.2;
      } else if (btn("right")) {
        player.x += 1.8;
        player.dir = 1;
        player.walkFrame += 0.2;
      } else {
        player.walkFrame = 0;
      }

      // Duck
      if (btn("down") && player.onGround && !player.jumping) {
        player.ducking = true;
      }

      // Jump
      if (btnp("b") && player.onGround && !player.ducking) {
        player.vy = -4;
        player.jumping = true;
        player.onGround = false;
        note(0, "G4", 0.03);
      }

      // Duck with B when on ground and not jumping
      if (btn("b") && player.onGround && !player.jumping) {
        player.ducking = true;
      }

      // Gravity
      if (!player.onGround) {
        player.vy += 0.25;
        player.y += player.vy;

        // Check floor collision
        const currentFloor = flr((player.y + 8) / FLOOR_H);
        const floorPixY = currentFloor * FLOOR_H;

        if (player.vy > 0 && player.y + 8 >= floorPixY && currentFloor > 0) {
          // Check if we're in a shaft
          const shaftIdx = isInShaft(player.x);
          if (shaftIdx < 0) {
            player.y = floorPixY - 8;
            player.vy = 0;
            player.onGround = true;
            player.jumping = false;
          } else {
            // In shaft - check for elevator below
            const elev = findElevatorAt(player.x, player.y);
            if (elev) {
              player.y = elev.y;
              player.vy = 0;
              player.onGround = true;
              player.jumping = false;
              player.onElevator = elev;
              elev.hasPlayer = true;
            }
          }
        }
      }

      // Check elevator entry (up/down near shaft)
      if (player.onGround && !player.jumping) {
        const shaftIdx = isInShaft(player.x);
        if (shaftIdx >= 0 && (btnp("up") || btnp("down"))) {
          const elev = findElevatorAt(player.x, player.y);
          if (elev) {
            player.onElevator = elev;
            elev.hasPlayer = true;
            player.x = elev.x;
            player.y = elev.y;
            elevatorSound();
          }
        }
      }

      // Snap to floor if on ground
      if (player.onGround && !player.jumping) {
        const currentFloor = flr((player.y + 8) / FLOOR_H);
        const floorPixY = currentFloor * FLOOR_H;
        player.y = floorPixY - 8;

        // Check if walked into a shaft (fall!)
        const shaftIdx = isInShaft(player.x);
        if (shaftIdx >= 0) {
          // Check for elevator at current position
          const elev = findElevatorAt(player.x, player.y);
          if (!elev) {
            player.onGround = false;
            player.vy = 0;
          }
        }
      }

      // Escalator usage
      if (player.onGround) {
        for (const esc of escalators) {
          if (_abs(player.x - esc.x) < 6) {
            const playerFloor = flr((player.y + 8) / FLOOR_H);
            if (playerFloor === esc.floor && btn("up")) {
              // Ride escalator up
              player.y = (esc.floor - 1) * FLOOR_H - 8;
              player.x = esc.x;
              note(0, "D4", 0.04);
            }
          }
        }
      }

      // Shoot
      if (shootCooldown > 0) shootCooldown--;
      if (btnp("a") && shootCooldown <= 0 && !player.ducking) {
        bullets.push({ x: player.x + (player.dir > 0 ? 8 : -4), y: player.y + 0, dir: player.dir });
        shootCooldown = 10;
        shootSound();
        player.shooting = true;
        player.shootTimer = 8;
      }

      // Door interaction (up near a door)
      if (player.onGround && btn("up")) {
        for (const door of doors) {
          if (!door.open && _abs(player.x - door.x) < 8 && _abs(player.y - door.y) < 4) {
            door.open = true;
            door.openTimer = 90; // stays open for 3 seconds
            doorSound();
            if (door.isRed && !door.collected) {
              door.collected = true;
              docsCollected++;
              score += 500;
              docSound();
            }
          }
        }
      }
    }

    // Clamp player position
    player.x = _max(4, min(W - 12, player.x));

    // Shoot timer
    if (player.shootTimer > 0) {
      player.shootTimer--;
      if (player.shootTimer <= 0) player.shooting = false;
    }

    // --- Update bullets ---
    for (let i = bullets.length - 1; i >= 0; i--) {
      const b = bullets[i];
      b.x += b.dir * 5;
      if (b.x < -8 || b.x > W + 8) { bullets.splice(i, 1); continue; }

      // Hit lamp
      for (const lamp of lamps) {
        if (lamp.lit && _abs(b.x - lamp.x) < 6 && _abs(b.y - lamp.y) < 6) {
          lamp.lit = false;
          bullets.splice(i, 1);
          lampSound();
          score += 50;
          break;
        }
      }
    }

    // --- Update enemy bullets ---
    for (let i = eBullets.length - 1; i >= 0; i--) {
      const b = eBullets[i];
      b.x += b.dir * 3.5;
      if (b.x < -8 || b.x > W + 8) { eBullets.splice(i, 1); continue; }

      // Hit player
      if (invincible <= 0 && !player.dead) {
        const ph = player.ducking ? 4 : 8;
        const py = player.ducking ? player.y + 4 : player.y;
        if (b.x + 8 > player.x - 2 && b.x < player.x + 8 && b.y + 8 > py && b.y < py + ph) {
          eBullets.splice(i, 1);
          killPlayer();
          continue;
        }
      }
    }

    // --- Update doors ---
    for (const door of doors) {
      if (door.open) {
        door.openTimer--;
        if (door.openTimer <= 0) door.open = false;
      }
    }

    // --- Update enemies ---
    for (let i = enemies.length - 1; i >= 0; i--) {
      const e = enemies[i];
      if (e.state === "dead") {
        enemies.splice(i, 1);
        // Respawn after a delay
        setTimeout(respawnEnemy, 3000);
        continue;
      }

      const playerFloor = flr((player.y + 8) / FLOOR_H);
      const enemyFloor = flr((e.y + 8) / FLOOR_H);
      const distToPlayer = _abs(e.x - player.x);
      const sameFloor = enemyFloor === playerFloor;

      // AI states
      if (e.onElevator) {
        // Riding elevator
        const elev = e.onElevator;
        e.stateTimer--;
        elev.y += (e.stateTimer > 30 ? -1 : 1) * 1;
        elev.y = _max(elev.minY, min(elev.maxY, elev.y));
        e.y = elev.y;
        e.x = elev.x;

        if (e.stateTimer <= 0) {
          e.onElevator = null;
          e.state = "patrol";
          const nearFloor = flr((e.y + 8) / FLOOR_H);
          e.y = nearFloor * FLOOR_H - 8;
          e.floor = nearFloor;
          elev.hasPlayer = false;
        }
      } else if (e.state === "patrol") {
        // Walk back and forth
        e.x += e.dir * e.speed;
        e.walkFrame += 0.15;

        // Reverse at edges or walls
        if (e.x < 11 || e.x > W - 16) {
          e.dir = -e.dir;
        }

        // Check for shaft - avoid falling
        const shaftIdx = isInShaft(e.x + e.dir * 8);
        if (shaftIdx >= 0) {
          // Sometimes take elevator
          if (rnd(1) < 0.01) {
            const elev = findElevatorAt(e.x, e.y);
            if (elev && !elev.hasPlayer) {
              e.onElevator = elev;
              elev.hasPlayer = true;
              e.state = "riding";
              e.stateTimer = 60 + flr(rnd(60));
              elevatorSound();
            }
          } else {
            e.dir = -e.dir;
          }
        }

        // Detect player on same floor
        if (sameFloor && distToPlayer < 107) {
          e.state = "chase";
          e.alertTimer = 120;
          e.dir = player.x > e.x ? 1 : -1;
        }

        // Random direction change
        if (rnd(1) < 0.005) e.dir = -e.dir;

      } else if (e.state === "chase") {
        e.dir = player.x > e.x ? 1 : -1;
        e.x += e.dir * (e.speed + 0.3);
        e.walkFrame += 0.2;

        // Shoot at player
        e.shootCooldown--;
        if (e.shootCooldown <= 0 && sameFloor && distToPlayer < 133 && distToPlayer > 20) {
          eBullets.push({ x: e.x + (e.dir > 0 ? 8 : -4), y: e.y + 0, dir: e.dir });
          e.shootCooldown = 30 + flr(rnd(30));
          note(1, "E5", 0.03);
        }

        // Check for shaft
        const shaftIdx = isInShaft(e.x + e.dir * 8);
        if (shaftIdx >= 0) e.dir = -e.dir;

        e.alertTimer--;
        if (e.alertTimer <= 0 || !sameFloor || distToPlayer > 133) {
          e.state = "patrol";
        }

        // Clamp
        e.x = _max(5, min(W - 11, e.x));
      }

      // Bullet-enemy collision
      for (let j = bullets.length - 1; j >= 0; j--) {
        const b = bullets[j];
        if (b.x + 8 > e.x - 2 && b.x < e.x + 8 && _abs(b.y - (e.y + 4)) < 6) {
          bullets.splice(j, 1);
          e.hp--;
          if (e.hp <= 0) {
            addExplosion(e.x, e.y);
            score += 300;
            hitSound();
            e.state = "dead";
          }
          break;
        }
      }

      // Elevator crush detection
      for (const elev of elevators) {
        if (elev.moving && elev.hasPlayer && e.state !== "dead") {
          if (_abs(e.x - elev.x) < 8 && _abs(e.y - elev.y) < 10) {
            addExplosion(e.x, e.y);
            score += 500;
            crushSound();
            e.state = "dead";
          }
        }
      }

      // Player-enemy collision (body)
      if (e.state !== "dead" && invincible <= 0 && !player.dead) {
        if (_abs(player.x - e.x) < 7 && _abs(player.y - e.y) < 7) {
          killPlayer();
        }
      }
    }

    // --- Move elevators without players ---
    for (const elev of elevators) {
      if (!elev.hasPlayer && elev.moving) {
        elev.y += elev.dir * 1;
        elev.y = _max(elev.minY, min(elev.maxY, elev.y));
      }
    }

    // --- Explosions ---
    for (let i = explosions.length - 1; i >= 0; i--) {
      explosions[i].timer--;
      if (explosions[i].timer <= 0) explosions.splice(i, 1);
    }

    // --- Particles ---
    for (let i = particles.length - 1; i >= 0; i--) {
      const p = particles[i]; p.x += p.vx; p.y += p.vy; p.vy += 0.05; p.life--;
      if (p.life <= 0) particles.splice(i, 1);
    }

    // --- Win condition: reach bottom floor with all docs ---
    const playerFloor = flr((player.y + 8) / FLOOR_H);
    if (playerFloor >= NUM_FLOORS - 1 && docsCollected >= docsTotal) {
      winSound();
      GrayBox.go(WIN); return;
      score += 2000;
    }

    updateCamera();
    },
    draw() {
    cls(0);

    // --- Play state rendering ---
    const cy = flr(camY);

    // Draw building
    drawBuilding(cy);

    // Draw escalators
    for (const esc of escalators) {
      const sy = esc.bottomY - cy;
      const sx = esc.x;
      if (sy > -30 && sy < H + 8) {
        // Draw escalator steps
        for (let step = 0; step < 4; step++) {
          const stepY = sy - step * 8;
          const stepX = sx - step * 2;
          spr(37, stepX, stepY);
        }
      }
    }

    // Draw elevator shafts and cars
    for (let si = 0; si < SHAFT_POSITIONS.length; si++) {
      const sx = SHAFT_POSITIONS[si] * 8;
      // Draw shaft rails
      for (let fy = -1; fy < NUM_FLOORS + 1; fy++) {
        const shaftY = fy * FLOOR_H - cy;
        if (shaftY > -8 && shaftY < H + 8) {
          spr(31, sx, shaftY);
        }
      }
    }

    // Draw elevator cars
    for (const elev of elevators) {
      const ey = flr(elev.y) - cy;
      if (ey > -16 && ey < H + 8) {
        spr(30, elev.x, ey);
      }
    }

    // Draw doors
    for (const door of doors) {
      const dy = door.y - cy;
      if (dy > -16 && dy < H + 8) {
        if (door.isRed) {
          spr(door.open ? 21 : 20, door.x, dy);
          // Show document icon if not collected and door open
          if (door.open && !door.collected) {
            spr(38, door.x, dy - 10);
          }
        } else {
          spr(door.open ? 23 : 22, door.x, dy);
        }
      }
    }

    // Draw lamps
    for (const lamp of lamps) {
      const ly = lamp.y - cy;
      if (ly > -16 && ly < H + 8) {
        spr(lamp.lit ? 34 : 35, lamp.x, ly);

        // Light pool effect when lit
        if (lamp.lit) {
          const floorBelow = lamp.floor;
          const lightY = getFloorY(floorBelow) - cy - 2;
          // Subtle light glow on floor
          for (let lx = -12; lx <= 12; lx++) {
            const intensity = 2 - flr(_abs(lx) / 5);
            if (intensity > 0) {
              const px = lamp.x + 4 + lx;
              const py = lightY;
              if (px >= 0 && px < W && py >= 0 && py < H) {
                // Brighten pixel slightly
                pix(px, py, min(3, intensity + 1));
              }
            }
          }
        }
      }
    }

    // Darken areas with shot-out lamps
    // (Simple approach: draw semi-dark overlay for floors with no lit lamps nearby)

    // Draw enemy bullets
    for (const b of eBullets) {
      const by = b.y - cy;
      if (by > -8 && by < H + 8) {
        spr(36, flr(b.x), flr(by), b.dir < 0);
      }
    }

    // Draw enemies
    for (const e of enemies) {
      if (e.state === "dead") continue;
      const ey = flr(e.y) - cy;
      if (ey > -16 && ey < H + 8) {
        const flipX = e.dir < 0;
        let sprId = 10;
        if (e.shootCooldown > 20 && e.state === "chase") {
          sprId = 12; // shooting pose
        } else if (flr(e.walkFrame) % 2 === 1) {
          sprId = 11; // walking
        }
        spr(sprId, flr(e.x), ey, flipX);

        // Alert indicator
        if (e.state === "chase" && flr(GrayBox.frame / 6) % 2 === 0) {
          text("!", flr(e.x) + 3, ey - 8, 3);
        }
      }
    }

    // Draw player bullets
    for (const b of bullets) {
      const by = b.y - cy;
      if (by > -8 && by < H + 8) {
        spr(36, flr(b.x), flr(by), b.dir < 0);
      }
    }

    // Draw player
    if (!player.dead) {
      if (invincible > 0 && flr(GrayBox.frame / 3) % 2 === 0) {
        // Blink during invincibility
      } else {
        const py = flr(player.y) - cy;
        const flipX = player.dir < 0;
        let sprId = 1;
        if (player.shooting) {
          sprId = 3;
        } else if (player.ducking) {
          sprId = 4;
        } else if (player.jumping) {
          sprId = 5;
        } else if (flr(player.walkFrame) % 2 === 1) {
          sprId = 2;
        }
        spr(sprId, flr(player.x), py, flipX);
      }
    }

    // Draw car at bottom floor
    const carY = (NUM_FLOORS - 1) * FLOOR_H - 8 - cy;
    if (carY > -16 && carY < H + 8) {
      spr(39, W / 2 - 4, carY);
      spr(39, W / 2 + 4, carY, true);
      // Arrow if all docs collected
      if (docsCollected >= docsTotal && flr(GrayBox.frame / 10) % 2 === 0) {
        text("V", flr(W / 2), carY - 9, 3);
      }
    }

    // Draw explosions
    for (const e of explosions) {
      const ey = flr(e.y) - cy;
      if (ey > -16 && ey < H + 8) {
        const sprId = e.timer > 6 ? 40 : 41;
        spr(sprId, flr(e.x), ey);
      }
    }

    // Draw particles
    for (const p of particles) {
      const py = p.y - cy;
      pix(flr(p.x), flr(py), p.color);
    }

    // --- HUD ---
    rectf(0, 0, W, 12, 0);
    text("SCORE:" + score, 3, 2, 3);
    text("DOCS:" + docsCollected + "/" + docsTotal, 113, 2, docsCollected >= docsTotal ? 3 : 2);

    // Floor indicator
    const pFloor = NUM_FLOORS - flr((player.y + 8) / FLOOR_H);
    text("F" + pFloor, 213, 2, 2);

    // Lives
    for (let i = 0; i < lives; i++) spr(42, W - 27 + i * 10, 2);

    // Mini elevator indicator on right side
    const miniH = 150;
    const miniX = W - 8;
    const miniY = 45;
    rectf(miniX, miniY, 4, miniH, 0);
    rect(miniX, miniY, 4, miniH, 1);
    // Player position on mini map
    const playerRatio = player.y / BUILDING_H;
    const miniPlayerY = miniY + playerRatio * miniH;
    rectf(miniX, flr(miniPlayerY), 4, 3, 3);
    // Car position
    const carRatio = ((NUM_FLOORS - 1) * FLOOR_H) / BUILDING_H;
    const miniCarY = miniY + carRatio * miniH;
    rectf(miniX, flr(miniCarY), 4, 2, 2);

    // Message when all docs collected
    if (docsCollected >= docsTotal) {
      if (flr(GrayBox.frame / 20) % 2 === 0) {
        text("GET TO THE CAR!", 120, 16, 3);
      }
    }
    }
  });

  function killPlayer() {
    if (player.dead || invincible > 0) return;
    player.dead = true;
    player.deathTimer = 45;
    addExplosion(player.x, player.y);
    deathSound();
    if (player.onElevator) {
      player.onElevator.hasPlayer = false;
      player.onElevator = null;
    }
  }

  // (Play scene draw is defined above inside the scene)

  function drawBuilding(cy) {
    // Draw floor platforms, walls, and windows
    for (let f = 0; f < NUM_FLOORS; f++) {
      const floorY = f * FLOOR_H - cy;
      if (floorY > H + 8 || floorY < -30) continue;

      // Floor platform (2 tiles thick)
      for (let tx = 0; tx < 40; tx++) {
        const tileX = tx * 8;
        // Skip shaft positions for the floor
        let inShaft = false;
        for (const sp of SHAFT_POSITIONS) {
          if (tx === sp) { inShaft = true; break; }
        }
        if (!inShaft) {
          spr(32, tileX, floorY);
        }
      }

      // Walls on left and right edges
      for (let wy = 0; wy < 3; wy++) {
        spr(33, 0, floorY - 18 + wy * 8);
        spr(33, 8, floorY - 18 + wy * 8);
        spr(33, W - 16, floorY - 18 + wy * 8);
        spr(33, W - 8, floorY - 18 + wy * 8);
      }

      // Windows between floors
      if (f > 0 && f < NUM_FLOORS) {
        for (let wx = 3; wx < 38; wx += 5) {
          const winX = wx * 8;
          // Skip near shafts and escalators
          let skip = false;
          for (const sp of SHAFT_POSITIONS) {
            if (_abs(wx - sp) < 2) { skip = true; break; }
          }
          if (!skip) {
            spr(43, winX, floorY - 12);
          }
        }
      }
    }

    // Ground floor - street level
    const groundY = (NUM_FLOORS - 1) * FLOOR_H - cy;
    if (groundY > -16 && groundY < H + 30) {
      // Street
      for (let tx = 0; tx < 40; tx++) {
        rectf(tx * 8, groundY + 8, 8, 12, 1);
      }
      // Dotted line on street
      for (let tx = 0; tx < 40; tx += 4) {
        rectf(tx * 8 + 2, groundY + 11, 8, 2, 2);
      }
    }

    // Roof
    const roofY = 0 - cy;
    if (roofY > -16 && roofY < H + 8) {
      for (let tx = 0; tx < 40; tx++) {
        spr(32, tx * 8, roofY);
      }
      // Antenna
      line(W / 2, roofY - 15, W / 2, roofY, 2);
      line(W / 2 - 5, roofY - 9, W / 2 + 5, roofY - 9, 2);
    }
  }

  function drawTitle() {
    // Building silhouette background
    for (let bx = 0; bx < 12; bx++) {
      const bh = 60 + flr(rnd(90));
      const bw = 20 + flr(rnd(14));
      const x = bx * 28 - 7;
      rectf(x, H - bh, bw, bh, 0);
      rect(x, H - bh, bw, bh, 1);
      // Windows
      for (let wy = H - bh + 6; wy < H - 6; wy += 12) {
        for (let wx = x + 3; wx < x + bw - 4; wx += 7) {
          if (rnd(1) < 0.6) {
            rectf(wx, wy, 4, 5, rnd(1) < 0.3 ? 2 : 1);
          }
        }
      }
    }

    const ty = 28 + sin(GrayBox.frame * 0.04) * 3;

    // Title text
    text("ELEVATOR", 115, flr(ty), 3);
    text("ACTION", 125, flr(ty) + 12, 3);
    rectf(100, flr(ty) + 24, 120, 1, 2);

    // Player sprite showcase
    const px = W / 2 - 24;
    spr(1, px, flr(ty) + 32 + sin(GrayBox.frame * 0.08) * 2);
    spr(10, px + 20, flr(ty) + 34 + sin(GrayBox.frame * 0.08 + 1.5) * 2, true);
    spr(20, px + 40, flr(ty) + 32);

    // Subtitle
    text("SPY VS SPY IN A 30 FLOOR BUILDING", 72, 110, 2);

    if (flr(GrayBox.frame / 20) % 2 === 0) text("PRESS A", 130, 130, 3);

    // Instructions
    text("ARROWS  MOVE/ELEVATOR", 93, 152, 2);
    text("A  SHOOT", 133, 164, 2);
    text("B  JUMP/DUCK", 123, 176, 2);
    text("UP AT DOOR  A", 109, 188, 2);
    text("COLLECT ALL DOCUMENTS", 93, 203, 1);
    text("ESCAPE IN THE CAR!", 101, 215, 1);

    text("GRAYBOX DEMO V0.1", 112, 228, 1);
  }

  function drawGameOver() {
    for (const p of particles) pix(flr(p.x), flr(p.y), p.color);

    text("GAME OVER", 130, 75, 3);
    text("SCORE: " + score, 127, 98, 2);
    text("DOCS: " + docsCollected + "/" + docsTotal, 123, 111, 2);
    if (flr(GrayBox.frame / 20) % 2 === 0) text("PRESS A", 127, 150, 3);
  }

  function drawWin() {
    // Victory screen
    const ty = 30 + sin(GrayBox.frame * 0.05) * 3;

    // Building silhouette
    for (let bx = 0; bx < 12; bx++) {
      const bh = 45 + flr(rnd(75));
      const bw = 20 + flr(rnd(14));
      rectf(bx * 28 - 7, H - bh, bw, bh, 0);
      rect(bx * 28 - 7, H - bh, bw, bh, 1);
    }

    text("MISSION COMPLETE!", 99, flr(ty), 3);
    text("ALL DOCUMENTS RECOVERED", 80, flr(ty) + 20, 2);

    // Car driving away animation
    const carX = (GrayBox.frame * 2) % (W + 40) - 20;
    spr(39, flr(carX), flr(ty) + 40);
    spr(39, flr(carX) + 8, flr(ty) + 40, true);
    spr(1, flr(carX) + 3, flr(ty) + 34); // player in car

    text("SCORE: " + score, 127, flr(ty) + 60, 3);
    text("RATING:", 133, flr(ty) + 76, 2);

    // Rating based on score
    let rating = "C";
    if (score > 8000) rating = "S";
    else if (score > 5000) rating = "A";
    else if (score > 3000) rating = "B";
    text(rating, 147, flr(ty) + 90, 3);

    if (flr(GrayBox.frame / 20) % 2 === 0) text("PRESS A", 127, 185, 3);
  }

  GrayBox.go(TITLE);
  GrayBox.boot("screen");
})();
</script>
