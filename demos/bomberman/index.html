<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GrayBox — Demo: Bomberman</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #0a0a0a;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100vh;
    font-family: monospace;
    overflow: hidden;
  }
  #frame {
    background: #111;
    border: 3px solid #333;
    border-radius: 8px;
    padding: 12px;
    box-shadow: 0 0 40px rgba(0,0,0,0.8), inset 0 0 20px rgba(0,0,0,0.5);
  }
  canvas {
    display: block;
    image-rendering: pixelated;
    image-rendering: crisp-edges;
  }
  #controls {
    margin-top: 12px;
    color: #6b6b6b;
    font-size: 11px;
    text-align: center;
    letter-spacing: 1px;
  }
  #controls span { color: #b0b0b0; }
</style>
</head>
<body>
<div id="frame">
  <canvas id="screen"></canvas>
</div>
<div id="controls">
  <span>ARROWS</span> MOVE &nbsp;&nbsp; <span>Z</span> BOMB &nbsp;&nbsp; <span>ENTER</span> START
</div>
<script>
(() => {
  "use strict";

  // ============================================================
  // GrayBox Runtime (inline)
  // ============================================================
  const W = 480;
  const H = 320;
  const SCALE = 2;
  const FPS = 30;
  const COLORS = ["#1a1a1a", "#6b6b6b", "#b0b0b0", "#e8e8e8"];
  const canvas = document.getElementById("screen");
  canvas.width = W;
  canvas.height = H;
  canvas.style.width = (W * SCALE) + "px";
  canvas.style.height = (H * SCALE) + "px";
  const ctx = canvas.getContext("2d");
  ctx.imageSmoothingEnabled = false;
  const buf = ctx.createImageData(W, H);
  const buf32 = new Uint32Array(buf.data.buffer);

  function hexToABGR(hex) {
    const r = parseInt(hex.slice(1, 3), 16);
    const g = parseInt(hex.slice(3, 5), 16);
    const b = parseInt(hex.slice(5, 7), 16);
    return (255 << 24) | (b << 16) | (g << 8) | r;
  }
  const COLOR_U32 = COLORS.map(hexToABGR);

  const sprites = {};
  const tilemap = {};

  const keyMap = {
    "ArrowUp": "up", "ArrowDown": "down", "ArrowLeft": "left", "ArrowRight": "right",
    "w": "up", "s": "down", "a": "left", "d": "right",
    "z": "a", "Z": "a", "x": "b", "X": "b",
    "Enter": "start", " ": "a"
  };
  const keys = {};
  const keysPrev = {};

  document.addEventListener("keydown", e => {
    const k = keyMap[e.key];
    if (k) { keys[k] = true; e.preventDefault(); }
  });
  document.addEventListener("keyup", e => {
    const k = keyMap[e.key];
    if (k) { keys[k] = false; e.preventDefault(); }
  });

  let audioCtx = null;
  const channels = [null, null];
  const channelGains = [null, null];
  function ensureAudio() {
    if (!audioCtx) {
      audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      for (let i = 0; i < 2; i++) {
        channelGains[i] = audioCtx.createGain();
        channelGains[i].gain.value = 0.15;
        channelGains[i].connect(audioCtx.destination);
      }
    }
  }

  const NOTE_NAMES = ["C","C#","D","D#","E","F","F#","G","G#","A","A#","B"];
  function noteToFreq(noteStr) {
    const match = noteStr.match(/^([A-G]#?)(\d)$/);
    if (!match) return 440;
    const name = match[1];
    const octave = parseInt(match[2]);
    const semitone = NOTE_NAMES.indexOf(name);
    if (semitone === -1) return 440;
    const midi = (octave + 1) * 12 + semitone;
    return 440 * Math.pow(2, (midi - 69) / 12);
  }

  const FONT_W = 4;
  const FONT_H = 6;
  const FONT = {};
  const fontData = {
    "A":"0110100110011111100110011001","B":"1110100110101110100110011110",
    "C":"0110100110001000100001100110","D":"1100101010011001100110101100",
    "E":"1111100010001110100010001111","F":"1111100010001110100010001000",
    "G":"0111100010001011100101100111","H":"1001100110011111100110011001",
    "I":"1110010001000100010001001110","J":"0111001000100010001010100100",
    "K":"1001101011001100101010011001","L":"1000100010001000100010001111",
    "M":"1001111111011001100110011001","N":"1001110111011001100110011001",
    "O":"0110100110011001100110010110","P":"1110100110011110100010001000",
    "Q":"0110100110011001101101100001","R":"1110100110011110101010011001",
    "S":"0111100010000110000110001110","T":"1111001000100010001000100010",
    "U":"1001100110011001100110010110","V":"1001100110011001100101100110",
    "W":"1001100110011001101111011001","X":"1001100101100110011010011001",
    "Y":"1001100101100010001000100010","Z":"1111000100100100100010001111",
    "0":"0110100111011011101110010110","1":"0100110001000100010001001110",
    "2":"0110100100010010010010001111","3":"1110000100010110000110011110",
    "4":"1001100110011111000100010001","5":"1111100010001110000100011110",
    "6":"0110100010001110100110010110","7":"1111000100010010010001001000",
    "8":"0110100110010110100110010110","9":"0110100110010111000100010110",
    " ":"0000000000000000000000000000",
    ".":"0000000000000000000001000100",
    ",":"0000000000000000001000101000",
    "!":"0100010001000100000000000100",
    "?":"0110100100010010000000000010",
    "-":"0000000000001110000000000000",
    "+":"0000001001001110010000100000",
    ":":"0000010001000000010001000000",
    "/":"0001000100100010010010001000",
    "*":"0000101001001110010010100000",
    "#":"0101111101011111010100000000",
    "(":"0010010010001000010001000010",
    ")":"0100001000010001000100100100",
    "=":"0000000011110000111100000000",
    "'":"0100010010000000000000000000",
    "\"":"1010101000000000000000000000",
    "<":"0010010010001000010000100010",
    ">":"1000010000100001001001001000",
    "_":"0000000000000000000000001111",
  };
  for (const [ch, bits] of Object.entries(fontData)) {
    FONT[ch] = [];
    for (let i = 0; i < bits.length; i++) FONT[ch].push(parseInt(bits[i]));
  }

  const API = {};
  API._init = null;
  API._update = null;
  API._draw = null;
  API.frame = 0;

  API.cls = function(c = 0) { buf32.fill(COLOR_U32[c] || COLOR_U32[0]); };
  API.pix = function(x, y, c) {
    x = Math.floor(x); y = Math.floor(y);
    if (x < 0 || x >= W || y < 0 || y >= H) return;
    buf32[y * W + x] = COLOR_U32[c] || COLOR_U32[0];
  };
  API.line = function(x0, y0, x1, y1, c) {
    x0=Math.floor(x0); y0=Math.floor(y0); x1=Math.floor(x1); y1=Math.floor(y1);
    const dx=Math.abs(x1-x0), dy=Math.abs(y1-y0);
    const sx=x0<x1?1:-1, sy=y0<y1?1:-1;
    let err=dx-dy;
    while(true) {
      API.pix(x0,y0,c);
      if(x0===x1&&y0===y1) break;
      const e2=2*err;
      if(e2>-dy){err-=dy;x0+=sx;}
      if(e2<dx){err+=dx;y0+=sy;}
    }
  };
  API.rect = function(x,y,w,h,c) {
    API.line(x,y,x+w-1,y,c); API.line(x+w-1,y,x+w-1,y+h-1,c);
    API.line(x+w-1,y+h-1,x,y+h-1,c); API.line(x,y+h-1,x,y,c);
  };
  API.rectf = function(x,y,w,h,c) {
    x=Math.floor(x); y=Math.floor(y);
    const col=COLOR_U32[c]||COLOR_U32[0];
    for(let py=Math.max(0,y);py<Math.min(H,y+h);py++)
      for(let px=Math.max(0,x);px<Math.min(W,x+w);px++)
        buf32[py*W+px]=col;
  };
  API.circ = function(cx,cy,r,c) {
    let x=r,y=0,d=1-r; cx=Math.floor(cx); cy=Math.floor(cy);
    while(x>=y){
      API.pix(cx+x,cy+y,c);API.pix(cx-x,cy+y,c);
      API.pix(cx+x,cy-y,c);API.pix(cx-x,cy-y,c);
      API.pix(cx+y,cy+x,c);API.pix(cx-y,cy+x,c);
      API.pix(cx+y,cy-x,c);API.pix(cx-y,cy-x,c);
      y++; if(d<0){d+=2*y+1;}else{x--;d+=2*(y-x)+1;}
    }
  };
  API.circf = function(cx,cy,r,c) {
    cx=Math.floor(cx); cy=Math.floor(cy);
    const col=COLOR_U32[c]||COLOR_U32[0]; const r2=r*r;
    for(let py=-r;py<=r;py++) for(let px=-r;px<=r;px++)
      if(px*px+py*py<=r2){ const sx=cx+px,sy=cy+py;
        if(sx>=0&&sx<W&&sy>=0&&sy<H) buf32[sy*W+sx]=col; }
  };
  API.sprite = function(id, data) {
    const arr = new Uint8Array(64); let i = 0;
    for (const ch of data) { if (ch>='0'&&ch<='3') { arr[i++]=parseInt(ch); if(i>=64) break; } }
    sprites[id] = arr;
  };
  API.spr = function(id, x, y, flipX, flipY) {
    const s=sprites[id]; if(!s) return;
    x=Math.floor(x); y=Math.floor(y);
    for(let py=0;py<8;py++) for(let px=0;px<8;px++){
      const sx=flipX?7-px:px, sy=flipY?7-py:py;
      const c=s[sy*8+sx], dx=x+px, dy=y+py;
      if(dx>=0&&dx<W&&dy>=0&&dy<H) buf32[dy*W+dx]=COLOR_U32[c];
    }
  };
  API.text = function(str, x, y, c) {
    str=String(str).toUpperCase(); let cx=Math.floor(x); const cy=Math.floor(y);
    const col=COLOR_U32[c]||COLOR_U32[3];
    for(const ch of str){
      const glyph=FONT[ch];
      if(glyph) for(let py=0;py<FONT_H;py++) for(let px=0;px<FONT_W;px++)
        if(glyph[py*FONT_W+px]){ const dx=cx+px,dy=cy+py;
          if(dx>=0&&dx<W&&dy>=0&&dy<H) buf32[dy*W+dx]=col; }
      cx+=FONT_W+1;
    }
  };
  API.mget = function(cx,cy) { return tilemap[cx+","+cy]||0; };
  API.mset = function(cx,cy,id) { tilemap[cx+","+cy]=id; };
  API.map = function(mx,my,mw,mh,sx,sy) {
    for(let ty=0;ty<mh;ty++) for(let tx=0;tx<mw;tx++){
      const id=API.mget(mx+tx,my+ty); if(id>0) API.spr(id,sx+tx*8,sy+ty*8); }
  };
  API.btn = function(k) { return !!keys[k]; };
  API.btnp = function(k) { return !!keys[k] && !keysPrev[k]; };
  API.note = function(ch, noteStr, dur) {
    ensureAudio(); if(ch<0||ch>1) return; API.stop(ch);
    const osc=audioCtx.createOscillator(); osc.type="square";
    osc.frequency.value=noteToFreq(noteStr);
    osc.connect(channelGains[ch]); osc.start();
    osc.stop(audioCtx.currentTime+dur); channels[ch]=osc;
  };
  API.stop = function(ch) {
    if(ch===undefined){API.stop(0);API.stop(1);return;}
    if(channels[ch]){try{channels[ch].stop();}catch(e){} channels[ch]=null;}
  };
  API.rnd = function(max) { return Math.random()*max; };
  API.flr = Math.floor;
  API.abs = Math.abs;
  API.min = Math.min;
  API.max = Math.max;
  API.sin = Math.sin;
  API.cos = Math.cos;

  function tick() {
    if (API._update) API._update();
    if (API._draw) API._draw();
    ctx.putImageData(buf, 0, 0);
    for (const k in keys) keysPrev[k] = keys[k];
    API.frame++;
  }

  // ============================================================
  // Bomberman Game
  // ============================================================
  const { cls, pix, line, rect, rectf, circ, circf, sprite: defSprite,
          spr, text, btn, btnp, note, stop, rnd, flr, abs: _abs,
          min, max: _max, sin, cos } = API;

  // --- Sprites ---
  // 1: Player (bomberman) - white character with cute face
  defSprite(1,
    "00333000" +
    "03333300" +
    "30300300" +
    "33333330" +
    "03222300" +
    "00222000" +
    "02200220" +
    "02000020"
  );
  // 2: Player walking frame 2
  defSprite(2,
    "00333000" +
    "03333300" +
    "30300300" +
    "33333330" +
    "03222300" +
    "00222000" +
    "00222000" +
    "02000020"
  );
  // 3: Hard wall (indestructible) - solid brick
  defSprite(3,
    "33333333" +
    "32222223" +
    "32222223" +
    "33333333" +
    "33333333" +
    "22322232" +
    "22322232" +
    "33333333"
  );
  // 4: Soft block (destructible) - crumbly brick
  defSprite(4,
    "22222222" +
    "21112111" +
    "21112111" +
    "22222222" +
    "11121112" +
    "11121112" +
    "22222222" +
    "21112111"
  );
  // 5: Bomb - round black bomb with fuse
  defSprite(5,
    "00001300" +
    "00013000" +
    "01111100" +
    "10000010" +
    "10200010" +
    "10000010" +
    "01111100" +
    "00111000"
  );
  // 6: Bomb frame 2 (pulse bigger)
  defSprite(6,
    "00003000" +
    "00130000" +
    "01111100" +
    "11000110" +
    "10200010" +
    "11000110" +
    "01111100" +
    "00111000"
  );
  // 7: Explosion center
  defSprite(7,
    "00322000" +
    "03333200" +
    "33333320" +
    "23333332" +
    "33333330" +
    "03333300" +
    "02333200" +
    "00233000"
  );
  // 8: Explosion horizontal
  defSprite(8,
    "00000000" +
    "00000000" +
    "33333333" +
    "23333332" +
    "33333333" +
    "22222222" +
    "00000000" +
    "00000000"
  );
  // 9: Explosion vertical
  defSprite(9,
    "00330000" +
    "02332000" +
    "03333000" +
    "03333000" +
    "03333000" +
    "02332000" +
    "02332000" +

  );
  // 10: Explosion tip right
  defSprite(10,
    "00000000" +
    "00000000" +
    "33320000" +

  );
  // 11: Explosion tip left
  defSprite(11,

  );
  // 12: Explosion tip down
  defSprite(12,

  );
  // 13: Explosion tip up
  defSprite(13,

  );
  // 14: Powerup - fire (bigger blast)
  defSprite(14,

  // 15: Powerup - bomb (more bombs)
  defSprite(15,

  // 16: Powerup - speed (boot)
  defSprite(16,

  // 17: Enemy type A - balloon monster
  defSprite(17,

  // 18: Enemy type B - ghost
  defSprite(18,

  );
  // 19: Enemy type C - fast coin
  defSprite(19,

  );
  // 20: Floor tile
  defSprite(20,

  );
  // 21: Block breaking frame 1
  defSprite(21,
    "20020200" +

  );
  // 22: Life icon
  defSprite(22,
    "00000000" +

  // 23: Door (level exit, hidden under soft block)
  defSprite(23,
    "01111100" +
    "10000010" +

    "10000010" +
    "11111110"
  );

  // --- Grid constants ---
  const TILE = 16; // display tile size (each 8x8 sprite drawn 2x conceptually, but we use 16px grid)
  const GRID_W = 15; // odd number for classic bomberman pattern
  const GRID_H = 13;
  const OFFSET_X = (W - GRID_W * TILE) / 2; // center the grid
  const OFFSET_Y = 24; // top HUD space
  // We'll actually draw 2x2 sprites per tile (each tile = 16x16 pixels = 2x2 of 8px sprites)
  // But to keep it simpler with 8x8 sprites, let's use TILE=16 and draw each sprite scaled
  // Actually let's use the sprite at native 8x8 and make TILE=8, fitting more on screen

  // Re-think: 480x320 with 8px tiles = 60x40 grid. Too big.
  // Classic bomberman: 15x13 grid. At 16px = 240x208, leaves room for HUD. But 480 wide...
  // Let's use 16px tiles: 29x17 playfield, or keep 15x13 classic and center it.
  // Best: 15x13 at 16px = 240x208. Centered in 480x320. Nice borders for HUD.
  // Each 16x16 tile drawn as 2x2 grid of the 8x8 sprite.

  // Actually simplest: draw sprites at 2x scale manually
  function spr2x(id, x, y) {
    const s = sprites[id]; if (!s) return;
    x = Math.floor(x); y = Math.floor(y);
    for (let py = 0; py < 8; py++) for (let px = 0; px < 8; px++) {
      const c = s[py * 8 + px];
      const dx = x + px * 2, dy = y + py * 2;
      for (let sy = 0; sy < 2; sy++) for (let sx = 0; sx < 2; sx++) {
        const fx = dx + sx, fy = dy + sy;
        if (fx >= 0 && fx < W && fy >= 0 && fy < H) buf32[fy * W + fx] = COLOR_U32[c];
      }
    }
  }

  // Grid: 0=empty, 1=hard wall, 2=soft block, 3=bomb, items stored separately
  const GW = 15;
  const GH = 13;
  const TX = 16; // tile pixel size
  const OX = flr((W - GW * TX) / 2);
  const OY = 24;

  let grid = [];
  let state = "title";
  let player, bombs, explosions, enemies, particles, items;
  let score, lives, level;
  let playerInvuln, moveTimer;
  let doorPos; // {gx, gy} where the exit door is hidden

  // Powerup types: 0=fire, 1=bomb, 2=speed
  function initGrid() {
    grid = [];
    for (let y = 0; y < GH; y++) {
      grid[y] = [];
      for (let x = 0; x < GW; x++) {
        if (x === 0 || x === GW - 1 || y === 0 || y === GH - 1) {
          grid[y][x] = 1; // border walls
        } else if (x % 2 === 0 && y % 2 === 0) {
          grid[y][x] = 1; // fixed pillar pattern
        } else {
          grid[y][x] = 0;
        }
      }
    }
    // Place soft blocks randomly, leaving player start area clear
    for (let y = 1; y < GH - 1; y++) {
      for (let x = 1; x < GW - 1; x++) {
        if (grid[y][x] !== 0) continue;
        // Keep player spawn area clear (top-left corner)
        if (x <= 2 && y <= 2) continue;
        if (Math.random() < 0.65) {
          grid[y][x] = 2; // soft block
        }
      }
    }

    // Place door under a random soft block
    const softBlocks = [];
    for (let y = 1; y < GH - 1; y++)
      for (let x = 1; x < GW - 1; x++)
        if (grid[y][x] === 2 && !(x <= 2 && y <= 2)) softBlocks.push({x, y});
    if (softBlocks.length > 0) {
      const d = softBlocks[flr(rnd(softBlocks.length))];
      doorPos = { gx: d.x, gy: d.y };
    } else {
      doorPos = { gx: 3, gy: 3 };
    }
  }

  function spawnEnemies() {
    enemies = [];
    const count = min(3 + level, 10);
    const spots = [];
    for (let y = 1; y < GH - 1; y++)
      for (let x = 1; x < GW - 1; x++)
        if (grid[y][x] === 0 && (x > 3 || y > 3)) spots.push({x, y});
    for (let i = 0; i < count && spots.length > 0; i++) {
      const idx = flr(rnd(spots.length));
      const s = spots.splice(idx, 1)[0];
      let type = 17; // balloon
      if (level >= 3 && Math.random() < 0.3) type = 18; // ghost
      if (level >= 5 && Math.random() < 0.2) type = 19; // fast
      enemies.push({
        gx: s.x, gy: s.y,
        px: OX + s.x * TX, py: OY + s.y * TX, // pixel position
        type: type,
        dir: flr(rnd(4)), // 0=up 1=down 2=left 3=right
        moveTimer: 0,
        speed: type === 19 ? 1.2 : (type === 18 ? 0.6 : 0.5),
        alive: true,
        wallPass: type === 18, // ghosts pass through soft blocks
      });
    }
  }

  function spawnItems() {
    items = [];
    // Hide powerups under some soft blocks
    const softBlocks = [];
    for (let y = 1; y < GH - 1; y++)
      for (let x = 1; x < GW - 1; x++)
        if (grid[y][x] === 2 && !(x === doorPos.gx && y === doorPos.gy))
          softBlocks.push({x, y});
    // Place 2-3 items per level
    const numItems = min(2 + flr(level / 2), 5);
    for (let i = 0; i < numItems && softBlocks.length > 0; i++) {
      const idx = flr(rnd(softBlocks.length));
      const s = softBlocks.splice(idx, 1)[0];
      const types = [0, 1, 2]; // fire, bomb, speed
      items.push({ gx: s.x, gy: s.y, type: types[flr(rnd(types.length))], revealed: false });
    }
  }

  function resetGame() {
    score = 0;
    lives = 3;
    level = 0;
    startLevel();
  }

  function startLevel() {
    level++;
    bombs = [];
    explosions = [];
    particles = [];
    player = {
      gx: 1, gy: 1,
      px: OX + 1 * TX, py: OY + 1 * TX,
      targetPx: OX + 1 * TX, targetPy: OY + 1 * TX,
      moving: false,
      dir: 1, // 0=up 1=down 2=left 3=right
      fireRange: 1 + flr(level / 4),
      maxBombs: 1 + flr(level / 3),
      speed: 2,
      animFrame: 0,
      animTimer: 0,
    };
    playerInvuln = 60; // brief invulnerability at start
    initGrid();
    spawnEnemies();
    spawnItems();
  }

  function gridToPixel(gx, gy) {
    return { x: OX + gx * TX, y: OY + gy * TX };
  }
  function pixelToGrid(px, py) {
    return { gx: flr((px - OX + TX / 2) / TX), gy: flr((py - OY + TX / 2) / TX) };
  }

  function isWalkable(gx, gy, wallPass) {
    if (gx < 0 || gx >= GW || gy < 0 || gy >= GH) return false;
    const cell = grid[gy][gx];
    if (cell === 1) return false;
    if (cell === 2 && !wallPass) return false;
    // Check for bombs
    for (const b of bombs) {
      if (b.gx === gx && b.gy === gy) return false;
    }
    return true;
  }

  function isWalkableNoBlocks(gx, gy) {
    if (gx < 0 || gx >= GW || gy < 0 || gy >= GH) return false;
    return grid[gy][gx] === 0;
  }

  function placeBomb() {
    const activeBombs = bombs.filter(b => !b.exploded);
    if (activeBombs.length >= player.maxBombs) return;
    const pg = pixelToGrid(player.px, player.py);
    // Don't place if one already here
    for (const b of bombs) if (b.gx === pg.gx && b.gy === pg.gy && !b.exploded) return;
    bombs.push({
      gx: pg.gx, gy: pg.gy,
      timer: 60, // 2 seconds at 30fps
      range: player.fireRange,
      exploded: false,
    });
    note(0, "C3", 0.05);
  }

  function triggerExplosion(bomb) {
    bomb.exploded = true;
    const cx = bomb.gx, cy = bomb.gy;
    const range = bomb.range;

    // Explosion center
    explosions.push({ gx: cx, gy: cy, timer: 15, type: "center" });
    addExplosionParticles(cx, cy);

    // Sound
    note(0, "C2", 0.15);
    note(1, "E2", 0.12);
    setTimeout(() => { try { note(0, "G2", 0.1); } catch(e){} }, 80);

    // Four directions
    const dirs = [{dx:1,dy:0,tip:"right",mid:"horiz"},{dx:-1,dy:0,tip:"left",mid:"horiz"},
                  {dx:0,dy:1,tip:"down",mid:"vert"},{dx:0,dy:-1,tip:"up",mid:"vert"}];
    for (const d of dirs) {
      for (let i = 1; i <= range; i++) {
        const nx = cx + d.dx * i, ny = cy + d.dy * i;
        if (nx < 0 || nx >= GW || ny < 0 || ny >= GH) break;
        if (grid[ny][nx] === 1) break; // hard wall stops
        if (grid[ny][nx] === 2) {
          // Destroy soft block
          grid[ny][nx] = 0;
          explosions.push({ gx: nx, gy: ny, timer: 15, type: "block" });
          addExplosionParticles(nx, ny);
          // Check if this reveals the door
          // Check if item revealed
          for (const it of items) {
            if (it.gx === nx && it.gy === ny) it.revealed = true;
          }
          break; // explosion stops at soft block
        }
        // Check if chain-detonates another bomb
        for (const ob of bombs) {
          if (!ob.exploded && ob.gx === nx && ob.gy === ny) {
            ob.timer = 1; // detonate next frame
          }
        }
        const isEnd = (i === range);
        const type = isEnd ? d.tip : d.mid;
        explosions.push({ gx: nx, gy: ny, timer: 15, type: type });
      }
    }
  }

  function addExplosionParticles(gx, gy) {
    const px = OX + gx * TX + TX / 2;
    const py = OY + gy * TX + TX / 2;
    for (let i = 0; i < 6; i++) {
      particles.push({
        x: px, y: py,
        vx: rnd(4) - 2, vy: rnd(4) - 2,
        life: 8 + flr(rnd(8)),
        color: flr(rnd(3)) + 1,
      });
    }
  }

  function isExplosionAt(gx, gy) {
    for (const e of explosions) {
      if (e.gx === gx && e.gy === gy && e.timer > 0) return true;
    }
    return false;
  }

  function killPlayer() {
    if (playerInvuln > 0) return;
    lives--;
    addExplosionParticles(pixelToGrid(player.px, player.py).gx, pixelToGrid(player.px, player.py).gy);
    note(0, "C3", 0.12); note(1, "G2", 0.12);
    setTimeout(() => { try { note(0, "A2", 0.18); note(1, "E2", 0.18); } catch(e){} }, 120);
    if (lives <= 0) {
      state = "gameover";
    } else {
      // Respawn
      player.gx = 1; player.gy = 1;
      player.px = OX + TX; player.py = OY + TX;
      player.targetPx = player.px; player.targetPy = player.py;
      player.moving = false;
      playerInvuln = 90;
    }
  }

  resetGame();

  // ============================================================
  // Update
  // ============================================================
  API._update = function() {
    if (state === "title") {
      if (btnp("a") || btnp("start")) {
        state = "play";
        resetGame();
        note(0, "C5", 0.1);
        setTimeout(() => { try { note(0, "E5", 0.1); } catch(e){} }, 100);
        setTimeout(() => { try { note(0, "G5", 0.15); } catch(e){} }, 200);
      }
      return;
    }

    if (state === "gameover") {
      // Update particles
      for (let i = particles.length - 1; i >= 0; i--) {
        const p = particles[i]; p.x += p.vx; p.y += p.vy; p.vy += 0.08; p.life--;
        if (p.life <= 0) particles.splice(i, 1);
      }
      if (btnp("a") || btnp("start")) state = "title";
      return;
    }

    if (state === "levelclear") {
      for (let i = particles.length - 1; i >= 0; i--) {
        const p = particles[i]; p.x += p.vx; p.y += p.vy; p.vy += 0.05; p.life--;
        if (p.life <= 0) particles.splice(i, 1);
      }
      moveTimer = (moveTimer || 0) + 1;
      if (moveTimer > 90) {
        state = "play";
        moveTimer = 0;
        startLevel();
      }
      return;
    }

    // --- Play state ---
    if (playerInvuln > 0) playerInvuln--;

    // Player movement (grid-snapped)
    const spd = player.speed;
    if (!player.moving) {
      let dx = 0, dy = 0;
      if (btn("up")) { dy = -1; player.dir = 0; }
      else if (btn("down")) { dy = 1; player.dir = 1; }
      else if (btn("left")) { dx = -1; player.dir = 2; }
      else if (btn("right")) { dx = 1; player.dir = 3; }

      if (dx !== 0 || dy !== 0) {
        const ng = { gx: player.gx + dx, gy: player.gy + dy };
        if (isWalkableNoBlocks(ng.gx, ng.gy)) {
          // Also check no bomb there (player can stand on bomb they just placed)
          let bombBlocking = false;
          for (const b of bombs) {
            if (!b.exploded && b.gx === ng.gx && b.gy === ng.gy) {
              // Player can walk OFF a bomb but not ONTO one
              bombBlocking = true;
              break;
            }
          }
          if (!bombBlocking) {
            player.gx = ng.gx; player.gy = ng.gy;
            player.targetPx = OX + ng.gx * TX;
            player.targetPy = OY + ng.gy * TX;
            player.moving = true;
          }
        }
      }
    }

    if (player.moving) {
      const dx = player.targetPx - player.px;
      const dy = player.targetPy - player.py;
      const dist = Math.sqrt(dx * dx + dy * dy);
      if (dist <= spd) {
        player.px = player.targetPx;
        player.py = player.targetPy;
        player.moving = false;
      } else {
        player.px += (dx / dist) * spd;
        player.py += (dy / dist) * spd;
      }
      player.animTimer++;
      if (player.animTimer > 4) { player.animTimer = 0; player.animFrame = 1 - player.animFrame; }
    } else {
      player.animFrame = 0;
    }

    // Place bomb
    if (btnp("a")) placeBomb();

    // Update bombs
    for (let i = bombs.length - 1; i >= 0; i--) {
      const b = bombs[i];
      if (b.exploded) continue;
      b.timer--;
      if (b.timer <= 0) {
        triggerExplosion(b);
      }
    }

    // Clean up exploded bombs after their explosion timer
    bombs = bombs.filter(b => !b.exploded || explosions.some(e => e.gx === b.gx && e.gy === b.gy && e.timer > 0));

    // Update explosions
    for (let i = explosions.length - 1; i >= 0; i--) {
      explosions[i].timer--;
      if (explosions[i].timer <= 0) explosions.splice(i, 1);
    }

    // Check player hit by explosion
    const pg = pixelToGrid(player.px, player.py);
    if (isExplosionAt(pg.gx, pg.gy)) {
      killPlayer();
    }

    // Check enemies hit by explosion
    for (let i = enemies.length - 1; i >= 0; i--) {
      const e = enemies[i];
      const eg = pixelToGrid(e.px, e.py);
      if (isExplosionAt(eg.gx, eg.gy)) {
        e.alive = false;
        addExplosionParticles(eg.gx, eg.gy);
        score += e.type === 19 ? 300 : (e.type === 18 ? 200 : 100);
        note(1, "E4", 0.06);
        enemies.splice(i, 1);
      }
    }

    // Enemy movement
    for (const e of enemies) {
      e.moveTimer++;
      const moveInterval = flr(TX / (e.speed));
      if (e.moveTimer >= moveInterval) {
        e.moveTimer = 0;
        // Try current direction
        const dirs = [{dx:0,dy:-1},{dx:0,dy:1},{dx:-1,dy:0},{dx:1,dy:0}];
        const d = dirs[e.dir];
        const nx = e.gx + d.dx, ny = e.gy + d.dy;

        // Decide whether to change direction
        let canGo = isWalkable(nx, ny, e.wallPass);
        if (canGo && Math.random() < 0.1) canGo = false; // random direction change

        if (canGo) {
          e.gx = nx; e.gy = ny;
          e.px = OX + nx * TX; e.py = OY + ny * TX;
        } else {
          // Pick new random direction
          const available = [];
          for (let di = 0; di < 4; di++) {
            const dd = dirs[di];
            if (isWalkable(e.gx + dd.dx, e.gy + dd.dy, e.wallPass)) available.push(di);
          }
          if (available.length > 0) {
            e.dir = available[flr(rnd(available.length))];
          }
        }
      }
    }

    // Enemy-player collision
    for (const e of enemies) {
      const epg = pixelToGrid(e.px, e.py);
      if (epg.gx === pg.gx && epg.gy === pg.gy) {
        killPlayer();
        break;
      }
    }

    // Pick up items
    for (let i = items.length - 1; i >= 0; i--) {
      const it = items[i];
      if (!it.revealed) continue;
      if (it.gx === pg.gx && it.gy === pg.gy) {
        if (it.type === 0) { player.fireRange = min(player.fireRange + 1, 6); }
        else if (it.type === 1) { player.maxBombs = min(player.maxBombs + 1, 5); }
        else if (it.type === 2) { player.speed = min(player.speed + 0.5, 4); }
        items.splice(i, 1);
        score += 50;
        note(0, "G5", 0.06);
        setTimeout(() => { try { note(0, "C6", 0.06); } catch(e){} }, 60);
      }
    }

    // Check for door
    if (enemies.length === 0 && doorPos) {
      // Door is revealed once its block is destroyed
      if (grid[doorPos.gy][doorPos.gx] === 0 && pg.gx === doorPos.gx && pg.gy === doorPos.gy) {
        // Level clear!
        state = "levelclear";
        moveTimer = 0;
        score += 500;
        note(0, "C5", 0.1);
        setTimeout(() => { try { note(0, "E5", 0.1); } catch(e){} }, 100);
        setTimeout(() => { try { note(0, "G5", 0.1); } catch(e){} }, 200);
        setTimeout(() => { try { note(0, "C6", 0.15); } catch(e){} }, 300);
        // Celebration particles
        for (let i = 0; i < 30; i++) {
          particles.push({
            x: W / 2 + rnd(100) - 50, y: H / 2 + rnd(60) - 30,
            vx: rnd(6) - 3, vy: -rnd(4) - 1,
            life: 20 + flr(rnd(30)),
            color: flr(rnd(3)) + 1,
          });
        }
      }
    }

    // Particles
    for (let i = particles.length - 1; i >= 0; i--) {
      const p = particles[i];
      p.x += p.vx; p.y += p.vy; p.vy += 0.06; p.life--;
      if (p.life <= 0) particles.splice(i, 1);
    }
  };

  // ============================================================
  // Draw
  // ============================================================
  API._draw = function() {
    cls(0);

    if (state === "title") {
      // Title screen
      const ty = 50 + sin(API.frame * 0.05) * 5;

      // Big title
      text("BOMBERMAN", 185, flr(ty), 3);
      text("BOMBERMAN", 186, flr(ty) + 1, 1);
      rectf(165, flr(ty) + 12, 150, 1, 2);

      // Show characters
      const bx = W / 2 - 50;
      spr2x(1, bx, flr(ty) + 30 + sin(API.frame * 0.08) * 3);
      spr2x(5, bx + 30, flr(ty) + 34 + sin(API.frame * 0.08 + 1) * 2);
      spr2x(17, bx + 60, flr(ty) + 30 + sin(API.frame * 0.08 + 2) * 3);
      spr2x(18, bx + 90, flr(ty) + 32 + sin(API.frame * 0.08 + 3) * 3);

      if (flr(API.frame / 20) % 2 === 0) text("PRESS A TO START", 170, 180, 3);

      // Instructions
      text("ARROWS: MOVE", 180, 210, 2);
      text("Z: PLACE BOMB", 175, 222, 2);
      text("DESTROY ALL ENEMIES", 155, 242, 2);
      text("FIND THE EXIT DOOR!", 157, 254, 2);

      // Powerup legend
      spr(14, 170, 275); text("FIRE", 182, 277, 2);
      spr(15, 220, 275); text("BOMB", 232, 277, 2);
      spr(16, 270, 275); text("SPEED", 282, 277, 2);

      text("GRAYBOX DEMO V0.1", 168, 305, 1);
      return;
    }

    if (state === "gameover") {
      for (const p of particles) pix(flr(p.x), flr(p.y), p.color);
      text("GAME OVER", 195, 110, 3);
      text("SCORE: " + score, 195, 135, 2);
      text("LEVEL: " + level, 200, 150, 2);
      if (flr(API.frame / 20) % 2 === 0) text("PRESS A TO CONTINUE", 158, 200, 3);
      return;
    }

    if (state === "levelclear") {
      // Draw the arena behind
      drawArena();
      for (const p of particles) pix(flr(p.x), flr(p.y), p.color);
      const msgY = 130 + sin(API.frame * 0.1) * 3;
      text("LEVEL " + level + " CLEAR!", 180, flr(msgY), 3);
      text("SCORE: " + score, 195, flr(msgY) + 20, 2);
      drawHUD();
      return;
    }

    // --- Play state ---
    drawArena();

    // Draw particles
    for (const p of particles) pix(flr(p.x), flr(p.y), p.color);

    // Draw HUD
    drawHUD();
  };

  function drawArena() {
    // Draw floor
    rectf(OX, OY, GW * TX, GH * TX, 0);

    // Draw grid
    for (let gy = 0; gy < GH; gy++) {
      for (let gx = 0; gx < GW; gx++) {
        const px = OX + gx * TX;
        const py = OY + gy * TX;
        const cell = grid[gy][gx];

        // Floor - subtle pattern
        if (cell === 0) {
          // Checkerboard floor
          if ((gx + gy) % 2 === 0) {
            rectf(px, py, TX, TX, 0);
          } else {
            // Very subtle dark squares
            rectf(px, py, TX, TX, 0);
            // Draw corner dots for grid visibility
            pix(px, py, 1);
          }
        }

        if (cell === 1) spr2x(3, px, py);   // hard wall
        if (cell === 2) spr2x(4, px, py);   // soft block
      }
    }

    // Draw door (if block destroyed and enemies dead)
    if (doorPos && grid[doorPos.gy][doorPos.gx] === 0) {
      spr2x(23, OX + doorPos.gx * TX, OY + doorPos.gy * TX);
    }

    // Draw revealed items
    for (const it of items) {
      if (!it.revealed) continue;
      const sprId = it.type === 0 ? 14 : (it.type === 1 ? 15 : 16);
      const bob = sin(API.frame * 0.15) * 2;
      spr2x(sprId, OX + it.gx * TX, OY + it.gy * TX + bob);
    }

    // Draw bombs
    for (const b of bombs) {
      if (b.exploded) continue;
      const pulse = b.timer < 20 && flr(API.frame / 3) % 2 === 0;
      const sprId = pulse ? 6 : 5;
      spr2x(sprId, OX + b.gx * TX, OY + b.gy * TX);
    }

    // Draw explosions
    for (const e of explosions) {
      const px = OX + e.gx * TX;
      const py = OY + e.gy * TX;
      if (e.type === "block") {
        spr2x(21, px, py); // breaking block
      } else if (e.type === "center") {
        spr2x(7, px, py);
      } else if (e.type === "horiz") {
        spr2x(8, px, py);
      } else if (e.type === "vert") {
        spr2x(9, px, py);
      } else if (e.type === "right") {
        spr2x(10, px, py);
      } else if (e.type === "left") {
        spr2x(11, px, py);
      } else if (e.type === "down") {
        spr2x(12, px, py);
      } else if (e.type === "up") {
        spr2x(13, px, py);
      }
    }

    // Draw enemies
    for (const e of enemies) {
      const bob = sin(API.frame * 0.12 + e.gx) * 1;
      spr2x(e.type, flr(e.px), flr(e.py + bob));
    }

    // Draw player
    if (state === "play" || state === "levelclear") {
      if (playerInvuln <= 0 || flr(API.frame / 3) % 2 === 0) {
        const sprId = player.animFrame === 0 ? 1 : 2;
        const flipX = player.dir === 2; // flip when facing left
        spr2x(sprId, flr(player.px), flr(player.py));
      }
    }
  }

  function drawHUD() {
    // HUD background
    rectf(0, 0, W, 22, 0);
    rectf(0, 21, W, 1, 1);

    text("SCORE:" + score, 4, 4, 3);
    text("LV:" + level, W / 2 - 20, 4, 2);

    // Lives
    text("LIVES:", W / 2 + 30, 4, 2);
    for (let i = 0; i < lives; i++) spr(22, W / 2 + 63 + i * 10, 2);

    // Powerup status on right side
    text("F:" + player.fireRange, W - 80, 4, 2);
    text("B:" + player.maxBombs, W - 50, 4, 2);

    // Enemy count at bottom
    if (enemies.length > 0) {
      text("ENEMIES:" + enemies.length, OX, OY + GH * TX + 4, 1);
    } else {
      if (flr(API.frame / 15) % 2 === 0)
        text("FIND THE EXIT!", OX, OY + GH * TX + 4, 3);
    }
  }

  // ============================================================
  // Boot
  // ============================================================
  if (API._init) API._init();
  setInterval(tick, 1000 / FPS);
  document.addEventListener("keydown", ensureAudio, { once: true });
  document.addEventListener("click", ensureAudio, { once: true });
})();
</script>
</body>
</html>
