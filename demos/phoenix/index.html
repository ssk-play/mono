<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GrayBox — Demo: Phoenix</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #0a0a0a;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100vh;
    font-family: monospace;
    overflow: hidden;
  }
  #frame {
    background: #111;
    border: 3px solid #333;
    border-radius: 8px;
    padding: 12px;
    box-shadow: 0 0 40px rgba(0,0,0,0.8), inset 0 0 20px rgba(0,0,0,0.5);
  }
  canvas {
    display: block;
    image-rendering: pixelated;
    image-rendering: crisp-edges;
  }
  #controls {
    margin-top: 12px;
    color: #6b6b6b;
    font-size: 11px;
    text-align: center;
    letter-spacing: 1px;
  }
  #controls span { color: #b0b0b0; }
</style>
</head>
<body>
<div id="frame">
  <canvas id="screen"></canvas>
</div>
<div id="controls">
  <span>&#8592;&#8594;</span> MOVE &nbsp;&nbsp; <span>Z</span> SHOOT &nbsp;&nbsp; <span>X</span> SHIELD &nbsp;&nbsp; <span>ENTER</span> START
</div>
<script>
(() => {
  "use strict";

  // ============================================================
  // GrayBox Runtime (inline)
  // ============================================================
  const W = 320;
  const H = 240;
  const FPS = 30;
  const COLORS = ["#1a1a1a", "#6b6b6b", "#b0b0b0", "#e8e8e8"];
  const canvas = document.getElementById("screen");
  canvas.width = W;
  canvas.height = H;
  function fitCanvas() {
    var maxW = window.innerWidth - 40;
    var maxH = window.innerHeight - 60;
    var s = Math.min(maxW / W, maxH / H);
    canvas.style.width = (W * s) + "px";
    canvas.style.height = (H * s) + "px";
  }
  fitCanvas();
  window.addEventListener("resize", fitCanvas);
  const ctx = canvas.getContext("2d");
  ctx.imageSmoothingEnabled = false;
  const buf = ctx.createImageData(W, H);
  const buf32 = new Uint32Array(buf.data.buffer);

  function hexToABGR(hex) {
    const r = parseInt(hex.slice(1, 3), 16);
    const g = parseInt(hex.slice(3, 5), 16);
    const b = parseInt(hex.slice(5, 7), 16);
    return (255 << 24) | (b << 16) | (g << 8) | r;
  }
  const COLOR_U32 = COLORS.map(hexToABGR);

  const sprites = {};
  const tilemap = {};

  const keyMap = {
    "ArrowUp": "up", "ArrowDown": "down", "ArrowLeft": "left", "ArrowRight": "right",
    "w": "up", "s": "down", "a": "left", "d": "right", "ㅈ": "up", "ㄴ": "down", "ㅁ": "left", "ㅇ": "right",
    "z": "a", "Z": "a", "x": "b", "X": "b", "ㅋ": "a", "ㅌ": "b",
    "Enter": "a", " ": "a"
  };
  const keys = {};
  const keysPrev = {};

  document.addEventListener("keydown", e => {
    const k = keyMap[e.key];
    if (k) { keys[k] = true; e.preventDefault(); }
  });
  document.addEventListener("keyup", e => {
    const k = keyMap[e.key];
    if (k) { keys[k] = false; e.preventDefault(); }
  });

  let audioCtx = null;
  const channels = [null, null];
  const channelGains = [null, null];
  function ensureAudio() {
    if (!audioCtx) {
      audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      for (let i = 0; i < 2; i++) {
        channelGains[i] = audioCtx.createGain();
        channelGains[i].gain.value = 0.15;
        channelGains[i].connect(audioCtx.destination);
      }
    }
  }

  const NOTE_NAMES = ["C","C#","D","D#","E","F","F#","G","G#","A","A#","B"];
  function noteToFreq(noteStr) {
    const match = noteStr.match(/^([A-G]#?)(\d)$/);
    if (!match) return 440;
    const name = match[1];
    const octave = parseInt(match[2]);
    const semitone = NOTE_NAMES.indexOf(name);
    if (semitone === -1) return 440;
    const midi = (octave + 1) * 12 + semitone;
    return 440 * Math.pow(2, (midi - 69) / 12);
  }

  const FONT_W = 4;
  const FONT_H = 7;
  const FONT = {};
  const fontData = {
    "A":"0110100110011111100110011001","B":"1110100110101110100110011110",
    "C":"0110100110001000100001100110","D":"1100101010011001100110101100",
    "E":"1111100010001110100010001111","F":"1111100010001110100010001000",
    "G":"0111100010001011100101100111","H":"1001100110011111100110011001",
    "I":"1110010001000100010001001110","J":"0111001000100010001010100100",
    "K":"1001101011001100101010011001","L":"1000100010001000100010001111",
    "M":"1001111111011001100110011001","N":"1001110111011001100110011001",
    "O":"0110100110011001100110010110","P":"1110100110011110100010001000",
    "Q":"0110100110011001101101100001","R":"1110100110011110101010011001",
    "S":"0111100010000110000110001110","T":"1111001000100010001000100010",
    "U":"1001100110011001100110010110","V":"1001100110011001100101100110",
    "W":"1001100110011001101111011001","X":"1001100101100110011010011001",
    "Y":"1001100101100010001000100010","Z":"1111000100100100100010001111",
    "0":"0110100111011011101110010110","1":"0100110001000100010001001110",
    "2":"0110100100010010010010001111","3":"1110000100010110000110011110",
    "4":"1001100110011111000100010001","5":"1111100010001110000100011110",
    "6":"0110100010001110100110010110","7":"1111000100010010010001001000",
    "8":"0110100110010110100110010110","9":"0110100110010111000100010110",
    " ":"0000000000000000000000000000",
    ".":"0000000000000000000001000100",
    ",":"0000000000000000001000101000",
    "!":"0100010001000100000000000100",
    "?":"0110100100010010000000000010",
    "-":"0000000000001110000000000000",
    "+":"0000001001001110010000100000",
    ":":"0000010001000000010001000000",
    "/":"0001000100100010010010001000",
    "*":"0000101001001110010010100000",
    "#":"0101111101011111010100000000",
    "(":"0010010010001000010001000010",
    ")":"0100001000010001000100100100",
    "=":"0000000011110000111100000000",
    "'":"0100010010000000000000000000",
    "\"":"1010101000000000000000000000",
    "<":"0010010010001000010000100010",
    ">":"1000010000100001001001001000",
    "_":"0000000000000000000000001111",
  };
  for (const [ch, bits] of Object.entries(fontData)) {
    FONT[ch] = [];
    for (let i = 0; i < bits.length; i++) FONT[ch].push(parseInt(bits[i]));
  }

  const API = {};
  API._init = null;
  API._update = null;
  API._draw = null;
  API.frame = 0;

  API.cls = function(c = 0) { buf32.fill(COLOR_U32[c] || COLOR_U32[0]); };
  API.pix = function(x, y, c) {
    x = Math.floor(x); y = Math.floor(y);
    if (x < 0 || x >= W || y < 0 || y >= H) return;
    buf32[y * W + x] = COLOR_U32[c] || COLOR_U32[0];
  };
  API.line = function(x0, y0, x1, y1, c) {
    x0=Math.floor(x0); y0=Math.floor(y0); x1=Math.floor(x1); y1=Math.floor(y1);
    const dx=Math.abs(x1-x0), dy=Math.abs(y1-y0);
    const sx=x0<x1?1:-1, sy=y0<y1?1:-1;
    let err=dx-dy;
    while(true) {
      API.pix(x0,y0,c);
      if(x0===x1&&y0===y1) break;
      const e2=2*err;
      if(e2>-dy){err-=dy;x0+=sx;}
      if(e2<dx){err+=dx;y0+=sy;}
    }
  };
  API.rect = function(x,y,w,h,c) {
    API.line(x,y,x+w-1,y,c); API.line(x+w-1,y,x+w-1,y+h-1,c);
    API.line(x+w-1,y+h-1,x,y+h-1,c); API.line(x,y+h-1,x,y,c);
  };
  API.rectf = function(x,y,w,h,c) {
    x=Math.floor(x); y=Math.floor(y);
    const col=COLOR_U32[c]||COLOR_U32[0];
    for(let py=Math.max(0,y);py<Math.min(H,y+h);py++)
      for(let px=Math.max(0,x);px<Math.min(W,x+w);px++)
        buf32[py*W+px]=col;
  };
  API.circ = function(cx,cy,r,c) {
    let x=r,y=0,d=1-r; cx=Math.floor(cx); cy=Math.floor(cy);
    while(x>=y){
      API.pix(cx+x,cy+y,c);API.pix(cx-x,cy+y,c);
      API.pix(cx+x,cy-y,c);API.pix(cx-x,cy-y,c);
      API.pix(cx+y,cy+x,c);API.pix(cx-y,cy+x,c);
      API.pix(cx+y,cy-x,c);API.pix(cx-y,cy-x,c);
      y++; if(d<0){d+=2*y+1;}else{x--;d+=2*(y-x)+1;}
    }
  };
  API.circf = function(cx,cy,r,c) {
    cx=Math.floor(cx); cy=Math.floor(cy);
    const col=COLOR_U32[c]||COLOR_U32[0]; const r2=r*r;
    for(let py=-r;py<=r;py++) for(let px=-r;px<=r;px++)
      if(px*px+py*py<=r2){ const sx=cx+px,sy=cy+py;
        if(sx>=0&&sx<W&&sy>=0&&sy<H) buf32[sy*W+sx]=col; }
  };
  API.sprite = function(id, data) {
    const arr = new Uint8Array(64); let i = 0;
    for (const ch of data) { if (ch>='0'&&ch<='3') { arr[i++]=parseInt(ch); if(i>=64) break; } }
    sprites[id] = arr;
  };
  API.spr = function(id, x, y, flipX, flipY) {
    const s=sprites[id]; if(!s) return;
    x=Math.floor(x); y=Math.floor(y);
    for(let py=0;py<8;py++) for(let px=0;px<8;px++){
      const sx=flipX?7-px:px, sy=flipY?7-py:py;
      const c=s[sy*8+sx], dx=x+px, dy=y+py;
      if(dx>=0&&dx<W&&dy>=0&&dy<H) buf32[dy*W+dx]=COLOR_U32[c];
    }
  };
  // Extended sprite draw: draw sprite but skip color 0 (transparent)
  API.sprT = function(id, x, y, flipX, flipY) {
    const s=sprites[id]; if(!s) return;
    x=Math.floor(x); y=Math.floor(y);
    for(let py=0;py<8;py++) for(let px=0;px<8;px++){
      const sx=flipX?7-px:px, sy=flipY?7-py:py;
      const c=s[sy*8+sx]; if(c===0) continue;
      const dx=x+px, dy=y+py;
      if(dx>=0&&dx<W&&dy>=0&&dy<H) buf32[dy*W+dx]=COLOR_U32[c];
    }
  };
  API.text = function(str, x, y, c) {
    str=String(str).toUpperCase(); let cx=Math.floor(x); const cy=Math.floor(y);
    const col=COLOR_U32[c]||COLOR_U32[3];
    for(const ch of str){
      const glyph=FONT[ch];
      if(glyph) for(let py=0;py<FONT_H;py++) for(let px=0;px<FONT_W;px++)
        if(glyph[py*FONT_W+px]){ const dx=cx+px,dy=cy+py;
          if(dx>=0&&dx<W&&dy>=0&&dy<H) buf32[dy*W+dx]=col; }
      cx+=FONT_W+1;
    }
  };
  API.mget = function(cx,cy) { return tilemap[cx+","+cy]||0; };
  API.mset = function(cx,cy,id) { tilemap[cx+","+cy]=id; };
  API.map = function(mx,my,mw,mh,sx,sy) {
    for(let ty=0;ty<mh;ty++) for(let tx=0;tx<mw;tx++){
      const id=API.mget(mx+tx,my+ty); if(id>0) API.spr(id,sx+tx*8,sy+ty*8); }
  };
  const VALID_KEYS = {up:1,down:1,left:1,right:1,a:1,b:1};
  API.btn = function(k) { if(!VALID_KEYS[k]) console.warn("GrayBox: invalid key \""+k+"\". Use: up/down/left/right/a/b"); return !!keys[k]; };
  API.btnp = function(k) { if(!VALID_KEYS[k]) console.warn("GrayBox: invalid key \""+k+"\". Use: up/down/left/right/a/b"); return !!keys[k] && !keysPrev[k]; };
  API.note = function(ch, noteStr, dur) {
    ensureAudio(); if(ch<0||ch>1) return; API.stop(ch);
    const osc=audioCtx.createOscillator(); osc.type="square";
    osc.frequency.value=noteToFreq(noteStr);
    osc.connect(channelGains[ch]); osc.start();
    osc.stop(audioCtx.currentTime+dur); channels[ch]=osc;
  };
  API.stop = function(ch) {
    if(ch===undefined){API.stop(0);API.stop(1);return;}
    if(channels[ch]){try{channels[ch].stop();}catch(e){} channels[ch]=null;}
  };
  API.rnd = function(max) { return Math.random()*max; };
  API.flr = Math.floor;
  API.abs = Math.abs;
  API.min = Math.min;
  API.max = Math.max;
  API.sin = Math.sin;
  API.cos = Math.cos;

  function tick() {
    if (API._update) API._update();
    if (API._draw) API._draw();
    ctx.putImageData(buf, 0, 0);
    for (const k in keys) keysPrev[k] = keys[k];
    API.frame++;
  }

  // ============================================================
  // Phoenix Game
  // ============================================================
  const { cls, pix, line, rect, rectf, circ, circf, sprite: defSprite,
          spr, sprT, text: drawText, btn, btnp, note, stop, rnd, flr,
          abs: _abs, min, max: _max, sin, cos } = API;

  // --- Sprites ---

  // 1: Player ship
  defSprite(1,
    "00030000" +
    "00333000" +
    "00333000" +
    "03333300" +
    "33333330" +
    "33322330" +
    "33000030" +
    "01000010"
  );

  // 2: Small bird - wings up
  defSprite(2,
    "30000030" +
    "03000300" +
    "03300330" +
    "03322330" +
    "00333300" +
    "00033000" +
    "00300300" +
    "00000000"
  );

  // 3: Small bird - wings down
  defSprite(3,
    "00000000" +
    "00300300" +
    "00033000" +
    "00333300" +
    "03322330" +
    "03300330" +
    "03000300" +
    "30000030"
  );

  // 4: Phoenix bird - wings up (large, multi-hit)
  defSprite(4,
    "30000030" +
    "33000330" +
    "33300330" +
    "33322330" +
    "03333300" +
    "03333300" +
    "00333000" +
    "00300300"
  );

  // 5: Phoenix bird - wings down
  defSprite(5,
    "00300300" +
    "00333000" +
    "03333300" +
    "03333300" +
    "33322330" +
    "33300330" +
    "33000330" +
    "30000030"
  );

  // 6: Phoenix damaged (no wings)
  defSprite(6,
    "00000000" +
    "00000000" +
    "00300300" +
    "00322300" +
    "00333300" +
    "00333300" +
    "00033000" +
    "00300300"
  );

  // 7: Mothership body (alien inside)
  defSprite(7,
    "00333000" +
    "03222300" +
    "32222230" +
    "32233230" +
    "32222230" +
    "03222300" +
    "00333000" +
    "00030000"
  );

  // 8: Shield segment (rotating barrier piece)
  defSprite(8,
    "00000000" +
    "00000000" +
    "33333330" +
    "22222220" +
    "22222220" +
    "33333330" +
    "00000000" +
    "00000000"
  );

  // 9: Player bullet
  defSprite(9,
    "00030000" +
    "00030000" +
    "00020000" +
    "00020000" +
    "00010000" +
    "00000000" +
    "00000000" +
    "00000000"
  );

  // 10: Enemy bullet
  defSprite(10,
    "00000000" +
    "00000000" +
    "00010000" +
    "00020000" +
    "00020000" +
    "00030000" +
    "00030000" +
    "00000000"
  );

  // 11: Explosion frame 1
  defSprite(11,
    "00000000" +
    "00200100" +
    "01002000" +
    "00031000" +
    "00130200" +
    "01000010" +
    "00100000" +
    "00000000"
  );

  // 12: Explosion frame 2
  defSprite(12,
    "20010020" +
    "01000010" +
    "00203200" +
    "03033030" +
    "00232000" +
    "01000300" +
    "20001001" +
    "00200010"
  );

  // 13: Life icon
  defSprite(13,
    "00000000" +
    "00030000" +
    "00333000" +
    "03333300" +
    "33333330" +
    "33322330" +
    "00000000" +
    "00000000"
  );

  // 14: Shield icon (player shield active)
  defSprite(14,
    "00333000" +
    "03333300" +
    "33333330" +
    "33333330" +
    "33333330" +
    "03333300" +
    "00333000" +
    "00030000"
  );

  // 15: Mothership shield block (solid)
  defSprite(15,
    "33333333" +
    "32222223" +
    "32222223" +
    "32222223" +
    "32222223" +
    "32222223" +
    "32222223" +
    "33333333"
  );

  // 16: Star
  defSprite(16,
    "00000000" +
    "00000000" +
    "00000000" +
    "00010000" +
    "00000000" +
    "00000000" +
    "00000000" +
    "00000000"
  );

  // --- Game Constants ---
  const FORM_COLS = 10;
  const FORM_ROWS = 4;
  const FORM_CELL_W = 12;
  const FORM_CELL_H = 12;
  const FORM_BASE_X = (W - FORM_COLS * FORM_CELL_W) / 2;
  const FORM_BASE_Y = 30;

  // --- Game State ---
  let state = "title";
  let player, bullets, eBullets, enemies, explosions, particles, stars;
  let score, lives, phase, loop, waveTimer, waveMessage;
  let shootCooldown;
  let formationX, formationDir, formationSpeed;
  let diveTimer;
  let shieldEnergy, shieldActive, shieldCooldown;
  let boss, bossShieldAngle;
  let invincibleTimer;
  let hiScore = 0;

  function resetGame() {
    player = { x: W / 2 - 4, y: H - 22, speed: 3 };
    bullets = [];
    eBullets = [];
    enemies = [];
    explosions = [];
    particles = [];
    score = 0;
    lives = 3;
    phase = 0;
    loop = 0;
    waveTimer = 0;
    waveMessage = 0;
    shootCooldown = 0;
    formationX = 0;
    formationDir = 1;
    formationSpeed = 0.3;
    diveTimer = 0;
    shieldEnergy = 90;
    shieldActive = false;
    shieldCooldown = 0;
    boss = null;
    bossShieldAngle = 0;
    invincibleTimer = 0;
    stars = [];
    for (let i = 0; i < 60; i++)
      stars.push({ x: flr(rnd(W)), y: flr(rnd(H)), speed: 0.2 + rnd(0.8), bright: flr(rnd(2)) + 1 });
    spawnPhase();
  }

  function spawnPhase() {
    phase++;
    const actualPhase = ((phase - 1) % 5) + 1;
    waveMessage = 90;
    formationSpeed = 0.3 + loop * 0.1;
    enemies = [];
    bullets = [];
    eBullets = [];
    boss = null;

    if (actualPhase <= 2) {
      // Small birds
      const rows = 3 + flr(loop / 2);
      const cols = _max(8, FORM_COLS);
      for (let row = 0; row < min(rows, 4); row++) {
        for (let col = 0; col < cols; col++) {
          enemies.push({
            formRow: row, formCol: col,
            x: 0, y: 0,
            type: "smallbird", hp: 1, pts: 10 + loop * 5,
            state: "forming",
            enterT: -(row * cols + col) * 3,
            diveSpeed: 0, divePath: null, diveT: 0,
            shootTimer: 60 + flr(rnd(120)),
            wingTimer: 0,
          });
        }
      }
    } else if (actualPhase <= 4) {
      // Phoenix birds - take multiple hits, regenerate wings
      const rows = 2 + flr(loop / 2);
      const cols = 8;
      for (let row = 0; row < min(rows, 3); row++) {
        for (let col = 0; col < cols; col++) {
          enemies.push({
            formRow: row, formCol: col,
            x: 0, y: 0,
            type: "phoenix", hp: 3 + loop, maxHp: 3 + loop, pts: 30 + loop * 10,
            state: "forming",
            enterT: -(row * cols + col) * 4,
            diveSpeed: 0, divePath: null, diveT: 0,
            shootTimer: 40 + flr(rnd(80)),
            wingTimer: 0,
            regenTimer: 0,
            damaged: false,
          });
        }
      }
    } else {
      // Phase 5: Mothership boss
      spawnBoss();
    }
    diveTimer = 60 + flr(rnd(30));
  }

  function spawnBoss() {
    boss = {
      x: W / 2 - 4, y: 45,
      hp: 20 + loop * 10,
      maxHp: 20 + loop * 10,
      shieldAngle: 0,
      shieldSegments: 12,
      shieldRadius: 20,
      shieldHp: [], // each segment has HP
      state: "entering",
      enterT: 0,
      moveDir: 1,
      moveSpeed: 0.5 + loop * 0.2,
      shootTimer: 30,
      pts: 500 + loop * 200,
      phaseTimer: 0,
    };
    for (let i = 0; i < boss.shieldSegments; i++) {
      boss.shieldHp.push(3 + loop);
    }
  }

  function formationPos(row, col) {
    return {
      x: FORM_BASE_X + col * FORM_CELL_W + formationX,
      y: FORM_BASE_Y + row * FORM_CELL_H
    };
  }

  function addExplosion(x, y, big) {
    explosions.push({ x: x, y: y, timer: big ? 18 : 12 });
    const count = big ? 16 : 8;
    for (let i = 0; i < count; i++)
      particles.push({
        x: x + 4, y: y + 4,
        vx: rnd(big ? 6 : 4) - (big ? 3 : 2),
        vy: rnd(big ? 6 : 4) - (big ? 3 : 2),
        life: 6 + flr(rnd(big ? 16 : 10)),
        color: flr(rnd(3)) + 1
      });
  }

  // --- Sounds ---
  function shootSound() { note(0, "C6", 0.04); }
  function hitSound() { note(1, "C3", 0.06); setTimeout(() => note(1, "E3", 0.05), 40); }
  function phoenixHitSound() { note(1, "A4", 0.03); }
  function bossHitSound() { note(1, "G3", 0.04); setTimeout(() => note(1, "B3", 0.04), 30); }
  function deathSound() {
    note(0, "C3", 0.12); note(1, "G2", 0.12);
    setTimeout(() => { note(0, "A2", 0.18); note(1, "E2", 0.18); }, 120);
  }
  function shieldSound() { note(1, "E5", 0.03); }
  function phaseClearSound() {
    note(0, "C5", 0.1);
    setTimeout(() => note(0, "E5", 0.1), 100);
    setTimeout(() => note(0, "G5", 0.1), 200);
    setTimeout(() => note(0, "C6", 0.15), 300);
  }
  function bossDeathSound() {
    note(0, "C4", 0.1); note(1, "E4", 0.1);
    setTimeout(() => { note(0, "G4", 0.1); note(1, "B4", 0.1); }, 100);
    setTimeout(() => { note(0, "C5", 0.15); note(1, "E5", 0.15); }, 200);
    setTimeout(() => { note(0, "G5", 0.2); note(1, "C6", 0.2); }, 300);
  }

  function startDive(enemy) {
    enemy.state = "diving";
    enemy.diveT = 0;
    const startX = enemy.x;
    const startY = enemy.y;
    const midX = startX + (rnd(133) - 67);
    const midY = H * 0.4 + rnd(45);
    const endX = player.x + (rnd(53) - 27);
    const endY = H + 20;
    enemy.divePath = { sx: startX, sy: startY, mx: midX, my: midY, ex: endX, ey: endY };
    enemy.diveSpeed = 2 + rnd(1) + loop * 0.3;
  }

  function bezier(t, a, b, c) {
    const u = 1 - t;
    return u * u * a + 2 * u * t * b + t * t * c;
  }

  function hitBox(ax, ay, aw, ah, bx, by, bw, bh) {
    return ax < bx + bw && ax + aw > bx && ay < by + bh && ay + ah > by;
  }

  function getPhaseLabel() {
    const actualPhase = ((phase - 1) % 5) + 1;
    if (actualPhase <= 2) return "PHASE " + phase + " - SMALL BIRDS";
    if (actualPhase <= 4) return "PHASE " + phase + " - PHOENIX";
    return "PHASE " + phase + " - MOTHERSHIP";
  }

  function killPlayer() {
    if (invincibleTimer > 0) return;
    lives--;
    addExplosion(player.x, player.y, true);
    deathSound();
    player.x = W / 2 - 4;
    invincibleTimer = 60;
    if (lives <= 0) {
      state = "gameover";
      if (score > hiScore) hiScore = score;
    }
  }

  resetGame();

  // ============================================================
  // Update
  // ============================================================
  API._update = function() {
    // Stars always scroll
    for (const s of stars) { s.y += s.speed; if (s.y > H) { s.y = 0; s.x = flr(rnd(W)); } }

    if (state === "title") {
      if (btnp("a") || btnp("a")) {
        state = "play";
        resetGame();
        note(0, "C5", 0.1);
        setTimeout(() => note(0, "E5", 0.1), 100);
        setTimeout(() => note(0, "G5", 0.15), 200);
      }
      return;
    }

    if (state === "gameover") {
      for (let i = particles.length - 1; i >= 0; i--) {
        const p = particles[i]; p.x += p.vx; p.y += p.vy; p.vy += 0.08; p.life--;
        if (p.life <= 0) particles.splice(i, 1);
      }
      if (btnp("a") || btnp("a")) state = "title";
      return;
    }

    // --- Play state ---
    if (waveMessage > 0) waveMessage--;
    if (invincibleTimer > 0) invincibleTimer--;

    // Player movement
    if (btn("left")) player.x -= player.speed;
    if (btn("right")) player.x += player.speed;
    player.x = _max(3, min(W - 11, player.x));

    // Player shoot
    if (shootCooldown > 0) shootCooldown--;
    if (btnp("a") && shootCooldown <= 0 && bullets.length < 3) {
      bullets.push({ x: player.x + 0, y: player.y - 4 });
      shootCooldown = 7;
      shootSound();
    }

    // Player shield
    if (shieldCooldown > 0) shieldCooldown--;
    if (btn("b") && shieldEnergy > 0 && shieldCooldown <= 0) {
      shieldActive = true;
      shieldEnergy -= 1;
      if (shieldEnergy <= 0) { shieldActive = false; shieldCooldown = 60; }
    } else {
      shieldActive = false;
      if (shieldEnergy < 90) shieldEnergy += 0.25; // regen slowly
    }

    // Update player bullets
    for (let i = bullets.length - 1; i >= 0; i--) {
      bullets[i].y -= 6;
      if (bullets[i].y < -8) bullets.splice(i, 1);
    }

    // Boss phase
    if (boss) {
      updateBoss();
      updateExplosionsParticles();
      return;
    }

    // Formation movement
    formationX += formationDir * formationSpeed;
    if (formationX > 20) formationDir = -1;
    if (formationX < -20) formationDir = 1;

    // Update enemies
    for (let i = enemies.length - 1; i >= 0; i--) {
      const e = enemies[i];
      e.wingTimer++;

      // Phoenix wing regeneration
      if (e.type === "phoenix" && e.damaged && e.regenTimer > 0) {
        e.regenTimer--;
        if (e.regenTimer <= 0) {
          e.damaged = false;
          e.hp = min(e.hp + 1, e.maxHp);
        }
      }

      if (e.state === "forming") {
        e.enterT++;
        if (e.enterT < 0) continue;
        const target = formationPos(e.formRow, e.formCol);
        const flyInDuration = 30;
        if (e.enterT <= flyInDuration) {
          const t = e.enterT / flyInDuration;
          const startX = W / 2 + sin(e.formCol * 0.8) * 67;
          e.x = startX + (target.x - startX) * t;
          e.y = -10 + (target.y + 10) * t;
        } else {
          e.state = "formation";
        }
      }

      if (e.state === "formation") {
        const target = formationPos(e.formRow, e.formCol);
        e.x = target.x;
        e.y = target.y;
      }

      if (e.state === "diving") {
        e.diveT += e.diveSpeed / 200;
        if (e.diveT >= 1) {
          e.state = "returning";
          e.x = e.divePath.ex;
          e.y = -10;
          e.diveT = 0;
        } else {
          const p = e.divePath;
          e.x = bezier(e.diveT, p.sx, p.mx, p.ex);
          e.y = bezier(e.diveT, p.sy, p.my, p.ey);
        }
        e.shootTimer--;
        if (e.shootTimer <= 0 && e.y > 0 && e.y < H - 30) {
          eBullets.push({ x: e.x + 0, y: e.y + 8 });
          e.shootTimer = _max(20, 40 - loop * 3) + flr(rnd(30));
        }
      }

      if (e.state === "returning") {
        const target = formationPos(e.formRow, e.formCol);
        e.diveT += 0.02;
        if (e.diveT >= 1) {
          e.state = "formation";
          e.x = target.x;
          e.y = target.y;
        } else {
          e.x += (target.x - e.x) * 0.05;
          e.y += (target.y - e.y) * 0.05;
        }
      }

      // Bullet-enemy collision
      for (let j = bullets.length - 1; j >= 0; j--) {
        const b = bullets[j];
        if (hitBox(b.x, b.y, 2, 5, e.x, e.y, 8, 8)) {
          bullets.splice(j, 1);
          e.hp--;
          if (e.type === "phoenix") {
            e.damaged = true;
            e.regenTimer = 90 - loop * 5; // regenerate after delay
          }
          if (e.hp <= 0) {
            addExplosion(e.x, e.y, e.type === "phoenix");
            score += e.pts;
            hitSound();
            enemies.splice(i, 1);
          } else {
            phoenixHitSound();
          }
          break;
        }
      }
    }

    // Trigger dives
    diveTimer--;
    if (diveTimer <= 0) {
      const formEnemies = enemies.filter(e => e.state === "formation");
      if (formEnemies.length > 0) {
        const count = min(1 + flr(loop / 2), 3);
        for (let d = 0; d < count; d++) {
          const available = enemies.filter(e => e.state === "formation");
          if (available.length > 0) {
            startDive(available[flr(rnd(available.length))]);
          }
        }
      }
      diveTimer = _max(15, 45 - loop * 5) + flr(rnd(20));
    }

    // Update enemy bullets
    for (let i = eBullets.length - 1; i >= 0; i--) {
      eBullets[i].y += 3 + loop * 0.3;
      if (eBullets[i].y > H + 8) { eBullets.splice(i, 1); continue; }
      const b = eBullets[i];
      if (hitBox(b.x, b.y, 2, 5, player.x, player.y, 8, 8)) {
        eBullets.splice(i, 1);
        if (shieldActive) {
          shieldSound();
          shieldEnergy -= 10;
          if (shieldEnergy < 0) shieldEnergy = 0;
        } else {
          killPlayer();
        }
      }
    }

    // Enemy-player collision
    for (let i = enemies.length - 1; i >= 0; i--) {
      const e = enemies[i];
      if (e.state === "diving" && hitBox(player.x, player.y, 8, 8, e.x, e.y, 8, 8)) {
        addExplosion(e.x, e.y, false);
        enemies.splice(i, 1);
        if (shieldActive) {
          shieldSound();
          shieldEnergy -= 20;
          score += 5;
        } else {
          killPlayer();
        }
      }
    }

    updateExplosionsParticles();

    // Formation enemies shoot
    for (const e of enemies) {
      if (e.state === "formation") {
        e.shootTimer--;
        if (e.shootTimer <= 0) {
          const hasBelow = enemies.some(o => o.formCol === e.formCol && o.formRow > e.formRow && o.state === "formation");
          if (!hasBelow && rnd(1) < 0.5) {
            eBullets.push({ x: e.x + 0, y: e.y + 8 });
          }
          e.shootTimer = _max(30, 100 - loop * 8) + flr(rnd(50));
        }
      }
    }

    // Phase clear check
    if (enemies.length === 0 && !boss && state === "play") {
      phaseClearSound();
      waveTimer++;
      if (waveTimer > 60) {
        waveTimer = 0;
        if (phase % 5 === 0) loop++;
        spawnPhase();
      }
    }
  };

  // --- Boss Update ---
  function updateBoss() {
    const b = boss;

    if (b.state === "entering") {
      b.enterT++;
      b.y = -15 + b.enterT * 1.5;
      if (b.y >= 45) {
        b.y = 45;
        b.state = "fighting";
      }
      return;
    }

    b.phaseTimer++;
    b.shieldAngle += 0.02 + loop * 0.005;

    // Boss movement
    b.x += b.moveDir * b.moveSpeed;
    if (b.x > W - 33) b.moveDir = -1;
    if (b.x < 33) b.moveDir = 1;
    // Slight vertical bob
    b.y = 45 + sin(b.phaseTimer * 0.03) * 11;

    // Boss shoots
    b.shootTimer--;
    if (b.shootTimer <= 0) {
      // Fire spread
      const spread = 2 + flr(loop / 2);
      for (let s = 0; s < spread; s++) {
        const angle = Math.PI / 2 + (s - (spread - 1) / 2) * 0.2;
        eBullets.push({
          x: b.x + 0, y: b.y + 12,
          vx: cos(angle) * 2,
          vy: sin(angle) * 2.5,
          aimed: true,
        });
      }
      b.shootTimer = _max(15, 40 - loop * 3);
    }

    // Update aimed enemy bullets
    for (let i = eBullets.length - 1; i >= 0; i--) {
      const eb = eBullets[i];
      if (eb.aimed) {
        eb.x += eb.vx;
        eb.y += eb.vy;
      } else {
        eb.y += 3 + loop * 0.3;
      }
      if (eb.y > H + 8 || eb.x < -8 || eb.x > W + 8) { eBullets.splice(i, 1); continue; }
      if (hitBox(eb.x, eb.y, 2, 5, player.x, player.y, 8, 8)) {
        eBullets.splice(i, 1);
        if (shieldActive) {
          shieldSound();
          shieldEnergy -= 10;
          if (shieldEnergy < 0) shieldEnergy = 0;
        } else {
          killPlayer();
        }
      }
    }

    // Player bullets vs boss shield and body
    for (let j = bullets.length - 1; j >= 0; j--) {
      const bul = bullets[j];
      let hitShield = false;

      // Check shield segments
      for (let s = 0; s < b.shieldSegments; s++) {
        if (b.shieldHp[s] <= 0) continue;
        const angle = b.shieldAngle + (s / b.shieldSegments) * Math.PI * 2;
        const sx = b.x + cos(angle) * b.shieldRadius;
        const sy = b.y + sin(angle) * b.shieldRadius;
        if (hitBox(bul.x, bul.y, 2, 5, sx - 3, sy - 3, 7, 7)) {
          bullets.splice(j, 1);
          b.shieldHp[s]--;
          phoenixHitSound();
          if (b.shieldHp[s] <= 0) {
            addExplosion(sx - 4, sy - 4, false);
            score += 20;
          }
          hitShield = true;
          break;
        }
      }

      if (!hitShield && j < bullets.length) {
        // Check boss body
        if (hitBox(bul.x, bul.y, 2, 5, b.x - 4, b.y - 4, 16, 16)) {
          bullets.splice(j, 1);
          b.hp--;
          bossHitSound();
          score += 10;
          if (b.hp <= 0) {
            // Boss defeated
            addExplosion(b.x - 4, b.y - 4, true);
            addExplosion(b.x + 4, b.y, true);
            addExplosion(b.x - 2, b.y + 6, true);
            score += b.pts;
            bossDeathSound();
            boss = null;
            break;
          }
        }
      }
    }

    updateExplosionsParticles();

    // Phase clear
    if (!boss && state === "play") {
      phaseClearSound();
      waveTimer++;
      if (waveTimer > 60) {
        waveTimer = 0;
        loop++;
        spawnPhase();
      }
    }
  }

  function updateExplosionsParticles() {
    for (let i = explosions.length - 1; i >= 0; i--) {
      explosions[i].timer--;
      if (explosions[i].timer <= 0) explosions.splice(i, 1);
    }
    for (let i = particles.length - 1; i >= 0; i--) {
      const p = particles[i];
      p.x += p.vx; p.y += p.vy; p.vy += 0.05; p.life--;
      if (p.life <= 0) particles.splice(i, 1);
    }
  }

  // ============================================================
  // Draw
  // ============================================================
  API._draw = function() {
    cls(0);

    // Stars
    for (const s of stars) pix(s.x, s.y, s.bright);

    if (state === "title") {
      drawTitle();
      return;
    }

    if (state === "gameover") {
      drawGameOver();
      return;
    }

    // --- Play state ---
    drawPlay();
  };

  function drawTitle() {
    const ty = 45 + sin(API.frame * 0.05) * 5;

    // Title text
    drawText("PHOENIX", 142, flr(ty), 3);
    drawText("PHOENIX", 143, flr(ty) + 1, 1);
    rectf(113, flr(ty) + 12, 93, 1, 2);

    // Animated phoenix sprites
    const bx = W / 2 - 32;
    const wingUp = flr(API.frame / 10) % 2 === 0;
    sprT(wingUp ? 4 : 5, bx, flr(ty) + 18 + sin(API.frame * 0.08) * 3);
    sprT(wingUp ? 2 : 3, bx + 16, flr(ty) + 20 + sin(API.frame * 0.08 + 1) * 3);
    sprT(7, bx + 32, flr(ty) + 18 + sin(API.frame * 0.08 + 2) * 3);
    sprT(wingUp ? 2 : 3, bx + 48, flr(ty) + 20 + sin(API.frame * 0.08 + 3) * 3);
    sprT(wingUp ? 4 : 5, bx + 64, flr(ty) + 18 + sin(API.frame * 0.08 + 4) * 3);

    if (flr(API.frame / 20) % 2 === 0) drawText("PRESS A TO START", 120, 142, 3);

    // Score table
    drawText("-SCORE TABLE-", 128, 161, 2);
    sprT(2, 127, 172); drawText("  BIRD     10 PTS", 133, 173, 2);
    sprT(4, 127, 182); drawText("  PHOENIX  30 PTS", 133, 184, 2);
    sprT(7, 127, 193); drawText("  BOSS    500 PTS", 133, 194, 2);

    drawText("X = SHIELD   Z = SHOOT", 105, 210, 1);
    if (hiScore > 0) drawText("HI:" + hiScore, 140, 221, 2);
    drawText("GRAYBOX DEMO V0.1", 118, 231, 1);
  }

  function drawGameOver() {
    for (const p of particles) pix(flr(p.x), flr(p.y), p.color);

    drawText("GAME OVER", 138, 82, 3);
    drawText("SCORE: " + score, 138, 101, 2);
    drawText("PHASE: " + phase, 138, 112, 2);
    if (score >= hiScore && score > 0) drawText("NEW HIGH SCORE!", 123, 128, 3);
    if (flr(API.frame / 20) % 2 === 0) drawText("PRESS A TO CONTINUE", 113, 158, 3);
  }

  function drawPlay() {
    // Enemy bullets
    for (const b of eBullets) sprT(10, flr(b.x), flr(b.y));

    // Boss
    if (boss) drawBoss();

    // Enemies
    for (const e of enemies) {
      if (e.state === "forming" && e.enterT < 0) continue;
      const ex = flr(e.x), ey = flr(e.y);

      if (e.type === "smallbird") {
        const wingUp = flr(e.wingTimer / 8) % 2 === 0;
        sprT(wingUp ? 2 : 3, ex, ey);
      } else if (e.type === "phoenix") {
        if (e.damaged && e.hp <= 1) {
          // Damaged phoenix - no wings, flicker
          if (flr(API.frame / 3) % 2 === 0) sprT(6, ex, ey);
          else sprT(6, ex, ey);
        } else {
          const wingUp = flr(e.wingTimer / 10) % 2 === 0;
          sprT(wingUp ? 4 : 5, ex, ey);
        }
      }
    }

    // Player bullets
    for (const b of bullets) sprT(9, flr(b.x), flr(b.y));

    // Player
    if (state === "play" && (invincibleTimer <= 0 || flr(API.frame / 3) % 2 === 0)) {
      sprT(1, flr(player.x), flr(player.y));
      // Shield visual
      if (shieldActive) {
        circ(flr(player.x) + 4, flr(player.y) + 4, 7, 2);
        circ(flr(player.x) + 4, flr(player.y) + 4, 8, 3);
      }
    }

    // Explosions
    for (const e of explosions) {
      const sprId = e.timer > 6 ? 11 : 12;
      sprT(sprId, flr(e.x), flr(e.y));
    }

    // Particles
    for (const p of particles) pix(flr(p.x), flr(p.y), p.color);

    // HUD
    rectf(0, 0, W, 10, 0);
    drawText("SCORE:" + score, 3, 2, 3);

    const actualPhase = ((phase - 1) % 5) + 1;
    let phaseLabel = "PH" + phase;
    if (actualPhase <= 2) phaseLabel += " BIRDS";
    else if (actualPhase <= 4) phaseLabel += " PHNX";
    else phaseLabel += " BOSS";
    drawText(phaseLabel, W / 2 - 20, 2, 2);

    // Lives
    for (let i = 0; i < lives; i++) sprT(13, W - 27 + i * 10, 2);

    // Shield bar
    const barX = W - 53;
    const barY = H - 8;
    drawText("SH", barX - 15, barY - 1, 1);
    rect(barX, barY - 2, 35, 5, 1);
    const barW = flr(shieldEnergy / 90 * 33);
    if (barW > 0) rectf(barX + 1, barY - 1, barW, 3, shieldActive ? 3 : 2);

    // Phase announcement
    if (waveMessage > 0) {
      const msgY = 105 + sin(waveMessage * 0.1) * 3;
      const pLabel = getPhaseLabel();
      const textW = pLabel.length * 5;
      drawText(pLabel, W / 2 - textW / 2, flr(msgY), 3);
      if (waveMessage > 60) drawText("GET READY!", 135, flr(msgY) + 10, 2);
    }
  }

  function drawBoss() {
    const b = boss;

    // Draw shield segments
    for (let s = 0; s < b.shieldSegments; s++) {
      if (b.shieldHp[s] <= 0) continue;
      const angle = b.shieldAngle + (s / b.shieldSegments) * Math.PI * 2;
      const sx = flr(b.x + cos(angle) * b.shieldRadius);
      const sy = flr(b.y + sin(angle) * b.shieldRadius);
      // Draw shield block - size based on remaining HP
      const size = min(b.shieldHp[s], 3);
      if (size >= 3) {
        rectf(sx - 3, sy - 3, 7, 7, 2);
        rect(sx - 3, sy - 3, 7, 7, 1);
      } else if (size >= 2) {
        rectf(sx - 2, sy - 2, 5, 5, 2);
      } else {
        rectf(sx - 1, sy - 1, 3, 3, 1);
      }
    }

    // Boss body
    sprT(7, flr(b.x) - 4, flr(b.y) - 4);

    // HP bar
    const hpBarW = 40;
    const hpX = flr(b.x) - hpBarW / 2 + 4;
    const hpY = flr(b.y) - 14;
    rect(hpX, hpY, hpBarW + 2, 5, 1);
    const hpFill = flr((b.hp / b.maxHp) * hpBarW);
    if (hpFill > 0) rectf(hpX + 1, hpY + 1, hpFill, 3, b.hp < b.maxHp / 3 ? 3 : 2);
  }

  // ============================================================
  // Boot
  // ============================================================
  if (API._init) API._init();
  setInterval(tick, 1000 / FPS);
  document.addEventListener("keydown", ensureAudio, { once: true });
  document.addEventListener("click", ensureAudio, { once: true });
})();
</script>
</body>
</html>
