<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GrayBox — Demo: Q*bert</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #0a0a0a;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100vh;
    font-family: monospace;
    overflow: hidden;
  }
  #frame {
    background: #111;
    border: 3px solid #333;
    border-radius: 8px;
    padding: 12px;
    box-shadow: 0 0 40px rgba(0,0,0,0.8), inset 0 0 20px rgba(0,0,0,0.5);
  }
  canvas {
    display: block;
    image-rendering: pixelated;
    image-rendering: crisp-edges;
  }
  #controls {
    margin-top: 12px;
    color: #6b6b6b;
    font-size: 11px;
    text-align: center;
    letter-spacing: 1px;
  }
  #controls span { color: #b0b0b0; }
</style>
</head>
<body>
<div id="frame">
  <canvas id="screen"></canvas>
</div>
<div id="controls">
  <span>ARROWS</span> HOP &nbsp;&nbsp; <span>ENTER</span> START
</div>
<script>
(() => {
  "use strict";

  // ============================================================
  // GrayBox Runtime (inline)
  // ============================================================
  const W = 480;
  const H = 320;
  const FPS = 30;
  const COLORS = ["#1a1a1a", "#6b6b6b", "#b0b0b0", "#e8e8e8"];
  const canvas = document.getElementById("screen");
  canvas.width = W;
  canvas.height = H;
  function fitCanvas() {
    var maxW = window.innerWidth - 40;
    var maxH = window.innerHeight - 60;
    var s = Math.min(maxW / W, maxH / H);
    canvas.style.width = (W * s) + "px";
    canvas.style.height = (H * s) + "px";
  }
  fitCanvas();
  window.addEventListener("resize", fitCanvas);
  const ctx = canvas.getContext("2d");
  ctx.imageSmoothingEnabled = false;
  const buf = ctx.createImageData(W, H);
  const buf32 = new Uint32Array(buf.data.buffer);

  function hexToABGR(hex) {
    const r = parseInt(hex.slice(1, 3), 16);
    const g = parseInt(hex.slice(3, 5), 16);
    const b = parseInt(hex.slice(5, 7), 16);
    return (255 << 24) | (b << 16) | (g << 8) | r;
  }
  const COLOR_U32 = COLORS.map(hexToABGR);

  const sprites = {};
  const tilemap = {};

  const keyMap = {
    "ArrowUp": "up", "ArrowDown": "down", "ArrowLeft": "left", "ArrowRight": "right",
    "w": "up", "s": "down", "a": "left", "d": "right",
    "z": "a", "Z": "a", "x": "b", "X": "b",
    "Enter": "start", " ": "a"
  };
  const keys = {};
  const keysPrev = {};

  document.addEventListener("keydown", e => {
    const k = keyMap[e.key];
    if (k) { keys[k] = true; e.preventDefault(); }
  });
  document.addEventListener("keyup", e => {
    const k = keyMap[e.key];
    if (k) { keys[k] = false; e.preventDefault(); }
  });

  let audioCtx = null;
  const channels = [null, null];
  const channelGains = [null, null];
  function ensureAudio() {
    if (!audioCtx) {
      audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      for (let i = 0; i < 2; i++) {
        channelGains[i] = audioCtx.createGain();
        channelGains[i].gain.value = 0.15;
        channelGains[i].connect(audioCtx.destination);
      }
    }
  }

  const NOTE_NAMES = ["C","C#","D","D#","E","F","F#","G","G#","A","A#","B"];
  function noteToFreq(noteStr) {
    const match = noteStr.match(/^([A-G]#?)(\d)$/);
    if (!match) return 440;
    const name = match[1];
    const octave = parseInt(match[2]);
    const semitone = NOTE_NAMES.indexOf(name);
    if (semitone === -1) return 440;
    const midi = (octave + 1) * 12 + semitone;
    return 440 * Math.pow(2, (midi - 69) / 12);
  }

  const FONT_W = 4;
  const FONT_H = 7;
  const FONT = {};
  const fontData = {
    "A":"0110100110011111100110011001","B":"1110100110101110100110011110",
    "C":"0110100110001000100001100110","D":"1100101010011001100110101100",
    "E":"1111100010001110100010001111","F":"1111100010001110100010001000",
    "G":"0111100010001011100101100111","H":"1001100110011111100110011001",
    "I":"1110010001000100010001001110","J":"0111001000100010001010100100",
    "K":"1001101011001100101010011001","L":"1000100010001000100010001111",
    "M":"1001111111011001100110011001","N":"1001110111011001100110011001",
    "O":"0110100110011001100110010110","P":"1110100110011110100010001000",
    "Q":"0110100110011001101101100001","R":"1110100110011110101010011001",
    "S":"0111100010000110000110001110","T":"1111001000100010001000100010",
    "U":"1001100110011001100110010110","V":"1001100110011001100101100110",
    "W":"1001100110011001101111011001","X":"1001100101100110011010011001",
    "Y":"1001100101100010001000100010","Z":"1111000100100100100010001111",
    "0":"0110100111011011101110010110","1":"0100110001000100010001001110",
    "2":"0110100100010010010010001111","3":"1110000100010110000110011110",
    "4":"1001100110011111000100010001","5":"1111100010001110000100011110",
    "6":"0110100010001110100110010110","7":"1111000100010010010001001000",
    "8":"0110100110010110100110010110","9":"0110100110010111000100010110",
    " ":"0000000000000000000000000000",
    ".":"0000000000000000000001000100",
    ",":"0000000000000000001000101000",
    "!":"0100010001000100000000000100",
    "?":"0110100100010010000000000010",
    "-":"0000000000001110000000000000",
    "+":"0000001001001110010000100000",
    ":":"0000010001000000010001000000",
    "/":"0001000100100010010010001000",
    "*":"0000101001001110010010100000",
    "#":"0101111101011111010100000000",
    "(":"0010010010001000010001000010",
    ")":"0100001000010001000100100100",
    "=":"0000000011110000111100000000",
    "'":"0100010010000000000000000000",
    "\"":"1010101000000000000000000000",
    "<":"0010010010001000010000100010",
    ">":"1000010000100001001001001000",
    "_":"0000000000000000000000001111",
  };
  for (const [ch, bits] of Object.entries(fontData)) {
    FONT[ch] = [];
    for (let i = 0; i < bits.length; i++) FONT[ch].push(parseInt(bits[i]));
  }

  const API = {};
  API._init = null;
  API._update = null;
  API._draw = null;
  API.frame = 0;

  API.cls = function(c = 0) { buf32.fill(COLOR_U32[c] || COLOR_U32[0]); };
  API.pix = function(x, y, c) {
    x = Math.floor(x); y = Math.floor(y);
    if (x < 0 || x >= W || y < 0 || y >= H) return;
    buf32[y * W + x] = COLOR_U32[c] || COLOR_U32[0];
  };
  API.line = function(x0, y0, x1, y1, c) {
    x0=Math.floor(x0); y0=Math.floor(y0); x1=Math.floor(x1); y1=Math.floor(y1);
    const dx=Math.abs(x1-x0), dy=Math.abs(y1-y0);
    const sx=x0<x1?1:-1, sy=y0<y1?1:-1;
    let err=dx-dy;
    while(true) {
      API.pix(x0,y0,c);
      if(x0===x1&&y0===y1) break;
      const e2=2*err;
      if(e2>-dy){err-=dy;x0+=sx;}
      if(e2<dx){err+=dx;y0+=sy;}
    }
  };
  API.rect = function(x,y,w,h,c) {
    API.line(x,y,x+w-1,y,c); API.line(x+w-1,y,x+w-1,y+h-1,c);
    API.line(x+w-1,y+h-1,x,y+h-1,c); API.line(x,y+h-1,x,y,c);
  };
  API.rectf = function(x,y,w,h,c) {
    x=Math.floor(x); y=Math.floor(y);
    const col=COLOR_U32[c]||COLOR_U32[0];
    for(let py=Math.max(0,y);py<Math.min(H,y+h);py++)
      for(let px=Math.max(0,x);px<Math.min(W,x+w);px++)
        buf32[py*W+px]=col;
  };
  API.circ = function(cx,cy,r,c) {
    let x=r,y=0,d=1-r; cx=Math.floor(cx); cy=Math.floor(cy);
    while(x>=y){
      API.pix(cx+x,cy+y,c);API.pix(cx-x,cy+y,c);
      API.pix(cx+x,cy-y,c);API.pix(cx-x,cy-y,c);
      API.pix(cx+y,cy+x,c);API.pix(cx-y,cy+x,c);
      API.pix(cx+y,cy-x,c);API.pix(cx-y,cy-x,c);
      y++; if(d<0){d+=2*y+1;}else{x--;d+=2*(y-x)+1;}
    }
  };
  API.circf = function(cx,cy,r,c) {
    cx=Math.floor(cx); cy=Math.floor(cy);
    const col=COLOR_U32[c]||COLOR_U32[0]; const r2=r*r;
    for(let py=-r;py<=r;py++) for(let px=-r;px<=r;px++)
      if(px*px+py*py<=r2){ const sx=cx+px,sy=cy+py;
        if(sx>=0&&sx<W&&sy>=0&&sy<H) buf32[sy*W+sx]=col; }
  };
  API.sprite = function(id, data) {
    const arr = new Uint8Array(64); let i = 0;
    for (const ch of data) { if (ch>='0'&&ch<='3') { arr[i++]=parseInt(ch); if(i>=64) break; } }
    sprites[id] = arr;
  };
  API.spr = function(id, x, y, flipX, flipY) {
    const s=sprites[id]; if(!s) return;
    x=Math.floor(x); y=Math.floor(y);
    for(let py=0;py<8;py++) for(let px=0;px<8;px++){
      const sx=flipX?7-px:px, sy=flipY?7-py:py;
      const c=s[sy*8+sx], dx=x+px, dy=y+py;
      if(dx>=0&&dx<W&&dy>=0&&dy<H) buf32[dy*W+dx]=COLOR_U32[c];
    }
  };
  API.text = function(str, x, y, c) {
    str=String(str).toUpperCase(); let cx=Math.floor(x); const cy=Math.floor(y);
    const col=COLOR_U32[c]||COLOR_U32[3];
    for(const ch of str){
      const glyph=FONT[ch];
      if(glyph) for(let py=0;py<FONT_H;py++) for(let px=0;px<FONT_W;px++)
        if(glyph[py*FONT_W+px]){ const dx=cx+px,dy=cy+py;
          if(dx>=0&&dx<W&&dy>=0&&dy<H) buf32[dy*W+dx]=col; }
      cx+=FONT_W+1;
    }
  };
  API.mget = function(cx,cy) { return tilemap[cx+","+cy]||0; };
  API.mset = function(cx,cy,id) { tilemap[cx+","+cy]=id; };
  API.map = function(mx,my,mw,mh,sx,sy) {
    for(let ty=0;ty<mh;ty++) for(let tx=0;tx<mw;tx++){
      const id=API.mget(mx+tx,my+ty); if(id>0) API.spr(id,sx+tx*8,sy+ty*8); }
  };
  API.btn = function(k) { return !!keys[k]; };
  API.btnp = function(k) { return !!keys[k] && !keysPrev[k]; };
  API.note = function(ch, noteStr, dur) {
    ensureAudio(); if(ch<0||ch>1) return; API.stop(ch);
    const osc=audioCtx.createOscillator(); osc.type="square";
    osc.frequency.value=noteToFreq(noteStr);
    osc.connect(channelGains[ch]); osc.start();
    osc.stop(audioCtx.currentTime+dur); channels[ch]=osc;
  };
  API.stop = function(ch) {
    if(ch===undefined){API.stop(0);API.stop(1);return;}
    if(channels[ch]){try{channels[ch].stop();}catch(e){} channels[ch]=null;}
  };
  API.rnd = function(max) { return Math.random()*max; };
  API.flr = Math.floor;
  API.abs = Math.abs;
  API.min = Math.min;
  API.max = Math.max;
  API.sin = Math.sin;
  API.cos = Math.cos;

  function tick() {
    if (API._update) API._update();
    if (API._draw) API._draw();
    ctx.putImageData(buf, 0, 0);
    for (const k in keys) keysPrev[k] = keys[k];
    API.frame++;
  }

  // ============================================================
  // Q*bert Game
  // ============================================================
  const { cls, pix, line, rect, rectf, circ, circf, sprite: defSprite,
          spr, text, btn, btnp, note, stop, rnd, flr, abs: _abs,
          min, max: _max, sin, cos } = API;

  // --- Sprites ---
  // 1: Q*bert facing down-right
  defSprite(1,
    "00333000" +
    "03223300" +
    "03233300" +
    "00333000" +
    "02332200" +
    "02222200" +
    "02200220" +
    "02200220"
  );
  // 2: Q*bert facing down-left
  defSprite(2,
    "00333000" +
    "00322300" +
    "00332300" +
    "00333000" +
    "00233200" +
    "00222200" +
    "02200220" +
    "02200220"
  );
  // 3: Q*bert facing up-right
  defSprite(3,
    "02200220" +
    "02200220" +
    "02222200" +
    "02332200" +
    "00333000" +
    "03233300" +
    "03223300" +
    "00333000"
  );
  // 4: Q*bert facing up-left
  defSprite(4,
    "02200220" +
    "02200220" +
    "00222200" +
    "00233200" +
    "00333000" +
    "00332300" +
    "00322300" +
    "00333000"
  );
  // 5: Coily (snake) egg
  defSprite(5,
    "00000000" +
    "00111000" +
    "01221100" +
    "01222100" +
    "01222100" +
    "01221100" +
    "00111000" +
    "00000000"
  );
  // 6: Coily (snake) chasing
  defSprite(6,
    "02200220" +
    "03300330" +
    "01311310" +
    "01111110" +
    "00111100" +
    "00111100" +
    "00100100" +
    "00100100"
  );
  // 7: Red ball
  defSprite(7,
    "00000000" +
    "00220000" +
    "02332000" +
    "02222000" +
    "02222000" +
    "00220000" +
    "00000000" +
    "00000000"
  );
  // 8: Spinning disc
  defSprite(8,
    "00000000" +
    "00333000" +
    "03222300" +
    "03212300" +
    "03222300" +
    "00333000" +
    "00000000" +
    "00000000"
  );
  // 9: Speech bubble (!@#)
  defSprite(9,
    "33333330" +
    "32121230" +
    "31212130" +
    "32121230" +
    "33333330" +
    "00330000" +
    "00300000" +
    "00000000"
  );

  // --- Isometric Cube Geometry ---
  // Each cube is drawn as 3 faces: top, left, right
  const CUBE_W = 32;  // total width of isometric cube
  const CUBE_H = 24;  // top diamond height
  const CUBE_DEPTH = 16; // side face depth
  const PYR_TOP_X = W / 2; // top center of pyramid
  const PYR_TOP_Y = 52;    // top of pyramid y
  const ROWS = 7;

  // Get pixel position for grid position (row, col)
  // Row 0 = top (1 cube), row 6 = bottom (7 cubes)
  function cubePos(row, col) {
    const x = PYR_TOP_X + (col - row / 2) * CUBE_W;
    const y = PYR_TOP_Y + row * (CUBE_H / 2 + CUBE_DEPTH);
    return { x: x, y: y };
  }

  // Draw an isometric cube at pixel position (cx, cy) with given colors
  // cx,cy = center-top of the diamond top face
  function drawCube(cx, cy, topC, leftC, rightC) {
    const hw = CUBE_W / 2; // half width
    const hh = CUBE_H / 2; // half height of top diamond
    const sd = CUBE_DEPTH;  // side depth

    // Top face (diamond) - draw as filled rect approximation
    // We'll draw scanlines for the diamond shape
    for (let dy = -hh; dy <= hh; dy++) {
      const w = hw * (1 - _abs(dy) / hh);
      const y = cy + dy;
      if (y >= 0 && y < H) {
        const col = COLOR_U32[topC] || COLOR_U32[0];
        const x0 = _max(0, Math.floor(cx - w));
        const x1 = min(W - 1, Math.floor(cx + w));
        for (let x = x0; x <= x1; x++) buf32[Math.floor(y) * W + x] = col;
      }
    }

    // Left face (parallelogram)
    for (let dy = 0; dy < sd; dy++) {
      const topY = cy + hh + dy;
      if (topY < 0 || topY >= H) continue;
      const leftEdge = cx - hw + (dy * hw / sd);
      const rightEdge = cx;
      const col = COLOR_U32[leftC] || COLOR_U32[0];
      const x0 = _max(0, Math.floor(leftEdge));
      const x1 = min(W - 1, Math.floor(rightEdge));
      for (let x = x0; x <= x1; x++) buf32[Math.floor(topY) * W + x] = col;
    }

    // Right face (parallelogram)
    for (let dy = 0; dy < sd; dy++) {
      const topY = cy + hh + dy;
      if (topY < 0 || topY >= H) continue;
      const leftEdge = cx;
      const rightEdge = cx + hw - (dy * hw / sd);
      const col = COLOR_U32[rightC] || COLOR_U32[0];
      const x0 = _max(0, Math.floor(leftEdge));
      const x1 = min(W - 1, Math.floor(rightEdge));
      for (let x = x0; x <= x1; x++) buf32[Math.floor(topY) * W + x] = col;
    }

    // Outline edges for definition
    // Top diamond edges
    line(Math.floor(cx - hw), Math.floor(cy), Math.floor(cx), Math.floor(cy - hh), 0);
    line(Math.floor(cx + hw), Math.floor(cy), Math.floor(cx), Math.floor(cy - hh), 0);
    line(Math.floor(cx - hw), Math.floor(cy), Math.floor(cx), Math.floor(cy + hh), 0);
    line(Math.floor(cx + hw), Math.floor(cy), Math.floor(cx), Math.floor(cy + hh), 0);
    // Left face edges
    line(Math.floor(cx - hw), Math.floor(cy), Math.floor(cx - hw + hw), Math.floor(cy + hh + sd), 0);
    line(Math.floor(cx), Math.floor(cy + hh), Math.floor(cx), Math.floor(cy + hh + sd), 0);
    // Right face edges
    line(Math.floor(cx + hw), Math.floor(cy), Math.floor(cx + hw - hw), Math.floor(cy + hh + sd), 0);
  }

  // --- Game State ---
  let state = "title";
  let score, lives, level;
  let cubeColors; // 2D array: cubeColors[row][col] = current color index
  let targetColor; // color index cubes need to become
  let startColor;  // initial color of cubes

  // Player state
  let pRow, pCol;       // grid position
  let pPx, pPy;         // pixel position (for animation)
  let pTargetPx, pTargetPy;
  let pHopping;         // hopping timer
  let pDir;             // 0=downright, 1=downleft, 2=upright, 3=upleft
  let pFalling;         // falling off edge timer
  let pFallVy;
  let pDead;
  let pOnDisc;          // riding disc timer
  let pDiscSide;        // which disc (-1 left, 1 right)
  let invulnTimer;
  let speechTimer;      // show !@# when falling

  // Enemies
  let enemies;   // { type:"ball"|"coily", row, col, px, py, hopping, state, dir }
  let enemySpawnTimer;
  let coilyActive;

  // Discs
  let discs; // { row, side, active, px, py, used }

  // Level transition
  let levelClearTimer;
  let flashTimer;
  let deathPause;
  let titleBlink;

  const HOP_FRAMES = 8;
  const ENEMY_HOP_FRAMES = 12;

  function resetGame() {
    score = 0;
    lives = 3;
    level = 0;
    nextLevel();
  }

  function nextLevel() {
    level++;
    cubeColors = [];
    for (let r = 0; r < ROWS; r++) {
      cubeColors[r] = [];
      for (let c = 0; c <= r; c++) {
        cubeColors[r][c] = 0; // start color
      }
    }
    // Level determines colors
    // Levels 1-2: change from color 1 to color 2
    // Levels 3+: change from 1 to 3, enemies faster
    startColor = 1;
    targetColor = level <= 2 ? 2 : 3;

    for (let r = 0; r < ROWS; r++)
      for (let c = 0; c <= r; c++)
        cubeColors[r][c] = startColor;

    pRow = 0; pCol = 0;
    const p = cubePos(0, 0);
    pPx = p.x; pPy = p.y;
    pTargetPx = p.x; pTargetPy = p.y;
    pHopping = 0;
    pDir = 0;
    pFalling = 0;
    pFallVy = 0;
    pDead = false;
    pOnDisc = 0;
    pDiscSide = 0;
    invulnTimer = 60;
    speechTimer = 0;

    enemies = [];
    enemySpawnTimer = 60 + flr(rnd(60));
    coilyActive = false;

    // Place discs: one on each side at random rows
    discs = [];
    const discRow1 = 1 + flr(rnd(3));
    const discRow2 = 1 + flr(rnd(3));
    discs.push({ row: discRow1, side: -1, active: true, used: false });
    discs.push({ row: discRow2, side: 1, active: true, used: false });

    levelClearTimer = 0;
    flashTimer = 0;
    deathPause = 0;
  }

  function landOnCube(row, col) {
    if (row >= 0 && row < ROWS && col >= 0 && col <= row) {
      if (cubeColors[row][col] !== targetColor) {
        if (level <= 4) {
          cubeColors[row][col] = targetColor;
        } else {
          // Higher levels: cycle colors
          cubeColors[row][col] = cubeColors[row][col] === startColor ? targetColor : startColor;
        }
        score += 25;
        note(0, "E5", 0.05);
      }
    }
  }

  function checkLevelClear() {
    for (let r = 0; r < ROWS; r++)
      for (let c = 0; c <= r; c++)
        if (cubeColors[r][c] !== targetColor) return false;
    return true;
  }

  function isValidCube(row, col) {
    return row >= 0 && row < ROWS && col >= 0 && col <= row;
  }

  function killPlayer() {
    if (invulnTimer > 0 || pDead) return;
    pDead = true;
    lives--;
    deathPause = 60;
    speechTimer = 40;
    note(0, "C3", 0.15);
    setTimeout(() => note(0, "A2", 0.2), 150);
    setTimeout(() => note(1, "E2", 0.2), 300);
  }

  function respawnPlayer() {
    pRow = 0; pCol = 0;
    const p = cubePos(0, 0);
    pPx = p.x; pPy = p.y;
    pTargetPx = p.x; pTargetPy = p.y;
    pHopping = 0;
    pFalling = 0;
    pFallVy = 0;
    pDead = false;
    pOnDisc = 0;
    invulnTimer = 60;
    speechTimer = 0;
    // Clear enemies on respawn
    enemies = [];
    coilyActive = false;
    enemySpawnTimer = 90;
  }

  function getDiscPos(disc) {
    const cp = cubePos(disc.row, disc.side === -1 ? -1 : disc.row + 1);
    return { x: cp.x, y: cp.y };
  }

  function spawnEnemy() {
    // Spawn from top - either a ball or coily egg
    const startCol = flr(rnd(2)); // 0 or 1 from top
    const type = (!coilyActive && level > 1 && rnd(1) < 0.3) ? "coily_egg" : "ball";
    const p = cubePos(0, 0);
    enemies.push({
      type: type,
      row: -1,
      col: startCol,
      px: p.x + (startCol === 0 ? -CUBE_W / 2 : CUBE_W / 2),
      py: p.y - CUBE_H - CUBE_DEPTH,
      targetPx: 0,
      targetPy: 0,
      hopping: 0,
      hopDir: 0, // 0=downleft, 1=downright
      state: "bouncing", // "bouncing" | "chasing"
    });
    if (type === "coily_egg") coilyActive = true;
  }

  // --- Update ---
  API._update = function() {
    titleBlink = (API.frame % 40) < 25;

    if (state === "title") {
      if (btnp("start")) {
        ensureAudio();
        state = "play";
        resetGame();
        note(0, "C5", 0.1);
        setTimeout(() => note(0, "E5", 0.1), 100);
        setTimeout(() => note(0, "G5", 0.15), 200);
      }
      return;
    }

    if (state === "gameover") {
      if (btnp("start")) {
        state = "title";
      }
      return;
    }

    // --- Play state ---
    if (levelClearTimer > 0) {
      levelClearTimer--;
      flashTimer++;
      if (levelClearTimer === 0) {
        nextLevel();
      }
      return;
    }

    if (deathPause > 0) {
      deathPause--;
      if (speechTimer > 0) speechTimer--;
      if (deathPause === 0) {
        if (lives <= 0) {
          state = "gameover";
        } else {
          respawnPlayer();
        }
      }
      return;
    }

    if (invulnTimer > 0) invulnTimer--;

    // --- Player hopping ---
    if (pHopping > 0) {
      pHopping--;
      const t = 1 - pHopping / HOP_FRAMES;
      pPx = pPx + (pTargetPx - pPx) * 0.2;
      pPy = pPy + (pTargetPy - pPy) * 0.2;
      // Arc
      if (pHopping === 0) {
        pPx = pTargetPx;
        pPy = pTargetPy;
        if (pOnDisc > 0) {
          // Riding disc to top
          pOnDisc--;
          if (pOnDisc === 0) {
            pRow = 0; pCol = 0;
            const p = cubePos(0, 0);
            pPx = p.x; pPy = p.y;
            pTargetPx = p.x; pTargetPy = p.y;
            invulnTimer = 30;
            // Kill Coily if active
            enemies = enemies.filter(e => e.type !== "coily");
            coilyActive = false;
            score += 500;
            note(0, "C5", 0.08);
            setTimeout(() => note(0, "E5", 0.08), 80);
            setTimeout(() => note(0, "G5", 0.08), 160);
            setTimeout(() => note(0, "C6", 0.12), 240);
          }
        } else if (pFalling > 0) {
          // Already falling off edge
        } else {
          // Land on cube
          landOnCube(pRow, pCol);
          if (checkLevelClear()) {
            levelClearTimer = 90;
            score += 1000;
            note(0, "C5", 0.1);
            setTimeout(() => note(0, "E5", 0.1), 100);
            setTimeout(() => note(0, "G5", 0.1), 200);
            setTimeout(() => note(0, "C6", 0.2), 300);
          }
        }
      }
    } else if (pFalling > 0) {
      pFallVy += 0.5;
      pPy += pFallVy;
      pFalling--;
      if (pFalling === 0) {
        killPlayer();
      }
    } else if (!pDead && pOnDisc === 0) {
      // Accept input
      let dr = 0, dc = 0;
      let moved = false;
      if (btnp("right")) { dr = 1; dc = 1; pDir = 0; moved = true; }      // down-right
      else if (btnp("down")) { dr = 1; dc = 0; pDir = 1; moved = true; }  // down-left
      else if (btnp("up")) { dr = -1; dc = 0; pDir = 3; moved = true; }   // up-left
      else if (btnp("left")) { dr = -1; dc = -1; pDir = 2; moved = true; }  // up-right... wait
      // Remap: arrows map to diagonal directions on isometric grid
      // Up = up-left (row-1, col-0), Left = up-right... hmm
      // Let's use a more intuitive mapping:
      // Up arrow = jump up-left (row-1, col unchanged -> visually up-left)
      // Right arrow = jump down-right (row+1, col+1)
      // Down arrow = jump down-left (row+1, col unchanged -> visually down-right from left side)
      // Left arrow = jump up-right...
      // Actually for Q*bert the standard is:
      // Up = up-right (row-1, col stays), Down = down-left (row+1, col stays)
      // Right = down-right (row+1, col+1), Left = up-left (row-1, col-1)

      if (moved) {
        const newRow = pRow + dr;
        const newCol = pCol + dc;

        // Check for disc
        let hitDisc = false;
        if (!isValidCube(newRow, newCol)) {
          for (const disc of discs) {
            if (disc.active && !disc.used) {
              // Left disc: col = -1 of that row
              // Right disc: col = row+1 of that row
              if (disc.side === -1 && newRow === disc.row && newCol < 0) {
                hitDisc = true;
                disc.used = true;
                disc.active = false;
                pOnDisc = 20;
                pDiscSide = -1;
                // Animate to top
                const tp = cubePos(0, 0);
                pTargetPx = tp.x;
                pTargetPy = tp.y;
                pHopping = 20;
                note(1, "G5", 0.1);
                break;
              }
              if (disc.side === 1 && newRow === disc.row && newCol > newRow) {
                hitDisc = true;
                disc.used = true;
                disc.active = false;
                pOnDisc = 20;
                pDiscSide = 1;
                const tp = cubePos(0, 0);
                pTargetPx = tp.x;
                pTargetPy = tp.y;
                pHopping = 20;
                note(1, "G5", 0.1);
                break;
              }
            }
          }
        }

        if (!hitDisc) {
          if (isValidCube(newRow, newCol)) {
            pRow = newRow;
            pCol = newCol;
            const p = cubePos(pRow, pCol);
            pTargetPx = p.x;
            pTargetPy = p.y;
            pHopping = HOP_FRAMES;
            note(1, "A4", 0.03);
          } else {
            // Fall off edge!
            pRow = newRow;
            pCol = newCol;
            const p = cubePos(_max(0, min(ROWS - 1, newRow)), _max(0, newCol));
            pTargetPx = pPx + (dc * CUBE_W);
            pTargetPy = pPy + (dr * (CUBE_H / 2 + CUBE_DEPTH));
            pHopping = HOP_FRAMES;
            pFalling = 20;
            pFallVy = 0;
            speechTimer = 30;
          }
        }
      }
    }

    // --- Enemy spawning ---
    if (!pDead && levelClearTimer === 0) {
      enemySpawnTimer--;
      if (enemySpawnTimer <= 0) {
        if (enemies.length < 3 + level) {
          spawnEnemy();
        }
        enemySpawnTimer = _max(30, 90 - level * 8) + flr(rnd(40));
      }
    }

    // --- Enemy update ---
    for (let i = enemies.length - 1; i >= 0; i--) {
      const e = enemies[i];

      if (e.hopping > 0) {
        e.hopping--;
        e.px += (e.targetPx - e.px) * 0.2;
        e.py += (e.targetPy - e.py) * 0.2;
        if (e.hopping === 0) {
          e.px = e.targetPx;
          e.py = e.targetPy;

          // Check if fell off bottom
          if (e.row >= ROWS) {
            if (e.type === "coily") coilyActive = false;
            enemies.splice(i, 1);
            continue;
          }

          // Coily egg transforms at bottom
          if (e.type === "coily_egg" && e.row >= ROWS - 1) {
            e.type = "coily";
            e.state = "chasing";
          }
        }
        continue;
      }

      // Decide next hop
      if (e.type === "ball" || e.type === "coily_egg") {
        // Bounce down randomly
        const goRight = rnd(1) < 0.5;
        const newRow = e.row + 1;
        const newCol = goRight ? e.col + 1 : e.col;

        if (newRow >= ROWS) {
          // Falls off bottom
          enemies.splice(i, 1);
          continue;
        }

        e.row = newRow;
        e.col = newCol;
        if (isValidCube(e.row, e.col)) {
          const p = cubePos(e.row, e.col);
          e.targetPx = p.x;
          e.targetPy = p.y;
        } else {
          // Falls off side
          e.targetPx = e.px + (goRight ? CUBE_W : -CUBE_W);
          e.targetPy = e.py + CUBE_H / 2 + CUBE_DEPTH;
          e.row = ROWS; // mark for removal
        }
        e.hopping = ENEMY_HOP_FRAMES;
      } else if (e.type === "coily") {
        // Chase Q*bert
        let dr = 0, dc = 0;
        if (pRow > e.row) {
          // Need to go down
          dr = 1;
          dc = pCol > e.col ? 1 : 0;
        } else if (pRow < e.row) {
          // Need to go up
          dr = -1;
          dc = pCol < e.col ? -1 : 0;
        } else {
          // Same row
          if (pCol > e.col) { dr = 1; dc = 1; }
          else if (pCol < e.col) { dr = -1; dc = -1; }
        }

        const newRow = e.row + dr;
        const newCol = e.col + dc;
        if (isValidCube(newRow, newCol)) {
          e.row = newRow;
          e.col = newCol;
          const p = cubePos(e.row, e.col);
          e.targetPx = p.x;
          e.targetPy = p.y;
        } else {
          // Coily falls off! (lured by disc)
          e.targetPx = e.px + dc * CUBE_W;
          e.targetPy = e.py + 60;
          e.row = ROWS;
          coilyActive = false;
          score += 500;
          note(0, "G5", 0.1);
        }
        e.hopping = _max(6, ENEMY_HOP_FRAMES - level);
      }
    }

    // --- Collision: enemies vs player ---
    if (!pDead && invulnTimer === 0 && pHopping === 0 && pFalling === 0) {
      for (const e of enemies) {
        if (e.row === pRow && e.col === pCol && e.hopping <= 2) {
          killPlayer();
          break;
        }
      }
    }
  };

  // --- Draw ---
  API._draw = function() {
    cls(0);

    if (state === "title") {
      // Title screen
      text("Q*BERT", W / 2 - 18, 60, 3);
      text("GRAYBOX EDITION", W / 2 - 40, 76, 2);

      // Draw a small demo pyramid
      for (let r = 0; r < 4; r++) {
        for (let c = 0; c <= r; c++) {
          const p = cubePos(r, c);
          const ox = 0, oy = 80;
          drawCube(p.x + ox, p.y + oy,
            (r + c) % 2 === 0 ? 2 : 3,
            1, 1);
        }
      }

      if (titleBlink) {
        text("PRESS ENTER TO START", W / 2 - 52, 250, 3);
      }

      text("ARROWS TO HOP", W / 2 - 36, 275, 1);
      text("CHANGE ALL CUBES TO WIN", W / 2 - 58, 290, 1);
      return;
    }

    if (state === "gameover") {
      text("GAME OVER", W / 2 - 24, 120, 3);
      text("SCORE " + score, W / 2 - 22, 145, 2);
      if (titleBlink) {
        text("PRESS ENTER", W / 2 - 30, 180, 3);
      }
      return;
    }

    // --- Play state ---
    // HUD
    text("SCORE " + score, 8, 4, 3);
    text("LEVEL " + level, W - 60, 4, 2);
    // Lives
    for (let i = 0; i < lives; i++) {
      spr(1, 8 + i * 10, 14);
    }

    // Target indicator
    text("TARGET:", W - 80, 14, 1);
    rectf(W - 28, 14, 8, 6, targetColor);

    // Draw discs
    for (const disc of discs) {
      if (!disc.active) continue;
      const dp = getDiscPos(disc);
      if (API.frame % 8 < 4) {
        spr(8, dp.x - 4, dp.y - 4);
      } else {
        spr(8, dp.x - 4, dp.y - 4, true);
      }
    }

    // Draw pyramid (back to front)
    for (let r = 0; r < ROWS; r++) {
      for (let c = 0; c <= r; c++) {
        const p = cubePos(r, c);
        let topC = cubeColors[r][c];
        let leftC = topC > 0 ? topC - 1 : 0;
        let rightC = topC > 0 ? topC - 1 : 0;
        // Left face slightly darker, right face medium
        if (topC === 1) { leftC = 0; rightC = 0; }
        else if (topC === 2) { leftC = 1; rightC = 1; }
        else if (topC === 3) { leftC = 2; rightC = 1; }

        // Level clear flash
        if (levelClearTimer > 0 && flashTimer % 8 < 4) {
          topC = 3; leftC = 2; rightC = 1;
        }

        drawCube(p.x, p.y, topC, leftC, rightC);
      }
    }

    // Draw enemies
    for (const e of enemies) {
      let ex = e.px - 4;
      let ey = e.py - CUBE_H / 2 - 6;
      // Hop arc
      if (e.hopping > 0) {
        const t = e.hopping / ENEMY_HOP_FRAMES;
        ey -= sin(t * 3.14159) * 10;
      }

      if (e.type === "ball" || e.type === "coily_egg") {
        spr(e.type === "ball" ? 7 : 5, ex, ey);
      } else if (e.type === "coily") {
        spr(6, ex, ey);
      }
    }

    // Draw player
    if (!pDead) {
      let px = pPx - 4;
      let py = pPy - CUBE_H / 2 - 6;

      // Hop arc
      if (pHopping > 0 && pFalling === 0 && pOnDisc === 0) {
        const t = pHopping / HOP_FRAMES;
        py -= sin(t * 3.14159) * 12;
      }

      // Blink during invulnerability
      if (invulnTimer > 0 && API.frame % 4 < 2) {
        // Don't draw (blink)
      } else {
        // Choose sprite based on direction
        let sprId = 1;
        if (pDir === 0) sprId = 1;       // down-right
        else if (pDir === 1) sprId = 2;   // down-left
        else if (pDir === 2) sprId = 3;   // up-right (reuse up sprite flipped)
        else if (pDir === 3) sprId = 4;   // up-left
        spr(sprId, px, py);
      }

      // Speech bubble when falling
      if (speechTimer > 0) {
        spr(9, px - 2, py - 10);
        speechTimer--;
      }
    }

    // Level clear message
    if (levelClearTimer > 0) {
      rectf(W / 2 - 50, H / 2 - 12, 100, 20, 0);
      text("LEVEL CLEAR!", W / 2 - 32, H / 2 - 8, 3);
    }
  };

  // --- Init & Loop ---
  API._init = function() {
    state = "title";
    titleBlink = true;
  };

  API._init();
  setInterval(tick, 1000 / FPS);
})();
</script>
