<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GrayBox — Demo: Donkey Kong</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #0a0a0a;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100vh;
    font-family: monospace;
    overflow: hidden;
  }
  #frame {
    background: #111;
    border: 3px solid #333;
    border-radius: 8px;
    padding: 12px;
    box-shadow: 0 0 40px rgba(0,0,0,0.8), inset 0 0 20px rgba(0,0,0,0.5);
  }
  canvas {
    display: block;
    image-rendering: pixelated;
    image-rendering: crisp-edges;
  }
  #controls {
    margin-top: 12px;
    color: #6b6b6b;
    font-size: 11px;
    text-align: center;
    letter-spacing: 1px;
  }
  #controls span { color: #b0b0b0; }
</style>
</head>
<body>
<div id="frame">
  <canvas id="screen"></canvas>
</div>
<div id="controls">
  <span>&larr;&rarr;</span> MOVE &nbsp;&nbsp; <span>&uarr;&darr;</span> CLIMB &nbsp;&nbsp; <span>Z</span> JUMP &nbsp;&nbsp; <span>ENTER</span> START
</div>
<script>
(() => {
  "use strict";

  // ============================================================
  // GrayBox Runtime (inline)
  // ============================================================
  const W = 480;
  const H = 320;
  const SCALE = 2;
  const FPS = 30;
  const COLORS = ["#1a1a1a", "#6b6b6b", "#b0b0b0", "#e8e8e8"];
  const canvas = document.getElementById("screen");
  canvas.width = W;
  canvas.height = H;
  canvas.style.width = (W * SCALE) + "px";
  canvas.style.height = (H * SCALE) + "px";
  const ctx = canvas.getContext("2d");
  ctx.imageSmoothingEnabled = false;
  const buf = ctx.createImageData(W, H);
  const buf32 = new Uint32Array(buf.data.buffer);

  function hexToABGR(hex) {
    const r = parseInt(hex.slice(1, 3), 16);
    const g = parseInt(hex.slice(3, 5), 16);
    const b = parseInt(hex.slice(5, 7), 16);
    return (255 << 24) | (b << 16) | (g << 8) | r;
  }
  const COLOR_U32 = COLORS.map(hexToABGR);

  const sprites = {};
  const tilemap = {};

  const keyMap = {
    "ArrowUp": "up", "ArrowDown": "down", "ArrowLeft": "left", "ArrowRight": "right",
    "w": "up", "s": "down", "a": "left", "d": "right",
    "z": "a", "Z": "a", "x": "b", "X": "b",
    "Enter": "start", " ": "a"
  };
  const keys = {};
  const keysPrev = {};

  document.addEventListener("keydown", e => {
    const k = keyMap[e.key];
    if (k) { keys[k] = true; e.preventDefault(); }
  });
  document.addEventListener("keyup", e => {
    const k = keyMap[e.key];
    if (k) { keys[k] = false; e.preventDefault(); }
  });

  let audioCtx = null;
  const channels = [null, null];
  const channelGains = [null, null];
  function ensureAudio() {
    if (!audioCtx) {
      audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      for (let i = 0; i < 2; i++) {
        channelGains[i] = audioCtx.createGain();
        channelGains[i].gain.value = 0.15;
        channelGains[i].connect(audioCtx.destination);
      }
    }
  }

  const NOTE_NAMES = ["C","C#","D","D#","E","F","F#","G","G#","A","A#","B"];
  function noteToFreq(noteStr) {
    const match = noteStr.match(/^([A-G]#?)(\d)$/);
    if (!match) return 440;
    const name = match[1];
    const octave = parseInt(match[2]);
    const semitone = NOTE_NAMES.indexOf(name);
    if (semitone === -1) return 440;
    const midi = (octave + 1) * 12 + semitone;
    return 440 * Math.pow(2, (midi - 69) / 12);
  }

  const FONT_W = 4;
  const FONT_H = 7;
  const FONT = {};
  const fontData = {
    "A":"0110100110011111100110011001","B":"1110100110101110100110011110",
    "C":"0110100110001000100001100110","D":"1100101010011001100110101100",
    "E":"1111100010001110100010001111","F":"1111100010001110100010001000",
    "G":"0111100010001011100101100111","H":"1001100110011111100110011001",
    "I":"1110010001000100010001001110","J":"0111001000100010001010100100",
    "K":"1001101011001100101010011001","L":"1000100010001000100010001111",
    "M":"1001111111011001100110011001","N":"1001110111011001100110011001",
    "O":"0110100110011001100110010110","P":"1110100110011110100010001000",
    "Q":"0110100110011001101101100001","R":"1110100110011110101010011001",
    "S":"0111100010000110000110001110","T":"1111001000100010001000100010",
    "U":"1001100110011001100110010110","V":"1001100110011001100101100110",
    "W":"1001100110011001101111011001","X":"1001100101100110011010011001",
    "Y":"1001100101100010001000100010","Z":"1111000100100100100010001111",
    "0":"0110100111011011101110010110","1":"0100110001000100010001001110",
    "2":"0110100100010010010010001111","3":"1110000100010110000110011110",
    "4":"1001100110011111000100010001","5":"1111100010001110000100011110",
    "6":"0110100010001110100110010110","7":"1111000100010010010001001000",
    "8":"0110100110010110100110010110","9":"0110100110010111000100010110",
    " ":"0000000000000000000000000000",
    ".":"0000000000000000000001000100",
    ",":"0000000000000000001000101000",
    "!":"0100010001000100000000000100",
    "?":"0110100100010010000000000010",
    "-":"0000000000001110000000000000",
    "+":"0000001001001110010000100000",
    ":":"0000010001000000010001000000",
    "/":"0001000100100010010010001000",
    "*":"0000101001001110010010100000",
    "#":"0101111101011111010100000000",
    "(":"0010010010001000010001000010",
    ")":"0100001000010001000100100100",
    "=":"0000000011110000111100000000",
    "'":"0100010010000000000000000000",
    "\"":"1010101000000000000000000000",
    "<":"0010010010001000010000100010",
    ">":"1000010000100001001001001000",
    "_":"0000000000000000000000001111",
  };
  for (const [ch, bits] of Object.entries(fontData)) {
    FONT[ch] = [];
    for (let i = 0; i < bits.length; i++) FONT[ch].push(parseInt(bits[i]));
  }

  const API = {};
  API._init = null;
  API._update = null;
  API._draw = null;
  API.frame = 0;

  API.cls = function(c = 0) { buf32.fill(COLOR_U32[c] || COLOR_U32[0]); };
  API.pix = function(x, y, c) {
    x = Math.floor(x); y = Math.floor(y);
    if (x < 0 || x >= W || y < 0 || y >= H) return;
    buf32[y * W + x] = COLOR_U32[c] || COLOR_U32[0];
  };
  API.line = function(x0, y0, x1, y1, c) {
    x0=Math.floor(x0); y0=Math.floor(y0); x1=Math.floor(x1); y1=Math.floor(y1);
    const dx=Math.abs(x1-x0), dy=Math.abs(y1-y0);
    const sx=x0<x1?1:-1, sy=y0<y1?1:-1;
    let err=dx-dy;
    while(true) {
      API.pix(x0,y0,c);
      if(x0===x1&&y0===y1) break;
      const e2=2*err;
      if(e2>-dy){err-=dy;x0+=sx;}
      if(e2<dx){err+=dx;y0+=sy;}
    }
  };
  API.rect = function(x,y,w,h,c) {
    API.line(x,y,x+w-1,y,c); API.line(x+w-1,y,x+w-1,y+h-1,c);
    API.line(x+w-1,y+h-1,x,y+h-1,c); API.line(x,y+h-1,x,y,c);
  };
  API.rectf = function(x,y,w,h,c) {
    x=Math.floor(x); y=Math.floor(y);
    const col=COLOR_U32[c]||COLOR_U32[0];
    for(let py=Math.max(0,y);py<Math.min(H,y+h);py++)
      for(let px=Math.max(0,x);px<Math.min(W,x+w);px++)
        buf32[py*W+px]=col;
  };
  API.circ = function(cx,cy,r,c) {
    let x=r,y=0,d=1-r; cx=Math.floor(cx); cy=Math.floor(cy);
    while(x>=y){
      API.pix(cx+x,cy+y,c);API.pix(cx-x,cy+y,c);
      API.pix(cx+x,cy-y,c);API.pix(cx-x,cy-y,c);
      API.pix(cx+y,cy+x,c);API.pix(cx-y,cy+x,c);
      API.pix(cx+y,cy-x,c);API.pix(cx-y,cy-x,c);
      y++; if(d<0){d+=2*y+1;}else{x--;d+=2*(y-x)+1;}
    }
  };
  API.circf = function(cx,cy,r,c) {
    cx=Math.floor(cx); cy=Math.floor(cy);
    const col=COLOR_U32[c]||COLOR_U32[0]; const r2=r*r;
    for(let py=-r;py<=r;py++) for(let px=-r;px<=r;px++)
      if(px*px+py*py<=r2){ const sx=cx+px,sy=cy+py;
        if(sx>=0&&sx<W&&sy>=0&&sy<H) buf32[sy*W+sx]=col; }
  };
  API.sprite = function(id, data) {
    const arr = new Uint8Array(64); let i = 0;
    for (const ch of data) { if (ch>='0'&&ch<='3') { arr[i++]=parseInt(ch); if(i>=64) break; } }
    sprites[id] = arr;
  };
  API.spr = function(id, x, y, flipX, flipY) {
    const s=sprites[id]; if(!s) return;
    x=Math.floor(x); y=Math.floor(y);
    for(let py=0;py<8;py++) for(let px=0;px<8;px++){
      const sx=flipX?7-px:px, sy=flipY?7-py:py;
      const c=s[sy*8+sx], dx=x+px, dy=y+py;
      if(dx>=0&&dx<W&&dy>=0&&dy<H) buf32[dy*W+dx]=COLOR_U32[c];
    }
  };
  API.text = function(str, x, y, c) {
    str=String(str).toUpperCase(); let cx=Math.floor(x); const cy=Math.floor(y);
    const col=COLOR_U32[c]||COLOR_U32[3];
    for(const ch of str){
      const glyph=FONT[ch];
      if(glyph) for(let py=0;py<FONT_H;py++) for(let px=0;px<FONT_W;px++)
        if(glyph[py*FONT_W+px]){ const dx=cx+px,dy=cy+py;
          if(dx>=0&&dx<W&&dy>=0&&dy<H) buf32[dy*W+dx]=col; }
      cx+=FONT_W+1;
    }
  };
  API.mget = function(cx,cy) { return tilemap[cx+","+cy]||0; };
  API.mset = function(cx,cy,id) { tilemap[cx+","+cy]=id; };
  API.map = function(mx,my,mw,mh,sx,sy) {
    for(let ty=0;ty<mh;ty++) for(let tx=0;tx<mw;tx++){
      const id=API.mget(mx+tx,my+ty); if(id>0) API.spr(id,sx+tx*8,sy+ty*8); }
  };
  API.btn = function(k) { return !!keys[k]; };
  API.btnp = function(k) { return !!keys[k] && !keysPrev[k]; };
  API.note = function(ch, noteStr, dur) {
    ensureAudio(); if(ch<0||ch>1) return; API.stop(ch);
    const osc=audioCtx.createOscillator(); osc.type="square";
    osc.frequency.value=noteToFreq(noteStr);
    osc.connect(channelGains[ch]); osc.start();
    osc.stop(audioCtx.currentTime+dur); channels[ch]=osc;
  };
  API.stop = function(ch) {
    if(ch===undefined){API.stop(0);API.stop(1);return;}
    if(channels[ch]){try{channels[ch].stop();}catch(e){} channels[ch]=null;}
  };
  API.rnd = function(max) { return Math.random()*max; };
  API.flr = Math.floor;
  API.abs = Math.abs;
  API.min = Math.min;
  API.max = Math.max;
  API.sin = Math.sin;
  API.cos = Math.cos;

  function tick() {
    if (API._update) API._update();
    if (API._draw) API._draw();
    ctx.putImageData(buf, 0, 0);
    for (const k in keys) keysPrev[k] = keys[k];
    API.frame++;
  }

  // ============================================================
  // Donkey Kong Game
  // ============================================================
  const { cls, pix, line, rect, rectf, circ, circf, sprite: defSprite,
          spr, text, btn, btnp, note, stop, rnd, flr, abs: _abs,
          min, max: _max, sin, cos } = API;

  // --- Sprites ---

  // 1: Mario standing right
  defSprite(1,

      { x1: 20, y: 96, x2: 420, slope: 8 },
      { x1: 80, y: 52, x2: 260, slope: 0 },
    ],
    ladders: [
      { x: 440, y1: 240, y2: 288 },
      { x: 200, y1: 240, y2: 288 },
      { x: 80, y1: 192, y2: 240 },
      { x: 360, y1: 192, y2: 240 },
      { x: 440, y1: 144, y2: 192 },
      { x: 160, y1: 144, y2: 192 },
      { x: 80, y1: 96, y2: 144 },
      { x: 300, y1: 96, y2: 144 },
      { x: 180, y1: 52, y2: 96 },
    ],
    brokenLadders: [
      { x: 300, y1: 228, y2: 248 },
      { x: 240, y1: 84, y2: 100 },
    ],
    dk: { x: 96, y: 20 },
    pauline: { x: 176, y: 20 },
    playerStart: { x: 40, y: 280 },
    hammers: [
      { x: 380, y: 130 },
    ],
    items: [
      { x: 260, y: 130, spr: 38 },

  // Level 4: Final level - tight and fast
  LEVELS[3] = {
    name: "100M",
    girders: [
      { x1: 0, y: 288, x2: 480, slope: 0 },
      { x1: 100, y: 240, x2: 460, slope: -10 },
      { x1: 20, y: 196, x2: 380, slope: 8 },
      { x1: 100, y: 148, x2: 460, slope: -10 },
      { x1: 20, y: 104, x2: 380, slope: 8 },
      { x1: 60, y: 56, x2: 300, slope: 0 },
    ],
    ladders: [
      { x: 440, y1: 240, y2: 288 },
      { x: 120, y1: 240, y2: 288 },
      { x: 280, y1: 240, y2: 288 },
      { x: 60, y1: 196, y2: 240 },
      { x: 360, y1: 196, y2: 240 },
      { x: 440, y1: 148, y2: 196 },
      { x: 200, y1: 148, y2: 196 },
      { x: 60, y1: 104, y2: 148 },
      { x: 320, y1: 104, y2: 148 },
      { x: 180, y1: 56, y2: 104 },
    ],
    brokenLadders: [],
    dk: { x: 80, y: 24 },
    pauline: { x: 178, y: 24 },
    playerStart: { x: 40, y: 280 },
    hammers: [
      { x: 420, y: 226 },
      { x: 40, y: 90 },
    ],
    items: [
      { x: 340, y: 134, spr: 39 },
      { x: 140, y: 228, spr: 38 },
    ],
    oilDrum: { x: 16, y: 280 },

  };

  // --- Game State ---
  let state = "title";
  let player, barrels, fires, explosions, particles;
  let score, lives, level, levelData;
  let dkAnimT, dkThrowT, dkFrame;
  let hammerActive, hammerTimer, hammerPickups, hammerSwing;
  let bonusTimer, bonusScore;
  let itemsCollected;
  let paulineFrame, paulineTimer;
  let invincibleTimer;
  let levelComplete, levelCompleteTimer;
  let walkFrame, walkTimer;
  let highScore = 0;

  function getGirderY(girder, x) {
    // Returns the Y position of a girder at a given X
    if (x < girder.x1 || x > girder.x2) return -999;
    const t = (x - girder.x1) / (girder.x2 - girder.x1);
    return girder.y + t * girder.slope;
  }

  function isOnGirder(x, y, tolerance) {
    tolerance = tolerance || 4;
    for (const g of levelData.girders) {
      const gy = getGirderY(g, x);
      if (gy > -900 && _abs(y - gy) < tolerance && x >= g.x1 && x <= g.x2) {
        return gy;
      }
    }
    return false;
  }

  function isOnLadder(x, y) {
    const allLadders = levelData.ladders.concat(levelData.brokenLadders || []);
    for (const l of allLadders) {
      if (_abs(x - l.x) < 6 && y >= l.y1 - 4 && y <= l.y2 + 4) {
        return l;
      }
    }
    return null;
  }

  function isNearLadderTop(x, y) {
    const allLadders = levelData.ladders.concat(levelData.brokenLadders || []);
    for (const l of allLadders) {
      if (_abs(x - l.x) < 6 && _abs(y - l.y1) < 6) {
        return l;
      }
    }
    return null;
  }

  function isNearLadderBottom(x, y) {
    const allLadders = levelData.ladders.concat(levelData.brokenLadders || []);
    for (const l of allLadders) {
      if (_abs(x - l.x) < 6 && _abs(y - l.y2) < 8) {
        return l;
      }
    }
    return null;
  }

  function resetGame() {
    score = 0;
    lives = 3;
    level = 0;
    loadLevel();
  }

  function loadLevel() {
    levelData = LEVELS[level % LEVELS.length];
    player = {
      x: levelData.playerStart.x,
      y: levelData.playerStart.y,
      vx: 0, vy: 0,
      onGround: true,
      climbing: false,
      jumping: false,
      facing: 1, // 1=right, -1=left
      speed: 1.8,
    };
    barrels = [];
    fires = [];
    explosions = [];
    particles = [];
    dkAnimT = 0;
    dkThrowT = 0;
    dkFrame = 0;
    hammerActive = false;
    hammerTimer = 0;
    hammerSwing = 0;
    hammerPickups = [];
    if (levelData.hammers) {
      for (const h of levelData.hammers) {
        hammerPickups.push({ x: h.x, y: h.y, active: true });
      }
    }
    itemsCollected = [];
    if (levelData.items) {
      for (const it of levelData.items) {
        itemsCollected.push({ x: it.x, y: it.y, spr: it.spr, collected: false });
      }
    }
    bonusTimer = 5000;
    bonusScore = 5000;
    paulineFrame = 0;
    paulineTimer = 0;
    invincibleTimer = 0;
    levelComplete = false;
    levelCompleteTimer = 0;
    walkFrame = 0;
    walkTimer = 0;

    // Add initial fire enemy at oil drum
    if (levelData.oilDrum) {
      fires.push({
        x: levelData.oilDrum.x,
        y: levelData.oilDrum.y - 8,
        vx: 0.5,
        onGround: true,
        climbing: false,
        moveTimer: 0,
        climbChance: 0,
      });
    }
  }

  function spawnBarrel() {
    if (!levelData.barrelSpawn) return;
    const dk = levelData.dk;
    barrels.push({
      x: dk.x + 16,
      y: dk.y + 24,
      vx: 1.5 + level * 0.2,
      vy: 0,
      onGround: false,
      rolling: true,
      frame: 0,
      frameTimer: 0,
      goingDown: false,
    });
  }

  function addExplosion(x, y) {
    for (let i = 0; i < 6; i++) {
      particles.push({
        x: x + 4, y: y + 4,
        vx: rnd(4) - 2, vy: rnd(3) - 2,
        life: 8 + flr(rnd(8)),
        color: flr(rnd(3)) + 1
      });
    }
  }

  // Sounds
  function jumpSound() { note(0, "E5", 0.06); setTimeout(() => note(0, "G5", 0.04), 50); }
  function barrelJumpSound() { note(0, "C6", 0.04); setTimeout(() => note(0, "E6", 0.06), 40); }
  function hammerSound() { note(1, "C4", 0.04); }
  function smashSound() { note(1, "C3", 0.08); setTimeout(() => note(1, "E3", 0.06), 40); }
  function deathSound() {
    note(0, "G3", 0.12); note(1, "C3", 0.12);
    setTimeout(() => { note(0, "E3", 0.15); note(1, "A2", 0.15); }, 120);
    setTimeout(() => { note(0, "C3", 0.2); }, 250);
  }
  function collectSound() { note(0, "E5", 0.05); setTimeout(() => note(0, "A5", 0.08), 50); }
  function levelClearSound() {
    note(0, "C5", 0.1);
    setTimeout(() => note(0, "E5", 0.1), 100);
    setTimeout(() => note(0, "G5", 0.1), 200);
    setTimeout(() => note(0, "C6", 0.2), 300);
  }
  function walkSound() { note(1, "A2", 0.02); }
  function climbSound() { note(1, "D3", 0.02); }

  resetGame();

  // ============================================================
  // Update
  // ============================================================
  API._update = function() {
    if (state === "title") {
      if (btnp("a") || btnp("start")) {
        state = "play";
        resetGame();
        note(0, "C5", 0.1);
        setTimeout(() => note(0, "E5", 0.1), 100);
        setTimeout(() => note(0, "G5", 0.15), 200);
      }
      return;
    }

    if (state === "gameover") {
      for (let i = particles.length - 1; i >= 0; i--) {
        const p = particles[i]; p.x += p.vx; p.y += p.vy; p.vy += 0.08; p.life--;
        if (p.life <= 0) particles.splice(i, 1);
      }
      if (btnp("a") || btnp("start")) state = "title";
      return;
    }

    if (state !== "play") return;

    // Level complete sequence
    if (levelComplete) {
      levelCompleteTimer++;
      if (levelCompleteTimer > 90) {
        level++;
        loadLevel();
        levelComplete = false;
        levelCompleteTimer = 0;
      }
      return;
    }

    // Bonus countdown
    bonusTimer -= 2;
    if (bonusTimer < 0) bonusTimer = 0;
    bonusScore = flr(bonusTimer / 100) * 100;

    // Pauline animation
    paulineTimer++;
    if (paulineTimer > 30) { paulineTimer = 0; paulineFrame = 1 - paulineFrame; }

    // DK animation
    dkAnimT++;
    dkThrowT++;
    if (dkThrowT > (90 - level * 10)) {
      dkThrowT = 0;
      dkFrame = 1; // throwing
      spawnBarrel();
      note(0, "C3", 0.06);
    }
    if (dkFrame === 1 && dkThrowT > 15) dkFrame = 0;

    // Invincibility timer
    if (invincibleTimer > 0) invincibleTimer--;

    // --- Player Movement ---
    const p = player;
    const wasClimbing = p.climbing;

    if (!p.climbing) {
      // Horizontal movement
      if (btn("left")) {
        p.vx = -p.speed;
        p.facing = -1;
        walkTimer++;
        if (walkTimer > 6 && p.onGround) { walkTimer = 0; walkFrame = 1 - walkFrame; walkSound(); }
      } else if (btn("right")) {
        p.vx = p.speed;
        p.facing = 1;
        walkTimer++;
        if (walkTimer > 6 && p.onGround) { walkTimer = 0; walkFrame = 1 - walkFrame; walkSound(); }
      } else {
        p.vx = 0;
        walkFrame = 0;
      }

      // Jump
      if (btnp("a") && p.onGround && !p.jumping) {
        p.vy = -4.5;
        p.onGround = false;
        p.jumping = true;
        jumpSound();
      }

      // Start climbing (press up near ladder bottom or on ladder)
      if (btn("up")) {
        const ladder = isOnLadder(p.x + 4, p.y + 4);
        if (ladder && p.onGround) {
          p.climbing = true;
          p.x = ladder.x - 4;
          p.vx = 0;
          p.vy = 0;
        }
      }
      // Climb down
      if (btn("down") && p.onGround) {
        const ladderBelow = isNearLadderTop(p.x + 4, p.y + 8);
        if (ladderBelow) {
          p.climbing = true;
          p.x = ladderBelow.x - 4;
          p.y += 4;
          p.vx = 0;
          p.vy = 0;
          p.onGround = false;
        }
      }
    }

    if (p.climbing) {
      p.vx = 0;
      const ladder = isOnLadder(p.x + 4, p.y + 4);

      if (btn("up")) {
        p.vy = -1.5;
        walkTimer++;
        if (walkTimer > 5) { walkTimer = 0; walkFrame = 1 - walkFrame; climbSound(); }
      } else if (btn("down")) {
        p.vy = 1.5;
        walkTimer++;
        if (walkTimer > 5) { walkTimer = 0; walkFrame = 1 - walkFrame; climbSound(); }
      } else {
        p.vy = 0;
      }

      // Check if we've reached top or bottom of ladder
      if (!ladder) {
        p.climbing = false;
        p.vy = 0;
        // Snap to girder
        const gy = isOnGirder(p.x + 4, p.y + 8, 12);
        if (gy !== false) {
          p.y = gy - 8;
          p.onGround = true;
        }
      }

      // Jump off ladder
      if (btnp("a")) {
        p.climbing = false;
        p.vy = -3;
        p.onGround = false;
        p.jumping = true;
        jumpSound();
      }
    }

    // Apply gravity if not climbing
    if (!p.climbing) {
      p.vy += 0.25;
      if (p.vy > 5) p.vy = 5;
    }

    // Move player
    p.x += p.vx;
    p.y += p.vy;

    // Clamp to screen
    if (p.x < 0) p.x = 0;
    if (p.x > W - 8) p.x = W - 8;

    // Ground collision (girders)
    if (!p.climbing && p.vy >= 0) {
      const gy = isOnGirder(p.x + 4, p.y + 8, 5);
      if (gy !== false) {
        p.y = gy - 8;
        p.onGround = true;
        p.jumping = false;
        p.vy = 0;
      } else {
        p.onGround = false;
      }
    }

    // Fall off bottom
    if (p.y > H + 16) {
      killPlayer();
      return;
    }

    // Hammer pickup
    for (const h of hammerPickups) {
      if (h.active && _abs(p.x - h.x) < 10 && _abs(p.y - h.y) < 10) {
        h.active = false;
        hammerActive = true;
        hammerTimer = 300; // 10 seconds at 30fps
        hammerSwing = 0;
        hammerSound();
      }
    }

    // Hammer timer
    if (hammerActive) {
      hammerTimer--;
      hammerSwing++;
      if (hammerTimer <= 0) {
        hammerActive = false;
      }
    }

    // Item collection
    for (const it of itemsCollected) {
      if (!it.collected && _abs(p.x - it.x) < 10 && _abs(p.y - it.y) < 10) {
        it.collected = true;
        score += 300;
        collectSound();
        addExplosion(it.x, it.y);
      }
    }

    // Check if player reached Pauline
    const paulX = levelData.pauline.x;
    const paulY = levelData.pauline.y;
    if (_abs(p.x - paulX) < 16 && _abs(p.y - paulY) < 16) {
      levelComplete = true;
      levelCompleteTimer = 0;
      score += bonusScore;
      levelClearSound();
    }

    // --- Barrel update ---
    for (let i = barrels.length - 1; i >= 0; i--) {
      const b = barrels[i];

      b.frameTimer++;
      if (b.frameTimer > 4) { b.frameTimer = 0; b.frame = 1 - b.frame; }

      // Check if barrel is near a ladder going down
      if (b.onGround && !b.goingDown) {
        const ladderBelow = isNearLadderTop(b.x + 4, b.y + 4);
        if (ladderBelow && rnd(1) < 0.3) {
          b.goingDown = true;
          b.x = ladderBelow.x - 4;
          b.vx = 0;
          b.vy = 2;
        }
      }

      if (b.goingDown) {
        b.y += b.vy;
        // Check if reached bottom of ladder / girder below
        const gy = isOnGirder(b.x + 4, b.y + 12, 4);
        if (gy !== false && b.y + 8 >= gy) {
          b.y = gy - 8;
          b.goingDown = false;
          b.onGround = true;
          // Determine direction based on girder slope
          const gy1 = isOnGirder(b.x + 20, b.y + 8, 8);
          const gy2 = isOnGirder(b.x - 12, b.y + 8, 8);
          if (gy1 !== false && gy1 > gy) b.vx = 1.5 + level * 0.2;
          else if (gy2 !== false && gy2 > gy) b.vx = -(1.5 + level * 0.2);
          else b.vx = (rnd(1) > 0.5 ? 1 : -1) * (1.5 + level * 0.2);
        }
      } else {
        // Roll along girder
        b.x += b.vx;
        b.vy += 0.2;
        if (b.vy > 4) b.vy = 4;
        b.y += b.vy;

        // Girder collision
        const gy = isOnGirder(b.x + 4, b.y + 8, 5);
        if (gy !== false) {
          b.y = gy - 8;
          b.onGround = true;
          b.vy = 0;
          // Follow slope
          const gyAhead = isOnGirder(b.x + 4 + (b.vx > 0 ? 8 : -8), b.y + 12, 8);
          if (gyAhead !== false) {
            b.y = gyAhead - 12;
          }
        } else {
          b.onGround = false;
        }
      }

      // Remove if off screen
      if (b.x < -16 || b.x > W + 16 || b.y > H + 16) {
        barrels.splice(i, 1);
        continue;
      }

      // Barrel-player collision
      if (invincibleTimer <= 0) {
        if (_abs(p.x - b.x) < 7 && _abs(p.y - b.y) < 7) {
          if (hammerActive) {
            // Smash barrel
            barrels.splice(i, 1);
            score += 300;
            addExplosion(b.x, b.y);
            smashSound();
            continue;
          } else {
            killPlayer();
            return;
          }
        }
      }

      // Score for jumping over barrel
      if (p.jumping && !p.climbing && p.vy < 0 &&
          _abs(p.x - b.x) < 16 && p.y < b.y && p.y > b.y - 20 &&
          !b._scored) {
        b._scored = true;
        score += 100;
        barrelJumpSound();
        // Show score popup
        particles.push({
          x: p.x, y: p.y - 8,
          vx: 0, vy: -0.5,
          life: 30,
          color: 3,
          text: "100"
        });
      }
    }

    // --- Fire enemies ---
    for (let i = fires.length - 1; i >= 0; i--) {
      const f = fires[i];

      f.moveTimer++;

      if (!f.climbing) {
        f.x += f.vx;

        // Gravity
        f.vy = (f.vy || 0) + 0.2;
        if (f.vy > 3) f.vy = 3;
        f.y += f.vy;

        // Girder collision
        const gy = isOnGirder(f.x + 4, f.y + 8, 5);
        if (gy !== false) {
          f.y = gy - 8;
          f.onGround = true;
          f.vy = 0;
        }

        // Reverse at edges
        if (f.x < 10 || f.x > W - 18) f.vx = -f.vx;

        // Random direction change
        if (f.moveTimer > 60 + flr(rnd(60))) {
          f.moveTimer = 0;
          if (rnd(1) < 0.3) f.vx = -f.vx;
        }

        // Try to climb a ladder (toward player)
        if (f.onGround && rnd(1) < 0.02) {
          const ladder = isOnLadder(f.x + 4, f.y + 4);
          if (ladder) {
            const goUp = p.y < f.y;
            if (goUp && f.y > ladder.y1 + 8) {
              f.climbing = true;
              f.x = ladder.x - 4;
              f.climbDir = -1;
            } else if (!goUp && f.y < ladder.y2 - 8) {
              f.climbing = true;
              f.x = ladder.x - 4;
              f.climbDir = 1;
            }
          }
        }
      } else {
        f.y += f.climbDir * 1;
        const ladder = isOnLadder(f.x + 4, f.y + 4);
        if (!ladder) {
          f.climbing = false;
          f.vx = (p.x > f.x) ? 0.5 : -0.5;
        }
      }

      // Fire-player collision
      if (invincibleTimer <= 0) {
        if (_abs(p.x - f.x) < 7 && _abs(p.y - f.y) < 7) {
          if (hammerActive) {
            fires.splice(i, 1);
            score += 500;
            addExplosion(f.x, f.y);
            smashSound();
          } else {
            killPlayer();
            return;
          }
        }
      }
    }

    // Spawn fires occasionally from oil drum
    if (levelData.oilDrum && fires.length < 3 + level && rnd(1) < 0.003) {
      fires.push({
        x: levelData.oilDrum.x,
        y: levelData.oilDrum.y - 10,
        vx: (rnd(1) > 0.5 ? 1 : -1) * 0.5,
        vy: 0,
        onGround: false,
        climbing: false,
        moveTimer: 0,
      });
    }

    // Particles
    for (let i = particles.length - 1; i >= 0; i--) {
      const pt = particles[i];
      pt.x += pt.vx; pt.y += pt.vy;
      if (!pt.text) pt.vy += 0.05;
      pt.life--;
      if (pt.life <= 0) particles.splice(i, 1);
    }
  };

  function killPlayer() {
    lives--;
    addExplosion(player.x, player.y);
    deathSound();
    if (lives <= 0) {
      if (score > highScore) highScore = score;
      state = "gameover";
    } else {
      invincibleTimer = 60;
      player.x = levelData.playerStart.x;
      player.y = levelData.playerStart.y;
      player.vx = 0;
      player.vy = 0;
      player.onGround = true;
      player.climbing = false;
      player.jumping = false;
      hammerActive = false;
    }
  }

  // ============================================================
  // Draw
  // ============================================================
  API._draw = function() {
    cls(0);

    if (state === "title") {
      // Title screen
      const ty = 40 + sin(API.frame * 0.04) * 4;

      // DK sprite at top
      const dkx = W / 2 - 8;
      spr(10, dkx, flr(ty));
      spr(11, dkx + 8, flr(ty));
      spr(12, dkx, flr(ty) + 8);
      spr(13, dkx + 8, flr(ty) + 8);

      text("DONKEY KONG", 185, flr(ty) + 28, 3);
      rectf(175, flr(ty) + 38, 130, 1, 2);

      // Characters display
      const cx = W / 2 - 30;
      spr(1, cx, flr(ty) + 50);
      text("MARIO", cx + 12, flr(ty) + 53, 2);
      spr(25, cx, flr(ty) + 65);
      text("PAULINE", cx + 12, flr(ty) + 68, 2);

      // Barrel
      spr(20, cx, flr(ty) + 82 + sin(API.frame * 0.1) * 2);
      text("BARREL  100 PTS", cx + 12, flr(ty) + 85, 2);

      if (flr(API.frame / 20) % 2 === 0) text("PRESS A TO START", 170, 220, 3);

      // Controls
      text("ARROWS: MOVE/CLIMB", 155, 250, 2);
      text("Z: JUMP", 205, 262, 2);

      if (highScore > 0) {
        text("HIGH SCORE: " + highScore, 170, 285, 2);
      }

      text("GRAYBOX DEMO V0.1", 168, 305, 1);
      return;
    }

    if (state === "gameover") {
      for (const pt of particles) {
        if (pt.text) text(pt.text, flr(pt.x), flr(pt.y), pt.color);
        else pix(flr(pt.x), flr(pt.y), pt.color);
      }

      text("GAME OVER", 195, 110, 3);
      text("SCORE: " + score, 190, 140, 2);
      text("LEVEL: " + levelData.name, 190, 155, 2);
      if (score >= highScore && score > 0) text("NEW HIGH SCORE!", 175, 175, 3);
      if (flr(API.frame / 20) % 2 === 0) text("PRESS A TO CONTINUE", 158, 210, 3);
      return;
    }

    // --- Play state rendering ---

    // Draw girders
    for (const g of levelData.girders) {
      const steps = Math.ceil((g.x2 - g.x1) / 8);
      for (let i = 0; i <= steps; i++) {
        const x = g.x1 + i * 8;
        if (x > g.x2) break;
        const y = flr(getGirderY(g, x));
        // Draw girder tiles
        rectf(x, y, 8, 4, 2);
        // Rivet pattern
        if (i % 2 === 0) {
          pix(x + 1, y + 1, 1);
          pix(x + 5, y + 2, 1);
        } else {
          pix(x + 3, y + 1, 1);
          pix(x + 7, y + 2, 1);
        }
      }
    }

    // Draw ladders
    for (const l of levelData.ladders) {
      const lh = l.y2 - l.y1;
      for (let y = l.y1; y < l.y2; y += 2) {
        pix(l.x, y, 2);
        pix(l.x + 5, y, 2);
      }
      // Rungs
      for (let y = l.y1; y < l.y2; y += 7) {
        for (let x = l.x; x <= l.x + 5; x++) pix(x, y, 2);
      }
    }

    // Draw broken ladders
    if (levelData.brokenLadders) {
      for (const l of levelData.brokenLadders) {
        for (let y = l.y1; y < l.y2; y += 3) {
          pix(l.x, y, 1);
          pix(l.x + 5, y + 1, 1);
        }
        for (let y = l.y1 + 2; y < l.y2; y += 8) {
          for (let x = l.x; x <= l.x + 5; x++) pix(x, y, 1);
        }
      }
    }

    // Draw oil drum
    if (levelData.oilDrum) {
      spr(36, levelData.oilDrum.x, levelData.oilDrum.y);
      // Flames on top
      if (API.frame % 8 < 4) {
        pix(levelData.oilDrum.x + 3, levelData.oilDrum.y - 2, 3);
        pix(levelData.oilDrum.x + 4, levelData.oilDrum.y - 3, 2);
        pix(levelData.oilDrum.x + 5, levelData.oilDrum.y - 1, 3);
      } else {
        pix(levelData.oilDrum.x + 2, levelData.oilDrum.y - 1, 3);
        pix(levelData.oilDrum.x + 4, levelData.oilDrum.y - 2, 2);
        pix(levelData.oilDrum.x + 5, levelData.oilDrum.y - 3, 3);
      }
    }

    // Draw DK
    const dk = levelData.dk;
    if (dkFrame === 1) {
      spr(14, dk.x, dk.y);
    } else {
      spr(10, dk.x, dk.y);
    }
    spr(11, dk.x + 8, dk.y);
    spr(12, dk.x, dk.y + 8);
    spr(13, dk.x + 8, dk.y + 8);

    // Barrel near DK when throwing
    if (dkFrame === 1 && dkThrowT < 8) {
      spr(20, dk.x - 8, dk.y + 8);
    }

    // Draw Pauline
    const pauX = levelData.pauline.x;
    const pauY = levelData.pauline.y;
    if (paulineFrame === 0) spr(25, pauX, pauY);
    else spr(26, pauX, pauY);
    // "HELP!" text
    if (paulineFrame === 1 && !levelComplete) {
      text("HELP!", pauX - 8, pauY - 8, 3);
    }

    // Draw hammer pickups
    for (const h of hammerPickups) {
      if (h.active) {
        spr(35, h.x, h.y);
        // Sparkle
        if (API.frame % 10 < 5) pix(h.x + flr(rnd(8)), h.y - 1, 3);
      }
    }

    // Draw items
    for (const it of itemsCollected) {
      if (!it.collected) {
        spr(it.spr, it.x, it.y);
      }
    }

    // Draw barrels
    for (const b of barrels) {
      const sprId = b.frame === 0 ? 20 : 21;
      spr(sprId, flr(b.x), flr(b.y));
    }

    // Draw fire enemies
    for (const f of fires) {
      spr(37, flr(f.x), flr(f.y));
      // Flicker effect
      if (API.frame % 4 < 2) {
        pix(flr(f.x) + 3, flr(f.y) - 1, 3);
        pix(flr(f.x) + 5, flr(f.y) - 2, 2);
      }
    }

    // Draw player
    const p = player;
    if (invincibleTimer > 0 && API.frame % 4 < 2) {
      // Blink when invincible
    } else {
      let sprId = 1;
      const flipX = p.facing < 0;

      if (p.climbing) {
        sprId = walkFrame === 0 ? 4 : 5;
      } else if (p.jumping || !p.onGround) {
        sprId = 3;
      } else if (p.vx !== 0) {
        sprId = walkFrame === 0 ? 1 : 2;
      }

      if (hammerActive) {
        sprId = 6;
        // Draw hammer swing
        const hx = p.facing > 0 ? p.x + 6 : p.x - 8;
        const hy = (flr(hammerSwing / 4) % 2 === 0) ? p.y - 6 : p.y;
        rectf(hx, hy, 6, 3, 3);
        rectf(hx + 2, hy + 3, 2, 4, 2);
      }

      spr(sprId, flr(p.x), flr(p.y), flipX);
    }

    // Particles
    for (const pt of particles) {
      if (pt.text) {
        text(pt.text, flr(pt.x), flr(pt.y), pt.color);
      } else {
        pix(flr(pt.x), flr(pt.y), pt.color);
      }
    }

    // Level complete overlay
    if (levelComplete) {
      const centerY = 140;
      rectf(140, centerY - 20, 200, 50, 0);
      rect(140, centerY - 20, 200, 50, 3);
      text("LEVEL CLEAR!", 185, centerY - 10, 3);
      text("BONUS: " + bonusScore, 190, centerY + 5, 2);
    }

    // HUD
    rectf(0, 0, W, 14, 0);
    line(0, 14, W, 14, 1);
    text("SCORE:" + score, 4, 4, 3);
    text(levelData.name, W / 2 - 12, 4, 2);

    // Lives
    for (let i = 0; i < lives; i++) spr(40, W - 40 + i * 10, 3);

    // Bonus timer
    text("B:" + bonusScore, W - 120, 4, 2);

    // Hammer indicator
    if (hammerActive) {
      const barW = flr((hammerTimer / 300) * 30);
      rectf(W / 2 + 30, 6, 30, 4, 1);
      rectf(W / 2 + 30, 6, barW, 4, 3);
      if (hammerTimer < 60 && API.frame % 6 < 3) {
        text("HAMMER!", W / 2 + 20, 4, 3);
      }
    }
  };

  // ============================================================
  // Boot
  // ============================================================
  if (API._init) API._init();
  setInterval(tick, 1000 / FPS);
  document.addEventListener("keydown", ensureAudio, { once: true });
  document.addEventListener("click", ensureAudio, { once: true });
})();
</script>
</body>
</html>
