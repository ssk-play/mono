<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mono — Demo: Exerion</title>
<link rel="stylesheet" href="../../runtime/mono.css">
</head>
<body>
<div id="frame">
  <canvas id="screen"></canvas>
</div>
<div id="controls">
  <span>ARROWS</span> MOVE &nbsp;&nbsp; <span>A</span> SHOOT &nbsp;&nbsp; <span>Z HOLD</span> CHARGE
</div>
<script src="../../runtime/engine.js"></script>
<script>
(() => {
  "use strict";
  const W = Mono.WIDTH, H = Mono.HEIGHT;
  const { cls, pix, line, rect, rectf, circ, circf, sprite: defSprite,
          spr, text, btn, btnp, note, stop, rnd, flr, abs: _abs,
          min, max: _max, sin, cos, dbg, dbgC } = Mono;

  // --- 8x8 to 16x16 upscale helper ---
  function up(d) {
    let o = "";
    for (let r = 0; r < 8; r++) {
      let row = "";
      for (let c = 0; c < 8; c++) {
        const ch = d[r * 8 + c];
        row += ch + ch;
      }
      o += row + row;
    }
    return o;
  }

  // --- Sprites (all 16x16 via upscale) ---

  // 1: Player ship (Exerion-style fighter with wide wings)
  defSprite(1, up(
    "00030000" +
    "00333000" +
    "03333300" +
    "33323330" +
    "33333330" +
    "30333030" +
    "30030030" +
    "00000000"
  ));

  // 2: Player ship thrust frame
  defSprite(2, up(
    "00030000" +
    "00333000" +
    "03333300" +
    "33323330" +
    "33333330" +
    "30333030" +
    "30030030" +
    "01020100"
  ));

  // 10: Small fighter enemy (fast)
  defSprite(10, up(
    "00000000" +
    "00100100" +
    "01111110" +
    "11322310" +
    "01333100" +
    "00111000" +
    "01000100" +
    "00000000"
  ));

  // 11: Medium bomber enemy
  defSprite(11, up(
    "00333000" +
    "03333300" +
    "33323330" +
    "33333330" +
    "13333310" +
    "03333300" +
    "01030100" +
    "00010000"
  ));

  // 12: Large carrier enemy
  defSprite(12, up(
    "01333100" +
    "33333330" +
    "33232330" +
    "33333330" +
    "33333330" +
    "33232330" +
    "33333330" +
    "01030100"
  ));

  // 20: Player bullet (dual shot)
  defSprite(20, up(
    "00000000" +
    "00030000" +
    "00030000" +
    "00020000" +
    "00020000" +
    "00010000" +
    "00000000" +
    "00000000"
  ));

  // 21: Charge bullet (big bright)
  defSprite(21, up(
    "00333000" +
    "03333300" +
    "33333330" +
    "33333330" +
    "33333330" +
    "03333300" +
    "00333000" +
    "00000000"
  ));

  // 25: Enemy bullet
  defSprite(25, up(
    "00000000" +
    "00010000" +
    "00020000" +
    "00020000" +
    "00030000" +
    "00030000" +
    "00000000" +
    "00000000"
  ));

  // 30: Explosion frame 1
  defSprite(30, up(
    "00000000" +
    "00200100" +
    "01002000" +
    "00031000" +
    "00130200" +
    "01000010" +
    "00100000" +
    "00000000"
  ));

  // 31: Explosion frame 2
  defSprite(31, up(
    "20010020" +
    "01000010" +
    "00203200" +
    "03033030" +
    "00232000" +
    "01000300" +
    "20001001" +
    "00200010"
  ));

  // 32: Explosion frame 3 (fading)
  defSprite(32, up(
    "10000010" +
    "00100000" +
    "00001100" +
    "01011010" +
    "00110000" +
    "00000100" +
    "10000001" +
    "00010000"
  ));

  // 40: Life icon (small ship)
  defSprite(40, up(
    "00000000" +
    "00030000" +
    "00333000" +
    "03323300" +
    "33333330" +
    "30030030" +
    "00000000" +
    "00000000"
  ));

  // 50: Charge indicator frame
  defSprite(50, up(
    "00333000" +
    "03000300" +
    "30000030" +
    "30000030" +
    "30000030" +
    "03000300" +
    "00333000" +
    "00000000"
  ));

  // --- Constants for 16x16 sprites ---
  const SP = 16; // sprite size

  // --- Game State ---
  const { TITLE, PLAY, GAMEOVER } = Mono.SCENE;
  let player, bullets, eBullets, enemies, explosions, particles;
  let stars1, stars2, stars3; // 3 parallax layers
  let score, lives, wave, waveTimer, waveMessage;
  let shootCooldown, chargeTime, charging;
  let invincible, invTimer;
  let hiScore = 0;
  let titleAnim = 0;
  let screenShake = 0;

  // Wave patterns
  const PATTERNS = {
    SINE: 0,
    CIRCLE: 1,
    VFORM: 2,
    SWOOP: 3,
    ZIGZAG: 4,
  };

  function makeStars(count, speedMin, speedMax) {
    const arr = [];
    for (let i = 0; i < count; i++)
      arr.push({ x: flr(rnd(W)), y: flr(rnd(H)), speed: speedMin + rnd(speedMax - speedMin), bright: flr(rnd(2)) + 1 });
    return arr;
  }

  // --- Circle collision helper ---
  function circCollide(x1, y1, r1, x2, y2, r2) {
    const dx = x1 - x2, dy = y1 - y2;
    const dist = dx * dx + dy * dy;
    const rSum = r1 + r2;
    return dist < rSum * rSum;
  }

  function resetGame() {
    player = { x: W / 2 - 8, y: H - 40, speed: 2.5, yBase: H - 40 };
    bullets = [];
    eBullets = [];
    enemies = [];
    explosions = [];
    particles = [];
    score = 0;
    lives = 3;
    wave = 0;
    waveTimer = 0;
    waveMessage = 0;
    shootCooldown = 0;
    chargeTime = 0;
    charging = false;
    invincible = 0;
    invTimer = 0;
    screenShake = 0;
    stars1 = makeStars(30, 0.3, 0.6);
    stars2 = makeStars(20, 0.8, 1.5);
    stars3 = makeStars(10, 2.0, 3.0);
    spawnWave();
  }

  function spawnWave() {
    wave++;
    waveMessage = 90;
    const pattern = (wave - 1) % 5;
    const numEnemies = min(6 + wave * 2, 24);
    const hasCarrier = wave >= 3 && wave % 3 === 0;
    const hasBomber = wave >= 2;

    if (hasCarrier) {
      enemies.push(makeEnemy(12, W / 2 - 8, -20, PATTERNS.SWOOP, 0, 3, 100));
    }

    for (let i = 0; i < numEnemies; i++) {
      let type, hp, pts;
      if (hasBomber && i < flr(numEnemies / 3)) {
        type = 11; hp = 2; pts = 30;
      } else {
        type = 10; hp = 1; pts = 10;
      }
      let pat = pattern;
      if (wave > 3) pat = flr(rnd(5));

      enemies.push(makeEnemy(type, 0, 0, pat, i, hp, pts));
    }
  }

  function makeEnemy(type, startX, startY, pattern, index, hp, pts) {
    const delay = index * 6;
    let entryX, entryDir;
    if (index % 2 === 0) {
      entryX = -16;
      entryDir = 1;
    } else {
      entryX = W + 16;
      entryDir = -1;
    }

    return {
      type: type,
      x: entryX,
      y: -16 - index * 16,
      hp: hp,
      pts: pts,
      pattern: pattern,
      index: index,
      delay: delay,
      timer: -delay,
      alive: true,
      entryDir: entryDir,
      phase: "enter",
      shootTimer: 60 + flr(rnd(90)),
      baseSpeed: 1.5 + wave * 0.15,
      amplitude: 30 + rnd(22),
      freq: 0.03 + rnd(0.02),
      cx: W / 2 + rnd(66) - 33,
      cy: 60 + rnd(45),
      radius: 20 + rnd(30),
      angle: rnd(Math.PI * 2),
      formX: (index % 6 - 2.5) * 18,
      formY: _abs(index % 6 - 2.5) * 14,
    };
  }

  // Enemy collision radius by type
  function enemyRadius(type) {
    if (type === 12) return 7; // carrier - large
    if (type === 11) return 6; // bomber - medium
    return 5; // fighter - small
  }

  function addExplosion(x, y, big) {
    explosions.push({ x: x, y: y, timer: big ? 18 : 12 });
    const count = big ? 14 : 8;
    for (let i = 0; i < count; i++) {
      const spd = big ? 3 : 2;
      particles.push({
        x: x + 8, y: y + 8,
        vx: rnd(spd * 2) - spd, vy: rnd(spd * 2) - spd,
        life: 6 + flr(rnd(12)),
        color: flr(rnd(3)) + 1
      });
    }
    if (big) screenShake = 6;
  }

  // --- Sound effects ---
  function shootSound() { note(0, "E6", 0.03); }
  function chargeShootSound() {
    note(0, "C5", 0.06);
    setTimeout(() => note(0, "G5", 0.06), 30);
    setTimeout(() => note(0, "C6", 0.08), 60);
  }
  function hitSound() { note(1, "C3", 0.05); setTimeout(() => note(1, "E3", 0.04), 30); }
  function bigHitSound() {
    note(1, "C3", 0.1);
    setTimeout(() => note(1, "G2", 0.1), 50);
    setTimeout(() => note(1, "C2", 0.15), 100);
  }
  function deathSound() {
    note(0, "C3", 0.12); note(1, "G2", 0.12);
    setTimeout(() => { note(0, "A2", 0.18); note(1, "E2", 0.18); }, 120);
  }
  function chargeTickSound() { note(1, "A5", 0.02); }
  function waveClearSound() {
    note(0, "C5", 0.08);
    setTimeout(() => note(0, "E5", 0.08), 80);
    setTimeout(() => note(0, "G5", 0.08), 160);
    setTimeout(() => note(0, "C6", 0.12), 240);
  }

  function updateStars(arr) {
    for (const s of arr) {
      s.y += s.speed;
      if (s.y > H) { s.y = -2; s.x = flr(rnd(W)); }
    }
  }

  function updateStarsAndAnim() {
    updateStars(stars1);
    updateStars(stars2);
    updateStars(stars3);
    titleAnim++;
    if (screenShake > 0) screenShake--;
  }

  function drawStarsAll() {
    const shakeX = screenShake > 0 ? flr(rnd(3)) - 1 : 0;
    const shakeY = screenShake > 0 ? flr(rnd(3)) - 1 : 0;
    for (const s of stars1) pix(s.x + shakeX, s.y + shakeY, 1);
    for (const s of stars2) pix(s.x + shakeX, s.y + shakeY, s.bright);
    for (const s of stars3) {
      const sx = s.x + shakeX, sy = s.y + shakeY;
      pix(sx, sy, 3);
      pix(sx + 1, sy, 2);
    }
  }

  // --- Title Scene ---
  Mono.scene(TITLE, {
    init() {
      stars1 = makeStars(30, 0.3, 0.6);
      stars2 = makeStars(20, 0.8, 1.5);
      stars3 = makeStars(10, 2.0, 3.0);
    },
    update() {
      updateStarsAndAnim();
      if (btnp("start") || btnp("a")) {
        resetGame();
        note(0, "C5", 0.08);
        setTimeout(() => note(0, "E5", 0.08), 80);
        setTimeout(() => note(0, "G5", 0.12), 160);
        Mono.go(PLAY); return;
      }
    },
    draw() {
      cls(0);
      drawStarsAll();
      drawTitle();
    }
  });

  // --- Game Over Scene ---
  Mono.scene(GAMEOVER, {
    init() {},
    update() {
      updateStarsAndAnim();
      for (let i = particles.length - 1; i >= 0; i--) {
        const p = particles[i]; p.x += p.vx; p.y += p.vy; p.vy += 0.08; p.life--;
        if (p.life <= 0) particles.splice(i, 1);
      }
      if (btnp("start") || btnp("a")) {
        if (score > hiScore) hiScore = score;
        Mono.go(TITLE); return;
      }
    },
    draw() {
      cls(0);
      drawStarsAll();
      drawGameOver();
    }
  });

  // --- Play Scene ---
  Mono.scene(PLAY, {
    init() {},
    update() {
    updateStarsAndAnim();

    if (waveMessage > 0) waveMessage--;
    if (invincible > 0) invincible--;

    // Player movement
    if (btn("left")) player.x -= player.speed;
    if (btn("right")) player.x += player.speed;
    if (btn("up")) player.y -= player.speed * 0.7;
    if (btn("down")) player.y += player.speed * 0.7;

    // Clamp player position (16x16 sprite)
    player.x = _max(0, min(W - SP, player.x));
    player.y = _max(H - 80, min(H - SP - 4, player.y));

    // Shooting
    if (shootCooldown > 0) shootCooldown--;

    // Charge mechanic
    if (btn("a")) {
      if (!charging && shootCooldown <= 0) {
        if (btnp("a")) {
          fireDualShot();
          shootCooldown = 6;
        }
      }
      chargeTime++;
      if (chargeTime > 10) charging = true;
      if (charging && chargeTime % 8 === 0 && chargeTime < 60) chargeTickSound();
    } else {
      if (charging && chargeTime >= 30) {
        fireChargeShot();
        chargeShootSound();
        shootCooldown = 15;
      }
      chargeTime = 0;
      charging = false;
    }

    // Update player bullets
    for (let i = bullets.length - 1; i >= 0; i--) {
      const b = bullets[i];
      b.x += b.vx;
      b.y += b.vy;
      if (b.y < -SP || b.x < -SP || b.x > W + SP) bullets.splice(i, 1);
    }

    // Update enemies
    for (let i = enemies.length - 1; i >= 0; i--) {
      const e = enemies[i];
      if (!e.alive) { enemies.splice(i, 1); continue; }

      e.timer++;
      if (e.timer < 0) continue;

      const t = e.timer;
      const spd = e.baseSpeed;

      if (e.phase === "enter") {
        switch (e.pattern) {
          case PATTERNS.SINE:
            e.x += e.entryDir * spd * 1.2;
            e.y = 30 + e.formY + sin(t * e.freq) * e.amplitude;
            if ((e.entryDir > 0 && e.x > W / 2 + e.formX) ||
                (e.entryDir < 0 && e.x < W / 2 + e.formX)) {
              e.phase = "attack";
              e.timer = 0;
            }
            break;

          case PATTERNS.CIRCLE:
            e.angle += 0.06 * e.entryDir;
            e.x = e.cx + cos(e.angle) * e.radius;
            e.y = e.cy + sin(e.angle) * e.radius * 0.7;
            if (t > 60) { e.phase = "attack"; e.timer = 0; }
            break;

          case PATTERNS.VFORM:
            e.x += e.entryDir * spd * 0.8;
            e.y += spd * 0.6;
            if (e.y > 30 + e.formY) { e.phase = "attack"; e.timer = 0; }
            break;

          case PATTERNS.SWOOP:
            e.x += e.entryDir * spd * 1.5;
            e.y = 22 + sin(t * 0.04) * 45 + 30;
            if (t > 80) { e.phase = "attack"; e.timer = 0; }
            break;

          case PATTERNS.ZIGZAG:
            e.x += e.entryDir * spd;
            e.y += spd * 0.5;
            if (t % 30 < 15) e.x += spd * 0.8;
            else e.x -= spd * 0.8;
            if (e.y > 38 + e.formY) { e.phase = "attack"; e.timer = 0; }
            break;
        }
      }

      if (e.phase === "attack") {
        switch (e.pattern) {
          case PATTERNS.SINE:
            e.x += sin(t * 0.04) * spd * 0.8;
            e.y += spd * 0.6;
            break;

          case PATTERNS.CIRCLE:
            e.angle += 0.04;
            e.x = e.cx + cos(e.angle) * (e.radius + t * 0.3);
            e.y += spd * 0.5;
            break;

          case PATTERNS.VFORM: {
            const dx = player.x - e.x;
            e.x += (dx > 0 ? 1 : -1) * spd * 0.5;
            e.y += spd * 0.8;
            break;
          }

          case PATTERNS.SWOOP:
            e.x += sin(t * 0.03) * spd * 2;
            e.y += spd * 0.4;
            break;

          case PATTERNS.ZIGZAG:
            e.x += (t % 40 < 20 ? spd : -spd);
            e.y += spd * 0.7;
            break;
        }

        // Shoot at player
        e.shootTimer--;
        if (e.shootTimer <= 0 && e.y > 10 && e.y < H - 48) {
          const angle = Math.atan2(player.y + 8 - (e.y + 8), player.x + 8 - (e.x + 8));
          const bspd = 2.5 + wave * 0.12;
          eBullets.push({
            x: e.x + 4, y: e.y + SP,
            vx: cos(angle) * bspd,
            vy: sin(angle) * bspd
          });
          e.shootTimer = _max(25, 70 - wave * 3) + flr(rnd(40));
        }
      }

      // Off screen -> remove
      if (e.y > H + 30 || e.x < -40 || e.x > W + 40) {
        e.phase = "exit";
        enemies.splice(i, 1);
        continue;
      }

      // Bullet-enemy collision (circle-based)
      const eCx = e.x + 8, eCy = e.y + 8;
      const eR = enemyRadius(e.type);

      for (let j = bullets.length - 1; j >= 0; j--) {
        const b = bullets[j];
        const bCx = b.x + 8, bCy = b.y + 8;
        const bR = b.charged ? 6 : 3;

        if (circCollide(bCx, bCy, bR, eCx, eCy, eR)) {
          const dmg = b.power || 1;
          e.hp -= dmg;
          bullets.splice(j, 1);
          if (e.hp <= 0) {
            const big = e.type === 12;
            addExplosion(e.x, e.y, big);
            score += e.pts * (charging ? 2 : 1);
            if (big) bigHitSound(); else hitSound();
            e.alive = false;
          } else {
            note(1, "A4", 0.02);
          }
          break;
        }
      }
    }

    // Update enemy bullets
    for (let i = eBullets.length - 1; i >= 0; i--) {
      const b = eBullets[i];
      b.x += b.vx;
      b.y += b.vy;
      if (b.y > H + SP || b.y < -SP || b.x < -SP || b.x > W + SP) {
        eBullets.splice(i, 1);
        continue;
      }

      // Hit player (circle collision)
      if (invincible <= 0) {
        const bCx = b.x + 8, bCy = b.y + 8, bR = 3;
        const pCx = player.x + 8, pCy = player.y + 8, pR = 5;
        if (circCollide(bCx, bCy, bR, pCx, pCy, pR)) {
          eBullets.splice(i, 1);
          playerHit();
        }
      }
    }

    // Enemy-player collision (circle-based)
    if (invincible <= 0) {
      const pCx = player.x + 8, pCy = player.y + 8, pR = 5;
      for (let i = enemies.length - 1; i >= 0; i--) {
        const e = enemies[i];
        if (e.timer < 0) continue;
        const eCx = e.x + 8, eCy = e.y + 8;
        const eR = enemyRadius(e.type);
        if (circCollide(pCx, pCy, pR, eCx, eCy, eR)) {
          addExplosion(e.x, e.y, false);
          e.alive = false;
          playerHit();
          break;
        }
      }
    }

    // Explosions
    for (let i = explosions.length - 1; i >= 0; i--) {
      explosions[i].timer--;
      if (explosions[i].timer <= 0) explosions.splice(i, 1);
    }

    // Particles
    for (let i = particles.length - 1; i >= 0; i--) {
      const p = particles[i];
      p.x += p.vx; p.y += p.vy; p.vy += 0.06; p.life--;
      if (p.life <= 0) particles.splice(i, 1);
    }

    // Wave clear check
    if (enemies.length === 0 && waveMessage <= 0) {
      waveTimer++;
      if (waveTimer === 1) waveClearSound();
      if (waveTimer > 90) {
        waveTimer = 0;
        spawnWave();
      }
    } else {
      waveTimer = 0;
    }
    },
    draw() {
    cls(0);

    const shakeX = screenShake > 0 ? flr(rnd(3)) - 1 : 0;
    const shakeY = screenShake > 0 ? flr(rnd(3)) - 1 : 0;

    // --- Parallax starfield ---
    drawStarsAll();

    // --- Play state rendering ---

    // Enemy bullets
    for (const b of eBullets) {
      const bx = flr(b.x) + shakeX, by = flr(b.y) + shakeY;
      spr(25, bx, by);
      dbgC(bx + 8, by + 8, 3);
    }

    // Enemies
    for (const e of enemies) {
      if (e.timer < 0) continue;
      const ex = flr(e.x) + shakeX, ey = flr(e.y) + shakeY;
      spr(e.type, ex, ey);
      dbgC(ex + 8, ey + 8, enemyRadius(e.type));
    }

    // Player bullets
    for (const b of bullets) {
      const bx = flr(b.x) + shakeX, by = flr(b.y) + shakeY;
      if (b.charged) {
        spr(21, bx, by);
        dbgC(bx + 8, by + 8, 6);
      } else {
        spr(20, bx, by);
        dbgC(bx + 8, by + 8, 3);
      }
    }

    // Player
    if (invincible <= 0 || flr(Mono.frame / 3) % 2 === 0) {
      const px = flr(player.x) + shakeX;
      const py = flr(player.y) + shakeY;
      const shipSpr = Mono.frame % 6 < 3 ? 1 : 2;
      spr(shipSpr, px, py);
      dbgC(px + 8, py + 8, 5);

      if (charging && chargeTime >= 10) {
        const chargePct = min(1, (chargeTime - 10) / 20);
        const ccolor = chargeTime >= 30 ? 3 : 2;
        if (chargeTime >= 30) {
          circ(px + 8, py + 8, 10 + sin(Mono.frame * 0.3) * 2, ccolor);
        } else {
          const r = 4 + chargePct * 6;
          circ(px + 8, py + 8, flr(r), 1);
        }
      }
    }

    // Explosions
    for (const e of explosions) {
      const ex = flr(e.x) + shakeX, ey = flr(e.y) + shakeY;
      if (e.timer > 12) spr(30, ex, ey);
      else if (e.timer > 6) spr(31, ex, ey);
      else spr(32, ex, ey);
    }

    // Particles
    for (const p of particles) pix(flr(p.x) + shakeX, flr(p.y) + shakeY, p.color);

    // --- HUD (within 320x240) ---
    rectf(0, 0, W, 10, 0);
    text("SCORE:" + String(score).padStart(6, "0"), 2, 2, 3);
    dbg(2, 2, 60, 7);
    text("WAVE:" + wave, W / 2 - 16, 2, 2);
    dbg(W / 2 - 16, 2, 40, 7);

    // Lives (right-aligned, 16px icons with 2px gap, fits within 320)
    const livesStartX = W - 4 - lives * 18;
    for (let i = 0; i < lives; i++) {
      const lx = livesStartX + i * 18;
      spr(40, lx, -2);
      dbg(lx, -2, SP, SP);
    }

    // Charge bar
    if (charging && chargeTime >= 10) {
      const bw = min(30, flr((chargeTime - 10) * 1.5));
      const barColor = chargeTime >= 30 ? 3 : 2;
      const barX = flr(player.x) - 7 + shakeX;
      const barY = flr(player.y) + SP + 2 + shakeY;
      rectf(barX, barY, bw, 2, barColor);
      rect(barX - 1, barY - 1, 32, 4, 1);
      dbg(barX - 1, barY - 1, 32, 4);
    }

    // Wave announcement
    if (waveMessage > 0) {
      const msgY = 105 + sin(waveMessage * 0.08) * 3;
      text("WAVE " + wave, W / 2 - 20, flr(msgY), 3);
      if (waveMessage > 60) text("GET READY!", W / 2 - 30, flr(msgY) + 10, 2);
    }
    }
  });

  function playerHit() {
    lives--;
    addExplosion(player.x, player.y, true);
    deathSound();
    player.x = W / 2 - 8;
    player.y = H - 40;
    invincible = 60;
    chargeTime = 0;
    charging = false;
    if (lives <= 0) {
      if (score > hiScore) hiScore = score;
      Mono.go(GAMEOVER); return;
    }
  }

  function fireDualShot() {
    bullets.push({ x: player.x + 2, y: player.y - 4, vx: -0.8, vy: -6, power: 1 });
    bullets.push({ x: player.x + 2, y: player.y - 4, vx: 0.8, vy: -6, power: 1 });
    shootSound();
  }

  function fireChargeShot() {
    const cx = player.x + 2;
    const cy = player.y - 6;
    const angles = [-0.35, -0.17, 0, 0.17, 0.35];
    const spd = 7;
    for (const a of angles) {
      bullets.push({
        x: cx, y: cy,
        vx: sin(a) * spd,
        vy: -cos(a) * spd,
        power: 2,
        charged: true
      });
    }
  }

  function drawTitle() {
    const ty = 24 + sin(titleAnim * 0.04) * 4;

    // Title shadow
    text("EXERION", W / 2 - 20, flr(ty) + 1, 1);
    // Title main
    text("EXERION", W / 2 - 21, flr(ty), 3);

    // Subtitle
    text("VERTICAL SHOOTER", W / 2 - 42, flr(ty) + 12, 2);
    rectf(W / 2 - 50, flr(ty) + 20, 100, 1, 1);

    // Animated enemies on title screen
    const cx = W / 2;
    for (let i = 0; i < 5; i++) {
      const angle = titleAnim * 0.03 + i * (Math.PI * 2 / 5);
      const ex = cx + cos(angle) * 33 - 8;
      const ey = flr(ty) + 34 + sin(angle) * 15;
      spr(10, flr(ex), flr(ey));
    }
    // Bomber in center
    spr(11, cx - 8, flr(ty) + 32 + flr(sin(titleAnim * 0.05) * 3));
    // Carrier below
    spr(12, cx - 8, flr(ty) + 52 + flr(sin(titleAnim * 0.03) * 2));

    // Player ship demo
    const shipY = 140 + sin(titleAnim * 0.06) * 2;
    spr(1, cx - 8, flr(shipY));

    if (flr(titleAnim / 20) % 2 === 0) text("PRESS START", W / 2 - 32, 155, 3);

    // Score table
    text("-SCORE TABLE-", W / 2 - 36, 172, 2);
    spr(12, W / 2 - 50, 182); text("CARRIER  100 PTS", W / 2 - 30, 186, 2);
    spr(11, W / 2 - 50, 198); text("BOMBER    30 PTS", W / 2 - 30, 202, 2);
    spr(10, W / 2 - 50, 214); text("FIGHTER   10 PTS", W / 2 - 30, 218, 2);

    if (hiScore > 0) text("HI:" + String(hiScore).padStart(6, "0"), W / 2 - 25, 230, 2);
  }

  function drawGameOver() {
    for (const p of particles) pix(flr(p.x), flr(p.y), p.color);

    const gy = 75 + sin(titleAnim * 0.05) * 2;
    text("GAME OVER", W / 2 - 24, flr(gy), 3);
    text("SCORE: " + String(score).padStart(6, "0"), W / 2 - 34, flr(gy) + 15, 2);
    text("WAVE: " + wave, W / 2 - 17, flr(gy) + 24, 2);

    if (score > hiScore) {
      if (flr(titleAnim / 10) % 2 === 0) text("NEW HIGH SCORE!", W / 2 - 40, flr(gy) + 36, 3);
    }

    if (flr(titleAnim / 20) % 2 === 0) text("PRESS START", W / 2 - 32, 158, 3);
  }

  Mono.go(TITLE);
  Mono.boot("screen");
})();
</script>
</body>
</html>
