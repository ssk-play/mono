<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mono — Demo: Q*bert</title>
<link rel="stylesheet" href="../../runtime/mono.css">
</head>
<body>
<div id="frame">
  <canvas id="screen"></canvas>
</div>
<div id="controls">
  <span>ARROWS</span> HOP
</div>
<script src="../../runtime/engine.js"></script>
<script>
(() => {
  "use strict";
  const W = Mono.WIDTH, H = Mono.HEIGHT;  // 320x240
  const { cls, pix, line, rect, rectf, circ, circf, sprT,
          sprite: defSprite, spr, text, btn, btnp, note, stop,
          rnd, flr, abs: _abs, min, max: _max, sin, cos,
          dbg, dbgC } = Mono;

  // --- 8->16 upscale helper ---
  function up(d) {
    let o = "";
    for (let r = 0; r < 8; r++) {
      let row = "";
      for (let c = 0; c < 8; c++) {
        const ch = d[r * 8 + c];
        row += ch + ch;
      }
      o += row + row;
    }
    return o;
  }

  // --- Sprites (8x8 authored, upscaled to 16x16) ---
  // 1: Q*bert facing down-right
  defSprite(1, up(
    "00333000" +
    "03223300" +
    "03233300" +
    "00333000" +
    "02332200" +
    "02222200" +
    "02200220" +
    "02200220"
  ));
  // 2: Q*bert facing down-left
  defSprite(2, up(
    "00333000" +
    "00322300" +
    "00332300" +
    "00333000" +
    "00233200" +
    "00222200" +
    "02200220" +
    "02200220"
  ));
  // 3: Q*bert facing up-right
  defSprite(3, up(
    "02200220" +
    "02200220" +
    "02222200" +
    "02332200" +
    "00333000" +
    "03233300" +
    "03223300" +
    "00333000"
  ));
  // 4: Q*bert facing up-left
  defSprite(4, up(
    "02200220" +
    "02200220" +
    "00222200" +
    "00233200" +
    "00333000" +
    "00332300" +
    "00322300" +
    "00333000"
  ));
  // 5: Coily (snake) egg
  defSprite(5, up(
    "00000000" +
    "00111000" +
    "01221100" +
    "01222100" +
    "01222100" +
    "01221100" +
    "00111000" +
    "00000000"
  ));
  // 6: Coily (snake) chasing
  defSprite(6, up(
    "02200220" +
    "03300330" +
    "01311310" +
    "01111110" +
    "00111100" +
    "00111100" +
    "00100100" +
    "00100100"
  ));
  // 7: Red ball
  defSprite(7, up(
    "00000000" +
    "00220000" +
    "02332000" +
    "02222000" +
    "02222000" +
    "00220000" +
    "00000000" +
    "00000000"
  ));
  // 8: Spinning disc
  defSprite(8, up(
    "00000000" +
    "00333000" +
    "03222300" +
    "03212300" +
    "03222300" +
    "00333000" +
    "00000000" +
    "00000000"
  ));
  // 9: Speech bubble (!@#)
  defSprite(9, up(
    "33333330" +
    "32121230" +
    "31212130" +
    "32121230" +
    "33333330" +
    "00330000" +
    "00300000" +
    "00000000"
  ));

  // --- Sprite size constant ---
  const SS = 16;

  // --- Isometric Cube Geometry (tuned for 320x240) ---
  const CUBE_W = 26;
  const CUBE_H = 20;
  const CUBE_DEPTH = 14;
  const PYR_TOP_X = W / 2;
  const PYR_TOP_Y = 42;
  const ROWS = 7;

  // Max Y of bottom row cubes (for layout overflow check)
  // row 6: PYR_TOP_Y + 6 * (10 + 14) = 42 + 144 = 186, plus CUBE_H/2 + CUBE_DEPTH = 24 => 210
  // Leaves 30px for HUD at top. Fits in 240.

  function cubePos(row, col) {
    const x = PYR_TOP_X + (col - row / 2) * CUBE_W;
    const y = PYR_TOP_Y + row * (CUBE_H / 2 + CUBE_DEPTH);
    return { x: x, y: y };
  }

  // Draw an isometric cube using public API (pix/line calls)
  function drawCube(cx, cy, topC, leftC, rightC) {
    const hw = flr(CUBE_W / 2);
    const hh = flr(CUBE_H / 2);
    const sd = CUBE_DEPTH;

    // Top face (diamond) - scanline fill via pix
    for (let dy = -hh; dy <= hh; dy++) {
      const w = hw * (1 - _abs(dy) / hh);
      const y = flr(cy + dy);
      if (y < 0 || y >= H) continue;
      const x0 = _max(0, flr(cx - w));
      const x1 = min(W - 1, flr(cx + w));
      for (let x = x0; x <= x1; x++) pix(x, y, topC);
    }

    // Left face (parallelogram)
    for (let dy = 0; dy < sd; dy++) {
      const y = flr(cy + hh + dy);
      if (y < 0 || y >= H) continue;
      const le = cx - hw + (dy * hw / sd);
      const re = cx;
      const x0 = _max(0, flr(le));
      const x1 = min(W - 1, flr(re));
      for (let x = x0; x <= x1; x++) pix(x, y, leftC);
    }

    // Right face (parallelogram)
    for (let dy = 0; dy < sd; dy++) {
      const y = flr(cy + hh + dy);
      if (y < 0 || y >= H) continue;
      const le = cx;
      const re = cx + hw - (dy * hw / sd);
      const x0 = _max(0, flr(le));
      const x1 = min(W - 1, flr(re));
      for (let x = x0; x <= x1; x++) pix(x, y, rightC);
    }

    // Outline edges
    const fcx = flr(cx), fcy = flr(cy);
    // Top diamond
    line(fcx - hw, fcy, fcx, fcy - hh, 0);
    line(fcx + hw, fcy, fcx, fcy - hh, 0);
    line(fcx - hw, fcy, fcx, fcy + hh, 0);
    line(fcx + hw, fcy, fcx, fcy + hh, 0);
    // Left face
    line(fcx - hw, fcy, fcx, fcy + hh + sd, 0);
    line(fcx, fcy + hh, fcx, fcy + hh + sd, 0);
    // Right face
    line(fcx + hw, fcy, fcx, fcy + hh + sd, 0);
  }

  // --- Collision helpers ---
  function circCollide(ax, ay, ar, bx, by, br) {
    const dx = ax - bx, dy = ay - by;
    return dx * dx + dy * dy < (ar + br) * (ar + br);
  }

  const PLAYER_R = 6;
  const ENEMY_R = 5;
  const BALL_R = 4;

  // --- Game State ---
  const { TITLE, PLAY, GAMEOVER } = Mono.SCENE;
  let score, lives, level;
  let cubeColors;
  let targetColor;
  let startColor;

  let pRow, pCol;
  let pPx, pPy;
  let pTargetPx, pTargetPy;
  let pHopping;
  let pDir;
  let pFalling;
  let pFallVy;
  let pDead;
  let pOnDisc;
  let pDiscSide;
  let invulnTimer;
  let speechTimer;

  let enemies;
  let enemySpawnTimer;
  let coilyActive;

  let discs;

  let levelClearTimer;
  let flashTimer;
  let deathPause;
  let titleBlink;

  const HOP_FRAMES = 8;
  const ENEMY_HOP_FRAMES = 12;

  function resetGame() {
    score = 0;
    lives = 3;
    level = 0;
    nextLevel();
  }

  function nextLevel() {
    level++;
    cubeColors = [];
    for (let r = 0; r < ROWS; r++) {
      cubeColors[r] = [];
      for (let c = 0; c <= r; c++) cubeColors[r][c] = 0;
    }
    startColor = 1;
    targetColor = level <= 2 ? 2 : 3;
    for (let r = 0; r < ROWS; r++)
      for (let c = 0; c <= r; c++)
        cubeColors[r][c] = startColor;

    pRow = 0; pCol = 0;
    const p = cubePos(0, 0);
    pPx = p.x; pPy = p.y;
    pTargetPx = p.x; pTargetPy = p.y;
    pHopping = 0;
    pDir = 0;
    pFalling = 0;
    pFallVy = 0;
    pDead = false;
    pOnDisc = 0;
    pDiscSide = 0;
    invulnTimer = 60;
    speechTimer = 0;

    enemies = [];
    enemySpawnTimer = 60 + flr(rnd(60));
    coilyActive = false;

    discs = [];
    const discRow1 = 1 + flr(rnd(3));
    const discRow2 = 1 + flr(rnd(3));
    discs.push({ row: discRow1, side: -1, active: true, used: false });
    discs.push({ row: discRow2, side: 1, active: true, used: false });

    levelClearTimer = 0;
    flashTimer = 0;
    deathPause = 0;
  }

  function landOnCube(row, col) {
    if (row >= 0 && row < ROWS && col >= 0 && col <= row) {
      if (cubeColors[row][col] !== targetColor) {
        if (level <= 4) {
          cubeColors[row][col] = targetColor;
        } else {
          cubeColors[row][col] = cubeColors[row][col] === startColor ? targetColor : startColor;
        }
        score += 25;
        note(0, "E5", 0.05);
      }
    }
  }

  function checkLevelClear() {
    for (let r = 0; r < ROWS; r++)
      for (let c = 0; c <= r; c++)
        if (cubeColors[r][c] !== targetColor) return false;
    return true;
  }

  function isValidCube(row, col) {
    return row >= 0 && row < ROWS && col >= 0 && col <= row;
  }

  function killPlayer() {
    if (invulnTimer > 0 || pDead) return;
    pDead = true;
    lives--;
    deathPause = 60;
    speechTimer = 40;
    note(0, "C3", 0.15);
    setTimeout(() => note(0, "A2", 0.2), 150);
    setTimeout(() => note(1, "E2", 0.2), 300);
  }

  function respawnPlayer() {
    pRow = 0; pCol = 0;
    const p = cubePos(0, 0);
    pPx = p.x; pPy = p.y;
    pTargetPx = p.x; pTargetPy = p.y;
    pHopping = 0;
    pFalling = 0;
    pFallVy = 0;
    pDead = false;
    pOnDisc = 0;
    invulnTimer = 60;
    speechTimer = 0;
    enemies = [];
    coilyActive = false;
    enemySpawnTimer = 90;
  }

  function getDiscPos(disc) {
    const cp = cubePos(disc.row, disc.side === -1 ? -1 : disc.row + 1);
    return { x: cp.x, y: cp.y };
  }

  function spawnEnemy() {
    const startCol = flr(rnd(2));
    const type = (!coilyActive && level > 1 && rnd(1) < 0.3) ? "coily_egg" : "ball";
    const p = cubePos(0, 0);
    enemies.push({
      type: type,
      row: -1,
      col: startCol,
      px: p.x + (startCol === 0 ? -CUBE_W / 2 : CUBE_W / 2),
      py: p.y - CUBE_H - CUBE_DEPTH,
      targetPx: 0,
      targetPy: 0,
      hopping: 0,
      hopDir: 0,
      state: "bouncing",
    });
    if (type === "coily_egg") coilyActive = true;
  }

  // --- Center positions for circle collision ---
  function playerCenter() {
    let py = pPy - CUBE_H / 2;
    if (pHopping > 0 && pFalling === 0 && pOnDisc === 0) {
      const t = pHopping / HOP_FRAMES;
      py -= sin(t * 3.14159) * 14;
    }
    return { cx: pPx, cy: py };
  }

  function enemyCenter(e) {
    let ey = e.py - CUBE_H / 2;
    if (e.hopping > 0) {
      const t = e.hopping / ENEMY_HOP_FRAMES;
      ey -= sin(t * 3.14159) * 12;
    }
    return { cx: e.px, cy: ey };
  }

  // --- Title Scene ---
  Mono.scene(TITLE, {
    init() { titleBlink = true; },
    update() {
      titleBlink = (Mono.frame % 40) < 25;
      if (btnp("a")) {
        resetGame();
        note(0, "C5", 0.1);
        setTimeout(() => note(0, "E5", 0.1), 100);
        setTimeout(() => note(0, "G5", 0.15), 200);
        Mono.go(PLAY); return;
      }
    },
    draw() {
      cls(0);
      text("Q*BERT", W / 2 - 15, 40, 3);
      text("MONO EDITION", W / 2 - 30, 54, 2);

      // Small preview pyramid
      for (let r = 0; r < 4; r++) {
        for (let c = 0; c <= r; c++) {
          const p = cubePos(r, c);
          drawCube(p.x, p.y + 50,
            (r + c) % 2 === 0 ? 2 : 3, 1, 1);
        }
      }

      if (titleBlink) {
        text("PRESS START", W / 2 - 30, 190, 3);
      }
      text("ARROWS TO HOP", W / 2 - 32, 210, 1);
      text("CHANGE ALL CUBES", W / 2 - 40, 222, 1);
    }
  });

  // --- Play Scene ---
  Mono.scene(PLAY, {
    init() { resetGame(); },
    update() {
    titleBlink = (Mono.frame % 40) < 25;

    if (levelClearTimer > 0) {
      levelClearTimer--;
      flashTimer++;
      if (levelClearTimer === 0) nextLevel();
      return;
    }

    if (deathPause > 0) {
      deathPause--;
      if (speechTimer > 0) speechTimer--;
      if (deathPause === 0) {
        if (lives <= 0) { Mono.go(GAMEOVER); return; }
        else respawnPlayer();
      }
      return;
    }

    if (invulnTimer > 0) invulnTimer--;

    // --- Player hopping ---
    if (pHopping > 0) {
      pHopping--;
      pPx += (pTargetPx - pPx) * 0.2;
      pPy += (pTargetPy - pPy) * 0.2;
      if (pHopping === 0) {
        pPx = pTargetPx;
        pPy = pTargetPy;
        if (pOnDisc > 0) {
          pOnDisc--;
          if (pOnDisc === 0) {
            pRow = 0; pCol = 0;
            const p = cubePos(0, 0);
            pPx = p.x; pPy = p.y;
            pTargetPx = p.x; pTargetPy = p.y;
            invulnTimer = 30;
            enemies = enemies.filter(e => e.type !== "coily");
            coilyActive = false;
            score += 500;
            note(0, "C5", 0.08);
            setTimeout(() => note(0, "E5", 0.08), 80);
            setTimeout(() => note(0, "G5", 0.08), 160);
            setTimeout(() => note(0, "C6", 0.12), 240);
          }
        } else if (pFalling > 0) {
          // already falling
        } else {
          landOnCube(pRow, pCol);
          if (checkLevelClear()) {
            levelClearTimer = 90;
            score += 1000;
            note(0, "C5", 0.1);
            setTimeout(() => note(0, "E5", 0.1), 100);
            setTimeout(() => note(0, "G5", 0.1), 200);
            setTimeout(() => note(0, "C6", 0.2), 300);
          }
        }
      }
    } else if (pFalling > 0) {
      pFallVy += 0.5;
      pPy += pFallVy;
      pFalling--;
      if (pFalling === 0) killPlayer();
    } else if (!pDead && pOnDisc === 0) {
      let dr = 0, dc = 0;
      let moved = false;
      if (btnp("right"))     { dr = 1; dc = 1; pDir = 0; moved = true; }
      else if (btnp("down")) { dr = 1; dc = 0; pDir = 1; moved = true; }
      else if (btnp("up"))   { dr = -1; dc = 0; pDir = 3; moved = true; }
      else if (btnp("left")) { dr = -1; dc = -1; pDir = 2; moved = true; }

      if (moved) {
        const newRow = pRow + dr;
        const newCol = pCol + dc;

        let hitDisc = false;
        if (!isValidCube(newRow, newCol)) {
          for (const disc of discs) {
            if (disc.active && !disc.used) {
              if (disc.side === -1 && newRow === disc.row && newCol < 0) {
                hitDisc = true;
                disc.used = true; disc.active = false;
                pOnDisc = 20; pDiscSide = -1;
                const tp = cubePos(0, 0);
                pTargetPx = tp.x; pTargetPy = tp.y;
                pHopping = 20;
                note(1, "G5", 0.1);
                break;
              }
              if (disc.side === 1 && newRow === disc.row && newCol > newRow) {
                hitDisc = true;
                disc.used = true; disc.active = false;
                pOnDisc = 20; pDiscSide = 1;
                const tp = cubePos(0, 0);
                pTargetPx = tp.x; pTargetPy = tp.y;
                pHopping = 20;
                note(1, "G5", 0.1);
                break;
              }
            }
          }
        }

        if (!hitDisc) {
          if (isValidCube(newRow, newCol)) {
            pRow = newRow; pCol = newCol;
            const p = cubePos(pRow, pCol);
            pTargetPx = p.x; pTargetPy = p.y;
            pHopping = HOP_FRAMES;
            note(1, "A4", 0.03);
          } else {
            pRow = newRow; pCol = newCol;
            pTargetPx = pPx + (dc * CUBE_W);
            pTargetPy = pPy + (dr * (CUBE_H / 2 + CUBE_DEPTH));
            pHopping = HOP_FRAMES;
            pFalling = 20;
            pFallVy = 0;
            speechTimer = 30;
          }
        }
      }
    }

    // --- Enemy spawning ---
    if (!pDead && levelClearTimer === 0) {
      enemySpawnTimer--;
      if (enemySpawnTimer <= 0) {
        if (enemies.length < 3 + level) spawnEnemy();
        enemySpawnTimer = _max(30, 90 - level * 8) + flr(rnd(40));
      }
    }

    // --- Enemy update ---
    for (let i = enemies.length - 1; i >= 0; i--) {
      const e = enemies[i];

      if (e.hopping > 0) {
        e.hopping--;
        e.px += (e.targetPx - e.px) * 0.2;
        e.py += (e.targetPy - e.py) * 0.2;
        if (e.hopping === 0) {
          e.px = e.targetPx; e.py = e.targetPy;
          if (e.row >= ROWS) {
            if (e.type === "coily") coilyActive = false;
            enemies.splice(i, 1);
            continue;
          }
          if (e.type === "coily_egg" && e.row >= ROWS - 1) {
            e.type = "coily";
            e.state = "chasing";
          }
        }
        continue;
      }

      if (e.type === "ball" || e.type === "coily_egg") {
        const goRight = rnd(1) < 0.5;
        const newRow = e.row + 1;
        const newCol = goRight ? e.col + 1 : e.col;
        if (newRow >= ROWS) { enemies.splice(i, 1); continue; }
        e.row = newRow; e.col = newCol;
        if (isValidCube(e.row, e.col)) {
          const p = cubePos(e.row, e.col);
          e.targetPx = p.x; e.targetPy = p.y;
        } else {
          e.targetPx = e.px + (goRight ? CUBE_W : -CUBE_W);
          e.targetPy = e.py + CUBE_H / 2 + CUBE_DEPTH;
          e.row = ROWS;
        }
        e.hopping = ENEMY_HOP_FRAMES;
      } else if (e.type === "coily") {
        let dr = 0, dc = 0;
        if (pRow > e.row) { dr = 1; dc = pCol > e.col ? 1 : 0; }
        else if (pRow < e.row) { dr = -1; dc = pCol < e.col ? -1 : 0; }
        else {
          if (pCol > e.col) { dr = 1; dc = 1; }
          else if (pCol < e.col) { dr = -1; dc = -1; }
        }
        const newRow = e.row + dr;
        const newCol = e.col + dc;
        if (isValidCube(newRow, newCol)) {
          e.row = newRow; e.col = newCol;
          const p = cubePos(e.row, e.col);
          e.targetPx = p.x; e.targetPy = p.y;
        } else {
          e.targetPx = e.px + dc * CUBE_W;
          e.targetPy = e.py + 45;
          e.row = ROWS;
          coilyActive = false;
          score += 500;
          note(0, "G5", 0.1);
        }
        e.hopping = _max(6, ENEMY_HOP_FRAMES - level);
      }
    }

    // --- Collision: circle-based enemies vs player ---
    if (!pDead && invulnTimer === 0 && pFalling === 0) {
      const pc = playerCenter();
      for (const e of enemies) {
        const ec = enemyCenter(e);
        const er = (e.type === "ball" || e.type === "coily_egg") ? BALL_R : ENEMY_R;
        if (circCollide(pc.cx, pc.cy, PLAYER_R, ec.cx, ec.cy, er)) {
          killPlayer();
          break;
        }
      }
    }
    },
    draw() {
    cls(0);

    // --- HUD (clamped to prevent overflow) ---
    text("SCORE " + score, 4, 3, 3);
    const lvlStr = "LV" + level;
    text(lvlStr, W - lvlStr.length * 5 - 4, 3, 2);

    // Lives icons (capped at 5 to prevent overflow)
    const maxLives = min(lives, 5);
    for (let i = 0; i < maxLives; i++) {
      sprT(1, 4 + i * 18, 12);
    }

    // Target indicator
    text("TARGET:", W - 58, 14, 1);
    rectf(W - 16, 13, 10, 8, targetColor);
    rect(W - 16, 13, 10, 8, 0);

    // Draw discs
    for (const disc of discs) {
      if (!disc.active) continue;
      const dp = getDiscPos(disc);
      const dsx = flr(dp.x - SS / 2);
      const dsy = flr(dp.y - SS / 2);
      if (Mono.frame % 8 < 4) {
        sprT(8, dsx, dsy);
      } else {
        sprT(8, dsx, dsy, true);
      }
    }

    // Draw pyramid (back to front)
    for (let r = 0; r < ROWS; r++) {
      for (let c = 0; c <= r; c++) {
        const p = cubePos(r, c);
        let topC = cubeColors[r][c];
        let leftC, rightC;
        if (topC === 1) { leftC = 0; rightC = 0; }
        else if (topC === 2) { leftC = 1; rightC = 1; }
        else if (topC === 3) { leftC = 2; rightC = 1; }
        else { leftC = 0; rightC = 0; }

        if (levelClearTimer > 0 && flashTimer % 8 < 4) {
          topC = 3; leftC = 2; rightC = 1;
        }
        drawCube(p.x, p.y, topC, leftC, rightC);
      }
    }

    // Draw enemies
    for (const e of enemies) {
      const ec = enemyCenter(e);
      const ex = flr(e.px - SS / 2);
      let ey = flr(e.py - CUBE_H / 2 - SS / 2);
      if (e.hopping > 0) {
        const t = e.hopping / ENEMY_HOP_FRAMES;
        ey -= flr(sin(t * 3.14159) * 12);
      }

      if (e.type === "ball" || e.type === "coily_egg") {
        sprT(e.type === "ball" ? 7 : 5, ex, ey);
      } else if (e.type === "coily") {
        sprT(6, ex, ey);
      }

      // Debug: circle hitbox
      const er = (e.type === "ball" || e.type === "coily_egg") ? BALL_R : ENEMY_R;
      dbgC(flr(ec.cx), flr(ec.cy), er);
    }

    // Draw player
    if (!pDead) {
      let px = flr(pPx - SS / 2);
      let py = flr(pPy - CUBE_H / 2 - SS / 2);

      if (pHopping > 0 && pFalling === 0 && pOnDisc === 0) {
        const t = pHopping / HOP_FRAMES;
        py -= flr(sin(t * 3.14159) * 14);
      }

      if (invulnTimer > 0 && Mono.frame % 4 < 2) {
        // blink
      } else {
        let sprId = 1;
        if (pDir === 0) sprId = 1;
        else if (pDir === 1) sprId = 2;
        else if (pDir === 2) sprId = 3;
        else if (pDir === 3) sprId = 4;
        sprT(sprId, px, py);
      }

      // Debug: circle hitbox for player
      const pc = playerCenter();
      dbgC(flr(pc.cx), flr(pc.cy), PLAYER_R);

      // Speech bubble
      if (speechTimer > 0) {
        sprT(9, px - 2, py - SS + 2);
        speechTimer--;
      }
    }

    // Level clear message
    if (levelClearTimer > 0) {
      const mw = 80, mh = 18;
      rectf(W / 2 - mw / 2, H / 2 - mh / 2, mw, mh, 0);
      rect(W / 2 - mw / 2, H / 2 - mh / 2, mw, mh, 3);
      text("LEVEL CLEAR!", W / 2 - 30, H / 2 - 4, 3);
    }
    }
  });

  // --- Game Over Scene ---
  Mono.scene(GAMEOVER, {
    init() {},
    update() {
      titleBlink = (Mono.frame % 40) < 25;
      if (btnp("a")) { Mono.go(TITLE); return; }
    },
    draw() {
      cls(0);
      text("GAME OVER", W / 2 - 24, 90, 3);
      text("SCORE " + score, W / 2 - 22, 110, 2);
      if (titleBlink) {
        text("PRESS START", W / 2 - 30, 140, 3);
      }
    }
  });

  Mono.go(TITLE);
  Mono.boot("screen");
})();
</script>
