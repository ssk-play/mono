<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mono — Demo: Galaga</title>
<link rel="stylesheet" href="../../runtime/mono.css">
</head>
<body>
<div id="frame">
  <canvas id="screen"></canvas>
</div>
<div id="controls">
  <span>←→</span> MOVE &nbsp;&nbsp; <span>A</span> SHOOT
</div>
<script src="../../runtime/engine.js"></script>
<script>
(() => {
  "use strict";
  const W = Mono.WIDTH, H = Mono.HEIGHT;
  const { cls, pix, line, rect, rectf, circ, circf, sprite: defSprite,
          spr, text, btn, btnp, note, stop, rnd, flr, abs: _abs,
          min, max: _max, sin, cos } = Mono;

  // --- 8→16 upscale helper ---
  function up(d) {
    let o = "";
    for (let r = 0; r < 8; r++) {
      let row = "";
      for (let c = 0; c < 8; c++) {
        const ch = d[r * 8 + c];
        row += ch + ch;
      }
      o += row + row;
    }
    return o;
  }

  // --- Circle collision helper ---
  function circCollide(x1, y1, r1, x2, y2, r2) {
    const dx = x1 - x2, dy = y1 - y2;
    const dist = dx * dx + dy * dy;
    const rSum = r1 + r2;
    return dist < rSum * rSum;
  }

  // --- Rect collision helper ---
  function rectCollide(x1, y1, w1, h1, x2, y2, w2, h2) {
    return x1 + w1 > x2 && x1 < x2 + w2 && y1 + h1 > y2 && y1 < y2 + h2;
  }

  // --- Sprites (8x8 data upscaled to 16x16) ---
  // 1: Player ship (arrow up)
  defSprite(1, up(
    "00030000" +
    "00333000" +
    "00333000" +
    "03333300" +
    "33333330" +
    "33311330" +
    "33000030" +
    "01000010"
  ));
  // 2: Enemy type A — bug/bee
  defSprite(2, up(
    "03000030" +
    "00300300" +
    "03333300" +
    "32333230" +
    "33333330" +
    "03033030" +
    "30300303" +
    "03000030"
  ));
  // 3: Enemy type B — butterfly
  defSprite(3, up(
    "00300300" +
    "03030300" +
    "33333330" +
    "32323230" +
    "33333330" +
    "01333100" +
    "03030300" +
    "30000003"
  ));
  // 4: Boss enemy — galaga boss
  defSprite(4, up(
    "03333300" +
    "33333330" +
    "32233220" +
    "33333330" +
    "33333330" +
    "03333300" +
    "00333000" +
    "03030300"
  ));
  // 5: Player bullet
  defSprite(5, up(
    "00030000" +
    "00030000" +
    "00020000" +
    "00020000" +
    "00010000" +
    "00000000" +
    "00000000" +
    "00000000"
  ));
  // 6: Enemy bullet
  defSprite(6, up(
    "00000000" +
    "00000000" +
    "00010000" +
    "00020000" +
    "00020000" +
    "00030000" +
    "00030000" +
    "00000000"
  ));
  // 7: Explosion frame 1
  defSprite(7, up(
    "00000000" +
    "00200100" +
    "01002000" +
    "00031000" +
    "00130200" +
    "01000010" +
    "00100000" +
    "00000000"
  ));
  // 8: Explosion frame 2
  defSprite(8, up(
    "20010020" +
    "01000010" +
    "00203200" +
    "03033030" +
    "00232000" +
    "01000300" +
    "20001001" +
    "00200010"
  ));
  // 9: Life icon (small ship)
  defSprite(9, up(
    "00000000" +
    "00030000" +
    "00333000" +
    "03333300" +
    "33333330" +
    "33311330" +
    "00000000" +
    "00000000"
  ));
  // 10: Star
  defSprite(10, up(
    "00000000" +
    "00000000" +
    "00000000" +
    "00010000" +
    "00000000" +
    "00000000" +
    "00000000" +
    "00000000"
  ));

  // --- Game state ---
  const { TITLE, PLAY, GAMEOVER } = Mono.SCENE;
  let player, bullets, eBullets, enemies, explosions, particles, stars;
  let score, lives, wave, waveTimer, waveMessage;
  let shootCooldown;
  let formationX, formationDir, formationSpeed;
  let diveTimer;

  // Formation grid config (updated for 16x16 sprites)
  const FORM_COLS = 10;
  const FORM_ROWS = 4;
  const FORM_CELL_W = 20;
  const FORM_CELL_H = 20;
  const FORM_BASE_X = (W - FORM_COLS * FORM_CELL_W) / 2;
  const FORM_BASE_Y = 30;

  // Max lives icons to display (layout overflow guard)
  const MAX_LIVES_DISPLAY = 5;

  function resetGame() {
    player = { x: W / 2 - 8, y: H - 32, speed: 3 };
    bullets = [];
    eBullets = [];
    enemies = [];
    explosions = [];
    particles = [];
    score = 0;
    lives = 3;
    wave = 0;
    waveTimer = 0;
    waveMessage = 0;
    shootCooldown = 0;
    formationX = 0;
    formationDir = 1;
    formationSpeed = 0.3;
    diveTimer = 0;
    stars = [];
    for (let i = 0; i < 50; i++)
      stars.push({ x: flr(rnd(W)), y: flr(rnd(H)), speed: 0.2 + rnd(0.8), bright: flr(rnd(2)) + 1 });
    spawnWave();
  }

  function spawnWave() {
    wave++;
    waveMessage = 90;
    formationSpeed = 0.3 + wave * 0.05;
    const rows = min(FORM_ROWS + flr(wave / 3), 5);
    for (let row = 0; row < rows; row++) {
      for (let col = 0; col < FORM_COLS; col++) {
        let type, hp, pts;
        if (row === 0) { type = 4; hp = 2; pts = 40; }
        else if (row <= 1) { type = 3; hp = 1; pts = 20; }
        else { type = 2; hp = 1; pts = 10; }
        enemies.push({
          formRow: row, formCol: col,
          x: 0, y: 0,
          type: type, hp: hp, pts: pts,
          state: "forming",
          enterT: -(row * FORM_COLS + col) * 3,
          diveAngle: 0, diveSpeed: 0,
          divePath: null, diveT: 0,
          shootTimer: 60 + flr(rnd(120)),
        });
      }
    }
    diveTimer = 60 + flr(rnd(30));
  }

  function formationPos(row, col) {
    return {
      x: FORM_BASE_X + col * FORM_CELL_W + formationX,
      y: FORM_BASE_Y + row * FORM_CELL_H
    };
  }

  function addExplosion(x, y) {
    explosions.push({ x: x, y: y, timer: 12 });
    for (let i = 0; i < 8; i++)
      particles.push({
        x: x + 8, y: y + 8,
        vx: rnd(4) - 2, vy: rnd(4) - 2,
        life: 6 + flr(rnd(10)),
        color: flr(rnd(3)) + 1
      });
  }

  function shootSound() { note(0, "C6", 0.04); }
  function hitSound() { note(1, "C3", 0.06); setTimeout(() => note(1, "E3", 0.05), 40); }
  function bossHitSound() { note(1, "A4", 0.03); }
  function deathSound() {
    note(0, "C3", 0.12); note(1, "G2", 0.12);
    setTimeout(() => { note(0, "A2", 0.18); note(1, "E2", 0.18); }, 120);
  }
  function waveClearSound() {
    note(0, "C5", 0.1);
    setTimeout(() => note(0, "E5", 0.1), 100);
    setTimeout(() => note(0, "G5", 0.1), 200);
    setTimeout(() => note(0, "C6", 0.15), 300);
  }

  function startDive(enemy) {
    enemy.state = "diving";
    enemy.diveT = 0;
    const startX = enemy.x;
    const startY = enemy.y;
    const midX = startX + (rnd(133) - 67);
    const midY = H * 0.4 + rnd(45);
    const endX = player.x + (rnd(53) - 27);
    const endY = H + 20;
    enemy.divePath = { sx: startX, sy: startY, mx: midX, my: midY, ex: endX, ey: endY };
    enemy.diveSpeed = 2 + rnd(1) + wave * 0.15;
  }

  function bezier(t, a, b, c) {
    const u = 1 - t;
    return u * u * a + 2 * u * t * b + t * t * c;
  }

  function updateStarsG() {
    for (const s of stars) { s.y += s.speed; if (s.y > H) { s.y = 0; s.x = flr(rnd(W)); } }
  }

  // --- Title Scene ---
  Mono.scene(TITLE, {
    init() { resetGame(); },
    update() {
      updateStarsG();
      if (btnp("start") || btnp("a")) {
        resetGame();
        note(0, "C5", 0.1);
        setTimeout(() => note(0, "E5", 0.1), 100);
        setTimeout(() => note(0, "G5", 0.15), 200);
        Mono.go(PLAY); return;
      }
    },
    draw() {
      cls(0);
      for (const s of stars) pix(s.x, s.y, s.bright);
      const ty = 40 + sin(Mono.frame * 0.05) * 5;
      text("GALAGA", 138, flr(ty), 3);
      text("GALAGA", 139, flr(ty) + 1, 1);
      rectf(110, flr(ty) + 12, 100, 1, 2);
      const bx = W / 2 - 48;
      spr(4, bx, flr(ty) + 25 + sin(Mono.frame * 0.08) * 3);
      spr(3, bx + 24, flr(ty) + 27 + sin(Mono.frame * 0.08 + 1) * 3);
      spr(2, bx + 48, flr(ty) + 25 + sin(Mono.frame * 0.08 + 2) * 3);
      spr(3, bx + 72, flr(ty) + 27 + sin(Mono.frame * 0.08 + 3) * 3);
      spr(4, bx + 96, flr(ty) + 25 + sin(Mono.frame * 0.08 + 4) * 3);
      if (flr(Mono.frame / 20) % 2 === 0) text("PRESS START", 120, 150, 3);
      text("-SCORE TABLE-", 120, 173, 2);
      spr(4, 120, 185); text("  BOSS   40 PTS", 138, 189, 2);
      spr(3, 120, 203); text("  WING   20 PTS", 138, 207, 2);
      spr(2, 120, 221); text("  BEE    10 PTS", 138, 225, 2);
    }
  });

  // --- Game Over Scene ---
  Mono.scene(GAMEOVER, {
    init() {},
    update() {
      updateStarsG();
      for (let i = particles.length - 1; i >= 0; i--) {
        const p = particles[i]; p.x += p.vx; p.y += p.vy; p.vy += 0.08; p.life--;
        if (p.life <= 0) particles.splice(i, 1);
      }
      if (btnp("start") || btnp("a")) { Mono.go(TITLE); return; }
    },
    draw() {
      cls(0);
      for (const s of stars) pix(s.x, s.y, s.bright);
      for (const p of particles) pix(flr(p.x), flr(p.y), p.color);
      text("GAME OVER", 130, 90, 3);
      text("SCORE: " + score, 130, 109, 2);
      text("WAVE: " + wave, 140, 120, 2);
      if (flr(Mono.frame / 20) % 2 === 0) text("PRESS START", 120, 158, 3);
    }
  });

  // --- Play Scene ---
  Mono.scene(PLAY, {
    init() {},
    update() {
    updateStarsG();

    // Wave message timer
    if (waveMessage > 0) waveMessage--;

    // Player movement (left/right only, like Galaga)
    if (btn("left")) player.x -= player.speed;
    if (btn("right")) player.x += player.speed;
    player.x = _max(0, min(W - 16, player.x));

    // Player shoot
    if (shootCooldown > 0) shootCooldown--;
    if (btnp("a") && shootCooldown <= 0 && bullets.length < 2) {
      bullets.push({ x: player.x + 4, y: player.y - 8 });
      shootCooldown = 8;
      shootSound();
    }

    // Update player bullets
    for (let i = bullets.length - 1; i >= 0; i--) {
      bullets[i].y -= 6;
      if (bullets[i].y < -16) bullets.splice(i, 1);
    }

    // Formation movement (sway left/right)
    formationX += formationDir * formationSpeed;
    if (formationX > 20) { formationDir = -1; }
    if (formationX < -20) { formationDir = 1; }

    // Enemy entrance and formation
    for (let i = enemies.length - 1; i >= 0; i--) {
      const e = enemies[i];

      if (e.state === "forming") {
        e.enterT++;
        if (e.enterT < 0) continue;
        const target = formationPos(e.formRow, e.formCol);
        const flyInDuration = 30;
        if (e.enterT <= flyInDuration) {
          const t = e.enterT / flyInDuration;
          const startX = W / 2 + sin(e.formCol * 0.8) * 67;
          e.x = startX + (target.x - startX) * t;
          e.y = -16 + (target.y + 16) * t;
        } else {
          e.state = "formation";
        }
      }

      if (e.state === "formation") {
        const target = formationPos(e.formRow, e.formCol);
        e.x = target.x;
        e.y = target.y;
      }

      if (e.state === "diving") {
        e.diveT += e.diveSpeed / 200;
        if (e.diveT >= 1) {
          e.state = "returning";
          e.x = e.divePath.ex;
          e.y = -16;
          e.diveT = 0;
        } else {
          const p = e.divePath;
          e.x = bezier(e.diveT, p.sx, p.mx, p.ex);
          e.y = bezier(e.diveT, p.sy, p.my, p.ey);
        }
        // Enemy shoots while diving
        e.shootTimer--;
        if (e.shootTimer <= 0 && e.y > 0 && e.y < H - 30) {
          eBullets.push({ x: e.x + 4, y: e.y + 16 });
          e.shootTimer = 30 + flr(rnd(40));
        }
      }

      if (e.state === "returning") {
        const target = formationPos(e.formRow, e.formCol);
        e.diveT += 0.02;
        if (e.diveT >= 1) {
          e.state = "formation";
          e.x = target.x;
          e.y = target.y;
        } else {
          e.x += (target.x - e.x) * 0.05;
          e.y += (target.y - e.y) * 0.05;
        }
      }

      // Bullet-enemy collision: circle for bullets vs rect for enemies
      for (let j = bullets.length - 1; j >= 0; j--) {
        const b = bullets[j];
        // Bullet center + radius 3, enemy as 16x16 box
        const bCx = b.x + 8, bCy = b.y + 8, bR = 3;
        // Closest point on enemy rect to bullet center
        const closestX = _max(e.x, min(bCx, e.x + 16));
        const closestY = _max(e.y, min(bCy, e.y + 16));
        const dx = bCx - closestX, dy = bCy - closestY;
        if (dx * dx + dy * dy < bR * bR) {
          Mono.dbg(e.x, e.y, 16, 16);
          Mono.dbgC(bCx, bCy, bR);
          bullets.splice(j, 1);
          e.hp--;
          if (e.hp <= 0) {
            addExplosion(e.x, e.y);
            score += e.pts;
            hitSound();
            enemies.splice(i, 1);
          } else {
            bossHitSound();
          }
          break;
        }
      }
    }

    // Trigger dives
    diveTimer--;
    if (diveTimer <= 0) {
      const formEnemies = enemies.filter(e => e.state === "formation");
      if (formEnemies.length > 0) {
        const diver = formEnemies[flr(rnd(formEnemies.length))];
        startDive(diver);
      }
      diveTimer = _max(15, 50 - wave * 3) + flr(rnd(20));
    }

    // Update enemy bullets
    for (let i = eBullets.length - 1; i >= 0; i--) {
      eBullets[i].y += 3;
      if (eBullets[i].y > H + 16) { eBullets.splice(i, 1); continue; }
      const b = eBullets[i];
      // Circle vs circle: enemy bullet (r=3) vs player center (r=6)
      const bCx = b.x + 8, bCy = b.y + 8, bR = 3;
      const pCx = player.x + 8, pCy = player.y + 8, pR = 6;
      if (circCollide(bCx, bCy, bR, pCx, pCy, pR)) {
        Mono.dbgC(bCx, bCy, bR);
        Mono.dbgC(pCx, pCy, pR);
        eBullets.splice(i, 1);
        lives--;
        addExplosion(player.x, player.y);
        deathSound();
        player.x = W / 2 - 8;
        if (lives <= 0) {
          addExplosion(player.x, player.y);
          Mono.go(GAMEOVER); return;
        }
      }
    }

    // Enemy-player collision (diving enemies) — circle vs circle
    for (let i = enemies.length - 1; i >= 0; i--) {
      const e = enemies[i];
      if (e.state === "diving") {
        const eCx = e.x + 8, eCy = e.y + 8, eR = 7;
        const pCx = player.x + 8, pCy = player.y + 8, pR = 6;
        if (circCollide(eCx, eCy, eR, pCx, pCy, pR)) {
          Mono.dbgC(eCx, eCy, eR);
          Mono.dbgC(pCx, pCy, pR);
          addExplosion(e.x, e.y);
          addExplosion(player.x, player.y);
          enemies.splice(i, 1);
          lives--;
          deathSound();
          player.x = W / 2 - 8;
          if (lives <= 0) { Mono.go(GAMEOVER); return; }
        }
      }
    }

    // Explosions
    for (let i = explosions.length - 1; i >= 0; i--) {
      explosions[i].timer--;
      if (explosions[i].timer <= 0) explosions.splice(i, 1);
    }

    // Particles
    for (let i = particles.length - 1; i >= 0; i--) {
      const p = particles[i];
      p.x += p.vx; p.y += p.vy; p.vy += 0.05; p.life--;
      if (p.life <= 0) particles.splice(i, 1);
    }

    // Wave clear check
    if (enemies.length === 0) {
      waveClearSound();
      waveTimer++;
      if (waveTimer > 60) {
        waveTimer = 0;
        spawnWave();
      }
    }

    // Formation enemies randomly shoot
    for (const e of enemies) {
      if (e.state === "formation") {
        e.shootTimer--;
        if (e.shootTimer <= 0) {
          const hasBelow = enemies.some(o => o.formCol === e.formCol && o.formRow > e.formRow && o.state === "formation");
          if (!hasBelow && rnd(1) < 0.4) {
            eBullets.push({ x: e.x + 4, y: e.y + 16 });
          }
          e.shootTimer = _max(40, 120 - wave * 8) + flr(rnd(60));
        }
      }
    }
    },
    draw() {
    cls(0);
    for (const s of stars) pix(s.x, s.y, s.bright);

    // Enemy bullets
    for (const b of eBullets) {
      spr(6, flr(b.x), flr(b.y));
      Mono.dbgC(flr(b.x) + 8, flr(b.y) + 8, 3);
    }

    // Enemies
    for (const e of enemies) {
      if (e.state === "forming" && e.enterT < 0) continue;
      spr(e.type, flr(e.x), flr(e.y));
      Mono.dbg(flr(e.x), flr(e.y), 16, 16);
    }

    // Player bullets
    for (const b of bullets) {
      spr(5, flr(b.x), flr(b.y));
      Mono.dbgC(flr(b.x) + 8, flr(b.y) + 8, 3);
    }

    // Player
    spr(1, flr(player.x), flr(player.y));
    Mono.dbgC(flr(player.x) + 8, flr(player.y) + 8, 6);

    // Explosions
    for (const e of explosions) {
      const sprId = e.timer > 6 ? 7 : 8;
      spr(sprId, flr(e.x), flr(e.y));
    }

    // Particles
    for (const p of particles) pix(flr(p.x), flr(p.y), p.color);

    // HUD — stays within 320x240
    rectf(0, 0, W, 14, 0);
    text("SCORE:" + score, 4, 3, 3);
    text("WAVE:" + wave, W / 2 - 18, 3, 2);
    // Cap lives icons to MAX_LIVES_DISPLAY to prevent overflow
    const livesToShow = min(lives, MAX_LIVES_DISPLAY);
    const livesStartX = W - 4 - livesToShow * 18;
    for (let i = 0; i < livesToShow; i++) spr(9, livesStartX + i * 18, 0);
    // Show +N if capped
    if (lives > MAX_LIVES_DISPLAY) {
      text("+" + (lives - MAX_LIVES_DISPLAY), W - 4 - 20, 3, 2);
    }

    // Wave announcement — centered within screen
    if (waveMessage > 0) {
      const msgY = 113 + sin(waveMessage * 0.1) * 3;
      const waveStr = "WAVE " + wave;
      const waveX = flr((W - waveStr.length * 5) / 2);
      text(waveStr, waveX, flr(msgY), 3);
      if (waveMessage > 60) {
        text("GET READY!", flr((W - 50) / 2), flr(msgY) + 14, 2);
      }
    }
    }
  });

  Mono.go(TITLE);
  Mono.boot("screen");
})();
</script>
</body>
</html>
