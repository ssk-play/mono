  "use strict";

  const { cls, pix, line, rect, rectf, circ, circf, sprite: defSprite,

          min, max: _max, sin, cos } = Mono;

  // --- 8x8 to 16x16 upscale helper ---
  function up(d){let o="";for(let r=0;r<8;r++){let row="";for(let c=0;c<8;c++){const ch=d[r*8+c];row+=ch+ch;}o+=row+row;}return o;}

  defSprite(22, up(

  defSprite(23, up(

  ));
  // 24: Horse frame 2
  defSprite(24, up(
    "30000000" +
    "33000000" +
    "33300000" +
    "03333330" +
    "00333300" +
    "00300330" +
    "00030030" +
    "00300300"
  ));

  // --- Game State ---
  const { TITLE, PLAY, GAMEOVER } = Mono.SCENE;
  let score, lives, stage, loop;
  let scrollX, scrollSpeed, stageLen;
  let playerX, playerY, playerVY, onGround, jumping;
  let obstacles, bonuses, particles;
  let stageTimer, stageComplete, stageClearTimer;
  let invincible, invTimer;
  let animFrame;
  // Stage-specific
  let ropeY; // tightrope
  let trampolines; // trampoline positions
  let horses; // horse positions
  let trapezes; // trapeze data
  let onTrapeze, currentTrapeze, swingAngle, swingDir;

  const GROUND_Y = 195;
  const PLAYER_W = 16;
  const PLAYER_H = 16;
  const S = 16; // sprite size constant

  // Stage names
  const STAGE_NAMES = [
    "FIRE RINGS",
    "TIGHTROPE",
    "TRAMPOLINES",
    "HORSE VAULT",
    "TRAPEZE"
  ];

  function resetGame() {
    score = 0;
    lives = 3;
    stage = 0;
    loop = 0;
    initStage();
  }

  function initStage() {
    scrollX = 0;
    scrollSpeed = 1.2 + loop * 0.3;
    stageComplete = false;
    stageClearTimer = 0;
    obstacles = [];
    bonuses = [];
    particles = [];
    invincible = false;
    invTimer = 0;
    animFrame = 0;
    jumping = false;
    onGround = true;
    playerVY = 0;
    onTrapeze = false;
    currentTrapeze = -1;
    swingAngle = 0;
    swingDir = 1;

    const diff = 1 + loop * 0.3;

    if (stage === 0) {
      // Stage 1: Fire rings - lion ride
      stageLen = 1600 + loop * 267;
      playerX = 40;
      playerY = GROUND_Y - 32;
      // Generate fire rings at intervals
      for (let x = 133; x < stageLen - 67; x += 53 + flr(rnd(40))) {
        obstacles.push({ type: "fire", x: x, y: GROUND_Y - 60 - flr(rnd(12)), w: 16, h: 48 });
      }
      // Bonus items
      for (let x = 200; x < stageLen - 133; x += 100 + flr(rnd(67))) {
        bonuses.push({ type: "star", x: x, y: GROUND_Y - 82 - flr(rnd(15)), alive: true });
      }
    }
    else if (stage === 1) {
      // Stage 2: Tightrope
      stageLen = 1467 + loop * 267;
      ropeY = GROUND_Y - 90;
      playerX = 40;
      playerY = ropeY - 16;
      onGround = true;
      // Monkeys as obstacles
      for (let x = 167; x < stageLen - 67; x += 67 + flr(rnd(53))) {
        const dir = rnd(1) < 0.5 ? -1 : 1;
        obstacles.push({ type: "monkey", x: x, y: ropeY - 16, w: 16, h: 16, dir: dir, startX: x, moveRange: 20 + flr(rnd(20)) });
      }
      for (let x = 233; x < stageLen - 133; x += 120 + flr(rnd(53))) {
        bonuses.push({ type: "ball", x: x, y: ropeY - 36, alive: true });
      }
    }
    else if (stage === 2) {
      // Stage 3: Trampolines
      stageLen = 1733 + loop * 267;
      playerX = 40;
      playerY = GROUND_Y - 32;
      trampolines = [];
      // Trampolines and barrels
      let tx = 120;
      while (tx < stageLen - 67) {
        trampolines.push({ x: tx, y: GROUND_Y - 16 });
        // Barrel after some trampolines
        if (rnd(1) < 0.6) {
          obstacles.push({ type: "barrel", x: tx + 33 + flr(rnd(20)), y: GROUND_Y - 16, w: 16, h: 16 });
        }
        tx += 60 + flr(rnd(33));
      }
      for (let x = 200; x < stageLen - 133; x += 133 + flr(rnd(67))) {
        bonuses.push({ type: "star", x: x, y: GROUND_Y - 106, alive: true });
      }
    }
    else if (stage === 3) {
      // Stage 4: Horse vault
      stageLen = 1600 + loop * 267;
      playerX = 40;
      playerY = GROUND_Y - 32;
      horses = [];
      for (let x = 133; x < stageLen - 67; x += 47 + flr(rnd(27))) {
        horses.push({ x: x, y: GROUND_Y - 32, w: 32, h: 32 });
        obstacles.push({ type: "horse", x: x, y: GROUND_Y - 32, w: 32, h: 32 });
      }
      for (let x = 167; x < stageLen - 133; x += 107 + flr(rnd(53))) {
        bonuses.push({ type: "ball", x: x, y: GROUND_Y - 76, alive: true });
      }
    }
    else if (stage === 4) {
      // Stage 5: Trapeze
      stageLen = 1867 + loop * 267;
      playerX = 27;
      playerY = 75;
      trapezes = [];
      let tx = 40;
      for (let i = 0; i < 20; i++) {
        const ty = 45 + flr(rnd(30));
        trapezes.push({ x: tx, y: ty, angle: rnd(Math.PI * 2), speed: 0.04 + rnd(0.03), ropeLen: 30 + flr(rnd(15)) });
        tx += 67 + flr(rnd(40));
      }
      onTrapeze = true;
      currentTrapeze = 0;
      for (let x = 200; x < stageLen - 133; x += 133 + flr(rnd(67))) {
        bonuses.push({ type: "star", x: x, y: 45 + flr(rnd(30)), alive: true });
      }
    }

    stageTimer = 90; // show stage name
  }

  function addParticle(x, y, count, color) {
    for (let i = 0; i < count; i++) {
      particles.push({
        x: x, y: y,
        vx: rnd(4) - 2, vy: rnd(3) - 2,
        life: 8 + flr(rnd(12)),
        color: color || (flr(rnd(3)) + 1)
      });
    }
  }

  function jumpSound() { note(0, "E5", 0.06); setTimeout(() => note(0, "G5", 0.04), 50); }
  function bonusSound() { note(0, "C6", 0.05); setTimeout(() => note(0, "E6", 0.05), 50); setTimeout(() => note(0, "G6", 0.06), 100); }
  function hitSound() { note(0, "C3", 0.12); note(1, "G2", 0.12); setTimeout(() => { note(0, "A2", 0.18); }, 120); }
  function clearSound() {
    note(0, "C5", 0.1); setTimeout(() => note(0, "E5", 0.1), 100);
    setTimeout(() => note(0, "G5", 0.1), 200); setTimeout(() => note(0, "C6", 0.15), 300);
  }
  function marchSound() {
    const notes = ["C4","E4","G4","C5"];
    const n = notes[flr(Mono.frame / 8) % notes.length];
    if (Mono.frame % 8 === 0) note(1, n, 0.06);
  }

  function playerHit() {
    if (invincible) return;
    lives--;
    hitSound();
    addParticle(playerX, playerY, 12, 3);
    if (lives <= 0) {
      Mono.go(GAMEOVER); return;
    } else {
      invincible = true;
      invTimer = 60;
      playerX = 40 + scrollX;
      if (stage === 1) { playerY = ropeY - 16; }
      else if (stage === 4) { onTrapeze = true; currentTrapeze = _max(0, currentTrapeze - 1); }
      else { playerY = GROUND_Y - 32; jumping = false; playerVY = 0; onGround = true; }
    }
  }

  // --- Collision helpers ---
  function boxOverlap(ax, ay, aw, ah, bx, by, bw, bh) {
    return ax < bx + bw && ax + aw > bx && ay < by + bh && ay + ah > by;
  }

  // Circle-circle collision (for round objects like balls, stars)
  function circOverlap(ax, ay, ar, bx, by, br) {
    const dx = ax - bx, dy = ay - by;
    const dist = dx * dx + dy * dy;
    const rSum = ar + br;
    return dist < rSum * rSum;
  }

  // Circle-rect collision (player rect vs round bonus)
  function circRectOverlap(cx, cy, cr, rx, ry, rw, rh) {
    const closestX = _max(rx, min(cx, rx + rw));
    const closestY = _max(ry, min(cy, ry + rh));
    const dx = cx - closestX, dy = cy - closestY;
    return (dx * dx + dy * dy) < (cr * cr);
  }

  // --- Title Scene ---
  Mono.scene(TITLE, {
    init() {},
    update() {
      animFrame++;
      if (btnp("start") || btnp("a")) {
        note(0, "C5", 0.1);
        setTimeout(() => note(0, "E5", 0.1), 100);
        setTimeout(() => note(0, "G5", 0.15), 200);
        Mono.go(PLAY); return;
      }
    },
    draw() { cls(0); drawTitle(); }
  });

  // --- Game Over Scene ---
  Mono.scene(GAMEOVER, {
    init() {},
    update() {
      animFrame++;
      for (let i = particles.length - 1; i >= 0; i--) {
        const p = particles[i]; p.x += p.vx; p.y += p.vy; p.vy += 0.08; p.life--;
        if (p.life <= 0) particles.splice(i, 1);
      }
      if (btnp("start") || btnp("a")) { Mono.go(TITLE); return; }
    },
    draw() { cls(0); drawGameOver(); }
  });

  // --- Play Scene ---
  Mono.scene(PLAY, {
    init() { resetGame(); },
    update() {
    animFrame++;

    // Stage clear
    if (stageComplete) {
      stageClearTimer++;
      if (stageClearTimer > 90) {
        stage++;
        if (stage >= 5) { stage = 0; loop++; }
        initStage();
      }
      return;
    }

    // Stage timer
    if (stageTimer > 0) { stageTimer--; return; }

    // Invincibility
    if (invincible) { invTimer--; if (invTimer <= 0) invincible = false; }

    // March music
    marchSound();

    // Auto-scroll
    scrollX += scrollSpeed;

    // Check stage completion
    if (scrollX >= stageLen) {
      stageComplete = true;
      stageClearTimer = 0;
      clearSound();
      score += 1000;
      return;
    }

    // --- Stage-specific update ---
    if (stage === 0) updateFireRings();
    else if (stage === 1) updateTightrope();
    else if (stage === 2) updateTrampolines();
    else if (stage === 3) updateHorseVault();
    else if (stage === 4) updateTrapeze();

    // Update particles
    for (let i = particles.length - 1; i >= 0; i--) {
      const p = particles[i]; p.x += p.vx; p.y += p.vy; p.vy += 0.06; p.life--;
      if (p.life <= 0) particles.splice(i, 1);
    }

    // Bonus collection (use circle collision for round bonuses)
    for (let i = bonuses.length - 1; i >= 0; i--) {
      const b = bonuses[i];
      if (!b.alive) continue;
      const bsx = b.x - scrollX;
      const bcx = bsx + 8, bcy = b.y + 8, br = 7; // bonus center + radius
      const psx = playerX - scrollX;
      if (circRectOverlap(bcx, bcy, br, psx, playerY, PLAYER_W, PLAYER_H)) {
        b.alive = false;
        score += 200;
        bonusSound();
        addParticle(bsx + 8, b.y + 8, 6, 3);
      }
    }
    },
    draw() {
      cls(0);

      // --- Play state ---
      const camX = flr(scrollX);

      // Draw background
      drawBackground(camX);

      // Stage-specific drawing
      if (stage === 0) drawFireRingStage(camX);
      else if (stage === 1) drawTightropeStage(camX);
      else if (stage === 2) drawTrampolineStage(camX);
      else if (stage === 3) drawHorseVaultStage(camX);
      else if (stage === 4) drawTrapezeStage(camX);

      // Draw bonuses with debug
      for (const b of bonuses) {
        if (!b.alive) continue;
        const sx = b.x - camX;
        if (sx < -16 || sx > W + 16) continue;
        const bobY = b.y + sin(animFrame * 0.1) * 3;
        if (b.type === "star") spr(9, flr(sx), flr(bobY));
        else if (b.type === "ball") spr(22, flr(sx), flr(bobY));
        // Circle debug for round bonuses
        Mono.dbgC(flr(sx) + 8, flr(bobY) + 8, 7);
      }

      // Draw player
      if (!invincible || flr(animFrame / 3) % 2 === 0) {
        drawPlayer(camX);
      }
      // Player hitbox debug
      const pdbgX = flr(playerX - camX);
      const pdbgY = flr(playerY);
      Mono.dbg(pdbgX, pdbgY, PLAYER_W, PLAYER_H);

      // Draw particles
      for (const p of particles) pix(flr(p.x), flr(p.y), p.color);

      // HUD
      drawHUD();

      // Stage announcement
      if (stageTimer > 0) {
        rectf(67, 98, 187, 45, 0);
        rect(69, 100, 183, 42, 2);
        text("STAGE " + (stage + 1), 128, 109, 3);
        text(STAGE_NAMES[stage], 133 - STAGE_NAMES[stage].length * 2.5, 120, 2);
        if (loop > 0) text("LOOP " + (loop + 1), 140, 131, 1);
      }

      // Stage clear
      if (stageComplete) {
        const flash = flr(stageClearTimer / 4) % 2;
        rectf(93, 98, 133, 38, 0);
        rect(95, 100, 129, 34, flash ? 3 : 2);
        text("STAGE CLEAR!", 130, 107, 3);
        text("BONUS: 1000", 133, 119, 2);
      }

      // Progress bar (keep within 320 width)
      const progress = min(1, scrollX / stageLen);
      rectf(67, H - 10, 187, 5, 0);
      rect(67, H - 10, 187, 5, 1);
      rectf(68, H - 9, flr(185 * progress), 3, 2);
    }
  });

  // --- Stage 1: Fire Rings ---
  function updateFireRings() {
    // Player auto-runs with lion, can move slightly
    playerX = scrollX + 40;
    if (btn("right")) playerX = scrollX + 53;
    if (btn("left")) playerX = scrollX + 27;

    // Jump
    if (btnp("a") && onGround) {
      playerVY = -6.5;
      onGround = false;
      jumping = true;
      jumpSound();
    }

    if (!onGround) {
      playerVY += 0.32;
      playerY += playerVY;
      if (playerY >= GROUND_Y - 32) {
        playerY = GROUND_Y - 32;
        playerVY = 0;
        onGround = true;
        jumping = false;
      }
    }

    // Collision with fire rings
    const px = playerX;
    const py = playerY;
    for (const obs of obstacles) {
      const ox = obs.x;
      // Only check nearby
      if (_abs(ox - px) > 40) continue;
      // Fire ring: jump THROUGH the ring (pass through center OK, hit edges = damage)
      const relX = px - ox;
      if (relX > -8 && relX < 24) {
        // Inside ring horizontal zone
        if (py > obs.y - 4 && py < obs.y + 10) {
          // Hit top of ring
          playerHit(); break;
        }
        if (py + 16 > obs.y + 36 && py + 16 < obs.y + 52) {
          // Hit bottom of ring
          playerHit(); break;
        }
      }
    }
  }

  // --- Stage 2: Tightrope ---
  function updateTightrope() {
    playerX = scrollX + 40;
    if (btn("right")) playerX = scrollX + 53;
    if (btn("left")) playerX = scrollX + 27;

    // Jump
    if (btnp("a") && onGround) {
      playerVY = -5;
      onGround = false;
      jumping = true;
      jumpSound();
    }

    if (!onGround) {
      playerVY += 0.3;
      playerY += playerVY;
      if (playerY >= ropeY - 16) {
        playerY = ropeY - 16;
        playerVY = 0;
        onGround = true;
        jumping = false;
      }
    }

    // Fall off rope check (player always on rope when grounded)
    if (onGround) playerY = ropeY - 16;

    // Monkey obstacles move
    for (const obs of obstacles) {
      if (obs.type === "monkey") {
        obs.x += obs.dir * (0.5 + loop * 0.2);
        if (obs.x > obs.startX + obs.moveRange) obs.dir = -1;
        if (obs.x < obs.startX - obs.moveRange) obs.dir = 1;
      }
    }

    // Collision with monkeys
    for (const obs of obstacles) {
      const ox = obs.x;
      if (boxOverlap(playerX, playerY, PLAYER_W, PLAYER_H, ox, obs.y, obs.w, obs.h)) {
        // If jumping and above monkey, bounce off
        if (jumping && playerVY > 0 && playerY + 12 < obs.y + 8) {
          playerVY = -4;
          score += 100;
          addParticle(ox + 8, obs.y, 4, 2);
          note(0, "A5", 0.04);
        } else {
          playerHit(); break;
        }
      }
    }
  }

  // --- Stage 3: Trampolines ---
  function updateTrampolines() {
    playerX = scrollX + 40;
    if (btn("right")) playerX = scrollX + 53;
    if (btn("left")) playerX = scrollX + 27;

    // Jump / auto-bounce on trampolines
    if (btnp("a") && onGround) {
      playerVY = -7;
      onGround = false;
      jumping = true;
      jumpSound();
    }

    if (!onGround) {
      playerVY += 0.28;
      playerY += playerVY;

      // Check trampoline landing
      for (const t of trampolines) {
        const tx = t.x - scrollX;
        if (playerVY > 0 && _abs((playerX - scrollX) - tx) < 20 && playerY + 16 > t.y && playerY + 16 < t.y + 16) {
          playerVY = btn("a") ? -8.5 : -6;
          playerY = t.y - 16;
          jumpSound();
          addParticle(tx + 8, t.y, 3, 2);
          break;
        }
      }

      if (playerY >= GROUND_Y - 32) {
        playerY = GROUND_Y - 32;
        playerVY = 0;
        onGround = true;
        jumping = false;
      }
    } else {
      // Auto-bounce when walking onto a trampoline
      for (const t of trampolines) {
        const tx = t.x - scrollX;
        if (_abs((playerX - scrollX) - tx) < 18 && _abs(playerY - (t.y - 16)) < 6) {
          playerVY = -6;
          onGround = false;
          jumping = true;
          jumpSound();
          break;
        }
      }
    }

    // Barrel collision (use circle for barrel - it's round)
    for (const obs of obstacles) {
      const ox = obs.x - scrollX;
      const barrelCX = ox + 8, barrelCY = obs.y + 8, barrelR = 7;
      const psx = playerX - scrollX;
      if (circRectOverlap(barrelCX, barrelCY, barrelR, psx, playerY, PLAYER_W, PLAYER_H)) {
        if (jumping && playerVY > 0 && playerY + 8 < obs.y) {
          playerVY = -5;
          score += 100;
          addParticle(ox + 8, obs.y, 4, 2);
        } else {
          playerHit(); break;
        }
      }
    }
  }

  // --- Stage 4: Horse Vault ---
  function updateHorseVault() {
    playerX = scrollX + 40;
    if (btn("right")) playerX = scrollX + 53;
    if (btn("left")) playerX = scrollX + 27;

    if (btnp("a") && onGround) {
      playerVY = -7.5;
      onGround = false;
      jumping = true;
      jumpSound();
    }

    if (!onGround) {
      playerVY += 0.3;
      playerY += playerVY;
      if (playerY >= GROUND_Y - 32) {
        playerY = GROUND_Y - 32;
        playerVY = 0;
        onGround = true;
        jumping = false;
      }
    }

    // Horse collision - jump over or land on top
    for (const obs of obstacles) {
      const ox = obs.x;
      const relX = playerX - ox;
      if (_abs(relX) > 48) continue;
      if (boxOverlap(playerX, playerY, PLAYER_W, PLAYER_H, ox, obs.y, obs.w, obs.h)) {
        if (jumping && playerVY > 0 && playerY + 12 < obs.y + 8) {
          // Land on horse top -> bounce
          playerVY = -6;
          score += 150;
          addParticle(ox + 16, obs.y, 4, 2);
          note(0, "G5", 0.04);
        } else if (!jumping || playerVY < 0) {
          // Side collision
          playerHit(); break;
        } else {
          playerHit(); break;
        }
      }
    }
  }

  // --- Stage 5: Trapeze ---
  function updateTrapeze() {
    // Update all trapeze swinging
    for (const t of trapezes) {
      t.angle += t.speed;
    }

    if (onTrapeze && currentTrapeze >= 0 && currentTrapeze < trapezes.length) {
      const t = trapezes[currentTrapeze];
      const bx = t.x + sin(t.angle) * 20;
      const by = t.y + t.ropeLen + cos(t.angle) * 8;
      playerX = bx;
      playerY = by;

      // Jump to next trapeze
      if (btnp("a")) {
        onTrapeze = false;
        playerVY = -4 + sin(t.angle) * 2;
        const vx = cos(t.angle) * 4;
        playerX = bx;
        jumping = true;
        jumpSound();
      }

      // Auto-scroll follows player
      scrollX = _max(0, t.x - 80);
    } else {
      // Flying through air
      playerVY += 0.22;
      playerX += 2.5;
      playerY += playerVY;

      scrollX = _max(0, playerX - 80);

      // Check if can grab a trapeze (circle collision for grab zone)
      for (let i = 0; i < trapezes.length; i++) {
        if (i === currentTrapeze) continue;
        const t = trapezes[i];
        const bx = t.x + sin(t.angle) * 20;
        const by = t.y + t.ropeLen + cos(t.angle) * 8;
        const pcx = playerX + 8, pcy = playerY + 8;
        if (circOverlap(pcx, pcy, 10, bx + 4, by + 4, 10)) {
          onTrapeze = true;
          currentTrapeze = i;
          score += 100;
          note(0, "C5", 0.05);
          addParticle(bx, by, 4, 3);
          break;
        }
      }

      // Fall to death
      if (playerY > GROUND_Y + 15) {
        playerHit();
      }
    }

    // Check stage completion by scroll
    if (scrollX >= stageLen - W) {
      scrollX = stageLen;
    }
  }

  function drawBackground(camX) {
    // Circus tent stripes at top
    for (let x = 0; x < W; x += 16) {
      const stripe = (flr((x + camX * 0.1) / 16)) % 2;
      rectf(x, 0, 16, 15, stripe ? 0 : 1);
    }
    // Tent edge
    line(0, 15, W, 15, 2);
    line(0, 16, W, 16, 1);

    // Stars in the circus ceiling
    for (let i = 0; i < 15; i++) {
      const sx = ((i * 73 + camX * 0.05) % W);
      const sy = 4 + (i * 37) % 10;
      pix(flr(sx), sy, (i + flr(animFrame / 10)) % 2 ? 2 : 1);
    }

    // Ground
    if (stage !== 4) { // No ground for trapeze
      for (let x = 0; x < W; x += 16) {
        spr(23, x, GROUND_Y);
        spr(23, x, GROUND_Y + 16);
      }
    }
  }

  function drawFireRingStage(camX) {
    // Draw fire pots and fire rings
    for (const obs of obstacles) {
      const sx = obs.x - camX;
      if (sx < -32 || sx > W + 32) continue;

      // Fire pot below ring
      spr(20, flr(sx), flr(obs.y + 42));

      // Fire ring (top and bottom halves)
      spr(6, flr(sx), flr(obs.y));
      spr(7, flr(sx), flr(obs.y + 36));

      // Animated flames
      const flameOff = sin(animFrame * 0.3 + obs.x) * 2;
      spr(8, flr(sx - 8), flr(obs.y + 12 + flameOff));
      spr(8, flr(sx + 8), flr(obs.y + 16 - flameOff));

      // Flickering fire particles
      if (animFrame % 4 === 0) {
        pix(flr(sx + rnd(16)), flr(obs.y + rnd(46)), flr(rnd(2)) + 2);
      }

      // Debug: fire ring collision zones (top and bottom bars)
      Mono.dbg(flr(sx) - 8, flr(obs.y) - 4, 32, 14);
      Mono.dbg(flr(sx) - 8, flr(obs.y) + 36, 32, 16);
    }

    // Draw lion
    const lionX = playerX - camX - 16;
    const lionY = GROUND_Y - 32;
    const lionSpr = flr(animFrame / 4) % 2 === 0 ? 1 : 2;
    spr(3, flr(lionX + 16), flr(lionY - 4)); // mane/head in front
    spr(lionSpr, flr(lionX), flr(lionY));     // body
  }

  function drawTightropeStage(camX) {
    // Draw rope
    line(0, ropeY, W, ropeY, 2);
    line(0, ropeY + 1, W, ropeY + 1, 1);

    // Rope supports
    for (let x = 0; x < W + 40; x += 133) {
      const sx = x - (camX % 133);
      rectf(flr(sx), ropeY, 3, GROUND_Y - ropeY, 1);
      rectf(flr(sx) - 2, ropeY - 4, 7, 5, 2);
    }

    // Draw monkeys with debug
    for (const obs of obstacles) {
      if (obs.type !== "monkey") continue;
      const sx = obs.x - camX;
      if (sx < -16 || sx > W + 16) continue;
      const monkSpr = flr(animFrame / 6) % 2 === 0 ? 11 : 12;
      spr(monkSpr, flr(sx), flr(obs.y), obs.dir < 0);
      Mono.dbg(flr(sx), flr(obs.y), obs.w, obs.h);
    }
  }

  function drawTrampolineStage(camX) {
    // Draw trampolines
    for (const t of trampolines) {
      const sx = t.x - camX;
      if (sx < -16 || sx > W + 16) continue;
      spr(13, flr(sx), flr(t.y));
    }

    // Draw barrels with circle debug
    for (const obs of obstacles) {
      const sx = obs.x - camX;
      if (sx < -16 || sx > W + 16) continue;
      spr(14, flr(sx), flr(obs.y));
      Mono.dbgC(flr(sx) + 8, flr(obs.y) + 8, 7);
    }
  }

  function drawHorseVaultStage(camX) {
    // Draw horses with debug
    for (const obs of obstacles) {
      const sx = obs.x - camX;
      if (sx < -32 || sx > W + 32) continue;
      const horseSpr = flr(animFrame / 6) % 2 === 0 ? 15 : 24;
      spr(16, flr(sx + 16), flr(obs.y - 16)); // head
      spr(horseSpr, flr(sx), flr(obs.y));       // body
      Mono.dbg(flr(sx), flr(obs.y), obs.w, obs.h);
    }
  }

  function drawTrapezeStage(camX) {
    // Draw safety net
    for (let y = GROUND_Y; y < GROUND_Y + 15; y += 4) {
      for (let x = 0; x < W; x += 6) {
        pix(x, y, 1);
      }
    }
    line(0, GROUND_Y - 2, W, GROUND_Y - 2, 1);

    // Draw trapeze ropes and bars with debug
    for (let i = 0; i < trapezes.length; i++) {
      const t = trapezes[i];
      const sx = t.x - camX;
      if (sx < -60 || sx > W + 60) continue;

      const bx = sx + sin(t.angle) * 20;
      const by = t.y + t.ropeLen + cos(t.angle) * 8;

      // Ropes
      line(flr(sx), flr(t.y), flr(bx - 3), flr(by), 2);
      line(flr(sx), flr(t.y), flr(bx + 3), flr(by), 2);

      // Bar
      rectf(flr(bx - 4), flr(by), 8, 2, 3);

      // Ceiling anchor
      rectf(flr(sx - 1), flr(t.y - 2), 3, 4, 2);

      // Debug: grab zone circle
      Mono.dbgC(flr(bx) + 4, flr(by) + 4, 10);
    }
  }

  function drawPlayer(camX) {
    const px = flr(playerX - camX);
    const py = flr(playerY);

    if (stage === 0) {
      // Charlie on lion
      if (jumping) {
        spr(5, px, py); // jumping pose
      } else {
        spr(4, px, py - 4); // sitting on lion
      }
    } else if (stage === 1) {
      // Tightrope walker
      if (jumping) spr(5, px, py);
      else spr(10, px, py);
    } else if (stage === 2) {
      // Trampoline
      if (!onGround) spr(5, px, py);
      else spr(4, px, py);
    } else if (stage === 3) {
      // Horse vault
      if (jumping) spr(5, px, py);
      else spr(4, px, py);
    } else if (stage === 4) {
      // Trapeze
      if (onTrapeze) spr(18, px, py);
      else spr(5, px, py);
    }
  }

  function drawHUD() {
    rectf(0, 17, W, 14, 0);
    text("SCORE:" + score, 3, 19, 3);
    text("STAGE " + (stage + 1), 130, 19, 2);
    // Lives icons - cap display to prevent overflow (max 5 icons shown)
    const maxShow = min(lives, 5);
    const livesStartX = W - 8 - maxShow * 18;
    for (let i = 0; i < maxShow; i++) spr(19, livesStartX + i * 18, 17);
    if (loop > 0) {
      const loopStr = "*" + (loop + 1);
      text(loopStr, 186, 19, 1);
    }
  }

  function drawTitle() {
    // Animated tent background
    for (let x = 0; x < W; x += 16) {
      const stripe = flr((x + animFrame * 0.3) / 16) % 2;
      rectf(x, 0, 16, H, stripe ? 0 : 1);
    }

    // Spotlight effect
    circf(W / 2, H / 2, 97, 0);
    circ(W / 2, H / 2, 97, 1);
    circ(W / 2, H / 2, 98, 1);

    // Title
    const ty = 40 + sin(animFrame * 0.05) * 4;
    text("CIRCUS CHARLIE", 115, flr(ty), 3);
    text("CIRCUS CHARLIE", 116, flr(ty) + 1, 1);
    rectf(103, flr(ty) + 12, 114, 1, 2);

    // Show characters
    const bx = W / 2 - 50;
    const bounce = sin(animFrame * 0.08) * 3;

    // Lion with Charlie
    spr(3, flr(bx), flr(ty + 23 + bounce));
    spr(1, flr(bx - 10), flr(ty + 24 + bounce));
    spr(4, flr(bx - 6), flr(ty + 16 + bounce));

    // Fire ring
    spr(6, flr(bx + 30), flr(ty + 19));
    spr(7, flr(bx + 30), flr(ty + 35));
    spr(8, flr(bx + 22), flr(ty + 26 + sin(animFrame * 0.2) * 2));

    // Monkey
    const monkSpr = flr(animFrame / 8) % 2 === 0 ? 11 : 12;
    spr(monkSpr, flr(bx + 56), flr(ty + 23 + sin(animFrame * 0.1 + 1) * 3));

    // Horse
    spr(16, flr(bx + 78), flr(ty + 17 + bounce));
    spr(15, flr(bx + 70), flr(ty + 23 + bounce));

    // Star bonus
    spr(9, flr(bx + 100), flr(ty + 21 + sin(animFrame * 0.12 + 2) * 4));

    if (flr(animFrame / 20) % 2 === 0) text("PRESS START", 120, 140, 3);

    // Stage list
    text("-STAGES-", 132, 158, 2);
    text("1. FIRE RINGS", 115, 168, 2);
    text("2. TIGHTROPE", 115, 176, 2);
    text("3. TRAMPOLINES", 115, 184, 2);
    text("4. HORSE VAULT", 115, 192, 2);
    text("5. TRAPEZE", 115, 200, 2);

    text("MONO DEMO V0.1", 112, 228, 1);
  }

  function drawGameOver() {
    // Dark background
    cls(0);

    // Spotlight
    circf(W / 2, 120, 60, 0);
    circ(W / 2, 120, 60, 1);

    for (const p of particles) pix(flr(p.x), flr(p.y), p.color);

    text("GAME OVER", 130, 83, 3);
    text("SCORE: " + score, 125, 105, 2);
    text("STAGE: " + (stage + 1), 125, 116, 2);
    if (loop > 0) text("LOOP: " + (loop + 1), 125, 128, 2);
    if (flr(animFrame / 20) % 2 === 0) text("PRESS START", 115, 158, 3);
  }

  // ============================================================
  // Boot
  Mono.go(TITLE);
  Mono.boot("screen");
})();
</script>
</body>
</html>
