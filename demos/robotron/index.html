<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GrayBox — Demo: Robotron 2084</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #0a0a0a;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100vh;
    font-family: monospace;
    overflow: hidden;
  }
  #frame {
    background: #111;
    border: 3px solid #333;
    border-radius: 8px;
    padding: 12px;
    box-shadow: 0 0 40px rgba(0,0,0,0.8), inset 0 0 20px rgba(0,0,0,0.5);
  }
  canvas {
    display: block;
    image-rendering: pixelated;
    image-rendering: crisp-edges;
  }
  #controls {
    margin-top: 12px;
    color: #6b6b6b;
    font-size: 11px;
    text-align: center;
    letter-spacing: 1px;
  }
  #controls span { color: #b0b0b0; }
</style>
</head>
<body>
<div id="frame">
  <canvas id="screen"></canvas>
</div>
<div id="controls">
  <span>ARROWS</span> MOVE &nbsp;&nbsp; <span>Z</span> SHOOT &nbsp;&nbsp; <span>X</span> BOMB &nbsp;&nbsp; <span>ENTER</span> START
</div>
<script>
(() => {
  "use strict";

  // ============================================================
  // GrayBox Runtime (inline)
  // ============================================================
  const W = 480;
  const H = 320;
  const FPS = 30;
  const COLORS = ["#1a1a1a", "#6b6b6b", "#b0b0b0", "#e8e8e8"];
  const canvas = document.getElementById("screen");
  canvas.width = W;
  canvas.height = H;
  function fitCanvas() {
    var maxW = window.innerWidth - 40;
    var maxH = window.innerHeight - 60;
    var s = Math.min(maxW / W, maxH / H);
    canvas.style.width = (W * s) + "px";
    canvas.style.height = (H * s) + "px";
  }
  fitCanvas();
  window.addEventListener("resize", fitCanvas);
  const ctx = canvas.getContext("2d");
  ctx.imageSmoothingEnabled = false;
  const buf = ctx.createImageData(W, H);
  const buf32 = new Uint32Array(buf.data.buffer);

  function hexToABGR(hex) {
    const r = parseInt(hex.slice(1, 3), 16);
    const g = parseInt(hex.slice(3, 5), 16);
    const b = parseInt(hex.slice(5, 7), 16);
    return (255 << 24) | (b << 16) | (g << 8) | r;
  }
  const COLOR_U32 = COLORS.map(hexToABGR);

  const sprites = {};
  const tilemap = {};

  const keyMap = {
    "ArrowUp": "up", "ArrowDown": "down", "ArrowLeft": "left", "ArrowRight": "right",
    "w": "up", "s": "down", "a": "left", "d": "right",
    "z": "a", "Z": "a", "x": "b", "X": "b",
    "Enter": "start", " ": "a"
  };
  const keys = {};
  const keysPrev = {};

  document.addEventListener("keydown", e => {
    const k = keyMap[e.key];
    if (k) { keys[k] = true; e.preventDefault(); }
  });
  document.addEventListener("keyup", e => {
    const k = keyMap[e.key];
    if (k) { keys[k] = false; e.preventDefault(); }
  });

  let audioCtx = null;
  const channels = [null, null];
  const channelGains = [null, null];
  function ensureAudio() {
    if (!audioCtx) {
      audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      for (let i = 0; i < 2; i++) {
        channelGains[i] = audioCtx.createGain();
        channelGains[i].gain.value = 0.15;
        channelGains[i].connect(audioCtx.destination);
      }
    }
  }

  const NOTE_NAMES = ["C","C#","D","D#","E","F","F#","G","G#","A","A#","B"];
  function noteToFreq(noteStr) {
    const match = noteStr.match(/^([A-G]#?)(\d)$/);
    if (!match) return 440;
    const name = match[1];
    const octave = parseInt(match[2]);
    const semitone = NOTE_NAMES.indexOf(name);
    if (semitone === -1) return 440;
    const midi = (octave + 1) * 12 + semitone;
    return 440 * Math.pow(2, (midi - 69) / 12);
  }

  const FONT_W = 4;
  const FONT_H = 7;
  const FONT = {};
  const fontData = {
    "A":"0110100110011111100110011001","B":"1110100110101110100110011110",
    "C":"0110100110001000100001100110","D":"1100101010011001100110101100",
    "E":"1111100010001110100010001111","F":"1111100010001110100010001000",
    "G":"0111100010001011100101100111","H":"1001100110011111100110011001",
    "I":"1110010001000100010001001110","J":"0111001000100010001010100100",
    "K":"1001101011001100101010011001","L":"1000100010001000100010001111",
    "M":"1001111111011001100110011001","N":"1001110111011001100110011001",
    "O":"0110100110011001100110010110","P":"1110100110011110100010001000",
    "Q":"0110100110011001101101100001","R":"1110100110011110101010011001",
    "S":"0111100010000110000110001110","T":"1111001000100010001000100010",
    "U":"1001100110011001100110010110","V":"1001100110011001100101100110",
    "W":"1001100110011001101111011001","X":"1001100101100110011010011001",
    "Y":"1001100101100010001000100010","Z":"1111000100100100100010001111",
    "0":"0110100111011011101110010110","1":"0100110001000100010001001110",
    "2":"0110100100010010010010001111","3":"1110000100010110000110011110",
    "4":"1001100110011111000100010001","5":"1111100010001110000100011110",
    "6":"0110100010001110100110010110","7":"1111000100010010010001001000",
    "8":"0110100110010110100110010110","9":"0110100110010111000100010110",
    " ":"0000000000000000000000000000",
    ".":"0000000000000000000001000100",
    ",":"0000000000000000001000101000",
    "!":"0100010001000100000000000100",
    "?":"0110100100010010000000000010",
    "-":"0000000000001110000000000000",
    "+":"0000001001001110010000100000",
    ":":"0000010001000000010001000000",
    "/":"0001000100100010010010001000",
    "*":"0000101001001110010010100000",
    "#":"0101111101011111010100000000",
    "(":"0010010010001000010001000010",
    ")":"0100001000010001000100100100",
    "=":"0000000011110000111100000000",
    "'":"0100010010000000000000000000",
    "\"":"1010101000000000000000000000",
    "<":"0010010010001000010000100010",
    ">":"1000010000100001001001001000",
    "_":"0000000000000000000000001111",
  };
  for (const [ch, bits] of Object.entries(fontData)) {
    FONT[ch] = [];
    for (let i = 0; i < bits.length; i++) FONT[ch].push(parseInt(bits[i]));
  }

  const API = {};
  API._init = null;
  API._update = null;
  API._draw = null;
  API.frame = 0;

  API.cls = function(c = 0) { buf32.fill(COLOR_U32[c] || COLOR_U32[0]); };
  API.pix = function(x, y, c) {
    x = Math.floor(x); y = Math.floor(y);
    if (x < 0 || x >= W || y < 0 || y >= H) return;
    buf32[y * W + x] = COLOR_U32[c] || COLOR_U32[0];
  };
  API.line = function(x0, y0, x1, y1, c) {
    x0=Math.floor(x0); y0=Math.floor(y0); x1=Math.floor(x1); y1=Math.floor(y1);
    const dx=Math.abs(x1-x0), dy=Math.abs(y1-y0);
    const sx=x0<x1?1:-1, sy=y0<y1?1:-1;
    let err=dx-dy;
    while(true) {
      API.pix(x0,y0,c);
      if(x0===x1&&y0===y1) break;
      const e2=2*err;
      if(e2>-dy){err-=dy;x0+=sx;}
      if(e2<dx){err+=dx;y0+=sy;}
    }
  };
  API.rect = function(x,y,w,h,c) {
    API.line(x,y,x+w-1,y,c); API.line(x+w-1,y,x+w-1,y+h-1,c);
    API.line(x+w-1,y+h-1,x,y+h-1,c); API.line(x,y+h-1,x,y,c);
  };
  API.rectf = function(x,y,w,h,c) {
    x=Math.floor(x); y=Math.floor(y);
    const col=COLOR_U32[c]||COLOR_U32[0];
    for(let py=Math.max(0,y);py<Math.min(H,y+h);py++)
      for(let px=Math.max(0,x);px<Math.min(W,x+w);px++)
        buf32[py*W+px]=col;
  };
  API.circ = function(cx,cy,r,c) {
    let x=r,y=0,d=1-r; cx=Math.floor(cx); cy=Math.floor(cy);
    while(x>=y){
      API.pix(cx+x,cy+y,c);API.pix(cx-x,cy+y,c);
      API.pix(cx+x,cy-y,c);API.pix(cx-x,cy-y,c);
      API.pix(cx+y,cy+x,c);API.pix(cx-y,cy+x,c);
      API.pix(cx+y,cy-x,c);API.pix(cx-y,cy-x,c);
      y++; if(d<0){d+=2*y+1;}else{x--;d+=2*(y-x)+1;}
    }
  };
  API.circf = function(cx,cy,r,c) {
    cx=Math.floor(cx); cy=Math.floor(cy);
    const col=COLOR_U32[c]||COLOR_U32[0]; const r2=r*r;
    for(let py=-r;py<=r;py++) for(let px=-r;px<=r;px++)
      if(px*px+py*py<=r2){ const sx=cx+px,sy=cy+py;
        if(sx>=0&&sx<W&&sy>=0&&sy<H) buf32[sy*W+sx]=col; }
  };
  API.sprite = function(id, data) {
    const arr = new Uint8Array(64); let i = 0;
    for (const ch of data) { if (ch>='0'&&ch<='3') { arr[i++]=parseInt(ch); if(i>=64) break; } }
    sprites[id] = arr;
  };
  API.spr = function(id, x, y, flipX, flipY) {
    const s=sprites[id]; if(!s) return;
    x=Math.floor(x); y=Math.floor(y);
    for(let py=0;py<8;py++) for(let px=0;px<8;px++){
      const sx=flipX?7-px:px, sy=flipY?7-py:py;
      const c=s[sy*8+sx], dx=x+px, dy=y+py;
      if(c>0 && dx>=0&&dx<W&&dy>=0&&dy<H) buf32[dy*W+dx]=COLOR_U32[c];
    }
  };
  API.text = function(str, x, y, c) {
    str=String(str).toUpperCase(); let cx=Math.floor(x); const cy=Math.floor(y);
    const col=COLOR_U32[c]||COLOR_U32[3];
    for(const ch of str){
      const glyph=FONT[ch];
      if(glyph) for(let py=0;py<FONT_H;py++) for(let px=0;px<FONT_W;px++)
        if(glyph[py*FONT_W+px]){ const dx=cx+px,dy=cy+py;
          if(dx>=0&&dx<W&&dy>=0&&dy<H) buf32[dy*W+dx]=col; }
      cx+=FONT_W+1;
    }
  };
  API.mget = function(cx,cy) { return tilemap[cx+","+cy]||0; };
  API.mset = function(cx,cy,id) { tilemap[cx+","+cy]=id; };
  API.map = function(mx,my,mw,mh,sx,sy) {
    for(let ty=0;ty<mh;ty++) for(let tx=0;tx<mw;tx++){
      const id=API.mget(mx+tx,my+ty); if(id>0) API.spr(id,sx+tx*8,sy+ty*8); }
  };
  API.btn = function(k) { return !!keys[k]; };
  API.btnp = function(k) { return !!keys[k] && !keysPrev[k]; };
  API.note = function(ch, noteStr, dur) {
    ensureAudio(); if(ch<0||ch>1) return; API.stop(ch);
    const osc=audioCtx.createOscillator(); osc.type="square";
    osc.frequency.value=noteToFreq(noteStr);
    osc.connect(channelGains[ch]); osc.start();
    osc.stop(audioCtx.currentTime+dur); channels[ch]=osc;
  };
  API.stop = function(ch) {
    if(ch===undefined){API.stop(0);API.stop(1);return;}
    if(channels[ch]){try{channels[ch].stop();}catch(e){} channels[ch]=null;}
  };
  API.rnd = function(max) { return Math.random()*max; };
  API.flr = Math.floor;
  API.abs = Math.abs;
  API.min = Math.min;
  API.max = Math.max;
  API.sin = Math.sin;
  API.cos = Math.cos;

  function tick() {
    if (API._update) API._update();
    if (API._draw) API._draw();
    ctx.putImageData(buf, 0, 0);
    for (const k in keys) keysPrev[k] = keys[k];
    API.frame++;
  }

  // ============================================================
  // Robotron 2084 Game
  // ============================================================
  const { cls, pix, line, rect, rectf, circ, circf, sprite: defSprite,
          spr, text, btn, btnp, note, stop, rnd, flr, abs: _abs,
          min, max: _max, sin, cos } = API;

  // --- Play area bounds ---
  const ARENA_X = 16;
  const ARENA_Y = 16;
  const ARENA_W = W - 32;
  const ARENA_H = H - 32;
  const ARENA_R = ARENA_X + ARENA_W;
  const ARENA_B = ARENA_Y + ARENA_H;

  // --- Sprites ---

  // 1: Player - humanoid figure
  defSprite(1,
    "00033000" +
    "00033000" +
    "00322300" +
    "03322330" +
    "00033000" +
    "00033000" +
    "00300300" +
    "00300300"
  );

  // 2: Grunt - basic robot enemy
  defSprite(2,
    "02222200" +
    "02311200" +
    "02311200" +
    "02222200" +
    "00222000" +
    "02222200" +
    "02002000" +
    "02002000"
  );

  // 3: Hulk - indestructible tank
  defSprite(3,
    "22222220" +
    "21111120" +
    "21322120" +
    "21111120" +
    "22222220" +
    "02222200" +
    "02200220" +
    "02200220"
  );

  // 4: Brain - reprograms humans
  defSprite(4,
    "00222200" +
    "02333200" +
    "23132320" +
    "23333320" +
    "23231320" +
    "02333200" +
    "00222200" +
    "00020000"
  );

  // 5: Enforcer (spawned by brains) - projectile enemy
  defSprite(5,
    "00011000" +
    "00122100" +
    "01233210" +
    "12233221" +
    "01233210" +
    "00122100" +
    "00011000" +
    "00000000"
  );

  // 6: Human - Dad
  defSprite(6,
    "00033000" +
    "00033000" +
    "00033000" +
    "00333300" +
    "00033000" +
    "00033000" +
    "00300300" +
    "03000030"
  );

  // 7: Human - Mom
  defSprite(7,
    "00033000" +
    "00033000" +
    "00033000" +
    "00333300" +
    "00333300" +
    "00333300" +
    "00300300" +
    "00300300"
  );

  // 8: Human - Kid
  defSprite(8,
    "00330000" +
    "00330000" +
    "00330000" +
    "03333000" +
    "00330000" +
    "00300000" +
    "03030000" +
    "00000000"
  );

  // 9: Electrode barrier
  defSprite(9,
    "01221200" +
    "12112120" +
    "21221210" +
    "12112120" +
    "21221210" +
    "12112120" +
    "01221200" +
    "00000000"
  );

  // 10: Player bullet (small dot)
  defSprite(10,
    "00000000" +
    "00000000" +
    "00000000" +
    "00033000" +
    "00033000" +
    "00000000" +
    "00000000" +
    "00000000"
  );

  // 11: Explosion frame 1
  defSprite(11,
    "00000000" +
    "00200100" +
    "01003000" +
    "00032100" +
    "00130200" +
    "02000010" +
    "00100000" +
    "00000000"
  );

  // 12: Explosion frame 2
  defSprite(12,
    "30010020" +
    "01000010" +
    "00203200" +
    "03033030" +
    "00232000" +
    "01000300" +
    "20001002" +
    "00200010"
  );

  // 13: Prog (reprogrammed human - zombie)
  defSprite(13,
    "00011000" +
    "00011000" +
    "00111100" +
    "01111110" +
    "00011000" +
    "00011000" +
    "00100100" +
    "01000010"
  );

  // 14: Life icon
  defSprite(14,
    "00000000" +
    "00033000" +
    "00322300" +
    "00033000" +
    "00033000" +
    "00300300" +
    "00000000" +
    "00000000"
  );

  // 15: Enemy bullet (enforcer spark)
  defSprite(15,
    "00000000" +
    "00000000" +
    "00010000" +
    "00131000" +
    "00010000" +
    "00000000" +
    "00000000" +
    "00000000"
  );

  // 16: Spheroid (spawns enforcers)
  defSprite(16,
    "00111100" +
    "01233210" +
    "12322321" +
    "13222231" +
    "12322321" +
    "01233210" +
    "00111100" +
    "00000000"
  );

  // --- Game state ---
  let state = "title";
  let player, bullets, enemies, humans, electrodes, explosions, particles;
  let eBullets;
  let score, lives, wave, waveTimer, waveMessage;
  let shootCooldown, shootDir;
  let hiScore = 0;
  let titlePulse = 0;
  let invincible = 0;
  let screenShake = 0;
  let bonusTextList = [];

  function resetGame() {
    player = { x: W / 2 - 4, y: H / 2 - 4, speed: 2.5 };
    bullets = [];
    enemies = [];
    humans = [];
    electrodes = [];
    explosions = [];
    particles = [];
    eBullets = [];
    bonusTextList = [];
    score = 0;
    lives = 3;
    wave = 0;
    waveTimer = 0;
    waveMessage = 0;
    shootCooldown = 0;
    shootDir = { x: 0, y: -1 };
    invincible = 60;
    screenShake = 0;
    spawnWave();
  }

  function spawnWave() {
    wave++;
    waveMessage = 90;
    enemies = [];
    humans = [];
    electrodes = [];
    eBullets = [];
    invincible = 45;
    player.x = W / 2 - 4;
    player.y = H / 2 - 4;

    // Grunt count scales with wave
    const gruntCount = min(10 + wave * 4, 50);
    for (let i = 0; i < gruntCount; i++) {
      spawnEnemyFromEdge("grunt");
    }

    // Hulks after wave 2
    if (wave >= 2) {
      const hulkCount = min(1 + flr(wave / 2), 6);
      for (let i = 0; i < hulkCount; i++) {
        spawnEnemyFromEdge("hulk");
      }
    }

    // Brains after wave 3
    if (wave >= 3) {
      const brainCount = min(flr(wave / 2), 5);
      for (let i = 0; i < brainCount; i++) {
        spawnEnemyFromEdge("brain");
      }
    }

    // Spheroids after wave 4
    if (wave >= 4) {
      const spheroidCount = min(flr((wave - 2) / 2), 4);
      for (let i = 0; i < spheroidCount; i++) {
        spawnEnemyFromEdge("spheroid");
      }
    }

    // Humans (family members to rescue)
    const humanCount = min(3 + wave, 12);
    for (let i = 0; i < humanCount; i++) {
      const htype = flr(rnd(3)); // 0=dad, 1=mom, 2=kid
      const hx = ARENA_X + 30 + rnd(ARENA_W - 60);
      const hy = ARENA_Y + 30 + rnd(ARENA_H - 60);
      // Don't spawn too close to player
      if (_abs(hx - player.x) < 50 && _abs(hy - player.y) < 50) continue;
      humans.push({
        x: hx, y: hy, type: htype,
        dx: (rnd(1) - 0.5) * 0.5, dy: (rnd(1) - 0.5) * 0.5,
        alive: true, converting: 0
      });
    }

    // Electrodes
    const elecCount = min(2 + wave, 10);
    for (let i = 0; i < elecCount; i++) {
      const ex = ARENA_X + 20 + rnd(ARENA_W - 40);
      const ey = ARENA_Y + 20 + rnd(ARENA_H - 40);
      if (_abs(ex - player.x) < 40 && _abs(ey - player.y) < 40) continue;
      electrodes.push({ x: ex, y: ey });
    }
  }

  function spawnEnemyFromEdge(type) {
    let x, y;
    const side = flr(rnd(4));
    if (side === 0) { x = ARENA_X + rnd(ARENA_W); y = ARENA_Y; }
    else if (side === 1) { x = ARENA_X + rnd(ARENA_W); y = ARENA_B - 8; }
    else if (side === 2) { x = ARENA_X; y = ARENA_Y + rnd(ARENA_H); }
    else { x = ARENA_R - 8; y = ARENA_Y + rnd(ARENA_H); }

    const e = { x, y, type, hp: 1, timer: 0, dx: 0, dy: 0, spawnTimer: 0 };
    if (type === "hulk") { e.hp = 999; e.dx = (rnd(1) - 0.5); e.dy = (rnd(1) - 0.5); }
    if (type === "spheroid") { e.hp = 3; e.timer = 90 + flr(rnd(120)); }
    if (type === "brain") { e.hp = 1; e.target = null; }
    if (type === "enforcer") { e.hp = 1; e.dx = (rnd(1) - 0.5) * 2; e.dy = (rnd(1) - 0.5) * 2; e.shootTimer = 30 + flr(rnd(60)); }
    enemies.push(e);
  }

  function killableCount() {
    let count = 0;
    for (const e of enemies) {
      if (e.type !== "hulk") count++;
    }
    return count;
  }

  function spawnExplosion(x, y, big) {
    explosions.push({ x, y, timer: 0, big: big || false });
    const n = big ? 12 : 6;
    for (let i = 0; i < n; i++) {
      const a = rnd(Math.PI * 2);
      const sp = 0.5 + rnd(2);
      particles.push({
        x: x + 4, y: y + 4,
        dx: Math.cos(a) * sp, dy: Math.sin(a) * sp,
        life: 10 + flr(rnd(15)),
        c: 1 + flr(rnd(3))
      });
    }
  }

  function addBonusText(x, y, txt) {
    bonusTextList.push({ x, y, txt, timer: 45 });
  }

  function dist(a, b) {
    const dx = (a.x + 4) - (b.x + 4);
    const dy = (a.y + 4) - (b.y + 4);
    return Math.sqrt(dx * dx + dy * dy);
  }

  function collides(a, b, r) {
    return dist(a, b) < (r || 7);
  }

  // ---- UPDATE ----
  API._update = function() {
    if (state === "title") {
      titlePulse++;
      if (btnp("start")) {
        ensureAudio();
        state = "play";
        resetGame();
        note(0, "C4", 0.1);
        note(1, "E4", 0.1);
      }
      return;
    }

    if (state === "gameover") {
      if (btnp("start")) {
        state = "title";
      }
      return;
    }

    // --- PLAY state ---
    if (waveMessage > 0) {
      waveMessage--;
      if (waveMessage === 85) { note(0, "E5", 0.15); }
      if (waveMessage === 75) { note(0, "G5", 0.15); }
      if (waveMessage === 65) { note(0, "C6", 0.25); }
      return;
    }

    if (invincible > 0) invincible--;
    if (screenShake > 0) screenShake--;

    // Player movement
    let mdx = 0, mdy = 0;
    if (btn("left")) mdx = -1;
    if (btn("right")) mdx = 1;
    if (btn("up")) mdy = -1;
    if (btn("down")) mdy = 1;

    // Normalize diagonal
    if (mdx !== 0 && mdy !== 0) {
      mdx *= 0.707;
      mdy *= 0.707;
    }

    // Update shoot direction from movement if not shooting
    if ((mdx !== 0 || mdy !== 0) && !btn("a")) {
      shootDir.x = mdx > 0 ? 1 : mdx < 0 ? -1 : 0;
      shootDir.y = mdy > 0 ? 1 : mdy < 0 ? -1 : 0;
    }

    // If holding A + direction, aim in that direction
    if (btn("a") && (mdx !== 0 || mdy !== 0)) {
      shootDir.x = mdx > 0 ? 1 : mdx < 0 ? -1 : 0;
      shootDir.y = mdy > 0 ? 1 : mdy < 0 ? -1 : 0;
    }

    player.x += mdx * player.speed;
    player.y += mdy * player.speed;

    // Clamp to arena
    player.x = _max(ARENA_X + 2, min(ARENA_R - 10, player.x));
    player.y = _max(ARENA_Y + 2, min(ARENA_B - 10, player.y));

    // Shooting
    if (shootCooldown > 0) shootCooldown--;
    if (btn("a") && shootCooldown <= 0) {
      shootCooldown = 4;
      let sdx = shootDir.x, sdy = shootDir.y;
      if (sdx === 0 && sdy === 0) sdy = -1;
      // Normalize
      const len = Math.sqrt(sdx * sdx + sdy * sdy);
      sdx /= len; sdy /= len;
      bullets.push({
        x: player.x + 2, y: player.y + 2,
        dx: sdx * 6, dy: sdy * 6, life: 60
      });
      note(0, "C5", 0.03);
    }

    // Update bullets
    for (let i = bullets.length - 1; i >= 0; i--) {
      const b = bullets[i];
      b.x += b.dx;
      b.y += b.dy;
      b.life--;
      if (b.x < ARENA_X || b.x > ARENA_R || b.y < ARENA_Y || b.y > ARENA_B || b.life <= 0) {
        bullets.splice(i, 1);
        continue;
      }

      // Check electrode collision
      let hitElectrode = false;
      for (let j = electrodes.length - 1; j >= 0; j--) {
        if (collides(b, electrodes[j], 6)) {
          spawnExplosion(electrodes[j].x, electrodes[j].y, false);
          electrodes.splice(j, 1);
          bullets.splice(i, 1);
          score += 25;
          note(1, "A3", 0.05);
          hitElectrode = true;
          break;
        }
      }
      if (hitElectrode) continue;

      // Check enemy collision
      let hitEnemy = false;
      for (let j = enemies.length - 1; j >= 0; j--) {
        const e = enemies[j];
        if (collides(b, e, 6)) {
          if (e.type === "hulk") {
            // Hulk is indestructible, bullet bounces off
            bullets.splice(i, 1);
            note(1, "C2", 0.03);
            hitEnemy = true;
            // Push hulk slightly
            e.x += b.dx * 0.3;
            e.y += b.dy * 0.3;
            break;
          }
          e.hp--;
          if (e.hp <= 0) {
            let pts = 100;
            if (e.type === "brain") pts = 500;
            if (e.type === "spheroid") pts = 1000;
            if (e.type === "enforcer") pts = 150;
            score += pts;
            spawnExplosion(e.x, e.y, e.type === "spheroid");
            enemies.splice(j, 1);
            note(1, "E4", 0.06);
          } else {
            note(1, "G3", 0.03);
          }
          bullets.splice(i, 1);
          hitEnemy = true;
          break;
        }
      }
      if (hitEnemy) continue;
    }

    // Update enemies
    const pspeed = 0.6 + wave * 0.08;
    for (let i = enemies.length - 1; i >= 0; i--) {
      const e = enemies[i];
      e.timer++;

      if (e.type === "grunt") {
        // Chase player directly with some wobble
        const dx = player.x - e.x;
        const dy = player.y - e.y;
        const d = Math.sqrt(dx * dx + dy * dy) || 1;
        const speed = min(pspeed, 1.5 + wave * 0.05);
        e.x += (dx / d) * speed;
        e.y += (dy / d) * speed;
      }
      else if (e.type === "hulk") {
        // Wander around, change direction occasionally
        if (e.timer % 60 === 0) {
          e.dx = (rnd(2) - 1) * 0.8;
          e.dy = (rnd(2) - 1) * 0.8;
        }
        e.x += e.dx;
        e.y += e.dy;
        // Bounce off walls
        if (e.x < ARENA_X + 4) { e.x = ARENA_X + 4; e.dx = _abs(e.dx); }
        if (e.x > ARENA_R - 12) { e.x = ARENA_R - 12; e.dx = -_abs(e.dx); }
        if (e.y < ARENA_Y + 4) { e.y = ARENA_Y + 4; e.dy = _abs(e.dy); }
        if (e.y > ARENA_B - 12) { e.y = ARENA_B - 12; e.dy = -_abs(e.dy); }

        // Hulks kill humans they touch
        for (let j = humans.length - 1; j >= 0; j--) {
          if (humans[j].alive && collides(e, humans[j], 7)) {
            humans[j].alive = false;
            spawnExplosion(humans[j].x, humans[j].y, false);
            note(1, "C3", 0.1);
          }
        }
      }
      else if (e.type === "brain") {
        // Move toward nearest alive human, reprogram them
        let closest = null, closestD = 9999;
        for (const h of humans) {
          if (!h.alive) continue;
          const dd = dist(e, h);
          if (dd < closestD) { closestD = dd; closest = h; }
        }
        if (closest && closestD > 8) {
          const dx = closest.x - e.x;
          const dy = closest.y - e.y;
          const d = Math.sqrt(dx * dx + dy * dy) || 1;
          e.x += (dx / d) * 0.8;
          e.y += (dy / d) * 0.8;
        } else if (closest && closestD <= 8) {
          // Convert human to prog
          closest.alive = false;
          closest.converting = 0;
          // Spawn a prog (zombie) enemy
          enemies.push({
            x: closest.x, y: closest.y, type: "prog",
            hp: 1, timer: 0, dx: 0, dy: 0
          });
          note(1, "D#3", 0.15);
        } else {
          // No humans, chase player
          const dx = player.x - e.x;
          const dy = player.y - e.y;
          const d = Math.sqrt(dx * dx + dy * dy) || 1;
          e.x += (dx / d) * 0.6;
          e.y += (dy / d) * 0.6;
        }
      }
      else if (e.type === "spheroid") {
        // Float around, spawn enforcers periodically
        e.x += sin(e.timer * 0.05) * 0.8;
        e.y += cos(e.timer * 0.07) * 0.6;
        if (e.x < ARENA_X + 4) e.x = ARENA_X + 4;
        if (e.x > ARENA_R - 12) e.x = ARENA_R - 12;
        if (e.y < ARENA_Y + 4) e.y = ARENA_Y + 4;
        if (e.y > ARENA_B - 12) e.y = ARENA_B - 12;

        e.spawnTimer++;
        if (e.spawnTimer >= 120 + flr(rnd(90))) {
          e.spawnTimer = 0;
          if (enemies.filter(en => en.type === "enforcer").length < 6) {
            enemies.push({
              x: e.x, y: e.y, type: "enforcer", hp: 1, timer: 0,
              dx: (rnd(2) - 1) * 1.5, dy: (rnd(2) - 1) * 1.5,
              shootTimer: 60 + flr(rnd(60))
            });
            note(1, "F#4", 0.05);
          }
        }
      }
      else if (e.type === "enforcer") {
        // Move erratically, shoot at player
        e.x += e.dx;
        e.y += e.dy;
        if (e.timer % 30 === 0) {
          e.dx += (rnd(1) - 0.5);
          e.dy += (rnd(1) - 0.5);
          e.dx = _max(-2, min(2, e.dx));
          e.dy = _max(-2, min(2, e.dy));
        }
        if (e.x < ARENA_X + 4) { e.x = ARENA_X + 4; e.dx = _abs(e.dx); }
        if (e.x > ARENA_R - 12) { e.x = ARENA_R - 12; e.dx = -_abs(e.dx); }
        if (e.y < ARENA_Y + 4) { e.y = ARENA_Y + 4; e.dy = _abs(e.dy); }
        if (e.y > ARENA_B - 12) { e.y = ARENA_B - 12; e.dy = -_abs(e.dy); }

        e.shootTimer = (e.shootTimer || 60) - 1;
        if (e.shootTimer <= 0) {
          e.shootTimer = 45 + flr(rnd(45));
          const dx = player.x - e.x;
          const dy = player.y - e.y;
          const d = Math.sqrt(dx * dx + dy * dy) || 1;
          eBullets.push({
            x: e.x + 2, y: e.y + 2,
            dx: (dx / d) * 2.5, dy: (dy / d) * 2.5,
            life: 90
          });
          note(1, "A#2", 0.04);
        }
      }
      else if (e.type === "prog") {
        // Reprogrammed human chases player
        const dx = player.x - e.x;
        const dy = player.y - e.y;
        const d = Math.sqrt(dx * dx + dy * dy) || 1;
        e.x += (dx / d) * 1.0;
        e.y += (dy / d) * 1.0;
      }

      // Clamp enemies to arena
      e.x = _max(ARENA_X, min(ARENA_R - 8, e.x));
      e.y = _max(ARENA_Y, min(ARENA_B - 8, e.y));
    }

    // Update enemy bullets
    for (let i = eBullets.length - 1; i >= 0; i--) {
      const b = eBullets[i];
      b.x += b.dx;
      b.y += b.dy;
      b.life--;
      if (b.x < ARENA_X || b.x > ARENA_R || b.y < ARENA_Y || b.y > ARENA_B || b.life <= 0) {
        eBullets.splice(i, 1);
        continue;
      }
      // Hit player
      if (invincible <= 0 && _abs(b.x - player.x) < 6 && _abs(b.y - player.y) < 6) {
        playerDie();
        eBullets.splice(i, 1);
        break;
      }
    }

    // Update humans
    for (const h of humans) {
      if (!h.alive) continue;
      h.x += h.dx;
      h.y += h.dy;
      // Bounce off walls
      if (h.x < ARENA_X + 4) { h.x = ARENA_X + 4; h.dx = _abs(h.dx); }
      if (h.x > ARENA_R - 12) { h.x = ARENA_R - 12; h.dx = -_abs(h.dx); }
      if (h.y < ARENA_Y + 4) { h.y = ARENA_Y + 4; h.dy = _abs(h.dy); }
      if (h.y > ARENA_B - 12) { h.y = ARENA_B - 12; h.dy = -_abs(h.dy); }

      // Random direction changes
      if (flr(rnd(60)) === 0) {
        h.dx = (rnd(1) - 0.5) * 0.6;
        h.dy = (rnd(1) - 0.5) * 0.6;
      }

      // Player rescues human by touching
      if (collides(player, h, 8)) {
        h.alive = false;
        const pts = [1000, 2000, 4000, 5000];
        const humansSaved = wave; // more points as game goes on
        const bonus = pts[min(humansSaved, pts.length - 1)];
        score += bonus;
        addBonusText(h.x, h.y - 8, String(bonus));
        note(0, "C5", 0.08);
        setTimeout(() => { try { note(0, "E5", 0.08); } catch(e){} }, 80);
        setTimeout(() => { try { note(0, "G5", 0.12); } catch(e){} }, 160);
      }
    }

    // Enemy - player collision
    if (invincible <= 0) {
      for (const e of enemies) {
        if (collides(player, e, 6)) {
          playerDie();
          break;
        }
      }
      // Electrode - player collision
      for (const el of electrodes) {
        if (collides(player, el, 5)) {
          playerDie();
          break;
        }
      }
    }

    // Update explosions
    for (let i = explosions.length - 1; i >= 0; i--) {
      explosions[i].timer++;
      if (explosions[i].timer > 16) explosions.splice(i, 1);
    }

    // Update particles
    for (let i = particles.length - 1; i >= 0; i--) {
      const p = particles[i];
      p.x += p.dx;
      p.y += p.dy;
      p.life--;
      if (p.life <= 0) particles.splice(i, 1);
    }

    // Update bonus texts
    for (let i = bonusTextList.length - 1; i >= 0; i--) {
      bonusTextList[i].y -= 0.5;
      bonusTextList[i].timer--;
      if (bonusTextList[i].timer <= 0) bonusTextList.splice(i, 1);
    }

    // Check wave clear
    if (killableCount() === 0 && waveMessage <= 0) {
      spawnWave();
    }

    // High score
    if (score > hiScore) hiScore = score;
  };

  function playerDie() {
    spawnExplosion(player.x, player.y, true);
    screenShake = 12;
    lives--;
    note(0, "C3", 0.15);
    note(1, "E2", 0.2);
    if (lives <= 0) {
      state = "gameover";
      if (score > hiScore) hiScore = score;
    } else {
      invincible = 90;
      player.x = W / 2 - 4;
      player.y = H / 2 - 4;
      eBullets = [];
    }
  }

  // ---- DRAW ----
  API._draw = function() {
    cls(0);

    if (state === "title") {
      // Title screen
      const blink = (titlePulse % 40) < 25;

      // Big title
      text("ROBOTRON", W / 2 - 40, 60, 3);
      text("2084", W / 2 - 18, 75, 2);

      // Flashing robots
      if ((titlePulse % 20) < 10) {
        spr(2, W / 2 - 50, 100);
        spr(3, W / 2 - 36, 100);
        spr(4, W / 2 - 22, 100);
        spr(16, W / 2 + 10, 100);
        spr(5, W / 2 + 24, 100);
        spr(13, W / 2 + 38, 100);
      } else {
        spr(6, W / 2 - 40, 100);
        spr(7, W / 2 - 20, 100);
        spr(8, W / 2, 100);
        spr(1, W / 2 + 20, 100);
      }

      text("SAVE THE LAST HUMAN FAMILY", W / 2 - 64, 130, 2);

      if (blink) text("PRESS ENTER TO START", W / 2 - 48, 170, 3);

      text("ARROWS  MOVE", W / 2 - 50, 200, 1);
      text("Z  SHOOT IN MOVE DIR", W / 2 - 50, 212, 1);
      text("HOLD Z + ARROWS  AIM", W / 2 - 50, 224, 1);

      text("GRUNT 100  BRAIN 500", W / 2 - 50, 248, 2);
      text("ENFORCER 150  SPHEROID 1000", W / 2 - 66, 260, 2);
      text("RESCUE HUMANS FOR BONUS!", W / 2 - 60, 280, 3);

      if (hiScore > 0) {
        text("HI " + hiScore, W / 2 - 20, 300, 1);
      }

      return;
    }

    if (state === "gameover") {
      text("GAME OVER", W / 2 - 42, H / 2 - 30, 3);
      text("SCORE  " + score, W / 2 - 35, H / 2, 2);
      if (score >= hiScore) {
        text("NEW HIGH SCORE!", W / 2 - 37, H / 2 + 16, 3);
      }
      text("PRESS ENTER", W / 2 - 26, H / 2 + 40, 1);
      return;
    }

    // --- PLAY state draw ---
    let sx = 0, sy = 0;
    if (screenShake > 0) {
      sx = flr(rnd(5)) - 2;
      sy = flr(rnd(5)) - 2;
    }

    // Arena border (iconic Robotron red/white border - using grays)
    rect(ARENA_X - 1 + sx, ARENA_Y - 1 + sy, ARENA_W + 2, ARENA_H + 2, 2);
    rect(ARENA_X - 2 + sx, ARENA_Y - 2 + sy, ARENA_W + 4, ARENA_H + 4, 1);

    // Wave message
    if (waveMessage > 0) {
      text("WAVE " + wave, W / 2 - 20 + sx, H / 2 - 4 + sy, 3);
      // Still draw HUD
      drawHUD(sx, sy);
      return;
    }

    // Electrodes
    for (const el of electrodes) {
      const flicker = (API.frame + flr(el.x)) % 8 < 4;
      spr(9, el.x + sx, el.y + sy);
      if (flicker) {
        pix(el.x + 3 + sx, el.y + 3 + sy, 3);
      }
    }

    // Humans
    for (const h of humans) {
      if (!h.alive) continue;
      const sprId = 6 + h.type; // 6=dad, 7=mom, 8=kid
      // Humans flash gently
      spr(sprId, h.x + sx, h.y + sy);
    }

    // Enemies
    for (const e of enemies) {
      let sprId = 2;
      if (e.type === "grunt") sprId = 2;
      else if (e.type === "hulk") sprId = 3;
      else if (e.type === "brain") sprId = 4;
      else if (e.type === "enforcer") sprId = 5;
      else if (e.type === "spheroid") sprId = 16;
      else if (e.type === "prog") sprId = 13;
      spr(sprId, e.x + sx, e.y + sy);
    }

    // Player
    if (invincible <= 0 || (API.frame % 4) < 2) {
      spr(1, player.x + sx, player.y + sy);
    }

    // Bullets
    for (const b of bullets) {
      spr(10, b.x + sx, b.y + sy);
    }

    // Enemy bullets
    for (const b of eBullets) {
      spr(15, b.x + sx, b.y + sy);
    }

    // Explosions
    for (const ex of explosions) {
      if (ex.timer < 6) spr(11, ex.x + sx, ex.y + sy);
      else if (ex.timer < 12) spr(12, ex.x + sx, ex.y + sy);
    }

    // Particles
    for (const p of particles) {
      pix(flr(p.x) + sx, flr(p.y) + sy, p.c);
    }

    // Bonus texts
    for (const bt of bonusTextList) {
      text(bt.txt, bt.x + sx, bt.y + sy, 3);
    }

    // HUD
    drawHUD(sx, sy);
  };

  function drawHUD(sx, sy) {
    // Score
    text("SCORE " + score, 4 + sx, 4 + sy, 3);
    // Wave
    text("WAVE " + wave, W / 2 - 20 + sx, 4 + sy, 2);
    // Lives
    for (let i = 0; i < lives; i++) {
      spr(14, W - 40 + i * 10 + sx, 2 + sy);
    }
    // Human count
    const aliveHumans = humans.filter(h => h.alive).length;
    if (aliveHumans > 0) {
      text("HUMANS " + aliveHumans, W / 2 - 24 + sx, H - 10 + sy, 2);
    }
  }

  // --- Start ---
  setInterval(tick, 1000 / FPS);

})();
</script>
</body>
</html>
