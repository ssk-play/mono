<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GrayBox — Demo: Missile Command</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #0a0a0a;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100vh;
    font-family: monospace;
    overflow: hidden;
  }
  #frame {
    background: #111;
    border: 3px solid #333;
    border-radius: 8px;
    padding: 12px;
    box-shadow: 0 0 40px rgba(0,0,0,0.8), inset 0 0 20px rgba(0,0,0,0.5);
  }
  canvas {
    display: block;
    image-rendering: pixelated;
    image-rendering: crisp-edges;
  }
  #controls {
    margin-top: 12px;
    color: #6b6b6b;
    font-size: 11px;
    text-align: center;
    letter-spacing: 1px;
  }
  #controls span { color: #b0b0b0; }
</style>
</head>
<body>
<div id="frame">
  <canvas id="screen"></canvas>
</div>
<div id="controls">
  <span>ARROWS</span> AIM &nbsp;&nbsp; <span>Z</span> FIRE &nbsp;&nbsp; <span>ENTER</span> START
</div>
<script src="../../runtime/engine.js"></script>
<script>
(() => {
  "use strict";
  const W = GrayBox.WIDTH, H = GrayBox.HEIGHT;
  const { cls, pix, line, rect, rectf, circ, circf, sprite: defSprite,
          spr, text, btn, btnp, note, stop, rnd, flr, abs: _abs,
          min, max: _max, sin, cos } = GrayBox;

  // --- Sprites ---
  // 1: City (intact)
  defSprite(1,
    "00000000" +
    "00322000" +
    "03232300" +
    "03223200" +
    "32233230" +
    "32232230" +
    "33233330" +
    "33333330"
  );
  // 2: City destroyed (rubble)
  defSprite(2,
    "00000000" +
    "00000000" +
    "00000000" +
    "00000000" +
    "00100010" +
    "01010100" +
    "11011010" +
    "11111110"
  );
  // 3: Missile base
  defSprite(3,
    "00000000" +
    "00000000" +
    "00033000" +
    "00333300" +
    "03333330" +
    "33333333" +
    "22222222" +
    "22222222"
  );
  // 4: Missile base destroyed
  defSprite(4,
    "00000000" +
    "00000000" +
    "00000000" +
    "00000000" +
    "00100100" +
    "01001010" +
    "11010101" +
    "11111111"
  );
  // 5: Crosshair center
  defSprite(5,
    "00030000" +
    "00030000" +
    "00000000" +
    "33000330" +
    "33000330" +
    "00000000" +
    "00030000" +
    "00030000"
  );

  // --- Constants ---
  const GROUND_Y = 218;
  const HUD_Y = 4;
  const CURSOR_SPEED = 3;
  const CURSOR_FAST = 5;
  const EXPLOSION_MAX_R = 22;
  const EXPLOSION_GROW_SPEED = 0.8;
  const EXPLOSION_SHRINK_SPEED = 0.5;
  const COUNTER_MISSILE_SPEED = 5;
  const BONUS_CITY_SCORE = 10000;

  // City X positions (6 cities, 3 on each side of center base)
  const CITY_X = [35, 61, 88, 205, 232, 259];
  // Base X positions (left, center, right)
  const BASE_X = [13, 147, 293];
  const BASE_MAX_AMMO = 10;

  // --- Game State ---
  const { TITLE, PLAY, CLEAR, GAMEOVER } = GrayBox.SCENE;
  let cursor, cities, bases, counterMissiles, explosions, enemyMissiles;
  let score, wave, waveTimer, waveMessage, bonusTally;
  let bonusCityNext, totalScore;
  let titleFlash;

  function resetGame() {
    cursor = { x: W / 2, y: H / 2 };
    cities = [];
    for (let i = 0; i < 6; i++) cities.push({ x: CITY_X[i], alive: true });
    bases = [];
    for (let i = 0; i < 3; i++) bases.push({ x: BASE_X[i], ammo: BASE_MAX_AMMO, alive: true });
    counterMissiles = [];
    explosions = [];
    enemyMissiles = [];
    score = 0;
    totalScore = 0;
    wave = 0;
    waveTimer = 0;
    waveMessage = 0;
    bonusTally = null;
    bonusCityNext = BONUS_CITY_SCORE;
    titleFlash = 0;
  }

  function startWave() {
    wave++;
    waveTimer = 0;
    counterMissiles = [];
    explosions = [];
    enemyMissiles = [];
    // Refill base ammo
    for (const b of bases) { if (b.alive) b.ammo = BASE_MAX_AMMO; }
    // Spawn enemy missiles
    const numMissiles = min(8 + wave * 2, 30);
    const numMirv = min(flr(wave / 2), 8);
    const numSmart = min(flr((wave - 2) / 2), 5);
    const speed = 0.4 + wave * 0.08;
    for (let i = 0; i < numMissiles; i++) {
      const sx = rnd(W);
      const target = pickTarget();
      if (!target) break;
      const isMirv = i < numMirv;
      const isSmart = !isMirv && i < numMirv + numSmart;
      spawnEnemyMissile(sx, -rnd(45) - 8, target.x + 4, target.y,
        isSmart ? speed * 1.8 : speed,
        isMirv, isSmart,
        rnd(120) + i * 8 // delay before active
      );
    }
    waveMessage = 90;
  }

  function pickTarget() {
    const targets = [];
    for (const c of cities) if (c.alive) targets.push({ x: c.x, y: GROUND_Y });
    for (const b of bases) if (b.alive) targets.push({ x: b.x, y: GROUND_Y });
    if (targets.length === 0) return null;
    return targets[flr(rnd(targets.length))];
  }

  function spawnEnemyMissile(sx, sy, tx, ty, speed, mirv, smart, delay) {
    const dx = tx - sx;
    const dy = ty - sy;
    const dist = Math.sqrt(dx * dx + dy * dy);
    const vx = (dx / dist) * speed;
    const vy = (dy / dist) * speed;
    enemyMissiles.push({
      sx: sx, sy: sy, // start (for trail drawing)
      x: sx, y: sy,
      vx: vx, vy: vy,
      tx: tx, ty: ty,
      speed: speed,
      mirv: mirv,
      smart: smart,
      split: false,
      delay: delay || 0,
      active: false
    });
  }

  function findNearestBase(tx, ty) {
    let best = null;
    let bestDist = Infinity;
    for (const b of bases) {
      if (!b.alive || b.ammo <= 0) continue;
      const dx = (b.x + 4) - tx;
      const dy = (GROUND_Y + 4) - ty;
      const d = dx * dx + dy * dy;
      if (d < bestDist) { bestDist = d; best = b; }
    }
    return best;
  }

  function fireCounterMissile(targetX, targetY) {
    const base = findNearestBase(targetX, targetY);
    if (!base) return;
    base.ammo--;
    const bx = base.x + 4;
    const by = GROUND_Y;
    const dx = targetX - bx;
    const dy = targetY - by;
    const dist = Math.sqrt(dx * dx + dy * dy);
    if (dist < 1) return;
    const vx = (dx / dist) * COUNTER_MISSILE_SPEED;
    const vy = (dy / dist) * COUNTER_MISSILE_SPEED;
    counterMissiles.push({
      sx: bx, sy: by,
      x: bx, y: by,
      vx: vx, vy: vy,
      tx: targetX, ty: targetY
    });
    note(0, "E5", 0.03);
  }

  function addExplosion(x, y) {
    explosions.push({ x: x, y: y, r: 1, maxR: EXPLOSION_MAX_R, growing: true, timer: 0 });
  }

  function destroyCity(index) {
    cities[index].alive = false;
    note(1, "C2", 0.2);
    setTimeout(() => note(1, "A1", 0.3), 100);
  }

  function destroyBase(index) {
    bases[index].alive = false;
    bases[index].ammo = 0;
    note(1, "E2", 0.2);
    setTimeout(() => note(1, "C2", 0.3), 100);
  }

  function checkAllDestroyed() {
    for (const c of cities) if (c.alive) return false;
    return true;
  }

  function countSurvivingCities() {
    let n = 0;
    for (const c of cities) if (c.alive) n++;
    return n;
  }

  function countRemainingAmmo() {
    let n = 0;
    for (const b of bases) if (b.alive) n += b.ammo;
    return n;
  }

  function waveComplete() {
    // All enemy missiles gone and no active explosions expanding
    if (enemyMissiles.length > 0) return false;
    for (const e of explosions) if (e.growing) return false;
    return true;
  }

  // Sounds
  function explosionSound() {
    note(1, "C3", 0.08);
    setTimeout(() => note(1, "G2", 0.06), 30);
  }
  function bonusSound() {
    note(0, "C5", 0.08);
    setTimeout(() => note(0, "E5", 0.08), 80);
    setTimeout(() => note(0, "G5", 0.08), 160);
    setTimeout(() => note(0, "C6", 0.12), 240);
  }
  function gameOverSound() {
    note(0, "E3", 0.15); note(1, "C3", 0.15);
    setTimeout(() => { note(0, "C3", 0.2); note(1, "A2", 0.2); }, 150);
    setTimeout(() => { note(0, "A2", 0.3); note(1, "E2", 0.3); }, 350);
  }

  resetGame();

  function drawGameElements() {
    // Ground
    rectf(0, GROUND_Y, W, H - GROUND_Y, 1);
    rectf(0, GROUND_Y, W, 2, 2);

    // Draw enemy missile trails
    for (const m of enemyMissiles) {
      if (!m.active) continue;
      line(m.sx, m.sy, m.x, m.y, 2);
      pix(m.x, m.y, 3); pix(m.x - 1, m.y, 3); pix(m.x + 1, m.y, 3); pix(m.x, m.y - 1, 3);
      if (m.smart) { pix(m.x - 1, m.y - 1, 3); pix(m.x + 1, m.y - 1, 3); }
    }

    // Draw counter-missile trails
    for (const m of counterMissiles) { line(m.sx, m.sy, m.x, m.y, 3); pix(m.x, m.y, 3); }

    // Draw target markers
    for (const m of counterMissiles) {
      pix(m.tx - 1, m.ty - 1, 2); pix(m.tx + 1, m.ty - 1, 2); pix(m.tx, m.ty, 2);
      pix(m.tx - 1, m.ty + 1, 2); pix(m.tx + 1, m.ty + 1, 2);
    }

    // Draw explosions
    for (const e of explosions) {
      const r = flr(e.r);
      if (r > 0) {
        if (r > 3) circf(e.x, e.y, r, 1);
        if (r > 2) circf(e.x, e.y, flr(r * 0.7), 2);
        circf(e.x, e.y, _max(1, flr(r * 0.4)), 3);
        if (e.growing && GrayBox.frame % 3 === 0) circf(e.x, e.y, r, 3);
      }
    }

    // Draw cities
    for (let i = 0; i < 6; i++) spr(cities[i].alive ? 1 : 2, cities[i].x, GROUND_Y - 8);

    // Draw bases
    for (let i = 0; i < 3; i++) {
      spr(bases[i].alive ? 3 : 4, bases[i].x, GROUND_Y - 8);
      if (bases[i].alive) {
        const bx = bases[i].x;
        for (let a = 0; a < bases[i].ammo; a++) {
          const ax = bx + (a % 5) * 2; const ay = GROUND_Y + 4 + flr(a / 5) * 2;
          pix(ax, ay, 3);
        }
      }
    }

    // HUD
    text("SCORE:" + String(score).padStart(6, "0"), 4, HUD_Y, 3);
    text("WAVE:" + wave, W - 50, HUD_Y, 2);
  }

  function updatePlayLogic() {
    if (waveMessage > 0) waveMessage--;

    // Cursor movement
    const spd = btn("b") ? CURSOR_FAST : CURSOR_SPEED;
    if (btn("left")) cursor.x -= spd;
    if (btn("right")) cursor.x += spd;
    if (btn("up")) cursor.y -= spd;
    if (btn("down")) cursor.y += spd;
    cursor.x = _max(4, min(W - 4, cursor.x));
    cursor.y = _max(12, min(GROUND_Y - 8, cursor.y));

    if (btnp("a")) fireCounterMissile(cursor.x, cursor.y);

    // Update counter-missiles
    for (let i = counterMissiles.length - 1; i >= 0; i--) {
      const m = counterMissiles[i];
      m.x += m.vx; m.y += m.vy;
      const dx = m.x - m.tx; const dy = m.y - m.ty;
      if (dx * dx + dy * dy < COUNTER_MISSILE_SPEED * COUNTER_MISSILE_SPEED + 4) {
        addExplosion(m.tx, m.ty); explosionSound(); counterMissiles.splice(i, 1);
      }
    }

    // Update explosions
    for (let i = explosions.length - 1; i >= 0; i--) {
      const e = explosions[i];
      if (e.growing) { e.r += EXPLOSION_GROW_SPEED; if (e.r >= e.maxR) { e.growing = false; e.timer = 15; } }
      else { if (e.timer > 0) e.timer--; else { e.r -= EXPLOSION_SHRINK_SPEED; if (e.r <= 0) { explosions.splice(i, 1); continue; } } }
    }

    // Update enemy missiles
    for (let i = enemyMissiles.length - 1; i >= 0; i--) {
      const m = enemyMissiles[i];
      if (m.delay > 0) { m.delay--; continue; }
      m.active = true;
      m.x += m.vx; m.y += m.vy;
      if (m.mirv && !m.split && m.y > 60 + rnd(45)) {
        m.split = true;
        for (let j = 0; j < 2; j++) {
          const target = pickTarget();
          if (target) {
            spawnEnemyMissile(m.x, m.y, target.x + 4, target.y, m.speed * 1.1, false, false, 0);
            enemyMissiles[enemyMissiles.length - 1].active = true;
            enemyMissiles[enemyMissiles.length - 1].delay = 0;
          }
        }
      }
      let destroyed = false;
      for (const e of explosions) {
        const dx = m.x - e.x; const dy = m.y - e.y;
        if (dx * dx + dy * dy < e.r * e.r) { destroyed = true; score += 25; addExplosion(m.x, m.y); note(0, "A4", 0.03); break; }
      }
      if (destroyed) { enemyMissiles.splice(i, 1); continue; }
      if (m.y >= GROUND_Y) {
        for (let ci = 0; ci < 6; ci++) { if (!cities[ci].alive) continue; if (_abs(m.x - (cities[ci].x + 4)) < 10) { destroyCity(ci); break; } }
        for (let bi = 0; bi < 3; bi++) { if (!bases[bi].alive) continue; if (_abs(m.x - (bases[bi].x + 4)) < 10) { destroyBase(bi); break; } }
        addExplosion(m.x, GROUND_Y - 4); explosionSound(); enemyMissiles.splice(i, 1); continue;
      }
    }

    if (score >= bonusCityNext) {
      bonusCityNext += BONUS_CITY_SCORE;
      for (let i = 0; i < 6; i++) { if (!cities[i].alive) { cities[i].alive = true; bonusSound(); break; } }
    }

    if (checkAllDestroyed()) {
      if (explosions.length === 0 && enemyMissiles.length === 0) { gameOverSound(); GrayBox.go(GAMEOVER); return; }
      return;
    }

    if (waveComplete() && counterMissiles.length === 0 && waveMessage === 0) {
      waveTimer++;
      if (waveTimer > 30) { bonusTally = null; GrayBox.go(CLEAR); return; }
    }
  }

  // --- Title Scene ---
  GrayBox.scene(TITLE, {
    init() { titleFlash = 0; },
    update() {
      titleFlash++;
      if (btnp("a") || btnp("a")) {
        resetGame(); startWave();
        note(0, "C5", 0.08); setTimeout(() => note(0, "G5", 0.12), 100);
        GrayBox.go(PLAY); return;
      }
    },
    draw() {
      cls(0);
      text("MISSILE COMMAND", W / 2 - 37, 45, 3);
      text("- CITY DEFENSE -", W / 2 - 40, 59, 2);
      for (let i = 0; i < 6; i++) spr(1, 53 + i * 37, 150);
      rectf(0, 158, W, 2, 1);
      for (let i = 0; i < 5; i++) { const mx = 40 + i * 60; const my = 75 + sin(titleFlash * 0.05 + i) * 22; line(mx, my - 15, mx + 3, my, 2); }
      if (flr(titleFlash / 20) % 2 === 0) text("PRESS A", W / 2 - 27, 109, 3);
      text("ARROWS:AIM  A:FIRE  B:FAST AIM", W / 2 - 77, 188, 1);
      text("DEFEND YOUR CITIES!", W / 2 - 47, 203, 2);
    }
  });

  // --- Play Scene ---
  GrayBox.scene(PLAY, {
    init() {},
    update() {
      titleFlash++;
      updatePlayLogic();
    },
    draw() {
      cls(0);
      drawGameElements();

      // Draw crosshair cursor
      const cx = flr(cursor.x); const cy = flr(cursor.y);
      line(cx - 6, cy, cx - 2, cy, 3); line(cx + 2, cy, cx + 6, cy, 3);
      line(cx, cy - 6, cx, cy - 2, 3); line(cx, cy + 2, cx, cy + 6, 3);
      if (GrayBox.frame % 4 < 3) pix(cx, cy, 3);

      // Wave message
      if (waveMessage > 0) {
        const msg = "WAVE " + wave;
        if (waveMessage > 30 || flr(waveMessage / 5) % 2 === 0) text(msg, W / 2 - msg.length * 2.5, H / 2 - 20, 3);
        text("DEFEND YOUR CITIES!", W / 2 - 47, H / 2 - 6, 2);
      }
    }
  });

  // --- Clear (Bonus) Scene ---
  GrayBox.scene(CLEAR, {
    init() {
      bonusTally = {
        citiesLeft: countSurvivingCities(), ammoLeft: countRemainingAmmo(),
        cityCount: 0, ammoCount: 0, phase: 0, timer: 0, bonusTotal: 0
      };
    },
    update() {
      titleFlash++;
      bonusTally.timer++;
      if (bonusTally.phase === 0) {
        if (bonusTally.timer % 8 === 0 && bonusTally.cityCount < bonusTally.citiesLeft) {
          bonusTally.cityCount++; bonusTally.bonusTotal += 100; score += 100; note(0, "E5", 0.04);
        }
        if (bonusTally.cityCount >= bonusTally.citiesLeft) { bonusTally.phase = 1; bonusTally.timer = 0; }
      } else if (bonusTally.phase === 1) {
        if (bonusTally.timer % 4 === 0 && bonusTally.ammoCount < bonusTally.ammoLeft) {
          bonusTally.ammoCount++; bonusTally.bonusTotal += 5; score += 5; note(0, "C5", 0.02);
        }
        if (bonusTally.ammoCount >= bonusTally.ammoLeft) { bonusTally.phase = 2; bonusTally.timer = 0; }
      } else {
        if (bonusTally.timer > 60) {
          if (score >= bonusCityNext) {
            bonusCityNext += BONUS_CITY_SCORE;
            for (let i = 0; i < 6; i++) { if (!cities[i].alive) { cities[i].alive = true; bonusSound(); break; } }
          }
          startWave();
          GrayBox.go(PLAY); return;
        }
      }
    },
    draw() {
      cls(0);
      drawGameElements();
      if (bonusTally) {
        rectf(W / 2 - 67, 53, 134, 105, 0); rect(W / 2 - 67, 53, 134, 105, 2);
        text("BONUS POINTS", W / 2 - 30, 62, 3);
        text("CITIES:" + bonusTally.cityCount + " X 100", W / 2 - 47, 83, 2);
        for (let i = 0; i < bonusTally.cityCount; i++) spr(1, W / 2 - 40 + i * 12, 93);
        text("AMMO:" + bonusTally.ammoCount + " X 5", W / 2 - 40, 109, 2);
        text("TOTAL:" + bonusTally.bonusTotal, W / 2 - 37, 131, 3);
      }
    }
  });

  // --- Game Over Scene ---
  GrayBox.scene(GAMEOVER, {
    init() {},
    update() {
      titleFlash++;
      if (btnp("a") || btnp("a")) { GrayBox.go(TITLE); return; }
    },
    draw() {
      cls(0);
      drawGameElements();
      rectf(W / 2 - 53, H / 2 - 22, 107, 45, 0); rect(W / 2 - 53, H / 2 - 22, 107, 45, 2);
      text("GAME OVER", W / 2 - 22, H / 2 - 16, 3);
      text("THE END", W / 2 - 17, H / 2 - 2, 2);
      text("SCORE:" + String(score).padStart(6, "0"), W / 2 - 32, H / 2 + 10, 3);
    }
  });

  GrayBox.go(TITLE);
  GrayBox.boot("screen");
})();
</script>
</body>
</html>
