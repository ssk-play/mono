<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GrayBox — Demo: Lode Runner</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #0a0a0a;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100vh;
    font-family: monospace;
    overflow: hidden;
  }
  #frame {
    background: #111;
    border: 3px solid #333;
    border-radius: 8px;
    padding: 12px;
    box-shadow: 0 0 40px rgba(0,0,0,0.8), inset 0 0 20px rgba(0,0,0,0.5);
  }
  canvas {
    display: block;
    image-rendering: pixelated;
    image-rendering: crisp-edges;
  }
  #controls {
    margin-top: 12px;
    color: #6b6b6b;
    font-size: 11px;
    text-align: center;
    letter-spacing: 1px;
  }
  #controls span { color: #b0b0b0; }
</style>
</head>
<body>
<div id="frame">
  <canvas id="screen"></canvas>
</div>
<div id="controls">
  <span>ARROWS</span> MOVE &nbsp;&nbsp; <span>Z</span> DIG LEFT &nbsp;&nbsp; <span>X</span> DIG RIGHT &nbsp;&nbsp; <span>ENTER</span> START
</div>
<script>
(() => {
  "use strict";

  // ============================================================
  // GrayBox Runtime (inline)
  // ============================================================
  const W = 320;
  const H = 240;
  const FPS = 30;
  const COLORS = ["#1a1a1a", "#6b6b6b", "#b0b0b0", "#e8e8e8"];
  const canvas = document.getElementById("screen");
  canvas.width = W;
  canvas.height = H;
  function fitCanvas() {
    var maxW = window.innerWidth - 40;
    var maxH = window.innerHeight - 60;
    var s = Math.min(maxW / W, maxH / H);
    canvas.style.width = (W * s) + "px";
    canvas.style.height = (H * s) + "px";
  }
  fitCanvas();
  window.addEventListener("resize", fitCanvas);
  const ctx = canvas.getContext("2d");
  ctx.imageSmoothingEnabled = false;
  const buf = ctx.createImageData(W, H);
  const buf32 = new Uint32Array(buf.data.buffer);

  function hexToABGR(hex) {
    const r = parseInt(hex.slice(1, 3), 16);
    const g = parseInt(hex.slice(3, 5), 16);
    const b = parseInt(hex.slice(5, 7), 16);
    return (255 << 24) | (b << 16) | (g << 8) | r;
  }
  const COLOR_U32 = COLORS.map(hexToABGR);

  const sprites = {};
  const tilemap = {};

  const keyMap = {
    "ArrowUp": "up", "ArrowDown": "down", "ArrowLeft": "left", "ArrowRight": "right",
    "w": "up", "s": "down", "a": "left", "d": "right", "ㅈ": "up", "ㄴ": "down", "ㅁ": "left", "ㅇ": "right",
    "z": "a", "Z": "a", "x": "b", "X": "b", "ㅋ": "a", "ㅌ": "b",
    "Enter": "start", " ": "a"
  };
  const keys = {};
  const keysPrev = {};

  document.addEventListener("keydown", e => {
    const k = keyMap[e.key];
    if (k) { keys[k] = true; e.preventDefault(); }
  });
  document.addEventListener("keyup", e => {
    const k = keyMap[e.key];
    if (k) { keys[k] = false; e.preventDefault(); }
  });

  let audioCtx = null;
  const channels = [null, null];
  const channelGains = [null, null];
  function ensureAudio() {
    if (!audioCtx) {
      audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      for (let i = 0; i < 2; i++) {
        channelGains[i] = audioCtx.createGain();
        channelGains[i].gain.value = 0.15;
        channelGains[i].connect(audioCtx.destination);
      }
    }
  }

  const NOTE_NAMES = ["C","C#","D","D#","E","F","F#","G","G#","A","A#","B"];
  function noteToFreq(noteStr) {
    const match = noteStr.match(/^([A-G]#?)(\d)$/);
    if (!match) return 440;
    const name = match[1];
    const octave = parseInt(match[2]);
    const semitone = NOTE_NAMES.indexOf(name);
    if (semitone === -1) return 440;
    const midi = (octave + 1) * 12 + semitone;
    return 440 * Math.pow(2, (midi - 69) / 12);
  }

  const FONT_W = 4;
  const FONT_H = 7;
  const FONT = {};
  const fontData = {
    "A":"0110100110011111100110011001","B":"1110100110101110100110011110",
    "C":"0110100110001000100001100110","D":"1100101010011001100110101100",
    "E":"1111100010001110100010001111","F":"1111100010001110100010001000",
    "G":"0111100010001011100101100111","H":"1001100110011111100110011001",
    "I":"1110010001000100010001001110","J":"0111001000100010001010100100",
    "K":"1001101011001100101010011001","L":"1000100010001000100010001111",
    "M":"1001111111011001100110011001","N":"1001110111011001100110011001",
    "O":"0110100110011001100110010110","P":"1110100110011110100010001000",
    "Q":"0110100110011001101101100001","R":"1110100110011110101010011001",
    "S":"0111100010000110000110001110","T":"1111001000100010001000100010",
    "U":"1001100110011001100110010110","V":"1001100110011001100101100110",
    "W":"1001100110011001101111011001","X":"1001100101100110011010011001",
    "Y":"1001100101100010001000100010","Z":"1111000100100100100010001111",
    "0":"0110100111011011101110010110","1":"0100110001000100010001001110",
    "2":"0110100100010010010010001111","3":"1110000100010110000110011110",
    "4":"1001100110011111000100010001","5":"1111100010001110000100011110",
    "6":"0110100010001110100110010110","7":"1111000100010010010001001000",
    "8":"0110100110010110100110010110","9":"0110100110010111000100010110",
    " ":"0000000000000000000000000000",
    ".":"0000000000000000000001000100",
    ",":"0000000000000000001000101000",
    "!":"0100010001000100000000000100",
    "?":"0110100100010010000000000010",
    "-":"0000000000001110000000000000",
    "+":"0000001001001110010000100000",
    ":":"0000010001000000010001000000",
    "/":"0001000100100010010010001000",
    "*":"0000101001001110010010100000",
    "#":"0101111101011111010100000000",
    "(":"0010010010001000010001000010",
    ")":"0100001000010001000100100100",
    "=":"0000000011110000111100000000",
    "'":"0100010010000000000000000000",
    "\"":"1010101000000000000000000000",
    "<":"0010010010001000010000100010",
    ">":"1000010000100001001001001000",
    "_":"0000000000000000000000001111",
  };
  for (const [ch, bits] of Object.entries(fontData)) {
    FONT[ch] = [];
    for (let i = 0; i < bits.length; i++) FONT[ch].push(parseInt(bits[i]));
  }

  const API = {};
  API._init = null;
  API._update = null;
  API._draw = null;
  API.frame = 0;

  API.cls = function(c = 0) { buf32.fill(COLOR_U32[c] || COLOR_U32[0]); };
  API.pix = function(x, y, c) {
    x = Math.floor(x); y = Math.floor(y);
    if (x < 0 || x >= W || y < 0 || y >= H) return;
    buf32[y * W + x] = COLOR_U32[c] || COLOR_U32[0];
  };
  API.line = function(x0, y0, x1, y1, c) {
    x0=Math.floor(x0); y0=Math.floor(y0); x1=Math.floor(x1); y1=Math.floor(y1);
    const dx=Math.abs(x1-x0), dy=Math.abs(y1-y0);
    const sx=x0<x1?1:-1, sy=y0<y1?1:-1;
    let err=dx-dy;
    while(true) {
      API.pix(x0,y0,c);
      if(x0===x1&&y0===y1) break;
      const e2=2*err;
      if(e2>-dy){err-=dy;x0+=sx;}
      if(e2<dx){err+=dx;y0+=sy;}
    }
  };
  API.rect = function(x,y,w,h,c) {
    API.line(x,y,x+w-1,y,c); API.line(x+w-1,y,x+w-1,y+h-1,c);
    API.line(x+w-1,y+h-1,x,y+h-1,c); API.line(x,y+h-1,x,y,c);
  };
  API.rectf = function(x,y,w,h,c) {
    x=Math.floor(x); y=Math.floor(y);
    const col=COLOR_U32[c]||COLOR_U32[0];
    for(let py=Math.max(0,y);py<Math.min(H,y+h);py++)
      for(let px=Math.max(0,x);px<Math.min(W,x+w);px++)
        buf32[py*W+px]=col;
  };
  API.circ = function(cx,cy,r,c) {
    let x=r,y=0,d=1-r; cx=Math.floor(cx); cy=Math.floor(cy);
    while(x>=y){
      API.pix(cx+x,cy+y,c);API.pix(cx-x,cy+y,c);
      API.pix(cx+x,cy-y,c);API.pix(cx-x,cy-y,c);
      API.pix(cx+y,cy+x,c);API.pix(cx-y,cy+x,c);
      API.pix(cx+y,cy-x,c);API.pix(cx-y,cy-x,c);
      y++; if(d<0){d+=2*y+1;}else{x--;d+=2*(y-x)+1;}
    }
  };
  API.circf = function(cx,cy,r,c) {
    cx=Math.floor(cx); cy=Math.floor(cy);
    const col=COLOR_U32[c]||COLOR_U32[0]; const r2=r*r;
    for(let py=-r;py<=r;py++) for(let px=-r;px<=r;px++)
      if(px*px+py*py<=r2){ const sx=cx+px,sy=cy+py;
        if(sx>=0&&sx<W&&sy>=0&&sy<H) buf32[sy*W+sx]=col; }
  };
  API.sprite = function(id, data) {
    const arr = new Uint8Array(64); let i = 0;
    for (const ch of data) { if (ch>='0'&&ch<='3') { arr[i++]=parseInt(ch); if(i>=64) break; } }
    sprites[id] = arr;
  };
  API.spr = function(id, x, y, flipX, flipY) {
    const s=sprites[id]; if(!s) return;
    x=Math.floor(x); y=Math.floor(y);
    for(let py=0;py<8;py++) for(let px=0;px<8;px++){
      const sx=flipX?7-px:px, sy=flipY?7-py:py;
      const c=s[sy*8+sx], dx=x+px, dy=y+py;
      if(dx>=0&&dx<W&&dy>=0&&dy<H) buf32[dy*W+dx]=COLOR_U32[c];
    }
  };
  API.text = function(str, x, y, c) {
    str=String(str).toUpperCase(); let cx=Math.floor(x); const cy=Math.floor(y);
    const col=COLOR_U32[c]||COLOR_U32[3];
    for(const ch of str){
      const glyph=FONT[ch];
      if(glyph) for(let py=0;py<FONT_H;py++) for(let px=0;px<FONT_W;px++)
        if(glyph[py*FONT_W+px]){ const dx=cx+px,dy=cy+py;
          if(dx>=0&&dx<W&&dy>=0&&dy<H) buf32[dy*W+dx]=col; }
      cx+=FONT_W+1;
    }
  };
  API.mget = function(cx,cy) { return tilemap[cx+","+cy]||0; };
  API.mset = function(cx,cy,id) { tilemap[cx+","+cy]=id; };
  API.map = function(mx,my,mw,mh,sx,sy) {
    for(let ty=0;ty<mh;ty++) for(let tx=0;tx<mw;tx++){
      const id=API.mget(mx+tx,my+ty); if(id>0) API.spr(id,sx+tx*8,sy+ty*8); }
  };
  API.btn = function(k) { return !!keys[k]; };
  API.btnp = function(k) { return !!keys[k] && !keysPrev[k]; };
  API.note = function(ch, noteStr, dur) {
    ensureAudio(); if(ch<0||ch>1) return; API.stop(ch);
    const osc=audioCtx.createOscillator(); osc.type="square";
    osc.frequency.value=noteToFreq(noteStr);
    osc.connect(channelGains[ch]); osc.start();
    osc.stop(audioCtx.currentTime+dur); channels[ch]=osc;
  };
  API.stop = function(ch) {
    if(ch===undefined){API.stop(0);API.stop(1);return;}
    if(channels[ch]){try{channels[ch].stop();}catch(e){} channels[ch]=null;}
  };
  API.rnd = function(max) { return Math.random()*max; };
  API.flr = Math.floor;
  API.abs = Math.abs;
  API.min = Math.min;
  API.max = Math.max;
  API.sin = Math.sin;
  API.cos = Math.cos;

  function tick() {
    if (API._update) API._update();
    if (API._draw) API._draw();
    ctx.putImageData(buf, 0, 0);
    for (const k in keys) keysPrev[k] = keys[k];
    API.frame++;
  }

  // ============================================================
  // Lode Runner Game
  // ============================================================
  const { cls, pix, line, rect, rectf, circ, circf, sprite: defSprite,
          spr, text, btn, btnp, note, stop, rnd, flr, abs: _abs,
          min, max: _max, sin, cos } = API;

  // --- Tile constants ---
  // 0=empty, 1=brick, 2=ladder, 3=bar(rope), 4=gold, 5=solid(unbreakable), 6=exit ladder(hidden), 7=dug hole
  const T_EMPTY = 0, T_BRICK = 1, T_LADDER = 2, T_BAR = 3, T_GOLD = 4, T_SOLID = 5, T_EXIT = 6, T_DUG = 7;

  // Grid dimensions: 40 tiles wide x 27 tiles tall (320/8=40, 216/8=27, top 24px=HUD)
  const GRID_W = 40;
  const GRID_H = 27;
  const HUD_H = 24; // pixels for HUD at top
  const TILE = 8;

  // --- Sprites ---
  // 1: Brick
  defSprite(1,
    "22222222" +
    "21111112" +
    "21111112" +
    "22222222" +
    "11222222" +
    "11211112" +
    "11211112" +
    "22222222"
  );
  // 2: Ladder
  defSprite(2,
    "30000030" +
    "30000030" +
    "33333330" +
    "30000030" +
    "30000030" +
    "30000030" +
    "33333330" +
    "30000030"
  );
  // 3: Bar/rope
  defSprite(3,
    "00000000" +
    "00000000" +
    "33333333" +
    "00000000" +
    "00000000" +
    "00000000" +
    "00000000" +
    "00000000"
  );
  // 4: Gold
  defSprite(4,
    "00000000" +
    "00333000" +
    "03223300" +
    "32222230" +
    "32222230" +
    "03222300" +
    "00333000" +
    "00000000"
  );
  // 5: Solid block (unbreakable)
  defSprite(5,
    "11111111" +
    "12222221" +
    "12111121" +
    "12111121" +
    "12111121" +
    "12111121" +
    "12222221" +
    "11111111"
  );
  // 6: Exit ladder (revealed)
  defSprite(6,
    "30000030" +
    "33333330" +
    "30000030" +
    "33333330" +
    "30000030" +
    "33333330" +
    "30000030" +
    "33333330"
  );

  // 10: Player standing right
  defSprite(10,
    "00333000" +
    "00323000" +
    "00333000" +
    "03333300" +
    "30333030" +
    "00333000" +
    "00300300" +
    "00300300"
  );
  // 11: Player running right frame 1
  defSprite(11,
    "00333000" +
    "00323000" +
    "00333000" +
    "03333300" +
    "30333030" +
    "00333000" +
    "03000300" +
    "30000030"
  );
  // 12: Player climbing
  defSprite(12,
    "00333000" +
    "00323000" +
    "00333000" +
    "33333330" +
    "00333000" +
    "00333000" +
    "00300300" +
    "03000030"
  );
  // 13: Player on bar (hanging)
  defSprite(13,
    "30000030" +
    "03333300" +
    "00323000" +
    "00333000" +
    "00333000" +
    "00333000" +
    "00300300" +
    "00300300"
  );

  // 20: Enemy standing
  defSprite(20,
    "00111000" +
    "00121000" +
    "00111000" +
    "01111100" +
    "10111010" +
    "00111000" +
    "00100100" +
    "00100100"
  );
  // 21: Enemy running frame 1
  defSprite(21,
    "00111000" +
    "00121000" +
    "00111000" +
    "01111100" +
    "10111010" +
    "00111000" +
    "01000100" +
    "10000010"
  );
  // 22: Enemy climbing
  defSprite(22,
    "00111000" +
    "00121000" +
    "00111000" +
    "11111110" +
    "00111000" +
    "00111000" +
    "00100100" +
    "01000010"
  );
  // 23: Enemy trapped in hole
  defSprite(23,
    "00000000" +
    "00000000" +
    "00000000" +
    "00111000" +
    "00121000" +
    "00111000" +
    "01111100" +
    "00111000"
  );

  // 30: Life icon
  defSprite(30,
    "00000000" +
    "00330000" +
    "00320000" +
    "03333000" +
    "00330000" +
    "00300300" +
    "00000000" +
    "00000000"
  );

  // --- Dug hole sprite (crumbling brick) ---
  defSprite(7,
    "00000000" +
    "00000000" +
    "00000000" +
    "00000000" +
    "00000000" +
    "00000000" +
    "20000020" +
    "22200222"
  );

  // --- Level data ---
  // Each level is an array of strings, 40 chars wide, 27 tall
  // '.': empty, '#': brick, 'H': ladder, '-': bar, '$': gold, '=': solid, 'P': player start, 'E': enemy start, 'X': exit ladder top
  const LEVELS = [];

  // Helper to create a level from a compact representation
  function makeLevelCompact(rows) {
    // Pad/trim to GRID_W x GRID_H
    const level = [];
    for (let y = 0; y < GRID_H; y++) {
      let row = (y < rows.length) ? rows[y] : "";
      row = row.padEnd(GRID_W, ".");
      level.push(row.substring(0, GRID_W));
    }
    return level;
  }

  // Level 1: Introduction - simple platforms, ladders, few enemies
  LEVELS.push(makeLevelCompact([
    "........................................",
    ".X......................................",
    ".H......................................",
    ".H...$.$...$..$..$...$..$..$............",
    ".H.###.###.###.###.###.###.###..........",
    ".H....H......H.......H......H...........",
    ".$....H..$...H.......H..$...H...........",
    ".###..H.###..H.###...H.###..H.###.......",
    "......H......H.......H......H......E###.",
    "...$..H......H.......H..$.--H--.....H...",
    "..###.H..###.H.###...H.###..H..###..H...",
    "......H......H.......H......H.......H...",
    "......H......H.......H......H.......H...",
    ".###..H.#$#E.H.###...H.#$#..H.......H...",
    "......H......H.......H......H..$.E..H...",
    "......H......H.......H......H.###...H...",
    "......H......H.......H......H.......H...",
    "...$..H......H...$...H......H.......H...",
    ".###..H.###..H.###.--H-.....H.###...H...",
    "......H......H.......H......H.......H...",
    "......H......H.......H......H.......H...",
    ".#$#E.H.###..H.#$#...H.###..H.#$#E..H...",
    "......H......H.......H......H.......H...",
    "......H......H.......H......H.......H...",
    "......H......H.......H......H.......H...",
    "..P...H......H.......H......H.......H...",
    "===HHH========HHH========HHH=======HHH==",
  ]));

  // Level 2: More bars, tighter layout
  LEVELS.push(makeLevelCompact([
    "........................................",
    ".X......................................",
    ".H......................................",
    ".H.$..$..$.$..$..$.$..$..$.$............",
    ".H.##.##.#.##.##.#.##.##.#.##.###.......",
    ".H...H...H....H....H...H.....H..........",
    ".H.E.H.$.H....H....H...H.$...H..........",
    "####.H.#.H--##H.##-H-#.H.###.H.###......",
    ".......H....H...H....H....H......H......",
    ".......H....H...H....H....H......H.E....",
    ".#$#.--H--..H.##H.##.H.$##H.###..H.##H..",
    ".......H....H...H....H....H......H...H..",
    ".......H....H...H....H....H......H...H..",
    ".#$#E..H.##.H.--H-##.H.###H.$##.--.E#H..",
    ".......H...---..H....H....H.............",
    ".......H.........H...H.....H............",
    "..$..--H--.......H.$.H.....H............",
    ".###...H....###..H.#.H.###.H.###.E......",
    ".......H.........H...H.....H.....###H...",
    ".......H.........H...H.....H........H...",
    "..$.E..H.....$...H...H.$..H..$......H...",
    ".###...H....###..H...H.###H.###.....H...",
    ".......H.........H...H....H.........H...",
    ".......H.........H...H....H.........H...",
    ".P.....H.........H...H....H.........H...",
    ".......H.........H...H....H.........H...",
    "===HHH========HHHHHH===HHH=======HHH====",
  ]));

  // Level 3: Tricky layout with lots of bars
  LEVELS.push(makeLevelCompact([
    "........................................",
    ".X......................................",
    ".H......................................",
    ".$..$..$.$..$..$.$..$..$.$..$..$........",
    ".###.###.###.###.###.###.###.###.###....",
    "....H........H.......H........H......E#.",
    "....H........H.......H........H......H..",
    "..$.H--$.----H---$---H-$.....H.###...H..",
    ".##.H......H.........H..##...H--...--H--",
    "....H......H.........H.......H.......H..",
    ".##.H.##$..H.###.###.H.##$...H.###...H..",
    "....H......H...H.....H.......H.......H..",
    "....H......H...H.....H.......H.......H..",
    ".E#.H.###..H.##H.###.H.##E...H.###...H..",
    "....H......H...H.....H.......H.......H..",
    "....H......H...H.....H.......H.......H..",
    "..$.H--$.--H--.H.----H---$.--H--$....H..",
    ".##.H......H...H.....H.......H..##...H..",
    "....H......H...H.....H.......H.......H..",
    "....H......H...H.....H.......H...E...H..",
    "..$.H.###..H.###.###.H.###...H.###...H..",
    ".##.H......H...H.....H.......H.......H..",
    "....H......H...H.....H.......H.......H..",
    ".P..H......H...H.....H.......H.......H..",
    "....H......H...H.....H.......H.......H..",
    "....H......H...H.....H.......H.......H..",
    "===HHH=======HHHHHH======HHH========HHH=",
  ]));

  // --- Game state ---
  let state = "title";
  let player, enemies, holes, score, lives, level, goldLeft, exitOpen;
  let levelData; // current level tile array (mutable)
  let animFrame = 0;
  let deathTimer = 0;
  let levelCompleteTimer = 0;
  let playerStartX, playerStartY;

  function tileAt(tx, ty) {
    if (tx < 0 || tx >= GRID_W || ty < 0 || ty >= GRID_H) return T_SOLID;
    return levelData[ty][tx];
  }

  function setTile(tx, ty, val) {
    if (tx < 0 || tx >= GRID_W || ty < 0 || ty >= GRID_H) return;
    const row = levelData[ty];
    levelData[ty] = row.substring(0, tx) + val + row.substring(tx + 1);
  }

  function charToTile(ch) {
    switch(ch) {
      case '#': return T_BRICK;
      case 'H': return T_LADDER;
      case '-': return T_BAR;
      case '$': return T_GOLD;
      case '=': return T_SOLID;
      case 'X': return T_EXIT;
      default: return T_EMPTY;
    }
  }

  function tileToChar(t) {
    switch(t) {
      case T_BRICK: return '#';
      case T_LADDER: return 'H';
      case T_BAR: return '-';
      case T_GOLD: return '$';
      case T_SOLID: return '=';
      case T_EXIT: return 'X';
      case T_DUG: return ' ';
      default: return '.';
    }
  }

  function isSolid(tx, ty) {
    const t = tileAt(tx, ty);
    return t === T_BRICK || t === T_SOLID;
  }

  function isSupport(tx, ty) {
    // Can stand on: brick, solid, ladder (if on it), top of ladder from below
    const t = tileAt(tx, ty);
    return t === T_BRICK || t === T_SOLID || t === T_LADDER || (exitOpen && t === T_EXIT);
  }

  function isOnGround(px, py) {
    // px, py in pixels; check if feet are on solid ground
    const tx = flr(px / TILE);
    const ty = flr(py / TILE);
    const belowTy = ty + 1;
    // On ladder counts as supported
    const currentTile = tileAt(tx, ty);
    if (currentTile === T_LADDER || (exitOpen && currentTile === T_EXIT)) return true;
    // Check tile below feet
    return isSupport(tx, belowTy);
  }

  function isOnLadder(px, py) {
    const tx = flr(px / TILE);
    const ty = flr(py / TILE);
    const t = tileAt(tx, ty);
    return t === T_LADDER || (exitOpen && t === T_EXIT);
  }

  function isOnBar(px, py) {
    const tx = flr(px / TILE);
    const ty = flr(py / TILE);
    return tileAt(tx, ty) === T_BAR;
  }

  function canFall(px, py) {
    const tx = flr(px / TILE);
    const ty = flr(py / TILE);
    const currentTile = tileAt(tx, ty);
    // On ladder or bar: no falling
    if (currentTile === T_LADDER || currentTile === T_BAR || (exitOpen && currentTile === T_EXIT)) return false;
    // Check below
    const belowTile = tileAt(tx, ty + 1);
    if (belowTile === T_BRICK || belowTile === T_SOLID || belowTile === T_LADDER || (exitOpen && belowTile === T_EXIT)) return false;
    // Check for dug holes with enemies in them - these block
    return true;
  }

  function loadLevel(idx) {
    const src = LEVELS[idx % LEVELS.length];
    levelData = [];
    enemies = [];
    holes = [];
    goldLeft = 0;
    exitOpen = false;
    playerStartX = 3;
    playerStartY = 25;

    for (let y = 0; y < GRID_H; y++) {
      let row = "";
      for (let x = 0; x < GRID_W; x++) {
        const ch = src[y][x];
        if (ch === 'P') {
          playerStartX = x;
          playerStartY = y;
          row += '.';
        } else if (ch === 'E') {
          enemies.push({
            x: x * TILE, y: y * TILE,
            dir: 1, state: "run", // "run"|"climb"|"hang"|"fall"|"trapped"
            trapTimer: 0, animT: 0, carriesGold: false
          });
          row += '.';
        } else if (ch === '$') {
          goldLeft++;
          row += '$';
        } else if (ch === 'X') {
          row += 'X'; // hidden exit ladder
        } else {
          row += ch;
        }
      }
      levelData.push(row);
    }

    player = {
      x: playerStartX * TILE, y: playerStartY * TILE,
      dir: 1, state: "run", // "run"|"climb"|"hang"|"fall"
      animT: 0
    };
    deathTimer = 0;
    levelCompleteTimer = 0;
  }

  function resetGame() {
    score = 0;
    lives = 3;
    level = 0;
    loadLevel(0);
  }

  function collectGold(tx, ty) {
    if (tileAt(tx, ty) === T_GOLD) {
      setTile(tx, ty, '.');
      goldLeft--;
      score += 100;
      note(0, "E5", 0.05);
      setTimeout(() => note(0, "G5", 0.05), 50);
      if (goldLeft <= 0) {
        openExit();
      }
    }
  }

  function openExit() {
    exitOpen = true;
    note(0, "C5", 0.1);
    setTimeout(() => note(0, "E5", 0.1), 100);
    setTimeout(() => note(0, "G5", 0.1), 200);
    setTimeout(() => note(0, "C6", 0.15), 300);
  }

  function digHole(px, py, direction) {
    // direction: -1=left, 1=right
    const tx = flr(px / TILE) + direction;
    const ty = flr(py / TILE) + 1; // dig below and to the side
    if (tx < 0 || tx >= GRID_W || ty < 0 || ty >= GRID_H) return;
    // Can only dig brick tiles
    if (tileAt(tx, ty) !== T_BRICK) return;
    // Can't dig if something is on top (tile at tx, ty-1 must be empty or traversable)
    const aboveTile = tileAt(tx, ty - 1);
    if (aboveTile === T_BRICK || aboveTile === T_SOLID) return;
    // Must be standing on something solid
    if (!isOnGround(px, py)) return;

    setTile(tx, ty, ' '); // empty the tile
    holes.push({ tx: tx, ty: ty, timer: 180, regenerating: false, regTimer: 0 }); // 6 seconds to regen
    note(1, "C3", 0.06);
    setTimeout(() => note(1, "A2", 0.04), 60);
  }

  function killPlayer() {
    if (deathTimer > 0) return;
    lives--;
    deathTimer = 60;
    note(0, "C3", 0.12); note(1, "G2", 0.12);
    setTimeout(() => { note(0, "A2", 0.18); note(1, "E2", 0.18); }, 120);
  }

  function updateActor(actor, isPlayer) {
    const tx = flr(actor.x / TILE);
    const ty = flr(actor.y / TILE);
    const speed = isPlayer ? 2 : 1;

    // Falling
    if (actor.state !== "trapped" && canFall(actor.x, actor.y)) {
      actor.state = "fall";
      actor.y += 2;
      // Check if landed in a hole
      const newTy = flr(actor.y / TILE);
      const belowT = tileAt(flr(actor.x / TILE), newTy + 1);
      if (belowT === T_BRICK || belowT === T_SOLID || belowT === T_LADDER || (exitOpen && belowT === T_EXIT)) {
        actor.y = newTy * TILE;
        actor.state = "run";
      }
      // Check if enemy falls into dug hole
      if (!isPlayer) {
        for (const hole of holes) {
          if (flr(actor.x / TILE) === hole.tx && newTy === hole.ty) {
            actor.state = "trapped";
            actor.trapTimer = 150; // 5 seconds trapped
            actor.x = hole.tx * TILE;
            actor.y = hole.ty * TILE;
            // Drop gold if carrying
            if (actor.carriesGold) {
              actor.carriesGold = false;
              // Place gold at top of hole
              const goldTy = hole.ty - 1;
              if (tileAt(hole.tx, goldTy) === T_EMPTY || levelData[goldTy][hole.tx] === '.') {
                setTile(hole.tx, goldTy, '$');
                goldLeft++;
                if (exitOpen) { exitOpen = false; } // close exit if gold reappears
              }
            }
            score += 50;
            note(1, "E4", 0.06);
            return;
          }
        }
      }
      return;
    }

    if (actor.state === "trapped") {
      actor.trapTimer--;
      if (actor.trapTimer <= 0) {
        // Escape: move up out of hole
        actor.y -= TILE;
        actor.state = "run";
      }
      return;
    }

    actor.animT++;

    if (isPlayer) {
      let moved = false;

      // On ladder
      if (isOnLadder(actor.x, actor.y)) {
        if (btn("up")) {
          actor.y -= speed;
          actor.state = "climb";
          moved = true;
          // Snap X to grid
          actor.x = flr(actor.x / TILE) * TILE;
        }
        if (btn("down")) {
          const belowT = tileAt(tx, ty + 1);
          if (belowT !== T_BRICK && belowT !== T_SOLID) {
            actor.y += speed;
            actor.state = "climb";
            moved = true;
            actor.x = flr(actor.x / TILE) * TILE;
          }
        }
      } else {
        // Check for ladder below (can climb down)
        if (btn("down")) {
          const belowT = tileAt(tx, ty + 1);
          if (belowT === T_LADDER || (exitOpen && belowT === T_EXIT)) {
            actor.y += speed;
            actor.state = "climb";
            moved = true;
            actor.x = tx * TILE;
          }
        }
      }

      // On bar
      if (isOnBar(actor.x, actor.y)) {
        actor.state = "hang";
        if (btn("down")) {
          // Drop from bar
          actor.y += TILE;
          actor.state = "fall";
          moved = true;
        }
      }

      // Horizontal movement
      if (btn("left")) {
        const nextTx = flr((actor.x - speed) / TILE);
        const nextT = tileAt(nextTx, ty);
        if (!isSolid(nextTx, ty)) {
          actor.x -= speed;
          actor.dir = -1;
          if (actor.state !== "climb" && actor.state !== "hang") {
            if (isOnBar(actor.x, actor.y)) actor.state = "hang";
            else actor.state = "run";
          }
          moved = true;
        }
      }
      if (btn("right")) {
        const nextTx = flr((actor.x + speed + 7) / TILE);
        const nextT = tileAt(nextTx, ty);
        if (!isSolid(nextTx, ty)) {
          actor.x += speed;
          actor.dir = 1;
          if (actor.state !== "climb" && actor.state !== "hang") {
            if (isOnBar(actor.x, actor.y)) actor.state = "hang";
            else actor.state = "run";
          }
          moved = true;
        }
      }

      // Collect gold
      const ptx = flr(actor.x / TILE);
      const pty = flr(actor.y / TILE);
      collectGold(ptx, pty);

      // Check exit
      if (exitOpen && tileAt(ptx, pty) === T_EXIT && pty <= 1) {
        levelCompleteTimer = 60;
        note(0, "C5", 0.1);
        setTimeout(() => note(0, "E5", 0.1), 100);
        setTimeout(() => note(0, "G5", 0.1), 200);
        setTimeout(() => note(0, "C6", 0.2), 300);
      }

      // Digging
      if (btnp("a")) digHole(actor.x, actor.y, -1);
      if (btnp("b")) digHole(actor.x, actor.y, 1);

    } else {
      // Enemy AI: chase player
      updateEnemyAI(actor);
    }

    // Clamp position
    actor.x = _max(0, min((GRID_W - 1) * TILE, actor.x));
    actor.y = _max(0, min((GRID_H - 1) * TILE, actor.y));
  }

  function updateEnemyAI(enemy) {
    if (!player || deathTimer > 0) return;
    const speed = 1;
    const etx = flr(enemy.x / TILE);
    const ety = flr(enemy.y / TILE);
    const ptx = flr(player.x / TILE);
    const pty = flr(player.y / TILE);

    // Simple AI: try to get to same Y first via ladders, then chase X
    const onLadder = isOnLadder(enemy.x, enemy.y);
    const onBar = isOnBar(enemy.x, enemy.y);

    // If on bar, hang
    if (onBar && !onLadder) {
      enemy.state = "hang";
    }

    // Vertical: climb toward player if on ladder
    if (onLadder) {
      if (pty < ety) {
        enemy.y -= speed;
        enemy.state = "climb";
        enemy.x = etx * TILE;
        return;
      } else if (pty > ety) {
        const belowT = tileAt(etx, ety + 1);
        if (belowT !== T_BRICK && belowT !== T_SOLID) {
          enemy.y += speed;
          enemy.state = "climb";
          enemy.x = etx * TILE;
          return;
        }
      }
    }

    // Should we look for a ladder?
    if (pty !== ety) {
      // Find nearest ladder on this row
      let bestLadder = -1;
      let bestDist = 999;
      for (let sx = 0; sx < GRID_W; sx++) {
        const t = tileAt(sx, ety);
        const tBelow = tileAt(sx, ety + 1);
        if (t === T_LADDER || tBelow === T_LADDER) {
          const dist = _abs(sx - etx);
          if (dist < bestDist) {
            bestDist = dist;
            bestLadder = sx;
          }
        }
      }
      if (bestLadder >= 0 && bestDist < 999) {
        // Move toward ladder
        if (bestLadder < etx) {
          if (!isSolid(etx - 1, ety)) {
            enemy.x -= speed;
            enemy.dir = -1;
            enemy.state = onBar ? "hang" : "run";
          }
        } else if (bestLadder > etx) {
          if (!isSolid(flr((enemy.x + speed + 7) / TILE), ety)) {
            enemy.x += speed;
            enemy.dir = 1;
            enemy.state = onBar ? "hang" : "run";
          }
        }
        enemy.animT++;
        return;
      }
    }

    // Horizontal chase
    if (ptx < etx) {
      if (!isSolid(etx - 1, ety)) {
        enemy.x -= speed;
        enemy.dir = -1;
        enemy.state = onBar ? "hang" : "run";
      }
    } else if (ptx > etx) {
      if (!isSolid(flr((enemy.x + speed + 7) / TILE), ety)) {
        enemy.x += speed;
        enemy.dir = 1;
        enemy.state = onBar ? "hang" : "run";
      }
    }

    // Randomly pick up gold
    if (!enemy.carriesGold && tileAt(etx, ety) === T_GOLD && rnd(1) < 0.01) {
      enemy.carriesGold = true;
      setTile(etx, ety, '.');
      goldLeft--;
      if (goldLeft <= 0 && !exitOpen) {
        // Don't open exit if enemy has gold
      }
    }

    enemy.animT++;
  }

  resetGame();

  // ============================================================
  // Update
  // ============================================================
  API._update = function() {
    animFrame++;

    if (state === "title") {
      if (btnp("a") || btnp("start")) {
        state = "play";
        resetGame();
        note(0, "C5", 0.1);
        setTimeout(() => note(0, "E5", 0.1), 100);
        setTimeout(() => note(0, "G5", 0.15), 200);
      }
      return;
    }

    if (state === "gameover") {
      if (btnp("a") || btnp("start")) state = "title";
      return;
    }

    // --- Play state ---

    // Level complete
    if (levelCompleteTimer > 0) {
      levelCompleteTimer--;
      if (levelCompleteTimer <= 0) {
        level++;
        score += 500;
        loadLevel(level);
      }
      return;
    }

    // Death timer
    if (deathTimer > 0) {
      deathTimer--;
      if (deathTimer <= 0) {
        if (lives <= 0) {
          state = "gameover";
          return;
        }
        // Respawn
        loadLevel(level);
      }
      return;
    }

    // Update player
    updateActor(player, true);

    // Update enemies
    for (const e of enemies) {
      updateActor(e, false);

      // Collision with player
      if (e.state !== "trapped" && deathTimer <= 0) {
        const dx = _abs(e.x - player.x);
        const dy = _abs(e.y - player.y);
        if (dx < 6 && dy < 6) {
          killPlayer();
        }
      }
    }

    // Update holes
    for (let i = holes.length - 1; i >= 0; i--) {
      const h = holes[i];
      h.timer--;
      if (h.timer <= 30 && !h.regenerating) {
        h.regenerating = true;
      }
      if (h.timer <= 0) {
        // Regenerate brick
        setTile(h.tx, h.ty, '#');
        // Kill any enemy still in the hole
        for (const e of enemies) {
          if (e.state === "trapped" && flr(e.x / TILE) === h.tx && flr(e.y / TILE) === h.ty) {
            // Respawn enemy at a random top position
            e.state = "run";
            e.x = flr(rnd(GRID_W - 4) + 2) * TILE;
            e.y = 4 * TILE;
            e.trapTimer = 0;
            score += 100;
          }
        }
        // Kill player if in the hole
        if (flr(player.x / TILE) === h.tx && flr(player.y / TILE) === h.ty) {
          killPlayer();
        }
        holes.splice(i, 1);
      }
    }
  };

  // ============================================================
  // Draw
  // ============================================================
  API._draw = function() {
    cls(0);

    if (state === "title") {
      const ty = 38 + sin(API.frame * 0.05) * 5;

      text("LODE RUNNER", 133, flr(ty), 3);
      rectf(107, flr(ty) + 10, 107, 1, 2);

      // Show some sprites on title
      spr(10, 133, flr(ty) + 25);
      spr(4, 147, flr(ty) + 25);
      spr(20, 160, flr(ty) + 25);
      spr(1, 173, flr(ty) + 25);
      spr(2, 187, flr(ty) + 25);

      if (flr(API.frame / 20) % 2 === 0) text("PRESS START", 133, 120, 3);

      text("DIG LEFT: Z   DIG RIGHT: X", 93, 146, 2);
      text("COLLECT ALL GOLD TO ESCAPE", 96, 158, 2);
      text("TRAP ENEMIES IN HOLES", 108, 169, 2);

      // Draw a mini scene
      const by = 184;
      for (let i = 0; i < 20; i++) spr(1, 107 + i * 8, by + 24);
      spr(2, 139, by + 0); spr(2, 139, by + 8); spr(2, 139, by + 16);
      spr(10, 117, by + 16);
      spr(4, 160, by + 16);
      spr(20, 197, by + 16);
      spr(3, 171, by + 8); spr(3, 176, by + 8); spr(3, 181, by + 8); spr(3, 187, by + 8);

      text("GRAYBOX DEMO V0.1", 118, 229, 1);
      return;
    }

    if (state === "gameover") {
      text("GAME OVER", 138, 90, 3);
      text("SCORE: " + score, 130, 113, 2);
      text("LEVEL: " + (level + 1), 138, 124, 2);
      if (flr(API.frame / 20) % 2 === 0) text("PRESS START", 133, 158, 3);
      return;
    }

    // --- Play state rendering ---

    // Draw tiles
    for (let ty = 0; ty < GRID_H; ty++) {
      for (let tx = 0; tx < GRID_W; tx++) {
        const ch = levelData[ty][tx];
        const px = tx * TILE;
        const py = ty * TILE + HUD_H;
        const t = charToTile(ch);
        if (t === T_BRICK) spr(1, px, py);
        else if (t === T_LADDER) spr(2, px, py);
        else if (t === T_BAR) spr(3, px, py);
        else if (t === T_GOLD) spr(4, px, py);
        else if (t === T_SOLID) spr(5, px, py);
        else if (t === T_EXIT && exitOpen) spr(6, px, py);
      }
    }

    // Draw holes (crumbling bricks)
    for (const h of holes) {
      const px = h.tx * TILE;
      const py = h.ty * TILE + HUD_H;
      if (h.regenerating) {
        // Flash to indicate regenerating
        if (flr(animFrame / 4) % 2 === 0) spr(7, px, py);
      }
    }

    // Draw enemies
    for (const e of enemies) {
      const px = flr(e.x);
      const py = flr(e.y) + HUD_H;
      const flipX = e.dir < 0;
      if (e.state === "trapped") {
        spr(23, px, py, flipX);
      } else if (e.state === "climb") {
        spr(flr(e.animT / 6) % 2 === 0 ? 22 : 20, px, py, flipX);
      } else if (e.state === "hang") {
        spr(22, px, py, flipX); // reuse climb sprite for hanging
      } else {
        spr(flr(e.animT / 4) % 2 === 0 ? 20 : 21, px, py, flipX);
      }
      // Show gold indicator if carrying
      if (e.carriesGold) {
        pix(px + 3, py - 1, 2);
        pix(px + 4, py - 1, 2);
      }
    }

    // Draw player
    if (deathTimer <= 0 || flr(animFrame / 3) % 2 === 0) {
      const px = flr(player.x);
      const py = flr(player.y) + HUD_H;
      const flipX = player.dir < 0;
      if (player.state === "climb") {
        spr(flr(player.animT / 6) % 2 === 0 ? 12 : 10, px, py, flipX);
      } else if (player.state === "hang") {
        spr(13, px, py, flipX);
      } else if (player.state === "fall") {
        spr(10, px, py, flipX);
      } else {
        spr(flr(player.animT / 4) % 2 === 0 ? 10 : 11, px, py, flipX);
      }
    }

    // Death effect
    if (deathTimer > 0) {
      const px = flr(player.x) + 4;
      const py = flr(player.y) + 4 + HUD_H;
      const r = flr((60 - deathTimer) / 3);
      circ(px, py, r, 3);
      circ(px, py, r + 2, 2);
    }

    // Level complete message
    if (levelCompleteTimer > 0) {
      rectf(107, 105, 107, 30, 0);
      rect(107, 105, 107, 30, 3);
      text("LEVEL COMPLETE!", 123, 110, 3);
      text("BONUS: 500", 136, 122, 2);
    }

    // HUD
    rectf(0, 0, W, HUD_H, 0);
    line(0, HUD_H - 1, W, HUD_H - 1, 1);
    text("SCORE:" + score, 4, 3, 3);
    text("LV:" + (level + 1), 80, 3, 2);

    // Gold remaining
    if (!exitOpen) {
      text("GOLD:" + goldLeft, 133, 3, 2);
    } else {
      if (flr(animFrame / 10) % 2 === 0) text("ESCAPE!", 133, 3, 3);
    }

    text("LIVES:", 227, 3, 2);
    for (let i = 0; i < lives; i++) spr(30, 262 + i * 10, 0);

    // Level start message
    if (deathTimer <= 0 && levelCompleteTimer <= 0 && API.frame < 60) {
      rectf(120, 105, 80, 23, 0);
      rect(120, 105, 80, 23, 2);
      text("LEVEL " + (level + 1), 137, 112, 3);
    }
  };

  // ============================================================
  // Boot
  // ============================================================
  if (API._init) API._init();
  setInterval(tick, 1000 / FPS);
  document.addEventListener("keydown", ensureAudio, { once: true });
  document.addEventListener("click", ensureAudio, { once: true });
})();
</script>
</body>
</html>
