<!DOCTYPE html>
<html lang="en">

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GrayBox — Demo: Frogger</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #0a0a0a;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100vh;
    font-family: monospace;
    overflow: hidden;
  }
  #frame {
    background: #111;
    border: 3px solid #333;
    border-radius: 8px;
    padding: 12px;
    box-shadow: 0 0 40px rgba(0,0,0,0.8), inset 0 0 20px rgba(0,0,0,0.5);
  }
  canvas {
    display: block;
    image-rendering: pixelated;
    image-rendering: crisp-edges;
  }
  #controls {
    margin-top: 12px;
    color: #6b6b6b;
    font-size: 11px;
    text-align: center;
    letter-spacing: 1px;
  }
  #controls span { color: #b0b0b0; }
</style>
</head>
<body>
<div id="frame">
  <canvas id="screen"></canvas>
</div>
<div id="controls">
  <span>ARROWS</span> HOP &nbsp;&nbsp; <span>ENTER</span> START
</div>

  // 42: Squished
  defSprite(42,

  // 50: Life icon frog
  defSprite(50,
    "00000000" +
    "02000020" +
    "02322320" +

    "02322320" +
    "20000002" +
    "00000000" +

  );

  // --- Layout constants ---
  // Using 16px rows. 240 / 16 = 15 rows.
  // Row 0:      Score HUD
  // Row 1:      Home slots
  // Row 2-6:    River (5 lanes)
  // Row 7:      Safe median
  // Row 8-12:   Road (5 lanes)
  // Row 13:     Start zone
  // Row 14:     Timer bar

  const CELL = 16;
  const COLS = W / CELL;  // 20
  const HUD_Y = 0;
  const HOME_ROW = 1;
  const RIVER_TOP = 2;
  const RIVER_BOT = 6;
  const MEDIAN_ROW = 7;
  const ROAD_TOP = 8;
  const ROAD_BOT = 12;
  const START_ROW = 13;
  const TIMER_ROW = 14;

  const HOME_COUNT = 5;
  // Home slot X positions (in pixels, center of each slot)
  const HOME_XS = [];
  for (let i = 0; i < HOME_COUNT; i++) {
    HOME_XS.push(32 + i * 64); // evenly across 320px
  }

  const TIMER_MAX = 30 * FPS;

  // --- Lane definitions per level ---
  function buildLanes(lvl) {
    const s = 0.5 + lvl * 0.12;
    return {
      road: [
        { row: ROAD_TOP,     spd: s * 0.7,  dir:-1, kind:"car",   n:4, gap:80 },
        { row: ROAD_TOP + 1, spd: s * 1.2,  dir: 1, kind:"race",  n:3, gap:107 },
        { row: ROAD_TOP + 2, spd: s * 0.5,  dir:-1, kind:"truck", n:3, gap:107 },
        { row: ROAD_TOP + 3, spd: s * 1.0,  dir: 1, kind:"car",   n:4, gap:80 },
        { row: ROAD_TOP + 4, spd: s * 0.9,  dir:-1, kind:"race",  n:3, gap:93 },
      ],
      river: [
        { row: RIVER_TOP,     spd: s * 0.6, dir: 1, kind:"log3",   n:3, gap:107 },
        { row: RIVER_TOP + 1, spd: s * 0.9, dir:-1, kind:"turtle", n:4, gap:67 },
        { row: RIVER_TOP + 2, spd: s * 0.4, dir: 1, kind:"log5",   n:2, gap:160 },
        { row: RIVER_TOP + 3, spd: s * 0.8, dir:-1, kind:"turtle", n:3, gap:87 },
        { row: RIVER_TOP + 4, spd: s * 0.7, dir: 1, kind:"log4",   n:3, gap:107 },
      ]
    };
  }

  // Object pixel widths
  function objWidth(kind) {
    switch(kind) {
      case "car": return 16;
      case "race": return 12;
      case "truck": return 24;
      case "log3": return 24;
      case "log4": return 32;
      case "log5": return 40;
      case "turtle": return 24;
      default: return 16;
    }
  }

  // --- State ---
  const { TITLE, PLAY, GAMEOVER } = GrayBox.SCENE;
  let frogX, frogY;       // pixel position of frog (top-left of 8x8 sprite area within cell)
  let frogDir;             // 0=up,1=left,2=right,3=down
  let frogRow;             // current grid row
  let score, lives, level;
  let timer;
  let homeFilled;
  let roadObjs, riverObjs;
  let bonusFly;
  let deathTimer, deathType;
  let levelComplete;
  let hiScore = 0;
  let gameOverTimer;
  let hopAnim; // frames of hop animation remaining

  function snapToGrid(px) { return Math.round(px / CELL) * CELL; }

  function resetFrog() {
    frogRow = START_ROW;
    frogX = Math.floor(COLS / 2) * CELL;
    frogY = frogRow * CELL;
    frogDir = 0;
    timer = TIMER_MAX;
    deathTimer = 0;
    hopAnim = 0;
  }

  function initLevel() {
    const cfg = buildLanes(level);
    roadObjs = [];
    riverObjs = [];
    bonusFly = null;

    for (const lane of cfg.road) {
      const w = objWidth(lane.kind);
      for (let i = 0; i < lane.n; i++) {
        roadObjs.push({
          x: i * lane.gap,
          y: lane.row * CELL,
          row: lane.row,
          spd: lane.spd,
          dir: lane.dir,
          kind: lane.kind,
          w: w
        });
      }
    }
    for (const lane of cfg.river) {
      const w = objWidth(lane.kind);
      for (let i = 0; i < lane.n; i++) {
        riverObjs.push({
          x: i * lane.gap,
          y: lane.row * CELL,
          row: lane.row,
          spd: lane.spd,
          dir: lane.dir,
          kind: lane.kind,
          w: w,
          diving: false,
          diveTimer: 120 + flr(rnd(200))
        });
      }
    }
  }

  function resetGame() {
    score = 0;
    lives = 3;
    level = 1;
    homeFilled = new Array(HOME_COUNT).fill(false);
    levelComplete = 0;
    initLevel();
    resetFrog();
  }

  // --- Collision ---
  function overlap(ax, aw, bx, bw) {
    return ax < bx + bw && ax + aw > bx;
  }

  function killFrog(type) {
    deathTimer = 40;
    deathType = type;
    if (type === "water") {
      note(0, "E2", 0.2);
    } else {
      note(0, "C2", 0.15);
      note(1, "D#2", 0.1);
    }
  }

  // --- Update ---
  function updatePlay() {
    if (deathTimer > 0) {
      deathTimer--;
      if (deathTimer === 0) {
        lives--;
        if (lives <= 0) {
          if (score > hiScore) hiScore = score;
          GrayBox.go(GAMEOVER);
          return;
        }
        resetFrog();
      }
      return;
    }

    if (levelComplete > 0) {
      levelComplete--;
      if (levelComplete === 0) {
        level++;
        homeFilled = new Array(HOME_COUNT).fill(false);
        initLevel();
        resetFrog();
      }
      return;
    }

    // Timer countdown
    timer--;
    if (timer <= 0) {
      killFrog("time");
      return;
    }

    // Move road objects
    for (const o of roadObjs) {
      o.x += o.spd * o.dir;
      if (o.dir > 0 && o.x > W + 16) o.x = -o.w - 16;
      if (o.dir < 0 && o.x < -o.w - 16) o.x = W + 16;
    }

    // Move river objects
    for (const o of riverObjs) {
      o.x += o.spd * o.dir;
      if (o.dir > 0 && o.x > W + 16) o.x = -o.w - 16;
      if (o.dir < 0 && o.x < -o.w - 16) o.x = W + 16;
      // Turtle diving cycle
      if (o.kind === "turtle") {
        o.diveTimer--;
        if (o.diveTimer <= 0) {
          o.diving = !o.diving;
          o.diveTimer = o.diving ? (50 + flr(rnd(30))) : (150 + flr(rnd(100)));
        }
      }
    }

    // Bonus fly spawning
    if (!bonusFly && Math.random() < 0.003) {
      const logs = riverObjs.filter(o => o.kind.startsWith("log"));
      if (logs.length > 0) {
        const lo = logs[flr(rnd(logs.length))];
        bonusFly = { ref: lo, offX: flr(rnd(lo.w - 8)), timer: 250 };
      }
    }
    if (bonusFly) {
      bonusFly.timer--;
      if (bonusFly.timer <= 0) bonusFly = null;
    }

    // Hop animation
    if (hopAnim > 0) hopAnim--;

    // Frog input (one cell per press)
    if (hopAnim === 0) {
      let moved = false;
      if (btnp("up") && frogRow > HOME_ROW) {
        frogRow--; frogY -= CELL; frogDir = 0; moved = true;
      } else if (btnp("down") && frogRow < START_ROW) {
        frogRow++; frogY += CELL; frogDir = 3; moved = true;
      } else if (btnp("left")) {
        frogX -= CELL; frogDir = 1; moved = true;
      } else if (btnp("right")) {
        frogX += CELL; frogDir = 2; moved = true;
      }
      if (moved) {
        hopAnim = 4;
        note(0, "G4", 0.04);
        // Forward progress bonus
        if (frogDir === 0) score += 10;
      }
    }

    // Clamp X to screen
    if (frogX < 0) frogX = 0;
    if (frogX > W - CELL) frogX = W - CELL;

    // Frog hitbox: 10px wide centered in CELL (frogX+3 to frogX+13)
    const fhx = frogX + 3;
    const fhw = 10;

    // --- Road collision ---
    if (frogRow >= ROAD_TOP && frogRow <= ROAD_BOT) {
      for (const o of roadObjs) {
        if (o.row !== frogRow) continue;
        if (overlap(fhx, fhw, o.x, o.w)) {
          killFrog("car");
          return;
        }
      }
    }

    // --- River logic ---
    if (frogRow >= RIVER_TOP && frogRow <= RIVER_BOT) {
      let onPlatform = false;
      let rideSpd = 0;
      for (const o of riverObjs) {
        if (o.row !== frogRow) continue;
        if (o.kind === "turtle" && o.diving) continue;
        if (overlap(fhx, fhw, o.x, o.w)) {
          onPlatform = true;
          rideSpd = o.spd * o.dir;
          break;
        }
      }
      if (!onPlatform) {
        killFrog("water");
        return;
      }
      frogX += rideSpd;
      // Off screen while riding = death
      if (frogX < -CELL || frogX > W) {
        killFrog("water");
        return;
      }
    }

    // --- Bonus fly pickup ---
    if (bonusFly) {
      const fo = bonusFly.ref;
      const flyPx = fo.x + bonusFly.offX;
      if (frogRow === fo.row && _abs(frogX - flyPx) < 12) {
        score += 200;
        note(0, "E5", 0.08);
        note(1, "G5", 0.08);
        bonusFly = null;
      }
    }

    // --- Home row ---
    if (frogRow === HOME_ROW) {
      let landed = false;
      for (let i = 0; i < HOME_COUNT; i++) {
        if (homeFilled[i]) continue;
        if (_abs(frogX + 8 - HOME_XS[i]) < 14) {
          homeFilled[i] = true;
          score += 50 + flr(timer / FPS) * 10;
          note(0, "C5", 0.06);
          setTimeout(() => { try { note(0, "E5", 0.06); } catch(e){} }, 80);
          setTimeout(() => { try { note(0, "G5", 0.12); } catch(e){} }, 160);
          landed = true;
          break;
        }
      }
      if (!landed) {
        killFrog("wall");
        return;
      }
      // All filled?
      if (homeFilled.every(Boolean)) {
        score += 1000;
        levelComplete = 90;
        note(1, "C5", 0.08);
        setTimeout(() => { try { note(1, "E5", 0.08); } catch(e){} }, 100);
        setTimeout(() => { try { note(1, "G5", 0.08); } catch(e){} }, 200);
        setTimeout(() => { try { note(1, "C6", 0.2); } catch(e){} }, 300);
      } else {
        resetFrog();
      }
    }
  }

  // --- Drawing ---
  function drawRoad() {
    const y0 = ROAD_TOP * CELL;
    const h = (ROAD_BOT - ROAD_TOP + 1) * CELL;
    rectf(0, y0, W, h, 1);
    // Lane dashes
    for (let r = ROAD_TOP; r < ROAD_BOT; r++) {
      const ly = (r + 1) * CELL - 1;
      for (let x = 0; x < W; x += 16) {
        line(x, ly, x + 8, ly, 2);
      }
    }
    // Top and bottom curb
    rectf(0, y0, W, 2, 2);
    rectf(0, y0 + h - 2, W, 2, 2);
  }

  function drawRiver() {
    const y0 = RIVER_TOP * CELL;
    const h = (RIVER_BOT - RIVER_TOP + 1) * CELL;
    rectf(0, y0, W, h, 0);
    // Water texture
    for (let ry = y0; ry < y0 + h; ry += 2) {
      for (let rx = (ry + flr(GrayBox.frame * 0.5)) % 8; rx < W; rx += 8) {
        pix(rx, ry, 1);
      }
    }
  }

  function drawMedian() {
    const y = MEDIAN_ROW * CELL;
    rectf(0, y, W, CELL, 1);
    // Bushes / safe zone pattern
    for (let x = 0; x < W; x += 10) {
      rectf(x + 1, y + 3, 6, 10, 0);
      rectf(x + 2, y + 4, 4, 8, 1);
    }
    // Label
    text("SAFE", W / 2 - 10, y + 5, 2);
  }

  function drawStartZone() {
    const y = START_ROW * CELL;
    rectf(0, y, W, CELL, 0);
    rectf(0, y, W, 2, 1);
    for (let x = 0; x < W; x += 10) {
      rectf(x + 1, y + 4, 6, 8, 1);
    }
  }

  function drawHomes() {
    const y = HOME_ROW * CELL;
    // Hedge background
    rectf(0, y, W, CELL, 0);
    for (let x = 0; x < W; x++) {
      let inSlot = false;
      for (let i = 0; i < HOME_COUNT; i++) {
        if (_abs(x - HOME_XS[i]) < 10) { inSlot = true; break; }
      }
      if (!inSlot) {
        for (let dy = 0; dy < CELL; dy++) {
          if ((x + dy) % 3 === 0) pix(x, y + dy, 1);
          if ((x + dy + 1) % 5 === 0) pix(x, y + dy, 2);
        }
      }
    }
    // Slots
    for (let i = 0; i < HOME_COUNT; i++) {
      const sx = HOME_XS[i] - 8;
      if (homeFilled[i]) {
        sprT(31, sx, y + 4);
      } else {
        rectf(sx + 1, y + 2, 14, 12, 0);
        rect(sx + 1, y + 2, 14, 12, 1);
      }
    }
  }

  function drawRiverObjs() {
    for (const o of riverObjs) {
      const py = o.y + 4;
      if (o.kind === "turtle") {
        const sid = o.diving ? 26 : 25;
        for (let i = 0; i < 3; i++) sprT(sid, o.x + i * 8, py);
      } else {
        // Log
        const segs = Math.round(o.w / 8);
        sprT(20, o.x, py);
        for (let i = 1; i < segs - 1; i++) sprT(21, o.x + i * 8, py);
        sprT(22, o.x + (segs - 1) * 8, py);
      }
    }
  }

  function drawRoadObjs() {
    for (const o of roadObjs) {
      const py = o.y + 4;
      const flip = o.dir < 0;
      if (o.kind === "car") {
        if (flip) { sprT(11, o.x, py, true); sprT(10, o.x + 8, py, true); }
        else { sprT(10, o.x, py); sprT(11, o.x + 8, py); }
      } else if (o.kind === "race") {
        sprT(15, o.x + 2, py, flip);
      } else if (o.kind === "truck") {
        if (flip) { sprT(14, o.x, py, true); sprT(13, o.x + 8, py, true); sprT(12, o.x + 16, py, true); }
        else { sprT(12, o.x, py); sprT(13, o.x + 8, py); sprT(14, o.x + 16, py); }
      }
    }
  }

  function drawFrog() {
    if (deathTimer > 0) {
      const dx = flr(frogX) + 4;
      const dy = flr(frogY) + 4;
      if (deathType === "water") {
        sprT(deathTimer > 25 ? 40 : 41, dx, dy);
      } else {
        sprT(deathTimer > 25 ? 42 : 41, dx, dy);
      }
      return;
    }
    if (levelComplete > 0) return;

    const dx = flr(frogX) + 4;
    let dy = flr(frogY) + 4;
    // Little hop animation
    if (hopAnim > 0) dy -= hopAnim;
    sprT([1, 2, 3, 4][frogDir], dx, dy);
  }

  function drawBonusFly() {
    if (!bonusFly) return;
    if (bonusFly.timer < 60 && GrayBox.frame % 8 < 4) return; // blink when about to vanish
    const fo = bonusFly.ref;
    sprT(35, fo.x + bonusFly.offX, fo.y + 4);
  }

  function drawHUD() {
    rectf(0, 0, W, CELL, 0);
    text("SCORE", 4, 2, 2);
    text(String(score).padStart(6, "0"), 34, 2, 3);
    text("HI", 113, 2, 2);
    text(String(hiScore).padStart(6, "0"), 128, 2, 3);
    text("LV " + level, 200, 2, 3);
    // Lives
    for (let i = 0; i < lives; i++) {
      sprT(50, 267 + i * 12, 1);
    }
  }

  function drawTimerBar() {
    const y = TIMER_ROW * CELL;
    rectf(0, y, W, CELL, 0);
    text("TIME", 4, y + 5, 2);
    const bx = 32;
    const bw = W - 42;
    rect(bx, y + 3, bw, 8, 1);
    const fill = flr((timer / TIMER_MAX) * (bw - 2));
    const col = timer < TIMER_MAX * 0.2 ? (GrayBox.frame % 8 < 4 ? 3 : 2) : 3;
    if (fill > 0) rectf(bx + 1, y + 4, fill, 6, col);
  }

  function drawPlay() {
    cls(0);
    drawRiver();
    drawRiverObjs();
    drawBonusFly();
    drawHomes();
    drawMedian();
    drawRoad();
    drawRoadObjs();
    drawStartZone();
    drawFrog();
    drawHUD();
    drawTimerBar();

    if (levelComplete > 0) {
      const bx = W / 2 - 54;
      const by = H / 2 - 15;
      rectf(bx, by, 108, 30, 0);
      rect(bx, by, 108, 30, 3);
      text("LEVEL COMPLETE!", bx + 17, by + 4, 3);
      text("BONUS +1000", bx + 27, by + 16, 2);
    }
  }

  // --- Title screen ---
  function drawTitle() {
    cls(0);

    // Animated river band
    const ry = 68;
    rectf(0, ry, W, 24, 0);
    for (let y = ry; y < ry + 24; y += 2)
      for (let x = (y + flr(GrayBox.frame * 0.5)) % 8; x < W; x += 8) pix(x, y, 1);
    // Animated log
    const logX = ((GrayBox.frame * 1.2) % (W + 40)) - 40;
    sprT(20, logX, ry + 8); sprT(21, logX + 8, ry + 8); sprT(22, logX + 16, ry + 8);
    // Frog on log
    sprT(1, logX + 8, ry + 4);

    // Animated road band
    const roadY = 90;
    rectf(0, roadY, W, 24, 1);
    for (let x = 0; x < W; x += 16) line(x, roadY + 12, x + 8, roadY + 12, 2);
    // Car
    const carX = W - ((GrayBox.frame * 2) % (W + 32));
    sprT(10, carX, roadY + 8); sprT(11, carX + 8, roadY + 8);

    // Title
    text("F R O G G E R", W / 2 - 32, 23, 3);

    // Decorative frogs
    const bob = flr(sin(GrayBox.frame * 0.1) * 2);
    sprT(1, W / 2 - 4, 38 + bob);
    sprT(2, W / 2 - 20, 42);
    sprT(3, W / 2 + 15, 42);

    text("HELP THE FROG CROSS", W / 2 - 47, 120, 2);
    text("THE ROAD AND RIVER!", W / 2 - 47, 130, 2);

    // Controls
    text("ARROWS  HOP", W / 2 - 27, 150, 2);

    // Blink prompt
    if (GrayBox.frame % 40 < 28) {
      text("PRESS A TO START", W / 2 - 50, 180, 3);
    }

    if (hiScore > 0) {
      text("HI SCORE  " + String(hiScore).padStart(6, "0"), W / 2 - 45, 203, 2);
    }

    text("GRAYBOX DEMO", W / 2 - 30, 229, 1);
  }

  // --- Game Over ---
  function drawGameOver() {
    drawPlay();
    // Darken overlay
    const bx = W / 2 - 60;
    const by = H / 2 - 26;
    rectf(bx, by, 120, 52, 0);
    rect(bx, by, 120, 52, 3);
    rect(bx + 1, by + 1, 118, 50, 1);

    text("GAME OVER", bx + 38, by + 6, 3);
    text("SCORE  " + String(score).padStart(6, "0"), bx + 28, by + 18, 2);
    if (score > 0 && score >= hiScore) {
      text("NEW HIGH SCORE!", bx + 23, by + 30, 3);
    }
    if (gameOverTimer > 60 && GrayBox.frame % 40 < 28) {
      text("PRESS A", bx + 33, by + 40, 2);
    }
  }

  // --- Title Scene ---
  GrayBox.scene(TITLE, {
    init() {},
    update() {
      if (btnp("a")) {
        note(0, "C4", 0.06);
        note(1, "G4", 0.06);
        resetGame();
        GrayBox.go(PLAY); return;
      }
    },
    draw() { drawTitle(); }
  });

  // --- Play Scene ---
  GrayBox.scene(PLAY, {
    init() {},
    update() { updatePlay(); },
    draw() { drawPlay(); }
  });

  // --- Game Over Scene ---
  GrayBox.scene(GAMEOVER, {
    init() { gameOverTimer = 0; },
    update() {
      gameOverTimer++;
      if (gameOverTimer > 90 && btnp("a")) {
        GrayBox.go(TITLE); return;
      }
    },
    draw() { drawGameOver(); }
  });

  GrayBox.go(TITLE);
  GrayBox.boot("screen");
})();
</script>
</body>
</html>
