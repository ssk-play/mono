<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GrayBox — Demo: Nibbler</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #0a0a0a;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100vh;
    font-family: monospace;
    overflow: hidden;
  }
  #frame {
    background: #111;
    border: 3px solid #333;
    border-radius: 8px;
    padding: 12px;
    box-shadow: 0 0 40px rgba(0,0,0,0.8), inset 0 0 20px rgba(0,0,0,0.5);
  }
  canvas {
    display: block;
    image-rendering: pixelated;
    image-rendering: crisp-edges;
  }
  #controls {
    margin-top: 12px;
    color: #6b6b6b;
    font-size: 11px;
    text-align: center;
    letter-spacing: 1px;
  }
  #controls span { color: #b0b0b0; }
</style>
</head>
<body>
<div id="frame">
  <canvas id="screen"></canvas>
</div>
<div id="controls">
  <span>ARROWS</span> MOVE &nbsp;&nbsp; <span>Z</span> ACTION &nbsp;&nbsp; <span>ENTER</span> START
</div>
<script>
(() => {
  "use strict";

  // ============================================================
  // GrayBox Runtime (inline)
  // ============================================================
  const W = 320;
  const H = 240;
  const FPS = 30;
  const COLORS = ["#1a1a1a", "#6b6b6b", "#b0b0b0", "#e8e8e8"];
  const canvas = document.getElementById("screen");
  canvas.width = W;
  canvas.height = H;
  function fitCanvas() {
    var maxW = window.innerWidth - 40;
    var maxH = window.innerHeight - 60;
    var s = Math.min(maxW / W, maxH / H);
    canvas.style.width = (W * s) + "px";
    canvas.style.height = (H * s) + "px";
  }
  fitCanvas();
  window.addEventListener("resize", fitCanvas);
  const ctx = canvas.getContext("2d");
  ctx.imageSmoothingEnabled = false;
  const buf = ctx.createImageData(W, H);
  const buf32 = new Uint32Array(buf.data.buffer);

  function hexToABGR(hex) {
    const r = parseInt(hex.slice(1, 3), 16);
    const g = parseInt(hex.slice(3, 5), 16);
    const b = parseInt(hex.slice(5, 7), 16);
    return (255 << 24) | (b << 16) | (g << 8) | r;
  }
  const COLOR_U32 = COLORS.map(hexToABGR);

  const sprites = {};
  const tilemap = {};

  const keyMap = {
    "ArrowUp": "up", "ArrowDown": "down", "ArrowLeft": "left", "ArrowRight": "right",
    "w": "up", "s": "down", "a": "left", "d": "right", "ㅈ": "up", "ㄴ": "down", "ㅁ": "left", "ㅇ": "right",
    "z": "a", "Z": "a", "x": "b", "X": "b", "ㅋ": "a", "ㅌ": "b",
    "Enter": "a", " ": "a"
  };
  const keys = {};
  const keysPrev = {};

  document.addEventListener("keydown", e => {
    const k = keyMap[e.key];
    if (k) { keys[k] = true; e.preventDefault(); }
  });
  document.addEventListener("keyup", e => {
    const k = keyMap[e.key];
    if (k) { keys[k] = false; e.preventDefault(); }
  });

  let audioCtx = null;
  const channels = [null, null];
  const channelGains = [null, null];
  function ensureAudio() {
    if (!audioCtx) {
      audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      for (let i = 0; i < 2; i++) {
        channelGains[i] = audioCtx.createGain();
        channelGains[i].gain.value = 0.15;
        channelGains[i].connect(audioCtx.destination);
      }
    }
  }

  const NOTE_NAMES = ["C","C#","D","D#","E","F","F#","G","G#","A","A#","B"];
  function noteToFreq(noteStr) {
    const match = noteStr.match(/^([A-G]#?)(\d)$/);
    if (!match) return 440;
    const name = match[1];
    const octave = parseInt(match[2]);
    const semitone = NOTE_NAMES.indexOf(name);
    if (semitone === -1) return 440;
    const midi = (octave + 1) * 12 + semitone;
    return 440 * Math.pow(2, (midi - 69) / 12);
  }

  const FONT_W = 4;
  const FONT_H = 7;
  const FONT = {};
  const fontData = {
    "A":"0110100110011111100110011001","B":"1110100110101110100110011110",
    "C":"0110100110001000100001100110","D":"1100101010011001100110101100",
    "E":"1111100010001110100010001111","F":"1111100010001110100010001000",
    "G":"0111100010001011100101100111","H":"1001100110011111100110011001",
    "I":"1110010001000100010001001110","J":"0111001000100010001010100100",
    "K":"1001101011001100101010011001","L":"1000100010001000100010001111",
    "M":"1001111111011001100110011001","N":"1001110111011001100110011001",
    "O":"0110100110011001100110010110","P":"1110100110011110100010001000",
    "Q":"0110100110011001101101100001","R":"1110100110011110101010011001",
    "S":"0111100010000110000110001110","T":"1111001000100010001000100010",
    "U":"1001100110011001100110010110","V":"1001100110011001100101100110",
    "W":"1001100110011001101111011001","X":"1001100101100110011010011001",
    "Y":"1001100101100010001000100010","Z":"1111000100100100100010001111",
    "0":"0110100111011011101110010110","1":"0100110001000100010001001110",
    "2":"0110100100010010010010001111","3":"1110000100010110000110011110",
    "4":"1001100110011111000100010001","5":"1111100010001110000100011110",
    "6":"0110100010001110100110010110","7":"1111000100010010010001001000",
    "8":"0110100110010110100110010110","9":"0110100110010111000100010110",
    " ":"0000000000000000000000000000",
    ".":"0000000000000000000001000100",
    ",":"0000000000000000001000101000",
    "!":"0100010001000100000000000100",
    "?":"0110100100010010000000000010",
    "-":"0000000000001110000000000000",
    "+":"0000001001001110010000100000",
    ":":"0000010001000000010001000000",
    "/":"0001000100100010010010001000",
    "*":"0000101001001110010010100000",
    "#":"0101111101011111010100000000",
    "(":"0010010010001000010001000010",
    ")":"0100001000010001000100100100",
    "=":"0000000011110000111100000000",
    "'":"0100010010000000000000000000",
    "\"":"1010101000000000000000000000",
    "<":"0010010010001000010000100010",
    ">":"1000010000100001001001001000",
    "_":"0000000000000000000000001111",
  };
  for (const [ch, bits] of Object.entries(fontData)) {
    FONT[ch] = [];
    for (let i = 0; i < bits.length; i++) FONT[ch].push(parseInt(bits[i]));
  }

  const API = {};
  API._init = null;
  API._update = null;
  API._draw = null;
  API.frame = 0;

  API.cls = function(c = 0) { buf32.fill(COLOR_U32[c] || COLOR_U32[0]); };
  API.pix = function(x, y, c) {
    x = Math.floor(x); y = Math.floor(y);
    if (x < 0 || x >= W || y < 0 || y >= H) return;
    buf32[y * W + x] = COLOR_U32[c] || COLOR_U32[0];
  };
  API.line = function(x0, y0, x1, y1, c) {
    x0=Math.floor(x0); y0=Math.floor(y0); x1=Math.floor(x1); y1=Math.floor(y1);
    const dx=Math.abs(x1-x0), dy=Math.abs(y1-y0);
    const sx=x0<x1?1:-1, sy=y0<y1?1:-1;
    let err=dx-dy;
    while(true) {
      API.pix(x0,y0,c);
      if(x0===x1&&y0===y1) break;
      const e2=2*err;
      if(e2>-dy){err-=dy;x0+=sx;}
      if(e2<dx){err+=dx;y0+=sy;}
    }
  };
  API.rect = function(x,y,w,h,c) {
    API.line(x,y,x+w-1,y,c); API.line(x+w-1,y,x+w-1,y+h-1,c);
    API.line(x+w-1,y+h-1,x,y+h-1,c); API.line(x,y+h-1,x,y,c);
  };
  API.rectf = function(x,y,w,h,c) {
    x=Math.floor(x); y=Math.floor(y);
    const col=COLOR_U32[c]||COLOR_U32[0];
    for(let py=Math.max(0,y);py<Math.min(H,y+h);py++)
      for(let px=Math.max(0,x);px<Math.min(W,x+w);px++)
        buf32[py*W+px]=col;
  };
  API.circ = function(cx,cy,r,c) {
    let x=r,y=0,d=1-r; cx=Math.floor(cx); cy=Math.floor(cy);
    while(x>=y){
      API.pix(cx+x,cy+y,c);API.pix(cx-x,cy+y,c);
      API.pix(cx+x,cy-y,c);API.pix(cx-x,cy-y,c);
      API.pix(cx+y,cy+x,c);API.pix(cx-y,cy+x,c);
      API.pix(cx+y,cy-x,c);API.pix(cx-y,cy-x,c);
      y++; if(d<0){d+=2*y+1;}else{x--;d+=2*(y-x)+1;}
    }
  };
  API.circf = function(cx,cy,r,c) {
    cx=Math.floor(cx); cy=Math.floor(cy);
    const col=COLOR_U32[c]||COLOR_U32[0]; const r2=r*r;
    for(let py=-r;py<=r;py++) for(let px=-r;px<=r;px++)
      if(px*px+py*py<=r2){ const sx=cx+px,sy=cy+py;
        if(sx>=0&&sx<W&&sy>=0&&sy<H) buf32[sy*W+sx]=col; }
  };
  API.sprite = function(id, data) {
    const arr = new Uint8Array(64); let i = 0;
    for (const ch of data) { if (ch>='0'&&ch<='3') { arr[i++]=parseInt(ch); if(i>=64) break; } }
    sprites[id] = arr;
  };
  API.spr = function(id, x, y, flipX, flipY) {
    const s=sprites[id]; if(!s) return;
    x=Math.floor(x); y=Math.floor(y);
    for(let py=0;py<8;py++) for(let px=0;px<8;px++){
      const sx=flipX?7-px:px, sy=flipY?7-py:py;
      const c=s[sy*8+sx], dx=x+px, dy=y+py;
      if(dx>=0&&dx<W&&dy>=0&&dy<H) buf32[dy*W+dx]=COLOR_U32[c];
    }
  };
  // Transparent sprite draw — color 0 is transparent
  API.sprT = function(id, x, y, flipX, flipY) {
    const s=sprites[id]; if(!s) return;
    x=Math.floor(x); y=Math.floor(y);
    for(let py=0;py<8;py++) for(let px=0;px<8;px++){
      const sx=flipX?7-px:px, sy=flipY?7-py:py;
      const c=s[sy*8+sx]; if(c===0) continue;
      const dx=x+px, dy=y+py;
      if(dx>=0&&dx<W&&dy>=0&&dy<H) buf32[dy*W+dx]=COLOR_U32[c];
    }
  };
  API.text = function(str, x, y, c) {
    str=String(str).toUpperCase(); let cx=Math.floor(x); const cy=Math.floor(y);
    const col=COLOR_U32[c]||COLOR_U32[3];
    for(const ch of str){
      const glyph=FONT[ch];
      if(glyph) for(let py=0;py<FONT_H;py++) for(let px=0;px<FONT_W;px++)
        if(glyph[py*FONT_W+px]){ const dx=cx+px,dy=cy+py;
          if(dx>=0&&dx<W&&dy>=0&&dy<H) buf32[dy*W+dx]=col; }
      cx+=FONT_W+1;
    }
  };
  API.mget = function(cx,cy) { return tilemap[cx+","+cy]||0; };
  API.mset = function(cx,cy,id) { tilemap[cx+","+cy]=id; };
  API.map = function(mx,my,mw,mh,sx,sy) {
    for(let ty=0;ty<mh;ty++) for(let tx=0;tx<mw;tx++){
      const id=API.mget(mx+tx,my+ty); if(id>0) API.spr(id,sx+tx*8,sy+ty*8); }
  };
  const VALID_KEYS = {up:1,down:1,left:1,right:1,a:1,b:1};
  API.btn = function(k) { if(!VALID_KEYS[k]) console.warn("GrayBox: invalid key \""+k+"\". Use: up/down/left/right/a/b"); return !!keys[k]; };
  API.btnp = function(k) { if(!VALID_KEYS[k]) console.warn("GrayBox: invalid key \""+k+"\". Use: up/down/left/right/a/b"); return !!keys[k] && !keysPrev[k]; };
  API.note = function(ch, noteStr, dur) {
    ensureAudio(); if(ch<0||ch>1) return; API.stop(ch);
    const osc=audioCtx.createOscillator(); osc.type="square";
    osc.frequency.value=noteToFreq(noteStr);
    osc.connect(channelGains[ch]); osc.start();
    osc.stop(audioCtx.currentTime+dur); channels[ch]=osc;
  };
  API.stop = function(ch) {
    if(ch===undefined){API.stop(0);API.stop(1);return;}
    if(channels[ch]){try{channels[ch].stop();}catch(e){} channels[ch]=null;}
  };
  API.rnd = function(max) { return Math.random()*max; };
  API.flr = Math.floor;
  API.abs = Math.abs;
  API.min = Math.min;
  API.max = Math.max;
  API.sin = Math.sin;
  API.cos = Math.cos;

  function tick() {
    if (API._update) API._update();
    if (API._draw) API._draw();
    ctx.putImageData(buf, 0, 0);
    for (const k in keys) keysPrev[k] = keys[k];
    API.frame++;
  }

  // ============================================================
  // Nibbler Game
  // ============================================================
  const { cls, pix, line, rect, rectf, circ, circf, sprite: defSprite,
          spr, sprT, text, btn, btnp, note, stop, rnd, flr,
          abs: _abs, min, max: _max, sin, cos } = API;

  // --- Sprites ---
  // 1: Wall block
  defSprite(1,
    "33333333" +
    "32222223" +
    "32111123" +
    "32100123" +
    "32100123" +
    "32111123" +
    "32222223" +
    "33333333"
  );
  // 2: Snake head up
  defSprite(2,
    "00333300" +
    "03333330" +
    "33233230" +
    "33333330" +
    "33333330" +
    "33333330" +
    "03333300" +
    "00000000"
  );
  // 3: Snake body
  defSprite(3,
    "00000000" +
    "02222200" +
    "02333200" +
    "02333200" +
    "02333200" +
    "02333200" +
    "02222200" +
    "00000000"
  );
  // 4: Snake tail
  defSprite(4,
    "00000000" +
    "00222000" +
    "00233000" +
    "00233000" +
    "00233000" +
    "00222000" +
    "00000000" +
    "00000000"
  );
  // 5: Food pellet
  defSprite(5,
    "00000000" +
    "00333000" +
    "03323300" +
    "03323300" +
    "03333300" +
    "00333000" +
    "00000000" +
    "00000000"
  );
  // 6: Snake head right
  defSprite(6,
    "00033000" +
    "02233300" +
    "23333330" +
    "33333333" +
    "33333333" +
    "23333330" +
    "02233300" +
    "00033000"
  );
  // 7: Bonus food (diamond)
  defSprite(7,
    "00030000" +
    "00323000" +
    "03232300" +
    "32323230" +
    "03232300" +
    "00323000" +
    "00030000" +
    "00000000"
  );
  // 8: Life icon (small snake head)
  defSprite(8,
    "00000000" +
    "00333000" +
    "03233300" +
    "03333300" +
    "03333300" +
    "00333000" +
    "00000000" +
    "00000000"
  );
  // 9: Corner body piece
  defSprite(9,
    "00000000" +
    "02222200" +
    "02333200" +
    "02333320" +
    "02333320" +
    "02222220" +
    "00000000" +
    "00000000"
  );
  // 10: Death/explosion frame 1
  defSprite(10,
    "30000030" +
    "03000300" +
    "00303000" +
    "00030000" +
    "00303000" +
    "03000300" +
    "30000030" +
    "00000000"
  );
  // 11: Death/explosion frame 2
  defSprite(11,
    "00300300" +
    "30000003" +
    "00000000" +
    "30000030" +
    "00000000" +
    "03000030" +
    "00300300" +
    "20020020"
  );

  // --- Game Constants ---
  const MAZE_W = 38; // maze tiles wide (304px in 320px viewport, centered with 8px border)
  const MAZE_H = 27; // maze tiles tall (216px in 240px viewport)
  const MAZE_OX = 8; // pixel offset X
  const MAZE_OY = 12; // pixel offset Y (leave room for HUD at top)
  const HUD_Y = 2;
  const TIMER_Y = H - 10;

  const STATE_TITLE = 0;
  const STATE_READY = 1;
  const STATE_PLAY = 2;
  const STATE_DYING = 3;
  const STATE_LEVELUP = 4;
  const STATE_GAMEOVER = 5;
  const STATE_PAUSE = 6;

  // Directions: 0=up, 1=right, 2=down, 3=left
  const DX = [0, 1, 0, -1];
  const DY = [-1, 0, 1, 0];

  // Game state
  let state, stateTimer;
  let score, lives, level;
  let snake; // array of {x, y}
  let dir, nextDir;
  let moveTimer, moveDelay;
  let maze; // 2D array: 0=path, 1=wall
  let foodX, foodY, foodEaten, foodTotal;
  let bonusX, bonusY, bonusActive, bonusTimer;
  let timeLeft, timeTick;
  let hiScore = 0;
  let titleAnim = 0;
  let deathFrame = 0;
  let readyBlink = 0;
  let levelUpAnim = 0;

  // ---- Maze Definitions ----
  // Each maze is a string grid. '#' = wall, '.' = path, 'S' = start
  // Mazes are 38x27 tiles
  function createMaze(idx) {
    const m = [];
    for (let y = 0; y < MAZE_H; y++) {
      m[y] = [];
      for (let x = 0; x < MAZE_W; x++) m[y][x] = 0;
    }
    // Border walls
    for (let x = 0; x < MAZE_W; x++) { m[0][x] = 1; m[MAZE_H-1][x] = 1; }
    for (let y = 0; y < MAZE_H; y++) { m[y][0] = 1; m[y][MAZE_W-1] = 1; }

    const pat = idx % 6;

    if (pat === 0) {
      // Classic grid maze with corridors
      // Horizontal internal walls with gaps
      for (let y = 4; y < MAZE_H-4; y += 6) {
        for (let x = 2; x < MAZE_W-2; x++) {
          if ((x % 10 < 3) || (x % 14 > 10)) continue; // gaps
          m[y][x] = 1;
        }
      }
      // Vertical internal walls with gaps
      for (let x = 8; x < MAZE_W-4; x += 10) {
        for (let y = 2; y < MAZE_H-2; y++) {
          if ((y % 8 < 3) || (y % 12 > 9)) continue;
          m[y][x] = 1;
        }
      }
      // Central chamber
      for (let x = 16; x < 22; x++) { m[11][x] = 1; m[16][x] = 1; }
      for (let y = 11; y < 17; y++) { m[y][16] = 1; m[y][21] = 1; }
      m[13][16] = 0; m[13][21] = 0; // entrances
    }
    else if (pat === 1) {
      // Spiral-ish maze
      // Outer ring
      for (let x = 4; x < MAZE_W-4; x++) { m[4][x] = 1; m[MAZE_H-5][x] = 1; }
      for (let y = 4; y < MAZE_H-4; y++) { m[y][4] = 1; m[y][MAZE_W-5] = 1; }
      // Gaps in outer ring
      m[4][19] = 0; m[MAZE_H-5][19] = 0;
      m[13][4] = 0; m[13][MAZE_W-5] = 0;
      // Inner ring
      for (let x = 10; x < MAZE_W-10; x++) { m[9][x] = 1; m[MAZE_H-10][x] = 1; }
      for (let y = 9; y < MAZE_H-9; y++) { m[y][10] = 1; m[y][MAZE_W-11] = 1; }
      m[9][13] = 0; m[MAZE_H-10][25] = 0;
      m[11][10] = 0; m[16][MAZE_W-11] = 0;
      // Center cross
      for (let x = 14; x < 24; x++) m[13][x] = 1;
      for (let y = 10; y < 18; y++) m[y][19] = 1;
      m[13][19] = 0; // cross center open
      m[13][14] = 0; m[13][23] = 0;
      m[10][19] = 0; m[17][19] = 0;
    }
    else if (pat === 2) {
      // Diamond pattern
      const cx = Math.floor(MAZE_W/2);
      const cy = Math.floor(MAZE_H/2);
      // Diamond walls
      for (let i = 0; i < 8; i++) {
        m[cy-i][cx-i] = 1; m[cy-i][cx+i] = 1;
        m[cy+i][cx-i] = 1; m[cy+i][cx+i] = 1;
      }
      // Gaps
      m[cy][cx-7] = 0; m[cy][cx+7] = 0;
      m[cy-8][cx] = 0; m[cy+8][cx] = 0;
      // Inner diamond
      for (let i = 0; i < 4; i++) {
        if (i < MAZE_H && cy-i >= 0 && cy+i < MAZE_H && cx-i >= 0 && cx+i < MAZE_W) {
          m[cy-i][cx-i+8] = 1; m[cy-i][cx+i-8] = 0;
        }
      }
      // Horizontal corridors
      for (let x = 2; x < MAZE_W-2; x++) {
        if (x > cx-3 && x < cx+3) continue;
        m[6][x] = 1; m[MAZE_H-7][x] = 1;
      }
      // Vertical corridors
      for (let y = 2; y < MAZE_H-2; y++) {
        if (y > cy-3 && y < cy+3) continue;
        m[y][9] = 1; m[y][MAZE_W-10] = 1;
      }
      m[6][9] = 0; m[6][MAZE_W-10] = 0;
      m[MAZE_H-7][9] = 0; m[MAZE_H-7][MAZE_W-10] = 0;
    }
    else if (pat === 3) {
      // Rooms and corridors
      const rooms = [
        [2,2,8,6], [13,2,11,6], [27,2,10,6],
        [2,11,9,6], [15,10,9,7], [28,11,9,6],
        [2,19,8,5], [13,18,11,5], [27,19,10,5],
      ];
      for (const [rx,ry,rw,rh] of rooms) {
        for (let x = rx; x < rx+rw && x < MAZE_W; x++) {
          if (ry < MAZE_H) m[ry][x] = 1;
          if (ry+rh-1 < MAZE_H) m[ry+rh-1][x] = 1;
        }
        for (let y = ry; y < ry+rh && y < MAZE_H; y++) {
          if (rx < MAZE_W) m[y][rx] = 1;
          if (rx+rw-1 < MAZE_W) m[y][rx+rw-1] = 1;
        }
        // Doors
        const dx1 = rx + Math.floor(rw/2);
        const dy1 = ry;
        const dy2 = ry + rh - 1;
        if (dx1 < MAZE_W) { m[dy1][dx1] = 0; m[dy2][dx1] = 0; }
        const dy3 = ry + Math.floor(rh/2);
        if (dy3 < MAZE_H) { m[dy3][rx] = 0; if(rx+rw-1<MAZE_W) m[dy3][rx+rw-1] = 0; }
      }
    }
    else if (pat === 4) {
      // Zigzag corridors
      for (let y = 4; y < MAZE_H-4; y += 5) {
        const startX = (Math.floor(y/5) % 2 === 0) ? 2 : 10;
        for (let x = startX; x < MAZE_W-2; x++) {
          m[y][x] = 1;
        }
        // Gaps every 8 tiles
        for (let g = startX+4; g < MAZE_W-2; g += 8) {
          m[y][g] = 0; m[y][g+1] = 0;
        }
      }
      // Vertical connectors
      for (let x = 6; x < MAZE_W-4; x += 12) {
        for (let y = 2; y < MAZE_H-2; y++) {
          if (m[y][x] === 0) m[y][x] = 1;
        }
        // Gaps
        for (let g = 3; g < MAZE_H-2; g += 5) {
          m[g][x] = 0; m[g+1][x] = 0;
        }
      }
    }
    else if (pat === 5) {
      // Dense labyrinth
      // Grid of small rooms
      for (let gy = 2; gy < MAZE_H-2; gy += 4) {
        for (let gx = 2; gx < MAZE_W-2; gx += 6) {
          // Small 6x4 room outlines
          for (let x = gx; x < gx+6 && x < MAZE_W-1; x++) {
            if (gy < MAZE_H) m[gy][x] = 1;
            if (gy+3 < MAZE_H) m[gy+3][x] = 1;
          }
          for (let y = gy; y < gy+4 && y < MAZE_H-1; y++) {
            m[y][gx] = 1;
            if (gx+5 < MAZE_W) m[y][gx+5] = 1;
          }
          // Door on each wall
          const dx = gx + 3;
          if (dx < MAZE_W) { m[gy][dx] = 0; if(gy+3<MAZE_H) m[gy+3][dx] = 0; }
          const dy = gy + 2;
          if (dy < MAZE_H) { m[dy][gx] = 0; if(gx+5<MAZE_W) m[dy][gx+5] = 0; }
        }
      }
    }

    // Ensure border is solid
    for (let x = 0; x < MAZE_W; x++) { m[0][x] = 1; m[MAZE_H-1][x] = 1; }
    for (let y = 0; y < MAZE_H; y++) { m[y][0] = 1; m[y][MAZE_W-1] = 1; }

    return m;
  }

  function findStart() {
    // Find open spot near center
    const cx = Math.floor(MAZE_W/2);
    const cy = Math.floor(MAZE_H/2);
    for (let r = 0; r < 20; r++) {
      for (let dy = -r; dy <= r; dy++) {
        for (let dx = -r; dx <= r; dx++) {
          const tx = cx+dx, ty = cy+dy;
          if (tx > 1 && tx < MAZE_W-2 && ty > 1 && ty < MAZE_H-2) {
            if (maze[ty][tx] === 0 && maze[ty][tx+1] === 0 && maze[ty][tx+2] === 0 && maze[ty][tx-1] === 0) {
              return {x: tx, y: ty};
            }
          }
        }
      }
    }
    return {x: 3, y: 3};
  }

  function countOpenTiles() {
    let c = 0;
    for (let y = 1; y < MAZE_H-1; y++)
      for (let x = 1; x < MAZE_W-1; x++)
        if (maze[y][x] === 0) c++;
    return c;
  }

  function placeFood() {
    let attempts = 0;
    while (attempts < 2000) {
      const fx = 1 + flr(rnd(MAZE_W-2));
      const fy = 1 + flr(rnd(MAZE_H-2));
      if (maze[fy][fx] !== 0) { attempts++; continue; }
      // Not on snake
      let onSnake = false;
      for (const seg of snake) {
        if (seg.x === fx && seg.y === fy) { onSnake = true; break; }
      }
      if (onSnake) { attempts++; continue; }
      foodX = fx;
      foodY = fy;
      return;
    }
    // Fallback
    foodX = -1; foodY = -1;
  }

  function initLevel() {
    maze = createMaze(level);
    const start = findStart();
    snake = [];
    dir = 1; // start moving right
    nextDir = 1;
    // Create initial snake (length 4, going left from head)
    for (let i = 0; i < 4; i++) {
      snake.push({x: start.x - i, y: start.y});
    }
    // Speed: gets faster each level
    moveDelay = _max(3, 8 - level);
    moveTimer = 0;
    foodEaten = 0;
    foodTotal = 10 + level * 3; // pellets to eat per level
    if (foodTotal > 30) foodTotal = 30;
    placeFood();
    bonusActive = false;
    bonusTimer = 0;
    timeLeft = 60 + level * 10; // seconds
    if (timeLeft > 120) timeLeft = 120;
    timeTick = 0;
  }

  function isWall(tx, ty) {
    if (tx < 0 || tx >= MAZE_W || ty < 0 || ty >= MAZE_H) return true;
    return maze[ty][tx] === 1;
  }

  function isSnakeBody(tx, ty) {
    // Check all but last segment (since tail moves)
    for (let i = 0; i < snake.length - 1; i++) {
      if (snake[i].x === tx && snake[i].y === ty) return true;
    }
    return false;
  }

  function canTurn(d) {
    const head = snake[0];
    const nx = head.x + DX[d];
    const ny = head.y + DY[d];
    return !isWall(nx, ny);
  }

  function startGame() {
    score = 0;
    lives = 3;
    level = 0;
    initLevel();
    state = STATE_READY;
    stateTimer = 60; // 2 seconds
  }

  // --- Title Screen ---
  function updateTitle() {
    titleAnim++;
    if (btnp("a") || btnp("a")) {
      ensureAudio();
      note(0, "C4", 0.1);
      startGame();
    }
  }

  function drawTitle() {
    cls(0);

    // Animated border
    const blink = (flr(titleAnim/15) % 2 === 0) ? 3 : 2;
    rect(4, 4, W-8, H-8, blink);
    rect(6, 6, W-12, H-12, 1);

    // Title
    const t = "NIBBLER";
    const tw = t.length * 5;
    const tx = (W - tw*3) / 2;

    // Draw big title (3x scale)
    for (let ci = 0; ci < t.length; ci++) {
      const ch = t[ci];
      const glyph = FONT[ch];
      if (!glyph) continue;
      const ox = tx + ci * 15;
      const oy = 38 + Math.floor(sin(titleAnim * 0.08 + ci * 0.5) * 4);
      const col = (ci + flr(titleAnim/10)) % 2 === 0 ? 3 : 2;
      for (let py = 0; py < FONT_H; py++) {
        for (let px = 0; px < FONT_W; px++) {
          if (glyph[py * FONT_W + px]) {
            rectf(ox + px*3, oy + py*3, 3, 3, col);
          }
        }
      }
    }

    // Subtitle
    text("SNAKE IN A MAZE", (W - 15*5)/2, 75, 2);

    // Demo snake animation
    const sy = 105;
    for (let i = 0; i < 12; i++) {
      const sx = 107 + i * 8 + Math.floor(sin(titleAnim * 0.1 + i * 0.3) * 2);
      if (i === 0) {
        sprT(6, sx, sy);
      } else {
        sprT(3, sx, sy);
      }
    }

    // Instructions
    const blink2 = (flr(titleAnim/20) % 2 === 0) ? 3 : 1;
    text("PRESS START", (W - 11*5)/2, 142, blink2);

    text("ARROWS - TURN SNAKE", (W - 19*5)/2, 165, 2);
    text("EAT ALL PELLETS", (W - 15*5)/2, 176, 2);
    text("AVOID WALLS AND YOURSELF", (W - 24*5)/2, 187, 2);

    // Hi-score
    text("HI " + String(hiScore).padStart(6, "0"), (W - 12*5)/2, 210, 1);

    // Credits
    text("GRAYBOX 2026", (W - 12*5)/2, 226, 1);
  }

  // --- Gameplay ---
  function updatePlay() {
    // Input: queue next direction
    if (btnp("up") && dir !== 2) nextDir = 0;
    else if (btnp("right") && dir !== 3) nextDir = 1;
    else if (btnp("down") && dir !== 0) nextDir = 2;
    else if (btnp("left") && dir !== 1) nextDir = 3;

    // Also allow held buttons for responsive turning
    if (btn("up") && dir !== 2 && dir !== 0 && canTurn(0)) nextDir = 0;
    else if (btn("right") && dir !== 3 && dir !== 1 && canTurn(1)) nextDir = 1;
    else if (btn("down") && dir !== 0 && dir !== 2 && canTurn(2)) nextDir = 2;
    else if (btn("left") && dir !== 1 && dir !== 3 && canTurn(3)) nextDir = 3;

    // Timer countdown
    timeTick++;
    if (timeTick >= FPS) {
      timeTick = 0;
      timeLeft--;
      if (timeLeft <= 10 && timeLeft > 0) {
        note(1, "A5", 0.05);
      }
      if (timeLeft <= 0) {
        // Time up — lose life
        die();
        return;
      }
    }

    // Movement
    moveTimer++;
    if (moveTimer >= moveDelay) {
      moveTimer = 0;

      // Try to apply queued direction
      if (canTurn(nextDir)) {
        dir = nextDir;
      }

      const head = snake[0];
      const nx = head.x + DX[dir];
      const ny = head.y + DY[dir];

      // Check collisions
      if (isWall(nx, ny) || isSnakeBody(nx, ny)) {
        die();
        return;
      }

      // Move snake
      snake.unshift({x: nx, y: ny});

      // Check food
      if (nx === foodX && ny === foodY) {
        foodEaten++;
        score += 10 * (level + 1);
        note(0, "E5", 0.08);
        note(1, "G5", 0.06);

        if (foodEaten >= foodTotal) {
          // Level complete!
          state = STATE_LEVELUP;
          stateTimer = 90;
          levelUpAnim = 0;
          score += timeLeft * 5; // time bonus
          note(0, "C5", 0.15);
          setTimeout(() => note(0, "E5", 0.15), 150);
          setTimeout(() => note(0, "G5", 0.2), 300);
          return;
        }

        placeFood();

        // Chance for bonus
        if (!bonusActive && rnd(1) < 0.25) {
          bonusActive = true;
          bonusTimer = FPS * 8; // 8 seconds
          // Place bonus
          let attempts = 0;
          while (attempts < 500) {
            const bx = 1 + flr(rnd(MAZE_W-2));
            const by = 1 + flr(rnd(MAZE_H-2));
            if (maze[by][bx] === 0) {
              let onSnake = false;
              for (const s of snake) { if (s.x===bx && s.y===by) { onSnake=true; break; } }
              if (!onSnake && !(bx===foodX && by===foodY)) {
                bonusX = bx; bonusY = by;
                break;
              }
            }
            attempts++;
          }
        }
      } else {
        // Remove tail (normal movement)
        snake.pop();
      }

      // Check bonus food
      if (bonusActive && nx === bonusX && ny === bonusY) {
        bonusActive = false;
        score += 50 * (level + 1);
        note(0, "C6", 0.1);
        note(1, "E6", 0.08);
      }
    }

    // Bonus timer
    if (bonusActive) {
      bonusTimer--;
      if (bonusTimer <= 0) bonusActive = false;
    }
  }

  function die() {
    state = STATE_DYING;
    stateTimer = 45;
    deathFrame = 0;
    note(0, "C3", 0.3);
    note(1, "E2", 0.4);
  }

  function drawMaze() {
    // Draw maze walls
    for (let y = 0; y < MAZE_H; y++) {
      for (let x = 0; x < MAZE_W; x++) {
        if (maze[y][x] === 1) {
          const px = MAZE_OX + x * 8;
          const py = MAZE_OY + y * 8;
          // Simple wall tile — use colored rectangles for speed
          rectf(px, py, 8, 8, 0);
          // Check neighbors for wall drawing style
          const hasTop = y > 0 && maze[y-1][x] === 1;
          const hasBot = y < MAZE_H-1 && maze[y+1][x] === 1;
          const hasLeft = x > 0 && maze[y][x-1] === 1;
          const hasRight = x < MAZE_W-1 && maze[y][x+1] === 1;

          // Draw a beveled wall block
          rectf(px+1, py+1, 6, 6, 1);
          if (hasTop) rectf(px+1, py, 6, 2, 1);
          if (hasBot) rectf(px+1, py+6, 6, 2, 1);
          if (hasLeft) rectf(px, py+1, 2, 6, 1);
          if (hasRight) rectf(px+6, py+1, 2, 6, 1);
          // Highlight edge
          pix(px+1, py+1, 2);
        }
      }
    }
  }

  function drawSnake() {
    // Draw snake from tail to head
    for (let i = snake.length - 1; i >= 0; i--) {
      const seg = snake[i];
      const px = MAZE_OX + seg.x * 8;
      const py = MAZE_OY + seg.y * 8;

      if (i === 0) {
        // Head — determine direction for sprite
        const c = 3; // bright
        if (dir === 0) { // up
          rectf(px+1, py, 6, 7, c);
          rectf(px+2, py, 4, 8, c);
          pix(px+2, py+1, 0); pix(px+5, py+1, 0); // eyes
        } else if (dir === 2) { // down
          rectf(px+1, py+1, 6, 7, c);
          rectf(px+2, py, 4, 8, c);
          pix(px+2, py+6, 0); pix(px+5, py+6, 0);
        } else if (dir === 1) { // right
          rectf(px+1, py+1, 7, 6, c);
          rectf(px, py+2, 8, 4, c);
          pix(px+6, py+2, 0); pix(px+6, py+5, 0);
        } else { // left
          rectf(px, py+1, 7, 6, c);
          rectf(px, py+2, 8, 4, c);
          pix(px+1, py+2, 0); pix(px+1, py+5, 0);
        }
      } else if (i === snake.length - 1) {
        // Tail
        rectf(px+2, py+2, 4, 4, 2);
      } else {
        // Body
        rectf(px+1, py+1, 6, 6, 2);
        rectf(px+2, py+2, 4, 4, 3);
      }
    }
  }

  function drawHUD() {
    // Top bar background
    rectf(0, 0, W, 14, 0);
    line(0, 14, W, 14, 1);

    // Score
    text("SCORE " + String(score).padStart(6, "0"), 4, HUD_Y, 3);

    // Level
    text("LV" + String(level+1).padStart(2, "0"), 70, HUD_Y, 2);

    // Pellets remaining
    text("FOOD " + String(foodTotal - foodEaten).padStart(2, "0") + "/" + String(foodTotal).padStart(2, "0"), 96, HUD_Y, 2);

    // Lives
    for (let i = 0; i < lives; i++) {
      sprT(8, 200 + i * 10, HUD_Y - 1);
    }

    // Hi score
    text("HI " + String(hiScore).padStart(6, "0"), 272, HUD_Y, 1);

    // Timer bar at bottom
    rectf(0, H-12, W, 12, 0);
    line(0, H-12, W, H-12, 1);

    // Timer text
    const tCol = timeLeft <= 10 ? ((flr(API.frame/8) % 2 === 0) ? 3 : 1) : 2;
    text("TIME " + String(timeLeft).padStart(3, "0"), 8, H-10, tCol);

    // Timer bar
    const barW = 267;
    const barX = 40;
    const barY = H - 9;
    const maxTime = 60 + level * 10 > 120 ? 120 : 60 + level * 10;
    const fill = Math.floor((timeLeft / maxTime) * barW);
    rect(barX, barY, barW, 5, 1);
    if (fill > 0) {
      const fc = timeLeft <= 10 ? 1 : (timeLeft <= 20 ? 2 : 3);
      rectf(barX+1, barY+1, fill-2, 3, fc);
    }
  }

  function drawPlay() {
    cls(0);
    drawMaze();

    // Draw food
    if (foodX >= 0) {
      const fpx = MAZE_OX + foodX * 8;
      const fpy = MAZE_OY + foodY * 8;
      // Pulsing food
      const pulse = sin(API.frame * 0.15) * 0.5 + 0.5;
      const fc = pulse > 0.5 ? 3 : 2;
      circf(fpx+4, fpy+4, 3, fc);
      pix(fpx+3, fpy+2, 3);
    }

    // Draw bonus food
    if (bonusActive) {
      const bpx = MAZE_OX + bonusX * 8;
      const bpy = MAZE_OY + bonusY * 8;
      const blink = flr(API.frame / 4) % 2;
      if (bonusTimer > 60 || blink === 0) {
        sprT(7, bpx, bpy);
      }
    }

    drawSnake();
    drawHUD();
  }

  function updateReady() {
    stateTimer--;
    readyBlink++;
    if (stateTimer <= 0) {
      state = STATE_PLAY;
    }
  }

  function drawReady() {
    cls(0);
    drawMaze();
    drawSnake();
    drawHUD();

    // "READY" overlay
    const blink = flr(readyBlink / 10) % 2 === 0 ? 3 : 2;
    rectf((W-80)/2, (H-30)/2, 80, 30, 0);
    rect((W-80)/2, (H-30)/2, 80, 30, blink);
    text("READY!", (W - 6*5)/2, H/2 - 3, blink);
    text("LV " + String(level+1), (W - 4*5)/2, H/2 + 8, 2);
  }

  function updateDying() {
    stateTimer--;
    deathFrame++;
    if (stateTimer <= 0) {
      lives--;
      if (lives <= 0) {
        state = STATE_GAMEOVER;
        stateTimer = 120;
        if (score > hiScore) hiScore = score;
      } else {
        // Restart level
        initLevel();
        state = STATE_READY;
        stateTimer = 60;
      }
    }
  }

  function drawDying() {
    cls(0);
    drawMaze();
    drawHUD();

    // Flash snake and show explosion
    const head = snake[0];
    const hpx = MAZE_OX + head.x * 8;
    const hpy = MAZE_OY + head.y * 8;

    if (flr(deathFrame / 3) % 2 === 0) {
      drawSnake();
    }

    // Explosion at head
    if (deathFrame < 15) {
      const r = 2 + deathFrame;
      circ(hpx+4, hpy+4, r, 3);
      circ(hpx+4, hpy+4, r-2, 2);
    } else if (deathFrame < 30) {
      const r = 17 - (deathFrame - 15);
      circ(hpx+4, hpy+4, r, 2);
      circ(hpx+4, hpy+4, r-1, 1);
    }
  }

  function updateLevelUp() {
    stateTimer--;
    levelUpAnim++;
    if (stateTimer <= 0) {
      level++;
      initLevel();
      state = STATE_READY;
      stateTimer = 60;
    }
  }

  function drawLevelUp() {
    cls(0);
    drawMaze();
    drawSnake();
    drawHUD();

    // Celebration overlay
    const blink = flr(levelUpAnim / 8) % 2 === 0 ? 3 : 2;
    rectf((W-107)/2, (H-45)/2, 107, 45, 0);
    rect((W-107)/2, (H-45)/2, 107, 45, blink);

    text("MAZE CLEAR!", (W - 11*5)/2, H/2 - 14, 3);
    text("TIME BONUS +" + String(timeLeft * 5), (W - 18*5)/2, H/2 - 3, 2);
    text("NEXT MAZE...", (W - 12*5)/2, H/2 + 9, blink);

    // Sparkle particles
    for (let i = 0; i < 6; i++) {
      const angle = (levelUpAnim * 0.05 + i * 1.047);
      const r = 27 + sin(levelUpAnim * 0.1 + i) * 10;
      const px = W/2 + Math.floor(cos(angle) * r);
      const py = H/2 + Math.floor(sin(angle) * r);
      pix(px, py, 3);
      pix(px+1, py, 2);
    }
  }

  function updateGameOver() {
    stateTimer--;
    titleAnim++;
    if (stateTimer <= 0 && (btnp("a") || btnp("a"))) {
      state = STATE_TITLE;
    }
  }

  function drawGameOver() {
    cls(0);
    drawMaze();
    drawHUD();

    // Game Over overlay
    rectf((W-120)/2, (H-60)/2, 120, 60, 0);
    rect((W-120)/2, (H-60)/2, 120, 60, 1);
    rect((W-118)/2, (H-58)/2, 116, 56, 2);

    const blink = flr(titleAnim / 15) % 2 === 0 ? 3 : 2;
    text("GAME OVER", (W - 9*5)/2, H/2 - 19, blink);
    text("SCORE " + String(score).padStart(6, "0"), (W - 12*5)/2, H/2 - 6, 3);
    text("HI    " + String(hiScore).padStart(6, "0"), (W - 12*5)/2, H/2 + 4, 2);

    if (stateTimer <= 0) {
      const blink2 = flr(titleAnim / 20) % 2 === 0 ? 3 : 1;
      text("PRESS START", (W - 11*5)/2, H/2 + 16, blink2);
    }
  }

  // --- Main Loop ---
  state = STATE_TITLE;
  stateTimer = 0;
  titleAnim = 0;

  API._update = function() {
    switch (state) {
      case STATE_TITLE: updateTitle(); break;
      case STATE_READY: updateReady(); break;
      case STATE_PLAY: updatePlay(); break;
      case STATE_DYING: updateDying(); break;
      case STATE_LEVELUP: updateLevelUp(); break;
      case STATE_GAMEOVER: updateGameOver(); break;
    }
  };

  API._draw = function() {
    switch (state) {
      case STATE_TITLE: drawTitle(); break;
      case STATE_READY: drawReady(); break;
      case STATE_PLAY: drawPlay(); break;
      case STATE_DYING: drawDying(); break;
      case STATE_LEVELUP: drawLevelUp(); break;
      case STATE_GAMEOVER: drawGameOver(); break;
    }
  };

  // Start game loop
  if (API._init) API._init();
  setInterval(tick, 1000 / FPS);
})();
</script>
