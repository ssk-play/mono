<!DOCTYPE html>
<html lang="en">
<head>

<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mono — Demo: Pengo</title>
<link rel="stylesheet" href="../../runtime/mono.css">
</head>
<body>
<div id="frame">
  <canvas id="screen"></canvas>
</div>
<div id="controls">
  <span>ARROWS</span> MOVE &nbsp;&nbsp; <span>A</span> PUSH/BREAK
</div>
<script src="../../runtime/engine.js"></script>
<script>
(() => {
  "use strict";
  const W = Mono.WIDTH, H = Mono.HEIGHT;
  const { cls, pix, line, rect, rectf, circ, circf, sprite: defSprite,
          spr, text, btn, btnp, note, stop, rnd, flr, abs: _abs,
          min, max: _max, sin, cos, dbg, dbgC, overlap } = Mono;

  // --- 8->16 upscale helper ---
  function up(d) {
    let o = "";
    for (let r = 0; r < 8; r++) {
      let row = "";
      for (let c = 0; c < 8; c++) {
        const ch = d[r * 8 + c];
        row += ch + ch;
      }
      o += row + row;
    }
    return o;
  }

  // --- Circle collision helper ---
  function circCollide(x1, y1, r1, x2, y2, r2) {
    const dx = x1 - x2, dy = y1 - y2;
    return Math.sqrt(dx * dx + dy * dy) < r1 + r2;
  }

  // --- Font metrics ---
  const FONT_W = 4, FONT_H = 7;

  // --- Grid constants ---
  // Arena: 13 columns x 13 rows of 16x16 cells = 208x208
  // Centered in 320x240 with room for HUD
  const COLS = 13;
  const ROWS = 13;
  const TILE = 16;
  const ARENA_W = COLS * TILE;   // 208
  const ARENA_H = ROWS * TILE;   // 208
  const ARENA_X = flr((W - ARENA_W) / 2);  // 56
  const ARENA_Y = 14;
  const WALL_T = 4;  // wall thickness (visual only)

  // Cell types
  const EMPTY = 0;
  const ICE = 1;
  const DIAMOND = 2;
  const EGG = 3;

  // --- Sprites (all 16x16 via upscale) ---

  // 1: Pengo facing down frame 1
  defSprite(1, up(

    "00333300" +
    "00300300"
  ));

  // 6: Pengo facing right frame 2
  defSprite(6, up(

  // 10: Ice block
  defSprite(10, up(

    "21222212" +

  // 14: Diamond block
  defSprite(14, up(

  // 20: Sno-Bee enemy frame 1
  defSprite(20, up(

  ));
  // 21: Sno-Bee enemy frame 2
  defSprite(21, up(

  ));
  // 22: Sno-Bee stunned
  defSprite(22, up(

  // 25: Explosion frame 1
  defSprite(25, up(

  ));
  // 26: Explosion frame 2
  defSprite(26, up(
    "10001001" +

    "01000100" +
    "00010000" +
    "01000100" +
    "00100010" +
    "10001001" +
    "00000000"
  ));
  // 31: Pengo push frame
  defSprite(31, up(
    "00333300" +
    "03333330" +
    "33233230" +
    "33333330" +
    "33333300" +
    "33322330" +
    "00333300" +
    "00300300"
  ));
  // 32: Life icon (small, rendered at native 16x16 but visually small)
  defSprite(32, up(
    "00000000" +
    "00333300" +
    "03233230" +
    "03333300" +
    "00322300" +
    "00333300" +
    "00000000" +
    "00000000"
  ));
  // 33: Egg crack
  defSprite(33, up(
    "22222222" +
    "21111112" +
    "21200212" +
    "21022012" +
    "21200212" +
    "21022012" +
    "21111112" +
    "22222222"
  ));

  // --- Game state ---
  const { TITLE, PLAY, GAMEOVER } = Mono.SCENE;
  let grid = [];
  let pengo, enemies, slidingBlocks, explosions, particles;
  let score, lives, level, wallShakeTimer, wallShakeDir;
  let levelClearTimer, deathTimer, bonusPopups;
  let diamondBonusTimer, diamondBonusText;
  let hatchTimers;

  function initGrid() {
    grid = [];
    for (let c = 0; c < COLS; c++) {
      grid[c] = [];
      for (let r = 0; r < ROWS; r++) {
        grid[c][r] = EMPTY;
      }
    }
    // Fill ~55% with ice
    for (let c = 0; c < COLS; c++) {
      for (let r = 0; r < ROWS; r++) {
        if (rnd(1) < 0.55) grid[c][r] = ICE;
      }
    }
    // Place 3 diamond blocks
    let placed = 0;
    while (placed < 3) {
      const c = flr(rnd(COLS));
      const r = flr(rnd(ROWS));
      if (grid[c][r] === ICE) { grid[c][r] = DIAMOND; placed++; }
    }
    // Place egg blocks
    const numEggs = min(3 + level, 8);
    let eggsPlaced = 0;
    while (eggsPlaced < numEggs) {
      const c = flr(rnd(COLS));
      const r = flr(rnd(ROWS));
      if (grid[c][r] === ICE) { grid[c][r] = EGG; eggsPlaced++; }
    }
    // Clear pengo spawn area
    const pc = flr(COLS / 2);
    const pr = ROWS - 1;
    grid[pc][pr] = EMPTY;
    if (pc > 0) grid[pc - 1][pr] = EMPTY;
    if (pc < COLS - 1) grid[pc + 1][pr] = EMPTY;
    if (pr > 0) grid[pc][pr - 1] = EMPTY;
  }

  function resetGame() {
    score = 0;
    lives = 3;
    level = 1;
    startLevel();
  }

  function startLevel() {
    initGrid();
    pengo = {
      cx: flr(COLS / 2), cy: ROWS - 1,
      dir: 1, // 0=down,1=up,2=left,3=right
      moveTimer: 0, pushTimer: 0,
      animFrame: 0, animTimer: 0,
      invincible: 0
    };
    enemies = [];
    slidingBlocks = [];
    explosions = [];
    particles = [];
    bonusPopups = [];
    wallShakeTimer = 0;
    wallShakeDir = 0;
    levelClearTimer = 0;
    deathTimer = 0;
    diamondBonusTimer = 0;
    diamondBonusText = "";
    hatchTimers = [];

    // Spawn 2 free enemies
    for (let i = 0; i < min(2, 3 + level); i++) spawnFreeEnemy();

    // Set up egg hatch timers
    const eggCells = [];
    for (let c = 0; c < COLS; c++)
      for (let r = 0; r < ROWS; r++)
        if (grid[c][r] === EGG) eggCells.push({ c, r });

    for (let i = 0; i < eggCells.length; i++) {
      hatchTimers.push({
        cx: eggCells[i].c, cy: eggCells[i].r,
        timer: 150 + flr(rnd(250)) + i * 100,
        hatching: false, hatchAnim: 0
      });
    }
  }

  function spawnFreeEnemy() {
    for (let a = 0; a < 200; a++) {
      const c = flr(rnd(COLS));
      const r = flr(rnd(ROWS - 4));
      if (grid[c][r] === EMPTY) {
        const dist = _abs(c - (pengo ? pengo.cx : flr(COLS/2))) + _abs(r - (pengo ? pengo.cy : ROWS-1));
        if (dist > 5) { enemies.push(createEnemy(c, r)); return; }
      }
    }
  }

  function createEnemy(cx, cy) {
    return {
      cx, cy, dir: flr(rnd(4)),
      moveTimer: 0,
      moveDelay: _max(6, 18 - level * 2),
      stunTimer: 0,
      animFrame: 0, animTimer: 0,
      breakTimer: 0,
      targetBlock: null,
      alive: true
    };
  }

  function cellToX(cx) { return ARENA_X + cx * TILE; }
  function cellToY(cy) { return ARENA_Y + cy * TILE; }
  function cellCenterX(cx) { return ARENA_X + cx * TILE + TILE / 2; }
  function cellCenterY(cy) { return ARENA_Y + cy * TILE + TILE / 2; }
  function inBounds(cx, cy) { return cx >= 0 && cx < COLS && cy >= 0 && cy < ROWS; }

  // Collision radius for circle-based checks (characters fill ~10px of 16px tile)
  const CHAR_R = 6;

  const DX = [0, 0, -1, 1];
  const DY = [1, -1, 0, 0];
  function dirDx(dir) { return DX[dir]; }
  function dirDy(dir) { return DY[dir]; }

  // --- Sound effects ---
  function pushSound() { note(0, "E4", 0.05); }
  function crushSound() { note(0, "C3", 0.08); setTimeout(() => note(0, "G2", 0.06), 50); }
  function stunSound() { note(1, "A5", 0.04); setTimeout(() => note(1, "E5", 0.04), 40); }
  function wallShakeSound() { note(0, "C2", 0.06); note(1, "G2", 0.06); }
  function breakBlockSound() { note(0, "G3", 0.04); }
  function deathSound() {
    note(0, "C3", 0.12); note(1, "G2", 0.12);
    setTimeout(() => { note(0, "A2", 0.18); note(1, "E2", 0.18); }, 120);
  }
  function diamondBonusSound() {
    note(0, "C5", 0.1);
    setTimeout(() => note(0, "E5", 0.1), 80);
    setTimeout(() => note(0, "G5", 0.1), 160);
    setTimeout(() => note(0, "C6", 0.2), 240);
  }
  function levelClearSound() {
    note(0, "G5", 0.1);
    setTimeout(() => note(0, "A5", 0.1), 100);
    setTimeout(() => note(0, "B5", 0.1), 200);
    setTimeout(() => note(0, "C6", 0.2), 300);
  }
  function hatchSound() { note(1, "D4", 0.06); setTimeout(() => note(1, "F4", 0.04), 50); }

  // --- Block push logic ---
  function pushBlock(cx, cy, dir) {
    const type = grid[cx][cy];
    if (type === EMPTY) return;

    const dx = dirDx(dir);
    const dy = dirDy(dir);

    // Find slide destination
    let nx = cx + dx;
    let ny = cy + dy;
    let crushed = [];

    while (inBounds(nx, ny) && grid[nx][ny] === EMPTY) {
      // Check enemies in path — use circle collision for sliding block vs enemy
      const blockCX = cellCenterX(nx);
      const blockCY = cellCenterY(ny);
      for (const e of enemies) {
        if (e.alive && e.stunTimer <= 0) {
          const eCX = cellCenterX(e.cx);
          const eCY = cellCenterY(e.cy);
          if (circCollide(blockCX, blockCY, TILE / 2, eCX, eCY, CHAR_R)) {
            crushed.push(e);
            dbgC(eCX, eCY, CHAR_R);
          }
        }
      }
      nx += dx;
      ny += dy;
    }

    const finalX = nx - dx;
    const finalY = ny - dy;

    // Nothing moved
    if (finalX === cx && finalY === cy) return false;

    grid[cx][cy] = EMPTY;
    // Remove hatch timer
    hatchTimers = hatchTimers.filter(h => h.cx !== cx || h.cy !== cy);

    // Crush enemies
    for (const e of crushed) {
      e.alive = false;
      addExplosion(cellCenterX(e.cx), cellCenterY(e.cy));
      score += 400;
      crushSound();
      bonusPopups.push({ x: cellToX(e.cx), y: cellToY(e.cy), text: "400", timer: 40 });
    }

    const hitWall = !inBounds(nx, ny);
    if (hitWall) {
      // Block destroyed by wall
      addExplosion(cellCenterX(finalX), cellCenterY(finalY));
      breakBlockSound();
    } else {
      // Block stops
      grid[finalX][finalY] = type;
    }

    // Visual sliding
    slidingBlocks.push({
      type, dir,
      x: cellToX(cx), y: cellToY(cy),
      toX: cellToX(finalX), toY: cellToY(finalY),
      speed: 8, done: false
    });

    pushSound();
    checkDiamondBonus();
    return true;
  }

  function checkDiamondBonus() {
    // Horizontal
    for (let r = 0; r < ROWS; r++) {
      for (let c = 0; c <= COLS - 3; c++) {
        if (grid[c][r] === DIAMOND && grid[c+1][r] === DIAMOND && grid[c+2][r] === DIAMOND) {
          awardDiamondBonus();
          return;
        }
      }
    }
    // Vertical
    for (let c = 0; c < COLS; c++) {
      for (let r = 0; r <= ROWS - 3; r++) {
        if (grid[c][r] === DIAMOND && grid[c][r+1] === DIAMOND && grid[c][r+2] === DIAMOND) {
          awardDiamondBonus();
          return;
        }
      }
    }
  }

  function awardDiamondBonus() {
    score += 10000;
    diamondBonusTimer = 90;
    diamondBonusText = "DIAMOND BONUS 10000!";
    diamondBonusSound();
    for (const e of enemies) { if (e.alive) e.stunTimer = 120; }
  }

  function wallVibrate(dir) {
    wallShakeTimer = 15;
    wallShakeDir = dir;
    wallShakeSound();
    for (const e of enemies) {
      if (!e.alive) continue;
      let onWall = false;
      if (dir === 0 && e.cy === ROWS - 1) onWall = true;
      if (dir === 1 && e.cy === 0) onWall = true;
      if (dir === 2 && e.cx === 0) onWall = true;
      if (dir === 3 && e.cx === COLS - 1) onWall = true;
      if (onWall) {
        e.stunTimer = 90;
        stunSound();
        score += 100;
        bonusPopups.push({ x: cellToX(e.cx), y: cellToY(e.cy), text: "100", timer: 30 });
      }
    }
  }

  function addExplosion(x, y) {
    explosions.push({ x, y, timer: 12 });
    for (let i = 0; i < 6; i++)
      particles.push({
        x, y, vx: rnd(3) - 1.5, vy: rnd(3) - 1.5,
        life: 5 + flr(rnd(8)), color: flr(rnd(3)) + 1
      });
  }

  function isLevelClear() {
    return enemies.filter(e => e.alive).length === 0 && hatchTimers.length === 0;
  }

  function killPengo() {
    if (deathTimer > 0) return;
    lives--;
    deathTimer = 60;
    addExplosion(cellCenterX(pengo.cx), cellCenterY(pengo.cy));
    deathSound();
  }

  // ============================================================
  // Update
  // ============================================================
  function updatePlay() {
    // --- Play state ---
    if (deathTimer > 0) {
      deathTimer--;
      // Update particles during death
      for (let i = particles.length - 1; i >= 0; i--) {
        const p = particles[i]; p.x += p.vx; p.y += p.vy; p.vy += 0.06; p.life--;
        if (p.life <= 0) particles.splice(i, 1);
      }
      for (let i = explosions.length - 1; i >= 0; i--) {
        explosions[i].timer--;
        if (explosions[i].timer <= 0) explosions.splice(i, 1);
      }
      if (deathTimer === 0) {
        if (lives <= 0) { Mono.go(GAMEOVER); return; }
        pengo.cx = flr(COLS / 2);
        pengo.cy = ROWS - 1;
        pengo.invincible = 60;
        // Clear area around respawn
        grid[pengo.cx][pengo.cy] = EMPTY;
        if (pengo.cx > 0) grid[pengo.cx - 1][pengo.cy] = EMPTY;
        if (pengo.cx < COLS - 1) grid[pengo.cx + 1][pengo.cy] = EMPTY;
        if (pengo.cy > 0) grid[pengo.cx][pengo.cy - 1] = EMPTY;
      }
      return;
    }

    // Level clear
    if (isLevelClear() && levelClearTimer === 0) {
      levelClearTimer = 90;
      levelClearSound();
    }
    if (levelClearTimer > 0) {
      levelClearTimer--;
      if (levelClearTimer === 0) { level++; startLevel(); }
      return;
    }

    // Timers
    if (wallShakeTimer > 0) wallShakeTimer--;
    if (diamondBonusTimer > 0) diamondBonusTimer--;
    if (pengo.invincible > 0) pengo.invincible--;

    for (let i = bonusPopups.length - 1; i >= 0; i--) {
      bonusPopups[i].timer--;
      bonusPopups[i].y -= 0.5;
      if (bonusPopups[i].timer <= 0) bonusPopups.splice(i, 1);
    }

    // --- Pengo movement ---
    if (pengo.moveTimer > 0) pengo.moveTimer--;
    if (pengo.pushTimer > 0) pengo.pushTimer--;

    pengo.animTimer++;
    if (pengo.animTimer >= 8) { pengo.animTimer = 0; pengo.animFrame = 1 - pengo.animFrame; }

    if (pengo.moveTimer <= 0 && pengo.pushTimer <= 0) {
      let moveDir = -1;
      if (btn("down")) moveDir = 0;
      else if (btn("up")) moveDir = 1;
      else if (btn("left")) moveDir = 2;
      else if (btn("right")) moveDir = 3;

      if (moveDir >= 0) {
        pengo.dir = moveDir;
        const nx = pengo.cx + dirDx(moveDir);
        const ny = pengo.cy + dirDy(moveDir);
        if (inBounds(nx, ny) && grid[nx][ny] === EMPTY) {
          const occ = enemies.some(e => e.alive && e.cx === nx && e.cy === ny && e.stunTimer <= 0);
          if (!occ) {
            pengo.cx = nx;
            pengo.cy = ny;
            pengo.moveTimer = 4;
          }
        }
      }
    }

    // --- Push action (Z) ---
    if (btnp("a") && pengo.pushTimer <= 0) {
      const tx = pengo.cx + dirDx(pengo.dir);
      const ty = pengo.cy + dirDy(pengo.dir);
      pengo.pushTimer = 10;

      if (!inBounds(tx, ty)) {
        // Push against arena wall
        wallVibrate(pengo.dir);
      } else if (grid[tx][ty] !== EMPTY) {
        // Try to push the block
        const behindX = tx + dirDx(pengo.dir);
        const behindY = ty + dirDy(pengo.dir);
        if (!inBounds(behindX, behindY) || grid[behindX][behindY] === EMPTY) {
          pushBlock(tx, ty, pengo.dir);
        } else {
          // Can't push - break the block instead (not diamonds)
          if (grid[tx][ty] !== DIAMOND) {
            grid[tx][ty] = EMPTY;
            hatchTimers = hatchTimers.filter(h => h.cx !== tx || h.cy !== ty);
            addExplosion(cellCenterX(tx), cellCenterY(ty));
            breakBlockSound();
            score += 30;
          } else {
            // Can't break diamond blocks
            pushSound();
          }
        }
      }
    }

    // --- Sliding blocks visual ---
    for (let i = slidingBlocks.length - 1; i >= 0; i--) {
      const sb = slidingBlocks[i];
      sb.x += dirDx(sb.dir) * sb.speed;
      sb.y += dirDy(sb.dir) * sb.speed;
      const ddx = _abs(sb.toX - sb.x);
      const ddy = _abs(sb.toY - sb.y);
      if (ddx <= sb.speed && ddy <= sb.speed) slidingBlocks.splice(i, 1);
    }

    // --- Egg hatching ---
    for (let i = hatchTimers.length - 1; i >= 0; i--) {
      const h = hatchTimers[i];
      if (grid[h.cx][h.cy] !== EGG) { hatchTimers.splice(i, 1); continue; }
      h.timer--;
      if (h.timer <= 30 && !h.hatching) h.hatching = true;
      if (h.hatching) h.hatchAnim++;
      if (h.timer <= 0) {
        grid[h.cx][h.cy] = EMPTY;
        enemies.push(createEnemy(h.cx, h.cy));
        hatchTimers.splice(i, 1);
        hatchSound();
      }
    }

    // --- Enemy AI ---
    for (const e of enemies) {
      if (!e.alive) continue;
      if (e.stunTimer > 0) { e.stunTimer--; continue; }

      e.animTimer++;
      if (e.animTimer >= 10) { e.animTimer = 0; e.animFrame = 1 - e.animFrame; }

      // Breaking block
      if (e.breakTimer > 0) {
        e.breakTimer--;
        if (e.breakTimer === 0 && e.targetBlock) {
          const bx = e.targetBlock.cx;
          const by = e.targetBlock.cy;
          if (inBounds(bx, by) && grid[bx][by] !== EMPTY && grid[bx][by] !== DIAMOND) {
            grid[bx][by] = EMPTY;
            hatchTimers = hatchTimers.filter(h => h.cx !== bx || h.cy !== by);
            addExplosion(cellCenterX(bx), cellCenterY(by));
            breakBlockSound();
          }
          e.targetBlock = null;
        }
        continue;
      }

      e.moveTimer--;
      if (e.moveTimer <= 0) {
        e.moveTimer = e.moveDelay;

        const ddx = pengo.cx - e.cx;
        const ddy = pengo.cy - e.cy;

        let dirs;
        if (rnd(1) < 0.2) {
          // Random movement
          dirs = [flr(rnd(4)), flr(rnd(4)), flr(rnd(4)), flr(rnd(4))];
        } else {
          // Chase pengo
          dirs = [];
          if (_abs(ddx) > _abs(ddy)) {
            dirs.push(ddx > 0 ? 3 : 2);
            dirs.push(ddy > 0 ? 0 : 1);
            dirs.push(ddy > 0 ? 1 : 0);
            dirs.push(ddx > 0 ? 2 : 3);
          } else {
            dirs.push(ddy > 0 ? 0 : 1);
            dirs.push(ddx > 0 ? 3 : 2);
            dirs.push(ddx > 0 ? 2 : 3);
            dirs.push(ddy > 0 ? 1 : 0);
          }
        }

        for (const dir of dirs) {
          const nx = e.cx + dirDx(dir);
          const ny = e.cy + dirDy(dir);
          if (!inBounds(nx, ny)) continue;
          if (grid[nx][ny] === EMPTY) {
            const occ = enemies.some(o => o !== e && o.alive && o.cx === nx && o.cy === ny);
            if (!occ) {
              e.cx = nx; e.cy = ny; e.dir = dir;
              break;
            }
          } else if (grid[nx][ny] !== DIAMOND && rnd(1) < 0.25) {
            e.breakTimer = 15;
            e.targetBlock = { cx: nx, cy: ny };
            e.dir = dir;
            break;
          }
        }
      }
    }

    // Enemy-pengo collision (circle-based)
    if (pengo.invincible <= 0) {
      const pCX = cellCenterX(pengo.cx);
      const pCY = cellCenterY(pengo.cy);
      dbgC(pCX, pCY, CHAR_R);  // debug: pengo hitbox
      for (const e of enemies) {
        if (!e.alive || e.stunTimer > 0) continue;
        const eCX = cellCenterX(e.cx);
        const eCY = cellCenterY(e.cy);
        dbgC(eCX, eCY, CHAR_R);  // debug: enemy hitbox
        if (circCollide(pCX, pCY, CHAR_R, eCX, eCY, CHAR_R)) {
          killPengo();
          break;
        }
      }
    }

    // Stomp stunned enemies (circle-based)
    {
      const pCX = cellCenterX(pengo.cx);
      const pCY = cellCenterY(pengo.cy);
      for (const e of enemies) {
        if (!e.alive || e.stunTimer <= 0) continue;
        const eCX = cellCenterX(e.cx);
        const eCY = cellCenterY(e.cy);
        if (circCollide(pCX, pCY, CHAR_R, eCX, eCY, CHAR_R)) {
          e.alive = false;
          addExplosion(cellCenterX(e.cx), cellCenterY(e.cy));
          score += 500;
          crushSound();
          bonusPopups.push({ x: cellToX(e.cx), y: cellToY(e.cy), text: "500", timer: 40 });
        }
      }
    }

    enemies = enemies.filter(e => e.alive);

    // Explosions & particles
    for (let i = explosions.length - 1; i >= 0; i--) {
      explosions[i].timer--;
      if (explosions[i].timer <= 0) explosions.splice(i, 1);
    }
    for (let i = particles.length - 1; i >= 0; i--) {
      const p = particles[i]; p.x += p.vx; p.y += p.vy; p.vy += 0.06; p.life--;
      if (p.life <= 0) particles.splice(i, 1);
    }
  }

  function drawPlayScene() {
    cls(0);

    const shk = wallShakeTimer > 0 ? flr(sin(wallShakeTimer * 2) * 2) : 0;
    const shX = (wallShakeDir >= 2) ? shk : 0;
    const shY = (wallShakeDir < 2) ? shk : 0;

    // Arena background
    rectf(ARENA_X - 1, ARENA_Y - 1, ARENA_W + 2, ARENA_H + 2, 0);

    // Walls (thin border style for 16x16 layout)
    const wc = wallShakeTimer > 0 && flr(Mono.frame / 2) % 2 === 0 ? 2 : 1;
    // Top wall
    rectf(ARENA_X - WALL_T + shX, ARENA_Y - WALL_T + shY, ARENA_W + WALL_T * 2, WALL_T, wc);
    // Bottom wall
    rectf(ARENA_X - WALL_T + shX, ARENA_Y + ARENA_H + shY, ARENA_W + WALL_T * 2, WALL_T, wc);
    // Left wall
    rectf(ARENA_X - WALL_T + shX, ARENA_Y + shY, WALL_T, ARENA_H, wc);
    // Right wall
    rectf(ARENA_X + ARENA_W + shX, ARENA_Y + shY, WALL_T, ARENA_H, wc);
    // Wall detail lines
    for (let i = 0; i <= COLS; i++) {
      const wx = ARENA_X + i * TILE + shX;
      line(wx, ARENA_Y - WALL_T + shY, wx, ARENA_Y + shY - 1, 0);
      line(wx, ARENA_Y + ARENA_H + shY, wx, ARENA_Y + ARENA_H + WALL_T + shY, 0);
    }
    for (let j = 0; j <= ROWS; j++) {
      const wy = ARENA_Y + j * TILE + shY;
      line(ARENA_X - WALL_T + shX, wy, ARENA_X + shX - 1, wy, 0);
      line(ARENA_X + ARENA_W + shX, wy, ARENA_X + ARENA_W + WALL_T + shX, wy, 0);
    }
    // Wall inner border
    rect(ARENA_X - 1 + shX, ARENA_Y - 1 + shY, ARENA_W + 2, ARENA_H + 2, wc === 2 ? 3 : 2);

    // Grid cells — native 16x16 sprites
    for (let c = 0; c < COLS; c++) {
      for (let r = 0; r < ROWS; r++) {
        const x = cellToX(c) + shX;
        const y = cellToY(r) + shY;
        const cell = grid[c][r];
        if (cell === ICE || cell === EGG) {
          let hatching = false;
          if (cell === EGG) {
            const ht = hatchTimers.find(h => h.cx === c && h.cy === r);
            if (ht && ht.hatching) hatching = true;
          }
          if (hatching && flr(Mono.frame / 4) % 2 === 0) {
            spr(33, x, y);
          } else {
            spr(10, x, y);
          }
          dbg(x, y, TILE, TILE);  // debug: block hitbox
        } else if (cell === DIAMOND) {
          spr(14, x, y);
          dbg(x, y, TILE, TILE);  // debug: diamond hitbox
        }
      }
    }

    // Sliding blocks
    for (const sb of slidingBlocks) {
      const sprId = sb.type === DIAMOND ? 14 : 10;
      spr(sprId, flr(sb.x) + shX, flr(sb.y) + shY);
    }

    // Enemies — native 16x16 sprites
    for (const e of enemies) {
      if (!e.alive) continue;
      const ex = cellToX(e.cx) + shX;
      const ey = cellToY(e.cy) + shY;
      if (e.stunTimer > 0) {
        if (e.stunTimer < 30 && flr(Mono.frame / 4) % 2 === 0) continue;
        spr(22, ex, ey);
      } else {
        spr(e.animFrame === 0 ? 20 : 21, ex, ey);
      }
      dbgC(cellCenterX(e.cx), cellCenterY(e.cy), CHAR_R);  // debug: enemy circle
    }

    // Pengo — native 16x16 sprites
    if (deathTimer <= 0) {
      if (pengo.invincible <= 0 || flr(Mono.frame / 3) % 2 === 0) {
        const px = cellToX(pengo.cx) + shX;
        const py = cellToY(pengo.cy) + shY;
        let sprId;
        if (pengo.pushTimer > 5) {
          sprId = 31;
        } else if (pengo.dir === 0) {
          sprId = pengo.animFrame === 0 ? 1 : 2;
        } else if (pengo.dir === 1) {
          sprId = pengo.animFrame === 0 ? 3 : 4;
        } else {
          sprId = pengo.animFrame === 0 ? 5 : 6;
        }
        spr(sprId, px, py, pengo.dir === 2);
        dbgC(cellCenterX(pengo.cx), cellCenterY(pengo.cy), CHAR_R);  // debug: pengo circle
      }
    }

    // Explosions — native 16x16 sprites
    for (const e of explosions) {
      const sprId = e.timer > 6 ? 25 : 26;
      spr(sprId, flr(e.x) - TILE / 2, flr(e.y) - TILE / 2);
    }

    // Particles
    for (const p of particles) pix(flr(p.x), flr(p.y), p.color);

    // Bonus popups
    for (const bp of bonusPopups) text(bp.text, flr(bp.x) + 2, flr(bp.y), 3);

    // Diamond bonus overlay
    if (diamondBonusTimer > 0) {
      const msg = diamondBonusText;
      const bx = W / 2 - (msg.length * (FONT_W + 1)) / 2;
      rectf(bx - 4, H / 2 - 10, msg.length * (FONT_W + 1) + 8, 16, 0);
      rect(bx - 4, H / 2 - 10, msg.length * (FONT_W + 1) + 8, 16, 3);
      text(msg, flr(bx), H / 2 - 6, 3);
    }

    // Level clear overlay
    if (levelClearTimer > 0) {
      const msg = "LEVEL " + level + " CLEAR!";
      const bx = W / 2 - (msg.length * (FONT_W + 1)) / 2;
      rectf(bx - 4, H / 2 - 10, msg.length * (FONT_W + 1) + 8, 16, 0);
      rect(bx - 4, H / 2 - 10, msg.length * (FONT_W + 1) + 8, 16, 3);
      text(msg, flr(bx), H / 2 - 6, 3);
    }

    // HUD top
    rectf(0, 0, W, 12, 0);
    text("SCORE:" + score, 3, 3, 3);
    text("LV:" + level, W / 2 - 10, 3, 2);
    for (let i = 0; i < lives; i++) spr(32, W - 50 + i * 18, 0);

    // HUD bottom (below arena + wall)
    const hudY = ARENA_Y + ARENA_H + WALL_T + 2;
    rectf(0, hudY, W, H - hudY, 0);
    const ac = enemies.filter(e => e.alive).length;
    text("ENEMIES:" + ac + "  EGGS:" + hatchTimers.length, 3, hudY + 2, 1);
  }

  function drawTitle() {
    cls(0);
    // Background ice pattern
    for (let i = 0; i < 30; i++) {
      const bx = ((i * 43 + flr(Mono.frame * 0.2)) % (W + 24)) - 12;
      const by = ((i * 67) % (H + 24)) - 12;
      rectf(bx, by, 14, 14, 1);
      rect(bx + 1, by + 1, 12, 12, 0);
      rect(bx + 2, by + 2, 10, 10, 1);
    }

    const ty = 20 + sin(Mono.frame * 0.05) * 3;

    // Title shadow + text
    const titleX = W / 2 - flr(("PENGO".length * (FONT_W + 1)) / 2);
    text("PENGO", titleX + 1, flr(ty) + 1, 1);
    text("PENGO", titleX, flr(ty), 3);
    rectf(titleX - 8, flr(ty) + 10, 40, 1, 2);

    // Animated characters — native 16x16
    const cx = W / 2;
    const anim = flr(Mono.frame / 10) % 2;
    spr(anim === 0 ? 1 : 2, cx - 8, flr(ty) + 16);

    const ea = flr(Mono.frame / 12) % 2;
    spr(ea === 0 ? 20 : 21, cx - 30, flr(ty) + 17 + flr(sin(Mono.frame * 0.1) * 2));
    spr(ea === 0 ? 21 : 20, cx + 16, flr(ty) + 17 + flr(sin(Mono.frame * 0.1 + 2) * 2));

    // Diamond blocks flanking
    spr(14, cx - 52, flr(ty) + 17);
    spr(14, cx + 38, flr(ty) + 17);

    const startMsg = "PRESS START";
    const startX = W / 2 - flr((startMsg.length * (FONT_W + 1)) / 2);
    if (flr(Mono.frame / 20) % 2 === 0) text(startMsg, startX, 108, 3);

    // Instructions
    const htpMsg = "- HOW TO PLAY -";
    text(htpMsg, W / 2 - flr((htpMsg.length * (FONT_W + 1)) / 2), 124, 2);
    const m1 = "ARROWS   MOVE PENGO";
    text(m1, W / 2 - flr((m1.length * (FONT_W + 1)) / 2), 136, 2);
    const m2 = "A   PUSH OR BREAK ICE";
    text(m2, W / 2 - flr((m2.length * (FONT_W + 1)) / 2), 146, 2);
    const m3 = "CRUSH ENEMIES WITH BLOCKS";
    text(m3, W / 2 - flr((m3.length * (FONT_W + 1)) / 2), 156, 2);
    const m4 = "ALIGN 3 DIAMONDS  10000 PTS";
    text(m4, W / 2 - flr((m4.length * (FONT_W + 1)) / 2), 166, 2);
    const m5 = "PUSH WALL TO STUN ENEMIES";
    text(m5, W / 2 - flr((m5.length * (FONT_W + 1)) / 2), 176, 2);

    const scMsg = "CRUSH:400  STUN:100  STOMP:500";
    text(scMsg, W / 2 - flr((scMsg.length * (FONT_W + 1)) / 2), 196, 1);
    const verMsg = "MONO DEMO V0.2";
    text(verMsg, W / 2 - flr((verMsg.length * (FONT_W + 1)) / 2), 228, 1);
  }

  function drawGameOver() {
    cls(0);
    for (const p of particles) pix(flr(p.x), flr(p.y), p.color);

    // Draw remaining arena faded
    rectf(W / 2 - 53, 60, 106, 90, 0);
    rect(W / 2 - 53, 60, 106, 90, 1);

    const goMsg = "GAME OVER";
    text(goMsg, W / 2 - flr((goMsg.length * (FONT_W + 1)) / 2), 75, 3);
    const scMsg = "SCORE: " + score;
    text(scMsg, W / 2 - flr((scMsg.length * (FONT_W + 1)) / 2), 98, 2);
    const lvMsg = "LEVEL: " + level;
    text(lvMsg, W / 2 - flr((lvMsg.length * (FONT_W + 1)) / 2), 111, 2);
    const cMsg = "PRESS START";
    if (flr(Mono.frame / 20) % 2 === 0) text(cMsg, W / 2 - flr((cMsg.length * (FONT_W + 1)) / 2), 131, 3);
  }

  // --- Title Scene ---
  Mono.scene(TITLE, {
    init() {},
    update() {
      if (btnp("start") || btnp("a")) {
        resetGame();
        note(0, "C5", 0.1); setTimeout(() => note(0, "E5", 0.1), 100); setTimeout(() => note(0, "G5", 0.15), 200);
        Mono.go(PLAY); return;
      }
    },
    draw() { drawTitle(); }
  });

  // --- Play Scene ---
  Mono.scene(PLAY, {
    init() {},
    update() { updatePlay(); },
    draw() { drawPlayScene(); }
  });

  // --- Game Over Scene ---
  Mono.scene(GAMEOVER, {
    init() {},
    update() {
      for (let i = particles.length - 1; i >= 0; i--) {
        const p = particles[i]; p.x += p.vx; p.y += p.vy; p.vy += 0.08; p.life--;
        if (p.life <= 0) particles.splice(i, 1);
      }
      if (btnp("start") || btnp("a")) { Mono.go(TITLE); return; }
    },
    draw() { drawGameOver(); }
  });

  Mono.go(TITLE);
  Mono.boot("screen");
})();
</script>
</body>
