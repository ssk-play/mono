<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GrayBox — Demo: Arkanoid</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #0a0a0a;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100vh;
    font-family: monospace;
    overflow: hidden;
  }
  #frame {
    background: #111;
    border: 3px solid #333;
    border-radius: 8px;
    padding: 12px;
    box-shadow: 0 0 40px rgba(0,0,0,0.8), inset 0 0 20px rgba(0,0,0,0.5);
  }
  canvas {
    display: block;
    image-rendering: pixelated;
    image-rendering: crisp-edges;
  }
  #controls {
    margin-top: 12px;
    color: #6b6b6b;
    font-size: 11px;
    text-align: center;
    letter-spacing: 1px;
  }
  #controls span { color: #b0b0b0; }
</style>
</head>
<body>
<div id="frame">
  <canvas id="screen"></canvas>
</div>
<div id="controls">
  <span>←→</span> MOVE &nbsp;&nbsp; <span>Z</span> FIRE/RELEASE &nbsp;&nbsp; <span>ENTER</span> START
</div>
<script>
(() => {
  "use strict";

  // ============================================================
  // GrayBox Runtime (inline)
  // ============================================================
  const W = 480;
  const H = 320;
  const SCALE = 2;
  const FPS = 30;
  const COLORS = ["#1a1a1a", "#6b6b6b", "#b0b0b0", "#e8e8e8"];
  const canvas = document.getElementById("screen");
  canvas.width = W;
  canvas.height = H;
  canvas.style.width = (W * SCALE) + "px";
  canvas.style.height = (H * SCALE) + "px";
  const ctx = canvas.getContext("2d");
  ctx.imageSmoothingEnabled = false;
  const buf = ctx.createImageData(W, H);
  const buf32 = new Uint32Array(buf.data.buffer);

  function hexToABGR(hex) {
    const r = parseInt(hex.slice(1, 3), 16);
    const g = parseInt(hex.slice(3, 5), 16);
    const b = parseInt(hex.slice(5, 7), 16);
    return (255 << 24) | (b << 16) | (g << 8) | r;
  }
  const COLOR_U32 = COLORS.map(hexToABGR);

  const sprites = {};
  const tilemap = {};

  const keyMap = {
    "ArrowUp": "up", "ArrowDown": "down", "ArrowLeft": "left", "ArrowRight": "right",
    "w": "up", "s": "down", "a": "left", "d": "right",
    "z": "a", "Z": "a", "x": "b", "X": "b",
    "Enter": "start", " ": "a"
  };
  const keys = {};
  const keysPrev = {};

  document.addEventListener("keydown", e => {
    const k = keyMap[e.key];
    if (k) { keys[k] = true; e.preventDefault(); }
  });
  document.addEventListener("keyup", e => {
    const k = keyMap[e.key];
    if (k) { keys[k] = false; e.preventDefault(); }
  });

  let audioCtx = null;
  const channels = [null, null];
  const channelGains = [null, null];
  function ensureAudio() {
    if (!audioCtx) {
      audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      for (let i = 0; i < 2; i++) {
        channelGains[i] = audioCtx.createGain();
        channelGains[i].gain.value = 0.15;
        channelGains[i].connect(audioCtx.destination);
      }
    }
  }

  const NOTE_NAMES = ["C","C#","D","D#","E","F","F#","G","G#","A","A#","B"];
  function noteToFreq(noteStr) {
    const match = noteStr.match(/^([A-G]#?)(\d)$/);
    if (!match) return 440;
    const name = match[1];
    const octave = parseInt(match[2]);
    const semitone = NOTE_NAMES.indexOf(name);
    if (semitone === -1) return 440;
    const midi = (octave + 1) * 12 + semitone;
    return 440 * Math.pow(2, (midi - 69) / 12);
  }

  const FONT_W = 4;
  const FONT_H = 6;
  const FONT = {};
  const fontData = {
    "A":"0110100110011111100110011001","B":"1110100110101110100110011110",
    "C":"0110100110001000100001100110","D":"1100101010011001100110101100",
    "E":"1111100010001110100010001111","F":"1111100010001110100010001000",
    "G":"0111100010001011100101100111","H":"1001100110011111100110011001",
    "I":"1110010001000100010001001110","J":"0111001000100010001010100100",
    "K":"1001101011001100101010011001","L":"1000100010001000100010001111",
    "M":"1001111111011001100110011001","N":"1001110111011001100110011001",
    "O":"0110100110011001100110010110","P":"1110100110011110100010001000",
    "Q":"0110100110011001101101100001","R":"1110100110011110101010011001",
    "S":"0111100010000110000110001110","T":"1111001000100010001000100010",
    "U":"1001100110011001100110010110","V":"1001100110011001100101100110",
    "W":"1001100110011001101111011001","X":"1001100101100110011010011001",
    "Y":"1001100101100010001000100010","Z":"1111000100100100100010001111",
    "0":"0110100111011011101110010110","1":"0100110001000100010001001110",
    "2":"0110100100010010010010001111","3":"1110000100010110000110011110",
    "4":"1001100110011111000100010001","5":"1111100010001110000100011110",
    "6":"0110100010001110100110010110","7":"1111000100010010010001001000",
    "8":"0110100110010110100110010110","9":"0110100110010111000100010110",
    " ":"0000000000000000000000000000",
    ".":"0000000000000000000001000100",
    ",":"0000000000000000001000101000",
    "!":"0100010001000100000000000100",
    "?":"0110100100010010000000000010",
    "-":"0000000000001110000000000000",
    "+":"0000001001001110010000100000",
    ":":"0000010001000000010001000000",
    "/":"0001000100100010010010001000",
    "*":"0000101001001110010010100000",
    "#":"0101111101011111010100000000",
    "(":"0010010010001000010001000010",
    ")":"0100001000010001000100100100",
    "=":"0000000011110000111100000000",
    "'":"0100010010000000000000000000",
    "\"":"1010101000000000000000000000",
    "<":"0010010010001000010000100010",
    ">":"1000010000100001001001001000",
    "_":"0000000000000000000000001111",
  };
  for (const [ch, bits] of Object.entries(fontData)) {
    FONT[ch] = [];
    for (let i = 0; i < bits.length; i++) FONT[ch].push(parseInt(bits[i]));
  }

  const API = {};
  API._init = null;
  API._update = null;
  API._draw = null;
  API.frame = 0;

  API.cls = function(c = 0) { buf32.fill(COLOR_U32[c] || COLOR_U32[0]); };
  API.pix = function(x, y, c) {
    x = Math.floor(x); y = Math.floor(y);
    if (x < 0 || x >= W || y < 0 || y >= H) return;
    buf32[y * W + x] = COLOR_U32[c] || COLOR_U32[0];
  };
  API.line = function(x0, y0, x1, y1, c) {
    x0=Math.floor(x0); y0=Math.floor(y0); x1=Math.floor(x1); y1=Math.floor(y1);
    const dx=Math.abs(x1-x0), dy=Math.abs(y1-y0);
    const sx=x0<x1?1:-1, sy=y0<y1?1:-1;
    let err=dx-dy;
    while(true) {
      API.pix(x0,y0,c);
      if(x0===x1&&y0===y1) break;
      const e2=2*err;
      if(e2>-dy){err-=dy;x0+=sx;}
      if(e2<dx){err+=dx;y0+=sy;}
    }
  };
  API.rect = function(x,y,w,h,c) {
    API.line(x,y,x+w-1,y,c); API.line(x+w-1,y,x+w-1,y+h-1,c);
    API.line(x+w-1,y+h-1,x,y+h-1,c); API.line(x,y+h-1,x,y,c);
  };
  API.rectf = function(x,y,w,h,c) {
    x=Math.floor(x); y=Math.floor(y);
    const col=COLOR_U32[c]||COLOR_U32[0];
    for(let py=Math.max(0,y);py<Math.min(H,y+h);py++)
      for(let px=Math.max(0,x);px<Math.min(W,x+w);px++)
        buf32[py*W+px]=col;
  };
  API.circ = function(cx,cy,r,c) {
    let x=r,y=0,d=1-r; cx=Math.floor(cx); cy=Math.floor(cy);
    while(x>=y){
      API.pix(cx+x,cy+y,c);API.pix(cx-x,cy+y,c);
      API.pix(cx+x,cy-y,c);API.pix(cx-x,cy-y,c);
      API.pix(cx+y,cy+x,c);API.pix(cx-y,cy+x,c);
      API.pix(cx+y,cy-x,c);API.pix(cx-y,cy-x,c);
      y++; if(d<0){d+=2*y+1;}else{x--;d+=2*(y-x)+1;}
    }
  };
  API.circf = function(cx,cy,r,c) {
    cx=Math.floor(cx); cy=Math.floor(cy);
    const col=COLOR_U32[c]||COLOR_U32[0]; const r2=r*r;
    for(let py=-r;py<=r;py++) for(let px=-r;px<=r;px++)
      if(px*px+py*py<=r2){ const sx=cx+px,sy=cy+py;
        if(sx>=0&&sx<W&&sy>=0&&sy<H) buf32[sy*W+sx]=col; }
  };
  API.sprite = function(id, data) {
    const arr = new Uint8Array(64); let i = 0;
    for (const ch of data) { if (ch>='0'&&ch<='3') { arr[i++]=parseInt(ch); if(i>=64) break; } }
    sprites[id] = arr;
  };
  API.spr = function(id, x, y, flipX, flipY) {
    const s=sprites[id]; if(!s) return;
    x=Math.floor(x); y=Math.floor(y);
    for(let py=0;py<8;py++) for(let px=0;px<8;px++){
      const sx=flipX?7-px:px, sy=flipY?7-py:py;
      const c=s[sy*8+sx], dx=x+px, dy=y+py;
      if(dx>=0&&dx<W&&dy>=0&&dy<H) buf32[dy*W+dx]=COLOR_U32[c];
    }
  };
  API.text = function(str, x, y, c) {
    str=String(str).toUpperCase(); let cx=Math.floor(x); const cy=Math.floor(y);
    const col=COLOR_U32[c]||COLOR_U32[3];
    for(const ch of str){
      const glyph=FONT[ch];
      if(glyph) for(let py=0;py<FONT_H;py++) for(let px=0;px<FONT_W;px++)
        if(glyph[py*FONT_W+px]){ const dx=cx+px,dy=cy+py;
          if(dx>=0&&dx<W&&dy>=0&&dy<H) buf32[dy*W+dx]=col; }
      cx+=FONT_W+1;
    }
  };
  API.mget = function(cx,cy) { return tilemap[cx+","+cy]||0; };
  API.mset = function(cx,cy,id) { tilemap[cx+","+cy]=id; };
  API.map = function(mx,my,mw,mh,sx,sy) {
    for(let ty=0;ty<mh;ty++) for(let tx=0;tx<mw;tx++){
      const id=API.mget(mx+tx,my+ty); if(id>0) API.spr(id,sx+tx*8,sy+ty*8); }
  };
  API.btn = function(k) { return !!keys[k]; };
  API.btnp = function(k) { return !!keys[k] && !keysPrev[k]; };
  API.note = function(ch, noteStr, dur) {
    ensureAudio(); if(ch<0||ch>1) return; API.stop(ch);
    const osc=audioCtx.createOscillator(); osc.type="square";
    osc.frequency.value=noteToFreq(noteStr);
    osc.connect(channelGains[ch]); osc.start();
    osc.stop(audioCtx.currentTime+dur); channels[ch]=osc;
  };
  API.stop = function(ch) {
    if(ch===undefined){API.stop(0);API.stop(1);return;}
    if(channels[ch]){try{channels[ch].stop();}catch(e){} channels[ch]=null;}
  };
  API.rnd = function(max) { return Math.random()*max; };
  API.flr = Math.floor;
  API.abs = Math.abs;
  API.min = Math.min;
  API.max = Math.max;
  API.sin = Math.sin;
  API.cos = Math.cos;

  function tick() {
    if (API._update) API._update();
    if (API._draw) API._draw();
    ctx.putImageData(buf, 0, 0);
    for (const k in keys) keysPrev[k] = keys[k];
    API.frame++;
  }

  // ============================================================
  // Arkanoid Game
  // ============================================================
  const { cls, pix, line, rect, rectf, circ, circf, sprite: defSprite,
          spr, text, btn, btnp, note, stop, rnd, flr, abs: _abs,
          min, max: _max, sin, cos } = API;

  // --- Play field ---
  const FIELD_L = 56;
  const FIELD_R = 424;
  const FIELD_T = 24;
  const FIELD_B = 306;
  const FIELD_W = FIELD_R - FIELD_L;

  // --- Brick config ---
  const BRICK_W = 16;
  const BRICK_H = 8;
  const BRICK_COLS = 23;
  const BRICK_OX = FIELD_L;
  const BRICK_OY = FIELD_T + 20;

  // Brick types: 0=empty, 1=normal c1, 2=normal c2, 3=normal c3, 4=silver(2hits), 5=gold(indestructible)
  const BRICK_COLORS = [0, 1, 2, 3, 2, 3];
  const BRICK_POINTS = [0, 10, 20, 30, 50, 0];

  // --- Power-up types ---
  const PU_LASER = 0;
  const PU_EXTEND = 1;
  const PU_CATCH = 2;
  const PU_SLOW = 3;
  const PU_BREAK = 4;
  const PU_LIFE = 5;
  const PU_DISRUPT = 6;
  const PU_NAMES = ["L","E","C","S","B","1","D"];
  const PU_DROP_CHANCE = 0.18;

  // --- Sprites ---
  // 1: Vaus left cap
  defSprite(1,
    "00000000" +
    "00000333" +
    "00003222" +
    "00032223" +
    "00032223" +
    "00003222" +
    "00000333" +
    "00000000"
  );
  // 2: Vaus middle
  defSprite(2,
    "00000000" +
    "33333333" +
    "22222222" +
    "32222223" +
    "32222223" +
    "22222222" +
    "33333333" +
    "00000000"
  );
  // 3: Vaus right cap
  defSprite(3,
    "00000000" +
    "33300000" +
    "22230000" +
    "32230000" +
    "32230000" +
    "22230000" +
    "33300000" +
    "00000000"
  );
  // 4: Ball
  defSprite(4,
    "00000000" +
    "00000000" +
    "00033000" +
    "00323000" +
    "00333000" +
    "00022000" +
    "00000000" +
    "00000000"
  );
  // 5: Power-up capsule
  defSprite(5,
    "00000000" +
    "00333300" +
    "03222230" +
    "32211230" +
    "32222230" +
    "03222230" +
    "00333300" +
    "00000000"
  );
  // 6: Laser shot
  defSprite(6,
    "00030000" +
    "00030000" +
    "00020000" +
    "00020000" +
    "00010000" +
    "00000000" +
    "00000000" +
    "00000000"
  );
  // 7: Enemy alien A
  defSprite(7,
    "00033000" +
    "00333300" +
    "03322330" +
    "03333330" +
    "33033030" +
    "03333300" +
    "00300300" +
    "03000030"
  );
  // 8: Enemy alien B
  defSprite(8,
    "00300300" +
    "03333300" +
    "33233230" +
    "33333330" +
    "03333300" +
    "00333000" +
    "03000300" +
    "30000030"
  );
  // 9: Explosion
  defSprite(9,
    "20010020" +
    "01000010" +
    "00203200" +
    "03033030" +
    "00232000" +
    "01000300" +
    "20001001" +
    "00200010"
  );
  // 10: DOH top-left
  defSprite(10,
    "00000011" +
    "00001333" +
    "00013333" +
    "00133332" +
    "01333322" +
    "01333222" +
    "13332222" +
    "13332221"
  );
  // 11: DOH top-right
  defSprite(11,
    "11000000" +
    "33310000" +
    "33331000" +
    "23333100" +
    "22333310" +
    "22233310" +
    "22223331" +
    "12223331"
  );
  // 12: DOH bottom-left
  defSprite(12,
    "13332221" +
    "13332222" +
    "01333222" +
    "01333322" +
    "00133332" +
    "00013333" +
    "00001333" +
    "00000011"
  );
  // 13: DOH bottom-right
  defSprite(13,
    "12223331" +
    "22223331" +
    "22233310" +
    "22333310" +
    "23333100" +
    "33331000" +
    "33310000" +
    "11000000"
  );
  // 14: Life icon (small paddle)
  defSprite(14,
    "00000000" +
    "00000000" +
    "00333300" +
    "03222230" +
    "03222230" +
    "00333300" +
    "00000000" +
    "00000000"
  );
  // 15: Warp gate chevron
  defSprite(15,
    "03000000" +
    "00300000" +
    "00030000" +
    "00003000" +
    "00003000" +
    "00030000" +
    "00300000" +
    "03000000"
  );

  // --- Game state ---
  let state = "title";
  let paddle, balls, bricks, powerups, lasers, enemies, explosions;
  let score, lives, level, levelTimer;
  let activePower, powerTimer;
  let catchBall, catchOffX;
  let breakWall;
  let bossHP, bossMaxHP, bossY, bossDir, bossTimer, bossActive;
  let warpLevel;
  let ballSpeedMult;
  let msgText, msgTimer;

  // Level layouts: each returns {bricks[{col,row,type,hp}], warp, boss}
  const LEVELS = [
    // 1: Simple rows
    () => {
      const b = [];
      for (let r = 0; r < 5; r++)
        for (let c = 0; c < BRICK_COLS; c++)
          b.push({ col: c, row: r, type: (r % 3) + 1, hp: 1 });
      return { bricks: b, warp: false, boss: false };
    },
    // 2: Checkerboard with silvers
    () => {
      const b = [];
      for (let r = 0; r < 6; r++)
        for (let c = 0; c < BRICK_COLS; c++)
          if ((r + c) % 2 === 0)
            b.push({ col: c, row: r, type: r < 2 ? 4 : ((c % 3) + 1), hp: r < 2 ? 2 : 1 });
      return { bricks: b, warp: false, boss: false };
    },
    // 3: Diamond with golds on edge
    () => {
      const b = [];
      const cx = 11, cy = 4;
      for (let r = 0; r < 9; r++)
        for (let c = 0; c < BRICK_COLS; c++) {
          const dist = _abs(c - cx) + _abs(r - cy);
          if (dist <= 5) {
            if (dist === 5) b.push({ col: c, row: r, type: 5, hp: 99 });
            else b.push({ col: c, row: r, type: (dist % 3) + 1, hp: 1 });
          }
        }
      return { bricks: b, warp: false, boss: false };
    },
    // 4: Boss level
    () => {
      const b = [];
      for (let r = 0; r < 3; r++)
        for (let c = 3; c < 20; c++)
          b.push({ col: c, row: r + 7, type: (r % 3) + 1, hp: 1 });
      return { bricks: b, warp: false, boss: true };
    },
    // 5: Warp corridors
    () => {
      const b = [];
      for (let r = 0; r < 8; r++)
        for (let c = 0; c < BRICK_COLS; c++) {
          if (c === 5 || c === 11 || c === 17)
            b.push({ col: c, row: r, type: 5, hp: 99 });
          else if (r % 2 === 0)
            b.push({ col: c, row: r, type: (c % 3) + 1, hp: 1 });
        }
      return { bricks: b, warp: true, boss: false };
    },
    // 6: Fortress
    () => {
      const b = [];
      for (let r = 0; r < 8; r++)
        for (let c = 0; c < BRICK_COLS; c++) {
          if (r === 0 || r === 7 || c === 0 || c === BRICK_COLS - 1)
            b.push({ col: c, row: r, type: 4, hp: 2 });
          else if (r >= 2 && r <= 5 && c >= 6 && c <= 16)
            b.push({ col: c, row: r, type: ((r + c) % 3) + 1, hp: 1 });
        }
      return { bricks: b, warp: false, boss: false };
    },
    // 7: Zigzag + enemies
    () => {
      const b = [];
      for (let r = 0; r < 7; r++)
        for (let c = 0; c < BRICK_COLS; c++) {
          const offset = (r % 2 === 0) ? 0 : 3;
          if ((c + offset) % 6 < 4)
            b.push({ col: c, row: r, type: r < 3 ? 4 : ((c % 3) + 1), hp: r < 3 ? 2 : 1 });
        }
      return { bricks: b, warp: false, boss: false };
    },
    // 8: Boss 2 + warp
    () => {
      const b = [];
      for (let r = 0; r < 4; r++)
        for (let c = 0; c < BRICK_COLS; c++) {
          if (r === 0) b.push({ col: c, row: r + 6, type: 5, hp: 99 });
          else b.push({ col: c, row: r + 6, type: 4, hp: 2 });
        }
      return { bricks: b, warp: true, boss: true };
    },
    // 9: Concentric rings
    () => {
      const b = [];
      for (let r = 0; r < 10; r++)
        for (let c = 0; c < BRICK_COLS; c++) {
          const ring = min(min(r, 9 - r), min(c, BRICK_COLS - 1 - c));
          if (ring % 2 === 0)
            b.push({ col: c, row: r, type: ring === 0 ? 4 : ((ring + c) % 3) + 1, hp: ring === 0 ? 2 : 1 });
        }
      return { bricks: b, warp: false, boss: false };
    },
    // 10: Final stage
    () => {
      const b = [];
      for (let r = 0; r < 8; r++)
        for (let c = 0; c < BRICK_COLS; c++) {
          if (r < 1) b.push({ col: c, row: r, type: 5, hp: 99 });
          else if (r < 3) b.push({ col: c, row: r, type: 4, hp: 2 });
          else b.push({ col: c, row: r, type: ((r + c) % 3) + 1, hp: 1 });
        }
      return { bricks: b, warp: true, boss: true };
    },
  ];

  function resetGame() {
    score = 0;
    lives = 3;
    level = 0;
    loadLevel(0);
  }

  function loadLevel(lv) {
    level = lv % LEVELS.length;
    const layout = LEVELS[level]();
    bricks = layout.bricks;
    warpLevel = layout.warp;
    bossActive = layout.boss;
    bossMaxHP = 20 + level * 5;
    bossHP = bossMaxHP;
    bossY = 30;
    bossDir = 1;
    bossTimer = 0;

    powerups = [];
    lasers = [];
    enemies = [];
    explosions = [];
    activePower = -1;
    powerTimer = 0;
    catchBall = false;
    catchOffX = 0;
    breakWall = false;
    ballSpeedMult = 1.0;
    levelTimer = 0;

    paddle = { x: (FIELD_L + FIELD_R) / 2, w: 32, speed: 4 };
    balls = [];
    launchBall();

    msgText = "ROUND " + (lv + 1);
    msgTimer = 60;

    if (level >= 3 && !bossActive) {
      const cnt = min(2 + flr(level / 2), 6);
      for (let i = 0; i < cnt; i++) {
        enemies.push(makeEnemy());
      }
    }
  }

  function makeEnemy() {
    return {
      x: FIELD_L + 20 + rnd(FIELD_W - 40),
      y: FIELD_T - 8 - rnd(60),
      vx: (rnd(2) - 1) * 0.6,
      vy: 0.35 + rnd(0.3),
      type: rnd(1) > 0.5 ? 7 : 8,
      alive: true,
    };
  }

  function launchBall() {
    const b = {
      x: paddle.x,
      y: FIELD_B - 18,
      vx: 1.2 + rnd(0.6),
      vy: -(2.2 + rnd(0.4)),
      active: true,
    };
    if (rnd(1) > 0.5) b.vx = -b.vx;
    balls.push(b);
    catchBall = true;
    catchOffX = 0;
  }

  function spawnPowerup(x, y) {
    if (rnd(1) > PU_DROP_CHANCE) return;
    const type = flr(rnd(7));
    powerups.push({ x, y, type, vy: 1.2 });
  }

  function activatePower(type) {
    // Deactivate previous
    if (activePower === PU_EXTEND) paddle.w = 32;
    if (activePower === PU_SLOW) ballSpeedMult = 1.0;
    if (activePower === PU_BREAK) breakWall = false;

    activePower = type;
    powerTimer = 300;

    if (type === PU_EXTEND) {
      paddle.w = 52;
    } else if (type === PU_SLOW) {
      ballSpeedMult = 0.55;
    } else if (type === PU_BREAK) {
      breakWall = true;
    } else if (type === PU_LIFE) {
      lives++;
      activePower = -1;
    } else if (type === PU_DISRUPT) {
      const existing = balls.filter(b => b.active);
      if (existing.length > 0) {
        const src = existing[0];
        for (let i = 0; i < 2; i++) {
          const ang = (rnd(1) - 0.5) * 1.5;
          const sp = Math.sqrt(src.vx * src.vx + src.vy * src.vy);
          balls.push({
            x: src.x + (rnd(6) - 3),
            y: src.y,
            vx: sp * sin(ang),
            vy: -sp * _abs(cos(ang)),
            active: true,
          });
        }
      }
      catchBall = false;
      activePower = -1;
    } else if (type === PU_CATCH) {
      // Stays active until replaced
    } else if (type === PU_LASER) {
      // Stays active until replaced
    }

    note(1, "E5", 0.08);
    setTimeout(() => { try { note(1, "G5", 0.08); } catch(e){} }, 80);
  }

  function loseLife() {
    lives--;
    if (lives <= 0) {
      state = "gameover";
      note(0, "C3", 0.3);
      setTimeout(() => { try { note(0, "A2", 0.4); } catch(e){} }, 300);
    } else {
      activePower = -1;
      paddle.w = 32;
      ballSpeedMult = 1.0;
      breakWall = false;
      balls = [];
      launchBall();
    }
  }

  function brickAt(col, row) {
    return bricks.find(b => b.col === col && b.row === row);
  }

  function breakableBricksLeft() {
    return bricks.filter(b => b.type !== 5).length;
  }

  function hitBrick(brick) {
    if (brick.type === 5) {
      note(0, "C3", 0.03);
      return false; // indestructible
    }
    brick.hp--;
    if (brick.hp <= 0) {
      score += BRICK_POINTS[brick.type];
      const bx = BRICK_OX + brick.col * BRICK_W + BRICK_W / 2;
      const by = BRICK_OY + brick.row * BRICK_H + BRICK_H / 2;
      spawnPowerup(bx, by);
      bricks.splice(bricks.indexOf(brick), 1);
      note(0, "G4", 0.04);
      return true;
    }
    note(0, "C4", 0.04);
    return false;
  }

  // --- Update ---
  API._update = function() {
    if (state === "title") {
      if (btnp("start")) { state = "play"; resetGame(); }
      return;
    }
    if (state === "gameover") {
      if (btnp("start")) state = "title";
      return;
    }
    if (state !== "play") return;

    levelTimer++;
    if (msgTimer > 0) msgTimer--;

    // Power timer (not for catch/laser - those last until replaced)
    if (powerTimer > 0 && activePower !== PU_CATCH && activePower !== PU_LASER) {
      powerTimer--;
      if (powerTimer <= 0) {
        if (activePower === PU_EXTEND) paddle.w = 32;
        if (activePower === PU_SLOW) ballSpeedMult = 1.0;
        if (activePower === PU_BREAK) breakWall = false;
        activePower = -1;
      }
    }

    // Ball speed ramps up
    if (levelTimer % 300 === 0 && ballSpeedMult < 1.6 && activePower !== PU_SLOW) {
      ballSpeedMult += 0.05;
    }

    // Move paddle
    const pw = paddle.w / 2;
    if (btn("left")) paddle.x -= paddle.speed;
    if (btn("right")) paddle.x += paddle.speed;
    paddle.x = _max(FIELD_L + pw + 1, min(FIELD_R - pw - 1, paddle.x));

    // Caught ball follows paddle
    if (catchBall) {
      for (const b of balls) {
        if (b.active) {
          b.x = paddle.x + catchOffX;
          b.y = FIELD_B - 18;
        }
      }
      if (btnp("a")) {
        catchBall = false;
        for (const b of balls) {
          if (b.active) {
            b.vy = -(2.2 + rnd(0.4));
            b.vx = (rnd(2) - 1) * 1.5;
            if (_abs(b.vx) < 0.3) b.vx = rnd(1) > 0.5 ? 1 : -1;
          }
        }
        note(0, "C5", 0.05);
      }
    }

    // Laser fire
    if (activePower === PU_LASER && btnp("a") && !catchBall) {
      lasers.push({ x: paddle.x - pw + 2, y: FIELD_B - 16, vy: -6 });
      lasers.push({ x: paddle.x + pw - 4, y: FIELD_B - 16, vy: -6 });
      note(1, "G5", 0.04);
    }

    // Update lasers
    for (let i = lasers.length - 1; i >= 0; i--) {
      const l = lasers[i];
      l.y += l.vy;
      if (l.y < FIELD_T) { lasers.splice(i, 1); continue; }

      // Hit bricks
      const col = flr((l.x - BRICK_OX) / BRICK_W);
      const row = flr((l.y - BRICK_OY) / BRICK_H);
      if (col >= 0 && col < BRICK_COLS && row >= 0) {
        const brick = brickAt(col, row);
        if (brick) {
          hitBrick(brick);
          lasers.splice(i, 1);
          continue;
        }
      }

      // Hit boss
      if (bossActive && bossHP > 0) {
        const bcx = (FIELD_L + FIELD_R) / 2;
        if (l.y < bossY + 24 && l.y > bossY - 4 && _abs(l.x - bcx) < 24) {
          bossHP--;
          explosions.push({ x: l.x, y: l.y, t: 0 });
          lasers.splice(i, 1);
          note(0, "D3", 0.06);
          if (bossHP <= 0) bossDefeated();
          continue;
        }
      }

      // Hit enemies
      let hitE = false;
      for (let j = enemies.length - 1; j >= 0; j--) {
        const e = enemies[j];
        if (e.alive && _abs(l.x - e.x) < 6 && _abs(l.y - e.y) < 6) {
          e.alive = false;
          score += 100;
          explosions.push({ x: e.x, y: e.y, t: 0 });
          note(0, "A4", 0.06);
          hitE = true;
          break;
        }
      }
      if (hitE) { lasers.splice(i, 1); }
    }

    // Update balls (skip if all caught)
    if (!catchBall) {
      for (let i = balls.length - 1; i >= 0; i--) {
        const b = balls[i];
        if (!b.active) continue;

        const spd = ballSpeedMult;
        b.x += b.vx * spd;
        b.y += b.vy * spd;

        // Side walls
        if (b.x <= FIELD_L + 3) {
          if (warpLevel) { b.x = FIELD_R - 5; note(1, "A4", 0.03); }
          else { b.x = FIELD_L + 3; b.vx = _abs(b.vx); note(1, "D4", 0.03); }
        }
        if (b.x >= FIELD_R - 3) {
          if (warpLevel) { b.x = FIELD_L + 5; note(1, "A4", 0.03); }
          else { b.x = FIELD_R - 3; b.vx = -_abs(b.vx); note(1, "D4", 0.03); }
        }
        // Top wall
        if (b.y <= FIELD_T + 2) {
          b.y = FIELD_T + 2;
          b.vy = _abs(b.vy);
          note(1, "D4", 0.03);
        }
        // Bottom
        if (b.y >= FIELD_B + 2) {
          b.active = false;
          continue;
        }

        // Paddle collision
        const padTop = FIELD_B - 10;
        if (b.vy > 0 && b.y >= padTop && b.y <= padTop + 8 &&
            b.x >= paddle.x - pw - 2 && b.x <= paddle.x + pw + 2) {
          b.y = padTop - 1;
          const hitPos = (b.x - paddle.x) / (pw + 2); // -1 to 1
          const speed = Math.sqrt(b.vx * b.vx + b.vy * b.vy);
          const clampedSpeed = _max(2.5, min(speed, 4.5));
          const angle = hitPos * 1.2;
          b.vx = clampedSpeed * sin(angle);
          b.vy = -clampedSpeed * _abs(cos(angle));
          if (_abs(b.vy) < 0.8) b.vy = -0.8;

          if (activePower === PU_CATCH) {
            catchBall = true;
            catchOffX = b.x - paddle.x;
          }
          note(1, "E4", 0.04);
        }

        // Brick collisions
        const bcol = flr((b.x - BRICK_OX) / BRICK_W);
        const brow = flr((b.y - BRICK_OY) / BRICK_H);
        let hitAny = false;

        for (let dr = -1; dr <= 1 && !hitAny; dr++) {
          for (let dc = -1; dc <= 1 && !hitAny; dc++) {
            const cc = bcol + dc, rr = brow + dr;
            if (cc < 0 || cc >= BRICK_COLS || rr < 0) continue;
            const brick = brickAt(cc, rr);
            if (!brick) continue;

            const bl = BRICK_OX + cc * BRICK_W;
            const bt = BRICK_OY + rr * BRICK_H;
            const brr = bl + BRICK_W;
            const bbb = bt + BRICK_H;

            if (b.x + 2 > bl && b.x - 2 < brr && b.y + 2 > bt && b.y - 2 < bbb) {
              hitBrick(brick);

              const overlapL = (b.x + 2) - bl;
              const overlapR = brr - (b.x - 2);
              const overlapT = (b.y + 2) - bt;
              const overlapB = bbb - (b.y - 2);
              const minO = min(min(overlapL, overlapR), min(overlapT, overlapB));

              if (minO === overlapL || minO === overlapR) b.vx = -b.vx;
              else b.vy = -b.vy;

              b.x += b.vx * 1.5;
              b.y += b.vy * 1.5;
              hitAny = true;
            }
          }
        }

        // Boss collision
        if (bossActive && bossHP > 0) {
          const bcx = (FIELD_L + FIELD_R) / 2;
          if (b.y < bossY + 24 && b.y > bossY - 4 && _abs(b.x - bcx) < 24) {
            b.vy = _abs(b.vy);
            b.y = bossY + 25;
            bossHP--;
            explosions.push({ x: b.x, y: b.y - 4, t: 0 });
            note(0, "D3", 0.06);
            if (bossHP <= 0) bossDefeated();
          }
        }

        // Enemy collisions
        for (const e of enemies) {
          if (e.alive && _abs(b.x - e.x) < 7 && _abs(b.y - e.y) < 7) {
            b.vy = -b.vy;
            b.vx += (rnd(1) - 0.5) * 0.6;
            e.alive = false;
            score += 100;
            explosions.push({ x: e.x, y: e.y, t: 0 });
            note(0, "A4", 0.06);
          }
        }
      }
    }

    // Remove dead balls
    const activeBalls = balls.filter(b => b.active);
    balls = activeBalls;
    if (balls.length === 0 && !catchBall) {
      loseLife();
    }

    // Power-ups fall
    for (let i = powerups.length - 1; i >= 0; i--) {
      const p = powerups[i];
      p.y += p.vy;
      if (p.y > FIELD_B + 10) { powerups.splice(i, 1); continue; }
      const padTop = FIELD_B - 10;
      if (p.y >= padTop - 4 && p.y <= padTop + 8 &&
          p.x >= paddle.x - pw - 5 && p.x <= paddle.x + pw + 5) {
        activatePower(p.type);
        powerups.splice(i, 1);
      }
    }

    // Enemies
    enemies = enemies.filter(e => e.alive);
    for (const e of enemies) {
      e.x += e.vx;
      e.y += e.vy;
      if (e.x < FIELD_L + 6 || e.x > FIELD_R - 6) e.vx = -e.vx;
      if (e.y > FIELD_B + 12) {
        e.y = FIELD_T - 10;
        e.x = FIELD_L + 20 + rnd(FIELD_W - 40);
      }
    }

    // Spawn enemies on higher levels
    if (level >= 3 && !bossActive && levelTimer % 200 === 0 && enemies.length < 3 + flr(level / 2)) {
      enemies.push(makeEnemy());
    }

    // Boss sway
    if (bossActive && bossHP > 0) {
      bossTimer++;
      bossY = 28 + sin(bossTimer * 0.025) * 10;
    }

    // Explosions
    for (let i = explosions.length - 1; i >= 0; i--) {
      explosions[i].t++;
      if (explosions[i].t > 16) explosions.splice(i, 1);
    }

    // Level complete
    if (breakableBricksLeft() === 0 && (!bossActive || bossHP <= 0)) {
      loadLevel(level + 1);
    }
  };

  function bossDefeated() {
    score += 1000;
    bossActive = false;
    for (let j = 0; j < 10; j++) {
      const bcx = (FIELD_L + FIELD_R) / 2;
      explosions.push({ x: bcx - 20 + rnd(40), y: bossY + rnd(24), t: -flr(rnd(20)) });
    }
    note(0, "C5", 0.15);
    setTimeout(() => { try { note(0, "E5", 0.15); } catch(e){} }, 150);
    setTimeout(() => { try { note(0, "G5", 0.25); } catch(e){} }, 300);
    msgText = "BOSS DEFEATED!";
    msgTimer = 90;
  }

  // --- Draw ---
  API._draw = function() {
    cls(0);

    if (state === "title") { drawTitle(); return; }
    if (state === "gameover") { drawGameOver(); return; }

    // Field border
    rect(FIELD_L - 2, FIELD_T - 2, FIELD_W + 4, FIELD_B - FIELD_T + 6, 1);
    // Side walls
    rectf(FIELD_L - 2, FIELD_T - 2, 2, FIELD_B - FIELD_T + 6, 1);
    rectf(FIELD_R, FIELD_T - 2, 2, FIELD_B - FIELD_T + 6, 1);
    // Top wall
    rectf(FIELD_L - 2, FIELD_T - 2, FIELD_W + 4, 2, 1);

    // Warp gate chevrons
    if (warpLevel) {
      for (let y = FIELD_T + 4; y < FIELD_B; y += 14) {
        const blink = ((API.frame + y) % 20 < 10) ? 2 : 3;
        for (let dy = 0; dy < 6; dy++) {
          pix(FIELD_L - 4, y + dy, blink);
          pix(FIELD_R + 2, y + dy, blink);
        }
      }
    }

    // Bricks
    for (const b of bricks) {
      const bx = BRICK_OX + b.col * BRICK_W;
      const by = BRICK_OY + b.row * BRICK_H;
      if (b.type === 5) {
        // Gold: indestructible, hatched
        rectf(bx + 1, by + 1, BRICK_W - 2, BRICK_H - 2, 3);
        rectf(bx + 2, by + 2, BRICK_W - 4, BRICK_H - 4, 2);
        for (let d = 0; d < BRICK_W; d += 4) {
          pix(bx + 1 + d, by + 1, 3);
          pix(bx + 1 + d, by + BRICK_H - 2, 3);
        }
      } else if (b.type === 4) {
        // Silver: 2 hits
        rectf(bx + 1, by + 1, BRICK_W - 2, BRICK_H - 2, 2);
        rect(bx + 1, by + 1, BRICK_W - 2, BRICK_H - 2, 3);
        if (b.hp > 1) {
          line(bx + 3, by + BRICK_H / 2, bx + BRICK_W - 4, by + BRICK_H / 2, 3);
        }
      } else {
        const c = BRICK_COLORS[b.type];
        rectf(bx + 1, by + 1, BRICK_W - 2, BRICK_H - 2, c);
        line(bx + 1, by + 1, bx + BRICK_W - 2, by + 1, min(c + 1, 3));
        line(bx + 1, by + 1, bx + 1, by + BRICK_H - 2, min(c + 1, 3));
      }
    }

    // Boss DOH
    if (bossActive && bossHP > 0) {
      const bcx = flr((FIELD_L + FIELD_R) / 2);
      const by = flr(bossY);
      // 4x3 sprite grid for big boss
      spr(10, bcx - 16, by);
      spr(11, bcx - 8, by);
      spr(10, bcx, by, true);
      spr(11, bcx + 8, by, true);
      spr(12, bcx - 16, by + 8);
      spr(13, bcx - 8, by + 8);
      spr(12, bcx, by + 8, true);
      spr(13, bcx + 8, by + 8, true);
      spr(10, bcx - 16, by + 16);
      spr(11, bcx - 8, by + 16);
      spr(10, bcx, by + 16, true);
      spr(11, bcx + 8, by + 16, true);
      // HP bar
      const hpBarW = 50;
      const hpFill = _max(0, flr(hpBarW * bossHP / bossMaxHP));
      rectf(bcx - 26, by - 6, hpBarW + 2, 4, 1);
      rectf(bcx - 25, by - 5, hpFill, 2, 3);
      text("DOH", bcx - 8, by - 12, 3);
    }

    // Enemies
    for (const e of enemies) {
      if (e.alive) spr(e.type, e.x - 4, e.y - 4);
    }

    // Paddle (Vaus)
    const padTop = FIELD_B - 10;
    spr(1, paddle.x - pw, padTop - 1);
    for (let px = paddle.x - pw + 8; px < paddle.x + pw - 8; px += 8) {
      spr(2, px, padTop - 1);
    }
    spr(3, paddle.x + pw - 8, padTop - 1);

    // Laser tips
    if (activePower === PU_LASER) {
      const blink = API.frame % 6 < 3 ? 3 : 2;
      rectf(paddle.x - pw + 1, padTop - 3, 2, 2, blink);
      rectf(paddle.x + pw - 3, padTop - 3, 2, 2, blink);
    }

    // Balls
    for (const b of balls) {
      if (b.active) spr(4, b.x - 3, b.y - 3);
    }

    // Lasers
    for (const l of lasers) {
      spr(6, l.x - 2, l.y - 4);
    }

    // Power-up capsules
    for (const p of powerups) {
      const blink = API.frame % 8 < 4;
      const c = blink ? 3 : 2;
      rectf(p.x - 5, p.y - 3, 10, 7, c);
      rectf(p.x - 4, p.y - 2, 8, 5, 1);
      text(PU_NAMES[p.type], p.x - 2, p.y - 2, 3);
    }

    // Explosions
    for (const ex of explosions) {
      if (ex.t < 0) continue;
      if (ex.t < 8) spr(9, ex.x - 4, ex.y - 4);
      else circ(ex.x, ex.y, _max(1, 8 - flr(ex.t / 2)), 1);
    }

    // Break wall gap indicator
    if (breakWall) {
      const cx = (FIELD_L + FIELD_R) / 2;
      const blink = API.frame % 10 < 5 ? 3 : 2;
      for (let i = -15; i <= 15; i += 5) {
        pix(cx + i, FIELD_B + 2, blink);
      }
      text("EXIT", cx - 10, FIELD_B + 4, blink);
    } else {
      line(FIELD_L - 1, FIELD_B + 2, FIELD_R, FIELD_B + 2, 1);
    }

    // --- HUD ---
    text("SCORE", 2, 2, 2);
    text(String(score), 2, 10, 3);

    const roundStr = "ROUND " + (level + 1);
    text(roundStr, (W - roundStr.length * 5) / 2, 2, 2);

    text("LIVES", W - 55, 2, 2);
    for (let i = 0; i < lives; i++) {
      spr(14, W - 55 + i * 10, 10);
    }

    // Active power indicator
    if (activePower >= 0) {
      const pname = ["LASER","EXTEND","CATCH","SLOW","BREAK","LIFE","DISRUPT"][activePower];
      const blink = (powerTimer > 0 && powerTimer < 60) ? (API.frame % 6 < 3 ? 3 : 0) : 3;
      text(pname, FIELD_L, FIELD_B + 6, blink);
    }

    // Level message
    if (msgTimer > 0) {
      const c = msgTimer > 30 ? 3 : (msgTimer > 15 ? 2 : 1);
      const mx = (W - msgText.length * 5) / 2;
      rectf(mx - 4, H / 2 - 24, msgText.length * 5 + 8, 14, 0);
      text(msgText, mx, H / 2 - 20, c);
    }
  };

  function drawTitle() {
    const t = API.frame;

    // Decorative top/bottom bars
    for (let i = 0; i < W; i += 10) {
      const c = ((flr(i / 10) + flr(t / 8)) % 3) + 1;
      rectf(i, 0, 8, 3, c);
      rectf(i, H - 3, 8, 3, c);
    }

    // Title
    text("A R K A N O I D", W / 2 - 55, 40, 3);
    line(W / 2 - 60, 50, W / 2 + 60, 50, 2);

    // Animated brick field
    for (let r = 0; r < 3; r++) {
      for (let c = 0; c < 12; c++) {
        const bx = 120 + c * 20;
        const by = 70 + r * 10 + sin(t * 0.04 + c * 0.3 + r) * 4;
        const col = ((r + c) % 3) + 1;
        rectf(bx, by, 18, 8, col);
        line(bx, by, bx + 17, by, min(col + 1, 3));
      }
    }

    // Paddle + ball animation
    const px = W / 2 + sin(t * 0.035) * 100;
    rectf(px - 16, 200, 32, 6, 2);
    rectf(px - 14, 201, 28, 4, 3);
    const ballX = px + sin(t * 0.07) * 40;
    const ballY = 185 + sin(t * 0.09) * 8;
    circf(ballX, ballY, 3, 3);

    // Power-up icons
    const puNames = ["LASER","EXTEND","CATCH","SLOW","BREAK","EXTRA","DISRUPT"];
    for (let i = 0; i < 7; i++) {
      const py = 125 + i * 12;
      const blink = ((t + i * 7) % 30 < 20);
      if (blink) {
        rectf(130, py, 8, 8, 2);
        text(PU_NAMES[i], 132, py + 1, 3);
        text(puNames[i], 145, py + 1, 2);
      }
    }

    // Instructions
    if (t % 50 < 35) {
      text("PRESS ENTER TO START", W / 2 - 50, 240, 3);
    }

    text("ARROWS = MOVE    Z = FIRE/RELEASE", W / 2 - 88, 262, 2);
    text("BREAK ALL BRICKS TO ADVANCE!", W / 2 - 72, 278, 1);
    text("BOSS BATTLE EVERY 4 LEVELS", W / 2 - 65, 290, 1);
  }

  function drawGameOver() {
    const t = API.frame;

    // Falling debris
    for (let i = 0; i < 12; i++) {
      const bx = 30 + i * 38;
      const by = ((t * 1.2 + i * 30) % (H + 20)) - 10;
      const c = (i % 3) + 1;
      rectf(bx, by, 16, 7, c);
    }

    rectf(W / 2 - 80, 85, 160, 50, 0);
    text("GAME OVER", W / 2 - 22, 90, 3);
    text("SCORE: " + score, W / 2 - 30, 108, 2);
    text("ROUND: " + (level + 1), W / 2 - 30, 120, 2);

    if (t % 50 < 35) {
      text("PRESS ENTER", W / 2 - 28, 180, 3);
    }
  }

  // ============================================================
  // Boot
  // ============================================================
  if (API._init) API._init();
  setInterval(tick, 1000 / FPS);
  document.addEventListener("keydown", ensureAudio, { once: true });
  document.addEventListener("click", ensureAudio, { once: true });
})();
</script>
</body>
</html>
