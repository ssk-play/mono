<title>GrayBox — Demo: Battle City</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #0a0a0a;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100vh;
    font-family: monospace;
    overflow: hidden;
  }
  #frame {
    background: #111;
    border: 3px solid #333;
    border-radius: 8px;
    padding: 12px;
    box-shadow: 0 0 40px rgba(0,0,0,0.8), inset 0 0 20px rgba(0,0,0,0.5);
  }
  canvas {
    display: block;
    image-rendering: pixelated;
    image-rendering: crisp-edges;
  }
  #controls {
    margin-top: 12px;
    color: #6b6b6b;
    font-size: 11px;
    text-align: center;
    letter-spacing: 1px;
  }
  #controls span { color: #b0b0b0; }
</style>

  // 20: Life icon
  defSprite(20,
    "00000000" +

  // --- Game Constants ---
  const ARENA_X = 53;
  const ARENA_Y = 6;
  const GRID_W = 26;
  const GRID_H = 26;
  const TILE = 8;
  const ARENA_PW = GRID_W * TILE;
  const ARENA_PH = GRID_H * TILE;

  const T_EMPTY = 0, T_BRICK = 1, T_STEEL = 2, T_WATER = 3, T_TREE = 4, T_ICE = 5;
  const DIR_UP = 0, DIR_DOWN = 1, DIR_LEFT = 2, DIR_RIGHT = 3;
  const DX = [0, 0, -1, 1];
  const DY = [-1, 1, 0, 0];

  // --- Game State ---
  let state = "title";
  let level, score, lives;
  let player, bullets, enemies, explosions, powerups;
  let spawnTimer, spawnCount, enemiesLeft, totalEnemies;
  let baseAlive, gameOverTimer, levelCompleteTimer;
  let grid;
  let shieldTimer, shovelTimer, freezeTimer;
  let spawnSlot, titleBlink = 0, moveSoundTimer = 0;

  // --- Level builder ---
  function buildLevel(lv) {
    grid = [];
    for (let y = 0; y < GRID_H; y++) {
      grid[y] = [];
      for (let x = 0; x < GRID_W; x++) grid[y][x] = T_EMPTY;
    }

    const seed = lv * 7 + 13;
    function sr(i) {
      let v = (seed * 1103515245 + i * 12345 + 12345) & 0x7fffffff;
      return (v % 1000) / 1000;
    }

    // Brick clusters
    for (let i = 0; i < 8 + flr(lv * 0.5); i++) {
      const cx = flr(sr(i*3) * (GRID_W-4)) + 2;
      const cy = flr(sr(i*3+1) * (GRID_H-8)) + 3;
      const sw = flr(sr(i*3+2) * 3) + 2;
      const sh = flr(sr(i*3+50) * 3) + 2;
      for (let dy = 0; dy < sh; dy++)
        for (let dx = 0; dx < sw; dx++) {
          const gx = cx+dx, gy = cy+dy;
          if (gx < GRID_W && gy >= 2 && gy < GRID_H-3) grid[gy][gx] = T_BRICK;
        }
    }

    // Steel
    for (let i = 0; i < 2 + flr(lv*0.5); i++) {
      const cx = flr(sr(i*5+100)*(GRID_W-2))+1;
      const cy = flr(sr(i*5+101)*(GRID_H-8))+3;
      const horiz = sr(i*5+102) > 0.5;
      for (let j = 0; j < flr(sr(i*5+103)*3)+2; j++) {
        const gx = horiz ? cx+j : cx, gy = horiz ? cy : cy+j;
        if (gx < GRID_W && gy >= 2 && gy < GRID_H-3) grid[gy][gx] = T_STEEL;
      }
    }

    // Water
    for (let i = 0; i < 1+flr(lv*0.3); i++) {
      const cx = flr(sr(i*7+200)*(GRID_W-4))+2;
      const cy = flr(sr(i*7+201)*(GRID_H-10))+4;
      for (let dy = 0; dy < flr(sr(i*7+203)*2)+2; dy++)
        for (let dx = 0; dx < flr(sr(i*7+202)*2)+2; dx++) {
          const gx = cx+dx, gy = cy+dy;
          if (gx < GRID_W && gy >= 2 && gy < GRID_H-3) grid[gy][gx] = T_WATER;
        }
    }

    // Trees
    for (let i = 0; i < 1+flr(lv*0.3); i++) {
      const cx = flr(sr(i*11+300)*(GRID_W-4))+2;
      const cy = flr(sr(i*11+301)*(GRID_H-10))+4;
      for (let dy = 0; dy < flr(sr(i*11+303)*2)+2; dy++)
        for (let dx = 0; dx < flr(sr(i*11+302)*3)+2; dx++) {
          const gx = cx+dx, gy = cy+dy;
          if (gx < GRID_W && gy >= 2 && gy < GRID_H-3) grid[gy][gx] = T_TREE;
        }
    }

    // Ice (from level 2)
    if (lv >= 2) {
      for (let i = 0; i < flr(lv*0.3); i++) {
        const cx = flr(sr(i*13+400)*(GRID_W-4))+2;
        const cy = flr(sr(i*13+401)*(GRID_H-10))+4;
        for (let dy = 0; dy < flr(sr(i*13+403)*2)+2; dy++)
          for (let dx = 0; dx < flr(sr(i*13+402)*3)+2; dx++) {
            const gx = cx+dx, gy = cy+dy;
            if (gx < GRID_W && gy >= 2 && gy < GRID_H-3) grid[gy][gx] = T_ICE;
          }
      }
    }

    // Base walls (brick)
    fortifyBase(T_BRICK);
    // Clear base interior
    const bx = flr(GRID_W/2)-1, by = GRID_H-2;
    grid[by][bx] = T_EMPTY; grid[by][bx+1] = T_EMPTY;
    grid[by+1][bx] = T_EMPTY; grid[by+1][bx+1] = T_EMPTY;

    // Clear spawn points
    const spawnXs = [0, flr(GRID_W/2)-1, GRID_W-2];
    for (const sx of spawnXs)
      for (let dy = 0; dy < 2; dy++)
        for (let dx = 0; dx < 2; dx++)
          if (sx+dx < GRID_W) grid[dy][sx+dx] = T_EMPTY;

    // Clear player spawn
    const px = flr(GRID_W/2) - 5;
    for (let dy = 0; dy < 2; dy++)
      for (let dx = 0; dx < 2; dx++)
        if (px+dx >= 0 && px+dx < GRID_W) grid[GRID_H-2+dy][px+dx] = T_EMPTY;
  }

  function fortifyBase(type) {
    const bx = flr(GRID_W/2)-1, by = GRID_H-2;
    for (let dy = -1; dy <= 1; dy++)
      for (let dx = -1; dx <= 2; dx++) {
        const gx = bx+dx, gy = by+dy;
        if (gx >= 0 && gx < GRID_W && gy >= 0 && gy < GRID_H)
          if (dy === -1 || dx === -1 || dx === 2) grid[gy][gx] = type;
      }
  }

  function makeTank(x, y, dir, isPlayer, type) {
    return {
      x, y, dir, isPlayer, type,
      speed: isPlayer ? 1.2 : (type === 2 ? 1.2 : (type === 3 ? 0.5 : 0.8)),
      hp: type === 3 ? 3 : 1,
      alive: true, cooldown: 0, aiTimer: 0, aiDir: dir,
    };
  }

  function startLevel() {
    buildLevel(level);
    baseAlive = true;
    bullets = []; enemies = []; explosions = []; powerups = [];
    spawnTimer = 0; spawnCount = 0; spawnSlot = 0;
    totalEnemies = min(20, 6 + level * 2);
    enemiesLeft = totalEnemies;
    shieldTimer = 90; shovelTimer = 0; freezeTimer = 0;
    levelCompleteTimer = 0;
    const px = flr(GRID_W/2) - 5;
    player = makeTank(ARENA_X + px*TILE, ARENA_Y + (GRID_H-2)*TILE, DIR_UP, true, 0);
  }

  function spawnEnemy() {
    if (spawnCount >= totalEnemies) return;
    const sxs = [ARENA_X, ARENA_X + flr(GRID_W/2-1)*TILE, ARENA_X + (GRID_W-2)*TILE];
    const sx = sxs[spawnSlot % 3]; spawnSlot++;
    let type = 1;
    const r = rnd(10);
    if (level >= 3 && r < 2) type = 3;
    else if (level >= 2 && r < 4) type = 2;
    if (spawnCount === totalEnemies-1 && level >= 2) type = 3;
    enemies.push(makeTank(sx, ARENA_Y, DIR_DOWN, false, type));
    spawnCount++;
  }

  // --- Collision ---
  function tileAt(px, py) {
    const gx = flr((px - ARENA_X) / TILE);
    const gy = flr((py - ARENA_Y) / TILE);
    if (gx < 0 || gx >= GRID_W || gy < 0 || gy >= GRID_H) return T_STEEL;
    return grid[gy][gx];
  }

  function tankHitsTerrain(t) {
    const pts = [
      [t.x,t.y],[t.x+13,t.y],[t.x,t.y+13],[t.x+13,t.y+13],
      [t.x+7,t.y],[t.x+7,t.y+13],[t.x,t.y+7],[t.x+13,t.y+7]
    ];
    for (const [cx,cy] of pts) {
      const tile = tileAt(cx,cy);
      if (tile === T_BRICK || tile === T_STEEL || tile === T_WATER) return true;
    }
    return false;
  }

  function rectsOverlap(ax,ay,aw,ah,bx,by,bw,bh) {
    return ax < bx+bw && ax+aw > bx && ay < by+bh && ay+ah > by;
  }

  function tankHitsTanks(t) {
    if (!t.isPlayer) {
      if (player && player.alive && rectsOverlap(t.x,t.y,14,14,player.x,player.y,14,14)) return true;
    }
    const list = t.isPlayer ? enemies : enemies;
    for (const o of list) {
      if (o === t || !o.alive) continue;
      if (rectsOverlap(t.x,t.y,14,14,o.x,o.y,14,14)) return true;
    }
    if (t.isPlayer) {
      for (const e of enemies) {
        if (e.alive && rectsOverlap(t.x,t.y,14,14,e.x,e.y,14,14)) return true;
      }
    }
    return false;
  }

  // --- Sound ---
  function sfxShoot() { note(0, "C5", 0.05); }
  function sfxHit() { note(1, "C3", 0.08); }
  function sfxExplode() { note(1, "C2", 0.15); }
  function sfxPowerup() { note(0, "G5", 0.05); setTimeout(() => { try { note(0, "C6", 0.1); } catch(e){} }, 60); }
  function sfxMove() { note(0, "A2", 0.04); }
  function sfxGameOver() { note(0, "C3", 0.2); setTimeout(() => { try { note(1, "G2", 0.3); } catch(e){} }, 200); }
  function sfxLevelClear() { note(0, "C5", 0.1); setTimeout(() => { try { note(0, "E5", 0.1); } catch(e){} }, 120); setTimeout(() => { try { note(0, "G5", 0.2); } catch(e){} }, 240); }

  // --- Actions ---
  function shoot(t) {
    if (t.cooldown > 0) return;
    if (bullets.some(b => b.owner === t)) return;
    const speed = t.isPlayer ? 3 : 2;
    bullets.push({
      x: t.x + 5 + DX[t.dir]*4, y: t.y + 5 + DY[t.dir]*4,
      dx: DX[t.dir]*speed, dy: DY[t.dir]*speed,
      owner: t, isPlayer: t.isPlayer
    });
    t.cooldown = t.isPlayer ? 10 : 25;
    sfxShoot();
  }

  function addExplosion(x, y, big) {
    explosions.push({ x, y, timer: big ? 20 : 12, big });
  }

  function spawnPowerup() {
    const types = ["star","shield","grenade","shovel"];
    powerups.push({
      x: ARENA_X + flr(rnd(GRID_W-2))*TILE + TILE,
      y: ARENA_Y + flr(rnd(GRID_H-6)+2)*TILE,
      type: types[flr(rnd(types.length))],
      timer: 300
    });
  }

  function applyPowerup(type) {
    sfxPowerup();
    if (type === "star") { player.speed = min(player.speed + 0.4, 2.5); }
    else if (type === "shield") { shieldTimer = 300; }
    else if (type === "grenade") {
      for (const e of enemies) if (e.alive) {
        e.alive = false; addExplosion(e.x,e.y,true);
        score += e.type===3?300:e.type===2?200:100; enemiesLeft--;
      }
      sfxExplode();
    }
    else if (type === "shovel") { fortifyBase(T_STEEL); shovelTimer = 600; }
  }

  // --- Movement ---
  function moveTank(t) {
    if (!t.isPlayer && freezeTimer > 0) return;
    const spd = t.speed;
    let nx = t.x, ny = t.y;
    const onIce = tileAt(t.x+7, t.y+7) === T_ICE;

    if (t.isPlayer) {
      let moved = false;
      let wantDir = -1;
      if (btn("up")) wantDir = DIR_UP;
      else if (btn("down")) wantDir = DIR_DOWN;
      else if (btn("left")) wantDir = DIR_LEFT;
      else if (btn("right")) wantDir = DIR_RIGHT;

      if (wantDir >= 0) {
        t.dir = wantDir;
        nx = t.x + DX[wantDir]*spd;
        ny = t.y + DY[wantDir]*spd;
        moved = true;
      } else if (onIce) {
        nx = t.x + DX[t.dir]*spd*0.5;
        ny = t.y + DY[t.dir]*spd*0.5;
        moved = true;
      }
      if (moved) {
        moveSoundTimer--;
        if (moveSoundTimer <= 0) { sfxMove(); moveSoundTimer = 8; }
      }
    } else {
      t.aiTimer--;
      if (t.aiTimer <= 0) {
        const r = rnd(10);
        if (r < 4) t.aiDir = DIR_DOWN;
        else if (r < 6 && player && player.alive) {
          t.aiDir = _abs(player.x-t.x) > _abs(player.y-t.y)
            ? (player.x < t.x ? DIR_LEFT : DIR_RIGHT)
            : (player.y < t.y ? DIR_UP : DIR_DOWN);
        } else t.aiDir = flr(rnd(4));
        t.aiTimer = 30 + flr(rnd(60));
      }
      t.dir = t.aiDir;
      nx = t.x + DX[t.dir]*spd;
      ny = t.y + DY[t.dir]*spd;
    }

    nx = _max(ARENA_X, min(ARENA_X + ARENA_PW - 14, nx));
    ny = _max(ARENA_Y, min(ARENA_Y + ARENA_PH - 14, ny));
    const ox = t.x, oy = t.y;
    t.x = nx; t.y = ny;
    if (tankHitsTerrain(t) || tankHitsTanks(t)) {
      t.x = ox; t.y = oy;
      if (!t.isPlayer) t.aiTimer = 0;
    }
  }

  // --- Bullet update ---
  function updateBullets() {
    for (let i = bullets.length-1; i >= 0; i--) {
      const b = bullets[i];
      b.x += b.dx; b.y += b.dy;

      // Out of arena
      if (b.x < ARENA_X || b.x >= ARENA_X+ARENA_PW || b.y < ARENA_Y || b.y >= ARENA_Y+ARENA_PH) {
        bullets.splice(i,1); continue;
      }

      // Hit terrain
      const gx = flr((b.x-ARENA_X)/TILE), gy = flr((b.y-ARENA_Y)/TILE);
      if (gx >= 0 && gx < GRID_W && gy >= 0 && gy < GRID_H) {
        const tile = grid[gy][gx];
        if (tile === T_BRICK) {
          grid[gy][gx] = T_EMPTY;
          addExplosion(ARENA_X+gx*TILE, ARENA_Y+gy*TILE, false);
          sfxHit(); bullets.splice(i,1); continue;
        }
        if (tile === T_STEEL) {
          addExplosion(ARENA_X+gx*TILE, ARENA_Y+gy*TILE, false);
          sfxHit(); bullets.splice(i,1); continue;
        }
      }

      // Hit eagle
      const ebx = flr(GRID_W/2)-1, eby = GRID_H-2;
      const eagleX = ARENA_X+ebx*TILE, eagleY = ARENA_Y+eby*TILE;
      if (baseAlive && b.x + 8 > eagleX && b.x < eagleX+16 && b.y + 8 > eagleY && b.y < eagleY+16) {
        baseAlive = false;
        addExplosion(eagleX, eagleY, true);
        sfxExplode(); bullets.splice(i,1);
        state = "gameover"; gameOverTimer = 120; sfxGameOver();
        continue;
      }

      // Bullet-bullet collision
      let bulletHit = false;
      for (let j = bullets.length-1; j >= 0; j--) {
        if (j === i) continue;
        const o = bullets[j];
        if (b.isPlayer !== o.isPlayer && _abs(b.x-o.x) < 4 && _abs(b.y-o.y) < 4) {
          bullets.splice(_max(i,j), 1);
          bullets.splice(min(i,j), 1);
          bulletHit = true; break;
        }
      }
      if (bulletHit) continue;

      // Hit tanks
      let hit = false;
      if (b.isPlayer) {
        for (const e of enemies) {
          if (!e.alive) continue;
          if (b.x + 8 > e.x && b.x < e.x+14 && b.y + 8 > e.y && b.y < e.y+14) {
            e.hp--;
            if (e.hp <= 0) {
              e.alive = false; addExplosion(e.x,e.y,true); sfxExplode();
              score += e.type===3?300:e.type===2?200:100;
              enemiesLeft--;
              if (rnd(10) < 2) spawnPowerup();
            } else sfxHit();
            hit = true; break;
          }
        }
      } else {
        if (player && player.alive) {
          if (b.x + 8 > player.x && b.x < player.x+14 && b.y + 8 > player.y && b.y < player.y+14) {
            if (shieldTimer <= 0) {
              lives--;
              addExplosion(player.x, player.y, true); sfxExplode();
              if (lives <= 0) {
                player.alive = false; state = "gameover"; gameOverTimer = 120; sfxGameOver();
              } else {
                const ppx = flr(GRID_W/2)-5;
                player.x = ARENA_X+ppx*TILE; player.y = ARENA_Y+(GRID_H-2)*TILE;
                player.dir = DIR_UP; shieldTimer = 90;
              }
            }
            hit = true;
          }
        }
      }
      if (hit) bullets.splice(i,1);
    }
  }

  // --- Main update ---
  GrayBox._update = function() {
    titleBlink++;

    if (state === "title") {
      if (btnp("a")) {
        state = "play"; level = 1; score = 0; lives = 3; startLevel();
      }
      return;
    }
    if (state === "gameover") {
      gameOverTimer--;
      if (gameOverTimer <= 0 && btnp("a")) state = "title";
      return;
    }
    if (state !== "play") return;

    // Level complete
    if (enemiesLeft <= 0 && enemies.every(e => !e.alive)) {
      levelCompleteTimer++;
      if (levelCompleteTimer === 1) sfxLevelClear();
      if (levelCompleteTimer > 90) { level++; startLevel(); }
      return;
    }

    if (shieldTimer > 0) shieldTimer--;
    if (shovelTimer > 0) { shovelTimer--; if (shovelTimer === 0) fortifyBase(T_BRICK); }
    if (freezeTimer > 0) freezeTimer--;

    // Spawn
    const alive = enemies.filter(e => e.alive).length;
    if (spawnCount < totalEnemies && alive < 4) {
      spawnTimer++;
      if (spawnTimer >= 60) { spawnEnemy(); spawnTimer = 0; }
    }

    // Player
    if (player && player.alive) {
      moveTank(player);
      if (player.cooldown > 0) player.cooldown--;
      if (btnp("a")) shoot(player);
    }

    // Enemies
    for (const e of enemies) {
      if (!e.alive) continue;
      moveTank(e);
      if (e.cooldown > 0) e.cooldown--;
      if (rnd(60) < 2) shoot(e);
    }

    updateBullets();

    // Explosions
    for (let i = explosions.length-1; i >= 0; i--) {
      explosions[i].timer--;
      if (explosions[i].timer <= 0) explosions.splice(i,1);
    }

    // Power-ups
    for (let i = powerups.length-1; i >= 0; i--) {
      powerups[i].timer--;
      if (powerups[i].timer <= 0) { powerups.splice(i,1); continue; }
      if (player && player.alive) {
        const p = powerups[i];
        if (rectsOverlap(player.x,player.y,14,14,p.x,p.y,8,8)) {
          applyPowerup(p.type); powerups.splice(i,1);
        }
      }
    }

    // Cleanup dead enemies
    enemies = enemies.filter(e => e.alive);
  };

  // --- Rotated sprite draw ---
  function drawRotSprite(id, x, y, dir) {
    const s = GrayBox._sprites[id]; if (!s) return;
    x = flr(x); y = flr(y);
    for (let py = 0; py < 8; py++)
      for (let px = 0; px < 8; px++) {
        let sx, sy;
        if (dir === DIR_LEFT) { sx = py; sy = 7-px; }
        else { sx = 7-py; sy = px; }
        const c = s[sy*8+sx], dx = x+px, dy = y+py;
        if (dx >= 0 && dx < W && dy >= 0 && dy < H) GrayBox._buf32[dy*W+dx] = GrayBox._COLOR_U32[c];
      }
  }

  function drawTank(t) {
    if (!t.alive) return;
    const px = flr(t.x)+3, py = flr(t.y)+3;
    const sid = t.isPlayer ? 1 : t.type===2 ? 11 : t.type===3 ? 12 : 10;
    if (t.dir === DIR_UP) spr(sid, px, py);
    else if (t.dir === DIR_DOWN) spr(sid, px, py, false, true);
    else drawRotSprite(sid, px, py, t.dir);

    // Shield glow
    if (t.isPlayer && shieldTimer > 0 && (shieldTimer > 30 || GrayBox.frame%4 < 2))
      spr(19, px, py);
  }

  // --- Main draw ---
  GrayBox._draw = function() {
    cls(0);

    if (state === "title") {
      text("BATTLE CITY", 133, 60, 3);
      text("TANK GAME", 138, 75, 2);
      spr(1, 147, 98); spr(10, 160, 98); spr(12, 173, 98);
      if (flr(titleBlink/20) % 2 === 0)
        text("PRESS ENTER TO START", 110, 135, 3);
      text("ARROWS: MOVE  Z: SHOOT", 103, 165, 1);
      text("DESTROY ALL ENEMY TANKS", 103, 180, 1);
      text("PROTECT YOUR BASE!", 115, 192, 2);
      text("GRAYBOX DEMO", 131, 225, 1);
      return;
    }

    // Arena background
    rectf(ARENA_X, ARENA_Y, ARENA_PW, ARENA_PH, 0);

    // Tiles (except trees)
    for (let gy = 0; gy < GRID_H; gy++)
      for (let gx = 0; gx < GRID_W; gx++) {
        const t = grid[gy][gx];
        const px = ARENA_X+gx*TILE, py = ARENA_Y+gy*TILE;
        if (t === T_BRICK) spr(3, px, py);
        else if (t === T_STEEL) spr(4, px, py);
        else if (t === T_WATER) spr(5, px, py);
        else if (t === T_ICE) spr(7, px, py);
      }

    // Eagle
    const ebx = flr(GRID_W/2)-1, eby = GRID_H-2;
    const ex = ARENA_X+ebx*TILE, ey = ARENA_Y+eby*TILE;
    const eid = baseAlive ? 8 : 9;
    spr(eid, ex, ey); spr(eid, ex+8, ey);
    spr(eid, ex, ey+8); spr(eid, ex+8, ey+8);

    // Power-ups
    for (const p of powerups)
      if (p.timer > 30 || GrayBox.frame%4 < 2) {
        const sid = p.type==="star"?15:p.type==="shield"?16:p.type==="grenade"?17:18;
        spr(sid, flr(p.x), flr(p.y));
      }

    // Player
    if (player && player.alive) drawTank(player);

    // Enemies
    for (const e of enemies) drawTank(e);

    // Bullets
    for (const b of bullets) spr(2, flr(b.x)-3, flr(b.y)-3);

    // Trees on top
    for (let gy = 0; gy < GRID_H; gy++)
      for (let gx = 0; gx < GRID_W; gx++)
        if (grid[gy][gx] === T_TREE) spr(6, ARENA_X+gx*TILE, ARENA_Y+gy*TILE);

    // Explosions
    for (const ex2 of explosions) {
      const sid = ex2.timer > (ex2.big?10:6) ? 13 : 14;
      spr(sid, flr(ex2.x), flr(ex2.y));
      if (ex2.big) {
        spr(sid, flr(ex2.x)+8, flr(ex2.y));
        spr(sid, flr(ex2.x), flr(ex2.y)+8);
        spr(sid, flr(ex2.x)+8, flr(ex2.y)+8);
      }
    }

    // --- HUD ---
    const hudX = ARENA_X + ARENA_PW + 11;

    // Enemy icons
    text("ENEMY", hudX, 8, 2);
    const rem = _max(0, totalEnemies-spawnCount) + enemies.filter(e => e.alive).length;
    for (let i = 0; i < rem; i++) {
      const ix = hudX + (i%2)*10, iy = 17 + flr(i/2)*10;
      rectf(ix+2, iy+2, 4, 4, 1);
    }

    text("LV", hudX, 120, 2);
    text(String(level), hudX+11, 120, 3);

    text("P1", hudX, 135, 2);
    for (let i = 0; i < lives; i++) spr(20, hudX+i*10, 143);

    text("SCORE", hudX, 165, 2);
    text(String(score), hudX, 173, 3);

    // Left side
    text("BATTLE", 3, 8, 2);
    text("CITY", 5, 15, 2);
    if (shieldTimer > 0) text("SHIELD", 3, 38, 3);
    if (freezeTimer > 0) text("FREEZE", 3, 45, 3);

    // Level complete
    if (levelCompleteTimer > 0) {
      rectf(93, 105, 133, 30, 0); rect(93, 105, 133, 30, 3);
      text("STAGE CLEAR!", 130, 111, 3);
      text("SCORE: " + score, 133, 122, 2);
    }

    // Game over
    if (state === "gameover") {
      rectf(107, 90, 107, 60, 0); rect(107, 90, 107, 60, 3);
      text("GAME OVER", 138, 101, 3);
      text("SCORE: " + score, 130, 116, 2);
      text("LEVEL: " + level, 130, 128, 2);
      if (gameOverTimer <= 0 && flr(titleBlink/15)%2 === 0)
        text("PRESS ENTER", 133, 139, 1);
    }
  };

  GrayBox.boot("screen");
})();
</script>
