  "use strict";
  const W = Mono.WIDTH, H = Mono.HEIGHT;
  const { cls, pix, line, rect, rectf, circ, circf, sprite: defSprite,
          spr, text, btn, btnp, note, stop, rnd, flr, abs: _abs,
          min, max: _max, sin, cos } = Mono;

  // --- 8x8 → 16x16 upscale helper ---
  function up(d) {
    let o = "";
    for (let r = 0; r < 8; r++) {
      let row = "";
      for (let c = 0; c < 8; c++) {
        const ch = d[r * 8 + c];
        row += ch + ch;
      }
      o += row + row;
    }
    return o;
  }

  // 42: Life icon (small raccoon face)
  defSprite(42, up(
    "00000000" +
    "00222000" +

  // --- Hitbox / collision constants (16x16 sprites) ---
  // Player hitbox (inset from 16x16 sprite)
  const PL_HBX = 3, PL_HBY = 2, PL_HBW = 10, PL_HBH = 14;
  const PL_CX = 8, PL_CY = 8, PL_R = 6; // circle for stomp check

  // Snake hitbox
  const SN_HBX = 2, SN_HBY = 2, SN_HBW = 12, SN_HBH = 12;

  // Bird hitbox (circle — birds are round)
  const BD_CX = 8, BD_CY = 8, BD_R = 6;

  // Falling rock hitbox (circle — rocks are round)
  const RK_CX = 8, RK_CY = 7, RK_R = 6;

  // Item hitbox (circle — items are roughly round)
  const IT_CX = 8, IT_CY = 8, IT_R = 6;

  // Star goal hitbox (circle)
  const ST_CX = 8, ST_CY = 8, ST_R = 7;

  // --- Collision helpers ---
  // Rect vs rect
  function hitRR(ax, ay, aw, ah, bx, by, bw, bh) {
    return ax + aw > bx && ax < bx + bw && ay + ah > by && ay < by + bh;
  }
  // Circle vs circle
  function hitCC(ax, ay, ar, bx, by, br) {
    const dx = ax - bx, dy = ay - by;
    const dist = ar + br;
    return dx * dx + dy * dy < dist * dist;
  }
  // Circle vs rect
  function hitCR(cx, cy, cr, rx, ry, rw, rh) {
    const nearX = _max(rx, min(cx, rx + rw));
    const nearY = _max(ry, min(cy, ry + rh));
    const dx = cx - nearX, dy = cy - nearY;
    return dx * dx + dy * dy < cr * cr;
  }

  // --- Game constants ---
  const GRAVITY = 0.35;
  const JUMP_FORCE = -5.5;
  const MOVE_SPEED = 2.0;
  const CLIMB_SPEED = 1.5;
  const TILE = 16; // tile size in px

  // --- Stage data ---
  const NUM_FLOORS = 6;
  const FLOOR_Y = []; // pixel Y for each floor (0=top, 5=bottom/ground)
  for (let i = 0; i < NUM_FLOORS; i++) {
    FLOOR_Y[i] = 30 + i * 40;
  }

  // --- Game state ---
  const { TITLE, PLAY, GAMEOVER } = Mono.SCENE;
  let player, enemies, items, fallingObjs, particles;
  let score, lives, stage, stageTimer;
  let platforms, ladders;
  let goalItem; // item at top to collect
  let invTimer; // invincibility frames after hit
  let stageComplete, stageCompleteTimer;
  let titleAnim;

  function generateStage(stageNum) {
    platforms = [];
    ladders = [];
    items = [];
    enemies = [];
    fallingObjs = [];
    particles = [];
    stageComplete = false;
    stageCompleteTimer = 0;
    invTimer = 0;

    const difficulty = min(stageNum, 10);

    // Generate floors - each floor is a row of platform tiles
    for (let f = 0; f < NUM_FLOORS; f++) {
      const y = FLOOR_Y[f];
      const gapCount = 1 + flr(rnd(2));
      const gaps = [];
      for (let g = 0; g < gapCount; g++) {
        gaps.push(32 + flr(rnd(W - 80)));
      }
      gaps.sort((a, b) => a - b);

      let segments = [];
      if (f === NUM_FLOORS - 1 || f === 0) {
        // Ground and top floor - solid
        segments.push({ x: 0, y: y, w: W });
      } else {
        // Middle floors have gaps
        let cx = 0;
        for (const gx of gaps) {
          if (gx - cx > 20) {
            segments.push({ x: cx, y: y, w: gx - cx });
          }
          cx = gx + 20; // gap width
        }
        if (W - cx > 16) {
          segments.push({ x: cx, y: y, w: W - cx });
        }
      }
      for (const seg of segments) {
        platforms.push(seg);
      }
    }

    // Generate ladders connecting floors
    for (let f = 0; f < NUM_FLOORS - 1; f++) {
      const numLadders = 2 + flr(rnd(2));
      for (let l = 0; l < numLadders; l++) {
        const lx = 24 + flr(rnd(W - 64));
        const topY = FLOOR_Y[f];
        const botY = FLOOR_Y[f + 1];
        const onTop = platforms.some(p => p.y === topY && lx >= p.x && lx + TILE <= p.x + p.w);
        const onBot = platforms.some(p => p.y === botY && lx >= p.x && lx + TILE <= p.x + p.w);
        if (onTop && onBot) {
          ladders.push({ x: lx, y1: topY, y2: botY });
        }
      }
    }

    // Ensure at least one ladder per floor gap
    for (let f = 0; f < NUM_FLOORS - 1; f++) {
      const hasLadder = ladders.some(l => l.y1 === FLOOR_Y[f] && l.y2 === FLOOR_Y[f + 1]);
      if (!hasLadder) {
        const topY = FLOOR_Y[f];
        const botY = FLOOR_Y[f + 1];
        for (let attempt = 0; attempt < 30; attempt++) {
          const lx = 24 + flr(rnd(W - 64));
          const onTop = platforms.some(p => p.y === topY && lx >= p.x && lx + TILE <= p.x + p.w);
          const onBot = platforms.some(p => p.y === botY && lx >= p.x && lx + TILE <= p.x + p.w);
          if (onTop && onBot) {
            ladders.push({ x: lx, y1: topY, y2: botY });
            break;
          }
        }
      }
    }

    // Place collectible items on platforms (not top or bottom floor)
    const itemTypes = [30, 31, 32, 33];
    for (let f = 1; f < NUM_FLOORS - 1; f++) {
      const numItems = 1 + flr(rnd(2 + difficulty * 0.3));
      for (let i = 0; i < numItems; i++) {
        const ix = 16 + flr(rnd(W - 48));
        const iy = FLOOR_Y[f] - TILE;
        const onPlat = platforms.some(p => p.y === FLOOR_Y[f] && ix >= p.x && ix + TILE <= p.x + p.w);
        if (onPlat) {
          items.push({
            x: ix, y: iy,
            type: itemTypes[flr(rnd(itemTypes.length))],
            collected: false
          });
        }
      }
    }

    // Goal item at top
    goalItem = {
      x: W / 2 - 8,
      y: FLOOR_Y[0] - TILE,
      type: 34, // star
      collected: false
    };

    // Place enemies on floors (not top or ground)
    for (let f = 1; f < NUM_FLOORS - 1; f++) {
      const numEnemies = min(1 + flr(difficulty * 0.4), 3);
      for (let e = 0; e < numEnemies; e++) {
        if (rnd(1) < 0.3 + difficulty * 0.05) {
          const ex = 24 + flr(rnd(W - 64));
          const ey = FLOOR_Y[f] - TILE;
          const etype = rnd(1) < 0.5 ? "snake" : "bird";
          enemies.push({
            x: ex, y: ey,
            type: etype,
            dir: rnd(1) < 0.5 ? 1 : -1,
            speed: 0.6 + rnd(0.8) + difficulty * 0.08,
            floor: f,
            animTimer: 0,
            active: true
          });
        }
      }
    }

    // Place player at ground floor
    player.x = W / 2 - 8;
    player.y = FLOOR_Y[NUM_FLOORS - 1] - TILE;
    player.vy = 0;
    player.onGround = true;
    player.climbing = false;
    player.dir = 1;
    player.animTimer = 0;
    player.jumpPressed = false;
  }

  function resetGame() {
    player = {
      x: W / 2 - 8, y: 0,
      vx: 0, vy: 0,
      onGround: false,
      climbing: false,
      dir: 1,
      animTimer: 0,
      jumpPressed: false
    };
    score = 0;
    lives = 3;
    stage = 1;
    stageTimer = 0;
    invTimer = 0;
    titleAnim = 0;
    generateStage(stage);
  }

  function isOnPlatform(x, y, w, h) {
    const footY = y + h;
    for (const p of platforms) {
      if (footY >= p.y && footY <= p.y + 6 &&
          x + w > p.x + 2 && x < p.x + p.w - 2) {
        return p.y;
      }
    }
    return -1;
  }

  function isOnLadder(x, y) {
    const cx = x + 8;
    for (const l of ladders) {
      if (cx >= l.x - 3 && cx <= l.x + TILE + 3 &&
          y + TILE >= l.y1 && y <= l.y2) {
        return l;
      }
    }
    return null;
  }

  function canClimbUp(x, y) {
    const cx = x + 8;
    for (const l of ladders) {
      if (cx >= l.x - 3 && cx <= l.x + TILE + 3 &&
          y + TILE >= l.y1 && y + 4 <= l.y2) {
        return l;
      }
    }
    return null;
  }

  function canClimbDown(x, y) {
    const cx = x + 8;
    for (const l of ladders) {
      if (cx >= l.x - 3 && cx <= l.x + TILE + 3 &&
          y + TILE >= l.y1 - 6 && y + TILE <= l.y2) {
        return l;
      }
    }
    return null;
  }

  function addParticles(x, y, count, color) {
    for (let i = 0; i < count; i++) {
      particles.push({
        x: x, y: y,
        vx: rnd(4) - 2, vy: rnd(3) - 2,
        life: 8 + flr(rnd(12)),
        color: color || (flr(rnd(3)) + 1)
      });
    }
  }

  // Sound functions
  function jumpSound() { note(0, "E5", 0.05); setTimeout(() => note(0, "G5", 0.04), 40); }
  function collectSound() {
    note(0, "C5", 0.06);
    setTimeout(() => note(0, "E5", 0.06), 60);
    setTimeout(() => note(0, "G5", 0.08), 120);
  }
  function hitSound() {
    note(0, "C3", 0.1); note(1, "G2", 0.1);
    setTimeout(() => { note(0, "A2", 0.15); }, 100);
  }
  function deathSound() {
    note(0, "C3", 0.15); note(1, "G2", 0.15);
    setTimeout(() => { note(0, "A2", 0.2); note(1, "E2", 0.2); }, 120);
  }
  function stageClearSound() {
    note(0, "C5", 0.08);
    setTimeout(() => note(0, "E5", 0.08), 80);
    setTimeout(() => note(0, "G5", 0.08), 160);
    setTimeout(() => note(0, "C6", 0.15), 240);
    setTimeout(() => note(1, "E6", 0.2), 320);
  }
  function fallingObjSound() { note(1, "D3", 0.04); }

  // --- Title Scene ---
  Mono.scene(TITLE, {
    init() { titleAnim = 0; },
    update() {
      titleAnim++;
      if (btnp("start") || btnp("a")) {
        resetGame();
        note(0, "C5", 0.08);
        setTimeout(() => note(0, "E5", 0.08), 80);
        setTimeout(() => note(0, "G5", 0.1), 160);
        Mono.go(PLAY); return;
      }
    },
    draw() {
      cls(0);
      // Background dots
      for (let y = 0; y < H; y += 16) {
        for (let x = 0; x < W; x += 16) {
          if ((x + y) % 32 === 0) pix(x, y, 1);
        }
      }
      const ty = 30 + sin(titleAnim * 0.06) * 3;
      text("PONPOKO", flr(W / 2 - 7 * 2.5), flr(ty), 3);
      text("PONPOKO", flr(W / 2 - 7 * 2.5) + 1, flr(ty) + 1, 1);
      text("- RACCOON -", flr(W / 2 - 11 * 2.5), flr(ty) + 12, 2);
      rectf(W / 2 - 40, flr(ty) + 21, 80, 1, 2);

      // Animated raccoon
      const rx = W / 2 - 8;
      const walkFrame = flr(titleAnim / 8) % 2 === 0 ? 1 : 2;
      spr(walkFrame, flr(rx + sin(titleAnim * 0.08) * 24), flr(ty) + 28);

      // Floating items around raccoon
      spr(30, W / 2 - 36, flr(ty) + 30 + flr(sin(titleAnim * 0.1) * 3));
      spr(31, W / 2 + 24, flr(ty) + 32 + flr(sin(titleAnim * 0.1 + 1) * 3));
      spr(32, W / 2 - 48, flr(ty) + 28 + flr(sin(titleAnim * 0.1 + 2) * 3));
      spr(33, W / 2 + 36, flr(ty) + 30 + flr(sin(titleAnim * 0.1 + 3) * 3));

      if (flr(titleAnim / 20) % 2 === 0) {
        text("PRESS START", flr(W / 2 - 16 * 2.5), 140, 3);
      }
      text("ARROWS: MOVE/CLIMB", flr(W / 2 - 18 * 2.5), 160, 2);
      text("A: JUMP", flr(W / 2 - 7 * 2.5), 170, 2);
      text("REACH THE STAR!", flr(W / 2 - 15 * 2.5), 184, 2);

      // Enemy/item legend
      spr(20, W / 2 - 40, 198); text("SNAKE  200", W / 2 - 22, 202, 2);
      spr(21, W / 2 - 40, 216); text("BIRD   200", W / 2 - 22, 220, 2);
      text("MONO DEMO V0.2", flr(W / 2 - 17 * 2.5), 234, 1);
    }
  });

  // --- Play Scene ---
  Mono.scene(PLAY, {
    init() { resetGame(); },
    update() {
    stageTimer++;

    if (stageComplete) {
      stageCompleteTimer++;
      if (stageCompleteTimer > 90) {
        stage++;
        generateStage(stage);
      }
      return;
    }

    if (invTimer > 0) invTimer--;

    const pl = player;

    // --- Player movement ---
    const ladder = isOnLadder(pl.x, pl.y);
    const climbUp = canClimbUp(pl.x, pl.y);
    const climbDown = canClimbDown(pl.x, pl.y);

    // Start climbing
    if (btn("up") && climbUp && !pl.climbing) {
      pl.climbing = true;
      pl.vy = 0;
      pl.x = climbUp.x - 1; // snap to ladder
    }
    if (btn("down") && climbDown && pl.onGround && !pl.climbing) {
      pl.climbing = true;
      pl.vy = 0;
      pl.x = climbDown.x - 1;
    }

    if (pl.climbing) {
      const curLadder = isOnLadder(pl.x, pl.y);
      if (!curLadder) {
        pl.climbing = false;
      } else {
        if (btn("up")) {
          pl.y -= CLIMB_SPEED;
          pl.animTimer++;
          if (pl.y + TILE < curLadder.y1 + 6) {
            pl.y = curLadder.y1 - TILE;
            pl.climbing = false;
            pl.onGround = true;
          }
        }
        if (btn("down")) {
          pl.y += CLIMB_SPEED;
          pl.animTimer++;
          if (pl.y + TILE > curLadder.y2) {
            pl.y = curLadder.y2 - TILE;
            pl.climbing = false;
            pl.onGround = true;
          }
        }
        if (btn("left")) { pl.x -= 1; pl.dir = -1; }
        if (btn("right")) { pl.x += 1; pl.dir = 1; }

        // Jump off ladder
        if (btnp("a")) {
          pl.climbing = false;
          pl.vy = JUMP_FORCE * 0.7;
          pl.onGround = false;
          jumpSound();
        }
        pl.vy = 0;
      }
    }

    if (!pl.climbing) {
      if (btn("left")) {
        pl.x -= MOVE_SPEED;
        pl.dir = -1;
        pl.animTimer++;
      }
      if (btn("right")) {
        pl.x += MOVE_SPEED;
        pl.dir = 1;
        pl.animTimer++;
      }

      // Jump
      if (btnp("a") && pl.onGround) {
        pl.vy = JUMP_FORCE;
        pl.onGround = false;
        jumpSound();
      }

      // Gravity
      pl.vy += GRAVITY;
      pl.y += pl.vy;

      // Platform collision (only when falling)
      if (pl.vy >= 0) {
        const platY = isOnPlatform(pl.x + PL_HBX, pl.y, PL_HBW, TILE);
        if (platY >= 0) {
          pl.y = platY - TILE;
          pl.vy = 0;
          pl.onGround = true;
        } else {
          pl.onGround = false;
        }
      } else {
        pl.onGround = false;
      }
    }

    // Screen bounds
    pl.x = _max(0, min(W - TILE, pl.x));
    if (pl.y > H + 16) {
      // Fell off screen
      lives--;
      invTimer = 60;
      if (lives <= 0) {
        deathSound();
        addParticles(pl.x + 8, pl.y, 20, 3);
        Mono.go(GAMEOVER); return;
      } else {
        pl.x = W / 2 - 8;
        pl.y = FLOOR_Y[NUM_FLOORS - 1] - TILE;
        pl.vy = 0;
        pl.onGround = true;
        pl.climbing = false;
        hitSound();
      }
    }

    // --- Item collection (circle collision) ---
    const plCx = pl.x + PL_CX, plCy = pl.y + PL_CY;
    for (const item of items) {
      if (!item.collected) {
        const icx = item.x + IT_CX, icy = item.y + IT_CY;
        if (hitCC(plCx, plCy, PL_R, icx, icy, IT_R)) {
          item.collected = true;
          score += 100;
          addParticles(item.x + 8, item.y + 8, 6, 3);
          collectSound();
        }
      }
    }

    // Goal item (circle collision)
    if (!goalItem.collected) {
      const gcx = goalItem.x + ST_CX, gcy = goalItem.y + ST_CY;
      if (hitCC(plCx, plCy, PL_R, gcx, gcy, ST_R)) {
        goalItem.collected = true;
        score += 500 + stage * 100;
        stageComplete = true;
        stageCompleteTimer = 0;
        addParticles(goalItem.x + 8, goalItem.y + 8, 15, 3);
        stageClearSound();
      }
    }

    // --- Enemy update ---
    for (let i = enemies.length - 1; i >= 0; i--) {
      const e = enemies[i];
      if (!e.active) continue;

      e.animTimer++;

      if (e.type === "snake") {
        e.x += e.dir * e.speed;
        const floorY = FLOOR_Y[e.floor];
        const onPlat = platforms.some(p =>
          p.y === floorY && e.x + 8 >= p.x && e.x + 8 <= p.x + p.w
        );
        if (!onPlat || e.x < 4 || e.x > W - TILE - 4) {
          e.dir *= -1;
          e.x += e.dir * 2;
        }
      } else if (e.type === "bird") {
        e.x += e.dir * e.speed * 1.2;
        e.y = FLOOR_Y[e.floor] - TILE - 4 + sin(e.animTimer * 0.1) * 6;
        if (e.x < -20) { e.x = W + 16; }
        if (e.x > W + 16) { e.x = -20; }
      }

      // Enemy-player collision
      if (invTimer <= 0) {
        let hit = false;
        if (e.type === "snake") {
          // Snake uses rect hitbox
          hit = hitRR(
            pl.x + PL_HBX, pl.y + PL_HBY, PL_HBW, PL_HBH,
            e.x + SN_HBX, e.y + SN_HBY, SN_HBW, SN_HBH
          );
        } else {
          // Bird uses circle hitbox
          hit = hitCC(plCx, plCy, PL_R, e.x + BD_CX, e.y + BD_CY, BD_R);
        }

        if (hit) {
          // Check if player is jumping on top of enemy (stomp)
          if (pl.vy > 0 && pl.y + TILE < e.y + 8) {
            e.active = false;
            score += 200;
            pl.vy = JUMP_FORCE * 0.6;
            addParticles(e.x + 8, e.y + 8, 8, 2);
            note(1, "E4", 0.06);
            setTimeout(() => note(1, "G4", 0.06), 50);
          } else {
            lives--;
            invTimer = 60;
            addParticles(pl.x + 8, pl.y + 8, 8, 3);
            if (lives <= 0) {
              deathSound();
              Mono.go(GAMEOVER); return;
            } else {
              hitSound();
              pl.vy = JUMP_FORCE * 0.5;
              pl.x += (pl.x < e.x) ? -16 : 16;
            }
          }
        }
      }
    }

    // --- Falling objects ---
    const fallRate = _max(40, 120 - stage * 10);
    if (stageTimer % fallRate === 0 && fallingObjs.length < 4 + stage) {
      const fx = 16 + flr(rnd(W - 32));
      fallingObjs.push({
        x: fx, y: -TILE,
        vy: 1.5 + rnd(1) + stage * 0.15,
        active: true
      });
    }

    for (let i = fallingObjs.length - 1; i >= 0; i--) {
      const obj = fallingObjs[i];
      obj.y += obj.vy;
      // Bounce off platforms slightly
      for (const p of platforms) {
        if (obj.y + 14 >= p.y && obj.y + 14 <= p.y + 4 &&
            obj.x + 14 > p.x && obj.x < p.x + p.w &&
            obj.vy > 0) {
          if (rnd(1) < 0.4) {
            obj.vy *= 0.5;
          }
        }
      }
      if (obj.y > H + 16) {
        fallingObjs.splice(i, 1);
        continue;
      }

      // Hit player (circle collision — rock is round)
      if (invTimer <= 0 && obj.active) {
        if (hitCC(plCx, plCy, PL_R, obj.x + RK_CX, obj.y + RK_CY, RK_R)) {
          obj.active = false;
          fallingObjs.splice(i, 1);
          lives--;
          invTimer = 60;
          addParticles(pl.x + 8, pl.y + 8, 8, 2);
          if (lives <= 0) {
            deathSound();
            Mono.go(GAMEOVER); return;
          } else {
            hitSound();
          }
        }
      }
    }

    // --- Particles ---
    for (let i = particles.length - 1; i >= 0; i--) {
      const p = particles[i];
      p.x += p.vx; p.y += p.vy; p.vy += 0.05; p.life--;
      if (p.life <= 0) particles.splice(i, 1);
    }
    },
    draw() {
    cls(0);

    // Draw platforms (tiled 16x16 blocks)
    for (const p of platforms) {
      for (let tx = p.x; tx < p.x + p.w; tx += TILE) {
        const drawW = min(TILE, p.x + p.w - tx);
        if (drawW >= TILE) {
          spr(10, tx, p.y);
        } else {
          rectf(tx, p.y, drawW, TILE, 1);
          rectf(tx, p.y, drawW, 2, 3);
        }
      }
    }

    // Draw ladders
    for (const l of ladders) {
      for (let ly = l.y1; ly < l.y2; ly += TILE) {
        if (ly === l.y1) {
          spr(12, l.x, ly);
        } else {
          spr(11, l.x, ly);
        }
      }
    }

    // Draw items + debug circles
    for (const item of items) {
      if (!item.collected) {
        spr(item.type, flr(item.x), flr(item.y));
        Mono.dbgC(flr(item.x) + IT_CX, flr(item.y) + IT_CY, IT_R);
      }
    }

    // Draw goal item (pulsing) + debug circle
    if (!goalItem.collected) {
      const pulse = sin(Mono.frame * 0.15) * 2;
      const gx = flr(goalItem.x), gy = flr(goalItem.y + pulse);
      spr(goalItem.type, gx, gy);
      Mono.dbgC(gx + ST_CX, gy + ST_CY, ST_R);
      // Arrow pointing to goal
      if (Mono.frame % 30 < 20) {
        const arrowY = goalItem.y - 12 + sin(Mono.frame * 0.2) * 3;
        pix(goalItem.x + 7, flr(arrowY), 3);
        pix(goalItem.x + 6, flr(arrowY) - 1, 3);
        pix(goalItem.x + 8, flr(arrowY) - 1, 3);
        pix(goalItem.x + 5, flr(arrowY) - 2, 3);
        pix(goalItem.x + 9, flr(arrowY) - 2, 3);
      }
    }

    // Draw falling objects + debug circles
    for (const obj of fallingObjs) {
      if (obj.active) {
        spr(23, flr(obj.x), flr(obj.y));
        Mono.dbgC(flr(obj.x) + RK_CX, flr(obj.y) + RK_CY, RK_R);
      }
    }

    // Draw enemies + debug hitboxes
    for (const e of enemies) {
      if (!e.active) continue;
      if (e.type === "snake") {
        spr(20, flr(e.x), flr(e.y), e.dir < 0);
        Mono.dbg(flr(e.x) + SN_HBX, flr(e.y) + SN_HBY, SN_HBW, SN_HBH);
      } else if (e.type === "bird") {
        const birdFrame = flr(e.animTimer / 6) % 2 === 0 ? 21 : 22;
        spr(birdFrame, flr(e.x), flr(e.y), e.dir < 0);
        Mono.dbgC(flr(e.x) + BD_CX, flr(e.y) + BD_CY, BD_R);
      }
    }

    // Draw player + debug hitbox
    const pl = player;
    if (invTimer <= 0 || flr(Mono.frame / 3) % 2 === 0) {
      let sprId;
      if (pl.climbing) {
        sprId = 3;
      } else if (!pl.onGround) {
        sprId = 4;
      } else if (btn("left") || btn("right")) {
        sprId = flr(pl.animTimer / 5) % 2 === 0 ? 1 : 2;
      } else {
        sprId = 1;
      }
      spr(sprId, flr(pl.x), flr(pl.y), pl.dir < 0);
    }
    // Player hitbox debug (always register, even during blink)
    Mono.dbg(flr(pl.x) + PL_HBX, flr(pl.y) + PL_HBY, PL_HBW, PL_HBH);

    // Draw particles
    for (const p of particles) {
      pix(flr(p.x), flr(p.y), p.color);
    }

    // --- HUD ---
    rectf(0, 0, W, 18, 0);
    line(0, 18, W, 18, 1);
    text("SCORE:" + score, 4, 5, 3);
    text("STAGE:" + stage, flr(W / 2 - 30), 5, 2);
    // Lives — capped display to prevent overflow (max 5 icons shown)
    const maxLivesShown = min(lives, 5);
    for (let i = 0; i < maxLivesShown; i++) spr(42, W - 24 - (maxLivesShown - 1 - i) * 18, 1);

    // Stage complete message
    if (stageComplete) {
      const msgY = 105 + sin(stageCompleteTimer * 0.1) * 3;
      rectf(W / 2 - 55, flr(msgY) - 6, 110, 28, 0);
      rect(W / 2 - 55, flr(msgY) - 6, 110, 28, 3);
      text("STAGE CLEAR!", flr(W / 2 - 12 * 2.5), flr(msgY), 3);
      text("BONUS: " + (500 + stage * 100), flr(W / 2 - 12 * 2.5), flr(msgY) + 10, 2);
    }
    }
  });

  // --- Game Over Scene ---
  Mono.scene(GAMEOVER, {
    init() {},
    update() {
      for (let i = particles.length - 1; i >= 0; i--) {
        const p = particles[i];
        p.x += p.vx; p.y += p.vy; p.vy += 0.08; p.life--;
        if (p.life <= 0) particles.splice(i, 1);
      }
      if (btnp("start") || btnp("a")) { Mono.go(TITLE); return; }
    },
    draw() {
      cls(0);
      for (const p of particles) pix(flr(p.x), flr(p.y), p.color);
      text("GAME OVER", flr(W / 2 - 9 * 2.5), 90, 3);
      text("SCORE: " + score, flr(W / 2 - (7 + String(score).length) * 2.5), 109, 2);
      text("STAGE: " + stage, flr(W / 2 - (7 + String(stage).length) * 2.5), 120, 2);
      if (flr(Mono.frame / 20) % 2 === 0) {
        text("PRESS START", flr(W / 2 - 19 * 2.5), 150, 3);
      }
    }
  });

  Mono.go(TITLE);
  Mono.boot("screen");
})();
</script>
