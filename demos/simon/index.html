<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GrayBox — Demo: Simon</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #0a0a0a;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100vh;
    font-family: monospace;
    overflow: hidden;
  }
  #frame {
    background: #111;
    border: 3px solid #333;
    border-radius: 8px;
    padding: 12px;
    box-shadow: 0 0 40px rgba(0,0,0,0.8), inset 0 0 20px rgba(0,0,0,0.5);
  }
  canvas {
    display: block;
    image-rendering: pixelated;
    image-rendering: crisp-edges;
  }
  #controls {
    margin-top: 12px;
    color: #6b6b6b;
    font-size: 11px;
    text-align: center;
    letter-spacing: 1px;
  }
  #controls span { color: #b0b0b0; }
</style>
</head>
<body>
<div id="frame">
  <canvas id="screen"></canvas>
</div>
<div id="controls">
  <span>ARROWS</span> SELECT &nbsp;&nbsp; <span>ENTER</span> START
</div>
<script>
(() => {
  "use strict";

  // ============================================================
  // GrayBox Runtime (inline)
  // ============================================================
  const W = 480;
  const H = 320;
  const SCALE = 2;
  const FPS = 30;
  const COLORS = ["#1a1a1a", "#6b6b6b", "#b0b0b0", "#e8e8e8"];
  const canvas = document.getElementById("screen");
  canvas.width = W;
  canvas.height = H;
  canvas.style.width = (W * SCALE) + "px";
  canvas.style.height = (H * SCALE) + "px";
  const ctx = canvas.getContext("2d");
  ctx.imageSmoothingEnabled = false;
  const buf = ctx.createImageData(W, H);
  const buf32 = new Uint32Array(buf.data.buffer);

  function hexToABGR(hex) {
    const r = parseInt(hex.slice(1, 3), 16);
    const g = parseInt(hex.slice(3, 5), 16);
    const b = parseInt(hex.slice(5, 7), 16);
    return (255 << 24) | (b << 16) | (g << 8) | r;
  }
  const COLOR_U32 = COLORS.map(hexToABGR);

  const sprites = {};
  const tilemap = {};

  const keyMap = {
    "ArrowUp": "up", "ArrowDown": "down", "ArrowLeft": "left", "ArrowRight": "right",
    "w": "up", "s": "down", "a": "left", "d": "right",
    "z": "a", "Z": "a", "x": "b", "X": "b",
    "Enter": "start", " ": "a"
  };
  const keys = {};
  const keysPrev = {};

  document.addEventListener("keydown", e => {
    const k = keyMap[e.key];
    if (k) { keys[k] = true; e.preventDefault(); }
  });
  document.addEventListener("keyup", e => {
    const k = keyMap[e.key];
    if (k) { keys[k] = false; e.preventDefault(); }
  });

  let audioCtx = null;
  const channels = [null, null];
  const channelGains = [null, null];
  function ensureAudio() {
    if (!audioCtx) {
      audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      for (let i = 0; i < 2; i++) {
        channelGains[i] = audioCtx.createGain();
        channelGains[i].gain.value = 0.15;
        channelGains[i].connect(audioCtx.destination);
      }
    }
  }

  const NOTE_NAMES = ["C","C#","D","D#","E","F","F#","G","G#","A","A#","B"];
  function noteToFreq(noteStr) {
    const match = noteStr.match(/^([A-G]#?)(\d)$/);
    if (!match) return 440;
    const name = match[1];
    const octave = parseInt(match[2]);
    const semitone = NOTE_NAMES.indexOf(name);
    if (semitone === -1) return 440;
    const midi = (octave + 1) * 12 + semitone;
    return 440 * Math.pow(2, (midi - 69) / 12);
  }

  const FONT_W = 4;
  const FONT_H = 6;
  const FONT = {};
  const fontData = {
    "A":"0110100110011111100110011001","B":"1110100110101110100110011110",
    "C":"0110100110001000100001100110","D":"1100101010011001100110101100",
    "E":"1111100010001110100010001111","F":"1111100010001110100010001000",
    "G":"0111100010001011100101100111","H":"1001100110011111100110011001",
    "I":"1110010001000100010001001110","J":"0111001000100010001010100100",
    "K":"1001101011001100101010011001","L":"1000100010001000100010001111",
    "M":"1001111111011001100110011001","N":"1001110111011001100110011001",
    "O":"0110100110011001100110010110","P":"1110100110011110100010001000",
    "Q":"0110100110011001101101100001","R":"1110100110011110101010011001",
    "S":"0111100010000110000110001110","T":"1111001000100010001000100010",
    "U":"1001100110011001100110010110","V":"1001100110011001100101100110",
    "W":"1001100110011001101111011001","X":"1001100101100110011010011001",
    "Y":"1001100101100010001000100010","Z":"1111000100100100100010001111",
    "0":"0110100111011011101110010110","1":"0100110001000100010001001110",
    "2":"0110100100010010010010001111","3":"1110000100010110000110011110",
    "4":"1001100110011111000100010001","5":"1111100010001110000100011110",
    "6":"0110100010001110100110010110","7":"1111000100010010010001001000",
    "8":"0110100110010110100110010110","9":"0110100110010111000100010110",
    " ":"0000000000000000000000000000",
    ".":"0000000000000000000001000100",
    ",":"0000000000000000001000101000",
    "!":"0100010001000100000000000100",
    "?":"0110100100010010000000000010",
    "-":"0000000000001110000000000000",
    "+":"0000001001001110010000100000",
    ":":"0000010001000000010001000000",
    "/":"0001000100100010010010001000",
    "*":"0000101001001110010010100000",
    "#":"0101111101011111010100000000",
    "(":"0010010010001000010001000010",
    ")":"0100001000010001000100100100",
    "=":"0000000011110000111100000000",
    "'":"0100010010000000000000000000",
    "\"":"1010101000000000000000000000",
    "<":"0010010010001000010000100010",
    ">":"1000010000100001001001001000",
    "_":"0000000000000000000000001111",
  };
  for (const [ch, bits] of Object.entries(fontData)) {
    FONT[ch] = [];
    for (let i = 0; i < bits.length; i++) FONT[ch].push(parseInt(bits[i]));
  }

  const API = {};
  API._init = null;
  API._update = null;
  API._draw = null;
  API.frame = 0;

  API.cls = function(c = 0) { buf32.fill(COLOR_U32[c] || COLOR_U32[0]); };
  API.pix = function(x, y, c) {
    x = Math.floor(x); y = Math.floor(y);
    if (x < 0 || x >= W || y < 0 || y >= H) return;
    buf32[y * W + x] = COLOR_U32[c] || COLOR_U32[0];
  };
  API.line = function(x0, y0, x1, y1, c) {
    x0=Math.floor(x0); y0=Math.floor(y0); x1=Math.floor(x1); y1=Math.floor(y1);
    const dx=Math.abs(x1-x0), dy=Math.abs(y1-y0);
    const sx=x0<x1?1:-1, sy=y0<y1?1:-1;
    let err=dx-dy;
    while(true) {
      API.pix(x0,y0,c);
      if(x0===x1&&y0===y1) break;
      const e2=2*err;
      if(e2>-dy){err-=dy;x0+=sx;}
      if(e2<dx){err+=dx;y0+=sy;}
    }
  };
  API.rect = function(x,y,w,h,c) {
    API.line(x,y,x+w-1,y,c); API.line(x+w-1,y,x+w-1,y+h-1,c);
    API.line(x+w-1,y+h-1,x,y+h-1,c); API.line(x,y+h-1,x,y,c);
  };
  API.rectf = function(x,y,w,h,c) {
    x=Math.floor(x); y=Math.floor(y);
    const col=COLOR_U32[c]||COLOR_U32[0];
    for(let py=Math.max(0,y);py<Math.min(H,y+h);py++)
      for(let px=Math.max(0,x);px<Math.min(W,x+w);px++)
        buf32[py*W+px]=col;
  };
  API.circ = function(cx,cy,r,c) {
    let x=r,y=0,d=1-r; cx=Math.floor(cx); cy=Math.floor(cy);
    while(x>=y){
      API.pix(cx+x,cy+y,c);API.pix(cx-x,cy+y,c);
      API.pix(cx+x,cy-y,c);API.pix(cx-x,cy-y,c);
      API.pix(cx+y,cy+x,c);API.pix(cx-y,cy+x,c);
      API.pix(cx+y,cy-x,c);API.pix(cx-y,cy-x,c);
      y++; if(d<0){d+=2*y+1;}else{x--;d+=2*(y-x)+1;}
    }
  };
  API.circf = function(cx,cy,r,c) {
    cx=Math.floor(cx); cy=Math.floor(cy);
    const col=COLOR_U32[c]||COLOR_U32[0]; const r2=r*r;
    for(let py=-r;py<=r;py++) for(let px=-r;px<=r;px++)
      if(px*px+py*py<=r2){ const sx=cx+px,sy=cy+py;
        if(sx>=0&&sx<W&&sy>=0&&sy<H) buf32[sy*W+sx]=col; }
  };
  API.sprite = function(id, data) {
    const arr = new Uint8Array(64); let i = 0;
    for (const ch of data) { if (ch>='0'&&ch<='3') { arr[i++]=parseInt(ch); if(i>=64) break; } }
    sprites[id] = arr;
  };
  API.spr = function(id, x, y, flipX, flipY) {
    const s=sprites[id]; if(!s) return;
    x=Math.floor(x); y=Math.floor(y);
    for(let py=0;py<8;py++) for(let px=0;px<8;px++){
      const sx=flipX?7-px:px, sy=flipY?7-py:py;
      const c=s[sy*8+sx], dx=x+px, dy=y+py;
      if(dx>=0&&dx<W&&dy>=0&&dy<H) buf32[dy*W+dx]=COLOR_U32[c];
    }
  };
  API.text = function(str, x, y, c) {
    str=String(str).toUpperCase(); let cx=Math.floor(x); const cy=Math.floor(y);
    const col=COLOR_U32[c]||COLOR_U32[3];
    for(const ch of str){
      const glyph=FONT[ch];
      if(glyph) for(let py=0;py<FONT_H;py++) for(let px=0;px<FONT_W;px++)
        if(glyph[py*FONT_W+px]){ const dx=cx+px,dy=cy+py;
          if(dx>=0&&dx<W&&dy>=0&&dy<H) buf32[dy*W+dx]=col; }
      cx+=FONT_W+1;
    }
  };
  API.mget = function(cx,cy) { return tilemap[cx+","+cy]||0; };
  API.mset = function(cx,cy,id) { tilemap[cx+","+cy]=id; };
  API.map = function(mx,my,mw,mh,sx,sy) {
    for(let ty=0;ty<mh;ty++) for(let tx=0;tx<mw;tx++){
      const id=API.mget(mx+tx,my+ty); if(id>0) API.spr(id,sx+tx*8,sy+ty*8); }
  };
  API.btn = function(k) { return !!keys[k]; };
  API.btnp = function(k) { return !!keys[k] && !keysPrev[k]; };
  API.note = function(ch, noteStr, dur) {
    ensureAudio(); if(ch<0||ch>1) return; API.stop(ch);
    const osc=audioCtx.createOscillator(); osc.type="square";
    osc.frequency.value=noteToFreq(noteStr);
    osc.connect(channelGains[ch]); osc.start();
    osc.stop(audioCtx.currentTime+dur); channels[ch]=osc;
  };
  API.stop = function(ch) {
    if(ch===undefined){API.stop(0);API.stop(1);return;}
    if(channels[ch]){try{channels[ch].stop();}catch(e){} channels[ch]=null;}
  };
  API.rnd = function(max) { return Math.random()*max; };
  API.flr = Math.floor;
  API.abs = Math.abs;
  API.min = Math.min;
  API.max = Math.max;
  API.sin = Math.sin;
  API.cos = Math.cos;

  function tick() {
    if (API._update) API._update();
    if (API._draw) API._draw();
    ctx.putImageData(buf, 0, 0);
    for (const k in keys) keysPrev[k] = keys[k];
    API.frame++;
  }

  // ============================================================
  // Simon Game
  // ============================================================
  const { cls, pix, line, rect, rectf, circ, circf, sprite: defSprite,
          spr, text, btn, btnp, note, stop, rnd, flr, abs: _abs,
          min, max: _max, sin, cos } = API;

  // --- Game constants ---
  const CX = W / 2;   // 240 center
  const CY = 150;     // center of quadrant area (shifted up for HUD)
  const QS = 80;      // quadrant size
  const GAP = 6;      // gap between quadrants

  // Quadrant definitions: 0=up, 1=down, 2=left, 3=right
  // Positions relative to center cross
  const QUADS = [
    { key: "up",    note: "E4",  baseColor: 1, litColor: 3, label: "UP",
      x: CX - QS - GAP/2, y: CY - QS - GAP/2 - QS, w: QS*2 + GAP, h: QS },
    { key: "down",  note: "C4",  baseColor: 1, litColor: 3, label: "DOWN",
      x: CX - QS - GAP/2, y: CY + GAP/2, w: QS*2 + GAP, h: QS },
    { key: "left",  note: "G4",  baseColor: 1, litColor: 3, label: "LEFT",
      x: CX - QS - GAP/2 - QS - GAP, y: CY - QS/2, w: QS, h: QS },
    { key: "right", note: "A4",  baseColor: 1, litColor: 3, label: "RIGHT",
      x: CX + QS + GAP/2 + GAP, y: CY - QS/2, w: QS, h: QS },
  ];

  // Assign distinct shade per quadrant for visual distinction
  // 0=up(lightest), 1=down(medium-dark), 2=left(dark), 3=right(medium)
  const QUAD_SHADES = [
    { dim: 2, lit: 3 },  // up: medium -> bright
    { dim: 1, lit: 2 },  // down: dark-medium -> medium
    { dim: 1, lit: 3 },  // left: dark-medium -> bright
    { dim: 2, lit: 3 },  // right: medium -> bright
  ];

  // Quadrant layout: 4 panels in a diamond/cross pattern
  const PAD = 20;
  const QW = 100;  // quadrant width
  const QH = 80;   // quadrant height
  const QGAP = 8;

  const quadPos = [
    // 0: UP - top center
    { x: CX - QW/2, y: CY - QH - QGAP/2 },
    // 1: DOWN - bottom center
    { x: CX - QW/2, y: CY + QGAP/2 },
    // 2: LEFT - center left
    { x: CX - QW - QGAP/2, y: CY - QH/2 },
    // 3: RIGHT - center right
    { x: CX + QGAP/2, y: CY - QH/2 },
  ];

  // Quadrant tones (distinct pitches)
  const QUAD_NOTES = ["E5", "C4", "G4", "A4"];
  const QUAD_KEYS = ["up", "down", "left", "right"];
  const QUAD_LABELS = ["UP", "DOWN", "LEFT", "RIGHT"];

  // Sprites for arrows on quadrants
  // Up arrow
  defSprite(1,
    "00030000" +
    "00333000" +
    "03333300" +
    "00030000" +
    "00030000" +
    "00030000" +
    "00030000" +
    "00000000"
  );
  // Down arrow
  defSprite(2,
    "00000000" +
    "00030000" +
    "00030000" +
    "00030000" +
    "00030000" +
    "03333300" +
    "00333000" +
    "00030000"
  );
  // Left arrow
  defSprite(3,
    "00000000" +
    "00030000" +
    "00300000" +
    "03333300" +
    "00300000" +
    "00030000" +
    "00000000" +
    "00000000"
  );
  // Right arrow
  defSprite(4,
    "00000000" +
    "00030000" +
    "00003000" +
    "03333300" +
    "00003000" +
    "00030000" +
    "00000000" +
    "00000000"
  );

  // --- Game state ---
  let state = "title";
  let sequence = [];      // array of quadrant indices (0-3)
  let seqIndex = 0;       // current position in sequence playback/input
  let round = 0;
  let bestScore = 0;
  let phase = "idle";     // "showing" | "input" | "success" | "fail" | "idle"

  // Timing
  let showTimer = 0;      // timer for showing current sequence element
  let showIndex = 0;      // which element in sequence we're showing
  let showGap = 0;        // gap between flashes
  let litQuad = -1;       // which quadrant is currently lit (-1 = none)
  let litTimer = 0;       // how long the lit quadrant stays lit
  let successTimer = 0;   // pause after successful round
  let failTimer = 0;      // pause after failure
  let inputLitTimer = 0;  // flash when player presses
  let inputLitQuad = -1;

  // Speed: frames per flash (decreases with level)
  function flashDuration() { return _max(6, 15 - flr(round / 3)); }
  function gapDuration() { return _max(4, 10 - flr(round / 4)); }

  // Title animation
  let titlePulse = 0;

  function resetGame() {
    sequence = [];
    seqIndex = 0;
    round = 0;
    phase = "idle";
    litQuad = -1;
    litTimer = 0;
    inputLitQuad = -1;
    inputLitTimer = 0;
    nextRound();
  }

  function nextRound() {
    round++;
    // Add a random quadrant to the sequence
    sequence.push(flr(rnd(4)));
    // Start showing the sequence
    phase = "showing";
    showIndex = 0;
    showTimer = 20; // initial pause before showing
    showGap = 0;
    litQuad = -1;
    litTimer = 0;
    seqIndex = 0;
  }

  function playQuadTone(q) {
    note(0, QUAD_NOTES[q], 0.15);
  }

  function playErrorTone() {
    note(0, "C3", 0.2);
    note(1, "D#3", 0.2);
  }

  function playSuccessTone() {
    note(0, "C5", 0.08);
    setTimeout(() => note(0, "E5", 0.08), 80);
    setTimeout(() => note(0, "G5", 0.12), 160);
  }

  // Center text helper
  function textCentered(str, y, c) {
    const w = str.length * (FONT_W + 1) - 1;
    text(str, flr(CX - w / 2), y, c);
  }

  // ============================================================
  // Update
  // ============================================================
  API._update = function() {
    titlePulse++;

    if (state === "title") {
      if (btnp("start") || btnp("a")) {
        state = "play";
        resetGame();
        note(0, "C5", 0.08);
        setTimeout(() => note(0, "E5", 0.08), 80);
      }
      return;
    }

    if (state === "gameover") {
      failTimer--;
      if (failTimer <= 0 && (btnp("start") || btnp("a"))) {
        state = "title";
      }
      return;
    }

    // --- Play state ---

    // Decay input flash
    if (inputLitTimer > 0) {
      inputLitTimer--;
      if (inputLitTimer <= 0) inputLitQuad = -1;
    }

    if (phase === "showing") {
      if (showTimer > 0) {
        showTimer--;
        return;
      }
      if (showGap > 0) {
        showGap--;
        litQuad = -1;
        return;
      }
      if (showIndex < sequence.length) {
        // Light up next in sequence
        litQuad = sequence[showIndex];
        litTimer = flashDuration();
        playQuadTone(litQuad);
        showIndex++;
        showTimer = flashDuration();
        showGap = gapDuration();
      } else {
        // Done showing, switch to input phase
        litQuad = -1;
        phase = "input";
        seqIndex = 0;
      }
      return;
    }

    if (phase === "input") {
      // Check for player input
      for (let q = 0; q < 4; q++) {
        if (btnp(QUAD_KEYS[q])) {
          inputLitQuad = q;
          inputLitTimer = 6;
          playQuadTone(q);

          if (q === sequence[seqIndex]) {
            // Correct
            seqIndex++;
            if (seqIndex >= sequence.length) {
              // Round complete
              phase = "success";
              successTimer = 30;
              playSuccessTone();
            }
          } else {
            // Wrong!
            phase = "fail";
            failTimer = 90;
            playErrorTone();
            if (round - 1 > bestScore) bestScore = round - 1;
            // Flash the correct one
            litQuad = sequence[seqIndex];
            litTimer = 30;
          }
          break;
        }
      }
      return;
    }

    if (phase === "success") {
      successTimer--;
      if (successTimer <= 0) {
        nextRound();
      }
      return;
    }

    if (phase === "fail") {
      litTimer--;
      if (litTimer <= 0) litQuad = -1;
      failTimer--;
      if (failTimer <= 0) {
        state = "gameover";
        failTimer = 30; // cooldown before accepting input
      }
      return;
    }
  };

  // ============================================================
  // Draw
  // ============================================================
  API._draw = function() {
    cls(0);

    if (state === "title") {
      drawTitle();
      return;
    }

    if (state === "gameover") {
      drawGameOver();
      return;
    }

    // --- Play state ---
    drawQuadrants();
    drawHUD();

    // Phase messages
    if (phase === "showing") {
      textCentered("WATCH", CY - 4, 3);
    } else if (phase === "input") {
      textCentered("YOUR TURN", CY - 4, 2);
    } else if (phase === "success") {
      textCentered("CORRECT!", CY - 4, 3);
    } else if (phase === "fail") {
      if (flr(titlePulse / 4) % 2 === 0) {
        textCentered("WRONG!", CY - 4, 3);
      }
    }
  };

  function drawQuadrants() {
    for (let q = 0; q < 4; q++) {
      const pos = quadPos[q];
      const isLit = (litQuad === q) || (inputLitQuad === q);
      let shade;

      // Each quadrant gets a unique shade pair
      if (q === 0) shade = isLit ? 3 : 1;       // UP: dark -> bright
      else if (q === 1) shade = isLit ? 2 : 0;   // DOWN: black -> medium
      else if (q === 2) shade = isLit ? 3 : 2;   // LEFT: medium -> bright
      else shade = isLit ? 2 : 1;                 // RIGHT: dark-med -> medium

      // Draw filled quadrant
      rectf(pos.x, pos.y, QW, QH, shade);

      // Draw border
      const borderColor = isLit ? 3 : 2;
      rect(pos.x, pos.y, QW, QH, borderColor);

      // Draw arrow sprite in center of quadrant
      const arrowX = pos.x + flr(QW / 2) - 4;
      const arrowY = pos.y + flr(QH / 2) - 4;
      spr(q + 1, arrowX, arrowY);

      // Draw label below arrow
      const lbl = QUAD_LABELS[q];
      const lblW = lbl.length * (FONT_W + 1) - 1;
      const lblX = pos.x + flr(QW / 2 - lblW / 2);
      const lblY = pos.y + flr(QH / 2) + 10;
      text(lbl, lblX, lblY, isLit ? 3 : 2);
    }
  }

  function drawHUD() {
    // Round number - top left
    text("ROUND " + round, 10, 10, 3);

    // Best score - top right
    const bStr = "BEST " + bestScore;
    const bW = bStr.length * (FONT_W + 1) - 1;
    text(bStr, W - 10 - bW, 10, 2);

    // Sequence length indicator - bottom
    const seqStr = "LENGTH " + sequence.length;
    const seqW = seqStr.length * (FONT_W + 1) - 1;
    text(seqStr, flr(CX - seqW / 2), H - 30, 2);

    // Progress dots during input phase
    if (phase === "input") {
      const dotY = H - 18;
      const totalDots = sequence.length;
      const dotSpacing = 6;
      const totalW = totalDots * dotSpacing;
      const startX = flr(CX - totalW / 2);
      for (let i = 0; i < totalDots; i++) {
        const c = i < seqIndex ? 3 : 1;
        rectf(startX + i * dotSpacing, dotY, 4, 4, c);
      }
    }
  }

  function drawTitle() {
    // Title
    const pulse = flr(titlePulse / 15) % 2;

    textCentered("SIMON", 60, 3);

    // Decorative quadrants on title screen
    const demoY = 110;
    const demoSize = 40;
    const demoGap = 8;
    const demoX = CX - demoSize - demoGap / 2;

    // Animate: cycle through quadrants
    const activeQ = flr(titlePulse / 20) % 4;

    // Draw mini quadrant preview
    for (let q = 0; q < 4; q++) {
      let mx, my;
      if (q === 0) { mx = CX - demoSize/2; my = demoY - demoSize - demoGap/2; }
      else if (q === 1) { mx = CX - demoSize/2; my = demoY + demoGap/2; }
      else if (q === 2) { mx = CX - demoSize - demoGap/2 - demoSize/2; my = demoY - demoSize/2; }
      else { mx = CX + demoGap/2 + demoSize/2; my = demoY - demoSize/2; }

      const isActive = (q === activeQ);
      let shade;
      if (q === 0) shade = isActive ? 3 : 1;
      else if (q === 1) shade = isActive ? 2 : 0;
      else if (q === 2) shade = isActive ? 3 : 2;
      else shade = isActive ? 2 : 1;

      rectf(mx, my, demoSize, demoSize, shade);
      rect(mx, my, demoSize, demoSize, isActive ? 3 : 2);
    }

    // Instructions
    textCentered("REPEAT THE PATTERN", 200, 2);
    textCentered("USE ARROW KEYS", 215, 2);

    if (pulse === 0) {
      textCentered("PRESS ENTER TO START", 250, 3);
    }

    // Best score
    if (bestScore > 0) {
      textCentered("BEST: " + bestScore, 280, 2);
    }
  }

  function drawGameOver() {
    // Draw the quadrants dimmed
    for (let q = 0; q < 4; q++) {
      const pos = quadPos[q];
      rectf(pos.x, pos.y, QW, QH, 0);
      rect(pos.x, pos.y, QW, QH, 1);
    }

    textCentered("GAME OVER", 80, 3);

    textCentered("ROUND REACHED: " + round, 120, 2);
    textCentered("BEST: " + bestScore, 140, 2);

    const pulse = flr(titlePulse / 15) % 2;
    if (pulse === 0) {
      textCentered("PRESS ENTER", 200, 3);
    }
  }

  // ============================================================
  // Boot
  // ============================================================
  setInterval(tick, 1000 / FPS);

})();
</script>
