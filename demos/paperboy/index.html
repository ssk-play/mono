  const { cls, pix, line, rect, rectf, circ, circf, sprite: defSprite,
          spr, sprT, text: drawText, btn, btnp, note, stop, rnd, flr,
          abs: _abs, min, max: _max, sin, cos, overlap, dbg, dbgC } = Mono;

  // --- 8x8 -> 16x16 upscale helper ---
  function up(d) {
    let o = "";
    for (let r = 0; r < 8; r++) {
      let row = "";
      for (let c = 0; c < 8; c++) {
        const ch = d[r * 8 + c];
        row += ch + ch;
      }
      o += row + row;
    }
    return o;
  }

  // --- Circle collision helper ---
  function circHit(ax, ay, ar, bx, by, br) {
    const dx = ax - bx, dy = ay - by;
    return dx * dx + dy * dy < (ar + br) * (ar + br);
  }

  // --- Game Constants (scaled x2 for 16x16 sprites) ---
  const LANE_Y = [60, 100, 140, 176]; // 4 lanes: top sidewalk, upper road, lower road, bottom sidewalk
  const SCROLL_SPEED = 2;
  const HOUSE_SPACING = 80; // distance between houses (scaled up)
  const HOUSES_PER_DAY = 8;
  const PAPERS_PER_DAY = 12;
  const DAY_LENGTH = HOUSES_PER_DAY * HOUSE_SPACING + 200; // pixels per day

  // Collision radii
  const PLAYER_R = 6;
  const DOG_R = 5;
  const CAR_R = 8;
  const SKATER_R = 5;
  const MOWER_R = 6;
  const PAPER_R = 4;
  const MAILBOX_R = 6;
  const WINDOW_R = 10;

  // --- Game State ---
  const { TITLE, PLAY, CLEAR, GAMEOVER } = Mono.SCENE;
  let player, papers, obstacles, houses, score, lives, day, scrollX;
  let papersLeft, dayProgress, dayLength;
  let jumpTimer, jumpHeight, invTimer;
  let particles, screenShake;
  let subscribers; // array of booleans for each house
  let brokenWindows; // track which houses got window-broken
  let dayResults, resultTimer;
  let pedalFrame, pedalTimer;
  let titleBounce;

  function resetGame() {
    score = 0;
    lives = 3;
    day = 1;
    scrollX = 0;
    invTimer = 0;
    particles = [];
    screenShake = 0;
    titleBounce = 0;
    startDay();
  }

  function startDay() {
    player = { x: 40, y: LANE_Y[1], lane: 1, targetY: LANE_Y[1] };
    papers = [];
    obstacles = [];
    houses = [];
    brokenWindows = {};
    scrollX = 0;
    jumpTimer = 0;
    jumpHeight = 0;
    invTimer = 0;
    pedalFrame = 0;
    pedalTimer = 0;
    dayProgress = 0;
    dayLength = DAY_LENGTH;
    papersLeft = PAPERS_PER_DAY + flr(day * 0.5);
    dayResults = null;
    resultTimer = 0;

    // Generate subscribers for this day
    if (day === 1) {
      subscribers = [];
      for (let i = 0; i < HOUSES_PER_DAY; i++) {
        subscribers.push(Math.random() < 0.6); // 60% subscribers initially
      }
    }

    // Generate houses along the route
    for (let i = 0; i < HOUSES_PER_DAY; i++) {
      const hx = 200 + i * HOUSE_SPACING;
      const side = i % 2 === 0 ? "top" : "bottom";
      houses.push({
        x: hx,
        side: side,
        subscriber: subscribers[i],
        delivered: false,
        broken: false,
        index: i
      });
    }

    // Generate obstacles
    generateObstacles();
  }

  function generateObstacles() {
    obstacles = [];
    const numObs = 6 + day * 2;
    for (let i = 0; i < numObs; i++) {
      const type = flr(rnd(4)); // 0:dog, 1:car, 2:skater, 3:mower
      const ox = 260 + flr(rnd(dayLength - 260));
      let lane;
      if (type === 1) { // cars on road lanes
        lane = flr(rnd(2)) + 1; // lanes 1 or 2
      } else if (type === 3) { // mowers on sidewalks
        lane = flr(rnd(2)) === 0 ? 0 : 3;
      } else {
        lane = flr(rnd(4));
      }
      const speed = type === 1 ? (2 + rnd(2)) : (type === 2 ? (1.5 + rnd(1)) : (0.5 + rnd(1)));
      obstacles.push({
        x: ox,
        lane: lane,
        type: type,
        speed: speed,
        dir: rnd(1) < 0.5 ? -1 : 1,
        animT: flr(rnd(30)),
        alive: true
      });
    }
  }

  function throwSound() { note(0, "E5", 0.04); }
  function hitMailbox() { note(0, "C5", 0.06); setTimeout(() => note(0, "E5", 0.06), 60); setTimeout(() => note(0, "G5", 0.08), 120); }
  function breakWindow() { note(1, "A3", 0.08); setTimeout(() => note(1, "E3", 0.06), 50); }
  function crashSound() {
    note(0, "C3", 0.12); note(1, "G2", 0.12);
    setTimeout(() => { note(0, "A2", 0.18); }, 120);
  }
  function jumpSound() { note(0, "G4", 0.03); note(0, "C5", 0.03); }
  function dayCompleteSound() {
    note(0, "C5", 0.1);
    setTimeout(() => note(0, "E5", 0.1), 100);
    setTimeout(() => note(0, "G5", 0.1), 200);
    setTimeout(() => note(0, "C6", 0.2), 300);
  }
  function missSound() { note(1, "E3", 0.1); }
  function loseSubSound() { note(1, "C3", 0.15); setTimeout(() => note(1, "A2", 0.15), 100); }

  function addParticles(x, y, count, color) {
    for (let i = 0; i < count; i++) {
      particles.push({
        x: x, y: y,
        vx: rnd(4) - 2, vy: rnd(4) - 2,
        life: 8 + flr(rnd(12)),
        color: color || (flr(rnd(3)) + 1)
      });
    }
  }

  function playerHit() {
    if (invTimer > 0 || jumpTimer > 0) return;
    lives--;
    screenShake = 10;
    invTimer = 60;
    crashSound();
    addParticles(player.x + 8, player.y + 8, 12, 2);
    if (lives <= 0) {
      Mono.go(GAMEOVER); return;
    }
  }

  function worldToScreen(wx) {
    return wx - scrollX;
  }

  // Obstacle collision radius by type
  function obsRadius(type) {
    if (type === 0) return DOG_R;
    if (type === 1) return CAR_R;
    if (type === 2) return SKATER_R;
    return MOWER_R;
  }

  resetGame();

  // ============================================================
  // Update
  // ============================================================
  function updateCommon() {
    for (let i = particles.length - 1; i >= 0; i--) {
      const p = particles[i];
      p.x += p.vx; p.y += p.vy; p.vy += 0.1; p.life--;
      if (p.life <= 0) particles.splice(i, 1);
    }
    if (screenShake > 0) screenShake--;
  }

  function updatePlayLogic() {
    // Scroll
    scrollX += SCROLL_SPEED;
    dayProgress += SCROLL_SPEED;

    // Pedal animation
    pedalTimer++;
    if (pedalTimer >= 4) {
      pedalTimer = 0;
      pedalFrame = 1 - pedalFrame;
    }

    // Player lane movement
    if (btnp("up") && player.lane > 0) {
      player.lane--;
      player.targetY = LANE_Y[player.lane];
    }
    if (btnp("down") && player.lane < 3) {
      player.lane++;
      player.targetY = LANE_Y[player.lane];
    }

    // Smooth lane transition
    const dy = player.targetY - player.y;
    if (_abs(dy) > 1) {
      player.y += dy * 0.2;
    } else {
      player.y = player.targetY;
    }

    // Jump
    if (btnp("b") && jumpTimer === 0) {
      jumpTimer = 20;
      jumpSound();
    }
    if (jumpTimer > 0) {
      jumpTimer--;
      jumpHeight = sin(jumpTimer / 20 * Math.PI) * 24;
    } else {
      jumpHeight = 0;
    }

    // Invincibility timer
    if (invTimer > 0) invTimer--;

    // Throw newspaper
    if (btnp("a") && papersLeft > 0) {
      papersLeft--;
      throwSound();
      papers.push({
        x: player.x + S + scrollX,
        y: player.y - jumpHeight + 4,
        vx: 3,
        vy: -3,
        gravity: 0.2,
        active: true
      });
    }

    // Update newspapers in flight
    for (let i = papers.length - 1; i >= 0; i--) {
      const p = papers[i];
      p.x += p.vx;
      p.vy += p.gravity;
      p.y += p.vy;

      const sx = worldToScreen(p.x);
      const pcx = sx + 8;
      const pcy = p.y + 8;

      // Check if paper hit a house/mailbox (circle collision)
      let hitSomething = false;
      for (const h of houses) {
        if (h.delivered || h.broken) continue;
        const hsx = worldToScreen(h.x);
        const hy = h.side === "top" ? 36 : 180;
        const mailboxY = h.side === "top" ? 62 : 168;
        const mbcx = hsx + 12;
        const mbcy = mailboxY + 8;

        // Mailbox hit zone (circle)
        dbgC(mbcx, mbcy, MAILBOX_R);
        if (circHit(pcx, pcy, PAPER_R, mbcx, mbcy, MAILBOX_R)) {
          if (h.subscriber) {
            h.delivered = true;
            score += 100;
            hitMailbox();
            addParticles(mbcx, mbcy, 6, 3);
            hitSomething = true;
          } else {
            h.broken = true;
            brokenWindows[h.index] = true;
            score += 50;
            breakWindow();
            addParticles(mbcx, mbcy, 8, 2);
            hitSomething = true;
          }
          break;
        }

        // Window hit zone (circle, larger area on house)
        const wincx = hsx + S;
        const wincy = hy + S;
        dbgC(wincx, wincy, WINDOW_R);
        if (circHit(pcx, pcy, PAPER_R, wincx, wincy, WINDOW_R)) {
          if (!h.subscriber) {
            h.broken = true;
            brokenWindows[h.index] = true;
            score += 50;
            breakWindow();
            addParticles(wincx, wincy, 8, 2);
            hitSomething = true;
          } else {
            h.delivered = true;
            score += 50;
            addParticles(wincx, wincy, 4, 2);
            hitSomething = true;
          }
          break;
        }
      }

      if (hitSomething) {
        papers.splice(i, 1);
        continue;
      }

      // Remove if off screen or hit ground
      if (p.y > 220 || sx > W + 20 || sx < -20) {
        papers.splice(i, 1);
      }
    }

    // Player center for collision
    const plcx = player.x + 8;
    const plcy = player.y - jumpHeight + 8;

    // Update obstacles
    for (const o of obstacles) {
      if (!o.alive) continue;
      o.animT++;

      // Move obstacle relative to world
      if (o.type === 1) { // Cars move along road
        o.x += o.dir * o.speed;
      } else if (o.type === 2) { // Skaters move along sidewalk
        o.x += o.dir * o.speed;
      }

      const osx = worldToScreen(o.x);
      if (osx < -40 || osx > W + 40) continue;

      // Obstacle center
      const oly = LANE_Y[o.lane];
      const ocx = osx + 8;
      const ocy = oly + 8;
      const oR = obsRadius(o.type);

      // Debug: show obstacle hitbox
      dbgC(ocx, ocy, oR);

      // Circle collision with player
      if (invTimer <= 0 && jumpTimer <= 3 &&
          circHit(plcx, plcy, PLAYER_R, ocx, ocy, oR)) {
        playerHit();
      }
    }

    // Debug: show player hitbox
    dbgC(plcx, plcy, PLAYER_R);

    // Check day completion
    if (dayProgress >= dayLength) {
      let delivered = 0;
      let missed = 0;
      for (const h of houses) {
        if (h.subscriber) {
          if (h.delivered) {
            delivered++;
          } else {
            missed++;
            subscribers[h.index] = false;
            loseSubSound();
          }
        }
      }

      dayResults = { delivered, missed, broken: Object.keys(brokenWindows).length };
      resultTimer = 0;
      dayCompleteSound();

      if (missed === 0) {
        score += 500;
      }

      Mono.go(CLEAR); return;
    }
  }

  function drawTitleScreen() {
    cls(0);

    // Road
    rectf(0, 90, W, 60, 1);

    // Draw some houses
    for (let i = 0; i < 5; i++) {
      const hx = 10 + i * 64;
      sprT(5, hx, 60);
      sprT(5, hx + S, 60);
      sprT(7, hx + 8, 78);
    }

    // Road markings
    for (let i = 0; i < 20; i++) {
      const lx = (i * 24 + flr(Mono.frame * 0.5)) % (W + 24) - 12;
      rectf(lx, 118, 14, 2, 2);
    }

    // Animated paperboy riding across
    const bikeX = ((Mono.frame * 2) % (W + 40)) - 20;
    const bikeY = 100 + sin(Mono.frame * 0.1) * 3;
    const bikeFrame = flr(Mono.frame / 4) % 2 === 0 ? 1 : 2;
    sprT(bikeFrame, bikeX, bikeY);

    // Title text
    const ty = 15 + flr(titleBounce);
    drawText("PAPERBOY", 120, ty, 3);
    drawText("PAPERBOY", 121, ty + 1, 1);
    rectf(95, ty + 10, 130, 1, 2);

    drawText("MONO EDITION", 105, ty + 18, 2);

    if (flr(Mono.frame / 20) % 2 === 0) {
      drawText("PRESS START", 120, 170, 3);
    }

    // Controls
    drawText("UP/DOWN  CHANGE LANE", 90, 195, 2);
    drawText("A  THROW NEWSPAPER", 95, 205, 2);
    drawText("B  JUMP OBSTACLE", 100, 215, 2);
    drawText("7 DAYS TO DELIVER!", 95, 228, 1);
  }

  function drawGameOverScreen() {
    cls(0);
    for (const p of particles) pix(flr(p.x), flr(p.y), p.color);
    if (day >= 7 && lives > 0) {
      drawText("CONGRATULATIONS!", 95, 75, 3);
      drawText("YOU SURVIVED THE WEEK!", 80, 90, 2);
    } else {
      drawText("GAME OVER", 120, 75, 3);
    }
    drawText("FINAL SCORE: " + score, 95, 109, 2);
    drawText("DAYS COMPLETED: " + (day >= 7 ? 7 : day - 1), 90, 120, 2);
    if (flr(Mono.frame / 20) % 2 === 0) drawText("PRESS START", 120, 158, 3);
  }

  function drawDayResultScreen() {
    cls(0);
    drawText("DAY " + day + " COMPLETE!", 105, 45, 3);

    rectf(80, 62, 160, 1, 2);

    drawText("DELIVERED: " + dayResults.delivered, 110, 75, 3);
    drawText("MISSED: " + dayResults.missed, 120, 89, dayResults.missed > 0 ? 1 : 2);
    drawText("WINDOWS: " + dayResults.broken, 118, 102, 2);

    if (dayResults.missed === 0) {
      drawText("PERFECT BONUS +500!", 90, 124, 3);
    }
    if (dayResults.missed > 0) {
      drawText("LOST " + dayResults.missed + " SUBSCRIBER" + (dayResults.missed > 1 ? "S" : "") + "!", 80, 124, 1);
    }

    drawText("SCORE: " + score, 115, 146, 2);

    let subCount = 0;
    for (let i = 0; i < subscribers.length; i++) { if (subscribers[i]) subCount++; }
    drawText("SUBSCRIBERS: " + subCount + "/" + HOUSES_PER_DAY, 100, 161, 2);
    if (subCount === 0) {
      drawText("NO SUBSCRIBERS LEFT!", 85, 180, 1);
      drawText("YOU ARE FIRED!", 105, 191, 3);
    } else if (day >= 7) {
      drawText("WEEK COMPLETE!", 105, 180, 3);
    } else {
      drawText("DAY " + (day + 1) + " NEXT...", 110, 180, 2);
    }
    if (resultTimer > 120 && flr(Mono.frame / 15) % 2 === 0) {
      drawText("PRESS START", 120, 210, 3);
    }
  }

  function drawPlayScene() {
    cls(0);
    const shakeX = screenShake > 0 ? flr(rnd(4)) - 2 : 0;
    const shakeY = screenShake > 0 ? flr(rnd(4)) - 2 : 0;
    const ox = shakeX;
    const oy = shakeY;

    // Sky (top area)
    rectf(ox, oy, W, 36, 0);

    // Top houses area (lawn)
    rectf(ox, 36 + oy, W, 30, 0);
    // Top sidewalk
    for (let tx = -1; tx < 21; tx++) {
      const tileX = tx * S - (scrollX % S) + ox;
      rectf(tileX, 66 + oy, S, S, 2);
    }
    // Curb
    rectf(ox, 82 + oy, W, 4, 1);

    // Road
    rectf(ox, 86 + oy, W, 80, 1);

    // Road lane markings (dashed center line)
    for (let i = 0; i < 20; i++) {
      const lx = (i * 28 - (scrollX % 28)) + ox;
      rectf(lx, 124 + oy, 14, 2, 2);
    }

    // Bottom curb
    rectf(ox, 166 + oy, W, 4, 1);
    // Bottom sidewalk
    for (let tx = -1; tx < 21; tx++) {
      const tileX = tx * S - (scrollX % S) + ox;
      rectf(tileX, 170 + oy, S, S, 2);
    }
    // Bottom houses area (lawn)
    rectf(ox, 186 + oy, W, 34, 0);

    // Bottom strip
    rectf(ox, 220 + oy, W, 20, 0);

    // Draw grass details
    for (let tx = -1; tx < 21; tx++) {
      const tileX = tx * S - (scrollX % S) + ox;
      const seed1 = ((tx * 7 + flr(scrollX / S)) * 13) % 37;
      if (seed1 % 5 === 0) pix(tileX + 5, 42 + oy, 1);
      if (seed1 % 7 === 0) pix(tileX + 11, 50 + oy, 1);
      const seed2 = ((tx * 11 + flr(scrollX / S)) * 17) % 41;
      if (seed2 % 5 === 0) pix(tileX + 4, 190 + oy, 1);
      if (seed2 % 7 === 0) pix(tileX + 10, 198 + oy, 1);
    }

    // Draw houses
    for (const h of houses) {
      const hsx = worldToScreen(h.x) + ox;
      if (hsx < -32 || hsx > W + 32) continue;

      const hy = h.side === "top" ? 36 + oy : 186 + oy;
      const mailboxY = h.side === "top" ? 62 + oy : 168 + oy;

      if (h.subscriber) {
        sprT(5, hsx, hy);
        sprT(5, hsx + S, hy);
        sprT(7, hsx + 8, mailboxY);
        if (h.delivered) {
          drawText("OK", hsx + 4, mailboxY - 10, 3);
        }
      } else {
        sprT(6, hsx, hy);
        sprT(6, hsx + S, hy);
        sprT(8, hsx + 8, mailboxY);
        if (h.broken) {
          sprT(13, hsx + 4, hy + S);
        }
      }
    }

    // Draw trees (decorative, between houses)
    for (let i = 0; i < HOUSES_PER_DAY - 1; i++) {
      const tx = 240 + i * HOUSE_SPACING + ox;
      const tsx = worldToScreen(tx);
      if (tsx > -S && tsx < W + S) {
        sprT(14, tsx, 34 + oy);
        sprT(14, tsx, 188 + oy);
      }
    }

    // Draw obstacles
    for (const o of obstacles) {
      if (!o.alive) continue;
      const osx = worldToScreen(o.x) + ox;
      if (osx < -S || osx > W + S) continue;
      const oly = LANE_Y[o.lane] + oy;
      const flipX = o.dir < 0;

      switch (o.type) {
        case 0: // Dog
          sprT(9, osx, oly, (flr(o.animT / 6) % 2 === 0), false);
          break;
        case 1: // Car
          sprT(10, osx, oly, flipX, false);
          sprT(10, osx + S, oly, flipX, false);
          break;
        case 2: // Skater
          sprT(11, osx, oly, flipX, false);
          break;
        case 3: // Lawn mower
          sprT(12, osx, oly, (flr(o.animT / 8) % 2 === 0), false);
          break;
      }
    }

    // Draw newspapers in flight
    for (const p of papers) {
      const psx = worldToScreen(p.x) + ox;
      const rotation = Mono.frame % 2;
      sprT(4, psx, p.y + oy, rotation === 1, false);
    }

    // Draw player
    if (invTimer <= 0 || flr(Mono.frame / 3) % 2 === 0) {
      const py = player.y - jumpHeight + oy;
      const sprId = jumpTimer > 0 ? 3 : (pedalFrame === 0 ? 1 : 2);
      sprT(sprId, player.x + ox, py);

      // Shadow when jumping
      if (jumpHeight > 3) {
        const shadowW = S - flr(jumpHeight / 4);
        rectf(player.x + ox + (S - shadowW) / 2, player.y + 12 + oy, shadowW, 3, 1);
      }
    }

    // Draw particles
    for (const p of particles) pix(flr(p.x) + ox, flr(p.y) + oy, p.color);

    // --- HUD ---
    rectf(0, 0, W, 18, 0);
    rectf(0, 18, W, 1, 1);

    // Score
    drawText("SCORE:" + score, 4, 5, 3);

    // Day
    drawText("DAY " + day + "/7", W / 2 - 22, 5, 2);

    // Papers remaining
    sprT(17, W - 80, 1, false, false);
    drawText("X" + papersLeft, W - 62, 5, 3);

    // Lives
    for (let i = 0; i < lives; i++) {
      sprT(16, W - 34 + i * 12, 1, false, false);
    }

    // Progress bar at bottom
    rectf(0, H - 8, W, 8, 0);
    rectf(2, H - 6, W - 4, 4, 1);
    const prog = min(dayProgress / dayLength, 1);
    rectf(2, H - 6, flr((W - 4) * prog), 4, 3);

    // Lane indicators (subtle)
    for (let i = 0; i < 4; i++) {
      const ly = LANE_Y[i] + 6;
      if (i === player.lane) {
        pix(10, ly, 3);
        pix(11, ly, 3);
      } else {
        pix(10, ly, 1);
      }
    }
  }

  // --- Title Scene ---
  Mono.scene(TITLE, {
    init() {},
    update() {
      updateCommon();
      titleBounce = sin(Mono.frame * 0.06) * 4;
      if (btnp("start") || btnp("a")) {
        resetGame();
        note(0, "C5", 0.1); setTimeout(() => note(0, "E5", 0.1), 100); setTimeout(() => note(0, "G5", 0.15), 200);
        Mono.go(PLAY); return;
      }
    },
    draw() { drawTitleScreen(); }
  });

  // --- Play Scene ---
  Mono.scene(PLAY, {
    init() {},
    update() { updateCommon(); updatePlayLogic(); },
    draw() { drawPlayScene(); }
  });

  // --- Clear (Day Result) Scene ---
  Mono.scene(CLEAR, {
    init() {},
    update() {
      updateCommon();
      resultTimer++;
      if (resultTimer > 120 && (btnp("start") || btnp("a"))) {
        let subCount = 0;
        for (let i = 0; i < subscribers.length; i++) { if (subscribers[i]) subCount++; }
        if (subCount === 0 || day >= 7) {
          Mono.go(GAMEOVER); return;
        } else {
          day++; startDay();
          Mono.go(PLAY); return;
        }
      }
    },
    draw() { drawDayResultScreen(); }
  });

  // --- Game Over Scene ---
  Mono.scene(GAMEOVER, {
    init() {},
    update() {
      updateCommon();
      if (btnp("start") || btnp("a")) { Mono.go(TITLE); return; }
    },
    draw() { drawGameOverScreen(); }
  });

  Mono.go(TITLE);
  Mono.boot("screen");
})();
</script>
</body>
</html>
