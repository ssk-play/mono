<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GrayBox — Demo: Paperboy</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #0a0a0a;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100vh;
    font-family: monospace;
    overflow: hidden;
  }
  #frame {
    background: #111;
    border: 3px solid #333;
    border-radius: 8px;
    padding: 12px;
    box-shadow: 0 0 40px rgba(0,0,0,0.8), inset 0 0 20px rgba(0,0,0,0.5);
  }
  canvas {
    display: block;
    image-rendering: pixelated;
    image-rendering: crisp-edges;
  }
  #controls {
    margin-top: 12px;
    color: #6b6b6b;
    font-size: 11px;
    text-align: center;
    letter-spacing: 1px;
  }
  #controls span { color: #b0b0b0; }
</style>
</head>
<body>
<div id="frame">
  <canvas id="screen"></canvas>
</div>
<div id="controls">
  <span>&uarr;&darr;</span> MOVE &nbsp;&nbsp; <span>Z</span> THROW &nbsp;&nbsp; <span>X</span> JUMP &nbsp;&nbsp; <span>ENTER</span> START
</div>
<script>
(() => {
  "use strict";

  // ============================================================
  // GrayBox Runtime (inline)
  // ============================================================
  const W = 320;
  const H = 240;
  const FPS = 30;
  const COLORS = ["#1a1a1a", "#6b6b6b", "#b0b0b0", "#e8e8e8"];
  const canvas = document.getElementById("screen");
  canvas.width = W;
  canvas.height = H;
  function fitCanvas() {
    var maxW = window.innerWidth - 40;
    var maxH = window.innerHeight - 60;
    var s = Math.min(maxW / W, maxH / H);
    canvas.style.width = (W * s) + "px";
    canvas.style.height = (H * s) + "px";
  }
  fitCanvas();
  window.addEventListener("resize", fitCanvas);
  const ctx = canvas.getContext("2d");
  ctx.imageSmoothingEnabled = false;
  const buf = ctx.createImageData(W, H);
  const buf32 = new Uint32Array(buf.data.buffer);

  function hexToABGR(hex) {
    const r = parseInt(hex.slice(1, 3), 16);
    const g = parseInt(hex.slice(3, 5), 16);
    const b = parseInt(hex.slice(5, 7), 16);
    return (255 << 24) | (b << 16) | (g << 8) | r;
  }
  const COLOR_U32 = COLORS.map(hexToABGR);

  const sprites = {};
  const tilemap = {};

  const keyMap = {
    "ArrowUp": "up", "ArrowDown": "down", "ArrowLeft": "left", "ArrowRight": "right",
    "w": "up", "s": "down", "a": "left", "d": "right", "ㅈ": "up", "ㄴ": "down", "ㅁ": "left", "ㅇ": "right",
    "z": "a", "Z": "a", "x": "b", "X": "b", "ㅋ": "a", "ㅌ": "b",
    "Enter": "start", " ": "a"
  };
  const keys = {};
  const keysPrev = {};

  document.addEventListener("keydown", e => {
    const k = keyMap[e.key];
    if (k) { keys[k] = true; e.preventDefault(); }
  });
  document.addEventListener("keyup", e => {
    const k = keyMap[e.key];
    if (k) { keys[k] = false; e.preventDefault(); }
  });

  let audioCtx = null;
  const channels = [null, null];
  const channelGains = [null, null];
  function ensureAudio() {
    if (!audioCtx) {
      audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      for (let i = 0; i < 2; i++) {
        channelGains[i] = audioCtx.createGain();
        channelGains[i].gain.value = 0.15;
        channelGains[i].connect(audioCtx.destination);
      }
    }
  }

  const NOTE_NAMES = ["C","C#","D","D#","E","F","F#","G","G#","A","A#","B"];
  function noteToFreq(noteStr) {
    const match = noteStr.match(/^([A-G]#?)(\d)$/);
    if (!match) return 440;
    const name = match[1];
    const octave = parseInt(match[2]);
    const semitone = NOTE_NAMES.indexOf(name);
    if (semitone === -1) return 440;
    const midi = (octave + 1) * 12 + semitone;
    return 440 * Math.pow(2, (midi - 69) / 12);
  }

  const FONT_W = 4;
  const FONT_H = 7;
  const FONT = {};
  const fontData = {
    "A":"0110100110011111100110011001","B":"1110100110101110100110011110",
    "C":"0110100110001000100001100110","D":"1100101010011001100110101100",
    "E":"1111100010001110100010001111","F":"1111100010001110100010001000",
    "G":"0111100010001011100101100111","H":"1001100110011111100110011001",
    "I":"1110010001000100010001001110","J":"0111001000100010001010100100",
    "K":"1001101011001100101010011001","L":"1000100010001000100010001111",
    "M":"1001111111011001100110011001","N":"1001110111011001100110011001",
    "O":"0110100110011001100110010110","P":"1110100110011110100010001000",
    "Q":"0110100110011001101101100001","R":"1110100110011110101010011001",
    "S":"0111100010000110000110001110","T":"1111001000100010001000100010",
    "U":"1001100110011001100110010110","V":"1001100110011001100101100110",
    "W":"1001100110011001101111011001","X":"1001100101100110011010011001",
    "Y":"1001100101100010001000100010","Z":"1111000100100100100010001111",
    "0":"0110100111011011101110010110","1":"0100110001000100010001001110",
    "2":"0110100100010010010010001111","3":"1110000100010110000110011110",
    "4":"1001100110011111000100010001","5":"1111100010001110000100011110",
    "6":"0110100010001110100110010110","7":"1111000100010010010001001000",
    "8":"0110100110010110100110010110","9":"0110100110010111000100010110",
    " ":"0000000000000000000000000000",
    ".":"0000000000000000000001000100",
    ",":"0000000000000000001000101000",
    "!":"0100010001000100000000000100",
    "?":"0110100100010010000000000010",
    "-":"0000000000001110000000000000",
    "+":"0000001001001110010000100000",
    ":":"0000010001000000010001000000",
    "/":"0001000100100010010010001000",
    "*":"0000101001001110010010100000",
    "#":"0101111101011111010100000000",
    "(":"0010010010001000010001000010",
    ")":"0100001000010001000100100100",
    "=":"0000000011110000111100000000",
    "'":"0100010010000000000000000000",
    "\"":"1010101000000000000000000000",
    "<":"0010010010001000010000100010",
    ">":"1000010000100001001001001000",
    "_":"0000000000000000000000001111",
  };
  for (const [ch, bits] of Object.entries(fontData)) {
    FONT[ch] = [];
    for (let i = 0; i < bits.length; i++) FONT[ch].push(parseInt(bits[i]));
  }

  const API = {};
  API._init = null;
  API._update = null;
  API._draw = null;
  API.frame = 0;

  API.cls = function(c = 0) { buf32.fill(COLOR_U32[c] || COLOR_U32[0]); };
  API.pix = function(x, y, c) {
    x = Math.floor(x); y = Math.floor(y);
    if (x < 0 || x >= W || y < 0 || y >= H) return;
    buf32[y * W + x] = COLOR_U32[c] || COLOR_U32[0];
  };
  API.line = function(x0, y0, x1, y1, c) {
    x0=Math.floor(x0); y0=Math.floor(y0); x1=Math.floor(x1); y1=Math.floor(y1);
    const dx=Math.abs(x1-x0), dy=Math.abs(y1-y0);
    const sx=x0<x1?1:-1, sy=y0<y1?1:-1;
    let err=dx-dy;
    while(true) {
      API.pix(x0,y0,c);
      if(x0===x1&&y0===y1) break;
      const e2=2*err;
      if(e2>-dy){err-=dy;x0+=sx;}
      if(e2<dx){err+=dx;y0+=sy;}
    }
  };
  API.rect = function(x,y,w,h,c) {
    API.line(x,y,x+w-1,y,c); API.line(x+w-1,y,x+w-1,y+h-1,c);
    API.line(x+w-1,y+h-1,x,y+h-1,c); API.line(x,y+h-1,x,y,c);
  };
  API.rectf = function(x,y,w,h,c) {
    x=Math.floor(x); y=Math.floor(y);
    const col=COLOR_U32[c]||COLOR_U32[0];
    for(let py=Math.max(0,y);py<Math.min(H,y+h);py++)
      for(let px=Math.max(0,x);px<Math.min(W,x+w);px++)
        buf32[py*W+px]=col;
  };
  API.circ = function(cx,cy,r,c) {
    let x=r,y=0,d=1-r; cx=Math.floor(cx); cy=Math.floor(cy);
    while(x>=y){
      API.pix(cx+x,cy+y,c);API.pix(cx-x,cy+y,c);
      API.pix(cx+x,cy-y,c);API.pix(cx-x,cy-y,c);
      API.pix(cx+y,cy+x,c);API.pix(cx-y,cy+x,c);
      API.pix(cx+y,cy-x,c);API.pix(cx-y,cy-x,c);
      y++; if(d<0){d+=2*y+1;}else{x--;d+=2*(y-x)+1;}
    }
  };
  API.circf = function(cx,cy,r,c) {
    cx=Math.floor(cx); cy=Math.floor(cy);
    const col=COLOR_U32[c]||COLOR_U32[0]; const r2=r*r;
    for(let py=-r;py<=r;py++) for(let px=-r;px<=r;px++)
      if(px*px+py*py<=r2){ const sx=cx+px,sy=cy+py;
        if(sx>=0&&sx<W&&sy>=0&&sy<H) buf32[sy*W+sx]=col; }
  };
  API.sprite = function(id, data) {
    const arr = new Uint8Array(64); let i = 0;
    for (const ch of data) { if (ch>='0'&&ch<='3') { arr[i++]=parseInt(ch); if(i>=64) break; } }
    sprites[id] = arr;
  };
  API.spr = function(id, x, y, flipX, flipY) {
    const s=sprites[id]; if(!s) return;
    x=Math.floor(x); y=Math.floor(y);
    for(let py=0;py<8;py++) for(let px=0;px<8;px++){
      const sx=flipX?7-px:px, sy=flipY?7-py:py;
      const c=s[sy*8+sx], dx=x+px, dy=y+py;
      if(dx>=0&&dx<W&&dy>=0&&dy<H) buf32[dy*W+dx]=COLOR_U32[c];
    }
  };
  API.sprExt = function(id, x, y, flipX, flipY, transparent) {
    const s=sprites[id]; if(!s) return;
    x=Math.floor(x); y=Math.floor(y);
    for(let py=0;py<8;py++) for(let px=0;px<8;px++){
      const sx=flipX?7-px:px, sy=flipY?7-py:py;
      const c=s[sy*8+sx]; if(c===transparent) continue;
      const dx=x+px, dy=y+py;
      if(dx>=0&&dx<W&&dy>=0&&dy<H) buf32[dy*W+dx]=COLOR_U32[c];
    }
  };
  API.text = function(str, x, y, c) {
    str=String(str).toUpperCase(); let cx=Math.floor(x); const cy=Math.floor(y);
    const col=COLOR_U32[c]||COLOR_U32[3];
    for(const ch of str){
      const glyph=FONT[ch];
      if(glyph) for(let py=0;py<FONT_H;py++) for(let px=0;px<FONT_W;px++)
        if(glyph[py*FONT_W+px]){ const dx=cx+px,dy=cy+py;
          if(dx>=0&&dx<W&&dy>=0&&dy<H) buf32[dy*W+dx]=col; }
      cx+=FONT_W+1;
    }
  };
  API.mget = function(cx,cy) { return tilemap[cx+","+cy]||0; };
  API.mset = function(cx,cy,id) { tilemap[cx+","+cy]=id; };
  API.map = function(mx,my,mw,mh,sx,sy) {
    for(let ty=0;ty<mh;ty++) for(let tx=0;tx<mw;tx++){
      const id=API.mget(mx+tx,my+ty); if(id>0) API.spr(id,sx+tx*8,sy+ty*8); }
  };
  API.btn = function(k) { return !!keys[k]; };
  API.btnp = function(k) { return !!keys[k] && !keysPrev[k]; };
  API.note = function(ch, noteStr, dur) {
    ensureAudio(); if(ch<0||ch>1) return; API.stop(ch);
    const osc=audioCtx.createOscillator(); osc.type="square";
    osc.frequency.value=noteToFreq(noteStr);
    osc.connect(channelGains[ch]); osc.start();
    osc.stop(audioCtx.currentTime+dur); channels[ch]=osc;
  };
  API.stop = function(ch) {
    if(ch===undefined){API.stop(0);API.stop(1);return;}
    if(channels[ch]){try{channels[ch].stop();}catch(e){} channels[ch]=null;}
  };
  API.rnd = function(max) { return Math.random()*max; };
  API.flr = Math.floor;
  API.abs = Math.abs;
  API.min = Math.min;
  API.max = Math.max;
  API.sin = Math.sin;
  API.cos = Math.cos;

  function tick() {
    if (API._update) API._update();
    if (API._draw) API._draw();
    ctx.putImageData(buf, 0, 0);
    for (const k in keys) keysPrev[k] = keys[k];
    API.frame++;
  }

  // ============================================================
  // Paperboy Game
  // ============================================================
  const { cls, pix, line, rect, rectf, circ, circf, sprite: defSprite,
          spr, sprExt, text: drawText, btn, btnp, note, stop, rnd, flr,
          abs: _abs, min, max: _max, sin, cos } = API;

  // --- Sprites ---

  // 1: Paperboy on bicycle - frame 1 (pedal down)
  defSprite(1,
    "00330000" +
    "00230000" +
    "00332000" +
    "02131300" +
    "00123000" +
    "01200210" +
    "02010120" +
    "01000010"
  );
  // 2: Paperboy on bicycle - frame 2 (pedal up)
  defSprite(2,
    "00330000" +
    "00230000" +
    "00332000" +
    "02131300" +
    "00123000" +
    "00211200" +
    "01200210" +
    "10000001"
  );
  // 3: Paperboy jumping
  defSprite(3,
    "00330000" +
    "00230000" +
    "00332000" +
    "02131300" +
    "00123000" +
    "01022010" +
    "10200201" +
    "00000000"
  );
  // 4: Newspaper (in flight)
  defSprite(4,
    "00000000" +
    "00000000" +
    "00333000" +
    "03222300" +
    "03212300" +
    "00333000" +
    "00000000" +
    "00000000"
  );
  // 5: House - subscriber (with flag mailbox)
  defSprite(5,

    "00322300" +
    "03222230" +
    "32222223" +
    "02222220" +
    "02233220" +
    "02233220" +
    "02233220"
  );
  // 6: House - non-subscriber (darker)
  defSprite(6,
    "00011000" +
    "00100100" +
    "01000040" +
    "10000001" +
    "01111110" +
    "01100110" +
    "01100110" +
    "01100110"
  );
  // 7: Mailbox (subscriber - flag up)
  defSprite(7,
    "00000300" +
    "00000300" +
    "00333300" +
    "03222230" +
    "03333330" +
    "00030000" +
    "00030000" +
    "00030000"
  );
  // 8: Mailbox (non-subscriber - no flag)
  defSprite(8,
    "00000000" +
    "00000000" +
    "00111100" +
    "01000010" +
    "01111110" +

    "00010000"
  );
  // 9: Dog
  defSprite(9,
    "00000000" +
    "33000000" +
    "23100000" +

  );
  // 10: Car (front view, facing left)
  defSprite(10,

  // 11: Skater
  defSprite(11,

  defSprite(14,

  // 15: Fence segment
  defSprite(15,

  defSprite(16,

  defSprite(17,

  // --- Game Constants ---
  const LANE_Y = [75, 105, 135, 165]; // 4 lanes: top sidewalk, upper road, lower road, bottom sidewalk
  const SCROLL_SPEED = 2;
  const HOUSE_SPACING = 53; // distance between houses
  const HOUSES_PER_DAY = 8;
  const PAPERS_PER_DAY = 12;
  const DAY_LENGTH = HOUSES_PER_DAY * HOUSE_SPACING + 133; // pixels per day

  // --- Game State ---
  let state = "title";
  let player, papers, obstacles, houses, score, lives, day, scrollX;
  let papersLeft, dayProgress, dayLength;
  let jumpTimer, jumpHeight, invTimer;
  let particles, screenShake;
  let subscribers; // array of booleans for each house
  let brokenWindows; // track which houses got window-broken
  let dayResults, resultTimer;
  let pedalFrame, pedalTimer;
  let titleBounce;

  function resetGame() {
    score = 0;
    lives = 3;
    day = 1;
    scrollX = 0;
    invTimer = 0;
    particles = [];
    screenShake = 0;
    titleBounce = 0;
    startDay();
  }

  function startDay() {
    player = { x: 40, y: LANE_Y[1], lane: 1, targetY: LANE_Y[1] };
    papers = [];
    obstacles = [];
    houses = [];
    brokenWindows = {};
    scrollX = 0;
    jumpTimer = 0;
    jumpHeight = 0;
    invTimer = 0;
    pedalFrame = 0;
    pedalTimer = 0;
    dayProgress = 0;
    dayLength = DAY_LENGTH;
    papersLeft = PAPERS_PER_DAY + flr(day * 0.5);
    dayResults = null;
    resultTimer = 0;

    // Generate subscribers for this day
    if (day === 1) {
      subscribers = [];
      for (let i = 0; i < HOUSES_PER_DAY; i++) {
        subscribers.push(Math.random() < 0.6); // 60% subscribers initially
      }
    }

    // Generate houses along the route
    for (let i = 0; i < HOUSES_PER_DAY; i++) {
      const hx = 133 + i * HOUSE_SPACING;
      // Alternate top and bottom side of street
      const side = i % 2 === 0 ? "top" : "bottom";
      houses.push({
        x: hx,
        side: side,
        subscriber: subscribers[i],
        delivered: false,
        broken: false,
        index: i
      });
    }

    // Generate obstacles
    generateObstacles();
  }

  function generateObstacles() {
    obstacles = [];
    const numObs = 6 + day * 2;
    for (let i = 0; i < numObs; i++) {
      const type = flr(rnd(4)); // 0:dog, 1:car, 2:skater, 3:mower
      const ox = 200 + flr(rnd(dayLength - 200));
      let lane;
      if (type === 1) { // cars on road lanes
        lane = flr(rnd(2)) + 1; // lanes 1 or 2
      } else if (type === 3) { // mowers on sidewalks
        lane = flr(rnd(2)) === 0 ? 0 : 3;
      } else {
        lane = flr(rnd(4));
      }
      const speed = type === 1 ? (2 + rnd(2)) : (type === 2 ? (1.5 + rnd(1)) : (0.5 + rnd(1)));
      obstacles.push({
        x: ox,
        lane: lane,
        type: type,
        speed: speed,
        dir: rnd(1) < 0.5 ? -1 : 1,
        animT: flr(rnd(30)),
        alive: true
      });
    }
  }

  function throwSound() { note(0, "E5", 0.04); }
  function hitMailbox() { note(0, "C5", 0.06); setTimeout(() => note(0, "E5", 0.06), 60); setTimeout(() => note(0, "G5", 0.08), 120); }
  function breakWindow() { note(1, "A3", 0.08); setTimeout(() => note(1, "E3", 0.06), 50); }
  function crashSound() {
    note(0, "C3", 0.12); note(1, "G2", 0.12);
    setTimeout(() => { note(0, "A2", 0.18); }, 120);
  }
  function jumpSound() { note(0, "G4", 0.03); note(0, "C5", 0.03); }
  function dayCompleteSound() {
    note(0, "C5", 0.1);
    setTimeout(() => note(0, "E5", 0.1), 100);
    setTimeout(() => note(0, "G5", 0.1), 200);
    setTimeout(() => note(0, "C6", 0.2), 300);
  }
  function missSound() { note(1, "E3", 0.1); }
  function loseSubSound() { note(1, "C3", 0.15); setTimeout(() => note(1, "A2", 0.15), 100); }

  function addParticles(x, y, count, color) {
    for (let i = 0; i < count; i++) {
      particles.push({
        x: x, y: y,
        vx: rnd(4) - 2, vy: rnd(4) - 2,
        life: 8 + flr(rnd(12)),
        color: color || (flr(rnd(3)) + 1)
      });
    }
  }

  function playerHit() {
    if (invTimer > 0 || jumpTimer > 0) return;
    lives--;
    screenShake = 10;
    invTimer = 60;
    crashSound();
    addParticles(player.x + 4, player.y + 4, 12, 2);
    if (lives <= 0) {
      state = "gameover";
    }
  }

  function worldToScreen(wx) {
    return wx - scrollX;
  }

  resetGame();

  // ============================================================
  // Update
  // ============================================================
  API._update = function() {
    // Particles always update
    for (let i = particles.length - 1; i >= 0; i--) {
      const p = particles[i];
      p.x += p.vx; p.y += p.vy; p.vy += 0.1; p.life--;
      if (p.life <= 0) particles.splice(i, 1);
    }

    if (screenShake > 0) screenShake--;

    if (state === "title") {
      titleBounce = sin(API.frame * 0.06) * 4;
      if (btnp("a") || btnp("start")) {
        state = "play";
        resetGame();
        note(0, "C5", 0.1);
        setTimeout(() => note(0, "E5", 0.1), 100);
        setTimeout(() => note(0, "G5", 0.15), 200);
      }
      return;
    }

    if (state === "gameover") {
      if (btnp("a") || btnp("start")) state = "title";
      return;
    }

    if (state === "dayresult") {
      resultTimer++;
      if (resultTimer > 120 && (btnp("a") || btnp("start"))) {
        if (day >= 7) {
          state = "gameover"; // Won the week!
        } else {
          day++;
          startDay();
          state = "play";
        }
      }
      return;
    }

    // --- Play state ---

    // Scroll
    scrollX += SCROLL_SPEED;
    dayProgress += SCROLL_SPEED;

    // Pedal animation
    pedalTimer++;
    if (pedalTimer >= 4) {
      pedalTimer = 0;
      pedalFrame = 1 - pedalFrame;
    }

    // Player lane movement
    if (btnp("up") && player.lane > 0) {
      player.lane--;
      player.targetY = LANE_Y[player.lane];
    }
    if (btnp("down") && player.lane < 3) {
      player.lane++;
      player.targetY = LANE_Y[player.lane];
    }

    // Smooth lane transition
    const dy = player.targetY - player.y;
    if (_abs(dy) > 1) {
      player.y += dy * 0.2;
    } else {
      player.y = player.targetY;
    }

    // Jump
    if (btnp("b") && jumpTimer === 0) {
      jumpTimer = 20;
      jumpSound();
    }
    if (jumpTimer > 0) {
      jumpTimer--;
      jumpHeight = sin(jumpTimer / 20 * Math.PI) * 20;
    } else {
      jumpHeight = 0;
    }

    // Invincibility timer
    if (invTimer > 0) invTimer--;

    // Throw newspaper
    if (btnp("a") && papersLeft > 0) {
      papersLeft--;
      throwSound();
      papers.push({
        x: player.x + 8 + scrollX,
        y: player.y - jumpHeight,
        vx: 3,
        vy: -3,
        gravity: 0.2,
        active: true
      });
    }

    // Update newspapers in flight
    for (let i = papers.length - 1; i >= 0; i--) {
      const p = papers[i];
      p.x += p.vx;
      p.vy += p.gravity;
      p.y += p.vy;

      const sx = worldToScreen(p.x);

      // Check if paper hit a house/mailbox
      let hitSomething = false;
      for (const h of houses) {
        if (h.delivered || h.broken) continue;
        const hsx = worldToScreen(h.x);
        const hy = h.side === "top" ? 52 : 188;
        const mailboxY = h.side === "top" ? 71 : 176;

        // Mailbox hit zone
        if (sx > hsx - 4 && sx < hsx + 16 && p.y > mailboxY - 8 && p.y < mailboxY + 8) {
          if (h.subscriber) {
            // Delivered to subscriber!
            h.delivered = true;
            score += 100;
            hitMailbox();
            addParticles(sx + 4, mailboxY, 6, 3);
            hitSomething = true;
          } else {
            // Hit non-subscriber window - break it!
            h.broken = true;
            brokenWindows[h.index] = true;
            score += 50;
            breakWindow();
            addParticles(sx + 4, hy + 20, 8, 2);
            hitSomething = true;
          }
          break;
        }

        // Window hit zone (wider, for non-subscribers)
        if (sx > hsx - 2 && sx < hsx + 18 && p.y > hy && p.y < hy + 30) {
          if (!h.subscriber) {
            h.broken = true;
            brokenWindows[h.index] = true;
            score += 50;
            breakWindow();
            addParticles(sx + 4, hy + 15, 8, 2);
            hitSomething = true;
          } else {
            // Hit subscriber house (not mailbox) - still counts as delivery but less points
            h.delivered = true;
            score += 50;
            addParticles(sx + 4, hy + 15, 4, 2);
            hitSomething = true;
          }
          break;
        }
      }

      if (hitSomething) {
        papers.splice(i, 1);
        continue;
      }

      // Remove if off screen or hit ground
      if (p.y > 210 || sx > W + 20 || sx < -20) {
        papers.splice(i, 1);
      }
    }

    // Update obstacles
    for (const o of obstacles) {
      if (!o.alive) continue;
      o.animT++;

      // Move obstacle relative to world
      if (o.type === 1) { // Cars move along road
        o.x += o.dir * o.speed;
      } else if (o.type === 2) { // Skaters move along sidewalk
        o.x += o.dir * o.speed;
      }
      // Dogs and mowers are mostly stationary/slow

      const osx = worldToScreen(o.x);
      if (osx < -40 || osx > W + 40) continue;

      // Collision with player
      const oy = LANE_Y[o.lane];
      if (invTimer <= 0 && jumpTimer <= 3 &&
          _abs(player.x - osx) < 10 &&
          _abs(player.y - oy) < 12) {
        playerHit();
      }
    }

    // Check day completion
    if (dayProgress >= dayLength) {
      // Check for missed subscribers
      let delivered = 0;
      let missed = 0;
      for (const h of houses) {
        if (h.subscriber) {
          if (h.delivered) {
            delivered++;
          } else {
            missed++;
            // Subscriber becomes non-subscriber if missed
            subscribers[h.index] = false;
            loseSubSound();
          }
        }
      }

      dayResults = { delivered, missed, broken: Object.keys(brokenWindows).length };
      state = "dayresult";
      resultTimer = 0;
      dayCompleteSound();

      // Bonus points for perfect delivery
      if (missed === 0) {
        score += 500;
      }
    }
  };

  // ============================================================
  // Draw
  // ============================================================
  API._draw = function() {
    const shakeX = screenShake > 0 ? flr(rnd(4)) - 2 : 0;
    const shakeY = screenShake > 0 ? flr(rnd(4)) - 2 : 0;

    cls(0);

    if (state === "title") {
      // Sky
      rectf(0, 0, W, 60, 0);
      // Grass
      rectf(0, 60, W, 90, 0);
      // Road
      rectf(0, 98, W, 45, 1);
      // Bottom grass
      rectf(0, 143, W, 97, 0);

      // Draw some houses
      for (let i = 0; i < 6; i++) {
        const hx = 20 + i * 50;
        spr(5, hx, 51);
        spr(5, hx + 8, 51);
        spr(7, hx + 4, 66);
      }

      // Road markings
      for (let i = 0; i < 20; i++) {
        const lx = (i * 20 + flr(API.frame * 0.5)) % (W + 20) - 10;
        rectf(lx, 119, 12, 2, 2);
      }

      // Animated paperboy riding across
      const bikeX = ((API.frame * 2) % (W + 40)) - 20;
      const bikeY = 107 + sin(API.frame * 0.1) * 2;
      const bikeFrame = flr(API.frame / 4) % 2 === 0 ? 1 : 2;
      sprExt(bikeFrame, bikeX, bikeY, false, false, 0);

      // Title text
      const ty = 15 + flr(titleBounce);
      drawText("PAPERBOY", 140, ty, 3);
      drawText("PAPERBOY", 141, ty + 1, 1);
      rectf(113, ty + 10, 93, 1, 2);

      drawText("GRAYBOX EDITION", 123, ty + 18, 2);

      if (flr(API.frame / 20) % 2 === 0) {
        drawText("PRESS START", 133, 173, 3);
      }

      // Controls
      drawText("UP/DOWN  CHANGE LANE", 111, 195, 2);
      drawText("Z  THROW NEWSPAPER", 113, 204, 2);
      drawText("X  JUMP OBSTACLE", 118, 213, 2);
      drawText("7 DAYS TO DELIVER!", 113, 225, 1);

      return;
    }

    if (state === "gameover") {
      cls(0);
      for (const p of particles) pix(flr(p.x), flr(p.y), p.color);

      if (day >= 7 && lives > 0) {
        drawText("CONGRATULATIONS!", 121, 75, 3);
        drawText("YOU SURVIVED THE WEEK!", 106, 90, 2);
      } else {
        drawText("GAME OVER", 138, 75, 3);
      }
      drawText("FINAL SCORE: " + score, 115, 109, 2);
      drawText("DAYS COMPLETED: " + (day >= 7 ? 7 : day - 1), 113, 120, 2);

      if (flr(API.frame / 20) % 2 === 0) {
        drawText("PRESS START", 133, 158, 3);
      }
      return;
    }

    if (state === "dayresult") {
      cls(0);
      drawText("DAY " + day + " COMPLETE!", 123, 45, 3);

      rectf(93, 64, 133, 1, 2);

      drawText("DELIVERED: " + dayResults.delivered, 131, 75, 3);
      drawText("MISSED: " + dayResults.missed, 138, 89, dayResults.missed > 0 ? 1 : 2);
      drawText("WINDOWS: " + dayResults.broken, 136, 102, 2);

      if (dayResults.missed === 0) {
        drawText("PERFECT BONUS +500!", 111, 124, 3);
      }
      if (dayResults.missed > 0) {
        drawText("LOST " + dayResults.missed + " SUBSCRIBER" + (dayResults.missed > 1 ? "S" : "") + "!", 106, 124, 1);
      }

      drawText("SCORE: " + score, 131, 146, 2);

      // Count remaining subscribers
      let subCount = 0;
      for (let i = 0; i < subscribers.length; i++) {
        if (subscribers[i]) subCount++;
      }
      drawText("SUBSCRIBERS: " + subCount + "/" + HOUSES_PER_DAY, 121, 161, 2);

      if (subCount === 0) {
        drawText("NO SUBSCRIBERS LEFT!", 108, 180, 1);
        drawText("YOU ARE FIRED!", 126, 191, 3);
        // Force game over
        if (resultTimer > 120 && (btnp("a") || btnp("start"))) {
          state = "gameover";
          return;
        }
      } else if (day >= 7) {
        drawText("WEEK COMPLETE!", 126, 180, 3);
      } else {
        drawText("DAY " + (day + 1) + " NEXT...", 128, 180, 2);
      }

      if (resultTimer > 120 && flr(API.frame / 15) % 2 === 0) {
        drawText("PRESS START", 133, 210, 3);
      }
      return;
    }

    // --- Play state rendering ---
    const ox = shakeX;
    const oy = shakeY;

    // Sky gradient (top area)
    rectf(ox, oy, W, 49, 0);

    // Top houses area (lawn)
    rectf(ox, 49 + oy, W, 23, 0);
    // Top sidewalk
    for (let tx = -1; tx < 41; tx++) {
      const tileX = tx * 8 - (scrollX % 8) + ox;
      rectf(tileX, 72 + oy, 8, 8, 2);
    }
    // Curb
    rectf(ox, 80 + oy, W, 2, 1);

    // Road
    rectf(ox, 82 + oy, W, 75, 1);

    // Road lane markings (dashed center line)
    for (let i = 0; i < 30; i++) {
      const lx = (i * 24 - (scrollX % 24)) + ox;
      rectf(lx, 118 + oy, 12, 2, 2);
    }

    // Bottom curb
    rectf(ox, 157 + oy, W, 2, 1);
    // Bottom sidewalk
    for (let tx = -1; tx < 41; tx++) {
      const tileX = tx * 8 - (scrollX % 8) + ox;
      rectf(tileX, 159 + oy, 8, 8, 2);
    }
    // Bottom houses area (lawn)
    rectf(ox, 167 + oy, W, 38, 0);

    // Bottom strip
    rectf(ox, 205 + oy, W, 35, 0);

    // Draw grass details
    for (let tx = -1; tx < 41; tx++) {
      const tileX = tx * 8 - (scrollX % 8) + ox;
      // Top grass
      const seed1 = ((tx * 7 + flr(scrollX / 8)) * 13) % 37;
      if (seed1 % 5 === 0) pix(tileX + 3, 54 + oy, 1);
      if (seed1 % 7 === 0) pix(tileX + 6, 59 + oy, 1);
      // Bottom grass
      const seed2 = ((tx * 11 + flr(scrollX / 8)) * 17) % 41;
      if (seed2 % 5 === 0) pix(tileX + 2, 169 + oy, 1);
      if (seed2 % 7 === 0) pix(tileX + 5, 176 + oy, 1);
    }

    // Draw houses
    for (const h of houses) {
      const hsx = worldToScreen(h.x) + ox;
      if (hsx < -20 || hsx > W + 20) continue;

      const hy = h.side === "top" ? 47 + oy : 173 + oy;
      const mailboxY = h.side === "top" ? 66 + oy : 161 + oy;

      if (h.subscriber) {
        // Subscriber house - brighter
        spr(5, hsx, hy);
        spr(5, hsx + 8, hy);
        // Mailbox with flag
        sprExt(7, hsx + 4, mailboxY, false, false, 0);
        if (h.delivered) {
          // Show delivered indicator
          drawText("OK", hsx + 2, mailboxY - 8, 3);
        }
      } else {
        // Non-subscriber house - darker
        spr(6, hsx, hy);
        spr(6, hsx + 8, hy);
        // Mailbox without flag
        sprExt(8, hsx + 4, mailboxY, false, false, 0);
        if (h.broken) {
          // Show broken window
          sprExt(13, hsx + 2, hy + 16, false, false, 0);
        }
      }
    }

    // Draw trees (decorative, between houses)
    for (let i = 0; i < HOUSES_PER_DAY - 1; i++) {
      const tx = 160 + i * HOUSE_SPACING + ox;
      const tsx = worldToScreen(tx);
      if (tsx > -10 && tsx < W + 10) {
        sprExt(14, tsx, 44 + oy, false, false, 0);
        sprExt(14, tsx, 174 + oy, false, false, 0);
      }
    }

    // Draw obstacles
    for (const o of obstacles) {
      if (!o.alive) continue;
      const osx = worldToScreen(o.x) + ox;
      if (osx < -10 || osx > W + 10) continue;
      const oly = LANE_Y[o.lane] + oy;
      const flipX = o.dir < 0;

      switch (o.type) {
        case 0: // Dog
          sprExt(9, osx, oly, (flr(o.animT / 6) % 2 === 0), false, 0);
          break;
        case 1: // Car
          sprExt(10, osx, oly, flipX, false, 0);
          sprExt(10, osx + 8, oly, flipX, false, 0);
          break;
        case 2: // Skater
          sprExt(11, osx, oly, flipX, false, 0);
          break;
        case 3: // Lawn mower
          sprExt(12, osx, oly, (flr(o.animT / 8) % 2 === 0), false, 0);
          break;
      }
    }

    // Draw newspapers in flight
    for (const p of papers) {
      const psx = worldToScreen(p.x) + ox;
      const rotation = API.frame % 2;
      sprExt(4, psx, p.y + oy, rotation === 1, false, 0);
    }

    // Draw player
    if (invTimer <= 0 || flr(API.frame / 3) % 2 === 0) {
      const py = player.y - jumpHeight + oy;
      const sprId = jumpTimer > 0 ? 3 : (pedalFrame === 0 ? 1 : 2);
      sprExt(sprId, player.x + ox, py, false, false, 0);

      // Shadow when jumping
      if (jumpHeight > 3) {
        const shadowW = 8 - flr(jumpHeight / 5);
        rectf(player.x + ox + (8 - shadowW) / 2, player.y + 6 + oy, shadowW, 2, 1);
      }
    }

    // Draw particles
    for (const p of particles) pix(flr(p.x) + ox, flr(p.y) + oy, p.color);

    // --- HUD ---
    rectf(0, 0, W, 14, 0);
    rectf(0, 14, W, 1, 1);

    // Score
    drawText("SCORE:" + score, 4, 4, 3);

    // Day
    drawText("DAY " + day + "/7", W / 2 - 20, 4, 2);

    // Papers remaining
    sprExt(17, W - 67, 2, false, false, 0);
    drawText("X" + papersLeft, W - 57, 4, 3);

    // Lives
    for (let i = 0; i < lives; i++) {
      sprExt(16, W - 24 + i * 10, 3, false, false, 0);
    }

    // Progress bar at bottom
    rectf(0, H - 6, W, 6, 0);
    rectf(2, H - 4, W - 4, 2, 1);
    const prog = min(dayProgress / dayLength, 1);
    rectf(2, H - 4, flr((W - 4) * prog), 2, 3);

    // Lane indicators (subtle)
    for (let i = 0; i < 4; i++) {
      const ly = LANE_Y[i] + 3;
      if (i === player.lane) {
        pix(8, ly, 3);
        pix(9, ly, 3);
      } else {
        pix(8, ly, 1);
      }
    }
  };

  // ============================================================
  // Boot
  // ============================================================
  if (API._init) API._init();
  setInterval(tick, 1000 / FPS);
  document.addEventListener("keydown", ensureAudio, { once: true });
  document.addEventListener("click", ensureAudio, { once: true });
})();
</script>
</body>
</html>
