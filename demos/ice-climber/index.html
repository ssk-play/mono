<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GrayBox — Demo: Ice Climber</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #0a0a0a;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100vh;
    font-family: monospace;
    overflow: hidden;
  }
  #frame {
    background: #111;
    border: 3px solid #333;
    border-radius: 8px;
    padding: 12px;
    box-shadow: 0 0 40px rgba(0,0,0,0.8), inset 0 0 20px rgba(0,0,0,0.5);
  }
  canvas {
    display: block;
    image-rendering: pixelated;
    image-rendering: crisp-edges;
  }
  #controls {
    margin-top: 12px;
    color: #6b6b6b;
    font-size: 11px;
    text-align: center;
    letter-spacing: 1px;
  }
  #controls span { color: #b0b0b0; }
</style>
</head>
<body>
<div id="frame">
  <canvas id="screen"></canvas>
</div>
<div id="controls">
  <span>←→</span> MOVE &nbsp;&nbsp; <span>A</span> JUMP
</div>
<script src="../../runtime/engine.js"></script>
<script>
(() => {
  "use strict";
  const W = GrayBox.WIDTH, H = GrayBox.HEIGHT;
  const { cls, pix, line, rect, rectf, circ, circf, sprite: defSprite,
          spr, sprAlpha, text, btn, btnp, note, stop, rnd, flr, abs: _abs,
          min, max: _max, sin, cos } = GrayBox;

  // --- Sprites ---

  // 1: Player - Ice Climber (parka climber with hammer)

    "00333000" +

    "03232300" +

  // 2: Player jumping (hammer raised)

  // 3: Ice block (platform tile)
  defSprite(3,

  // 4: Breaking ice block (cracked)

  // 5: Polar bear enemy
  defSprite(5,

  // 6: Bird enemy (Topi/Nitpicker style)
  defSprite(6,

  // 7: Vegetable bonus (eggplant)

  // 8: Vegetable bonus (carrot)
  defSprite(8,

  // 9: Vegetable bonus (mushroom)
  defSprite(9,

  // 10: Mountain wall tile (left)
  defSprite(10,

    "22211111" +

  );

  // 11: Mountain wall tile (right)
  defSprite(11,
    "11111122" +
    "11111222" +
    "11112222" +
    "11112222" +
    "11111122" +
    "11111222" +
    "11112222" +

  );

  // 12: Cloud/summit platform
  defSprite(12,
    "00222200" +
    "02333320" +
    "23333332" +
    "33333333" +
    "33333333" +
    "23333332" +
    "02333320" +
    "00222200"
  );

  // 13: Life icon
  defSprite(13,
    "00000000" +
    "00330000" +
    "03223000" +
    "03233000" +
    "00333002" +
    "00330020" +
    "00000000" +
    "00000000"
  );

  // 14: Icicle decoration
  defSprite(14,
    "33333333" +
    "23322332" +
    "02200220" +
    "02200220" +
    "02000020" +
    "02000020" +
    "00000020" +
    "00000000"
  );

  // 15: Snow particle
  defSprite(15,
    "00000000" +
    "00000000" +
    "00030000" +
    "00333000" +
    "00030000" +
    "00000000" +
    "00000000" +
    "00000000"
  );

  // 16: Condor (bonus stage bird at summit)
  defSprite(16,
    "30000003" +
    "33000033" +
    "33300333" +
    "33333333" +
    "03333330" +
    "00333300" +
    "00311300" +
    "00300300"
  );

  // 17: Ice block with snow top
  defSprite(17,
    "33333333" +
    "33333333" +
    "22332233" +
    "22222222" +
    "33223322" +
    "33333333" +
    "22332233" +
    "22222222"
  );

  // 18: Hammer hit effect
  defSprite(18,
    "00300030" +
    "03000300" +
    "00000000" +
    "30000003" +
    "00000000" +
    "03000300" +
    "00300030" +
    "00000000"
  );

  // 19: Moving platform (cloud)
  defSprite(19,
    "00000000" +
    "00222200" +
    "02333320" +
    "23333332" +
    "33333333" +
    "23333332" +
    "00000000" +
    "00000000"
  );

  // --- Game constants ---
  const TILE = 8;
  const PLAY_LEFT = 21;
  const PLAY_RIGHT = W - 21;
  const PLAY_W = PLAY_RIGHT - PLAY_LEFT;
  const GRAVITY = 0.35;
  const JUMP_FORCE = -5.5;
  const MOVE_SPEED = 2.0;
  const LAYER_H = 30; // vertical distance between platform layers
  const LAYERS_PER_STAGE = 8; // number of platform layers per mountain stage
  const TOTAL_STAGES = 8;

  // --- Game state ---
  const { TITLE, PLAY, CLEAR, GAMEOVER } = GrayBox.SCENE;
  let player, platforms, enemies, bonusItems, particles, snowflakes;
  let score, lives, stage, cameraY, targetCameraY;
  let deathTimer, stageCompleteTimer, bonusTimer;
  let highestPlayerY; // tracks highest Y player reached (lower = higher on screen)
  let stageTopY; // Y coordinate of the summit
  let stageBottomY; // Y coordinate of the starting ground
  let breakEffects; // visual effects for breaking blocks
  let titleBounce;
  let mountainHeight; // total height of current mountain
  let bonusStage; // is this the bonus stage at top?
  let bonusScore;
  let flashTimer;

  function resetGame() {
    score = 0;
    lives = 3;
    stage = 1;
    titleBounce = 0;
    startStage();
  }

  function startStage() {
    platforms = [];
    enemies = [];
    bonusItems = [];
    particles = [];
    snowflakes = [];
    breakEffects = [];
    deathTimer = 0;
    stageCompleteTimer = 0;
    bonusTimer = 0;
    bonusStage = false;
    bonusScore = 0;
    flashTimer = 0;

    mountainHeight = LAYERS_PER_STAGE * LAYER_H;
    stageBottomY = mountainHeight + 30;
    stageTopY = -15;

    // Player starts at bottom
    player = {
      x: W / 2 - 4,
      y: stageBottomY - 16,
      vx: 0,
      vy: 0,
      onGround: false,
      jumping: false,
      facing: 1, // 1=right, -1=left
      headHit: false,
      headHitTimer: 0,
      invincible: 0,
      animTimer: 0
    };

    cameraY = stageBottomY - H + 30;
    targetCameraY = cameraY;
    highestPlayerY = player.y;

    // Generate ground
    for (let x = PLAY_LEFT; x < PLAY_RIGHT; x += TILE) {
      platforms.push({ x: x, y: stageBottomY, type: "solid", broken: false });
    }

    // Generate platform layers
    for (let layer = 1; layer <= LAYERS_PER_STAGE; layer++) {
      const layerY = stageBottomY - layer * LAYER_H;
      generatePlatformLayer(layerY, layer);
    }

    // Generate summit area
    const summitY = stageBottomY - (LAYERS_PER_STAGE + 1) * LAYER_H;
    for (let x = PLAY_LEFT; x < PLAY_RIGHT; x += TILE) {
      platforms.push({ x: x, y: summitY, type: "summit", broken: false });
    }

    // Snowflakes
    for (let i = 0; i < 30; i++) {
      snowflakes.push({
        x: rnd(W),
        y: rnd(mountainHeight + H) - H,
        speed: 0.3 + rnd(0.7),
        drift: rnd(6.28),
        size: flr(rnd(2))
      });
    }
  }

  function generatePlatformLayer(y, layer) {
    // Create a row of breakable ice blocks with some gaps
    const gapCount = 1 + flr(rnd(2)) + flr(stage / 3);
    const tileCount = flr(PLAY_W / TILE);
    const gaps = new Set();

    // Create gaps (2-3 tiles wide)
    for (let g = 0; g < gapCount; g++) {
      const gapStart = 1 + flr(rnd(tileCount - 3));
      const gapW = 2 + flr(rnd(2));
      for (let i = 0; i < gapW; i++) gaps.add(gapStart + i);
    }

    for (let t = 0; t < tileCount; t++) {
      if (!gaps.has(t)) {
        const isSnowy = layer >= LAYERS_PER_STAGE - 2;
        platforms.push({
          x: PLAY_LEFT + t * TILE,
          y: y,
          type: "ice",
          broken: false,
          breakTimer: 0,
          snowy: isSnowy
        });
      }
    }

    // Add enemies on some layers
    if (layer > 1 && layer < LAYERS_PER_STAGE && rnd(1) < 0.5 + stage * 0.05) {
      const ex = PLAY_LEFT + 16 + flr(rnd(PLAY_W - 40));
      const etype = rnd(1) < 0.6 ? "bear" : "bird";
      enemies.push({
        x: ex,
        y: y - 10,
        type: etype,
        vx: (rnd(1) < 0.5 ? 1 : -1) * (etype === "bear" ? 0.7 : 1.2),
        vy: 0,
        alive: true,
        animTimer: 0,
        layer: layer
      });
    }

    // Moving cloud platform on some layers
    if (layer > 2 && rnd(1) < 0.3) {
      platforms.push({
        x: PLAY_LEFT + flr(rnd(PLAY_W - 40)),
        y: y - 15,
        type: "cloud",
        broken: false,
        moveDir: rnd(1) < 0.5 ? 1 : -1,
        moveSpeed: 0.5 + rnd(0.5),
        startX: 0
      });
      // Set startX after creation
      platforms[platforms.length - 1].startX = platforms[platforms.length - 1].x;
    }
  }

  function startBonusStage() {
    bonusStage = true;
    bonusTimer = 300; // 10 seconds
    bonusItems = [];
    bonusScore = 0;

    // Scatter vegetables at the summit area
    const summitY = stageBottomY - (LAYERS_PER_STAGE + 1) * LAYER_H;
    for (let i = 0; i < 12; i++) {
      bonusItems.push({
        x: PLAY_LEFT + 16 + flr(rnd(PLAY_W - 40)),
        y: summitY - 8 - flr(rnd(45)),
        type: 7 + flr(rnd(3)), // sprites 7,8,9
        collected: false,
        bob: rnd(6.28)
      });
    }
  }

  // --- Sound effects ---
  function jumpSound() { note(0, "E5", 0.06); setTimeout(() => note(0, "G5", 0.04), 50); }
  function breakSound() { note(1, "C3", 0.05); setTimeout(() => note(1, "E3", 0.04), 30); }
  function hitSound() { note(0, "C6", 0.03); note(1, "E4", 0.05); }
  function deathSound() {
    note(0, "C4", 0.12); note(1, "G2", 0.15);
    setTimeout(() => { note(0, "A2", 0.2); note(1, "E2", 0.2); }, 120);
  }
  function collectSound() { note(0, "C5", 0.05); setTimeout(() => note(0, "E5", 0.05), 60); setTimeout(() => note(0, "G5", 0.08), 120); }
  function stageClearSound() {
    note(0, "C5", 0.1); setTimeout(() => note(0, "E5", 0.1), 100);
    setTimeout(() => note(0, "G5", 0.1), 200); setTimeout(() => note(0, "C6", 0.2), 300);
  }
  function enemyKillSound() { note(1, "A4", 0.06); setTimeout(() => note(1, "C5", 0.04), 40); }

  function addParticle(x, y, c) {
    particles.push({
      x: x, y: y,
      vx: rnd(4) - 2, vy: -1 - rnd(3),
      life: 10 + flr(rnd(10)),
      color: c
    });
  }

  function addBreakEffect(x, y) {
    breakEffects.push({ x: x, y: y, timer: 8 });
    for (let i = 0; i < 4; i++) addParticle(x + 4, y + 4, 2 + flr(rnd(2)));
  }

  function killPlayer() {
    if (player.invincible > 0) return;
    lives--;
    deathSound();
    for (let i = 0; i < 12; i++) addParticle(player.x + 4, player.y + 4, 2 + flr(rnd(2)));
    if (lives <= 0) {
      deathTimer = 90;
    } else {
      deathTimer = 60;
    }
  }

  function updateSnow() {
    titleBounce = sin(GrayBox.frame * 0.06) * 4;
    for (const s of snowflakes) {
      s.y += s.speed;
      s.x += sin(s.drift + GrayBox.frame * 0.03) * 0.3;
      if (s.y > cameraY + H + 10) { s.y = cameraY - 10; s.x = rnd(W); }
    }
  }
  function updateParts() {
    for (let i = particles.length - 1; i >= 0; i--) {
      const p = particles[i]; p.x += p.vx; p.y += p.vy; p.vy += 0.1; p.life--;
      if (p.life <= 0) particles.splice(i, 1);
    }
  }

  // --- Title Scene ---
  GrayBox.scene(TITLE, {
    init() { resetGame(); },
    update() {
      updateSnow();
      if (btnp("a") || btnp("a")) {
        resetGame();
        note(0, "C5", 0.08);
        setTimeout(() => note(0, "E5", 0.08), 80);
        setTimeout(() => note(0, "G5", 0.12), 160);
        GrayBox.go(PLAY); return;
      }
    },
    draw() { drawTitleScene(); }
  });

  // --- Game Over Scene ---
  GrayBox.scene(GAMEOVER, {
    init() {},
    update() {
      updateSnow();
      updateParts();
      if (btnp("a") || btnp("a")) { GrayBox.go(TITLE); return; }
    },
    draw() { drawGameOverScene(); }
  });

  // --- Stage Clear Scene ---
  GrayBox.scene(CLEAR, {
    init() {},
    update() {
      updateSnow();
      stageCompleteTimer--;
      if (bonusStage) {
        bonusTimer--;
        if (bonusTimer <= 0) { bonusStage = false; stageCompleteTimer = 0; }
      }
      if (stageCompleteTimer <= 0 && !bonusStage) {
        stage++;
        if (stage > TOTAL_STAGES) {
          stageCompleteTimer = 999;
          GrayBox.go(GAMEOVER); return;
        } else {
          startStage();
          GrayBox.go(PLAY); return;
        }
      }
      updateParts();
    },
    draw() { drawStageClearScene(); }
  });

  // --- Play Scene ---
  GrayBox.scene(PLAY, {
    init() {},
    update() {
    updateSnow();

    // --- Play state ---

    // Death handling
    if (deathTimer > 0) {
      deathTimer--;
      // Update particles
      for (let i = particles.length - 1; i >= 0; i--) {
        const p = particles[i]; p.x += p.vx; p.y += p.vy; p.vy += 0.1; p.life--;
        if (p.life <= 0) particles.splice(i, 1);
      }
      if (deathTimer <= 0) {
        if (lives <= 0) {
          GrayBox.go(GAMEOVER); return;
        } else {
          // Respawn at a safe platform near where they died
          player.x = W / 2 - 4;
          player.y = highestPlayerY + LAYER_H;
          player.vy = 0;
          player.vx = 0;
          player.onGround = false;
          player.invincible = 60;
        }
      }
      return;
    }

    if (player.invincible > 0) player.invincible--;
    if (player.headHitTimer > 0) player.headHitTimer--;
    player.animTimer++;

    // Bonus stage logic
    if (bonusStage) {
      bonusTimer--;
      // Collect vegetables
      for (let i = bonusItems.length - 1; i >= 0; i--) {
        const b = bonusItems[i];
        if (b.collected) continue;
        b.bob += 0.08;
        const by = b.y + sin(b.bob) * 3;
        if (player.x + 7 > b.x && player.x < b.x + 8 &&
            player.y + 7 > by && player.y < by + 8) {
          b.collected = true;
          score += 200;
          bonusScore += 200;
          collectSound();
          for (let j = 0; j < 5; j++) addParticle(b.x + 4, by + 4, 3);
        }
      }
      if (bonusTimer <= 0 || bonusItems.every(b => b.collected)) {
        bonusStage = false;
        stageCompleteTimer = 90;
        GrayBox.go(CLEAR); return;
        stageClearSound();
      }
    }

    // Player movement
    if (btn("left")) {
      player.vx = -MOVE_SPEED;
      player.facing = -1;
    } else if (btn("right")) {
      player.vx = MOVE_SPEED;
      player.facing = 1;
    } else {
      player.vx *= 0.7;
      if (_abs(player.vx) < 0.1) player.vx = 0;
    }

    // Jump
    if (btnp("a") && player.onGround) {
      player.vy = JUMP_FORCE;
      player.onGround = false;
      player.jumping = true;
      jumpSound();
    }

    // Apply gravity
    player.vy += GRAVITY;
    if (player.vy > 8) player.vy = 8;

    // Move horizontally
    player.x += player.vx;

    // Wall collision
    if (player.x < PLAY_LEFT) player.x = PLAY_LEFT;
    if (player.x > PLAY_RIGHT - 8) player.x = PLAY_RIGHT - 8;

    // Wrap around
    // (original IC lets you wrap; we use walls instead for clarity)

    // Move vertically
    const oldY = player.y;
    player.y += player.vy;
    player.onGround = false;
    player.headHit = false;

    // Platform collision
    for (let i = platforms.length - 1; i >= 0; i--) {
      const p = platforms[i];
      if (p.broken) continue;

      const px = p.x, py = p.y;
      const pw = (p.type === "cloud") ? 8 : TILE;
      const ph = TILE;

      // Player feet landing on top of platform (falling down)
      if (player.vy >= 0 && oldY + 8 <= py + 2 && player.y + 8 > py &&
          player.x + 6 > px && player.x + 2 < px + pw) {
        player.y = py - 8;
        player.vy = 0;
        player.onGround = true;
        player.jumping = false;
      }

      // Player head hitting bottom of platform (jumping up) - break ice!
      if (player.vy < 0 && oldY >= py + ph - 2 && player.y < py + ph &&
          player.x + 6 > px && player.x + 2 < px + pw) {
        if (p.type === "ice") {
          // Break the ice block!
          p.breakTimer = 6;
          addBreakEffect(p.x, p.y);
          breakSound();
          score += 10;
          player.headHit = true;
          player.headHitTimer = 8;

          // Check for enemy standing on this block
          for (const e of enemies) {
            if (e.alive && e.y + 8 >= py - 4 && e.y + 8 <= py + 4 &&
                e.x + 4 > px - 2 && e.x + 4 < px + pw + 2) {
              e.alive = false;
              e.vy = -4;
              score += 100;
              enemyKillSound();
              for (let j = 0; j < 6; j++) addParticle(e.x + 4, e.y + 4, 2);
            }
          }

          // Schedule block removal
          setTimeout(() => { p.broken = true; }, 200);
        } else if (p.type === "solid" || p.type === "summit") {
          // Solid blocks stop upward movement
          player.y = py + ph;
          player.vy = 0;
        }
      }
    }

    // Update cloud platforms (move them)
    for (const p of platforms) {
      if (p.type === "cloud" && !p.broken) {
        p.x += p.moveDir * p.moveSpeed;
        if (p.x < PLAY_LEFT + 8 || p.x > PLAY_RIGHT - 16) {
          p.moveDir *= -1;
        }
        // Move player with platform if standing on it
        if (player.onGround && player.y + 8 >= p.y - 1 && player.y + 8 <= p.y + 3 &&
            player.x + 6 > p.x && player.x + 2 < p.x + 8) {
          player.x += p.moveDir * p.moveSpeed;
        }
      }
    }

    // Update breakTimer on platforms
    for (const p of platforms) {
      if (p.breakTimer > 0) p.breakTimer--;
    }

    // Camera follows player upward smoothly
    targetCameraY = player.y - H * 0.6;
    // Only scroll up, not down (unless player falls far)
    if (targetCameraY < cameraY - 10) {
      cameraY += (targetCameraY - cameraY) * 0.08;
    }
    // But allow scrolling down if player falls
    if (player.y > cameraY + H * 0.8) {
      cameraY += (player.y - H * 0.8 - cameraY) * 0.12;
    }

    // Track highest position
    if (player.y < highestPlayerY) {
      highestPlayerY = player.y;
    }

    // Fall off bottom of visible area = death
    if (player.y > cameraY + H + 20) {
      killPlayer();
    }

    // Check if player reached summit
    const summitY = stageBottomY - (LAYERS_PER_STAGE + 1) * LAYER_H;
    if (player.y < summitY + 8 && !bonusStage) {
      if (stageCompleteTimer === 0) {
        startBonusStage();
        stageClearSound();
      }
    }

    // Update enemies
    for (let i = enemies.length - 1; i >= 0; i--) {
      const e = enemies[i];
      e.animTimer++;

      if (!e.alive) {
        e.vy += GRAVITY;
        e.y += e.vy;
        if (e.y > cameraY + H + 30) {
          enemies.splice(i, 1);
        }
        continue;
      }

      // Move horizontally
      e.x += e.vx;

      // Bounce off walls
      if (e.x < PLAY_LEFT + 4) { e.x = PLAY_LEFT + 4; e.vx = _abs(e.vx); }
      if (e.x > PLAY_RIGHT - 12) { e.x = PLAY_RIGHT - 12; e.vx = -_abs(e.vx); }

      // Birds also bob up and down
      if (e.type === "bird") {
        e.y += sin(e.animTimer * 0.1) * 0.5;
      }

      // Player collision with enemy
      if (player.invincible <= 0 &&
          player.x + 6 > e.x && player.x + 2 < e.x + 8 &&
          player.y + 6 > e.y && player.y + 2 < e.y + 8) {
        // If player is falling onto enemy, kill enemy
        if (player.vy > 0 && player.y + 8 < e.y + 5) {
          e.alive = false;
          e.vy = -3;
          player.vy = JUMP_FORCE * 0.6;
          score += 100;
          enemyKillSound();
          for (let j = 0; j < 6; j++) addParticle(e.x + 4, e.y + 4, 2);
        } else {
          killPlayer();
        }
      }
    }

    // Update particles
    for (let i = particles.length - 1; i >= 0; i--) {
      const p = particles[i];
      p.x += p.vx; p.y += p.vy; p.vy += 0.08; p.life--;
      if (p.life <= 0) particles.splice(i, 1);
    }

    // Update break effects
    for (let i = breakEffects.length - 1; i >= 0; i--) {
      breakEffects[i].timer--;
      if (breakEffects[i].timer <= 0) breakEffects.splice(i, 1);
    }

    // Flash timer
    if (flashTimer > 0) flashTimer--;
    },
    draw() { drawPlayScene(); }
  });

  function drawTitleScene() {
    cls(0);
      // Mountain background
      drawMountainBg(0);

      // Snowflakes on title
      for (const s of snowflakes) {
        pix(flr(s.x), flr(s.y % H), 3);
      }

      const ty = 45 + titleBounce;

      // Title shadow + text
      text("ICE CLIMBER", 134, flr(ty) + 2, 1);
      text("ICE CLIMBER", 133, flr(ty), 3);

      // Subtitle
      rectf(107, flr(ty) + 12, 107, 1, 2);

      // Player sprite on title
      sprAlpha(1, W / 2 - 4, flr(ty) + 24 + flr(sin(GrayBox.frame * 0.1) * 3));

      // Enemies
      sprAlpha(5, W / 2 - 30, flr(ty) + 26 + flr(sin(GrayBox.frame * 0.08 + 1) * 2));
      sprAlpha(6, W / 2 + 22, flr(ty) + 24 + flr(sin(GrayBox.frame * 0.08 + 2) * 2));

      // Ice platforms
      for (let x = 107; x < 214; x += 8) {
        sprAlpha(3, x, flr(ty) + 36);
      }

      if (flr(GrayBox.frame / 20) % 2 === 0) text("PRESS A TO START", 120, 150, 3);

      // Instructions
      text("CLIMB THE ICE MOUNTAIN!", 103, 172, 2);
      text("A:JUMP  LEFT/RIGHT:MOVE", 103, 184, 2);
      text("BREAK ICE FROM BELOW!", 108, 195, 2);

      text(TOTAL_STAGES + " MOUNTAINS TO CONQUER", 105, 211, 1);
      text("GRAYBOX DEMO V0.1", 118, 229, 1);
  }

  function drawGameOverScene() {
    cls(0);
      drawMountainBg(0);

      for (const p of particles) pix(flr(p.x), flr(p.y), p.color);

      if (stage > TOTAL_STAGES) {
        // Victory!
        text("CONGRATULATIONS!", 120, 75, 3);
        text("YOU CONQUERED ALL", 118, 94, 2);
        text(TOTAL_STAGES + " MOUNTAINS!", 130, 105, 2);
        text("FINAL SCORE: " + score, 110, 128, 3);
      } else {
        text("GAME OVER", 138, 90, 3);
        text("SCORE: " + score, 128, 109, 2);
        text("MOUNTAIN: " + stage, 130, 120, 2);
      }
      if (flr(GrayBox.frame / 20) % 2 === 0) text("PRESS A TO CONTINUE", 113, 165, 3);
  }

  function drawStageClearScene() { drawPlayScene(); }

  function drawPlayScene() {
    cls(0);

    // --- Play / Stage Clear rendering ---

    // Sky gradient background
    const skyTop = 0;
    for (let y = 0; y < H; y++) {
      const screenY = y + cameraY;
      // Darker at bottom, lighter at top
      const t = 1 - (screenY - stageTopY) / (stageBottomY - stageTopY);
      if (t > 0.7) rectf(0, y, W, 1, 0);
      else if (t > 0.3) {} // default black
      else rectf(0, y, W, 1, 0);
    }

    // Draw mountain walls on sides
    for (let y = -8; y < H + 8; y += 8) {
      const worldY = y + flr(cameraY);
      // Left wall
      for (let x = 0; x < PLAY_LEFT; x += 8) {
        const shade = (x + worldY) % 16 < 8 ? 10 : 10;
        sprAlpha(10, x, y);
      }
      // Right wall
      for (let x = PLAY_RIGHT; x < W; x += 8) {
        sprAlpha(11, x, y);
      }
    }

    // Draw snowflakes
    for (const s of snowflakes) {
      const sy = flr(s.y - cameraY);
      if (sy >= -4 && sy <= H + 4) {
        pix(flr(s.x), sy, 3);
        if (s.size > 0) pix(flr(s.x) + 1, sy, 2);
      }
    }

    // Draw platforms
    for (const p of platforms) {
      if (p.broken) continue;
      const sy = flr(p.y - cameraY);
      if (sy < -10 || sy > H + 10) continue;

      if (p.type === "ice") {
        if (p.breakTimer > 0) {
          sprAlpha(4, p.x, sy); // cracking
        } else if (p.snowy) {
          sprAlpha(17, p.x, sy);
        } else {
          sprAlpha(3, p.x, sy);
        }
      } else if (p.type === "solid") {
        sprAlpha(3, p.x, sy);
      } else if (p.type === "summit") {
        sprAlpha(12, p.x, sy);
      } else if (p.type === "cloud") {
        sprAlpha(19, p.x, sy);
      }
    }

    // Draw bonus items
    for (const b of bonusItems) {
      if (b.collected) continue;
      const sy = flr(b.y + sin(b.bob) * 3 - cameraY);
      if (sy >= -10 && sy <= H + 10) {
        sprAlpha(b.type, b.x, sy);
      }
    }

    // Draw break effects
    for (const e of breakEffects) {
      const sy = flr(e.y - cameraY);
      sprAlpha(18, e.x, sy);
    }

    // Draw enemies
    for (const e of enemies) {
      const sy = flr(e.y - cameraY);
      if (sy < -10 || sy > H + 10) continue;

      const flipX = e.vx < 0;
      if (e.type === "bear") {
        sprAlpha(5, flr(e.x), sy, flipX);
      } else {
        // Bird with wing flap animation
        const wingFrame = flr(e.animTimer / 6) % 2 === 0;
        sprAlpha(6, flr(e.x), sy + (wingFrame ? -1 : 0), flipX);
      }

      // Dead enemies flash
      if (!e.alive && flr(GrayBox.frame / 2) % 2 === 0) {
        rectf(flr(e.x), sy, 8, 8, 3);
      }
    }

    // Draw player
    if (deathTimer <= 0) {
      const sy = flr(player.y - cameraY);
      // Blink when invincible
      if (player.invincible <= 0 || flr(GrayBox.frame / 3) % 2 === 0) {
        const flipX = player.facing < 0;
        if (player.jumping || !player.onGround) {
          sprAlpha(2, flr(player.x), sy, flipX);
        } else {
          // Walking animation
          const walkFrame = flr(player.animTimer / 5) % 2;
          sprAlpha(1, flr(player.x), sy + (walkFrame && _abs(player.vx) > 0.3 ? -1 : 0), flipX);
        }
      }

      // Hammer hit visual
      if (player.headHitTimer > 0) {
        sprAlpha(18, flr(player.x) - 2, sy - 10);
      }
    }

    // Draw particles
    for (const p of particles) {
      const sy = flr(p.y - cameraY);
      if (sy >= 0 && sy < H) pix(flr(p.x), sy, p.color);
    }

    // --- HUD ---
    rectf(0, 0, W, 14, 0);
    rectf(0, 14, W, 1, 1);

    text("SCORE:" + score, 4, 4, 3);
    text("MT." + stage, W / 2 - 15, 4, 2);

    // Lives
    for (let i = 0; i < lives; i++) sprAlpha(13, W - 40 + i * 10, 3);

    // Height indicator on right side
    {
      const barX = W - 10;
      const barTop = 20;
      const barH = H - 30;
      rectf(barX, barTop, 4, barH, 1);

      // Player position on bar
      const progress = 1 - (player.y - stageTopY) / (stageBottomY - stageTopY);
      const markerY = barTop + barH - flr(progress * barH);
      rectf(barX - 1, markerY - 1, 6, 3, 3);

      // Summit marker
      rectf(barX, barTop, 4, 2, 3);
    }

    // Stage announcement
    if (GrayBox.frame < 90) {
      const msgAlpha = GrayBox.frame < 60 ? 3 : (GrayBox.frame < 75 ? 2 : 1);
      text("MOUNTAIN " + stage, 133, 105, msgAlpha);
      text("START!", 145, 119, msgAlpha);
    }

    // Bonus stage overlay
    if (bonusStage) {
      const timeLeft = flr(bonusTimer / 30);
      text("BONUS! " + timeLeft + "S", 135, 20, 3);
      text("GET VEGGIES!", 130, 30, 2);
    }

    // Stage clear
    if (stageCompleteTimer > 0) {
      text("STAGE CLEAR!", 130, 98, 3);
      text("BONUS: " + bonusScore, 130, 113, 2);
      if (stageCompleteTimer < 60 && flr(GrayBox.frame / 15) % 2 === 0) {
        text("NEXT MOUNTAIN...", 120, 135, 2);
      }
    }
  }

  function drawMountainBg(offsetY) {
    // Simple mountain silhouette background for title/gameover
    for (let x = 0; x < W; x += 2) {
      const h1 = 60 + sin(x * 0.02) * 30 + sin(x * 0.05) * 15;
      const h2 = 90 + sin(x * 0.015 + 1) * 22 + sin(x * 0.04) * 11;
      // Far mountains
      for (let y = H - flr(h1); y < H; y++) {
        if (y >= 0 && y < H) { pix(x, y, 1); pix(x + 1, y, 1); }
      }
      // Near mountains
      for (let y = H - flr(h2 * 0.6); y < H; y++) {
        if (y >= 0 && y < H) { pix(x, y, 1); if (x + 1 < W) pix(x + 1, y, 1); }
      }
    }
    // Snow caps
    for (let x = 0; x < W; x++) {
      const h1 = 60 + sin(x * 0.02) * 30 + sin(x * 0.05) * 15;
      const peakY = H - flr(h1);
      if (peakY >= 0 && peakY < H) {
        pix(x, peakY, 3);
        if (peakY + 1 < H) pix(x, peakY + 1, 2);
      }
    }
  }

  GrayBox.go(TITLE);
  GrayBox.boot("screen");
})();
</script>
