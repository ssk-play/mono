<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GrayBox — Demo: Star Patrol</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #0a0a0a;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100vh;
    font-family: monospace;
    overflow: hidden;
  }
  #frame {
    background: #111;
    border: 3px solid #333;
    border-radius: 8px;
    padding: 12px;
    box-shadow: 0 0 40px rgba(0,0,0,0.8), inset 0 0 20px rgba(0,0,0,0.5);
  }
  canvas {
    display: block;
    image-rendering: pixelated;
    image-rendering: crisp-edges;
  }
  #controls {
    margin-top: 12px;
    color: #6b6b6b;
    font-size: 11px;
    text-align: center;
    letter-spacing: 1px;
  }
  #controls span { color: #b0b0b0; }
</style>
</head>
<body>
<div id="frame">
  <canvas id="screen"></canvas>
</div>
<div id="controls">
  <span>←↑↓→</span> MOVE &nbsp;&nbsp; <span>Z</span> SHOOT &nbsp;&nbsp; <span>X</span> DASH &nbsp;&nbsp; <span>ENTER</span> START
</div>
<script>
(() => {
  "use strict";
  const W = 480;
  const H = 320;
  const SCALE = 2;
  const FPS = 30;
  const COLORS = ["#1a1a1a", "#6b6b6b", "#b0b0b0", "#e8e8e8"];
  const canvas = document.getElementById("screen");
  canvas.width = W;
  canvas.height = H;
  canvas.style.width = (W * SCALE) + "px";
  canvas.style.height = (H * SCALE) + "px";
  const ctx = canvas.getContext("2d");
  ctx.imageSmoothingEnabled = false;
  const buf = ctx.createImageData(W, H);
  const buf32 = new Uint32Array(buf.data.buffer);
  function hexToABGR(hex) {
    const r = parseInt(hex.slice(1, 3), 16);
    const g = parseInt(hex.slice(3, 5), 16);
    const b = parseInt(hex.slice(5, 7), 16);
    return (255 << 24) | (b << 16) | (g << 8) | r;
  }
  const COLOR_U32 = COLORS.map(hexToABGR);
  const sprites = {};
  const spriteImgs = {};
  const tilemap = {};
  const keyMap = {
    "ArrowUp": "up", "ArrowDown": "down", "ArrowLeft": "left", "ArrowRight": "right",
    "w": "up", "s": "down", "a": "left", "d": "right",
    "z": "a", "Z": "a", "x": "b", "X": "b",
    "Enter": "start", " ": "a"
  };
  const keys = {};
  const keysPressed = {};
  const keysPrev = {};
  document.addEventListener("keydown", e => {
    const k = keyMap[e.key];
    if (k) { keys[k] = true; e.preventDefault(); }
  });
  document.addEventListener("keyup", e => {
    const k = keyMap[e.key];
    if (k) { keys[k] = false; e.preventDefault(); }
  });
  let audioCtx = null;
  const channels = [null, null];
  const channelGains = [null, null];
  function ensureAudio() {
    if (!audioCtx) {
      audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      for (let i = 0; i < 2; i++) {
        channelGains[i] = audioCtx.createGain();
        channelGains[i].gain.value = 0.15;
        channelGains[i].connect(audioCtx.destination);
      }
    }
  }
  const NOTE_NAMES = ["C","C#","D","D#","E","F","F#","G","G#","A","A#","B"];
  function noteToFreq(noteStr) {
    const match = noteStr.match(/^([A-G]#?)(\d)$/);
    if (!match) return 440;
    const name = match[1];
    const octave = parseInt(match[2]);
    const semitone = NOTE_NAMES.indexOf(name);
    if (semitone === -1) return 440;
    const midi = (octave + 1) * 12 + semitone;
    return 440 * Math.pow(2, (midi - 69) / 12);
  }
  const FONT_W = 4;
  const FONT_H = 7;
  const FONT = {};
  const fontData = {
    "A":"0110100110011111100110011001","B":"1110100110101110100110011110",
    "C":"0110100110001000100001100110","D":"1100101010011001100110101100",
    "E":"1111100010001110100010001111","F":"1111100010001110100010001000",
    "G":"0111100010001011100101100111","H":"1001100110011111100110011001",
    "I":"1110010001000100010001001110","J":"0111001000100010001010100100",
    "K":"1001101011001100101010011001","L":"1000100010001000100010001111",
    "M":"1001111111011001100110011001","N":"1001110111011001100110011001",
    "O":"0110100110011001100110010110","P":"1110100110011110100010001000",
    "Q":"0110100110011001101101100001","R":"1110100110011110101010011001",
    "S":"0111100010000110000110001110","T":"1111001000100010001000100010",
    "U":"1001100110011001100110010110","V":"1001100110011001100101100110",
    "W":"1001100110011001101111011001","X":"1001100101100110011010011001",
    "Y":"1001100101100010001000100010","Z":"1111000100100100100010001111",
    "0":"0110100111011011101110010110","1":"0100110001000100010001001110",
    "2":"0110100100010010010010001111","3":"1110000100010110000110011110",
    "4":"1001100110011111000100010001","5":"1111100010001110000100011110",
    "6":"0110100010001110100110010110","7":"1111000100010010010001001000",
    "8":"0110100110010110100110010110","9":"0110100110010111000100010110",
    " ":"0000000000000000000000000000",
    ".":"0000000000000000000001000100",
    ",":"0000000000000000001000101000",
    "!":"0100010001000100000000000100",
    "?":"0110100100010010000000000010",
    "-":"0000000000001110000000000000",
    "+":"0000001001001110010000100000",
    ":":"0000010001000000010001000000",
    "/":"0001000100100010010010001000",
    "*":"0000101001001110010010100000",
    "#":"0101111101011111010100000000",
    "(":"0010010010001000010001000010",
    ")":"0100001000010001000100100100",
    "=":"0000000011110000111100000000",
    "'":"0100010010000000000000000000",
    "\"":"1010101000000000000000000000",
    "<":"0010010010001000010000100010",
    ">":"1000010000100001001001001000",
    "_":"0000000000000000000000001111",
  };
  for (const [ch, bits] of Object.entries(fontData)) {
    FONT[ch] = [];
    for (let i = 0; i < bits.length; i++) FONT[ch].push(parseInt(bits[i]));
  }
  const API = {};
  API._init = null;
  API._update = null;
  API._draw = null;
  API.cls = function(c = 0) {
    buf32.fill(COLOR_U32[c] || COLOR_U32[0]);
  };
  API.pix = function(x, y, c) {
    x = Math.floor(x); y = Math.floor(y);
    if (x < 0 || x >= W || y < 0 || y >= H) return;
    buf32[y * W + x] = COLOR_U32[c] || COLOR_U32[0];
  };
  API.line = function(x0, y0, x1, y1, c) {
    x0=Math.floor(x0); y0=Math.floor(y0);
    x1=Math.floor(x1); y1=Math.floor(y1);
    const dx = Math.abs(x1-x0), dy = Math.abs(y1-y0);
    const sx = x0<x1?1:-1, sy = y0<y1?1:-1;
    let err = dx-dy;
    while(true) {
      API.pix(x0,y0,c);
      if(x0===x1 && y0===y1) break;
      const e2=2*err;
      if(e2>-dy){err-=dy;x0+=sx;}
      if(e2<dx){err+=dx;y0+=sy;}
    }
  };
  API.rect = function(x, y, w, h, c) {
    API.line(x,y,x+w-1,y,c);
    API.line(x+w-1,y,x+w-1,y+h-1,c);
    API.line(x+w-1,y+h-1,x,y+h-1,c);
    API.line(x,y+h-1,x,y,c);
  };
  API.rectf = function(x, y, w, h, c) {
    x=Math.floor(x); y=Math.floor(y);
    const col = COLOR_U32[c]||COLOR_U32[0];
    for(let py=Math.max(0,y);py<Math.min(H,y+h);py++)
      for(let px=Math.max(0,x);px<Math.min(W,x+w);px++)
        buf32[py*W+px]=col;
  };
  API.circ = function(cx, cy, r, c) {
    let x=r, y=0, d=1-r;
    cx=Math.floor(cx); cy=Math.floor(cy);
    while(x>=y){
      API.pix(cx+x,cy+y,c); API.pix(cx-x,cy+y,c);
      API.pix(cx+x,cy-y,c); API.pix(cx-x,cy-y,c);
      API.pix(cx+y,cy+x,c); API.pix(cx-y,cy+x,c);
      API.pix(cx+y,cy-x,c); API.pix(cx-y,cy-x,c);
      y++;
      if(d<0){d+=2*y+1;}else{x--;d+=2*(y-x)+1;}
    }
  };
  API.circf = function(cx, cy, r, c) {
    cx=Math.floor(cx); cy=Math.floor(cy);
    const col=COLOR_U32[c]||COLOR_U32[0];
    const r2=r*r;
    for(let py=-r;py<=r;py++)
      for(let px=-r;px<=r;px++)
        if(px*px+py*py<=r2){
          const sx=cx+px,sy=cy+py;
          if(sx>=0&&sx<W&&sy>=0&&sy<H) buf32[sy*W+sx]=col;
        }
  };
  API.sprite = function(id, data) {
    const arr = new Uint8Array(64);
    let i = 0;
    for (const ch of data) {
      if (ch >= '0' && ch <= '3') { arr[i++] = parseInt(ch); if (i >= 64) break; }
    }
    sprites[id] = arr;
    const img = ctx.createImageData(8, 8);
    const d32 = new Uint32Array(img.data.buffer);
    for (let j = 0; j < 64; j++) d32[j] = COLOR_U32[arr[j]];
    spriteImgs[id] = img;
  };
  API.spr = function(id, x, y, flipX, flipY) {
    const s = sprites[id];
    if (!s) return;
    x = Math.floor(x); y = Math.floor(y);
    for (let py = 0; py < 8; py++) {
      for (let px = 0; px < 8; px++) {
        const sx = flipX ? 7 - px : px;
        const sy = flipY ? 7 - py : py;
        const c = s[sy * 8 + sx];
        const dx = x + px, dy = y + py;
        if (dx >= 0 && dx < W && dy >= 0 && dy < H) {
          buf32[dy * W + dx] = COLOR_U32[c];
        }
      }
    }
  };
  API.text = function(str, x, y, c) {
    str = String(str).toUpperCase();
    let cx = Math.floor(x);
    const cy = Math.floor(y);
    const col = COLOR_U32[c] || COLOR_U32[3];
    for (const ch of str) {
      const glyph = FONT[ch];
      if (glyph) {
        for (let py = 0; py < FONT_H; py++) {
          for (let px = 0; px < FONT_W; px++) {
            if (glyph[py * FONT_W + px]) {
              const dx = cx + px, dy = cy + py;
              if (dx >= 0 && dx < W && dy >= 0 && dy < H)
                buf32[dy * W + dx] = col;
            }
          }
        }
      }
      cx += FONT_W + 1;
    }
  };
  API.mget = function(cx, cy) { return tilemap[cx + "," + cy] || 0; };
  API.mset = function(cx, cy, id) { tilemap[cx + "," + cy] = id; };
  API.map = function(mx, my, mw, mh, sx, sy) {
    for (let ty = 0; ty < mh; ty++)
      for (let tx = 0; tx < mw; tx++) {
        const id = API.mget(mx + tx, my + ty);
        if (id > 0) API.spr(id, sx + tx * 8, sy + ty * 8);
      }
  };
  API.btn = function(k) { return !!keys[k]; };
  API.btnp = function(k) { return !!keys[k] && !keysPrev[k]; };
  API.note = function(ch, noteStr, dur) {
    ensureAudio();
    if (ch < 0 || ch > 1) return;
    API.stop(ch);
    const osc = audioCtx.createOscillator();
    osc.type = "square";
    osc.frequency.value = noteToFreq(noteStr);
    osc.connect(channelGains[ch]);
    osc.start();
    osc.stop(audioCtx.currentTime + dur);
    channels[ch] = osc;
  };
  API.stop = function(ch) {
    if (ch === undefined) { API.stop(0); API.stop(1); return; }
    if (channels[ch]) {
      try { channels[ch].stop(); } catch(e) {}
      channels[ch] = null;
    }
  };
  API.rnd = function(max) { return Math.random() * max; };
  API.flr = Math.floor;
  API.abs = Math.abs;
  API.min = Math.min;
  API.max = Math.max;
  API.sin = Math.sin;
  API.cos = Math.cos;
  API.frame = 0;
  function tick() {
    for (const k in keys) keysPressed[k] = keys[k] && !keysPrev[k];
    if (API._update) API._update();
    if (API._draw) API._draw();
    ctx.putImageData(buf, 0, 0);
    for (const k in keys) keysPrev[k] = keys[k];
    API.frame++;
  }
  const { cls, pix, line, rect, rectf, circ, circf, sprite: defSprite,
          spr, text, btn, btnp, note, stop, mget, mset, map: drawMap,
          rnd, flr, abs: _abs, min, max: _max } = API;
  defSprite(1, "0003000000030000003330000033300003333300331133303330333001000010");
  defSprite(2, "0100001033303330331133300333330000333000003330000003000000030000");
  defSprite(3, "0011100001333100133133101333331013033010013331000011100000000000");
  defSprite(4, "0003000000030000000200000002000000010000000000000000000000000000");
  defSprite(5, "0000000000200000000230000203302000320200030020000002000000000000");
  defSprite(6, "0200002000310000010331003003303001330100000312000300001000020000");
  defSprite(7, "0000000000000000000000000001000000000000000000000000000000000000");
  defSprite(8, "0011100001222100122322101233321012232210012221000011100000000000");
  defSprite(9, "0000000000000000000100000002000000020000000300000003000000000000");
  defSprite(10,"3333333331333133333333333311133333333333313331333333333330300303");
  defSprite(11,"0000000001001000122122001222220001222100001210000001000000000000");
  let state = "title";
  let player, bullets, enemies, eBullets, particles, stars, score, lives;
  let spawnTimer, diffLevel, screenShake, shakeTimer;
  let dashCooldown, dashTimer;
  function resetGame() {
    player = { x: 240 - 4, y: 270, speed: 3, dashSpeed: 8 };
    bullets = []; enemies = []; eBullets = []; particles = [];
    score = 0; lives = 3; spawnTimer = 0; diffLevel = 1;
    screenShake = 0; shakeTimer = 0; dashCooldown = 0; dashTimer = 0;
    stars = [];
    for (let i = 0; i < 40; i++)
      stars.push({ x: flr(rnd(W)), y: flr(rnd(H)), speed: 0.3 + rnd(1.2), bright: flr(rnd(2)) + 1 });
  }
  function shootNote() { note(0, "C6", 0.05); setTimeout(() => note(0, "E6", 0.04), 30); }
  function hitNote() { note(1, "C3", 0.08); setTimeout(() => note(1, "E3", 0.06), 50); }
  function deathNote() { note(0, "C3", 0.15); note(1, "G2", 0.15); setTimeout(() => { note(0, "A2", 0.2); note(1, "E2", 0.2); }, 150); }
  function spawnEnemy() {
    const type = rnd(1) < 0.3 ? 3 : 2;
    enemies.push({ x: 8 + flr(rnd(W - 24)), y: -10, type, speed: 0.8 + rnd(0.5) * diffLevel, hp: type === 3 ? 2 : 1, shootTimer: flr(rnd(60)) + 30, wobble: rnd(6.28), wobbleAmp: type === 3 ? 15 : 0 });
  }
  function addParticle(x, y, c) {
    for (let i = 0; i < 6; i++)
      particles.push({ x, y, vx: rnd(4) - 2, vy: rnd(4) - 2, life: 8 + flr(rnd(8)), color: c || (flr(rnd(3)) + 1) });
  }
  resetGame();
  API._update = function() {
    if (state === "title") {
      for (const s of stars) { s.y += s.speed; if (s.y > H) { s.y = 0; s.x = flr(rnd(W)); } }
      if (btnp("a") || btnp("start")) { state = "play"; resetGame(); note(0, "C5", 0.1); setTimeout(() => note(0, "E5", 0.1), 100); setTimeout(() => note(0, "G5", 0.15), 200); }
      return;
    }
    if (state === "gameover") {
      for (const s of stars) { s.y += s.speed * 0.3; if (s.y > H) { s.y = 0; s.x = flr(rnd(W)); } }
      for (let i = particles.length - 1; i >= 0; i--) { const p = particles[i]; p.x += p.vx; p.y += p.vy; p.vy += 0.1; p.life--; if (p.life <= 0) particles.splice(i, 1); }
      if (btnp("a") || btnp("start")) state = "title";
      return;
    }
    diffLevel = 1 + flr(score / 200) * 0.3;
    if (shakeTimer > 0) shakeTimer--;
    if (dashCooldown > 0) dashCooldown--;
    let speed = player.speed;
    if (dashTimer > 0) { speed = player.dashSpeed; dashTimer--; }
    if (btn("left")) player.x -= speed;
    if (btn("right")) player.x += speed;
    if (btn("up")) player.y -= speed;
    if (btn("down")) player.y += speed;
    player.x = _max(0, min(W - 8, player.x));
    player.y = _max(100, min(H - 12, player.y));
    if (btnp("b") && dashCooldown <= 0) { dashTimer = 6; dashCooldown = 30; note(1, "G5", 0.05); addParticle(player.x + 4, player.y + 8, 1); }
    if (btnp("a")) { bullets.push({ x: player.x + 3, y: player.y - 2, speed: -6 }); shootNote(); }
    for (let i = bullets.length - 1; i >= 0; i--) { bullets[i].y += bullets[i].speed; if (bullets[i].y < -8) bullets.splice(i, 1); }
    spawnTimer--;
    if (spawnTimer <= 0) { spawnEnemy(); spawnTimer = _max(10, 40 - flr(diffLevel * 5)); }
    for (let i = enemies.length - 1; i >= 0; i--) {
      const e = enemies[i]; e.y += e.speed; e.wobble += 0.05;
      const wx = e.wobbleAmp * Math.sin(e.wobble);
      e.shootTimer--;
      if (e.shootTimer <= 0 && e.y > 0 && e.y < H * 0.6) { eBullets.push({ x: e.x + 3 + wx, y: e.y + 8, speed: 2 + rnd(1) }); e.shootTimer = 50 + flr(rnd(40)); }
      if (e.y > H + 10) { enemies.splice(i, 1); continue; }
      for (let j = bullets.length - 1; j >= 0; j--) {
        const b = bullets[j];
        if (b.x > e.x + wx - 2 && b.x < e.x + wx + 10 && b.y > e.y - 2 && b.y < e.y + 10) {
          bullets.splice(j, 1); e.hp--;
          if (e.hp <= 0) { addParticle(e.x + wx + 4, e.y + 4); score += e.type === 3 ? 30 : 10; hitNote(); enemies.splice(i, 1); shakeTimer = 4; }
          else note(1, "A4", 0.03);
          break;
        }
      }
    }
    for (let i = eBullets.length - 1; i >= 0; i--) {
      eBullets[i].y += eBullets[i].speed;
      if (eBullets[i].y > H + 8) { eBullets.splice(i, 1); continue; }
      if (dashTimer <= 0) {
        const b = eBullets[i];
        if (b && b.x > player.x && b.x < player.x + 8 && b.y > player.y && b.y < player.y + 8) {
          eBullets.splice(i, 1); lives--; shakeTimer = 8; addParticle(player.x + 4, player.y + 4, 2); deathNote();
          if (lives <= 0) { state = "gameover"; addParticle(player.x + 4, player.y + 4); addParticle(player.x + 4, player.y + 4); }
        }
      }
    }
    for (let i = enemies.length - 1; i >= 0; i--) {
      const e = enemies[i]; const wx = e.wobbleAmp * Math.sin(e.wobble);
      if (dashTimer <= 0 && player.x + 7 > e.x + wx && player.x < e.x + wx + 8 && player.y + 7 > e.y && player.y < e.y + 8) {
        addParticle(player.x + 4, player.y + 4, 3); enemies.splice(i, 1); lives--; shakeTimer = 10; deathNote();
        if (lives <= 0) state = "gameover";
      }
    }
    for (const s of stars) { s.y += s.speed; if (s.y > H) { s.y = 0; s.x = flr(rnd(W)); } }
    for (let i = particles.length - 1; i >= 0; i--) { const p = particles[i]; p.x += p.vx; p.y += p.vy; p.vy += 0.05; p.life--; if (p.life <= 0) particles.splice(i, 1); }
  };
  API._draw = function() {
    const sx = shakeTimer > 0 ? flr(rnd(5)) - 2 : 0;
    const sy = shakeTimer > 0 ? flr(rnd(5)) - 2 : 0;
    cls(0);
    for (const s of stars) pix(s.x + sx, s.y + sy, s.bright);
    if (state === "title") {
      const ty = 80 + Math.sin(API.frame * 0.05) * 5;
      text("STAR PATROL", 175 + sx, flr(ty) + sy, 3);
      text("STAR PATROL", 176 + sx, flr(ty) + 1 + sy, 1);
      rectf(140, flr(ty) + 14, 200, 1, 2);
      spr(1, 236 + sx, flr(ty) + 30 + sy);
      if (flr(API.frame / 20) % 2 === 0) text("PRESS A TO START", 170, 200, 3);
      text("ARROWS: MOVE", 180, 240, 2);
      text("Z: SHOOT  X: DASH", 165, 252, 2);
      text("GRAYBOX DEMO V0.1", 168, 300, 1);
      return;
    }
    if (state === "gameover") {
      for (const s of stars) pix(s.x, s.y, s.bright);
      for (const p of particles) pix(flr(p.x), flr(p.y), p.color);
      text("GAME OVER", 195, 120, 3);
      text("SCORE: " + score, 200, 145, 2);
      if (flr(API.frame / 20) % 2 === 0) text("PRESS A TO CONTINUE", 158, 200, 3);
      return;
    }
    for (const b of eBullets) spr(9, flr(b.x) + sx, flr(b.y) + sy);
    for (const e of enemies) { const wx = e.wobbleAmp * Math.sin(e.wobble); spr(e.type, flr(e.x + wx) + sx, flr(e.y) + sy); }
    for (const b of bullets) spr(4, flr(b.x) + sx, flr(b.y) + sy);
    if (dashTimer > 0 && flr(API.frame / 2) % 2 === 0) {} else spr(1, flr(player.x) + sx, flr(player.y) + sy);
    for (const p of particles) pix(flr(p.x) + sx, flr(p.y) + sy, p.color);
    rectf(0, 0, W, 12, 0);
    text("SCORE:" + score, 4, 3, 3);
    for (let i = 0; i < lives; i++) spr(11, W - 30 + i * 10, 2);
    if (dashCooldown > 0) { const bw = flr((dashCooldown / 30) * 30); rectf(4, H - 6, 32, 3, 1); rectf(5, H - 5, 30 - bw, 1, 2); }
    else text("DASH:OK", 4, H - 8, 2);
  };
  if (API._init) API._init();
  setInterval(tick, 1000 / FPS);
