<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GrayBox — Demo: Missile Command</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #0a0a0a;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100vh;
    font-family: monospace;
    overflow: hidden;
  }
  #frame {
    background: #111;
    border: 3px solid #333;
    border-radius: 8px;
    padding: 12px;
    box-shadow: 0 0 40px rgba(0,0,0,0.8), inset 0 0 20px rgba(0,0,0,0.5);
  }
  canvas {
    display: block;
    image-rendering: pixelated;
    image-rendering: crisp-edges;
  }
  #controls {
    margin-top: 12px;
    color: #6b6b6b;
    font-size: 11px;
    text-align: center;
    letter-spacing: 1px;
  }
  #controls span { color: #b0b0b0; }
</style>
</head>
<body>
<div id="frame">
  <canvas id="screen"></canvas>
</div>
<div id="controls">
  <span>ARROWS</span> AIM &nbsp;&nbsp; <span>Z</span> FIRE &nbsp;&nbsp; <span>ENTER</span> START
</div>
<script>
(() => {
  "use strict";

  // ============================================================
  // GrayBox Runtime (inline)
  // ============================================================
  const W = 320;
  const H = 240;
  const FPS = 30;
  const COLORS = ["#1a1a1a", "#6b6b6b", "#b0b0b0", "#e8e8e8"];
  const canvas = document.getElementById("screen");
  canvas.width = W;
  canvas.height = H;
  function fitCanvas() {
    var maxW = window.innerWidth - 40;
    var maxH = window.innerHeight - 60;
    var s = Math.min(maxW / W, maxH / H);
    canvas.style.width = (W * s) + "px";
    canvas.style.height = (H * s) + "px";
  }
  fitCanvas();
  window.addEventListener("resize", fitCanvas);
  const ctx = canvas.getContext("2d");
  ctx.imageSmoothingEnabled = false;
  const buf = ctx.createImageData(W, H);
  const buf32 = new Uint32Array(buf.data.buffer);

  function hexToABGR(hex) {
    const r = parseInt(hex.slice(1, 3), 16);
    const g = parseInt(hex.slice(3, 5), 16);
    const b = parseInt(hex.slice(5, 7), 16);
    return (255 << 24) | (b << 16) | (g << 8) | r;
  }
  const COLOR_U32 = COLORS.map(hexToABGR);

  const sprites = {};
  const tilemap = {};

  const keyMap = {
    "ArrowUp": "up", "ArrowDown": "down", "ArrowLeft": "left", "ArrowRight": "right",
    "w": "up", "s": "down", "a": "left", "d": "right", "ㅈ": "up", "ㄴ": "down", "ㅁ": "left", "ㅇ": "right",
    "z": "a", "Z": "a", "x": "b", "X": "b", "ㅋ": "a", "ㅌ": "b",
    "Enter": "start", " ": "a"
  };
  const keys = {};
  const keysPrev = {};

  document.addEventListener("keydown", e => {
    const k = keyMap[e.key];
    if (k) { keys[k] = true; e.preventDefault(); }
  });
  document.addEventListener("keyup", e => {
    const k = keyMap[e.key];
    if (k) { keys[k] = false; e.preventDefault(); }
  });

  let audioCtx = null;
  const channels = [null, null];
  const channelGains = [null, null];
  function ensureAudio() {
    if (!audioCtx) {
      audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      for (let i = 0; i < 2; i++) {
        channelGains[i] = audioCtx.createGain();
        channelGains[i].gain.value = 0.15;
        channelGains[i].connect(audioCtx.destination);
      }
    }
  }

  const NOTE_NAMES = ["C","C#","D","D#","E","F","F#","G","G#","A","A#","B"];
  function noteToFreq(noteStr) {
    const match = noteStr.match(/^([A-G]#?)(\d)$/);
    if (!match) return 440;
    const name = match[1];
    const octave = parseInt(match[2]);
    const semitone = NOTE_NAMES.indexOf(name);
    if (semitone === -1) return 440;
    const midi = (octave + 1) * 12 + semitone;
    return 440 * Math.pow(2, (midi - 69) / 12);
  }

  const FONT_W = 4;
  const FONT_H = 7;
  const FONT = {};
  const fontData = {
    "A":"0110100110011111100110011001","B":"1110100110101110100110011110",
    "C":"0110100110001000100001100110","D":"1100101010011001100110101100",
    "E":"1111100010001110100010001111","F":"1111100010001110100010001000",
    "G":"0111100010001011100101100111","H":"1001100110011111100110011001",
    "I":"1110010001000100010001001110","J":"0111001000100010001010100100",
    "K":"1001101011001100101010011001","L":"1000100010001000100010001111",
    "M":"1001111111011001100110011001","N":"1001110111011001100110011001",
    "O":"0110100110011001100110010110","P":"1110100110011110100010001000",
    "Q":"0110100110011001101101100001","R":"1110100110011110101010011001",
    "S":"0111100010000110000110001110","T":"1111001000100010001000100010",
    "U":"1001100110011001100110010110","V":"1001100110011001100101100110",
    "W":"1001100110011001101111011001","X":"1001100101100110011010011001",
    "Y":"1001100101100010001000100010","Z":"1111000100100100100010001111",
    "0":"0110100111011011101110010110","1":"0100110001000100010001001110",
    "2":"0110100100010010010010001111","3":"1110000100010110000110011110",
    "4":"1001100110011111000100010001","5":"1111100010001110000100011110",
    "6":"0110100010001110100110010110","7":"1111000100010010010001001000",
    "8":"0110100110010110100110010110","9":"0110100110010111000100010110",
    " ":"0000000000000000000000000000",
    ".":"0000000000000000000001000100",
    ",":"0000000000000000001000101000",
    "!":"0100010001000100000000000100",
    "?":"0110100100010010000000000010",
    "-":"0000000000001110000000000000",
    "+":"0000001001001110010000100000",
    ":":"0000010001000000010001000000",
    "/":"0001000100100010010010001000",
    "*":"0000101001001110010010100000",
    "#":"0101111101011111010100000000",
    "(":"0010010010001000010001000010",
    ")":"0100001000010001000100100100",
    "=":"0000000011110000111100000000",
    "'":"0100010010000000000000000000",
    "\"":"1010101000000000000000000000",
    "<":"0010010010001000010000100010",
    ">":"1000010000100001001001001000",
    "_":"0000000000000000000000001111",
  };
  for (const [ch, bits] of Object.entries(fontData)) {
    FONT[ch] = [];
    for (let i = 0; i < bits.length; i++) FONT[ch].push(parseInt(bits[i]));
  }

  const API = {};
  API._init = null;
  API._update = null;
  API._draw = null;
  API.frame = 0;

  API.cls = function(c = 0) { buf32.fill(COLOR_U32[c] || COLOR_U32[0]); };
  API.pix = function(x, y, c) {
    x = Math.floor(x); y = Math.floor(y);
    if (x < 0 || x >= W || y < 0 || y >= H) return;
    buf32[y * W + x] = COLOR_U32[c] || COLOR_U32[0];
  };
  API.line = function(x0, y0, x1, y1, c) {
    x0=Math.floor(x0); y0=Math.floor(y0); x1=Math.floor(x1); y1=Math.floor(y1);
    const dx=Math.abs(x1-x0), dy=Math.abs(y1-y0);
    const sx=x0<x1?1:-1, sy=y0<y1?1:-1;
    let err=dx-dy;
    while(true) {
      API.pix(x0,y0,c);
      if(x0===x1&&y0===y1) break;
      const e2=2*err;
      if(e2>-dy){err-=dy;x0+=sx;}
      if(e2<dx){err+=dx;y0+=sy;}
    }
  };
  API.rect = function(x,y,w,h,c) {
    API.line(x,y,x+w-1,y,c); API.line(x+w-1,y,x+w-1,y+h-1,c);
    API.line(x+w-1,y+h-1,x,y+h-1,c); API.line(x,y+h-1,x,y,c);
  };
  API.rectf = function(x,y,w,h,c) {
    x=Math.floor(x); y=Math.floor(y);
    const col=COLOR_U32[c]||COLOR_U32[0];
    for(let py=Math.max(0,y);py<Math.min(H,y+h);py++)
      for(let px=Math.max(0,x);px<Math.min(W,x+w);px++)
        buf32[py*W+px]=col;
  };
  API.circ = function(cx,cy,r,c) {
    let x=r,y=0,d=1-r; cx=Math.floor(cx); cy=Math.floor(cy);
    while(x>=y){
      API.pix(cx+x,cy+y,c);API.pix(cx-x,cy+y,c);
      API.pix(cx+x,cy-y,c);API.pix(cx-x,cy-y,c);
      API.pix(cx+y,cy+x,c);API.pix(cx-y,cy+x,c);
      API.pix(cx+y,cy-x,c);API.pix(cx-y,cy-x,c);
      y++; if(d<0){d+=2*y+1;}else{x--;d+=2*(y-x)+1;}
    }
  };
  API.circf = function(cx,cy,r,c) {
    cx=Math.floor(cx); cy=Math.floor(cy);
    const col=COLOR_U32[c]||COLOR_U32[0]; const r2=r*r;
    for(let py=-r;py<=r;py++) for(let px=-r;px<=r;px++)
      if(px*px+py*py<=r2){ const sx=cx+px,sy=cy+py;
        if(sx>=0&&sx<W&&sy>=0&&sy<H) buf32[sy*W+sx]=col; }
  };
  API.sprite = function(id, data) {
    const arr = new Uint8Array(64); let i = 0;
    for (const ch of data) { if (ch>='0'&&ch<='3') { arr[i++]=parseInt(ch); if(i>=64) break; } }
    sprites[id] = arr;
  };
  API.spr = function(id, x, y, flipX, flipY) {
    const s=sprites[id]; if(!s) return;
    x=Math.floor(x); y=Math.floor(y);
    for(let py=0;py<8;py++) for(let px=0;px<8;px++){
      const sx=flipX?7-px:px, sy=flipY?7-py:py;
      const c=s[sy*8+sx], dx=x+px, dy=y+py;
      if(dx>=0&&dx<W&&dy>=0&&dy<H) buf32[dy*W+dx]=COLOR_U32[c];
    }
  };
  API.text = function(str, x, y, c) {
    str=String(str).toUpperCase(); let cx=Math.floor(x); const cy=Math.floor(y);
    const col=COLOR_U32[c]||COLOR_U32[3];
    for(const ch of str){
      const glyph=FONT[ch];
      if(glyph) for(let py=0;py<FONT_H;py++) for(let px=0;px<FONT_W;px++)
        if(glyph[py*FONT_W+px]){ const dx=cx+px,dy=cy+py;
          if(dx>=0&&dx<W&&dy>=0&&dy<H) buf32[dy*W+dx]=col; }
      cx+=FONT_W+1;
    }
  };
  API.mget = function(cx,cy) { return tilemap[cx+","+cy]||0; };
  API.mset = function(cx,cy,id) { tilemap[cx+","+cy]=id; };
  API.map = function(mx,my,mw,mh,sx,sy) {
    for(let ty=0;ty<mh;ty++) for(let tx=0;tx<mw;tx++){
      const id=API.mget(mx+tx,my+ty); if(id>0) API.spr(id,sx+tx*8,sy+ty*8); }
  };
  API.btn = function(k) { return !!keys[k]; };
  API.btnp = function(k) { return !!keys[k] && !keysPrev[k]; };
  API.note = function(ch, noteStr, dur) {
    ensureAudio(); if(ch<0||ch>1) return; API.stop(ch);
    const osc=audioCtx.createOscillator(); osc.type="square";
    osc.frequency.value=noteToFreq(noteStr);
    osc.connect(channelGains[ch]); osc.start();
    osc.stop(audioCtx.currentTime+dur); channels[ch]=osc;
  };
  API.stop = function(ch) {
    if(ch===undefined){API.stop(0);API.stop(1);return;}
    if(channels[ch]){try{channels[ch].stop();}catch(e){} channels[ch]=null;}
  };
  API.rnd = function(max) { return Math.random()*max; };
  API.flr = Math.floor;
  API.abs = Math.abs;
  API.min = Math.min;
  API.max = Math.max;
  API.sin = Math.sin;
  API.cos = Math.cos;

  function tick() {
    if (API._update) API._update();
    if (API._draw) API._draw();
    ctx.putImageData(buf, 0, 0);
    for (const k in keys) keysPrev[k] = keys[k];
    API.frame++;
  }

  // ============================================================
  // Missile Command Game
  // ============================================================
  const { cls, pix, line, rect, rectf, circ, circf, sprite: defSprite,
          spr, text, btn, btnp, note, stop, rnd, flr, abs: _abs,
          min, max: _max, sin, cos } = API;

  // --- Sprites ---
  // 1: City (intact)
  defSprite(1,
    "00000000" +
    "00322000" +
    "03232300" +
    "03223200" +
    "32233230" +
    "32232230" +
    "33233330" +
    "33333330"
  );
  // 2: City destroyed (rubble)
  defSprite(2,
    "00000000" +
    "00000000" +
    "00000000" +
    "00000000" +
    "00100010" +
    "01010100" +
    "11011010" +
    "11111110"
  );
  // 3: Missile base
  defSprite(3,
    "00000000" +
    "00000000" +
    "00033000" +
    "00333300" +
    "03333330" +
    "33333333" +
    "22222222" +
    "22222222"
  );
  // 4: Missile base destroyed
  defSprite(4,
    "00000000" +
    "00000000" +
    "00000000" +
    "00000000" +
    "00100100" +
    "01001010" +
    "11010101" +
    "11111111"
  );
  // 5: Crosshair center
  defSprite(5,
    "00030000" +
    "00030000" +
    "00000000" +
    "33000330" +
    "33000330" +
    "00000000" +
    "00030000" +
    "00030000"
  );

  // --- Constants ---
  const GROUND_Y = 218;
  const HUD_Y = 4;
  const CURSOR_SPEED = 3;
  const CURSOR_FAST = 5;
  const EXPLOSION_MAX_R = 22;
  const EXPLOSION_GROW_SPEED = 0.8;
  const EXPLOSION_SHRINK_SPEED = 0.5;
  const COUNTER_MISSILE_SPEED = 5;
  const BONUS_CITY_SCORE = 10000;

  // City X positions (6 cities, 3 on each side of center base)
  const CITY_X = [35, 61, 88, 205, 232, 259];
  // Base X positions (left, center, right)
  const BASE_X = [13, 147, 293];
  const BASE_MAX_AMMO = 10;

  // --- Game State ---
  let state = "title";
  let cursor, cities, bases, counterMissiles, explosions, enemyMissiles;
  let score, wave, waveTimer, waveMessage, bonusTally;
  let bonusCityNext, totalScore;
  let titleFlash;

  function resetGame() {
    cursor = { x: W / 2, y: H / 2 };
    cities = [];
    for (let i = 0; i < 6; i++) cities.push({ x: CITY_X[i], alive: true });
    bases = [];
    for (let i = 0; i < 3; i++) bases.push({ x: BASE_X[i], ammo: BASE_MAX_AMMO, alive: true });
    counterMissiles = [];
    explosions = [];
    enemyMissiles = [];
    score = 0;
    totalScore = 0;
    wave = 0;
    waveTimer = 0;
    waveMessage = 0;
    bonusTally = null;
    bonusCityNext = BONUS_CITY_SCORE;
    titleFlash = 0;
  }

  function startWave() {
    wave++;
    waveTimer = 0;
    counterMissiles = [];
    explosions = [];
    enemyMissiles = [];
    // Refill base ammo
    for (const b of bases) { if (b.alive) b.ammo = BASE_MAX_AMMO; }
    // Spawn enemy missiles
    const numMissiles = min(8 + wave * 2, 30);
    const numMirv = min(flr(wave / 2), 8);
    const numSmart = min(flr((wave - 2) / 2), 5);
    const speed = 0.4 + wave * 0.08;
    for (let i = 0; i < numMissiles; i++) {
      const sx = rnd(W);
      const target = pickTarget();
      if (!target) break;
      const isMirv = i < numMirv;
      const isSmart = !isMirv && i < numMirv + numSmart;
      spawnEnemyMissile(sx, -rnd(45) - 8, target.x + 4, target.y,
        isSmart ? speed * 1.8 : speed,
        isMirv, isSmart,
        rnd(120) + i * 8 // delay before active
      );
    }
    waveMessage = 90;
  }

  function pickTarget() {
    const targets = [];
    for (const c of cities) if (c.alive) targets.push({ x: c.x, y: GROUND_Y });
    for (const b of bases) if (b.alive) targets.push({ x: b.x, y: GROUND_Y });
    if (targets.length === 0) return null;
    return targets[flr(rnd(targets.length))];
  }

  function spawnEnemyMissile(sx, sy, tx, ty, speed, mirv, smart, delay) {
    const dx = tx - sx;
    const dy = ty - sy;
    const dist = Math.sqrt(dx * dx + dy * dy);
    const vx = (dx / dist) * speed;
    const vy = (dy / dist) * speed;
    enemyMissiles.push({
      sx: sx, sy: sy, // start (for trail drawing)
      x: sx, y: sy,
      vx: vx, vy: vy,
      tx: tx, ty: ty,
      speed: speed,
      mirv: mirv,
      smart: smart,
      split: false,
      delay: delay || 0,
      active: false
    });
  }

  function findNearestBase(tx, ty) {
    let best = null;
    let bestDist = Infinity;
    for (const b of bases) {
      if (!b.alive || b.ammo <= 0) continue;
      const dx = (b.x + 4) - tx;
      const dy = (GROUND_Y + 4) - ty;
      const d = dx * dx + dy * dy;
      if (d < bestDist) { bestDist = d; best = b; }
    }
    return best;
  }

  function fireCounterMissile(targetX, targetY) {
    const base = findNearestBase(targetX, targetY);
    if (!base) return;
    base.ammo--;
    const bx = base.x + 4;
    const by = GROUND_Y;
    const dx = targetX - bx;
    const dy = targetY - by;
    const dist = Math.sqrt(dx * dx + dy * dy);
    if (dist < 1) return;
    const vx = (dx / dist) * COUNTER_MISSILE_SPEED;
    const vy = (dy / dist) * COUNTER_MISSILE_SPEED;
    counterMissiles.push({
      sx: bx, sy: by,
      x: bx, y: by,
      vx: vx, vy: vy,
      tx: targetX, ty: targetY
    });
    note(0, "E5", 0.03);
  }

  function addExplosion(x, y) {
    explosions.push({ x: x, y: y, r: 1, maxR: EXPLOSION_MAX_R, growing: true, timer: 0 });
  }

  function destroyCity(index) {
    cities[index].alive = false;
    note(1, "C2", 0.2);
    setTimeout(() => note(1, "A1", 0.3), 100);
  }

  function destroyBase(index) {
    bases[index].alive = false;
    bases[index].ammo = 0;
    note(1, "E2", 0.2);
    setTimeout(() => note(1, "C2", 0.3), 100);
  }

  function checkAllDestroyed() {
    for (const c of cities) if (c.alive) return false;
    return true;
  }

  function countSurvivingCities() {
    let n = 0;
    for (const c of cities) if (c.alive) n++;
    return n;
  }

  function countRemainingAmmo() {
    let n = 0;
    for (const b of bases) if (b.alive) n += b.ammo;
    return n;
  }

  function waveComplete() {
    // All enemy missiles gone and no active explosions expanding
    if (enemyMissiles.length > 0) return false;
    for (const e of explosions) if (e.growing) return false;
    return true;
  }

  // Sounds
  function explosionSound() {
    note(1, "C3", 0.08);
    setTimeout(() => note(1, "G2", 0.06), 30);
  }
  function bonusSound() {
    note(0, "C5", 0.08);
    setTimeout(() => note(0, "E5", 0.08), 80);
    setTimeout(() => note(0, "G5", 0.08), 160);
    setTimeout(() => note(0, "C6", 0.12), 240);
  }
  function gameOverSound() {
    note(0, "E3", 0.15); note(1, "C3", 0.15);
    setTimeout(() => { note(0, "C3", 0.2); note(1, "A2", 0.2); }, 150);
    setTimeout(() => { note(0, "A2", 0.3); note(1, "E2", 0.3); }, 350);
  }

  resetGame();

  // ============================================================
  // Update
  // ============================================================
  API._update = function() {
    titleFlash++;

    if (state === "title") {
      if (btnp("a") || btnp("start")) {
        state = "play";
        resetGame();
        startWave();
        note(0, "C5", 0.08);
        setTimeout(() => note(0, "G5", 0.12), 100);
      }
      return;
    }

    if (state === "gameover") {
      if (btnp("a") || btnp("start")) state = "title";
      return;
    }

    if (state === "bonus") {
      // Bonus tally animation
      if (!bonusTally) {
        bonusTally = {
          citiesLeft: countSurvivingCities(),
          ammoLeft: countRemainingAmmo(),
          cityCount: 0,
          ammoCount: 0,
          phase: 0, // 0=counting cities, 1=counting ammo, 2=done
          timer: 0,
          bonusTotal: 0
        };
      }
      bonusTally.timer++;
      if (bonusTally.phase === 0) {
        if (bonusTally.timer % 8 === 0 && bonusTally.cityCount < bonusTally.citiesLeft) {
          bonusTally.cityCount++;
          bonusTally.bonusTotal += 100;
          score += 100;
          note(0, "E5", 0.04);
        }
        if (bonusTally.cityCount >= bonusTally.citiesLeft) {
          bonusTally.phase = 1;
          bonusTally.timer = 0;
        }
      } else if (bonusTally.phase === 1) {
        if (bonusTally.timer % 4 === 0 && bonusTally.ammoCount < bonusTally.ammoLeft) {
          bonusTally.ammoCount++;
          bonusTally.bonusTotal += 5;
          score += 5;
          note(0, "C5", 0.02);
        }
        if (bonusTally.ammoCount >= bonusTally.ammoLeft) {
          bonusTally.phase = 2;
          bonusTally.timer = 0;
        }
      } else {
        if (bonusTally.timer > 60) {
          // Check for bonus city
          if (score >= bonusCityNext) {
            bonusCityNext += BONUS_CITY_SCORE;
            // Restore a destroyed city
            for (let i = 0; i < 6; i++) {
              if (!cities[i].alive) { cities[i].alive = true; bonusSound(); break; }
            }
          }
          bonusTally = null;
          state = "play";
          startWave();
        }
      }
      return;
    }

    // --- Play state ---
    if (waveMessage > 0) waveMessage--;

    // Cursor movement
    const spd = btn("b") ? CURSOR_FAST : CURSOR_SPEED;
    if (btn("left")) cursor.x -= spd;
    if (btn("right")) cursor.x += spd;
    if (btn("up")) cursor.y -= spd;
    if (btn("down")) cursor.y += spd;
    cursor.x = _max(4, min(W - 4, cursor.x));
    cursor.y = _max(12, min(GROUND_Y - 8, cursor.y));

    // Fire counter-missile
    if (btnp("a")) {
      fireCounterMissile(cursor.x, cursor.y);
    }

    // Update counter-missiles
    for (let i = counterMissiles.length - 1; i >= 0; i--) {
      const m = counterMissiles[i];
      m.x += m.vx;
      m.y += m.vy;
      // Check if reached target
      const dx = m.x - m.tx;
      const dy = m.y - m.ty;
      if (dx * dx + dy * dy < COUNTER_MISSILE_SPEED * COUNTER_MISSILE_SPEED + 4) {
        addExplosion(m.tx, m.ty);
        explosionSound();
        counterMissiles.splice(i, 1);
      }
    }

    // Update explosions
    for (let i = explosions.length - 1; i >= 0; i--) {
      const e = explosions[i];
      if (e.growing) {
        e.r += EXPLOSION_GROW_SPEED;
        if (e.r >= e.maxR) {
          e.growing = false;
          e.timer = 15; // hold at max size
        }
      } else {
        if (e.timer > 0) {
          e.timer--;
        } else {
          e.r -= EXPLOSION_SHRINK_SPEED;
          if (e.r <= 0) { explosions.splice(i, 1); continue; }
        }
      }
    }

    // Update enemy missiles
    for (let i = enemyMissiles.length - 1; i >= 0; i--) {
      const m = enemyMissiles[i];
      if (m.delay > 0) { m.delay--; continue; }
      m.active = true;
      m.x += m.vx;
      m.y += m.vy;

      // MIRV split
      if (m.mirv && !m.split && m.y > 60 + rnd(45)) {
        m.split = true;
        // Split into 3 warheads
        for (let j = 0; j < 2; j++) {
          const target = pickTarget();
          if (target) {
            spawnEnemyMissile(m.x, m.y, target.x + 4, target.y, m.speed * 1.1, false, false, 0);
            enemyMissiles[enemyMissiles.length - 1].active = true;
            enemyMissiles[enemyMissiles.length - 1].delay = 0;
          }
        }
      }

      // Check collision with explosions
      let destroyed = false;
      for (const e of explosions) {
        const dx = m.x - e.x;
        const dy = m.y - e.y;
        if (dx * dx + dy * dy < e.r * e.r) {
          destroyed = true;
          score += 25;
          // Chain explosion for destroyed missiles
          addExplosion(m.x, m.y);
          note(0, "A4", 0.03);
          break;
        }
      }
      if (destroyed) { enemyMissiles.splice(i, 1); continue; }

      // Check if hit ground
      if (m.y >= GROUND_Y) {
        // Check if hit a city
        for (let ci = 0; ci < 6; ci++) {
          if (!cities[ci].alive) continue;
          if (_abs(m.x - (cities[ci].x + 4)) < 10) {
            destroyCity(ci);
            break;
          }
        }
        // Check if hit a base
        for (let bi = 0; bi < 3; bi++) {
          if (!bases[bi].alive) continue;
          if (_abs(m.x - (bases[bi].x + 4)) < 10) {
            destroyBase(bi);
            break;
          }
        }
        addExplosion(m.x, GROUND_Y - 4);
        explosionSound();
        enemyMissiles.splice(i, 1);
        continue;
      }
    }

    // Check bonus city
    if (score >= bonusCityNext) {
      bonusCityNext += BONUS_CITY_SCORE;
      for (let i = 0; i < 6; i++) {
        if (!cities[i].alive) { cities[i].alive = true; bonusSound(); break; }
      }
    }

    // Check game over
    if (checkAllDestroyed()) {
      // Wait for explosions to clear
      if (explosions.length === 0 && enemyMissiles.length === 0) {
        state = "gameover";
        gameOverSound();
      }
      return;
    }

    // Check wave complete
    if (waveComplete() && counterMissiles.length === 0 && waveMessage === 0) {
      waveTimer++;
      if (waveTimer > 30) {
        state = "bonus";
        bonusTally = null;
      }
    }
  };

  // ============================================================
  // Draw
  // ============================================================
  API._draw = function() {
    cls(0);

    if (state === "title") {
      // Title screen
      text("MISSILE COMMAND", W / 2 - 37, 45, 3);
      // Korean subtitle
      text("- CITY DEFENSE -", W / 2 - 40, 59, 2);

      // Draw some decorative cities
      for (let i = 0; i < 6; i++) {
        spr(1, 53 + i * 37, 150);
      }
      // Ground line
      rectf(0, 158, W, 2, 1);

      // Animated missiles raining down (decorative)
      for (let i = 0; i < 5; i++) {
        const mx = 40 + i * 60;
        const my = 75 + sin(titleFlash * 0.05 + i) * 22;
        line(mx, my - 15, mx + 3, my, 2);
      }

      if (flr(titleFlash / 20) % 2 === 0) {
        text("PRESS START", W / 2 - 27, 109, 3);
      }

      text("ARROWS:AIM  Z:FIRE  X:FAST AIM", W / 2 - 77, 188, 1);
      text("DEFEND YOUR CITIES!", W / 2 - 47, 203, 2);
      return;
    }

    // --- Draw game elements ---

    // Ground
    rectf(0, GROUND_Y, W, H - GROUND_Y, 1);
    // Ground top line
    rectf(0, GROUND_Y, W, 2, 2);

    // Draw enemy missile trails
    for (const m of enemyMissiles) {
      if (!m.active) continue;
      line(m.sx, m.sy, m.x, m.y, 2);
      // Warhead
      pix(m.x, m.y, 3);
      pix(m.x - 1, m.y, 3);
      pix(m.x + 1, m.y, 3);
      pix(m.x, m.y - 1, 3);
      if (m.smart) {
        pix(m.x - 1, m.y - 1, 3);
        pix(m.x + 1, m.y - 1, 3);
      }
    }

    // Draw counter-missile trails
    for (const m of counterMissiles) {
      line(m.sx, m.sy, m.x, m.y, 3);
      // Trail head
      pix(m.x, m.y, 3);
    }

    // Draw target markers for counter-missiles
    for (const m of counterMissiles) {
      // Small X at target
      pix(m.tx - 1, m.ty - 1, 2);
      pix(m.tx + 1, m.ty - 1, 2);
      pix(m.tx, m.ty, 2);
      pix(m.tx - 1, m.ty + 1, 2);
      pix(m.tx + 1, m.ty + 1, 2);
    }

    // Draw explosions
    for (const e of explosions) {
      const r = flr(e.r);
      if (r > 0) {
        // Multi-layered explosion for visual effect
        if (r > 3) circf(e.x, e.y, r, 1);
        if (r > 2) circf(e.x, e.y, flr(r * 0.7), 2);
        circf(e.x, e.y, _max(1, flr(r * 0.4)), 3);
        // Flicker effect
        if (e.growing && API.frame % 3 === 0) {
          circf(e.x, e.y, r, 3);
        }
      }
    }

    // Draw cities
    for (let i = 0; i < 6; i++) {
      spr(cities[i].alive ? 1 : 2, cities[i].x, GROUND_Y - 8);
    }

    // Draw bases
    for (let i = 0; i < 3; i++) {
      spr(bases[i].alive ? 3 : 4, bases[i].x, GROUND_Y - 8);
      // Ammo count display (dots below base)
      if (bases[i].alive) {
        const bx = bases[i].x;
        for (let a = 0; a < bases[i].ammo; a++) {
          const ax = bx + (a % 5) * 2;
          const ay = GROUND_Y + 4 + flr(a / 5) * 2;
          pix(ax, ay, 3);
        }
      }
    }

    // Draw crosshair cursor
    if (state === "play") {
      const cx = flr(cursor.x);
      const cy = flr(cursor.y);
      // Crosshair lines
      line(cx - 6, cy, cx - 2, cy, 3);
      line(cx + 2, cy, cx + 6, cy, 3);
      line(cx, cy - 6, cx, cy - 2, 3);
      line(cx, cy + 2, cx, cy + 6, 3);
      // Center dot (blinking)
      if (API.frame % 4 < 3) pix(cx, cy, 3);
    }

    // HUD
    text("SCORE:" + String(score).padStart(6, "0"), 4, HUD_Y, 3);
    text("WAVE:" + wave, W - 50, HUD_Y, 2);

    // Wave message
    if (waveMessage > 0 && state === "play") {
      const msg = "WAVE " + wave;
      if (waveMessage > 30 || flr(waveMessage / 5) % 2 === 0) {
        text(msg, W / 2 - msg.length * 2.5, H / 2 - 20, 3);
      }
      text("DEFEND YOUR CITIES!", W / 2 - 47, H / 2 - 6, 2);
    }

    // Bonus tally screen
    if (state === "bonus" && bonusTally) {
      rectf(W / 2 - 67, 53, 134, 105, 0);
      rect(W / 2 - 67, 53, 134, 105, 2);
      text("BONUS POINTS", W / 2 - 30, 62, 3);

      text("CITIES:" + bonusTally.cityCount + " X 100", W / 2 - 47, 83, 2);
      // Draw city icons
      for (let i = 0; i < bonusTally.cityCount; i++) {
        spr(1, W / 2 - 40 + i * 12, 93);
      }

      text("AMMO:" + bonusTally.ammoCount + " X 5", W / 2 - 40, 109, 2);

      text("TOTAL:" + bonusTally.bonusTotal, W / 2 - 37, 131, 3);
    }

    // Game over screen
    if (state === "gameover") {
      rectf(W / 2 - 53, H / 2 - 22, 107, 45, 0);
      rect(W / 2 - 53, H / 2 - 22, 107, 45, 2);
      text("GAME OVER", W / 2 - 22, H / 2 - 16, 3);
      text("THE END", W / 2 - 17, H / 2 - 2, 2);
      text("SCORE:" + String(score).padStart(6, "0"), W / 2 - 32, H / 2 + 10, 3);
    }
  };

  // ============================================================
  // Boot
  // ============================================================
  setInterval(tick, 1000 / FPS);
})();
</script>
