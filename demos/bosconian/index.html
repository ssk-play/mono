<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GrayBox — Demo: Bosconian</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #0a0a0a;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100vh;
    font-family: monospace;
    overflow: hidden;
  }
  #frame {
    background: #111;
    border: 3px solid #333;
    border-radius: 8px;
    padding: 12px;
    box-shadow: 0 0 40px rgba(0,0,0,0.8), inset 0 0 20px rgba(0,0,0,0.5);
  }
  canvas {
    display: block;
    image-rendering: pixelated;
    image-rendering: crisp-edges;
  }
  #controls {
    margin-top: 12px;
    color: #6b6b6b;
    font-size: 11px;
    text-align: center;
    letter-spacing: 1px;
  }
  #controls span { color: #b0b0b0; }
</style>
</head>
<body>
<div id="frame">
  <canvas id="screen"></canvas>
</div>
<div id="controls">
  <span>ARROWS</span> MOVE &nbsp;&nbsp; <span>Z</span> SHOOT &nbsp;&nbsp; <span>ENTER</span> START
</div>
<script>
(() => {
  "use strict";

  // ============================================================
  // GrayBox Runtime (inline)
  // ============================================================
  const W = 480;
  const H = 320;
  const SCALE = 2;
  const FPS = 30;
  const COLORS = ["#1a1a1a", "#6b6b6b", "#b0b0b0", "#e8e8e8"];
  const canvas = document.getElementById("screen");
  canvas.width = W;
  canvas.height = H;
  canvas.style.width = (W * SCALE) + "px";
  canvas.style.height = (H * SCALE) + "px";
  const ctx = canvas.getContext("2d");
  ctx.imageSmoothingEnabled = false;
  const buf = ctx.createImageData(W, H);
  const buf32 = new Uint32Array(buf.data.buffer);

  function hexToABGR(hex) {
    const r = parseInt(hex.slice(1, 3), 16);
    const g = parseInt(hex.slice(3, 5), 16);
    const b = parseInt(hex.slice(5, 7), 16);
    return (255 << 24) | (b << 16) | (g << 8) | r;
  }
  const COLOR_U32 = COLORS.map(hexToABGR);

  const sprites = {};
  const tilemap = {};

  const keyMap = {
    "ArrowUp": "up", "ArrowDown": "down", "ArrowLeft": "left", "ArrowRight": "right",
    "w": "up", "s": "down", "a": "left", "d": "right",
    "z": "a", "Z": "a", "x": "b", "X": "b",
    "Enter": "start", " ": "a"
  };
  const keys = {};
  const keysPrev = {};

  document.addEventListener("keydown", e => {
    const k = keyMap[e.key];
    if (k) { keys[k] = true; e.preventDefault(); }
  });
  document.addEventListener("keyup", e => {
    const k = keyMap[e.key];
    if (k) { keys[k] = false; e.preventDefault(); }
  });

  let audioCtx = null;
  const channels = [null, null];
  const channelGains = [null, null];
  function ensureAudio() {
    if (!audioCtx) {
      audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      for (let i = 0; i < 2; i++) {
        channelGains[i] = audioCtx.createGain();
        channelGains[i].gain.value = 0.15;
        channelGains[i].connect(audioCtx.destination);
      }
    }
  }

  const NOTE_NAMES = ["C","C#","D","D#","E","F","F#","G","G#","A","A#","B"];
  function noteToFreq(noteStr) {
    const match = noteStr.match(/^([A-G]#?)(\d)$/);
    if (!match) return 440;
    const name = match[1];
    const octave = parseInt(match[2]);
    const semitone = NOTE_NAMES.indexOf(name);
    if (semitone === -1) return 440;
    const midi = (octave + 1) * 12 + semitone;
    return 440 * Math.pow(2, (midi - 69) / 12);
  }

  const FONT_W = 4;
  const FONT_H = 6;
  const FONT = {};
  const fontData = {
    "A":"0110100110011111100110011001","B":"1110100110101110100110011110",
    "C":"0110100110001000100001100110","D":"1100101010011001100110101100",
    "E":"1111100010001110100010001111","F":"1111100010001110100010001000",
    "G":"0111100010001011100101100111","H":"1001100110011111100110011001",
    "I":"1110010001000100010001001110","J":"0111001000100010001010100100",
    "K":"1001101011001100101010011001","L":"1000100010001000100010001111",
    "M":"1001111111011001100110011001","N":"1001110111011001100110011001",
    "O":"0110100110011001100110010110","P":"1110100110011110100010001000",
    "Q":"0110100110011001101101100001","R":"1110100110011110101010011001",
    "S":"0111100010000110000110001110","T":"1111001000100010001000100010",
    "U":"1001100110011001100110010110","V":"1001100110011001100101100110",
    "W":"1001100110011001101111011001","X":"1001100101100110011010011001",
    "Y":"1001100101100010001000100010","Z":"1111000100100100100010001111",
    "0":"0110100111011011101110010110","1":"0100110001000100010001001110",
    "2":"0110100100010010010010001111","3":"1110000100010110000110011110",
    "4":"1001100110011111000100010001","5":"1111100010001110000100011110",
    "6":"0110100010001110100110010110","7":"1111000100010010010001001000",
    "8":"0110100110010110100110010110","9":"0110100110010111000100010110",
    " ":"0000000000000000000000000000",
    ".":"0000000000000000000001000100",
    ",":"0000000000000000001000101000",
    "!":"0100010001000100000000000100",
    "?":"0110100100010010000000000010",
    "-":"0000000000001110000000000000",
    "+":"0000001001001110010000100000",
    ":":"0000010001000000010001000000",
    "/":"0001000100100010010010001000",
    "*":"0000101001001110010010100000",
    "#":"0101111101011111010100000000",
    "(":"0010010010001000010001000010",
    ")":"0100001000010001000100100100",
    "=":"0000000011110000111100000000",
    "'":"0100010010000000000000000000",
    "\"":"1010101000000000000000000000",
    "<":"0010010010001000010000100010",
    ">":"1000010000100001001001001000",
    "_":"0000000000000000000000001111",
  };
  for (const [ch, bits] of Object.entries(fontData)) {
    FONT[ch] = [];
    for (let i = 0; i < bits.length; i++) FONT[ch].push(parseInt(bits[i]));
  }

  const API = {};
  API._init = null;
  API._update = null;
  API._draw = null;
  API.frame = 0;

  API.cls = function(c = 0) { buf32.fill(COLOR_U32[c] || COLOR_U32[0]); };
  API.pix = function(x, y, c) {
    x = Math.floor(x); y = Math.floor(y);
    if (x < 0 || x >= W || y < 0 || y >= H) return;
    buf32[y * W + x] = COLOR_U32[c] || COLOR_U32[0];
  };
  API.line = function(x0, y0, x1, y1, c) {
    x0=Math.floor(x0); y0=Math.floor(y0); x1=Math.floor(x1); y1=Math.floor(y1);
    const dx=Math.abs(x1-x0), dy=Math.abs(y1-y0);
    const sx=x0<x1?1:-1, sy=y0<y1?1:-1;
    let err=dx-dy;
    while(true) {
      API.pix(x0,y0,c);
      if(x0===x1&&y0===y1) break;
      const e2=2*err;
      if(e2>-dy){err-=dy;x0+=sx;}
      if(e2<dx){err+=dx;y0+=sy;}
    }
  };
  API.rect = function(x,y,w,h,c) {
    API.line(x,y,x+w-1,y,c); API.line(x+w-1,y,x+w-1,y+h-1,c);
    API.line(x+w-1,y+h-1,x,y+h-1,c); API.line(x,y+h-1,x,y,c);
  };
  API.rectf = function(x,y,w,h,c) {
    x=Math.floor(x); y=Math.floor(y);
    const col=COLOR_U32[c]||COLOR_U32[0];
    for(let py=Math.max(0,y);py<Math.min(H,y+h);py++)
      for(let px=Math.max(0,x);px<Math.min(W,x+w);px++)
        buf32[py*W+px]=col;
  };
  API.circ = function(cx,cy,r,c) {
    let x=r,y=0,d=1-r; cx=Math.floor(cx); cy=Math.floor(cy);
    while(x>=y){
      API.pix(cx+x,cy+y,c);API.pix(cx-x,cy+y,c);
      API.pix(cx+x,cy-y,c);API.pix(cx-x,cy-y,c);
      API.pix(cx+y,cy+x,c);API.pix(cx-y,cy+x,c);
      API.pix(cx+y,cy-x,c);API.pix(cx-y,cy-x,c);
      y++; if(d<0){d+=2*y+1;}else{x--;d+=2*(y-x)+1;}
    }
  };
  API.circf = function(cx,cy,r,c) {
    cx=Math.floor(cx); cy=Math.floor(cy);
    const col=COLOR_U32[c]||COLOR_U32[0]; const r2=r*r;
    for(let py=-r;py<=r;py++) for(let px=-r;px<=r;px++)
      if(px*px+py*py<=r2){ const sx=cx+px,sy=cy+py;
        if(sx>=0&&sx<W&&sy>=0&&sy<H) buf32[sy*W+sx]=col; }
  };
  API.sprite = function(id, data) {
    const arr = new Uint8Array(64); let i = 0;
    for (const ch of data) { if (ch>='0'&&ch<='3') { arr[i++]=parseInt(ch); if(i>=64) break; } }
    sprites[id] = arr;
  };
  API.spr = function(id, x, y, flipX, flipY) {
    const s=sprites[id]; if(!s) return;
    x=Math.floor(x); y=Math.floor(y);
    for(let py=0;py<8;py++) for(let px=0;px<8;px++){
      const sx=flipX?7-px:px, sy=flipY?7-py:py;
      const c=s[sy*8+sx], dx=x+px, dy=y+py;
      if(c>0&&dx>=0&&dx<W&&dy>=0&&dy<H) buf32[dy*W+dx]=COLOR_U32[c];
    }
  };
  API.text = function(str, x, y, c) {
    str=String(str).toUpperCase(); let cx=Math.floor(x); const cy=Math.floor(y);
    const col=COLOR_U32[c]||COLOR_U32[3];
    for(const ch of str){
      const glyph=FONT[ch];
      if(glyph) for(let py=0;py<FONT_H;py++) for(let px=0;px<FONT_W;px++)
        if(glyph[py*FONT_W+px]){ const dx=cx+px,dy=cy+py;
          if(dx>=0&&dx<W&&dy>=0&&dy<H) buf32[dy*W+dx]=col; }
      cx+=FONT_W+1;
    }
  };
  API.mget = function(cx,cy) { return tilemap[cx+","+cy]||0; };
  API.mset = function(cx,cy,id) { tilemap[cx+","+cy]=id; };
  API.map = function(mx,my,mw,mh,sx,sy) {
    for(let ty=0;ty<mh;ty++) for(let tx=0;tx<mw;tx++){
      const id=API.mget(mx+tx,my+ty); if(id>0) API.spr(id,sx+tx*8,sy+ty*8); }
  };
  API.btn = function(k) { return !!keys[k]; };
  API.btnp = function(k) { return !!keys[k] && !keysPrev[k]; };
  API.note = function(ch, noteStr, dur) {
    ensureAudio(); if(ch<0||ch>1) return; API.stop(ch);
    const osc=audioCtx.createOscillator(); osc.type="square";
    osc.frequency.value=noteToFreq(noteStr);
    osc.connect(channelGains[ch]); osc.start();
    osc.stop(audioCtx.currentTime+dur); channels[ch]=osc;
  };
  API.stop = function(ch) {
    if(ch===undefined){API.stop(0);API.stop(1);return;}
    if(channels[ch]){try{channels[ch].stop();}catch(e){} channels[ch]=null;}
  };
  API.rnd = function(max) { return Math.random()*max; };
  API.flr = Math.floor;
  API.abs = Math.abs;
  API.min = Math.min;
  API.max = Math.max;
  API.sin = Math.sin;
  API.cos = Math.cos;
  API.atan2 = Math.atan2;

  function tick() {
    if (API._update) API._update();
    if (API._draw) API._draw();
    ctx.putImageData(buf, 0, 0);
    for (const k in keys) keysPrev[k] = keys[k];
    API.frame++;
  }

  // ============================================================
  // Bosconian Game
  // ============================================================
  const { cls, pix, line, rect, rectf, circ, circf, sprite: defSprite,
          spr, text, btn, btnp, note, stop, rnd, flr, abs: _abs,
          min, max: _max, sin, cos, atan2 } = API;

  // --- Sprites ---

  // 1: Player ship - facing up (arrow/fighter shape)
  defSprite(1,
    "00033000" +
    "00333300" +
    "01333310" +
    "31322130" +
    "31333130" +
    "01333310" +
    "03100130" +
    "01000010"
  );
  // 2: Player ship facing right
  defSprite(2,
    "00031100" +
    "00133310" +
    "01333331" +
    "33323331" +
    "33323331" +
    "01333331" +
    "00133310" +
    "00031100"
  );
  // 3: Player ship facing down
  defSprite(3,
    "01000010" +
    "03100130" +
    "01333310" +
    "31333130" +
    "31322130" +
    "01333310" +
    "00333300" +
    "00033000"
  );
  // 4: Player ship facing left
  defSprite(4,
    "00110300" +
    "01333100" +
    "13333310" +
    "13332330" +
    "13332330" +
    "13333310" +
    "01333100" +
    "00110300"
  );
  // 5: Player bullet
  defSprite(5,
    "00000000" +
    "00000000" +
    "00030000" +
    "00030000" +
    "00020000" +
    "00020000" +
    "00000000" +
    "00000000"
  );
  // 6: Station core (bright center piece)
  defSprite(6,
    "00222200" +
    "02333320" +
    "23333332" +
    "23313332" +
    "23333132" +
    "23333332" +
    "02333320" +
    "00222200"
  );
  // 7: Station pod (destructible outer pod) — active
  defSprite(7,
    "00111100" +
    "01233210" +
    "12333321" +
    "13333331" +
    "13333331" +
    "12333321" +
    "01233210" +
    "00111100"
  );
  // 8: Station pod — destroyed (dark remnant)
  defSprite(8,
    "00000000" +
    "00011000" +
    "00100100" +
    "01000010" +
    "01000010" +
    "00100100" +
    "00011000" +
    "00000000"
  );
  // 9: Enemy fighter type A (dart shape)
  defSprite(9,
    "00010000" +
    "00110000" +
    "01221000" +
    "12222100" +
    "12222100" +

  );
  // 10: Enemy fighter type B (interceptor)
  defSprite(10,
    "00020000" +
    "00222000" +
    "02111200" +
    "21111120" +
    "21111120" +

  );
  // 11: Enemy missile (small fast projectile)
  defSprite(11,
    "00000000" +
    "00020000" +
    "00030000" +
    "00130000" +

  );
  // 12: Space mine
  defSprite(12,
    "00011000" +
    "00100100" +
    "01022010" +
    "10233201" +
    "10233201" +

    "00011000"
  );
  // 13: Explosion frame 1
  defSprite(13,
    "00000000" +
    "00200100" +
    "01002000" +
    "00031000" +

  );
  // 14: Explosion frame 2
  defSprite(14,
    "20010020" +
    "01000010" +
    "00203200" +

  );
  // 15: Life icon
  defSprite(15,
    "00000000" +
    "00033000" +
    "00333300" +
    "03133130" +

  );
  // 16: Star (dim)
  defSprite(16,
    "00000000" +
    "00000000" +

  );
  // 17: Station connector (horizontal bar between core and pod)
  defSprite(17,
    "00000000" +

  );
  // 18: Station connector vertical
  defSprite(18,
    "00012000" +
    "00012000" +

  );
  // 19: Diagonal ship up-right
  defSprite(19,
    "00000331" +
    "00003310" +
    "00033210" +
    "00332100" +
    "03321000" +
    "03210000" +
    "01100000" +
    "01000000"
  );
  // 20: Diagonal ship up-left
  defSprite(20,
    "13300000" +
    "01330000" +
    "01233000" +
    "00123300" +
    "00012330" +
    "00001230" +
    "00000110" +
    "00000010"
  );
  // 21: Diagonal ship down-right
  defSprite(21,
    "01000000" +
    "01100000" +
    "03210000" +
    "03321000" +
    "00332100" +
    "00033210" +
    "00003310" +
    "00000331"
  );
  // 22: Diagonal ship down-left
  defSprite(22,
    "00000010" +
    "00000110" +
    "00001230" +
    "00012330" +
    "00123300" +
    "01233000" +
    "01330000" +
    "13300000"
  );

  // --- Game constants ---
  const WORLD_W = 2048;
  const WORLD_H = 2048;
  const PLAY_X = 0;
  const PLAY_Y = 16;
  const PLAY_W = W;
  const PLAY_H = H - 16;
  const RADAR_X = W - 64;
  const RADAR_Y = PLAY_Y + 2;
  const RADAR_W = 60;
  const RADAR_H = 48;

  // direction vectors for 8 directions (up=0, clockwise)
  const DIR_DX = [0, 1, 1, 1, 0, -1, -1, -1];
  const DIR_DY = [-1, -1, 0, 1, 1, 1, 0, -1];
  // Sprite IDs for each direction: up, upright, right, downright, down, downleft, left, upleft
  const SHIP_SPR = [1, 19, 2, 21, 3, 22, 4, 20];

  // --- Game state ---
  let state = "title";
  let player, bullets, eBullets, enemies, stations, mines, explosions, particles, stars;
  let score, lives, round, camX, camY;
  let shootCooldown, invTimer, respawnTimer;
  let condition; // 0=green, 1=yellow, 2=red
  let condTimer, condFlash;
  let titleBlink;

  function wrap(v, max) { return ((v % max) + max) % max; }
  function wrapDist(a, b, max) {
    let d = b - a;
    if (d > max / 2) d -= max;
    if (d < -max / 2) d += max;
    return d;
  }
  function wrapDistXY(ax, ay, bx, by) {
    const dx = wrapDist(ax, bx, WORLD_W);
    const dy = wrapDist(ay, by, WORLD_H);
    return Math.sqrt(dx * dx + dy * dy);
  }

  function resetGame() {
    player = { x: WORLD_W / 2, y: WORLD_H / 2, dir: 0, speed: 2.8 };
    bullets = [];
    eBullets = [];
    enemies = [];
    stations = [];
    mines = [];
    explosions = [];
    particles = [];
    score = 0;
    lives = 3;
    round = 0;
    shootCooldown = 0;
    invTimer = 0;
    respawnTimer = 0;
    condition = 0;
    condTimer = 0;
    condFlash = 0;
    titleBlink = 0;
    stars = [];
    for (let i = 0; i < 120; i++) {
      stars.push({
        x: flr(rnd(WORLD_W)), y: flr(rnd(WORLD_H)),
        bright: flr(rnd(2)) + 1
      });
    }
    spawnRound();
  }

  function spawnRound() {
    round++;
    enemies = [];
    stations = [];
    mines = [];
    bullets = [];
    eBullets = [];
    condition = 0;
    condTimer = 0;

    // Spawn stations — 4 + round (max 8)
    const numStations = min(4 + round, 8);
    for (let i = 0; i < numStations; i++) {
      let sx, sy, tooClose;
      // find position not too close to player or other stations
      do {
        sx = 100 + flr(rnd(WORLD_W - 200));
        sy = 100 + flr(rnd(WORLD_H - 200));
        tooClose = wrapDistXY(sx, sy, player.x, player.y) < 300;
        for (const st of stations) {
          if (wrapDistXY(sx, sy, st.x, st.y) < 200) tooClose = true;
        }
      } while (tooClose);

      const pods = [];
      // 6 pods around core at 60-degree intervals
      for (let p = 0; p < 6; p++) {
        const angle = p * Math.PI / 3;
        pods.push({
          ox: Math.cos(angle) * 20,
          oy: Math.sin(angle) * 20,
          alive: true
        });
      }
      stations.push({ x: sx, y: sy, pods: pods, alive: true });
    }

    // Spawn mines
    const numMines = 10 + round * 4;
    for (let i = 0; i < numMines; i++) {
      mines.push({
        x: flr(rnd(WORLD_W)),
        y: flr(rnd(WORLD_H)),
        alive: true
      });
    }
  }

  function spawnEnemy() {
    // Spawn enemy at edge of screen relative to player
    const angle = rnd(Math.PI * 2);
    const dist = 280 + rnd(80);
    const ex = wrap(player.x + Math.cos(angle) * dist, WORLD_W);
    const ey = wrap(player.y + Math.sin(angle) * dist, WORLD_H);
    const type = rnd(1) < 0.6 ? 9 : 10;
    // aim towards player
    const dx = wrapDist(ex, player.x, WORLD_W);
    const dy = wrapDist(ey, player.y, WORLD_H);
    const a = atan2(dy, dx);
    const spd = type === 9 ? (1.5 + round * 0.15) : (2.0 + round * 0.2);
    enemies.push({
      x: ex, y: ey, type: type,
      vx: Math.cos(a) * spd,
      vy: Math.sin(a) * spd,
      life: 90 + flr(rnd(120)),
      shootTimer: 30 + flr(rnd(60))
    });
  }

  function addExplosion(x, y, big) {
    explosions.push({ x: x - 4, y: y - 4, timer: big ? 18 : 10 });
    const n = big ? 12 : 6;
    for (let i = 0; i < n; i++) {
      particles.push({
        x: x, y: y,
        vx: rnd(4) - 2, vy: rnd(4) - 2,
        life: 6 + flr(rnd(10)),
        color: flr(rnd(3)) + 1
      });
    }
  }

  // --- Sound ---
  function shootSound() { note(0, "C6", 0.03); }
  function hitSound() { note(1, "C3", 0.06); setTimeout(() => note(1, "E3", 0.05), 40); }
  function stationDestroySound() {
    note(0, "G3", 0.12); note(1, "C3", 0.15);
    setTimeout(() => { note(0, "E3", 0.12); note(1, "A2", 0.15); }, 100);
    setTimeout(() => { note(0, "C3", 0.2); }, 200);
  }
  function deathSound() {
    note(0, "C3", 0.12); note(1, "G2", 0.12);
    setTimeout(() => { note(0, "A2", 0.18); note(1, "E2", 0.18); }, 120);
  }
  function roundClearSound() {
    note(0, "C5", 0.1);
    setTimeout(() => note(0, "E5", 0.1), 100);
    setTimeout(() => note(0, "G5", 0.1), 200);
    setTimeout(() => note(0, "C6", 0.15), 300);
  }
  function alertSound() { note(1, "A5", 0.05); }

  // screen position from world position
  function toScreen(wx, wy) {
    let sx = wrapDist(camX, wx, WORLD_W);
    let sy = wrapDist(camY, wy, WORLD_H);
    return { x: sx + PLAY_W / 2, y: sy + PLAY_H / 2 + PLAY_Y };
  }

  function onScreen(sx, sy, margin) {
    return sx > -margin && sx < PLAY_W + margin && sy > PLAY_Y - margin && sy < H + margin;
  }

  function collides(ax, ay, aw, ah, bx, by, bw, bh) {
    return ax < bx + bw && ax + aw > bx && ay < by + bh && ay + ah > by;
  }

  resetGame();

  // ============================================================
  // Update
  // ============================================================
  API._update = function() {
    titleBlink++;

    if (state === "title") {
      if (btnp("a") || btnp("start")) {
        state = "play";
        resetGame();
        invTimer = 60;
        note(0, "C5", 0.1);
        setTimeout(() => note(0, "E5", 0.1), 100);
        setTimeout(() => note(0, "G5", 0.15), 200);
      }
      return;
    }

    if (state === "gameover") {
      // update particles
      for (let i = particles.length - 1; i >= 0; i--) {
        const p = particles[i]; p.x += p.vx; p.y += p.vy; p.vy += 0.05; p.life--;
        if (p.life <= 0) particles.splice(i, 1);
      }
      if (btnp("a") || btnp("start")) state = "title";
      return;
    }

    if (state === "roundclear") {
      condTimer++;
      if (condTimer > 90) {
        spawnRound();
        invTimer = 60;
        state = "play";
      }
      return;
    }

    // === Play state ===

    if (respawnTimer > 0) {
      respawnTimer--;
      if (respawnTimer === 0) {
        if (lives <= 0) {
          state = "gameover";
          return;
        }
        player.x = wrap(camX, WORLD_W);
        player.y = wrap(camY, WORLD_H);
        invTimer = 90;
      }
      return;
    }

    if (invTimer > 0) invTimer--;

    // Player direction
    let dx = 0, dy = 0;
    if (btn("up")) dy = -1;
    if (btn("down")) dy = 1;
    if (btn("left")) dx = -1;
    if (btn("right")) dx = 1;

    if (dx !== 0 || dy !== 0) {
      // map dx,dy to direction index
      if (dx === 0 && dy === -1) player.dir = 0;
      else if (dx === 1 && dy === -1) player.dir = 1;
      else if (dx === 1 && dy === 0) player.dir = 2;
      else if (dx === 1 && dy === 1) player.dir = 3;
      else if (dx === 0 && dy === 1) player.dir = 4;
      else if (dx === -1 && dy === 1) player.dir = 5;
      else if (dx === -1 && dy === 0) player.dir = 6;
      else if (dx === -1 && dy === -1) player.dir = 7;

      const spd = player.speed;
      player.x = wrap(player.x + DIR_DX[player.dir] * spd, WORLD_W);
      player.y = wrap(player.y + DIR_DY[player.dir] * spd, WORLD_H);
    }

    // Camera follows player
    camX = player.x;
    camY = player.y;

    // Shoot - fires forward AND backward
    if (shootCooldown > 0) shootCooldown--;
    if (btnp("a") && shootCooldown <= 0 && bullets.length < 6) {
      const d = player.dir;
      const bspd = 5;
      // forward bullet
      bullets.push({
        x: player.x + DIR_DX[d] * 6,
        y: player.y + DIR_DY[d] * 6,
        vx: DIR_DX[d] * bspd,
        vy: DIR_DY[d] * bspd,
        life: 40
      });
      // backward bullet
      const bd = (d + 4) % 8;
      bullets.push({
        x: player.x + DIR_DX[bd] * 6,
        y: player.y + DIR_DY[bd] * 6,
        vx: DIR_DX[bd] * bspd,
        vy: DIR_DY[bd] * bspd,
        life: 40
      });
      shootCooldown = 6;
      shootSound();
    }

    // Update bullets
    for (let i = bullets.length - 1; i >= 0; i--) {
      const b = bullets[i];
      b.x = wrap(b.x + b.vx, WORLD_W);
      b.y = wrap(b.y + b.vy, WORLD_H);
      b.life--;
      if (b.life <= 0) bullets.splice(i, 1);
    }

    // Update enemy bullets
    for (let i = eBullets.length - 1; i >= 0; i--) {
      const b = eBullets[i];
      b.x = wrap(b.x + b.vx, WORLD_W);
      b.y = wrap(b.y + b.vy, WORLD_H);
      b.life--;
      if (b.life <= 0) eBullets.splice(i, 1);
    }

    // Condition system — escalates over time and with fewer stations
    condTimer++;
    const aliveStations = stations.filter(s => s.alive).length;
    if (condition === 0 && (condTimer > 300 || aliveStations <= 2)) {
      condition = 1;
      condFlash = 60;
      alertSound();
    } else if (condition === 1 && (condTimer > 600 || aliveStations <= 1)) {
      condition = 2;
      condFlash = 90;
      alertSound();
    }
    if (condFlash > 0) condFlash--;

    // Spawn enemies based on condition
    const maxEnemies = condition === 0 ? 4 : condition === 1 ? 7 : 12;
    const spawnRate = condition === 0 ? 45 : condition === 1 ? 25 : 12;
    if (enemies.length < maxEnemies && API.frame % spawnRate === 0) {
      spawnEnemy();
    }

    // Update enemies
    for (let i = enemies.length - 1; i >= 0; i--) {
      const e = enemies[i];
      e.x = wrap(e.x + e.vx, WORLD_W);
      e.y = wrap(e.y + e.vy, WORLD_H);
      e.life--;

      // Aim toward player occasionally
      if (e.life % 30 === 0) {
        const tdx = wrapDist(e.x, player.x, WORLD_W);
        const tdy = wrapDist(e.y, player.y, WORLD_H);
        const a = atan2(tdy, tdx);
        const spd = Math.sqrt(e.vx * e.vx + e.vy * e.vy);
        e.vx = e.vx * 0.6 + Math.cos(a) * spd * 0.4;
        e.vy = e.vy * 0.6 + Math.sin(a) * spd * 0.4;
      }

      // Enemy shoot
      e.shootTimer--;
      if (e.shootTimer <= 0) {
        const tdx = wrapDist(e.x, player.x, WORLD_W);
        const tdy = wrapDist(e.y, player.y, WORLD_H);
        const a = atan2(tdy, tdx);
        const bspd = 2.5 + round * 0.2;
        eBullets.push({
          x: e.x, y: e.y,
          vx: Math.cos(a) * bspd,
          vy: Math.sin(a) * bspd,
          life: 80
        });
        e.shootTimer = 40 + flr(rnd(60));
      }

      if (e.life <= 0) enemies.splice(i, 1);
    }

    // --- Collision: player bullets vs enemies ---
    for (let bi = bullets.length - 1; bi >= 0; bi--) {
      const b = bullets[bi];
      let hit = false;
      for (let ei = enemies.length - 1; ei >= 0; ei--) {
        const e = enemies[ei];
        if (_abs(wrapDist(b.x, e.x, WORLD_W)) < 6 && _abs(wrapDist(b.y, e.y, WORLD_H)) < 6) {
          addExplosion(e.x, e.y, false);
          hitSound();
          score += e.type === 9 ? 60 : 100;
          enemies.splice(ei, 1);
          hit = true;
          break;
        }
      }
      if (hit) { bullets.splice(bi, 1); continue; }

      // bullets vs station pods and cores
      for (const st of stations) {
        if (!st.alive) continue;
        // check pods
        for (const pod of st.pods) {
          if (!pod.alive) continue;
          const px = st.x + pod.ox;
          const py = st.y + pod.oy;
          if (_abs(wrapDist(b.x, px, WORLD_W)) < 6 && _abs(wrapDist(b.y, py, WORLD_H)) < 6) {
            pod.alive = false;
            addExplosion(px, py, false);
            hitSound();
            score += 200;
            hit = true;
            // Check if all pods dead
            if (!st.pods.some(p => p.alive)) {
              st.alive = false;
              addExplosion(st.x, st.y, true);
              score += 1000;
              stationDestroySound();
            }
            break;
          }
        }
        if (hit) break;
        // check core (direct hit destroys entire station)
        if (_abs(wrapDist(b.x, st.x, WORLD_W)) < 5 && _abs(wrapDist(b.y, st.y, WORLD_H)) < 5) {
          st.alive = false;
          for (const pod of st.pods) pod.alive = false;
          addExplosion(st.x, st.y, true);
          score += 1500;
          stationDestroySound();
          hit = true;
          break;
        }
      }
      if (hit) { bullets.splice(bi, 1); continue; }

      // bullets vs mines
      for (let mi = mines.length - 1; mi >= 0; mi--) {
        const m = mines[mi];
        if (!m.alive) continue;
        if (_abs(wrapDist(b.x, m.x, WORLD_W)) < 5 && _abs(wrapDist(b.y, m.y, WORLD_H)) < 5) {
          m.alive = false;
          addExplosion(m.x, m.y, false);
          hitSound();
          score += 20;
          hit = true;
          break;
        }
      }
      if (hit) { bullets.splice(bi, 1); }
    }

    // --- Collision: player vs enemies, enemy bullets, mines, station pods ---
    if (invTimer <= 0) {
      let dead = false;

      for (let i = enemies.length - 1; i >= 0; i--) {
        const e = enemies[i];
        if (_abs(wrapDist(player.x, e.x, WORLD_W)) < 7 && _abs(wrapDist(player.y, e.y, WORLD_H)) < 7) {
          addExplosion(player.x, player.y, true);
          addExplosion(e.x, e.y, false);
          enemies.splice(i, 1);
          dead = true;
          break;
        }
      }

      if (!dead) {
        for (let i = eBullets.length - 1; i >= 0; i--) {
          const b = eBullets[i];
          if (_abs(wrapDist(player.x, b.x, WORLD_W)) < 5 && _abs(wrapDist(player.y, b.y, WORLD_H)) < 5) {
            addExplosion(player.x, player.y, true);
            eBullets.splice(i, 1);
            dead = true;
            break;
          }
        }
      }

      if (!dead) {
        for (const m of mines) {
          if (!m.alive) continue;
          if (_abs(wrapDist(player.x, m.x, WORLD_W)) < 6 && _abs(wrapDist(player.y, m.y, WORLD_H)) < 6) {
            m.alive = false;
            addExplosion(player.x, player.y, true);
            addExplosion(m.x, m.y, false);
            dead = true;
            break;
          }
        }
      }

      if (!dead) {
        for (const st of stations) {
          if (!st.alive) continue;
          // collide with core
          if (_abs(wrapDist(player.x, st.x, WORLD_W)) < 8 && _abs(wrapDist(player.y, st.y, WORLD_H)) < 8) {
            addExplosion(player.x, player.y, true);
            dead = true;
            break;
          }
          // collide with pods
          for (const pod of st.pods) {
            if (!pod.alive) continue;
            const px = st.x + pod.ox;
            const py = st.y + pod.oy;
            if (_abs(wrapDist(player.x, px, WORLD_W)) < 6 && _abs(wrapDist(player.y, py, WORLD_H)) < 6) {
              addExplosion(player.x, player.y, true);
              dead = true;
              break;
            }
          }
          if (dead) break;
        }
      }

      if (dead) {
        lives--;
        deathSound();
        respawnTimer = 60;
      }
    }

    // Update explosions
    for (let i = explosions.length - 1; i >= 0; i--) {
      explosions[i].timer--;
      if (explosions[i].timer <= 0) explosions.splice(i, 1);
    }

    // Update particles (in world coords)
    for (let i = particles.length - 1; i >= 0; i--) {
      const p = particles[i];
      p.x += p.vx; p.y += p.vy; p.vy += 0.03; p.life--;
      if (p.life <= 0) particles.splice(i, 1);
    }

    // Check round clear
    if (stations.every(s => !s.alive)) {
      state = "roundclear";
      condTimer = 0;
      roundClearSound();
    }
  };

  // ============================================================
  // Draw
  // ============================================================
  API._draw = function() {
    cls(0);

    if (state === "title") {
      // Starfield
      for (const s of stars) {
        const sx = s.x % W;
        const sy = s.y % H;
        pix(sx, sy, s.bright);
      }

      // Title
      text("BOSCONIAN", W / 2 - 45, 70, 3);
      text("SPACE PATROL", W / 2 - 60, 86, 2);

      if (flr(titleBlink / 20) % 2 === 0) {
        text("PRESS START", W / 2 - 55, 160, 3);
      }

      text("ARROWS  MOVE", W / 2 - 60, 210, 1);
      text("Z  SHOOT FRONT+BACK", W / 2 - 95, 222, 1);
      text("DESTROY ALL STATIONS", W / 2 - 100, 250, 2);

      // Draw a sample station on title
      const cx = W / 2;
      const cy = 130;
      spr(6, cx - 4, cy - 4);
      for (let p = 0; p < 6; p++) {
        const a = p * Math.PI / 3;
        const px = cx + Math.cos(a) * 16 - 4;
        const py = cy + Math.sin(a) * 16 - 4;
        spr(7, px, py);
      }
      return;
    }

    if (state === "gameover") {
      for (const s of stars) {
        const sx = s.x % W;
        const sy = s.y % H;
        pix(sx, sy, s.bright);
      }
      for (const p of particles) {
        pix(p.x % W, p.y % H, p.color);
      }
      text("GAME OVER", W / 2 - 45, 130, 3);
      text("SCORE " + score, W / 2 - 50, 155, 2);
      if (flr(titleBlink / 20) % 2 === 0) {
        text("PRESS START", W / 2 - 55, 190, 3);
      }
      return;
    }

    // --- Draw play / roundclear ---

    // Draw stars (parallax in world)
    for (const s of stars) {
      const sp = toScreen(s.x, s.y);
      if (onScreen(sp.x, sp.y, 0)) {
        pix(sp.x, sp.y, s.bright);
      }
    }

    // Draw mines
    for (const m of mines) {
      if (!m.alive) continue;
      const sp = toScreen(m.x, m.y);
      if (onScreen(sp.x, sp.y, 8)) {
        spr(12, sp.x - 4, sp.y - 4);
      }
    }

    // Draw stations
    for (const st of stations) {
      if (!st.alive) continue;
      const sp = toScreen(st.x, st.y);

      // Draw connectors from core to pods
      for (const pod of st.pods) {
        const px = sp.x + pod.ox;
        const py = sp.y + pod.oy;
        if (onScreen(sp.x, sp.y, 40)) {
          line(sp.x, sp.y, px, py, 1);
        }
      }

      // Draw pods
      for (const pod of st.pods) {
        const px = sp.x + pod.ox - 4;
        const py = sp.y + pod.oy - 4;
        if (onScreen(px, py, 8)) {
          spr(pod.alive ? 7 : 8, px, py);
        }
      }

      // Draw core
      if (onScreen(sp.x, sp.y, 8)) {
        spr(6, sp.x - 4, sp.y - 4);
      }
    }

    // Draw enemy bullets
    for (const b of eBullets) {
      const sp = toScreen(b.x, b.y);
      if (onScreen(sp.x, sp.y, 4)) {
        spr(11, sp.x - 4, sp.y - 4);
      }
    }

    // Draw enemies
    for (const e of enemies) {
      const sp = toScreen(e.x, e.y);
      if (onScreen(sp.x, sp.y, 8)) {
        spr(e.type, sp.x - 4, sp.y - 4);
      }
    }

    // Draw player bullets
    for (const b of bullets) {
      const sp = toScreen(b.x, b.y);
      if (onScreen(sp.x, sp.y, 4)) {
        // Draw as bright pixel pair
        pix(sp.x, sp.y, 3);
        pix(sp.x, sp.y - 1, 2);
        pix(sp.x, sp.y + 1, 2);
        pix(sp.x - 1, sp.y, 2);
        pix(sp.x + 1, sp.y, 2);
      }
    }

    // Draw player
    if (respawnTimer <= 0) {
      if (invTimer <= 0 || flr(invTimer / 3) % 2 === 0) {
        const sp = toScreen(player.x, player.y);
        spr(SHIP_SPR[player.dir], sp.x - 4, sp.y - 4);
      }
    }

    // Draw explosions
    for (const e of explosions) {
      const sp = toScreen(e.x + 4, e.y + 4);
      if (onScreen(sp.x, sp.y, 8)) {
        spr(e.timer > 6 ? 13 : 14, sp.x - 4, sp.y - 4);
      }
    }

    // Draw particles
    for (const p of particles) {
      const sp = toScreen(p.x, p.y);
      if (onScreen(sp.x, sp.y, 1)) {
        pix(sp.x, sp.y, p.color);
      }
    }

    // --- HUD ---
    // Top bar background
    rectf(0, 0, W, 15, 0);
    line(0, 15, W, 15, 1);

    // Score
    text("SCORE " + score, 4, 2, 3);

    // Round
    text("RD " + round, 140, 2, 2);

    // Condition indicator
    const condNames = ["GREEN", "YELLOW", "RED"];
    const condColors = [1, 2, 3];
    if (condFlash <= 0 || flr(condFlash / 4) % 2 === 0) {
      text("COND:" + condNames[condition], 200, 2, condColors[condition]);
    }

    // Lives
    for (let i = 0; i < lives; i++) {
      spr(15, 320 + i * 10, 2);
    }

    // --- Radar / minimap ---
    rectf(RADAR_X - 1, RADAR_Y - 1, RADAR_W + 2, RADAR_H + 2, 0);
    rect(RADAR_X - 1, RADAR_Y - 1, RADAR_W + 2, RADAR_H + 2, 1);

    // Player blip (center of radar)
    const rCX = RADAR_X + RADAR_W / 2;
    const rCY = RADAR_Y + RADAR_H / 2;
    pix(rCX, rCY, 3);
    pix(rCX + 1, rCY, 3);
    pix(rCX, rCY + 1, 3);
    pix(rCX + 1, rCY + 1, 3);

    // Station blips
    for (const st of stations) {
      if (!st.alive) continue;
      const rdx = wrapDist(player.x, st.x, WORLD_W) / WORLD_W * RADAR_W;
      const rdy = wrapDist(player.y, st.y, WORLD_H) / WORLD_H * RADAR_H;
      const rx = flr(rCX + rdx);
      const ry = flr(rCY + rdy);
      if (rx >= RADAR_X && rx < RADAR_X + RADAR_W && ry >= RADAR_Y && ry < RADAR_Y + RADAR_H) {
        // Blinking station blip
        if (flr(API.frame / 8) % 2 === 0) {
          pix(rx, ry, 3);
          pix(rx + 1, ry, 2);
          pix(rx, ry + 1, 2);
        } else {
          pix(rx, ry, 2);
        }
      }
    }

    // Enemy blips
    for (const e of enemies) {
      const rdx = wrapDist(player.x, e.x, WORLD_W) / WORLD_W * RADAR_W;
      const rdy = wrapDist(player.y, e.y, WORLD_H) / WORLD_H * RADAR_H;
      const rx = flr(rCX + rdx);
      const ry = flr(rCY + rdy);
      if (rx >= RADAR_X && rx < RADAR_X + RADAR_W && ry >= RADAR_Y && ry < RADAR_Y + RADAR_H) {
        pix(rx, ry, 2);
      }
    }

    // Round clear message
    if (state === "roundclear") {
      rectf(W / 2 - 80, H / 2 - 16, 160, 32, 0);
      rect(W / 2 - 80, H / 2 - 16, 160, 32, 2);
      text("ROUND CLEAR!", W / 2 - 58, H / 2 - 6, 3);
      text("BONUS " + (round * 1000), W / 2 - 55, H / 2 + 6, 2);
    }

    // Direction arrows on edge of screen pointing to nearest station
    if (state === "play") {
      let nearest = null;
      let nearDist = Infinity;
      for (const st of stations) {
        if (!st.alive) continue;
        const d = wrapDistXY(player.x, player.y, st.x, st.y);
        if (d < nearDist) { nearDist = d; nearest = st; }
      }
      if (nearest && nearDist > 120) {
        const ndx = wrapDist(player.x, nearest.x, WORLD_W);
        const ndy = wrapDist(player.y, nearest.y, WORLD_H);
        const a = atan2(ndy, ndx);
        // place arrow at screen edge
        const arrowDist = 100;
        let ax = W / 2 + Math.cos(a) * arrowDist;
        let ay = PLAY_Y + PLAY_H / 2 + Math.sin(a) * arrowDist;
        ax = _max(12, min(W - 12, ax));
        ay = _max(PLAY_Y + 12, min(H - 12, ay));
        // Draw small arrow
        const tipX = ax + Math.cos(a) * 4;
        const tipY = ay + Math.sin(a) * 4;
        const tailX = ax - Math.cos(a) * 4;
        const tailY = ay - Math.sin(a) * 4;
        if (flr(API.frame / 10) % 2 === 0) {
          line(tailX, tailY, tipX, tipY, 3);
          line(tipX, tipY, tipX - Math.cos(a - 0.5) * 3, tipY - Math.sin(a - 0.5) * 3, 3);
          line(tipX, tipY, tipX - Math.cos(a + 0.5) * 3, tipY - Math.sin(a + 0.5) * 3, 3);
        }
      }
    }
  };

  // ============================================================
  // Main loop
  // ============================================================
  setInterval(tick, 1000 / FPS);
})();
</script>
</body>
