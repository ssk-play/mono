<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GrayBox — Demo: Exerion</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #0a0a0a;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100vh;
    font-family: monospace;
    overflow: hidden;
  }
  #frame {
    background: #111;
    border: 3px solid #333;
    border-radius: 8px;
    padding: 12px;
    box-shadow: 0 0 40px rgba(0,0,0,0.8), inset 0 0 20px rgba(0,0,0,0.5);
  }
  canvas {
    display: block;
    image-rendering: pixelated;
    image-rendering: crisp-edges;
  }
  #controls {
    margin-top: 12px;
    color: #6b6b6b;
    font-size: 11px;
    text-align: center;
    letter-spacing: 1px;
  }
  #controls span { color: #b0b0b0; }
</style>
</head>
<body>
<div id="frame">
  <canvas id="screen"></canvas>
</div>
<div id="controls">
  <span>ARROWS</span> MOVE &nbsp;&nbsp; <span>Z</span> SHOOT &nbsp;&nbsp; <span>Z HOLD</span> CHARGE &nbsp;&nbsp; <span>ENTER</span> START
</div>
<script>
(() => {
  "use strict";

  // ============================================================
  // GrayBox Runtime (inline)
  // ============================================================
  const W = 480;
  const H = 320;
  const SCALE = 2;
  const FPS = 30;
  const COLORS = ["#1a1a1a", "#6b6b6b", "#b0b0b0", "#e8e8e8"];
  const canvas = document.getElementById("screen");
  canvas.width = W;
  canvas.height = H;
  canvas.style.width = (W * SCALE) + "px";
  canvas.style.height = (H * SCALE) + "px";
  const ctx = canvas.getContext("2d");
  ctx.imageSmoothingEnabled = false;
  const buf = ctx.createImageData(W, H);
  const buf32 = new Uint32Array(buf.data.buffer);

  function hexToABGR(hex) {
    const r = parseInt(hex.slice(1, 3), 16);
    const g = parseInt(hex.slice(3, 5), 16);
    const b = parseInt(hex.slice(5, 7), 16);
    return (255 << 24) | (b << 16) | (g << 8) | r;
  }
  const COLOR_U32 = COLORS.map(hexToABGR);

  const sprites = {};
  const tilemap = {};

  const keyMap = {
    "ArrowUp": "up", "ArrowDown": "down", "ArrowLeft": "left", "ArrowRight": "right",
    "w": "up", "s": "down", "a": "left", "d": "right",
    "z": "a", "Z": "a", "x": "b", "X": "b",
    "Enter": "start", " ": "a"
  };
  const keys = {};
  const keysPrev = {};

  document.addEventListener("keydown", e => {
    const k = keyMap[e.key];
    if (k) { keys[k] = true; e.preventDefault(); }
  });
  document.addEventListener("keyup", e => {
    const k = keyMap[e.key];
    if (k) { keys[k] = false; e.preventDefault(); }
  });

  let audioCtx = null;
  const channels = [null, null];
  const channelGains = [null, null];
  function ensureAudio() {
    if (!audioCtx) {
      audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      for (let i = 0; i < 2; i++) {
        channelGains[i] = audioCtx.createGain();
        channelGains[i].gain.value = 0.15;
        channelGains[i].connect(audioCtx.destination);
      }
    }
  }

  const NOTE_NAMES = ["C","C#","D","D#","E","F","F#","G","G#","A","A#","B"];
  function noteToFreq(noteStr) {
    const match = noteStr.match(/^([A-G]#?)(\d)$/);
    if (!match) return 440;
    const name = match[1];
    const octave = parseInt(match[2]);
    const semitone = NOTE_NAMES.indexOf(name);
    if (semitone === -1) return 440;
    const midi = (octave + 1) * 12 + semitone;
    return 440 * Math.pow(2, (midi - 69) / 12);
  }

  const FONT_W = 4;
  const FONT_H = 7;
  const FONT = {};
  const fontData = {
    "A":"0110100110011111100110011001","B":"1110100110101110100110011110",
    "C":"0110100110001000100001100110","D":"1100101010011001100110101100",
    "E":"1111100010001110100010001111","F":"1111100010001110100010001000",
    "G":"0111100010001011100101100111","H":"1001100110011111100110011001",
    "I":"1110010001000100010001001110","J":"0111001000100010001010100100",
    "K":"1001101011001100101010011001","L":"1000100010001000100010001111",
    "M":"1001111111011001100110011001","N":"1001110111011001100110011001",
    "O":"0110100110011001100110010110","P":"1110100110011110100010001000",
    "Q":"0110100110011001101101100001","R":"1110100110011110101010011001",
    "S":"0111100010000110000110001110","T":"1111001000100010001000100010",
    "U":"1001100110011001100110010110","V":"1001100110011001100101100110",
    "W":"1001100110011001101111011001","X":"1001100101100110011010011001",
    "Y":"1001100101100010001000100010","Z":"1111000100100100100010001111",
    "0":"0110100111011011101110010110","1":"0100110001000100010001001110",
    "2":"0110100100010010010010001111","3":"1110000100010110000110011110",
    "4":"1001100110011111000100010001","5":"1111100010001110000100011110",
    "6":"0110100010001110100110010110","7":"1111000100010010010001001000",
    "8":"0110100110010110100110010110","9":"0110100110010111000100010110",
    " ":"0000000000000000000000000000",
    ".":"0000000000000000000001000100",
    ",":"0000000000000000001000101000",
    "!":"0100010001000100000000000100",
    "?":"0110100100010010000000000010",
    "-":"0000000000001110000000000000",
    "+":"0000001001001110010000100000",
    ":":"0000010001000000010001000000",
    "/":"0001000100100010010010001000",
    "*":"0000101001001110010010100000",
    "#":"0101111101011111010100000000",
    "(":"0010010010001000010001000010",
    ")":"0100001000010001000100100100",
    "=":"0000000011110000111100000000",
    "'":"0100010010000000000000000000",
    "\"":"1010101000000000000000000000",
    "<":"0010010010001000010000100010",
    ">":"1000010000100001001001001000",
    "_":"0000000000000000000000001111",
  };
  for (const [ch, bits] of Object.entries(fontData)) {
    FONT[ch] = [];
    for (let i = 0; i < bits.length; i++) FONT[ch].push(parseInt(bits[i]));
  }

  const API = {};
  API._init = null;
  API._update = null;
  API._draw = null;
  API.frame = 0;

  API.cls = function(c = 0) { buf32.fill(COLOR_U32[c] || COLOR_U32[0]); };
  API.pix = function(x, y, c) {
    x = Math.floor(x); y = Math.floor(y);
    if (x < 0 || x >= W || y < 0 || y >= H) return;
    buf32[y * W + x] = COLOR_U32[c] || COLOR_U32[0];
  };
  API.line = function(x0, y0, x1, y1, c) {
    x0=Math.floor(x0); y0=Math.floor(y0); x1=Math.floor(x1); y1=Math.floor(y1);
    const dx=Math.abs(x1-x0), dy=Math.abs(y1-y0);
    const sx=x0<x1?1:-1, sy=y0<y1?1:-1;
    let err=dx-dy;
    while(true) {
      API.pix(x0,y0,c);
      if(x0===x1&&y0===y1) break;
      const e2=2*err;
      if(e2>-dy){err-=dy;x0+=sx;}
      if(e2<dx){err+=dx;y0+=sy;}
    }
  };
  API.rect = function(x,y,w,h,c) {
    API.line(x,y,x+w-1,y,c); API.line(x+w-1,y,x+w-1,y+h-1,c);
    API.line(x+w-1,y+h-1,x,y+h-1,c); API.line(x,y+h-1,x,y,c);
  };
  API.rectf = function(x,y,w,h,c) {
    x=Math.floor(x); y=Math.floor(y);
    const col=COLOR_U32[c]||COLOR_U32[0];
    for(let py=Math.max(0,y);py<Math.min(H,y+h);py++)
      for(let px=Math.max(0,x);px<Math.min(W,x+w);px++)
        buf32[py*W+px]=col;
  };
  API.circ = function(cx,cy,r,c) {
    let x=r,y=0,d=1-r; cx=Math.floor(cx); cy=Math.floor(cy);
    while(x>=y){
      API.pix(cx+x,cy+y,c);API.pix(cx-x,cy+y,c);
      API.pix(cx+x,cy-y,c);API.pix(cx-x,cy-y,c);
      API.pix(cx+y,cy+x,c);API.pix(cx-y,cy+x,c);
      API.pix(cx+y,cy-x,c);API.pix(cx-y,cy-x,c);
      y++; if(d<0){d+=2*y+1;}else{x--;d+=2*(y-x)+1;}
    }
  };
  API.circf = function(cx,cy,r,c) {
    cx=Math.floor(cx); cy=Math.floor(cy);
    const col=COLOR_U32[c]||COLOR_U32[0]; const r2=r*r;
    for(let py=-r;py<=r;py++) for(let px=-r;px<=r;px++)
      if(px*px+py*py<=r2){ const sx=cx+px,sy=cy+py;
        if(sx>=0&&sx<W&&sy>=0&&sy<H) buf32[sy*W+sx]=col; }
  };
  API.sprite = function(id, data) {
    const arr = new Uint8Array(64); let i = 0;
    for (const ch of data) { if (ch>='0'&&ch<='3') { arr[i++]=parseInt(ch); if(i>=64) break; } }
    sprites[id] = arr;
  };
  API.spr = function(id, x, y, flipX, flipY) {
    const s=sprites[id]; if(!s) return;
    x=Math.floor(x); y=Math.floor(y);
    for(let py=0;py<8;py++) for(let px=0;px<8;px++){
      const sx=flipX?7-px:px, sy=flipY?7-py:py;
      const c=s[sy*8+sx], dx=x+px, dy=y+py;
      if(dx>=0&&dx<W&&dy>=0&&dy<H) buf32[dy*W+dx]=COLOR_U32[c];
    }
  };
  API.text = function(str, x, y, c) {
    str=String(str).toUpperCase(); let cx=Math.floor(x); const cy=Math.floor(y);
    const col=COLOR_U32[c]||COLOR_U32[3];
    for(const ch of str){
      const glyph=FONT[ch];
      if(glyph) for(let py=0;py<FONT_H;py++) for(let px=0;px<FONT_W;px++)
        if(glyph[py*FONT_W+px]){ const dx=cx+px,dy=cy+py;
          if(dx>=0&&dx<W&&dy>=0&&dy<H) buf32[dy*W+dx]=col; }
      cx+=FONT_W+1;
    }
  };
  API.mget = function(cx,cy) { return tilemap[cx+","+cy]||0; };
  API.mset = function(cx,cy,id) { tilemap[cx+","+cy]=id; };
  API.map = function(mx,my,mw,mh,sx,sy) {
    for(let ty=0;ty<mh;ty++) for(let tx=0;tx<mw;tx++){
      const id=API.mget(mx+tx,my+ty); if(id>0) API.spr(id,sx+tx*8,sy+ty*8); }
  };
  API.btn = function(k) { return !!keys[k]; };
  API.btnp = function(k) { return !!keys[k] && !keysPrev[k]; };
  API.note = function(ch, noteStr, dur) {
    ensureAudio(); if(ch<0||ch>1) return; API.stop(ch);
    const osc=audioCtx.createOscillator(); osc.type="square";
    osc.frequency.value=noteToFreq(noteStr);
    osc.connect(channelGains[ch]); osc.start();
    osc.stop(audioCtx.currentTime+dur); channels[ch]=osc;
  };
  API.stop = function(ch) {
    if(ch===undefined){API.stop(0);API.stop(1);return;}
    if(channels[ch]){try{channels[ch].stop();}catch(e){} channels[ch]=null;}
  };
  API.rnd = function(max) { return Math.random()*max; };
  API.flr = Math.floor;
  API.abs = Math.abs;
  API.min = Math.min;
  API.max = Math.max;
  API.sin = Math.sin;
  API.cos = Math.cos;

  function tick() {
    if (API._update) API._update();
    if (API._draw) API._draw();
    ctx.putImageData(buf, 0, 0);
    for (const k in keys) keysPrev[k] = keys[k];
    API.frame++;
  }

  // ============================================================
  // Exerion Game
  // ============================================================
  const { cls, pix, line, rect, rectf, circ, circf, sprite: defSprite,
          spr, text, btn, btnp, note, stop, rnd, flr, abs: _abs,
          min, max: _max, sin, cos } = API;

  // --- Sprites ---

  // 1: Player ship (Exerion-style fighter with wide wings)
  defSprite(1,
    "00030000" +
    "00333000" +
    "03333300" +
    "33323330" +
    "33333330" +
    "30333030" +
    "30030030" +
    "00000000"
  );

  // 2: Player ship thrust frame
  defSprite(2,
    "00030000" +
    "00333000" +
    "03333300" +
    "33323330" +
    "33333330" +
    "30333030" +
    "30030030" +
    "01020100"
  );

  // 10: Small fighter enemy (fast)
  defSprite(10,
    "00000000" +
    "00100100" +
    "01111110" +
    "11322310" +
    "01333100" +
    "00111000" +
    "01000100" +
    "00000000"
  );

  // 11: Medium bomber enemy
  defSprite(11,
    "00333000" +
    "03333300" +
    "33323330" +
    "33333330" +
    "13333310" +
    "03333300" +
    "01030100" +
    "00010000"
  );

  // 12: Large carrier enemy
  defSprite(12,
    "01333100" +
    "33333330" +
    "33232330" +
    "33333330" +
    "33333330" +
    "33232330" +
    "33333330" +
    "01030100"
  );

  // 20: Player bullet (dual shot, left)
  defSprite(20,
    "00000000" +
    "00030000" +
    "00030000" +
    "00020000" +
    "00020000" +
    "00010000" +
    "00000000" +
    "00000000"
  );

  // 21: Charge bullet (big bright)
  defSprite(21,
    "00333000" +
    "03333300" +
    "33333330" +
    "33333330" +
    "33333330" +
    "03333300" +
    "00333000" +
    "00000000"
  );

  // 25: Enemy bullet
  defSprite(25,
    "00000000" +
    "00010000" +
    "00020000" +
    "00020000" +
    "00030000" +
    "00030000" +
    "00000000" +
    "00000000"
  );

  // 30: Explosion frame 1
  defSprite(30,
    "00000000" +
    "00200100" +
    "01002000" +
    "00031000" +
    "00130200" +
    "01000010" +
    "00100000" +
    "00000000"
  );

  // 31: Explosion frame 2
  defSprite(31,
    "20010020" +
    "01000010" +
    "00203200" +
    "03033030" +
    "00232000" +
    "01000300" +
    "20001001" +
    "00200010"
  );

  // 32: Explosion frame 3 (fading)
  defSprite(32,
    "10000010" +
    "00100000" +
    "00001100" +
    "01011010" +
    "00110000" +
    "00000100" +
    "10000001" +
    "00010000"
  );

  // 40: Life icon (small ship)
  defSprite(40,
    "00000000" +
    "00030000" +
    "00333000" +
    "03323300" +
    "33333330" +
    "30030030" +
    "00000000" +
    "00000000"
  );

  // 50: Charge indicator frame
  defSprite(50,
    "00333000" +
    "03000300" +
    "30000030" +
    "30000030" +
    "30000030" +
    "03000300" +
    "00333000" +
    "00000000"
  );

  // --- Game State ---
  let state = "title";
  let player, bullets, eBullets, enemies, explosions, particles;
  let stars1, stars2, stars3; // 3 parallax layers
  let score, lives, wave, waveTimer, waveMessage;
  let shootCooldown, chargeTime, charging;
  let invincible, invTimer;
  let hiScore = 0;
  let titleAnim = 0;
  let screenShake = 0;

  // Wave patterns
  const PATTERNS = {
    SINE: 0,
    CIRCLE: 1,
    VFORM: 2,
    SWOOP: 3,
    ZIGZAG: 4,
  };

  function makeStars(count, speedMin, speedMax) {
    const arr = [];
    for (let i = 0; i < count; i++)
      arr.push({ x: flr(rnd(W)), y: flr(rnd(H)), speed: speedMin + rnd(speedMax - speedMin), bright: flr(rnd(2)) + 1 });
    return arr;
  }

  function resetGame() {
    player = { x: W / 2 - 4, y: H - 40, speed: 2.5, yBase: H - 40 };
    bullets = [];
    eBullets = [];
    enemies = [];
    explosions = [];
    particles = [];
    score = 0;
    lives = 3;
    wave = 0;
    waveTimer = 0;
    waveMessage = 0;
    shootCooldown = 0;
    chargeTime = 0;
    charging = false;
    invincible = 0;
    invTimer = 0;
    screenShake = 0;
    stars1 = makeStars(30, 0.3, 0.6);  // far layer (slow, dim)
    stars2 = makeStars(20, 0.8, 1.5);  // mid layer
    stars3 = makeStars(10, 2.0, 3.0);  // near layer (fast, bright)
    spawnWave();
  }

  function spawnWave() {
    wave++;
    waveMessage = 90;
    const pattern = (wave - 1) % 5;
    const numEnemies = min(6 + wave * 2, 24);
    const hasCarrier = wave >= 3 && wave % 3 === 0;
    const hasBomber = wave >= 2;

    if (hasCarrier) {
      // Carrier enters alone first
      enemies.push(makeEnemy(12, W / 2 - 4, -20, PATTERNS.SWOOP, 0, 3, 100));
    }

    for (let i = 0; i < numEnemies; i++) {
      let type, hp, pts;
      if (hasBomber && i < flr(numEnemies / 3)) {
        type = 11; hp = 2; pts = 30;
      } else {
        type = 10; hp = 1; pts = 10;
      }
      let pat = pattern;
      // Mix patterns based on wave
      if (wave > 3) pat = flr(rnd(5));

      enemies.push(makeEnemy(type, 0, 0, pat, i, hp, pts));
    }
  }

  function makeEnemy(type, startX, startY, pattern, index, hp, pts) {
    const delay = index * 6;
    let entryX, entryDir;
    if (index % 2 === 0) {
      entryX = -10;
      entryDir = 1;
    } else {
      entryX = W + 10;
      entryDir = -1;
    }

    return {
      type: type,
      x: entryX,
      y: -10 - index * 12,
      hp: hp,
      pts: pts,
      pattern: pattern,
      index: index,
      delay: delay,
      timer: -delay,
      alive: true,
      entryDir: entryDir,
      phase: "enter", // enter, attack, exit
      shootTimer: 60 + flr(rnd(90)),
      baseSpeed: 1.5 + wave * 0.15,
      amplitude: 40 + rnd(30),
      freq: 0.03 + rnd(0.02),
      // For circle pattern
      cx: W / 2 + rnd(100) - 50,
      cy: 80 + rnd(60),
      radius: 30 + rnd(40),
      angle: rnd(Math.PI * 2),
      // V-formation offset
      formX: (index % 6 - 2.5) * 22,
      formY: _abs(index % 6 - 2.5) * 16,
    };
  }

  function addExplosion(x, y, big) {
    explosions.push({ x: x, y: y, timer: big ? 18 : 12 });
    const count = big ? 14 : 8;
    for (let i = 0; i < count; i++) {
      const spd = big ? 3 : 2;
      particles.push({
        x: x + 4, y: y + 4,
        vx: rnd(spd * 2) - spd, vy: rnd(spd * 2) - spd,
        life: 6 + flr(rnd(12)),
        color: flr(rnd(3)) + 1
      });
    }
    if (big) screenShake = 6;
  }

  // --- Sound effects ---
  function shootSound() { note(0, "E6", 0.03); }
  function chargeShootSound() {
    note(0, "C5", 0.06);
    setTimeout(() => note(0, "G5", 0.06), 30);
    setTimeout(() => note(0, "C6", 0.08), 60);
  }
  function hitSound() { note(1, "C3", 0.05); setTimeout(() => note(1, "E3", 0.04), 30); }
  function bigHitSound() {
    note(1, "C3", 0.1);
    setTimeout(() => note(1, "G2", 0.1), 50);
    setTimeout(() => note(1, "C2", 0.15), 100);
  }
  function deathSound() {
    note(0, "C3", 0.12); note(1, "G2", 0.12);
    setTimeout(() => { note(0, "A2", 0.18); note(1, "E2", 0.18); }, 120);
  }
  function chargeTickSound() { note(1, "A5", 0.02); }
  function waveClearSound() {
    note(0, "C5", 0.08);
    setTimeout(() => note(0, "E5", 0.08), 80);
    setTimeout(() => note(0, "G5", 0.08), 160);
    setTimeout(() => note(0, "C6", 0.12), 240);
  }

  function updateStars(arr) {
    for (const s of arr) {
      s.y += s.speed;
      if (s.y > H) { s.y = -2; s.x = flr(rnd(W)); }
    }
  }

  // ============================================================
  // Title screen init
  // ============================================================
  stars1 = makeStars(30, 0.3, 0.6);
  stars2 = makeStars(20, 0.8, 1.5);
  stars3 = makeStars(10, 2.0, 3.0);

  // ============================================================
  // Update
  // ============================================================
  API._update = function() {
    // Always update stars
    updateStars(stars1);
    updateStars(stars2);
    updateStars(stars3);
    titleAnim++;

    if (screenShake > 0) screenShake--;

    if (state === "title") {
      if (btnp("a") || btnp("start")) {
        state = "play";
        resetGame();
        note(0, "C5", 0.08);
        setTimeout(() => note(0, "E5", 0.08), 80);
        setTimeout(() => note(0, "G5", 0.12), 160);
      }
      return;
    }

    if (state === "gameover") {
      for (let i = particles.length - 1; i >= 0; i--) {
        const p = particles[i]; p.x += p.vx; p.y += p.vy; p.vy += 0.08; p.life--;
        if (p.life <= 0) particles.splice(i, 1);
      }
      if (btnp("a") || btnp("start")) {
        if (score > hiScore) hiScore = score;
        state = "title";
      }
      return;
    }

    // --- Play state ---
    if (waveMessage > 0) waveMessage--;
    if (invincible > 0) invincible--;

    // Player movement: left/right freely, up/down limited range
    if (btn("left")) player.x -= player.speed;
    if (btn("right")) player.x += player.speed;
    if (btn("up")) player.y -= player.speed * 0.7;
    if (btn("down")) player.y += player.speed * 0.7;

    // Clamp player position
    player.x = _max(4, min(W - 12, player.x));
    player.y = _max(H - 100, min(H - 20, player.y));

    // Shooting: dual diverging shots
    if (shootCooldown > 0) shootCooldown--;

    // Charge mechanic
    if (btn("a")) {
      if (!charging && shootCooldown <= 0) {
        // Fire normal dual shot immediately on press
        if (btnp("a")) {
          fireDualShot();
          shootCooldown = 6;
        }
      }
      chargeTime++;
      if (chargeTime > 10) charging = true;
      if (charging && chargeTime % 8 === 0 && chargeTime < 60) chargeTickSound();
    } else {
      if (charging && chargeTime >= 30) {
        // Release charged shot
        fireChargeShot();
        chargeShootSound();
        shootCooldown = 15;
      }
      chargeTime = 0;
      charging = false;
    }

    // Update player bullets
    for (let i = bullets.length - 1; i >= 0; i--) {
      const b = bullets[i];
      b.x += b.vx;
      b.y += b.vy;
      if (b.y < -8 || b.x < -8 || b.x > W + 8) bullets.splice(i, 1);
    }

    // Update enemies
    for (let i = enemies.length - 1; i >= 0; i--) {
      const e = enemies[i];
      if (!e.alive) { enemies.splice(i, 1); continue; }

      e.timer++;
      if (e.timer < 0) continue; // stagger delay

      const t = e.timer;
      const spd = e.baseSpeed;

      if (e.phase === "enter") {
        // Entry patterns
        switch (e.pattern) {
          case PATTERNS.SINE:
            e.x += e.entryDir * spd * 1.2;
            e.y = 40 + e.formY + sin(t * e.freq) * e.amplitude;
            if ((e.entryDir > 0 && e.x > W / 2 + e.formX) ||
                (e.entryDir < 0 && e.x < W / 2 + e.formX)) {
              e.phase = "attack";
              e.timer = 0;
            }
            break;

          case PATTERNS.CIRCLE:
            e.angle += 0.06 * e.entryDir;
            e.x = e.cx + cos(e.angle) * e.radius;
            e.y = e.cy + sin(e.angle) * e.radius * 0.7;
            if (t > 60) { e.phase = "attack"; e.timer = 0; }
            break;

          case PATTERNS.VFORM:
            e.x += e.entryDir * spd * 0.8;
            e.y += spd * 0.6;
            if (e.y > 40 + e.formY) { e.phase = "attack"; e.timer = 0; }
            break;

          case PATTERNS.SWOOP:
            // Swoop in from side in an arc
            e.x += e.entryDir * spd * 1.5;
            e.y = 30 + sin(t * 0.04) * 60 + 40;
            if (t > 80) { e.phase = "attack"; e.timer = 0; }
            break;

          case PATTERNS.ZIGZAG:
            e.x += e.entryDir * spd;
            e.y += spd * 0.5;
            if (t % 30 < 15) e.x += spd * 0.8;
            else e.x -= spd * 0.8;
            if (e.y > 50 + e.formY) { e.phase = "attack"; e.timer = 0; }
            break;
        }
      }

      if (e.phase === "attack") {
        // Attack patterns: weave and descend toward player
        switch (e.pattern) {
          case PATTERNS.SINE:
            e.x += sin(t * 0.04) * spd * 0.8;
            e.y += spd * 0.6;
            break;

          case PATTERNS.CIRCLE:
            e.angle += 0.04;
            e.x = e.cx + cos(e.angle) * (e.radius + t * 0.3);
            e.y += spd * 0.5;
            break;

          case PATTERNS.VFORM:
            // Dive toward player
            const dx = player.x - e.x;
            e.x += (dx > 0 ? 1 : -1) * spd * 0.5;
            e.y += spd * 0.8;
            break;

          case PATTERNS.SWOOP:
            // Big swoop
            e.x += sin(t * 0.03) * spd * 2;
            e.y += spd * 0.4;
            break;

          case PATTERNS.ZIGZAG:
            e.x += (t % 40 < 20 ? spd : -spd);
            e.y += spd * 0.7;
            break;
        }

        // Shoot at player
        e.shootTimer--;
        if (e.shootTimer <= 0 && e.y > 10 && e.y < H - 50) {
          const angle = Math.atan2(player.y - e.y, player.x - e.x);
          const bspd = 2.5 + wave * 0.12;
          eBullets.push({
            x: e.x + 3, y: e.y + 8,
            vx: cos(angle) * bspd,
            vy: sin(angle) * bspd
          });
          e.shootTimer = _max(25, 70 - wave * 3) + flr(rnd(40));
        }
      }

      // Off screen -> remove
      if (e.y > H + 20 || e.x < -30 || e.x > W + 30) {
        e.phase = "exit";
        enemies.splice(i, 1);
        continue;
      }

      // Bullet-enemy collision
      for (let j = bullets.length - 1; j >= 0; j--) {
        const b = bullets[j];
        if (b.x > e.x - 2 && b.x < e.x + 9 && b.y > e.y - 2 && b.y < e.y + 9) {
          const dmg = b.power || 1;
          e.hp -= dmg;
          bullets.splice(j, 1);
          if (e.hp <= 0) {
            const big = e.type === 12;
            addExplosion(e.x, e.y, big);
            score += e.pts * (charging ? 2 : 1);
            if (big) bigHitSound(); else hitSound();
            e.alive = false;
          } else {
            note(1, "A4", 0.02);
          }
          break;
        }
      }
    }

    // Update enemy bullets
    for (let i = eBullets.length - 1; i >= 0; i--) {
      const b = eBullets[i];
      b.x += b.vx;
      b.y += b.vy;
      if (b.y > H + 8 || b.y < -8 || b.x < -8 || b.x > W + 8) {
        eBullets.splice(i, 1);
        continue;
      }

      // Hit player
      if (invincible <= 0 &&
          b.x > player.x && b.x < player.x + 8 &&
          b.y > player.y && b.y < player.y + 8) {
        eBullets.splice(i, 1);
        playerHit();
      }
    }

    // Enemy-player collision
    if (invincible <= 0) {
      for (let i = enemies.length - 1; i >= 0; i--) {
        const e = enemies[i];
        if (e.timer < 0) continue;
        if (player.x + 7 > e.x && player.x < e.x + 8 &&
            player.y + 7 > e.y && player.y < e.y + 8) {
          addExplosion(e.x, e.y, false);
          e.alive = false;
          playerHit();
          break;
        }
      }
    }

    // Explosions
    for (let i = explosions.length - 1; i >= 0; i--) {
      explosions[i].timer--;
      if (explosions[i].timer <= 0) explosions.splice(i, 1);
    }

    // Particles
    for (let i = particles.length - 1; i >= 0; i--) {
      const p = particles[i];
      p.x += p.vx; p.y += p.vy; p.vy += 0.06; p.life--;
      if (p.life <= 0) particles.splice(i, 1);
    }

    // Wave clear check
    if (enemies.length === 0 && state === "play" && waveMessage <= 0) {
      waveTimer++;
      if (waveTimer === 1) waveClearSound();
      if (waveTimer > 90) {
        waveTimer = 0;
        spawnWave();
      }
    } else {
      waveTimer = 0;
    }
  };

  function playerHit() {
    lives--;
    addExplosion(player.x, player.y, true);
    deathSound();
    player.x = W / 2 - 4;
    player.y = H - 40;
    invincible = 60;
    chargeTime = 0;
    charging = false;
    if (lives <= 0) {
      state = "gameover";
      if (score > hiScore) hiScore = score;
    }
  }

  function fireDualShot() {
    // Two diverging bullets
    bullets.push({ x: player.x + 1, y: player.y - 2, vx: -0.8, vy: -6, power: 1 });
    bullets.push({ x: player.x + 5, y: player.y - 2, vx: 0.8, vy: -6, power: 1 });
    shootSound();
  }

  function fireChargeShot() {
    // 5-way spread shot
    const cx = player.x + 3;
    const cy = player.y - 4;
    const angles = [-0.35, -0.17, 0, 0.17, 0.35];
    const spd = 7;
    for (const a of angles) {
      bullets.push({
        x: cx, y: cy,
        vx: sin(a) * spd,
        vy: -cos(a) * spd,
        power: 2,
        charged: true
      });
    }
  }

  // ============================================================
  // Draw
  // ============================================================
  API._draw = function() {
    cls(0);

    const shakeX = screenShake > 0 ? flr(rnd(3)) - 1 : 0;
    const shakeY = screenShake > 0 ? flr(rnd(3)) - 1 : 0;

    // --- Parallax starfield ---
    for (const s of stars1) pix(s.x + shakeX, s.y + shakeY, 1); // far = dim
    for (const s of stars2) pix(s.x + shakeX, s.y + shakeY, s.bright);
    for (const s of stars3) {
      // Near stars are brighter and slightly bigger
      const sx = s.x + shakeX, sy = s.y + shakeY;
      pix(sx, sy, 3);
      pix(sx + 1, sy, 2);
    }

    if (state === "title") {
      drawTitle();
      return;
    }

    if (state === "gameover") {
      drawGameOver();
      return;
    }

    // --- Play state rendering ---

    // Enemy bullets
    for (const b of eBullets) {
      const bx = flr(b.x) + shakeX, by = flr(b.y) + shakeY;
      spr(25, bx, by);
    }

    // Enemies
    for (const e of enemies) {
      if (e.timer < 0) continue;
      const ex = flr(e.x) + shakeX, ey = flr(e.y) + shakeY;
      // Flash when hit (damaged multi-hp enemies)
      if (e.type === 12 && e.hp < 3 && flr(API.frame / 3) % 2 === 0) {
        // Draw slightly different (flash)
        spr(e.type, ex, ey);
      } else {
        spr(e.type, ex, ey);
      }
    }

    // Player bullets
    for (const b of bullets) {
      const bx = flr(b.x) + shakeX, by = flr(b.y) + shakeY;
      if (b.charged) {
        spr(21, bx - 3, by - 3);
      } else {
        spr(20, bx, by);
      }
    }

    // Player
    if (invincible <= 0 || flr(API.frame / 3) % 2 === 0) {
      const px = flr(player.x) + shakeX;
      const py = flr(player.y) + shakeY;
      // Animate thrust
      const shipSpr = API.frame % 6 < 3 ? 1 : 2;
      spr(shipSpr, px, py);

      // Charge indicator
      if (charging && chargeTime >= 10) {
        const chargePct = min(1, (chargeTime - 10) / 20);
        const csize = flr(chargePct * 4) + 2;
        const ccolor = chargeTime >= 30 ? 3 : 2;
        // Pulsing circle around ship
        if (chargeTime >= 30) {
          circ(px + 4, py + 4, 6 + sin(API.frame * 0.3) * 2, ccolor);
        } else {
          // Growing charge ring
          const r = 3 + chargePct * 4;
          circ(px + 4, py + 4, flr(r), 1);
        }
      }
    }

    // Explosions
    for (const e of explosions) {
      const ex = flr(e.x) + shakeX, ey = flr(e.y) + shakeY;
      if (e.timer > 12) spr(30, ex, ey);
      else if (e.timer > 6) spr(31, ex, ey);
      else spr(32, ex, ey);
    }

    // Particles
    for (const p of particles) pix(flr(p.x) + shakeX, flr(p.y) + shakeY, p.color);

    // --- HUD ---
    rectf(0, 0, W, 13, 0);
    text("SCORE:" + String(score).padStart(6, "0"), 4, 3, 3);
    text("WAVE:" + wave, W / 2 - 24, 3, 2);

    // Lives
    for (let i = 0; i < lives; i++) spr(40, W - 40 + i * 10, 2);

    // Charge bar
    if (charging && chargeTime >= 10) {
      const bw = min(30, flr((chargeTime - 10) * 1.5));
      const barColor = chargeTime >= 30 ? 3 : 2;
      rectf(player.x - 8 + shakeX, player.y + 10 + shakeY, bw, 2, barColor);
      rect(player.x - 9 + shakeX, player.y + 9 + shakeY, 32, 4, 1);
    }

    // Wave announcement
    if (waveMessage > 0) {
      const msgY = 140 + sin(waveMessage * 0.08) * 4;
      text("WAVE " + wave, W / 2 - 20, flr(msgY), 3);
      if (waveMessage > 60) text("GET READY!", W / 2 - 30, flr(msgY) + 12, 2);
    }
  };

  function drawTitle() {
    const ty = 55 + sin(titleAnim * 0.04) * 5;

    // Title shadow
    text("EXERION", W / 2 - 20, flr(ty) + 1, 1);
    // Title main
    text("EXERION", W / 2 - 21, flr(ty), 3);

    // Subtitle
    text("VERTICAL SHOOTER", W / 2 - 42, flr(ty) + 14, 2);
    rectf(W / 2 - 50, flr(ty) + 23, 100, 1, 1);

    // Animated enemies on title screen
    const cx = W / 2;
    for (let i = 0; i < 5; i++) {
      const angle = titleAnim * 0.03 + i * (Math.PI * 2 / 5);
      const ex = cx + cos(angle) * 50;
      const ey = flr(ty) + 50 + sin(angle) * 20;
      spr(10, flr(ex), flr(ey));
    }
    // Bomber in center
    spr(11, cx - 4, flr(ty) + 46 + flr(sin(titleAnim * 0.05) * 4));
    // Carrier below
    spr(12, cx - 4, flr(ty) + 70 + flr(sin(titleAnim * 0.03) * 3));

    // Player ship demo
    const shipY = 220 + sin(titleAnim * 0.06) * 3;
    spr(1, cx - 4, flr(shipY));

    if (flr(titleAnim / 20) % 2 === 0) text("PRESS A TO START", W / 2 - 42, 200, 3);

    // Score table
    text("-SCORE TABLE-", W / 2 - 36, 240, 2);
    spr(12, W / 2 - 44, 252); text("CARRIER  100 PTS", W / 2 - 30, 254, 2);
    spr(11, W / 2 - 44, 264); text("BOMBER    30 PTS", W / 2 - 30, 266, 2);
    spr(10, W / 2 - 44, 276); text("FIGHTER   10 PTS", W / 2 - 30, 278, 2);

    if (hiScore > 0) text("HI:" + String(hiScore).padStart(6, "0"), W / 2 - 25, 295, 2);

    text("GRAYBOX DEMO V0.1", W / 2 - 46, 310, 1);
  }

  function drawGameOver() {
    for (const p of particles) pix(flr(p.x), flr(p.y), p.color);

    const gy = 100 + sin(titleAnim * 0.05) * 2;
    text("GAME OVER", W / 2 - 24, flr(gy), 3);
    text("SCORE: " + String(score).padStart(6, "0"), W / 2 - 34, flr(gy) + 20, 2);
    text("WAVE: " + wave, W / 2 - 17, flr(gy) + 32, 2);

    if (score > hiScore) {
      if (flr(titleAnim / 10) % 2 === 0) text("NEW HIGH SCORE!", W / 2 - 40, flr(gy) + 48, 3);
    }

    if (flr(titleAnim / 20) % 2 === 0) text("PRESS A TO CONTINUE", W / 2 - 52, 210, 3);
  }

  // ============================================================
  // Boot
  // ============================================================
  if (API._init) API._init();
  setInterval(tick, 1000 / FPS);
  document.addEventListener("keydown", ensureAudio, { once: true });
  document.addEventListener("click", ensureAudio, { once: true });
})();
</script>
</body>
