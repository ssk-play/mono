<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mono — Demo: Doodle Jump</title>
<link rel="stylesheet" href="../../runtime/mono.css">
</head>
<body>
<div id="frame">
  <canvas id="screen"></canvas>
</div>
<div id="controls">
  <span>←→</span> MOVE &nbsp;&nbsp; <span>A</span> SHOOT
</div>
<script src="../../runtime/engine.js"></script>
<script>
(() => {
  "use strict";
  const W = Mono.WIDTH, H = Mono.HEIGHT;
  const { cls, pix, line, rect, rectf, circ, circf, sprite: defSprite,
          spr, text, btn, btnp, note, stop, rnd, flr, abs: _abs,
          min, max: _max, sin, cos } = Mono;
  const sprT = Mono.sprT;
  const FONT_W = 4;

  // --- 8→16 upscale helper ---
  function up(d){let o="";for(let r=0;r<8;r++){let row="";for(let c=0;c<8;c++){const ch=d[r*8+c];row+=ch+ch;}o+=row+row;}return o;}

  // --- Sprites (16x16 via upscale) ---
  // 1: Player facing right (doodle character)
  defSprite(1, up(
    "00233200" +
    "02333320" +
    "02313120" +
    "02333320" +
    "00233200" +
    "01233210" +
    "00122100" +
    "02100120"
  ));
  // 2: Player facing left
  defSprite(2, up(
    "00233200" +
    "02333320" +
    "02131320" +
    "02333320" +
    "00233200" +
    "01233210" +
    "00122100" +
    "02100120"
  ));
  // 3: Bullet (upward projectile)
  defSprite(3, up(
    "00030000" +
    "00030000" +
    "00020000" +
    "00010000" +
    "00000000" +
    "00000000" +
    "00000000" +
    "00000000"
  ));
  // 4: Enemy type A (blob monster)
  defSprite(4, up(
    "00222200" +
    "02333320" +
    "23133130" +
    "23333330" +
    "23033030" +
    "02333320" +
    "00233200" +
    "02000020"
  ));
  // 5: Enemy type B (flying creature with wings)
  defSprite(5, up(
    "20000002" +
    "32000023" +
    "03222230" +
    "02313120" +
    "02333320" +
    "03222230" +
    "00200200" +
    "00000000"
  ));
  // 6: Jetpack powerup
  defSprite(6, up(
    "00000000" +
    "03300330" +
    "03200320" +
    "03200320" +
    "03300330" +
    "02222220" +
    "01111110" +
    "00100100"
  ));
  // 7: Spring shoes powerup
  defSprite(7, up(
    "00000000" +
    "00000000" +
    "00000000" +
    "03300330" +
    "03200320" +
    "03300330" +
    "33333333" +
    "23232323"
  ));
  // 8: Player with jetpack
  defSprite(8, up(
    "00233200" +
    "32333323" +
    "32313123" +
    "32333323" +
    "00233200" +
    "01233210" +
    "00122100" +
    "02100120"
  ));
  // 9: Jetpack flame frame 1
  defSprite(9, up(
    "00000000" +
    "00000000" +
    "00000000" +
    "00000000" +
    "00000000" +
    "03000300" +
    "02300230" +
    "01230123"
  ));
  // 10: Jetpack flame frame 2
  defSprite(10, up(
    "00000000" +
    "00000000" +
    "00000000" +
    "00000000" +
    "00000000" +
    "00300030" +
    "03230323" +
    "02130213"
  ));

  // --- Platform types ---
  const PLAT_NORMAL = 0;
  const PLAT_MOVING = 1;
  const PLAT_BREAKABLE = 2;
  const PLAT_SPRING = 3;
  const PLAT_DISAPPEARING = 4;

  const PLAT_W = 22;
  const PLAT_DRAW_H = 5;

  // --- Game state ---
  const { TITLE, PLAY, GAMEOVER } = Mono.SCENE;
  const DYING = 99; // extra scene constant
  let player, platforms, bullets, enemies, powerups, particles;
  let cameraY, score, bestScore, maxHeight;
  let jetpackTimer, springShoeCount;
  let shootCooldown, deathTimer;
  let difficultyLevel;
  let titleBounce;

  bestScore = 0;

  // --- Collision helpers ---
  // Circle-vs-circle collision (center+radius)
  function circCollide(ax, ay, ar, bx, by, br) {
    const dx = ax - bx, dy = ay - by;
    const dist = dx * dx + dy * dy;
    const rSum = ar + br;
    return dist < rSum * rSum;
  }

  // Rect-vs-rect AABB collision
  function rectCollide(ax, ay, aw, ah, bx, by, bw, bh) {
    return ax < bx + bw && ax + aw > bx && ay < by + bh && ay + ah > by;
  }

  // --- Particle system ---
  function spawnParticles(x, y, count, color, spread) {
    for (let i = 0; i < count; i++) {
      particles.push({
        x: x, y: y,
        vx: (rnd(1) - 0.5) * spread,
        vy: (rnd(1) - 0.5) * spread - 1,
        life: 10 + flr(rnd(15)),
        color: color
      });
    }
  }

  // --- Platform generation ---
  function generatePlatform(worldY) {
    const diff = _max(0, (-worldY - 500) / 2000);
    difficultyLevel = diff;

    let type = PLAT_NORMAL;
    const roll = rnd(1);

    if (diff > 0.1 && roll < 0.08 + diff * 0.06) {
      type = PLAT_BREAKABLE;
    } else if (diff > 0.05 && roll < 0.15 + diff * 0.04) {
      type = PLAT_MOVING;
    } else if (diff > 0.2 && roll < 0.22 + diff * 0.03) {
      type = PLAT_DISAPPEARING;
    } else if (roll < 0.06) {
      type = PLAT_SPRING;
    }

    return {
      x: flr(rnd(W - PLAT_W)),
      y: worldY,
      type: type,
      alive: true,
      moveDir: rnd(1) > 0.5 ? 1 : -1,
      moveSpeed: 0.5 + rnd(1.5),
      alpha: 1,
      crumbleTimer: 0,
      disappearTimer: 0
    };
  }

  function ensurePlatforms() {
    const topEdge = cameraY - 90;
    let highestPlat = Infinity;
    for (const p of platforms) {
      if (p.y < highestPlat) highestPlat = p.y;
    }
    if (highestPlat === Infinity) highestPlat = cameraY + H;

    const baseGap = 33;
    const gapVariation = 12;

    while (highestPlat > topEdge) {
      const gap = baseGap + flr(rnd(gapVariation));
      highestPlat -= gap;
      const plat = generatePlatform(highestPlat);
      platforms.push(plat);

      // Spawn enemy near platform at higher altitudes
      if (difficultyLevel > 0.15 && rnd(1) < 0.04 + difficultyLevel * 0.03) {
        enemies.push({
          x: flr(rnd(W - 16)),
          y: plat.y - 26 - flr(rnd(20)),
          type: rnd(1) > 0.5 ? 0 : 1,
          vx: (rnd(1) > 0.5 ? 1 : -1) * (0.5 + rnd(1)),
          alive: true,
          frame: 0
        });
      }

      // Spawn powerup
      if (rnd(1) < 0.015) {
        powerups.push({
          x: plat.x + 4,
          y: plat.y - 18,
          type: rnd(1) > 0.5 ? "jetpack" : "spring_shoes",
          alive: true
        });
      }
    }
  }

  function resetGame() {
    player = {
      x: W / 2 - 8,
      y: H - 30,
      vx: 0,
      vy: 0,
      facing: 1
    };
    platforms = [];
    bullets = [];
    enemies = [];
    powerups = [];
    particles = [];
    cameraY = 0;
    score = 0;
    maxHeight = 0;
    jetpackTimer = 0;
    springShoeCount = 0;
    shootCooldown = 0;
    deathTimer = 0;
    difficultyLevel = 0;

    // Ground platforms
    for (let gx = 0; gx < W; gx += PLAT_W) {
      platforms.push({
        x: gx, y: H - 12,
        type: PLAT_NORMAL, alive: true,
        moveDir: 0, moveSpeed: 0, alpha: 1,
        crumbleTimer: 0, disappearTimer: 0
      });
    }
    // Starting platforms
    for (let i = 1; i < 8; i++) {
      platforms.push({
        x: flr(rnd(W - PLAT_W)),
        y: H - 12 - i * 33,
        type: PLAT_NORMAL, alive: true,
        moveDir: 0, moveSpeed: 0, alpha: 1,
        crumbleTimer: 0, disappearTimer: 0
      });
    }
  }

  // --- Sound effects ---
  function sfxJump() { note(0, "C4", 0.06); setTimeout(() => note(0, "E4", 0.06), 30); }
  function sfxSpring() { note(0, "C5", 0.06); setTimeout(() => note(0, "G5", 0.08), 40); }
  function sfxBreak() { note(1, "C2", 0.1); }
  function sfxShoot() { note(0, "G5", 0.04); setTimeout(() => note(0, "E5", 0.04), 30); }
  function sfxEnemyHit() { note(1, "E4", 0.05); setTimeout(() => note(1, "G4", 0.08), 40); }
  function sfxDeath() { note(0, "C4", 0.12); setTimeout(() => note(0, "A3", 0.15), 100); setTimeout(() => note(0, "F3", 0.2), 200); }
  function sfxJetpack() { note(1, "A5", 0.03); }
  function sfxPowerup() { note(0, "C5", 0.06); setTimeout(() => note(0, "E5", 0.06), 50); setTimeout(() => note(0, "G5", 0.08), 100); }

  // --- Text helpers ---
  function textCenter(str, y, c) {
    const w = str.length * (FONT_W + 1);
    text(str, flr((W - w) / 2), y, c);
  }

  // --- Draw background (notebook paper look) ---
  function drawBackground() {
    cls(3);

    // Faint horizontal ruled lines
    const lineSpacing = 16;
    const offsetY = ((-cameraY) % lineSpacing + lineSpacing) % lineSpacing;
    for (let ly = offsetY; ly < H; ly += lineSpacing) {
      const yy = flr(ly);
      if (yy >= 0 && yy < H) {
        for (let lx = 0; lx < W; lx += 2) {
          pix(lx, yy, 2);
        }
      }
    }

    // Left margin red-ish line (using medium gray)
    for (let ly = 0; ly < H; ly++) {
      pix(21, ly, 2);
      pix(22, ly, 2);
    }
  }

  // --- Draw platform ---
  function drawPlatform(p) {
    const sy = flr(p.y - cameraY);
    if (sy < -12 || sy > H + 12) return;
    const sx = flr(p.x);

    if (p.type === PLAT_BREAKABLE && p.crumbleTimer > 0) {
      const t = p.crumbleTimer;
      for (let i = 0; i < 5; i++) {
        const px = sx + i * 6 + flr(rnd(4)) - 2;
        const py = sy + t * 2 + flr(rnd(t));
        rectf(px, py, 4, 2, 1);
      }
      return;
    }

    if (p.type === PLAT_DISAPPEARING && p.alpha < 1) {
      if (p.alpha > 0.6) {
        for (let dx = 0; dx < PLAT_W; dx += 2) {
          rectf(sx + dx, sy, 1, PLAT_DRAW_H, 1);
        }
      } else if (p.alpha > 0.3) {
        for (let dx = 0; dx < PLAT_W; dx += 4) {
          pix(sx + dx, sy + 2, 1);
        }
      }
      return;
    }

    // Platform body - sketchy doodle rectangle
    rectf(sx + 1, sy + 1, PLAT_W - 2, PLAT_DRAW_H - 2, 2);
    // Outline (hand-drawn look with slight irregularity)
    line(sx + 1, sy, sx + PLAT_W - 2, sy, 0);
    line(sx + 1, sy + PLAT_DRAW_H - 1, sx + PLAT_W - 2, sy + PLAT_DRAW_H - 1, 0);
    line(sx, sy + 1, sx, sy + PLAT_DRAW_H - 2, 0);
    line(sx + PLAT_W - 1, sy + 1, sx + PLAT_W - 1, sy + PLAT_DRAW_H - 2, 0);
    // Fill highlight
    rectf(sx + 2, sy + 1, PLAT_W - 4, 1, 3);

    // Debug hitbox for platform top surface
    Mono.dbg(sx, sy, PLAT_W, PLAT_DRAW_H);

    // Type decorations
    if (p.type === PLAT_MOVING) {
      // Small arrow marks
      const ax = p.moveDir > 0 ? sx + PLAT_W - 5 : sx + 2;
      pix(ax, sy + 2, 0);
      pix(ax + 1, sy + 2, 0);
      // Dashed underline
      for (let dx = 3; dx < PLAT_W - 3; dx += 4) {
        pix(sx + dx, sy + 3, 1);
        pix(sx + dx + 1, sy + 3, 1);
      }
    } else if (p.type === PLAT_SPRING) {
      // Spring coil on top
      const cx = sx + flr(PLAT_W / 2) - 3;
      rectf(cx + 1, sy - 4, 4, 4, 2);
      rect(cx, sy - 5, 6, 5, 0);
      // Zigzag spring
      pix(cx + 1, sy - 3, 0);
      pix(cx + 3, sy - 2, 0);
      pix(cx + 1, sy - 1, 0);
      pix(cx + 3, sy - 4, 0);
    } else if (p.type === PLAT_BREAKABLE) {
      // Crack lines
      line(sx + 6, sy + 1, sx + 10, sy + 3, 1);
      line(sx + 18, sy + 1, sx + 22, sy + 3, 1);
      pix(sx + 14, sy + 2, 1);
    } else if (p.type === PLAT_DISAPPEARING) {
      // Dotted pattern
      for (let dx = 3; dx < PLAT_W - 3; dx += 3) {
        pix(sx + dx, sy + 2, 1);
      }
    }
  }

  // --- Draw player ---
  function drawPlayer() {
    const sx = flr(player.x);
    const sy = flr(player.y - cameraY);
    if (sy < -16 || sy > H + 16) return;

    if (jetpackTimer > 0) {
      sprT(8, sx, sy, player.facing < 0);
      // Flame
      sprT(Mono.frame % 6 < 3 ? 9 : 10, sx, sy + 16, player.facing < 0);
    } else {
      sprT(player.facing > 0 ? 1 : 2, sx, sy);
    }

    // Debug: player hitbox (circle at center)
    Mono.dbgC(sx + 8, sy + 8, 7);

    // Spring shoes visual
    if (springShoeCount > 0) {
      pix(sx + 2, sy + 14, 0);
      pix(sx + 4, sy + 14, 0);
      pix(sx + 10, sy + 14, 0);
      pix(sx + 12, sy + 14, 0);
    }

    // Nose/snout for doodle look
    if (player.facing > 0) {
      pix(sx + 14, sy + 6, 0);
    } else {
      pix(sx, sy + 6, 0);
    }
  }

  // --- Update game ---
  function updateGame() {
    // Horizontal movement
    if (btn("left")) {
      player.vx = -4;
      player.facing = -1;
    } else if (btn("right")) {
      player.vx = 4;
      player.facing = 1;
    } else {
      player.vx *= 0.85;
    }

    // Shooting
    if (shootCooldown > 0) shootCooldown--;
    if (btnp("a") && shootCooldown <= 0) {
      bullets.push({
        x: player.x + 4,
        y: player.y - 4,
        vy: -8,
        alive: true
      });
      shootCooldown = 10;
      sfxShoot();
    }

    // Jetpack
    if (jetpackTimer > 0) {
      jetpackTimer--;
      player.vy = -5;
      if (Mono.frame % 6 === 0) sfxJetpack();
      if (Mono.frame % 3 === 0) {
        spawnParticles(player.x + 4, player.y + 18, 1, 1, 2);
        spawnParticles(player.x + 12, player.y + 18, 1, 1, 2);
      }
    } else {
      // Gravity
      player.vy += 0.35;
      if (player.vy > 8) player.vy = 8;
    }

    // Apply velocity
    player.x += player.vx;
    player.y += player.vy;

    // Horizontal wrapping
    if (player.x > W) player.x = -16;
    if (player.x < -16) player.x = W;

    // Platform collision (only when falling)
    if (player.vy > 0 && jetpackTimer <= 0) {
      for (const p of platforms) {
        if (!p.alive) continue;
        if (p.type === PLAT_BREAKABLE && p.crumbleTimer > 0) continue;
        if (p.type === PLAT_DISAPPEARING && p.alpha <= 0) continue;

        const playerBottom = player.y + 16;
        const prevBottom = playerBottom - player.vy;

        if (player.x + 12 > p.x && player.x + 4 < p.x + PLAT_W &&
            prevBottom <= p.y + 2 && playerBottom >= p.y) {

          player.y = p.y - 16;
          const bounceForce = springShoeCount > 0 ? -9.5 : -7.2;

          if (p.type === PLAT_SPRING) {
            player.vy = -12;
            sfxSpring();
            spawnParticles(p.x + PLAT_W / 2, p.y, 5, 2, 4);
          } else if (p.type === PLAT_BREAKABLE) {
            p.crumbleTimer = 1;
            player.vy = bounceForce;
            sfxBreak();
          } else if (p.type === PLAT_DISAPPEARING) {
            if (p.disappearTimer === 0) p.disappearTimer = 1;
            player.vy = bounceForce;
            sfxJump();
          } else {
            player.vy = bounceForce;
            sfxJump();
          }

          if (springShoeCount > 0) springShoeCount--;
        }
      }
    }

    // Camera follows player upward
    const targetCamY = player.y - H * 0.4;
    if (targetCamY < cameraY) {
      cameraY += (targetCamY - cameraY) * 0.15;
    }

    // Score = max height in meters
    const currentHeight = flr(-player.y / 10);
    if (currentHeight > score) score = currentHeight;
    if (-player.y > maxHeight) maxHeight = -player.y;

    // Update moving platforms
    for (const p of platforms) {
      if (!p.alive) continue;
      if (p.type === PLAT_MOVING) {
        p.x += p.moveDir * p.moveSpeed;
        if (p.x < 0) { p.x = 0; p.moveDir = 1; }
        if (p.x > W - PLAT_W) { p.x = W - PLAT_W; p.moveDir = -1; }
      }
      if (p.type === PLAT_BREAKABLE && p.crumbleTimer > 0) {
        p.crumbleTimer++;
        if (p.crumbleTimer > 15) p.alive = false;
      }
      if (p.type === PLAT_DISAPPEARING && p.disappearTimer > 0) {
        p.disappearTimer++;
        p.alpha = _max(0, 1 - p.disappearTimer / 30);
        if (p.alpha <= 0) p.alive = false;
      }
    }

    // Generate new platforms above
    ensurePlatforms();

    // Cleanup below camera
    platforms = platforms.filter(p => p.y - cameraY < H + 60);
    enemies = enemies.filter(e => e.y - cameraY < H + 60 && e.alive);

    // Update bullets
    for (const b of bullets) {
      if (!b.alive) continue;
      b.y += b.vy;
      if (b.y < cameraY - 20) b.alive = false;

      // Bullet hits enemy (circle collision: bullet center vs enemy center)
      for (const e of enemies) {
        if (!e.alive) continue;
        // Bullet center: b.x+8, b.y+4; radius ~4
        // Enemy center: e.x+8, e.y+8; radius ~7
        if (circCollide(b.x + 8, b.y + 4, 4, e.x + 8, e.y + 8, 7)) {
          e.alive = false;
          b.alive = false;
          sfxEnemyHit();
          spawnParticles(e.x + 8, e.y + 8, 8, 1, 4);
          score += 50;
        }
      }
    }
    bullets = bullets.filter(b => b.alive);

    // Update enemies
    for (const e of enemies) {
      if (!e.alive) continue;
      e.x += e.vx;
      if (e.x < 0 || e.x > W - 16) e.vx = -e.vx;
      e.frame++;

      // Player center and enemy center for circle collision
      const pcx = player.x + 8, pcy = player.y + 8, pr = 6;
      const ecx = e.x + 8, ecy = e.y + 8, er = 6;

      // Player stomps enemy from above
      if (player.vy > 0 && pcy < ecy &&
          circCollide(pcx, pcy + 8, 4, ecx, ecy - 2, 6)) {
        e.alive = false;
        player.vy = -9;
        sfxEnemyHit();
        spawnParticles(ecx, ecy, 6, 1, 3);
        score += 30;
        continue;
      }
      // Enemy hits player from side/below (circle collision)
      if (circCollide(pcx, pcy, pr, ecx, ecy, er) &&
          !(player.vy > 0 && pcy + 4 < ecy)) {
        deathTimer = 60;
        sfxDeath();
        spawnParticles(pcx, pcy, 12, 0, 5);
        Mono.go(DYING); return;
      }
    }

    // Powerup collection (circle collision)
    for (const pu of powerups) {
      if (!pu.alive) continue;
      if (pu.y - cameraY > H + 30) { pu.alive = false; continue; }
      // Player center vs powerup center
      const pcx = player.x + 8, pcy = player.y + 8;
      const pucx = pu.x + 8, pucy = pu.y + 8;
      if (circCollide(pcx, pcy, 7, pucx, pucy, 7)) {
        pu.alive = false;
        sfxPowerup();
        if (pu.type === "jetpack") {
          jetpackTimer = 90;
        } else {
          springShoeCount = 3;
        }
      }
    }
    powerups = powerups.filter(pu => pu.alive);

    // Update particles
    for (const part of particles) {
      part.x += part.vx;
      part.y += part.vy;
      part.vy += 0.1;
      part.life--;
    }
    particles = particles.filter(p => p.life > 0);

    // Death: fell below camera
    if (player.y - cameraY > H + 20) {
      deathTimer = 60;
      sfxDeath();
      Mono.go(DYING); return;
    }
  }

  function drawGame() {
    drawBackground();

    // Platforms
    for (const p of platforms) {
      if (p.alive) drawPlatform(p);
    }

    // Powerups
    for (const pu of powerups) {
      if (!pu.alive) continue;
      const sx = flr(pu.x);
      const sy = flr(pu.y - cameraY);
      if (sy > -16 && sy < H + 16) {
        sprT(pu.type === "jetpack" ? 6 : 7, sx, sy);
        Mono.dbgC(sx + 8, sy + 8, 7);
      }
    }

    // Enemies
    for (const e of enemies) {
      if (!e.alive) continue;
      const sx = flr(e.x);
      const sy = flr(e.y - cameraY);
      if (sy > -16 && sy < H + 16) {
        sprT(e.type === 0 ? 4 : 5, sx, sy, e.frame % 20 < 10);
        Mono.dbgC(sx + 8, sy + 8, 6);
      }
    }

    // Bullets
    for (const b of bullets) {
      if (!b.alive) continue;
      const sx = flr(b.x);
      const sy = flr(b.y - cameraY);
      if (sy > -16 && sy < H + 16) {
        sprT(3, sx, sy);
        Mono.dbgC(sx + 8, sy + 4, 4);
      }
    }

    // Player
    drawPlayer();

    // Particles
    for (const part of particles) {
      const sx = flr(part.x);
      const sy = flr(part.y - cameraY);
      if (sx >= 0 && sx < W && sy >= 0 && sy < H) {
        pix(sx, sy, part.color);
      }
    }

    // HUD bar
    rectf(0, 0, W, 12, 3);
    line(0, 12, W - 1, 12, 2);
    text("SCORE:" + score + "M", 2, 3, 0);

    if (jetpackTimer > 0) {
      const jtStr = "JET:" + flr(jetpackTimer / 30 + 1) + "S";
      const jtW = jtStr.length * (FONT_W + 1);
      text(jtStr, flr((W - jtW) / 2), 3, 1);
    }
    if (springShoeCount > 0) {
      const spStr = "SPR:" + springShoeCount;
      const spW = spStr.length * (FONT_W + 1);
      text(spStr, W - spW - 2, 3, 1);
    }
  }

  // --- Title screen ---
  titleBounce = 0;

  function updateTitle() {
    titleBounce++;
    if (btnp("start") || btnp("a")) {
      Mono.go(PLAY); return;
    }
  }

  function drawTitle() {
    cls(3);

    // Ruled lines
    for (let ly = 0; ly < H; ly += 16) {
      for (let lx = 0; lx < W; lx += 2) {
        pix(lx, ly, 2);
      }
    }
    for (let ly = 0; ly < H; ly++) {
      pix(21, ly, 2);
      pix(22, ly, 2);
    }

    // Title with bounce
    const titleY = 41 + flr(sin(titleBounce * 0.08) * 4);
    textCenter("DOODLE JUMP", titleY + 2, 2);
    textCenter("DOODLE JUMP", titleY, 0);
    textCenter("MONO EDITION", titleY + 18, 1);

    // Bouncing character preview (16x16 sprite)
    const charY = 98 + flr(sin(titleBounce * 0.15) * 14);
    sprT(1, W / 2 - 8, charY);
    pix(W / 2 + 6, charY + 6, 0);

    // Decorative platforms
    rectf(W / 2 - 11, charY + 28, 22, 4, 1);
    line(W / 2 - 11, charY + 27, W / 2 + 10, charY + 27, 0);
    line(W / 2 - 11, charY + 32, W / 2 + 10, charY + 32, 0);

    rectf(W / 2 + 33, charY + 4, 22, 4, 1);
    rectf(W / 2 - 47, charY + 10, 22, 4, 1);

    textCenter("PRESS START", 169, 0);
    textCenter("ARROWS:MOVE  Z:SHOOT", 184, 1);

    if (bestScore > 0) {
      textCenter("BEST:" + bestScore + "M", 203, 1);
    }

    textCenter("MONO V0.1", H - 14, 2);
  }

  // --- Game over ---
  function updateGameOver() {
    if (btnp("start") || btnp("a")) {
      Mono.go(TITLE); return;
    }
  }

  function drawGameOver() {
    cls(3);

    for (let ly = 0; ly < H; ly += 16) {
      for (let lx = 0; lx < W; lx += 2) {
        pix(lx, ly, 2);
      }
    }

    textCenter("GAME OVER!", 60, 0);
    textCenter("HEIGHT:" + score + "M", 90, 0);

    if (score >= bestScore) {
      textCenter("NEW BEST!", 111, 1);
    }

    textCenter("BEST:" + bestScore + "M", 131, 1);
    textCenter("PRESS START", 169, 0);
  }

  // --- Dying state ---
  function updateDying() {
    deathTimer--;
    player.vy += 0.3;
    player.y += player.vy;

    for (const part of particles) {
      part.x += part.vx;
      part.y += part.vy;
      part.vy += 0.1;
      part.life--;
    }
    particles = particles.filter(p => p.life > 0);

    if (deathTimer <= 0) {
      if (score > bestScore) bestScore = score;
      Mono.go(GAMEOVER); return;
    }
  }

  function drawDying() {
    drawBackground();

    for (const p of platforms) {
      if (p.alive) drawPlatform(p);
    }

    drawPlayer();

    for (const part of particles) {
      const sx = flr(part.x);
      const sy = flr(part.y - cameraY);
      if (sx >= 0 && sx < W && sy >= 0 && sy < H) {
        pix(sx, sy, part.color);
      }
    }

    rectf(0, 0, W, 12, 3);
    line(0, 12, W - 1, 12, 2);
    text("SCORE:" + score + "M", 2, 3, 0);
  }

  // --- Scenes ---
  Mono.scene(TITLE, {
    init() { titleBounce = 0; },
    update() { updateTitle(); },
    draw() { drawTitle(); }
  });

  Mono.scene(PLAY, {
    init() { resetGame(); },
    update() { updateGame(); },
    draw() { drawGame(); }
  });

  Mono.scene(DYING, {
    init() {},
    update() { updateDying(); },
    draw() { drawDying(); }
  });

  Mono.scene(GAMEOVER, {
    init() {},
    update() { updateGameOver(); },
    draw() { drawGameOver(); }
  });

  Mono.go(TITLE);
  Mono.boot("screen");
})();
</script>
</body>
</html>
