<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GrayBox — Demo: Asteroids</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #0a0a0a;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100vh;
    font-family: monospace;
    overflow: hidden;
  }
  #frame {
    background: #111;
    border: 3px solid #333;
    border-radius: 8px;
    padding: 12px;
    box-shadow: 0 0 40px rgba(0,0,0,0.8), inset 0 0 20px rgba(0,0,0,0.5);
  }
  canvas {
    display: block;
    image-rendering: pixelated;
    image-rendering: crisp-edges;
  }
  #controls {
    margin-top: 12px;
    color: #6b6b6b;
    font-size: 11px;
    text-align: center;
    letter-spacing: 1px;
  }
  #controls span { color: #b0b0b0; }
</style>
</head>
<body>
<div id="frame">
  <canvas id="screen"></canvas>
</div>
<div id="controls">
  <span>&larr;&rarr;</span> ROTATE &nbsp;&nbsp; <span>&uarr;</span> THRUST &nbsp;&nbsp; <span>Z</span> SHOOT &nbsp;&nbsp; <span>X</span> HYPERSPACE &nbsp;&nbsp; <span>ENTER</span> START
</div>
<script src="../../runtime/engine.js"></script>
<script>
(() => {
  "use strict";
  const W = GrayBox.WIDTH, H = GrayBox.HEIGHT;
  const { cls, pix, line, rect, rectf, circ, circf, sprite: defSprite,
          spr, text, btn, btnp, note, stop, rnd, flr, abs: _abs,
          min, max: _max, sin, cos } = GrayBox;

  const TWO_PI = Math.PI * 2;
  const DEG = Math.PI / 180;

  // --- Sprites ---
  // 7: Explosion frame 1
  defSprite(7,
    "00000000" +
    "00200100" +
    "01002000" +
    "00031000" +
    "00130200" +
    "01000010" +
    "00100000" +
    "00000000"
  );
  // 8: Explosion frame 2
  defSprite(8,
    "20010020" +
    "01000010" +
    "00203200" +
    "03033030" +
    "00232000" +
    "01000300" +
    "20001001" +
    "00200010"
  );

  // --- Helper: wrap position ---
  function wrap(obj) {
    if (obj.x < -20) obj.x += W + 40;
    if (obj.x > W + 20) obj.x -= W + 40;
    if (obj.y < -20) obj.y += H + 40;
    if (obj.y > H + 20) obj.y -= H + 40;
  }

  // --- Draw polygon (vector-style) ---
  function drawPoly(pts, cx, cy, angle, scale, color) {
    const c = cos(angle), s = sin(angle);
    const transformed = pts.map(p => ({
      x: cx + (p[0] * c - p[1] * s) * scale,
      y: cy + (p[0] * s + p[1] * c) * scale
    }));
    for (let i = 0; i < transformed.length; i++) {
      const a = transformed[i];
      const b = transformed[(i + 1) % transformed.length];
      line(a.x, a.y, b.x, b.y, color);
    }
  }

  // Ship polygon (triangle pointing up at angle 0 = right)
  const SHIP_PTS = [
    [10, 0], [-7, -6], [-4, 0], [-7, 6]
  ];
  const THRUST_PTS = [
    [-4, -3], [-9, 0], [-4, 3]
  ];

  // Asteroid shape templates (randomized per asteroid)
  function makeAsteroidShape() {
    const pts = [];
    const n = 8 + flr(rnd(4));
    for (let i = 0; i < n; i++) {
      const angle = (i / n) * TWO_PI;
      const r = 0.7 + rnd(0.6);
      pts.push([cos(angle) * r, sin(angle) * r]);
    }
    return pts;
  }

  // UFO shape
  const UFO_PTS = [
    [-5, -2], [-2, -5], [2, -5], [5, -2],
    [8, 0], [5, 2], [-5, 2], [-8, 0]
  ];
  const UFO_LINE = [[-8, 0], [8, 0]]; // middle line

  // --- Game state ---
  let state = "title";
  let ship, bullets, asteroids, particles, debris, stars;
  let ufo, ufoBullets, ufoTimer;
  let score, lives, level;
  let shootCooldown, respawnTimer, hyperTimer;
  let hiScore = 0;
  let titlePulse = 0;
  let shakeTimer = 0;
  let extraLifeThreshold;
  let beatTimer, beatInterval, beatToggle;

  function resetGame() {
    ship = { x: W / 2, y: H / 2, angle: -Math.PI / 2, vx: 0, vy: 0, alive: true, invuln: 90 };
    bullets = [];
    asteroids = [];
    particles = [];
    debris = [];
    ufoBullets = [];
    ufo = null;
    ufoTimer = 300 + flr(rnd(300));
    score = 0;
    lives = 3;
    level = 0;
    shootCooldown = 0;
    respawnTimer = 0;
    hyperTimer = 0;
    extraLifeThreshold = 10000;
    beatTimer = 0;
    beatInterval = 30;
    beatToggle = false;
    stars = [];
    for (let i = 0; i < 60; i++) {
      stars.push({ x: flr(rnd(W)), y: flr(rnd(H)), b: flr(rnd(2)) + 1 });
    }
    spawnWave();
  }

  function spawnWave() {
    level++;
    const count = min(4 + level, 12);
    for (let i = 0; i < count; i++) {
      spawnAsteroid(3, null);
    }
    beatInterval = _max(10, 30 - level * 2);
  }

  function spawnAsteroid(size, pos) {
    let x, y;
    if (pos) {
      x = pos.x;
      y = pos.y;
    } else {
      // Spawn at edges away from ship
      const side = flr(rnd(4));
      if (side === 0) { x = rnd(W); y = -15; }
      else if (side === 1) { x = W + 15; y = rnd(H); }
      else if (side === 2) { x = rnd(W); y = H + 15; }
      else { x = -15; y = rnd(H); }
    }
    const speed = (1.0 + rnd(1.5)) * (1 + level * 0.08);
    const angle = rnd(TWO_PI);
    asteroids.push({
      x, y,
      vx: cos(angle) * speed,
      vy: sin(angle) * speed,
      size, // 3=large, 2=medium, 1=small
      radius: size === 3 ? 16 : size === 2 ? 8 : 4,
      shape: makeAsteroidShape(),
      rot: rnd(TWO_PI),
      rotSpeed: (rnd(0.04) - 0.02)
    });
  }

  function splitAsteroid(ast) {
    const pts = ast.size === 3 ? 20 : ast.size === 2 ? 50 : 100;
    score += pts;
    if (score >= extraLifeThreshold) {
      extraLifeThreshold += 10000;
      lives++;
      note(0, "C5", 0.08);
      setTimeout(() => note(0, "E5", 0.08), 80);
      setTimeout(() => note(0, "G5", 0.08), 160);
      setTimeout(() => note(0, "C6", 0.12), 240);
    }
    if (ast.size > 1) {
      const newSize = ast.size - 1;
      for (let i = 0; i < 2; i++) {
        spawnAsteroid(newSize, { x: ast.x, y: ast.y });
      }
    }
    // Debris particles
    const n = ast.size * 4;
    for (let i = 0; i < n; i++) {
      const a = rnd(TWO_PI);
      const sp = rnd(3) + 0.5;
      particles.push({
        x: ast.x, y: ast.y,
        vx: cos(a) * sp + ast.vx * 0.3,
        vy: sin(a) * sp + ast.vy * 0.3,
        life: 8 + flr(rnd(12)),
        color: flr(rnd(2)) + 2
      });
    }
    // Add line debris
    for (let i = 0; i < ast.size * 2; i++) {
      const a = rnd(TWO_PI);
      const sp = rnd(2) + 0.5;
      debris.push({
        x: ast.x, y: ast.y,
        vx: cos(a) * sp, vy: sin(a) * sp,
        len: 2 + rnd(ast.radius * 0.5),
        angle: rnd(TWO_PI), rotSpeed: rnd(0.2) - 0.1,
        life: 10 + flr(rnd(15)),
        color: 2
      });
    }
  }

  function addExplosion(x, y, count) {
    for (let i = 0; i < count; i++) {
      const a = rnd(TWO_PI);
      const sp = rnd(3) + 0.5;
      particles.push({
        x, y,
        vx: cos(a) * sp, vy: sin(a) * sp,
        life: 10 + flr(rnd(15)),
        color: flr(rnd(3)) + 1
      });
    }
  }

  // --- Sounds ---
  function shootSound() { note(0, "C6", 0.03); }
  function thrustSound() {
    // Low rumble
    note(1, "C2", 0.06);
  }
  function hitSound(size) {
    if (size === 3) { note(1, "C2", 0.1); }
    else if (size === 2) { note(1, "E3", 0.08); }
    else { note(1, "G4", 0.06); }
  }
  function deathSound() {
    note(0, "C3", 0.15); note(1, "G2", 0.15);
    setTimeout(() => { note(0, "A2", 0.2); note(1, "E2", 0.2); }, 130);
    setTimeout(() => { note(0, "F2", 0.25); }, 260);
  }
  function ufoSound() { note(1, "A4", 0.05); }
  function hyperSound() {
    note(0, "G5", 0.05);
    setTimeout(() => note(0, "D5", 0.05), 50);
    setTimeout(() => note(0, "A4", 0.06), 100);
  }
  function beatSound(high) {
    if (high) note(1, "D3", 0.06);
    else note(1, "C3", 0.06);
  }

  // --- Collision detection ---
  function dist(a, b) {
    const dx = a.x - b.x, dy = a.y - b.y;
    return Math.sqrt(dx * dx + dy * dy);
  }

  resetGame();

  // ============================================================
  // Update
  // ============================================================
  GrayBox._update = function() {
    if (state === "title") {
      titlePulse++;
      if (btnp("a") || btnp("a")) {
        state = "play";
        resetGame();
        note(0, "C5", 0.08);
        setTimeout(() => note(0, "E5", 0.08), 80);
        setTimeout(() => note(0, "G5", 0.12), 160);
      }
      return;
    }

    if (state === "gameover") {
      // Update particles
      for (let i = particles.length - 1; i >= 0; i--) {
        const p = particles[i];
        p.x += p.vx; p.y += p.vy; p.vx *= 0.98; p.vy *= 0.98; p.life--;
        if (p.life <= 0) particles.splice(i, 1);
      }
      for (let i = debris.length - 1; i >= 0; i--) {
        const d = debris[i];
        d.x += d.vx; d.y += d.vy; d.angle += d.rotSpeed; d.life--;
        if (d.life <= 0) debris.splice(i, 1);
      }
      if (btnp("a") || btnp("a")) {
        state = "title";
      }
      return;
    }

    // --- Play state ---
    if (shakeTimer > 0) shakeTimer--;

    // Heartbeat
    beatTimer--;
    if (beatTimer <= 0) {
      beatToggle = !beatToggle;
      beatSound(beatToggle);
      // Speed up when fewer asteroids
      const astCount = asteroids.length;
      beatInterval = _max(6, flr(30 - (12 - astCount) * 1.5) - level);
      beatTimer = beatInterval;
    }

    // --- Ship controls ---
    if (ship.alive && hyperTimer <= 0) {
      // Rotation
      if (btn("left")) ship.angle -= 0.1;
      if (btn("right")) ship.angle += 0.1;

      // Thrust
      if (btn("up")) {
        ship.vx += cos(ship.angle) * 0.15;
        ship.vy += sin(ship.angle) * 0.15;
        if (GrayBox.frame % 4 === 0) thrustSound();
      }

      // Speed cap
      const spd = Math.sqrt(ship.vx * ship.vx + ship.vy * ship.vy);
      if (spd > 5) {
        ship.vx = (ship.vx / spd) * 5;
        ship.vy = (ship.vy / spd) * 5;
      }

      // Friction
      ship.vx *= 0.995;
      ship.vy *= 0.995;

      // Shoot
      if (shootCooldown > 0) shootCooldown--;
      if (btnp("a") && shootCooldown <= 0 && bullets.length < 4) {
        const bSpeed = 7;
        bullets.push({
          x: ship.x + cos(ship.angle) * 10,
          y: ship.y + sin(ship.angle) * 10,
          vx: cos(ship.angle) * bSpeed + ship.vx * 0.3,
          vy: sin(ship.angle) * bSpeed + ship.vy * 0.3,
          life: 40
        });
        shootCooldown = 6;
        shootSound();
      }

      // Hyperspace (B button)
      if (btnp("b")) {
        hyperTimer = 20;
        ship.x = 30 + rnd(W - 60);
        ship.y = 30 + rnd(H - 60);
        ship.vx *= 0.3;
        ship.vy *= 0.3;
        hyperSound();
        // Small chance of death on hyperspace
        if (rnd(1) < 0.05) {
          killShip();
        }
      }
    }

    if (hyperTimer > 0) hyperTimer--;

    // Move ship
    if (ship.alive) {
      ship.x += ship.vx;
      ship.y += ship.vy;
      wrap(ship);
      if (ship.invuln > 0) ship.invuln--;
    }

    // Respawn timer
    if (!ship.alive) {
      respawnTimer--;
      if (respawnTimer <= 0) {
        if (lives > 0) {
          ship.alive = true;
          ship.x = W / 2;
          ship.y = H / 2;
          ship.vx = 0;
          ship.vy = 0;
          ship.angle = -Math.PI / 2;
          ship.invuln = 90;
        } else {
          if (score > hiScore) hiScore = score;
          state = "gameover";
        }
      }
    }

    // Move bullets
    for (let i = bullets.length - 1; i >= 0; i--) {
      const b = bullets[i];
      b.x += b.vx; b.y += b.vy; b.life--;
      wrap(b);
      if (b.life <= 0) bullets.splice(i, 1);
    }

    // Move asteroids
    for (const a of asteroids) {
      a.x += a.vx; a.y += a.vy;
      a.rot += a.rotSpeed;
      wrap(a);
    }

    // --- UFO ---
    ufoTimer--;
    if (!ufo && ufoTimer <= 0 && asteroids.length > 0) {
      const small = rnd(1) < 0.3 + level * 0.05;
      const side = rnd(1) < 0.5 ? -10 : W + 10;
      ufo = {
        x: side, y: 30 + rnd(H - 60),
        vx: side < 0 ? 1.5 : -1.5,
        vy: 0,
        small: small,
        radius: small ? 6 : 10,
        timer: 0,
        shootTimer: 40 + flr(rnd(30)),
        dirTimer: 30 + flr(rnd(40)),
        pts: small ? 1000 : 200
      };
    }

    if (ufo) {
      ufo.x += ufo.vx;
      ufo.y += ufo.vy;
      ufo.timer++;

      // Change vertical direction
      ufo.dirTimer--;
      if (ufo.dirTimer <= 0) {
        ufo.vy = rnd(2) - 1;
        ufo.dirTimer = 30 + flr(rnd(40));
      }

      // Keep in vertical bounds
      if (ufo.y < 20) ufo.vy = _abs(ufo.vy);
      if (ufo.y > H - 20) ufo.vy = -_abs(ufo.vy);

      // UFO sound
      if (ufo.timer % 8 === 0) ufoSound();

      // UFO shoots
      ufo.shootTimer--;
      if (ufo.shootTimer <= 0 && ship.alive) {
        let angle;
        if (ufo.small) {
          // Small UFO aims at player
          angle = Math.atan2(ship.y - ufo.y, ship.x - ufo.x) + (rnd(0.3) - 0.15);
        } else {
          // Big UFO shoots randomly
          angle = rnd(TWO_PI);
        }
        ufoBullets.push({
          x: ufo.x, y: ufo.y,
          vx: cos(angle) * 3.5,
          vy: sin(angle) * 3.5,
          life: 60
        });
        ufo.shootTimer = ufo.small ? 25 + flr(rnd(20)) : 35 + flr(rnd(25));
      }

      // UFO leaves screen
      if (ufo.x < -20 || ufo.x > W + 20) {
        ufo = null;
        ufoTimer = 300 + flr(rnd(400));
      }
    }

    // Move UFO bullets
    for (let i = ufoBullets.length - 1; i >= 0; i--) {
      const b = ufoBullets[i];
      b.x += b.vx; b.y += b.vy; b.life--;
      if (b.life <= 0 || b.x < -5 || b.x > W + 5 || b.y < -5 || b.y > H + 5) {
        ufoBullets.splice(i, 1);
      }
    }

    // --- Collisions ---

    // Bullets vs asteroids
    for (let i = bullets.length - 1; i >= 0; i--) {
      const b = bullets[i];
      let hit = false;
      for (let j = asteroids.length - 1; j >= 0; j--) {
        const a = asteroids[j];
        if (dist(b, a) < a.radius) {
          hitSound(a.size);
          splitAsteroid(a);
          asteroids.splice(j, 1);
          hit = true;
          break;
        }
      }
      if (hit) bullets.splice(i, 1);
    }

    // Bullets vs UFO
    if (ufo) {
      for (let i = bullets.length - 1; i >= 0; i--) {
        const b = bullets[i];
        if (dist(b, ufo) < ufo.radius) {
          score += ufo.pts;
          addExplosion(ufo.x, ufo.y, 20);
          hitSound(3);
          shakeTimer = 8;
          ufo = null;
          ufoTimer = 400 + flr(rnd(300));
          bullets.splice(i, 1);
          break;
        }
      }
    }

    // Ship vs asteroids
    if (ship.alive && ship.invuln <= 0 && hyperTimer <= 0) {
      for (let j = asteroids.length - 1; j >= 0; j--) {
        const a = asteroids[j];
        if (dist(ship, a) < a.radius + 5) {
          splitAsteroid(a);
          asteroids.splice(j, 1);
          killShip();
          break;
        }
      }
    }

    // Ship vs UFO
    if (ship.alive && ship.invuln <= 0 && hyperTimer <= 0 && ufo) {
      if (dist(ship, ufo) < ufo.radius + 5) {
        addExplosion(ufo.x, ufo.y, 15);
        ufo = null;
        ufoTimer = 400 + flr(rnd(300));
        killShip();
      }
    }

    // UFO bullets vs ship
    if (ship.alive && ship.invuln <= 0 && hyperTimer <= 0) {
      for (let i = ufoBullets.length - 1; i >= 0; i--) {
        const b = ufoBullets[i];
        if (dist(b, ship) < 6) {
          ufoBullets.splice(i, 1);
          killShip();
          break;
        }
      }
    }

    // UFO bullets vs asteroids (they can destroy asteroids too)
    for (let i = ufoBullets.length - 1; i >= 0; i--) {
      const b = ufoBullets[i];
      for (let j = asteroids.length - 1; j >= 0; j--) {
        const a = asteroids[j];
        if (dist(b, a) < a.radius) {
          splitAsteroid(a);
          asteroids.splice(j, 1);
          ufoBullets.splice(i, 1);
          break;
        }
      }
    }

    // Update particles
    for (let i = particles.length - 1; i >= 0; i--) {
      const p = particles[i];
      p.x += p.vx; p.y += p.vy; p.vx *= 0.97; p.vy *= 0.97; p.life--;
      if (p.life <= 0) particles.splice(i, 1);
    }

    // Update debris
    for (let i = debris.length - 1; i >= 0; i--) {
      const d = debris[i];
      d.x += d.vx; d.y += d.vy; d.angle += d.rotSpeed; d.life--;
      if (d.life <= 0) debris.splice(i, 1);
    }

    // Wave clear
    if (asteroids.length === 0 && !ufo) {
      spawnWave();
      note(0, "C5", 0.08);
      setTimeout(() => note(0, "G5", 0.1), 100);
    }
  };

  function killShip() {
    ship.alive = false;
    lives--;
    addExplosion(ship.x, ship.y, 25);
    // Ship debris lines
    for (let i = 0; i < 6; i++) {
      const a = rnd(TWO_PI);
      const sp = rnd(2) + 0.5;
      debris.push({
        x: ship.x, y: ship.y,
        vx: cos(a) * sp + ship.vx * 0.3,
        vy: sin(a) * sp + ship.vy * 0.3,
        len: 3 + rnd(5), angle: rnd(TWO_PI),
        rotSpeed: rnd(0.15) - 0.075,
        life: 20 + flr(rnd(20)), color: 3
      });
    }
    deathSound();
    shakeTimer = 12;
    respawnTimer = 60;
    ship.vx = 0;
    ship.vy = 0;
  }

  // ============================================================
  // Draw
  // ============================================================
  GrayBox._draw = function() {
    cls(0);

    // Screen shake offset
    let sx = 0, sy = 0;
    if (shakeTimer > 0) {
      sx = flr(rnd(5)) - 2;
      sy = flr(rnd(5)) - 2;
    }

    // Stars background
    for (const s of stars) pix(s.x + sx, s.y + sy, s.b);

    if (state === "title") {
      drawTitle();
      return;
    }

    if (state === "gameover") {
      drawGameOver();
      return;
    }

    // --- Play state rendering ---

    // Asteroids
    for (const a of asteroids) {
      const col = a.size === 3 ? 3 : a.size === 2 ? 2 : 2;
      drawPoly(a.shape, a.x + sx, a.y + sy, a.rot, a.radius, col);
    }

    // UFO
    if (ufo) {
      const s2 = ufo.small ? 0.7 : 1.0;
      drawPoly(UFO_PTS, ufo.x + sx, ufo.y + sy, 0, s2, 3);
      // Middle line
      line(flr(ufo.x - 8 * s2 + sx), flr(ufo.y + sy), flr(ufo.x + 8 * s2 + sx), flr(ufo.y + sy), 2);
      // Dome
      const dw = ufo.small ? 2 : 3;
      line(flr(ufo.x - dw + sx), flr(ufo.y - 2 * s2 + sy), flr(ufo.x + sx), flr(ufo.y - 5 * s2 + sy), 2);
      line(flr(ufo.x + sx), flr(ufo.y - 5 * s2 + sy), flr(ufo.x + dw + sx), flr(ufo.y - 2 * s2 + sy), 2);
    }

    // UFO bullets
    for (const b of ufoBullets) {
      pix(flr(b.x + sx), flr(b.y + sy), 3);
      pix(flr(b.x + sx) + 1, flr(b.y + sy), 2);
      pix(flr(b.x + sx), flr(b.y + sy) + 1, 2);
    }

    // Player bullets
    for (const b of bullets) {
      pix(flr(b.x + sx), flr(b.y + sy), 3);
      pix(flr(b.x + sx) + 1, flr(b.y + sy), 3);
      pix(flr(b.x + sx), flr(b.y + sy) + 1, 2);
    }

    // Ship
    if (ship.alive && hyperTimer <= 0) {
      // Blink during invulnerability
      if (ship.invuln <= 0 || flr(GrayBox.frame / 3) % 2 === 0) {
        drawPoly(SHIP_PTS, ship.x + sx, ship.y + sy, ship.angle, 1, 3);

        // Thrust flame
        if (btn("up")) {
          const flicker = 0.6 + rnd(0.8);
          const tc = flr(GrayBox.frame / 2) % 2 === 0 ? 3 : 2;
          const c2 = cos(ship.angle), s2 = sin(ship.angle);
          const bx = ship.x - c2 * 5 + sx;
          const by = ship.y - s2 * 5 + sy;
          const tx = bx - c2 * 6 * flicker;
          const ty = by - s2 * 6 * flicker;
          const px = -sin(ship.angle) * 3;
          const py = cos(ship.angle) * 3;
          line(flr(bx + px), flr(by + py), flr(tx), flr(ty), tc);
          line(flr(bx - px), flr(by - py), flr(tx), flr(ty), tc);
          // Thrust particles
          if (GrayBox.frame % 2 === 0) {
            particles.push({
              x: tx, y: ty,
              vx: -c2 * rnd(2) + rnd(1) - 0.5,
              vy: -s2 * rnd(2) + rnd(1) - 0.5,
              life: 4 + flr(rnd(6)),
              color: flr(rnd(2)) + 1
            });
          }
        }
      }
    }

    // Particles
    for (const p of particles) pix(flr(p.x + sx), flr(p.y + sy), p.color);

    // Debris lines
    for (const d of debris) {
      const dx = cos(d.angle) * d.len * 0.5;
      const dy = sin(d.angle) * d.len * 0.5;
      const c = d.life < 5 ? 1 : d.color;
      line(flr(d.x - dx + sx), flr(d.y - dy + sy), flr(d.x + dx + sx), flr(d.y + dy + sy), c);
    }

    // HUD
    drawHUD();
  };

  function drawHUD() {
    text("SCORE", 3, 2, 2);
    text(String(score), 3, 8, 3);

    text("HI", W - 40, 2, 2);
    text(String(_max(hiScore, score)), W - 40, 8, 3);

    // Lives (small ship icons)
    for (let i = 0; i < lives; i++) {
      const lx = 3 + i * 14;
      const ly = 18;
      drawPoly(SHIP_PTS, lx + 4, ly + 4, -Math.PI / 2, 0.5, 2);
    }

    // Level indicator
    text("LV" + level, W / 2 - 7, 2, 1);
  }

  function drawTitle() {
    // Large vector title "ASTEROIDS"
    const cy = 60 + sin(GrayBox.frame * 0.04) * 3;

    // Draw some floating asteroids in the background
    const t = GrayBox.frame * 0.01;
    for (let i = 0; i < 5; i++) {
      const ax = (67 + i * 60 + t * 20 * (i + 1)) % (W + 40) - 20;
      const ay = 30 + i * 38 + sin(t * 2 + i) * 15;
      const sz = 8 + i * 3;
      const shape = [
        [cos(0)*0.8, sin(0)*0.8], [cos(0.8)*1, sin(0.8)*1],
        [cos(1.6)*0.7, sin(1.6)*0.7], [cos(2.4)*0.9, sin(2.4)*0.9],
        [cos(3.2)*1.1, sin(3.2)*1.1], [cos(4.0)*0.8, sin(4.0)*0.8],
        [cos(4.8)*1, sin(4.8)*1], [cos(5.6)*0.7, sin(5.6)*0.7]
      ];
      drawPoly(shape, ax, ay, t + i, sz, 1);
    }

    // Title text
    text("ASTEROIDS", 138, flr(cy), 3);
    // Shadow
    text("ASTEROIDS", 139, flr(cy) + 1, 1);

    // Decorative line
    rectf(107, flr(cy) + 11, 107, 1, 2);

    // Ship display
    const shipX = W / 2;
    const shipY = flr(cy) + 26;
    drawPoly(SHIP_PTS, shipX, shipY, -Math.PI / 2 + sin(GrayBox.frame * 0.05) * 0.3, 1.5, 3);

    // Blinking start text
    if (flr(GrayBox.frame / 20) % 2 === 0) {
      text("PRESS A TO START", 120, 143, 3);
    }

    // Score table
    text("- SCORE TABLE -", 123, 165, 2);
    text("LARGE  ASTEROID   20", 110, 176, 2);
    text("MEDIUM ASTEROID   50", 110, 183, 2);
    text("SMALL  ASTEROID  100", 110, 191, 2);
    text("LARGE  UFO       200", 110, 198, 2);
    text("SMALL  UFO      1000", 110, 206, 2);

    if (hiScore > 0) {
      text("HI SCORE: " + hiScore, 120, 218, 1);
    }

    text("GRAYBOX DEMO V0.1", 118, 231, 1);
  }

  function drawGameOver() {
    // Particles and debris still animate
    for (const p of particles) pix(flr(p.x), flr(p.y), p.color);
    for (const d of debris) {
      const dx = cos(d.angle) * d.len * 0.5;
      const dy = sin(d.angle) * d.len * 0.5;
      line(flr(d.x - dx), flr(d.y - dy), flr(d.x + dx), flr(d.y + dy), d.life < 5 ? 1 : d.color);
    }

    text("GAME OVER", 138, 83, 3);
    text("SCORE: " + score, 127, 101, 2);
    text("LEVEL: " + level, 133, 113, 2);

    if (score > hiScore) {
      if (flr(GrayBox.frame / 10) % 2 === 0) {
        text("NEW HI SCORE!", 128, 128, 3);
      }
    }

    if (flr(GrayBox.frame / 20) % 2 === 0) {
      text("PRESS A TO CONTINUE", 113, 158, 3);
    }
  }

  GrayBox.boot("screen");
})();
</script>
