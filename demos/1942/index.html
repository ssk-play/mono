  // --- Collision helpers ---
  // Rect vs rect
  function hitRR(ax, ay, aw, ah, bx, by, bw, bh) {
    return ax + aw > bx && ax < bx + bw && ay + ah > by && ay < by + bh;
  }
  // Circle vs circle
  function hitCC(ax, ay, ar, bx, by, br) {
    const dx = ax - bx, dy = ay - by;
    const dist = ar + br;
    return dx * dx + dy * dy < dist * dist;
  }
  // Circle vs rect
  function hitCR(cx, cy, cr, rx, ry, rw, rh) {
    const nearX = _max(rx, min(cx, rx + rw));
    const nearY = _max(ry, min(cy, ry + rh));
    const dx = cx - nearX, dy = cy - nearY;
    return dx * dx + dy * dy < cr * cr;
  }

  // --- Formation patterns ---
  function spawnVFormation(baseX, baseY, dir, isLeader) {
    const count = 5;
    const arr = [];
    for (let i = 0; i < count; i++) {
      const offX = (i - 2) * 16 * dir;
      const offY = _abs(i - 2) * 12;
      arr.push({
        x: baseX + offX, y: baseY - 45 + offY,
        tx: baseX + offX, ty: baseY + offY,
        type: (i === 2 && isLeader) ? "leader" : "small",
        hp: 1, pts: (i === 2 && isLeader) ? 200 : 100,
        vx: 0, vy: 1.5, state: "entering", enterT: 0,
        hoverT: 0,
        shootTimer: 60 + flr(rnd(90)),
        pathFn: null, diveAngle: 0
      });
    }
    return arr;
  }

  function spawnDiamondFormation(baseX, baseY, isLeader) {
    const offsets = [[0,-16],[16,0],[0,16],[-16,0],[0,0]];
    const arr = [];
    for (let i = 0; i < offsets.length; i++) {
      arr.push({
        x: baseX + offsets[i][0], y: baseY - 53,
        tx: baseX + offsets[i][0], ty: baseY + offsets[i][1],
        type: (i === 4 && isLeader) ? "leader" : (i === 4 ? "medium" : "small"),
        hp: (i === 4) ? 2 : 1,
        pts: (i === 4 && isLeader) ? 300 : (i === 4 ? 150 : 100),
        vx: 0, vy: 1.5, state: "entering", enterT: 0,
        hoverT: 0,
        shootTimer: 50 + flr(rnd(80)),
        pathFn: null, diveAngle: 0
      });
    }
    return arr;
  }

  function spawnDiveBomber(x) {
    return [{
      x: x, y: -10,
      tx: x, ty: 60,
      type: "medium", hp: 2, pts: 200,
      vx: 0, vy: 2.5, state: "diving", enterT: 0,
      hoverT: 0,
      shootTimer: 30 + flr(rnd(40)),
      pathFn: "dive", diveAngle: Math.PI / 2
    }];
  }

  function spawnSideLine(y, fromLeft) {
    const arr = [];
    const count = 6;
    for (let i = 0; i < count; i++) {
      const sx = fromLeft ? -7 - i * 12 : W + 7 + i * 12;
      const tx = fromLeft ? 40 + i * 33 : W - 40 - i * 33;
      arr.push({
        x: sx, y: y + sin(i) * 8,
        tx: tx, ty: y + sin(i) * 8,
        type: "small", hp: 1, pts: 100,
        vx: fromLeft ? 2.5 : -2.5, vy: 0, state: "entering", enterT: 0,
        hoverT: 0,
        shootTimer: 40 + flr(rnd(60)),
        pathFn: null, diveAngle: 0
      });
    }
    return arr;
  }

  function spawnLargeBomber(x) {
    return [{
      x: x, y: -20,
      tx: x, ty: 38 + flr(rnd(30)),

      vx: 0, vy: 1.2, state: "entering", enterT: 0,
      hoverT: 0,
      shootTimer: 20 + flr(rnd(30)),
      pathFn: null, diveAngle: 0

  }

  function buildWaveQueue(stg) {
    const queue = [];
    const numWaves = 5 + min(stg, 4);
    for (let i = 0; i < numWaves; i++) {
      const t = 60 + i * 100;
      const pattern = flr(rnd(6));
      const hasLeader = rnd(1) < 0.25 + stg * 0.05;
      const cx = 67 + flr(rnd(W - 134));
      if (pattern === 0) queue.push({ t, fn: () => spawnVFormation(cx, 45, 1, hasLeader) });
      else if (pattern === 1) queue.push({ t, fn: () => spawnVFormation(cx, 45, -1, hasLeader) });
      else if (pattern === 2) queue.push({ t, fn: () => spawnDiamondFormation(cx, 60, hasLeader) });
      else if (pattern === 3) queue.push({ t, fn: () => spawnDiveBomber(cx) });
      else if (pattern === 4) queue.push({ t, fn: () => spawnSideLine(30 + flr(rnd(45)), rnd(1) < 0.5) });
      else queue.push({ t, fn: () => spawnLargeBomber(cx) });
    }
    return queue;
  }

  function startStage() {
    stage++;
    stageMsg = "STAGE " + stage;
    stageMsgTimer = 90;
    stageTimer = 0;
    stageLength = 800 + stage * 100;
    bossSpawned = false;
    boss = null;
    waveQueue = buildWaveQueue(stage);
    loops = 3;
    terrainSeed = terrainSeed + stage * 7;
  }

  function spawnBoss() {
    bossSpawned = true;
    const bossHP = 12 + stage * 5;
    boss = {
      x: W / 2 - 16, y: -20,
      hp: bossHP, maxHp: bossHP,
      phase: "enter",
      pts: 1000 + stage * 500,
      shootTimer: 0,
      moveTimer: 0,
      moveDir: 1,
      deathTimer: 0
    };
    stageMsg = "WARNING!";
    stageMsgTimer = 60;
  }

  function addExplosion(x, y) {
    explosions.push({ x, y, timer: 12 });
    for (let i = 0; i < 6; i++)
      particles.push({
        x: x + 8, y: y + 8,
        vx: rnd(4) - 2, vy: rnd(4) - 2,
        life: 6 + flr(rnd(10)),
        color: flr(rnd(3)) + 1
      });
  }

  function addBigExplosion(x, y) {
    for (let dx = -1; dx <= 1; dx++) {
      for (let dy = -1; dy <= 1; dy++) {
        addExplosion(x + dx * 6, y + dy * 6);
      }
    }
  }

  const EN_L_HBX = 2, EN_L_HBY = 2, EN_L_HBW = 28, EN_L_HBH = 28;
  // Boss (32x32 multi-sprite)
  const BOSS_HBX = 2, BOSS_HBY = 2, BOSS_HBW = 28, BOSS_HBH = 28;
  // Power-up: circle
  const PU_CX = 8, PU_CY = 8, PU_R = 7;

  function enemyHitbox(e) {
    if (e.type === "large") return { x: e.x + EN_L_HBX, y: e.y + EN_L_HBY, w: EN_L_HBW, h: EN_L_HBH };
    if (e.type === "medium") return { x: e.x + EN_M_HBX, y: e.y + EN_M_HBY, w: EN_M_HBW, h: EN_M_HBH };
    return { x: e.x + EN_S_HBX, y: e.y + EN_S_HBY, w: EN_S_HBW, h: EN_S_HBH };
  }

  function playerHit() {
    addExplosion(player.x, player.y);
    deathSound();
    lives--;
    wingmen = [];
    shotType = 0;
    shotTypeTimer = 0;
    player.x = W / 2 - 8;
    player.y = H - 30;
    invincTimer = 60;
    if (lives <= 0) {
      if (score > hiScore) hiScore = score;
      Mono.go(GAMEOVER);
      return;
    }
  }

  // --- Title Scene ---
  Mono.scene(TITLE, {
    init() { resetGame(); },
    update() {
      scrollY += 0.5;
      scrollY2 += 0.25;
      if (btnp("start") || btnp("a")) {
        Mono.go(PLAY);
        note(0, "C5", 0.1);
        setTimeout(() => note(0, "E5", 0.1), 100);
        setTimeout(() => note(0, "G5", 0.15), 200);
      }
    },
    draw() {
      cls(0);
      drawTerrain();
      drawTitle();
    }
  });

  // --- Play Scene ---
  Mono.scene(PLAY, {
    init() {
      resetGame();
    },
    update() {
    // Scroll terrain always
    scrollY += 0.5;
    scrollY2 += 0.25;
    // --- Play state ---
    stageTimer++;
    if (stageMsgTimer > 0) stageMsgTimer--;

    // Loop (dodge roll)
    if (loopTimer > 0) {
      loopTimer--;
      loopAnimAngle += 0.35;
      invincTimer = 5;
    }

    if (invincTimer > 0) invincTimer--;

    // Player movement (4-directional)
    if (btn("left")) player.x -= player.speed;
    if (btn("right")) player.x += player.speed;
    if (btn("up")) player.y -= player.speed;
    if (btn("down")) player.y += player.speed;
    player.x = _max(0, min(W - 16, player.x));
    player.y = _max(10, min(H - 16, player.y));

    // Loop activation (X button)
    if (btnp("b") && loops > 0 && loopTimer <= 0) {
      loops--;
      loopTimer = 30;
      loopAnimAngle = 0;
      loopSound();
    }

    // Player shoot (Z button, hold to fire)
    if (shootCooldown > 0) shootCooldown--;
    const maxBul = shotType === 2 ? 15 : 8;
    if (btn("a") && shootCooldown <= 0 && bullets.length < maxBul) {
      if (shotType === 0) {
        bullets.push({ x: player.x + 4, y: player.y - 4, vx: 0, vy: -7 });
      } else if (shotType === 1) {
        bullets.push({ x: player.x + 2, y: player.y - 4, vx: 0, vy: -7 });
        bullets.push({ x: player.x + 10, y: player.y - 4, vx: 0, vy: -7 });
      } else {
        bullets.push({ x: player.x + 4, y: player.y - 4, vx: 0, vy: -7 });
        bullets.push({ x: player.x + 2, y: player.y - 2, vx: -1.5, vy: -6.5 });
        bullets.push({ x: player.x + 10, y: player.y - 2, vx: 1.5, vy: -6.5 });
      }
      shootCooldown = shotType === 2 ? 6 : 7;
      shootSound();
      // Wingmen shoot
      for (const wm of wingmen) {
        bullets.push({ x: wm.x + 4, y: wm.y - 4, vx: 0, vy: -7 });
      }
    }

    // Shot type timer
    if (shotTypeTimer > 0) {
      shotTypeTimer--;
      if (shotTypeTimer <= 0) shotType = 0;
    }

    // Update bullets
    for (let i = bullets.length - 1; i >= 0; i--) {
      const b = bullets[i];
      b.x += b.vx;
      b.y += b.vy;
      if (b.y < -16 || b.x < -16 || b.x > W + 16) bullets.splice(i, 1);
    }

    // Update wingmen
    for (let i = 0; i < wingmen.length; i++) {
      const wm = wingmen[i];
      const targetX = player.x + (i === 0 ? -20 : 20);
      const targetY = player.y + 4;
      wm.x += (targetX - wm.x) * 0.12;
      wm.y += (targetY - wm.y) * 0.12;
    }

    // Spawn waves from queue
    for (let i = waveQueue.length - 1; i >= 0; i--) {
      if (stageTimer >= waveQueue[i].t) {
        const newEn = waveQueue[i].fn();
        for (const e of newEn) enemies.push(e);
        waveQueue.splice(i, 1);
      }
    }

    // Spawn boss when stage timer reached and no more waves
    if (stageTimer >= stageLength && !bossSpawned) {
      spawnBoss();
      bossWarnSound();
    }

    // Update enemies
    for (let i = enemies.length - 1; i >= 0; i--) {
      const e = enemies[i];

      if (e.state === "entering") {
        e.enterT++;
        const dx = e.tx - e.x;
        const dy = e.ty - e.y;
        const dist = Math.sqrt(dx * dx + dy * dy);
        if (dist < 3) {
          e.state = "hovering";
          e.x = e.tx;
          e.y = e.ty;
          e.hoverT = 0;
        } else {
          const spd = 2.5;
          e.x += (dx / dist) * spd;
          e.y += (dy / dist) * spd;
        }
      }

      if (e.state === "hovering") {
        e.hoverT++;
        e.x = e.tx + sin(e.hoverT * 0.05) * 15;
        e.y = e.ty + sin(e.hoverT * 0.03) * 5;
        if (e.hoverT > 90 + flr(rnd(60))) {
          e.state = "diving";
          e.diveAngle = Math.atan2(player.y - e.y, player.x - e.x);
        }
      }

      if (e.state === "diving") {
        if (e.pathFn === "dive") {
          e.y += 2.5;
          e.x += sin(e.y * 0.05) * 2;
        } else {
          const spd = 2.2 + stage * 0.15;
          e.x += cos(e.diveAngle) * spd;
          e.y += sin(e.diveAngle) * spd;
          const tAngle = Math.atan2(player.y - e.y, player.x - e.x);
          e.diveAngle += (tAngle - e.diveAngle) * 0.02;
        }
      }

      // Offscreen removal
      if (e.y > H + 15 || e.y < -60 || e.x < -33 || e.x > W + 33) {
        if (e.state !== "entering") { enemies.splice(i, 1); continue; }
      }

      // Enemy shooting
      e.shootTimer--;
      if (e.shootTimer <= 0 && e.y > 8 && e.y < H - 23) {
        const angle = Math.atan2(player.y - e.y, player.x - e.x);
        const spd = 2 + stage * 0.15;
        eBullets.push({ x: e.x + 4, y: e.y + 16, vx: cos(angle) * spd, vy: sin(angle) * spd });
        e.shootTimer = _max(25, 70 - stage * 4) + flr(rnd(40));
      }

      // Bullet-enemy collision (circle bullet vs rect enemy)
      const eh = enemyHitbox(e);
      for (let j = bullets.length - 1; j >= 0; j--) {
        const b = bullets[j];
        const bcx = b.x + PB_CX, bcy = b.y + PB_CY;
        if (hitCR(bcx, bcy, PB_R, eh.x, eh.y, eh.w, eh.h)) {
          bullets.splice(j, 1);
          e.hp--;
          if (e.hp <= 0) {
            if (e.type === "large") {
              addExplosion(e.x, e.y);
              addExplosion(e.x + 16, e.y);
              addExplosion(e.x + 8, e.y + 16);
            } else {
              addExplosion(e.x, e.y);
            }
            score += e.pts;
            hitSound();
            // Drop powerup from leaders
            if (e.type === "leader") {
              const pType = flr(rnd(3));
              powerups.push({ x: e.x, y: e.y, type: pType, vy: 1 });
            }
            enemies.splice(i, 1);
          } else {
            note(1, "A4", 0.02);
          }
          break;
        }
      }
    }

    // Update boss
    if (boss) {
      if (boss.phase === "enter") {
        boss.y += 1;
        if (boss.y >= 15) {
          boss.y = 15;
          boss.phase = "fight";
          boss.moveTimer = 0;
        }
      }
      if (boss.phase === "fight") {
        boss.moveTimer++;
        boss.x += boss.moveDir * (1 + stage * 0.2);
        if (boss.x > W - 32) boss.moveDir = -1;
        if (boss.x < 5) boss.moveDir = 1;

        // Also bob vertically
        boss.y = 15 + sin(boss.moveTimer * 0.03) * 8;

        boss.shootTimer++;
        const shootRate = _max(8, 18 - stage);
        if (boss.shootTimer >= shootRate) {
          boss.shootTimer = 0;
          const angle = Math.atan2(player.y - boss.y - 16, player.x - boss.x - 16);
          const spd = 2.5;
          eBullets.push({ x: boss.x + 12, y: boss.y + 32, vx: cos(angle) * spd, vy: sin(angle) * spd });
          if (stage >= 3) {
            eBullets.push({ x: boss.x + 20, y: boss.y + 32, vx: cos(angle + 0.2) * spd, vy: sin(angle + 0.2) * spd });
            eBullets.push({ x: boss.x + 4, y: boss.y + 32, vx: cos(angle - 0.2) * spd, vy: sin(angle - 0.2) * spd });
          }
          if (stage >= 6) {
            eBullets.push({ x: boss.x + 16, y: boss.y + 32, vx: cos(angle + 0.4) * spd, vy: sin(angle + 0.4) * spd });
            eBullets.push({ x: boss.x + 8, y: boss.y + 32, vx: cos(angle - 0.4) * spd, vy: sin(angle - 0.4) * spd });
          }
        }

        // Bullet-boss collision (circle bullet vs rect boss)
        const bossBox = { x: boss.x + BOSS_HBX, y: boss.y + BOSS_HBY, w: BOSS_HBW, h: BOSS_HBH };
        for (let j = bullets.length - 1; j >= 0; j--) {
          const b = bullets[j];
          const bcx = b.x + PB_CX, bcy = b.y + PB_CY;
          if (hitCR(bcx, bcy, PB_R, bossBox.x, bossBox.y, bossBox.w, bossBox.h)) {
            bullets.splice(j, 1);
            boss.hp--;
            note(1, "A4", 0.02);
            if (boss.hp <= 0) {
              boss.phase = "dying";
              boss.deathTimer = 60;
              score += boss.pts;
              addBigExplosion(boss.x + 8, boss.y + 8);
              hitSound();
            }
          }
        }

        // Boss-player collision (rect boss vs rect player)
        const plBox = { x: player.x + PL_HBX, y: player.y + PL_HBY, w: PL_HBW, h: PL_HBH };
        if (invincTimer <= 0 && loopTimer <= 0) {
          if (hitRR(plBox.x, plBox.y, plBox.w, plBox.h, bossBox.x, bossBox.y, bossBox.w, bossBox.h)) {
            playerHit();
          }
        }
      }
      if (boss.phase === "dying") {
        boss.deathTimer--;
        if (boss.deathTimer % 5 === 0) {
          addExplosion(boss.x + rnd(32) - 4, boss.y + rnd(32) - 4);
        }
        if (boss.deathTimer <= 0) {
          boss = null;
          stageClearSound();
          score += stage * 1000; // stage clear bonus
          if (stage >= 8) {
            stageMsg = "CONGRATULATIONS!";
            stageMsgTimer = 0;
            if (score > hiScore) hiScore = score;
            Mono.go(GAMEOVER);
          } else {
            stageMsg = "STAGE " + stage + " CLEAR!";
            stageMsgTimer = 120;
            Mono.go(CLEAR);
          }
        }
      }
    }

    // Update enemy bullets
    for (let i = eBullets.length - 1; i >= 0; i--) {
      const b = eBullets[i];
      b.x += b.vx;
      b.y += b.vy;
      if (b.y > H + 8 || b.y < -8 || b.x < -8 || b.x > W + 8) { eBullets.splice(i, 1); continue; }
      // Circle enemy bullet vs rect player hitbox
      if (invincTimer <= 0 && loopTimer <= 0) {
        const ebcx = b.x + EB_CX, ebcy = b.y + EB_CY;
        const plBox = { x: player.x + PL_HBX, y: player.y + PL_HBY, w: PL_HBW, h: PL_HBH };
        if (hitCR(ebcx, ebcy, EB_R, plBox.x, plBox.y, plBox.w, plBox.h)) {
          eBullets.splice(i, 1);
          playerHit();
        }
      }
    }

    // Enemy-player collision (rect enemy vs rect player)
    if (invincTimer <= 0 && loopTimer <= 0) {
      const plBox = { x: player.x + PL_HBX, y: player.y + PL_HBY, w: PL_HBW, h: PL_HBH };
      for (let i = enemies.length - 1; i >= 0; i--) {
        const e = enemies[i];
        const eh = enemyHitbox(e);
        if (hitRR(plBox.x, plBox.y, plBox.w, plBox.h, eh.x, eh.y, eh.w, eh.h)) {
          addExplosion(e.x, e.y);
          enemies.splice(i, 1);
          playerHit();
          break;
        }
      }
    }

    // Update powerups (circle powerup vs rect player)
    for (let i = powerups.length - 1; i >= 0; i--) {
      const p = powerups[i];
      p.y += p.vy;
      if (p.y > H + 10) { powerups.splice(i, 1); continue; }
      const pcx = p.x + PU_CX, pcy = p.y + PU_CY;
      const plBox = { x: player.x + PL_HBX, y: player.y + PL_HBY, w: PL_HBW, h: PL_HBH };
      if (hitCR(pcx, pcy, PU_R, plBox.x, plBox.y, plBox.w, plBox.h)) {
        powerups.splice(i, 1);
        powerSound();
        if (p.type === 0) { shotType = 1; shotTypeTimer = 600; }
        else if (p.type === 1) { shotType = 2; shotTypeTimer = 450; }
        else {
          if (wingmen.length < 2) {
            wingmen.push({ x: player.x + (wingmen.length === 0 ? -20 : 20), y: player.y + 4 });
          }
        }
      }
    }

    // Explosions
    for (let i = explosions.length - 1; i >= 0; i--) {
      explosions[i].timer--;
      if (explosions[i].timer <= 0) explosions.splice(i, 1);
    }

    // Particles
    for (let i = particles.length - 1; i >= 0; i--) {
      const p = particles[i];
      p.x += p.vx; p.y += p.vy; p.vy += 0.05; p.life--;
      if (p.life <= 0) particles.splice(i, 1);
    }
    },
    draw() {
      cls(0);
      drawTerrain();
      drawPlay();
    }
  });

  // --- Stage Clear Scene ---
  Mono.scene(CLEAR, {
    init() {},
    update() {
      scrollY += 0.5;
      scrollY2 += 0.25;
      stageMsgTimer--;
      if (stageMsgTimer <= 0) {
        Mono.go(PLAY);
      }
    },
    draw() {
      cls(0);
      drawTerrain();
      drawPlay();
      rectf(W / 2 - 57, 96, 114, 33, 0);
      rect(W / 2 - 57, 96, 114, 33, 2);
      text(stageMsg, flr((W - stageMsg.length * 5) / 2), 105, 3);
      const bonusStr = "BONUS: " + (stage * 1000);
      text(bonusStr, flr((W - bonusStr.length * 5) / 2), 117, 2);
    }
  });

  // --- Game Over Scene ---
  Mono.scene(GAMEOVER, {
    init() {},
    update() {
      scrollY += 0.5;
      scrollY2 += 0.25;
      for (let i = particles.length - 1; i >= 0; i--) {
        const p = particles[i]; p.x += p.vx; p.y += p.vy; p.vy += 0.08; p.life--;
        if (p.life <= 0) particles.splice(i, 1);
      }
      if (btnp("start") || btnp("a")) Mono.go(TITLE);
    },
    draw() {
      cls(0);
      drawTerrain();
      drawGameOver();
    }
  });

  function drawTerrain() {
    // Parallax layer 1 - distant ocean waves
    const sy2 = flr(scrollY2) % 16;
    for (let ty = -1; ty < H / 16 + 2; ty++) {
      for (let tx = 0; tx < W / 16 + 1; tx++) {
        const wy = ty - flr(scrollY2 / 16);
        const hash = pseudoRand(tx * 1317 + wy * 7919 + terrainSeed) & 0xff;
        if (hash < 18) {
          pix(tx * 16 + (hash % 7), ty * 16 + sy2 + (hash % 5), 1);
        }
      }
    }

    // Parallax layer 2 - islands (closer, scroll faster)
    const sy1 = flr(scrollY) % 16;
    for (let ty = -1; ty < H / 16 + 2; ty++) {
      for (let tx = 0; tx < W / 16 + 1; tx++) {
        const wy = ty - flr(scrollY / 16);
        const hash = pseudoRand(tx * 2377 + wy * 5309 + terrainSeed * 3) & 0xfff;
        if (hash < 5) {
          const sprId = (hash % 2 === 0) ? 21 : 22;
          spr(sprId, tx * 16, ty * 16 + sy1);
        }
      }
    }
  }

  function drawPlay() {
    // Enemy bullets
    for (const b of eBullets) {
      spr(13, flr(b.x), flr(b.y));
      Mono.dbgC(flr(b.x) + EB_CX, flr(b.y) + EB_CY, EB_R);
    }

    // Enemies
    for (const e of enemies) {
      const eh = enemyHitbox(e);
      if (e.type === "leader") {
        spr(20, flr(e.x), flr(e.y));
      } else if (e.type === "medium") {
        spr(3, flr(e.x), flr(e.y));
      } else if (e.type === "large") {
        // 4-sprite large bomber
        spr(4, flr(e.x), flr(e.y));
        spr(5, flr(e.x) + 16, flr(e.y));
        spr(6, flr(e.x), flr(e.y) + 16);
        spr(7, flr(e.x) + 16, flr(e.y) + 16);
      } else {
        spr(2, flr(e.x), flr(e.y));
      }
      Mono.dbg(eh.x, eh.y, eh.w, eh.h);
    }

    // Boss (4-sprite)
    if (boss) {
      const bx = flr(boss.x), by = flr(boss.y);
      if (boss.phase === "dying" && flr(Mono.frame / 3) % 2 === 0) {
        // Flash
      } else {
        spr(8, bx, by);
        spr(9, bx + 16, by);
        spr(10, bx, by + 16);
        spr(11, bx + 16, by + 16);
      }
      Mono.dbg(bx + BOSS_HBX, by + BOSS_HBY, BOSS_HBW, BOSS_HBH);
      // HP bar
      if (boss.phase === "fight" || boss.phase === "dying") {
        const barW = 40;
        const hpFrac = _max(0, boss.hp / boss.maxHp);
        rectf(W / 2 - barW / 2, 12, barW, 4, 0);
        rectf(W / 2 - barW / 2, 12, flr(barW * hpFrac), 4, 3);
        rect(W / 2 - barW / 2, 12, barW, 4, 2);
      }
    }

    // Power-ups (bobbing)
    for (const p of powerups) {
      const bob = sin(Mono.frame * 0.15) * 2;
      const px = flr(p.x), py = flr(p.y + bob);
      if (p.type === 0) spr(23, px, py);
      else if (p.type === 1) spr(24, px, py);
      else spr(16, px, py);
      Mono.dbgC(px + PU_CX, py + PU_CY, PU_R);
    }

    // Player bullets
    for (const b of bullets) {
      spr(12, flr(b.x), flr(b.y));
      Mono.dbgC(flr(b.x) + PB_CX, flr(b.y) + PB_CY, PB_R);
    }

    // Wingmen
    for (const wm of wingmen) {
      if (invincTimer > 0 && flr(Mono.frame / 3) % 2 === 0) continue;
      spr(17, flr(wm.x), flr(wm.y));
    }

    // Player
    if (loopTimer > 0) {
      // Loop animation - spinning plane with trail
      const lx = player.x + 8;
      const ly = player.y + 8;
      const scaleX = cos(loopAnimAngle);
      const drawW = _max(1, flr(_abs(scaleX) * 16));
      rectf(flr(lx - drawW / 2), flr(ly - 8), drawW, 16, 2);
      circ(flr(lx), flr(ly), 10, 2);
    } else if (invincTimer > 0 && flr(Mono.frame / 3) % 2 === 0) {
      // Blink during invincibility
    } else {
      spr(1, flr(player.x), flr(player.y));
    }
    // Player hitbox debug (always register, even when blinking)
    Mono.dbg(flr(player.x) + PL_HBX, flr(player.y) + PL_HBY, PL_HBW, PL_HBH);

    // Explosions
    for (const e of explosions) {
      const sprId = e.timer > 6 ? 14 : 15;
      spr(sprId, flr(e.x), flr(e.y));
    }

    // Particles
    for (const p of particles) pix(flr(p.x), flr(p.y), p.color);

    // --- HUD ---
    rectf(0, 0, W, 10, 0);
    text("SCORE:" + score, 2, 2, 3);

    // Stage indicator (center)
    const stgStr = "STG:" + stage;
    text(stgStr, flr((W - stgStr.length * 5) / 2), 2, 2);

    // Lives (right side, capped to fit)
    const maxLivesShown = min(lives, 5);
    const livesStartX = W - 2 - maxLivesShown * 10;
    for (let i = 0; i < maxLivesShown; i++) spr(18, livesStartX + i * 10, -2);
    if (lives > 5) text("+" + (lives - 5), W - 16, 2, 3);

    // Loops remaining (left of lives area)
    const maxLoopsShown = min(loops, 3);
    const loopsStartX = livesStartX - 4 - maxLoopsShown * 10;
    for (let i = 0; i < maxLoopsShown; i++) spr(19, loopsStartX + i * 10, -2);

    // Shot type indicator near player
    if (shotTypeTimer > 0) {
      const label = shotType === 1 ? "DBL" : shotType === 2 ? "SPR" : "";
      if (label) {
        const flash = (shotTypeTimer < 90 && flr(Mono.frame / 8) % 2 === 0) ? 1 : 3;
        const labelX = _max(2, min(W - label.length * 5 - 2, flr(player.x - 2)));
        text(label, labelX, flr(player.y - 10), flash);
      }
    }

    // Stage message overlay
    if (stageMsgTimer > 0) {
      const msgX = flr((W - stageMsg.length * 5) / 2);
      text(stageMsg, msgX, 113, 3);
      if (stageMsgTimer > 60 && stageMsg.indexOf("WARNING") === -1) {
        text("GET READY!", flr((W - 10 * 5) / 2), 123, 2);
      }
    }
  }

  function drawTitle() {
    const ty = 20 + sin(Mono.frame * 0.05) * 3;

    // Large title
    text("1 9 4 2", flr((W - 7 * 5) / 2), flr(ty), 3);
    rectf(W / 2 - 37, flr(ty) + 10, 74, 1, 2);
    text("SUPER ACE", flr((W - 9 * 5) / 2), flr(ty) + 16, 2);

    // Show player plane
    spr(1, W / 2 - 8, flr(ty) + 28 + sin(Mono.frame * 0.08) * 2);

    // Enemy formations on title screen
    const bx = W / 2 - 33;
    for (let i = 0; i < 5; i++) {
      const offY = _abs(i - 2) * 6;
      spr(2, bx + i * 13, flr(ty) + 44 + offY + sin(Mono.frame * 0.06 + i) * 2);
    }

    // Boss preview
    const bbx = W / 2 - 16;
    spr(8, bbx, flr(ty) + 72);
    spr(9, bbx + 16, flr(ty) + 72);
    spr(10, bbx, flr(ty) + 80);
    spr(11, bbx + 16, flr(ty) + 80);

    if (flr(Mono.frame / 20) % 2 === 0) text("PRESS START", flr((W - 11 * 5) / 2), 142, 3);

    // Controls
    text("ARROWS  MOVE", flr((W - 12 * 5) / 2), 158, 2);
    text("A  SHOOT", flr((W - 8 * 5) / 2), 168, 2);
    text("B  LOOP (DODGE)", flr((W - 15 * 5) / 2), 178, 2);

    // Score table
    text("-SCORE TABLE-", flr((W - 13 * 5) / 2), 192, 1);
    spr(2, W / 2 - 25, 201); text("FIGHTER  100", W / 2 - 8, 203, 1);
    spr(3, W / 2 - 25, 211); text("BOMBER   200", W / 2 - 8, 213, 1);
    spr(20, W / 2 - 25, 221); text("LEADER  200+", W / 2 - 8, 223, 1);

    if (hiScore > 0) {
      const hiStr = "HI:" + hiScore;
      text(hiStr, flr((W - hiStr.length * 5) / 2), 14, 2);
    }

    text("MONO DEMO V0.1", flr((W - 14 * 5) / 2), H - 9, 1);
  }

  function drawGameOver() {
    for (const p of particles) pix(flr(p.x), flr(p.y), p.color);

    if (stage >= 8 && lives > 0) {
      text("CONGRATULATIONS!", flr((W - 16 * 5) / 2), 75, 3);
      const clrStr = "ALL 8 STAGES CLEAR!";
      text(clrStr, flr((W - clrStr.length * 5) / 2), 90, 2);
    } else {
      text("GAME OVER", flr((W - 9 * 5) / 2), 90, 3);
    }
    const scoreStr = "SCORE: " + score;
    text(scoreStr, flr((W - scoreStr.length * 5) / 2), 113, 2);
    const stageStr = "STAGE: " + stage;
    text(stageStr, flr((W - stageStr.length * 5) / 2), 124, 2);
    if (score >= hiScore && score > 0) {
      text("NEW HIGH SCORE!", flr((W - 15 * 5) / 2), 139, 3);
    }
    if (flr(Mono.frame / 20) % 2 === 0) text("PRESS START", flr((W - 11 * 5) / 2), 165, 3);
  }

  Mono.go(TITLE);
  Mono.boot("screen");
})();
</script>
