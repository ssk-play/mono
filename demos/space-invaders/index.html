<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GrayBox — Demo: Space Invaders</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #0a0a0a;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100vh;
    font-family: monospace;
    overflow: hidden;
  }
  #frame {
    background: #111;
    border: 3px solid #333;
    border-radius: 8px;
    padding: 12px;
    box-shadow: 0 0 40px rgba(0,0,0,0.8), inset 0 0 20px rgba(0,0,0,0.5);
  }
  canvas {
    display: block;
    image-rendering: pixelated;
    image-rendering: crisp-edges;
  }
  #controls {
    margin-top: 12px;
    color: #6b6b6b;
    font-size: 11px;
    text-align: center;
    letter-spacing: 1px;
  }
  #controls span { color: #b0b0b0; }
</style>
</head>
<body>
<div id="frame">
  <canvas id="screen"></canvas>
</div>
<div id="controls">
  <span>←→</span> MOVE &nbsp;&nbsp; <span>Z</span> SHOOT &nbsp;&nbsp; <span>ENTER</span> START
</div>
<script>
(() => {
  "use strict";

  // ============================================================
  // GrayBox Runtime (inline)
  // ============================================================
  const W = 480;
  const H = 320;
  const SCALE = 2;
  const FPS = 30;
  const COLORS = ["#1a1a1a", "#6b6b6b", "#b0b0b0", "#e8e8e8"];
  const canvas = document.getElementById("screen");
  canvas.width = W;
  canvas.height = H;
  canvas.style.width = (W * SCALE) + "px";
  canvas.style.height = (H * SCALE) + "px";
  const ctx = canvas.getContext("2d");
  ctx.imageSmoothingEnabled = false;
  const buf = ctx.createImageData(W, H);
  const buf32 = new Uint32Array(buf.data.buffer);

  function hexToABGR(hex) {
    const r = parseInt(hex.slice(1, 3), 16);
    const g = parseInt(hex.slice(3, 5), 16);
    const b = parseInt(hex.slice(5, 7), 16);
    return (255 << 24) | (b << 16) | (g << 8) | r;
  }
  const COLOR_U32 = COLORS.map(hexToABGR);

  const sprites = {};
  const tilemap = {};

  const keyMap = {
    "ArrowUp": "up", "ArrowDown": "down", "ArrowLeft": "left", "ArrowRight": "right",
    "w": "up", "s": "down", "a": "left", "d": "right",
    "z": "a", "Z": "a", "x": "b", "X": "b",
    "Enter": "start", " ": "a"
  };
  const keys = {};
  const keysPrev = {};

  document.addEventListener("keydown", e => {
    const k = keyMap[e.key];
    if (k) { keys[k] = true; e.preventDefault(); }
  });
  document.addEventListener("keyup", e => {
    const k = keyMap[e.key];
    if (k) { keys[k] = false; e.preventDefault(); }
  });

  let audioCtx = null;
  const channels = [null, null];
  const channelGains = [null, null];
  function ensureAudio() {
    if (!audioCtx) {
      audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      for (let i = 0; i < 2; i++) {
        channelGains[i] = audioCtx.createGain();
        channelGains[i].gain.value = 0.15;
        channelGains[i].connect(audioCtx.destination);
      }
    }
  }

  const NOTE_NAMES = ["C","C#","D","D#","E","F","F#","G","G#","A","A#","B"];
  function noteToFreq(noteStr) {
    const match = noteStr.match(/^([A-G]#?)(\d)$/);
    if (!match) return 440;
    const name = match[1];
    const octave = parseInt(match[2]);
    const semitone = NOTE_NAMES.indexOf(name);
    if (semitone === -1) return 440;
    const midi = (octave + 1) * 12 + semitone;
    return 440 * Math.pow(2, (midi - 69) / 12);
  }

  const FONT_W = 4;
  const FONT_H = 7;
  const FONT = {};
  const fontData = {
    "A":"0110100110011111100110011001","B":"1110100110101110100110011110",
    "C":"0110100110001000100001100110","D":"1100101010011001100110101100",
    "E":"1111100010001110100010001111","F":"1111100010001110100010001000",
    "G":"0111100010001011100101100111","H":"1001100110011111100110011001",
    "I":"1110010001000100010001001110","J":"0111001000100010001010100100",
    "K":"1001101011001100101010011001","L":"1000100010001000100010001111",
    "M":"1001111111011001100110011001","N":"1001110111011001100110011001",
    "O":"0110100110011001100110010110","P":"1110100110011110100010001000",
    "Q":"0110100110011001101101100001","R":"1110100110011110101010011001",
    "S":"0111100010000110000110001110","T":"1111001000100010001000100010",
    "U":"1001100110011001100110010110","V":"1001100110011001100101100110",
    "W":"1001100110011001101111011001","X":"1001100101100110011010011001",
    "Y":"1001100101100010001000100010","Z":"1111000100100100100010001111",
    "0":"0110100111011011101110010110","1":"0100110001000100010001001110",
    "2":"0110100100010010010010001111","3":"1110000100010110000110011110",
    "4":"1001100110011111000100010001","5":"1111100010001110000100011110",
    "6":"0110100010001110100110010110","7":"1111000100010010010001001000",
    "8":"0110100110010110100110010110","9":"0110100110010111000100010110",
    " ":"0000000000000000000000000000",
    ".":"0000000000000000000001000100",
    ",":"0000000000000000001000101000",
    "!":"0100010001000100000000000100",
    "?":"0110100100010010000000000010",
    "-":"0000000000001110000000000000",
    "+":"0000001001001110010000100000",
    ":":"0000010001000000010001000000",
    "/":"0001000100100010010010001000",
    "*":"0000101001001110010010100000",
    "#":"0101111101011111010100000000",
    "(":"0010010010001000010001000010",
    ")":"0100001000010001000100100100",
    "=":"0000000011110000111100000000",
    "'":"0100010010000000000000000000",
    "\"":"1010101000000000000000000000",
    "<":"0010010010001000010000100010",
    ">":"1000010000100001001001001000",
    "_":"0000000000000000000000001111",
  };
  for (const [ch, bits] of Object.entries(fontData)) {
    FONT[ch] = [];
    for (let i = 0; i < bits.length; i++) FONT[ch].push(parseInt(bits[i]));
  }

  const API = {};
  API._init = null;
  API._update = null;
  API._draw = null;
  API.frame = 0;

  API.cls = function(c = 0) { buf32.fill(COLOR_U32[c] || COLOR_U32[0]); };
  API.pix = function(x, y, c) {
    x = Math.floor(x); y = Math.floor(y);
    if (x < 0 || x >= W || y < 0 || y >= H) return;
    buf32[y * W + x] = COLOR_U32[c] || COLOR_U32[0];
  };
  API.line = function(x0, y0, x1, y1, c) {
    x0=Math.floor(x0); y0=Math.floor(y0); x1=Math.floor(x1); y1=Math.floor(y1);
    const dx=Math.abs(x1-x0), dy=Math.abs(y1-y0);
    const sx=x0<x1?1:-1, sy=y0<y1?1:-1;
    let err=dx-dy;
    while(true) {
      API.pix(x0,y0,c);
      if(x0===x1&&y0===y1) break;
      const e2=2*err;
      if(e2>-dy){err-=dy;x0+=sx;}
      if(e2<dx){err+=dx;y0+=sy;}
    }
  };
  API.rect = function(x,y,w,h,c) {
    API.line(x,y,x+w-1,y,c); API.line(x+w-1,y,x+w-1,y+h-1,c);
    API.line(x+w-1,y+h-1,x,y+h-1,c); API.line(x,y+h-1,x,y,c);
  };
  API.rectf = function(x,y,w,h,c) {
    x=Math.floor(x); y=Math.floor(y);
    const col=COLOR_U32[c]||COLOR_U32[0];
    for(let py=Math.max(0,y);py<Math.min(H,y+h);py++)
      for(let px=Math.max(0,x);px<Math.min(W,x+w);px++)
        buf32[py*W+px]=col;
  };
  API.circ = function(cx,cy,r,c) {
    let x=r,y=0,d=1-r; cx=Math.floor(cx); cy=Math.floor(cy);
    while(x>=y){
      API.pix(cx+x,cy+y,c);API.pix(cx-x,cy+y,c);
      API.pix(cx+x,cy-y,c);API.pix(cx-x,cy-y,c);
      API.pix(cx+y,cy+x,c);API.pix(cx-y,cy+x,c);
      API.pix(cx+y,cy-x,c);API.pix(cx-y,cy-x,c);
      y++; if(d<0){d+=2*y+1;}else{x--;d+=2*(y-x)+1;}
    }
  };
  API.circf = function(cx,cy,r,c) {
    cx=Math.floor(cx); cy=Math.floor(cy);
    const col=COLOR_U32[c]||COLOR_U32[0]; const r2=r*r;
    for(let py=-r;py<=r;py++) for(let px=-r;px<=r;px++)
      if(px*px+py*py<=r2){ const sx=cx+px,sy=cy+py;
        if(sx>=0&&sx<W&&sy>=0&&sy<H) buf32[sy*W+sx]=col; }
  };
  API.sprite = function(id, data) {
    const arr = new Uint8Array(64); let i = 0;
    for (const ch of data) { if (ch>='0'&&ch<='3') { arr[i++]=parseInt(ch); if(i>=64) break; } }
    sprites[id] = arr;
  };
  API.spr = function(id, x, y, flipX, flipY) {
    const s=sprites[id]; if(!s) return;
    x=Math.floor(x); y=Math.floor(y);
    for(let py=0;py<8;py++) for(let px=0;px<8;px++){
      const sx=flipX?7-px:px, sy=flipY?7-py:py;
      const c=s[sy*8+sx], dx=x+px, dy=y+py;
      if(dx>=0&&dx<W&&dy>=0&&dy<H) buf32[dy*W+dx]=COLOR_U32[c];
    }
  };
  API.text = function(str, x, y, c) {
    str=String(str).toUpperCase(); let cx=Math.floor(x); const cy=Math.floor(y);
    const col=COLOR_U32[c]||COLOR_U32[3];
    for(const ch of str){
      const glyph=FONT[ch];
      if(glyph) for(let py=0;py<FONT_H;py++) for(let px=0;px<FONT_W;px++)
        if(glyph[py*FONT_W+px]){ const dx=cx+px,dy=cy+py;
          if(dx>=0&&dx<W&&dy>=0&&dy<H) buf32[dy*W+dx]=col; }
      cx+=FONT_W+1;
    }
  };
  API.mget = function(cx,cy) { return tilemap[cx+","+cy]||0; };
  API.mset = function(cx,cy,id) { tilemap[cx+","+cy]=id; };
  API.map = function(mx,my,mw,mh,sx,sy) {
    for(let ty=0;ty<mh;ty++) for(let tx=0;tx<mw;tx++){
      const id=API.mget(mx+tx,my+ty); if(id>0) API.spr(id,sx+tx*8,sy+ty*8); }
  };
  API.btn = function(k) { return !!keys[k]; };
  API.btnp = function(k) { return !!keys[k] && !keysPrev[k]; };
  API.note = function(ch, noteStr, dur) {
    ensureAudio(); if(ch<0||ch>1) return; API.stop(ch);
    const osc=audioCtx.createOscillator(); osc.type="square";
    osc.frequency.value=noteToFreq(noteStr);
    osc.connect(channelGains[ch]); osc.start();
    osc.stop(audioCtx.currentTime+dur); channels[ch]=osc;
  };
  API.stop = function(ch) {
    if(ch===undefined){API.stop(0);API.stop(1);return;}
    if(channels[ch]){try{channels[ch].stop();}catch(e){} channels[ch]=null;}
  };
  API.rnd = function(max) { return Math.random()*max; };
  API.flr = Math.floor;
  API.abs = Math.abs;
  API.min = Math.min;
  API.max = Math.max;
  API.sin = Math.sin;
  API.cos = Math.cos;

  function tick() {
    if (API._update) API._update();
    if (API._draw) API._draw();
    ctx.putImageData(buf, 0, 0);
    for (const k in keys) keysPrev[k] = keys[k];
    API.frame++;
  }

  // ============================================================
  // Space Invaders Game
  // ============================================================
  const { cls, pix, line, rect, rectf, circ, circf, sprite: defSprite,
          spr, text, btn, btnp, note, stop, rnd, flr, abs: _abs,
          min, max: _max, sin, cos } = API;

  // --- Sprites ---

  // 1: Player ship (cannon)
  defSprite(1,
    "00030000" +
    "00333000" +
    "00333000" +
    "03333300" +
    "33333330" +
    "33333330" +
    "33333330" +
    "00000000"
  );

  // 2: Alien type A — squid (top row) frame 1
  defSprite(2,
    "00030000" +
    "00333000" +
    "03333300" +
    "33023030" +
    "33333330" +
    "00300300" +
    "03020300" +
    "30000030"
  );

  // 3: Alien type A — squid frame 2
  defSprite(3,
    "00030000" +
    "00333000" +
    "03333300" +
    "33023030" +
    "33333330" +
    "01303010" +
    "30020030" +
    "03000300"
  );

  // 4: Alien type B — crab (middle rows) frame 1
  defSprite(4,
    "03000300" +
    "00333000" +
    "03232300" +
    "33333330" +
    "30333030" +
    "30333030" +
    "00300300" +
    "03000300"
  );

  // 5: Alien type B — crab frame 2
  defSprite(5,
    "03000300" +
    "30333030" +
    "33232330" +
    "33333330" +
    "03333300" +
    "00333000" +
    "03000300" +
    "30000030"
  );

  // 6: Alien type C — octopus (bottom rows) frame 1
  defSprite(6,
    "00333000" +
    "03333300" +
    "33232330" +
    "33333330" +
    "33333330" +
    "03030300" +
    "30303030" +
    "03030300"
  );

  // 7: Alien type C — octopus frame 2
  defSprite(7,
    "00333000" +
    "03333300" +
    "33232330" +
    "33333330" +
    "33333330" +
    "03030300" +
    "03030300" +
    "30000030"
  );

  // 8: UFO bonus ship
  defSprite(8,
    "00000000" +
    "00333000" +
    "03333300" +
    "32323230" +
    "33333330" +
    "01303010" +
    "00000000" +
    "00000000"
  );

  // 9: Player bullet
  defSprite(9,
    "00030000" +
    "00030000" +
    "00020000" +
    "00020000" +
    "00000000" +
    "00000000" +
    "00000000" +
    "00000000"
  );

  // 10: Alien bullet type 1 (zigzag)
  defSprite(10,
    "00010000" +
    "00020000" +
    "00100000" +
    "00020000" +
    "00010000" +
    "00020000" +
    "00100000" +
    "00020000"
  );

  // 11: Alien bullet type 2 (cross)
  defSprite(11,
    "00020000" +
    "00030000" +
    "00020000" +
    "00030000" +
    "00020000" +
    "00030000" +
    "00020000" +
    "00030000"
  );

  // 12: Explosion frame 1
  defSprite(12,
    "00000000" +
    "00200100" +
    "01003200" +
    "00031000" +
    "00130200" +
    "02000010" +
    "00100000" +
    "00000000"
  );

  // 13: Explosion frame 2
  defSprite(13,
    "20010020" +
    "01000010" +
    "00303200" +
    "03033030" +
    "00232000" +
    "01000300" +
    "20001001" +
    "00200010"
  );

  // 14: Shield block (full)
  defSprite(14,
    "02222200" +
    "23333320" +
    "33333330" +
    "33333330" +
    "33333330" +
    "33333330" +
    "33333330" +
    "33333330"
  );

  // 15: Life icon (small ship)
  defSprite(15,
    "00000000" +
    "00030000" +
    "00333000" +
    "03333300" +
    "33333330" +
    "33333330" +
    "00000000" +
    "00000000"
  );

  // 16: Alien death flash
  defSprite(16,
    "10000010" +
    "01020100" +
    "00233200" +
    "02333320" +
    "00233200" +
    "01020100" +
    "10000010" +
    "00000000"
  );

  // --- Shield data ---
  // Shields are stored as 2D arrays of pixels (24x16 each, using 8x8 sprite tiles)
  // We'll use a pixel-level destructible shield system
  const SHIELD_W = 24;
  const SHIELD_H = 18;
  const NUM_SHIELDS = 4;
  let shields = [];

  function createShieldPixels() {
    const px = [];
    // Classic shield shape: arch with notch at bottom
    for (let y = 0; y < SHIELD_H; y++) {
      px[y] = [];
      for (let x = 0; x < SHIELD_W; x++) {
        // Top rounded corners
        if (y < 4) {
          const cornerDist = y;
          if (x < 4 - cornerDist || x >= SHIELD_W - 4 + cornerDist) {
            px[y][x] = 0; continue;
          }
        }
        // Bottom notch (invader-shaped cutout)
        if (y >= SHIELD_H - 6 && x >= 8 && x < 16) {
          px[y][x] = 0; continue;
        }
        px[y][x] = (y < 2 || y >= SHIELD_H - 1) ? 2 : 3;
      }
    }
    return px;
  }

  function initShields() {
    shields = [];
    const spacing = (W - 60) / NUM_SHIELDS; // area between margins
    const startX = 60;
    for (let i = 0; i < NUM_SHIELDS; i++) {
      shields.push({
        x: flr(startX + i * spacing),
        y: 250,
        pixels: createShieldPixels()
      });
    }
  }

  function drawShield(s) {
    for (let y = 0; y < SHIELD_H; y++) {
      for (let x = 0; x < SHIELD_W; x++) {
        if (s.pixels[y][x] > 0) {
          pix(s.x + x, s.y + y, s.pixels[y][x]);
        }
      }
    }
  }

  function damageShield(s, hx, hy, radius) {
    // Destroy pixels in a radius around hit point
    const lx = hx - s.x;
    const ly = hy - s.y;
    for (let dy = -radius; dy <= radius; dy++) {
      for (let dx = -radius; dx <= radius; dx++) {
        if (dx*dx + dy*dy <= radius*radius) {
          const px = lx + dx;
          const py = ly + dy;
          if (px >= 0 && px < SHIELD_W && py >= 0 && py < SHIELD_H) {
            s.pixels[py][px] = 0;
          }
        }
      }
    }
  }

  function shieldHitTest(s, bx, by, bw, bh) {
    // Check if a bullet rect overlaps any solid shield pixel
    for (let y = 0; y < bh; y++) {
      for (let x = 0; x < bw; x++) {
        const px = flr(bx + x - s.x);
        const py = flr(by + y - s.y);
        if (px >= 0 && px < SHIELD_W && py >= 0 && py < SHIELD_H) {
          if (s.pixels[py][px] > 0) return true;
        }
      }
    }
    return false;
  }

  // --- Game State ---
  let state = "title";
  let player, bullet, eBullets, aliens, explosions, particles, stars;
  let score, hiScore, lives, wave;
  let shootCooldown, invulnTimer, respawnTimer;
  // Alien march state
  let marchDir, marchSpeed, marchTimer, marchCount, marchBaseSpeed;
  let dropDown, totalAliens;
  // UFO
  let ufo, ufoTimer, ufoScoreShow, ufoScoreTimer, ufoScoreX;
  // March sound
  let marchSoundIdx;
  const MARCH_NOTES = ["C2", "D2", "E2", "F2"];

  hiScore = 0;

  function resetGame() {
    player = { x: W / 2 - 4, y: 290 };
    bullet = null;
    eBullets = [];
    aliens = [];
    explosions = [];
    particles = [];
    score = 0;
    lives = 3;
    wave = 0;
    shootCooldown = 0;
    invulnTimer = 0;
    respawnTimer = 0;
    ufo = null;
    ufoTimer = 300 + flr(rnd(300));
    ufoScoreShow = 0;
    ufoScoreTimer = 0;
    marchSoundIdx = 0;
    stars = [];
    for (let i = 0; i < 40; i++)
      stars.push({ x: flr(rnd(W)), y: flr(rnd(H)), bright: flr(rnd(2)) + 1 });
    initShields();
    spawnWave();
  }

  function spawnWave() {
    wave++;
    aliens = [];
    eBullets = [];
    bullet = null;
    marchDir = 1;
    dropDown = 0;
    marchSoundIdx = 0;

    const COLS = 11;
    const ROWS = 5;

    // Alien grid: row 0 = squid(10pts), rows 1-2 = crab(20pts), rows 3-4 = octopus(30pts)
    for (let row = 0; row < ROWS; row++) {
      for (let col = 0; col < COLS; col++) {
        let type, pts;
        if (row === 0) { type = "squid"; pts = 30; }
        else if (row <= 2) { type = "crab"; pts = 20; }
        else { type = "octo"; pts = 10; }
        aliens.push({
          col, row, type, pts,
          alive: true,
          // Position: will be set based on grid offset
          baseX: 46 + col * 16,
          baseY: 50 + row * 14,
        });
      }
    }

    totalAliens = COLS * ROWS;
    marchBaseSpeed = _max(4, 20 - wave * 2);
    marchSpeed = marchBaseSpeed;
    marchTimer = marchSpeed;
    marchCount = 0;

    // Reset shields only on wave 1
    if (wave === 1) initShields();
  }

  // Alien formation offset (march position)
  let alienOffX = 0;
  let alienOffY = 0;

  function getAlienPos(a) {
    return {
      x: a.baseX + alienOffX,
      y: a.baseY + alienOffY
    };
  }

  function getAlienSprite(a) {
    const frame = (marchCount % 2 === 0) ? 0 : 1;
    if (a.type === "squid") return frame === 0 ? 2 : 3;
    if (a.type === "crab") return frame === 0 ? 4 : 5;
    return frame === 0 ? 6 : 7;
  }

  function addExplosion(x, y, big) {
    explosions.push({ x, y, timer: big ? 16 : 10 });
    const count = big ? 12 : 6;
    for (let i = 0; i < count; i++)
      particles.push({
        x: x + 4, y: y + 4,
        vx: rnd(4) - 2, vy: rnd(4) - 2,
        life: 6 + flr(rnd(10)),
        color: flr(rnd(3)) + 1
      });
  }

  // --- Sound Effects ---
  function shootSound() { note(0, "C6", 0.03); }
  function alienHitSound() { note(1, "E3", 0.06); setTimeout(() => note(1, "C3", 0.05), 30); }
  function playerDeathSound() {
    note(0, "C3", 0.15); note(1, "G2", 0.15);
    setTimeout(() => { note(0, "A2", 0.2); note(1, "E2", 0.2); }, 120);
  }
  function ufoSound() { note(1, "B4", 0.04); }
  function ufoHitSound() {
    note(0, "G5", 0.08);
    setTimeout(() => note(0, "C6", 0.1), 80);
  }
  function waveClearSound() {
    note(0, "C5", 0.1);
    setTimeout(() => note(0, "E5", 0.1), 100);
    setTimeout(() => note(0, "G5", 0.1), 200);
    setTimeout(() => note(0, "C6", 0.15), 300);
  }
  function marchSound() {
    note(0, MARCH_NOTES[marchSoundIdx % 4], 0.04);
    marchSoundIdx++;
  }

  resetGame();
  state = "title";

  // ============================================================
  // Update
  // ============================================================
  API._update = function() {
    // --- Title ---
    if (state === "title") {
      if (btnp("a") || btnp("start")) {
        state = "play";
        resetGame();
        note(0, "C5", 0.1);
        setTimeout(() => note(0, "E5", 0.1), 100);
        setTimeout(() => note(0, "G5", 0.15), 200);
      }
      return;
    }

    // --- Game Over ---
    if (state === "gameover") {
      for (let i = particles.length - 1; i >= 0; i--) {
        const p = particles[i]; p.x += p.vx; p.y += p.vy; p.vy += 0.08; p.life--;
        if (p.life <= 0) particles.splice(i, 1);
      }
      if (btnp("a") || btnp("start")) state = "title";
      return;
    }

    // --- Play State ---

    // Respawn delay
    if (respawnTimer > 0) {
      respawnTimer--;
      // Update explosions/particles during respawn
      for (let i = explosions.length - 1; i >= 0; i--) {
        explosions[i].timer--;
        if (explosions[i].timer <= 0) explosions.splice(i, 1);
      }
      for (let i = particles.length - 1; i >= 0; i--) {
        const p = particles[i]; p.x += p.vx; p.y += p.vy; p.vy += 0.05; p.life--;
        if (p.life <= 0) particles.splice(i, 1);
      }
      return;
    }

    // Invulnerability timer
    if (invulnTimer > 0) invulnTimer--;

    // Player movement
    if (btn("left")) player.x -= 3;
    if (btn("right")) player.x += 3;
    player.x = _max(8, min(W - 16, player.x));

    // Player shoot
    if (shootCooldown > 0) shootCooldown--;
    if (btnp("a") && bullet === null && shootCooldown <= 0) {
      bullet = { x: player.x + 3, y: player.y - 4 };
      shootCooldown = 6;
      shootSound();
    }

    // Update player bullet
    if (bullet) {
      bullet.y -= 6;
      if (bullet.y < -8) bullet = null;
    }

    // --- Alien March ---
    marchTimer--;
    if (marchTimer <= 0) {
      // Move aliens one step
      marchCount++;
      marchSound();

      let needDrop = false;

      // Check edges
      const liveAliens = aliens.filter(a => a.alive);
      let leftMost = W, rightMost = 0;
      for (const a of liveAliens) {
        const pos = getAlienPos(a);
        if (pos.x < leftMost) leftMost = pos.x;
        if (pos.x + 8 > rightMost) rightMost = pos.x + 8;
      }

      if (marchDir === 1 && rightMost + 4 >= W - 8) {
        needDrop = true;
        marchDir = -1;
      } else if (marchDir === -1 && leftMost - 4 <= 8) {
        needDrop = true;
        marchDir = 1;
      }

      if (needDrop) {
        alienOffY += 6;
        // Check if aliens reached player level
        for (const a of liveAliens) {
          const pos = getAlienPos(a);
          if (pos.y + 8 >= player.y) {
            // Aliens win — game over
            state = "gameover";
            addExplosion(player.x, player.y, true);
            playerDeathSound();
            if (score > hiScore) hiScore = score;
            return;
          }
        }
      } else {
        alienOffX += marchDir * 4;
      }

      // Speed up based on how many aliens remain
      const aliveCount = liveAliens.length;
      if (aliveCount <= 1) marchSpeed = 1;
      else if (aliveCount <= 4) marchSpeed = 2;
      else if (aliveCount <= 10) marchSpeed = 3;
      else if (aliveCount <= 20) marchSpeed = _max(3, marchBaseSpeed - 6);
      else if (aliveCount <= 35) marchSpeed = _max(4, marchBaseSpeed - 3);
      else marchSpeed = marchBaseSpeed;

      marchTimer = marchSpeed;
    }

    // --- Bullet vs Alien collision ---
    if (bullet) {
      for (let i = 0; i < aliens.length; i++) {
        const a = aliens[i];
        if (!a.alive) continue;
        const pos = getAlienPos(a);
        if (bullet.x + 1 > pos.x && bullet.x < pos.x + 8 &&
            bullet.y > pos.y && bullet.y < pos.y + 8) {
          a.alive = false;
          score += a.pts;
          addExplosion(pos.x, pos.y, false);
          alienHitSound();
          bullet = null;
          break;
        }
      }
    }

    // --- Bullet vs Shield collision (player bullet) ---
    if (bullet) {
      for (const s of shields) {
        if (shieldHitTest(s, bullet.x, bullet.y, 2, 4)) {
          damageShield(s, flr(bullet.x), flr(bullet.y), 3);
          bullet = null;
          break;
        }
      }
    }

    // --- Bullet vs UFO ---
    if (bullet && ufo) {
      if (bullet.x > ufo.x && bullet.x < ufo.x + 8 &&
          bullet.y > ufo.y && bullet.y < ufo.y + 8) {
        const ufoPoints = [50, 100, 150, 200, 300][flr(rnd(5))];
        score += ufoPoints;
        ufoScoreShow = ufoPoints;
        ufoScoreTimer = 60;
        ufoScoreX = ufo.x;
        addExplosion(ufo.x, ufo.y, true);
        ufoHitSound();
        ufo = null;
        bullet = null;
      }
    }

    // --- Alien shooting ---
    // Find bottom-most alive alien in each column and have them occasionally shoot
    const liveAliens = aliens.filter(a => a.alive);
    if (API.frame % _max(3, 15 - wave * 2) === 0 && liveAliens.length > 0) {
      // Pick a random column with alive aliens
      const cols = {};
      for (const a of liveAliens) {
        if (!cols[a.col] || a.row > cols[a.col].row) cols[a.col] = a;
      }
      const bottomAliens = Object.values(cols);
      if (bottomAliens.length > 0 && eBullets.length < 3 + wave) {
        const shooter = bottomAliens[flr(rnd(bottomAliens.length))];
        const pos = getAlienPos(shooter);
        eBullets.push({
          x: pos.x + 3, y: pos.y + 8,
          type: flr(rnd(2))
        });
      }
    }

    // --- Update enemy bullets ---
    for (let i = eBullets.length - 1; i >= 0; i--) {
      const b = eBullets[i];
      b.y += 2.5 + wave * 0.2;

      // Bullet vs shield
      let hitShield = false;
      for (const s of shields) {
        if (shieldHitTest(s, b.x, b.y, 2, 4)) {
          damageShield(s, flr(b.x), flr(b.y + 2), 3);
          eBullets.splice(i, 1);
          hitShield = true;
          break;
        }
      }
      if (hitShield) continue;

      // Bullet vs player
      if (invulnTimer <= 0 &&
          b.x > player.x && b.x < player.x + 8 &&
          b.y > player.y && b.y < player.y + 8) {
        eBullets.splice(i, 1);
        lives--;
        addExplosion(player.x, player.y, true);
        playerDeathSound();
        if (lives <= 0) {
          state = "gameover";
          if (score > hiScore) hiScore = score;
        } else {
          respawnTimer = 45;
          invulnTimer = 60;
          player.x = W / 2 - 4;
          bullet = null;
        }
        continue;
      }

      if (b.y > H + 8) eBullets.splice(i, 1);
    }

    // --- Aliens touching shields (erode from top) ---
    for (const a of liveAliens) {
      const pos = getAlienPos(a);
      for (const s of shields) {
        if (pos.x + 8 > s.x && pos.x < s.x + SHIELD_W &&
            pos.y + 8 > s.y && pos.y < s.y + SHIELD_H) {
          // Alien overlaps shield — destroy the overlapping area
          for (let dy = 0; dy < 8; dy++) {
            for (let dx = 0; dx < 8; dx++) {
              const px = flr(pos.x + dx - s.x);
              const py = flr(pos.y + dy - s.y);
              if (px >= 0 && px < SHIELD_W && py >= 0 && py < SHIELD_H) {
                s.pixels[py][px] = 0;
              }
            }
          }
        }
      }
    }

    // --- UFO ---
    ufoTimer--;
    if (ufoTimer <= 0 && !ufo) {
      const dir = rnd(1) > 0.5 ? 1 : -1;
      ufo = { x: dir === 1 ? -10 : W + 10, y: 26, dir: dir, speed: 1.5 };
      ufoTimer = 400 + flr(rnd(400));
    }
    if (ufo) {
      ufo.x += ufo.dir * ufo.speed;
      if (ufo.x < -16 || ufo.x > W + 16) ufo = null;
      else if (API.frame % 8 === 0) ufoSound();
    }
    if (ufoScoreTimer > 0) ufoScoreTimer--;

    // --- Explosions ---
    for (let i = explosions.length - 1; i >= 0; i--) {
      explosions[i].timer--;
      if (explosions[i].timer <= 0) explosions.splice(i, 1);
    }

    // --- Particles ---
    for (let i = particles.length - 1; i >= 0; i--) {
      const p = particles[i];
      p.x += p.vx; p.y += p.vy; p.vy += 0.05; p.life--;
      if (p.life <= 0) particles.splice(i, 1);
    }

    // --- Wave clear check ---
    if (liveAliens.length === 0 && state === "play") {
      waveClearSound();
      alienOffX = 0;
      alienOffY = 0;
      setTimeout(() => {
        if (state === "play") spawnWave();
      }, 1500);
      // Temporarily set totalAliens to prevent re-trigger
      // We'll use a flag
      aliens.push({ alive: false, col: -1, row: -1, baseX: -100, baseY: -100, type: "squid", pts: 0 });
    }
  };

  // ============================================================
  // Draw
  // ============================================================
  API._draw = function() {
    cls(0);

    // Stars
    for (const s of stars) pix(s.x, s.y, s.bright);

    // --- Title Screen ---
    if (state === "title") {
      const ty = 50 + sin(API.frame * 0.05) * 4;

      // Title text
      text("SPACE INVADERS", 170, flr(ty), 3);
      rectf(165, flr(ty) + 10, 150, 1, 2);

      // Animated aliens parade
      const bx = W / 2 - 55;
      const by = flr(ty) + 22;
      const aFrame = flr(API.frame / 15) % 2;
      spr(aFrame ? 2 : 3, bx, by + sin(API.frame * 0.08) * 2);
      spr(aFrame ? 4 : 5, bx + 24, by + sin(API.frame * 0.08 + 1) * 2);
      spr(aFrame ? 6 : 7, bx + 48, by + sin(API.frame * 0.08 + 2) * 2);
      spr(aFrame ? 4 : 5, bx + 72, by + sin(API.frame * 0.08 + 3) * 2);
      spr(aFrame ? 2 : 3, bx + 96, by + sin(API.frame * 0.08 + 4) * 2);

      if (flr(API.frame / 20) % 2 === 0) text("PRESS A TO START", 170, 170, 3);

      // Score table
      text("- SCORE TABLE -", 175, 195, 2);
      spr(8, 185, 210); text("  UFO     ???", 195, 212, 2);
      spr(2, 185, 224); text("  SQUID    30", 195, 226, 2);
      spr(4, 185, 238); text("  CRAB     20", 195, 240, 2);
      spr(6, 185, 252); text("  OCTOPUS  10", 195, 254, 2);

      if (hiScore > 0) {
        text("HI-SCORE: " + hiScore, 185, 280, 1);
      }

      text("GRAYBOX DEMO V0.1", 168, 305, 1);
      return;
    }

    // --- Game Over ---
    if (state === "gameover") {
      for (const p of particles) pix(flr(p.x), flr(p.y), p.color);

      text("GAME OVER", 195, 110, 3);
      text("SCORE: " + score, 195, 135, 2);
      text("WAVE: " + wave, 207, 150, 2);
      if (hiScore > 0) text("HI-SCORE: " + hiScore, 185, 170, 1);
      if (flr(API.frame / 20) % 2 === 0) text("PRESS A TO CONTINUE", 158, 210, 3);
      return;
    }

    // --- Play State Rendering ---

    // Ground line
    rectf(0, 305, W, 1, 1);

    // Shields
    for (const s of shields) drawShield(s);

    // Aliens
    for (const a of aliens) {
      if (!a.alive) continue;
      const pos = getAlienPos(a);
      spr(getAlienSprite(a), flr(pos.x), flr(pos.y));
    }

    // UFO
    if (ufo) {
      spr(8, flr(ufo.x), flr(ufo.y));
    }
    // UFO score display
    if (ufoScoreTimer > 0) {
      text("" + ufoScoreShow, flr(ufoScoreX), 26, 3);
    }

    // Enemy bullets
    for (const b of eBullets) {
      spr(b.type === 0 ? 10 : 11, flr(b.x), flr(b.y));
    }

    // Player bullet
    if (bullet) spr(9, flr(bullet.x), flr(bullet.y));

    // Player (blink during invulnerability)
    if (respawnTimer <= 0) {
      if (invulnTimer <= 0 || flr(API.frame / 3) % 2 === 0) {
        spr(1, flr(player.x), flr(player.y));
      }
    }

    // Explosions
    for (const e of explosions) {
      const sprId = e.timer > 5 ? 12 : (e.timer > 2 ? 13 : 16);
      spr(sprId, flr(e.x), flr(e.y));
    }

    // Particles
    for (const p of particles) pix(flr(p.x), flr(p.y), p.color);

    // --- HUD ---
    rectf(0, 0, W, 14, 0);
    text("SCORE:" + score, 4, 4, 3);
    text("WAVE:" + wave, W / 2 - 20, 4, 2);
    // Lives
    text("" + lives, W - 48, 4, 3);
    for (let i = 0; i < lives - 1; i++) spr(15, W - 38 + i * 10, 3);
  };

  // ============================================================
  // Boot
  // ============================================================
  if (API._init) API._init();
  setInterval(tick, 1000 / FPS);
  document.addEventListener("keydown", ensureAudio, { once: true });
  document.addEventListener("click", ensureAudio, { once: true });
})();
</script>
</body>
</html>
