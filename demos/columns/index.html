<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GrayBox — Demo: Columns</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #0a0a0a;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100vh;
    font-family: monospace;
    overflow: hidden;
  }
  #frame {
    background: #111;
    border: 3px solid #333;
    border-radius: 8px;
    padding: 12px;
    box-shadow: 0 0 40px rgba(0,0,0,0.8), inset 0 0 20px rgba(0,0,0,0.5);
  }
  canvas {
    display: block;
    image-rendering: pixelated;
    image-rendering: crisp-edges;
  }
  #controls {
    margin-top: 12px;
    color: #6b6b6b;
    font-size: 11px;
    text-align: center;
    letter-spacing: 1px;
  }
  #controls span { color: #b0b0b0; }
</style>
</head>
<body>
<div id="frame">
  <canvas id="screen"></canvas>
</div>
<div id="controls">
  <span>&larr;&rarr;</span> MOVE &nbsp;&nbsp; <span>&darr;</span> SOFT DROP &nbsp;&nbsp; <span>&uarr;</span> HARD DROP &nbsp;&nbsp; <span>Z</span> CYCLE &nbsp;&nbsp; <span>ENTER</span> START
</div>
<script>
(() => {
  "use strict";

  // ============================================================
  // GrayBox Runtime (inline)
  // ============================================================
  const W = 480;
  const H = 320;
  const FPS = 30;
  const COLORS = ["#1a1a1a", "#6b6b6b", "#b0b0b0", "#e8e8e8"];
  const canvas = document.getElementById("screen");
  canvas.width = W;
  canvas.height = H;
  function fitCanvas() {
    var maxW = window.innerWidth - 40;
    var maxH = window.innerHeight - 60;
    var s = Math.min(maxW / W, maxH / H);
    canvas.style.width = (W * s) + "px";
    canvas.style.height = (H * s) + "px";
  }
  fitCanvas();
  window.addEventListener("resize", fitCanvas);
  const ctx = canvas.getContext("2d");
  ctx.imageSmoothingEnabled = false;
  const buf = ctx.createImageData(W, H);
  const buf32 = new Uint32Array(buf.data.buffer);

  function hexToABGR(hex) {
    const r = parseInt(hex.slice(1, 3), 16);
    const g = parseInt(hex.slice(3, 5), 16);
    const b = parseInt(hex.slice(5, 7), 16);
    return (255 << 24) | (b << 16) | (g << 8) | r;
  }
  const COLOR_U32 = COLORS.map(hexToABGR);

  const sprites = {};
  const tilemap = {};

  const keyMap = {
    "ArrowUp": "up", "ArrowDown": "down", "ArrowLeft": "left", "ArrowRight": "right",
    "w": "up", "s": "down", "a": "left", "d": "right",
    "z": "a", "Z": "a", "x": "b", "X": "b",
    "Enter": "start", " ": "a"
  };
  const keys = {};
  const keysPrev = {};

  document.addEventListener("keydown", e => {
    const k = keyMap[e.key];
    if (k) { keys[k] = true; e.preventDefault(); }
  });
  document.addEventListener("keyup", e => {
    const k = keyMap[e.key];
    if (k) { keys[k] = false; e.preventDefault(); }
  });

  let audioCtx = null;
  const channels = [null, null];
  const channelGains = [null, null];
  function ensureAudio() {
    if (!audioCtx) {
      audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      for (let i = 0; i < 2; i++) {
        channelGains[i] = audioCtx.createGain();
        channelGains[i].gain.value = 0.15;
        channelGains[i].connect(audioCtx.destination);
      }
    }
  }

  const NOTE_NAMES = ["C","C#","D","D#","E","F","F#","G","G#","A","A#","B"];
  function noteToFreq(noteStr) {
    const match = noteStr.match(/^([A-G]#?)(\d)$/);
    if (!match) return 440;
    const name = match[1];
    const octave = parseInt(match[2]);
    const semitone = NOTE_NAMES.indexOf(name);
    if (semitone === -1) return 440;
    const midi = (octave + 1) * 12 + semitone;
    return 440 * Math.pow(2, (midi - 69) / 12);
  }

  const FONT_W = 4;
  const FONT_H = 7;
  const FONT = {};
  const fontData = {
    "A":"0110100110011111100110011001","B":"1110100110101110100110011110",
    "C":"0110100110001000100001100110","D":"1100101010011001100110101100",
    "E":"1111100010001110100010001111","F":"1111100010001110100010001000",
    "G":"0111100010001011100101100111","H":"1001100110011111100110011001",
    "I":"1110010001000100010001001110","J":"0111001000100010001010100100",
    "K":"1001101011001100101010011001","L":"1000100010001000100010001111",
    "M":"1001111111011001100110011001","N":"1001110111011001100110011001",
    "O":"0110100110011001100110010110","P":"1110100110011110100010001000",
    "Q":"0110100110011001101101100001","R":"1110100110011110101010011001",
    "S":"0111100010000110000110001110","T":"1111001000100010001000100010",
    "U":"1001100110011001100110010110","V":"1001100110011001100101100110",
    "W":"1001100110011001101111011001","X":"1001100101100110011010011001",
    "Y":"1001100101100010001000100010","Z":"1111000100100100100010001111",
    "0":"0110100111011011101110010110","1":"0100110001000100010001001110",
    "2":"0110100100010010010010001111","3":"1110000100010110000110011110",
    "4":"1001100110011111000100010001","5":"1111100010001110000100011110",
    "6":"0110100010001110100110010110","7":"1111000100010010010001001000",
    "8":"0110100110010110100110010110","9":"0110100110010111000100010110",
    " ":"0000000000000000000000000000",
    ".":"0000000000000000000001000100",
    ",":"0000000000000000001000101000",
    "!":"0100010001000100000000000100",
    "?":"0110100100010010000000000010",
    "-":"0000000000001110000000000000",
    "+":"0000001001001110010000100000",
    ":":"0000010001000000010001000000",
    "/":"0001000100100010010010001000",
    "*":"0000101001001110010010100000",
    "#":"0101111101011111010100000000",
    "(":"0010010010001000010001000010",
    ")":"0100001000010001000100100100",
    "=":"0000000011110000111100000000",
    "'":"0100010010000000000000000000",
    "\"":"1010101000000000000000000000",
    "<":"0010010010001000010000100010",
    ">":"1000010000100001001001001000",
    "_":"0000000000000000000000001111",
  };
  for (const [ch, bits] of Object.entries(fontData)) {
    FONT[ch] = [];
    for (let i = 0; i < bits.length; i++) FONT[ch].push(parseInt(bits[i]));
  }

  const API = {};
  API._init = null;
  API._update = null;
  API._draw = null;
  API.frame = 0;

  API.cls = function(c = 0) { buf32.fill(COLOR_U32[c] || COLOR_U32[0]); };
  API.pix = function(x, y, c) {
    x = Math.floor(x); y = Math.floor(y);
    if (x < 0 || x >= W || y < 0 || y >= H) return;
    buf32[y * W + x] = COLOR_U32[c] || COLOR_U32[0];
  };
  API.line = function(x0, y0, x1, y1, c) {
    x0=Math.floor(x0); y0=Math.floor(y0); x1=Math.floor(x1); y1=Math.floor(y1);
    const dx=Math.abs(x1-x0), dy=Math.abs(y1-y0);
    const sx=x0<x1?1:-1, sy=y0<y1?1:-1;
    let err=dx-dy;
    while(true) {
      API.pix(x0,y0,c);
      if(x0===x1&&y0===y1) break;
      const e2=2*err;
      if(e2>-dy){err-=dy;x0+=sx;}
      if(e2<dx){err+=dx;y0+=sy;}
    }
  };
  API.rect = function(x,y,w,h,c) {
    API.line(x,y,x+w-1,y,c); API.line(x+w-1,y,x+w-1,y+h-1,c);
    API.line(x+w-1,y+h-1,x,y+h-1,c); API.line(x,y+h-1,x,y,c);
  };
  API.rectf = function(x,y,w,h,c) {
    x=Math.floor(x); y=Math.floor(y);
    const col=COLOR_U32[c]||COLOR_U32[0];
    for(let py=Math.max(0,y);py<Math.min(H,y+h);py++)
      for(let px=Math.max(0,x);px<Math.min(W,x+w);px++)
        buf32[py*W+px]=col;
  };
  API.circ = function(cx,cy,r,c) {
    let x=r,y=0,d=1-r; cx=Math.floor(cx); cy=Math.floor(cy);
    while(x>=y){
      API.pix(cx+x,cy+y,c);API.pix(cx-x,cy+y,c);
      API.pix(cx+x,cy-y,c);API.pix(cx-x,cy-y,c);
      API.pix(cx+y,cy+x,c);API.pix(cx-y,cy+x,c);
      API.pix(cx+y,cy-x,c);API.pix(cx-y,cy-x,c);
      y++; if(d<0){d+=2*y+1;}else{x--;d+=2*(y-x)+1;}
    }
  };
  API.circf = function(cx,cy,r,c) {
    cx=Math.floor(cx); cy=Math.floor(cy);
    const col=COLOR_U32[c]||COLOR_U32[0]; const r2=r*r;
    for(let py=-r;py<=r;py++) for(let px=-r;px<=r;px++)
      if(px*px+py*py<=r2){ const sx=cx+px,sy=cy+py;
        if(sx>=0&&sx<W&&sy>=0&&sy<H) buf32[sy*W+sx]=col; }
  };
  API.sprite = function(id, data) {
    const arr = new Uint8Array(64); let i = 0;
    for (const ch of data) { if (ch>='0'&&ch<='3') { arr[i++]=parseInt(ch); if(i>=64) break; } }
    sprites[id] = arr;
  };
  API.spr = function(id, x, y, flipX, flipY) {
    const s=sprites[id]; if(!s) return;
    x=Math.floor(x); y=Math.floor(y);
    for(let py=0;py<8;py++) for(let px=0;px<8;px++){
      const sx=flipX?7-px:px, sy=flipY?7-py:py;
      const c=s[sy*8+sx], dx=x+px, dy=y+py;
      if(dx>=0&&dx<W&&dy>=0&&dy<H) buf32[dy*W+dx]=COLOR_U32[c];
    }
  };
  API.text = function(str, x, y, c) {
    str=String(str).toUpperCase(); let cx=Math.floor(x); const cy=Math.floor(y);
    const col=COLOR_U32[c]||COLOR_U32[3];
    for(const ch of str){
      const glyph=FONT[ch];
      if(glyph) for(let py=0;py<FONT_H;py++) for(let px=0;px<FONT_W;px++)
        if(glyph[py*FONT_W+px]){ const dx=cx+px,dy=cy+py;
          if(dx>=0&&dx<W&&dy>=0&&dy<H) buf32[dy*W+dx]=col; }
      cx+=FONT_W+1;
    }
  };
  API.mget = function(cx,cy) { return tilemap[cx+","+cy]||0; };
  API.mset = function(cx,cy,id) { tilemap[cx+","+cy]=id; };
  API.map = function(mx,my,mw,mh,sx,sy) {
    for(let ty=0;ty<mh;ty++) for(let tx=0;tx<mw;tx++){
      const id=API.mget(mx+tx,my+ty); if(id>0) API.spr(id,sx+tx*8,sy+ty*8); }
  };
  API.btn = function(k) { return !!keys[k]; };
  API.btnp = function(k) { return !!keys[k] && !keysPrev[k]; };
  API.note = function(ch, noteStr, dur) {
    ensureAudio(); if(ch<0||ch>1) return; API.stop(ch);
    const osc=audioCtx.createOscillator(); osc.type="square";
    osc.frequency.value=noteToFreq(noteStr);
    osc.connect(channelGains[ch]); osc.start();
    osc.stop(audioCtx.currentTime+dur); channels[ch]=osc;
  };
  API.stop = function(ch) {
    if(ch===undefined){API.stop(0);API.stop(1);return;}
    if(channels[ch]){try{channels[ch].stop();}catch(e){} channels[ch]=null;}
  };
  API.rnd = function(max) { return Math.random()*max; };
  API.flr = Math.floor;
  API.abs = Math.abs;
  API.min = Math.min;
  API.max = Math.max;
  API.sin = Math.sin;
  API.cos = Math.cos;

  function tick() {
    if (API._update) API._update();
    if (API._draw) API._draw();
    ctx.putImageData(buf, 0, 0);
    for (const k in keys) keysPrev[k] = keys[k];
    API.frame++;
  }

  // ============================================================
  // Columns Game
  // ============================================================
  const { cls, pix, line, rect, rectf, circ, circf, sprite: defSprite,
          spr, text, btn, btnp, note, stop, rnd, flr, abs: _abs,
          min, max: _max, sin, cos } = API;

  // --- Constants ---
  const COLS = 6;
  const ROWS = 13;
  const CELL = 20;
  const BOARD_X = 180;
  const BOARD_Y = 22;
  const BOARD_W = COLS * CELL;
  const BOARD_H = ROWS * CELL;
  const NUM_JEWELS = 4;

  // --- Jewel Sprites (8x8, 4 distinct patterns) ---
  // Jewel 1: Solid diamond
  defSprite(1,
    "00010000" +
    "00131000" +
    "01323100" +
    "13233210" +
    "13233210" +
    "01323100" +
    "00131000" +
    "00010000"
  );
  // Jewel 2: Crosshatch
  defSprite(2,
    "20202020" +
    "02020200" +
    "20202020" +
    "02020200" +
    "20202020" +
    "02020200" +
    "20202020" +
    "02020200"
  );
  // Jewel 3: Circle / ring
  defSprite(3,
    "00111000" +
    "01000100" +
    "10000010" +
    "10033010" +
    "10033010" +
    "10000010" +
    "01000100" +
    "00111000"
  );
  // Jewel 4: Horizontal stripes
  defSprite(4,
    "33333330" +
    "00000000" +
    "11111110" +
    "00000000" +
    "33333330" +
    "00000000" +
    "11111110" +
    "00000000"
  );

  // --- Game State ---
  let state = "title";
  let board;
  let score, level, linesCleared, chain;
  let dropInterval, dropTimer;
  let piece;
  let nextJewels;
  let flashTimer, flashCells;
  let gravityPhase;
  let gravityTimer;
  let gameOver;
  let hiScore = 0;
  let titleAnim = 0;

  // DAS (delayed auto-shift) for left/right
  let dasDir = 0;
  let dasTimer = 0;
  const DAS_DELAY = 10;
  const DAS_REPEAT = 3;

  function newBoard() {
    board = [];
    for (let r = 0; r < ROWS; r++) {
      board[r] = [];
      for (let c = 0; c < COLS; c++) board[r][c] = 0;
    }
  }

  function randomJewel() { return flr(rnd(NUM_JEWELS)) + 1; }

  function makeNextJewels() {
    return [randomJewel(), randomJewel(), randomJewel()];
  }

  function spawnPiece() {
    piece = {
      col: flr(COLS / 2) - 1,
      row: -2,
      jewels: nextJewels.slice()
    };
    nextJewels = makeNextJewels();
    dropTimer = 0;
    // Check if spawn is blocked
    if (board[0][piece.col] !== 0 || board[1][piece.col] !== 0) {
      gameOver = true;
      gameOverSound();
    }
  }

  function resetGame() {
    newBoard();
    score = 0;
    level = 1;
    linesCleared = 0;
    chain = 0;
    dropInterval = 20;
    dropTimer = 0;
    flashTimer = 0;
    flashCells = [];
    gravityPhase = false;
    gravityTimer = 0;
    gameOver = false;
    dasDir = 0;
    dasTimer = 0;
    nextJewels = makeNextJewels();
    spawnPiece();
  }

  // --- Collision ---
  function canMove(col, rowInt) {
    for (let i = 0; i < 3; i++) {
      const r = rowInt + i;
      const c = col;
      if (c < 0 || c >= COLS) return false;
      if (r >= ROWS) return false;
      if (r >= 0 && board[r][c] !== 0) return false;
    }
    return true;
  }

  function lockPiece() {
    const rowInt = flr(piece.row);
    for (let i = 0; i < 3; i++) {
      const r = rowInt + i;
      if (r >= 0 && r < ROWS) {
        board[r][piece.col] = piece.jewels[i];
      }
    }
    piece = null;
    chain = 0;
    startMatchCheck();
  }

  // --- Match detection ---
  function findMatches() {
    const matched = new Set();
    // Horizontal
    for (let r = 0; r < ROWS; r++) {
      for (let c = 0; c <= COLS - 3; c++) {
        const v = board[r][c];
        if (v === 0) continue;
        if (board[r][c+1] === v && board[r][c+2] === v) {
          let end = c + 2;
          while (end + 1 < COLS && board[r][end+1] === v) end++;
          for (let i = c; i <= end; i++) matched.add(r + "," + i);
        }
      }
    }
    // Vertical
    for (let c = 0; c < COLS; c++) {
      for (let r = 0; r <= ROWS - 3; r++) {
        const v = board[r][c];
        if (v === 0) continue;
        if (board[r+1][c] === v && board[r+2][c] === v) {
          let end = r + 2;
          while (end + 1 < ROWS && board[end+1][c] === v) end++;
          for (let i = r; i <= end; i++) matched.add(i + "," + c);
        }
      }
    }
    // Diagonal: top-left to bottom-right
    for (let r = 0; r <= ROWS - 3; r++) {
      for (let c = 0; c <= COLS - 3; c++) {
        const v = board[r][c];
        if (v === 0) continue;
        if (board[r+1][c+1] === v && board[r+2][c+2] === v) {
          let end = 2;
          while (r+end+1 < ROWS && c+end+1 < COLS && board[r+end+1][c+end+1] === v) end++;
          for (let i = 0; i <= end; i++) matched.add((r+i) + "," + (c+i));
        }
      }
    }
    // Diagonal: top-right to bottom-left
    for (let r = 0; r <= ROWS - 3; r++) {
      for (let c = 2; c < COLS; c++) {
        const v = board[r][c];
        if (v === 0) continue;
        if (board[r+1][c-1] === v && board[r+2][c-2] === v) {
          let end = 2;
          while (r+end+1 < ROWS && c-end-1 >= 0 && board[r+end+1][c-end-1] === v) end++;
          for (let i = 0; i <= end; i++) matched.add((r+i) + "," + (c-i));
        }
      }
    }
    return matched;
  }

  function startMatchCheck() {
    const matched = findMatches();
    if (matched.size > 0) {
      chain++;
      flashCells = [];
      matched.forEach(key => {
        const [r, c] = key.split(",").map(Number);
        flashCells.push({ r, c });
      });
      const pts = flashCells.length * 10 * chain;
      score += pts;
      if (score > hiScore) hiScore = score;
      flashTimer = 20;
      gravityPhase = true;
      // Match sound — pitch rises with chain
      const notes = ["C5","E5","G5","C6","E6"];
      note(0, notes[min(chain - 1, 4)], 0.1);
      if (chain > 1) {
        note(1, "G5", 0.06);
      }
    } else {
      gravityPhase = false;
      chain = 0;
      if (!gameOver) {
        spawnPiece();
      }
    }
  }

  function clearAndGravity() {
    let cleared = 0;
    for (const cell of flashCells) {
      if (board[cell.r][cell.c] !== 0) cleared++;
      board[cell.r][cell.c] = 0;
    }
    linesCleared += cleared;
    // Level up every 20 jewels cleared
    const newLevel = flr(linesCleared / 20) + 1;
    if (newLevel > level) {
      level = newLevel;
      dropInterval = _max(3, 20 - (level - 1) * 2);
      note(0, "C6", 0.06);
      setTimeout(() => note(0, "E6", 0.06), 60);
      setTimeout(() => note(0, "G6", 0.1), 120);
    }
    flashCells = [];
    flashTimer = 0;

    // Apply gravity
    for (let c = 0; c < COLS; c++) {
      let writeRow = ROWS - 1;
      for (let r = ROWS - 1; r >= 0; r--) {
        if (board[r][c] !== 0) {
          board[writeRow][c] = board[r][c];
          if (writeRow !== r) board[r][c] = 0;
          writeRow--;
        }
      }
      for (let r = writeRow; r >= 0; r--) board[r][c] = 0;
    }

    gravityTimer = 8;
  }

  // --- Sound effects ---
  function moveSound() { note(1, "A4", 0.02); }
  function dropSound() { note(1, "C3", 0.05); }
  function cycleSound() { note(0, "E5", 0.03); }
  function gameOverSound() {
    note(0, "C3", 0.15);
    note(1, "G2", 0.15);
    setTimeout(() => { note(0, "A2", 0.2); note(1, "E2", 0.2); }, 150);
  }

  // --- Drawing helpers ---
  function drawJewelScaled(px, py, type, flash) {
    if (py < BOARD_Y - CELL || py >= BOARD_Y + BOARD_H) return;
    // Cell background
    rectf(px + 1, py + 1, CELL - 2, CELL - 2, 0);
    if (flash && API.frame % 4 < 2) {
      // Flash white
      rectf(px + 2, py + 2, CELL - 4, CELL - 4, 3);
    } else {
      drawJewelInner(px, py, type);
    }
  }

  function drawJewelInner(px, py, type) {
    const s = sprites[type];
    if (!s) return;
    // Draw 8x8 sprite scaled 2x, centered in CELL
    const ox = px + (CELL - 16) / 2;
    const oy = py + (CELL - 16) / 2;
    for (let sy = 0; sy < 8; sy++) {
      for (let sx = 0; sx < 8; sx++) {
        const c = s[sy * 8 + sx];
        const dx = ox + sx * 2;
        const dy = oy + sy * 2;
        for (let a = 0; a < 2; a++)
          for (let b = 0; b < 2; b++) {
            const fx = dx + a, fy = dy + b;
            if (fx >= 0 && fx < W && fy >= 0 && fy < H)
              buf32[fy * W + fx] = COLOR_U32[c];
          }
      }
    }
  }

  function drawBoard() {
    // Border
    rectf(BOARD_X - 3, BOARD_Y - 3, BOARD_W + 6, BOARD_H + 6, 1);
    rectf(BOARD_X - 1, BOARD_Y - 1, BOARD_W + 2, BOARD_H + 2, 0);

    // Subtle grid dots
    for (let c = 1; c < COLS; c++) {
      for (let r = 1; r < ROWS; r++) {
        pix(BOARD_X + c * CELL, BOARD_Y + r * CELL, 1);
      }
    }

    // Draw placed jewels
    const flashSet = new Set(flashCells.map(c => c.r + "," + c.c));
    for (let r = 0; r < ROWS; r++) {
      for (let c = 0; c < COLS; c++) {
        if (board[r][c] !== 0) {
          const px = BOARD_X + c * CELL;
          const py = BOARD_Y + r * CELL;
          const isFlashing = flashSet.has(r + "," + c) && flashTimer > 0;
          drawJewelScaled(px, py, board[r][c], isFlashing);
        }
      }
    }
  }

  function drawPiece() {
    if (!piece) return;
    for (let i = 0; i < 3; i++) {
      const r = piece.row + i;
      const py = BOARD_Y + flr(r) * CELL;
      const px = BOARD_X + piece.col * CELL;
      if (flr(r) >= 0) {
        drawJewelScaled(px, py, piece.jewels[i], false);
      }
    }
  }

  function drawGhostPiece() {
    if (!piece) return;
    let ghostRow = flr(piece.row);
    while (canMove(piece.col, ghostRow + 1)) ghostRow++;
    if (ghostRow <= flr(piece.row)) return;
    for (let i = 0; i < 3; i++) {
      const r = ghostRow + i;
      if (r >= 0 && r < ROWS) {
        const px = BOARD_X + piece.col * CELL;
        const py = BOARD_Y + r * CELL;
        rect(px + 3, py + 3, CELL - 6, CELL - 6, 1);
      }
    }
  }

  function drawNextPreview() {
    const nx = BOARD_X + BOARD_W + 28;
    const ny = BOARD_Y + 16;
    text("NEXT", nx + 4, ny - 12, 2);
    rectf(nx - 2, ny - 2, CELL + 4, CELL * 3 + 4, 1);
    rectf(nx, ny, CELL, CELL * 3, 0);
    for (let i = 0; i < 3; i++) {
      const px = nx;
      const py = ny + i * CELL;
      rectf(px + 1, py + 1, CELL - 2, CELL - 2, 0);
      drawJewelInner(px, py, nextJewels[i]);
    }
  }

  function drawHUD() {
    const lx = 22;
    text("SCORE", lx, BOARD_Y + 4, 2);
    text(String(score), lx, BOARD_Y + 14, 3);

    text("HI-SCORE", lx, BOARD_Y + 36, 2);
    text(String(hiScore), lx, BOARD_Y + 46, 3);

    text("LEVEL", lx, BOARD_Y + 74, 2);
    text(String(level), lx, BOARD_Y + 84, 3);

    text("LINES", lx, BOARD_Y + 106, 2);
    text(String(linesCleared), lx, BOARD_Y + 116, 3);

    if (chain > 1 && gravityPhase) {
      text("CHAIN", lx, BOARD_Y + 148, 2);
      text("X" + String(chain), lx, BOARD_Y + 158, 3);
    }

    // Jewel legend on right side
    const rx = BOARD_X + BOARD_W + 28;
    const ry = BOARD_Y + 110;
    text("JEWELS", rx, ry, 2);
    for (let i = 0; i < NUM_JEWELS; i++) {
      const px = rx + 2;
      const py = ry + 12 + i * 22;
      drawJewelInner(px, py, i + 1);
    }
  }

  // --- Update ---
  function tryMove(dir) {
    if (!piece) return false;
    if (canMove(piece.col + dir, flr(piece.row))) {
      piece.col += dir;
      moveSound();
      return true;
    }
    return false;
  }

  function updatePlay() {
    if (gameOver) {
      if (btnp("start")) {
        state = "title";
      }
      return;
    }

    // Flash/gravity phase
    if (gravityPhase) {
      if (flashTimer > 0) {
        flashTimer--;
        if (flashTimer <= 0) {
          clearAndGravity();
        }
      } else if (gravityTimer > 0) {
        gravityTimer--;
        if (gravityTimer <= 0) {
          startMatchCheck();
        }
      }
      return;
    }

    if (!piece) return;

    // Move left/right with DAS
    if (btnp("left")) {
      tryMove(-1);
      dasDir = -1;
      dasTimer = 0;
    } else if (btnp("right")) {
      tryMove(1);
      dasDir = 1;
      dasTimer = 0;
    }

    if (btn("left") && dasDir === -1) {
      dasTimer++;
      if (dasTimer > DAS_DELAY && dasTimer % DAS_REPEAT === 0) tryMove(-1);
    } else if (btn("right") && dasDir === 1) {
      dasTimer++;
      if (dasTimer > DAS_DELAY && dasTimer % DAS_REPEAT === 0) tryMove(1);
    }

    if (!btn("left") && dasDir === -1) { dasDir = 0; dasTimer = 0; }
    if (!btn("right") && dasDir === 1) { dasDir = 0; dasTimer = 0; }

    // Cycle jewels (Z / a button)
    if (btnp("a")) {
      const temp = piece.jewels[2];
      piece.jewels[2] = piece.jewels[1];
      piece.jewels[1] = piece.jewels[0];
      piece.jewels[0] = temp;
      cycleSound();
    }

    // Hard drop (up)
    if (btnp("up")) {
      let r = flr(piece.row);
      while (canMove(piece.col, r + 1)) r++;
      piece.row = r;
      dropSound();
      lockPiece();
      return;
    }

    // Drop timing
    let speed = 1;
    if (btn("down")) speed = 4;

    dropTimer += speed;
    if (dropTimer >= dropInterval) {
      dropTimer = 0;
      const nextRow = flr(piece.row) + 1;
      if (canMove(piece.col, nextRow)) {
        piece.row = nextRow;
      } else {
        if (flr(piece.row) < 0) {
          gameOver = true;
          gameOverSound();
          return;
        }
        dropSound();
        lockPiece();
      }
    }
  }

  // --- Title Screen ---
  function drawTitle() {
    cls(0);
    titleAnim++;
    const t = titleAnim;

    // Background falling jewels (decorative)
    for (let i = 0; i < 15; i++) {
      const x = (i * 37 + 15) % W;
      const y = ((t * (1 + (i % 3)) + i * 53) % (H + 40)) - 20;
      const type = (i % NUM_JEWELS) + 1;
      const s = sprites[type];
      if (s) {
        for (let sy = 0; sy < 8; sy++)
          for (let sx = 0; sx < 8; sx++) {
            const c = s[sy * 8 + sx];
            if (c > 0) {
              const dx = flr(x) + sx;
              const dy = flr(y) + sy;
              if (dx >= 0 && dx < W && dy >= 0 && dy < H)
                buf32[dy * W + dx] = COLOR_U32[1];
            }
          }
      }
    }

    // Title text
    const cx = W / 2;
    text("C O L U M N S", cx - 50, 70, 3);

    // Animated jewels row
    for (let i = 0; i < NUM_JEWELS; i++) {
      const ax = cx - 46 + i * 24;
      const ay = 100 + sin(t * 0.08 + i * 1.5) * 5;
      drawJewelInner(flr(ax), flr(ay), i + 1);
    }

    // Separator line
    line(cx - 70, 130, cx + 70, 130, 1);

    text("MATCH 3 OR MORE", cx - 52, 145, 2);
    text("IN ANY DIRECTION!", cx - 55, 157, 2);

    if (flr(t / 18) % 2 === 0) {
      text("PRESS ENTER TO START", cx - 65, 195, 3);
    }

    if (hiScore > 0) {
      text("HI-SCORE: " + hiScore, cx - 40, 230, 2);
    }

    text("ARROWS: MOVE / DROP", cx - 60, 268, 1);
    text("Z: CYCLE JEWEL ORDER", cx - 63, 280, 1);
    text("UP: HARD DROP", cx - 43, 292, 1);
  }

  function drawPlay() {
    cls(0);

    // Subtle background pattern
    for (let y = 0; y < H; y += 8) {
      for (let x = 0; x < W; x += 8) {
        if ((x + y) % 16 === 0) pix(x, y, 1);
      }
    }

    drawBoard();
    if (!gravityPhase && piece) {
      drawGhostPiece();
      drawPiece();
    }
    drawNextPreview();
    drawHUD();

    if (gameOver) {
      // Darken the board
      for (let py = BOARD_Y; py < BOARD_Y + BOARD_H; py++) {
        for (let px = BOARD_X; px < BOARD_X + BOARD_W; px++) {
          if ((px + py) % 2 === 0) buf32[py * W + px] = COLOR_U32[0];
        }
      }
      const gx = BOARD_X + BOARD_W / 2 - 32;
      const gy = BOARD_Y + BOARD_H / 2 - 20;
      rectf(gx - 6, gy - 6, 75, 46, 0);
      rect(gx - 6, gy - 6, 75, 46, 2);
      text("GAME OVER", gx, gy, 3);
      text("SCORE: " + score, gx - 2, gy + 14, 2);
      if (flr(API.frame / 18) % 2 === 0) {
        text("PRESS ENTER", gx - 2, gy + 28, 2);
      }
    }
  }

  // --- Main loop ---
  API._update = function() {
    switch (state) {
      case "title":
        if (btnp("start")) {
          state = "play";
          resetGame();
        }
        break;
      case "play":
        updatePlay();
        break;
    }
  };

  API._draw = function() {
    switch (state) {
      case "title":
        drawTitle();
        break;
      case "play":
        drawPlay();
        break;
    }
  };

  // Start game loop
  setInterval(tick, 1000 / FPS);

})();
</script>
