<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GrayBox — Demo: Tempest</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #0a0a0a;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100vh;
    font-family: monospace;
    overflow: hidden;
  }
  #frame {
    background: #111;
    border: 3px solid #333;
    border-radius: 8px;
    padding: 12px;
    box-shadow: 0 0 40px rgba(0,0,0,0.8), inset 0 0 20px rgba(0,0,0,0.5);
  }
  canvas {
    display: block;
    image-rendering: pixelated;
    image-rendering: crisp-edges;
  }
  #controls {
    margin-top: 12px;
    color: #6b6b6b;
    font-size: 11px;
    text-align: center;
    letter-spacing: 1px;
  }
  #controls span { color: #b0b0b0; }
</style>
</head>
<body>
<div id="frame">
  <canvas id="screen"></canvas>
</div>
<div id="controls">
  <span>&larr;&rarr;</span> MOVE &nbsp;&nbsp; <span>Z</span> SHOOT &nbsp;&nbsp; <span>X</span> SUPERZAPPER &nbsp;&nbsp; <span>ENTER</span> START
</div>
<script>
(() => {
  "use strict";

  // ============================================================
  // GrayBox Runtime (inline)
  // ============================================================
  const W = 480;
  const H = 320;
  const SCALE = 2;
  const FPS = 30;
  const COLORS = ["#1a1a1a", "#6b6b6b", "#b0b0b0", "#e8e8e8"];
  const canvas = document.getElementById("screen");
  canvas.width = W;
  canvas.height = H;
  canvas.style.width = (W * SCALE) + "px";
  canvas.style.height = (H * SCALE) + "px";
  const ctx = canvas.getContext("2d");
  ctx.imageSmoothingEnabled = false;
  const buf = ctx.createImageData(W, H);
  const buf32 = new Uint32Array(buf.data.buffer);

  function hexToABGR(hex) {
    const r = parseInt(hex.slice(1, 3), 16);
    const g = parseInt(hex.slice(3, 5), 16);
    const b = parseInt(hex.slice(5, 7), 16);
    return (255 << 24) | (b << 16) | (g << 8) | r;
  }
  const COLOR_U32 = COLORS.map(hexToABGR);

  const sprites = {};
  const tilemap = {};

  const keyMap = {
    "ArrowUp": "up", "ArrowDown": "down", "ArrowLeft": "left", "ArrowRight": "right",
    "w": "up", "s": "down", "a": "left", "d": "right",
    "z": "a", "Z": "a", "x": "b", "X": "b",
    "Enter": "start", " ": "a"
  };
  const keys = {};
  const keysPrev = {};

  document.addEventListener("keydown", e => {
    const k = keyMap[e.key];
    if (k) { keys[k] = true; e.preventDefault(); }
  });
  document.addEventListener("keyup", e => {
    const k = keyMap[e.key];
    if (k) { keys[k] = false; e.preventDefault(); }
  });

  let audioCtx = null;
  const channels = [null, null];
  const channelGains = [null, null];
  function ensureAudio() {
    if (!audioCtx) {
      audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      for (let i = 0; i < 2; i++) {
        channelGains[i] = audioCtx.createGain();
        channelGains[i].gain.value = 0.15;
        channelGains[i].connect(audioCtx.destination);
      }
    }
  }

  const NOTE_NAMES = ["C","C#","D","D#","E","F","F#","G","G#","A","A#","B"];
  function noteToFreq(noteStr) {
    const match = noteStr.match(/^([A-G]#?)(\d)$/);
    if (!match) return 440;
    const name = match[1];
    const octave = parseInt(match[2]);
    const semitone = NOTE_NAMES.indexOf(name);
    if (semitone === -1) return 440;
    const midi = (octave + 1) * 12 + semitone;
    return 440 * Math.pow(2, (midi - 69) / 12);
  }

  const FONT_W = 4;
  const FONT_H = 6;
  const FONT = {};
  const fontData = {
    "A":"0110100110011111100110011001","B":"1110100110101110100110011110",
    "C":"0110100110001000100001100110","D":"1100101010011001100110101100",
    "E":"1111100010001110100010001111","F":"1111100010001110100010001000",
    "G":"0111100010001011100101100111","H":"1001100110011111100110011001",
    "I":"1110010001000100010001001110","J":"0111001000100010001010100100",
    "K":"1001101011001100101010011001","L":"1000100010001000100010001111",
    "M":"1001111111011001100110011001","N":"1001110111011001100110011001",
    "O":"0110100110011001100110010110","P":"1110100110011110100010001000",
    "Q":"0110100110011001101101100001","R":"1110100110011110101010011001",
    "S":"0111100010000110000110001110","T":"1111001000100010001000100010",
    "U":"1001100110011001100110010110","V":"1001100110011001100101100110",
    "W":"1001100110011001101111011001","X":"1001100101100110011010011001",
    "Y":"1001100101100010001000100010","Z":"1111000100100100100010001111",
    "0":"0110100111011011101110010110","1":"0100110001000100010001001110",
    "2":"0110100100010010010010001111","3":"1110000100010110000110011110",
    "4":"1001100110011111000100010001","5":"1111100010001110000100011110",
    "6":"0110100010001110100110010110","7":"1111000100010010010001001000",
    "8":"0110100110010110100110010110","9":"0110100110010111000100010110",
    " ":"0000000000000000000000000000",
    ".":"0000000000000000000001000100",
    ",":"0000000000000000001000101000",
    "!":"0100010001000100000000000100",
    "?":"0110100100010010000000000010",
    "-":"0000000000001110000000000000",
    "+":"0000001001001110010000100000",
    ":":"0000010001000000010001000000",
    "/":"0001000100100010010010001000",
    "*":"0000101001001110010010100000",
    "#":"0101111101011111010100000000",
    "(":"0010010010001000010001000010",
    ")":"0100001000010001000100100100",
    "=":"0000000011110000111100000000",
    "'":"0100010010000000000000000000",
    "\"":"1010101000000000000000000000",
    "<":"0010010010001000010000100010",
    ">":"1000010000100001001001001000",
    "_":"0000000000000000000000001111",
  };
  for (const [ch, bits] of Object.entries(fontData)) {
    FONT[ch] = [];
    for (let i = 0; i < bits.length; i++) FONT[ch].push(parseInt(bits[i]));
  }

  const API = {};
  API._init = null;
  API._update = null;
  API._draw = null;
  API.frame = 0;

  API.cls = function(c = 0) { buf32.fill(COLOR_U32[c] || COLOR_U32[0]); };
  API.pix = function(x, y, c) {
    x = Math.floor(x); y = Math.floor(y);
    if (x < 0 || x >= W || y < 0 || y >= H) return;
    buf32[y * W + x] = COLOR_U32[c] || COLOR_U32[0];
  };
  API.line = function(x0, y0, x1, y1, c) {
    x0=Math.floor(x0); y0=Math.floor(y0); x1=Math.floor(x1); y1=Math.floor(y1);
    const dx=Math.abs(x1-x0), dy=Math.abs(y1-y0);
    const sx=x0<x1?1:-1, sy=y0<y1?1:-1;
    let err=dx-dy;
    while(true) {
      API.pix(x0,y0,c);
      if(x0===x1&&y0===y1) break;
      const e2=2*err;
      if(e2>-dy){err-=dy;x0+=sx;}
      if(e2<dx){err+=dx;y0+=sy;}
    }
  };
  API.rect = function(x,y,w,h,c) {
    API.line(x,y,x+w-1,y,c); API.line(x+w-1,y,x+w-1,y+h-1,c);
    API.line(x+w-1,y+h-1,x,y+h-1,c); API.line(x,y+h-1,x,y,c);
  };
  API.rectf = function(x,y,w,h,c) {
    x=Math.floor(x); y=Math.floor(y);
    const col=COLOR_U32[c]||COLOR_U32[0];
    for(let py=Math.max(0,y);py<Math.min(H,y+h);py++)
      for(let px=Math.max(0,x);px<Math.min(W,x+w);px++)
        buf32[py*W+px]=col;
  };
  API.circ = function(cx,cy,r,c) {
    let x=r,y=0,d=1-r; cx=Math.floor(cx); cy=Math.floor(cy);
    while(x>=y){
      API.pix(cx+x,cy+y,c);API.pix(cx-x,cy+y,c);
      API.pix(cx+x,cy-y,c);API.pix(cx-x,cy-y,c);
      API.pix(cx+y,cy+x,c);API.pix(cx-y,cy+x,c);
      API.pix(cx+y,cy-x,c);API.pix(cx-y,cy-x,c);
      y++; if(d<0){d+=2*y+1;}else{x--;d+=2*(y-x)+1;}
    }
  };
  API.circf = function(cx,cy,r,c) {
    cx=Math.floor(cx); cy=Math.floor(cy);
    const col=COLOR_U32[c]||COLOR_U32[0]; const r2=r*r;
    for(let py=-r;py<=r;py++) for(let px=-r;px<=r;px++)
      if(px*px+py*py<=r2){ const sx=cx+px,sy=cy+py;
        if(sx>=0&&sx<W&&sy>=0&&sy<H) buf32[sy*W+sx]=col; }
  };
  API.sprite = function(id, data) {
    const arr = new Uint8Array(64); let i = 0;
    for (const ch of data) { if (ch>='0'&&ch<='3') { arr[i++]=parseInt(ch); if(i>=64) break; } }
    sprites[id] = arr;
  };
  API.spr = function(id, x, y, flipX, flipY) {
    const s=sprites[id]; if(!s) return;
    x=Math.floor(x); y=Math.floor(y);
    for(let py=0;py<8;py++) for(let px=0;px<8;px++){
      const sx=flipX?7-px:px, sy=flipY?7-py:py;
      const c=s[sy*8+sx], dx=x+px, dy=y+py;
      if(dx>=0&&dx<W&&dy>=0&&dy<H) buf32[dy*W+dx]=COLOR_U32[c];
    }
  };
  API.text = function(str, x, y, c) {
    str=String(str).toUpperCase(); let cx=Math.floor(x); const cy=Math.floor(y);
    const col=COLOR_U32[c]||COLOR_U32[3];
    for(const ch of str){
      const glyph=FONT[ch];
      if(glyph) for(let py=0;py<FONT_H;py++) for(let px=0;px<FONT_W;px++)
        if(glyph[py*FONT_W+px]){ const dx=cx+px,dy=cy+py;
          if(dx>=0&&dx<W&&dy>=0&&dy<H) buf32[dy*W+dx]=col; }
      cx+=FONT_W+1;
    }
  };
  API.mget = function(cx,cy) { return tilemap[cx+","+cy]||0; };
  API.mset = function(cx,cy,id) { tilemap[cx+","+cy]=id; };
  API.map = function(mx,my,mw,mh,sx,sy) {
    for(let ty=0;ty<mh;ty++) for(let tx=0;tx<mw;tx++){
      const id=API.mget(mx+tx,my+ty); if(id>0) API.spr(id,sx+tx*8,sy+ty*8); }
  };
  API.btn = function(k) { return !!keys[k]; };
  API.btnp = function(k) { return !!keys[k] && !keysPrev[k]; };
  API.note = function(ch, noteStr, dur) {
    ensureAudio(); if(ch<0||ch>1) return; API.stop(ch);
    const osc=audioCtx.createOscillator(); osc.type="square";
    osc.frequency.value=noteToFreq(noteStr);
    osc.connect(channelGains[ch]); osc.start();
    osc.stop(audioCtx.currentTime+dur); channels[ch]=osc;
  };
  API.stop = function(ch) {
    if(ch===undefined){API.stop(0);API.stop(1);return;}
    if(channels[ch]){try{channels[ch].stop();}catch(e){} channels[ch]=null;}
  };
  API.rnd = function(max) { return Math.random()*max; };
  API.flr = Math.floor;
  API.abs = Math.abs;
  API.min = Math.min;
  API.max = Math.max;
  API.sin = Math.sin;
  API.cos = Math.cos;

  function tick() {
    if (API._update) API._update();
    if (API._draw) API._draw();
    ctx.putImageData(buf, 0, 0);
    for (const k in keys) keysPrev[k] = keys[k];
    API.frame++;
  }

  // ============================================================
  // Tempest Game
  // ============================================================
  const { cls, pix, line, rect, rectf, circ, circf, sprite: defSprite,
          spr, text, btn, btnp, note, stop, rnd, flr, abs: _abs,
          min, max: _max, sin, cos } = API;

  // --- Sprites ---
  // 1: Player claw (top-down, pointing inward)
  defSprite(1,
    "00033000" +
    "00333300" +
    "03322330" +
    "03322330" +
    "00333300" +
    "00033000" +
    "00000000" +
    "00000000"
  );
  // 2: Flipper enemy
  defSprite(2,
    "00000000" +
    "03300330" +
    "33333333" +
    "33222233" +
    "33333333" +
    "03300330" +
    "00000000" +
    "00000000"
  );
  // 3: Tanker enemy
  defSprite(3,
    "00000000" +
    "00333300" +
    "03322330" +
    "33211233" +
    "03322330" +
    "00333300" +
    "00000000" +
    "00000000"
  );
  // 4: Spiker enemy
  defSprite(4,
    "00000000" +
    "00030000" +
    "00333000" +
    "03323300" +
    "00333000" +
    "00030000" +
    "00000000" +
    "00000000"
  );
  // 5: Bullet
  defSprite(5,
    "00000000" +
    "00000000" +
    "00030000" +
    "00333000" +
    "00030000" +
    "00000000" +
    "00000000" +
    "00000000"
  );
  // 6: Explosion frame 1
  defSprite(6,
    "00000000" +
    "00200100" +
    "01002000" +
    "00031000" +
    "00130200" +
    "01000010" +
    "00100000" +
    "00000000"
  );
  // 7: Explosion frame 2
  defSprite(7,
    "20010020" +
    "01000010" +
    "00203200" +
    "03033030" +
    "00232000" +
    "01000300" +
    "20001001" +
    "00200010"
  );
  // 8: Life icon
  defSprite(8,
    "00000000" +
    "00033000" +
    "00333300" +
    "03322330" +
    "00333300" +
    "00033000" +
    "00000000" +
    "00000000"
  );
  // 9: Mini flipper (tanker child)
  defSprite(9,
    "00000000" +
    "00000000" +
    "00300300" +
    "03333330" +
    "03222230" +
    "03333330" +
    "00300300" +
    "00000000"
  );

  // --- Playfield geometry ---
  const CX = 240;  // center x
  const CY = 170;  // center y
  const OUTER_R = 130; // outer rim radius
  const INNER_R = 30;  // inner vanishing point radius
  const NUM_LANES = 16; // number of segments
  const LANE_DEPTH = 10; // depth steps per lane for enemy movement

  // Precompute lane geometry
  // Each lane has two edges. Lane i goes from vertex i to vertex i+1 on the polygon.
  // Vertices are evenly spaced around the polygon.
  let laneAngles = []; // angle for each vertex
  let outerPts = [];   // outer rim points
  let innerPts = [];   // inner points

  function buildPlayfield(numLanes) {
    laneAngles = [];
    outerPts = [];
    innerPts = [];
    for (let i = 0; i < numLanes; i++) {
      const a = (Math.PI * 2 * i / numLanes) - Math.PI / 2;
      laneAngles.push(a);
      outerPts.push({ x: CX + cos(a) * OUTER_R, y: CY + sin(a) * OUTER_R });
      innerPts.push({ x: CX + cos(a) * INNER_R, y: CY + sin(a) * INNER_R });
    }
  }

  // Get position along a lane at depth t (0=inner/center, 1=outer/rim)
  function lanePos(lane, t) {
    const i = lane % NUM_LANES;
    const j = (lane + 1) % NUM_LANES;
    // Midpoint of the lane edge at depth t
    const ox = (outerPts[i].x + outerPts[j].x) / 2;
    const oy = (outerPts[i].y + outerPts[j].y) / 2;
    const ix = (innerPts[i].x + innerPts[j].x) / 2;
    const iy = (innerPts[i].y + innerPts[j].y) / 2;
    return {
      x: ix + (ox - ix) * t,
      y: iy + (oy - iy) * t
    };
  }

  // Get left/right edge points of a lane at depth t
  function laneEdge(lane, t, side) {
    const idx = side === 0 ? (lane % NUM_LANES) : ((lane + 1) % NUM_LANES);
    const ox = outerPts[idx].x;
    const oy = outerPts[idx].y;
    const ix = innerPts[idx].x;
    const iy = innerPts[idx].y;
    return {
      x: ix + (ox - ix) * t,
      y: iy + (oy - iy) * t
    };
  }

  buildPlayfield(NUM_LANES);

  // --- Game state ---
  let state = "title";
  let playerLane, score, lives, level, superzapper;
  let enemies, bullets, explosions, particles, spikes;
  let moveCooldown, shootCooldown, spawnTimer;
  let levelClear, levelClearTimer;
  let zapFlash;

  function resetGame() {
    playerLane = 0;
    score = 0;
    lives = 3;
    level = 1;
    superzapper = 1;
    enemies = [];
    bullets = [];
    explosions = [];
    particles = [];
    spikes = [];
    moveCooldown = 0;
    shootCooldown = 0;
    spawnTimer = 0;
    levelClear = false;
    levelClearTimer = 0;
    zapFlash = 0;
    spawnWave();
  }

  // Enemy types: "flipper", "tanker", "spiker"
  let enemiesToSpawn = [];
  let totalEnemies = 0;

  function spawnWave() {
    enemiesToSpawn = [];
    levelClear = false;
    levelClearTimer = 0;
    spikes = [];

    const numFlippers = 4 + level * 2;
    const numTankers = flr(level / 2);
    const numSpikers = level >= 3 ? flr(level / 2) : 0;

    for (let i = 0; i < numFlippers; i++) enemiesToSpawn.push("flipper");
    for (let i = 0; i < numTankers; i++) enemiesToSpawn.push("tanker");
    for (let i = 0; i < numSpikers; i++) enemiesToSpawn.push("spiker");

    // Shuffle
    for (let i = enemiesToSpawn.length - 1; i > 0; i--) {
      const j = flr(rnd(i + 1));
      [enemiesToSpawn[i], enemiesToSpawn[j]] = [enemiesToSpawn[j], enemiesToSpawn[i]];
    }

    totalEnemies = enemiesToSpawn.length;
    spawnTimer = 20;
  }

  function spawnEnemy(type) {
    const lane = flr(rnd(NUM_LANES));
    const e = {
      type: type,
      lane: lane,
      depth: 0.0,  // 0 = center, 1 = rim
      speed: 0.005 + level * 0.001,
      alive: true,
      flipTimer: 0,
      hp: type === "tanker" ? 2 : 1,
      spikeTrail: type === "spiker",
    };
    if (type === "flipper") {
      e.speed = 0.006 + level * 0.0015;
      e.flipTimer = 30 + flr(rnd(60));
    }
    if (type === "tanker") {
      e.speed = 0.004 + level * 0.001;
    }
    if (type === "spiker") {
      e.speed = 0.005 + level * 0.001;
    }
    enemies.push(e);
  }

  function addExplosion(x, y) {
    explosions.push({ x: x - 4, y: y - 4, timer: 12 });
    for (let i = 0; i < 6; i++) {
      particles.push({
        x: x, y: y,
        vx: rnd(4) - 2, vy: rnd(4) - 2,
        life: 6 + flr(rnd(8)),
        color: flr(rnd(3)) + 1
      });
    }
  }

  function shootSound() { note(0, "E6", 0.03); }
  function hitSound() { note(1, "C3", 0.06); setTimeout(() => note(1, "E3", 0.04), 30); }
  function deathSound() {
    note(0, "C3", 0.12); note(1, "G2", 0.12);
    setTimeout(() => { note(0, "A2", 0.18); note(1, "E2", 0.18); }, 100);
  }
  function zapSound() {
    note(0, "G5", 0.08); note(1, "B5", 0.08);
    setTimeout(() => { note(0, "E6", 0.1); note(1, "G6", 0.1); }, 60);
    setTimeout(() => { note(0, "C7", 0.15); }, 120);
  }
  function clearSound() {
    note(0, "C5", 0.08);
    setTimeout(() => note(0, "E5", 0.08), 80);
    setTimeout(() => note(0, "G5", 0.08), 160);
    setTimeout(() => note(0, "C6", 0.12), 240);
  }

  resetGame();

  // ============================================================
  // Update
  // ============================================================
  API._update = function() {
    if (state === "title") {
      if (btnp("a") || btnp("start")) {
        state = "play";
        resetGame();
        note(0, "C5", 0.08);
        setTimeout(() => note(0, "G5", 0.1), 80);
      }
      return;
    }

    if (state === "gameover") {
      // Update particles
      for (let i = particles.length - 1; i >= 0; i--) {
        const p = particles[i]; p.x += p.vx; p.y += p.vy; p.vy += 0.08; p.life--;
        if (p.life <= 0) particles.splice(i, 1);
      }
      if (btnp("a") || btnp("start")) state = "title";
      return;
    }

    // --- Play state ---

    // Level clear check
    if (levelClear) {
      levelClearTimer++;
      if (levelClearTimer > 90) {
        level++;
        superzapper = 1;
        spawnWave();
      }
      return;
    }

    // Player movement
    if (moveCooldown > 0) moveCooldown--;
    if (btn("left") && moveCooldown <= 0) {
      playerLane = (playerLane - 1 + NUM_LANES) % NUM_LANES;
      moveCooldown = 4;
    }
    if (btn("right") && moveCooldown <= 0) {
      playerLane = (playerLane + 1) % NUM_LANES;
      moveCooldown = 4;
    }

    // Player shoot
    if (shootCooldown > 0) shootCooldown--;
    if (btnp("a") && shootCooldown <= 0) {
      bullets.push({ lane: playerLane, depth: 1.0, speed: 0.04 });
      shootCooldown = 6;
      shootSound();
    }

    // Superzapper
    if (btnp("b") && superzapper > 0) {
      superzapper--;
      zapFlash = 10;
      zapSound();
      // Kill all enemies on screen
      for (const e of enemies) {
        if (e.alive) {
          const pos = lanePos(e.lane, e.depth);
          addExplosion(pos.x, pos.y);
          score += e.type === "tanker" ? 20 : (e.type === "spiker" ? 15 : 10);
        }
        e.alive = false;
      }
      enemies = enemies.filter(e => e.alive);
    }

    // Update bullets
    for (let i = bullets.length - 1; i >= 0; i--) {
      bullets[i].depth -= bullets[i].speed;
      if (bullets[i].depth <= 0) {
        bullets.splice(i, 1);
      }
    }

    // Spawn enemies from queue
    spawnTimer--;
    if (spawnTimer <= 0 && enemiesToSpawn.length > 0) {
      spawnEnemy(enemiesToSpawn.shift());
      spawnTimer = _max(15, 40 - level * 3);
    }

    // Update enemies
    for (let i = enemies.length - 1; i >= 0; i--) {
      const e = enemies[i];
      if (!e.alive) { enemies.splice(i, 1); continue; }

      // Move toward rim
      e.depth += e.speed;

      // Flipper: randomly change lanes
      if (e.type === "flipper") {
        e.flipTimer--;
        if (e.flipTimer <= 0 && e.depth < 0.85) {
          e.lane = (e.lane + (rnd(1) < 0.5 ? 1 : -1) + NUM_LANES) % NUM_LANES;
          e.flipTimer = 20 + flr(rnd(40));
        }
      }

      // Spiker: leave spikes
      if (e.type === "spiker" && e.depth > 0.2 && flr(API.frame) % 8 === 0) {
        // Check if spike already exists at this lane+depth
        const sd = flr(e.depth * LANE_DEPTH) / LANE_DEPTH;
        const exists = spikes.some(s => s.lane === e.lane && _abs(s.depth - sd) < 0.05);
        if (!exists) {
          spikes.push({ lane: e.lane, depth: sd });
        }
      }

      // Enemy reached the rim
      if (e.depth >= 1.0) {
        e.alive = false;
        enemies.splice(i, 1);
        // Check if player is in this lane
        if (e.lane === playerLane) {
          lives--;
          deathSound();
          addExplosion(lanePos(playerLane, 1.0).x, lanePos(playerLane, 1.0).y);
          if (lives <= 0) {
            state = "gameover";
          }
        }
        continue;
      }

      // Bullet-enemy collision
      for (let j = bullets.length - 1; j >= 0; j--) {
        const b = bullets[j];
        if (b.lane === e.lane && _abs(b.depth - e.depth) < 0.06) {
          bullets.splice(j, 1);
          e.hp--;
          if (e.hp <= 0) {
            const pos = lanePos(e.lane, e.depth);
            addExplosion(pos.x, pos.y);

            if (e.type === "tanker") {
              // Split into two mini flippers
              score += 20;
              const l1 = (e.lane - 1 + NUM_LANES) % NUM_LANES;
              const l2 = (e.lane + 1) % NUM_LANES;
              enemies.push({
                type: "miniflip", lane: l1, depth: e.depth,
                speed: 0.008 + level * 0.002, alive: true, flipTimer: 15 + flr(rnd(20)),
                hp: 1, spikeTrail: false
              });
              enemies.push({
                type: "miniflip", lane: l2, depth: e.depth,
                speed: 0.008 + level * 0.002, alive: true, flipTimer: 15 + flr(rnd(20)),
                hp: 1, spikeTrail: false
              });
            } else if (e.type === "flipper") {
              score += 10;
            } else if (e.type === "spiker") {
              score += 15;
            } else {
              score += 10; // miniflip
            }

            hitSound();
            e.alive = false;
            enemies.splice(i, 1);
          }
          break;
        }
      }
    }

    // Miniflip behavior (same as flipper)
    for (const e of enemies) {
      if (e.type === "miniflip") {
        e.flipTimer--;
        if (e.flipTimer <= 0 && e.depth < 0.85) {
          e.lane = (e.lane + (rnd(1) < 0.5 ? 1 : -1) + NUM_LANES) % NUM_LANES;
          e.flipTimer = 10 + flr(rnd(20));
        }
      }
    }

    // Bullet-spike collision
    for (let i = bullets.length - 1; i >= 0; i--) {
      const b = bullets[i];
      for (let j = spikes.length - 1; j >= 0; j--) {
        const s = spikes[j];
        if (b.lane === s.lane && _abs(b.depth - s.depth) < 0.06) {
          bullets.splice(i, 1);
          spikes.splice(j, 1);
          break;
        }
      }
    }

    // Explosions
    for (let i = explosions.length - 1; i >= 0; i--) {
      explosions[i].timer--;
      if (explosions[i].timer <= 0) explosions.splice(i, 1);
    }

    // Particles
    for (let i = particles.length - 1; i >= 0; i--) {
      const p = particles[i];
      p.x += p.vx; p.y += p.vy; p.vy += 0.05; p.life--;
      if (p.life <= 0) particles.splice(i, 1);
    }

    // Zap flash
    if (zapFlash > 0) zapFlash--;

    // Check level clear
    if (enemies.length === 0 && enemiesToSpawn.length === 0 && !levelClear) {
      levelClear = true;
      levelClearTimer = 0;
      clearSound();
    }
  };

  // ============================================================
  // Draw
  // ============================================================
  API._draw = function() {
    cls(0);

    if (state === "title") {
      // Draw rotating playfield in background
      const titleAngle = API.frame * 0.01;
      for (let i = 0; i < NUM_LANES; i++) {
        const a1 = (Math.PI * 2 * i / NUM_LANES) - Math.PI / 2 + titleAngle;
        const a2 = (Math.PI * 2 * ((i + 1) % NUM_LANES) / NUM_LANES) - Math.PI / 2 + titleAngle;
        const ox1 = CX + cos(a1) * OUTER_R;
        const oy1 = CY + sin(a1) * OUTER_R;
        const ox2 = CX + cos(a2) * OUTER_R;
        const oy2 = CY + sin(a2) * OUTER_R;
        const ix1 = CX + cos(a1) * INNER_R;
        const iy1 = CY + sin(a1) * INNER_R;
        // Rim edge
        line(ox1, oy1, ox2, oy2, 1);
        // Lane divider
        line(ox1, oy1, ix1, iy1, 1);
      }

      const ty = 40 + sin(API.frame * 0.05) * 4;
      text("TEMPEST", W / 2 - 18, flr(ty), 3);
      text("TEMPEST", W / 2 - 17, flr(ty) + 1, 1);
      rectf(W / 2 - 40, flr(ty) + 12, 80, 1, 2);

      if (flr(API.frame / 20) % 2 === 0)
        text("PRESS A TO START", W / 2 - 42, 240, 3);

      // Score table
      text("-ENEMIES-", W / 2 - 24, 260, 2);
      text("FLIPPER  10 PTS", W / 2 - 38, 272, 2);
      text("TANKER   20 PTS", W / 2 - 38, 282, 2);
      text("SPIKER   15 PTS", W / 2 - 38, 292, 2);

      text("GRAYBOX DEMO V0.1", W / 2 - 43, 308, 1);
      return;
    }

    if (state === "gameover") {
      // Draw faded playfield
      drawPlayfield(1);
      for (const p of particles) pix(flr(p.x), flr(p.y), p.color);

      text("GAME OVER", W / 2 - 24, 120, 3);
      text("SCORE: " + score, W / 2 - 24, 145, 2);
      text("LEVEL: " + level, W / 2 - 18, 160, 2);
      if (flr(API.frame / 20) % 2 === 0)
        text("PRESS A TO CONTINUE", W / 2 - 50, 210, 3);
      return;
    }

    // --- Play state ---

    // Zap flash background
    if (zapFlash > 0 && zapFlash % 2 === 0) {
      cls(1);
    }

    // Draw playfield
    drawPlayfield(2);

    // Draw spikes
    for (const s of spikes) {
      const p = lanePos(s.lane, s.depth);
      // Small cross for spike
      line(flr(p.x) - 2, flr(p.y), flr(p.x) + 2, flr(p.y), 2);
      line(flr(p.x), flr(p.y) - 2, flr(p.x), flr(p.y) + 2, 2);
    }

    // Draw enemies
    for (const e of enemies) {
      if (!e.alive) continue;
      const pos = lanePos(e.lane, e.depth);
      const px = flr(pos.x) - 4;
      const py = flr(pos.y) - 4;
      // Scale size based on depth for perspective
      if (e.type === "flipper") {
        spr(2, px, py);
      } else if (e.type === "tanker") {
        spr(3, px, py);
      } else if (e.type === "spiker") {
        spr(4, px, py);
      } else if (e.type === "miniflip") {
        spr(9, px, py);
      }
    }

    // Draw bullets
    for (const b of bullets) {
      const pos = lanePos(b.lane, b.depth);
      // Draw as bright dot moving inward
      const px = flr(pos.x);
      const py = flr(pos.y);
      pix(px, py, 3);
      pix(px - 1, py, 3);
      pix(px + 1, py, 3);
      pix(px, py - 1, 3);
      pix(px, py + 1, 3);
    }

    // Draw player on rim
    drawPlayer();

    // Explosions
    for (const e of explosions) {
      const sprId = e.timer > 6 ? 6 : 7;
      spr(sprId, flr(e.x), flr(e.y));
    }

    // Particles
    for (const p of particles) pix(flr(p.x), flr(p.y), p.color);

    // HUD
    rectf(0, 0, W, 12, 0);
    text("SCORE:" + score, 4, 3, 3);
    text("LVL:" + level, W / 2 - 14, 3, 2);
    // Lives
    for (let i = 0; i < lives; i++) spr(8, W - 40 + i * 10, 2);
    // Superzapper indicator
    if (superzapper > 0) {
      text("ZAP", W - 80, 3, 3);
    }

    // Level clear message
    if (levelClear) {
      const msgY = 150 + sin(levelClearTimer * 0.08) * 3;
      text("LEVEL CLEAR!", W / 2 - 30, flr(msgY), 3);
    }
  };

  function drawPlayfield(color) {
    for (let i = 0; i < NUM_LANES; i++) {
      const j = (i + 1) % NUM_LANES;
      // Outer rim
      line(outerPts[i].x, outerPts[i].y, outerPts[j].x, outerPts[j].y, color);
      // Inner rim
      line(innerPts[i].x, innerPts[i].y, innerPts[j].x, innerPts[j].y, 1);
      // Lane dividers (spokes)
      line(outerPts[i].x, outerPts[i].y, innerPts[i].x, innerPts[i].y, 1);
    }
    // Highlight player's lane
    const pi = playerLane % NUM_LANES;
    const pj = (playerLane + 1) % NUM_LANES;
    line(outerPts[pi].x, outerPts[pi].y, outerPts[pj].x, outerPts[pj].y, 3);
    line(outerPts[pi].x, outerPts[pi].y, innerPts[pi].x, innerPts[pi].y, 2);
    line(outerPts[pj].x, outerPts[pj].y, innerPts[pj].x, innerPts[pj].y, 2);
  }

  function drawPlayer() {
    // Draw player claw at the midpoint of the outer edge of their lane
    const pos = lanePos(playerLane, 1.0);
    const px = flr(pos.x) - 4;
    const py = flr(pos.y) - 4;
    spr(1, px, py);

    // Also draw a bright marker at player position
    const i = playerLane % NUM_LANES;
    const j = (playerLane + 1) % NUM_LANES;
    const mx = (outerPts[i].x + outerPts[j].x) / 2;
    const my = (outerPts[i].y + outerPts[j].y) / 2;
    // Small crosshair
    pix(flr(mx), flr(my) - 5, 3);
    pix(flr(mx), flr(my) + 5, 3);
    pix(flr(mx) - 5, flr(my), 3);
    pix(flr(mx) + 5, flr(my), 3);
  }

  // ============================================================
  // Boot
  // ============================================================
  if (API._init) API._init();
  setInterval(tick, 1000 / FPS);
  document.addEventListener("keydown", ensureAudio, { once: true });
  document.addEventListener("click", ensureAudio, { once: true });
})();
</script>
</body>
