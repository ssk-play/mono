<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GrayBox — Demo: Snake</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #0a0a0a;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100vh;
    font-family: monospace;
    overflow: hidden;
  }
  #frame {
    background: #111;
    border: 3px solid #333;
    border-radius: 8px;
    padding: 12px;
    box-shadow: 0 0 40px rgba(0,0,0,0.8), inset 0 0 20px rgba(0,0,0,0.5);
  }
  canvas {
    display: block;
    image-rendering: pixelated;
    image-rendering: crisp-edges;
  }
  #controls {
    margin-top: 12px;
    color: #6b6b6b;
    font-size: 11px;
    text-align: center;
    letter-spacing: 1px;
  }
  #controls span { color: #b0b0b0; }
</style>
</head>
<body>
<div id="frame">
  <canvas id="screen"></canvas>
</div>
<div id="controls">
  <span>ARROWS</span> MOVE &nbsp;&nbsp; <span>ENTER</span> START
</div>
<script src="../../runtime/engine.js"></script>
<script>
(() => {
  "use strict";
  const W = GrayBox.WIDTH, H = GrayBox.HEIGHT;
  const { cls, pix, line, rect, rectf, circ, circf, sprite: defSprite,
          spr, text, btn, btnp, note, stop, rnd, flr, abs: _abs,
          min, max: _max, sin, cos } = GrayBox;

  // --- Grid config ---
  const CELL = 8;             // 8x8 pixel cells
  const BORDER_X = 4;         // border offset in pixels
  const BORDER_Y = 12;        // top border offset (room for HUD)
  const GRID_W = 37;          // (320 - 8) / 8 = 39, use 37 for border
  const GRID_H = 26;          // (240 - 12 - 8) / 8 = 27, use 26 for border
  const FIELD_PX_W = GRID_W * CELL;
  const FIELD_PX_H = GRID_H * CELL;
  const FIELD_X = BORDER_X + 4;
  const FIELD_Y = BORDER_Y + 4;

  // --- Game state ---
  const { TITLE, PLAY, GAMEOVER } = GrayBox.SCENE;
  let snake, dir, nextDir, food, score, highScore, moveTimer, moveInterval;
  let growCount, gameOverTimer, titleAnim;

  highScore = 0;
  titleAnim = 0;

  function resetGame() {
    const startX = flr(GRID_W / 2);
    const startY = flr(GRID_H / 2);
    snake = [
      { x: startX, y: startY },
      { x: startX - 1, y: startY },
      { x: startX - 2, y: startY },
    ];
    dir = { x: 1, y: 0 };
    nextDir = { x: 1, y: 0 };
    score = 0;
    moveTimer = 0;
    moveInterval = 8; // frames between moves (lower = faster)
    growCount = 0;
    gameOverTimer = 0;
    spawnFood();
  }

  function spawnFood() {
    let attempts = 0;
    while (attempts < 1000) {
      const fx = flr(rnd(GRID_W));
      const fy = flr(rnd(GRID_H));
      let onSnake = false;
      for (const seg of snake) {
        if (seg.x === fx && seg.y === fy) { onSnake = true; break; }
      }
      if (!onSnake) {
        food = { x: fx, y: fy };
        return;
      }
      attempts++;
    }
    // Fallback: place at first open cell
    for (let y = 0; y < GRID_H; y++) {
      for (let x = 0; x < GRID_W; x++) {
        let onSnake = false;
        for (const seg of snake) {
          if (seg.x === x && seg.y === y) { onSnake = true; break; }
        }
        if (!onSnake) { food = { x, y }; return; }
      }
    }
  }

  function eatSound() {
    note(0, "E5", 0.05);
    setTimeout(() => note(0, "G5", 0.06), 50);
  }
  function deathSound() {
    note(0, "C3", 0.12);
    note(1, "G2", 0.12);
    setTimeout(() => { note(0, "A2", 0.2); note(1, "E2", 0.2); }, 120);
  }
  function startSound() {
    note(0, "C5", 0.08);
    setTimeout(() => note(0, "E5", 0.08), 80);
    setTimeout(() => note(0, "G5", 0.1), 160);
  }

  // Centered text helper
  function textLen(str) { return str.length * (FONT_W + 1) - 1; }
  function textCenter(str, y, c) {
    text(str, flr((W - textLen(str)) / 2), y, c);
  }

  // --- Title Scene ---
  GrayBox.scene(TITLE, {
    init() { titleAnim = 0; },
    update() {
      titleAnim++;
      if (btnp("a") || btnp("a")) {
        resetGame();
        startSound();
        GrayBox.go(PLAY); return;
      }
    },
    draw() {
      cls(0);
      rect(13, 15, W - 26, H - 30, 1);
      rect(15, 17, W - 30, H - 34, 1);
      textCenter("SNAKE", 45, 3);
      const titleStr = "SNAKE";
      const bigW = 14, bigH = 18, bigGap = 4;
      const totalW = titleStr.length * (bigW + bigGap) - bigGap;
      const startX = flr((W - totalW) / 2);
      for (let i = 0; i < titleStr.length; i++) {
        const bx = startX + i * (bigW + bigGap);
        const by = 53;
        const c = (i + flr(titleAnim / 15)) % 2 === 0 ? 3 : 2;
        rectf(bx, by, bigW, bigH, c);
        text(titleStr[i], bx + flr((bigW - FONT_W) / 2), by + flr((bigH - FONT_H) / 2), 0);
      }
      const snakeY = 90;
      const snakeLen = 10;
      for (let i = 0; i < snakeLen; i++) {
        const sx = 93 + i * 8 + sin(titleAnim * 0.06 + i * 0.5) * 6;
        const sy = snakeY + cos(titleAnim * 0.08 + i * 0.4) * 5;
        const c = i === 0 ? 3 : 2;
        rectf(flr(sx), flr(sy), CELL, CELL, c);
      }
      if (flr(titleAnim / 20) % 2 === 0) {
        textCenter("PRESS A TO START", 135, 3);
      }
      textCenter("ARROWS TO MOVE", 158, 2);
      textCenter("EAT FOOD TO GROW", 167, 2);
      textCenter("DON'T HIT WALLS OR YOURSELF", 176, 2);
      if (highScore > 0) {
        textCenter("HIGH SCORE: " + highScore, 195, 2);
      }
      textCenter("GRAYBOX DEMO", 218, 1);
    }
  });

  // --- Play Scene ---
  GrayBox.scene(PLAY, {
    init() { resetGame(); },
    update() {
      titleAnim++;
      if (btnp("up") && dir.y === 0) { nextDir = { x: 0, y: -1 }; }
      else if (btnp("down") && dir.y === 0) { nextDir = { x: 0, y: 1 }; }
      else if (btnp("left") && dir.x === 0) { nextDir = { x: -1, y: 0 }; }
      else if (btnp("right") && dir.x === 0) { nextDir = { x: 1, y: 0 }; }

      moveTimer++;
      if (moveTimer < moveInterval) return;
      moveTimer = 0;

      dir = nextDir;
      const head = snake[0];
      const nx = head.x + dir.x;
      const ny = head.y + dir.y;

      if (nx < 0 || nx >= GRID_W || ny < 0 || ny >= GRID_H) {
        gameOverTimer = 0;
        if (score > highScore) highScore = score;
        deathSound();
        GrayBox.go(GAMEOVER); return;
      }

      const checkLen = growCount > 0 ? snake.length : snake.length - 1;
      for (let i = 0; i < checkLen; i++) {
        if (snake[i].x === nx && snake[i].y === ny) {
          gameOverTimer = 0;
          if (score > highScore) highScore = score;
          deathSound();
          GrayBox.go(GAMEOVER); return;
        }
      }

      snake.unshift({ x: nx, y: ny });
      if (growCount > 0) { growCount--; } else { snake.pop(); }

      if (nx === food.x && ny === food.y) {
        score += 10;
        growCount += 3;
        eatSound();
        spawnFood();
        moveInterval = _max(2, 8 - flr(snake.length / 8));
      }
    },
    draw() {
      cls(0);
      rectf(0, 0, W, BORDER_Y - 2, 0);
      text("SCORE:" + score, 5, 3, 3);
      text("LEN:" + snake.length, 107, 3, 2);
      text("HI:" + highScore, W - 60, 3, 2);
      const speed = 9 - moveInterval;
      text("SPD:" + speed, 187, 3, 1);
      rect(FIELD_X - 1, FIELD_Y - 1, FIELD_PX_W + 2, FIELD_PX_H + 2, 1);
      for (let gy = 0; gy < GRID_H; gy += 4) {
        for (let gx = 0; gx < GRID_W; gx += 4) {
          pix(FIELD_X + gx * CELL + 3, FIELD_Y + gy * CELL + 3, 0);
        }
      }
      if (food) {
        const blink = flr(GrayBox.frame / 4) % 3;
        const fc = blink === 0 ? 3 : 2;
        const fx = FIELD_X + food.x * CELL;
        const fy = FIELD_Y + food.y * CELL;
        rectf(fx + 1, fy + 1, CELL - 2, CELL - 2, fc);
        pix(fx + 3, fy + 2, 0); pix(fx + 4, fy + 2, 0);
        pix(fx + 3, fy + 5, 0); pix(fx + 4, fy + 5, 0);
        pix(fx + 2, fy + 3, 0); pix(fx + 2, fy + 4, 0);
        pix(fx + 5, fy + 3, 0); pix(fx + 5, fy + 4, 0);
      }
      for (let i = snake.length - 1; i >= 0; i--) {
        const seg = snake[i];
        const sx = FIELD_X + seg.x * CELL;
        const sy = FIELD_Y + seg.y * CELL;
        if (i === 0) {
          rectf(sx, sy, CELL, CELL, 3);
          if (dir.x === 1) { pix(sx + 6, sy + 2, 0); pix(sx + 6, sy + 5, 0); }
          else if (dir.x === -1) { pix(sx + 1, sy + 2, 0); pix(sx + 1, sy + 5, 0); }
          else if (dir.y === -1) { pix(sx + 2, sy + 1, 0); pix(sx + 5, sy + 1, 0); }
          else { pix(sx + 2, sy + 6, 0); pix(sx + 5, sy + 6, 0); }
        } else {
          const c = (i % 2 === 0) ? 2 : 3;
          rectf(sx + 1, sy + 1, CELL - 2, CELL - 2, c);
        }
      }
    }
  });

  // --- Game Over Scene ---
  GrayBox.scene(GAMEOVER, {
    init() {},
    update() {
      titleAnim++;
      gameOverTimer++;
      if (gameOverTimer > 30 && (btnp("a") || btnp("a"))) {
        GrayBox.go(TITLE); return;
      }
    },
    draw() {
      cls(0);
      rectf(0, 0, W, BORDER_Y - 2, 0);
      text("SCORE:" + score, 5, 3, 3);
      text("LEN:" + snake.length, 107, 3, 2);
      text("HI:" + highScore, W - 60, 3, 2);
      const speed = 9 - moveInterval;
      text("SPD:" + speed, 187, 3, 1);
      rect(FIELD_X - 1, FIELD_Y - 1, FIELD_PX_W + 2, FIELD_PX_H + 2, 1);
      for (let gy = 0; gy < GRID_H; gy += 4) {
        for (let gx = 0; gx < GRID_W; gx += 4) {
          pix(FIELD_X + gx * CELL + 3, FIELD_Y + gy * CELL + 3, 0);
        }
      }
      if (food) {
        const blink = flr(GrayBox.frame / 4) % 3;
        const fc = blink === 0 ? 3 : 2;
        const fx = FIELD_X + food.x * CELL;
        const fy = FIELD_Y + food.y * CELL;
        rectf(fx + 1, fy + 1, CELL - 2, CELL - 2, fc);
        pix(fx + 3, fy + 2, 0); pix(fx + 4, fy + 2, 0);
        pix(fx + 3, fy + 5, 0); pix(fx + 4, fy + 5, 0);
        pix(fx + 2, fy + 3, 0); pix(fx + 2, fy + 4, 0);
        pix(fx + 5, fy + 3, 0); pix(fx + 5, fy + 4, 0);
      }
      for (let i = snake.length - 1; i >= 0; i--) {
        const seg = snake[i];
        const sx = FIELD_X + seg.x * CELL;
        const sy = FIELD_Y + seg.y * CELL;
        const flash = flr(gameOverTimer / 4) % 2;
        if (i === 0) {
          rectf(sx, sy, CELL, CELL, flash === 0 ? 3 : 1);
        } else {
          rectf(sx, sy, CELL, CELL, flash === 0 ? 2 : 1);
        }
      }
      for (let py = 60; py < 150; py += 2) {
        for (let px = 67; px < 253; px += 2) {
          pix(px, py, 0);
        }
      }
      rectf(80, 75, 160, 60, 0);
      rect(80, 75, 160, 60, 1);
      rect(82, 77, 156, 56, 2);
      textCenter("GAME OVER", 86, 3);
      textCenter("SCORE: " + score, 99, 2);
      textCenter("LENGTH: " + snake.length, 108, 2);
      if (score >= highScore && score > 0) {
        textCenter("NEW HIGH SCORE!", 119, 3);
      }
      if (gameOverTimer > 30) {
        if (flr(gameOverTimer / 15) % 2 === 0) {
          textCenter("PRESS A", 128, 2);
        }
      }
    }
  });

  GrayBox.go(TITLE);
  GrayBox.boot("screen");
})();
</script>
</body>
</html>
