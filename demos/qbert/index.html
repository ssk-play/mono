<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GrayBox — Demo: Q*bert</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #0a0a0a;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100vh;
    font-family: monospace;
    overflow: hidden;
  }
  #frame {
    background: #111;
    border: 3px solid #333;
    border-radius: 8px;
    padding: 12px;
    box-shadow: 0 0 40px rgba(0,0,0,0.8), inset 0 0 20px rgba(0,0,0,0.5);
  }
  canvas {
    display: block;
    image-rendering: pixelated;
    image-rendering: crisp-edges;
  }
  #controls {
    margin-top: 12px;
    color: #6b6b6b;
    font-size: 11px;
    text-align: center;
    letter-spacing: 1px;
  }
  #controls span { color: #b0b0b0; }
</style>
</head>
<body>
<div id="frame">
  <canvas id="screen"></canvas>
</div>
<div id="controls">
  <span>ARROWS</span> HOP &nbsp;&nbsp; <span>ENTER</span> START
</div>
<script src="../../runtime/engine.js"></script>
<script>
(() => {
  "use strict";
  const W = GrayBox.WIDTH, H = GrayBox.HEIGHT;
  const { cls, pix, line, rect, rectf, circ, circf, sprite: defSprite,
          spr, text, btn, btnp, note, stop, rnd, flr, abs: _abs,
          min, max: _max, sin, cos } = GrayBox;

  // --- Sprites ---
  // 1: Q*bert facing down-right
  defSprite(1,
    "00333000" +
    "03223300" +
    "03233300" +
    "00333000" +
    "02332200" +
    "02222200" +
    "02200220" +
    "02200220"
  );
  // 2: Q*bert facing down-left
  defSprite(2,
    "00333000" +
    "00322300" +
    "00332300" +
    "00333000" +
    "00233200" +
    "00222200" +
    "02200220" +
    "02200220"
  );
  // 3: Q*bert facing up-right
  defSprite(3,
    "02200220" +
    "02200220" +
    "02222200" +
    "02332200" +
    "00333000" +
    "03233300" +
    "03223300" +
    "00333000"
  );
  // 4: Q*bert facing up-left
  defSprite(4,
    "02200220" +
    "02200220" +
    "00222200" +
    "00233200" +
    "00333000" +
    "00332300" +
    "00322300" +
    "00333000"
  );
  // 5: Coily (snake) egg
  defSprite(5,
    "00000000" +
    "00111000" +
    "01221100" +
    "01222100" +
    "01222100" +
    "01221100" +
    "00111000" +
    "00000000"
  );
  // 6: Coily (snake) chasing
  defSprite(6,
    "02200220" +
    "03300330" +
    "01311310" +
    "01111110" +
    "00111100" +
    "00111100" +
    "00100100" +
    "00100100"
  );
  // 7: Red ball
  defSprite(7,
    "00000000" +
    "00220000" +
    "02332000" +
    "02222000" +
    "02222000" +
    "00220000" +
    "00000000" +
    "00000000"
  );
  // 8: Spinning disc
  defSprite(8,
    "00000000" +
    "00333000" +
    "03222300" +
    "03212300" +
    "03222300" +
    "00333000" +
    "00000000" +
    "00000000"
  );
  // 9: Speech bubble (!@#)
  defSprite(9,
    "33333330" +
    "32121230" +
    "31212130" +
    "32121230" +
    "33333330" +
    "00330000" +
    "00300000" +
    "00000000"
  );

  // --- Isometric Cube Geometry ---
  // Each cube is drawn as 3 faces: top, left, right
  const CUBE_W = 21;  // total width of isometric cube
  const CUBE_H = 18;  // top diamond height
  const CUBE_DEPTH = 12; // side face depth
  const PYR_TOP_X = W / 2; // top center of pyramid
  const PYR_TOP_Y = 39;    // top of pyramid y
  const ROWS = 7;

  // Get pixel position for grid position (row, col)
  // Row 0 = top (1 cube), row 6 = bottom (7 cubes)
  function cubePos(row, col) {
    const x = PYR_TOP_X + (col - row / 2) * CUBE_W;
    const y = PYR_TOP_Y + row * (CUBE_H / 2 + CUBE_DEPTH);
    return { x: x, y: y };
  }

  // Draw an isometric cube at pixel position (cx, cy) with given colors
  // cx,cy = center-top of the diamond top face
  function drawCube(cx, cy, topC, leftC, rightC) {
    const hw = CUBE_W / 2; // half width
    const hh = CUBE_H / 2; // half height of top diamond
    const sd = CUBE_DEPTH;  // side depth

    // Top face (diamond) - draw as filled rect approximation
    // We'll draw scanlines for the diamond shape
    for (let dy = -hh; dy <= hh; dy++) {
      const w = hw * (1 - _abs(dy) / hh);
      const y = cy + dy;
      if (y >= 0 && y < H) {
        const col = COLOR_U32[topC] || COLOR_U32[0];
        const x0 = _max(0, Math.floor(cx - w));
        const x1 = min(W - 1, Math.floor(cx + w));
        for (let x = x0; x <= x1; x++) buf32[Math.floor(y) * W + x] = col;
      }
    }

    // Left face (parallelogram)
    for (let dy = 0; dy < sd; dy++) {
      const topY = cy + hh + dy;
      if (topY < 0 || topY >= H) continue;
      const leftEdge = cx - hw + (dy * hw / sd);
      const rightEdge = cx;
      const col = COLOR_U32[leftC] || COLOR_U32[0];
      const x0 = _max(0, Math.floor(leftEdge));
      const x1 = min(W - 1, Math.floor(rightEdge));
      for (let x = x0; x <= x1; x++) buf32[Math.floor(topY) * W + x] = col;
    }

    // Right face (parallelogram)
    for (let dy = 0; dy < sd; dy++) {
      const topY = cy + hh + dy;
      if (topY < 0 || topY >= H) continue;
      const leftEdge = cx;
      const rightEdge = cx + hw - (dy * hw / sd);
      const col = COLOR_U32[rightC] || COLOR_U32[0];
      const x0 = _max(0, Math.floor(leftEdge));
      const x1 = min(W - 1, Math.floor(rightEdge));
      for (let x = x0; x <= x1; x++) buf32[Math.floor(topY) * W + x] = col;
    }

    // Outline edges for definition
    // Top diamond edges
    line(Math.floor(cx - hw), Math.floor(cy), Math.floor(cx), Math.floor(cy - hh), 0);
    line(Math.floor(cx + hw), Math.floor(cy), Math.floor(cx), Math.floor(cy - hh), 0);
    line(Math.floor(cx - hw), Math.floor(cy), Math.floor(cx), Math.floor(cy + hh), 0);
    line(Math.floor(cx + hw), Math.floor(cy), Math.floor(cx), Math.floor(cy + hh), 0);
    // Left face edges
    line(Math.floor(cx - hw), Math.floor(cy), Math.floor(cx - hw + hw), Math.floor(cy + hh + sd), 0);
    line(Math.floor(cx), Math.floor(cy + hh), Math.floor(cx), Math.floor(cy + hh + sd), 0);
    // Right face edges
    line(Math.floor(cx + hw), Math.floor(cy), Math.floor(cx + hw - hw), Math.floor(cy + hh + sd), 0);
  }

  // --- Game State ---
  const { TITLE, PLAY, GAMEOVER } = GrayBox.SCENE;
  let score, lives, level;
  let cubeColors; // 2D array: cubeColors[row][col] = current color index
  let targetColor; // color index cubes need to become
  let startColor;  // initial color of cubes

  // Player state
  let pRow, pCol;       // grid position
  let pPx, pPy;         // pixel position (for animation)
  let pTargetPx, pTargetPy;
  let pHopping;         // hopping timer
  let pDir;             // 0=downright, 1=downleft, 2=upright, 3=upleft
  let pFalling;         // falling off edge timer
  let pFallVy;
  let pDead;
  let pOnDisc;          // riding disc timer
  let pDiscSide;        // which disc (-1 left, 1 right)
  let invulnTimer;
  let speechTimer;      // show !@# when falling

  // Enemies
  let enemies;   // { type:"ball"|"coily", row, col, px, py, hopping, state, dir }
  let enemySpawnTimer;
  let coilyActive;

  // Discs
  let discs; // { row, side, active, px, py, used }

  // Level transition
  let levelClearTimer;
  let flashTimer;
  let deathPause;
  let titleBlink;

  const HOP_FRAMES = 8;
  const ENEMY_HOP_FRAMES = 12;

  function resetGame() {
    score = 0;
    lives = 3;
    level = 0;
    nextLevel();
  }

  function nextLevel() {
    level++;
    cubeColors = [];
    for (let r = 0; r < ROWS; r++) {
      cubeColors[r] = [];
      for (let c = 0; c <= r; c++) {
        cubeColors[r][c] = 0; // start color
      }
    }
    // Level determines colors
    // Levels 1-2: change from color 1 to color 2
    // Levels 3+: change from 1 to 3, enemies faster
    startColor = 1;
    targetColor = level <= 2 ? 2 : 3;

    for (let r = 0; r < ROWS; r++)
      for (let c = 0; c <= r; c++)
        cubeColors[r][c] = startColor;

    pRow = 0; pCol = 0;
    const p = cubePos(0, 0);
    pPx = p.x; pPy = p.y;
    pTargetPx = p.x; pTargetPy = p.y;
    pHopping = 0;
    pDir = 0;
    pFalling = 0;
    pFallVy = 0;
    pDead = false;
    pOnDisc = 0;
    pDiscSide = 0;
    invulnTimer = 60;
    speechTimer = 0;

    enemies = [];
    enemySpawnTimer = 60 + flr(rnd(60));
    coilyActive = false;

    // Place discs: one on each side at random rows
    discs = [];
    const discRow1 = 1 + flr(rnd(3));
    const discRow2 = 1 + flr(rnd(3));
    discs.push({ row: discRow1, side: -1, active: true, used: false });
    discs.push({ row: discRow2, side: 1, active: true, used: false });

    levelClearTimer = 0;
    flashTimer = 0;
    deathPause = 0;
  }

  function landOnCube(row, col) {
    if (row >= 0 && row < ROWS && col >= 0 && col <= row) {
      if (cubeColors[row][col] !== targetColor) {
        if (level <= 4) {
          cubeColors[row][col] = targetColor;
        } else {
          // Higher levels: cycle colors
          cubeColors[row][col] = cubeColors[row][col] === startColor ? targetColor : startColor;
        }
        score += 25;
        note(0, "E5", 0.05);
      }
    }
  }

  function checkLevelClear() {
    for (let r = 0; r < ROWS; r++)
      for (let c = 0; c <= r; c++)
        if (cubeColors[r][c] !== targetColor) return false;
    return true;
  }

  function isValidCube(row, col) {
    return row >= 0 && row < ROWS && col >= 0 && col <= row;
  }

  function killPlayer() {
    if (invulnTimer > 0 || pDead) return;
    pDead = true;
    lives--;
    deathPause = 60;
    speechTimer = 40;
    note(0, "C3", 0.15);
    setTimeout(() => note(0, "A2", 0.2), 150);
    setTimeout(() => note(1, "E2", 0.2), 300);
  }

  function respawnPlayer() {
    pRow = 0; pCol = 0;
    const p = cubePos(0, 0);
    pPx = p.x; pPy = p.y;
    pTargetPx = p.x; pTargetPy = p.y;
    pHopping = 0;
    pFalling = 0;
    pFallVy = 0;
    pDead = false;
    pOnDisc = 0;
    invulnTimer = 60;
    speechTimer = 0;
    // Clear enemies on respawn
    enemies = [];
    coilyActive = false;
    enemySpawnTimer = 90;
  }

  function getDiscPos(disc) {
    const cp = cubePos(disc.row, disc.side === -1 ? -1 : disc.row + 1);
    return { x: cp.x, y: cp.y };
  }

  function spawnEnemy() {
    // Spawn from top - either a ball or coily egg
    const startCol = flr(rnd(2)); // 0 or 1 from top
    const type = (!coilyActive && level > 1 && rnd(1) < 0.3) ? "coily_egg" : "ball";
    const p = cubePos(0, 0);
    enemies.push({
      type: type,
      row: -1,
      col: startCol,
      px: p.x + (startCol === 0 ? -CUBE_W / 2 : CUBE_W / 2),
      py: p.y - CUBE_H - CUBE_DEPTH,
      targetPx: 0,
      targetPy: 0,
      hopping: 0,
      hopDir: 0, // 0=downleft, 1=downright
      state: "bouncing", // "bouncing" | "chasing"
    });
    if (type === "coily_egg") coilyActive = true;
  }

  // --- Title Scene ---
  GrayBox.scene(TITLE, {
    init() { titleBlink = true; },
    update() {
      titleBlink = (GrayBox.frame % 40) < 25;
      if (btnp("a")) {
        ensureAudio();
        resetGame();
        note(0, "C5", 0.1);
        setTimeout(() => note(0, "E5", 0.1), 100);
        setTimeout(() => note(0, "G5", 0.15), 200);
        GrayBox.go(PLAY); return;
      }
    },
    draw() {
      cls(0);
      text("Q*BERT", W / 2 - 15, 45, 3);
      text("GRAYBOX EDITION", W / 2 - 37, 57, 2);
      for (let r = 0; r < 4; r++) {
        for (let c = 0; c <= r; c++) {
          const p = cubePos(r, c);
          const ox = 0, oy = 60;
          drawCube(p.x + ox, p.y + oy,
            (r + c) % 2 === 0 ? 2 : 3,
            1, 1);
        }
      }
      if (titleBlink) {
        text("PRESS A TO START", W / 2 - 50, 188, 3);
      }
      text("ARROWS TO HOP", W / 2 - 32, 206, 1);
      text("CHANGE ALL CUBES TO WIN", W / 2 - 57, 218, 1);
    }
  });

  // --- Play Scene ---
  GrayBox.scene(PLAY, {
    init() { resetGame(); },
    update() {
    titleBlink = (GrayBox.frame % 40) < 25;

    if (levelClearTimer > 0) {
      levelClearTimer--;
      flashTimer++;
      if (levelClearTimer === 0) {
        nextLevel();
      }
      return;
    }

    if (deathPause > 0) {
      deathPause--;
      if (speechTimer > 0) speechTimer--;
      if (deathPause === 0) {
        if (lives <= 0) {
          GrayBox.go(GAMEOVER); return;
        } else {
          respawnPlayer();
        }
      }
      return;
    }

    if (invulnTimer > 0) invulnTimer--;

    // --- Player hopping ---
    if (pHopping > 0) {
      pHopping--;
      const t = 1 - pHopping / HOP_FRAMES;
      pPx = pPx + (pTargetPx - pPx) * 0.2;
      pPy = pPy + (pTargetPy - pPy) * 0.2;
      // Arc
      if (pHopping === 0) {
        pPx = pTargetPx;
        pPy = pTargetPy;
        if (pOnDisc > 0) {
          // Riding disc to top
          pOnDisc--;
          if (pOnDisc === 0) {
            pRow = 0; pCol = 0;
            const p = cubePos(0, 0);
            pPx = p.x; pPy = p.y;
            pTargetPx = p.x; pTargetPy = p.y;
            invulnTimer = 30;
            // Kill Coily if active
            enemies = enemies.filter(e => e.type !== "coily");
            coilyActive = false;
            score += 500;
            note(0, "C5", 0.08);
            setTimeout(() => note(0, "E5", 0.08), 80);
            setTimeout(() => note(0, "G5", 0.08), 160);
            setTimeout(() => note(0, "C6", 0.12), 240);
          }
        } else if (pFalling > 0) {
          // Already falling off edge
        } else {
          // Land on cube
          landOnCube(pRow, pCol);
          if (checkLevelClear()) {
            levelClearTimer = 90;
            score += 1000;
            note(0, "C5", 0.1);
            setTimeout(() => note(0, "E5", 0.1), 100);
            setTimeout(() => note(0, "G5", 0.1), 200);
            setTimeout(() => note(0, "C6", 0.2), 300);
          }
        }
      }
    } else if (pFalling > 0) {
      pFallVy += 0.5;
      pPy += pFallVy;
      pFalling--;
      if (pFalling === 0) {
        killPlayer();
      }
    } else if (!pDead && pOnDisc === 0) {
      // Accept input
      let dr = 0, dc = 0;
      let moved = false;
      if (btnp("right")) { dr = 1; dc = 1; pDir = 0; moved = true; }      // down-right
      else if (btnp("down")) { dr = 1; dc = 0; pDir = 1; moved = true; }  // down-left
      else if (btnp("up")) { dr = -1; dc = 0; pDir = 3; moved = true; }   // up-left
      else if (btnp("left")) { dr = -1; dc = -1; pDir = 2; moved = true; }  // up-right... wait
      // Remap: arrows map to diagonal directions on isometric grid
      // Up = up-left (row-1, col-0), Left = up-right... hmm
      // Let's use a more intuitive mapping:
      // Up arrow = jump up-left (row-1, col unchanged -> visually up-left)
      // Right arrow = jump down-right (row+1, col+1)
      // Down arrow = jump down-left (row+1, col unchanged -> visually down-right from left side)
      // Left arrow = jump up-right...
      // Actually for Q*bert the standard is:
      // Up = up-right (row-1, col stays), Down = down-left (row+1, col stays)
      // Right = down-right (row+1, col+1), Left = up-left (row-1, col-1)

      if (moved) {
        const newRow = pRow + dr;
        const newCol = pCol + dc;

        // Check for disc
        let hitDisc = false;
        if (!isValidCube(newRow, newCol)) {
          for (const disc of discs) {
            if (disc.active && !disc.used) {
              // Left disc: col = -1 of that row
              // Right disc: col = row+1 of that row
              if (disc.side === -1 && newRow === disc.row && newCol < 0) {
                hitDisc = true;
                disc.used = true;
                disc.active = false;
                pOnDisc = 20;
                pDiscSide = -1;
                // Animate to top
                const tp = cubePos(0, 0);
                pTargetPx = tp.x;
                pTargetPy = tp.y;
                pHopping = 20;
                note(1, "G5", 0.1);
                break;
              }
              if (disc.side === 1 && newRow === disc.row && newCol > newRow) {
                hitDisc = true;
                disc.used = true;
                disc.active = false;
                pOnDisc = 20;
                pDiscSide = 1;
                const tp = cubePos(0, 0);
                pTargetPx = tp.x;
                pTargetPy = tp.y;
                pHopping = 20;
                note(1, "G5", 0.1);
                break;
              }
            }
          }
        }

        if (!hitDisc) {
          if (isValidCube(newRow, newCol)) {
            pRow = newRow;
            pCol = newCol;
            const p = cubePos(pRow, pCol);
            pTargetPx = p.x;
            pTargetPy = p.y;
            pHopping = HOP_FRAMES;
            note(1, "A4", 0.03);
          } else {
            // Fall off edge!
            pRow = newRow;
            pCol = newCol;
            const p = cubePos(_max(0, min(ROWS - 1, newRow)), _max(0, newCol));
            pTargetPx = pPx + (dc * CUBE_W);
            pTargetPy = pPy + (dr * (CUBE_H / 2 + CUBE_DEPTH));
            pHopping = HOP_FRAMES;
            pFalling = 20;
            pFallVy = 0;
            speechTimer = 30;
          }
        }
      }
    }

    // --- Enemy spawning ---
    if (!pDead && levelClearTimer === 0) {
      enemySpawnTimer--;
      if (enemySpawnTimer <= 0) {
        if (enemies.length < 3 + level) {
          spawnEnemy();
        }
        enemySpawnTimer = _max(30, 90 - level * 8) + flr(rnd(40));
      }
    }

    // --- Enemy update ---
    for (let i = enemies.length - 1; i >= 0; i--) {
      const e = enemies[i];

      if (e.hopping > 0) {
        e.hopping--;
        e.px += (e.targetPx - e.px) * 0.2;
        e.py += (e.targetPy - e.py) * 0.2;
        if (e.hopping === 0) {
          e.px = e.targetPx;
          e.py = e.targetPy;

          // Check if fell off bottom
          if (e.row >= ROWS) {
            if (e.type === "coily") coilyActive = false;
            enemies.splice(i, 1);
            continue;
          }

          // Coily egg transforms at bottom
          if (e.type === "coily_egg" && e.row >= ROWS - 1) {
            e.type = "coily";
            e.state = "chasing";
          }
        }
        continue;
      }

      // Decide next hop
      if (e.type === "ball" || e.type === "coily_egg") {
        // Bounce down randomly
        const goRight = rnd(1) < 0.5;
        const newRow = e.row + 1;
        const newCol = goRight ? e.col + 1 : e.col;

        if (newRow >= ROWS) {
          // Falls off bottom
          enemies.splice(i, 1);
          continue;
        }

        e.row = newRow;
        e.col = newCol;
        if (isValidCube(e.row, e.col)) {
          const p = cubePos(e.row, e.col);
          e.targetPx = p.x;
          e.targetPy = p.y;
        } else {
          // Falls off side
          e.targetPx = e.px + (goRight ? CUBE_W : -CUBE_W);
          e.targetPy = e.py + CUBE_H / 2 + CUBE_DEPTH;
          e.row = ROWS; // mark for removal
        }
        e.hopping = ENEMY_HOP_FRAMES;
      } else if (e.type === "coily") {
        // Chase Q*bert
        let dr = 0, dc = 0;
        if (pRow > e.row) {
          // Need to go down
          dr = 1;
          dc = pCol > e.col ? 1 : 0;
        } else if (pRow < e.row) {
          // Need to go up
          dr = -1;
          dc = pCol < e.col ? -1 : 0;
        } else {
          // Same row
          if (pCol > e.col) { dr = 1; dc = 1; }
          else if (pCol < e.col) { dr = -1; dc = -1; }
        }

        const newRow = e.row + dr;
        const newCol = e.col + dc;
        if (isValidCube(newRow, newCol)) {
          e.row = newRow;
          e.col = newCol;
          const p = cubePos(e.row, e.col);
          e.targetPx = p.x;
          e.targetPy = p.y;
        } else {
          // Coily falls off! (lured by disc)
          e.targetPx = e.px + dc * CUBE_W;
          e.targetPy = e.py + 45;
          e.row = ROWS;
          coilyActive = false;
          score += 500;
          note(0, "G5", 0.1);
        }
        e.hopping = _max(6, ENEMY_HOP_FRAMES - level);
      }
    }

    // --- Collision: enemies vs player ---
    if (!pDead && invulnTimer === 0 && pHopping === 0 && pFalling === 0) {
      for (const e of enemies) {
        if (e.row === pRow && e.col === pCol && e.hopping <= 2) {
          killPlayer();
          break;
        }
      }
    }
    },
    draw() {
    cls(0);

    // --- Play state ---
    // HUD
    text("SCORE " + score, 5, 3, 3);
    text("LEVEL " + level, W - 40, 3, 2);
    // Lives
    for (let i = 0; i < lives; i++) {
      spr(1, 5 + i * 10, 11);
    }

    // Target indicator
    text("TARGET:", W - 53, 11, 1);
    rectf(W - 19, 11, 8, 6, targetColor);

    // Draw discs
    for (const disc of discs) {
      if (!disc.active) continue;
      const dp = getDiscPos(disc);
      if (GrayBox.frame % 8 < 4) {
        spr(8, dp.x - 4, dp.y - 4);
      } else {
        spr(8, dp.x - 4, dp.y - 4, true);
      }
    }

    // Draw pyramid (back to front)
    for (let r = 0; r < ROWS; r++) {
      for (let c = 0; c <= r; c++) {
        const p = cubePos(r, c);
        let topC = cubeColors[r][c];
        let leftC = topC > 0 ? topC - 1 : 0;
        let rightC = topC > 0 ? topC - 1 : 0;
        // Left face slightly darker, right face medium
        if (topC === 1) { leftC = 0; rightC = 0; }
        else if (topC === 2) { leftC = 1; rightC = 1; }
        else if (topC === 3) { leftC = 2; rightC = 1; }

        // Level clear flash
        if (levelClearTimer > 0 && flashTimer % 8 < 4) {
          topC = 3; leftC = 2; rightC = 1;
        }

        drawCube(p.x, p.y, topC, leftC, rightC);
      }
    }

    // Draw enemies
    for (const e of enemies) {
      let ex = e.px - 4;
      let ey = e.py - CUBE_H / 2 - 6;
      // Hop arc
      if (e.hopping > 0) {
        const t = e.hopping / ENEMY_HOP_FRAMES;
        ey -= sin(t * 3.14159) * 10;
      }

      if (e.type === "ball" || e.type === "coily_egg") {
        spr(e.type === "ball" ? 7 : 5, ex, ey);
      } else if (e.type === "coily") {
        spr(6, ex, ey);
      }
    }

    // Draw player
    if (!pDead) {
      let px = pPx - 4;
      let py = pPy - CUBE_H / 2 - 6;

      // Hop arc
      if (pHopping > 0 && pFalling === 0 && pOnDisc === 0) {
        const t = pHopping / HOP_FRAMES;
        py -= sin(t * 3.14159) * 12;
      }

      // Blink during invulnerability
      if (invulnTimer > 0 && GrayBox.frame % 4 < 2) {
        // Don't draw (blink)
      } else {
        // Choose sprite based on direction
        let sprId = 1;
        if (pDir === 0) sprId = 1;       // down-right
        else if (pDir === 1) sprId = 2;   // down-left
        else if (pDir === 2) sprId = 3;   // up-right (reuse up sprite flipped)
        else if (pDir === 3) sprId = 4;   // up-left
        spr(sprId, px, py);
      }

      // Speech bubble when falling
      if (speechTimer > 0) {
        spr(9, px - 2, py - 10);
        speechTimer--;
      }
    }

    // Level clear message
    if (levelClearTimer > 0) {
      rectf(W / 2 - 33, H / 2 - 9, 67, 15, 0);
      text("LEVEL CLEAR!", W / 2 - 30, H / 2 - 6, 3);
    }
    }
  });

  // --- Game Over Scene ---
  GrayBox.scene(GAMEOVER, {
    init() {},
    update() {
      titleBlink = (GrayBox.frame % 40) < 25;
      if (btnp("a")) {
        GrayBox.go(TITLE); return;
      }
    },
    draw() {
      cls(0);
      text("GAME OVER", W / 2 - 22, 90, 3);
      text("SCORE " + score, W / 2 - 22, 109, 2);
      if (titleBlink) {
        text("PRESS A", W / 2 - 27, 135, 3);
      }
    }
  });

  GrayBox.go(TITLE);
  GrayBox.boot("screen");
})();
</script>
