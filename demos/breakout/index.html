<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mono — Demo: Breakout</title>
<link rel="stylesheet" href="../../runtime/mono.css">
</head>
<body>
<div id="frame">
  <canvas id="screen"></canvas>
</div>
<div id="controls">
  <span>←→</span> MOVE &nbsp;&nbsp; <span>A</span> LAUNCH
</div>
<script src="../../runtime/engine.js"></script>
<script>
(() => {
  "use strict";
  const W = Mono.WIDTH, H = Mono.HEIGHT;
  const { cls, pix, line, rect, rectf, circ, circf, sprite: defSprite,
          spr, text, btn, btnp, note, stop, rnd, flr, abs: _abs,
          min, max: _max, sin, cos, dbg, dbgC } = Mono;

  // --- 8→16 upscaler ---
  function up(d){let o="";for(let r=0;r<8;r++){let row="";for(let c=0;c<8;c++){const ch=d[r*8+c];row+=ch+ch;}o+=row+row;}return o;}

  // --- Sprites (16x16) ---
  // 1: Ball
  defSprite(1, up(
    "00330000" +
    "03333000" +
    "33333300" +
    "33233300" +
    "33333300" +
    "03333000" +
    "00330000" +
    "00000000"
  ));
  // 2: Power-up: Wide paddle (W icon)
  defSprite(2, up(
    "01111110" +
    "10000001" +
    "12000021" +
    "12030021" +
    "12333321" +
    "12322321" +
    "10000001" +
    "01111110"
  ));
  // 3: Power-up: Multi-ball (3 dots icon)
  defSprite(3, up(
    "01111110" +
    "10000001" +
    "10300301" +
    "10000001" +
    "10030001" +
    "10000001" +
    "10000001" +
    "01111110"
  ));
  // 4: Power-up: Slow ball (S icon)
  defSprite(4, up(
    "01111110" +
    "10000001" +
    "10033001" +
    "10300001" +
    "10033001" +
    "10000301" +
    "10033001" +
    "01111110"
  ));
  // 5: Life icon (small paddle)
  defSprite(5, up(
    "00000000" +
    "00000000" +
    "00000000" +
    "00333300" +
    "03333330" +
    "00000000" +
    "00000000" +
    "00000000"
  ));
  // 6: Particle / spark
  defSprite(6, up(
    "00000000" +
    "00000000" +
    "00030000" +
    "00323000" +
    "00030000" +
    "00000000" +
    "00000000" +
    "00000000"
  ));

  // --- Constants ---
  const SPR_SIZE = 16;
  const PADDLE_Y = 221;
  const PADDLE_H = 6;
  const PADDLE_DEFAULT_W = 32;
  const PADDLE_WIDE_W = 48;
  const PADDLE_SPEED = 5;
  const BALL_SIZE = 6;
  const BALL_RADIUS = BALL_SIZE / 2;
  const BRICK_W = 18;
  const BRICK_H = 8;
  const BRICK_GAP = 2;
  const BRICK_COLS = 15;
  const BRICK_AREA_X = (W - BRICK_COLS * (BRICK_W + BRICK_GAP)) / 2;
  const BRICK_AREA_Y = 30;
  const BALL_BASE_SPEED = 4.0;
  const POWERUP_DROP_CHANCE = 0.15;
  const POWERUP_SPEED = 1.8;

  // Brick types: 0=empty, 1=normal(1hp), 2=strong(2hp), 3=unbreakable
  // --- Game State ---
  const { TITLE, PLAY, CLEAR, GAMEOVER } = Mono.SCENE;
  let paddle, balls, bricks, powerups, particles;
  let score, lives, level;
  let ballOnPaddle;
  let paddleW;
  let ballSpeed;
  let wideTimer, slowTimer;
  let shakeTimer;
  let levelMsg;
  let comboCount;
  let totalBreakable;

  // --- Level Patterns ---
  function levelPattern(lv) {
    const rows = 8;
    const cols = BRICK_COLS;
    const grid = [];
    const pat = ((lv - 1) % 7);

    for (let r = 0; r < rows; r++) {
      grid[r] = [];
      for (let c = 0; c < cols; c++) {
        grid[r][c] = 0;
      }
    }

    if (pat === 0) {
      for (let r = 0; r < rows; r++) {
        for (let c = 0; c < cols; c++) {
          if (r < 2) grid[r][c] = 2;
          else grid[r][c] = 1;
        }
      }
    } else if (pat === 1) {
      for (let r = 0; r < rows; r++) {
        for (let c = 0; c < cols; c++) {
          if ((r + c) % 2 === 0) grid[r][c] = 1;
          else if (r < 2) grid[r][c] = 2;
        }
      }
    } else if (pat === 2) {
      const midC = flr(cols / 2);
      const midR = flr(rows / 2);
      for (let r = 0; r < rows; r++) {
        for (let c = 0; c < cols; c++) {
          const dist = _abs(r - midR) + _abs(c - midC);
          if (dist <= 5) {
            if (dist === 5) grid[r][c] = 3;
            else if (dist <= 2) grid[r][c] = 2;
            else grid[r][c] = 1;
          }
        }
      }
    } else if (pat === 3) {
      for (let r = 0; r < rows; r++) {
        for (let c = 0; c < cols; c++) {
          if (r === 0 || r === rows - 1) grid[r][c] = 3;
          else if (c === 0 || c === cols - 1) grid[r][c] = 3;
          else if (r % 2 === 0 && c % 3 === 0) grid[r][c] = 2;
          else grid[r][c] = 1;
        }
      }
    } else if (pat === 4) {
      for (let r = 0; r < rows; r++) {
        for (let c = 0; c < cols; c++) {
          const zigRow = (r + flr(c / 2)) % 3;
          if (zigRow === 0) grid[r][c] = 2;
          else if (zigRow === 1) grid[r][c] = 1;
        }
      }
    } else if (pat === 5) {
      const shape = [
        "..111111111111.",
        ".1..1111111..1.",
        ".1.111111111.1.",
        ".11.1.111.1.11.",
        "111111111111111",
        ".1.111111111.1.",
        "1...1.....1...1",
        ".1...........1.",
      ];
      for (let r = 0; r < rows; r++) {
        for (let c = 0; c < cols; c++) {
          if (r < shape.length && c < shape[r].length) {
            if (shape[r][c] === '1') {
              grid[r][c] = (r < 2) ? 2 : 1;
            }
          }
        }
      }
    } else if (pat === 6) {
      for (let r = 0; r < rows; r++) {
        for (let c = 0; c < cols; c++) {
          if (r % 2 === 0) {
            if (c >= 3 && c < cols - 3) {
              grid[r][c] = (c >= 6 && c < cols - 6) ? 2 : 1;
            }
          } else {
            grid[r][c] = 1;
          }
        }
      }
    }

    if (lv > 7) {
      for (let r = 0; r < rows; r++) {
        for (let c = 0; c < cols; c++) {
          if (grid[r][c] === 1 && Math.random() < 0.15 * (lv - 7)) {
            grid[r][c] = 2;
          }
        }
      }
    }

    return grid;
  }

  function countBreakable() {
    let count = 0;
    for (const b of bricks) {
      if (b.type !== 3 && b.type !== 0) count++;
    }
    return count;
  }

  function resetGame() {
    score = 0;
    lives = 3;
    level = 0;
    particles = [];
    shakeTimer = 0;
    nextLevel();
  }

  function nextLevel() {
    level++;
    ballSpeed = BALL_BASE_SPEED + (level - 1) * 0.2;
    paddleW = PADDLE_DEFAULT_W;
    wideTimer = 0;
    slowTimer = 0;
    comboCount = 0;
    paddle = { x: W / 2 - paddleW / 2 };
    balls = [];
    powerups = [];
    bricks = [];
    ballOnPaddle = true;
    levelMsg = 90;

    const pattern = levelPattern(level);
    for (let r = 0; r < pattern.length; r++) {
      for (let c = 0; c < pattern[r].length; c++) {
        if (pattern[r][c] > 0) {
          bricks.push({
            x: BRICK_AREA_X + c * (BRICK_W + BRICK_GAP),
            y: BRICK_AREA_Y + r * (BRICK_H + BRICK_GAP),
            type: pattern[r][c],
            hp: pattern[r][c] === 3 ? 999 : pattern[r][c],
            hitFlash: 0,
          });
        }
      }
    }
    totalBreakable = countBreakable();
  }

  function spawnBall(x, y, vx, vy) {
    const spd = slowTimer > 0 ? ballSpeed * 0.6 : ballSpeed;
    const len = Math.sqrt(vx * vx + vy * vy) || 1;
    balls.push({
      x: x, y: y,
      vx: (vx / len) * spd,
      vy: (vy / len) * spd,
    });
  }

  function launchBall() {
    ballOnPaddle = false;
    const cx = paddle.x + paddleW / 2;
    spawnBall(cx - BALL_SIZE / 2, PADDLE_Y - BALL_SIZE - 1, 0.5 - rnd(1), -1);
  }

  function spawnPowerup(x, y) {
    if (Math.random() > POWERUP_DROP_CHANCE) return;
    const types = [2, 3, 4]; // wide, multi, slow
    const type = types[flr(rnd(types.length))];
    powerups.push({ x: x, y: y, type: type });
  }

  function addParticles(x, y, c, count) {
    for (let i = 0; i < count; i++) {
      particles.push({
        x: x, y: y,
        vx: rnd(4) - 2, vy: rnd(3) - 2,
        life: 8 + flr(rnd(12)),
        color: c,
      });
    }
  }

  // --- Sounds ---
  function sndPaddleHit() { note(0, "E5", 0.04); }
  function sndBrickHit() { note(0, "C5", 0.03); }
  function sndBrickBreak() { note(0, "G5", 0.05); note(1, "C4", 0.03); }
  function sndStrongHit() { note(0, "A3", 0.04); }
  function sndWallHit() { note(1, "G3", 0.02); }
  function sndUnbreakable() { note(0, "C3", 0.04); note(1, "C3", 0.04); }
  function sndPowerup() {
    note(0, "C5", 0.06);
    setTimeout(() => note(0, "E5", 0.06), 60);
    setTimeout(() => note(0, "G5", 0.08), 120);
  }
  function sndLoseLife() {
    note(0, "E3", 0.12); note(1, "C3", 0.12);
    setTimeout(() => { note(0, "C3", 0.2); note(1, "A2", 0.2); }, 120);
  }
  function sndLevelClear() {
    note(0, "C5", 0.08);
    setTimeout(() => note(0, "E5", 0.08), 80);
    setTimeout(() => note(0, "G5", 0.08), 160);
    setTimeout(() => note(0, "C6", 0.12), 240);
  }
  function sndLaunch() { note(0, "G4", 0.05); }

  // --- Collision helpers ---
  // Circle-vs-rect collision: ball is circle, bricks/paddle are rect
  function circRectOverlap(cx, cy, r, rx, ry, rw, rh) {
    // Find closest point on rect to circle center
    const closestX = _max(rx, min(cx, rx + rw));
    const closestY = _max(ry, min(cy, ry + rh));
    const dx = cx - closestX;
    const dy = cy - closestY;
    return dx * dx + dy * dy <= r * r;
  }

  function ballBrickCollide(ball, brick) {
    const bcx = ball.x + BALL_RADIUS;
    const bcy = ball.y + BALL_RADIUS;
    return circRectOverlap(bcx, bcy, BALL_RADIUS, brick.x, brick.y, BRICK_W, BRICK_H);
  }

  // --- Title Scene ---
  Mono.scene(TITLE, {
    init() {},
    update() {
      if (shakeTimer > 0) shakeTimer--;
      for (let i = particles.length - 1; i >= 0; i--) {
        const p = particles[i];
        p.x += p.vx; p.y += p.vy; p.vy += 0.1; p.life--;
        if (p.life <= 0) particles.splice(i, 1);
      }
      if (btnp("start") || btnp("a")) {
        Mono.go(PLAY);
        note(0, "C5", 0.08);
        setTimeout(() => note(0, "E5", 0.08), 80);
        setTimeout(() => note(0, "G5", 0.12), 160);
      }
    },
    draw() {
      cls(0);
      const sx = shakeTimer > 0 ? flr(rnd(4)) - 2 : 0;
      const sy = shakeTimer > 0 ? flr(rnd(4)) - 2 : 0;
      // Background bricks decoration
      for (let r = 0; r < 6; r++) {
        for (let c = 0; c < BRICK_COLS; c++) {
          const bc = (r + c) % 3 === 0 ? 2 : (r + c) % 3 === 1 ? 1 : 0;
          if (bc > 0) {
            const bx = BRICK_AREA_X + c * (BRICK_W + BRICK_GAP);
            const by = 22 + r * (BRICK_H + BRICK_GAP);
            const alpha = (sin(Mono.frame * 0.04 + r * 0.5 + c * 0.3) + 1) * 0.5;
            if (alpha > 0.3) rectf(bx, by, BRICK_W, BRICK_H, bc);
          }
        }
      }
      const titleY = 86;
      text("BREAKOUT", W / 2 - 20, titleY, 3);
      text("- BLOCK BREAKER -", W / 2 - 45, titleY + 12, 2);
      const ballAnimX = W / 2 + sin(Mono.frame * 0.08) * 40;
      const ballAnimY = 124 + _abs(sin(Mono.frame * 0.12)) * -20;
      spr(1, ballAnimX - 8, ballAnimY - 8);
      if (flr(Mono.frame / 20) % 2 === 0) {
        text("PRESS START", W / 2 - 40, 158, 3);
      }
      text("LEFT/RIGHT: MOVE", W / 2 - 40, 186, 1);
      text("A: LAUNCH BALL", W / 2 - 35, 196, 1);
      drawParticles();
    }
  });

  // --- Play Scene ---
  Mono.scene(PLAY, {
    init() {
      resetGame();
    },
    update() {
    // Timers
    if (shakeTimer > 0) shakeTimer--;
    // Particles always update
    for (let i = particles.length - 1; i >= 0; i--) {
      const p = particles[i];
      p.x += p.vx; p.y += p.vy; p.vy += 0.1; p.life--;
      if (p.life <= 0) particles.splice(i, 1);
    }
    // ---- PLAY ----
    // Level message timer
    if (levelMsg > 0) levelMsg--;

    // Power-up timers
    if (wideTimer > 0) {
      wideTimer--;
      paddleW = PADDLE_WIDE_W;
      if (wideTimer <= 0) paddleW = PADDLE_DEFAULT_W;
    }
    if (slowTimer > 0) {
      slowTimer--;
      if (slowTimer <= 0) {
        for (const b of balls) {
          const len = Math.sqrt(b.vx * b.vx + b.vy * b.vy) || 1;
          b.vx = (b.vx / len) * ballSpeed;
          b.vy = (b.vy / len) * ballSpeed;
        }
      }
    }

    // Brick hit flash
    for (const br of bricks) {
      if (br.hitFlash > 0) br.hitFlash--;
    }

    // Paddle movement
    if (btn("left")) paddle.x -= PADDLE_SPEED;
    if (btn("right")) paddle.x += PADDLE_SPEED;
    paddle.x = _max(4, min(W - paddleW - 4, paddle.x));

    // Ball on paddle
    if (ballOnPaddle) {
      if (btnp("a")) {
        launchBall();
        sndLaunch();
      }
      return;
    }

    // Update balls
    for (let bi = balls.length - 1; bi >= 0; bi--) {
      const b = balls[bi];
      const curSpeed = slowTimer > 0 ? ballSpeed * 0.6 : ballSpeed;

      // Normalize speed each frame
      const len = Math.sqrt(b.vx * b.vx + b.vy * b.vy) || 1;
      b.vx = (b.vx / len) * curSpeed;
      b.vy = (b.vy / len) * curSpeed;

      b.x += b.vx;
      b.y += b.vy;

      // Ball center for circle collision with walls
      const bcx = b.x + BALL_RADIUS;
      const bcy = b.y + BALL_RADIUS;

      // Wall collision (circle vs wall edges)
      if (bcx - BALL_RADIUS <= 2) { b.x = 2; b.vx = _abs(b.vx); sndWallHit(); }
      if (bcx + BALL_RADIUS >= W - 2) { b.x = W - 2 - BALL_SIZE; b.vx = -_abs(b.vx); sndWallHit(); }
      if (bcy - BALL_RADIUS <= 12) { b.y = 12; b.vy = _abs(b.vy); sndWallHit(); }

      // Ball fell below
      if (b.y > H + 8) {
        balls.splice(bi, 1);
        if (balls.length === 0) {
          lives--;
          comboCount = 0;
          sndLoseLife();
          shakeTimer = 12;
          if (lives <= 0) {
            Mono.go(GAMEOVER); return;
          } else {
            ballOnPaddle = true;
            wideTimer = 0;
            slowTimer = 0;
            paddleW = PADDLE_DEFAULT_W;
            powerups = [];
          }
        }
        continue;
      }

      // Paddle collision (circle vs rect)
      if (b.vy > 0 &&
          circRectOverlap(bcx, bcy, BALL_RADIUS, paddle.x, PADDLE_Y, paddleW, PADDLE_H)) {
        const hitPos = (bcx - paddle.x) / paddleW; // 0..1
        const angle = -Math.PI * (0.15 + 0.7 * (1 - hitPos));
        b.vx = Math.cos(angle) * curSpeed;
        b.vy = Math.sin(angle) * curSpeed;
        b.y = PADDLE_Y - BALL_SIZE;
        comboCount = 0;
        sndPaddleHit();
      }

      // Brick collision (circle vs rect)
      for (let bri = bricks.length - 1; bri >= 0; bri--) {
        const br = bricks[bri];
        if (br.type === 0) continue;

        const bcx2 = b.x + BALL_RADIUS;
        const bcy2 = b.y + BALL_RADIUS;
        if (!circRectOverlap(bcx2, bcy2, BALL_RADIUS, br.x, br.y, BRICK_W, BRICK_H)) continue;

        // Determine collision side for bounce
        const overlapLeft = (bcx2 + BALL_RADIUS) - br.x;
        const overlapRight = (br.x + BRICK_W) - (bcx2 - BALL_RADIUS);
        const overlapTop = (bcy2 + BALL_RADIUS) - br.y;
        const overlapBottom = (br.y + BRICK_H) - (bcy2 - BALL_RADIUS);
        const minOverlapX = min(overlapLeft, overlapRight);
        const minOverlapY = min(overlapTop, overlapBottom);

        if (minOverlapX < minOverlapY) {
          b.vx = -b.vx;
          if (overlapLeft < overlapRight) b.x = br.x - BALL_SIZE;
          else b.x = br.x + BRICK_W;
        } else {
          b.vy = -b.vy;
          if (overlapTop < overlapBottom) b.y = br.y - BALL_SIZE;
          else b.y = br.y + BRICK_H;
        }

        if (br.type === 3) {
          br.hitFlash = 4;
          sndUnbreakable();
          addParticles(br.x + BRICK_W / 2, br.y + BRICK_H / 2, 1, 3);
        } else {
          br.hp--;
          br.hitFlash = 4;
          if (br.hp <= 0) {
            comboCount++;
            const pts = br.type === 2 ? 20 : 10;
            score += pts * (1 + flr(comboCount / 5));
            addParticles(br.x + BRICK_W / 2, br.y + BRICK_H / 2, br.type === 2 ? 3 : 2, 6);
            spawnPowerup(br.x + BRICK_W / 2 - 8, br.y);
            bricks.splice(bri, 1);
            sndBrickBreak();
          } else {
            sndStrongHit();
            addParticles(br.x + BRICK_W / 2, br.y + BRICK_H / 2, 3, 3);
          }
        }
        break;
      }
    }

    // Speed increase as bricks clear
    const remaining = countBreakable();
    if (totalBreakable > 0) {
      const cleared = 1 - remaining / totalBreakable;
      ballSpeed = BALL_BASE_SPEED + (level - 1) * 0.2 + cleared * 1.5;
    }

    // Update powerups
    for (let i = powerups.length - 1; i >= 0; i--) {
      const p = powerups[i];
      p.y += POWERUP_SPEED;
      if (p.y > H) { powerups.splice(i, 1); continue; }

      // Paddle catch (powerup rect vs paddle rect)
      if (p.y + SPR_SIZE >= PADDLE_Y && p.y <= PADDLE_Y + PADDLE_H &&
          p.x + SPR_SIZE > paddle.x && p.x < paddle.x + paddleW) {
        sndPowerup();
        if (p.type === 2) {
          wideTimer = 300;
          paddleW = PADDLE_WIDE_W;
        } else if (p.type === 3) {
          if (balls.length > 0 && balls.length < 8) {
            const src = balls[0];
            const spd = Math.sqrt(src.vx * src.vx + src.vy * src.vy) || ballSpeed;
            const ang = Math.atan2(src.vy, src.vx);
            spawnBall(src.x, src.y, Math.cos(ang + 0.5) * spd, Math.sin(ang + 0.5) * spd);
            spawnBall(src.x, src.y, Math.cos(ang - 0.5) * spd, Math.sin(ang - 0.5) * spd);
          }
        } else if (p.type === 4) {
          slowTimer = 240;
        }
        powerups.splice(i, 1);
      }
    }

    // Check level clear
    if (countBreakable() <= 0 && !ballOnPaddle) {
      Mono.go(CLEAR);
      levelMsg = 90;
      score += 500 + level * 100;
      sndLevelClear();
    }
    },
    draw() {
    cls(0);
    const sx = shakeTimer > 0 ? flr(rnd(4)) - 2 : 0;
    const sy = shakeTimer > 0 ? flr(rnd(4)) - 2 : 0;
    drawPlayfield(sx, sy);

    // Level message overlay
    if (levelMsg > 0) {
      const msgAlpha = levelMsg > 60 ? 1 : levelMsg / 60;
      if (msgAlpha > 0.3) {
        text("LEVEL " + level, W / 2 - 18, H / 2 - 4, 3);
      }
    }
    }
  });

  // --- Level Clear Scene ---
  Mono.scene(CLEAR, {
    init() {},
    update() {
      if (shakeTimer > 0) shakeTimer--;
      for (let i = particles.length - 1; i >= 0; i--) {
        const p = particles[i];
        p.x += p.vx; p.y += p.vy; p.vy += 0.1; p.life--;
        if (p.life <= 0) particles.splice(i, 1);
      }
      if (levelMsg > 0) levelMsg--;
      if (levelMsg <= 0) {
        Mono.go(PLAY);
      }
    },
    draw() {
      cls(0);
      const sx = shakeTimer > 0 ? flr(rnd(4)) - 2 : 0;
      const sy = shakeTimer > 0 ? flr(rnd(4)) - 2 : 0;
      drawPlayfield(sx, sy);
      rectf(W / 2 - 53, H / 2 - 15, 106, 30, 0);
      rect(W / 2 - 53, H / 2 - 15, 106, 30, 2);
      text("LEVEL " + level + " CLEAR!", W / 2 - 35, H / 2 - 8, 3);
      text("BONUS: " + (500 + level * 100), W / 2 - 25, H / 2 + 6, 2);
    }
  });

  // --- Game Over Scene ---
  Mono.scene(GAMEOVER, {
    init() {},
    update() {
      for (let i = particles.length - 1; i >= 0; i--) {
        const p = particles[i];
        p.x += p.vx; p.y += p.vy; p.vy += 0.1; p.life--;
        if (p.life <= 0) particles.splice(i, 1);
      }
      if (btnp("start") || btnp("a") || btnp("start")) Mono.go(TITLE);
    },
    draw() {
      cls(0);
      text("GAME OVER", W / 2 - 22, H / 2 - 20, 3);
      text("SCORE: " + score, W / 2 - 25, H / 2, 2);
      text("LEVEL: " + level, W / 2 - 18, H / 2 + 12, 2);
      if (flr(Mono.frame / 20) % 2 === 0) {
        text("PRESS START", W / 2 - 48, H / 2 + 36, 1);
      }
      drawParticles();
    }
  });

  function drawPlayfield(sx, sy) {
    // HUD bar at top
    rectf(0, 0, W, 11, 0);
    line(0, 11, W, 11, 1);
    text("SCORE:" + score, 3 + sx, 3 + sy, 3);
    text("LV:" + level, W / 2 - 12 + sx, 3 + sy, 2);

    // Lives: draw from right edge inward, capped so they don't overflow
    const maxLivesShown = min(lives, 5);
    for (let i = 0; i < maxLivesShown; i++) {
      spr(5, W - 20 - i * 18 + sx, -2 + sy);
    }

    // Power-up indicators
    let indX = W / 2 + 20;
    if (wideTimer > 0) {
      text("W", indX + sx, 3 + sy, wideTimer < 90 && flr(Mono.frame / 6) % 2 ? 1 : 2);
      indX += 10;
    }
    if (slowTimer > 0) {
      text("S", indX + sx, 3 + sy, slowTimer < 90 && flr(Mono.frame / 6) % 2 ? 1 : 2);
      indX += 10;
    }

    // Walls
    rectf(0 + sx, 12 + sy, 2, H - 12, 1);
    rectf(W - 2 + sx, 12 + sy, 2, H - 12, 1);

    // Bricks
    for (const br of bricks) {
      if (br.type === 0) continue;
      let c;
      if (br.hitFlash > 0) {
        c = 3;
      } else if (br.type === 3) {
        c = 1;
      } else if (br.type === 2 || br.hp === 2) {
        c = 3;
      } else {
        c = 2;
      }
      rectf(br.x + sx, br.y + sy, BRICK_W, BRICK_H, c);
      // Inner detail line for depth
      if (br.hitFlash <= 0) {
        if (c === 3) {
          line(br.x + 1 + sx, br.y + BRICK_H - 1 + sy, br.x + BRICK_W - 1 + sx, br.y + BRICK_H - 1 + sy, 2);
          line(br.x + BRICK_W - 1 + sx, br.y + 1 + sy, br.x + BRICK_W - 1 + sx, br.y + BRICK_H - 1 + sy, 2);
        } else if (c === 2) {
          line(br.x + 1 + sx, br.y + BRICK_H - 1 + sy, br.x + BRICK_W - 1 + sx, br.y + BRICK_H - 1 + sy, 1);
          line(br.x + BRICK_W - 1 + sx, br.y + 1 + sy, br.x + BRICK_W - 1 + sx, br.y + BRICK_H - 1 + sy, 1);
        } else if (c === 1) {
          for (let px = 0; px < BRICK_W; px += 4) {
            pix(br.x + px + sx, br.y + 2 + sy, 0);
            pix(br.x + px + 2 + sx, br.y + 6 + sy, 0);
          }
        }
      }
      // Debug: brick hitbox
      dbg(br.x, br.y, BRICK_W, BRICK_H);
    }

    // Paddle
    const pw = paddleW;
    rectf(paddle.x + sx, PADDLE_Y + sy, pw, PADDLE_H, 3);
    rectf(paddle.x + 2 + sx, PADDLE_Y + 2 + sy, pw - 4, 2, 2);
    rectf(paddle.x + sx, PADDLE_Y + sy, 2, PADDLE_H, 2);
    rectf(paddle.x + pw - 2 + sx, PADDLE_Y + sy, 2, PADDLE_H, 2);
    // Debug: paddle hitbox
    dbg(paddle.x, PADDLE_Y, pw, PADDLE_H);

    // Balls
    for (const b of balls) {
      spr(1, flr(b.x) - 5 + sx, flr(b.y) - 5 + sy);
      // Debug: ball circle hitbox
      dbgC(b.x + BALL_RADIUS, b.y + BALL_RADIUS, BALL_RADIUS);
    }

    // Ball on paddle indicator
    if (ballOnPaddle) {
      const bx = paddle.x + pw / 2 - BALL_SIZE / 2;
      const by = PADDLE_Y - BALL_SIZE - 1;
      spr(1, flr(bx) - 5 + sx, flr(by) - 5 + sy);
      // Debug: ball on paddle circle hitbox
      dbgC(bx + BALL_RADIUS, by + BALL_RADIUS, BALL_RADIUS);
      // Blinking hint
      if (flr(Mono.frame / 15) % 2 === 0) {
        text("PRESS A", W / 2 - 14, PADDLE_Y - 16, 2);
      }
    }

    // Powerups
    for (const p of powerups) {
      spr(p.type, flr(p.x) + sx, flr(p.y) + sy);
      // Debug: powerup hitbox
      dbg(p.x, p.y, SPR_SIZE, SPR_SIZE);
      // Sparkle
      if (flr(Mono.frame / 4) % 2 === 0) {
        pix(p.x - 1 + sx, p.y + 8 + sy, 3);
        pix(p.x + SPR_SIZE + 1 + sx, p.y + 8 + sy, 3);
      }
    }

    // Particles
    drawParticles();

    // Combo display
    if (comboCount >= 5) {
      const comboText = comboCount + " COMBO!";
      const ctw = comboText.length * 5;
      text(comboText, min(W - ctw - 2, _max(2, W / 2 - ctw / 2)), PADDLE_Y - 28,
           flr(Mono.frame / 4) % 2 === 0 ? 3 : 2);
    }
  }

  function drawParticles() {
    for (const p of particles) {
      pix(flr(p.x), flr(p.y), p.color);
      if (p.life > 5) pix(flr(p.x) + 1, flr(p.y), p.color);
    }
  }


  Mono.go(TITLE);
  Mono.boot("screen");
})();
</script>
