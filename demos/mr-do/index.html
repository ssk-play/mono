<!DOCTYPE html>

  <canvas id="screen"></canvas>

<div id="controls">
  <span>ARROWS</span> MOVE &nbsp;&nbsp; <span>A</span> THROW BALL

<script src="../../runtime/engine.js"></script>
<script>
(() => {
  "use strict";
  const W = Mono.WIDTH, H = Mono.HEIGHT; // 320x240
  const { cls, pix, line, rect, rectf, circ, circf, sprite: defSprite,
          spr, sprT, text, btn, btnp, note, stop, rnd, flr, abs: _abs,
          min, max: _max, sin, cos } = Mono;

  // --- 16x16 upscale helper (8x8 art -> 16x16 engine sprite) ---
  function up(d) {
    let o = "";
    for (let r = 0; r < 8; r++) {
      let row = "";
      for (let c = 0; c < 8; c++) { const ch = d[r * 8 + c]; row += ch + ch; }
      o += row + row;
    }
    return o;
  }

  // --- Circle collision helper ---
  function circHit(ax, ay, ar, bx, by, br) {
    const dx = ax - bx, dy = ay - by;
    const dist2 = dx * dx + dy * dy;
    const radSum = ar + br;
    return dist2 < radSum * radSum;
  }

  // --- Rect-circle collision helper ---
  function rectCircHit(rx, ry, rw, rh, cx, cy, cr) {
    const nearX = _max(rx, min(cx, rx + rw));
    const nearY = _max(ry, min(cy, ry + rh));
    const dx = cx - nearX, dy = cy - nearY;
    return (dx * dx + dy * dy) < (cr * cr);
  }

  // --- Sprites (8x8 pixel art upscaled to 16x16) ---

  defSprite(15, up(

  // 16: Mr. Do digging right frame 2
  defSprite(16, up(
    "00333000" +

    "03333300" +
    "00333300" +
    "03331300" +

  ));
  // 17: Mr. Do digging up frame 2
  defSprite(17, up(
    "00333000" +
    "03222300" +
    "32222230" +
    "03333300" +
    "00333000" +
    "03333300" +
    "00333000" +
    "00300030"
  ));

  // --- Game constants ---
  const TILE = 16;           // engine-native 16x16 sprites
  const MAP_W = 20;          // tiles across (320/16)
  const MAP_H = 13;          // tiles tall (playfield rows, 13*16=208)
  const HUD_TOP = 16;        // top HUD height in px
  const HUD_BOT = 16;        // bottom HUD height in px
  const FIELD_Y = HUD_TOP;   // playfield top pixel
  const FIELD_H = MAP_H * TILE; // 208 px => HUD_TOP(16)+208+HUD_BOT(16)=240

  // Collision radii (in pixels, for circle collision)
  const R_PLAYER = 6;
  const R_BALL   = 5;
  const R_ENEMY  = 6;
  const R_CHERRY = 5;
  const R_APPLE  = 7;

  // Tile types
  const T_EMPTY  = 0;
  const T_DIRT   = 1;
  const T_CHERRY = 2;
  const T_APPLE  = 3;

  // --- Game state ---
  const { TITLE, PLAY, GAMEOVER } = Mono.SCENE;
  let player, ball, enemies, apples, explosions, particles;
  let score, lives, level, cherryCount, totalCherries;
  let extraLetters;
  let levelClearTimer, deathTimer;
  let grid;
  let playerDir, playerFrame, invincTimer;

  function makeGrid() {
    grid = [];
    for (let y = 0; y < MAP_H; y++) {
      grid[y] = [];
      for (let x = 0; x < MAP_W; x++) {
        grid[y][x] = T_DIRT;
      }
    }
  }

  function carveTunnel(x0, y0, x1, y1) {
    if (y0 === y1) {
      const minX = min(x0, x1), maxX = _max(x0, x1);
      for (let x = minX; x <= maxX; x++) {
        if (y0 >= 0 && y0 < MAP_H && x >= 0 && x < MAP_W)
          grid[y0][x] = T_EMPTY;
      }
    } else {
      const minY = min(y0, y1), maxY = _max(y0, y1);
      for (let y = minY; y <= maxY; y++) {
        if (y >= 0 && y < MAP_H && x0 >= 0 && x0 < MAP_W)
          grid[y][x0] = T_EMPTY;
      }
    }
  }

  function generateLevel(lvl) {
    makeGrid();
    cherryCount = 0;
    totalCherries = 0;
    apples = [];

    // Clear border
    for (let x = 0; x < MAP_W; x++) { grid[0][x] = T_EMPTY; grid[MAP_H - 1][x] = T_EMPTY; }
    for (let y = 0; y < MAP_H; y++) { grid[y][0] = T_EMPTY; grid[y][MAP_W - 1] = T_EMPTY; }

    // Create tunnel network
    const numHTunnels = 4 + min(lvl, 3);
    const numVTunnels = 3 + min(lvl, 3);

    for (let i = 0; i < numHTunnels; i++) {
      const y = 2 + flr(rnd(MAP_H - 4));
      const x0 = 1 + flr(rnd(4));
      const x1 = MAP_W - 2 - flr(rnd(4));
      carveTunnel(x0, y, x1, y);
    }

    for (let i = 0; i < numVTunnels; i++) {
      const x = 2 + flr(rnd(MAP_W - 4));
      const y0 = 1 + flr(rnd(3));
      const y1 = MAP_H - 2 - flr(rnd(3));
      carveTunnel(x, y0, x, y1);
    }

    // Carve starting area (center bottom)
    const startTX = flr(MAP_W / 2) - 1;
    const startTY = MAP_H - 3;
    for (let dy = -1; dy < 2; dy++)
      for (let dx = -1; dx < 3; dx++)
        if (startTY + dy >= 0 && startTY + dy < MAP_H && startTX + dx >= 0 && startTX + dx < MAP_W)
          grid[startTY + dy][startTX + dx] = T_EMPTY;

    // Place cherries in dirt cells
    const cherryChance = 0.08 + lvl * 0.01;
    for (let y = 1; y < MAP_H - 1; y++) {
      for (let x = 1; x < MAP_W - 1; x++) {
        if (grid[y][x] === T_DIRT && rnd(1) < cherryChance) {
          grid[y][x] = T_CHERRY;
          totalCherries++;
        }
      }
    }

    // Place apples
    const numApples = 2 + min(lvl, 4);
    let placed = 0;
    for (let attempt = 0; attempt < 200 && placed < numApples; attempt++) {
      const ax = 2 + flr(rnd(MAP_W - 4));
      const ay = 2 + flr(rnd(MAP_H - 6));
      if (grid[ay][ax] === T_DIRT && ay + 1 < MAP_H && grid[ay + 1][ax] === T_EMPTY) {
        grid[ay][ax] = T_APPLE;
        apples.push({
          tx: ax, ty: ay,
          px: ax * TILE, py: ay * TILE + FIELD_Y,
          falling: false, fallSpeed: 0, settled: true, crushTimer: 0
        });
        placed++;
      }
    }

    // Spawn enemies in tunnels
    enemies = [];
    const numEnemies = 3 + min(lvl * 2, 8);
    for (let i = 0; i < numEnemies; i++) {
      let ex, ey;
      for (let attempt = 0; attempt < 100; attempt++) {
        ex = 2 + flr(rnd(MAP_W - 4));
        ey = 1 + flr(rnd(MAP_H - 4));
        if (grid[ey][ex] === T_EMPTY) {
          const dist = _abs(ex - flr(MAP_W / 2)) + _abs(ey - (MAP_H - 3));
          if (dist > 6) break;
        }
      }
      const isExtra = (i === 0 && lvl > 1);
      enemies.push({
        x: ex * TILE, y: ey * TILE + FIELD_Y,
        tx: ex, ty: ey,
        dir: flr(rnd(4)),
        speed: 0.8 + lvl * 0.15,
        moveTimer: 0,
        animFrame: 0,
        alive: true,
        extra: isExtra,
        extraLetter: isExtra ? "EXTRA"[min(flr(rnd(5)), 4)] : null,
        chaseMode: false,
        chaseTimer: 90 + flr(rnd(90)),
        digging: false,
        digTimer: 0,
      });
    }
  }

  function resetGame() {
    score = 0;
    lives = 3;
    level = 0;
    extraLetters = "";
    explosions = [];
    particles = [];
    nextLevel();
  }

  function nextLevel() {
    level++;
    generateLevel(level);
    const startTX = flr(MAP_W / 2);
    const startTY = MAP_H - 3;
    player = {
      x: startTX * TILE,
      y: startTY * TILE + FIELD_Y,
      speed: 2.4,
    };
    playerDir = 0;
    playerFrame = 0;
    ball = null;
    levelClearTimer = 0;
    deathTimer = 0;
    invincTimer = 60;
  }

  // Helper: center of a sprite at (px, py) with 16x16 size
  function cx(px) { return px + 8; }
  function cy(py) { return py + 8; }

  function tileAt(px, py) {
    const tx = flr(px / TILE);
    const ty = flr((py - FIELD_Y) / TILE);
    if (tx < 0 || tx >= MAP_W || ty < 0 || ty >= MAP_H) return T_EMPTY;
    return grid[ty][tx];
  }

  function gridGet(tx, ty) {
    if (tx < 0 || tx >= MAP_W || ty < 0 || ty >= MAP_H) return T_EMPTY;
    return grid[ty][tx];
  }

  function addExplosion(x, y) {
    explosions.push({ x, y, timer: 14 });
    for (let i = 0; i < 8; i++)
      particles.push({
        x: cx(x), y: cy(y),
        vx: rnd(3) - 1.5, vy: rnd(3) - 1.5,
        life: 10 + flr(rnd(10)), color: flr(rnd(3)) + 1
      });
  }

  // Sound effects
  function cherrySound() { note(0, "E5", 0.03); }
  function throwSound() { note(0, "G5", 0.05); setTimeout(() => note(0, "C6", 0.04), 40); }
  function bounceSound() { note(1, "A4", 0.02); }
  function killSound() { note(1, "C3", 0.06); setTimeout(() => note(1, "E3", 0.06), 50); }
  function crushSound() { note(0, "D3", 0.1); note(1, "G2", 0.12); }
  function deathSound() { note(0, "C3", 0.15); note(1, "G2", 0.15); setTimeout(() => { note(0, "A2", 0.2); }, 120); }
  function clearSound() {
    note(0, "C5", 0.08);
    setTimeout(() => note(0, "E5", 0.08), 80);
    setTimeout(() => note(0, "G5", 0.08), 160);
    setTimeout(() => note(0, "C6", 0.15), 240);
  }
  function extraSound() {
    note(0, "G5", 0.06);
    setTimeout(() => note(0, "B5", 0.06), 60);
    setTimeout(() => note(0, "D6", 0.1), 120);
  }

  resetGame();

  // ============================================================
  // Update
  // ============================================================
  function updatePlay() {
    if (deathTimer > 0) {
      deathTimer--;
      for (let i = particles.length - 1; i >= 0; i--) {
        const p = particles[i]; p.x += p.vx; p.y += p.vy; p.vy += 0.06; p.life--;
        if (p.life <= 0) particles.splice(i, 1);
      }
      if (deathTimer === 0) {
        if (lives <= 0) { Mono.go(GAMEOVER); return; }
        else {
          const startTX = flr(MAP_W / 2);
          const startTY = MAP_H - 3;
          player.x = startTX * TILE;
          player.y = startTY * TILE + FIELD_Y;
          invincTimer = 90;
          ball = null;
        }
      }
      return;
    }

    if (levelClearTimer > 0) {
      levelClearTimer--;
      if (levelClearTimer === 0) nextLevel();
      return;
    }

    if (invincTimer > 0) invincTimer--;
    playerFrame = (playerFrame + 1) % 20;

    // Player movement
    let dx = 0, dy = 0;
    if (btn("right")) { dx = 1; playerDir = 0; }
    else if (btn("left")) { dx = -1; playerDir = 1; }
    else if (btn("up")) { dy = -1; playerDir = 2; }
    else if (btn("down")) { dy = 1; playerDir = 3; }

    if (dx !== 0 || dy !== 0) {
      const nx = player.x + dx * player.speed;
      const ny = player.y + dy * player.speed;

      // Bounds check (keep within playfield)
      if (nx >= 0 && nx <= (MAP_W - 1) * TILE && ny >= FIELD_Y && ny <= FIELD_Y + (MAP_H - 1) * TILE) {
        player.x = nx;
        player.y = ny;

        // Dig through dirt and collect cherries at player tile
        const ptx = flr(player.x / TILE);
        const pty = flr((player.y - FIELD_Y) / TILE);
        // Check tiles the player overlaps
        for (let cdy = 0; cdy <= 0; cdy++) {
          for (let cdx = 0; cdx <= 0; cdx++) {
            const gx = ptx + cdx;
            const gy = pty + cdy;
            if (gx >= 0 && gx < MAP_W && gy >= 0 && gy < MAP_H) {
              if (grid[gy][gx] === T_DIRT) {
                grid[gy][gx] = T_EMPTY;
              } else if (grid[gy][gx] === T_CHERRY) {
                // Circle collision between player center and cherry center
                const cherCX = gx * TILE + 8;
                const cherCY = gy * TILE + FIELD_Y + 8;
                if (circHit(cx(player.x), cy(player.y), R_PLAYER, cherCX, cherCY, R_CHERRY)) {
                  grid[gy][gx] = T_EMPTY;
                  cherryCount++;
                  score += 50;
                  cherrySound();
                }
              }
            }
          }
        }

        // Also dig tiles in the direction of movement
        const dtx = flr((player.x + dx * 8 + 8) / TILE);
        const dty = flr((player.y + dy * 8 + 8 - FIELD_Y) / TILE);
        if (dtx >= 0 && dtx < MAP_W && dty >= 0 && dty < MAP_H) {
          if (grid[dty][dtx] === T_DIRT) {
            grid[dty][dtx] = T_EMPTY;
          } else if (grid[dty][dtx] === T_CHERRY) {
            const cherCX = dtx * TILE + 8;
            const cherCY = dty * TILE + FIELD_Y + 8;
            if (circHit(cx(player.x), cy(player.y), R_PLAYER + 4, cherCX, cherCY, R_CHERRY)) {
              grid[dty][dtx] = T_EMPTY;
              cherryCount++;
              score += 50;
              cherrySound();
            }
          }
        }

        // Check if player pushes an apple (circle-circle)
        for (const a of apples) {
          if (a.falling) continue;
          const pcx = cx(player.x), pcy = cy(player.y);
          const acx = cx(a.px), acy = cy(a.py);
          if (circHit(pcx, pcy, R_PLAYER, acx, acy, R_APPLE)) {
            // Push apple in movement direction (only horizontal)
            if (dx !== 0) {
              const newATX = a.tx + dx;
              if (newATX >= 0 && newATX < MAP_W) {
                if (gridGet(newATX, a.ty) === T_EMPTY || gridGet(newATX, a.ty) === T_DIRT) {
                  grid[a.ty][a.tx] = T_EMPTY;
                  a.tx += dx;
                  a.px = a.tx * TILE;
                  grid[a.ty][a.tx] = T_APPLE;
                  if (a.ty + 1 < MAP_H && gridGet(a.tx, a.ty + 1) === T_EMPTY) {
                    a.falling = true;
                    a.fallSpeed = 0;
                    a.settled = false;
                    grid[a.ty][a.tx] = T_EMPTY;
                  }
                }
              }
              player.x -= dx * player.speed;
            }
          }
        }
      }
    }

    // Power ball throw
    if (btnp("a") && !ball) {
      const bdx = [1, -1, 0, 0][playerDir];
      const bdy = [0, 0, -1, 1][playerDir];
      ball = {
        x: player.x + 2,
        y: player.y + 2,
        vx: bdx * 4.5,
        vy: bdy * 4.5,
        bounces: 0,
        maxBounces: 4 + level,
        alive: true,
      };
      throwSound();
    }

    // Update power ball
    if (ball && ball.alive) {
      ball.x += ball.vx;
      ball.y += ball.vy;

      // Bounce off playfield walls
      if (ball.x < 0 || ball.x > (MAP_W - 1) * TILE) {
        ball.vx = -ball.vx;
        ball.x = ball.x < 0 ? 0 : (MAP_W - 1) * TILE;
        ball.bounces++;
        bounceSound();
      }
      if (ball.y < FIELD_Y || ball.y > FIELD_Y + (MAP_H - 1) * TILE) {
        ball.vy = -ball.vy;
        ball.y = ball.y < FIELD_Y ? FIELD_Y : FIELD_Y + (MAP_H - 1) * TILE;
        ball.bounces++;
        bounceSound();
      }

      // Bounce off dirt walls
      const btx = flr((ball.x + 8) / TILE);
      const bty = flr((ball.y + 8 - FIELD_Y) / TILE);
      if (btx >= 0 && btx < MAP_W && bty >= 0 && bty < MAP_H) {
        if (grid[bty][btx] === T_DIRT) {
          ball.vx = -ball.vx;
          ball.vy = -ball.vy;
          ball.bounces++;
          bounceSound();
        }
      }

      // Ball kills enemies (circle-circle)
      for (let i = enemies.length - 1; i >= 0; i--) {
        const e = enemies[i];
        if (!e.alive) continue;
        if (circHit(cx(ball.x), cy(ball.y), R_BALL, cx(e.x), cy(e.y), R_ENEMY)) {
          e.alive = false;
          addExplosion(e.x, e.y);
          score += 100;
          killSound();
          if (e.extra && e.extraLetter) {
            if (extraLetters.indexOf(e.extraLetter) === -1) {
              extraLetters += e.extraLetter;
              extraSound();
              if (extraLetters.length >= 5) {
                lives++;
                extraLetters = "";
              }
            }
          }
          ball.alive = false;
          ball = null;
          enemies.splice(i, 1);
          break;
        }
      }

      // Ball returns to player after max bounces
      if (ball && ball.bounces >= ball.maxBounces) {
        const tdx = player.x - ball.x;
        const tdy = player.y - ball.y;
        const dist = Math.sqrt(tdx * tdx + tdy * tdy);
        if (dist < 10) {
          ball = null;
        } else if (dist > 0) {
          ball.vx = (tdx / dist) * 4.5;
          ball.vy = (tdy / dist) * 4.5;
        }
      }
    }

    // Update apples - gravity
    for (let i = apples.length - 1; i >= 0; i--) {
      const a = apples[i];

      // Check if apple should start falling
      if (!a.falling && a.ty + 1 < MAP_H && gridGet(a.tx, a.ty + 1) === T_EMPTY) {
        a.falling = true;
        a.fallSpeed = 0;
        a.settled = false;
        grid[a.ty][a.tx] = T_EMPTY;
      }

      if (a.falling) {
        a.fallSpeed = min(a.fallSpeed + 0.4, 4.5);
        a.py += a.fallSpeed;

        const newTY = flr((a.py - FIELD_Y) / TILE);
        if (newTY + 1 >= MAP_H || (newTY !== a.ty && newTY + 1 < MAP_H && gridGet(a.tx, newTY + 1) !== T_EMPTY)) {
          a.falling = false;
          a.ty = newTY;
          a.py = a.ty * TILE + FIELD_Y;
          if (a.ty >= 0 && a.ty < MAP_H) grid[a.ty][a.tx] = T_APPLE;
          a.settled = true;
          crushSound();
          if (a.fallSpeed >= 3.5) {
            addExplosion(a.px, a.py);
            if (a.ty >= 0 && a.ty < MAP_H) grid[a.ty][a.tx] = T_EMPTY;
            apples.splice(i, 1);
            continue;
          }
        }

        // Apple crushes enemies (circle-circle)
        for (let j = enemies.length - 1; j >= 0; j--) {
          const e = enemies[j];
          if (!e.alive) continue;
          if (circHit(cx(a.px), cy(a.py), R_APPLE, cx(e.x), cy(e.y), R_ENEMY)) {
            e.alive = false;
            addExplosion(e.x, e.y);
            score += 200;
            crushSound();
            enemies.splice(j, 1);
          }
        }

        // Apple hits player (circle-circle, only if falling fast)
        if (a.fallSpeed > 1.5 && invincTimer <= 0) {
          if (circHit(cx(a.px), cy(a.py), R_APPLE, cx(player.x), cy(player.y), R_PLAYER)) {
            playerDeath();
          }
        }
      }
    }

    // Update enemies
    for (const e of enemies) {
      if (!e.alive) continue;

      e.animFrame = (e.animFrame + 1) % 16;
      e.chaseTimer--;

      if (e.chaseTimer <= 0) e.chaseMode = true;

      e.moveTimer++;
      if (e.moveTimer < 3) continue;
      e.moveTimer = 0;

      const pdx = player.x - e.x;
      const pdy = player.y - e.y;
      const etx = flr(e.x / TILE);
      const ety = flr((e.y - FIELD_Y) / TILE);

      // Possible moves
      const moves = [];
      if (etx + 1 < MAP_W && (gridGet(etx + 1, ety) === T_EMPTY || gridGet(etx + 1, ety) === T_CHERRY))
        moves.push({ dx: 1, dy: 0, dir: 0 });
      if (etx - 1 >= 0 && (gridGet(etx - 1, ety) === T_EMPTY || gridGet(etx - 1, ety) === T_CHERRY))
        moves.push({ dx: -1, dy: 0, dir: 1 });
      if (ety - 1 >= 0 && (gridGet(etx, ety - 1) === T_EMPTY || gridGet(etx, ety - 1) === T_CHERRY))
        moves.push({ dx: 0, dy: -1, dir: 2 });
      if (ety + 1 < MAP_H && (gridGet(etx, ety + 1) === T_EMPTY || gridGet(etx, ety + 1) === T_CHERRY))
        moves.push({ dx: 0, dy: 1, dir: 3 });

      // Chasing enemies can dig
      if (e.chaseMode && moves.length < 2 && rnd(1) < 0.15) {
        if (etx + 1 < MAP_W && gridGet(etx + 1, ety) === T_DIRT && pdx > 0)
          moves.push({ dx: 1, dy: 0, dir: 0, dig: true });
        if (etx - 1 >= 0 && gridGet(etx - 1, ety) === T_DIRT && pdx < 0)
          moves.push({ dx: -1, dy: 0, dir: 1, dig: true });
        if (ety - 1 >= 0 && gridGet(etx, ety - 1) === T_DIRT && pdy < 0)
          moves.push({ dx: 0, dy: -1, dir: 2, dig: true });
        if (ety + 1 < MAP_H && gridGet(etx, ety + 1) === T_DIRT && pdy > 0)
          moves.push({ dx: 0, dy: 1, dir: 3, dig: true });
      }

      if (moves.length > 0) {
        let chosen;
        if (e.chaseMode && rnd(1) < 0.7) {
          let bestDist = 99999;
          for (const m of moves) {
            const nx = etx + m.dx;
            const ny = ety + m.dy;
            const d = _abs(nx * TILE - player.x) + _abs(ny * TILE + FIELD_Y - player.y);
            if (d < bestDist) { bestDist = d; chosen = m; }
          }
        } else {
          const nonReverse = moves.filter(m => {
            if (e.dir === 0 && m.dir === 1) return false;
            if (e.dir === 1 && m.dir === 0) return false;
            if (e.dir === 2 && m.dir === 3) return false;
            if (e.dir === 3 && m.dir === 2) return false;
            return true;
          });
          const pool = nonReverse.length > 0 ? nonReverse : moves;
          chosen = pool[flr(rnd(pool.length))];
        }

        if (chosen) {
          if (chosen.dig) {
            const nx = etx + chosen.dx;
            const ny = ety + chosen.dy;
            if (ny >= 0 && ny < MAP_H && nx >= 0 && nx < MAP_W)
              grid[ny][nx] = T_EMPTY;
          }
          e.x += chosen.dx * TILE;
          e.y += chosen.dy * TILE;
          e.dir = chosen.dir;
          e.tx = etx + chosen.dx;
          e.ty = ety + chosen.dy;
        }
      }

      // Enemy-player collision (circle-circle)
      if (invincTimer <= 0 && circHit(cx(e.x), cy(e.y), R_ENEMY, cx(player.x), cy(player.y), R_PLAYER)) {
        playerDeath();
      }
    }

    // Remove dead enemies
    for (let i = enemies.length - 1; i >= 0; i--) {
      if (!enemies[i].alive) enemies.splice(i, 1);
    }

    // Explosions
    for (let i = explosions.length - 1; i >= 0; i--) {
      explosions[i].timer--;
      if (explosions[i].timer <= 0) explosions.splice(i, 1);
    }

    // Particles
    for (let i = particles.length - 1; i >= 0; i--) {
      const p = particles[i]; p.x += p.vx; p.y += p.vy; p.vy += 0.05; p.life--;
      if (p.life <= 0) particles.splice(i, 1);
    }

    // Level clear check
    const allCherriesGone = cherryCount >= totalCherries && totalCherries > 0;
    const allEnemiesGone = enemies.length === 0;
    if ((allCherriesGone || allEnemiesGone) && levelClearTimer === 0 && deathTimer === 0) {
      levelClearTimer = 90;
      clearSound();
    }
  }

  function playerDeath() {
    lives--;
    addExplosion(player.x, player.y);
    deathSound();
    deathTimer = 60;
  }

  // ============================================================
  // Draw
  // ============================================================
  function drawGameOverScreen() {
    cls(0);
    for (const p of particles) pix(flr(p.x), flr(p.y), p.color);
    text("GAME OVER", 120, 90, 3);
    text("SCORE: " + score, 120, 110, 2);
    text("LEVEL: " + level, 125, 122, 2);
    if (extraLetters.length > 0) text("EXTRA: " + extraLetters, 118, 134, 2);
    if (flr(Mono.frame / 20) % 2 === 0) text("PRESS START", 110, 160, 3);
  }

  function drawPlayScene() {
    cls(0);

    // Draw dirt, cherries (using sprT for transparency)
    for (let ty = 0; ty < MAP_H; ty++) {
      for (let tx = 0; tx < MAP_W; tx++) {
        const t = grid[ty][tx];
        const px = tx * TILE;
        const py = ty * TILE + FIELD_Y;
        if (t === T_DIRT) {
          const c1 = ((tx + ty) % 3 === 0) ? 2 : 1;
          rectf(px, py, TILE, TILE, c1);
          if ((tx * 7 + ty * 13) % 5 === 0) pix(px + 6, py + 6, 2);
          if ((tx * 11 + ty * 3) % 7 === 0) pix(px + 10, py + 10, 0);
        } else if (t === T_CHERRY) {
          sprT(5, px, py);
          // Debug: circle hitbox for cherry
          Mono.dbgC(px + 8, py + 8, R_CHERRY);
        }
      }
    }

    // Draw apples
    for (const a of apples) {
      const drawSpr = a.falling ? 15 : 6;
      sprT(drawSpr, flr(a.px), flr(a.py));
      // Debug: circle hitbox for apple
      Mono.dbgC(cx(a.px), cy(a.py), R_APPLE);
    }

    // Draw power ball
    if (ball && ball.alive) {
      sprT(9, flr(ball.x), flr(ball.y));
      // Trail sparkle
      if (Mono.frame % 2 === 0) {
        pix(ball.x + 4 + rnd(8), ball.y + 4 + rnd(8), 2);
      }
      // Debug: circle hitbox for ball
      Mono.dbgC(cx(ball.x), cy(ball.y), R_BALL);
    }

    // Draw enemies
    for (const e of enemies) {
      if (!e.alive) continue;
      const sprId = e.extra ? 14 : (e.animFrame < 8 ? 7 : 8);
      sprT(sprId, flr(e.x), flr(e.y));
      // Debug: circle hitbox for enemy
      Mono.dbgC(cx(e.x), cy(e.y), R_ENEMY);
      if (e.extra && e.extraLetter) {
        text(e.extraLetter, flr(e.x) + 5, flr(e.y) - 9, 3);
      }
    }

    // Draw player (blink when invincible)
    if (deathTimer === 0 && !(invincTimer > 0 && flr(Mono.frame / 3) % 2 === 0)) {
      const pSpr = playerDir === 0 ? (playerFrame < 10 ? 1 : 16) :
                   playerDir === 1 ? (playerFrame < 10 ? 2 : 16) :
                   playerDir === 2 ? (playerFrame < 10 ? 3 : 17) :
                   (playerFrame < 10 ? 4 : 4);
      const flipX = playerDir === 1;
      sprT(pSpr, flr(player.x), flr(player.y), flipX);
      // Debug: circle hitbox for player
      Mono.dbgC(cx(player.x), cy(player.y), R_PLAYER);
    }

    // Explosions
    for (const e of explosions) {
      const sprId = e.timer > 7 ? 11 : 12;
      sprT(sprId, flr(e.x), flr(e.y));
    }

    // Particles
    for (const p of particles) pix(flr(p.x), flr(p.y), p.color);

    // --- Top HUD ---
    rectf(0, 0, W, HUD_TOP, 0);
    text("SCORE:" + score, 3, 5, 3);
    text("LV:" + level, W / 2 - 12, 5, 2);

    // Lives
    for (let i = 0; i < lives; i++) sprT(13, W - 52 + i * 16, 0);

    // EXTRA letters display
    if (extraLetters.length > 0) {
      text("EXTRA", W / 2 + 20, 5, 1);
      for (let i = 0; i < extraLetters.length; i++) {
        text(extraLetters[i], W / 2 + 20 + ("EXTRA".indexOf(extraLetters[i])) * 5, 5, 3);
      }
    }

    // Ball indicator
    if (!ball) {
      circf(W - 56, 8, 3, 3);
    }

    // --- Bottom HUD ---
    rectf(0, H - HUD_BOT, W, HUD_BOT, 0);
    text("CHERRIES:" + cherryCount + "/" + totalCherries, 3, H - 12, 2);
    text("ENEMIES:" + enemies.length, W - 65, H - 12, 2);

    // Level clear message
    if (levelClearTimer > 0) {
      const msgY = 110 + sin(levelClearTimer * 0.1) * 3;
      rectf(100, flr(msgY) - 4, 120, 20, 0);
      rect(101, flr(msgY) - 3, 118, 18, 2);
      text("LEVEL CLEAR!", 115, flr(msgY) + 2, 3);
    }
  }

  function drawTitle() {
    // Animated background dirt pattern
    for (let ty = 0; ty < 15; ty++) {
      for (let tx = 0; tx < 20; tx++) {
        if ((tx + ty + flr(Mono.frame / 30)) % 4 !== 0) {
          const c = ((tx + ty) % 3 === 0) ? 1 : 0;
          if (c > 0) rectf(tx * 16, ty * 16, 16, 16, c);
        }
      }
    }

    // Title box
    rectf(72, 30, 176, 44, 0);
    rect(74, 32, 172, 40, 2);

    const ty = 38 + sin(Mono.frame * 0.05) * 3;
    text("MR. DO!", 128, flr(ty), 3);
    rectf(100, flr(ty) + 10, 120, 1, 2);
    text("A MONO DEMO", 116, flr(ty) + 16, 1);

    // Animated characters
    const midX = W / 2;
    // Mr. Do bouncing
    const doY = 88 + sin(Mono.frame * 0.1) * 4;
    sprT(1, midX - 8, flr(doY));
    // Power ball orbit
    const bx = midX + cos(Mono.frame * 0.08) * 30;
    const by = 96 + sin(Mono.frame * 0.08) * 12;
    sprT(9, flr(bx) - 8, flr(by));

    // Enemies marching
    for (let i = 0; i < 4; i++) {
      const ex = 88 + i * 40;
      const ey = 128 + sin(Mono.frame * 0.07 + i) * 3;
      sprT(i === 1 ? 14 : (flr(Mono.frame / 8) % 2 === 0 ? 7 : 8), flr(ex), flr(ey));
    }

    // Cherries decoration
    for (let i = 0; i < 4; i++) {
      sprT(5, 80 + i * 48, 152);
    }

    // Apple
    sprT(6, midX - 8, 170);

    if (flr(Mono.frame / 20) % 2 === 0) text("PRESS START", 110, 194, 3);

    // Instructions
    text("DIG THROUGH DIRT", 112, 208, 2);
    text("COLLECT CHERRIES", 112, 216, 2);
    text("THROW POWER BALL", 112, 224, 2);

    text("MONO DEMO V0.2", 112, H - 10, 1);
  }

  // --- Title Scene ---
  Mono.scene(TITLE, {
    init() {},
    update() {
      if (btnp("start") || btnp("a")) {
        resetGame();
        note(0, "C5", 0.08);
        setTimeout(() => note(0, "E5", 0.08), 80);
        setTimeout(() => note(0, "G5", 0.12), 160);
        Mono.go(PLAY);
        return;
      }
    },
    draw() { cls(0); drawTitle(); }
  });

  // --- Play Scene ---
  Mono.scene(PLAY, {
    init() {},
    update() { updatePlay(); },
    draw() { drawPlayScene(); }
  });

  // --- Game Over Scene ---
  Mono.scene(GAMEOVER, {
    init() {},
    update() {
      for (let i = particles.length - 1; i >= 0; i--) {
        const p = particles[i]; p.x += p.vx; p.y += p.vy; p.vy += 0.06; p.life--;
        if (p.life <= 0) particles.splice(i, 1);
      }
      if (btnp("start") || btnp("a")) { Mono.go(TITLE); return; }
    },
    draw() { drawGameOverScreen(); }
  });

  Mono.go(TITLE);
  Mono.boot("screen");
})();
</script>
