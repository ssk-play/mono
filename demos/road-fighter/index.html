<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mono — Demo: Road Fighter</title>
<link rel="stylesheet" href="../../runtime/mono.css">
</head>
<body>
<div id="frame">
  <canvas id="screen"></canvas>
</div>
<div id="controls">
  <span>&larr;&rarr;</span> STEER &nbsp;&nbsp; <span>&uarr;</span> ACCEL &nbsp;&nbsp; <span>&darr;</span> BRAKE
</div>
<script src="../../runtime/engine.js"></script>
<script>
(() => {
  "use strict";
  const W = Mono.WIDTH, H = Mono.HEIGHT;
  const { cls, pix, line, rect, rectf, circ, circf, sprite: defSprite,
          spr, sprT, text, btn, btnp, note, stop, rnd, flr, abs: _abs,
          min, max: _max, sin, cos, dbg, dbgC } = Mono;

  // --- 8x8 -> 16x16 upscale helper ---
  function up(d) {
    let o = "";
    for (let r = 0; r < 8; r++) {
      let row = "";
      for (let c = 0; c < 8; c++) {
        const ch = d[r * 8 + c];
        row += ch + ch;
      }
      o += row + row;
    }
    return o;
  }

  // Sprite size constant (engine native 16x16)
  const SS = 16;
  const SH = SS / 2; // half-sprite for centering

  // Transparent rotated sprite (color 0 = skip)
  function sprRotT(id, cx, cy, angle) {
    const s = Mono._sprites[id]; if (!s) return;
    const cosA = Math.cos(angle), sinA = Math.sin(angle);
    for (let py = -10; py <= 10; py++) {
      for (let px = -10; px <= 10; px++) {
        const srcX = Math.floor(cosA * px + sinA * py + 7.5);
        const srcY = Math.floor(-sinA * px + cosA * py + 7.5);
        if (srcX < 0 || srcX >= 16 || srcY < 0 || srcY >= 16) continue;
        const c = s[srcY * 16 + srcX];
        if (c === 0) continue;
        const dx = Math.floor(cx + px), dy = Math.floor(cy + py);
        if (dx >= 0 && dx < W && dy >= 0 && dy < H)
          Mono._buf32[dy * W + dx] = Mono._COLOR_U32[c];
      }
    }
  }

  // --- Sprites (all 16x16 via up()) ---

  // 1: Player car (top-down, facing up)
  defSprite(1, up(
    "03000030" +
    "33311333" +
    "33333333" +
    "32322323" +
    "33333333" +
    "33333333" +
    "32322323" +
    "03000030"
  ));
  // 2: Traffic car A (sedan - lighter)
  defSprite(2, up(
    "02000020" +
    "22222222" +
    "22222222" +
    "21211212" +
    "22222222" +
    "22222222" +
    "21211212" +
    "02000020"
  ));
  // 3: Traffic car B (truck - wider, darker)
  defSprite(3, up(
    "01000010" +
    "11111111" +
    "12121211" +
    "11111111" +
    "11111111" +
    "11111111" +
    "12121211" +
    "01000010"
  ));
  // 4: Traffic car C (sports car - fast looking)
  defSprite(4, up(
    "00200200" +
    "02222220" +
    "22222222" +
    "21211212" +
    "22222222" +
    "02222220" +
    "21200212" +
    "00200200"
  ));
  // 5: Oil slick
  defSprite(5, up(
    "00000000" +
    "00111000" +
    "01111100" +
    "01111110" +
    "01111110" +
    "01111100" +
    "00111100" +
    "00000000"
  ));
  // 6: Fuel canister
  defSprite(6, up(
    "00333000" +
    "00323000" +
    "03333300" +
    "03233200" +
    "03233200" +
    "03233200" +
    "03333300" +
    "00000000"
  ));
  // 7: Explosion frame 1
  defSprite(7, up(
    "00000000" +
    "00200100" +
    "01002000" +
    "00031000" +
    "00130200" +
    "01000010" +
    "00100000" +
    "00000000"
  ));
  // 8: Explosion frame 2
  defSprite(8, up(
    "20010020" +
    "01000010" +
    "00203200" +
    "03033030" +
    "00232000" +
    "01000300" +
    "20001001" +
    "00200010"
  ));
  // 9: Life icon (mini car)
  defSprite(9, up(
    "00000000" +
    "00000000" +
    "03300330" +
    "03333330" +
    "03233230" +
    "03333330" +
    "03300330" +
    "00000000"
  ));
  // 10: Road marker / dash
  defSprite(10, up(
    "00000000" +
    "00033000" +
    "00033000" +
    "00033000" +
    "00033000" +
    "00033000" +
    "00033000" +
    "00000000"
  ));
  // 11: Checkpoint flag
  defSprite(11, up(
    "03333300" +
    "03232300" +
    "03323300" +
    "03232300" +
    "00300000" +
    "00300000" +
    "00300000" +
    "00300000"
  ));

  // --- Game constants ---
  const ROAD_W = 107;           // road width in pixels
  const ROAD_CENTER = W / 2;    // center of screen
  const PLAYER_Y = H - 40;      // player vertical position (adjusted for 16px sprite)
  const MAX_SPEED = 12;
  const ACCEL = 0.12;
  const BRAKE_DECEL = 0.25;
  const COAST_DECEL = 0.03;
  const STEER_SPEED = 2.8;
  const FUEL_MAX = 1000;
  const FUEL_DRAIN = 0.6;       // per frame at max speed
  const CHECKPOINT_DIST = 3000;  // distance per stage

  // Collision radii for circle collisions
  const PLAYER_R = 6;           // player car collision radius
  const TRAFFIC_R = 6;          // traffic car collision radius
  const OIL_R = 6;              // oil slick collision radius
  const FUEL_R = 7;             // fuel pickup radius (slightly generous)

  // --- Game state ---
  const { TITLE, PLAY, GAMEOVER } = Mono.SCENE;
  let player, traffic, oilSlicks, fuelItems, explosions, particles;
  let score, lives, speed, fuel, distance, stage;
  let roadCurve, roadCurveTarget, roadCurveTimer;
  let roadOffset;   // visual scroll offset for lane markers
  let spinTimer, spinAngle;
  let invincibleTimer;
  let checkpointFlash;
  let titleCarY;
  let engineSoundTimer;

  function resetGame() {
    player = { x: ROAD_CENTER, y: PLAYER_Y };
    traffic = [];
    oilSlicks = [];
    fuelItems = [];
    explosions = [];
    particles = [];
    score = 0;
    lives = 3;
    speed = 0;
    fuel = FUEL_MAX;
    distance = 0;
    stage = 1;
    roadCurve = 0;
    roadCurveTarget = 0;
    roadCurveTimer = 0;
    roadOffset = 0;
    spinTimer = 0;
    spinAngle = 0;
    invincibleTimer = 0;
    checkpointFlash = 0;
    engineSoundTimer = 0;
  }

  function addExplosion(x, y) {
    explosions.push({ x: x, y: y, timer: 14 });
    for (let i = 0; i < 12; i++)
      particles.push({
        x: x + SH, y: y + SH,
        vx: rnd(6) - 3, vy: rnd(6) - 3,
        life: 8 + flr(rnd(12)),
        color: flr(rnd(3)) + 1
      });
  }

  // Circle-circle distance check
  function circHit(ax, ay, ar, bx, by, br) {
    const dx = ax - bx, dy = ay - by;
    const dist = ar + br;
    return dx * dx + dy * dy < dist * dist;
  }

  function crashSound() {
    note(0, "C2", 0.15); note(1, "E2", 0.12);
    setTimeout(() => { note(0, "A1", 0.2); }, 80);
  }
  function spinSound() {
    note(0, "G3", 0.08);
    setTimeout(() => note(0, "E3", 0.08), 60);
    setTimeout(() => note(0, "C3", 0.1), 120);
  }
  function fuelSound() {
    note(1, "E5", 0.06);
    setTimeout(() => note(1, "G5", 0.06), 50);
    setTimeout(() => note(1, "C6", 0.08), 100);
  }
  function checkpointSound() {
    note(0, "C5", 0.1); note(1, "E5", 0.1);
    setTimeout(() => { note(0, "E5", 0.1); note(1, "G5", 0.1); }, 120);
    setTimeout(() => { note(0, "G5", 0.1); note(1, "C6", 0.1); }, 240);
    setTimeout(() => { note(0, "C6", 0.2); note(1, "E6", 0.2); }, 360);
  }

  // Get road edges at a given screen Y, accounting for curve
  function getRoadEdges(screenY) {
    const perspectiveScale = 0.4 + 0.6 * (screenY / H);
    const curveShift = roadCurve * (H - screenY) * 0.008;
    const halfW = (ROAD_W * perspectiveScale) / 2;
    const cx = ROAD_CENTER + curveShift;
    return { left: cx - halfW, right: cx + halfW, center: cx };
  }

  // Spawn a traffic car
  function spawnTraffic() {
    const edges = getRoadEdges(0);
    const laneW = (edges.right - edges.left) / 4;
    const lane = flr(rnd(4));
    const x = edges.left + laneW * lane + laneW / 2 - SH;
    const types = [2, 3, 4];
    const type = types[flr(rnd(types.length))];
    const baseSpd = 1.5 + stage * 0.3;
    const carSpeed = baseSpd + rnd(2);
    traffic.push({
      x: x, y: -SS - 4, type: type,
      speed: carSpeed, lane: lane
    });
  }

  // Spawn oil slick
  function spawnOil() {
    const edges = getRoadEdges(0);
    const x = edges.left + rnd(edges.right - edges.left - SS);
    oilSlicks.push({ x: x, y: -SS - 4 });
  }

  // Spawn fuel item
  function spawnFuel() {
    const edges = getRoadEdges(0);
    const x = edges.left + rnd(edges.right - edges.left - SS);
    fuelItems.push({ x: x, y: -SS - 4 });
  }

  // --- Title Scene ---
  Mono.scene(TITLE, {
    init() { titleCarY = 0; },
    update() {
      titleCarY = (titleCarY || 0) + 1;
      if (titleCarY > H + 30) titleCarY = -30;
      if (btnp("start") || btnp("a")) {
        resetGame();
        speed = 2;
        note(0, "C5", 0.08);
        setTimeout(() => note(0, "E5", 0.08), 80);
        setTimeout(() => note(0, "G5", 0.12), 160);
        Mono.go(PLAY); return;
      }
    },
    draw() {
      cls(0);
      // Draw road lines for ambiance
      for (let y = 0; y < H; y++) {
        const edges = getRoadEdges(y);
        const left = flr(edges.left);
        const right = flr(edges.right);
        const buf32 = Mono._buf32;
        const COLOR_U32 = Mono._COLOR_U32;
        for (let x = _max(0, left); x < min(W, right); x++) {
          buf32[y * W + x] = COLOR_U32[0];
        }
        if (left >= 0 && left < W) buf32[y * W + left] = COLOR_U32[1];
        if (right - 1 >= 0 && right - 1 < W) buf32[y * W + right - 1] = COLOR_U32[1];
      }

      const ty = 38 + sin(Mono.frame * 0.04) * 4;
      text("ROAD FIGHTER", 130, flr(ty), 3);
      text("ROAD FIGHTER", 131, flr(ty) + 1, 1);
      rectf(107, flr(ty) + 12, 107, 1, 2);

      const carY1 = ((titleCarY || 0) * 2) % (H + 50) - 25;
      const carY2 = ((titleCarY || 0) * 2 + 120) % (H + 50) - 25;
      const carY3 = ((titleCarY || 0) * 2 + 240) % (H + 50) - 25;
      sprT(1, W / 2 - SH, flr(ty) + 24 + sin(Mono.frame * 0.1) * 2);
      sprT(2, W / 2 - 24, carY1);
      sprT(3, W / 2 + 16, carY2);
      sprT(4, W / 2 - 16, carY3);

      if (flr(Mono.frame / 20) % 2 === 0) text("PRESS START", 132, 135, 3);
      text("STEER TO AVOID TRAFFIC", 105, 158, 2);
      text("COLLECT FUEL TO SURVIVE", 102, 166, 2);
      text("REACH CHECKPOINTS", 117, 176, 2);
      text("-SCORING-", 137, 195, 2);
      sprT(6, 120, 202); text("  FUEL    +100", 136, 206, 2);
      sprT(2, 120, 218); text("  CRASH    +50", 136, 222, 2);
    }
  });

  // --- Play Scene ---
  Mono.scene(PLAY, {
    init() { resetGame(); speed = 2; },
    update() {
    // --- Play state ---

    // Invincibility timer
    if (invincibleTimer > 0) invincibleTimer--;

    // Checkpoint flash
    if (checkpointFlash > 0) checkpointFlash--;

    // Spin recovery
    if (spinTimer > 0) {
      spinTimer--;
      spinAngle += 0.3;
      speed *= 0.96;
      if (speed < 0.5) speed = 0.5;
      if (spinTimer <= 0) {
        spinAngle = 0;
        invincibleTimer = 45;
      }
      // Still allow some steering while spinning
      if (btn("left")) player.x -= STEER_SPEED * 0.3;
      if (btn("right")) player.x += STEER_SPEED * 0.3;
    } else {
      // Normal controls
      if (btn("up")) {
        speed += ACCEL;
        if (speed > MAX_SPEED) speed = MAX_SPEED;
      } else if (btn("down")) {
        speed -= BRAKE_DECEL;
        if (speed < 0) speed = 0;
      } else {
        speed -= COAST_DECEL;
        if (speed < 0) speed = 0;
      }

      const steerMult = 0.5 + 0.5 * (speed / MAX_SPEED);
      if (btn("left")) player.x -= STEER_SPEED * steerMult;
      if (btn("right")) player.x += STEER_SPEED * steerMult;
    }

    // Road curve influence on player
    player.x -= roadCurve * speed * 0.003;

    // Clamp player to screen
    player.x = _max(4, min(W - SS - 4, player.x));

    // Road curve changes
    roadCurveTimer--;
    if (roadCurveTimer <= 0) {
      roadCurveTarget = (rnd(2) - 1) * (20 + stage * 5);
      roadCurveTimer = 90 + flr(rnd(120));
    }
    roadCurve += (roadCurveTarget - roadCurve) * 0.02;

    // Distance and score
    distance += speed * 0.5;
    score = flr(distance);

    // Road scroll offset for lane markers
    roadOffset += speed;
    if (roadOffset > 32) roadOffset -= 32;

    // Fuel drain
    fuel -= FUEL_DRAIN * (speed / MAX_SPEED);
    if (fuel <= 0) {
      fuel = 0;
      speed *= 0.97;
      if (speed < 0.3) {
        // Out of fuel = game over
        addExplosion(player.x, player.y);
        crashSound();
        Mono.go(GAMEOVER); return;
      }
    }

    // Player center for circle collisions
    const pcx = player.x + SH;
    const pcy = player.y + SH;

    // Check road edges for player collision
    const playerEdges = getRoadEdges(PLAYER_Y);
    if (spinTimer <= 0 && invincibleTimer <= 0) {
      if (player.x < playerEdges.left - 2 || player.x + SS > playerEdges.right + 2) {
        // Hit road edge - lose life!
        lives--;
        addExplosion(player.x, player.y);
        crashSound();
        speed = 0;
        player.x = playerEdges.center - SH;
        invincibleTimer = 60;
        if (lives <= 0) {
          Mono.go(GAMEOVER); return;
        }
      }
    }

    // Checkpoint check
    if (distance >= stage * CHECKPOINT_DIST) {
      stage++;
      checkpointFlash = 90;
      fuel = min(fuel + 400, FUEL_MAX);
      checkpointSound();
    }

    // Engine sound
    if (speed > 1) {
      engineSoundTimer--;
      if (engineSoundTimer <= 0) {
        const pitch = speed > 8 ? "A3" : speed > 4 ? "F3" : "D3";
        note(1, pitch, 0.03);
        engineSoundTimer = speed > 8 ? 4 : speed > 4 ? 6 : 8;
      }
    }

    // Spawn traffic
    const spawnRate = _max(8, 30 - stage * 3 - flr(speed));
    if (Mono.frame % spawnRate === 0 && speed > 1) {
      spawnTraffic();
    }

    // Spawn oil slicks
    if (Mono.frame % 120 === 0 && speed > 2) {
      spawnOil();
    }

    // Spawn fuel items
    if (Mono.frame % 200 === 0 && speed > 1) {
      spawnFuel();
    }

    // Update traffic
    const scrollSpeed = speed;
    for (let i = traffic.length - 1; i >= 0; i--) {
      const t = traffic[i];
      // Traffic moves down relative to player speed
      t.y += scrollSpeed - t.speed;
      // Apply curve
      const perspT = 0.4 + 0.6 * (t.y / H);
      t.x -= roadCurve * perspT * 0.05;

      if (t.y > H + 30 || t.y < -40) {
        traffic.splice(i, 1);
        continue;
      }

      // Circle collision with player
      if (spinTimer <= 0 && invincibleTimer <= 0) {
        const tcx = t.x + SH;
        const tcy = t.y + SH;
        if (circHit(pcx, pcy, PLAYER_R, tcx, tcy, TRAFFIC_R)) {
          // Spin out!
          spinTimer = 30;
          spinAngle = 0;
          speed *= 0.3;
          spinSound();
          // Knock traffic away
          addExplosion(t.x, t.y);
          traffic.splice(i, 1);
          score += 50;
        }
      }
    }

    // Update oil slicks
    for (let i = oilSlicks.length - 1; i >= 0; i--) {
      const o = oilSlicks[i];
      o.y += scrollSpeed;
      const perspO = 0.4 + 0.6 * (o.y / H);
      o.x -= roadCurve * perspO * 0.05;

      if (o.y > H + 20) {
        oilSlicks.splice(i, 1);
        continue;
      }

      // Circle collision
      if (spinTimer <= 0 && invincibleTimer <= 0) {
        const ocx = o.x + SH;
        const ocy = o.y + SH;
        if (circHit(pcx, pcy, PLAYER_R, ocx, ocy, OIL_R)) {
          spinTimer = 40;
          spinAngle = 0;
          speed *= 0.5;
          spinSound();
          oilSlicks.splice(i, 1);
        }
      }
    }

    // Update fuel items
    for (let i = fuelItems.length - 1; i >= 0; i--) {
      const f = fuelItems[i];
      f.y += scrollSpeed;
      const perspF = 0.4 + 0.6 * (f.y / H);
      f.x -= roadCurve * perspF * 0.05;

      if (f.y > H + 20) {
        fuelItems.splice(i, 1);
        continue;
      }

      // Circle pickup
      const fcx = f.x + SH;
      const fcy = f.y + SH;
      if (circHit(pcx, pcy, PLAYER_R, fcx, fcy, FUEL_R)) {
        fuel = min(fuel + 250, FUEL_MAX);
        fuelItems.splice(i, 1);
        fuelSound();
        score += 100;
      }
    }

    // Update explosions
    for (let i = explosions.length - 1; i >= 0; i--) {
      explosions[i].timer--;
      if (explosions[i].timer <= 0) explosions.splice(i, 1);
    }

    // Update particles
    for (let i = particles.length - 1; i >= 0; i--) {
      const p = particles[i];
      p.x += p.vx; p.y += p.vy; p.vy += 0.06; p.life--;
      if (p.life <= 0) particles.splice(i, 1);
    }
    },
    draw() {
    cls(0);
    const buf32 = Mono._buf32;
    const COLOR_U32 = Mono._COLOR_U32;

    // --- Draw road ---
    for (let y = 0; y < H; y++) {
      const edges = getRoadEdges(y);
      const left = flr(edges.left);
      const right = flr(edges.right);
      const roadW = right - left;

      // Road surface
      for (let x = _max(0, left); x < min(W, right); x++) {
        buf32[y * W + x] = COLOR_U32[1]; // dark grey road
      }

      // Road edge lines (white)
      if (left >= 0 && left < W) buf32[y * W + left] = COLOR_U32[3];
      if (left + 1 >= 0 && left + 1 < W) buf32[y * W + left + 1] = COLOR_U32[3];
      if (right - 1 >= 0 && right - 1 < W) buf32[y * W + right - 1] = COLOR_U32[3];
      if (right - 2 >= 0 && right - 2 < W) buf32[y * W + right - 2] = COLOR_U32[3];

      // Center dashed line
      const cx = flr(edges.center);
      const dashPhase = (y - flr(roadOffset)) % 16;
      if (dashPhase < 8) {
        if (cx >= 0 && cx < W) buf32[y * W + cx] = COLOR_U32[2];
      }

      // Lane markers (quarter lines, dashed)
      const q1 = flr(edges.left + roadW * 0.25);
      const q3 = flr(edges.left + roadW * 0.75);
      const lanePhase = (y - flr(roadOffset)) % 24;
      if (lanePhase < 6) {
        if (q1 >= 0 && q1 < W) buf32[y * W + q1] = COLOR_U32[2];
        if (q3 >= 0 && q3 < W) buf32[y * W + q3] = COLOR_U32[2];
      }

      // Shoulder rumble strips
      const shoulderPhase = (y - flr(roadOffset * 0.7)) % 8;
      if (shoulderPhase < 4) {
        for (let sx = left - 4; sx < left; sx++) {
          if (sx >= 0 && sx < W) buf32[y * W + sx] = COLOR_U32[1];
        }
        for (let sx = right; sx < right + 4; sx++) {
          if (sx >= 0 && sx < W) buf32[y * W + sx] = COLOR_U32[1];
        }
      }
    }

    // --- Play state rendering ---

    // Oil slicks
    for (const o of oilSlicks) {
      sprT(5, flr(o.x), flr(o.y));
      // Debug: oil slick hitbox
      dbgC(flr(o.x) + SH, flr(o.y) + SH, OIL_R);
    }

    // Fuel items (blink)
    for (const f of fuelItems) {
      if (flr(Mono.frame / 6) % 2 === 0 || f.y > H * 0.3) {
        sprT(6, flr(f.x), flr(f.y));
      }
      // Debug: fuel pickup radius
      dbgC(flr(f.x) + SH, flr(f.y) + SH, FUEL_R);
    }

    // Traffic cars
    for (const t of traffic) {
      sprT(t.type, flr(t.x), flr(t.y));
      // Debug: traffic hitbox
      dbgC(flr(t.x) + SH, flr(t.y) + SH, TRAFFIC_R);
    }

    // Player car
    if (invincibleTimer <= 0 || flr(Mono.frame / 3) % 2 === 0) {
      if (spinTimer > 0) {
        sprRotT(1, flr(player.x) + SH, flr(player.y) + SH, spinAngle);
      } else {
        sprT(1, flr(player.x), flr(player.y));
      }
    }
    // Debug: player hitbox
    dbgC(flr(player.x) + SH, flr(player.y) + SH, PLAYER_R);

    // Exhaust particles when accelerating
    if (speed > 3 && spinTimer <= 0 && Mono.frame % 2 === 0) {
      pix(player.x + 4 + flr(rnd(8)), player.y + SS + flr(rnd(3)), flr(rnd(2)) + 1);
    }

    // Explosions
    for (const e of explosions) {
      const sprId = e.timer > 7 ? 7 : 8;
      sprT(sprId, flr(e.x), flr(e.y));
    }

    // Particles
    for (const p of particles) pix(flr(p.x), flr(p.y), p.color);

    // Checkpoint flash
    if (checkpointFlash > 60) {
      const msgY = 75;
      text("CHECKPOINT!", 132, msgY, 3);
      text("STAGE " + stage, 140, msgY + 14, 2);
      sprT(11, 117, msgY - 2);
      sprT(11, 187, msgY - 2);
    } else if (checkpointFlash > 0 && flr(checkpointFlash / 5) % 2 === 0) {
      text("STAGE " + stage, 140, 75, 3);
    }

    // ---- HUD ----
    // Top bar background
    rectf(0, 0, W, 18, 0);

    // Score / distance
    text("DIST:" + score, 4, 3, 3);

    // Stage
    text("STAGE:" + stage, 4, 11, 2);

    // Speed indicator bar
    text("SPD", 80, 3, 2);
    rectf(93, 3, 35, 6, 0);
    rect(93, 3, 35, 6, 2);
    const speedBarW = flr((speed / MAX_SPEED) * 33);
    const speedCol = speed > 9 ? 3 : speed > 5 ? 2 : 1;
    rectf(94, 4, speedBarW, 4, speedCol);

    // Fuel gauge
    text("FUEL", 140, 3, 2);
    rectf(157, 3, 41, 6, 0);
    rect(157, 3, 41, 6, 2);
    const fuelBarW = flr((fuel / FUEL_MAX) * 39);
    const fuelCol = fuel < 200 ? (flr(Mono.frame / 8) % 2 === 0 ? 3 : 1) : fuel < 400 ? 2 : 3;
    rectf(158, 4, fuelBarW, 4, fuelCol);

    // Low fuel warning
    if (fuel < 200 && flr(Mono.frame / 10) % 2 === 0) {
      text("LOW FUEL!", 147, 11, 3);
    }

    // Lives
    for (let i = 0; i < lives; i++) sprT(9, W - 28 + i * 10, 2);

    // Next checkpoint distance
    const nextCP = stage * CHECKPOINT_DIST;
    const remaining = nextCP - flr(distance);
    if (remaining > 0) {
      text("NEXT:" + remaining, W - 53, 11, 2);
    }

    // Bottom: simple speed lines on sides for effect
    if (speed > 4) {
      const intensity = flr(speed / 3);
      for (let i = 0; i < intensity; i++) {
        const lx = flr(rnd(20));
        const ly = flr(rnd(H - 18)) + 18;
        const len = 3 + flr(rnd(speed));
        line(lx, ly, lx, ly + len, 1);
        const rx = W - flr(rnd(20));
        line(rx, ly, rx, ly + len, 1);
      }
    }
    }
  });

  // --- Game Over Scene ---
  Mono.scene(GAMEOVER, {
    init() {},
    update() {
      for (let i = particles.length - 1; i >= 0; i--) {
        const p = particles[i]; p.x += p.vx; p.y += p.vy; p.vy += 0.08; p.life--;
        if (p.life <= 0) particles.splice(i, 1);
      }
      if (btnp("start") || btnp("a")) { Mono.go(TITLE); return; }
    },
    draw() {
      cls(0);
      for (const p of particles) pix(flr(p.x), flr(p.y), p.color);
      text("GAME OVER", 137, 75, 3);
      text("DISTANCE: " + score, 120, 98, 2);
      text("STAGE: " + stage, 137, 109, 2);
      if (flr(Mono.frame / 20) % 2 === 0) text("PRESS START", 132, 150, 3);
    }
  });

  Mono.go(TITLE);
  Mono.boot("screen");
})();
</script>
</body>
</html>
