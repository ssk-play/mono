<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GrayBox — Demo: Robotron 2084</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #0a0a0a;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100vh;
    font-family: monospace;
    overflow: hidden;
  }
  #frame {
    background: #111;
    border: 3px solid #333;
    border-radius: 8px;
    padding: 12px;
    box-shadow: 0 0 40px rgba(0,0,0,0.8), inset 0 0 20px rgba(0,0,0,0.5);
  }
  canvas {
    display: block;
    image-rendering: pixelated;
    image-rendering: crisp-edges;
  }
  #controls {
    margin-top: 12px;
    color: #6b6b6b;
    font-size: 11px;
    text-align: center;
    letter-spacing: 1px;
  }
  #controls span { color: #b0b0b0; }
</style>
</head>
<body>
<div id="frame">
  <canvas id="screen"></canvas>
</div>
<div id="controls">
  <span>ARROWS</span> MOVE &nbsp;&nbsp; <span>Z</span> SHOOT &nbsp;&nbsp; <span>X</span> BOMB &nbsp;&nbsp; <span>ENTER</span> START
</div>
<script src="../../runtime/engine.js"></script>
<script>
(() => {
  "use strict";
  const W = GrayBox.WIDTH, H = GrayBox.HEIGHT;
  const { cls, pix, line, rect, rectf, circ, circf, sprite: defSprite,
          spr, text, btn, btnp, note, stop, rnd, flr, abs: _abs,
          min, max: _max, sin, cos } = GrayBox;

  // --- Play area bounds ---
  const ARENA_X = 11;
  const ARENA_Y = 12;
  const ARENA_W = W - 22;
  const ARENA_H = H - 24;
  const ARENA_R = ARENA_X + ARENA_W;
  const ARENA_B = ARENA_Y + ARENA_H;

  // --- Sprites ---

  // 1: Player - humanoid figure
  defSprite(1,
    "00033000" +
    "00033000" +
    "00322300" +
    "03322330" +
    "00033000" +
    "00033000" +
    "00300300" +
    "00300300"
  );

  // 2: Grunt - basic robot enemy
  defSprite(2,
    "02222200" +
    "02311200" +
    "02311200" +
    "02222200" +
    "00222000" +
    "02222200" +
    "02002000" +
    "02002000"
  );

  // 3: Hulk - indestructible tank
  defSprite(3,
    "22222220" +
    "21111120" +
    "21322120" +
    "21111120" +
    "22222220" +
    "02222200" +
    "02200220" +
    "02200220"
  );

  // 4: Brain - reprograms humans
  defSprite(4,
    "00222200" +
    "02333200" +
    "23132320" +
    "23333320" +
    "23231320" +
    "02333200" +
    "00222200" +
    "00020000"
  );

  // 5: Enforcer (spawned by brains) - projectile enemy
  defSprite(5,
    "00011000" +
    "00122100" +
    "01233210" +
    "12233221" +
    "01233210" +
    "00122100" +
    "00011000" +
    "00000000"
  );

  // 6: Human - Dad
  defSprite(6,
    "00033000" +
    "00033000" +
    "00033000" +
    "00333300" +
    "00033000" +
    "00033000" +
    "00300300" +
    "03000030"
  );

  // 7: Human - Mom
  defSprite(7,
    "00033000" +
    "00033000" +
    "00033000" +
    "00333300" +
    "00333300" +
    "00333300" +
    "00300300" +
    "00300300"
  );

  // 8: Human - Kid
  defSprite(8,
    "00330000" +
    "00330000" +
    "00330000" +
    "03333000" +
    "00330000" +
    "00300000" +
    "03030000" +
    "00000000"
  );

  // 9: Electrode barrier
  defSprite(9,
    "01221200" +
    "12112120" +
    "21221210" +
    "12112120" +
    "21221210" +
    "12112120" +
    "01221200" +
    "00000000"
  );

  // 10: Player bullet (small dot)
  defSprite(10,
    "00000000" +
    "00000000" +
    "00000000" +
    "00033000" +
    "00033000" +
    "00000000" +
    "00000000" +
    "00000000"
  );

  // 11: Explosion frame 1
  defSprite(11,
    "00000000" +
    "00200100" +
    "01003000" +
    "00032100" +
    "00130200" +
    "02000010" +
    "00100000" +
    "00000000"
  );

  // 12: Explosion frame 2
  defSprite(12,
    "30010020" +
    "01000010" +
    "00203200" +
    "03033030" +
    "00232000" +
    "01000300" +
    "20001002" +
    "00200010"
  );

  // 13: Prog (reprogrammed human - zombie)
  defSprite(13,
    "00011000" +
    "00011000" +
    "00111100" +
    "01111110" +
    "00011000" +
    "00011000" +
    "00100100" +
    "01000010"
  );

  // 14: Life icon
  defSprite(14,
    "00000000" +
    "00033000" +
    "00322300" +
    "00033000" +
    "00033000" +
    "00300300" +
    "00000000" +
    "00000000"
  );

  // 15: Enemy bullet (enforcer spark)
  defSprite(15,
    "00000000" +
    "00000000" +
    "00010000" +
    "00131000" +
    "00010000" +
    "00000000" +
    "00000000" +
    "00000000"
  );

  // 16: Spheroid (spawns enforcers)
  defSprite(16,
    "00111100" +
    "01233210" +
    "12322321" +
    "13222231" +
    "12322321" +
    "01233210" +
    "00111100" +
    "00000000"
  );

  // --- Game state ---
  const { TITLE, PLAY, GAMEOVER } = GrayBox.SCENE;
  let player, bullets, enemies, humans, electrodes, explosions, particles;
  let eBullets;
  let score, lives, wave, waveTimer, waveMessage;
  let shootCooldown, shootDir;
  let hiScore = 0;
  let titlePulse = 0;
  let invincible = 0;
  let screenShake = 0;
  let bonusTextList = [];

  function resetGame() {
    player = { x: W / 2 - 4, y: H / 2 - 4, speed: 2.5 };
    bullets = [];
    enemies = [];
    humans = [];
    electrodes = [];
    explosions = [];
    particles = [];
    eBullets = [];
    bonusTextList = [];
    score = 0;
    lives = 3;
    wave = 0;
    waveTimer = 0;
    waveMessage = 0;
    shootCooldown = 0;
    shootDir = { x: 0, y: -1 };
    invincible = 60;
    screenShake = 0;
    spawnWave();
  }

  function spawnWave() {
    wave++;
    waveMessage = 90;
    enemies = [];
    humans = [];
    electrodes = [];
    eBullets = [];
    invincible = 45;
    player.x = W / 2 - 4;
    player.y = H / 2 - 4;

    // Grunt count scales with wave
    const gruntCount = min(10 + wave * 4, 50);
    for (let i = 0; i < gruntCount; i++) {
      spawnEnemyFromEdge("grunt");
    }

    // Hulks after wave 2
    if (wave >= 2) {
      const hulkCount = min(1 + flr(wave / 2), 6);
      for (let i = 0; i < hulkCount; i++) {
        spawnEnemyFromEdge("hulk");
      }
    }

    // Brains after wave 3
    if (wave >= 3) {
      const brainCount = min(flr(wave / 2), 5);
      for (let i = 0; i < brainCount; i++) {
        spawnEnemyFromEdge("brain");
      }
    }

    // Spheroids after wave 4
    if (wave >= 4) {
      const spheroidCount = min(flr((wave - 2) / 2), 4);
      for (let i = 0; i < spheroidCount; i++) {
        spawnEnemyFromEdge("spheroid");
      }
    }

    // Humans (family members to rescue)
    const humanCount = min(3 + wave, 12);
    for (let i = 0; i < humanCount; i++) {
      const htype = flr(rnd(3)); // 0=dad, 1=mom, 2=kid
      const hx = ARENA_X + 20 + rnd(ARENA_W - 40);
      const hy = ARENA_Y + 22 + rnd(ARENA_H - 44);
      // Don't spawn too close to player
      if (_abs(hx - player.x) < 34 && _abs(hy - player.y) < 38) continue;
      humans.push({
        x: hx, y: hy, type: htype,
        dx: (rnd(1) - 0.5) * 0.5, dy: (rnd(1) - 0.5) * 0.5,
        alive: true, converting: 0
      });
    }

    // Electrodes
    const elecCount = min(2 + wave, 10);
    for (let i = 0; i < elecCount; i++) {
      const ex = ARENA_X + 14 + rnd(ARENA_W - 28);
      const ey = ARENA_Y + 15 + rnd(ARENA_H - 30);
      if (_abs(ex - player.x) < 27 && _abs(ey - player.y) < 30) continue;
      electrodes.push({ x: ex, y: ey });
    }
  }

  function spawnEnemyFromEdge(type) {
    let x, y;
    const side = flr(rnd(4));
    if (side === 0) { x = ARENA_X + rnd(ARENA_W); y = ARENA_Y; }
    else if (side === 1) { x = ARENA_X + rnd(ARENA_W); y = ARENA_B - 8; }
    else if (side === 2) { x = ARENA_X; y = ARENA_Y + rnd(ARENA_H); }
    else { x = ARENA_R - 8; y = ARENA_Y + rnd(ARENA_H); }

    const e = { x, y, type, hp: 1, timer: 0, dx: 0, dy: 0, spawnTimer: 0 };
    if (type === "hulk") { e.hp = 999; e.dx = (rnd(1) - 0.5); e.dy = (rnd(1) - 0.5); }
    if (type === "spheroid") { e.hp = 3; e.timer = 90 + flr(rnd(120)); }
    if (type === "brain") { e.hp = 1; e.target = null; }
    if (type === "enforcer") { e.hp = 1; e.dx = (rnd(1) - 0.5) * 2; e.dy = (rnd(1) - 0.5) * 2; e.shootTimer = 30 + flr(rnd(60)); }
    enemies.push(e);
  }

  function killableCount() {
    let count = 0;
    for (const e of enemies) {
      if (e.type !== "hulk") count++;
    }
    return count;
  }

  function spawnExplosion(x, y, big) {
    explosions.push({ x, y, timer: 0, big: big || false });
    const n = big ? 12 : 6;
    for (let i = 0; i < n; i++) {
      const a = rnd(Math.PI * 2);
      const sp = 0.5 + rnd(2);
      particles.push({
        x: x + 4, y: y + 4,
        dx: Math.cos(a) * sp, dy: Math.sin(a) * sp,
        life: 10 + flr(rnd(15)),
        c: 1 + flr(rnd(3))
      });
    }
  }

  function addBonusText(x, y, txt) {
    bonusTextList.push({ x, y, txt, timer: 45 });
  }

  function dist(a, b) {
    const dx = (a.x + 4) - (b.x + 4);
    const dy = (a.y + 4) - (b.y + 4);
    return Math.sqrt(dx * dx + dy * dy);
  }

  function collides(a, b, r) {
    return dist(a, b) < (r || 7);
  }

  // --- Title Scene ---
  GrayBox.scene(TITLE, {
    init() { titlePulse = 0; },
    update() {
      titlePulse++;
      if (btnp("a")) {
        ensureAudio();
        resetGame();
        note(0, "C4", 0.1);
        note(1, "E4", 0.1);
        GrayBox.go(PLAY); return;
      }
    },
    draw() {
      cls(0);
      const blink = (titlePulse % 40) < 25;
      text("ROBOTRON", W / 2 - 20, 45, 3);
      text("2084", W / 2 - 10, 56, 2);
      if ((titlePulse % 20) < 10) {
        spr(2, W / 2 - 33, 75); spr(3, W / 2 - 24, 75); spr(4, W / 2 - 15, 75);
        spr(16, W / 2 + 7, 75); spr(5, W / 2 + 16, 75); spr(13, W / 2 + 25, 75);
      } else {
        spr(6, W / 2 - 27, 75); spr(7, W / 2 - 13, 75); spr(8, W / 2, 75); spr(1, W / 2 + 13, 75);
      }
      text("SAVE THE LAST HUMAN FAMILY", W / 2 - 65, 98, 2);
      if (blink) text("PRESS A TO START", W / 2 - 50, 128, 3);
      text("ARROWS  MOVE", W / 2 - 34, 150, 1);
      text("A  SHOOT IN MOVE DIR", W / 2 - 34, 159, 1);
      text("HOLD A + ARROWS  AIM", W / 2 - 34, 168, 1);
      text("GRUNT 100  BRAIN 500", W / 2 - 50, 186, 2);
      text("ENFORCER 150  SPHEROID 1000", W / 2 - 67, 195, 2);
      text("RESCUE HUMANS FOR BONUS!", W / 2 - 60, 210, 3);
      if (hiScore > 0) { text("HI " + hiScore, W / 2 - 15, 225, 1); }
    }
  });

  // --- Play Scene ---
  GrayBox.scene(PLAY, {
    init() { resetGame(); },
    update() {
    titlePulse++;

    // --- PLAY state ---
    if (waveMessage > 0) {
      waveMessage--;
      if (waveMessage === 85) { note(0, "E5", 0.15); }
      if (waveMessage === 75) { note(0, "G5", 0.15); }
      if (waveMessage === 65) { note(0, "C6", 0.25); }
      return;
    }

    if (invincible > 0) invincible--;
    if (screenShake > 0) screenShake--;

    // Player movement
    let mdx = 0, mdy = 0;
    if (btn("left")) mdx = -1;
    if (btn("right")) mdx = 1;
    if (btn("up")) mdy = -1;
    if (btn("down")) mdy = 1;

    // Normalize diagonal
    if (mdx !== 0 && mdy !== 0) {
      mdx *= 0.707;
      mdy *= 0.707;
    }

    // Update shoot direction from movement if not shooting
    if ((mdx !== 0 || mdy !== 0) && !btn("a")) {
      shootDir.x = mdx > 0 ? 1 : mdx < 0 ? -1 : 0;
      shootDir.y = mdy > 0 ? 1 : mdy < 0 ? -1 : 0;
    }

    // If holding A + direction, aim in that direction
    if (btn("a") && (mdx !== 0 || mdy !== 0)) {
      shootDir.x = mdx > 0 ? 1 : mdx < 0 ? -1 : 0;
      shootDir.y = mdy > 0 ? 1 : mdy < 0 ? -1 : 0;
    }

    player.x += mdx * player.speed;
    player.y += mdy * player.speed;

    // Clamp to arena
    player.x = _max(ARENA_X + 2, min(ARENA_R - 10, player.x));
    player.y = _max(ARENA_Y + 2, min(ARENA_B - 10, player.y));

    // Shooting
    if (shootCooldown > 0) shootCooldown--;
    if (btn("a") && shootCooldown <= 0) {
      shootCooldown = 4;
      let sdx = shootDir.x, sdy = shootDir.y;
      if (sdx === 0 && sdy === 0) sdy = -1;
      // Normalize
      const len = Math.sqrt(sdx * sdx + sdy * sdy);
      sdx /= len; sdy /= len;
      bullets.push({
        x: player.x + 2, y: player.y + 2,
        dx: sdx * 6, dy: sdy * 6, life: 60
      });
      note(0, "C5", 0.03);
    }

    // Update bullets
    for (let i = bullets.length - 1; i >= 0; i--) {
      const b = bullets[i];
      b.x += b.dx;
      b.y += b.dy;
      b.life--;
      if (b.x < ARENA_X || b.x > ARENA_R || b.y < ARENA_Y || b.y > ARENA_B || b.life <= 0) {
        bullets.splice(i, 1);
        continue;
      }

      // Check electrode collision
      let hitElectrode = false;
      for (let j = electrodes.length - 1; j >= 0; j--) {
        if (collides(b, electrodes[j], 6)) {
          spawnExplosion(electrodes[j].x, electrodes[j].y, false);
          electrodes.splice(j, 1);
          bullets.splice(i, 1);
          score += 25;
          note(1, "A3", 0.05);
          hitElectrode = true;
          break;
        }
      }
      if (hitElectrode) continue;

      // Check enemy collision
      let hitEnemy = false;
      for (let j = enemies.length - 1; j >= 0; j--) {
        const e = enemies[j];
        if (collides(b, e, 6)) {
          if (e.type === "hulk") {
            // Hulk is indestructible, bullet bounces off
            bullets.splice(i, 1);
            note(1, "C2", 0.03);
            hitEnemy = true;
            // Push hulk slightly
            e.x += b.dx * 0.3;
            e.y += b.dy * 0.3;
            break;
          }
          e.hp--;
          if (e.hp <= 0) {
            let pts = 100;
            if (e.type === "brain") pts = 500;
            if (e.type === "spheroid") pts = 1000;
            if (e.type === "enforcer") pts = 150;
            score += pts;
            spawnExplosion(e.x, e.y, e.type === "spheroid");
            enemies.splice(j, 1);
            note(1, "E4", 0.06);
          } else {
            note(1, "G3", 0.03);
          }
          bullets.splice(i, 1);
          hitEnemy = true;
          break;
        }
      }
      if (hitEnemy) continue;
    }

    // Update enemies
    const pspeed = 0.6 + wave * 0.08;
    for (let i = enemies.length - 1; i >= 0; i--) {
      const e = enemies[i];
      e.timer++;

      if (e.type === "grunt") {
        // Chase player directly with some wobble
        const dx = player.x - e.x;
        const dy = player.y - e.y;
        const d = Math.sqrt(dx * dx + dy * dy) || 1;
        const speed = min(pspeed, 1.5 + wave * 0.05);
        e.x += (dx / d) * speed;
        e.y += (dy / d) * speed;
      }
      else if (e.type === "hulk") {
        // Wander around, change direction occasionally
        if (e.timer % 60 === 0) {
          e.dx = (rnd(2) - 1) * 0.8;
          e.dy = (rnd(2) - 1) * 0.8;
        }
        e.x += e.dx;
        e.y += e.dy;
        // Bounce off walls
        if (e.x < ARENA_X + 4) { e.x = ARENA_X + 4; e.dx = _abs(e.dx); }
        if (e.x > ARENA_R - 12) { e.x = ARENA_R - 12; e.dx = -_abs(e.dx); }
        if (e.y < ARENA_Y + 4) { e.y = ARENA_Y + 4; e.dy = _abs(e.dy); }
        if (e.y > ARENA_B - 12) { e.y = ARENA_B - 12; e.dy = -_abs(e.dy); }

        // Hulks kill humans they touch
        for (let j = humans.length - 1; j >= 0; j--) {
          if (humans[j].alive && collides(e, humans[j], 7)) {
            humans[j].alive = false;
            spawnExplosion(humans[j].x, humans[j].y, false);
            note(1, "C3", 0.1);
          }
        }
      }
      else if (e.type === "brain") {
        // Move toward nearest alive human, reprogram them
        let closest = null, closestD = 9999;
        for (const h of humans) {
          if (!h.alive) continue;
          const dd = dist(e, h);
          if (dd < closestD) { closestD = dd; closest = h; }
        }
        if (closest && closestD > 8) {
          const dx = closest.x - e.x;
          const dy = closest.y - e.y;
          const d = Math.sqrt(dx * dx + dy * dy) || 1;
          e.x += (dx / d) * 0.8;
          e.y += (dy / d) * 0.8;
        } else if (closest && closestD <= 8) {
          // Convert human to prog
          closest.alive = false;
          closest.converting = 0;
          // Spawn a prog (zombie) enemy
          enemies.push({
            x: closest.x, y: closest.y, type: "prog",
            hp: 1, timer: 0, dx: 0, dy: 0
          });
          note(1, "D#3", 0.15);
        } else {
          // No humans, chase player
          const dx = player.x - e.x;
          const dy = player.y - e.y;
          const d = Math.sqrt(dx * dx + dy * dy) || 1;
          e.x += (dx / d) * 0.6;
          e.y += (dy / d) * 0.6;
        }
      }
      else if (e.type === "spheroid") {
        // Float around, spawn enforcers periodically
        e.x += sin(e.timer * 0.05) * 0.8;
        e.y += cos(e.timer * 0.07) * 0.6;
        if (e.x < ARENA_X + 4) e.x = ARENA_X + 4;
        if (e.x > ARENA_R - 12) e.x = ARENA_R - 12;
        if (e.y < ARENA_Y + 4) e.y = ARENA_Y + 4;
        if (e.y > ARENA_B - 12) e.y = ARENA_B - 12;

        e.spawnTimer++;
        if (e.spawnTimer >= 120 + flr(rnd(90))) {
          e.spawnTimer = 0;
          if (enemies.filter(en => en.type === "enforcer").length < 6) {
            enemies.push({
              x: e.x, y: e.y, type: "enforcer", hp: 1, timer: 0,
              dx: (rnd(2) - 1) * 1.5, dy: (rnd(2) - 1) * 1.5,
              shootTimer: 60 + flr(rnd(60))
            });
            note(1, "F#4", 0.05);
          }
        }
      }
      else if (e.type === "enforcer") {
        // Move erratically, shoot at player
        e.x += e.dx;
        e.y += e.dy;
        if (e.timer % 30 === 0) {
          e.dx += (rnd(1) - 0.5);
          e.dy += (rnd(1) - 0.5);
          e.dx = _max(-2, min(2, e.dx));
          e.dy = _max(-2, min(2, e.dy));
        }
        if (e.x < ARENA_X + 4) { e.x = ARENA_X + 4; e.dx = _abs(e.dx); }
        if (e.x > ARENA_R - 12) { e.x = ARENA_R - 12; e.dx = -_abs(e.dx); }
        if (e.y < ARENA_Y + 4) { e.y = ARENA_Y + 4; e.dy = _abs(e.dy); }
        if (e.y > ARENA_B - 12) { e.y = ARENA_B - 12; e.dy = -_abs(e.dy); }

        e.shootTimer = (e.shootTimer || 60) - 1;
        if (e.shootTimer <= 0) {
          e.shootTimer = 45 + flr(rnd(45));
          const dx = player.x - e.x;
          const dy = player.y - e.y;
          const d = Math.sqrt(dx * dx + dy * dy) || 1;
          eBullets.push({
            x: e.x + 2, y: e.y + 2,
            dx: (dx / d) * 2.5, dy: (dy / d) * 2.5,
            life: 90
          });
          note(1, "A#2", 0.04);
        }
      }
      else if (e.type === "prog") {
        // Reprogrammed human chases player
        const dx = player.x - e.x;
        const dy = player.y - e.y;
        const d = Math.sqrt(dx * dx + dy * dy) || 1;
        e.x += (dx / d) * 1.0;
        e.y += (dy / d) * 1.0;
      }

      // Clamp enemies to arena
      e.x = _max(ARENA_X, min(ARENA_R - 8, e.x));
      e.y = _max(ARENA_Y, min(ARENA_B - 8, e.y));
    }

    // Update enemy bullets
    for (let i = eBullets.length - 1; i >= 0; i--) {
      const b = eBullets[i];
      b.x += b.dx;
      b.y += b.dy;
      b.life--;
      if (b.x < ARENA_X || b.x > ARENA_R || b.y < ARENA_Y || b.y > ARENA_B || b.life <= 0) {
        eBullets.splice(i, 1);
        continue;
      }
      // Hit player
      if (invincible <= 0 && _abs(b.x - player.x) < 6 && _abs(b.y - player.y) < 6) {
        playerDie();
        eBullets.splice(i, 1);
        break;
      }
    }

    // Update humans
    for (const h of humans) {
      if (!h.alive) continue;
      h.x += h.dx;
      h.y += h.dy;
      // Bounce off walls
      if (h.x < ARENA_X + 4) { h.x = ARENA_X + 4; h.dx = _abs(h.dx); }
      if (h.x > ARENA_R - 12) { h.x = ARENA_R - 12; h.dx = -_abs(h.dx); }
      if (h.y < ARENA_Y + 4) { h.y = ARENA_Y + 4; h.dy = _abs(h.dy); }
      if (h.y > ARENA_B - 12) { h.y = ARENA_B - 12; h.dy = -_abs(h.dy); }

      // Random direction changes
      if (flr(rnd(60)) === 0) {
        h.dx = (rnd(1) - 0.5) * 0.6;
        h.dy = (rnd(1) - 0.5) * 0.6;
      }

      // Player rescues human by touching
      if (collides(player, h, 8)) {
        h.alive = false;
        const pts = [1000, 2000, 4000, 5000];
        const humansSaved = wave; // more points as game goes on
        const bonus = pts[min(humansSaved, pts.length - 1)];
        score += bonus;
        addBonusText(h.x, h.y - 8, String(bonus));
        note(0, "C5", 0.08);
        setTimeout(() => { try { note(0, "E5", 0.08); } catch(e){} }, 80);
        setTimeout(() => { try { note(0, "G5", 0.12); } catch(e){} }, 160);
      }
    }

    // Enemy - player collision
    if (invincible <= 0) {
      for (const e of enemies) {
        if (collides(player, e, 6)) {
          playerDie();
          break;
        }
      }
      // Electrode - player collision
      for (const el of electrodes) {
        if (collides(player, el, 5)) {
          playerDie();
          break;
        }
      }
    }

    // Update explosions
    for (let i = explosions.length - 1; i >= 0; i--) {
      explosions[i].timer++;
      if (explosions[i].timer > 16) explosions.splice(i, 1);
    }

    // Update particles
    for (let i = particles.length - 1; i >= 0; i--) {
      const p = particles[i];
      p.x += p.dx;
      p.y += p.dy;
      p.life--;
      if (p.life <= 0) particles.splice(i, 1);
    }

    // Update bonus texts
    for (let i = bonusTextList.length - 1; i >= 0; i--) {
      bonusTextList[i].y -= 0.5;
      bonusTextList[i].timer--;
      if (bonusTextList[i].timer <= 0) bonusTextList.splice(i, 1);
    }

    // Check wave clear
    if (killableCount() === 0 && waveMessage <= 0) {
      spawnWave();
    }

    // High score
    if (score > hiScore) hiScore = score;
  };

  function playerDie() {
    spawnExplosion(player.x, player.y, true);
    screenShake = 12;
    lives--;
    note(0, "C3", 0.15);
    note(1, "E2", 0.2);
    if (lives <= 0) {
      if (score > hiScore) hiScore = score;
      GrayBox.go(GAMEOVER); return;
    } else {
      invincible = 90;
      player.x = W / 2 - 4;
      player.y = H / 2 - 4;
      eBullets = [];
    }
  }

    },
    draw() {
    cls(0);

    // --- PLAY state draw ---
    let sx = 0, sy = 0;
    if (screenShake > 0) {
      sx = flr(rnd(5)) - 2;
      sy = flr(rnd(5)) - 2;
    }

    // Arena border (iconic Robotron red/white border - using grays)
    rect(ARENA_X - 1 + sx, ARENA_Y - 1 + sy, ARENA_W + 2, ARENA_H + 2, 2);
    rect(ARENA_X - 2 + sx, ARENA_Y - 2 + sy, ARENA_W + 4, ARENA_H + 4, 1);

    // Wave message
    if (waveMessage > 0) {
      text("WAVE " + wave, W / 2 - 15 + sx, H / 2 - 4 + sy, 3);
      // Still draw HUD
      drawHUD(sx, sy);
      return;
    }

    // Electrodes
    for (const el of electrodes) {
      const flicker = (GrayBox.frame + flr(el.x)) % 8 < 4;
      spr(9, el.x + sx, el.y + sy);
      if (flicker) {
        pix(el.x + 3 + sx, el.y + 3 + sy, 3);
      }
    }

    // Humans
    for (const h of humans) {
      if (!h.alive) continue;
      const sprId = 6 + h.type; // 6=dad, 7=mom, 8=kid
      // Humans flash gently
      spr(sprId, h.x + sx, h.y + sy);
    }

    // Enemies
    for (const e of enemies) {
      let sprId = 2;
      if (e.type === "grunt") sprId = 2;
      else if (e.type === "hulk") sprId = 3;
      else if (e.type === "brain") sprId = 4;
      else if (e.type === "enforcer") sprId = 5;
      else if (e.type === "spheroid") sprId = 16;
      else if (e.type === "prog") sprId = 13;
      spr(sprId, e.x + sx, e.y + sy);
    }

    // Player
    if (invincible <= 0 || (GrayBox.frame % 4) < 2) {
      spr(1, player.x + sx, player.y + sy);
    }

    // Bullets
    for (const b of bullets) {
      spr(10, b.x + sx, b.y + sy);
    }

    // Enemy bullets
    for (const b of eBullets) {
      spr(15, b.x + sx, b.y + sy);
    }

    // Explosions
    for (const ex of explosions) {
      if (ex.timer < 6) spr(11, ex.x + sx, ex.y + sy);
      else if (ex.timer < 12) spr(12, ex.x + sx, ex.y + sy);
    }

    // Particles
    for (const p of particles) {
      pix(flr(p.x) + sx, flr(p.y) + sy, p.c);
    }

    // Bonus texts
    for (const bt of bonusTextList) {
      text(bt.txt, bt.x + sx, bt.y + sy, 3);
    }

    // HUD
    drawHUD(sx, sy);
    }
  });

  // --- Game Over Scene ---
  GrayBox.scene(GAMEOVER, {
    init() {},
    update() {
      if (btnp("a")) { GrayBox.go(TITLE); return; }
    },
    draw() {
      cls(0);
      text("GAME OVER", W / 2 - 22, H / 2 - 30, 3);
      text("SCORE  " + score, W / 2 - 24, H / 2, 2);
      if (score >= hiScore) {
        text("NEW HIGH SCORE!", W / 2 - 37, H / 2 + 16, 3);
      }
      text("PRESS A", W / 2 - 27, H / 2 + 40, 1);
    }
  });

  function drawHUD(sx, sy) {
    // Score
    text("SCORE " + score, 4 + sx, 4 + sy, 3);
    // Wave
    text("WAVE " + wave, W / 2 - 15 + sx, 4 + sy, 2);
    // Lives
    for (let i = 0; i < lives; i++) {
      spr(14, W - 28 + i * 10 + sx, 2 + sy);
    }
    // Human count
    const aliveHumans = humans.filter(h => h.alive).length;
    if (aliveHumans > 0) {
      text("HUMANS " + aliveHumans, W / 2 - 20 + sx, H - 10 + sy, 2);
    }
  }

  // --- Start ---
  GrayBox.go(TITLE);
  GrayBox.boot("screen");
})();
</script>
