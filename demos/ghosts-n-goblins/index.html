  #frame {

    border: 3px solid #333;
    border-radius: 8px;
    padding: 12px;
    box-shadow: 0 0 40px rgba(0,0,0,0.8), inset 0 0 20px rgba(0,0,0,0.5);

  canvas {
    display: block;
    image-rendering: pixelated;
    image-rendering: crisp-edges;

  #controls {

    font-size: 11px;
    text-align: center;
    letter-spacing: 1px;
  }
  #controls span { color: #b0b0b0; }
</style>

  const GRAVITY = 0.35;
  const JUMP_FORCE = -5.5;
  const MOVE_SPEED = 1.8;
  const GROUND_Y = 198;
  const LEVEL_WIDTH = 1600;
  const TILE = 8;
  const WEAPON_LANCE = 0;
  const WEAPON_DAGGER = 1;
  const WEAPON_TORCH = 2;
  const WEAPON_AXE = 3;
  const WEAPON_NAMES = ["LANCE", "DAGGER", "TORCH", "AXE"];

  let player, camera, projectiles, enemies, particles, chests, pickups;
  let score, lives, timeLeft, timeTimer;
  let bossActive, boss;
  let levelData;
  let deathTimer, respawnX;
  let titleAnim;

  function generateLevel() {
    levelData = { platforms: [], grounds: [], decorations: [] };
    const groundSegs = [
      { x: 0, w: 27 }, { x: 29, w: 20 }, { x: 52, w: 33 },
      { x: 88, w: 27 }, { x: 117, w: 20 }, { x: 140, w: 33 },
      { x: 176, w: 24 }
    ];
    for (const g of groundSegs) {
      levelData.grounds.push({ x: g.x * TILE, y: GROUND_Y, w: g.w * TILE });
    }
    const plats = [
      { x: 7, y: GROUND_Y - 30, w: 3 },
      { x: 33, y: GROUND_Y - 42, w: 3 },
      { x: 60, y: GROUND_Y - 30, w: 4 },
      { x: 93, y: GROUND_Y - 36, w: 3 },
      { x: 123, y: GROUND_Y - 42, w: 3 },
      { x: 147, y: GROUND_Y - 30, w: 4 },
      { x: 180, y: GROUND_Y - 36, w: 3 }
    ];
    for (const p of plats) {
      levelData.platforms.push({ x: p.x * TILE, y: p.y, w: p.w * TILE });
    }
    // Decorations
    for (let dx = 0; dx < LEVEL_WIDTH; dx += 53 + flr(rnd(40))) {
      const dtype = rnd(1) < 0.5 ? 24 : 25;
      levelData.decorations.push({ x: dx, sprId: dtype });
    }
  }

  function getGroundAt(x) {
    for (const g of levelData.grounds) {
      if (x >= g.x && x < g.x + g.w) return g.y;
    }
    return H + 100;
  }

  function getPlatformAt(x, y, vy) {
    for (const p of levelData.platforms) {
      if (x + 6 > p.x && x < p.x + p.w && y + 8 >= p.y && y + 8 <= p.y + 6 && vy >= 0) {
        return p.y;
      }
    }
    return null;
  }

  function isOnSolid(x, y) {
    const gy = getGroundAt(x + 4);
    if (y + 8 >= gy) return true;
    for (const p of levelData.platforms) {
      if (x + 6 > p.x && x < p.x + p.w && y + 8 >= p.y && y + 8 <= p.y + 4) return true;
    }
    return false;
  }

  function resetGame() {
    generateLevel();
    player = {
      x: 27, y: GROUND_Y - 12, vx: 0, vy: 0,
      facing: 1, armor: 2, weapon: WEAPON_LANCE,
      grounded: true, crouching: false,
      walkFrame: 0, walkTimer: 0,
      invincible: 0, throwCooldown: 0, alive: true
    };
    camera = { x: 0 };
    projectiles = [];
    enemies = [];
    particles = [];
    chests = [];
    pickups = [];
    score = 0;
    lives = 3;
    timeLeft = 200;
    timeTimer = 0;
    bossActive = false;
    boss = null;
    deathTimer = 0;
    respawnX = 27;
    titleAnim = 0;
    spawnEnemies();
    spawnChests();
  }

  function spawnChests() {
    chests = [];
    for (let cx = 133; cx < LEVEL_WIDTH - 133; cx += 133 + flr(rnd(133))) {
      const gy = getGroundAt(cx);
      if (gy < H) {
        chests.push({ x: cx, y: gy - 8, alive: true, content: flr(rnd(5)) });
      }
    }
  }

  function spawnEnemies() {
    enemies = [];
    // Zombies
    for (let ex = 100; ex < LEVEL_WIDTH - 67; ex += 40 + flr(rnd(53))) {
      const gy = getGroundAt(ex);
      if (gy < H) {
        enemies.push({
          type: "zombie", x: ex, y: gy, gy: gy,
          vx: 0, vy: 0, hp: 1, alive: true,
          state: "buried", riseTimer: 60 + flr(rnd(120)),
          walkDir: rnd(1) < 0.5 ? 1 : -1, animTimer: 0
        });
      }
    }
    // Ghosts
    for (let ex = 200; ex < LEVEL_WIDTH - 67; ex += 100 + flr(rnd(80))) {
      enemies.push({
        type: "ghost", x: ex, y: GROUND_Y - 45 - rnd(30),
        baseY: GROUND_Y - 45 - rnd(30), hp: 1, alive: true,
        vx: -0.5 - rnd(0.5), phase: rnd(6.28), animTimer: 0
      });
    }
    // Red Arremers
    for (let ex = 333; ex < LEVEL_WIDTH - 133; ex += 200 + flr(rnd(133))) {
      enemies.push({
        type: "arremer", x: ex, y: GROUND_Y - 60,
        baseX: ex, baseY: GROUND_Y - 60,
        hp: 3, alive: true,
        state: "hover", swoopTimer: 60 + flr(rnd(60)),
        animTimer: 0, vx: 0, vy: 0
      });
    }
    // Skeletons
    for (let ex = 267; ex < LEVEL_WIDTH - 67; ex += 120 + flr(rnd(67))) {
      const gy = getGroundAt(ex);
      if (gy < H) {
        enemies.push({
          type: "skeleton", x: ex, y: gy - 8, gy: gy,
          hp: 1, alive: true,
          walkDir: rnd(1) < 0.5 ? 1 : -1, animTimer: 0,
          throwTimer: 60 + flr(rnd(90))
        });
      }
    }
    // Plant monsters
    for (let ex = 233; ex < LEVEL_WIDTH - 67; ex += 167 + flr(rnd(100))) {
      const gy = getGroundAt(ex);
      if (gy < H) {
        enemies.push({
          type: "plant", x: ex, y: gy - 8, gy: gy,
          hp: 2, alive: true, animTimer: 0, shootTimer: 90 + flr(rnd(60))
        });
      }
    }
  }

  function spawnBoss() {
    bossActive = true;
    boss = {
      x: LEVEL_WIDTH - 53, y: GROUND_Y - 24,
      hp: 12, maxHp: 12, alive: true,
      state: "idle", timer: 60,
      animFrame: 0, flashTimer: 0

  }

  function addExplosion(x, y) {
    for (let i = 0; i < 6; i++) {
      particles.push({
        x: x + 4, y: y + 4,
        vx: rnd(4) - 2, vy: rnd(3) - 2,
        life: 8 + flr(rnd(10)), color: flr(rnd(3)) + 1
      });
    }
  }

  // Sound effects
  function sfxJump() { note(0, "E5", 0.05); setTimeout(() => note(0, "G5", 0.04), 30); }
  function sfxThrow() { note(0, "A4", 0.03); setTimeout(() => note(0, "C5", 0.03), 20); }
  function sfxHit() { note(1, "C3", 0.06); setTimeout(() => note(1, "E3", 0.05), 40); }
  function sfxDeath() {
    note(0, "C3", 0.12); note(1, "G2", 0.12);
    setTimeout(() => { note(0, "A2", 0.18); note(1, "E2", 0.18); }, 120);
  }
  function sfxPickup() {
    note(0, "C5", 0.06);
    setTimeout(() => note(0, "E5", 0.06), 60);
    setTimeout(() => note(0, "G5", 0.08), 120);
  }
  function sfxArmorHit() { note(1, "E3", 0.08); note(0, "G3", 0.06); }
  function sfxBossHit() { note(1, "A3", 0.04); }

  function throwWeapon() {
    if (player.throwCooldown > 0 || projectiles.length >= 2) return;
    const px = player.x + (player.facing > 0 ? 6 : -4);
    const py = player.crouching ? player.y + 2 : player.y;
    let vx = 0, vy = 0;
    switch (player.weapon) {
      case WEAPON_LANCE:  vx = player.facing * 4; vy = 0; break;
      case WEAPON_DAGGER: vx = player.facing * 6; vy = 0; break;
      case WEAPON_TORCH:  vx = player.facing * 2.5; vy = -3; break;
      case WEAPON_AXE:    vx = player.facing * 2; vy = -4.5; break;
    }
    projectiles.push({
      x: px, y: py, vx: vx, vy: vy,
      weapon: player.weapon, life: 80,
      gravity: player.weapon >= WEAPON_TORCH
    });
    player.throwCooldown = 15;
    sfxThrow();
  }

  function hitPlayer() {
    if (player.invincible > 0 || !player.alive) return;
    player.armor--;
    if (player.armor > 0) {
      player.invincible = 60;
      sfxArmorHit();
      for (let i = 0; i < 5; i++) {
        particles.push({
          x: player.x + 4, y: player.y + 4,
          vx: rnd(4) - 2, vy: -rnd(3) - 1,
          life: 15 + flr(rnd(10)), color: 2
        });
      }
    } else {
      playerDie();
    }
  }

  function playerDie() {
    player.alive = false;
    deathTimer = 90;
    sfxDeath();
    addExplosion(player.x, player.y);
  }

  resetGame();

  // ============================================================
  // Update
  // ============================================================
  GrayBox._update = function() {
    titleAnim++;

    if (state === "title") {
      if (btnp("a") || btnp("a")) {
        state = "play";
        resetGame();
        note(0, "C5", 0.08);
        setTimeout(() => note(0, "E5", 0.08), 80);
        setTimeout(() => note(0, "G5", 0.1), 160);
      }
      return;
    }

    if (state === "gameover") {
      for (let i = particles.length - 1; i >= 0; i--) {
        const p = particles[i]; p.x += p.vx; p.y += p.vy; p.vy += 0.08; p.life--;
        if (p.life <= 0) particles.splice(i, 1);
      }
      if (btnp("a") || btnp("a")) state = "title";
      return;
    }

    if (state === "win") {
      if (btnp("a") || btnp("a")) state = "title";
      return;
    }

    // --- Play state ---

    // Timer
    timeTimer++;
    if (timeTimer >= 30) { timeTimer = 0; timeLeft--; }
    if (timeLeft <= 0 && player.alive) playerDie();

    // Death handling
    if (!player.alive) {
      deathTimer--;
      if (deathTimer <= 0) {
        lives--;
        if (lives <= 0) { state = "gameover"; return; }
        player.alive = true;
        player.armor = 2;
        player.x = respawnX;
        player.y = GROUND_Y - 12;
        player.vy = 0;
        player.vx = 0;
        player.invincible = 90;
        player.weapon = WEAPON_LANCE;
        timeLeft = 200;
      }
      for (let i = particles.length - 1; i >= 0; i--) {
        const p = particles[i]; p.x += p.vx; p.y += p.vy; p.vy += 0.1; p.life--;
        if (p.life <= 0) particles.splice(i, 1);
      }
      return;
    }

    if (player.invincible > 0) player.invincible--;

    // Player movement
    player.crouching = false;
    if (btn("left")) { player.x -= MOVE_SPEED; player.facing = -1; }
    if (btn("right")) { player.x += MOVE_SPEED; player.facing = 1; }
    if (btn("down") && player.grounded) player.crouching = true;

    // Jump
    if (btnp("a") && player.grounded) {
      player.vy = JUMP_FORCE;
      player.grounded = false;
      sfxJump();
    }

    // Throw
    if (btnp("b")) throwWeapon();
    if (player.throwCooldown > 0) player.throwCooldown--;

    // Gravity
    if (!player.grounded) player.vy += GRAVITY;
    player.y += player.vy;

    // Ground/platform collision
    const gy = getGroundAt(player.x + 4);
    const platY = getPlatformAt(player.x, player.y, player.vy);
    let landY = gy;
    if (platY !== null && (platY < gy || gy > H)) landY = platY;

    if (player.y + 8 >= landY && player.vy >= 0) {
      player.y = landY - 8;
      player.vy = 0;
      player.grounded = true;
    } else if (player.y + 8 < landY && player.grounded) {
      if (!isOnSolid(player.x, player.y + 1)) player.grounded = false;
    }

    // Pit death
    if (player.y > H + 20) { playerDie(); return; }

    // Clamp
    player.x = _max(camera.x + 4, min(LEVEL_WIDTH - 12, player.x));

    // Walk animation
    if (player.grounded && (btn("left") || btn("right")) && !player.crouching) {
      player.walkTimer++;
      if (player.walkTimer > 6) { player.walkTimer = 0; player.walkFrame = 1 - player.walkFrame; }
    } else {
      player.walkFrame = 0;
      player.walkTimer = 0;
    }

    // Camera
    const targetCamX = player.x - W / 3;
    camera.x += (targetCamX - camera.x) * 0.08;
    camera.x = _max(0, min(LEVEL_WIDTH - W, camera.x));

    // Checkpoints
    if (flr(player.x / 133) > flr(respawnX / 133)) {
      respawnX = flr(player.x / 133) * 133;
    }

    // Boss trigger
    if (player.x > LEVEL_WIDTH - 133 && !bossActive && !boss) spawnBoss();

    // --- Projectiles ---
    for (let i = projectiles.length - 1; i >= 0; i--) {
      const p = projectiles[i];
      p.x += p.vx;
      if (p.gravity) p.vy += 0.18;
      p.y += p.vy;
      p.life--;
      if (p.life <= 0 || p.x < camera.x - 16 || p.x > camera.x + W + 16 || p.y > H + 16) {
        projectiles.splice(i, 1);
        continue;
      }
      // Hit enemies
      let hit = false;
      for (const e of enemies) {
        if (!e.alive) continue;
        if (e.type === "zombie" && e.state === "buried") continue;
        if (p.x + 4 > e.x && p.x < e.x + 8 && p.y + 4 > e.y && p.y < e.y + 8) {
          e.hp--;
          if (e.hp <= 0) {
            e.alive = false;
            addExplosion(e.x, e.y);
            score += e.type === "arremer" ? 200 : e.type === "plant" ? 100 : 50;
            sfxHit();
          } else {
            sfxBossHit();
          }
          hit = true;
          break;
        }
      }
      // Hit boss
      if (!hit && boss && boss.alive) {
        if (p.x + 4 > boss.x && p.x < boss.x + 16 && p.y + 4 > boss.y && p.y < boss.y + 16) {
          boss.hp--;
          boss.flashTimer = 6;
          sfxBossHit();
          hit = true;
          if (boss.hp <= 0) {
            boss.alive = false;
            score += 1000;
            addExplosion(boss.x, boss.y);
            addExplosion(boss.x + 8, boss.y + 8);
            addExplosion(boss.x - 4, boss.y + 4);
            sfxHit();
            setTimeout(() => { state = "win"; }, 3000);
          }
        }
      }
      if (hit) projectiles.splice(i, 1);
    }

    // --- Enemies ---
    for (const e of enemies) {
      if (!e.alive) continue;
      const dx = e.x - player.x;
      const dist = _abs(dx);
      const screenDist = _abs(e.x - camera.x - W / 2);
      if (screenDist > W) continue;

      e.animTimer++;

      if (e.type === "zombie") {
        if (e.state === "buried") {
          if (dist < 120) { e.riseTimer--; if (e.riseTimer <= 0) e.state = "rising"; }
        } else if (e.state === "rising") {
          e.y -= 0.5;
          if (e.y <= e.gy - 8) { e.state = "walking"; e.y = e.gy - 8; }
        } else if (e.state === "walking") {
          e.x += e.walkDir * 0.5;
          const nextGy = getGroundAt(e.x + e.walkDir * 12 + 4);
          if (nextGy > H) e.walkDir *= -1;
          if (dist < 80 && rnd(1) < 0.02) e.walkDir = dx < 0 ? -1 : 1;
        }
      }

      if (e.type === "ghost") {
        e.x += e.vx;
        e.y = e.baseY + sin(e.phase + titleAnim * 0.08) * 20;
        if (e.x < camera.x - 20) e.x = camera.x + W + 20;
      }

      if (e.type === "arremer") {
        if (e.state === "hover") {
          e.y = e.baseY + sin(titleAnim * 0.06) * 10;
          e.x = e.baseX + sin(titleAnim * 0.04) * 20;
          if (dist < 150) {
            e.swoopTimer--;
            if (e.swoopTimer <= 0) {
              e.state = "swoop";
              e.vx = (player.x - e.x) * 0.04;
              e.vy = 3;
            }
          }
        } else if (e.state === "swoop") {
          e.x += e.vx;
          e.y += e.vy;
          if (e.y >= GROUND_Y - 12) { e.state = "return"; e.vy = -2; }
        } else if (e.state === "return") {
          e.y += e.vy;
          e.x += (e.baseX - e.x) * 0.03;
          if (e.y <= e.baseY) {
            e.state = "hover";
            e.y = e.baseY;
            e.swoopTimer = 90 + flr(rnd(60));
          }
        }
      }

      if (e.type === "skeleton") {
        e.x += e.walkDir * 0.4;
        const nextGy = getGroundAt(e.x + e.walkDir * 10 + 4);
        if (nextGy > H) e.walkDir *= -1;
        if (dist < 120) {
          e.throwTimer--;
          if (e.throwTimer <= 0) {
            e.throwTimer = 90 + flr(rnd(60));
            const dir = dx < 0 ? -1 : 1;
            enemies.push({
              type: "bone", x: e.x, y: e.y - 2,
              vx: dir * 2, vy: -2, hp: 1, alive: true,
              life: 60, animTimer: 0
            });
          }
        }
      }

      if (e.type === "bone") {
        e.x += e.vx;
        e.vy = (e.vy || 0) + 0.12;
        e.y += e.vy;
        e.life--;
        if (e.life <= 0 || e.y > H) { e.alive = false; continue; }
      }

      if (e.type === "plant") {
        if (dist < 140) {
          e.shootTimer--;
          if (e.shootTimer <= 0) {
            e.shootTimer = 120 + flr(rnd(60));
            const dir = dx < 0 ? -1 : 1;
            enemies.push({
              type: "bone", x: e.x, y: e.y - 4,
              vx: dir * 1.5, vy: -2.5, hp: 1, alive: true,
              life: 80, animTimer: 0
            });
          }
        }
      }

      // Enemy-player collision
      if (e.type !== "bone" && player.alive && player.invincible <= 0) {
        if (player.x + 6 > e.x && player.x < e.x + 7 &&
            player.y + 7 > e.y && player.y < e.y + 7) {
          hitPlayer();
        }
      }
      if (e.type === "bone" && player.alive && player.invincible <= 0) {
        if (player.x + 6 > e.x && player.x < e.x + 6 &&
            player.y + 7 > e.y && player.y < e.y + 6) {
          hitPlayer();
          e.alive = false;
        }
      }
    }

    // Clean dead enemies
    for (let i = enemies.length - 1; i >= 0; i--) {
      if (!enemies[i].alive) enemies.splice(i, 1);
    }

    // --- Boss ---
    if (boss && boss.alive) {
      if (boss.flashTimer > 0) boss.flashTimer--;
      boss.animFrame = flr(titleAnim / 10) % 2;
      boss.timer--;
      if (boss.timer <= 0) {
        boss.timer = 60 + flr(rnd(40));
        for (let i = 0; i < 3; i++) {
          setTimeout(() => {
            if (!boss || !boss.alive) return;
            enemies.push({
              type: "bone", x: boss.x, y: boss.y + 4,
              vx: -2 - rnd(1), vy: -2 + rnd(1.5), hp: 1, alive: true,
              life: 90, animTimer: 0
            });
          }, i * 200);
        }
      }
      if (player.alive && player.invincible <= 0) {
        if (player.x + 6 > boss.x && player.x < boss.x + 16 &&
            player.y + 7 > boss.y && player.y < boss.y + 16) {
          hitPlayer();
        }
      }
    }

    // --- Chests ---
    for (const ch of chests) {
      if (!ch.alive) continue;
      if (player.alive && player.x + 6 > ch.x && player.x < ch.x + 8 &&
          player.y + 7 > ch.y && player.y < ch.y + 8) {
        ch.alive = false;
        sfxPickup();
        pickups.push({
          x: ch.x, y: ch.y - 10, vy: -2,
          type: ch.content, life: 180
        });
      }
    }

    // --- Pickups ---
    for (let i = pickups.length - 1; i >= 0; i--) {
      const pk = pickups[i];
      pk.vy += 0.15;
      pk.y += pk.vy;
      const pgy = getGroundAt(pk.x + 4);
      if (pk.y + 8 >= pgy) { pk.y = pgy - 8; pk.vy = 0; }
      pk.life--;
      if (pk.life <= 0) { pickups.splice(i, 1); continue; }
      if (player.alive && player.x + 6 > pk.x && player.x < pk.x + 8 &&
          player.y + 7 > pk.y && player.y < pk.y + 8) {
        if (pk.type === 4) {
          player.armor = 2;
        } else {
          player.weapon = pk.type;
        }
        sfxPickup();
        score += 100;
        pickups.splice(i, 1);
      }
    }

    // --- Particles ---
    for (let i = particles.length - 1; i >= 0; i--) {
      const p = particles[i];
      p.x += p.vx; p.y += p.vy; p.vy += 0.1; p.life--;
      if (p.life <= 0) particles.splice(i, 1);
    }
  };

  // ============================================================
  // Draw
  // ============================================================
  GrayBox._draw = function() {
    cls(0);
    const cx = flr(camera.x);

    if (state === "title") {
      // Starry dots
      for (let i = 0; i < 40; i++) {
        const sx = (i * 37 + titleAnim) % W;
        const sy = 20 + (i * 23) % (H - 40);
        pix(sx, sy, 1);
      }
      // Ground
      for (let x = 0; x < W; x += 8) {
        sprT(22, x, GROUND_Y);
        sprT(23, x, GROUND_Y + 8);
      }
      // Decorations
      sprT(24, 40, GROUND_Y - 8);
      sprT(24, 120, GROUND_Y - 8);
      sprT(24, 227, GROUND_Y - 8);
      sprT(25, 80, GROUND_Y - 8);
      sprT(25, 187, GROUND_Y - 8);
      sprT(25, 267, GROUND_Y - 8);

      // Title
      const ty = 38 + sin(titleAnim * 0.04) * 5;
      drawText("GHOSTS N GOBLINS", 120, flr(ty), 3);
      drawText("GHOSTS N GOBLINS", 121, flr(ty) + 1, 1);
      rectf(110, flr(ty) + 12, 147, 1, 2);

      // Showcase
      const by = flr(ty) + 23;
      sprT(1, 133, by + sin(titleAnim * 0.06) * 2);
      sprT(15, 160, by + 2 + sin(titleAnim * 0.06 + 1) * 2);
      sprT(17, 180, by - 2 + sin(titleAnim * 0.06 + 2) * 3);
      sprT(18, 200, by + sin(titleAnim * 0.06 + 3) * 2);
      sprT(20, 107, by + 2 + sin(titleAnim * 0.06 + 4) * 2);

      if (flr(titleAnim / 20) % 2 === 0) drawText("PRESS START", 133, 135, 3);

      drawText("Z:JUMP  X:THROW  ARROWS:MOVE", 88, 158, 2);
      drawText("3 LIVES  2-HIT ARMOR  4 WEAPONS", 80, 169, 1);
      drawText("GRAYBOX DEMO V0.1", 116, 229, 1);
      return;
    }

    if (state === "gameover") {
      for (const p of particles) pix(flr(p.x - cx), flr(p.y), p.color);
      drawText("GAME OVER", 138, 83, 3);
      drawText("SCORE: " + score, 127, 105, 2);
      if (flr(titleAnim / 20) % 2 === 0) drawText("PRESS START", 133, 150, 3);
      return;
    }

    if (state === "win") {
      drawText("CONGRATULATIONS!", 120, 60, 3);
      sprT(1, 140, 98);
      sprT(37, 160, 98);
      drawText("ARTHUR RESCUED", 126, 120, 2);
      drawText("THE PRINCESS!", 128, 131, 2);
      drawText("SCORE: " + score, 127, 158, 3);
      if (flr(titleAnim / 20) % 2 === 0) drawText("PRESS START", 133, 188, 3);
      drawText("GRAYBOX DEMO V0.1", 116, 229, 1);
      return;
    }

    // --- Play rendering ---

    // Background hills (parallax)
    for (let bx = 0; bx < W; bx += 2) {
      const worldX = bx + cx * 0.3;
      const hillH = 23 + sin(worldX * 0.01) * 11 + sin(worldX * 0.025) * 6;
      const baseY = GROUND_Y - 15;
      for (let by = baseY; by > baseY - hillH; by--) {
        if (by >= 0 && by < H) pix(bx, by, 1);
      }
    }

    // Mid-ground trees (parallax)
    for (let tx = -1; tx < 8; tx++) {
      const treeX = tx * 53 - (cx * 0.5) % 53;
      sprT(35, flr(treeX), GROUND_Y - 21);
    }

    // Decorations
    for (const d of levelData.decorations) {
      const sx = d.x - cx;
      if (sx > -16 && sx < W + 16) {
        const dgy = getGroundAt(d.x);
        if (dgy < H) sprT(d.sprId, flr(sx), dgy - 8);
      }
    }

    // Ground tiles
    for (const g of levelData.grounds) {
      const gsx = g.x - cx;
      if (gsx + g.w < -8 || gsx > W + 8) continue;
      for (let tx = 0; tx < g.w; tx += 8) {
        const sx = flr(gsx + tx);
        if (sx > -8 && sx < W) {
          sprT(22, sx, g.y);
          sprT(23, sx, g.y + 8);
        }
      }
    }

    // Platforms
    for (const p of levelData.platforms) {
      const psx = p.x - cx;
      if (psx + p.w < -8 || psx > W + 8) continue;
      for (let tx = 0; tx < p.w; tx += 8) {
        const sx = flr(psx + tx);
        if (sx > -8 && sx < W) sprT(27, sx, p.y);
      }
    }

    // Chests
    for (const ch of chests) {
      if (!ch.alive) continue;
      const sx = ch.x - cx;
      if (sx > -8 && sx < W) sprT(26, flr(sx), flr(ch.y));
    }

    // Pickups
    for (const pk of pickups) {
      const sx = pk.x - cx;
      if (sx > -8 && sx < W) {
        if (pk.life < 60 && flr(pk.life / 4) % 2 === 0) continue;
        if (pk.type === 4) {
          sprT(38, flr(sx), flr(pk.y));
        } else {
          sprT(11 + pk.type, flr(sx), flr(pk.y));
        }
      }
    }

    // Enemies
    for (const e of enemies) {
      if (!e.alive) continue;
      const sx = e.x - cx;
      if (sx < -16 || sx > W + 16) continue;

      if (e.type === "zombie") {
        if (e.state === "buried") continue;
        if (e.state === "rising") {
          sprT(16, flr(sx), flr(e.y));
        } else {
          sprT(15, flr(sx), flr(e.y), e.walkDir < 0);
        }
      }
      if (e.type === "ghost") sprT(17, flr(sx), flr(e.y));
      if (e.type === "arremer") {
        const fr = flr(e.animTimer / 8) % 2 === 0 ? 18 : 19;
        sprT(fr, flr(sx), flr(e.y), e.vx > 0);
      }
      if (e.type === "skeleton") sprT(20, flr(sx), flr(e.y), e.walkDir < 0);
      if (e.type === "plant") sprT(21, flr(sx), flr(e.y));
      if (e.type === "bone") {
        rectf(flr(sx), flr(e.y), 4, 4, 2);
        pix(flr(sx) + 1, flr(e.y) + 1, 3);
      }
    }

    // Boss
    if (boss && boss.alive) {
      const bsx = flr(boss.x - cx);
      if (boss.flashTimer > 0 && boss.flashTimer % 2 === 0) {
        rectf(bsx, boss.y, 16, 16, 3);
      } else {
        sprT(28, bsx, boss.y);
        sprT(29, bsx + 8, boss.y);
        sprT(30, bsx, boss.y + 8);
        sprT(31, bsx + 8, boss.y + 8);
      }
      // HP bar
      const barW = 40;
      const barX = bsx - 12;
      const barY = boss.y - 8;
      rectf(barX, barY, barW, 3, 1);
      rectf(barX, barY, flr(barW * boss.hp / boss.maxHp), 3, 3);
      rect(barX, barY, barW, 3, 2);
    }

    // Projectiles
    for (const p of projectiles) {
      const sx = p.x - cx;
      if (sx > -8 && sx < W) sprT(11 + p.weapon, flr(sx), flr(p.y), p.vx < 0);
    }

    // Player
    if (player.alive) {
      if (player.invincible > 0 && flr(player.invincible / 3) % 2 === 0) {
        // blink
      } else {
        const armored = player.armor >= 2;
        let sprId;
        const flip = player.facing < 0;
        if (!player.grounded) {
          sprId = armored ? 5 : 6;
        } else if (player.crouching) {
          sprId = armored ? 7 : 8;
        } else if (btn("left") || btn("right")) {
          sprId = armored ? (1 + player.walkFrame) : (3 + player.walkFrame);
        } else {
          sprId = armored ? 1 : 3;
        }
        sprT(sprId, flr(player.x - cx), flr(player.y), flip);
      }
    } else {
      if (deathTimer > 60) {
        sprT(9, flr(player.x - cx), flr(player.y));
      } else if (deathTimer > 30) {
        sprT(10, flr(player.x - cx), flr(player.y));
      }
    }

    // Particles
    for (const p of particles) pix(flr(p.x - cx), flr(p.y), p.color);

    // --- HUD ---
    rectf(0, 0, W, 14, 0);
    drawText("SCORE:" + score, 4, 3, 3);
    drawText("TIME:" + timeLeft, 133, 3, timeLeft <= 30 ? 3 : 2);
    drawText(WEAPON_NAMES[player.weapon], 213, 3, 2);
    for (let i = 0; i < lives; i++) sprT(36, W - 40 + i * 10, 2);
    if (player.armor >= 2) drawText("AR", 253, 3, 2);
    else if (player.armor === 1) drawText("AR", 253, 3, 1);

    // Progress bar
    const progress = player.x / LEVEL_WIDTH;
    rectf(0, H - 2, flr(W * progress), 2, 2);
  };

  GrayBox.boot("screen");
})();
</script>
</body>
