    justify-content: center;
    height: 100vh;
    font-family: monospace;
    overflow: hidden;
  }
  #frame {
    background: #111;
    border: 3px solid #333;
    border-radius: 8px;
    padding: 12px;
    box-shadow: 0 0 40px rgba(0,0,0,0.8), inset 0 0 20px rgba(0,0,0,0.5);

  canvas {

    image-rendering: crisp-edges;
  }
  #controls {

    font-size: 11px;
    text-align: center;
    letter-spacing: 1px;

  #controls span { color: #b0b0b0; }
</style>

  // Enemy spawn positions per level (col, row in tile coords)
  const LEVEL_ENEMIES = [
    // Level 1
    [{c:10,r:11,t:0},{c:29,r:11,t:0},{c:17,r:14,t:1},{c:23,r:14,t:0}],
    // Level 2
    [{c:7,r:5,t:0},{c:23,r:8,t:1},{c:7,r:11,t:0},{c:23,r:14,t:1},{c:7,r:17,t:0}],
    // Level 3
    [{c:8,r:9,t:0},{c:16,r:9,t:1},{c:24,r:9,t:0},{c:32,r:9,t:1},{c:13,r:5,t:0},{c:27,r:5,t:1}],
    // Level 4
    [{c:20,r:5,t:1},{c:13,r:11,t:0},{c:27,r:11,t:0},{c:10,r:16,t:1},{c:30,r:16,t:1},{c:20,r:20,t:0}],
    // Level 5
    [{c:13,r:8,t:0},{c:27,r:8,t:1},{c:20,r:11,t:0},{c:13,r:14,t:1},{c:27,r:14,t:0},{c:13,r:20,t:1},{c:27,r:20,t:0}],
    // Level 6
    [{c:20,r:4,t:0},{c:27,r:7,t:1},{c:17,r:10,t:0},{c:13,r:13,t:1},{c:10,r:16,t:0},{c:7,r:19,t:1}],
    // Level 7
    [{c:7,r:4,t:0},{c:17,r:6,t:1},{c:27,r:4,t:0},{c:37,r:6,t:1},{c:7,r:13,t:0},{c:17,r:11,t:1},{c:27,r:13,t:0},{c:37,r:11,t:1}],
  ];

  // --- Game state ---
  const { TITLE, PLAY, CLEAR, GAMEOVER } = GrayBox.SCENE;
  let player, bubbles, enemies, items, particles;
  let score, lives, level, levelTimer, invincible;
  let levelMap; // current level collision grid
  let shootCooldown;
  let hurryTimer; // enemies speed up after a while

  function loadLevel(lvl) {
    const idx = lvl % LEVELS.length;
    const data = LEVELS[idx];
    levelMap = [];
    for (let r = 0; r < ROWS; r++) {
      levelMap[r] = [];
      for (let c = 0; c < COLS; c++) {
        // Always add walls on left and right edges
        if (c === 0 || c === COLS - 1) {
          levelMap[r][c] = 1;
        } else if (r < data.length && c < data[r].length) {
          levelMap[r][c] = data[r][c] === '#' ? 1 : 0;
        } else {
          levelMap[r][c] = 0;
        }
      }
    }
    // Bottom row always solid
    for (let c = 0; c < COLS; c++) levelMap[ROWS - 1][c] = 1;
  }

  function solidAt(px, py) {
    const c = flr(px / TILE);
    const r = flr(py / TILE);
    if (c < 0 || c >= COLS) return true;
    if (r < 0 || r >= ROWS) return false; // top is open
    return levelMap[r] && levelMap[r][c] === 1;
  }

  function solidBelow(px, py, w) {
    // Check if there's solid ground below the entity (feet level)
    const r = flr(py / TILE);
    if (r < 0 || r >= ROWS) return false;
    const c1 = flr(px / TILE);
    const c2 = flr((px + w - 1) / TILE);
    for (let c = c1; c <= c2; c++) {
      if (c >= 0 && c < COLS && levelMap[r] && levelMap[r][c] === 1) return true;
    }
    return false;
  }

  function resetGame() {
    score = 0;
    lives = 3;
    level = 0;
    startLevel();
  }

  function startLevel() {
    loadLevel(level);
    const idx = level % LEVELS.length;

    player = {
      x: 21, y: (ROWS - 3) * TILE,
      vx: 0, vy: 0,
      dir: 1, // 1=right, -1=left
      onGround: false,
      animTimer: 0,
    };
    bubbles = [];
    enemies = [];
    items = [];
    particles = [];
    shootCooldown = 0;
    invincible = 60; // brief invincibility at level start
    hurryTimer = 30 * 20; // 20 seconds until "HURRY"
    levelTimer = 90; // show level text

    // Spawn enemies
    const spawns = LEVEL_ENEMIES[idx] || LEVEL_ENEMIES[0];
    const speedMult = 1 + level * 0.1;
    for (const sp of spawns) {
      enemies.push({
        x: sp.c * TILE, y: sp.r * TILE,
        vx: (rnd(1) > 0.5 ? 1 : -1) * (0.8 + rnd(0.4)) * speedMult,
        vy: 0,
        type: sp.t, // 0=blob, 1=ghost
        onGround: false,
        alive: true,
        angry: false, // gets angry when hurry
        animTimer: flr(rnd(30)),
        dirChangeTimer: 60 + flr(rnd(60)),
      });
    }
  }

  function spawnItem(x, y) {
    const types = [7, 8, 9]; // cherry, melon, diamond
    const pts = [100, 200, 500];
    const idx = flr(rnd(3));
    items.push({
      x: x, y: y,
      vy: 0,
      type: types[idx],
      pts: pts[idx],
      life: 300, // disappears after 10 seconds
      onGround: false,
    });
  }

  function addPop(x, y) {
    for (let i = 0; i < 6; i++) {
      particles.push({
        x: x + 4, y: y + 4,
        vx: rnd(4) - 2, vy: rnd(3) - 2,
        life: 8 + flr(rnd(8)),
        color: flr(rnd(3)) + 1,
      });
    }
  }

  // --- Sound effects ---
  function sfxJump() { note(0, "E5", 0.06); setTimeout(() => note(0, "G5", 0.04), 40); }
  function sfxShoot() { note(0, "C5", 0.05); setTimeout(() => note(0, "E5", 0.03), 30); }
  function sfxPop() { note(1, "G5", 0.04); setTimeout(() => note(1, "C6", 0.06), 30); }
  function sfxDeath() {
    note(0, "C3", 0.12); note(1, "G2", 0.12);
    setTimeout(() => { note(0, "A2", 0.18); note(1, "E2", 0.18); }, 120);
  }
  function sfxItem() { note(1, "E5", 0.05); setTimeout(() => note(1, "A5", 0.05), 50); }
  function sfxLevelClear() {
    note(0, "C5", 0.1);
    setTimeout(() => note(0, "E5", 0.1), 100);
    setTimeout(() => note(0, "G5", 0.1), 200);
    setTimeout(() => note(0, "C6", 0.15), 300);
  }

  // --- Physics helpers ---
  function moveEntity(e, w, h, isPlayer) {
    // Horizontal movement
    const nx = e.x + e.vx;
    const left = nx;
    const right = nx + w - 1;
    const top = e.y;
    const bot = e.y + h - 1;

    // Check horizontal collision
    let blockedH = false;
    if (e.vx > 0) {
      for (let py = flr(top / TILE); py <= flr(bot / TILE); py++) {
        if (solidAt(right + 1, py * TILE)) { blockedH = true; break; }
      }
    } else if (e.vx < 0) {
      for (let py = flr(top / TILE); py <= flr(bot / TILE); py++) {
        if (solidAt(left, py * TILE)) { blockedH = true; break; }
      }
    }

    if (!blockedH) {
      e.x = nx;
    } else {
      if (e.vx > 0) e.x = flr((right + 1) / TILE) * TILE - w;
      else if (e.vx < 0) e.x = (flr(left / TILE) + 1) * TILE;
    }

    // Gravity
    e.vy += GRAVITY;
    if (e.vy > 6) e.vy = 6;

    const ny = e.y + e.vy;
    e.onGround = false;

    if (e.vy > 0) {
      // Falling — check solid below
      const feetY = ny + h;
      const feetRow = flr(feetY / TILE);
      const leftC = flr(e.x / TILE);
      const rightC = flr((e.x + w - 1) / TILE);
      let landed = false;
      for (let c = leftC; c <= rightC; c++) {
        if (c >= 0 && c < COLS && feetRow >= 0 && feetRow < ROWS && levelMap[feetRow] && levelMap[feetRow][c] === 1) {
          // Only land if we were above this tile previously
          if (e.y + h <= feetRow * TILE + 1) {
            landed = true;
            break;
          }
        }
      }
      if (landed) {
        e.y = feetRow * TILE - h;
        e.vy = 0;
        e.onGround = true;
      } else {
        e.y = ny;
      }
    } else {
      // Rising — pass through platforms (Bubble Bobble style)
      e.y = ny;
    }

    // Wrap around: falling off bottom appears at top
    if (e.y > H + 8) {
      e.y = -h;
    }
    // If above screen and falling, let it come back
    if (e.y < -h * 2) {
      e.y = -h;
    }
  }

  // --- Title Scene ---
  GrayBox.scene(TITLE, {
    init() {},
    update() {
      if (btnp("a") || btnp("b") || btnp("a")) {
        GrayBox.go(PLAY);

  // --- Play Scene ---
  GrayBox.scene(PLAY, {
    init() { resetGame(); },
    update() {
    // --- Play state ---

    if (levelTimer > 0) levelTimer--;
    if (invincible > 0) invincible--;

    // Hurry timer
    hurryTimer--;
    if (hurryTimer === 0) {
      // Make all enemies angry (faster)
      for (const e of enemies) {
        if (e.alive) {
          e.angry = true;
          e.vx *= 1.8;
        }
      }
    }

    // Player movement
    if (btn("left")) {
      player.vx = -MOVE_SPEED;
      player.dir = -1;
    } else if (btn("right")) {
      player.vx = MOVE_SPEED;
      player.dir = 1;
    } else {
      player.vx = 0;
    }

    // Jump
    if (btnp("a") && player.onGround) {
      player.vy = JUMP_VEL;
      player.onGround = false;
      sfxJump();
    }

    // Shoot bubble
    if (shootCooldown > 0) shootCooldown--;
    if (btnp("b") && shootCooldown <= 0 && bubbles.length < MAX_BUBBLES) {
      bubbles.push({
        x: player.x + (player.dir > 0 ? 8 : -8),
        y: player.y,
        vx: player.dir * BUBBLE_SPEED,
        vy: 0,
        state: "shot", // shot -> floating -> trapped
        life: BUBBLE_LIFE,
        trappedEnemy: null,
        floatTimer: 0,
        shotTimer: 15, // frames before it starts floating
      });
      shootCooldown = 10;
      sfxShoot();
    }

    player.animTimer++;
    moveEntity(player, 7, 8, true);

    // Clamp player to arena
    if (player.x < TILE) player.x = TILE;
    if (player.x > W - TILE - 7) player.x = W - TILE - 7;

    // Update bubbles
    for (let i = bubbles.length - 1; i >= 0; i--) {
      const b = bubbles[i];
      b.life--;
      if (b.life <= 0) {
        // Pop!
        addPop(b.x, b.y);
        if (b.trappedEnemy) {
          // Enemy escapes if bubble times out
          enemies.push({
            x: b.x, y: b.y, vx: (rnd(1) > 0.5 ? 1 : -1) * 1.2,
            vy: 0, type: b.trappedEnemy.type, onGround: false,
            alive: true, angry: true, animTimer: 0,
            dirChangeTimer: 30 + flr(rnd(30)),
          });
        }
        bubbles.splice(i, 1);
        continue;
      }

      if (b.state === "shot") {
        b.x += b.vx;
        b.shotTimer--;
        // Check if bubble hits a wall
        if (solidAt(b.x, b.y + 3) || solidAt(b.x + 7, b.y + 3)) {
          b.state = "floating";
          b.vx = 0;
        }
        if (b.shotTimer <= 0) {
          b.state = "floating";
          b.vx = 0;
        }

        // Check if bubble traps an enemy
        if (!b.trappedEnemy) {
          for (let j = enemies.length - 1; j >= 0; j--) {
            const e = enemies[j];
            if (!e.alive) continue;
            if (b.x + 8 > e.x && b.x < e.x + 8 && b.y + 8 > e.y && b.y < e.y + 8) {
              b.trappedEnemy = { type: e.type };
              b.state = "floating";
              b.vx = 0;
              enemies.splice(j, 1);
              note(1, "A5", 0.04);
              break;
            }
          }
        }
      }

      if (b.state === "floating") {
        // Float upward with slight wobble
        b.floatTimer++;
        b.vy = BUBBLE_FLOAT_SPEED;
        b.vx = sin(b.floatTimer * 0.08) * 0.3;
        b.x += b.vx;
        b.y += b.vy;

        // Clamp to arena
        if (b.x < TILE) b.x = TILE;
        if (b.x > W - TILE - 8) b.x = W - TILE - 8;
        if (b.y < 4) { b.y = 4; b.vy = 0; } // stop at top

        // Player can pop trapped bubbles by touching them
        if (b.trappedEnemy) {
          const dx = _abs((player.x + 0) - (b.x + 4));
          const dy = _abs((player.y + 4) - (b.y + 4));
          if (dx < 9 && dy < 9) {
            // Pop! Defeat enemy
            sfxPop();
            addPop(b.x, b.y);
            score += 100 * (level + 1);
            spawnItem(b.x, b.y);
            bubbles.splice(i, 1);
            continue;
          }
        }
      }
    }

    // Update enemies
    for (let i = enemies.length - 1; i >= 0; i--) {
      const e = enemies[i];
      if (!e.alive) continue;

      e.animTimer++;
      e.dirChangeTimer--;

      // Simple AI: walk back and forth, occasionally jump
      if (e.dirChangeTimer <= 0) {
        e.vx = -e.vx; // reverse direction
        e.dirChangeTimer = 40 + flr(rnd(80));
        // Occasionally jump
        if (e.onGround && rnd(1) < 0.3) {
          e.vy = -4;
          e.onGround = false;
        }
      }

      // Ghost type can jump more
      if (e.type === 1 && e.onGround && rnd(1) < 0.02) {
        e.vy = -4.5;
        e.onGround = false;
      }

      moveEntity(e, 7, 8, false);

      // Bounce off walls
      if (e.x <= TILE) { e.x = TILE; e.vx = _abs(e.vx); }
      if (e.x >= W - TILE - 7) { e.x = W - TILE - 7; e.vx = -_abs(e.vx); }

      // Enemy-player collision
      if (invincible <= 0) {
        const dx = _abs((player.x + 0) - (e.x + 0));
        const dy = _abs((player.y + 4) - (e.y + 4));
        if (dx < 7 && dy < 7) {
          // Player dies
          lives--;
          addPop(player.x, player.y);
          sfxDeath();
          if (lives <= 0) {
            GrayBox.go(GAMEOVER); return;
            for (let k = 0; k < 20; k++) {
              particles.push({
                x: player.x + 4, y: player.y + 4,
                vx: rnd(6) - 3, vy: rnd(6) - 4,
                life: 15 + flr(rnd(15)), color: flr(rnd(3)) + 1,
              });
            }
          } else {
            // Respawn
            player.x = 21;
            player.y = (ROWS - 3) * TILE;
            player.vx = 0;
            player.vy = 0;
            invincible = 90;
          }
          break;
        }
      }
    }

    // Update items
    for (let i = items.length - 1; i >= 0; i--) {
      const it = items[i];
      it.life--;
      if (it.life <= 0) { items.splice(i, 1); continue; }

      // Apply gravity to items
      it.vy += GRAVITY;
      if (it.vy > 4) it.vy = 4;
      const ny = it.y + it.vy;
      const feetRow = flr((ny + 8) / TILE);
      const c1 = flr(it.x / TILE);
      const c2 = flr((it.x + 7) / TILE);
      let landed = false;
      for (let c = c1; c <= c2; c++) {
        if (c >= 0 && c < COLS && feetRow >= 0 && feetRow < ROWS && levelMap[feetRow] && levelMap[feetRow][c] === 1) {
          if (it.y + 8 <= feetRow * TILE + 1) { landed = true; break; }
        }
      }
      if (landed) {
        it.y = feetRow * TILE - 8;
        it.vy = 0;
      } else {
        it.y = ny;
      }
      if (it.y > H + 16) { items.splice(i, 1); continue; }

      // Player picks up item
      const dx = _abs((player.x + 0) - (it.x + 4));
      const dy = _abs((player.y + 4) - (it.y + 4));
      if (dx < 8 && dy < 8) {
        score += it.pts;
        sfxItem();
        addPop(it.x, it.y);
        // Score popup particle
        particles.push({
          x: it.x, y: it.y, vx: 0, vy: -0.8,
          life: 30, color: 3, text: "" + it.pts,
        });
        items.splice(i, 1);
      }
    }

    // Update particles
    for (let i = particles.length - 1; i >= 0; i--) {
      const p = particles[i];
      p.x += p.vx; p.y += p.vy;
      if (!p.text) p.vy += 0.05;
      p.life--;
      if (p.life <= 0) particles.splice(i, 1);
    }

    // Check level clear
    if (enemies.length === 0 && state === "play") {
      GrayBox.go(CLEAR);
      levelTimer = 90;
      sfxLevelClear();
    }
    },
    draw() {
      cls(0);
  

    if (state === "title") {
      // Title screen
      const ty = 38 + sin(GrayBox.frame * 0.05) * 5;

      text("BUBBLE BOBBLE", 128, flr(ty), 3);
      text("BUBBLE BOBBLE", 129, flr(ty) + 1, 1);
      rectf(100, flr(ty) + 12, 120, 1, 2);

      // Animated dragon
      const bx = W / 2 - 20;
      spr(1, bx, flr(ty) + 24 + sin(GrayBox.frame * 0.1) * 3);
      // Some floating bubbles
      for (let i = 0; i < 5; i++) {
        const bby = flr(ty) + 22 + sin(GrayBox.frame * 0.06 + i * 1.3) * 8;
        const bbx = bx + 13 + i * 11;
        spr(3, bbx, bby);
      }

      // Show enemies
      spr(5, bx - 11, flr(ty) + 24 + sin(GrayBox.frame * 0.08 + 2) * 3, true);
      spr(6, bx + 67, flr(ty) + 24 + sin(GrayBox.frame * 0.08 + 4) * 3);

      if (flr(GrayBox.frame / 20) % 2 === 0)
        text("PRESS A", 133, 135, 3);

      // Instructions
      text("-HOW TO PLAY-", 128, 158, 2);
      text("A  JUMP", 143, 168, 2);
      text("B  SHOOT BUBBLE", 123, 176, 2);
      text("POP BUBBLES TO", 126, 188, 2);
      text("DEFEAT ENEMIES!", 123, 195, 2);

      text("GRAYBOX DEMO V0.1", 118, 229, 1);
      return;
    }

    if (state === "gameover") {
      drawLevel();
      for (const p of particles) {
        if (p.text) {
          text(p.text, flr(p.x), flr(p.y), p.color);
        } else {
          pix(flr(p.x), flr(p.y), p.color);
        }
      }
      text("GAME OVER", 138, 90, 3);
      text("SCORE: " + score, 128, 109, 2);
      text("LEVEL: " + (level + 1), 138, 120, 2);
      if (flr(GrayBox.frame / 20) % 2 === 0) text("PRESS A", 133, 158, 3);
      return;
    }

    // --- Play / LevelClear state rendering ---
    drawLevel();

    // Items
    for (const it of items) {
      if (it.life < 60 && flr(GrayBox.frame / 4) % 2 === 0) continue; // blink when about to disappear
      spr(it.type, flr(it.x), flr(it.y));
    }

    // Bubbles
    for (const b of bubbles) {
      if (b.trappedEnemy) {
        // Draw trapped bubble
        spr(4, flr(b.x), flr(b.y));
      } else {
        // Draw regular bubble, animate slightly
        spr(3, flr(b.x), flr(b.y));
      }
    }

    // Enemies
    for (const e of enemies) {
      if (!e.alive) continue;
      const sprId = e.type === 0 ? 5 : 6;
      const flipX = e.vx < 0;
      // Flash when angry
      if (e.angry && flr(GrayBox.frame / 4) % 2 === 0) {
        spr(sprId, flr(e.x), flr(e.y), flipX);
      } else {
        spr(sprId, flr(e.x), flr(e.y), flipX);
      }
    }

    // Player
    // Blink when invincible
    if (invincible <= 0 || flr(GrayBox.frame / 3) % 2 === 0) {
      spr(1, flr(player.x), flr(player.y), player.dir < 0);
    }

    // Particles
    for (const p of particles) {
      if (p.text) {
        text(p.text, flr(p.x), flr(p.y), p.color);
      } else {
        pix(flr(p.x), flr(p.y), p.color);
      }
    }

    // HUD
    rectf(0, 0, W, 10, 0);
    text("SCORE:" + score, 4, 2, 3);
    text("LV:" + (level + 1), W / 2 - 15, 2, 2);
    for (let i = 0; i < lives; i++) spr(11, W - 30 + i * 10, 1);

    // Level announcement
    if (levelTimer > 60 && state === "play") {
      const msgY = 105 + sin(levelTimer * 0.1) * 3;
      text("LEVEL " + (level + 1), 143, flr(msgY), 3);
      text("GET READY!", 136, flr(msgY) + 14, 2);
    }

    // Level clear message
    // Hurry warning
    if (hurryTimer < 150 && hurryTimer > 0 && flr(GrayBox.frame / 10) % 2 === 0) {
      text("HURRY UP!", 138, 116, 3);
    }
    if (hurryTimer <= 0 && flr(GrayBox.frame / 15) % 2 === 0) {
      text("HURRY!", 146, 116, 3);
    }
    }
  });

  function drawLevel() {
    if (!levelMap) return;
    for (let r = 0; r < ROWS; r++) {
      for (let c = 0; c < COLS; c++) {
        if (levelMap[r] && levelMap[r][c] === 1) {
          if (c === 0 || c === COLS - 1) spr(10, c * TILE, r * TILE);
          else spr(2, c * TILE, r * TILE);
        }
      }
    }
  }

  // --- Level Clear Scene ---
  GrayBox.scene(CLEAR, {
    init() { levelTimer = 90; },
    update() {
      levelTimer--;
      for (let i = items.length - 1; i >= 0; i--) {
        items[i].vy += GRAVITY;
        items[i].y += items[i].vy;
        if (items[i].y > H + 16) items.splice(i, 1);
      }
      for (let i = particles.length - 1; i >= 0; i--) {
        const p = particles[i]; p.x += p.vx; p.y += p.vy; p.vy += 0.05; p.life--;
        if (p.life <= 0) particles.splice(i, 1);
      }
      if (levelTimer <= 0) {
        level++;
        startLevel();
        GrayBox.go(PLAY);
      }
    },
    draw() {
      cls(0);
      drawLevel();
      for (const it of items) { if (it.life > 30 || flr(GrayBox.frame / 4) % 2 === 0) spr(it.type, it.x, it.y); }
      for (const p of particles) pix(flr(p.x), flr(p.y), p.color);
      rectf(0, 0, W, 10, 0);
      text("SCORE " + score, 4, 2, 3);
      for (let i = 0; i < lives; i++) spr(11, W - 40 + i * 10, 2);
      const msg = "LEVEL " + (level + 1) + " CLEAR!";
      text(msg, (W - msg.length * 5) / 2, H / 2 - 10, 3);
    }
  });

  // --- Game Over Scene ---
  GrayBox.scene(GAMEOVER, {
    init() {},
    update() {
      for (let i = particles.length - 1; i >= 0; i--) {
        const p = particles[i]; p.x += p.vx; p.y += p.vy; p.vy += 0.08; p.life--;
        if (p.life <= 0) particles.splice(i, 1);
      }
      if (btnp("a") || btnp("a")) GrayBox.go(TITLE);
    },
    draw() {
      cls(0);
      for (const p of particles) pix(flr(p.x), flr(p.y), p.color);
      text("GAME OVER", W / 2 - 22, 90, 3);
      text("SCORE: " + score, W / 2 - 18, 110, 2);
      if (flr(GrayBox.frame / 20) % 2 === 0) text("PRESS A", W / 2 - 17, 140, 3);
    }
  });

  function drawTitleScreen() {


    // Title screen
    const ty = 38 + sin(GrayBox.frame * 0.05) * 5;

    text("BUBBLE BOBBLE", 128, flr(ty), 3);
    text("BUBBLE BOBBLE", 129, flr(ty) + 1, 1);
    rectf(100, flr(ty) + 12, 120, 1, 2);

    // Animated dragon
    const bx = W / 2 - 20;
    spr(1, bx, flr(ty) + 24 + sin(GrayBox.frame * 0.1) * 3);
    // Some floating bubbles
    for (let i = 0; i < 5; i++) {
      const bby = flr(ty) + 22 + sin(GrayBox.frame * 0.06 + i * 1.3) * 8;
      const bbx = bx + 13 + i * 11;
      spr(3, bbx, bby);
    }

    // Show enemies
    spr(5, bx - 11, flr(ty) + 24 + sin(GrayBox.frame * 0.08 + 2) * 3, true);
    spr(6, bx + 67, flr(ty) + 24 + sin(GrayBox.frame * 0.08 + 4) * 3);

    if (flr(GrayBox.frame / 20) % 2 === 0)
      text("PRESS A", 133, 135, 3);

    // Instructions
    text("-HOW TO PLAY-", 128, 158, 2);
    text("A  JUMP", 143, 168, 2);
    text("B  SHOOT BUBBLE", 123, 176, 2);
    text("POP BUBBLES TO", 126, 188, 2);
    text("DEFEAT ENEMIES!", 123, 195, 2);

    text("GRAYBOX DEMO V0.1", 118, 229, 1);
  }

  GrayBox.go(TITLE);
  GrayBox.boot("screen");
})();
</script>
