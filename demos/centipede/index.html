<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mono — Demo: Centipede</title>
<link rel="stylesheet" href="../../runtime/mono.css">
</head>
<body>
<div id="frame">
  <canvas id="screen"></canvas>
</div>
<div id="controls">
  <span>ARROWS</span> MOVE &nbsp;&nbsp; <span>A</span> SHOOT &nbsp;&nbsp; <span>1</span> HITBOXES
</div>
<script src="../../runtime/engine.js"></script>
<script>
(() => {
  "use strict";
  const W = Mono.WIDTH, H = Mono.HEIGHT;
  const { cls, pix, line, rect, rectf, circ, circf, sprite: defSprite,
          spr, text, btn, btnp, note, stop, rnd, flr, abs: _abs,
          min, max: _max, sin, cos, dbg, dbgC } = Mono;

  // --- 8x8 to 16x16 upscale helper ---
  function up(d){let o="";for(let r=0;r<8;r++){let row="";for(let c=0;c<8;c++){const ch=d[r*8+c];row+=ch+ch;}o+=row+row;}return o;}

  // --- Sprites (all upscaled to 16x16 = 256 chars) ---
  // 1: Player ship (blaster pointing up)
  defSprite(1, up(
    "00030000" +
    "00333000" +
    "00232000" +
    "03323300" +
    "33222330" +
    "33222330" +
    "03233200" +
    "00300300"
  ));
  // 2: Centipede head (facing right, with eyes and mandibles)
  defSprite(2, up(
    "01333100" +
    "13333310" +
    "33233230" +
    "33333330" +
    "33333330" +
    "33233230" +
    "13333310" +
    "01333100"
  ));
  // 3: Centipede body segment (round with pattern)
  defSprite(3, up(
    "01222100" +
    "12222210" +
    "22322320" +
    "22222220" +
    "22222220" +
    "22322320" +
    "12222210" +
    "01222100"
  ));
  // 4: Mushroom (full health - 4 hits)
  defSprite(4, up(
    "00333000" +
    "03333300" +
    "33233230" +
    "33333330" +
    "03333300" +
    "00211000" +
    "00211000" +
    "00111000"
  ));
  // 5: Mushroom (3 hits left - slight damage)
  defSprite(5, up(
    "00333000" +
    "03333300" +
    "33233230" +
    "33333330" +
    "00333000" +
    "00211000" +
    "00210000" +
    "00110000"
  ));
  // 6: Mushroom (2 hits left - medium damage)
  defSprite(6, up(
    "00333000" +
    "03333300" +
    "33033030" +
    "33333330" +
    "00330000" +
    "00210000" +
    "00210000" +
    "00100000"
  ));
  // 7: Mushroom (1 hit left - nearly destroyed)
  defSprite(7, up(
    "00330000" +
    "03330000" +
    "33033000" +
    "33330000" +
    "00300000" +
    "00200000" +
    "00100000" +
    "00000000"
  ));
  // 8: Player bullet
  defSprite(8, up(
    "00030000" +
    "00030000" +
    "00020000" +
    "00020000" +
    "00000000" +
    "00000000" +
    "00000000" +
    "00000000"
  ));
  // 9: Spider (bouncy enemy in player area)
  defSprite(9, up(
    "30000030" +
    "03300330" +
    "00333300" +
    "03322330" +
    "33333330" +
    "30333030" +
    "30033000" +
    "03000300"
  ));
  // 10: Flea (drops down creating mushrooms)
  defSprite(10, up(
    "00322000" +
    "00333000" +
    "03333300" +
    "33233230" +
    "00333000" +
    "00030000" +
    "00303000" +
    "03000300"
  ));
  // 11: Explosion frame 1
  defSprite(11, up(
    "00000000" +
    "00200100" +
    "01002000" +
    "00031000" +
    "00130200" +
    "01000010" +
    "00100000" +
    "00000000"
  ));
  // 12: Explosion frame 2
  defSprite(12, up(
    "20010020" +
    "01000010" +
    "00203200" +
    "03033030" +
    "00232000" +
    "01000300" +
    "20001001" +
    "00200010"
  ));
  // 13: Life icon
  defSprite(13, up(
    "00000000" +
    "00030000" +
    "00333000" +
    "00232000" +
    "03323300" +
    "33222330" +
    "00000000" +
    "00000000"
  ));
  // 14: Centipede head (facing left)
  defSprite(14, up(
    "01333100" +
    "13333310" +
    "32332330" +
    "33333330" +
    "33333330" +
    "32332330" +
    "13333310" +
    "01333100"
  ));

  // --- Tile / grid size (now 16x16) ---
  const T = 16;
  const GRID_W = W / T;   // 320 / 16 = 20
  const GRID_H = H / T;   // 240 / 16 = 15
  const HUD_H = 1;        // top 1 row for HUD (16px)
  const PLAYER_ROWS = 3;  // bottom 3 rows for player movement
  const PLAYER_MIN_Y = (GRID_H - PLAYER_ROWS) * T;

  // --- Game state ---
  const { TITLE, PLAY, GAMEOVER } = Mono.SCENE;
  let player, bullet, centipedes, mushrooms, spider, flea, explosions, particles;
  let score, lives, wave, waveTimer, waveMessage;
  let shootCooldown, respawnTimer;
  let fleaTimer, spiderTimer;

  // --- Collision helpers ---
  function boxOverlap(ax, ay, aw, ah, bx, by, bw, bh) {
    return ax + aw > bx && ax < bx + bw && ay + ah > by && ay < by + bh;
  }
  // Circle-circle collision
  function circCollide(ax, ay, ar, bx, by, br) {
    const dx = ax - bx, dy = ay - by;
    const dist = dx * dx + dy * dy;
    const rr = ar + br;
    return dist < rr * rr;
  }
  // Circle-rect collision
  function circRectCollide(cx, cy, cr, rx, ry, rw, rh) {
    const nx = _max(rx, min(cx, rx + rw));
    const ny = _max(ry, min(cy, ry + rh));
    const dx = cx - nx, dy = cy - ny;
    return dx * dx + dy * dy < cr * cr;
  }

  function resetGame() {
    player = { x: W / 2 - 8, y: H - 24, speed: 2.5 };
    bullet = null;
    centipedes = [];
    mushrooms = {};
    spider = null;
    flea = null;
    explosions = [];
    particles = [];
    score = 0;
    lives = 3;
    wave = 0;
    waveTimer = 0;
    waveMessage = 0;
    shootCooldown = 0;
    respawnTimer = 0;
    fleaTimer = 200 + flr(rnd(200));
    spiderTimer = 150 + flr(rnd(150));
    generateMushrooms();
    spawnWave();
  }

  function mushKey(gx, gy) { return gx + "," + gy; }
  function getMush(gx, gy) { return mushrooms[mushKey(gx, gy)] || 0; }
  function setMush(gx, gy, hp) {
    if (hp <= 0) delete mushrooms[mushKey(gx, gy)];
    else mushrooms[mushKey(gx, gy)] = hp;
  }

  function generateMushrooms() {
    mushrooms = {};
    const count = 20 + flr(rnd(15));
    for (let i = 0; i < count; i++) {
      const gx = flr(rnd(GRID_W));
      const gy = HUD_H + 1 + flr(rnd(GRID_H - HUD_H - PLAYER_ROWS - 2));
      setMush(gx, gy, 4);
    }
  }

  function spawnWave() {
    wave++;
    waveMessage = 90;
    const len = min(10, 6 + flr(wave / 2));
    const startX = flr(rnd(GRID_W - len));
    const dir = rnd(1) < 0.5 ? 1 : -1;
    const segments = [];
    for (let i = 0; i < len; i++) {
      segments.push({
        gx: startX + i * (-dir),
        gy: HUD_H,
        px: (startX + i * (-dir)) * T,
        py: HUD_H * T,
        dir: dir,
        isHead: i === 0,
        moveTimer: 0,
        speed: _max(2, 5 - flr(wave / 3)),
        descending: false,
        targetY: 0,
      });
    }
    centipedes.push(segments);
    if (wave > 2) {
      const soloCount = min(flr(wave / 3), 3);
      for (let i = 0; i < soloCount; i++) {
        const sx = flr(rnd(GRID_W));
        const sd = rnd(1) < 0.5 ? 1 : -1;
        centipedes.push([{
          gx: sx, gy: HUD_H,
          px: sx * T, py: HUD_H * T,
          dir: sd, isHead: true,
          moveTimer: 0,
          speed: _max(1, 4 - flr(wave / 3)),
          descending: false, targetY: 0,
        }]);
      }
    }
  }

  function addExplosion(x, y) {
    explosions.push({ x: x, y: y, timer: 12 });
    for (let i = 0; i < 6; i++)
      particles.push({
        x: x + 8, y: y + 8,
        vx: rnd(3) - 1.5, vy: rnd(3) - 1.5,
        life: 5 + flr(rnd(8)),
        color: flr(rnd(3)) + 1
      });
  }

  function shootSound() { note(0, "C6", 0.03); }
  function hitMushroomSound() { note(1, "E3", 0.03); }
  function hitCentiSound() { note(1, "C4", 0.05); setTimeout(() => note(1, "E4", 0.04), 30); }
  function hitSpiderSound() { note(0, "G4", 0.06); note(1, "B4", 0.06); }
  function hitFleaSound() { note(1, "A3", 0.05); }
  function deathSound() {
    note(0, "C3", 0.12); note(1, "G2", 0.12);
    setTimeout(() => { note(0, "A2", 0.18); note(1, "E2", 0.18); }, 120);
  }
  function waveClearSound() {
    note(0, "C5", 0.08);
    setTimeout(() => note(0, "E5", 0.08), 80);
    setTimeout(() => note(0, "G5", 0.08), 160);
    setTimeout(() => note(0, "C6", 0.12), 240);
  }

  // --- Bullet center + radius (thin vertical shot, use small radius) ---
  const BULLET_R = 3;
  function bulletCenter(b) { return { cx: b.x + 8, cy: b.y + 4 }; }

  // --- Title Scene ---
  Mono.scene(TITLE, {
    init() {},
    update() {
      if (btnp("start") || btnp("a")) {
        note(0, "C5", 0.08);
        setTimeout(() => note(0, "E5", 0.08), 80);
        setTimeout(() => note(0, "G5", 0.12), 160);
        Mono.go(PLAY); return;
      }
    },
    draw() { drawTitle(); }
  });

  // --- Game Over Scene ---
  Mono.scene(GAMEOVER, {
    init() {},
    update() {
      for (let i = particles.length - 1; i >= 0; i--) {
        const p = particles[i]; p.x += p.vx; p.y += p.vy; p.vy += 0.08; p.life--;
        if (p.life <= 0) particles.splice(i, 1);
      }
      if (btnp("start") || btnp("a")) { Mono.go(TITLE); return; }
    },
    draw() { drawGameOver(); }
  });

  // --- Play Scene ---
  Mono.scene(PLAY, {
    init() { resetGame(); },
    update() {
    if (waveMessage > 0) waveMessage--;

    // Respawn timer
    if (respawnTimer > 0) {
      respawnTimer--;
      if (respawnTimer === 0) {
        player.x = W / 2 - 8;
        player.y = H - 24;
      }
    }

    // Player movement
    if (respawnTimer <= 0) {
      if (btn("left")) player.x -= player.speed;
      if (btn("right")) player.x += player.speed;
      if (btn("up")) player.y -= player.speed;
      if (btn("down")) player.y += player.speed;
      player.x = _max(0, min(W - T, player.x));
      player.y = _max(PLAYER_MIN_Y, min(H - T - 2, player.y));
    }

    // Player shoot
    if (shootCooldown > 0) shootCooldown--;
    if (respawnTimer <= 0 && btnp("a") && !bullet && shootCooldown <= 0) {
      bullet = { x: player.x, y: player.y - 8 };
      shootCooldown = 4;
      shootSound();
    }

    // Update bullet
    if (bullet) {
      bullet.y -= 7;
      if (bullet.y < -T) bullet = null;
    }

    // Bullet collision: mushrooms (circle vs rect)
    if (bullet) {
      const bc = bulletCenter(bullet);
      const bgx = flr(bc.cx / T);
      const bgy = flr(bc.cy / T);
      for (let dy = -1; dy <= 0; dy++) {
        for (let dx = -1; dx <= 1; dx++) {
          const cx = bgx + dx;
          const cy = bgy + dy;
          if (cx < 0 || cx >= GRID_W || cy < 0 || cy >= GRID_H) continue;
          const mhp = getMush(cx, cy);
          if (mhp > 0) {
            const mx = cx * T, my = cy * T;
            if (circRectCollide(bc.cx, bc.cy, BULLET_R, mx, my, T, T)) {
              setMush(cx, cy, mhp - 1);
              if (mhp - 1 <= 0) score += 1;
              hitMushroomSound();
              bullet = null;
              break;
            }
          }
        }
        if (!bullet) break;
      }
    }

    // Bullet collision: centipede segments (circle vs circle)
    if (bullet) {
      const bc = bulletCenter(bullet);
      let hit = false;
      for (let ci = centipedes.length - 1; ci >= 0; ci--) {
        const segs = centipedes[ci];
        for (let si = segs.length - 1; si >= 0; si--) {
          const s = segs[si];
          const scx = s.px + 8, scy = s.py + 8;
          if (circCollide(bc.cx, bc.cy, BULLET_R, scx, scy, 7)) {
            bullet = null;
            hit = true;
            const pts = s.isHead ? 100 : 10;
            score += pts;
            addExplosion(s.px, s.py);
            hitCentiSound();

            // Place mushroom where segment died
            const mgx = flr(s.px / T);
            const mgy = flr(s.py / T);
            if (mgy >= HUD_H && mgy < GRID_H - 1) {
              setMush(mgx, mgy, 4);
            }

            // Split centipede
            if (segs.length === 1) {
              centipedes.splice(ci, 1);
            } else {
              const before = segs.slice(0, si);
              const after = segs.slice(si + 1);
              centipedes.splice(ci, 1);
              if (before.length > 0) {
                before[before.length - 1].isHead = true;
                centipedes.push(before);
              }
              if (after.length > 0) {
                after[0].isHead = true;
                centipedes.push(after);
              }
            }
            break;
          }
        }
        if (hit) break;
      }
    }

    // Bullet collision: spider (circle vs circle)
    if (bullet && spider) {
      const bc = bulletCenter(bullet);
      const scx = spider.x + 8, scy = spider.y + 8;
      if (circCollide(bc.cx, bc.cy, BULLET_R, scx, scy, 7)) {
        const dist = _abs(player.x - spider.x) + _abs(player.y - spider.y);
        if (dist < 40) score += 900;
        else if (dist < 80) score += 600;
        else score += 300;
        addExplosion(spider.x, spider.y);
        hitSpiderSound();
        spider = null;
        bullet = null;
      }
    }

    // Bullet collision: flea (circle vs rect)
    if (bullet && flea) {
      const bc = bulletCenter(bullet);
      if (circRectCollide(bc.cx, bc.cy, BULLET_R, flea.x, flea.y, T, T)) {
        flea.hp--;
        bullet = null;
        if (flea.hp <= 0) {
          score += 200;
          addExplosion(flea.x, flea.y);
          hitFleaSound();
          flea = null;
        }
      }
    }

    // Update centipedes
    for (let ci = centipedes.length - 1; ci >= 0; ci--) {
      const segs = centipedes[ci];
      const head = segs[0];
      head.moveTimer--;
      if (head.moveTimer <= 0) {
        head.moveTimer = head.speed;

        const prevPositions = segs.map(s => ({ gx: s.gx, gy: s.gy, dir: s.dir }));

        if (head.descending) {
          head.gy++;
          head.descending = false;
          head.dir = -head.dir;
          if (head.gy >= GRID_H - 1) {
            head.gy = HUD_H;
          }
        } else {
          const nextX = head.gx + head.dir;
          const hitWall = nextX < 0 || nextX >= GRID_W;
          const hitMush = !hitWall && getMush(nextX, head.gy) > 0;

          if (hitWall || hitMush) {
            head.descending = true;
            head.gy++;
            head.dir = -head.dir;
            if (head.gy >= GRID_H - 1) {
              head.gy = HUD_H;
            }
          } else {
            head.gx = nextX;
          }
        }

        // Body follows
        for (let si = 1; si < segs.length; si++) {
          segs[si].gx = prevPositions[si - 1].gx;
          segs[si].gy = prevPositions[si - 1].gy;
          segs[si].dir = prevPositions[si - 1].dir;
        }

        for (const s of segs) {
          s.px = s.gx * T;
          s.py = s.gy * T;
        }
      } else {
        for (const s of segs) {
          const tx = s.gx * T;
          const ty = s.gy * T;
          s.px += (tx - s.px) * 0.4;
          s.py += (ty - s.py) * 0.4;
        }
      }
    }

    // Centipede-player collision (circle vs rect)
    if (respawnTimer <= 0) {
      for (const segs of centipedes) {
        for (const s of segs) {
          const scx = s.px + 8, scy = s.py + 8;
          if (circRectCollide(scx, scy, 7, player.x + 2, player.y + 2, 12, 12)) {
            playerDied();
            break;
          }
        }
        if (respawnTimer > 0) break;
      }
    }

    // Spider AI
    if (spider) {
      spider.x += spider.vx;
      spider.y += spider.vy;
      spider.bounceTimer--;
      if (spider.bounceTimer <= 0) {
        spider.vx = (rnd(3) - 1.5) * 1.5;
        spider.vy = (rnd(3) - 1.5) * 1.5;
        spider.bounceTimer = 10 + flr(rnd(20));
      }
      if (spider.x < 0 || spider.x > W - T) spider.vx = -spider.vx;
      if (spider.y < PLAYER_MIN_Y - 24) spider.vy = _abs(spider.vy);
      if (spider.y > H - T - 2) spider.vy = -_abs(spider.vy);
      spider.x = _max(0, min(W - T, spider.x));
      // Spider eats mushrooms it touches
      const sgx = flr((spider.x + 8) / T);
      const sgy = flr((spider.y + 8) / T);
      if (getMush(sgx, sgy) > 0 && rnd(1) < 0.3) setMush(sgx, sgy, 0);
      spider.life--;
      if (spider.life <= 0) spider = null;
      // Spider-player collision (circle vs rect)
      if (spider && respawnTimer <= 0) {
        const scx = spider.x + 8, scy = spider.y + 8;
        if (circRectCollide(scx, scy, 7, player.x + 2, player.y + 2, 12, 12)) {
          addExplosion(spider.x, spider.y);
          spider = null;
          playerDied();
        }
      }
    }
    spiderTimer--;
    if (spiderTimer <= 0 && !spider) {
      const side = rnd(1) < 0.5 ? 0 : W - T;
      spider = {
        x: side, y: PLAYER_MIN_Y + rnd(30),
        vx: side === 0 ? 2 : -2, vy: rnd(2) - 1,
        bounceTimer: 10, life: 200 + flr(rnd(150))
      };
      spiderTimer = 200 + flr(rnd(200));
    }

    // Flea AI
    if (flea) {
      flea.y += flea.speed;
      const fgy = flr(flea.y / T);
      const fgx = flr(flea.x / T);
      if (fgy !== flea.lastDropY && fgy >= HUD_H && fgy < GRID_H - PLAYER_ROWS && rnd(1) < 0.4) {
        if (getMush(fgx, fgy) === 0) setMush(fgx, fgy, 4);
        flea.lastDropY = fgy;
      }
      if (flea.y > H + T) flea = null;
      // Flea-player collision (rect vs rect)
      if (flea && respawnTimer <= 0) {
        if (boxOverlap(player.x + 2, player.y + 2, 12, 12, flea.x, flea.y, T, T)) {
          addExplosion(flea.x, flea.y);
          flea = null;
          playerDied();
        }
      }
    }
    fleaTimer--;
    if (fleaTimer <= 0 && !flea) {
      const fx = flr(rnd(GRID_W)) * T;
      flea = { x: fx, y: -T, speed: 2 + wave * 0.2, hp: 2, lastDropY: -1 };
      fleaTimer = 300 + flr(rnd(300));
    }

    // Explosions
    for (let i = explosions.length - 1; i >= 0; i--) {
      explosions[i].timer--;
      if (explosions[i].timer <= 0) explosions.splice(i, 1);
    }

    // Particles
    for (let i = particles.length - 1; i >= 0; i--) {
      const p = particles[i];
      p.x += p.vx; p.y += p.vy; p.vy += 0.05; p.life--;
      if (p.life <= 0) particles.splice(i, 1);
    }

    // Wave clear check
    let totalSegs = 0;
    for (const segs of centipedes) totalSegs += segs.length;
    if (totalSegs === 0) {
      waveTimer++;
      if (waveTimer > 45) {
        waveTimer = 0;
        waveClearSound();
        spawnWave();
      }
    } else {
      waveTimer = 0;
    }
    },
    draw() { drawPlay(); }
  });

  function playerDied() {
    lives--;
    addExplosion(player.x, player.y);
    deathSound();
    if (lives <= 0) {
      Mono.go(GAMEOVER); return;
    } else {
      respawnTimer = 60;
      player.x = -100;
      player.y = -100;
    }
  }

  // ============================================================
  // Play Draw
  // ============================================================
  function drawPlay() {
    cls(0);

    // Draw mushrooms
    for (const key in mushrooms) {
      const hp = mushrooms[key];
      const [gxs, gys] = key.split(",");
      const gx = parseInt(gxs), gy = parseInt(gys);
      const sprId = 4 + (4 - hp);
      spr(sprId, gx * T, gy * T);
      dbg(gx * T, gy * T, T, T);
    }

    // Draw centipedes
    for (const segs of centipedes) {
      for (let si = segs.length - 1; si >= 0; si--) {
        const s = segs[si];
        const sx = flr(s.px), sy = flr(s.py);
        if (s.isHead) {
          spr(s.dir > 0 ? 2 : 14, sx, sy);
        } else {
          spr(3, sx, sy);
        }
        dbgC(sx + 8, sy + 8, 7);
      }
    }

    // Draw spider
    if (spider) {
      const sx = flr(spider.x), sy = flr(spider.y);
      if (flr(Mono.frame / 4) % 2 === 0) {
        spr(9, sx, sy);
      } else {
        spr(9, sx, sy + 1);
      }
      dbgC(sx + 8, sy + 8, 7);
    }

    // Draw flea
    if (flea) {
      const fx = flr(flea.x), fy = flr(flea.y);
      spr(10, fx, fy);
      dbg(fx, fy, T, T);
    }

    // Draw bullet
    if (bullet) {
      const bx = flr(bullet.x), by = flr(bullet.y);
      spr(8, bx, by);
      const bc = bulletCenter(bullet);
      dbgC(flr(bc.cx), flr(bc.cy), BULLET_R);
    }

    // Draw player
    if (respawnTimer <= 0 || flr(Mono.frame / 4) % 2 === 0) {
      if (respawnTimer <= 0) {
        const px = flr(player.x), py = flr(player.y);
        spr(1, px, py);
        dbg(px + 2, py + 2, 12, 12);
      }
    }

    // Explosions
    for (const e of explosions) {
      const sprId = e.timer > 6 ? 11 : 12;
      spr(sprId, flr(e.x), flr(e.y));
    }

    // Particles
    for (const p of particles) pix(flr(p.x), flr(p.y), p.color);

    // HUD (16px tall bar)
    rectf(0, 0, W, T, 0);
    text("SCORE:" + score, 2, 5, 3);
    text("W:" + wave, W / 2 - 10, 5, 2);
    // Lives icons - max 5 shown, clamped to right side within screen
    const maxLivesShown = min(lives, 5);
    const livesStartX = W - 4 - maxLivesShown * 18;
    for (let i = 0; i < maxLivesShown; i++) spr(13, livesStartX + i * 18, 0);

    // Player area divider line (subtle)
    for (let x = 0; x < W; x += 4) pix(x, PLAYER_MIN_Y - 1, 1);

    // Wave announcement
    if (waveMessage > 0) {
      const msgY = 105 + sin(waveMessage * 0.1) * 3;
      text("WAVE " + wave, W / 2 - 17, flr(msgY), 3);
      if (waveMessage > 60) text("GET READY!", W / 2 - 27, flr(msgY) + 12, 2);
    }
  }

  function drawTitle() {
    const ty = 38 + sin(Mono.frame * 0.04) * 4;

    text("CENTIPEDE", W / 2 - 25, flr(ty), 3);
    rectf(W / 2 - 33, flr(ty) + 10, 67, 1, 2);

    // Animated centipede on title
    const cx = W / 2 - 50;
    const cy = flr(ty) + 19;
    spr(2, cx + flr(sin(Mono.frame * 0.1) * 12), cy);
    for (let i = 1; i < 6; i++) {
      spr(3, cx + flr(sin(Mono.frame * 0.1 - i * 0.5) * 12) + i * 17, cy + flr(sin(Mono.frame * 0.08 + i) * 2));
    }

    // Decorative mushrooms
    const mx = W / 2 - 40;
    const my = flr(ty) + 42;
    for (let i = 0; i < 5; i++) {
      spr(4, mx + i * 18 + flr(sin(i + Mono.frame * 0.02) * 2), my);
    }

    if (flr(Mono.frame / 20) % 2 === 0) text("PRESS START", W / 2 - 42, 140, 3);

    // Score table
    text("-SCORE TABLE-", W / 2 - 35, 162, 2);
    spr(2, W / 2 - 30, 172); text("HEAD  100", W / 2 - 10, 176, 2);
    spr(3, W / 2 - 30, 190); text("BODY   10", W / 2 - 10, 194, 2);
    spr(9, W / 2 - 30, 208); text("SPIDER 300-900", W / 2 - 10, 212, 2);

    text("MONO DEMO", W / 2 - 28, 232, 1);
  }

  function drawGameOver() {
    // Draw remaining mushrooms as backdrop
    for (const key in mushrooms) {
      const hp = mushrooms[key];
      const [gxs, gys] = key.split(",");
      const gx = parseInt(gxs), gy = parseInt(gys);
      spr(4 + (4 - hp), gx * T, gy * T);
    }
    for (const p of particles) pix(flr(p.x), flr(p.y), p.color);

    // Dark overlay
    rectf(W / 2 - 55, 75, 110, 55, 0);
    rect(W / 2 - 55, 75, 110, 55, 1);

    text("GAME OVER", W / 2 - 25, 84, 3);
    text("SCORE:" + score, W / 2 - 25, 98, 2);
    text("WAVE:" + wave, W / 2 - 18, 108, 2);
    if (flr(Mono.frame / 20) % 2 === 0) text("PRESS START", W / 2 - 42, 150, 3);
  }

  // ============================================================
  // Boot
  Mono.go(TITLE);
  Mono.boot("screen");
})();
</script>
</body>
</html>
