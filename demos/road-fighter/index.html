<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GrayBox — Demo: Road Fighter</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #0a0a0a;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100vh;
    font-family: monospace;
    overflow: hidden;
  }
  #frame {
    background: #111;
    border: 3px solid #333;
    border-radius: 8px;
    padding: 12px;
    box-shadow: 0 0 40px rgba(0,0,0,0.8), inset 0 0 20px rgba(0,0,0,0.5);
  }
  canvas {
    display: block;
    image-rendering: pixelated;
    image-rendering: crisp-edges;
  }
  #controls {
    margin-top: 12px;
    color: #6b6b6b;
    font-size: 11px;
    text-align: center;
    letter-spacing: 1px;
  }
  #controls span { color: #b0b0b0; }
</style>
</head>
<body>
<div id="frame">
  <canvas id="screen"></canvas>
</div>
<div id="controls">
  <span>&larr;&rarr;</span> STEER &nbsp;&nbsp; <span>&uarr;</span> ACCEL &nbsp;&nbsp; <span>&darr;</span> BRAKE &nbsp;&nbsp; <span>ENTER</span> START
</div>
<script>
(() => {
  "use strict";

  // ============================================================
  // GrayBox Runtime (inline)
  // ============================================================
  const W = 480;
  const H = 320;
  const SCALE = 2;
  const FPS = 30;
  const COLORS = ["#1a1a1a", "#6b6b6b", "#b0b0b0", "#e8e8e8"];
  const canvas = document.getElementById("screen");
  canvas.width = W;
  canvas.height = H;
  canvas.style.width = (W * SCALE) + "px";
  canvas.style.height = (H * SCALE) + "px";
  const ctx = canvas.getContext("2d");
  ctx.imageSmoothingEnabled = false;
  const buf = ctx.createImageData(W, H);
  const buf32 = new Uint32Array(buf.data.buffer);

  function hexToABGR(hex) {
    const r = parseInt(hex.slice(1, 3), 16);
    const g = parseInt(hex.slice(3, 5), 16);
    const b = parseInt(hex.slice(5, 7), 16);
    return (255 << 24) | (b << 16) | (g << 8) | r;
  }
  const COLOR_U32 = COLORS.map(hexToABGR);

  const sprites = {};
  const tilemap = {};

  const keyMap = {
    "ArrowUp": "up", "ArrowDown": "down", "ArrowLeft": "left", "ArrowRight": "right",
    "w": "up", "s": "down", "a": "left", "d": "right",
    "z": "a", "Z": "a", "x": "b", "X": "b",
    "Enter": "start", " ": "a"
  };
  const keys = {};
  const keysPrev = {};

  document.addEventListener("keydown", e => {
    const k = keyMap[e.key];
    if (k) { keys[k] = true; e.preventDefault(); }
  });
  document.addEventListener("keyup", e => {
    const k = keyMap[e.key];
    if (k) { keys[k] = false; e.preventDefault(); }
  });

  let audioCtx = null;
  const channels = [null, null];
  const channelGains = [null, null];
  function ensureAudio() {
    if (!audioCtx) {
      audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      for (let i = 0; i < 2; i++) {
        channelGains[i] = audioCtx.createGain();
        channelGains[i].gain.value = 0.15;
        channelGains[i].connect(audioCtx.destination);
      }
    }
  }

  const NOTE_NAMES = ["C","C#","D","D#","E","F","F#","G","G#","A","A#","B"];
  function noteToFreq(noteStr) {
    const match = noteStr.match(/^([A-G]#?)(\d)$/);
    if (!match) return 440;
    const name = match[1];
    const octave = parseInt(match[2]);
    const semitone = NOTE_NAMES.indexOf(name);
    if (semitone === -1) return 440;
    const midi = (octave + 1) * 12 + semitone;
    return 440 * Math.pow(2, (midi - 69) / 12);
  }

  const FONT_W = 4;
  const FONT_H = 6;
  const FONT = {};
  const fontData = {
    "A":"0110100110011111100110011001","B":"1110100110101110100110011110",
    "C":"0110100110001000100001100110","D":"1100101010011001100110101100",
    "E":"1111100010001110100010001111","F":"1111100010001110100010001000",
    "G":"0111100010001011100101100111","H":"1001100110011111100110011001",
    "I":"1110010001000100010001001110","J":"0111001000100010001010100100",
    "K":"1001101011001100101010011001","L":"1000100010001000100010001111",
    "M":"1001111111011001100110011001","N":"1001110111011001100110011001",
    "O":"0110100110011001100110010110","P":"1110100110011110100010001000",
    "Q":"0110100110011001101101100001","R":"1110100110011110101010011001",
    "S":"0111100010000110000110001110","T":"1111001000100010001000100010",
    "U":"1001100110011001100110010110","V":"1001100110011001100101100110",
    "W":"1001100110011001101111011001","X":"1001100101100110011010011001",
    "Y":"1001100101100010001000100010","Z":"1111000100100100100010001111",
    "0":"0110100111011011101110010110","1":"0100110001000100010001001110",
    "2":"0110100100010010010010001111","3":"1110000100010110000110011110",
    "4":"1001100110011111000100010001","5":"1111100010001110000100011110",
    "6":"0110100010001110100110010110","7":"1111000100010010010001001000",
    "8":"0110100110010110100110010110","9":"0110100110010111000100010110",
    " ":"0000000000000000000000000000",
    ".":"0000000000000000000001000100",
    ",":"0000000000000000001000101000",
    "!":"0100010001000100000000000100",
    "?":"0110100100010010000000000010",
    "-":"0000000000001110000000000000",
    "+":"0000001001001110010000100000",
    ":":"0000010001000000010001000000",
    "/":"0001000100100010010010001000",
    "*":"0000101001001110010010100000",
    "#":"0101111101011111010100000000",
    "(":"0010010010001000010001000010",
    ")":"0100001000010001000100100100",
    "=":"0000000011110000111100000000",
    "'":"0100010010000000000000000000",
    "\"":"1010101000000000000000000000",
    "<":"0010010010001000010000100010",
    ">":"1000010000100001001001001000",
    "_":"0000000000000000000000001111",
  };
  for (const [ch, bits] of Object.entries(fontData)) {
    FONT[ch] = [];
    for (let i = 0; i < bits.length; i++) FONT[ch].push(parseInt(bits[i]));
  }

  const API = {};
  API._init = null;
  API._update = null;
  API._draw = null;
  API.frame = 0;

  API.cls = function(c = 0) { buf32.fill(COLOR_U32[c] || COLOR_U32[0]); };
  API.pix = function(x, y, c) {
    x = Math.floor(x); y = Math.floor(y);
    if (x < 0 || x >= W || y < 0 || y >= H) return;
    buf32[y * W + x] = COLOR_U32[c] || COLOR_U32[0];
  };
  API.line = function(x0, y0, x1, y1, c) {
    x0=Math.floor(x0); y0=Math.floor(y0); x1=Math.floor(x1); y1=Math.floor(y1);
    const dx=Math.abs(x1-x0), dy=Math.abs(y1-y0);
    const sx=x0<x1?1:-1, sy=y0<y1?1:-1;
    let err=dx-dy;
    while(true) {
      API.pix(x0,y0,c);
      if(x0===x1&&y0===y1) break;
      const e2=2*err;
      if(e2>-dy){err-=dy;x0+=sx;}
      if(e2<dx){err+=dx;y0+=sy;}
    }
  };
  API.rect = function(x,y,w,h,c) {
    API.line(x,y,x+w-1,y,c); API.line(x+w-1,y,x+w-1,y+h-1,c);
    API.line(x+w-1,y+h-1,x,y+h-1,c); API.line(x,y+h-1,x,y,c);
  };
  API.rectf = function(x,y,w,h,c) {
    x=Math.floor(x); y=Math.floor(y);
    const col=COLOR_U32[c]||COLOR_U32[0];
    for(let py=Math.max(0,y);py<Math.min(H,y+h);py++)
      for(let px=Math.max(0,x);px<Math.min(W,x+w);px++)
        buf32[py*W+px]=col;
  };
  API.circ = function(cx,cy,r,c) {
    let x=r,y=0,d=1-r; cx=Math.floor(cx); cy=Math.floor(cy);
    while(x>=y){
      API.pix(cx+x,cy+y,c);API.pix(cx-x,cy+y,c);
      API.pix(cx+x,cy-y,c);API.pix(cx-x,cy-y,c);
      API.pix(cx+y,cy+x,c);API.pix(cx-y,cy+x,c);
      API.pix(cx+y,cy-x,c);API.pix(cx-y,cy-x,c);
      y++; if(d<0){d+=2*y+1;}else{x--;d+=2*(y-x)+1;}
    }
  };
  API.circf = function(cx,cy,r,c) {
    cx=Math.floor(cx); cy=Math.floor(cy);
    const col=COLOR_U32[c]||COLOR_U32[0]; const r2=r*r;
    for(let py=-r;py<=r;py++) for(let px=-r;px<=r;px++)
      if(px*px+py*py<=r2){ const sx=cx+px,sy=cy+py;
        if(sx>=0&&sx<W&&sy>=0&&sy<H) buf32[sy*W+sx]=col; }
  };
  API.sprite = function(id, data) {
    const arr = new Uint8Array(64); let i = 0;
    for (const ch of data) { if (ch>='0'&&ch<='3') { arr[i++]=parseInt(ch); if(i>=64) break; } }
    sprites[id] = arr;
  };
  API.spr = function(id, x, y, flipX, flipY) {
    const s=sprites[id]; if(!s) return;
    x=Math.floor(x); y=Math.floor(y);
    for(let py=0;py<8;py++) for(let px=0;px<8;px++){
      const sx=flipX?7-px:px, sy=flipY?7-py:py;
      const c=s[sy*8+sx], dx=x+px, dy=y+py;
      if(dx>=0&&dx<W&&dy>=0&&dy<H) buf32[dy*W+dx]=COLOR_U32[c];
    }
  };
  // Extended sprite draw with rotation support
  API.sprRot = function(id, x, y, angle) {
    const s=sprites[id]; if(!s) return;
    x=Math.floor(x); y=Math.floor(y);
    const cs=Math.cos(angle), sn=Math.sin(angle);
    for(let py=-4;py<4;py++) for(let px=-4;px<4;px++){
      const srcX=Math.floor(cs*px+sn*py+4);
      const srcY=Math.floor(-sn*px+cs*py+4);
      if(srcX>=0&&srcX<8&&srcY>=0&&srcY<8){
        const c=s[srcY*8+srcX];
        const dx=x+px+4, dy=y+py+4;
        if(dx>=0&&dx<W&&dy>=0&&dy<H) buf32[dy*W+dx]=COLOR_U32[c];
      }
    }
  };
  API.text = function(str, x, y, c) {
    str=String(str).toUpperCase(); let cx=Math.floor(x); const cy=Math.floor(y);
    const col=COLOR_U32[c]||COLOR_U32[3];
    for(const ch of str){
      const glyph=FONT[ch];
      if(glyph) for(let py=0;py<FONT_H;py++) for(let px=0;px<FONT_W;px++)
        if(glyph[py*FONT_W+px]){ const dx=cx+px,dy=cy+py;
          if(dx>=0&&dx<W&&dy>=0&&dy<H) buf32[dy*W+dx]=col; }
      cx+=FONT_W+1;
    }
  };
  API.mget = function(cx,cy) { return tilemap[cx+","+cy]||0; };
  API.mset = function(cx,cy,id) { tilemap[cx+","+cy]=id; };
  API.map = function(mx,my,mw,mh,sx,sy) {
    for(let ty=0;ty<mh;ty++) for(let tx=0;tx<mw;tx++){
      const id=API.mget(mx+tx,my+ty); if(id>0) API.spr(id,sx+tx*8,sy+ty*8); }
  };
  API.btn = function(k) { return !!keys[k]; };
  API.btnp = function(k) { return !!keys[k] && !keysPrev[k]; };
  API.note = function(ch, noteStr, dur) {
    ensureAudio(); if(ch<0||ch>1) return; API.stop(ch);
    const osc=audioCtx.createOscillator(); osc.type="square";
    osc.frequency.value=noteToFreq(noteStr);
    osc.connect(channelGains[ch]); osc.start();
    osc.stop(audioCtx.currentTime+dur); channels[ch]=osc;
  };
  API.stop = function(ch) {
    if(ch===undefined){API.stop(0);API.stop(1);return;}
    if(channels[ch]){try{channels[ch].stop();}catch(e){} channels[ch]=null;}
  };
  API.rnd = function(max) { return Math.random()*max; };
  API.flr = Math.floor;
  API.abs = Math.abs;
  API.min = Math.min;
  API.max = Math.max;
  API.sin = Math.sin;
  API.cos = Math.cos;

  function tick() {
    if (API._update) API._update();
    if (API._draw) API._draw();
    ctx.putImageData(buf, 0, 0);
    for (const k in keys) keysPrev[k] = keys[k];
    API.frame++;
  }

  // ============================================================
  // Road Fighter Game
  // ============================================================
  const { cls, pix, line, rect, rectf, circ, circf, sprite: defSprite,
          spr, sprRot, text, btn, btnp, note, stop, rnd, flr, abs: _abs,
          min, max: _max, sin, cos } = API;

  // --- Sprites ---
  // 1: Player car (top-down, facing up)
  defSprite(1,
    "03000030" +
    "33311333" +
    "33333333" +
    "32322323" +
    "33333333" +
    "33333333" +
    "32322323" +
    "03000030"
  );
  // 2: Traffic car A (sedan - lighter)
  defSprite(2,
    "02000020" +
    "22222222" +
    "22222222" +
    "21211212" +
    "22222222" +
    "22222222" +
    "21211212" +
    "02000020"
  );
  // 3: Traffic car B (truck - wider, darker)
  defSprite(3,
    "01000010" +
    "11111111" +
    "12121211" +
    "11111111" +
    "11111111" +
    "11111111" +
    "12121211" +
    "01000010"
  );
  // 4: Traffic car C (sports car - fast looking)
  defSprite(4,
    "00200200" +
    "02222220" +
    "22222222" +
    "21211212" +
    "22222222" +
    "02222220" +
    "21200212" +
    "00200200"
  );
  // 5: Oil slick
  defSprite(5,
    "00000000" +
    "00111000" +
    "01111100" +
    "01111110" +
    "01111110" +
    "01111100" +
    "00111100" +
    "00000000"
  );
  // 6: Fuel canister
  defSprite(6,
    "00333000" +
    "00323000" +
    "03333300" +
    "03233200" +
    "03233200" +
    "03233200" +
    "03333300" +
    "00000000"
  );
  // 7: Explosion frame 1
  defSprite(7,
    "00000000" +
    "00200100" +
    "01002000" +
    "00031000" +
    "00130200" +
    "01000010" +
    "00100000" +
    "00000000"
  );
  // 8: Explosion frame 2
  defSprite(8,
    "20010020" +
    "01000010" +
    "00203200" +
    "03033030" +
    "00232000" +
    "01000300" +
    "20001001" +
    "00200010"
  );
  // 9: Life icon (mini car)
  defSprite(9,
    "00000000" +
    "00000000" +
    "03300330" +
    "03333330" +
    "03233230" +
    "03333330" +
    "03300330" +
    "00000000"
  );
  // 10: Road marker / dash
  defSprite(10,
    "00000000" +
    "00033000" +
    "00033000" +
    "00033000" +
    "00033000" +
    "00033000" +
    "00033000" +
    "00000000"
  );
  // 11: Checkpoint flag
  defSprite(11,
    "03333300" +
    "03232300" +
    "03323300" +
    "03232300" +
    "00300000" +
    "00300000" +
    "00300000" +
    "00300000"
  );

  // --- Game constants ---
  const ROAD_W = 160;           // road width in pixels
  const ROAD_CENTER = W / 2;    // center of screen
  const PLAYER_Y = H - 40;     // player vertical position (fixed)
  const MAX_SPEED = 12;
  const ACCEL = 0.12;
  const BRAKE_DECEL = 0.25;
  const COAST_DECEL = 0.03;
  const STEER_SPEED = 2.8;
  const FUEL_MAX = 1000;
  const FUEL_DRAIN = 0.6;       // per frame at max speed
  const CHECKPOINT_DIST = 3000;  // distance per stage

  // --- Game state ---
  let state = "title";
  let player, traffic, oilSlicks, fuelItems, explosions, particles;
  let score, lives, speed, fuel, distance, stage;
  let roadCurve, roadCurveTarget, roadCurveTimer;
  let roadOffset;   // visual scroll offset for lane markers
  let spinTimer, spinAngle;
  let invincibleTimer;
  let checkpointFlash;
  let titleCarY;
  let engineSoundTimer;

  function resetGame() {
    player = { x: ROAD_CENTER, y: PLAYER_Y };
    traffic = [];
    oilSlicks = [];
    fuelItems = [];
    explosions = [];
    particles = [];
    score = 0;
    lives = 3;
    speed = 0;
    fuel = FUEL_MAX;
    distance = 0;
    stage = 1;
    roadCurve = 0;
    roadCurveTarget = 0;
    roadCurveTimer = 0;
    roadOffset = 0;
    spinTimer = 0;
    spinAngle = 0;
    invincibleTimer = 0;
    checkpointFlash = 0;
    engineSoundTimer = 0;
  }

  function addExplosion(x, y) {
    explosions.push({ x: x, y: y, timer: 14 });
    for (let i = 0; i < 12; i++)
      particles.push({
        x: x + 4, y: y + 4,
        vx: rnd(6) - 3, vy: rnd(6) - 3,
        life: 8 + flr(rnd(12)),
        color: flr(rnd(3)) + 1
      });
  }

  function crashSound() {
    note(0, "C2", 0.15); note(1, "E2", 0.12);
    setTimeout(() => { note(0, "A1", 0.2); }, 80);
  }
  function spinSound() {
    note(0, "G3", 0.08);
    setTimeout(() => note(0, "E3", 0.08), 60);
    setTimeout(() => note(0, "C3", 0.1), 120);
  }
  function fuelSound() {
    note(1, "E5", 0.06);
    setTimeout(() => note(1, "G5", 0.06), 50);
    setTimeout(() => note(1, "C6", 0.08), 100);
  }
  function checkpointSound() {
    note(0, "C5", 0.1); note(1, "E5", 0.1);
    setTimeout(() => { note(0, "E5", 0.1); note(1, "G5", 0.1); }, 120);
    setTimeout(() => { note(0, "G5", 0.1); note(1, "C6", 0.1); }, 240);
    setTimeout(() => { note(0, "C6", 0.2); note(1, "E6", 0.2); }, 360);
  }

  // Get road edges at a given screen Y, accounting for curve
  function getRoadEdges(screenY) {
    const perspectiveScale = 0.4 + 0.6 * (screenY / H);
    const curveShift = roadCurve * (H - screenY) * 0.008;
    const halfW = (ROAD_W * perspectiveScale) / 2;
    const cx = ROAD_CENTER + curveShift;
    return { left: cx - halfW, right: cx + halfW, center: cx };
  }

  // Spawn a traffic car
  function spawnTraffic() {
    const edges = getRoadEdges(0);
    const laneW = (edges.right - edges.left) / 4;
    const lane = flr(rnd(4));
    const x = edges.left + laneW * lane + laneW / 2 - 4;
    const types = [2, 3, 4];
    const type = types[flr(rnd(types.length))];
    const baseSpd = 1.5 + stage * 0.3;
    const carSpeed = baseSpd + rnd(2); // slower than player ideally
    traffic.push({
      x: x, y: -12, type: type,
      speed: carSpeed, lane: lane
    });
  }

  // Spawn oil slick
  function spawnOil() {
    const edges = getRoadEdges(0);
    const x = edges.left + rnd(edges.right - edges.left - 8);
    oilSlicks.push({ x: x, y: -12 });
  }

  // Spawn fuel item
  function spawnFuel() {
    const edges = getRoadEdges(0);
    const x = edges.left + rnd(edges.right - edges.left - 8);
    fuelItems.push({ x: x, y: -12 });
  }

  resetGame();

  // ============================================================
  // Update
  // ============================================================
  API._update = function() {
    if (state === "title") {
      titleCarY = (titleCarY || 0) + 1;
      if (titleCarY > H + 20) titleCarY = -20;
      if (btnp("start") || btnp("a")) {
        state = "play";
        resetGame();
        speed = 2;
        note(0, "C5", 0.08);
        setTimeout(() => note(0, "E5", 0.08), 80);
        setTimeout(() => note(0, "G5", 0.12), 160);
      }
      return;
    }

    if (state === "gameover") {
      for (let i = particles.length - 1; i >= 0; i--) {
        const p = particles[i]; p.x += p.vx; p.y += p.vy; p.vy += 0.08; p.life--;
        if (p.life <= 0) particles.splice(i, 1);
      }
      if (btnp("start") || btnp("a")) state = "title";
      return;
    }

    // --- Play state ---

    // Invincibility timer
    if (invincibleTimer > 0) invincibleTimer--;

    // Checkpoint flash
    if (checkpointFlash > 0) checkpointFlash--;

    // Spin recovery
    if (spinTimer > 0) {
      spinTimer--;
      spinAngle += 0.3;
      speed *= 0.96;
      if (speed < 0.5) speed = 0.5;
      if (spinTimer <= 0) {
        spinAngle = 0;
        invincibleTimer = 45;
      }
      // Still allow some steering while spinning
      if (btn("left")) player.x -= STEER_SPEED * 0.3;
      if (btn("right")) player.x += STEER_SPEED * 0.3;
    } else {
      // Normal controls
      if (btn("up")) {
        speed += ACCEL;
        if (speed > MAX_SPEED) speed = MAX_SPEED;
      } else if (btn("down")) {
        speed -= BRAKE_DECEL;
        if (speed < 0) speed = 0;
      } else {
        speed -= COAST_DECEL;
        if (speed < 0) speed = 0;
      }

      const steerMult = 0.5 + 0.5 * (speed / MAX_SPEED);
      if (btn("left")) player.x -= STEER_SPEED * steerMult;
      if (btn("right")) player.x += STEER_SPEED * steerMult;
    }

    // Road curve influence on player
    player.x -= roadCurve * speed * 0.003;

    // Clamp player to screen
    player.x = _max(4, min(W - 12, player.x));

    // Road curve changes
    roadCurveTimer--;
    if (roadCurveTimer <= 0) {
      roadCurveTarget = (rnd(2) - 1) * (20 + stage * 5);
      roadCurveTimer = 90 + flr(rnd(120));
    }
    roadCurve += (roadCurveTarget - roadCurve) * 0.02;

    // Distance and score
    distance += speed * 0.5;
    score = flr(distance);

    // Road scroll offset for lane markers
    roadOffset += speed;
    if (roadOffset > 32) roadOffset -= 32;

    // Fuel drain
    fuel -= FUEL_DRAIN * (speed / MAX_SPEED);
    if (fuel <= 0) {
      fuel = 0;
      speed *= 0.97;
      if (speed < 0.3) {
        // Out of fuel = game over
        state = "gameover";
        addExplosion(player.x, player.y);
        crashSound();
      }
    }

    // Check road edges for player collision
    const playerEdges = getRoadEdges(PLAYER_Y);
    if (spinTimer <= 0 && invincibleTimer <= 0) {
      if (player.x < playerEdges.left - 2 || player.x + 8 > playerEdges.right + 2) {
        // Hit road edge - lose life!
        lives--;
        addExplosion(player.x, player.y);
        crashSound();
        speed = 0;
        player.x = playerEdges.center - 4;
        invincibleTimer = 60;
        if (lives <= 0) {
          state = "gameover";
        }
      }
    }

    // Checkpoint check
    if (distance >= stage * CHECKPOINT_DIST) {
      stage++;
      checkpointFlash = 90;
      fuel = _min(fuel + 400, FUEL_MAX);
      checkpointSound();
    }

    // Engine sound
    if (speed > 1) {
      engineSoundTimer--;
      if (engineSoundTimer <= 0) {
        const pitch = speed > 8 ? "A3" : speed > 4 ? "F3" : "D3";
        note(1, pitch, 0.03);
        engineSoundTimer = speed > 8 ? 4 : speed > 4 ? 6 : 8;
      }
    }

    // Spawn traffic
    const spawnRate = _max(8, 30 - stage * 3 - flr(speed));
    if (API.frame % spawnRate === 0 && speed > 1) {
      spawnTraffic();
    }

    // Spawn oil slicks
    if (API.frame % 120 === 0 && speed > 2) {
      spawnOil();
    }

    // Spawn fuel items
    if (API.frame % 200 === 0 && speed > 1) {
      spawnFuel();
    }

    // Update traffic
    const scrollSpeed = speed;
    for (let i = traffic.length - 1; i >= 0; i--) {
      const t = traffic[i];
      // Traffic moves down relative to player speed
      t.y += scrollSpeed - t.speed;
      // Apply curve
      const perspT = 0.4 + 0.6 * (t.y / H);
      t.x -= roadCurve * perspT * 0.05;

      if (t.y > H + 20 || t.y < -30) {
        traffic.splice(i, 1);
        continue;
      }

      // Collision with player
      if (spinTimer <= 0 && invincibleTimer <= 0) {
        if (_abs(t.x - player.x) < 7 && _abs(t.y - player.y) < 7) {
          // Spin out!
          spinTimer = 30;
          spinAngle = 0;
          speed *= 0.3;
          spinSound();
          // Knock traffic away
          addExplosion(t.x, t.y);
          traffic.splice(i, 1);
          score += 50; // bonus for hitting
        }
      }
    }

    // Update oil slicks
    for (let i = oilSlicks.length - 1; i >= 0; i--) {
      const o = oilSlicks[i];
      o.y += scrollSpeed;
      const perspO = 0.4 + 0.6 * (o.y / H);
      o.x -= roadCurve * perspO * 0.05;

      if (o.y > H + 10) {
        oilSlicks.splice(i, 1);
        continue;
      }

      // Collision
      if (spinTimer <= 0 && invincibleTimer <= 0) {
        if (_abs(o.x - player.x) < 6 && _abs(o.y - player.y) < 6) {
          spinTimer = 40;
          spinAngle = 0;
          speed *= 0.5;
          spinSound();
          oilSlicks.splice(i, 1);
        }
      }
    }

    // Update fuel items
    for (let i = fuelItems.length - 1; i >= 0; i--) {
      const f = fuelItems[i];
      f.y += scrollSpeed;
      const perspF = 0.4 + 0.6 * (f.y / H);
      f.x -= roadCurve * perspF * 0.05;

      if (f.y > H + 10) {
        fuelItems.splice(i, 1);
        continue;
      }

      // Pickup
      if (_abs(f.x - player.x) < 7 && _abs(f.y - player.y) < 7) {
        fuel = _min(fuel + 250, FUEL_MAX);
        fuelItems.splice(i, 1);
        fuelSound();
        score += 100;
      }
    }

    // Update explosions
    for (let i = explosions.length - 1; i >= 0; i--) {
      explosions[i].timer--;
      if (explosions[i].timer <= 0) explosions.splice(i, 1);
    }

    // Update particles
    for (let i = particles.length - 1; i >= 0; i--) {
      const p = particles[i];
      p.x += p.vx; p.y += p.vy; p.vy += 0.06; p.life--;
      if (p.life <= 0) particles.splice(i, 1);
    }
  };

  // ============================================================
  // Draw
  // ============================================================
  API._draw = function() {
    cls(0);

    // --- Draw road ---
    for (let y = 0; y < H; y++) {
      const edges = getRoadEdges(y);
      const left = flr(edges.left);
      const right = flr(edges.right);
      const roadW = right - left;

      // Grass/shoulder (dark)
      // already black from cls

      // Road surface
      for (let x = _max(0, left); x < min(W, right); x++) {
        buf32[y * W + x] = COLOR_U32[1]; // dark grey road
      }

      // Road edge lines (white)
      if (left >= 0 && left < W) buf32[y * W + left] = COLOR_U32[3];
      if (left + 1 >= 0 && left + 1 < W) buf32[y * W + left + 1] = COLOR_U32[3];
      if (right - 1 >= 0 && right - 1 < W) buf32[y * W + right - 1] = COLOR_U32[3];
      if (right - 2 >= 0 && right - 2 < W) buf32[y * W + right - 2] = COLOR_U32[3];

      // Center dashed line
      const cx = flr(edges.center);
      const dashPhase = (y + flr(roadOffset)) % 16;
      if (dashPhase < 8) {
        if (cx >= 0 && cx < W) buf32[y * W + cx] = COLOR_U32[2];
      }

      // Lane markers (quarter lines, dashed)
      const q1 = flr(edges.left + roadW * 0.25);
      const q3 = flr(edges.left + roadW * 0.75);
      const lanePhase = (y + flr(roadOffset)) % 24;
      if (lanePhase < 6) {
        if (q1 >= 0 && q1 < W) buf32[y * W + q1] = COLOR_U32[2];
        if (q3 >= 0 && q3 < W) buf32[y * W + q3] = COLOR_U32[2];
      }

      // Shoulder rumble strips
      const shoulderPhase = (y + flr(roadOffset * 0.7)) % 8;
      if (shoulderPhase < 4) {
        for (let sx = left - 4; sx < left; sx++) {
          if (sx >= 0 && sx < W) buf32[y * W + sx] = COLOR_U32[1];
        }
        for (let sx = right; sx < right + 4; sx++) {
          if (sx >= 0 && sx < W) buf32[y * W + sx] = COLOR_U32[1];
        }
      }
    }

    // --- Title screen ---
    if (state === "title") {
      // Darken the road a bit
      rectf(0, 0, W, H, 0);
      // Redraw some road lines for ambiance
      for (let y = 0; y < H; y++) {
        const edges = getRoadEdges(y);
        const left = flr(edges.left);
        const right = flr(edges.right);
        for (let x = _max(0, left); x < min(W, right); x++) {
          buf32[y * W + x] = COLOR_U32[0];
        }
        if (left >= 0 && left < W) buf32[y * W + left] = COLOR_U32[1];
        if (right - 1 >= 0 && right - 1 < W) buf32[y * W + right - 1] = COLOR_U32[1];
      }

      const ty = 50 + sin(API.frame * 0.04) * 4;

      // Title text with shadow
      text("ROAD FIGHTER", 175, flr(ty), 3);
      text("ROAD FIGHTER", 176, flr(ty) + 1, 1);

      rectf(160, flr(ty) + 12, 160, 1, 2);

      // Animated cars on title
      const carY1 = ((titleCarY || 0) * 2) % (H + 40) - 20;
      const carY2 = ((titleCarY || 0) * 2 + 120) % (H + 40) - 20;
      const carY3 = ((titleCarY || 0) * 2 + 240) % (H + 40) - 20;
      spr(1, W / 2 - 4, flr(ty) + 24 + sin(API.frame * 0.1) * 2);
      spr(2, W / 2 - 30, carY1);
      spr(3, W / 2 + 24, carY2);
      spr(4, W / 2 - 20, carY3);

      if (flr(API.frame / 20) % 2 === 0) text("PRESS START", 197, 180, 3);

      // Instructions
      text("STEER TO AVOID TRAFFIC", 160, 210, 2);
      text("COLLECT FUEL TO SURVIVE", 155, 222, 2);
      text("REACH CHECKPOINTS", 173, 234, 2);

      // Score table
      text("-SCORING-", 202, 260, 2);
      spr(6, 188, 272); text("  FUEL    +100", 198, 274, 2);
      spr(2, 188, 286); text("  CRASH    +50", 198, 288, 2);

      text("GRAYBOX DEMO V0.1", 168, 305, 1);
      return;
    }

    // --- Game over ---
    if (state === "gameover") {
      for (const p of particles) pix(flr(p.x), flr(p.y), p.color);

      text("GAME OVER", 195, 100, 3);
      text("DISTANCE: " + score, 180, 130, 2);
      text("STAGE: " + stage, 203, 145, 2);
      if (flr(API.frame / 20) % 2 === 0) text("PRESS START", 197, 200, 3);
      return;
    }

    // --- Play state rendering ---

    // Oil slicks
    for (const o of oilSlicks) spr(5, flr(o.x), flr(o.y));

    // Fuel items (blink)
    for (const f of fuelItems) {
      if (flr(API.frame / 6) % 2 === 0 || f.y > H * 0.3)
        spr(6, flr(f.x), flr(f.y));
    }

    // Traffic cars
    for (const t of traffic) {
      spr(t.type, flr(t.x), flr(t.y));
    }

    // Player car
    if (invincibleTimer <= 0 || flr(API.frame / 3) % 2 === 0) {
      if (spinTimer > 0) {
        sprRot(1, flr(player.x), flr(player.y), spinAngle);
      } else {
        spr(1, flr(player.x), flr(player.y));
      }
    }

    // Exhaustion particles when accelerating
    if (speed > 3 && spinTimer <= 0 && API.frame % 2 === 0) {
      pix(player.x + 2 + flr(rnd(4)), player.y + 8 + flr(rnd(3)), flr(rnd(2)) + 1);
    }

    // Explosions
    for (const e of explosions) {
      const sprId = e.timer > 7 ? 7 : 8;
      spr(sprId, flr(e.x), flr(e.y));
    }

    // Particles
    for (const p of particles) pix(flr(p.x), flr(p.y), p.color);

    // Checkpoint flash
    if (checkpointFlash > 60) {
      const msgY = 100;
      text("CHECKPOINT!", 190, msgY, 3);
      text("STAGE " + stage, 205, msgY + 14, 2);
      spr(11, 175, msgY - 2);
      spr(11, 280, msgY - 2);
    } else if (checkpointFlash > 0 && flr(checkpointFlash / 5) % 2 === 0) {
      text("STAGE " + stage, 205, 100, 3);
    }

    // ---- HUD ----
    // Top bar background
    rectf(0, 0, W, 20, 0);

    // Score / distance
    text("DIST:" + score, 4, 3, 3);

    // Stage
    text("STAGE:" + stage, 4, 12, 2);

    // Speed indicator bar
    text("SPD", 120, 3, 2);
    rectf(140, 3, 52, 6, 0);
    rect(140, 3, 52, 6, 2);
    const speedBarW = flr((speed / MAX_SPEED) * 50);
    const speedCol = speed > 9 ? 3 : speed > 5 ? 2 : 1;
    rectf(141, 4, speedBarW, 4, speedCol);

    // Fuel gauge
    text("FUEL", 210, 3, 2);
    rectf(235, 3, 62, 6, 0);
    rect(235, 3, 62, 6, 2);
    const fuelBarW = flr((fuel / FUEL_MAX) * 60);
    const fuelCol = fuel < 200 ? (flr(API.frame / 8) % 2 === 0 ? 3 : 1) : fuel < 400 ? 2 : 3;
    rectf(236, 4, fuelBarW, 4, fuelCol);

    // Low fuel warning
    if (fuel < 200 && flr(API.frame / 10) % 2 === 0) {
      text("LOW FUEL!", 220, 12, 3);
    }

    // Lives
    for (let i = 0; i < lives; i++) spr(9, W - 36 + i * 10, 4);

    // Next checkpoint distance
    const nextCP = stage * CHECKPOINT_DIST;
    const remaining = nextCP - flr(distance);
    if (remaining > 0) {
      text("NEXT:" + remaining, W - 80, 12, 2);
    }

    // Bottom: simple speed lines on sides for effect
    if (speed > 4) {
      const intensity = flr(speed / 3);
      for (let i = 0; i < intensity; i++) {
        const lx = flr(rnd(30));
        const ly = flr(rnd(H - 20)) + 20;
        const len = 3 + flr(rnd(speed));
        line(lx, ly, lx, ly + len, 1);
        const rx = W - flr(rnd(30));
        line(rx, ly, rx, ly + len, 1);
      }
    }
  };

  // ============================================================
  // Boot
  // ============================================================
  if (API._init) API._init();
  setInterval(tick, 1000 / FPS);
  document.addEventListener("keydown", ensureAudio, { once: true });
  document.addEventListener("click", ensureAudio, { once: true });
})();
</script>
</body>
