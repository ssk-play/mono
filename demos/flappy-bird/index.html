<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GrayBox — Demo: Flappy Bird</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #0a0a0a;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100vh;
    font-family: monospace;
    overflow: hidden;
  }
  #frame {
    background: #111;
    border: 3px solid #333;
    border-radius: 8px;
    padding: 12px;
    box-shadow: 0 0 40px rgba(0,0,0,0.8), inset 0 0 20px rgba(0,0,0,0.5);
  }
  canvas {
    display: block;
    image-rendering: pixelated;
    image-rendering: crisp-edges;
  }
  #controls {
    margin-top: 12px;
    color: #6b6b6b;
    font-size: 11px;
    text-align: center;
    letter-spacing: 1px;
  }
  #controls span { color: #b0b0b0; }
</style>
</head>
<body>
<div id="frame">
  <canvas id="screen"></canvas>
</div>
<div id="controls">
  <span>Z</span> FLAP &nbsp;&nbsp; <span>ENTER</span> START
</div>
<script>
(() => {
  "use strict";

  // ============================================================
  // GrayBox Runtime (inline)
  // ============================================================
  const W = 480;
  const H = 320;
  const SCALE = 2;
  const FPS = 30;
  const COLORS = ["#1a1a1a", "#6b6b6b", "#b0b0b0", "#e8e8e8"];
  const canvas = document.getElementById("screen");
  canvas.width = W;
  canvas.height = H;
  canvas.style.width = (W * SCALE) + "px";
  canvas.style.height = (H * SCALE) + "px";
  const ctx = canvas.getContext("2d");
  ctx.imageSmoothingEnabled = false;
  const buf = ctx.createImageData(W, H);
  const buf32 = new Uint32Array(buf.data.buffer);

  function hexToABGR(hex) {
    const r = parseInt(hex.slice(1, 3), 16);
    const g = parseInt(hex.slice(3, 5), 16);
    const b = parseInt(hex.slice(5, 7), 16);
    return (255 << 24) | (b << 16) | (g << 8) | r;
  }
  const COLOR_U32 = COLORS.map(hexToABGR);

  const sprites = {};
  const tilemap = {};

  const keyMap = {
    "ArrowUp": "up", "ArrowDown": "down", "ArrowLeft": "left", "ArrowRight": "right",
    "w": "up", "s": "down", "a": "left", "d": "right",
    "z": "a", "Z": "a", "x": "b", "X": "b",
    "Enter": "start", " ": "a"
  };
  const keys = {};
  const keysPrev = {};

  document.addEventListener("keydown", e => {
    const k = keyMap[e.key];
    if (k) { keys[k] = true; e.preventDefault(); }
  });
  document.addEventListener("keyup", e => {
    const k = keyMap[e.key];
    if (k) { keys[k] = false; e.preventDefault(); }
  });

  let audioCtx = null;
  const channels = [null, null];
  const channelGains = [null, null];
  function ensureAudio() {
    if (!audioCtx) {
      audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      for (let i = 0; i < 2; i++) {
        channelGains[i] = audioCtx.createGain();
        channelGains[i].gain.value = 0.15;
        channelGains[i].connect(audioCtx.destination);
      }
    }
  }

  const NOTE_NAMES = ["C","C#","D","D#","E","F","F#","G","G#","A","A#","B"];
  function noteToFreq(noteStr) {
    const match = noteStr.match(/^([A-G]#?)(\d)$/);
    if (!match) return 440;
    const name = match[1];
    const octave = parseInt(match[2]);
    const semitone = NOTE_NAMES.indexOf(name);
    if (semitone === -1) return 440;
    const midi = (octave + 1) * 12 + semitone;
    return 440 * Math.pow(2, (midi - 69) / 12);
  }

  const FONT_W = 4;
  const FONT_H = 7;
  const FONT = {};
  const fontData = {
    "A":"0110100110011111100110011001","B":"1110100110101110100110011110",
    "C":"0110100110001000100001100110","D":"1100101010011001100110101100",
    "E":"1111100010001110100010001111","F":"1111100010001110100010001000",
    "G":"0111100010001011100101100111","H":"1001100110011111100110011001",
    "I":"1110010001000100010001001110","J":"0111001000100010001010100100",
    "K":"1001101011001100101010011001","L":"1000100010001000100010001111",
    "M":"1001111111011001100110011001","N":"1001110111011001100110011001",
    "O":"0110100110011001100110010110","P":"1110100110011110100010001000",
    "Q":"0110100110011001101101100001","R":"1110100110011110101010011001",
    "S":"0111100010000110000110001110","T":"1111001000100010001000100010",
    "U":"1001100110011001100110010110","V":"1001100110011001100101100110",
    "W":"1001100110011001101111011001","X":"1001100101100110011010011001",
    "Y":"1001100101100010001000100010","Z":"1111000100100100100010001111",
    "0":"0110100111011011101110010110","1":"0100110001000100010001001110",
    "2":"0110100100010010010010001111","3":"1110000100010110000110011110",
    "4":"1001100110011111000100010001","5":"1111100010001110000100011110",
    "6":"0110100010001110100110010110","7":"1111000100010010010001001000",
    "8":"0110100110010110100110010110","9":"0110100110010111000100010110",
    " ":"0000000000000000000000000000",
    ".":"0000000000000000000001000100",
    ",":"0000000000000000001000101000",
    "!":"0100010001000100000000000100",
    "?":"0110100100010010000000000010",
    "-":"0000000000001110000000000000",
    "+":"0000001001001110010000100000",
    ":":"0000010001000000010001000000",
    "/":"0001000100100010010010001000",
    "*":"0000101001001110010010100000",
    "#":"0101111101011111010100000000",
    "(":"0010010010001000010001000010",
    ")":"0100001000010001000100100100",
    "=":"0000000011110000111100000000",
    "'":"0100010010000000000000000000",
    "\"":"1010101000000000000000000000",
    "<":"0010010010001000010000100010",
    ">":"1000010000100001001001001000",
    "_":"0000000000000000000000001111",
  };
  for (const [ch, bits] of Object.entries(fontData)) {
    FONT[ch] = [];
    for (let i = 0; i < bits.length; i++) FONT[ch].push(parseInt(bits[i]));
  }

  const API = {};
  API._init = null;
  API._update = null;
  API._draw = null;
  API.frame = 0;

  API.cls = function(c = 0) { buf32.fill(COLOR_U32[c] || COLOR_U32[0]); };
  API.pix = function(x, y, c) {
    x = Math.floor(x); y = Math.floor(y);
    if (x < 0 || x >= W || y < 0 || y >= H) return;
    buf32[y * W + x] = COLOR_U32[c] || COLOR_U32[0];
  };
  API.line = function(x0, y0, x1, y1, c) {
    x0=Math.floor(x0); y0=Math.floor(y0); x1=Math.floor(x1); y1=Math.floor(y1);
    const dx=Math.abs(x1-x0), dy=Math.abs(y1-y0);
    const sx=x0<x1?1:-1, sy=y0<y1?1:-1;
    let err=dx-dy;
    while(true) {
      API.pix(x0,y0,c);
      if(x0===x1&&y0===y1) break;
      const e2=2*err;
      if(e2>-dy){err-=dy;x0+=sx;}
      if(e2<dx){err+=dx;y0+=sy;}
    }
  };
  API.rect = function(x,y,w,h,c) {
    API.line(x,y,x+w-1,y,c); API.line(x+w-1,y,x+w-1,y+h-1,c);
    API.line(x+w-1,y+h-1,x,y+h-1,c); API.line(x,y+h-1,x,y,c);
  };
  API.rectf = function(x,y,w,h,c) {
    x=Math.floor(x); y=Math.floor(y);
    const col=COLOR_U32[c]||COLOR_U32[0];
    for(let py=Math.max(0,y);py<Math.min(H,y+h);py++)
      for(let px=Math.max(0,x);px<Math.min(W,x+w);px++)
        buf32[py*W+px]=col;
  };
  API.circ = function(cx,cy,r,c) {
    let x=r,y=0,d=1-r; cx=Math.floor(cx); cy=Math.floor(cy);
    while(x>=y){
      API.pix(cx+x,cy+y,c);API.pix(cx-x,cy+y,c);
      API.pix(cx+x,cy-y,c);API.pix(cx-x,cy-y,c);
      API.pix(cx+y,cy+x,c);API.pix(cx-y,cy+x,c);
      API.pix(cx+y,cy-x,c);API.pix(cx-y,cy-x,c);
      y++; if(d<0){d+=2*y+1;}else{x--;d+=2*(y-x)+1;}
    }
  };
  API.circf = function(cx,cy,r,c) {
    cx=Math.floor(cx); cy=Math.floor(cy);
    const col=COLOR_U32[c]||COLOR_U32[0]; const r2=r*r;
    for(let py=-r;py<=r;py++) for(let px=-r;px<=r;px++)
      if(px*px+py*py<=r2){ const sx=cx+px,sy=cy+py;
        if(sx>=0&&sx<W&&sy>=0&&sy<H) buf32[sy*W+sx]=col; }
  };
  API.sprite = function(id, data) {
    const arr = new Uint8Array(64); let i = 0;
    for (const ch of data) { if (ch>='0'&&ch<='3') { arr[i++]=parseInt(ch); if(i>=64) break; } }
    sprites[id] = arr;
  };
  API.spr = function(id, x, y, flipX, flipY) {
    const s=sprites[id]; if(!s) return;
    x=Math.floor(x); y=Math.floor(y);
    for(let py=0;py<8;py++) for(let px=0;px<8;px++){
      const sx=flipX?7-px:px, sy=flipY?7-py:py;
      const c=s[sy*8+sx], dx=x+px, dy=y+py;
      if(dx>=0&&dx<W&&dy>=0&&dy<H) buf32[dy*W+dx]=COLOR_U32[c];
    }
  };
  // Extended spr with transparency (color 0 = transparent)
  API.sprT = function(id, x, y, flipX, flipY) {
    const s=sprites[id]; if(!s) return;
    x=Math.floor(x); y=Math.floor(y);
    for(let py=0;py<8;py++) for(let px=0;px<8;px++){
      const sx=flipX?7-px:px, sy=flipY?7-py:py;
      const c=s[sy*8+sx]; if(c===0) continue;
      const dx=x+px, dy=y+py;
      if(dx>=0&&dx<W&&dy>=0&&dy<H) buf32[dy*W+dx]=COLOR_U32[c];
    }
  };
  API.text = function(str, x, y, c) {
    str=String(str).toUpperCase(); let cx=Math.floor(x); const cy=Math.floor(y);
    const col=COLOR_U32[c]||COLOR_U32[3];
    for(const ch of str){
      const glyph=FONT[ch];
      if(glyph) for(let py=0;py<FONT_H;py++) for(let px=0;px<FONT_W;px++)
        if(glyph[py*FONT_W+px]){ const dx=cx+px,dy=cy+py;
          if(dx>=0&&dx<W&&dy>=0&&dy<H) buf32[dy*W+dx]=col; }
      cx+=FONT_W+1;
    }
  };
  API.mget = function(cx,cy) { return tilemap[cx+","+cy]||0; };
  API.mset = function(cx,cy,id) { tilemap[cx+","+cy]=id; };
  API.map = function(mx,my,mw,mh,sx,sy) {
    for(let ty=0;ty<mh;ty++) for(let tx=0;tx<mw;tx++){
      const id=API.mget(mx+tx,my+ty); if(id>0) API.spr(id,sx+tx*8,sy+ty*8); }
  };
  API.btn = function(k) { return !!keys[k]; };
  API.btnp = function(k) { return !!keys[k] && !keysPrev[k]; };
  API.note = function(ch, noteStr, dur) {
    ensureAudio(); if(ch<0||ch>1) return; API.stop(ch);
    const osc=audioCtx.createOscillator(); osc.type="square";
    osc.frequency.value=noteToFreq(noteStr);
    osc.connect(channelGains[ch]); osc.start();
    osc.stop(audioCtx.currentTime+dur); channels[ch]=osc;
  };
  API.stop = function(ch) {
    if(ch===undefined){API.stop(0);API.stop(1);return;}
    if(channels[ch]){try{channels[ch].stop();}catch(e){} channels[ch]=null;}
  };
  API.rnd = function(max) { return Math.random()*max; };
  API.flr = Math.floor;
  API.abs = Math.abs;
  API.min = Math.min;
  API.max = Math.max;
  API.sin = Math.sin;
  API.cos = Math.cos;

  function tick() {
    if (API._update) API._update();
    if (API._draw) API._draw();
    ctx.putImageData(buf, 0, 0);
    for (const k in keys) keysPrev[k] = keys[k];
    API.frame++;
  }

  // ============================================================
  // Flappy Bird Game
  // ============================================================
  const { cls, pix, line, rect, rectf, circ, circf, sprite: defSprite,
          spr, sprT, text, btn, btnp, note, stop, rnd, flr,
          abs: _abs, min, max: _max, sin, cos } = API;

  // --- Sprites ---

  // 1: Bird - wings up
  defSprite(1,
    "00033000" +
    "00322300" +
    "03233130" +
    "03322330" +
    "03333300" +
    "00333200" +
    "00033000" +
    "00000000"
  );
  // 2: Bird - wings mid
  defSprite(2,
    "00033000" +
    "00322300" +
    "03233130" +
    "03322330" +
    "33333300" +
    "00333200" +
    "00033000" +
    "00000000"
  );
  // 3: Bird - wings down
  defSprite(3,
    "00033000" +
    "00322300" +
    "03233130" +
    "03322330" +
    "03333300" +
    "33333200" +
    "00033000" +
    "00000000"
  );
  // 4: Pipe top cap (top of lower pipe / bottom of upper pipe opening)
  defSprite(4,
    "01111110" +
    "12222231" +
    "12222231" +
    "01111110" +
    "00000000" +
    "00000000" +
    "00000000" +
    "00000000"
  );
  // 5: Pipe body segment
  defSprite(5,
    "01222310" +
    "01222310" +
    "01222310" +
    "01222310" +
    "01222310" +
    "01222310" +
    "01222310" +
    "01222310"
  );
  // 6: Ground tile
  defSprite(6,
    "33333333" +
    "21212121" +
    "12121212" +
    "11111111" +
    "11111111" +
    "10101010" +
    "01010101" +
    "00000000"
  );
  // 7: Bush / decoration for background
  defSprite(7,
    "00000000" +
    "00000000" +
    "00010000" +
    "00111010" +
    "01111100" +
    "11111110" +
    "11111111" +
    "00000000"
  );
  // 8: Cloud
  defSprite(8,
    "00000000" +
    "00110000" +
    "01331000" +
    "13333100" +
    "33333310" +
    "13333331" +
    "01111110" +
    "00000000"
  );
  // 9: Small star / dot for background
  defSprite(9,
    "00000000" +
    "00000000" +
    "00000000" +
    "00020000" +
    "00000000" +
    "00000000" +
    "00000000" +
    "00000000"
  );
  // 10: Bird dead (X eyes)
  defSprite(10,
    "00033000" +
    "00322300" +
    "03203030" +
    "03320330" +
    "03203000" +
    "00333200" +
    "00033000" +
    "00000000"
  );
  // 11: Medal/trophy icon
  defSprite(11,
    "00333300" +
    "03222230" +
    "32322320" +
    "32232320" +
    "03222230" +
    "00333300" +
    "00033000" +
    "00033000"
  );

  // --- Constants ---
  const GROUND_Y = H - 24; // ground top y
  const GRAVITY = 0.35;
  const FLAP_VEL = -4.8;
  const PIPE_W = 32;       // pipe width in pixels (4 sprite columns)
  const PIPE_GAP = 72;     // vertical gap between pipes
  const PIPE_SPEED = 2.2;
  const PIPE_SPACING = 160; // horizontal spacing between pipes
  const BIRD_X = 80;        // bird x position (fixed)
  const BIRD_SIZE = 8;      // sprite size
  const BIRD_HITBOX = 6;    // slightly smaller than sprite for fairness

  // --- Game State ---
  let state = "title";
  let bird, pipes, score, bestScore, groundScroll;
  let deathTimer, flashTimer;
  let titleBobT;
  let clouds;
  let particles;
  let passedPipeIds;
  let pipeIdCounter;
  let difficulty; // increases scroll speed over time
  let scorePopups;

  bestScore = 0;

  function resetGame() {
    bird = { y: H / 2 - 20, vy: 0, flapAnim: 0, alive: true, angle: 0 };
    pipes = [];
    score = 0;
    groundScroll = 0;
    deathTimer = 0;
    flashTimer = 0;
    titleBobT = 0;
    passedPipeIds = new Set();
    pipeIdCounter = 0;
    difficulty = 0;
    scorePopups = [];
    particles = [];
    clouds = [];
    for (let i = 0; i < 6; i++) {
      clouds.push({
        x: flr(rnd(W + 100)),
        y: 20 + flr(rnd(100)),
        speed: 0.2 + rnd(0.4),
        size: 1 + flr(rnd(2))
      });
    }
    // Spawn initial pipes
    for (let i = 0; i < 4; i++) {
      spawnPipe(W + 60 + i * PIPE_SPACING);
    }
  }

  function spawnPipe(x) {
    const minGapY = 50;
    const maxGapY = GROUND_Y - PIPE_GAP - 50;
    const gapY = minGapY + flr(rnd(maxGapY - minGapY));
    pipes.push({
      id: pipeIdCounter++,
      x: x,
      gapY: gapY // top of the gap
    });
  }

  function getSpeed() {
    return PIPE_SPEED + difficulty * 0.15;
  }

  // --- Sounds ---
  function flapSound() { note(0, "E5", 0.04); }
  function scoreSound() {
    note(0, "C5", 0.05);
    setTimeout(() => note(0, "E5", 0.06), 50);
  }
  function hitSound() {
    note(0, "C3", 0.1);
    note(1, "E2", 0.15);
  }
  function deathSound() {
    setTimeout(() => {
      note(0, "G3", 0.08);
      note(1, "C3", 0.12);
    }, 200);
    setTimeout(() => {
      note(0, "E3", 0.1);
      note(1, "A2", 0.15);
    }, 400);
  }
  function startSound() {
    note(0, "C5", 0.06);
    setTimeout(() => note(0, "E5", 0.06), 80);
    setTimeout(() => note(0, "G5", 0.1), 160);
  }
  function bestScoreSound() {
    note(0, "C5", 0.06);
    setTimeout(() => note(0, "E5", 0.06), 80);
    setTimeout(() => note(0, "G5", 0.06), 160);
    setTimeout(() => note(0, "C6", 0.12), 240);
  }

  // --- Text helpers ---
  function textWidth(str) { return str.length * (FONT_W + 1) - 1; }
  function textCenter(str, y, c) {
    const w = textWidth(str);
    text(str, flr((W - w) / 2), y, c);
  }

  // Draw big text (2x scale)
  function textBig(str, x, y, c) {
    str = String(str).toUpperCase();
    let cx = Math.floor(x);
    const cy = Math.floor(y);
    const col = COLOR_U32[c] || COLOR_U32[3];
    for (const ch of str) {
      const glyph = FONT[ch];
      if (glyph) {
        for (let py = 0; py < FONT_H; py++) {
          for (let px = 0; px < FONT_W; px++) {
            if (glyph[py * FONT_W + px]) {
              const dx = cx + px * 2, dy = cy + py * 2;
              for (let sy = 0; sy < 2; sy++)
                for (let sx = 0; sx < 2; sx++) {
                  const fx = dx + sx, fy = dy + sy;
                  if (fx >= 0 && fx < W && fy >= 0 && fy < H)
                    buf32[fy * W + fx] = col;
                }
            }
          }
        }
      }
      cx += (FONT_W + 1) * 2;
    }
  }
  function textBigWidth(str) { return str.length * (FONT_W + 1) * 2 - 2; }
  function textBigCenter(str, y, c) {
    const w = textBigWidth(str);
    textBig(str, flr((W - w) / 2), y, c);
  }

  // Draw extra big text (3x scale)
  function textHuge(str, x, y, c) {
    str = String(str).toUpperCase();
    let cx = Math.floor(x);
    const cy = Math.floor(y);
    const col = COLOR_U32[c] || COLOR_U32[3];
    for (const ch of str) {
      const glyph = FONT[ch];
      if (glyph) {
        for (let py = 0; py < FONT_H; py++) {
          for (let px = 0; px < FONT_W; px++) {
            if (glyph[py * FONT_W + px]) {
              const dx = cx + px * 3, dy = cy + py * 3;
              for (let sy = 0; sy < 3; sy++)
                for (let sx = 0; sx < 3; sx++) {
                  const fx = dx + sx, fy = dy + sy;
                  if (fx >= 0 && fx < W && fy >= 0 && fy < H)
                    buf32[fy * W + fx] = col;
                }
            }
          }
        }
      }
      cx += (FONT_W + 1) * 3;
    }
  }
  function textHugeWidth(str) { return str.length * (FONT_W + 1) * 3 - 3; }
  function textHugeCenter(str, y, c) {
    const w = textHugeWidth(str);
    textHuge(str, flr((W - w) / 2), y, c);
  }

  // --- Collision ---
  function birdRect() {
    const margin = (BIRD_SIZE - BIRD_HITBOX) / 2;
    return {
      x: BIRD_X + margin,
      y: bird.y + margin,
      w: BIRD_HITBOX,
      h: BIRD_HITBOX
    };
  }

  function rectsOverlap(a, b) {
    return a.x < b.x + b.w && a.x + a.w > b.x &&
           a.y < b.y + b.h && a.y + a.h > b.y;
  }

  function checkCollision() {
    const br = birdRect();
    // Ground
    if (br.y + br.h >= GROUND_Y) return true;
    // Ceiling
    if (br.y <= 0) return true;
    // Pipes
    for (const p of pipes) {
      // Upper pipe
      const upper = { x: p.x, y: 0, w: PIPE_W, h: p.gapY };
      // Lower pipe
      const lower = { x: p.x, y: p.gapY + PIPE_GAP, w: PIPE_W, h: GROUND_Y - (p.gapY + PIPE_GAP) };
      if (rectsOverlap(br, upper) || rectsOverlap(br, lower)) return true;
    }
    return false;
  }

  // --- Particles ---
  function spawnDeathParticles() {
    for (let i = 0; i < 12; i++) {
      particles.push({
        x: BIRD_X + 4, y: bird.y + 4,
        vx: rnd(4) - 2, vy: rnd(3) - 2,
        life: 15 + flr(rnd(15)),
        color: 1 + flr(rnd(3))
      });
    }
  }

  // --- Draw helpers ---
  function drawPipe(p) {
    const spd = getSpeed();
    const x = flr(p.x);

    // Upper pipe body
    for (let ty = 0; ty < p.gapY - 4; ty += 8) {
      for (let tx = 0; tx < PIPE_W; tx += 8) {
        sprT(5, x + tx, ty);
      }
    }
    // Upper pipe cap (bottom of upper pipe, flipped)
    for (let tx = 0; tx < PIPE_W; tx += 8) {
      sprT(4, x + tx, p.gapY - 4, false, true);
    }

    // Lower pipe cap (top of lower pipe)
    const lowerY = p.gapY + PIPE_GAP;
    for (let tx = 0; tx < PIPE_W; tx += 8) {
      sprT(4, x + tx, lowerY);
    }
    // Lower pipe body
    for (let ty = lowerY + 4; ty < GROUND_Y; ty += 8) {
      for (let tx = 0; tx < PIPE_W; tx += 8) {
        sprT(5, x + tx, ty);
      }
    }
  }

  function drawGround() {
    const gx = flr(groundScroll) % 8;
    // Ground stripe
    rectf(0, GROUND_Y, W, 2, 2);
    for (let x = -gx; x < W; x += 8) {
      sprT(6, x, GROUND_Y + 2);
    }
    // Fill below ground tiles
    rectf(0, GROUND_Y + 10, W, H - GROUND_Y - 10, 0);
  }

  function drawClouds() {
    for (const c of clouds) {
      const cx = flr(c.x);
      const cy = flr(c.y);
      if (c.size === 1) {
        sprT(8, cx, cy);
      } else {
        sprT(8, cx, cy);
        sprT(8, cx + 7, cy - 2);
      }
    }
  }

  function drawBird() {
    // Pick animation frame
    let sprId;
    if (!bird.alive) {
      sprId = 10; // dead bird
    } else {
      const wingCycle = flr(bird.flapAnim / 4) % 3;
      sprId = wingCycle + 1; // sprites 1,2,3
    }

    // Calculate tilt based on velocity
    // We'll simulate tilt by shifting pixels - draw bird at slight angles
    const bx = flr(BIRD_X);
    const by = flr(bird.y);

    // Simple tilt: shift top/bottom rows
    const s = sprites[sprId]; if (!s) return;
    const tilt = bird.alive ? Math.max(-2, Math.min(2, flr(bird.vy / 2.5))) : 2;

    for (let py = 0; py < 8; py++) {
      // Row offset based on tilt: top rows shift one way, bottom rows the other
      const rowOff = flr((py - 3.5) * tilt / 4);
      for (let px = 0; px < 8; px++) {
        const c = s[py * 8 + px];
        if (c === 0) continue;
        const dx = bx + px + rowOff, dy = by + py;
        if (dx >= 0 && dx < W && dy >= 0 && dy < H)
          buf32[dy * W + dx] = COLOR_U32[c];
      }
    }
  }

  function drawScorePopup() {
    for (let i = scorePopups.length - 1; i >= 0; i--) {
      const sp = scorePopups[i];
      sp.y -= 0.5;
      sp.life--;
      if (sp.life <= 0) { scorePopups.splice(i, 1); continue; }
      const alpha = sp.life > 10 ? 3 : 2;
      text("+1", flr(sp.x), flr(sp.y), alpha);
    }
  }

  // --- Initialize ---
  resetGame();

  // ============================================================
  // Update
  // ============================================================
  API._update = function() {
    titleBobT++;

    if (state === "title") {
      // Bob the bird on title screen
      bird.y = H / 2 - 30 + sin(titleBobT * 0.08) * 8;
      bird.flapAnim++;
      groundScroll += 1;

      // Move clouds
      for (const c of clouds) {
        c.x -= c.speed;
        if (c.x < -20) { c.x = W + 10; c.y = 20 + flr(rnd(100)); }
      }

      if (btnp("a") || btnp("start")) {
        state = "ready";
        bird.y = H / 2 - 30;
        bird.vy = 0;
        startSound();
      }
      return;
    }

    if (state === "ready") {
      // Bird bobs, waiting for first flap
      bird.y = H / 2 - 30 + sin(titleBobT * 0.08) * 6;
      bird.flapAnim++;
      groundScroll += getSpeed();

      for (const c of clouds) {
        c.x -= c.speed;
        if (c.x < -20) { c.x = W + 10; c.y = 20 + flr(rnd(100)); }
      }

      if (btnp("a") || btnp("up")) {
        state = "play";
        bird.vy = FLAP_VEL;
        bird.flapAnim = 0;
        flapSound();
      }
      return;
    }

    if (state === "play") {
      // Flap
      if (btnp("a") || btnp("up")) {
        bird.vy = FLAP_VEL;
        bird.flapAnim = 0;
        flapSound();
      }

      // Bird physics
      bird.vy += GRAVITY;
      bird.y += bird.vy;
      bird.flapAnim++;

      // Increase difficulty over time
      difficulty = min(score / 8, 5);

      const spd = getSpeed();

      // Move pipes
      for (let i = pipes.length - 1; i >= 0; i--) {
        pipes[i].x -= spd;
        // Score: pipe center passed bird
        if (!passedPipeIds.has(pipes[i].id) && pipes[i].x + PIPE_W / 2 < BIRD_X) {
          passedPipeIds.add(pipes[i].id);
          score++;
          scoreSound();
          scorePopups.push({ x: BIRD_X + 12, y: bird.y - 5, life: 25 });
        }
        // Remove off-screen pipes and spawn new ones
        if (pipes[i].x < -PIPE_W - 10) {
          pipes.splice(i, 1);
          spawnPipe(pipes.length > 0 ? pipes[pipes.length - 1].x + PIPE_SPACING : W + 60);
        }
      }

      // Scroll ground
      groundScroll += spd;

      // Move clouds
      for (const c of clouds) {
        c.x -= c.speed + spd * 0.1;
        if (c.x < -20) { c.x = W + 10; c.y = 20 + flr(rnd(100)); }
      }

      // Collision
      if (checkCollision()) {
        state = "dying";
        bird.alive = false;
        deathTimer = 0;
        flashTimer = 3;
        hitSound();
        deathSound();
        spawnDeathParticles();
        if (score > bestScore) {
          bestScore = score;
          setTimeout(bestScoreSound, 600);
        }
      }
      return;
    }

    if (state === "dying") {
      deathTimer++;
      if (flashTimer > 0) flashTimer--;

      // Bird falls after dying
      if (bird.y < GROUND_Y - 8) {
        bird.vy += GRAVITY * 0.8;
        bird.y += bird.vy;
      } else {
        bird.y = GROUND_Y - 8;
        bird.vy = 0;
      }

      // Update particles
      for (let i = particles.length - 1; i >= 0; i--) {
        const p = particles[i];
        p.x += p.vx; p.y += p.vy; p.vy += 0.1; p.life--;
        if (p.life <= 0) particles.splice(i, 1);
      }

      if (deathTimer > 40 && (btnp("a") || btnp("start"))) {
        state = "gameover";
        deathTimer = 0;
      }
      return;
    }

    if (state === "gameover") {
      deathTimer++;
      // Update particles
      for (let i = particles.length - 1; i >= 0; i--) {
        const p = particles[i];
        p.x += p.vx; p.y += p.vy; p.vy += 0.1; p.life--;
        if (p.life <= 0) particles.splice(i, 1);
      }

      if (deathTimer > 20 && (btnp("a") || btnp("start"))) {
        state = "title";
        resetGame();
        bird.alive = true;
      }
      return;
    }
  };

  // ============================================================
  // Draw
  // ============================================================
  API._draw = function() {
    // Background - gradient sky
    cls(0);
    // Sky gradient: dark at top, slightly lighter lower
    rectf(0, 0, W, 80, 0);
    rectf(0, 80, W, 80, 0);
    // Dithered transition band
    for (let y = 130; y < 170; y++) {
      for (let x = 0; x < W; x++) {
        if ((x + y) % 3 === 0) pix(x, y, 1);
      }
    }
    rectf(0, 170, W, GROUND_Y - 170, 1);

    // Clouds
    drawClouds();

    if (state === "title") {
      // Draw some pipes in background for flavor
      drawGround();

      // Title card
      const bobY = flr(sin(titleBobT * 0.05) * 3);

      // Title background box
      rectf(W/2 - 110, 50 + bobY, 220, 50, 0);
      rect(W/2 - 110, 50 + bobY, 220, 50, 2);

      textHugeCenter("FLAPPY", 56 + bobY, 3);
      textBigCenter("BIRD", 78 + bobY, 2);

      // Draw bird
      drawBird();

      // Instructions
      textCenter("PRESS Z OR ENTER TO START", 200, 2);

      if (bestScore > 0) {
        textCenter("BEST: " + bestScore, 225, 1);
      }

      // Credits
      textCenter("GRAYBOX DEMO", H - 20, 1);

      return;
    }

    if (state === "ready") {
      // Draw pipes
      for (const p of pipes) drawPipe(p);

      drawGround();
      drawBird();

      // "Get Ready" message
      rectf(W/2 - 60, 80, 120, 28, 0);
      rect(W/2 - 60, 80, 120, 28, 2);
      textBigCenter("GET READY", 84, 3);
      textCenter("PRESS Z TO FLAP", 102, 2);

      // Score
      textBigCenter("" + score, 30, 3);

      return;
    }

    if (state === "play") {
      // Draw pipes
      for (const p of pipes) drawPipe(p);

      drawGround();

      // Particles
      for (const p of particles) {
        pix(flr(p.x), flr(p.y), p.color);
      }

      drawBird();
      drawScorePopup();

      // Score display - big centered at top
      const scoreStr = "" + score;
      // Shadow
      textBig(scoreStr, flr((W - textBigWidth(scoreStr)) / 2) + 1, 21, 0);
      textBigCenter(scoreStr, 20, 3);

      return;
    }

    if (state === "dying") {
      // Flash screen on death
      if (flashTimer > 0 && flashTimer % 2 === 1) {
        cls(3);
      } else {
        // Draw pipes
        for (const p of pipes) drawPipe(p);
        drawGround();
      }

      // Particles
      for (const p of particles) {
        pix(flr(p.x), flr(p.y), p.color);
        pix(flr(p.x)+1, flr(p.y), p.color);
      }

      drawBird();

      // Score
      const scoreStr = "" + score;
      textBig(scoreStr, flr((W - textBigWidth(scoreStr)) / 2) + 1, 21, 0);
      textBigCenter(scoreStr, 20, 3);

      return;
    }

    if (state === "gameover") {
      // Draw frozen scene
      for (const p of pipes) drawPipe(p);
      drawGround();

      // Particles
      for (const p of particles) {
        pix(flr(p.x), flr(p.y), p.color);
      }

      drawBird();

      // Game Over panel
      const panelW = 200;
      const panelH = 120;
      const panelX = flr((W - panelW) / 2);
      const panelY = flr((H - panelH) / 2) - 20;

      // Panel background
      rectf(panelX, panelY, panelW, panelH, 0);
      rect(panelX, panelY, panelW, panelH, 2);
      rect(panelX + 2, panelY + 2, panelW - 4, panelH - 4, 1);

      // "GAME OVER"
      textBigCenter("GAME OVER", panelY + 10, 3);

      // Divider line
      line(panelX + 10, panelY + 28, panelX + panelW - 10, panelY + 28, 1);

      // Score
      text("SCORE", panelX + 20, panelY + 38, 2);
      const sStr = "" + score;
      text(sStr, panelX + panelW - 20 - textWidth(sStr), panelY + 38, 3);

      // Best
      text("BEST", panelX + 20, panelY + 52, 2);
      const bStr = "" + bestScore;
      text(bStr, panelX + panelW - 20 - textWidth(bStr), panelY + 52, 3);

      // New best indicator
      if (score === bestScore && score > 0) {
        text("NEW!", panelX + panelW - 55 - textWidth(bStr), panelY + 52, 2);
        // Draw medal
        sprT(11, panelX + 8, panelY + 42);
      }

      // Divider
      line(panelX + 10, panelY + 65, panelX + panelW - 10, panelY + 65, 1);

      // Rating
      let rating = "TRY AGAIN";
      if (score >= 5) rating = "NOT BAD";
      if (score >= 15) rating = "GREAT";
      if (score >= 25) rating = "AMAZING";
      if (score >= 40) rating = "LEGENDARY";
      textCenter(rating, panelY + 75, score >= 15 ? 3 : 2);

      // Prompt
      if (deathTimer > 20) {
        const blink = flr(deathTimer / 10) % 2;
        if (blink) {
          textCenter("PRESS Z TO CONTINUE", panelY + 98, 2);
        }
      }

      return;
    }
  };

  // ============================================================
  // Start
  // ============================================================
  setInterval(tick, 1000 / FPS);
})();
</script>
