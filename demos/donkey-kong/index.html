  function up(d) {
    let o = "";
    for (let r = 0; r < 8; r++) {
      let row = "";
      for (let c = 0; c < 8; c++) {
        const ch = d[r * 8 + c];
        row += ch + ch;
      }
      o += row + row;
    }
    return o;
  }

  // --- Collision helpers ---
  // Circle collision for round objects (barrels, fireballs)
  function circCollides(ax, ay, ar, bx, by, br) {
    const dx = ax - bx;
    const dy = ay - by;
    const dist = dx * dx + dy * dy;
    const radSum = ar + br;
    return dist < radSum * radSum;
  }

  // Player hitbox: center + half-size (rect-based)
  function playerCenter() {
    return { cx: player.x + 8, cy: player.y + 8 };
  }
  // Barrel/fire center + radius (circle-based)
  function barrelCenter(b) {
    return { cx: b.x + 8, cy: b.y + 8, r: 7 };
  }
  function fireCenter(f) {
    return { cx: f.x + 8, cy: f.y + 8, r: 6 };
  }

  // Check circle vs rect overlap (player rect vs round enemy circle)
  function circRectCollides(cx, cy, cr, rx, ry, rw, rh) {
    const nearX = _abs(cx - (rx + rw / 2)) < rw / 2 ? cx : (cx < rx ? rx : rx + rw);
    const nearY = _abs(cy - (ry + rh / 2)) < rh / 2 ? cy : (cy < ry ? ry : ry + rh);
    const dx = cx - nearX;
    const dy = cy - nearY;
    return (dx * dx + dy * dy) < (cr * cr);
  }

  // --- Game State ---

  // Sprite size constant (now 16x16)
  const SS = 16;

  function getGirderY(girder, x) {
    if (x < girder.x1 || x > girder.x2) return -999;
    const t = (x - girder.x1) / (girder.x2 - girder.x1);
    return girder.y + t * girder.slope;
  }

  function isOnGirder(x, y, tolerance) {
    tolerance = tolerance || 4;
    for (const g of levelData.girders) {
      const gy = getGirderY(g, x);
      if (gy > -900 && _abs(y - gy) < tolerance && x >= g.x1 && x <= g.x2) {
        return gy;
      }
    }
    return false;
  }

  function isOnLadder(x, y) {
    const allLadders = levelData.ladders.concat(levelData.brokenLadders || []);
    for (const l of allLadders) {
      if (_abs(x - l.x) < 8 && y >= l.y1 - 4 && y <= l.y2 + 4) {
        return l;
      }
    }
    return null;
  }

  function isNearLadderTop(x, y) {
    const allLadders = levelData.ladders.concat(levelData.brokenLadders || []);
    for (const l of allLadders) {
      if (_abs(x - l.x) < 8 && _abs(y - l.y1) < 8) {
        return l;
      }
    }
    return null;
  }

  function isNearLadderBottom(x, y) {
    const allLadders = levelData.ladders.concat(levelData.brokenLadders || []);
    for (const l of allLadders) {
      if (_abs(x - l.x) < 8 && _abs(y - l.y2) < 10) {
        return l;
      }
    }
    return null;
  }

  function resetGame() {
    score = 0;
    lives = 3;
    level = 0;
    loadLevel();
  }

  function loadLevel() {
    levelData = LEVELS[level % LEVELS.length];
    player = {
      x: levelData.playerStart.x,
      y: levelData.playerStart.y,
      vx: 0, vy: 0,
      onGround: true,
      climbing: false,
      jumping: false,
      facing: 1,
      speed: 1.8,
    };
    barrels = [];
    fires = [];
    explosions = [];
    particles = [];
    dkAnimT = 0;
    dkThrowT = 0;
    dkFrame = 0;
    hammerActive = false;
    hammerTimer = 0;
    hammerSwing = 0;
    hammerPickups = [];
    if (levelData.hammers) {
      for (const h of levelData.hammers) {
        hammerPickups.push({ x: h.x, y: h.y, active: true });
      }
    }
    itemsCollected = [];
    if (levelData.items) {
      for (const it of levelData.items) {
        itemsCollected.push({ x: it.x, y: it.y, spr: it.spr, collected: false });
      }
    }
    bonusTimer = 5000;
    bonusScore = 5000;
    paulineFrame = 0;
    paulineTimer = 0;
    invincibleTimer = 0;
    levelComplete = false;
    levelCompleteTimer = 0;
    walkFrame = 0;
    walkTimer = 0;

    // Add initial fire enemy at oil drum
    if (levelData.oilDrum) {
      fires.push({
        x: levelData.oilDrum.x,
        y: levelData.oilDrum.y - SS,
        vx: 0.5,
        vy: 0,
        onGround: true,
        climbing: false,
        moveTimer: 0,
        climbChance: 0,
      });
    }
  }

  function spawnBarrel() {
    if (!levelData.barrelSpawn) return;
    const dk = levelData.dk;
    barrels.push({
      x: dk.x + SS,
      y: dk.y + SS + 8,
      vx: 1.5 + level * 0.2,
      vy: 0,
      onGround: false,
      rolling: true,
      frame: 0,
      frameTimer: 0,
      goingDown: false,
    });
  }

  function addExplosion(x, y) {
    for (let i = 0; i < 6; i++) {
      particles.push({
        x: x + 8, y: y + 8,
        vx: rnd(4) - 2, vy: rnd(3) - 2,
        life: 8 + flr(rnd(8)),
        color: flr(rnd(3)) + 1
      });
    }
  }

  Mono.scene(GAMEOVER, {
    init() {},
    update() {
      for (let i = particles.length - 1; i >= 0; i--) {
        const p = particles[i]; p.x += p.vx; p.y += p.vy; p.vy += 0.08; p.life--;
        if (p.life <= 0) particles.splice(i, 1);
      }
      if (btnp("start") || btnp("a")) { Mono.go(TITLE); return; }
    },
    draw() { drawGameOver(); }
  });

  Mono.scene(PLAY, {
    init() { resetGame(); },
    update() {

    // Level complete sequence
    if (levelComplete) {
      levelCompleteTimer++;
      if (levelCompleteTimer > 90) {
        level++;
        loadLevel();
        levelComplete = false;
        levelCompleteTimer = 0;
      }
      return;
    }

    // Bonus countdown
    bonusTimer -= 2;
    if (bonusTimer < 0) bonusTimer = 0;
    bonusScore = flr(bonusTimer / 100) * 100;

    // Pauline animation
    paulineTimer++;
    if (paulineTimer > 30) { paulineTimer = 0; paulineFrame = 1 - paulineFrame; }

    // DK animation
    dkAnimT++;
    dkThrowT++;
    if (dkThrowT > (90 - level * 10)) {
      dkThrowT = 0;
      dkFrame = 1; // throwing
      spawnBarrel();
      note(0, "C3", 0.06);
    }
    if (dkFrame === 1 && dkThrowT > 15) dkFrame = 0;

    // Invincibility timer
    if (invincibleTimer > 0) invincibleTimer--;

    // --- Player Movement ---
    const p = player;
    const wasClimbing = p.climbing;

    if (!p.climbing) {
      // Horizontal movement
      if (btn("left")) {
        p.vx = -p.speed;
        p.facing = -1;
        walkTimer++;
        if (walkTimer > 6 && p.onGround) { walkTimer = 0; walkFrame = 1 - walkFrame; walkSound(); }
      } else if (btn("right")) {
        p.vx = p.speed;
        p.facing = 1;
        walkTimer++;
        if (walkTimer > 6 && p.onGround) { walkTimer = 0; walkFrame = 1 - walkFrame; walkSound(); }
      } else {
        p.vx = 0;
        walkFrame = 0;
      }

      // Jump
      if (btnp("a") && p.onGround && !p.jumping) {
        p.vy = -4.5;
        p.onGround = false;
        p.jumping = true;
        jumpSound();
      }

      // Start climbing (press up near ladder bottom or on ladder)
      if (btn("up")) {
        const ladder = isOnLadder(p.x + 8, p.y + 8);
        if (ladder && p.onGround) {
          p.climbing = true;
          p.x = ladder.x - 8;
          p.vx = 0;
          p.vy = 0;
        }
      }
      // Climb down
      if (btn("down") && p.onGround) {
        const ladderBelow = isNearLadderTop(p.x + 8, p.y + SS);
        if (ladderBelow) {
          p.climbing = true;
          p.x = ladderBelow.x - 8;
          p.y += 4;
          p.vx = 0;
          p.vy = 0;
          p.onGround = false;
        }
      }
    }

    if (p.climbing) {
      p.vx = 0;
      const ladder = isOnLadder(p.x + 8, p.y + 8);

      if (btn("up")) {
        p.vy = -1.5;
        walkTimer++;
        if (walkTimer > 5) { walkTimer = 0; walkFrame = 1 - walkFrame; climbSound(); }
      } else if (btn("down")) {
        p.vy = 1.5;
        walkTimer++;
        if (walkTimer > 5) { walkTimer = 0; walkFrame = 1 - walkFrame; climbSound(); }
      } else {
        p.vy = 0;
      }

      // Check if we've reached top or bottom of ladder
      if (!ladder) {
        p.climbing = false;
        p.vy = 0;
        const gy = isOnGirder(p.x + 8, p.y + SS, 12);
        if (gy !== false) {
          p.y = gy - SS;
          p.onGround = true;
        }
      }

      // Jump off ladder
      if (btnp("a")) {
        p.climbing = false;
        p.vy = -3;
        p.onGround = false;
        p.jumping = true;
        jumpSound();
      }
    }

    // Apply gravity if not climbing
    if (!p.climbing) {
      p.vy += 0.25;
      if (p.vy > 5) p.vy = 5;
    }

    // Move player
    p.x += p.vx;
    p.y += p.vy;

    // Clamp to screen
    if (p.x < 0) p.x = 0;
    if (p.x > W - SS) p.x = W - SS;

    // Ground collision (girders)
    if (!p.climbing && p.vy >= 0) {
      const gy = isOnGirder(p.x + 8, p.y + SS, 5);
      if (gy !== false) {
        p.y = gy - SS;
        p.onGround = true;
        p.jumping = false;
        p.vy = 0;
      } else {
        p.onGround = false;
      }
    }

    // Fall off bottom
    if (p.y > H + SS) {
      killPlayer();
      return;
    }

    // Hammer pickup
    for (const h of hammerPickups) {
      if (h.active && _abs(p.x - h.x) < 14 && _abs(p.y - h.y) < 14) {
        h.active = false;
        hammerActive = true;
        hammerTimer = 300;
        hammerSwing = 0;
        hammerSound();
      }
    }

    // Hammer timer
    if (hammerActive) {
      hammerTimer--;
      hammerSwing++;
      if (hammerTimer <= 0) {
        hammerActive = false;
      }
    }

    // Item collection
    for (const it of itemsCollected) {
      if (!it.collected && _abs(p.x - it.x) < 14 && _abs(p.y - it.y) < 14) {
        it.collected = true;
        score += 300;
        collectSound();
        addExplosion(it.x, it.y);
      }
    }

    // Check if player reached Pauline
    const paulX = levelData.pauline.x;
    const paulY = levelData.pauline.y;
    if (_abs(p.x - paulX) < 20 && _abs(p.y - paulY) < 20) {
      levelComplete = true;
      levelCompleteTimer = 0;
      score += bonusScore;
      levelClearSound();
    }

    // --- Barrel update ---
    for (let i = barrels.length - 1; i >= 0; i--) {
      const b = barrels[i];

      b.frameTimer++;
      if (b.frameTimer > 4) { b.frameTimer = 0; b.frame = 1 - b.frame; }

      // Check if barrel is near a ladder going down
      if (b.onGround && !b.goingDown) {
        const ladderBelow = isNearLadderTop(b.x + 8, b.y + 8);
        if (ladderBelow && rnd(1) < 0.3) {
          b.goingDown = true;
          b.x = ladderBelow.x - 8;
          b.vx = 0;
          b.vy = 2;
        }
      }

      if (b.goingDown) {
        b.y += b.vy;
        const gy = isOnGirder(b.x + 8, b.y + SS + 4, 4);
        if (gy !== false && b.y + SS >= gy) {
          b.y = gy - SS;
          b.goingDown = false;
          b.onGround = true;
          const gy1 = isOnGirder(b.x + 24, b.y + SS, 8);
          const gy2 = isOnGirder(b.x - 8, b.y + SS, 8);
          if (gy1 !== false && gy1 > gy) b.vx = 1.5 + level * 0.2;
          else if (gy2 !== false && gy2 > gy) b.vx = -(1.5 + level * 0.2);
          else b.vx = (rnd(1) > 0.5 ? 1 : -1) * (1.5 + level * 0.2);
        }
      } else {
        b.x += b.vx;
        b.vy += 0.2;
        if (b.vy > 4) b.vy = 4;
        b.y += b.vy;

        const gy = isOnGirder(b.x + 8, b.y + SS, 5);
        if (gy !== false) {
          b.y = gy - SS;
          b.onGround = true;
          b.vy = 0;
          const gyAhead = isOnGirder(b.x + 8 + (b.vx > 0 ? SS : -SS), b.y + SS + 4, 8);
          if (gyAhead !== false) {
            b.y = gyAhead - SS - 4;
          }
        } else {
          b.onGround = false;
        }
      }

      // Remove if off screen
      if (b.x < -SS || b.x > W + SS || b.y > H + SS) {
        barrels.splice(i, 1);
        continue;
      }

      // Barrel-player collision using circle vs rect
      if (invincibleTimer <= 0) {
        const bc = barrelCenter(b);
        const px = p.x, py = p.y;
        const pw = 12, ph = 14; // player hitbox slightly smaller than sprite
        const pox = px + 2, poy = py + 1; // offset for centered hitbox

        if (circRectCollides(bc.cx, bc.cy, bc.r, pox, poy, pw, ph)) {
          if (hammerActive) {
            barrels.splice(i, 1);
            score += 300;
            addExplosion(b.x, b.y);
            smashSound();
            continue;
          } else {
            killPlayer();
            return;
          }
        }
      }

      // Score for jumping over barrel
      if (p.jumping && !p.climbing && p.vy < 0 &&
          _abs(p.x - b.x) < 20 && p.y < b.y && p.y > b.y - 24 &&
          !b._scored) {
        b._scored = true;
        score += 100;
        barrelJumpSound();
        particles.push({
          x: p.x, y: p.y - 10,
          vx: 0, vy: -0.5,
          life: 30,
          color: 3,
          text: "100"
        });
      }
    }

    // --- Fire enemies ---
    for (let i = fires.length - 1; i >= 0; i--) {
      const f = fires[i];

      f.moveTimer++;

      if (!f.climbing) {
        f.x += f.vx;

        f.vy = (f.vy || 0) + 0.2;
        if (f.vy > 3) f.vy = 3;
        f.y += f.vy;

        const gy = isOnGirder(f.x + 8, f.y + SS, 5);
        if (gy !== false) {
          f.y = gy - SS;
          f.onGround = true;
          f.vy = 0;
        }

        if (f.x < 10 || f.x > W - SS - 2) f.vx = -f.vx;

        if (f.moveTimer > 60 + flr(rnd(60))) {
          f.moveTimer = 0;
          if (rnd(1) < 0.3) f.vx = -f.vx;
        }

        // Try to climb a ladder (toward player)
        if (f.onGround && rnd(1) < 0.02) {
          const ladder = isOnLadder(f.x + 8, f.y + 8);
          if (ladder) {
            const goUp = p.y < f.y;
            if (goUp && f.y > ladder.y1 + 8) {
              f.climbing = true;
              f.x = ladder.x - 8;
              f.climbDir = -1;
            } else if (!goUp && f.y < ladder.y2 - 8) {
              f.climbing = true;
              f.x = ladder.x - 8;
              f.climbDir = 1;
            }
          }
        }
      } else {
        f.y += f.climbDir * 1;
        const ladder = isOnLadder(f.x + 8, f.y + 8);
        if (!ladder) {
          f.climbing = false;
          f.vx = (p.x > f.x) ? 0.5 : -0.5;
        }
      }

      // Fire-player collision using circle vs rect
      if (invincibleTimer <= 0) {
        const fc = fireCenter(f);
        const px = p.x, py = p.y;
        const pw = 12, ph = 14;
        const pox = px + 2, poy = py + 1;

        if (circRectCollides(fc.cx, fc.cy, fc.r, pox, poy, pw, ph)) {
          if (hammerActive) {
            fires.splice(i, 1);
            score += 500;
            addExplosion(f.x, f.y);
            smashSound();
          } else {
            killPlayer();
            return;
          }
        }
      }
    }

    // Spawn fires occasionally from oil drum
    if (levelData.oilDrum && fires.length < 3 + level && rnd(1) < 0.003) {
      fires.push({
        x: levelData.oilDrum.x,
        y: levelData.oilDrum.y - SS - 2,
        vx: (rnd(1) > 0.5 ? 1 : -1) * 0.5,
        vy: 0,
        onGround: false,
        climbing: false,
        moveTimer: 0,
      });
    }

    // Particles
    for (let i = particles.length - 1; i >= 0; i--) {
      const pt = particles[i];
      pt.x += pt.vx; pt.y += pt.vy;
      if (!pt.text) pt.vy += 0.05;
      pt.life--;
      if (pt.life <= 0) particles.splice(i, 1);
    }
    },
    draw() { drawPlayState(); }
  });

  function killPlayer() {
    lives--;
    addExplosion(player.x, player.y);
    deathSound();
    if (lives <= 0) {
      if (score > highScore) highScore = score;
      Mono.go(GAMEOVER); return;
    } else {
      invincibleTimer = 60;
      player.x = levelData.playerStart.x;
      player.y = levelData.playerStart.y;
      player.vx = 0;
      player.vy = 0;
      player.onGround = true;
      player.climbing = false;
      player.jumping = false;
      hammerActive = false;
    }
  }

  // ============================================================
  // Draw
  // ============================================================
  function drawTitle() {
    cls(0);
    {
      const ty = 20 + sin(Mono.frame * 0.04) * 3;

      // DK sprite at top (2x2 tile grid, each tile is 16x16)
      const dkx = W / 2 - SS;
      spr(10, dkx, flr(ty));
      spr(11, dkx + SS, flr(ty));
      spr(12, dkx, flr(ty) + SS);
      spr(13, dkx + SS, flr(ty) + SS);

      text("DONKEY KONG", 120, flr(ty) + SS * 2 + 6, 3);
      rectf(113, flr(ty) + SS * 2 + 15, 94, 1, 2);

      // Characters display
      const cx = W / 2 - 40;
      spr(1, cx, flr(ty) + 56);
      text("MARIO", cx + SS + 4, flr(ty) + 60, 2);
      spr(25, cx, flr(ty) + 76);
      text("PAULINE", cx + SS + 4, flr(ty) + 80, 2);

      // Barrel
      spr(20, cx, flr(ty) + 98 + sin(Mono.frame * 0.1) * 2);
      text("BARREL  100 PTS", cx + SS + 4, flr(ty) + 102, 2);

      if (flr(Mono.frame / 20) % 2 === 0) text("PRESS START", 120, 170, 3);

      // Controls
      text("ARROWS: MOVE/CLIMB", 96, 190, 2);
      text("A: JUMP", 140, 202, 2);

      if (highScore > 0) {
        text("HIGH SCORE: " + highScore, 100, 218, 2);
      }

      text("MONO DEMO V0.1", 112, 232, 1);
    }
  }

  function drawGameOver() {
    cls(0);
    for (const pt of particles) {
      if (pt.text) text(pt.text, flr(pt.x), flr(pt.y), pt.color);
      else pix(flr(pt.x), flr(pt.y), pt.color);
    }

    text("GAME OVER", 128, 83, 3);
    text("SCORE: " + score, 125, 105, 2);
    text("LEVEL: " + levelData.name, 125, 116, 2);
    if (score >= highScore && score > 0) text("NEW HIGH SCORE!", 108, 131, 3);
    if (flr(Mono.frame / 20) % 2 === 0) text("PRESS START", 120, 158, 3);
  }

  function drawPlayState() {
    cls(0);

    // --- Play state rendering ---

    // Draw girders
    for (const g of levelData.girders) {
      const steps = Math.ceil((g.x2 - g.x1) / 8);
      for (let i = 0; i <= steps; i++) {
        const x = g.x1 + i * 8;
        if (x > g.x2) break;
        const y = flr(getGirderY(g, x));
        rectf(x, y, 8, 4, 2);
        if (i % 2 === 0) {
          pix(x + 1, y + 1, 1);
          pix(x + 5, y + 2, 1);
        } else {
          pix(x + 3, y + 1, 1);
          pix(x + 7, y + 2, 1);
        }
      }
    }

    // Draw ladders
    for (const l of levelData.ladders) {
      for (let y = l.y1; y < l.y2; y += 2) {
        pix(l.x, y, 2);
        pix(l.x + 5, y, 2);
      }
      for (let y = l.y1; y < l.y2; y += 7) {
        for (let x = l.x; x <= l.x + 5; x++) pix(x, y, 2);
      }
    }

    // Draw broken ladders
    if (levelData.brokenLadders) {
      for (const l of levelData.brokenLadders) {
        for (let y = l.y1; y < l.y2; y += 3) {
          pix(l.x, y, 1);
          pix(l.x + 5, y + 1, 1);
        }
        for (let y = l.y1 + 2; y < l.y2; y += 8) {
          for (let x = l.x; x <= l.x + 5; x++) pix(x, y, 1);
        }
      }
    }

    // Draw oil drum
    if (levelData.oilDrum) {
      spr(36, levelData.oilDrum.x, levelData.oilDrum.y);
      // Flames on top
      if (Mono.frame % 8 < 4) {
        pix(levelData.oilDrum.x + 6, levelData.oilDrum.y - 2, 3);
        pix(levelData.oilDrum.x + 8, levelData.oilDrum.y - 3, 2);
        pix(levelData.oilDrum.x + 10, levelData.oilDrum.y - 1, 3);
      } else {
        pix(levelData.oilDrum.x + 4, levelData.oilDrum.y - 1, 3);
        pix(levelData.oilDrum.x + 8, levelData.oilDrum.y - 2, 2);
        pix(levelData.oilDrum.x + 10, levelData.oilDrum.y - 3, 3);
      }
    }

    // Draw DK (2x2 grid of 16x16 tiles)
    const dk = levelData.dk;
    if (dkFrame === 1) {
      spr(14, dk.x, dk.y);
    } else {
      spr(10, dk.x, dk.y);
    }
    spr(11, dk.x + SS, dk.y);
    spr(12, dk.x, dk.y + SS);
    spr(13, dk.x + SS, dk.y + SS);

    // Barrel near DK when throwing
    if (dkFrame === 1 && dkThrowT < 8) {
      spr(20, dk.x - SS, dk.y + SS);
    }

    // Draw Pauline
    const pauX = levelData.pauline.x;
    const pauY = levelData.pauline.y;
    if (paulineFrame === 0) spr(25, pauX, pauY);
    else spr(26, pauX, pauY);
    if (paulineFrame === 1 && !levelComplete) {
      text("HELP!", pauX - 8, pauY - 10, 3);
    }

    // Draw hammer pickups
    for (const h of hammerPickups) {
      if (h.active) {
        spr(35, h.x, h.y);
        if (Mono.frame % 10 < 5) pix(h.x + flr(rnd(SS)), h.y - 1, 3);
      }
    }

    // Draw items
    for (const it of itemsCollected) {
      if (!it.collected) {
        spr(it.spr, it.x, it.y);
      }
    }

    // Draw barrels with debug hitbox
    for (const b of barrels) {
      const sprId = b.frame === 0 ? 20 : 21;
      spr(sprId, flr(b.x), flr(b.y));
      // Debug: circle hitbox for barrel
      const bc = barrelCenter(b);
      Mono.dbgC(bc.cx, bc.cy, bc.r);
    }

    // Draw fire enemies with debug hitbox
    for (const f of fires) {
      spr(37, flr(f.x), flr(f.y));
      if (Mono.frame % 4 < 2) {
        pix(flr(f.x) + 6, flr(f.y) - 1, 3);
        pix(flr(f.x) + 10, flr(f.y) - 2, 2);
      }
      // Debug: circle hitbox for fire
      const fc = fireCenter(f);
      Mono.dbgC(fc.cx, fc.cy, fc.r);
    }

    // Draw player
    const p = player;
    if (invincibleTimer > 0 && Mono.frame % 4 < 2) {
      // Blink when invincible - still register debug hitbox
      Mono.dbg(p.x + 2, p.y + 1, 12, 14);
    } else {
      let sprId = 1;
      const flipX = p.facing < 0;

      if (p.climbing) {
        sprId = walkFrame === 0 ? 4 : 5;
      } else if (p.jumping || !p.onGround) {
        sprId = 3;
      } else if (p.vx !== 0) {
        sprId = walkFrame === 0 ? 1 : 2;
      }

      if (hammerActive) {
        sprId = 6;
        const hx = p.facing > 0 ? p.x + 10 : p.x - 10;
        const hy = (flr(hammerSwing / 4) % 2 === 0) ? p.y - 8 : p.y;
        rectf(hx, hy, 8, 4, 3);
        rectf(hx + 3, hy + 4, 2, 6, 2);
      }

      spr(sprId, flr(p.x), flr(p.y), flipX);
      // Debug: rect hitbox for player
      Mono.dbg(p.x + 2, p.y + 1, 12, 14);
    }

    // Particles
    for (const pt of particles) {
      if (pt.text) {
        text(pt.text, flr(pt.x), flr(pt.y), pt.color);
      } else {
        pix(flr(pt.x), flr(pt.y), pt.color);
      }
    }

    // Level complete overlay
    if (levelComplete) {
      const centerY = 105;
      rectf(80, centerY - 15, 160, 38, 0);
      rect(80, centerY - 15, 160, 38, 3);
      text("LEVEL CLEAR!", 116, centerY - 8, 3);
      text("BONUS: " + bonusScore, 120, centerY + 4, 2);
    }

    // HUD - constrained to 320x240
    rectf(0, 0, W, 14, 0);
    line(0, 14, W, 14, 1);
    text("SCORE:" + score, 2, 4, 3);
    text(levelData.name, 148, 4, 2);

    // Lives - spaced properly so they don't overflow (max 3 lives, 18px each)
    const livesStartX = W - 8 - lives * 18;
    for (let i = 0; i < lives; i++) spr(40, livesStartX + i * 18, -1);

    // Bonus timer
    text("B:" + bonusScore, 192, 4, 2);

    // Hammer indicator - fits within right side of HUD
    if (hammerActive) {
      const barX = 252;
      const barW = flr((hammerTimer / 300) * 30);
      rectf(barX, 6, 30, 4, 1);
      rectf(barX, 6, barW, 4, 3);
      if (hammerTimer < 60 && Mono.frame % 6 < 3) {
        text("HAMMER!", barX - 12, 4, 3);
      }
    }
  }

  // ============================================================
  // Boot
  Mono.go(TITLE);
  Mono.boot("screen");
})();
</script>
</body>
