<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GrayBox — Demo: Tempest</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #0a0a0a;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100vh;
    font-family: monospace;
    overflow: hidden;
  }
  #frame {
    background: #111;
    border: 3px solid #333;
    border-radius: 8px;
    padding: 12px;
    box-shadow: 0 0 40px rgba(0,0,0,0.8), inset 0 0 20px rgba(0,0,0,0.5);
  }
  canvas {
    display: block;
    image-rendering: pixelated;
    image-rendering: crisp-edges;
  }
  #controls {
    margin-top: 12px;
    color: #6b6b6b;
    font-size: 11px;
    text-align: center;
    letter-spacing: 1px;
  }
  #controls span { color: #b0b0b0; }
</style>
</head>
<body>
<div id="frame">
  <canvas id="screen"></canvas>
</div>
<div id="controls">
  <span>&larr;&rarr;</span> MOVE &nbsp;&nbsp; <span>A</span> SHOOT &nbsp;&nbsp; <span>B</span> SUPERZAPPER
</div>
<script src="../../runtime/engine.js"></script>
<script>
(() => {
  "use strict";
  const W = GrayBox.WIDTH, H = GrayBox.HEIGHT;
  const { cls, pix, line, rect, rectf, circ, circf, sprite: defSprite,
          spr, text, btn, btnp, note, stop, rnd, flr, abs: _abs,
          min, max: _max, sin, cos } = GrayBox;

  // --- Sprites ---
  // 1: Player claw (top-down, pointing inward)
  defSprite(1,
    "00033000" +
    "00333300" +
    "03322330" +
    "03322330" +
    "00333300" +
    "00033000" +
    "00000000" +
    "00000000"
  );
  // 2: Flipper enemy
  defSprite(2,
    "00000000" +
    "03300330" +
    "33333333" +
    "33222233" +
    "33333333" +
    "03300330" +
    "00000000" +
    "00000000"
  );
  // 3: Tanker enemy
  defSprite(3,
    "00000000" +
    "00333300" +
    "03322330" +
    "33211233" +
    "03322330" +
    "00333300" +
    "00000000" +
    "00000000"
  );
  // 4: Spiker enemy
  defSprite(4,
    "00000000" +
    "00030000" +
    "00333000" +
    "03323300" +
    "00333000" +
    "00030000" +
    "00000000" +
    "00000000"
  );
  // 5: Bullet
  defSprite(5,
    "00000000" +
    "00000000" +
    "00030000" +
    "00333000" +
    "00030000" +
    "00000000" +
    "00000000" +
    "00000000"
  );
  // 6: Explosion frame 1
  defSprite(6,
    "00000000" +
    "00200100" +
    "01002000" +
    "00031000" +
    "00130200" +
    "01000010" +
    "00100000" +
    "00000000"
  );
  // 7: Explosion frame 2
  defSprite(7,
    "20010020" +
    "01000010" +
    "00203200" +
    "03033030" +
    "00232000" +
    "01000300" +
    "20001001" +
    "00200010"
  );
  // 8: Life icon
  defSprite(8,
    "00000000" +
    "00033000" +
    "00333300" +
    "03322330" +
    "00333300" +
    "00033000" +
    "00000000" +
    "00000000"
  );
  // 9: Mini flipper (tanker child)
  defSprite(9,
    "00000000" +
    "00000000" +
    "00300300" +
    "03333330" +
    "03222230" +
    "03333330" +
    "00300300" +
    "00000000"
  );

  // --- Playfield geometry ---
  const CX = 160;  // center x
  const CY = 128;  // center y
  const OUTER_R = 87; // outer rim radius
  const INNER_R = 20;  // inner vanishing point radius
  const NUM_LANES = 16; // number of segments
  const LANE_DEPTH = 10; // depth steps per lane for enemy movement

  // Precompute lane geometry
  // Each lane has two edges. Lane i goes from vertex i to vertex i+1 on the polygon.
  // Vertices are evenly spaced around the polygon.
  let laneAngles = []; // angle for each vertex
  let outerPts = [];   // outer rim points
  let innerPts = [];   // inner points

  function buildPlayfield(numLanes) {
    laneAngles = [];
    outerPts = [];
    innerPts = [];
    for (let i = 0; i < numLanes; i++) {
      const a = (Math.PI * 2 * i / numLanes) - Math.PI / 2;
      laneAngles.push(a);
      outerPts.push({ x: CX + cos(a) * OUTER_R, y: CY + sin(a) * OUTER_R });
      innerPts.push({ x: CX + cos(a) * INNER_R, y: CY + sin(a) * INNER_R });
    }
  }

  // Get position along a lane at depth t (0=inner/center, 1=outer/rim)
  function lanePos(lane, t) {
    const i = lane % NUM_LANES;
    const j = (lane + 1) % NUM_LANES;
    // Midpoint of the lane edge at depth t
    const ox = (outerPts[i].x + outerPts[j].x) / 2;
    const oy = (outerPts[i].y + outerPts[j].y) / 2;
    const ix = (innerPts[i].x + innerPts[j].x) / 2;
    const iy = (innerPts[i].y + innerPts[j].y) / 2;
    return {
      x: ix + (ox - ix) * t,
      y: iy + (oy - iy) * t
    };
  }

  // Get left/right edge points of a lane at depth t
  function laneEdge(lane, t, side) {
    const idx = side === 0 ? (lane % NUM_LANES) : ((lane + 1) % NUM_LANES);
    const ox = outerPts[idx].x;
    const oy = outerPts[idx].y;
    const ix = innerPts[idx].x;
    const iy = innerPts[idx].y;
    return {
      x: ix + (ox - ix) * t,
      y: iy + (oy - iy) * t
    };
  }

  buildPlayfield(NUM_LANES);

  // --- Scenes ---
  const { TITLE, PLAY, GAMEOVER } = GrayBox.SCENE;

  let playerLane, score, lives, level, superzapper;
  let enemies, bullets, explosions, particles, spikes;
  let moveCooldown, shootCooldown, spawnTimer;
  let levelClear, levelClearTimer;
  let zapFlash;

  function resetGame() {
    playerLane = 0;
    score = 0;
    lives = 3;
    level = 1;
    superzapper = 1;
    enemies = [];
    bullets = [];
    explosions = [];
    particles = [];
    spikes = [];
    moveCooldown = 0;
    shootCooldown = 0;
    spawnTimer = 0;
    levelClear = false;
    levelClearTimer = 0;
    zapFlash = 0;
    spawnWave();
  }

  // Enemy types: "flipper", "tanker", "spiker"
  let enemiesToSpawn = [];
  let totalEnemies = 0;

  function spawnWave() {
    enemiesToSpawn = [];
    levelClear = false;
    levelClearTimer = 0;
    spikes = [];

    const numFlippers = 4 + level * 2;
    const numTankers = flr(level / 2);
    const numSpikers = level >= 3 ? flr(level / 2) : 0;

    for (let i = 0; i < numFlippers; i++) enemiesToSpawn.push("flipper");
    for (let i = 0; i < numTankers; i++) enemiesToSpawn.push("tanker");
    for (let i = 0; i < numSpikers; i++) enemiesToSpawn.push("spiker");

    // Shuffle
    for (let i = enemiesToSpawn.length - 1; i > 0; i--) {
      const j = flr(rnd(i + 1));
      [enemiesToSpawn[i], enemiesToSpawn[j]] = [enemiesToSpawn[j], enemiesToSpawn[i]];
    }

    totalEnemies = enemiesToSpawn.length;
    spawnTimer = 20;
  }

  function spawnEnemy(type) {
    const lane = flr(rnd(NUM_LANES));
    const e = {
      type: type,
      lane: lane,
      depth: 0.0,  // 0 = center, 1 = rim
      speed: 0.005 + level * 0.001,
      alive: true,
      flipTimer: 0,
      hp: type === "tanker" ? 2 : 1,
      spikeTrail: type === "spiker",
    };
    if (type === "flipper") {
      e.speed = 0.006 + level * 0.0015;
      e.flipTimer = 30 + flr(rnd(60));
    }
    if (type === "tanker") {
      e.speed = 0.004 + level * 0.001;
    }
    if (type === "spiker") {
      e.speed = 0.005 + level * 0.001;
    }
    enemies.push(e);
  }

  function addExplosion(x, y) {
    explosions.push({ x: x - 4, y: y - 4, timer: 12 });
    for (let i = 0; i < 6; i++) {
      particles.push({
        x: x, y: y,
        vx: rnd(4) - 2, vy: rnd(4) - 2,
        life: 6 + flr(rnd(8)),
        color: flr(rnd(3)) + 1
      });
    }
  }

  function shootSound() { note(0, "E6", 0.03); }
  function hitSound() { note(1, "C3", 0.06); setTimeout(() => note(1, "E3", 0.04), 30); }
  function deathSound() {
    note(0, "C3", 0.12); note(1, "G2", 0.12);
    setTimeout(() => { note(0, "A2", 0.18); note(1, "E2", 0.18); }, 100);
  }
  function zapSound() {
    note(0, "G5", 0.08); note(1, "B5", 0.08);
    setTimeout(() => { note(0, "E6", 0.1); note(1, "G6", 0.1); }, 60);
    setTimeout(() => { note(0, "C7", 0.15); }, 120);
  }
  function clearSound() {
    note(0, "C5", 0.08);
    setTimeout(() => note(0, "E5", 0.08), 80);
    setTimeout(() => note(0, "G5", 0.08), 160);
    setTimeout(() => note(0, "C6", 0.12), 240);
  }

  function drawPlayfield(color) {
    for (let i = 0; i < NUM_LANES; i++) {
      const j = (i + 1) % NUM_LANES;
      line(outerPts[i].x, outerPts[i].y, outerPts[j].x, outerPts[j].y, color);
      line(innerPts[i].x, innerPts[i].y, innerPts[j].x, innerPts[j].y, 1);
      line(outerPts[i].x, outerPts[i].y, innerPts[i].x, innerPts[i].y, 1);
    }
    const pi = playerLane % NUM_LANES;
    const pj = (playerLane + 1) % NUM_LANES;
    line(outerPts[pi].x, outerPts[pi].y, outerPts[pj].x, outerPts[pj].y, 3);
    line(outerPts[pi].x, outerPts[pi].y, innerPts[pi].x, innerPts[pi].y, 2);
    line(outerPts[pj].x, outerPts[pj].y, innerPts[pj].x, innerPts[pj].y, 2);
  }

  function drawPlayer() {
    const pos = lanePos(playerLane, 1.0);
    const px = flr(pos.x) - 4;
    const py = flr(pos.y) - 4;
    spr(1, px, py);
    const i = playerLane % NUM_LANES;
    const j = (playerLane + 1) % NUM_LANES;
    const mx = (outerPts[i].x + outerPts[j].x) / 2;
    const my = (outerPts[i].y + outerPts[j].y) / 2;
    pix(flr(mx), flr(my) - 5, 3);
    pix(flr(mx), flr(my) + 5, 3);
    pix(flr(mx) - 5, flr(my), 3);
    pix(flr(mx) + 5, flr(my), 3);
  }

  function drawPlayState() {
    cls(0);
    if (zapFlash > 0 && zapFlash % 2 === 0) cls(1);
    drawPlayfield(2);
    for (const s of spikes) { const p = lanePos(s.lane, s.depth); line(flr(p.x) - 2, flr(p.y), flr(p.x) + 2, flr(p.y), 2); line(flr(p.x), flr(p.y) - 2, flr(p.x), flr(p.y) + 2, 2); }
    for (const e of enemies) { if (!e.alive) continue; const pos = lanePos(e.lane, e.depth); const px = flr(pos.x) - 4; const py = flr(pos.y) - 4; if (e.type === "flipper") spr(2, px, py); else if (e.type === "tanker") spr(3, px, py); else if (e.type === "spiker") spr(4, px, py); else if (e.type === "miniflip") spr(9, px, py); }
    for (const b of bullets) { const pos = lanePos(b.lane, b.depth); const px = flr(pos.x); const py = flr(pos.y); pix(px, py, 3); pix(px - 1, py, 3); pix(px + 1, py, 3); pix(px, py - 1, 3); pix(px, py + 1, 3); }
    drawPlayer();
    for (const e of explosions) { const sprId = e.timer > 6 ? 6 : 7; spr(sprId, flr(e.x), flr(e.y)); }
    for (const p of particles) pix(flr(p.x), flr(p.y), p.color);
    rectf(0, 0, W, 12, 0);
    text("SCORE:" + score, 4, 3, 3);
    text("LVL:" + level, W / 2 - 14, 3, 2);
    for (let i = 0; i < lives; i++) spr(8, W - 40 + i * 10, 2);
    if (superzapper > 0) text("ZAP", W - 54, 3, 3);
    if (levelClear) { const msgY = 113 + sin(levelClearTimer * 0.08) * 3; text("LEVEL CLEAR!", W / 2 - 30, flr(msgY), 3); }
  }

  // --- Title Scene ---
  GrayBox.scene(TITLE, {
    init() { resetGame(); },
    update() {
      if (btnp("a") || btnp("a")) { note(0, "C5", 0.08); setTimeout(() => note(0, "G5", 0.1), 80); GrayBox.go(PLAY); return; }
    },
    draw() {
      cls(0);
      const titleAngle = GrayBox.frame * 0.01;
      for (let i = 0; i < NUM_LANES; i++) {
        const a1 = (Math.PI * 2 * i / NUM_LANES) - Math.PI / 2 + titleAngle;
        const a2 = (Math.PI * 2 * ((i + 1) % NUM_LANES) / NUM_LANES) - Math.PI / 2 + titleAngle;
        const ox1 = CX + cos(a1) * OUTER_R; const oy1 = CY + sin(a1) * OUTER_R;
        const ox2 = CX + cos(a2) * OUTER_R; const oy2 = CY + sin(a2) * OUTER_R;
        const ix1 = CX + cos(a1) * INNER_R; const iy1 = CY + sin(a1) * INNER_R;
        line(ox1, oy1, ox2, oy2, 1); line(ox1, oy1, ix1, iy1, 1);
      }
      const ty = 30 + sin(GrayBox.frame * 0.05) * 4;
      text("TEMPEST", W / 2 - 18, flr(ty), 3);
      text("TEMPEST", W / 2 - 17, flr(ty) + 1, 1);
      rectf(W / 2 - 40, flr(ty) + 12, 80, 1, 2);
      if (flr(GrayBox.frame / 20) % 2 === 0) text("PRESS A TO START", W / 2 - 42, 180, 3);
      text("-ENEMIES-", W / 2 - 24, 195, 2);
      text("FLIPPER  10 PTS", W / 2 - 38, 204, 2);
      text("TANKER   20 PTS", W / 2 - 38, 212, 2);
      text("SPIKER   15 PTS", W / 2 - 38, 219, 2);
      text("GRAYBOX DEMO V0.1", W / 2 - 43, 231, 1);
    }
  });

  // --- Play Scene ---
  GrayBox.scene(PLAY, {
    init() { resetGame(); },
    update() {
      if (levelClear) { levelClearTimer++; if (levelClearTimer > 90) { level++; superzapper = 1; spawnWave(); } return; }
      if (moveCooldown > 0) moveCooldown--;
      if (btn("left") && moveCooldown <= 0) { playerLane = (playerLane - 1 + NUM_LANES) % NUM_LANES; moveCooldown = 4; }
      if (btn("right") && moveCooldown <= 0) { playerLane = (playerLane + 1) % NUM_LANES; moveCooldown = 4; }
      if (shootCooldown > 0) shootCooldown--;
      if (btnp("a") && shootCooldown <= 0) { bullets.push({ lane: playerLane, depth: 1.0, speed: 0.04 }); shootCooldown = 6; shootSound(); }
      if (btnp("b") && superzapper > 0) { superzapper--; zapFlash = 10; zapSound(); for (const e of enemies) { if (e.alive) { const pos = lanePos(e.lane, e.depth); addExplosion(pos.x, pos.y); score += e.type === "tanker" ? 20 : (e.type === "spiker" ? 15 : 10); } e.alive = false; } enemies = enemies.filter(e => e.alive); }
      for (let i = bullets.length - 1; i >= 0; i--) { bullets[i].depth -= bullets[i].speed; if (bullets[i].depth <= 0) bullets.splice(i, 1); }
      spawnTimer--;
      if (spawnTimer <= 0 && enemiesToSpawn.length > 0) { spawnEnemy(enemiesToSpawn.shift()); spawnTimer = _max(15, 40 - level * 3); }
      for (let i = enemies.length - 1; i >= 0; i--) {
        const e = enemies[i]; if (!e.alive) { enemies.splice(i, 1); continue; }
        e.depth += e.speed;
        if (e.type === "flipper") { e.flipTimer--; if (e.flipTimer <= 0 && e.depth < 0.85) { e.lane = (e.lane + (rnd(1) < 0.5 ? 1 : -1) + NUM_LANES) % NUM_LANES; e.flipTimer = 20 + flr(rnd(40)); } }
        if (e.type === "spiker" && e.depth > 0.2 && flr(GrayBox.frame) % 8 === 0) { const sd = flr(e.depth * LANE_DEPTH) / LANE_DEPTH; const exists = spikes.some(s => s.lane === e.lane && _abs(s.depth - sd) < 0.05); if (!exists) spikes.push({ lane: e.lane, depth: sd }); }
        if (e.depth >= 1.0) { e.alive = false; enemies.splice(i, 1); if (e.lane === playerLane) { lives--; deathSound(); addExplosion(lanePos(playerLane, 1.0).x, lanePos(playerLane, 1.0).y); if (lives <= 0) { GrayBox.go(GAMEOVER); return; } } continue; }
        for (let j = bullets.length - 1; j >= 0; j--) {
          const b = bullets[j];
          if (b.lane === e.lane && _abs(b.depth - e.depth) < 0.06) {
            bullets.splice(j, 1); e.hp--;
            if (e.hp <= 0) {
              const pos = lanePos(e.lane, e.depth); addExplosion(pos.x, pos.y);
              if (e.type === "tanker") { score += 20; const l1 = (e.lane - 1 + NUM_LANES) % NUM_LANES; const l2 = (e.lane + 1) % NUM_LANES; enemies.push({ type: "miniflip", lane: l1, depth: e.depth, speed: 0.008 + level * 0.002, alive: true, flipTimer: 15 + flr(rnd(20)), hp: 1, spikeTrail: false }); enemies.push({ type: "miniflip", lane: l2, depth: e.depth, speed: 0.008 + level * 0.002, alive: true, flipTimer: 15 + flr(rnd(20)), hp: 1, spikeTrail: false }); }
              else if (e.type === "flipper") score += 10;
              else if (e.type === "spiker") score += 15;
              else score += 10;
              hitSound(); e.alive = false; enemies.splice(i, 1);
            }
            break;
          }
        }
      }
      for (const e of enemies) { if (e.type === "miniflip") { e.flipTimer--; if (e.flipTimer <= 0 && e.depth < 0.85) { e.lane = (e.lane + (rnd(1) < 0.5 ? 1 : -1) + NUM_LANES) % NUM_LANES; e.flipTimer = 10 + flr(rnd(20)); } } }
      for (let i = bullets.length - 1; i >= 0; i--) { const b = bullets[i]; for (let j = spikes.length - 1; j >= 0; j--) { const s = spikes[j]; if (b.lane === s.lane && _abs(b.depth - s.depth) < 0.06) { bullets.splice(i, 1); spikes.splice(j, 1); break; } } }
      for (let i = explosions.length - 1; i >= 0; i--) { explosions[i].timer--; if (explosions[i].timer <= 0) explosions.splice(i, 1); }
      for (let i = particles.length - 1; i >= 0; i--) { const p = particles[i]; p.x += p.vx; p.y += p.vy; p.vy += 0.05; p.life--; if (p.life <= 0) particles.splice(i, 1); }
      if (zapFlash > 0) zapFlash--;
      if (enemies.length === 0 && enemiesToSpawn.length === 0 && !levelClear) { levelClear = true; levelClearTimer = 0; clearSound(); }
    },
    draw() { drawPlayState(); }
  });

  // --- Game Over Scene ---
  GrayBox.scene(GAMEOVER, {
    init() {},
    update() {
      for (let i = particles.length - 1; i >= 0; i--) { const p = particles[i]; p.x += p.vx; p.y += p.vy; p.vy += 0.08; p.life--; if (p.life <= 0) particles.splice(i, 1); }
      if (btnp("a") || btnp("a")) { GrayBox.go(TITLE); return; }
    },
    draw() {
      cls(0);
      drawPlayfield(1);
      for (const p of particles) pix(flr(p.x), flr(p.y), p.color);
      text("GAME OVER", W / 2 - 24, 90, 3);
      text("SCORE: " + score, W / 2 - 24, 109, 2);
      text("LEVEL: " + level, W / 2 - 18, 120, 2);
      if (flr(GrayBox.frame / 20) % 2 === 0) text("PRESS A TO CONTINUE", W / 2 - 50, 158, 3);
    }
  });

  GrayBox.go(TITLE);
  GrayBox.boot("screen");
})();
</script>
</body>
</html>
