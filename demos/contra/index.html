<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GrayBox — Demo: Contra</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #0a0a0a;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100vh;
    font-family: monospace;
    overflow: hidden;
  }
  #frame {
    background: #111;
    border: 3px solid #333;
    border-radius: 8px;
    padding: 12px;
    box-shadow: 0 0 40px rgba(0,0,0,0.8), inset 0 0 20px rgba(0,0,0,0.5);
  }
  canvas {
    display: block;
    image-rendering: pixelated;
    image-rendering: crisp-edges;
  }
  #controls {
    margin-top: 12px;
    color: #6b6b6b;
    font-size: 11px;
    text-align: center;
    letter-spacing: 1px;
  }
  #controls span { color: #b0b0b0; }
</style>
</head>
<body>
<div id="frame">
  <canvas id="screen"></canvas>
</div>
<div id="controls">
  <span>ARROWS</span> MOVE/AIM &nbsp;&nbsp; <span>Z</span> JUMP &nbsp;&nbsp; <span>X</span> SHOOT &nbsp;&nbsp; <span>ENTER</span> START
</div>
<script>
(() => {
  "use strict";

  // ============================================================
  // GrayBox Runtime (inline)
  // ============================================================
  const W = 320;
  const H = 240;
  const FPS = 30;
  const COLORS = ["#1a1a1a", "#6b6b6b", "#b0b0b0", "#e8e8e8"];
  const canvas = document.getElementById("screen");
  canvas.width = W;
  canvas.height = H;
  function fitCanvas() {
    var maxW = window.innerWidth - 40;
    var maxH = window.innerHeight - 60;
    var s = Math.min(maxW / W, maxH / H);
    canvas.style.width = (W * s) + "px";
    canvas.style.height = (H * s) + "px";
  }
  fitCanvas();
  window.addEventListener("resize", fitCanvas);
  const ctx = canvas.getContext("2d");
  ctx.imageSmoothingEnabled = false;
  const buf = ctx.createImageData(W, H);
  const buf32 = new Uint32Array(buf.data.buffer);

  function hexToABGR(hex) {
    const r = parseInt(hex.slice(1, 3), 16);
    const g = parseInt(hex.slice(3, 5), 16);
    const b = parseInt(hex.slice(5, 7), 16);
    return (255 << 24) | (b << 16) | (g << 8) | r;
  }
  const COLOR_U32 = COLORS.map(hexToABGR);

  const sprites = {};
  const tilemap = {};

  const keyMap = {
    "ArrowUp": "up", "ArrowDown": "down", "ArrowLeft": "left", "ArrowRight": "right",
    "w": "up", "s": "down", "a": "left", "d": "right", "ㅈ": "up", "ㄴ": "down", "ㅁ": "left", "ㅇ": "right",
    "z": "a", "Z": "a", "x": "b", "X": "b", "ㅋ": "a", "ㅌ": "b",
    "Enter": "a", " ": "a"
  };
  const keys = {};
  const keysPrev = {};

  document.addEventListener("keydown", e => {
    const k = keyMap[e.key];
    if (k) { keys[k] = true; e.preventDefault(); }
  });
  document.addEventListener("keyup", e => {
    const k = keyMap[e.key];
    if (k) { keys[k] = false; e.preventDefault(); }
  });

  let audioCtx = null;
  const channels = [null, null];
  const channelGains = [null, null];
  function ensureAudio() {
    if (!audioCtx) {
      audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      for (let i = 0; i < 2; i++) {
        channelGains[i] = audioCtx.createGain();
        channelGains[i].gain.value = 0.15;
        channelGains[i].connect(audioCtx.destination);
      }
    }
  }

  const NOTE_NAMES = ["C","C#","D","D#","E","F","F#","G","G#","A","A#","B"];
  function noteToFreq(noteStr) {
    const match = noteStr.match(/^([A-G]#?)(\d)$/);
    if (!match) return 440;
    const name = match[1];
    const octave = parseInt(match[2]);
    const semitone = NOTE_NAMES.indexOf(name);
    if (semitone === -1) return 440;
    const midi = (octave + 1) * 12 + semitone;
    return 440 * Math.pow(2, (midi - 69) / 12);
  }

  const FONT_W = 4;
  const FONT_H = 7;
  const FONT = {};
  const fontData = {
    "A":"0110100110011111100110011001","B":"1110100110101110100110011110",
    "C":"0110100110001000100001100110","D":"1100101010011001100110101100",
    "E":"1111100010001110100010001111","F":"1111100010001110100010001000",
    "G":"0111100010001011100101100111","H":"1001100110011111100110011001",
    "I":"1110010001000100010001001110","J":"0111001000100010001010100100",
    "K":"1001101011001100101010011001","L":"1000100010001000100010001111",
    "M":"1001111111011001100110011001","N":"1001110111011001100110011001",
    "O":"0110100110011001100110010110","P":"1110100110011110100010001000",
    "Q":"0110100110011001101101100001","R":"1110100110011110101010011001",
    "S":"0111100010000110000110001110","T":"1111001000100010001000100010",
    "U":"1001100110011001100110010110","V":"1001100110011001100101100110",
    "W":"1001100110011001101111011001","X":"1001100101100110011010011001",
    "Y":"1001100101100010001000100010","Z":"1111000100100100100010001111",
    "0":"0110100111011011101110010110","1":"0100110001000100010001001110",
    "2":"0110100100010010010010001111","3":"1110000100010110000110011110",
    "4":"1001100110011111000100010001","5":"1111100010001110000100011110",
    "6":"0110100010001110100110010110","7":"1111000100010010010001001000",
    "8":"0110100110010110100110010110","9":"0110100110010111000100010110",
    " ":"0000000000000000000000000000",
    ".":"0000000000000000000001000100",
    ",":"0000000000000000001000101000",
    "!":"0100010001000100000000000100",
    "?":"0110100100010010000000000010",
    "-":"0000000000001110000000000000",
    "+":"0000001001001110010000100000",
    ":":"0000010001000000010001000000",
    "/":"0001000100100010010010001000",
    "*":"0000101001001110010010100000",
    "#":"0101111101011111010100000000",
    "(":"0010010010001000010001000010",
    ")":"0100001000010001000100100100",
    "=":"0000000011110000111100000000",
    "'":"0100010010000000000000000000",
    "\"":"1010101000000000000000000000",
    "<":"0010010010001000010000100010",
    ">":"1000010000100001001001001000",
    "_":"0000000000000000000000001111",
  };
  for (const [ch, bits] of Object.entries(fontData)) {
    FONT[ch] = [];
    for (let i = 0; i < bits.length; i++) FONT[ch].push(parseInt(bits[i]));
  }

  const API = {};
  API._init = null;
  API._update = null;
  API._draw = null;
  API.frame = 0;

  API.cls = function(c = 0) { buf32.fill(COLOR_U32[c] || COLOR_U32[0]); };
  API.pix = function(x, y, c) {
    x = Math.floor(x); y = Math.floor(y);
    if (x < 0 || x >= W || y < 0 || y >= H) return;
    buf32[y * W + x] = COLOR_U32[c] || COLOR_U32[0];
  };
  API.line = function(x0, y0, x1, y1, c) {
    x0=Math.floor(x0); y0=Math.floor(y0); x1=Math.floor(x1); y1=Math.floor(y1);
    const dx=Math.abs(x1-x0), dy=Math.abs(y1-y0);
    const sx=x0<x1?1:-1, sy=y0<y1?1:-1;
    let err=dx-dy;
    while(true) {
      API.pix(x0,y0,c);
      if(x0===x1&&y0===y1) break;
      const e2=2*err;
      if(e2>-dy){err-=dy;x0+=sx;}
      if(e2<dx){err+=dx;y0+=sy;}
    }
  };
  API.rect = function(x,y,w,h,c) {
    API.line(x,y,x+w-1,y,c); API.line(x+w-1,y,x+w-1,y+h-1,c);
    API.line(x+w-1,y+h-1,x,y+h-1,c); API.line(x,y+h-1,x,y,c);
  };
  API.rectf = function(x,y,w,h,c) {
    x=Math.floor(x); y=Math.floor(y);
    const col=COLOR_U32[c]||COLOR_U32[0];
    for(let py=Math.max(0,y);py<Math.min(H,y+h);py++)
      for(let px=Math.max(0,x);px<Math.min(W,x+w);px++)
        buf32[py*W+px]=col;
  };
  API.circ = function(cx,cy,r,c) {
    let x=r,y=0,d=1-r; cx=Math.floor(cx); cy=Math.floor(cy);
    while(x>=y){
      API.pix(cx+x,cy+y,c);API.pix(cx-x,cy+y,c);
      API.pix(cx+x,cy-y,c);API.pix(cx-x,cy-y,c);
      API.pix(cx+y,cy+x,c);API.pix(cx-y,cy+x,c);
      API.pix(cx+y,cy-x,c);API.pix(cx-y,cy-x,c);
      y++; if(d<0){d+=2*y+1;}else{x--;d+=2*(y-x)+1;}
    }
  };
  API.circf = function(cx,cy,r,c) {
    cx=Math.floor(cx); cy=Math.floor(cy);
    const col=COLOR_U32[c]||COLOR_U32[0]; const r2=r*r;
    for(let py=-r;py<=r;py++) for(let px=-r;px<=r;px++)
      if(px*px+py*py<=r2){ const sx=cx+px,sy=cy+py;
        if(sx>=0&&sx<W&&sy>=0&&sy<H) buf32[sy*W+sx]=col; }
  };
  API.sprite = function(id, data) {
    const arr = new Uint8Array(64); let i = 0;
    for (const ch of data) { if (ch>='0'&&ch<='3') { arr[i++]=parseInt(ch); if(i>=64) break; } }
    sprites[id] = arr;
  };
  API.spr = function(id, x, y, flipX, flipY) {
    const s=sprites[id]; if(!s) return;
    x=Math.floor(x); y=Math.floor(y);
    for(let py=0;py<8;py++) for(let px=0;px<8;px++){
      const sx=flipX?7-px:px, sy=flipY?7-py:py;
      const c=s[sy*8+sx], dx=x+px, dy=y+py;
      if(dx>=0&&dx<W&&dy>=0&&dy<H) buf32[dy*W+dx]=COLOR_U32[c];
    }
  };
  // Extended spr with transparency (color 0 = transparent)
  API.sprT = function(id, x, y, flipX, flipY) {
    const s=sprites[id]; if(!s) return;
    x=Math.floor(x); y=Math.floor(y);
    for(let py=0;py<8;py++) for(let px=0;px<8;px++){
      const sx=flipX?7-px:px, sy=flipY?7-py:py;
      const c=s[sy*8+sx]; if(c===0) continue;
      const dx=x+px, dy=y+py;
      if(dx>=0&&dx<W&&dy>=0&&dy<H) buf32[dy*W+dx]=COLOR_U32[c];
    }
  };
  API.text = function(str, x, y, c) {
    str=String(str).toUpperCase(); let cx=Math.floor(x); const cy=Math.floor(y);
    const col=COLOR_U32[c]||COLOR_U32[3];
    for(const ch of str){
      const glyph=FONT[ch];
      if(glyph) for(let py=0;py<FONT_H;py++) for(let px=0;px<FONT_W;px++)
        if(glyph[py*FONT_W+px]){ const dx=cx+px,dy=cy+py;
          if(dx>=0&&dx<W&&dy>=0&&dy<H) buf32[dy*W+dx]=col; }
      cx+=FONT_W+1;
    }
  };
  API.mget = function(cx,cy) { return tilemap[cx+","+cy]||0; };
  API.mset = function(cx,cy,id) { tilemap[cx+","+cy]=id; };
  API.map = function(mx,my,mw,mh,sx,sy) {
    for(let ty=0;ty<mh;ty++) for(let tx=0;tx<mw;tx++){
      const id=API.mget(mx+tx,my+ty); if(id>0) API.spr(id,sx+tx*8,sy+ty*8); }
  };
  const VALID_KEYS = {up:1,down:1,left:1,right:1,a:1,b:1};
  API.btn = function(k) { if(!VALID_KEYS[k]) console.warn("GrayBox: invalid key \""+k+"\". Use: up/down/left/right/a/b"); return !!keys[k]; };
  API.btnp = function(k) { if(!VALID_KEYS[k]) console.warn("GrayBox: invalid key \""+k+"\". Use: up/down/left/right/a/b"); return !!keys[k] && !keysPrev[k]; };
  API.note = function(ch, noteStr, dur) {
    ensureAudio(); if(ch<0||ch>1) return; API.stop(ch);
    const osc=audioCtx.createOscillator(); osc.type="square";
    osc.frequency.value=noteToFreq(noteStr);
    osc.connect(channelGains[ch]); osc.start();
    osc.stop(audioCtx.currentTime+dur); channels[ch]=osc;
  };
  API.stop = function(ch) {
    if(ch===undefined){API.stop(0);API.stop(1);return;}
    if(channels[ch]){try{channels[ch].stop();}catch(e){} channels[ch]=null;}
  };
  API.rnd = function(max) { return Math.random()*max; };
  API.flr = Math.floor;
  API.abs = Math.abs;
  API.min = Math.min;
  API.max = Math.max;
  API.sin = Math.sin;
  API.cos = Math.cos;

  function tick() {
    if (API._update) API._update();
    if (API._draw) API._draw();
    ctx.putImageData(buf, 0, 0);
    for (const k in keys) keysPrev[k] = keys[k];
    API.frame++;
  }

  // ============================================================
  // Contra Game
  // ============================================================
  const { cls, pix, line, rect, rectf, circ, circf, sprite: defSprite,
          spr, sprT, text, btn, btnp, note, stop, rnd, flr, abs: _abs,
          min, max: _max, sin, cos } = API;

  // ============================================================
  // Sprites
  // ============================================================

  // 1: Player standing right (commando with gun)
  defSprite(1,

  // ============================================================
  // Level data generation

  const GROUND_Y = 210;  // base ground level in world coords

  const GRAVITY = 0.45;
  const JUMP_FORCE = -6.5;

  // Stage definitions - each has terrain segments and enemy placements
  function generateStage(stageNum) {
    const level = {
      width: 0,
      platforms: [],   // {x, y, w} - solid platforms
      enemies: [],     // {type, x, y, ...}
      powerups: [],    // {type, x, y}
      boss: null,
      bgElements: [],  // decorative bg
    };

    // Each stage is wider
    const stageWidth = 1200 + stageNum * 400;
    level.width = stageWidth;

    // Ground with gaps
    let gx = 0;
    while (gx < stageWidth - 133) {
      const segLen = 53 + flr(rnd(107));
      level.platforms.push({ x: gx, y: GROUND_Y, w: segLen, ground: true });
      gx += segLen;

      // Gap or elevation change
      if (rnd(1) < 0.3 && gx > 67) {
        gx += 21 + flr(rnd(16)); // gap
      }
    }
    // Final ground segment leading to boss
    level.platforms.push({ x: gx, y: GROUND_Y, w: 200, ground: true });
    level.width = gx + 200;

    // Elevated platforms
    for (let i = 0; i < 12 + stageNum * 4; i++) {
      const px = 80 + flr(rnd(level.width - 267));
      const py = GROUND_Y - 30 - flr(rnd(60));
      const pw = 27 + flr(rnd(40));
      level.platforms.push({ x: px, y: py, w: pw, ground: false });
    }

    // Enemies: soldiers
    for (let i = 0; i < 15 + stageNum * 8; i++) {
      const ex = 133 + flr(rnd(level.width - 333));
      level.enemies.push({
        type: "soldier", x: ex, y: 0, alive: true,
        dir: -1, speed: 0.5 + rnd(0.5) + stageNum * 0.2,
        shootTimer: 60 + flr(rnd(90)),
        animTimer: 0, patrol: 27 + flr(rnd(27)), patrolStart: ex
      });
    }

    // Turrets
    for (let i = 0; i < 4 + stageNum * 2; i++) {
      const tx = 200 + flr(rnd(level.width - 400));
      level.enemies.push({
        type: "turret", x: tx, y: 0, alive: true,
        hp: 3, shootTimer: 40 + flr(rnd(60)), dir: -1
      });
    }

    // Snipers (placed on platforms)
    for (let i = 0; i < 3 + stageNum * 2; i++) {
      const sx = 167 + flr(rnd(level.width - 333));
      level.enemies.push({
        type: "sniper", x: sx, y: 0, alive: true,
        shootTimer: 30 + flr(rnd(50)), hp: 1
      });
    }

    // Power-ups
    const pwTypes = ["spread", "laser", "rapid"];
    for (let i = 0; i < 3; i++) {
      level.powerups.push({
        type: pwTypes[i % 3],
        x: 200 + flr(i * (level.width - 400) / 3 + rnd(67)),
        y: GROUND_Y - 45 - flr(rnd(30)),
        alive: true
      });
    }

    // Boss at end
    level.boss = {
      x: level.width - 80,
      y: GROUND_Y - 48,
      hp: 15 + stageNum * 10,
      maxHp: 15 + stageNum * 10,
      phase: 0,
      shootTimer: 0,
      alive: true,
      flashTimer: 0,
      moveTimer: 0,
      moveDir: 0
    };

    // Background decoration
    for (let i = 0; i < level.width / 40; i++) {
      level.bgElements.push({
        type: rnd(1) < 0.5 ? "tree" : "mountain",
        x: flr(rnd(level.width)),
        y: GROUND_Y - 6 - flr(rnd(12)),
        parallax: 0.3 + rnd(0.3)
      });
    }

    return level;
  }

  // Place enemies on ground/platforms
  function placeEnemiesOnGround(level) {
    for (const e of level.enemies) {
      if (e.type === "sniper") {
        // Place on elevated platforms
        const elevated = level.platforms.filter(p => !p.ground && p.x < level.width - 200);
        if (elevated.length > 0) {
          const p = elevated[flr(rnd(elevated.length))];
          e.x = p.x + flr(rnd(p.w - 8));
          e.y = p.y - 8;
        } else {
          e.y = GROUND_Y - 8;
        }
      } else {
        // Find ground at enemy's x position
        e.y = getGroundY(level, e.x) - 8;
        if (e.type === "turret") {
          e.y = getGroundY(level, e.x) - 8;
        }
      }
      e.patrolStart = e.x;
    }
  }

  function getGroundY(level, wx) {
    let bestY = GROUND_Y + 75;
    for (const p of level.platforms) {
      if (wx >= p.x && wx < p.x + p.w) {
        if (p.y < bestY) bestY = p.y;
      }
    }
    return bestY;
  }

  // ============================================================
  // Game State
  // ============================================================
  let state = "title";
  let player, bullets, eBullets, enemies, explosions, particles;
  let score, lives, stage, level;
  let camX, scrollSpeed, autoScroll;
  let weapon, weaponTimer;
  let bossDefeated, stageClearTimer;
  let deathTimer, respawnTimer;
  let titleBlink;

  function resetGame() {
    score = 0;
    lives = 3;
    stage = 1;
    startStage(stage);
  }

  function startStage(stageNum) {
    level = generateStage(stageNum);
    placeEnemiesOnGround(level);
    player = {
      x: 27, y: GROUND_Y - 8,
      vx: 0, vy: 0,
      dir: 1,    // 1=right, -1=left
      onGround: false,
      prone: false,
      aimX: 1, aimY: 0,   // aiming direction
      animTimer: 0,
      dead: false,
      invincible: 0
    };
    bullets = [];
    eBullets = [];
    explosions = [];
    particles = [];
    camX = 0;
    scrollSpeed = 0.5 + stageNum * 0.15;
    autoScroll = true;
    weapon = "normal";
    weaponTimer = 0;
    bossDefeated = false;
    stageClearTimer = 0;
    deathTimer = 0;
    respawnTimer = 0;
  }

  function addExplosion(x, y, big) {
    explosions.push({ x: x, y: y, timer: big ? 18 : 10 });
    const count = big ? 12 : 6;
    for (let i = 0; i < count; i++) {
      particles.push({
        x: x + 4, y: y + 4,
        vx: rnd(4) - 2, vy: rnd(4) - 3,
        life: 8 + flr(rnd(12)),
        color: flr(rnd(3)) + 1
      });
    }
  }

  // Sound effects
  function sfxShoot() { note(0, "C6", 0.03); }
  function sfxSpread() { note(0, "E6", 0.03); }
  function sfxLaser() { note(0, "G6", 0.06); }
  function sfxHit() { note(1, "C3", 0.05); setTimeout(() => note(1, "E3", 0.04), 30); }
  function sfxDeath() {
    note(0, "C3", 0.12); note(1, "G2", 0.12);
    setTimeout(() => { note(0, "A2", 0.18); note(1, "E2", 0.18); }, 120);
  }
  function sfxPowerup() {
    note(0, "C5", 0.08);
    setTimeout(() => note(0, "E5", 0.08), 80);
    setTimeout(() => note(0, "G5", 0.08), 160);
    setTimeout(() => note(0, "C6", 0.12), 240);
  }
  function sfxJump() { note(0, "G5", 0.04); }
  function sfxBossHit() { note(1, "A3", 0.04); }
  function sfxStageClear() {
    note(0, "C5", 0.1);
    setTimeout(() => note(0, "E5", 0.1), 120);
    setTimeout(() => note(0, "G5", 0.1), 240);
    setTimeout(() => note(0, "C6", 0.2), 360);
    setTimeout(() => note(1, "C4", 0.2), 360);
  }

  // ============================================================
  // Collision helpers
  // ============================================================
  function isOnPlatform(wx, wy, ww) {
    // Check if feet at (wx, wy+8) land on any platform
    const feetY = wy + 8;
    for (const p of level.platforms) {
      if (wx + ww > p.x && wx < p.x + p.w) {
        if (feetY >= p.y && feetY < p.y + 6) {
          return p.y;
        }
      }
    }
    return null;
  }

  function isSolidBelow(wx, wy) {
    const feetY = wy + 8;
    for (const p of level.platforms) {
      if (wx + 6 > p.x && wx + 2 < p.x + p.w) {
        if (feetY >= p.y && feetY < p.y + 8) {
          return p.y;
        }
      }
    }
    return null;
  }

  function pointInBox(px, py, bx, by, bw, bh) {
    return px >= bx && px < bx + bw && py >= by && py < by + bh;
  }

  function boxOverlap(ax, ay, aw, ah, bx, by, bw, bh) {
    return ax < bx + bw && ax + aw > bx && ay < by + bh && ay + ah > by;
  }

  // ============================================================
  // Shooting
  // ============================================================
  let shootCooldown = 0;

  function getAimDir() {
    let ax = player.dir, ay = 0;
    if (btn("up")) { ay = -1; ax = btn("left") ? -1 : btn("right") ? 1 : 0; }
    else if (btn("down") && !player.onGround) { ay = 1; ax = btn("left") ? -1 : btn("right") ? 1 : 0; }
    else if (btn("down") && player.onGround) { ay = 0; ax = player.dir; } // prone
    else { ax = player.dir; ay = 0; }
    // Normalize
    if (ax === 0 && ay === 0) ax = player.dir;
    return { ax, ay };
  }

  function fireBullet() {
    const aim = getAimDir();
    const bx = player.x + (aim.ax >= 0 ? 6 : -2);
    const by = player.prone ? player.y + 4 : player.y + 2;
    const speed = 7;

    if (weapon === "spread") {
      // 5-way spread
      const angles = [-0.3, -0.15, 0, 0.15, 0.3];
      const baseAngle = Math.atan2(aim.ay, aim.ax);
      for (const off of angles) {
        const a = baseAngle + off;
        bullets.push({
          x: bx, y: by,
          vx: Math.cos(a) * speed, vy: Math.sin(a) * speed,
          type: "spread", life: 30
        });
      }
      sfxSpread();
    } else if (weapon === "laser") {
      bullets.push({
        x: bx, y: by,
        vx: aim.ax * 10, vy: aim.ay * 10,
        type: "laser", life: 40, piercing: true
      });
      sfxLaser();
    } else {
      bullets.push({
        x: bx, y: by,
        vx: aim.ax * speed, vy: aim.ay * speed,
        type: "normal", life: 40
      });
      sfxShoot();
    }
  }

  // ============================================================
  // Update
  // ============================================================
  resetGame();

  API._update = function() {
    if (state === "title") {
      if (btnp("a") || btnp("a")) {
        state = "play";
        resetGame();
        note(0, "C5", 0.08);
        setTimeout(() => note(0, "G5", 0.12), 100);
      }
      return;
    }

    if (state === "gameover") {
      // Particles
      for (let i = particles.length - 1; i >= 0; i--) {
        const p = particles[i]; p.x += p.vx; p.y += p.vy; p.vy += 0.08; p.life--;
        if (p.life <= 0) particles.splice(i, 1);
      }
      if (btnp("a") || btnp("a")) state = "title";
      return;
    }

    if (state === "stageclear") {
      stageClearTimer++;
      if (stageClearTimer > 120) {
        stage++;
        if (stage > 3) {
          state = "win";
        } else {
          startStage(stage);
          state = "play";
        }
      }
      return;
    }

    if (state === "win") {
      if (btnp("a") || btnp("a")) state = "title";
      return;
    }

    // ---- PLAY STATE ----

    if (player.dead) {
      deathTimer++;
      // Update explosions/particles during death
      for (let i = explosions.length - 1; i >= 0; i--) {
        explosions[i].timer--;
        if (explosions[i].timer <= 0) explosions.splice(i, 1);
      }
      for (let i = particles.length - 1; i >= 0; i--) {
        const p = particles[i]; p.x += p.vx; p.y += p.vy; p.vy += 0.08; p.life--;
        if (p.life <= 0) particles.splice(i, 1);
      }
      if (deathTimer > 60) {
        lives--;
        if (lives <= 0) {
          state = "gameover";
        } else {
          player.dead = false;
          player.x = camX + 27;
          player.y = GROUND_Y - 30;
          player.vy = 0;
          player.vx = 0;
          player.invincible = 90;
          weapon = "normal";
          deathTimer = 0;
        }
      }
      return;
    }

    // Player invincibility
    if (player.invincible > 0) player.invincible--;

    // Auto-scroll
    if (autoScroll && !bossDefeated) {
      const maxCam = level.width - W;
      if (camX < maxCam) {
        camX += scrollSpeed;
        // Push player if camera catches up
        if (player.x < camX + 8) player.x = camX + 8;
      }
    }

    // Player movement
    const moveSpeed = 2.5;
    player.prone = btn("down") && player.onGround;

    if (!player.prone) {
      if (btn("left")) { player.x -= moveSpeed; player.dir = -1; }
      if (btn("right")) { player.x += moveSpeed; player.dir = 1; }
    }

    // Keep player on screen
    player.x = _max(camX + 2, min(camX + W - 10, player.x));

    // Camera follows player (push scroll faster if player goes right)
    const maxCam = level.width - W;
    if (player.x > camX + W * 0.6) {
      camX = min(maxCam, player.x - W * 0.6);
    }

    // Jump
    if (btnp("a") && player.onGround && !player.prone) {
      player.vy = JUMP_FORCE;
      player.onGround = false;
      sfxJump();
    }

    // Drop through platform
    if (btn("down") && btnp("a") && player.onGround) {
      player.y += 4;
      player.onGround = false;
      player.vy = 1;
    }

    // Gravity
    player.vy += GRAVITY;
    player.y += player.vy;

    // Ground collision
    player.onGround = false;
    const groundCheck = isSolidBelow(player.x, player.y);
    if (groundCheck !== null && player.vy >= 0) {
      player.y = groundCheck - 8;
      player.vy = 0;
      player.onGround = true;
    }

    // Fall into pit = death
    if (player.y > H + 20) {
      killPlayer();
      return;
    }

    // Animation
    if (!player.onGround) {
      player.animTimer = 0;
    } else if (btn("left") || btn("right")) {
      player.animTimer++;
    } else {
      player.animTimer = 0;
    }

    // Aim direction for sprite selection
    player.aimX = player.dir;
    player.aimY = 0;
    if (btn("up")) player.aimY = -1;
    if (btn("down") && !player.onGround) player.aimY = 1;

    // Shooting
    if (shootCooldown > 0) shootCooldown--;
    const maxCooldown = weapon === "rapid" ? 3 : weapon === "spread" ? 8 : 5;
    if (btn("b") && shootCooldown <= 0) {
      fireBullet();
      shootCooldown = maxCooldown;
    }

    // Weapon timer
    if (weaponTimer > 0) {
      weaponTimer--;
      if (weaponTimer <= 0) weapon = "normal";
    }

    // Update bullets
    for (let i = bullets.length - 1; i >= 0; i--) {
      const b = bullets[i];
      b.x += b.vx;
      b.y += b.vy;
      b.life--;
      // Remove off-screen or expired
      if (b.life <= 0 || b.x < camX - 16 || b.x > camX + W + 16 || b.y < -16 || b.y > H + 16) {
        bullets.splice(i, 1);
      }
    }

    // Update enemy bullets
    for (let i = eBullets.length - 1; i >= 0; i--) {
      const b = eBullets[i];
      b.x += b.vx;
      b.y += b.vy;
      if (b.x < camX - 16 || b.x > camX + W + 16 || b.y < -16 || b.y > H + 16) {
        eBullets.splice(i, 1);
        continue;
      }
      // Hit player
      if (!player.dead && player.invincible <= 0) {
        if (boxOverlap(b.x - 1, b.y - 1, 3, 3, player.x + 1, player.y + 1, 6, 6)) {
          eBullets.splice(i, 1);
          killPlayer();
          break;
        }
      }
    }

    // Update enemies
    for (const e of level.enemies) {
      if (!e.alive) continue;
      // Only active if on screen (with margin)
      const screenX = e.x - camX;
      if (screenX < -40 || screenX > W + 40) continue;

      if (e.type === "soldier") {
        e.animTimer++;
        // Patrol
        e.x += e.dir * e.speed;
        if (_abs(e.x - e.patrolStart) > e.patrol) e.dir *= -1;

        // Ground snap
        const gy = getGroundY(level, e.x);
        e.y = gy - 8;

        // Shoot at player
        e.shootTimer--;
        if (e.shootTimer <= 0 && _abs(e.x - player.x) < 200) {
          const dx = player.x - e.x;
          const dy = player.y - e.y;
          const dist = Math.sqrt(dx * dx + dy * dy);
          if (dist > 0) {
            eBullets.push({
              x: e.x + 0, y: e.y + 0,
              vx: (dx / dist) * 2.5, vy: (dy / dist) * 2.5
            });
          }
          e.shootTimer = 60 + flr(rnd(60));
        }
      }

      if (e.type === "turret") {
        e.dir = player.x < e.x ? -1 : 1;
        // Snap to ground
        const gy = getGroundY(level, e.x);
        e.y = gy - 8;

        e.shootTimer--;
        if (e.shootTimer <= 0 && _abs(e.x - player.x) < 250) {
          // Aimed shot + spread
          const dx = player.x - e.x;
          const dy = player.y - e.y;
          const dist = Math.sqrt(dx * dx + dy * dy);
          if (dist > 0) {
            for (let s = -1; s <= 1; s++) {
              const angle = Math.atan2(dy, dx) + s * 0.15;
              eBullets.push({
                x: e.x + 4, y: e.y + 2,
                vx: Math.cos(angle) * 2, vy: Math.sin(angle) * 2
              });
            }
          }
          e.shootTimer = 50 + flr(rnd(40));
        }
      }

      if (e.type === "sniper") {
        e.dir = player.x < e.x ? -1 : 1;
        e.shootTimer--;
        if (e.shootTimer <= 0 && _abs(e.x - player.x) < 220) {
          const dx = player.x - e.x;
          const dy = player.y - e.y;
          const dist = Math.sqrt(dx * dx + dy * dy);
          if (dist > 0) {
            eBullets.push({
              x: e.x + 0, y: e.y + 0,
              vx: (dx / dist) * 3.5, vy: (dy / dist) * 3.5
            });
          }
          e.shootTimer = 40 + flr(rnd(30));
        }
      }

      // Bullet-enemy collision
      for (let j = bullets.length - 1; j >= 0; j--) {
        const b = bullets[j];
        if (boxOverlap(b.x - 1, b.y - 1, 3, 3, e.x, e.y, 8, 8)) {
          if (!b.piercing) bullets.splice(j, 1);
          if (e.hp !== undefined) {
            e.hp--;
            if (e.hp <= 0) {
              e.alive = false;
              addExplosion(e.x, e.y, false);
              sfxHit();
              score += e.type === "turret" ? 200 : e.type === "sniper" ? 150 : 100;
            } else {
              sfxBossHit();
            }
          } else {
            e.alive = false;
            addExplosion(e.x, e.y, false);
            sfxHit();
            score += 100;
          }
          break;
        }
      }

      // Enemy-player contact
      if (!player.dead && player.invincible <= 0) {
        if (boxOverlap(player.x + 1, player.y + 1, 6, 6, e.x, e.y, 8, 8)) {
          killPlayer();
        }
      }
    }

    // Boss
    if (level.boss && level.boss.alive) {
      const boss = level.boss;
      const bsx = boss.x - camX;
      if (bsx < W + 20) {
        // Boss is on screen - stop auto scroll
        autoScroll = false;

        boss.shootTimer++;
        boss.moveTimer++;

        // Boss movement
        if (boss.moveTimer > 40) {
          boss.moveTimer = 0;
          boss.moveDir = rnd(1) < 0.5 ? -1 : 1;
        }
        boss.y += Math.sin(API.frame * 0.03) * 0.3;

        // Boss shooting patterns
        if (boss.shootTimer > 25) {
          boss.shootTimer = 0;
          const phase = boss.hp < boss.maxHp / 2 ? 1 : 0;

          // Aimed shot
          const dx = player.x - boss.x;
          const dy = player.y - (boss.y + 16);
          const dist = Math.sqrt(dx * dx + dy * dy);
          if (dist > 0) {
            eBullets.push({
              x: boss.x - 4, y: boss.y + 16,
              vx: (dx / dist) * 3, vy: (dy / dist) * 3
            });
          }

          // Extra shots in phase 2
          if (phase === 1) {
            for (let a = 0; a < 4; a++) {
              const angle = (API.frame * 0.05 + a * Math.PI / 2);
              eBullets.push({
                x: boss.x, y: boss.y + 20,
                vx: Math.cos(angle) * 2, vy: Math.sin(angle) * 2
              });
            }
          }
        }

        // Bullet-boss collision
        for (let j = bullets.length - 1; j >= 0; j--) {
          const b = bullets[j];
          if (boxOverlap(b.x - 1, b.y - 1, 3, 3, boss.x - 12, boss.y, 32, 48)) {
            if (!b.piercing) bullets.splice(j, 1);
            boss.hp--;
            boss.flashTimer = 4;
            sfxBossHit();
            score += 10;
            if (boss.hp <= 0) {
              boss.alive = false;
              bossDefeated = true;
              for (let e = 0; e < 6; e++) {
                setTimeout(() => {
                  addExplosion(
                    boss.x - 8 + rnd(32),
                    boss.y + rnd(48), true
                  );
                  note(1, "C3", 0.1);
                }, e * 150);
              }
              score += 2000 + stage * 1000;
              sfxStageClear();
              state = "stageclear";
              stageClearTimer = 0;
            }
            break;
          }
        }

        if (boss.flashTimer > 0) boss.flashTimer--;
      }
    }

    // Power-ups
    for (const pu of level.powerups) {
      if (!pu.alive) continue;
      const sx = pu.x - camX;
      if (sx < -16 || sx > W + 16) continue;
      if (boxOverlap(player.x, player.y, 8, 8, pu.x, pu.y, 8, 8)) {
        pu.alive = false;
        sfxPowerup();
        if (pu.type === "spread") { weapon = "spread"; weaponTimer = 600; }
        else if (pu.type === "laser") { weapon = "laser"; weaponTimer = 450; }
        else if (pu.type === "rapid") { weapon = "rapid"; weaponTimer = 500; }
      }
    }

    // Explosions
    for (let i = explosions.length - 1; i >= 0; i--) {
      explosions[i].timer--;
      if (explosions[i].timer <= 0) explosions.splice(i, 1);
    }

    // Particles
    for (let i = particles.length - 1; i >= 0; i--) {
      const p = particles[i];
      p.x += p.vx; p.y += p.vy; p.vy += 0.06; p.life--;
      if (p.life <= 0) particles.splice(i, 1);
    }
  };

  function killPlayer() {
    if (player.dead) return;
    player.dead = true;
    deathTimer = 0;
    addExplosion(player.x, player.y, true);
    sfxDeath();
    weapon = "normal";
  }

  // ============================================================
  // Draw
  // ============================================================
  API._draw = function() {
    cls(0);

    if (state === "title") {
      // Sky gradient
      for (let y = 0; y < 90; y++) {
        const c = y < 30 ? 0 : y < 60 ? 0 : 0;
        // just dark
      }

      // Mountains in background
      for (let x = 0; x < W; x += 2) {
        const h1 = 45 + sin(x * 0.01 + 1) * 23 + sin(x * 0.025) * 11;
        const h2 = 60 + sin(x * 0.015 + 3) * 19 + sin(x * 0.04) * 8;
        for (let y = flr(150 - h1); y < 150; y++) pix(x, y, 1);
        for (let y = flr(150 - h1); y < 150; y++) pix(x + 1, y, 1);
        for (let y = flr(165 - h2); y < 165; y++) { pix(x, y, 1); pix(x + 1, y, 1); }
      }

      // Ground
      rectf(0, 165, W, 75, 1);
      rectf(0, 163, W, 2, 2);

      // Title
      const ty = 38 + sin(API.frame * 0.04) * 3;
      // Big CONTRA text
      text("CONTRA", 145, flr(ty), 3);
      // Shadow
      text("CONTRA", 146, flr(ty) + 1, 1);
      // Underline
      rectf(132, flr(ty) + 10, 56, 2, 2);
      text("GRAYBOX EDITION", 122, flr(ty) + 16, 2);

      // Animated player sprite on title
      const pFrame = flr(API.frame / 6) % 2 === 0 ? 2 : 3;
      sprT(pFrame, 133 + sin(API.frame * 0.06) * 3, 120 + sin(API.frame * 0.1) * 2);
      sprT(10, 173, 122);
      sprT(12, 193, 123);

      // Blink text
      if (flr(API.frame / 18) % 2 === 0) {
        text("PRESS START", 132, 98, 3);
      }

      // Controls info
      text("Z:JUMP  X:SHOOT  ARROWS:MOVE/AIM", 77, 210, 2);
      text("ONE HIT DEATH - 3 LIVES", 100, 219, 1);
      text("GRAYBOX DEMO V0.1", 117, 231, 1);
      return;
    }

    if (state === "gameover") {
      rectf(0, 0, W, H, 0);
      for (const p of particles) pix(flr(p.x), flr(p.y), p.color);
      text("GAME OVER", 137, 83, 3);
      text("SCORE: " + score, 127, 101, 2);
      text("STAGE: " + stage, 140, 113, 2);
      if (flr(API.frame / 18) % 2 === 0) text("PRESS START", 132, 150, 3);
      return;
    }

    if (state === "win") {
      rectf(0, 0, W, H, 0);
      text("MISSION COMPLETE!", 117, 75, 3);
      text("FINAL SCORE: " + score, 115, 98, 2);
      text("YOU SAVED THE WORLD!", 110, 116, 2);
      // Victory animation
      sprT(1, 153, 135 + sin(API.frame * 0.08) * 3);
      if (flr(API.frame / 18) % 2 === 0) text("PRESS START", 132, 173, 3);
      text("GRAYBOX DEMO V0.1", 117, 231, 1);
      return;
    }

    if (state === "stageclear") {
      rectf(0, 0, W, H, 0);
      text("STAGE " + stage + " CLEAR!", 125, 98, 3);
      text("SCORE: " + score, 127, 120, 2);
      // Explosion particles
      if (stageClearTimer < 60 && stageClearTimer % 8 === 0) {
        addExplosion(67 + rnd(187), 38 + rnd(150), true);
      }
      for (const e of explosions) {
        const sid = e.timer > 5 ? 20 : 21;
        sprT(sid, flr(e.x - camX), flr(e.y));
      }
      for (const p of particles) pix(flr(p.x), flr(p.y), p.color);
      // Update them
      for (let i = explosions.length - 1; i >= 0; i--) {
        explosions[i].timer--;
        if (explosions[i].timer <= 0) explosions.splice(i, 1);
      }
      for (let i = particles.length - 1; i >= 0; i--) {
        const p = particles[i]; p.x += p.vx; p.y += p.vy; p.vy += 0.06; p.life--;
        if (p.life <= 0) particles.splice(i, 1);
      }
      return;
    }

    // ---- PLAY STATE RENDERING ----

    // Sky - gradient feel
    rectf(0, 0, W, 45, 0);

    // Background mountains (parallax)
    const bgOff = camX * 0.15;
    for (let x = 0; x < W; x += 2) {
      const wx = x + bgOff;
      const h1 = 30 + sin(wx * 0.008 + 1) * 19 + sin(wx * 0.02) * 9;
      for (let y = flr(GROUND_Y - 60 - h1); y < GROUND_Y - 45; y++) {
        if (y >= 0 && y < H) { pix(x, y, 1); pix(x + 1, y, 1); }
      }
    }

    // Mid-ground hills (faster parallax)
    const mgOff = camX * 0.4;
    for (let x = 0; x < W; x += 2) {
      const wx = x + mgOff;
      const h = 15 + sin(wx * 0.015 + 2) * 11 + sin(wx * 0.035) * 6;
      for (let y = flr(GROUND_Y - 30 - h); y < GROUND_Y - 15; y++) {
        if (y >= 0 && y < H) { pix(x, y, 1); pix(x + 1, y, 1); }
      }
    }

    // Background trees
    for (const bg of level.bgElements) {
      const sx = flr(bg.x * bg.parallax + (bg.x * (1 - bg.parallax)) - camX * bg.parallax);
      if (sx > -16 && sx < W + 16) {
        if (bg.type === "tree") {
          sprT(35, sx, flr(bg.y));
        }
      }
    }

    // Draw platforms
    for (const p of level.platforms) {
      const sx = flr(p.x - camX);
      const ex = flr(p.x + p.w - camX);
      if (ex < -8 || sx > W + 8) continue;

      if (p.ground) {
        // Ground tiles
        for (let tx = sx; tx < ex; tx += 8) {
          sprT(30, tx, p.y);
          // Fill below ground
          rectf(tx, p.y + 8, 8, H - p.y - 8, 1);
        }
      } else {
        // Platform tiles
        for (let tx = sx; tx < ex; tx += 8) {
          sprT(31, tx, p.y);
        }
      }
    }

    // Draw power-ups (bobbing)
    for (const pu of level.powerups) {
      if (!pu.alive) continue;
      const sx = flr(pu.x - camX);
      if (sx < -8 || sx > W + 8) continue;
      const bob = sin(API.frame * 0.1) * 3;
      const sprId = pu.type === "spread" ? 25 : pu.type === "laser" ? 26 : 27;
      sprT(sprId, sx, flr(pu.y + bob));
    }

    // Draw enemies
    for (const e of level.enemies) {
      if (!e.alive) continue;
      const sx = flr(e.x - camX);
      if (sx < -16 || sx > W + 16) continue;

      if (e.type === "soldier") {
        const anim = flr(e.animTimer / 8) % 2 === 0 ? 10 : 11;
        sprT(anim, sx, flr(e.y), e.dir < 0);
      } else if (e.type === "turret") {
        sprT(12, sx, flr(e.y), e.dir < 0);
      } else if (e.type === "sniper") {
        sprT(13, sx, flr(e.y), e.dir < 0);
      }
    }

    // Draw boss
    if (level.boss && level.boss.alive) {
      const boss = level.boss;
      const bx = flr(boss.x - camX);
      const by = flr(boss.y);
      const flash = boss.flashTimer > 0 && flr(API.frame / 2) % 2 === 0;

      if (!flash) {
        // Main boss body (multi-sprite)
        sprT(41, bx - 4, by);       // top turret
        sprT(43, bx - 4, by + 8);   // armor
        sprT(40, bx - 4, by + 16);  // center core
        sprT(43, bx - 4, by + 24);  // lower armor
        sprT(40, bx - 4, by + 32);  // lower core
        sprT(42, bx - 14, by + 16); // gun arm left
        sprT(42, bx + 6, by + 16, true); // gun arm right (for symmetry)

        // HP bar
        const hpW = 40;
        const hpFill = flr((boss.hp / boss.maxHp) * hpW);
        rectf(bx - 12, by - 8, hpW + 2, 5, 1);
        rectf(bx - 11, by - 7, hpFill, 3, 3);
        rect(bx - 12, by - 8, hpW + 2, 5, 2);
      }
    }

    // Draw player bullets
    for (const b of bullets) {
      const sx = flr(b.x - camX);
      const sy = flr(b.y);
      if (sx < -8 || sx > W + 8) continue;
      if (b.type === "laser") {
        sprT(17, sx, sy);
      } else if (b.type === "spread") {
        sprT(16, sx, sy);
      } else {
        sprT(15, sx, sy);
      }
    }

    // Draw enemy bullets
    for (const b of eBullets) {
      const sx = flr(b.x - camX);
      sprT(18, sx, flr(b.y));
    }

    // Draw player
    if (!player.dead) {
      if (player.invincible > 0 && flr(API.frame / 3) % 2 === 0) {
        // Blink during invincibility - don't draw
      } else {
        let sprId = 1;
        if (!player.onGround) {
          sprId = 4; // jumping
        } else if (player.prone) {
          sprId = 5; // prone
        } else if (player.aimY === -1 && player.aimX === 0) {
          sprId = 6; // aim up
        } else if (player.aimY === -1) {
          sprId = 7; // aim diagonal up
        } else if (btn("left") || btn("right")) {
          sprId = flr(player.animTimer / 5) % 2 === 0 ? 2 : 3; // running
        }
        const sx = flr(player.x - camX);
        sprT(sprId, sx, flr(player.y), player.dir < 0);
      }
    }

    // Explosions
    for (const e of explosions) {
      const sid = e.timer > 5 ? 20 : 21;
      sprT(sid, flr(e.x - camX), flr(e.y));
    }

    // Particles
    for (const p of particles) {
      pix(flr(p.x - camX), flr(p.y), p.color);
    }

    // HUD
    rectf(0, 0, W, 11, 0);
    text("SCORE:" + score, 3, 2, 3);
    text("STAGE:" + stage, W / 2 - 18, 2, 2);

    // Lives
    for (let i = 0; i < lives; i++) sprT(45, W - 40 + i * 10, 2);

    // Weapon indicator
    if (weapon !== "normal") {
      const wName = weapon.toUpperCase();
      const wc = weaponTimer < 90 && flr(API.frame / 6) % 2 === 0 ? 1 : 3;
      text(wName, 3, H - 10, wc);
    }

    // Stage intro text
    if (API.frame < 90) {
      if (flr(API.frame / 6) % 2 === 0) {
        text("STAGE " + stage, 142, 113, 3);
        text("GET READY!", 135, 124, 2);
      }
    }
  };

  // ============================================================
  // Boot
  // ============================================================
  if (API._init) API._init();
  setInterval(tick, 1000 / FPS);
  document.addEventListener("keydown", ensureAudio, { once: true });
  document.addEventListener("click", ensureAudio, { once: true });
})();
</script>
</body>
</html>
