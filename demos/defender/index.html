<!DOCTYPE html>

<body>
<div id="frame">
  <canvas id="screen"></canvas>
</div>
<div id="controls">
  <span>&#x2190;&#x2192;</span> SCROLL &nbsp;&nbsp; <span>&#x2191;&#x2193;</span> ALTITUDE &nbsp;&nbsp; <span>A</span> LASER &nbsp;&nbsp; <span>B</span> REVERSE &nbsp;&nbsp; <span>B</span> SMART BOMB
</div>
<script src="../../runtime/engine.js"></script>
<script>
(() => {
  "use strict";
  const W = Mono.WIDTH, H = Mono.HEIGHT;
  const { cls, pix, line, rect, rectf, circ, circf, sprite: defSprite,
          spr, text, btn, btnp, note, stop, rnd, flr, abs: _abs,
          min, max: _max, sin, cos, dbg, dbgC } = Mono;

  // --- 8→16 upscale helper ---
  function up(d) {
    let o = "";
    for (let r = 0; r < 8; r++) {
      let row = "";
      for (let c = 0; c < 8; c++) {
        const ch = d[r * 8 + c];
        row += ch + ch;
      }
      o += row + row;
    }
    return o;
  }

  // --- Sprites (all 16x16 via upscale) ---

    "00003330" +

  // 2: Lander alien (abducts humans)
  defSprite(2, up(

  // 3: Mutant alien (lander that got a human)
  defSprite(3, up(

  // 7: Human falling (arms up)

  // 8: Laser bolt

  // 9: Explosion frame 1

  // 10: Explosion frame 2

  // 11: Life icon (small ship)
  defSprite(11, up(

    "00000000"
  ));

  // 12: Smart bomb icon
  defSprite(12, up(
    "00333000" +
    "03000300" +
    "30030030" +
    "30333030" +
    "30030030" +
    "03000300" +
    "00333000" +

  ));

  // 13: Mountain terrain 1
  defSprite(13, up(
    "00000000" +
    "00000000" +
    "00000000" +
    "00010000" +
    "00111000" +
    "01111100" +
    "11111110" +
    "11111111"
  ));

  // 14: Mountain terrain 2
  defSprite(14, up(
    "00000000" +
    "00000000" +
    "00100000" +
    "01110000" +
    "11111000" +
    "11111100" +
    "11111110" +
    "11111111"
  ));

  // 15: Flat terrain
  defSprite(15, up(
    "00000000" +
    "00000000" +
    "00000000" +
    "00000000" +
    "00000000" +
    "00000000" +
    "11111111" +
    "11111111"
  ));

  // 16: Enemy bullet
  defSprite(16, up(
    "00000000" +
    "00000000" +
    "00000000" +
    "00330000" +
    "00330000" +
    "00000000" +
    "00000000" +
    "00000000"
  ));

  // --- Constants ---
  const WORLD_W = 4800; // world width in pixels (10 screens wide)
  const GROUND_Y = 210; // ground level on screen
  const MINIMAP_Y = 2;
  const MINIMAP_H = 12;
  const MINIMAP_W = W - 8;
  const HUD_Y = 17;
  const PLAY_TOP = 23;

  // --- Game state ---
  const { TITLE, PLAY, GAMEOVER } = Mono.SCENE;
  let player, lasers, eBullets, aliens, humans, explosions, particles, stars;
  let score, lives, wave, bombs, scrollX;
  let shootCooldown, invincTimer, waveMessage, waveTimer;
  let bombFlash, shakeTimer;
  let terrain; // array of terrain heights across the world

  function genTerrain() {
    terrain = [];
    const segs = WORLD_W / 8;
    let h = 15;
    for (let i = 0; i < segs; i++) {
      h += (rnd(6) - 3);
      h = _max(6, min(38, h));
      terrain.push(flr(h));
    }
  }

  function resetGame() {
    player = { x: WORLD_W / 2, y: 120, dir: 1, speed: 0, vy: 0 };
    lasers = [];
    eBullets = [];
    aliens = [];
    humans = [];
    explosions = [];
    particles = [];
    score = 0;
    lives = 3;
    wave = 0;
    bombs = 3;
    scrollX = player.x - W / 2;
    shootCooldown = 0;
    invincTimer = 60;
    waveMessage = 0;
    waveTimer = 0;
    bombFlash = 0;
    shakeTimer = 0;
    genTerrain();
    stars = [];
    for (let i = 0; i < 80; i++)
      stars.push({ x: flr(rnd(WORLD_W)), y: flr(rnd(GROUND_Y - 40)) + PLAY_TOP, bright: flr(rnd(2)) + 1, speed: 0.1 + rnd(0.5) });
    spawnWave();
  }

  function spawnWave() {
    wave++;
    waveMessage = 90;
    const numLanders = min(6 + wave * 2, 20);
    const numBombers = min(flr(wave / 2), 6);
    const numBaiters = wave > 3 ? min(flr((wave - 3) / 2), 4) : 0;
    // Spawn humans if wave 1 or humans depleted
    if (wave === 1 || humans.filter(h => h.state === "ground").length < 3) {
      const numHumans = 10;
      humans = [];
      for (let i = 0; i < numHumans; i++) {
        const hx = flr(rnd(WORLD_W));
        humans.push({ x: hx, y: getGroundY(hx) - 16, state: "ground", vy: 0, carrier: -1 });
      }
    }
    // Landers
    for (let i = 0; i < numLanders; i++) {
      const ax = (player.x + 300 + flr(rnd(WORLD_W - 600))) % WORLD_W;
      aliens.push({
        type: "lander", x: ax, y: PLAY_TOP + 15 + flr(rnd(75)),
        vx: (rnd(2) - 1) * (1 + wave * 0.1), vy: 0,
        hp: 1, pts: 150, state: "roam",
        targetHuman: -1, shootTimer: 60 + flr(rnd(90)),
        carriedHuman: -1
      });
    }
    // Bombers
    for (let i = 0; i < numBombers; i++) {
      const ax = (player.x + 400 + flr(rnd(WORLD_W - 800))) % WORLD_W;
      aliens.push({
        type: "bomber", x: ax, y: PLAY_TOP + 23 + flr(rnd(60)),
        vx: (rnd(1) > 0.5 ? 1 : -1) * (0.8 + rnd(0.5)), vy: sin(rnd(6)) * 0.3,
        hp: 1, pts: 250, state: "roam",
        targetHuman: -1, shootTimer: 40 + flr(rnd(60)),
        carriedHuman: -1, mineTimer: 30 + flr(rnd(40))
      });
    }
    // Baiters
    for (let i = 0; i < numBaiters; i++) {
      const ax = (player.x + 500 + flr(rnd(WORLD_W - 600))) % WORLD_W;
      aliens.push({
        type: "baiter", x: ax, y: PLAY_TOP + 15 + flr(rnd(45)),
        vx: 0, vy: 0,
        hp: 2, pts: 500, state: "chase",
        targetHuman: -1, shootTimer: 30 + flr(rnd(40)),
        carriedHuman: -1
      });
    }
  }

  function getGroundY(wx) {
    const seg = flr(((wx % WORLD_W) + WORLD_W) % WORLD_W / 8);
    const h = terrain[seg] || 15;
    return GROUND_Y - h + 12;
  }

  function wrapX(x) {
    return ((x % WORLD_W) + WORLD_W) % WORLD_W;
  }

  function worldToScreen(wx) {
    let dx = wrapX(wx - scrollX);
    if (dx > WORLD_W / 2) dx -= WORLD_W;
    return dx;
  }

  function distWorld(a, b) {
    let d = _abs(a - b);
    if (d > WORLD_W / 2) d = WORLD_W - d;
    return d;
  }

  // --- Collision helpers ---
  // Circle collision: center+radius approach for round objects
  function circCollide(x1, y1, r1, x2, y2, r2) {
    const dx = x1 - x2, dy = y1 - y2;
    const dist = Math.sqrt(dx * dx + dy * dy);
    return dist < r1 + r2;
  }

  // Circle-vs-circle using world-wrapped X distance (for bullets/explosions)
  function circCollideWorld(wx1, y1, r1, wx2, y2, r2) {
    const dx = distWorld(wx1, wx2);
    const dy = _abs(y1 - y2);
    const dist = Math.sqrt(dx * dx + dy * dy);
    return dist < r1 + r2;
  }

  // AABB rect collision (for player/alien body collisions)
  function rectCollide(x1, y1, w1, h1, x2, y2, w2, h2) {
    return x1 < x2 + w2 && x1 + w1 > x2 && y1 < y2 + h2 && y1 + h1 > y2;
  }

  // AABB using world-wrapped X
  function rectCollideWorld(wx1, y1, w1, h1, wx2, y2, w2, h2) {
    return distWorld(wx1 + w1 / 2, wx2 + w2 / 2) < (w1 + w2) / 2 &&
           _abs((y1 + h1 / 2) - (y2 + h2 / 2)) < (h1 + h2) / 2;
  }

  function addExplosion(x, y) {
    explosions.push({ x: x, y: y, timer: 12 });
    for (let i = 0; i < 8; i++)
      particles.push({
        x: x + 8, y: y + 8,
        vx: rnd(4) - 2, vy: rnd(4) - 2,
        life: 8 + flr(rnd(10)),
        color: flr(rnd(3)) + 1
      });
  }

  function shootSound() { note(0, "E6", 0.03); setTimeout(() => note(0, "C6", 0.02), 30); }
  function hitSound() { note(1, "C3", 0.06); setTimeout(() => note(1, "E3", 0.05), 40); }
  function deathSound() {
    note(0, "C3", 0.12); note(1, "G2", 0.12);
    setTimeout(() => { note(0, "A2", 0.18); note(1, "E2", 0.18); }, 120);
  }
  function bombSound() {
    note(0, "C2", 0.2); note(1, "G2", 0.2);
    setTimeout(() => { note(0, "E2", 0.15); note(1, "C3", 0.15); }, 100);
    setTimeout(() => { note(0, "G3", 0.1); }, 200);
  }
  function rescueSound() {
    note(0, "C5", 0.08);
    setTimeout(() => note(0, "E5", 0.08), 80);
    setTimeout(() => note(0, "G5", 0.1), 160);
  }
  function humanDieSound() { note(1, "A2", 0.15); setTimeout(() => note(1, "F2", 0.2), 100); }
  function waveClearSound() {
    note(0, "C5", 0.1);
    setTimeout(() => note(0, "E5", 0.1), 100);
    setTimeout(() => note(0, "G5", 0.1), 200);
    setTimeout(() => note(0, "C6", 0.15), 300);
  }

  // --- Scenes ---
  Mono.scene(TITLE, {
    init() { resetGame(); },
    update() {
      if (btnp("start") || btnp("a")) {
        note(0, "C5", 0.1);
        setTimeout(() => note(0, "E5", 0.1), 100);
        setTimeout(() => note(0, "G5", 0.15), 200);
        Mono.go(PLAY); return;
      }
    },
    draw() { drawTitle(); }
  });

  Mono.scene(GAMEOVER, {
    init() {},
    update() {
      for (let i = particles.length - 1; i >= 0; i--) {
        const p = particles[i]; p.x += p.vx; p.y += p.vy; p.vy += 0.08; p.life--;
        if (p.life <= 0) particles.splice(i, 1);
      }
      if (btnp("start") || btnp("a")) { Mono.go(TITLE); return; }
    },
    draw() { drawGameOver(); }
  });

  function drawTitle() {
    cls(0);
    for (const s of stars) {
      const sx = worldToScreen(s.x);
      if (sx >= 0 && sx < W) pix(sx, s.y, s.bright);
    }
    const ty = 30 + sin(Mono.frame * 0.05) * 5;
    text("DEFENDER", 120, flr(ty), 3);
    text("DEFENDER", 121, flr(ty) + 1, 1);
    rectf(106, flr(ty) + 12, 108, 1, 2);
    spr(1, W / 2 - 8, flr(ty) + 20 + sin(Mono.frame * 0.08) * 3);
    const bx = W / 2 - 52;
    spr(2, bx, flr(ty) + 42 + sin(Mono.frame * 0.07) * 2);
    spr(3, bx + 26, flr(ty) + 43 + sin(Mono.frame * 0.07 + 1) * 2);
    spr(5, bx + 52, flr(ty) + 42 + sin(Mono.frame * 0.07 + 2) * 2);
    spr(4, bx + 78, flr(ty) + 43 + sin(Mono.frame * 0.07 + 3) * 2);
    if (flr(Mono.frame / 20) % 2 === 0) text("PRESS START", 118, 130, 3);
    text("-SCORE TABLE-", 116, 148, 2);
    spr(2, 110, 160); text("  LANDER  150 PTS", 126, 164, 2);
    spr(3, 110, 178); text("  MUTANT  400 PTS", 126, 182, 2);
    spr(5, 110, 196); text("  BOMBER  250 PTS", 126, 200, 2);
    spr(4, 110, 214); text("  BAITER  500 PTS", 126, 218, 2);
    text("MONO DEMO V0.1", 116, 234, 1);
  }

  function drawGameOver() {
    cls(0);
    for (const p of particles) pix(flr(p.x), flr(p.y), p.color);
    text("GAME OVER", 128, 90, 3);
    text("SCORE: " + score, 120, 109, 2);
    text("WAVE: " + wave, 132, 120, 2);
    if (flr(Mono.frame / 20) % 2 === 0) text("PRESS START", 118, 158, 3);
  }

  Mono.scene(PLAY, {
    init() { resetGame(); },
    update() {
    // --- Play state ---
    if (waveMessage > 0) waveMessage--;
    if (invincTimer > 0) invincTimer--;
    if (bombFlash > 0) bombFlash--;
    if (shakeTimer > 0) shakeTimer--;

    // Player movement
    const accel = 0.4;
    const maxSpeed = 4;
    const scrollSpeed = 2;

    if (btn("left")) {
      player.speed = _max(player.speed - accel, -maxSpeed);
    } else if (btn("right")) {
      player.speed = min(player.speed + accel, maxSpeed);
    } else {
      player.speed *= 0.92;
      if (_abs(player.speed) < 0.1) player.speed = 0;
    }

    if (btn("up")) player.vy = _max(player.vy - 0.5, -3);
    else if (btn("down")) player.vy = min(player.vy + 0.5, 3);
    else player.vy *= 0.85;

    // Reverse direction
    if (btnp("b")) {
      player.dir *= -1;
      note(0, "A4", 0.03);
    }

    player.x = wrapX(player.x + player.speed * player.dir + scrollSpeed * player.dir);
    player.y += player.vy;
    player.y = _max(PLAY_TOP + 4, min(GROUND_Y - 20, player.y));

    // Scroll to keep player centered
    const targetScroll = player.x - W * 0.35;
    scrollX = wrapX(targetScroll);

    // Shoot
    if (shootCooldown > 0) shootCooldown--;
    if (btn("a") && shootCooldown <= 0) {
      const lx = player.dir === 1 ? player.x + 16 : player.x - 16;
      lasers.push({ x: lx, y: player.y + 4, dir: player.dir, life: 30 });
      shootCooldown = 5;
      shootSound();
    }

    // Smart bomb
    if (btnp("a") && bombs > 0) {
      bombs--;
      bombFlash = 15;
      shakeTimer = 10;
      bombSound();
      // Kill all aliens on screen
      for (let i = aliens.length - 1; i >= 0; i--) {
        const a = aliens[i];
        const sx = worldToScreen(a.x);
        if (sx > -20 && sx < W + 20) {
          score += a.pts;
          addExplosion(a.x, a.y);
          // Release carried human
          if (a.carriedHuman >= 0) {
            const h = humans[a.carriedHuman];
            if (h) { h.state = "falling"; h.vy = 0; h.carrier = -1; }
            a.carriedHuman = -1;
          }
          aliens.splice(i, 1);
        }
      }
      // Kill all enemy bullets on screen
      eBullets = [];
    }

    // Update lasers
    const laserSpeed = 8;
    for (let i = lasers.length - 1; i >= 0; i--) {
      const l = lasers[i];
      l.x = wrapX(l.x + laserSpeed * l.dir);
      l.life--;
      if (l.life <= 0) { lasers.splice(i, 1); continue; }

      // Laser-alien collision: circle for laser (r=4), rect for alien body (16x16 with 2px inset)
      for (let j = aliens.length - 1; j >= 0; j--) {
        const a = aliens[j];
        // Laser center: (l.x+8, l.y+8), radius 5
        // Alien hitbox: center (a.x+8, a.y+8), radius 7
        if (circCollideWorld(l.x + 8, l.y + 8, 5, a.x + 8, a.y + 8, 7)) {
          a.hp--;
          if (a.hp <= 0) {
            score += a.pts;
            addExplosion(a.x, a.y);
            hitSound();
            // Release carried human
            if (a.carriedHuman >= 0) {
              const h = humans[a.carriedHuman];
              if (h) { h.state = "falling"; h.vy = 0; h.carrier = -1; }
            }
            aliens.splice(j, 1);
          } else {
            note(1, "A4", 0.03);
          }
          lasers.splice(i, 1);
          break;
        }
      }
    }

    // Update aliens
    for (let i = aliens.length - 1; i >= 0; i--) {
      const a = aliens[i];
      const distToPlayer = distWorld(a.x, player.x);
      const onScreen = worldToScreen(a.x) > -20 && worldToScreen(a.x) < W + 20;

      if (a.type === "lander") {
        if (a.state === "roam") {
          // Move and look for humans to abduct
          a.x = wrapX(a.x + a.vx);
          a.y += sin(Mono.frame * 0.05 + i) * 0.5;
          a.y = _max(PLAY_TOP + 10, min(GROUND_Y - 30, a.y));

          // Find nearest human on ground
          let closest = -1, closestDist = 200;
          for (let h = 0; h < humans.length; h++) {
            if (humans[h].state === "ground") {
              const d = distWorld(a.x, humans[h].x);
              if (d < closestDist) { closest = h; closestDist = d; }
            }
          }
          if (closest >= 0 && closestDist < 100) {
            a.targetHuman = closest;
            a.state = "descend";
          }
        } else if (a.state === "descend") {
          // Move toward target human
          const h = humans[a.targetHuman];
          if (!h || h.state !== "ground") { a.state = "roam"; a.targetHuman = -1; }
          else {
            const dx = h.x - a.x;
            let moveDir = dx > 0 ? 1 : -1;
            if (_abs(dx) > WORLD_W / 2) moveDir *= -1;
            a.x = wrapX(a.x + moveDir * 1.2);
            a.y += 0.8; // descend
            a.y = min(a.y, getGroundY(a.x) - 18);
            // Pick up human when close
            if (distWorld(a.x, h.x) < 14 && _abs(a.y - h.y) < 20) {
              a.state = "abduct";
              a.carriedHuman = a.targetHuman;
              h.state = "carried";
              h.carrier = i;
            }
          }
        } else if (a.state === "abduct") {
          // Carry human upward
          a.y -= 0.8;
          a.x = wrapX(a.x + a.vx * 0.3);
          const h = humans[a.carriedHuman];
          if (h) { h.x = a.x; h.y = a.y + 16; }
          // If reached top, mutate
          if (a.y < PLAY_TOP + 5) {
            a.type = "mutant";
            a.pts = 400;
            a.state = "roam";
            a.vx = (rnd(2) - 1) * 2;
            // Human is lost
            if (h) { h.state = "dead"; }
            a.carriedHuman = -1;
            humanDieSound();
          }
        }
      } else if (a.type === "mutant") {
        // Fast, aggressive movement toward player
        const dx = player.x - a.x;
        let moveDir = dx > 0 ? 1 : -1;
        if (_abs(dx) > WORLD_W / 2) moveDir *= -1;
        a.vx += moveDir * 0.1;
        a.vx = _max(-3, min(3, a.vx));
        a.x = wrapX(a.x + a.vx);
        a.vy += (player.y - a.y) * 0.01;
        a.vy = _max(-2, min(2, a.vy));
        a.y += a.vy;
        a.y = _max(PLAY_TOP + 5, min(GROUND_Y - 20, a.y));
      } else if (a.type === "bomber") {
        a.x = wrapX(a.x + a.vx);
        a.y += sin(Mono.frame * 0.03 + i * 2) * 0.4;
        a.y = _max(PLAY_TOP + 10, min(GROUND_Y - 40, a.y));
        // Drop mines
        if (a.mineTimer !== undefined) {
          a.mineTimer--;
          if (a.mineTimer <= 0 && onScreen) {
            eBullets.push({ x: a.x, y: a.y + 8, vx: 0, vy: 0.5, life: 180 });
            a.mineTimer = 60 + flr(rnd(60));
          }
        }
      } else if (a.type === "baiter") {
        // Chase player aggressively
        const dx = player.x - a.x;
        let moveDir = dx > 0 ? 1 : -1;
        if (_abs(dx) > WORLD_W / 2) moveDir *= -1;
        a.vx += moveDir * 0.15;
        a.vx = _max(-4, min(4, a.vx));
        a.x = wrapX(a.x + a.vx);
        a.vy += (player.y - a.y) * 0.02;
        a.vy = _max(-3, min(3, a.vy));
        a.y += a.vy;
        a.y = _max(PLAY_TOP + 5, min(GROUND_Y - 20, a.y));
      }

      // Alien shooting
      if (onScreen && distToPlayer < 300) {
        a.shootTimer--;
        if (a.shootTimer <= 0) {
          const dy = player.y - a.y;
          const dx2 = player.x - a.x;
          let ang = Math.atan2(dy, dx2);
          const bspeed = 2 + wave * 0.2;
          eBullets.push({
            x: a.x + 8, y: a.y + 8,
            vx: cos(ang) * bspeed, vy: sin(ang) * bspeed,
            life: 120
          });
          a.shootTimer = (a.type === "baiter" ? 20 : 40) + flr(rnd(30));
        }
      }

      // Alien-player collision: rect-based for body overlap (16x16 sprites, 2px inset)
      if (invincTimer <= 0 &&
          rectCollideWorld(a.x + 2, a.y + 2, 12, 12, player.x + 2, player.y + 2, 12, 12)) {
        addExplosion(player.x, player.y);
        addExplosion(a.x, a.y);
        if (a.carriedHuman >= 0) {
          const h = humans[a.carriedHuman];
          if (h) { h.state = "falling"; h.vy = 0; h.carrier = -1; }
        }
        aliens.splice(i, 1);
        lives--;
        deathSound();
        invincTimer = 60;
        if (lives <= 0) { addExplosion(player.x, player.y); Mono.go(GAMEOVER); return; }
      }
    }

    // Update enemy bullets
    for (let i = eBullets.length - 1; i >= 0; i--) {
      const b = eBullets[i];
      b.x = wrapX(b.x + b.vx);
      b.y += b.vy;
      b.life--;
      if (b.life <= 0 || b.y > GROUND_Y || b.y < PLAY_TOP) { eBullets.splice(i, 1); continue; }
      // Hit player: circle collision (bullet r=3, player center r=6)
      const pcx = player.x + 8, pcy = player.y + 8;
      const bcx = b.x + 4, bcy = b.y + 4;
      if (invincTimer <= 0 && circCollideWorld(bcx, bcy, 3, pcx, pcy, 6)) {
        eBullets.splice(i, 1);
        lives--;
        addExplosion(player.x, player.y);
        deathSound();
        invincTimer = 60;
        if (lives <= 0) { Mono.go(GAMEOVER); return; }
      }
    }

    // Update humans
    for (let i = humans.length - 1; i >= 0; i--) {
      const h = humans[i];
      if (h.state === "falling") {
        h.vy += 0.15;
        h.y += h.vy;
        const gy = getGroundY(h.x);
        // Player catches falling human: circle collision
        if (circCollideWorld(h.x + 8, h.y + 8, 8, player.x + 8, player.y + 8, 10)) {
          h.state = "caught";
          h.vy = 0;
          score += 500;
          rescueSound();
        }
        // Hit ground
        if (h.y >= gy - 16) {
          if (h.vy > 4) {
            // Splat
            h.state = "dead";
            addExplosion(h.x, h.y);
            humanDieSound();
          } else {
            h.state = "ground";
            h.y = gy - 16;
          }
        }
      } else if (h.state === "caught") {
        // Ride with player, descend to ground
        h.x = player.x;
        h.y += 1.5;
        const gy = getGroundY(h.x);
        if (h.y >= gy - 16) {
          h.state = "ground";
          h.y = gy - 16;
          score += 500; // bonus for safe landing
          note(0, "C6", 0.1);
        }
      }
    }

    // Explosions
    for (let i = explosions.length - 1; i >= 0; i--) {
      explosions[i].timer--;
      if (explosions[i].timer <= 0) explosions.splice(i, 1);
    }

    // Particles
    for (let i = particles.length - 1; i >= 0; i--) {
      const p = particles[i];
      p.x += p.vx; p.y += p.vy; p.vy += 0.05; p.life--;
      if (p.life <= 0) particles.splice(i, 1);
    }

    // Wave clear check
    if (aliens.length === 0) {
      waveTimer++;
      if (waveTimer > 60) {
        waveTimer = 0;
        waveClearSound();
        // Bonus bomb every 3 waves
        if (wave % 3 === 0) bombs = min(bombs + 1, 5);
        spawnWave();
      }
    } else {
      waveTimer = 0;
    }
    },
    draw() { drawPlayState(); }
  });

  function drawPlayState() {
    cls(0);

    const shake = shakeTimer > 0 ? flr(rnd(4)) - 2 : 0;

    // --- Play state rendering ---
    const shakeY = shake;

    // Stars
    for (const s of stars) {
      const sx = worldToScreen(s.x);
      if (sx >= 0 && sx < W) pix(sx, s.y + shakeY, s.bright);
    }

    // Terrain (pixel-by-pixel with API calls)
    for (let px = 0; px < W; px++) {
      const wx = wrapX(scrollX + px);
      const seg = flr(wx / 8);
      const h = terrain[seg] || 15;
      const gy = GROUND_Y - h + 12;
      // Draw mountain line
      for (let py = gy + shakeY; py < GROUND_Y + 12 + shakeY; py++) {
        if (py >= 0 && py < H) {
          const depth = py - gy - shakeY;
          const c = depth < 2 ? 2 : (depth < h / 2 ? 1 : 0);
          pix(px, py, c);
        }
      }
    }

    // Humans
    for (const h of humans) {
      if (h.state === "dead") continue;
      const sx = worldToScreen(h.x);
      if (sx < -16 || sx > W + 16) continue;
      const sprId = h.state === "falling" || h.state === "caught" ? 7 : 6;
      spr(sprId, flr(sx), flr(h.y) + shakeY);
      dbg(flr(sx) + 2, flr(h.y) + shakeY + 2, 12, 12);
    }

    // Enemy bullets
    for (const b of eBullets) {
      const sx = worldToScreen(b.x);
      if (sx >= -8 && sx < W + 8) {
        spr(16, flr(sx), flr(b.y) + shakeY);
        dbgC(flr(sx) + 4, flr(b.y) + shakeY + 4, 3);
      }
    }

    // Aliens
    for (const a of aliens) {
      const sx = worldToScreen(a.x);
      if (sx < -16 || sx > W + 16) continue;
      let sprId;
      if (a.type === "lander") sprId = 2;
      else if (a.type === "mutant") sprId = 3;
      else if (a.type === "baiter") sprId = 4;
      else if (a.type === "bomber") sprId = 5;
      else sprId = 2;
      spr(sprId, flr(sx), flr(a.y) + shakeY);
      dbg(flr(sx) + 2, flr(a.y) + shakeY + 2, 12, 12);
    }

    // Lasers
    for (const l of lasers) {
      const sx = worldToScreen(l.x);
      if (sx >= -40 && sx < W + 40) {
        // Draw a bright laser line (thicker for 16x16 scale)
        const len = 24;
        const x0 = sx;
        const x1 = sx + len * l.dir;
        line(flr(x0), flr(l.y + 6) + shakeY, flr(x1), flr(l.y + 6) + shakeY, 3);
        line(flr(x0), flr(l.y + 7) + shakeY, flr(x1), flr(l.y + 7) + shakeY, 3);
        line(flr(x0), flr(l.y + 8) + shakeY, flr(x1), flr(l.y + 8) + shakeY, 2);
        line(flr(x0), flr(l.y + 9) + shakeY, flr(x1), flr(l.y + 9) + shakeY, 2);
        dbgC(flr(sx) + 8, flr(l.y) + shakeY + 8, 5);
      }
    }

    // Player
    {
      if (invincTimer <= 0 || flr(Mono.frame / 3) % 2 === 0) {
        const flipX = player.dir === -1;
        const psx = worldToScreen(player.x);
        spr(1, flr(psx), flr(player.y) + shakeY, flipX);
        dbg(flr(psx) + 2, flr(player.y) + shakeY + 2, 12, 12);
        // Engine glow
        const engineX = flipX ? psx + 14 : psx - 3;
        if (flr(Mono.frame / 2) % 2 === 0) {
          pix(flr(engineX), flr(player.y + 6) + shakeY, 3);
          pix(flr(engineX) + (flipX ? 1 : -1), flr(player.y + 6) + shakeY, 2);
          pix(flr(engineX), flr(player.y + 7) + shakeY, 2);
          pix(flr(engineX) + (flipX ? 1 : -1), flr(player.y + 7) + shakeY, 3);
        }
      }
    }

    // Explosions
    for (const e of explosions) {
      const sx = worldToScreen(e.x);
      if (sx >= -16 && sx < W + 16) {
        const sprId = e.timer > 6 ? 9 : 10;
        spr(sprId, flr(sx), flr(e.y) + shakeY);
        dbgC(flr(sx) + 8, flr(e.y) + shakeY + 8, 8);
      }
    }

    // Particles
    for (const p of particles) {
      const sx = worldToScreen(p.x);
      if (sx >= 0 && sx < W) pix(flr(sx), flr(p.y) + shakeY, p.color);
    }

    // Smart bomb flash
    if (bombFlash > 0) {
      if (flr(bombFlash / 2) % 2 === 0) {
        for (let py = PLAY_TOP; py < GROUND_Y; py += 2) {
          for (let px = 0; px < W; px += 2) {
            pix(px, py, 3);
          }
        }
      }
    }

    // --- MINIMAP ---
    rectf(4, MINIMAP_Y, MINIMAP_W, MINIMAP_H, 0);
    rect(4, MINIMAP_Y, MINIMAP_W, MINIMAP_H, 1);

    // Minimap terrain
    for (let mx = 0; mx < MINIMAP_W - 2; mx++) {
      const wx = flr(mx / (MINIMAP_W - 2) * WORLD_W);
      const seg = flr(wx / 8);
      const h = terrain[seg] || 15;
      const mh = flr(h * MINIMAP_H / 60);
      for (let my = 0; my < mh; my++) {
        pix(5 + mx, MINIMAP_Y + MINIMAP_H - 2 - my, 1);
      }
    }

    // Minimap humans
    for (const h of humans) {
      if (h.state === "dead") continue;
      const mx = flr(h.x / WORLD_W * (MINIMAP_W - 2));
      pix(5 + mx, MINIMAP_Y + MINIMAP_H - 4, 2);
    }

    // Minimap aliens
    for (const a of aliens) {
      const mx = flr(a.x / WORLD_W * (MINIMAP_W - 2));
      const my = flr((a.y - PLAY_TOP) / (GROUND_Y - PLAY_TOP) * (MINIMAP_H - 4));
      pix(5 + mx, MINIMAP_Y + 2 + min(my, MINIMAP_H - 4), 2);
    }

    // Minimap player
    const pmx = flr(player.x / WORLD_W * (MINIMAP_W - 2));
    rectf(5 + pmx - 1, MINIMAP_Y + 2, 3, 3, 3);

    // Minimap viewport box
    const vx0 = flr(scrollX / WORLD_W * (MINIMAP_W - 2));
    const vx1 = flr((scrollX + W) / WORLD_W * (MINIMAP_W - 2));
    if (vx1 > vx0) {
      rect(5 + vx0, MINIMAP_Y + 1, vx1 - vx0, MINIMAP_H - 2, 1);
    }

    // --- HUD ---
    // HUD bar background: full width, stays within 320
    rectf(0, HUD_Y - 2, W, 10, 0);

    // Score (left side)
    text("SCORE:" + score, 4, HUD_Y, 3);

    // Wave (center)
    text("WAVE:" + wave, W / 2 - 17, HUD_Y, 2);

    // Humans alive count (center-right)
    const humansAlive = humans.filter(h => h.state !== "dead").length;
    text(humansAlive + "", W / 2 + 28, HUD_Y, humansAlive > 3 ? 2 : 3);
    spr(6, W / 2 + 40, HUD_Y - 4);

    // Lives icons (right side) - spaced to fit within 320 width
    // Max 5 lives shown, each icon 16px, spacing 2px = 18px per icon
    const livesStartX = W - 18 * min(lives, 5) - 2;
    for (let i = 0; i < min(lives, 5); i++) {
      spr(11, livesStartX + i * 18, HUD_Y - 4);
    }

    // Bombs (far right, below lives area if needed - shown as small rects)
    // Keep bombs within screen: max 5 bombs * 8px = 40px
    const bombStartX = W - 8 * min(bombs, 5) - 2;
    for (let i = 0; i < bombs; i++) {
      const bx = min(bombStartX + i * 8, W - 8);
      rectf(bx, HUD_Y, 6, 6, 2);
      pix(bx + 2, HUD_Y + 1, 3);
      pix(bx + 3, HUD_Y + 1, 3);
      pix(bx + 2, HUD_Y + 2, 3);
    }

    // Wave announcement
    if (waveMessage > 0) {
      const msgY = 113 + sin(waveMessage * 0.1) * 3;
      text("WAVE " + wave, 135, flr(msgY), 3);
      if (waveMessage > 60) text("GET READY!", 125, flr(msgY) + 14, 2);
    }
  }

  // ============================================================
  // Boot
  Mono.go(TITLE);
  Mono.boot("screen");
})();
</script>
