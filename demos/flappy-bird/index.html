<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mono — Demo: Flappy Bird</title>
<link rel="stylesheet" href="../../runtime/mono.css">
</head>
<body>
<div id="frame">
  <canvas id="screen"></canvas>
</div>
<div id="controls">
  <span>A</span> FLAP
</div>
<script src="../../runtime/engine.js"></script>
<script>
(() => {
  "use strict";
  const W = Mono.WIDTH, H = Mono.HEIGHT;
  const { cls, pix, line, rect, rectf, circ, circf, sprite: defSprite,
          spr, sprT, text, btn, btnp, note, stop, rnd, flr,
          abs: _abs, min, max: _max, sin, cos, dbg, dbgC } = Mono;

  // --- 8x8 -> 16x16 upscale helper ---
  function up(d) {
    let o = "";
    for (let r = 0; r < 8; r++) {
      let row = "";
      for (let c = 0; c < 8; c++) {
        const ch = d[r * 8 + c];
        row += ch + ch;
      }
      o += row + row;
    }
    return o;
  }

  // --- Sprites (8x8 data upscaled to 16x16) ---

  // 1: Bird - wings up
  defSprite(1, up(
    "00033000" +
    "00322300" +
    "03233130" +
    "03322330" +
    "03333300" +
    "00333200" +
    "00033000" +
    "00000000"
  ));
  // 2: Bird - wings mid
  defSprite(2, up(
    "00033000" +
    "00322300" +
    "03233130" +
    "03322330" +
    "33333300" +
    "00333200" +
    "00033000" +
    "00000000"
  ));
  // 3: Bird - wings down
  defSprite(3, up(
    "00033000" +
    "00322300" +
    "03233130" +
    "03322330" +
    "03333300" +
    "33333200" +
    "00033000" +
    "00000000"
  ));
  // 4: Pipe top cap (top of lower pipe / bottom of upper pipe opening)
  defSprite(4, up(
    "01111110" +
    "12222231" +
    "12222231" +
    "01111110" +
    "00000000" +
    "00000000" +
    "00000000" +
    "00000000"
  ));
  // 5: Pipe body segment
  defSprite(5, up(
    "01222310" +
    "01222310" +
    "01222310" +
    "01222310" +
    "01222310" +
    "01222310" +
    "01222310" +
    "01222310"
  ));
  // 6: Ground tile
  defSprite(6, up(
    "33333333" +
    "21212121" +
    "12121212" +
    "11111111" +
    "11111111" +
    "10101010" +
    "01010101" +
    "00000000"
  ));
  // 7: Bush / decoration for background
  defSprite(7, up(
    "00000000" +
    "00000000" +
    "00010000" +
    "00111010" +
    "01111100" +
    "11111110" +
    "11111111" +
    "00000000"
  ));
  // 8: Cloud
  defSprite(8, up(
    "00000000" +
    "00110000" +
    "01331000" +
    "13333100" +
    "33333310" +
    "13333331" +
    "01111110" +
    "00000000"
  ));
  // 9: Small star / dot for background
  defSprite(9, up(
    "00000000" +
    "00000000" +
    "00000000" +
    "00020000" +
    "00000000" +
    "00000000" +
    "00000000" +
    "00000000"
  ));
  // 10: Bird dead (X eyes)
  defSprite(10, up(
    "00033000" +
    "00322300" +
    "03203030" +
    "03320330" +
    "03203000" +
    "00333200" +
    "00033000" +
    "00000000"
  ));
  // 11: Medal/trophy icon
  defSprite(11, up(
    "00333300" +
    "03222230" +
    "32322320" +
    "32232320" +
    "03222230" +
    "00333300" +
    "00033000" +
    "00033000"
  ));

  // --- Constants ---
  const SPRITE_SIZE = 16;         // engine sprite size
  const GROUND_Y = H - 32;       // ground top y (was H-18, now fits 16px ground tiles + fill)
  const GRAVITY = 0.35;
  const FLAP_VEL = -4.8;
  const PIPE_W = 32;              // pipe width in pixels (2 sprite columns of 16)
  const PIPE_GAP = 54;            // vertical gap between pipes
  const PIPE_SPEED = 2.2;
  const PIPE_SPACING = 107;       // horizontal spacing between pipes
  const BIRD_X = 53;              // bird x position (fixed)
  const BIRD_R = 6;               // bird circle-hitbox radius

  // --- Game State ---
  const { TITLE, PLAY, GAMEOVER } = Mono.SCENE;
  let subState = "ready"; // sub-state within PLAY: "ready", "play", "dying"
  let bird, pipes, score, bestScore, groundScroll;
  let deathTimer, flashTimer;
  let titleBobT;
  let clouds;
  let particles;
  let passedPipeIds;
  let pipeIdCounter;
  let difficulty; // increases scroll speed over time
  let scorePopups;

  bestScore = 0;

  function resetGame() {
    bird = { y: H / 2 - 15, vy: 0, flapAnim: 0, alive: true, angle: 0 };
    pipes = [];
    score = 0;
    groundScroll = 0;
    deathTimer = 0;
    flashTimer = 0;
    titleBobT = 0;
    passedPipeIds = new Set();
    pipeIdCounter = 0;
    difficulty = 0;
    scorePopups = [];
    particles = [];
    clouds = [];
    for (let i = 0; i < 6; i++) {
      clouds.push({
        x: flr(rnd(W + 67)),
        y: 15 + flr(rnd(75)),
        speed: 0.2 + rnd(0.4),
        size: 1 + flr(rnd(2))
      });
    }
    // Spawn initial pipes
    for (let i = 0; i < 4; i++) {
      spawnPipe(W + 40 + i * PIPE_SPACING);
    }
  }

  function spawnPipe(x) {
    const minGapY = 38;
    const maxGapY = GROUND_Y - PIPE_GAP - 38;
    const gapY = minGapY + flr(rnd(maxGapY - minGapY));
    pipes.push({
      id: pipeIdCounter++,
      x: x,
      gapY: gapY // top of the gap
    });
  }

  function getSpeed() {
    return PIPE_SPEED + difficulty * 0.15;
  }

  // --- Sounds ---
  function flapSound() { note(0, "E5", 0.04); }
  function scoreSound() {
    note(0, "C5", 0.05);
    setTimeout(() => note(0, "E5", 0.06), 50);
  }
  function hitSound() {
    note(0, "C3", 0.1);
    note(1, "E2", 0.15);
  }
  function deathSound() {
    setTimeout(() => {
      note(0, "G3", 0.08);
      note(1, "C3", 0.12);
    }, 200);
    setTimeout(() => {
      note(0, "E3", 0.1);
      note(1, "A2", 0.15);
    }, 400);
  }
  function startSound() {
    note(0, "C5", 0.06);
    setTimeout(() => note(0, "E5", 0.06), 80);
    setTimeout(() => note(0, "G5", 0.1), 160);
  }
  function bestScoreSound() {
    note(0, "C5", 0.06);
    setTimeout(() => note(0, "E5", 0.06), 80);
    setTimeout(() => note(0, "G5", 0.06), 160);
    setTimeout(() => note(0, "C6", 0.12), 240);
  }

  // --- Text helpers ---
  function textWidth(str) { return str.length * (FONT_W + 1) - 1; }
  function textCenter(str, y, c) {
    const w = textWidth(str);
    text(str, flr((W - w) / 2), y, c);
  }

  // Draw big text (2x scale)
  function textBig(str, x, y, c) {
    str = String(str).toUpperCase();
    let cx = Math.floor(x);
    const cy = Math.floor(y);
    const col = COLOR_U32[c] || COLOR_U32[3];
    for (const ch of str) {
      const glyph = FONT[ch];
      if (glyph) {
        for (let py = 0; py < FONT_H; py++) {
          for (let px = 0; px < FONT_W; px++) {
            if (glyph[py * FONT_W + px]) {
              const dx = cx + px * 2, dy = cy + py * 2;
              for (let sy = 0; sy < 2; sy++)
                for (let sx = 0; sx < 2; sx++) {
                  const fx = dx + sx, fy = dy + sy;
                  if (fx >= 0 && fx < W && fy >= 0 && fy < H)
                    buf32[fy * W + fx] = col;
                }
            }
          }
        }
      }
      cx += (FONT_W + 1) * 2;
    }
  }
  function textBigWidth(str) { return str.length * (FONT_W + 1) * 2 - 2; }
  function textBigCenter(str, y, c) {
    const w = textBigWidth(str);
    textBig(str, flr((W - w) / 2), y, c);
  }

  // Draw extra big text (3x scale)
  function textHuge(str, x, y, c) {
    str = String(str).toUpperCase();
    let cx = Math.floor(x);
    const cy = Math.floor(y);
    const col = COLOR_U32[c] || COLOR_U32[3];
    for (const ch of str) {
      const glyph = FONT[ch];
      if (glyph) {
        for (let py = 0; py < FONT_H; py++) {
          for (let px = 0; px < FONT_W; px++) {
            if (glyph[py * FONT_W + px]) {
              const dx = cx + px * 3, dy = cy + py * 3;
              for (let sy = 0; sy < 3; sy++)
                for (let sx = 0; sx < 3; sx++) {
                  const fx = dx + sx, fy = dy + sy;
                  if (fx >= 0 && fx < W && fy >= 0 && fy < H)
                    buf32[fy * W + fx] = col;
                }
            }
          }
        }
      }
      cx += (FONT_W + 1) * 3;
    }
  }
  function textHugeWidth(str) { return str.length * (FONT_W + 1) * 3 - 3; }
  function textHugeCenter(str, y, c) {
    const w = textHugeWidth(str);
    textHuge(str, flr((W - w) / 2), y, c);
  }

  // --- Collision (circle for bird, rect for pipes) ---
  function birdCenter() {
    return {
      cx: BIRD_X + SPRITE_SIZE / 2,
      cy: bird.y + SPRITE_SIZE / 2
    };
  }

  function circRectOverlap(cx, cy, r, rx, ry, rw, rh) {
    // Closest point on rect to circle center
    const closestX = Math.max(rx, Math.min(cx, rx + rw));
    const closestY = Math.max(ry, Math.min(cy, ry + rh));
    const dx = cx - closestX;
    const dy = cy - closestY;
    return (dx * dx + dy * dy) <= (r * r);
  }

  function checkCollision() {
    const bc = birdCenter();
    // Ground
    if (bc.cy + BIRD_R >= GROUND_Y) return true;
    // Ceiling
    if (bc.cy - BIRD_R <= 0) return true;
    // Pipes
    for (const p of pipes) {
      // Upper pipe rect
      const ux = p.x, uy = 0, uw = PIPE_W, uh = p.gapY;
      // Lower pipe rect
      const lx = p.x, ly = p.gapY + PIPE_GAP, lw = PIPE_W, lh = GROUND_Y - ly;
      if (circRectOverlap(bc.cx, bc.cy, BIRD_R, ux, uy, uw, uh) ||
          circRectOverlap(bc.cx, bc.cy, BIRD_R, lx, ly, lw, lh)) return true;
    }
    return false;
  }

  // --- Particles ---
  function spawnDeathParticles() {
    for (let i = 0; i < 12; i++) {
      particles.push({
        x: BIRD_X + 7, y: bird.y + 7,
        vx: rnd(4) - 2, vy: rnd(3) - 2,
        life: 15 + flr(rnd(15)),
        color: 1 + flr(rnd(3))
      });
    }
  }

  // --- Draw helpers ---
  function drawPipe(p) {
    const x = flr(p.x);

    // Upper pipe body
    for (let ty = 0; ty < p.gapY - 8; ty += 16) {
      for (let tx = 0; tx < PIPE_W; tx += 16) {
        sprT(5, x + tx, ty);
      }
    }
    // Upper pipe cap (bottom of upper pipe, flipped)
    for (let tx = 0; tx < PIPE_W; tx += 16) {
      sprT(4, x + tx, p.gapY - 8, false, true);
    }

    // Lower pipe cap (top of lower pipe)
    const lowerY = p.gapY + PIPE_GAP;
    for (let tx = 0; tx < PIPE_W; tx += 16) {
      sprT(4, x + tx, lowerY);
    }
    // Lower pipe body
    for (let ty = lowerY + 8; ty < GROUND_Y; ty += 16) {
      for (let tx = 0; tx < PIPE_W; tx += 16) {
        sprT(5, x + tx, ty);
      }
    }

    // Debug hitboxes for pipes
    dbg(x, 0, PIPE_W, p.gapY);
    dbg(x, lowerY, PIPE_W, GROUND_Y - lowerY);
  }

  function drawGround() {
    const gx = flr(groundScroll) % 16;
    // Ground stripe
    rectf(0, GROUND_Y, W, 2, 2);
    for (let x = -gx; x < W; x += 16) {
      sprT(6, x, GROUND_Y + 2);
    }
    // Fill below ground tiles
    rectf(0, GROUND_Y + 18, W, H - GROUND_Y - 18, 0);
  }

  function drawClouds() {
    for (const c of clouds) {
      const cx = flr(c.x);
      const cy = flr(c.y);
      if (c.size === 1) {
        sprT(8, cx, cy);
      } else {
        sprT(8, cx, cy);
        sprT(8, cx + 14, cy - 4);
      }
    }
  }

  function drawBird() {
    // Pick animation frame
    let sprId;
    if (!bird.alive) {
      sprId = 10; // dead bird
    } else {
      const wingCycle = flr(bird.flapAnim / 4) % 3;
      sprId = wingCycle + 1; // sprites 1,2,3
    }

    const bx = flr(BIRD_X);
    const by = flr(bird.y);

    // Simple tilt: shift top/bottom rows
    const s = sprites[sprId]; if (!s) return;
    const tilt = bird.alive ? Math.max(-2, Math.min(2, flr(bird.vy / 2.5))) : 2;

    for (let py = 0; py < 16; py++) {
      // Row offset based on tilt: top rows shift one way, bottom rows the other
      const rowOff = flr((py - 7.5) * tilt / 8);
      for (let px = 0; px < 16; px++) {
        const c = s[py * 16 + px];
        if (c === 0) continue;
        const dx = bx + px + rowOff, dy = by + py;
        if (dx >= 0 && dx < W && dy >= 0 && dy < H)
          buf32[dy * W + dx] = COLOR_U32[c];
      }
    }

    // Debug circle hitbox for bird
    const bc = birdCenter();
    dbgC(bc.cx, bc.cy, BIRD_R);
  }

  function drawScorePopup() {
    for (let i = scorePopups.length - 1; i >= 0; i--) {
      const sp = scorePopups[i];
      sp.y -= 0.5;
      sp.life--;
      if (sp.life <= 0) { scorePopups.splice(i, 1); continue; }
      const alpha = sp.life > 10 ? 3 : 2;
      text("+1", flr(sp.x), flr(sp.y), alpha);
    }
  }

  // --- Title Scene ---
  Mono.scene(TITLE, {
    init() { resetGame(); },
    update() {
      titleBobT++;
      bird.y = H / 2 - 23 + sin(titleBobT * 0.08) * 6;
      bird.flapAnim++;
      groundScroll += 1;

      for (const c of clouds) {
        c.x -= c.speed;
        if (c.x < -26) { c.x = W + 14; c.y = 15 + flr(rnd(75)); }
      }

      if (btnp("start") || btnp("a")) {
        bird.y = H / 2 - 23;
        bird.vy = 0;
        startSound();
        subState = "ready";
        Mono.go(PLAY); return;
      }
    },
    draw() {
      cls(0);
      rectf(0, 0, W, 60, 0);
      rectf(0, 60, W, 60, 0);
      for (let y = 98; y < 128; y++) {
        for (let x = 0; x < W; x++) {
          if ((x + y) % 3 === 0) pix(x, y, 1);
        }
      }
      rectf(0, 128, W, GROUND_Y - 128, 1);
      drawClouds();
      drawGround();

      const bobY = flr(sin(titleBobT * 0.05) * 3);
      rectf(W/2 - 73, 38 + bobY, 146, 38, 0);
      rect(W/2 - 73, 38 + bobY, 146, 38, 2);
      textHugeCenter("FLAPPY", 42 + bobY, 3);
      textBigCenter("BIRD", 59 + bobY, 2);
      drawBird();
      textCenter("PRESS Z OR A TO START", 150, 2);
      if (bestScore > 0) { textCenter("BEST: " + bestScore, 169, 1); }
      textCenter("MONO DEMO", H - 15, 1);
    }
  });

  // --- Game Over Scene ---
  Mono.scene(GAMEOVER, {
    init() { deathTimer = 0; },
    update() {
      titleBobT++;
      deathTimer++;
      for (let i = particles.length - 1; i >= 0; i--) {
        const p = particles[i];
        p.x += p.vx; p.y += p.vy; p.vy += 0.1; p.life--;
        if (p.life <= 0) particles.splice(i, 1);
      }
      if (deathTimer > 20 && (btnp("start") || btnp("a"))) {
        resetGame();
        bird.alive = true;
        Mono.go(TITLE); return;
      }
    },
    draw() {
      cls(0);
      rectf(0, 0, W, 60, 0);
      rectf(0, 60, W, 60, 0);
      for (let y = 98; y < 128; y++) {
        for (let x = 0; x < W; x++) {
          if ((x + y) % 3 === 0) pix(x, y, 1);
        }
      }
      rectf(0, 128, W, GROUND_Y - 128, 1);
      drawClouds();
      for (const p of pipes) drawPipe(p);
      drawGround();
      for (const p of particles) { pix(flr(p.x), flr(p.y), p.color); }
      drawBird();

      const panelW = 133;
      const panelH = 90;
      const panelX = flr((W - panelW) / 2);
      const panelY = flr((H - panelH) / 2) - 15;
      rectf(panelX, panelY, panelW, panelH, 0);
      rect(panelX, panelY, panelW, panelH, 2);
      rect(panelX + 2, panelY + 2, panelW - 4, panelH - 4, 1);
      textBigCenter("GAME OVER", panelY + 8, 3);
      line(panelX + 7, panelY + 21, panelX + panelW - 7, panelY + 21, 1);
      text("SCORE", panelX + 13, panelY + 29, 2);
      const sStr = "" + score;
      text(sStr, panelX + panelW - 13 - textWidth(sStr), panelY + 29, 3);
      text("BEST", panelX + 13, panelY + 39, 2);
      const bStr = "" + bestScore;
      text(bStr, panelX + panelW - 13 - textWidth(bStr), panelY + 39, 3);
      if (score === bestScore && score > 0) {
        text("NEW!", panelX + panelW - 37 - textWidth(bStr), panelY + 39, 2);
        sprT(11, panelX + 6, panelY + 32);
      }
      line(panelX + 7, panelY + 49, panelX + panelW - 7, panelY + 49, 1);
      let rating = "TRY AGAIN";
      if (score >= 5) rating = "NOT BAD";
      if (score >= 15) rating = "GREAT";
      if (score >= 25) rating = "AMAZING";
      if (score >= 40) rating = "LEGENDARY";
      textCenter(rating, panelY + 56, score >= 15 ? 3 : 2);
      if (deathTimer > 20) {
        const blink = flr(deathTimer / 10) % 2;
        if (blink) { textCenter("PRESS START", panelY + 74, 2); }
      }
    }
  });

  // --- Play Scene ---
  Mono.scene(PLAY, {
    init() {},
    update() {
    titleBobT++;

    if (subState === "ready") {
      bird.y = H / 2 - 23 + sin(titleBobT * 0.08) * 5;
      bird.flapAnim++;
      groundScroll += getSpeed();

      for (const c of clouds) {
        c.x -= c.speed;
        if (c.x < -26) { c.x = W + 14; c.y = 15 + flr(rnd(75)); }
      }

      if (btnp("a") || btnp("up")) {
        subState = "play";
        bird.vy = FLAP_VEL;
        bird.flapAnim = 0;
        flapSound();
      }
      return;
    }

    if (subState === "play") {
      if (btnp("a") || btnp("up")) {
        bird.vy = FLAP_VEL;
        bird.flapAnim = 0;
        flapSound();
      }

      bird.vy += GRAVITY;
      bird.y += bird.vy;
      bird.flapAnim++;

      difficulty = min(score / 8, 5);

      const spd = getSpeed();

      for (let i = pipes.length - 1; i >= 0; i--) {
        pipes[i].x -= spd;
        if (!passedPipeIds.has(pipes[i].id) && pipes[i].x + PIPE_W / 2 < BIRD_X) {
          passedPipeIds.add(pipes[i].id);
          score++;
          scoreSound();
          scorePopups.push({ x: BIRD_X + 16, y: bird.y - 4, life: 25 });
        }
        if (pipes[i].x < -PIPE_W - 10) {
          pipes.splice(i, 1);
          spawnPipe(pipes.length > 0 ? pipes[pipes.length - 1].x + PIPE_SPACING : W + 40);
        }
      }

      groundScroll += spd;

      for (const c of clouds) {
        c.x -= c.speed + spd * 0.1;
        if (c.x < -26) { c.x = W + 14; c.y = 15 + flr(rnd(75)); }
      }

      if (checkCollision()) {
        subState = "dying";
        bird.alive = false;
        deathTimer = 0;
        flashTimer = 3;
        hitSound();
        deathSound();
        spawnDeathParticles();
        if (score > bestScore) {
          bestScore = score;
          setTimeout(bestScoreSound, 600);
        }
      }
      return;
    }

    if (subState === "dying") {
      deathTimer++;
      if (flashTimer > 0) flashTimer--;

      if (bird.y < GROUND_Y - 16) {
        bird.vy += GRAVITY * 0.8;
        bird.y += bird.vy;
      } else {
        bird.y = GROUND_Y - 16;
        bird.vy = 0;
      }

      for (let i = particles.length - 1; i >= 0; i--) {
        const p = particles[i];
        p.x += p.vx; p.y += p.vy; p.vy += 0.1; p.life--;
        if (p.life <= 0) particles.splice(i, 1);
      }

      if (deathTimer > 40 && (btnp("start") || btnp("a"))) {
        Mono.go(GAMEOVER); return;
      }
      return;
    }
    },
    draw() {
    cls(0);
    rectf(0, 0, W, 60, 0);
    rectf(0, 60, W, 60, 0);
    for (let y = 98; y < 128; y++) {
      for (let x = 0; x < W; x++) {
        if ((x + y) % 3 === 0) pix(x, y, 1);
      }
    }
    rectf(0, 128, W, GROUND_Y - 128, 1);
    drawClouds();

    if (subState === "ready") {
      for (const p of pipes) drawPipe(p);
      drawGround();
      drawBird();
      rectf(W/2 - 40, 60, 80, 21, 0);
      rect(W/2 - 40, 60, 80, 21, 2);
      textBigCenter("GET READY", 63, 3);
      textCenter("PRESS Z TO FLAP", 77, 2);
      textBigCenter("" + score, 23, 3);
      return;
    }

    if (subState === "play") {
      for (const p of pipes) drawPipe(p);
      drawGround();
      for (const p of particles) { pix(flr(p.x), flr(p.y), p.color); }
      drawBird();
      drawScorePopup();
      const scoreStr = "" + score;
      textBig(scoreStr, flr((W - textBigWidth(scoreStr)) / 2) + 1, 16, 0);
      textBigCenter(scoreStr, 15, 3);
      return;
    }

    if (subState === "dying") {
      if (flashTimer > 0 && flashTimer % 2 === 1) {
        cls(3);
      } else {
        for (const p of pipes) drawPipe(p);
        drawGround();
      }
      for (const p of particles) {
        pix(flr(p.x), flr(p.y), p.color);
        pix(flr(p.x)+1, flr(p.y), p.color);
      }
      drawBird();
      const scoreStr = "" + score;
      textBig(scoreStr, flr((W - textBigWidth(scoreStr)) / 2) + 1, 16, 0);
      textBigCenter(scoreStr, 15, 3);
      return;
    }
    }
  });

  Mono.go(TITLE);
  Mono.boot("screen");
})();
</script>
</body>
