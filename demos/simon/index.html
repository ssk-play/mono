<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mono — Demo: Simon</title>
<link rel="stylesheet" href="../../runtime/mono.css">
</head>
<body>
<div id="frame">
  <canvas id="screen"></canvas>
</div>
<div id="controls">
  <span>ARROWS</span> SELECT
</div>
<script src="../../runtime/engine.js"></script>
<script>
(() => {
  "use strict";
  const W = Mono.WIDTH, H = Mono.HEIGHT;
  const { cls, pix, line, rect, rectf, circ, circf, sprite: defSprite,
          spr, sprT, text, btn, btnp, note, stop, rnd, flr, abs: _abs,
          min, max: _max, sin, cos, dbg, dbgC } = Mono;

  // --- 8->16 upscaler ---
  function up(d){let o="";for(let r=0;r<8;r++){let row="";for(let c=0;c<8;c++){const ch=d[r*8+c];row+=ch+ch;}o+=row+row;}return o;}

  // --- Sprites (8x8 art, upscaled to 16x16) ---
  // 1: Up arrow
  defSprite(1, up(
    "00030000" +
    "00333000" +
    "03333300" +
    "00030000" +
    "00030000" +
    "00030000" +
    "00030000" +
    "00000000"
  ));
  // 2: Down arrow
  defSprite(2, up(
    "00000000" +
    "00030000" +
    "00030000" +
    "00030000" +
    "00030000" +
    "03333300" +
    "00333000" +
    "00030000"
  ));
  // 3: Left arrow
  defSprite(3, up(
    "00000000" +
    "00030000" +
    "00300000" +
    "03333300" +
    "00300000" +
    "00030000" +
    "00000000" +
    "00000000"
  ));
  // 4: Right arrow
  defSprite(4, up(
    "00000000" +
    "00030000" +
    "00003000" +
    "03333300" +
    "00003000" +
    "00030000" +
    "00000000" +
    "00000000"
  ));
  // 5: Center circle decoration
  defSprite(5, up(
    "00111100" +
    "01222210" +
    "12233221" +
    "12332321" +
    "12323221" +
    "12222210" +
    "01222100" +
    "00111100"
  ));
  // 6: Star/sparkle for success
  defSprite(6, up(
    "00030000" +
    "00030000" +
    "03000300" +
    "00333000" +
    "03000300" +
    "00030000" +
    "00030000" +
    "00000000"
  ));
  // 7: X mark for failure
  defSprite(7, up(
    "00000000" +
    "30000030" +
    "03000300" +
    "00333000" +
    "03000300" +
    "30000030" +
    "00000000" +
    "00000000"
  ));

  // --- Game constants ---
  const CX = W / 2;       // 160 center
  const CY = 110;         // center of quadrant area
  const QRAD = 38;        // quadrant circle radius
  const QDIST = 52;       // distance from center to quadrant center

  // Quadrant definitions: 0=up, 1=down, 2=left, 3=right
  // Positions as circle centers relative to CX,CY
  const QUADS = [
    { key: "up",    note: "E5",  label: "UP",    dx: 0,      dy: -QDIST },
    { key: "down",  note: "C4",  label: "DOWN",  dx: 0,      dy:  QDIST },
    { key: "left",  note: "G4",  label: "LEFT",  dx: -QDIST, dy: 0      },
    { key: "right", note: "A4",  label: "RIGHT", dx:  QDIST, dy: 0      },
  ];

  // Quadrant shade pairs [dim, lit]
  const QUAD_SHADES = [
    { dim: 1, lit: 3 },  // up:    dark -> bright
    { dim: 1, lit: 2 },  // down:  dark -> medium
    { dim: 2, lit: 3 },  // left:  medium -> bright
    { dim: 1, lit: 2 },  // right: dark -> medium
  ];

  const QUAD_KEYS = ["up", "down", "left", "right"];

  // --- Game state ---
  const { TITLE, PLAY, GAMEOVER } = Mono.SCENE;
  let sequence = [];
  let seqIndex = 0;
  let round = 0;
  let bestScore = 0;
  let phase = "idle";     // "showing" | "input" | "success" | "fail" | "idle"

  // Timing
  let showTimer = 0;
  let showIndex = 0;
  let showGap = 0;
  let litQuad = -1;
  let litTimer = 0;
  let successTimer = 0;
  let failTimer = 0;
  let inputLitTimer = 0;
  let inputLitQuad = -1;

  // Animation
  let titlePulse = 0;
  let pulsePhase = 0;     // for circle pulse effect

  // Speed: frames per flash (decreases with level)
  function flashDuration() { return _max(6, 15 - flr(round / 3)); }
  function gapDuration()   { return _max(4, 10 - flr(round / 4)); }

  // Font metrics
  const FONT_W = 4, FONT_H = 7;

  // Center text helper
  function textCentered(str, y, c) {
    const w = str.length * (FONT_W + 1) - 1;
    text(str, flr(CX - w / 2), y, c);
  }

  // --- Circle collision: check if point is inside quadrant circle ---
  function pointInQuadCircle(px, py, q) {
    const qx = CX + QUADS[q].dx;
    const qy = CY + QUADS[q].dy;
    const dx = px - qx;
    const dy = py - qy;
    return dx * dx + dy * dy <= QRAD * QRAD;
  }

  // --- Circle-circle collision (for future extensibility) ---
  function circlesOverlap(x1, y1, r1, x2, y2, r2) {
    const dx = x2 - x1;
    const dy = y2 - y1;
    const dist2 = dx * dx + dy * dy;
    const rSum = r1 + r2;
    return dist2 <= rSum * rSum;
  }

  // --- Reset / Rounds ---
  function resetGame() {
    sequence = [];
    seqIndex = 0;
    round = 0;
    phase = "idle";
    litQuad = -1;
    litTimer = 0;
    inputLitQuad = -1;
    inputLitTimer = 0;
    pulsePhase = 0;
    nextRound();
  }

  function nextRound() {
    round++;
    sequence.push(flr(rnd(4)));
    phase = "showing";
    showIndex = 0;
    showTimer = 20;
    showGap = 0;
    litQuad = -1;
    litTimer = 0;
    seqIndex = 0;
  }

  function playQuadTone(q) {
    note(0, QUADS[q].note, 0.15);
  }

  function playErrorTone() {
    note(0, "C3", 0.2);
    note(1, "D#3", 0.2);
  }

  function playSuccessTone() {
    note(0, "C5", 0.08);
    setTimeout(() => note(0, "E5", 0.08), 80);
    setTimeout(() => note(0, "G5", 0.12), 160);
  }

  // --- Draw quadrant as filled circle ---
  function drawQuad(q, isLit) {
    const qx = CX + QUADS[q].dx;
    const qy = CY + QUADS[q].dy;
    const shade = isLit ? QUAD_SHADES[q].lit : QUAD_SHADES[q].dim;
    const borderC = isLit ? 3 : 2;

    // Pulse effect when lit
    let r = QRAD;
    if (isLit) {
      r = QRAD + 2;
    }

    // Filled circle for quadrant
    circf(qx, qy, r, shade);
    circ(qx, qy, r, borderC);

    // Debug: circle hitbox for each quadrant
    dbgC(qx, qy, QRAD);

    // Arrow sprite centered in quadrant
    const arrowX = qx - 8;
    const arrowY = qy - 8;
    sprT(q + 1, arrowX, arrowY - 3);

    // Label below arrow
    const lbl = QUADS[q].label;
    const lblW = lbl.length * (FONT_W + 1) - 1;
    text(lbl, flr(qx - lblW / 2), qy + 8, isLit ? 3 : 2);
  }

  // --- Draw all quadrants ---
  function drawQuadrants() {
    for (let q = 0; q < 4; q++) {
      const isLit = (litQuad === q) || (inputLitQuad === q);
      drawQuad(q, isLit);
    }
    // Center decoration
    sprT(5, CX - 8, CY - 8);
  }

  // --- HUD ---
  function drawHUD() {
    // Top bar background
    rectf(0, 0, W, 16, 0);
    line(0, 16, W, 16, 1);

    // Round number - top left
    text("ROUND " + round, 6, 5, 3);

    // Best score - top right
    const bStr = "BEST " + bestScore;
    const bW = bStr.length * (FONT_W + 1) - 1;
    text(bStr, W - 6 - bW, 5, 2);

    // Bottom bar
    rectf(0, H - 18, W, 18, 0);
    line(0, H - 18, W, H - 18, 1);

    // Sequence length indicator - bottom center
    const seqStr = "LENGTH " + sequence.length;
    const seqW = seqStr.length * (FONT_W + 1) - 1;
    text(seqStr, flr(CX - seqW / 2), H - 14, 2);

    // Progress dots during input phase
    if (phase === "input") {
      const dotY = H - 7;
      const totalDots = sequence.length;
      const dotSpacing = 6;
      const totalW = totalDots * dotSpacing;
      const startX = flr(CX - totalW / 2);
      for (let i = 0; i < totalDots; i++) {
        const c = i < seqIndex ? 3 : 1;
        circf(startX + i * dotSpacing + 2, dotY, 2, c);
        // Debug: progress dot hitboxes
        dbgC(startX + i * dotSpacing + 2, dotY, 2);
      }
    }
  }

  // --- Title screen ---
  function drawTitle() {
    const pulse = flr(titlePulse / 15) % 2;

    // Title text
    textCentered("SIMON", 30, 3);

    // Decorative quadrants - mini version
    const miniCX = CX;
    const miniCY = 82;
    const miniR = 18;
    const miniDist = 26;
    const activeQ = flr(titlePulse / 20) % 4;

    const miniDirs = [
      { dx: 0, dy: -miniDist },
      { dx: 0, dy:  miniDist },
      { dx: -miniDist, dy: 0 },
      { dx:  miniDist, dy: 0 },
    ];

    for (let q = 0; q < 4; q++) {
      const mx = miniCX + miniDirs[q].dx;
      const my = miniCY + miniDirs[q].dy;
      const isActive = (q === activeQ);
      const shade = isActive ? QUAD_SHADES[q].lit : QUAD_SHADES[q].dim;
      const border = isActive ? 3 : 2;

      circf(mx, my, miniR + (isActive ? 1 : 0), shade);
      circ(mx, my, miniR + (isActive ? 1 : 0), border);

      // Mini arrow
      sprT(q + 1, mx - 8, my - 10);
    }

    // Center decoration on title
    sprT(5, miniCX - 8, miniCY - 8);

    // Instructions
    textCentered("REPEAT THE PATTERN", 126, 2);
    textCentered("USE ARROW KEYS", 138, 2);

    if (pulse === 0) {
      textCentered("PRESS START", 166, 3);
    }

    // Best score
    if (bestScore > 0) {
      textCentered("BEST: " + bestScore, 190, 2);
    }
  }

  // --- Game Over screen ---
  function drawGameOver() {
    // Dimmed quadrants
    for (let q = 0; q < 4; q++) {
      const qx = CX + QUADS[q].dx;
      const qy = CY + QUADS[q].dy;
      circf(qx, qy, QRAD, 0);
      circ(qx, qy, QRAD, 1);
    }

    // X mark in center
    sprT(7, CX - 8, CY - 8);

    textCentered("GAME OVER", 28, 3);
    textCentered("ROUND REACHED: " + round, 198, 2);
    textCentered("BEST: " + bestScore, 210, 2);

    const pulse = flr(titlePulse / 15) % 2;
    if (pulse === 0) {
      textCentered("PRESS START", 224, 3);
    }
  }

  // --- Title Scene ---
  Mono.scene(TITLE, {
    init() { titlePulse = 0; },
    update() {
      titlePulse++;
      if (btnp("start") || btnp("a")) {
        resetGame();
        note(0, "C5", 0.08);
        setTimeout(() => note(0, "E5", 0.08), 80);
        Mono.go(PLAY);
      }
    },
    draw() {
      cls(0);
      drawTitle();
    }
  });

  // --- Play Scene ---
  Mono.scene(PLAY, {
    init() { resetGame(); },
    update() {
      titlePulse++;
      pulsePhase += 0.1;

      // Decay input flash
      if (inputLitTimer > 0) {
        inputLitTimer--;
        if (inputLitTimer <= 0) inputLitQuad = -1;
      }

      if (phase === "showing") {
        if (showTimer > 0) { showTimer--; return; }
        if (showGap > 0) { showGap--; litQuad = -1; return; }
        if (showIndex < sequence.length) {
          litQuad = sequence[showIndex];
          litTimer = flashDuration();
          playQuadTone(litQuad);
          showIndex++;
          showTimer = flashDuration();
          showGap = gapDuration();
        } else {
          litQuad = -1;
          phase = "input";
          seqIndex = 0;
        }
        return;
      }

      if (phase === "input") {
        for (let q = 0; q < 4; q++) {
          if (btnp(QUAD_KEYS[q])) {
            inputLitQuad = q;
            inputLitTimer = 6;
            playQuadTone(q);

            if (q === sequence[seqIndex]) {
              seqIndex++;
              if (seqIndex >= sequence.length) {
                phase = "success";
                successTimer = 30;
                playSuccessTone();
              }
            } else {
              phase = "fail";
              failTimer = 90;
              playErrorTone();
              if (round - 1 > bestScore) bestScore = round - 1;
              litQuad = sequence[seqIndex];
              litTimer = 30;
            }
            break;
          }
        }
        return;
      }

      if (phase === "success") {
        successTimer--;
        if (successTimer <= 0) { nextRound(); }
        return;
      }

      if (phase === "fail") {
        litTimer--;
        if (litTimer <= 0) litQuad = -1;
        failTimer--;
        if (failTimer <= 0) {
          failTimer = 30;
          Mono.go(GAMEOVER);
        }
        return;
      }
    },
    draw() {
      cls(0);
      drawQuadrants();
      drawHUD();

      // Phase overlay text in center
      if (phase === "showing") {
        textCentered("WATCH", CY + QDIST + QRAD + 8, 3);
      } else if (phase === "input") {
        textCentered("YOUR TURN", CY + QDIST + QRAD + 8, 2);
      } else if (phase === "success") {
        // Sparkle sprites around center
        const t = flr(titlePulse / 3) % 4;
        const sparkleR = 20;
        for (let i = 0; i < 4; i++) {
          const a = (i / 4) * Math.PI * 2 + pulsePhase;
          const sx = CX + flr(cos(a) * sparkleR) - 8;
          const sy = CY + flr(sin(a) * sparkleR) - 8;
          sprT(6, sx, sy);
        }
        textCentered("CORRECT!", CY + QDIST + QRAD + 8, 3);
      } else if (phase === "fail") {
        if (flr(titlePulse / 4) % 2 === 0) {
          textCentered("WRONG!", CY + QDIST + QRAD + 8, 3);
        }
      }
    }
  });

  // --- Game Over Scene ---
  Mono.scene(GAMEOVER, {
    init() {},
    update() {
      titlePulse++;
      failTimer--;
      if (failTimer <= 0 && (btnp("start") || btnp("a"))) {
        Mono.go(TITLE);
      }
    },
    draw() {
      cls(0);
      drawGameOver();
    }
  });

  Mono.go(TITLE);
  Mono.boot("screen");
})();
</script>
</body>
</html>
