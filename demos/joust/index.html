<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GrayBox — Demo: Joust</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #0a0a0a;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100vh;
    font-family: monospace;
    overflow: hidden;
  }
  #frame {
    background: #111;
    border: 3px solid #333;
    border-radius: 8px;
    padding: 12px;
    box-shadow: 0 0 40px rgba(0,0,0,0.8), inset 0 0 20px rgba(0,0,0,0.5);
  }
  canvas {
    display: block;
    image-rendering: pixelated;
    image-rendering: crisp-edges;
  }
  #controls {
    margin-top: 12px;
    color: #6b6b6b;
    font-size: 11px;
    text-align: center;
    letter-spacing: 1px;
  }
  #controls span { color: #b0b0b0; }
</style>
</head>
<body>
<div id="frame">
  <canvas id="screen"></canvas>
</div>
<div id="controls">
  <span>←→</span> MOVE &nbsp;&nbsp; <span>A</span> FLAP
</div>
<script src="../../runtime/engine.js"></script>
<script>
(() => {
  "use strict";
  const W = GrayBox.WIDTH, H = GrayBox.HEIGHT;
  const { cls, pix, line, rect, rectf, circ, circf, sprite: defSprite,
          spr, sprWrap, text: drawText, btn, btnp, note, stop, rnd, flr,
          abs: _abs, min, max: _max, sin, cos } = GrayBox;

  // --- Sprites ---

  // 1: Player knight on ostrich - facing right, wings up
  defSprite(1,
    "00033000" +
    "00033200" +
    "03333300" +
    "33332300" +
    "03322000" +
    "00322000" +
    "00300300" +
    "00300300"
  );

  // 2: Player knight on ostrich - facing right, wings down
  defSprite(2,
    "00033000" +
    "00033200" +
    "00333300" +
    "00332300" +
    "33322000" +
    "03322000" +
    "00300300" +
    "00300300"
  );

  // 3: Player knight on ostrich - facing right, wings mid (glide)
  defSprite(3,
    "00033000" +
    "00033200" +
    "03333300" +
    "03332300" +
    "03322000" +
    "00322000" +
    "00300300" +
    "00300300"
  );

  // 4: Enemy buzzard rider - facing right, wings up
  defSprite(4,
    "00011000" +
    "00011100" +
    "01111100" +
    "11112100" +
    "01122000" +
    "00122000" +
    "00100100" +
    "00100100"
  );

  // 5: Enemy buzzard rider - facing right, wings down
  defSprite(5,
    "00011000" +
    "00011100" +
    "00111100" +
    "00112100" +
    "11122000" +
    "01122000" +
    "00100100" +
    "00100100"
  );

  // 6: Enemy buzzard rider - facing right, wings mid
  defSprite(6,
    "00011000" +
    "00011100" +
    "01111100" +
    "01112100" +
    "01122000" +
    "00122000" +
    "00100100" +
    "00100100"
  );

  // 7: Egg
  defSprite(7,
    "00000000" +
    "00000000" +
    "00033000" +
    "00322300" +
    "03222230" +
    "03222230" +
    "00322300" +
    "00033000"
  );

  // 8: Hatching egg (cracking)
  defSprite(8,
    "00000000" +
    "00020000" +
    "00233000" +
    "00322300" +
    "02222230" +
    "03222030" +
    "00322300" +
    "00033000"
  );

  // 9: Explosion frame 1
  defSprite(9,
    "00000000" +
    "00200100" +
    "01002000" +
    "00031000" +
    "00130200" +
    "01000010" +
    "00100000" +
    "00000000"
  );

  // 10: Explosion frame 2
  defSprite(10,
    "20010020" +
    "01000010" +
    "00203200" +
    "03033030" +
    "00232000" +
    "01000300" +
    "20001001" +
    "00200010"
  );

  // 11: Platform tile
  defSprite(11,
    "33333333" +
    "22222222" +
    "21212121" +
    "11111111" +
    "00000000" +
    "00000000" +
    "00000000" +
    "00000000"
  );

  // 12: Lava surface (animated frame 1)
  defSprite(12,
    "00000000" +
    "01001010" +
    "10110101" +
    "11111111" +
    "21212121" +
    "12121212" +
    "11111111" +
    "11111111"
  );

  // 13: Lava surface (animated frame 2)
  defSprite(13,
    "00000000" +
    "10010100" +
    "01101011" +
    "11111111" +
    "12121212" +
    "21212121" +
    "11111111" +
    "11111111"
  );

  // 14: Life icon (small knight)
  defSprite(14,
    "00000000" +
    "00033000" +
    "00033200" +
    "03333300" +
    "33332300" +
    "03322000" +
    "00000000" +
    "00000000"
  );

  // 15: Shadow enemy (stronger) - wings up
  defSprite(15,
    "00011000" +
    "00011100" +
    "01111100" +
    "11111100" +
    "01111000" +
    "00111000" +
    "00100100" +
    "00100100"
  );

  // 16: Shadow enemy - wings down
  defSprite(16,
    "00011000" +
    "00011100" +
    "00111100" +
    "00111100" +
    "11111000" +
    "01111000" +
    "00100100" +
    "00100100"
  );

  // --- Platforms ---
  const platforms = [
    // Bottom ground platforms (above lava)
    { x: 0, y: 218, w: 53 },
    { x: 267, y: 218, w: 53 },
    // Mid-low platforms
    { x: 53, y: 188, w: 53 },
    { x: 200, y: 188, w: 53 },
    // Middle platforms
    { x: 113, y: 150, w: 67 },
    { x: 0, y: 135, w: 40 },
    { x: 280, y: 135, w: 40 },
    // Upper platforms
    { x: 40, y: 105, w: 53 },
    { x: 200, y: 98, w: 60 },
    // Top platform
    { x: 120, y: 60, w: 80 },
  ];

  const GRAVITY = 0.18;
  const FLAP_POWER = -2.8;
  const MAX_FALL = 3.5;
  const MOVE_SPEED = 1.8;
  const LAVA_Y = 230;

  // --- Game state ---
  const { TITLE, PLAY, GAMEOVER } = GrayBox.SCENE;
  let player, enemies, eggs, explosions, particles;
  let score, lives, wave, waveTimer, waveMessage, spawnQueue;
  let titleBob;

  function resetGame() {
    player = {
      x: W / 2 - 4, y: 150,
      vx: 0, vy: 0,
      facing: 1,  // 1=right, -1=left
      wingFrame: 0,
      wingTimer: 0,
      invincible: 0,
      onGround: false,
    };
    enemies = [];
    eggs = [];
    explosions = [];
    particles = [];
    score = 0;
    lives = 3;
    wave = 0;
    waveTimer = 0;
    waveMessage = 0;
    spawnQueue = [];
    spawnWave();
  }

  function spawnWave() {
    wave++;
    waveMessage = 90;
    const count = min(2 + wave * 2, 12);
    spawnQueue = [];
    for (let i = 0; i < count; i++) {
      // type: 0=normal, 1=shadow (stronger, from wave 3+)
      const type = (wave >= 3 && rnd(1) < 0.3) ? 1 : 0;
      spawnQueue.push({ type, delay: i * 40 + flr(rnd(20)) });
    }
    waveTimer = 0;
  }

  function spawnEnemy(type) {
    // Spawn from top edges
    const side = rnd(1) < 0.5 ? -1 : 1;
    const ex = side < 0 ? -8 : W;
    const ey = 8 + rnd(45);
    enemies.push({
      x: ex, y: ey,
      vx: side < 0 ? 1.5 + rnd(1) : -(1.5 + rnd(1)),
      vy: -0.5 + rnd(1),
      facing: side < 0 ? 1 : -1,
      type: type, // 0=bounder, 1=shadow
      wingFrame: 0,
      wingTimer: 0,
      flapTimer: 15 + flr(rnd(20)),
      alive: true,
      targetY: 60 + rnd(135),
      aiTimer: 0,
    });
  }

  function addExplosion(x, y) {
    explosions.push({ x, y, timer: 12 });
    for (let i = 0; i < 8; i++)
      particles.push({
        x: x + 4, y: y + 4,
        vx: rnd(4) - 2, vy: rnd(4) - 2,
        life: 6 + flr(rnd(10)),
        color: flr(rnd(3)) + 1
      });
  }

  // --- Sounds ---
  function flapSound() { note(0, "E5", 0.03); }
  function hitSound() { note(1, "C3", 0.06); setTimeout(() => note(1, "E3", 0.05), 40); }
  function collectSound() { note(0, "G5", 0.05); setTimeout(() => note(0, "C6", 0.08), 50); }
  function deathSound() {
    note(0, "C3", 0.12); note(1, "G2", 0.12);
    setTimeout(() => { note(0, "A2", 0.18); note(1, "E2", 0.18); }, 120);
  }
  function waveClearSound() {
    note(0, "C5", 0.1);
    setTimeout(() => note(0, "E5", 0.1), 100);
    setTimeout(() => note(0, "G5", 0.1), 200);
    setTimeout(() => note(0, "C6", 0.15), 300);
  }
  function lavaSound() { note(1, "A2", 0.15); note(0, "D2", 0.2); }

  // --- Platform collision ---
  function checkPlatformCollision(ent) {
    ent.onGround = false;
    if (ent.vy < 0) return; // moving up, skip
    for (const p of platforms) {
      if (ent.x + 6 > p.x && ent.x + 2 < p.x + p.w &&
          ent.y + 8 > p.y && ent.y + 8 < p.y + 6 && ent.vy >= 0) {
        ent.y = p.y - 8;
        ent.vy = 0;
        ent.onGround = true;
        return;
      }
    }
  }

  // --- Wrap horizontally ---
  function wrapX(ent) {
    if (ent.x < -8) ent.x += W + 8;
    if (ent.x > W) ent.x -= W + 8;
  }

  // --- Title Scene ---
  GrayBox.scene(TITLE, {
    init() { resetGame(); },
    update() {
      if (btnp("a") || btnp("a")) {
        resetGame();
        note(0, "C5", 0.1);
        setTimeout(() => note(0, "E5", 0.1), 100);
        setTimeout(() => note(0, "G5", 0.15), 200);
        GrayBox.go(PLAY); return;
      }
    },
    draw() {
      cls(0);
      const lavaFrame = flr(GrayBox.frame / 8) % 2;
      drawPlatforms();
      drawLava(lavaFrame);
      const ty = 38 + sin(GrayBox.frame * 0.05) * 4;
      drawText("JOUST", 137, flr(ty) + 1, 1);
      drawText("JOUST", 136, flr(ty), 3);
      rectf(123, flr(ty) + 10, 73, 1, 2);
      const px = 133 + sin(GrayBox.frame * 0.04) * 27;
      const py = 75 + sin(GrayBox.frame * 0.06) * 11;
      const wf = flr(GrayBox.frame / 6) % 3;
      const sprId = wf === 0 ? 1 : wf === 1 ? 2 : 3;
      spr(sprId, flr(px), flr(py));
      const ex = 187 - sin(GrayBox.frame * 0.04) * 27;
      const ey = 79 + sin(GrayBox.frame * 0.06 + 2) * 11;
      const ef = flr(GrayBox.frame / 6) % 3;
      const esprId = ef === 0 ? 4 : ef === 1 ? 5 : 6;
      spr(esprId, flr(ex), flr(ey), true);
      if (flr(GrayBox.frame / 20) % 2 === 0) drawText("PRESS FLAP TO START", 112, 128, 3);
      drawText("DEFEAT ENEMY KNIGHTS", 110, 150, 2);
      drawText("HIGHER LANCE WINS", 117, 159, 2);
      drawText("COLLECT EGGS FOR POINTS", 102, 168, 2);
      drawText("BEWARE THE LAVA", 122, 177, 2);
      drawText("GRAYBOX DEMO V0.1", 117, 229, 1);
    }
  });

  // --- Game Over Scene ---
  GrayBox.scene(GAMEOVER, {
    init() {},
    update() {
      for (let i = particles.length - 1; i >= 0; i--) {
        const p = particles[i]; p.x += p.vx; p.y += p.vy; p.vy += 0.08; p.life--;
        if (p.life <= 0) particles.splice(i, 1);
      }
      if (btnp("a") || btnp("a")) { GrayBox.go(TITLE); return; }
    },
    draw() {
      cls(0);
      const lavaFrame = flr(GrayBox.frame / 8) % 2;
      drawPlatforms();
      drawLava(lavaFrame);
      for (const p of particles) pix(flr(p.x), flr(p.y), p.color);
      drawText("GAME OVER", 137, 75, 3);
      drawText("SCORE: " + score, 130, 94, 2);
      drawText("WAVE: " + wave, 138, 105, 2);
      if (flr(GrayBox.frame / 20) % 2 === 0) drawText("PRESS FLAP TO CONTINUE", 105, 135, 3);
    }
  });

  // --- Play Scene ---
  GrayBox.scene(PLAY, {
    init() {},
    update() {
    // --- Play state ---

    // Wave message timer
    if (waveMessage > 0) waveMessage--;

    // Spawn queue
    for (let i = spawnQueue.length - 1; i >= 0; i--) {
      spawnQueue[i].delay--;
      if (spawnQueue[i].delay <= 0) {
        spawnEnemy(spawnQueue[i].type);
        spawnQueue.splice(i, 1);
      }
    }

    // --- Player movement ---
    if (player.invincible > 0) player.invincible--;

    // Horizontal movement
    if (btn("left")) { player.vx = -MOVE_SPEED; player.facing = -1; }
    else if (btn("right")) { player.vx = MOVE_SPEED; player.facing = 1; }
    else { player.vx *= 0.85; } // friction

    // Flap
    if (btnp("a")) {
      player.vy = FLAP_POWER;
      player.wingFrame = 1;
      player.wingTimer = 6;
      flapSound();
    }

    // Gravity
    player.vy += GRAVITY;
    if (player.vy > MAX_FALL) player.vy = MAX_FALL;

    // Apply velocity
    player.x += player.vx;
    player.y += player.vy;

    // Wing animation
    if (player.wingTimer > 0) {
      player.wingTimer--;
      if (player.wingTimer <= 0) player.wingFrame = 0;
    }
    if (player.vy < -0.5) player.wingFrame = 1; // wings up when ascending
    else if (player.vy > 1) player.wingFrame = 2; // wings down when falling
    else if (player.onGround) player.wingFrame = 0;

    // Wrap screen
    wrapX(player);

    // Platform collision
    checkPlatformCollision(player);

    // Ceiling
    if (player.y < 9) { player.y = 9; player.vy = 0.5; }

    // Lava death
    if (player.y + 8 > LAVA_Y) {
      lives--;
      addExplosion(player.x, LAVA_Y - 10);
      lavaSound();
      player.x = W / 2 - 4;
      player.y = 45;
      player.vx = 0;
      player.vy = 0;
      player.invincible = 60;
      if (lives <= 0) { addExplosion(player.x, player.y); GrayBox.go(GAMEOVER); return; }
    }

    // --- Enemy AI ---
    for (let i = enemies.length - 1; i >= 0; i--) {
      const e = enemies[i];

      // AI: flap to maintain target altitude, move toward player
      e.flapTimer--;
      if (e.flapTimer <= 0) {
        // Flap if below target or below player
        if (e.y > e.targetY || e.y > player.y - 20) {
          e.vy = FLAP_POWER * 0.8;
          e.wingFrame = 1;
          e.wingTimer = 6;
        }
        e.flapTimer = 10 + flr(rnd(15));
      }

      // Adjust target occasionally
      e.aiTimer++;
      if (e.aiTimer > 60) {
        e.aiTimer = 0;
        e.targetY = 45 + rnd(150);
        // Chase player horizontally
        if (rnd(1) < 0.6) {
          const dir = player.x > e.x ? 1 : -1;
          e.vx = dir * (1.0 + rnd(1.0) + wave * 0.1);
          e.facing = dir;
        }
      }

      // Gravity
      e.vy += GRAVITY;
      if (e.vy > MAX_FALL) e.vy = MAX_FALL;

      // Apply velocity
      e.x += e.vx;
      e.y += e.vy;

      // Wing animation
      if (e.wingTimer > 0) {
        e.wingTimer--;
        if (e.wingTimer <= 0) e.wingFrame = 0;
      }
      if (e.vy < -0.5) e.wingFrame = 1;
      else if (e.vy > 1) e.wingFrame = 2;

      // Wrap
      wrapX(e);

      // Platform collision
      checkPlatformCollision(e);

      // Lava death for enemies
      if (e.y + 8 > LAVA_Y) {
        addExplosion(e.x, LAVA_Y - 10);
        score += 50;
        enemies.splice(i, 1);
        hitSound();
        continue;
      }

      // Player-enemy collision
      if (player.invincible <= 0) {
        const dx = player.x - e.x;
        const dy = player.y - e.y;
        // Check overlap (roughly 6x6 hitbox centered)
        if (_abs(dx) < 7 && _abs(dy) < 8) {
          // Jousting: whoever is higher (lower y) with downward momentum wins
          // Also: player lance tip is at top, so if player is above enemy = win
          const playerTop = player.y;
          const enemyTop = e.y;

          if (playerTop < enemyTop - 2) {
            // Player wins!
            addExplosion(e.x, e.y);
            const pts = e.type === 1 ? 300 : 150;
            score += pts;
            hitSound();
            // Drop egg
            eggs.push({
              x: e.x, y: e.y,
              vx: e.vx * 0.3,
              vy: -1,
              hatchTimer: 300 + flr(rnd(150)), // time before hatching
              onGround: false,
              hatching: false,
              type: e.type,
            });
            enemies.splice(i, 1);
            // Bounce player up
            player.vy = -2;
          } else if (enemyTop < playerTop - 2) {
            // Enemy wins!
            lives--;
            addExplosion(player.x, player.y);
            deathSound();
            player.x = W / 2 - 4;
            player.y = 45;
            player.vx = 0;
            player.vy = 0;
            player.invincible = 60;
            if (lives <= 0) { addExplosion(player.x, player.y); GrayBox.go(GAMEOVER); return; }
          } else {
            // Tie - bounce apart
            player.vx = dx > 0 ? 2 : -2;
            e.vx = dx > 0 ? -2 : 2;
            player.vy = -1.5;
            e.vy = -1.5;
          }
        }
      }
    }

    // --- Eggs ---
    for (let i = eggs.length - 1; i >= 0; i--) {
      const eg = eggs[i];

      // Gravity
      eg.vy += GRAVITY;
      if (eg.vy > MAX_FALL) eg.vy = MAX_FALL;
      eg.x += eg.vx;
      eg.y += eg.vy;
      eg.vx *= 0.95;

      // Platform collision for eggs
      eg.onGround = false;
      if (eg.vy >= 0) {
        for (const p of platforms) {
          if (eg.x + 6 > p.x && eg.x + 2 < p.x + p.w &&
              eg.y + 8 > p.y && eg.y + 8 < p.y + 6) {
            eg.y = p.y - 8;
            eg.vy = 0;
            eg.vx = 0;
            eg.onGround = true;
            break;
          }
        }
      }

      // Lava
      if (eg.y + 8 > LAVA_Y) {
        eggs.splice(i, 1);
        continue;
      }

      wrapX(eg);

      // Hatch timer
      eg.hatchTimer--;
      if (eg.hatchTimer < 60) eg.hatching = true;
      if (eg.hatchTimer <= 0) {
        // Hatch into new enemy!
        spawnEnemy(eg.type);
        eggs.splice(i, 1);
        continue;
      }

      // Player collects egg
      if (_abs(player.x - eg.x) < 8 && _abs(player.y - eg.y) < 8) {
        score += 250;
        collectSound();
        // Small sparkle particles
        for (let p = 0; p < 5; p++)
          particles.push({
            x: eg.x + 4, y: eg.y + 4,
            vx: rnd(3) - 1.5, vy: rnd(3) - 1.5,
            life: 8 + flr(rnd(6)),
            color: 3
          });
        eggs.splice(i, 1);
      }
    }

    // Explosions
    for (let i = explosions.length - 1; i >= 0; i--) {
      explosions[i].timer--;
      if (explosions[i].timer <= 0) explosions.splice(i, 1);
    }

    // Particles
    for (let i = particles.length - 1; i >= 0; i--) {
      const p = particles[i];
      p.x += p.vx; p.y += p.vy; p.vy += 0.05; p.life--;
      if (p.life <= 0) particles.splice(i, 1);
    }

    // Wave clear check
    if (enemies.length === 0 && eggs.length === 0 && spawnQueue.length === 0) {
      waveTimer++;
      if (waveTimer === 1) waveClearSound();
      if (waveTimer > 90) {
        waveTimer = 0;
        spawnWave();
      }
    }
    },
    draw() {
    cls(0);
    const lavaFrame = flr(GrayBox.frame / 8) % 2;

    drawPlatforms();
    drawLava(lavaFrame);

    for (const eg of eggs) {
      if (eg.hatching && flr(GrayBox.frame / 4) % 2 === 0) {
        sprWrap(8, flr(eg.x), flr(eg.y));
      } else {
        sprWrap(7, flr(eg.x), flr(eg.y));
      }
    }

    for (const e of enemies) {
      let sprBase;
      if (e.type === 1) {
        sprBase = e.wingFrame === 1 ? 15 : 16;
      } else {
        sprBase = e.wingFrame === 1 ? 4 : e.wingFrame === 2 ? 5 : 6;
      }
      const flip = e.facing < 0;
      sprWrap(sprBase, flr(e.x), flr(e.y), flip);
    }

    if (player.invincible <= 0 || flr(GrayBox.frame / 3) % 2 === 0) {
      const sprBase = player.wingFrame === 1 ? 1 : player.wingFrame === 2 ? 2 : 3;
      const flip = player.facing < 0;
      sprWrap(sprBase, flr(player.x), flr(player.y), flip);
    }

    for (const e of explosions) {
      const sprId = e.timer > 6 ? 9 : 10;
      spr(sprId, flr(e.x), flr(e.y));
    }

    for (const p of particles) pix(flr(p.x), flr(p.y), p.color);

    rectf(0, 0, W, 12, 0);
    drawText("SCORE:" + score, 4, 3, 3);
    drawText("WAVE:" + wave, W / 2 - 25, 3, 2);
    for (let i = 0; i < lives; i++) spr(14, W - 36 + i * 10, 2);

    if (waveMessage > 0) {
      const msgY = 30 + sin(waveMessage * 0.1) * 3;
      drawText("WAVE " + wave, 140, flr(msgY), 3);
      if (waveMessage > 60) drawText("GET READY!", 135, flr(msgY) + 12, 2);
    }
    }
  });

  function drawPlatforms() {
    for (const p of platforms) {
      const tiles = Math.ceil(p.w / 8);
      for (let t = 0; t < tiles; t++) {
        spr(11, p.x + t * 8, p.y);
      }
    }
  }

  function drawLava(frame) {
    const sprId = frame === 0 ? 12 : 13;
    // Lava surface
    for (let x = 0; x < W; x += 8) {
      spr(sprId, x, LAVA_Y);
    }
    // Lava body below surface
    rectf(0, LAVA_Y + 4, W, H - LAVA_Y - 4, 1);
    // Lava glow particles
    if (flr(GrayBox.frame / 4) % 3 === 0) {
      const gx = flr(rnd(W));
      pix(gx, LAVA_Y - 1, 2);
    }
  }

  GrayBox.go(TITLE);
  GrayBox.boot("screen");
})();
</script>
