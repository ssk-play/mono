<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GrayBox — Demo: Tower Defense</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #0a0a0a;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100vh;
    font-family: monospace;
    overflow: hidden;
  }
  #frame {
    background: #111;
    border: 3px solid #333;
    border-radius: 8px;
    padding: 12px;
    box-shadow: 0 0 40px rgba(0,0,0,0.8), inset 0 0 20px rgba(0,0,0,0.5);
  }
  canvas {
    display: block;
    image-rendering: pixelated;
    image-rendering: crisp-edges;
  }
  #controls {
    margin-top: 12px;
    color: #6b6b6b;
    font-size: 11px;
    text-align: center;
    letter-spacing: 1px;
  }
  #controls span { color: #b0b0b0; }
</style>
</head>
<body>
<div id="frame">
  <canvas id="screen"></canvas>
</div>
<div id="controls">
  <span>ARROWS</span> CURSOR &nbsp;&nbsp; <span>Z</span> PLACE TOWER &nbsp;&nbsp; <span>X</span> CYCLE TYPE &nbsp;&nbsp; <span>ENTER</span> START
</div>
<script>
(() => {
  "use strict";

  // ============================================================
  // GrayBox Runtime (inline)
  // ============================================================
  const W = 320;
  const H = 240;
  const FPS = 30;
  const COLORS = ["#1a1a1a", "#6b6b6b", "#b0b0b0", "#e8e8e8"];
  const canvas = document.getElementById("screen");
  canvas.width = W;
  canvas.height = H;
  function fitCanvas() {
    var maxW = window.innerWidth - 40;
    var maxH = window.innerHeight - 60;
    var s = Math.min(maxW / W, maxH / H);
    canvas.style.width = (W * s) + "px";
    canvas.style.height = (H * s) + "px";
  }
  fitCanvas();
  window.addEventListener("resize", fitCanvas);
  const ctx = canvas.getContext("2d");
  ctx.imageSmoothingEnabled = false;
  const buf = ctx.createImageData(W, H);
  const buf32 = new Uint32Array(buf.data.buffer);

  function hexToABGR(hex) {
    const r = parseInt(hex.slice(1, 3), 16);
    const g = parseInt(hex.slice(3, 5), 16);
    const b = parseInt(hex.slice(5, 7), 16);
    return (255 << 24) | (b << 16) | (g << 8) | r;
  }
  const COLOR_U32 = COLORS.map(hexToABGR);

  const sprites = {};
  const tilemap = {};

  const keyMap = {
    "ArrowUp": "up", "ArrowDown": "down", "ArrowLeft": "left", "ArrowRight": "right",
    "w": "up", "s": "down", "a": "left", "d": "right", "ㅈ": "up", "ㄴ": "down", "ㅁ": "left", "ㅇ": "right",
    "z": "a", "Z": "a", "x": "b", "X": "b", "ㅋ": "a", "ㅌ": "b",
    "Enter": "a", " ": "a"
  };
  const keys = {};
  const keysPrev = {};

  document.addEventListener("keydown", e => {
    const k = keyMap[e.key];
    if (k) { keys[k] = true; e.preventDefault(); }
  });
  document.addEventListener("keyup", e => {
    const k = keyMap[e.key];
    if (k) { keys[k] = false; e.preventDefault(); }
  });

  let audioCtx = null;
  const channels = [null, null];
  const channelGains = [null, null];
  function ensureAudio() {
    if (!audioCtx) {
      audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      for (let i = 0; i < 2; i++) {
        channelGains[i] = audioCtx.createGain();
        channelGains[i].gain.value = 0.15;
        channelGains[i].connect(audioCtx.destination);
      }
    }
  }

  const NOTE_NAMES = ["C","C#","D","D#","E","F","F#","G","G#","A","A#","B"];
  function noteToFreq(noteStr) {
    const match = noteStr.match(/^([A-G]#?)(\d)$/);
    if (!match) return 440;
    const name = match[1];
    const octave = parseInt(match[2]);
    const semitone = NOTE_NAMES.indexOf(name);
    if (semitone === -1) return 440;
    const midi = (octave + 1) * 12 + semitone;
    return 440 * Math.pow(2, (midi - 69) / 12);
  }

  const FONT_W = 4;
  const FONT_H = 7;
  const FONT = {};
  const fontData = {
    "A":"0110100110011111100110011001","B":"1110100110101110100110011110",
    "C":"0110100110001000100001100110","D":"1100101010011001100110101100",
    "E":"1111100010001110100010001111","F":"1111100010001110100010001000",
    "G":"0111100010001011100101100111","H":"1001100110011111100110011001",
    "I":"1110010001000100010001001110","J":"0111001000100010001010100100",
    "K":"1001101011001100101010011001","L":"1000100010001000100010001111",
    "M":"1001111111011001100110011001","N":"1001110111011001100110011001",
    "O":"0110100110011001100110010110","P":"1110100110011110100010001000",
    "Q":"0110100110011001101101100001","R":"1110100110011110101010011001",
    "S":"0111100010000110000110001110","T":"1111001000100010001000100010",
    "U":"1001100110011001100110010110","V":"1001100110011001100101100110",
    "W":"1001100110011001101111011001","X":"1001100101100110011010011001",
    "Y":"1001100101100010001000100010","Z":"1111000100100100100010001111",
    "0":"0110100111011011101110010110","1":"0100110001000100010001001110",
    "2":"0110100100010010010010001111","3":"1110000100010110000110011110",
    "4":"1001100110011111000100010001","5":"1111100010001110000100011110",
    "6":"0110100010001110100110010110","7":"1111000100010010010001001000",
    "8":"0110100110010110100110010110","9":"0110100110010111000100010110",
    " ":"0000000000000000000000000000",
    ".":"0000000000000000000001000100",
    ",":"0000000000000000001000101000",
    "!":"0100010001000100000000000100",
    "?":"0110100100010010000000000010",
    "-":"0000000000001110000000000000",
    "+":"0000001001001110010000100000",
    ":":"0000010001000000010001000000",
    "/":"0001000100100010010010001000",
    "*":"0000101001001110010010100000",
    "#":"0101111101011111010100000000",
    "(":"0010010010001000010001000010",
    ")":"0100001000010001000100100100",
    "=":"0000000011110000111100000000",
    "'":"0100010010000000000000000000",
    "\"":"1010101000000000000000000000",
    "<":"0010010010001000010000100010",
    ">":"1000010000100001001001001000",
    "_":"0000000000000000000000001111",
  };
  for (const [ch, bits] of Object.entries(fontData)) {
    FONT[ch] = [];
    for (let i = 0; i < bits.length; i++) FONT[ch].push(parseInt(bits[i]));
  }

  const API = {};
  API._init = null;
  API._update = null;
  API._draw = null;
  API.frame = 0;

  API.cls = function(c = 0) { buf32.fill(COLOR_U32[c] || COLOR_U32[0]); };
  API.pix = function(x, y, c) {
    x = Math.floor(x); y = Math.floor(y);
    if (x < 0 || x >= W || y < 0 || y >= H) return;
    buf32[y * W + x] = COLOR_U32[c] || COLOR_U32[0];
  };
  API.line = function(x0, y0, x1, y1, c) {
    x0=Math.floor(x0); y0=Math.floor(y0); x1=Math.floor(x1); y1=Math.floor(y1);
    const dx=Math.abs(x1-x0), dy=Math.abs(y1-y0);
    const sx=x0<x1?1:-1, sy=y0<y1?1:-1;
    let err=dx-dy;
    while(true) {
      API.pix(x0,y0,c);
      if(x0===x1&&y0===y1) break;
      const e2=2*err;
      if(e2>-dy){err-=dy;x0+=sx;}
      if(e2<dx){err+=dx;y0+=sy;}
    }
  };
  API.rect = function(x,y,w,h,c) {
    API.line(x,y,x+w-1,y,c); API.line(x+w-1,y,x+w-1,y+h-1,c);
    API.line(x+w-1,y+h-1,x,y+h-1,c); API.line(x,y+h-1,x,y,c);
  };
  API.rectf = function(x,y,w,h,c) {
    x=Math.floor(x); y=Math.floor(y);
    const col=COLOR_U32[c]||COLOR_U32[0];
    for(let py=Math.max(0,y);py<Math.min(H,y+h);py++)
      for(let px=Math.max(0,x);px<Math.min(W,x+w);px++)
        buf32[py*W+px]=col;
  };
  API.circ = function(cx,cy,r,c) {
    let x=r,y=0,d=1-r; cx=Math.floor(cx); cy=Math.floor(cy);
    while(x>=y){
      API.pix(cx+x,cy+y,c);API.pix(cx-x,cy+y,c);
      API.pix(cx+x,cy-y,c);API.pix(cx-x,cy-y,c);
      API.pix(cx+y,cy+x,c);API.pix(cx-y,cy+x,c);
      API.pix(cx+y,cy-x,c);API.pix(cx-y,cy-x,c);
      y++; if(d<0){d+=2*y+1;}else{x--;d+=2*(y-x)+1;}
    }
  };
  API.circf = function(cx,cy,r,c) {
    cx=Math.floor(cx); cy=Math.floor(cy);
    const col=COLOR_U32[c]||COLOR_U32[0]; const r2=r*r;
    for(let py=-r;py<=r;py++) for(let px=-r;px<=r;px++)
      if(px*px+py*py<=r2){ const sx=cx+px,sy=cy+py;
        if(sx>=0&&sx<W&&sy>=0&&sy<H) buf32[sy*W+sx]=col; }
  };
  API.sprite = function(id, data) {
    const arr = new Uint8Array(64); let i = 0;
    for (const ch of data) { if (ch>='0'&&ch<='3') { arr[i++]=parseInt(ch); if(i>=64) break; } }
    sprites[id] = arr;
  };
  API.spr = function(id, x, y, flipX, flipY) {
    const s=sprites[id]; if(!s) return;
    x=Math.floor(x); y=Math.floor(y);
    for(let py=0;py<8;py++) for(let px=0;px<8;px++){
      const sx=flipX?7-px:px, sy=flipY?7-py:py;
      const c=s[sy*8+sx], dx=x+px, dy=y+py;
      if(dx>=0&&dx<W&&dy>=0&&dy<H) buf32[dy*W+dx]=COLOR_U32[c];
    }
  };
  API.text = function(str, x, y, c) {
    str=String(str).toUpperCase(); let cx=Math.floor(x); const cy=Math.floor(y);
    const col=COLOR_U32[c]||COLOR_U32[3];
    for(const ch of str){
      const glyph=FONT[ch];
      if(glyph) for(let py=0;py<FONT_H;py++) for(let px=0;px<FONT_W;px++)
        if(glyph[py*FONT_W+px]){ const dx=cx+px,dy=cy+py;
          if(dx>=0&&dx<W&&dy>=0&&dy<H) buf32[dy*W+dx]=col; }
      cx+=FONT_W+1;
    }
  };
  API.mget = function(cx,cy) { return tilemap[cx+","+cy]||0; };
  API.mset = function(cx,cy,id) { tilemap[cx+","+cy]=id; };
  API.map = function(mx,my,mw,mh,sx,sy) {
    for(let ty=0;ty<mh;ty++) for(let tx=0;tx<mw;tx++){
      const id=API.mget(mx+tx,my+ty); if(id>0) API.spr(id,sx+tx*8,sy+ty*8); }
  };
  const VALID_KEYS = {up:1,down:1,left:1,right:1,a:1,b:1};
  API.btn = function(k) { if(!VALID_KEYS[k]) console.warn("GrayBox: invalid key \""+k+"\". Use: up/down/left/right/a/b"); return !!keys[k]; };
  API.btnp = function(k) { if(!VALID_KEYS[k]) console.warn("GrayBox: invalid key \""+k+"\". Use: up/down/left/right/a/b"); return !!keys[k] && !keysPrev[k]; };
  API.note = function(ch, noteStr, dur) {
    ensureAudio(); if(ch<0||ch>1) return; API.stop(ch);
    const osc=audioCtx.createOscillator(); osc.type="square";
    osc.frequency.value=noteToFreq(noteStr);
    osc.connect(channelGains[ch]); osc.start();
    osc.stop(audioCtx.currentTime+dur); channels[ch]=osc;
  };
  API.stop = function(ch) {
    if(ch===undefined){API.stop(0);API.stop(1);return;}
    if(channels[ch]){try{channels[ch].stop();}catch(e){} channels[ch]=null;}
  };
  API.rnd = function(max) { return Math.random()*max; };
  API.flr = Math.floor;
  API.abs = Math.abs;
  API.min = Math.min;
  API.max = Math.max;
  API.sin = Math.sin;
  API.cos = Math.cos;

  function tick() {
    if (API._update) API._update();
    if (API._draw) API._draw();
    ctx.putImageData(buf, 0, 0);
    for (const k in keys) keysPrev[k] = keys[k];
    API.frame++;
  }

  // ============================================================
  // Tower Defense Game
  // ============================================================
  const { cls, pix, line, rect, rectf, circ, circf, sprite: defSprite,
          spr, text, btn, btnp, note, stop, rnd, flr, abs: _abs,
          min, max: _max, sin, cos } = API;

  // --- Constants ---
  const CELL = 16; // grid cell size
  const GRID_W = 20; // 320 / 16
  const GRID_H = 13; // 208 / 16 (leave room for HUD at top and bottom)
  const HUD_TOP = 9;
  const GRID_OX = 0;
  const GRID_OY = HUD_TOP;
  const MAX_WAVES = 20;

  // Tower types: 0=basic, 1=sniper, 2=rapid
  const TOWER_TYPES = [
    { name: "BASIC",  cost: 10, range: 48, rate: 20, dmg: 1, color: 3, sprId: 20 },
    { name: "SNIPER", cost: 20, range: 96, rate: 50, dmg: 3, color: 2, sprId: 21 },
    { name: "RAPID",  cost: 15, range: 32, rate: 8,  dmg: 1, color: 3, sprId: 22 },
  ];

  // --- Path definition (grid coords) ---
  // A winding path from left to right
  const PATH = [
    {x:0,y:3},{x:1,y:3},{x:2,y:3},{x:3,y:3},{x:4,y:3},{x:5,y:3},
    {x:5,y:4},{x:5,y:5},{x:5,y:6},{x:5,y:7},
    {x:6,y:7},{x:7,y:7},{x:8,y:7},{x:9,y:7},
    {x:9,y:6},{x:9,y:5},{x:9,y:4},{x:9,y:3},{x:9,y:2},
    {x:10,y:2},{x:11,y:2},{x:12,y:2},{x:13,y:2},
    {x:13,y:3},{x:13,y:4},{x:13,y:5},{x:13,y:6},{x:13,y:7},{x:13,y:8},{x:13,y:9},{x:13,y:10},
    {x:14,y:10},{x:15,y:10},{x:16,y:10},
    {x:16,y:9},{x:16,y:8},{x:16,y:7},{x:16,y:6},{x:16,y:5},
    {x:17,y:5},{x:18,y:5},{x:19,y:5},
  ];

  // Build a set for fast path lookup
  const pathSet = new Set();
  for (const p of PATH) pathSet.add(p.x + "," + p.y);

  // --- Sprites ---
  // 20: Basic tower
  defSprite(20,
    "00033000" +
    "00333300" +
    "03322330" +
    "03322330" +
    "03333330" +
    "03333330" +
    "00333300" +
    "01111110"
  );
  // 21: Sniper tower (tall, thin barrel)
  defSprite(21,
    "00033300" +
    "00020000" +
    "00020000" +
    "00222000" +
    "02222200" +
    "02211220" +
    "02222200" +
    "01111110"
  );
  // 22: Rapid tower (wide, multiple barrels)
  defSprite(22,
    "03300330" +
    "03300330" +
    "03333330" +
    "33333333" +
    "33322333" +
    "33322333" +
    "03333330" +
    "01111110"
  );
  // 30: Basic enemy (small walker)
  defSprite(30,
    "00000000" +
    "00111100" +
    "01233210" +
    "01333310" +
    "01333310" +
    "00133100" +
    "00100100" +
    "00000000"
  );
  // 31: Fast enemy
  defSprite(31,
    "00000000" +
    "00322300" +
    "03222230" +
    "32222223" +
    "32222223" +
    "03222230" +
    "00322300" +
    "00000000"
  );
  // 32: Tank enemy (big, slow)
  defSprite(32,
    "01111110" +
    "13333331" +
    "13322331" +
    "13333331" +
    "13333331" +
    "13322331" +
    "13333331" +
    "01111110"
  );
  // 33: Bullet
  defSprite(33,
    "00000000" +
    "00000000" +
    "00000000" +
    "00033000" +
    "00033000" +
    "00000000" +
    "00000000" +
    "00000000"
  );
  // 34: Cursor
  defSprite(34,
    "33333333" +
    "30000003" +
    "30000003" +
    "30000003" +
    "30000003" +
    "30000003" +
    "30000003" +
    "33333333"
  );
  // 35: Heart/life icon
  defSprite(35,
    "00000000" +
    "03303300" +
    "33333330" +
    "33333330" +
    "03333300" +
    "00333000" +
    "00030000" +
    "00000000"
  );

  // --- Game State ---
  let state = "title";
  let grid; // 2D array: 0=empty, -1=path, >0=tower index+1
  let towers, enemies, bullets, particles;
  let cursorX, cursorY, selectedType;
  let gold, score, lives;
  let wave, waveTimer, waveActive, waveEnemiesLeft, waveSpawnTimer, waveSpawnCount;
  let waveMessage, waveMessageTimer;
  let gameWon;
  let titleAnim;

  function resetGame() {
    grid = [];
    for (let y = 0; y < GRID_H; y++) {
      grid[y] = [];
      for (let x = 0; x < GRID_W; x++) {
        grid[y][x] = pathSet.has(x + "," + y) ? -1 : 0;
      }
    }
    towers = [];
    enemies = [];
    bullets = [];
    particles = [];
    cursorX = 10;
    cursorY = 6;
    selectedType = 0;
    gold = 40;
    score = 0;
    lives = 10;
    wave = 0;
    waveTimer = 0;
    waveActive = false;
    waveEnemiesLeft = 0;
    waveSpawnTimer = 0;
    waveSpawnCount = 0;
    waveMessage = "";
    waveMessageTimer = 0;
    gameWon = false;
    startNextWave();
  }

  function startNextWave() {
    wave++;
    if (wave > MAX_WAVES) {
      gameWon = true;
      state = "gameover";
      return;
    }
    waveActive = true;
    // Enemies per wave: scales up
    waveSpawnCount = 5 + wave * 2;
    waveEnemiesLeft = waveSpawnCount;
    waveSpawnTimer = 0;
    waveMessage = "WAVE " + wave;
    waveMessageTimer = 60;
  }

  function spawnEnemy() {
    // Pick enemy type based on wave
    let type = 0; // basic
    let r = Math.random();
    if (wave >= 5 && r < 0.3) type = 1;  // fast
    if (wave >= 8 && r < 0.15) type = 2; // tank
    if (wave >= 12 && r < 0.25) type = 2;

    const baseHp = [3, 2, 10];
    const baseSpeed = [0.02, 0.04, 0.012];
    const hpScale = 1 + (wave - 1) * 0.4;

    enemies.push({
      type: type,
      pathIdx: 0,       // float index along PATH
      hp: flr(baseHp[type] * hpScale),
      maxHp: flr(baseHp[type] * hpScale),
      speed: baseSpeed[type] + wave * 0.001,
      x: PATH[0].x * CELL + GRID_OX,
      y: PATH[0].y * CELL + GRID_OY,
      reward: [2, 3, 5][type] + flr(wave / 3),
      points: [10, 15, 30][type],
      sprId: 30 + type,
      hitFlash: 0,
    });
  }

  function dist(x1, y1, x2, y2) {
    const dx = x1 - x2, dy = y1 - y2;
    return Math.sqrt(dx * dx + dy * dy);
  }

  function addParticles(x, y, count, col) {
    for (let i = 0; i < count; i++) {
      particles.push({
        x: x, y: y,
        vx: rnd(3) - 1.5, vy: rnd(3) - 1.5,
        life: 8 + flr(rnd(12)),
        color: col || (flr(rnd(3)) + 1),
      });
    }
  }

  // --- Sounds ---
  function sndPlace() { note(0, "E5", 0.05); setTimeout(() => note(0, "G5", 0.06), 50); }
  function sndShoot() { note(1, "A5", 0.02); }
  function sndKill() { note(0, "C4", 0.04); setTimeout(() => note(0, "E4", 0.04), 40); }
  function sndLeak() { note(0, "C3", 0.1); note(1, "G2", 0.1); }
  function sndWave() {
    note(0, "C5", 0.08);
    setTimeout(() => note(0, "E5", 0.08), 80);
    setTimeout(() => note(0, "G5", 0.12), 160);
  }
  function sndError() { note(0, "C3", 0.08); }
  function sndWin() {
    note(0, "C5", 0.1); setTimeout(() => note(0, "E5", 0.1), 120);
    setTimeout(() => note(0, "G5", 0.1), 240); setTimeout(() => note(0, "C6", 0.2), 360);
  }
  function sndCycle() { note(1, "E5", 0.03); }

  resetGame();

  // ============================================================
  // Update
  // ============================================================
  API._update = function() {
    if (state === "title") {
      if (btnp("a") || btnp("a")) {
        state = "play";
        resetGame();
        sndWave();
      }
      return;
    }

    if (state === "gameover") {
      // Update particles
      for (let i = particles.length - 1; i >= 0; i--) {
        const p = particles[i];
        p.x += p.vx; p.y += p.vy; p.vy += 0.06; p.life--;
        if (p.life <= 0) particles.splice(i, 1);
      }
      if (btnp("a") || btnp("a")) state = "title";
      return;
    }

    // --- Play state ---

    // Cursor movement (with repeat delay)
    if (btnp("up")) cursorY = _max(0, cursorY - 1);
    if (btnp("down")) cursorY = min(GRID_H - 1, cursorY + 1);
    if (btnp("left")) cursorX = _max(0, cursorX - 1);
    if (btnp("right")) cursorX = min(GRID_W - 1, cursorX + 1);

    // Cycle tower type
    if (btnp("b")) {
      selectedType = (selectedType + 1) % TOWER_TYPES.length;
      sndCycle();
    }

    // Place tower
    if (btnp("a")) {
      const tt = TOWER_TYPES[selectedType];
      if (grid[cursorY][cursorX] === 0 && gold >= tt.cost) {
        grid[cursorY][cursorX] = towers.length + 1;
        towers.push({
          type: selectedType,
          gx: cursorX,
          gy: cursorY,
          x: cursorX * CELL + GRID_OX + 4,
          y: cursorY * CELL + GRID_OY + 4,
          cooldown: 0,
          angle: 0,
          target: null,
        });
        gold -= tt.cost;
        sndPlace();
      } else if (grid[cursorY][cursorX] !== 0) {
        sndError();
      } else if (gold < tt.cost) {
        sndError();
      }
    }

    // Wave message timer
    if (waveMessageTimer > 0) waveMessageTimer--;

    // Spawn enemies
    if (waveActive && waveEnemiesLeft > 0) {
      waveSpawnTimer--;
      if (waveSpawnTimer <= 0) {
        spawnEnemy();
        waveEnemiesLeft--;
        waveSpawnTimer = _max(8, 30 - wave);
      }
    }

    // Update enemies along path
    for (let i = enemies.length - 1; i >= 0; i--) {
      const e = enemies[i];
      e.pathIdx += e.speed;
      if (e.hitFlash > 0) e.hitFlash--;

      const idx = flr(e.pathIdx);
      if (idx >= PATH.length - 1) {
        // Enemy reached the end
        lives--;
        sndLeak();
        addParticles(e.x + 4, e.y + 4, 6, 1);
        enemies.splice(i, 1);
        if (lives <= 0) {
          state = "gameover";
          gameWon = false;
        }
        continue;
      }

      // Interpolate position between path nodes
      const frac = e.pathIdx - idx;
      const p0 = PATH[idx];
      const p1 = PATH[min(idx + 1, PATH.length - 1)];
      e.x = (p0.x + (p1.x - p0.x) * frac) * CELL + GRID_OX;
      e.y = (p0.y + (p1.y - p0.y) * frac) * CELL + GRID_OY;
    }

    // Tower AI
    for (const t of towers) {
      const tt = TOWER_TYPES[t.type];
      t.cooldown = _max(0, t.cooldown - 1);

      // Find nearest enemy in range
      let nearest = null;
      let nearDist = Infinity;
      for (const e of enemies) {
        const d = dist(t.x, t.y, e.x + 4, e.y + 4);
        if (d <= tt.range && d < nearDist) {
          nearest = e;
          nearDist = d;
        }
      }

      t.target = nearest;

      if (nearest) {
        // Point at target
        t.angle = Math.atan2(nearest.y + 4 - t.y, nearest.x + 4 - t.x);

        // Shoot
        if (t.cooldown <= 0) {
          t.cooldown = tt.rate;
          const bx = t.x;
          const by = t.y;
          const speed = t.type === 1 ? 6 : 4;
          const dx = nearest.x + 4 - bx;
          const dy = nearest.y + 4 - by;
          const d = Math.sqrt(dx * dx + dy * dy) || 1;
          bullets.push({
            x: bx, y: by,
            vx: dx / d * speed,
            vy: dy / d * speed,
            dmg: tt.dmg,
            life: 30,
          });
          sndShoot();
        }
      }
    }

    // Update bullets
    for (let i = bullets.length - 1; i >= 0; i--) {
      const b = bullets[i];
      b.x += b.vx;
      b.y += b.vy;
      b.life--;
      if (b.life <= 0 || b.x < 0 || b.x > W || b.y < 0 || b.y > H) {
        bullets.splice(i, 1);
        continue;
      }

      // Hit enemies
      for (let j = enemies.length - 1; j >= 0; j--) {
        const e = enemies[j];
        if (dist(b.x, b.y, e.x + 4, e.y + 4) < 7) {
          e.hp -= b.dmg;
          e.hitFlash = 4;
          bullets.splice(i, 1);
          if (e.hp <= 0) {
            score += e.points;
            gold += e.reward;
            addParticles(e.x + 4, e.y + 4, 10, 3);
            sndKill();
            enemies.splice(j, 1);
          }
          break;
        }
      }
    }

    // Update particles
    for (let i = particles.length - 1; i >= 0; i--) {
      const p = particles[i];
      p.x += p.vx; p.y += p.vy; p.vy += 0.05; p.life--;
      if (p.life <= 0) particles.splice(i, 1);
    }

    // Check wave complete
    if (waveActive && waveEnemiesLeft <= 0 && enemies.length === 0) {
      waveActive = false;
      waveTimer = 90; // delay before next wave
      gold += 5 + wave * 2; // wave clear bonus
      if (wave >= MAX_WAVES) {
        gameWon = true;
        state = "gameover";
        sndWin();
      }
    }

    // Countdown to next wave
    if (!waveActive && state === "play") {
      waveTimer--;
      if (waveTimer <= 0) {
        startNextWave();
        sndWave();
      }
    }
  };

  // ============================================================
  // Draw
  // ============================================================
  API._draw = function() {
    cls(0);

    if (state === "title") {
      // Title screen
      const ty = 37 + sin(API.frame * 0.04) * 3;

      text("TOWER DEFENSE", 112, flr(ty), 3);
      rectf(107, flr(ty) + 9, 107, 1, 2);

      // Animated towers on title
      const bx = 113;
      const by = flr(ty) + 21;
      spr(20, bx, by + sin(API.frame * 0.06) * 2);
      spr(21, bx + 33, by + sin(API.frame * 0.06 + 1.5) * 2);
      spr(22, bx + 67, by + sin(API.frame * 0.06 + 3) * 2);

      // Animated enemies marching
      for (let i = 0; i < 5; i++) {
        const ex = 93 + i * 30 + sin(API.frame * 0.05 + i) * 6;
        const ey = flr(ty) + 45 + sin(API.frame * 0.08 + i * 0.7) * 3;
        spr(30 + (i % 3), flr(ex), flr(ey));
      }

      if (flr(API.frame / 20) % 2 === 0) text("PRESS A TO START", 113, 135, 3);

      // Tower info
      text("-- TOWERS --", 124, 154, 2);
      spr(20, 113, 164); text("BASIC   10G  MED RANGE", 121, 165, 2);
      spr(21, 113, 174); text("SNIPER  20G  LONG RANGE", 121, 176, 2);
      spr(22, 113, 184); text("RAPID   15G  SHORT RANGE", 121, 186, 2);

      text("SURVIVE 20 WAVES!", 117, 206, 3);
      text("GRAYBOX DEMO V0.1", 112, 229, 1);
      return;
    }

    if (state === "gameover") {
      // Particles
      for (const p of particles) pix(flr(p.x), flr(p.y), p.color);

      if (gameWon) {
        text("VICTORY!", 133, 75, 3);
        text("ALL 20 WAVES CLEARED!", 108, 94, 2);
      } else {
        text("GAME OVER", 130, 75, 3);
        text("REACHED WAVE " + wave, 122, 94, 2);
      }
      text("SCORE: " + score, 130, 113, 2);
      text("TOWERS BUILT: " + towers.length, 117, 124, 1);
      if (flr(API.frame / 20) % 2 === 0) text("PRESS A TO CONTINUE", 105, 158, 3);
      return;
    }

    // --- Play state ---

    // Draw grid background (subtle)
    for (let gy = 0; gy < GRID_H; gy++) {
      for (let gx = 0; gx < GRID_W; gx++) {
        const px = gx * CELL + GRID_OX;
        const py = gy * CELL + GRID_OY;
        // Checkerboard pattern for buildable cells
        if (grid[gy][gx] === 0) {
          if ((gx + gy) % 2 === 0) {
            // very subtle lighter cell - draw a single dot pattern
            pix(px + 4, py + 4, 1);
          }
        }
      }
    }

    // Draw path
    for (let i = 0; i < PATH.length; i++) {
      const p = PATH[i];
      rectf(p.x * CELL + GRID_OX, p.y * CELL + GRID_OY, CELL, CELL, 1);
    }
    // Path direction arrows
    for (let i = 0; i < PATH.length - 1; i += 3) {
      const p = PATH[i];
      const pn = PATH[i + 1];
      const cx = p.x * CELL + GRID_OX + 8;
      const cy = p.y * CELL + GRID_OY + 8;
      const dx = pn.x - p.x;
      const dy = pn.y - p.y;
      // Small direction indicator
      pix(cx + dx * 3, cy + dy * 3, 2);
      pix(cx + dx * 4, cy + dy * 4, 2);
    }

    // Draw path start/end markers
    const ps = PATH[0];
    const pe = PATH[PATH.length - 1];
    text("IN", ps.x * CELL + GRID_OX + 2, ps.y * CELL + GRID_OY + 5, 3);
    text("END", pe.x * CELL + GRID_OX - 2, pe.y * CELL + GRID_OY + 5, 3);

    // Draw towers
    for (const t of towers) {
      const tt = TOWER_TYPES[t.type];
      spr(tt.sprId, t.gx * CELL + GRID_OX + 4, t.gy * CELL + GRID_OY + 4);

      // Draw barrel/aim line
      if (t.target) {
        const lx = t.x + cos(t.angle) * 8;
        const ly = t.y + sin(t.angle) * 8;
        line(t.x, t.y, flr(lx), flr(ly), 2);
      }

      // Range indicator when cursor is on this tower
      if (cursorX === t.gx && cursorY === t.gy) {
        circ(t.x, t.y, tt.range, 1);
      }
    }

    // Draw enemies
    for (const e of enemies) {
      // Shadow
      rectf(flr(e.x) + 1, flr(e.y) + 9, 6, 2, 1);

      // Sprite (flash white on hit)
      if (e.hitFlash > 0) {
        // Draw white flash - fill the sprite area
        rectf(flr(e.x), flr(e.y), 8, 8, 3);
      } else {
        spr(e.sprId, flr(e.x), flr(e.y));
      }

      // HP bar
      const hpW = 10;
      const hpX = flr(e.x) - 1;
      const hpY = flr(e.y) - 3;
      const hpFill = (e.hp / e.maxHp) * hpW;
      rectf(hpX, hpY, hpW, 2, 1);
      if (hpFill > 0) {
        const hpColor = e.hp > e.maxHp * 0.5 ? 3 : 2;
        rectf(hpX, hpY, flr(hpFill), 2, hpColor);
      }
    }

    // Draw bullets
    for (const b of bullets) {
      rectf(flr(b.x) - 1, flr(b.y) - 1, 2, 2, 3);
    }

    // Draw particles
    for (const p of particles) {
      pix(flr(p.x), flr(p.y), p.color);
    }

    // Draw cursor
    const curPx = cursorX * CELL + GRID_OX;
    const curPy = cursorY * CELL + GRID_OY;
    // Animated cursor
    const curBlink = flr(API.frame / 4) % 2;
    const curCol = curBlink ? 3 : 2;

    // Draw 16x16 cursor brackets
    // Top-left
    line(curPx, curPy, curPx + 4, curPy, curCol);
    line(curPx, curPy, curPx, curPy + 4, curCol);
    // Top-right
    line(curPx + CELL - 1, curPy, curPx + CELL - 5, curPy, curCol);
    line(curPx + CELL - 1, curPy, curPx + CELL - 1, curPy + 4, curCol);
    // Bottom-left
    line(curPx, curPy + CELL - 1, curPx + 4, curPy + CELL - 1, curCol);
    line(curPx, curPy + CELL - 1, curPx, curPy + CELL - 5, curCol);
    // Bottom-right
    line(curPx + CELL - 1, curPy + CELL - 1, curPx + CELL - 5, curPy + CELL - 1, curCol);
    line(curPx + CELL - 1, curPy + CELL - 1, curPx + CELL - 1, curPy + CELL - 5, curCol);

    // Show range preview when cursor on empty cell
    if (grid[cursorY][cursorX] === 0) {
      const tt = TOWER_TYPES[selectedType];
      circ(curPx + CELL / 2, curPy + CELL / 2, tt.range, 1);
      // Ghost tower preview
      if (gold >= tt.cost) {
        spr(tt.sprId, curPx + 4, curPy + 4);
      }
    }

    // --- HUD ---
    // Top bar
    rectf(0, 0, W, HUD_TOP, 0);
    line(0, HUD_TOP - 1, W, HUD_TOP - 1, 1);

    // Gold
    text("GOLD:" + gold, 3, 2, 3);

    // Score
    text("SCORE:" + score, 67, 2, 2);

    // Wave
    text("WAVE:" + wave + "/" + MAX_WAVES, 140, 2, 2);

    // Lives
    for (let i = 0; i < min(lives, 10); i++) {
      spr(35, W - 10 - i * 9, 0);
    }

    // Bottom bar: selected tower info
    const bottomY = H - 18;
    rectf(0, bottomY, W, 18, 0);
    line(0, bottomY, W, bottomY, 1);

    const st = TOWER_TYPES[selectedType];
    // Tower type selector
    for (let i = 0; i < TOWER_TYPES.length; i++) {
      const tx = 5 + i * 53;
      const ty = bottomY + 3;
      if (i === selectedType) {
        rect(tx - 2, ty - 2, 51, 15, 3);
      }
      spr(TOWER_TYPES[i].sprId, tx, ty + 1);
      text(TOWER_TYPES[i].name, tx + 10, ty, i === selectedType ? 3 : 1);
      text(TOWER_TYPES[i].cost + "G", tx + 10, ty + 8, i === selectedType ? 2 : 1);
    }

    // Controls hint
    text("A:PLACE B:CYCLE", 227, bottomY + 3, 1);
    // Range info
    text("RNG:" + st.range + " DMG:" + st.dmg, 227, bottomY + 10, 1);

    // Can't afford indicator
    if (gold < st.cost) {
      text("NOT ENOUGH GOLD!", 227, bottomY + 3, 2);
    }

    // Wave announcement
    if (waveMessageTimer > 0) {
      const msgY = 105 + sin(waveMessageTimer * 0.1) * 3;
      const msgX = 133;
      rectf(msgX - 20, flr(msgY) - 4, 93, 14, 0);
      rect(msgX - 20, flr(msgY) - 4, 93, 14, 2);
      text(waveMessage, msgX, flr(msgY), 3);
      if (waveMessageTimer > 30) {
        text("GET READY!", msgX - 5, flr(msgY) + 9, 2);
      }
    }

    // Wave countdown between waves
    if (!waveActive && waveTimer > 0 && enemies.length === 0 && wave < MAX_WAVES) {
      const sec = flr(waveTimer / 30) + 1;
      text("NEXT WAVE IN " + sec, 122, 105, 2);
      text("BONUS: +" + (5 + wave * 2) + "G", 128, 114, 1);
    }
  };

  // ============================================================
  // Boot
  // ============================================================
  if (API._init) API._init();
  setInterval(tick, 1000 / FPS);
  document.addEventListener("keydown", ensureAudio, { once: true });
  document.addEventListener("click", ensureAudio, { once: true });
})();
</script>
</body>
