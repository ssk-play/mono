  // --- 8x8 → 16x16 upscale helper ---
  function up(d) {
    let o = "";
    for (let r = 0; r < 8; r++) {
      let row = "";
      for (let c = 0; c < 8; c++) {
        const ch = d[r * 8 + c];
        row += ch + ch;
      }
      o += row + row;
    }
    return o;
  }

  // --- Building / Level Layout ---
  // Sprites are now 16x16. Each tile = 16px.
  // Building width: 20 tiles (320px). Floor height in pixels.

  const TILE = 16;
  const FLOOR_H = 48; // pixels per floor (3 tile rows of 16px)
  const NUM_FLOORS = 30;
  const BUILDING_H = NUM_FLOORS * FLOOR_H;
  const BUILDING_W = W; // 320px
  const TILES_X = W / TILE; // 20 tiles across

  // Elevator shafts: tile-x positions (each shaft is 1 tile = 16px wide)
  const SHAFT_POSITIONS = [3, 8, 13, 17];
  const SHAFT_W = TILE;

  // Escalator positions (tile-x)
  const ESCALATOR_POSITIONS = [5, 10, 15];

  const { TITLE, PLAY, GAMEOVER, WIN } = Mono.SCENE;
  let player, bullets, eBullets, enemies, explosions, particles;
  let elevators, doors, lamps, escalators;
  let score, lives, camY, docsCollected, docsTotal;
  let shootCooldown, invincible, invTimer;
  let titleBlink;

  // Building generation
  function generateBuilding() {
    doors = [];
    lamps = [];
    elevators = [];
    escalators = [];
    docsTotal = 0;

    // Create elevators for each shaft
    for (let si = 0; si < SHAFT_POSITIONS.length; si++) {
      const sx = SHAFT_POSITIONS[si] * TILE;
      const numCars = si < 2 ? 2 : 1;
      for (let c = 0; c < numCars; c++) {
        const startFloor = flr(rnd(NUM_FLOORS - 4)) + 2;
        elevators.push({
          x: sx,
          y: startFloor * FLOOR_H - TILE,
          shaftIdx: si,
          speed: 0,
          targetY: startFloor * FLOOR_H - TILE,
          moving: false,
          hasPlayer: false,
          dir: 0,
          minY: 1 * FLOOR_H - TILE,
          maxY: (NUM_FLOORS - 1) * FLOOR_H - TILE
        });
      }
    }

    // Create escalators
    for (let ei = 0; ei < ESCALATOR_POSITIONS.length; ei++) {
      const ex = ESCALATOR_POSITIONS[ei] * TILE;
      for (let f = 2; f < NUM_FLOORS - 1; f += 4 + flr(rnd(3))) {
        escalators.push({
          x: ex,
          floor: f,
          topY: (f - 1) * FLOOR_H,
          bottomY: f * FLOOR_H
        });
      }
    }

    // Create doors on each floor
    for (let f = 1; f < NUM_FLOORS - 1; f++) {
      const floorY = f * FLOOR_H;
      const numDoors = 2 + flr(rnd(3));
      const usedX = new Set();

      for (let d = 0; d < numDoors; d++) {
        let dx;
        let attempts = 0;
        do {
          dx = (1 + flr(rnd(TILES_X - 2))) * TILE;
          attempts++;
        } while (attempts < 20 && (
          usedX.has(dx) ||
          SHAFT_POSITIONS.some(sp => _abs(dx - sp * TILE) < TILE * 2) ||
          ESCALATOR_POSITIONS.some(ep => _abs(dx - ep * TILE) < TILE * 2)
        ));
        if (attempts >= 20) continue;
        usedX.add(dx);

        const isRed = rnd(1) < 0.3;
        if (isRed) docsTotal++;

        doors.push({
          x: dx,
          y: floorY - TILE,
          floor: f,
          isRed: isRed,
          open: false,
          collected: false,
          openTimer: 0
        });
      }

      // Place lamps on each floor
      const numLamps = 2 + flr(rnd(2));
      for (let l = 0; l < numLamps; l++) {
        const lx = (1 + flr(rnd(TILES_X - 2))) * TILE;
        lamps.push({
          x: lx,
          y: floorY - TILE * 2 - 4,
          floor: f,
          lit: true
        });
      }
    }

    // Ensure at least some red doors
    if (docsTotal < 5) {
      for (let i = 0; i < doors.length && docsTotal < 8; i++) {
        if (!doors[i].isRed && rnd(1) < 0.5) {
          doors[i].isRed = true;
          docsTotal++;
        }
      }
    }
  }

  function resetGame() {
    player = {
      x: W / 2 - 8,
      y: 1 * FLOOR_H - TILE,
      vx: 0,
      vy: 0,
      dir: 1,
      onGround: true,
      onElevator: null,
      ducking: false,
      jumping: false,
      shooting: false,
      shootTimer: 0,
      walkFrame: 0,
      enteringDoor: false,
      enterDoorTimer: 0,
      dead: false,
      deathTimer: 0
    };
    bullets = [];
    eBullets = [];
    enemies = [];
    explosions = [];
    particles = [];
    score = 0;
    lives = 3;
    docsCollected = 0;
    shootCooldown = 0;
    invincible = 0;
    invTimer = 0;
    camY = 0;

    generateBuilding();
    spawnEnemies();
    updateCamera();
  }

  function spawnEnemies() {
    enemies = [];
    for (let f = 2; f < NUM_FLOORS - 1; f++) {
      if (rnd(1) < 0.4) {
        const ex = (1 + flr(rnd(TILES_X - 2))) * TILE;
        enemies.push({
          x: ex,
          y: f * FLOOR_H - TILE,
          floor: f,
          dir: rnd(1) < 0.5 ? 1 : -1,
          state: "patrol",
          hp: 1,
          walkFrame: 0,
          shootTimer: 60 + flr(rnd(90)),
          shootCooldown: 0,
          onElevator: null,
          stateTimer: 0,
          alertTimer: 0,
          speed: 0.6 + rnd(0.4)
        });
      }
    }
  }

  function respawnEnemy() {
    const pFloor = flr(player.y / FLOOR_H);
    let f;
    let attempts = 0;
    do {
      f = 2 + flr(rnd(NUM_FLOORS - 3));
      attempts++;
    } while (_abs(f - pFloor) < 5 && attempts < 20);

    const ex = (1 + flr(rnd(TILES_X - 2))) * TILE;
    enemies.push({
      x: ex,
      y: f * FLOOR_H - TILE,
      floor: f,
      dir: rnd(1) < 0.5 ? 1 : -1,
      state: "patrol",
      hp: 1,
      walkFrame: 0,
      shootTimer: 60 + flr(rnd(90)),
      shootCooldown: 0,
      onElevator: null,
      stateTimer: 0,
      alertTimer: 0,
      speed: 0.6 + rnd(0.4)
    });
  }

  function updateCamera() {
    const targetY = player.y - H / 2 + TILE;
    camY += (targetY - camY) * 0.12;
    camY = _max(0, min(BUILDING_H - H, camY));
  }

  function getFloorY(floor) {
    return floor * FLOOR_H;
  }

  function isOnFloor(x, y) {
    const floor = flr((y + TILE) / FLOOR_H);
    if (floor < 0 || floor >= NUM_FLOORS) return false;
    const floorPixelY = floor * FLOOR_H;
    for (const sp of SHAFT_POSITIONS) {
      const sx = sp * TILE;
      if (x + 8 > sx && x + 8 < sx + TILE) {
        return false;
      }
    }
    return _abs(y + TILE - floorPixelY) < 4;
  }

  function isInShaft(x) {
    for (let i = 0; i < SHAFT_POSITIONS.length; i++) {
      const sx = SHAFT_POSITIONS[i] * TILE;
      if (x + 8 > sx - 2 && x + 8 < sx + TILE + 2) return i;
    }
    return -1;
  }

  function findElevatorAt(x, y) {
    for (const e of elevators) {
      if (_abs(e.x - x) < TILE + 4 && _abs(e.y - y) < 10) return e;
    }
    return null;
  }

  function addExplosion(x, y) {
    explosions.push({ x: x, y: y, timer: 12 });
    for (let i = 0; i < 6; i++)
      particles.push({
        x: x + 8, y: y + 8,
        vx: rnd(4) - 2, vy: rnd(4) - 2,
        life: 6 + flr(rnd(10)),
        color: flr(rnd(3)) + 1
      });
  }

  // --- Bullet collision radii ---
  const BULLET_R = 3;
  const EBULLET_R = 3;

  // --- Circle collision for bullets ---
  function circHit(ax, ay, ar, bx, by, br) {
    const dx = ax - bx, dy = ay - by;
    const dist = dx * dx + dy * dy;
    const rSum = ar + br;
    return dist < rSum * rSum;
  }

  // --- Sounds ---
  function shootSound() { note(0, "C6", 0.04); }
  function hitSound() { note(1, "C3", 0.06); setTimeout(() => note(1, "E3", 0.05), 40); }
  function doorSound() { note(0, "E4", 0.06); setTimeout(() => note(0, "G4", 0.04), 50); }
  function docSound() {
    note(0, "C5", 0.08);
    setTimeout(() => note(0, "E5", 0.06), 60);
    setTimeout(() => note(0, "G5", 0.08), 120);
  }
  function deathSound() {
    note(0, "C3", 0.12); note(1, "G2", 0.12);
    setTimeout(() => { note(0, "A2", 0.18); note(1, "E2", 0.18); }, 120);
  }
  function elevatorSound() { note(1, "A3", 0.03); }
  function crushSound() { note(1, "C2", 0.15); note(0, "E2", 0.1); }
  function lampSound() { note(1, "F5", 0.03); }
  function winSound() {
    note(0, "C5", 0.1);
    setTimeout(() => note(0, "E5", 0.1), 100);
    setTimeout(() => note(0, "G5", 0.1), 200);
    setTimeout(() => note(0, "C6", 0.2), 300);
  }

  // --- Title Scene ---
  Mono.scene(TITLE, {
    init() {},
    update() {
      if (btnp("start") || btnp("a")) {
        resetGame();
        note(0, "C5", 0.1);
        setTimeout(() => note(0, "E5", 0.1), 100);
        setTimeout(() => note(0, "G5", 0.15), 200);
        Mono.go(PLAY); return;
      }
    },
    draw() {
      cls(0);
      drawTitle();
    }
  });

  // --- Game Over Scene ---
  Mono.scene(GAMEOVER, {
    init() {},
    update() {
      for (let i = particles.length - 1; i >= 0; i--) {
        const p = particles[i]; p.x += p.vx; p.y += p.vy; p.vy += 0.08; p.life--;
        if (p.life <= 0) particles.splice(i, 1);
      }
      if (btnp("start") || btnp("a")) { Mono.go(TITLE); return; }
    },
    draw() {
      cls(0);
      drawGameOver();
    }
  });

  // --- Win Scene ---
  Mono.scene(WIN, {
    init() {},
    update() {
      if (btnp("start") || btnp("a")) { Mono.go(TITLE); return; }
    },
    draw() {
      cls(0);
      drawWin();
    }
  });

  // --- Play Scene ---
  Mono.scene(PLAY, {
    init() {},
    update() {
    if (player.dead) {
      player.deathTimer--;
      if (player.deathTimer <= 0) {
        lives--;
        if (lives <= 0) {
          Mono.go(GAMEOVER);
          return;
        }
        const f = flr(player.y / FLOOR_H);
        player.x = W / 2 - 8;
        player.y = f * FLOOR_H - TILE;
        player.dead = false;
        player.onElevator = null;
        player.ducking = false;
        player.jumping = false;
        player.vx = 0;
        player.vy = 0;
        player.onGround = true;
        invincible = 60;
      }
      for (let i = particles.length - 1; i >= 0; i--) {
        const p = particles[i]; p.x += p.vx; p.y += p.vy; p.vy += 0.08; p.life--;
        if (p.life <= 0) particles.splice(i, 1);
      }
      updateCamera();
      return;
    }

    if (invincible > 0) invincible--;

    // --- Player movement ---
    const wasOnElevator = player.onElevator;

    if (player.onElevator) {
      const elev = player.onElevator;

      if (btn("up")) {
        elev.dir = -1;
        elev.moving = true;
        if (Mono.frame % 10 === 0) elevatorSound();
      } else if (btn("down")) {
        elev.dir = 1;
        elev.moving = true;
        if (Mono.frame % 10 === 0) elevatorSound();
      } else {
        elev.dir = 0;
        elev.moving = false;
      }

      if (elev.moving) {
        elev.y += elev.dir * 1.5;
        elev.y = _max(elev.minY, min(elev.maxY, elev.y));
        player.y = elev.y;
      }

      const nearFloor = flr((elev.y + TILE) / FLOOR_H);
      const floorPixY = nearFloor * FLOOR_H;
      const snapDist = _abs(elev.y + TILE - floorPixY);

      if (snapDist < 6) {
        if (btn("left")) {
          player.onElevator = null;
          player.x -= TILE + 4;
          player.y = floorPixY - TILE;
          player.dir = -1;
          player.onGround = true;
          elev.moving = false;
          elev.dir = 0;
          elev.hasPlayer = false;
        } else if (btn("right")) {
          player.onElevator = null;
          player.x += TILE + 4;
          player.y = floorPixY - TILE;
          player.dir = 1;
          player.onGround = true;
          elev.moving = false;
          elev.dir = 0;
          elev.hasPlayer = false;
        }
      }

      // Can shoot while on elevator
      if (shootCooldown > 0) shootCooldown--;
      if (btnp("a") && shootCooldown <= 0) {
        bullets.push({ x: player.x + (player.dir > 0 ? TILE : -8), y: player.y + 4, dir: player.dir });
        shootCooldown = 10;
        shootSound();
        player.shooting = true;
        player.shootTimer = 8;
      }

    } else {
      // On foot
      player.ducking = false;

      if (btn("left")) {
        player.x -= 1.8;
        player.dir = -1;
        player.walkFrame += 0.2;
      } else if (btn("right")) {
        player.x += 1.8;
        player.dir = 1;
        player.walkFrame += 0.2;
      } else {
        player.walkFrame = 0;
      }

      // Duck
      if (btn("down") && player.onGround && !player.jumping) {
        player.ducking = true;
      }

      // Jump
      if (btnp("b") && player.onGround && !player.ducking) {
        player.vy = -4;
        player.jumping = true;
        player.onGround = false;
        note(0, "G4", 0.03);
      }

      // Duck with B when on ground and not jumping
      if (btn("b") && player.onGround && !player.jumping) {
        player.ducking = true;
      }

      // Gravity
      if (!player.onGround) {
        player.vy += 0.25;
        player.y += player.vy;

        const currentFloor = flr((player.y + TILE) / FLOOR_H);
        const floorPixY = currentFloor * FLOOR_H;

        if (player.vy > 0 && player.y + TILE >= floorPixY && currentFloor > 0) {
          const shaftIdx = isInShaft(player.x);
          if (shaftIdx < 0) {
            player.y = floorPixY - TILE;
            player.vy = 0;
            player.onGround = true;
            player.jumping = false;
          } else {
            const elev = findElevatorAt(player.x, player.y);
            if (elev) {
              player.y = elev.y;
              player.vy = 0;
              player.onGround = true;
              player.jumping = false;
              player.onElevator = elev;
              elev.hasPlayer = true;
            }
          }
        }
      }

      // Check elevator entry
      if (player.onGround && !player.jumping) {
        const shaftIdx = isInShaft(player.x);
        if (shaftIdx >= 0 && (btnp("up") || btnp("down"))) {
          const elev = findElevatorAt(player.x, player.y);
          if (elev) {
            player.onElevator = elev;
            elev.hasPlayer = true;
            player.x = elev.x;
            player.y = elev.y;
            elevatorSound();
          }
        }
      }

      // Snap to floor if on ground
      if (player.onGround && !player.jumping) {
        const currentFloor = flr((player.y + TILE) / FLOOR_H);
        const floorPixY = currentFloor * FLOOR_H;
        player.y = floorPixY - TILE;

        const shaftIdx = isInShaft(player.x);
        if (shaftIdx >= 0) {
          const elev = findElevatorAt(player.x, player.y);
          if (!elev) {
            player.onGround = false;
            player.vy = 0;
          }
        }
      }

      // Escalator usage
      if (player.onGround) {
        for (const esc of escalators) {
          if (_abs(player.x - esc.x) < 12) {
            const playerFloor = flr((player.y + TILE) / FLOOR_H);
            if (playerFloor === esc.floor && btn("up")) {
              player.y = (esc.floor - 1) * FLOOR_H - TILE;
              player.x = esc.x;
              note(0, "D4", 0.04);
            }
          }
        }
      }

      // Shoot
      if (shootCooldown > 0) shootCooldown--;
      if (btnp("a") && shootCooldown <= 0 && !player.ducking) {
        bullets.push({ x: player.x + (player.dir > 0 ? TILE : -8), y: player.y + 4, dir: player.dir });
        shootCooldown = 10;
        shootSound();
        player.shooting = true;
        player.shootTimer = 8;
      }

      // Door interaction
      if (player.onGround && btn("up")) {
        for (const door of doors) {
          if (!door.open && _abs(player.x - door.x) < TILE && _abs(player.y - door.y) < 8) {
            door.open = true;
            door.openTimer = 90;
            doorSound();
            if (door.isRed && !door.collected) {
              door.collected = true;
              docsCollected++;
              score += 500;
              docSound();
            }
          }
        }
      }
    }

    // Clamp player position
    player.x = _max(TILE, min(W - TILE * 2, player.x));

    // Shoot timer
    if (player.shootTimer > 0) {
      player.shootTimer--;
      if (player.shootTimer <= 0) player.shooting = false;
    }

    // --- Update bullets (circle collision) ---
    for (let i = bullets.length - 1; i >= 0; i--) {
      const b = bullets[i];
      b.x += b.dir * 5;
      if (b.x < -TILE || b.x > W + TILE) { bullets.splice(i, 1); continue; }

      // Bullet center
      const bcx = b.x + 8;
      const bcy = b.y + 8;

      // Hit lamp (circle vs circle)
      for (const lamp of lamps) {
        if (lamp.lit) {
          const lcx = lamp.x + 8;
          const lcy = lamp.y + 8;
          if (circHit(bcx, bcy, BULLET_R, lcx, lcy, 6)) {
            lamp.lit = false;
            bullets.splice(i, 1);
            lampSound();
            score += 50;
            break;
          }
        }
      }
    }

    // --- Update enemy bullets (circle collision) ---
    for (let i = eBullets.length - 1; i >= 0; i--) {
      const b = eBullets[i];
      b.x += b.dir * 3.5;
      if (b.x < -TILE || b.x > W + TILE) { eBullets.splice(i, 1); continue; }

      // Hit player (circle bullet vs rect player)
      if (invincible <= 0 && !player.dead) {
        const bcx = b.x + 8;
        const bcy = b.y + 8;
        const ph = player.ducking ? 8 : TILE;
        const py = player.ducking ? player.y + 8 : player.y;
        // Circle vs rect: find closest point on rect to circle center
        const closestX = _max(player.x, min(player.x + TILE, bcx));
        const closestY = _max(py, min(py + ph, bcy));
        const dx = bcx - closestX;
        const dy = bcy - closestY;
        if (dx * dx + dy * dy < EBULLET_R * EBULLET_R) {
          eBullets.splice(i, 1);
          killPlayer();
          continue;
        }
      }
    }

    // --- Update doors ---
    for (const door of doors) {
      if (door.open) {
        door.openTimer--;
        if (door.openTimer <= 0) door.open = false;
      }
    }

    // --- Update enemies ---
    for (let i = enemies.length - 1; i >= 0; i--) {
      const e = enemies[i];
      if (e.state === "dead") {
        enemies.splice(i, 1);
        setTimeout(respawnEnemy, 3000);
        continue;
      }

      const playerFloor = flr((player.y + TILE) / FLOOR_H);
      const enemyFloor = flr((e.y + TILE) / FLOOR_H);
      const distToPlayer = _abs(e.x - player.x);
      const sameFloor = enemyFloor === playerFloor;

      if (e.onElevator) {
        const elev = e.onElevator;
        e.stateTimer--;
        elev.y += (e.stateTimer > 30 ? -1 : 1) * 1;
        elev.y = _max(elev.minY, min(elev.maxY, elev.y));
        e.y = elev.y;
        e.x = elev.x;

        if (e.stateTimer <= 0) {
          e.onElevator = null;
          e.state = "patrol";
          const nearFloor = flr((e.y + TILE) / FLOOR_H);
          e.y = nearFloor * FLOOR_H - TILE;
          e.floor = nearFloor;
          elev.hasPlayer = false;
        }
      } else if (e.state === "patrol") {
        e.x += e.dir * e.speed;
        e.walkFrame += 0.15;

        if (e.x < TILE + 4 || e.x > W - TILE * 2 - 4) {
          e.dir = -e.dir;
        }

        const shaftIdx = isInShaft(e.x + e.dir * TILE);
        if (shaftIdx >= 0) {
          if (rnd(1) < 0.01) {
            const elev = findElevatorAt(e.x, e.y);
            if (elev && !elev.hasPlayer) {
              e.onElevator = elev;
              elev.hasPlayer = true;
              e.state = "riding";
              e.stateTimer = 60 + flr(rnd(60));
              elevatorSound();
            }
          } else {
            e.dir = -e.dir;
          }
        }

        if (sameFloor && distToPlayer < 120) {
          e.state = "chase";
          e.alertTimer = 120;
          e.dir = player.x > e.x ? 1 : -1;
        }

        if (rnd(1) < 0.005) e.dir = -e.dir;

      } else if (e.state === "chase") {
        e.dir = player.x > e.x ? 1 : -1;
        e.x += e.dir * (e.speed + 0.3);
        e.walkFrame += 0.2;

        e.shootCooldown--;
        if (e.shootCooldown <= 0 && sameFloor && distToPlayer < 150 && distToPlayer > 24) {
          eBullets.push({ x: e.x + (e.dir > 0 ? TILE : -8), y: e.y + 4, dir: e.dir });
          e.shootCooldown = 30 + flr(rnd(30));
          note(1, "E5", 0.03);
        }

        const shaftIdx = isInShaft(e.x + e.dir * TILE);
        if (shaftIdx >= 0) e.dir = -e.dir;

        e.alertTimer--;
        if (e.alertTimer <= 0 || !sameFloor || distToPlayer > 150) {
          e.state = "patrol";
        }

        e.x = _max(TILE, min(W - TILE * 2, e.x));
      }

      // Bullet-enemy collision (circle bullet vs rect enemy)
      for (let j = bullets.length - 1; j >= 0; j--) {
        const b = bullets[j];
        const bcx = b.x + 8;
        const bcy = b.y + 8;
        // enemy rect: e.x, e.y, TILE, TILE
        const closestX = _max(e.x, min(e.x + TILE, bcx));
        const closestY = _max(e.y, min(e.y + TILE, bcy));
        const dx = bcx - closestX;
        const dy = bcy - closestY;
        if (dx * dx + dy * dy < BULLET_R * BULLET_R) {
          bullets.splice(j, 1);
          e.hp--;
          if (e.hp <= 0) {
            addExplosion(e.x, e.y);
            score += 300;
            hitSound();
            e.state = "dead";
          }
          break;
        }
      }

      // Elevator crush detection (rect)
      for (const elev of elevators) {
        if (elev.moving && elev.hasPlayer && e.state !== "dead") {
          if (_abs(e.x - elev.x) < TILE && _abs(e.y - elev.y) < TILE + 2) {
            addExplosion(e.x, e.y);
            score += 500;
            crushSound();
            e.state = "dead";
          }
        }
      }

      // Player-enemy body collision (rect vs rect)
      if (e.state !== "dead" && invincible <= 0 && !player.dead) {
        if (_abs(player.x - e.x) < 12 && _abs(player.y - e.y) < 12) {
          killPlayer();
        }
      }
    }

    // --- Move elevators without players ---
    for (const elev of elevators) {
      if (!elev.hasPlayer && elev.moving) {
        elev.y += elev.dir * 1;
        elev.y = _max(elev.minY, min(elev.maxY, elev.y));
      }
    }

    // --- Explosions ---
    for (let i = explosions.length - 1; i >= 0; i--) {
      explosions[i].timer--;
      if (explosions[i].timer <= 0) explosions.splice(i, 1);
    }

    // --- Particles ---
    for (let i = particles.length - 1; i >= 0; i--) {
      const p = particles[i]; p.x += p.vx; p.y += p.vy; p.vy += 0.05; p.life--;
      if (p.life <= 0) particles.splice(i, 1);
    }

    // --- Win condition ---
    const playerFloor = flr((player.y + TILE) / FLOOR_H);
    if (playerFloor >= NUM_FLOORS - 1 && docsCollected >= docsTotal) {
      winSound();
      score += 2000;
      Mono.go(WIN); return;
    }

    updateCamera();
    },
    draw() {
    cls(0);

    const cy = flr(camY);

    // Draw building
    drawBuilding(cy);

    // Draw escalators
    for (const esc of escalators) {
      const sy = esc.bottomY - cy;
      const sx = esc.x;
      if (sy > -TILE * 4 && sy < H + TILE) {
        for (let step = 0; step < 3; step++) {
          const stepY = sy - step * TILE;
          const stepX = sx - step * 4;
          spr(37, stepX, stepY);
        }
      }
    }

    // Draw elevator shafts and cars
    for (let si = 0; si < SHAFT_POSITIONS.length; si++) {
      const sx = SHAFT_POSITIONS[si] * TILE;
      for (let fy = -1; fy < NUM_FLOORS + 1; fy++) {
        const shaftY = fy * FLOOR_H - cy;
        if (shaftY > -TILE && shaftY < H + TILE) {
          spr(31, sx, shaftY);
        }
      }
    }

    // Draw elevator cars
    for (const elev of elevators) {
      const ey = flr(elev.y) - cy;
      if (ey > -TILE * 2 && ey < H + TILE) {
        spr(30, elev.x, ey);
        dbg(elev.x, ey, TILE, TILE);
      }
    }

    // Draw doors
    for (const door of doors) {
      const dy = door.y - cy;
      if (dy > -TILE * 2 && dy < H + TILE) {
        if (door.isRed) {
          spr(door.open ? 21 : 20, door.x, dy);
          if (door.open && !door.collected) {
            spr(38, door.x, dy - TILE);
          }
        } else {
          spr(door.open ? 23 : 22, door.x, dy);
        }
        dbg(door.x, dy, TILE, TILE);
      }
    }

    // Draw lamps
    for (const lamp of lamps) {
      const ly = lamp.y - cy;
      if (ly > -TILE * 2 && ly < H + TILE) {
        spr(lamp.lit ? 34 : 35, lamp.x, ly);
        dbgC(lamp.x + 8, ly + 8, 6);

        if (lamp.lit) {
          const floorBelow = lamp.floor;
          const lightY = getFloorY(floorBelow) - cy - 2;
          for (let lx = -16; lx <= 16; lx++) {
            const intensity = 2 - flr(_abs(lx) / 7);
            if (intensity > 0) {
              const px = lamp.x + 8 + lx;
              const py = lightY;
              if (px >= 0 && px < W && py >= 0 && py < H) {
                pix(px, py, min(3, intensity + 1));
              }
            }
          }
        }
      }
    }

    // Draw enemy bullets
    for (const b of eBullets) {
      const by = b.y - cy;
      if (by > -TILE && by < H + TILE) {
        spr(36, flr(b.x), flr(by), b.dir < 0);
        dbgC(flr(b.x) + 8, flr(by) + 8, EBULLET_R);
      }
    }

    // Draw enemies
    for (const e of enemies) {
      if (e.state === "dead") continue;
      const ey = flr(e.y) - cy;
      if (ey > -TILE * 2 && ey < H + TILE) {
        const flipX = e.dir < 0;
        let sprId = 10;
        if (e.shootCooldown > 20 && e.state === "chase") {
          sprId = 12;
        } else if (flr(e.walkFrame) % 2 === 1) {
          sprId = 11;
        }
        spr(sprId, flr(e.x), ey, flipX);
        dbg(flr(e.x), ey, TILE, TILE);

        if (e.state === "chase" && flr(Mono.frame / 6) % 2 === 0) {
          text("!", flr(e.x) + 6, ey - 10, 3);
        }
      }
    }

    // Draw player bullets
    for (const b of bullets) {
      const by = b.y - cy;
      if (by > -TILE && by < H + TILE) {
        spr(36, flr(b.x), flr(by), b.dir < 0);
        dbgC(flr(b.x) + 8, flr(by) + 8, BULLET_R);
      }
    }

    // Draw player
    if (!player.dead) {
      if (invincible > 0 && flr(Mono.frame / 3) % 2 === 0) {
        // Blink during invincibility
      } else {
        const py = flr(player.y) - cy;
        const flipX = player.dir < 0;
        let sprId = 1;
        if (player.shooting) {
          sprId = 3;
        } else if (player.ducking) {
          sprId = 4;
        } else if (player.jumping) {
          sprId = 5;
        } else if (flr(player.walkFrame) % 2 === 1) {
          sprId = 2;
        }
        spr(sprId, flr(player.x), py, flipX);
        // Debug hitbox for player
        const ph = player.ducking ? 8 : TILE;
        const pdy = player.ducking ? py + 8 : py;
        dbg(flr(player.x), pdy, TILE, ph);
      }
    }

    // Draw car at bottom floor
    const carY = (NUM_FLOORS - 1) * FLOOR_H - TILE - cy;
    if (carY > -TILE * 2 && carY < H + TILE) {
      spr(39, W / 2 - 8, carY);
      spr(39, W / 2 + 8, carY, true);
      if (docsCollected >= docsTotal && flr(Mono.frame / 10) % 2 === 0) {
        text("V", flr(W / 2), carY - 12, 3);
      }
    }

    // Draw explosions
    for (const e of explosions) {
      const ey = flr(e.y) - cy;
      if (ey > -TILE * 2 && ey < H + TILE) {
        const sprId = e.timer > 6 ? 40 : 41;
        spr(sprId, flr(e.x), ey);
      }
    }

    // Draw particles
    for (const p of particles) {
      const py = p.y - cy;
      pix(flr(p.x), flr(py), p.color);
    }

    // --- HUD (within 320x240) ---
    rectf(0, 0, W, 14, 0);
    text("SCORE:" + score, 2, 3, 3);
    // DOCS label right-aligned from center
    const docsStr = "DOCS:" + docsCollected + "/" + docsTotal;
    text(docsStr, 100, 3, docsCollected >= docsTotal ? 3 : 2);

    // Floor indicator
    const pFloor = NUM_FLOORS - flr((player.y + TILE) / FLOOR_H);
    text("F" + pFloor, 190, 3, 2);

    // Lives icons: 16px wide each, 2px gap, right-aligned with margin
    const livesStartX = W - 4 - lives * 18;
    for (let i = 0; i < lives; i++) spr(42, livesStartX + i * 18, 0);

    // Mini elevator indicator on right side
    const miniH = 140;
    const miniX = W - 8;
    const miniY = 50;
    // Clamp mini-map within screen
    if (miniX + 4 <= W && miniY + miniH <= H) {
      rectf(miniX, miniY, 4, miniH, 0);
      rect(miniX, miniY, 4, miniH, 1);
      const playerRatio = player.y / BUILDING_H;
      const miniPlayerY = miniY + playerRatio * miniH;
      rectf(miniX, flr(miniPlayerY), 4, 3, 3);
      const carRatio = ((NUM_FLOORS - 1) * FLOOR_H) / BUILDING_H;
      const miniCarY = miniY + carRatio * miniH;
      rectf(miniX, flr(miniCarY), 4, 2, 2);
    }

    // Message when all docs collected
    if (docsCollected >= docsTotal) {
      if (flr(Mono.frame / 20) % 2 === 0) {
        text("GET TO THE CAR!", 100, 18, 3);
      }
    }
    }
  });

  function killPlayer() {
    if (player.dead || invincible > 0) return;
    player.dead = true;
    player.deathTimer = 45;
    addExplosion(player.x, player.y);
    deathSound();
    if (player.onElevator) {
      player.onElevator.hasPlayer = false;
      player.onElevator = null;
    }
  }

  function drawBuilding(cy) {
    for (let f = 0; f < NUM_FLOORS; f++) {
      const floorY = f * FLOOR_H - cy;
      if (floorY > H + TILE || floorY < -FLOOR_H) continue;

      // Floor platform tiles
      for (let tx = 0; tx < TILES_X; tx++) {
        const tileX = tx * TILE;
        let inShaft = false;
        for (const sp of SHAFT_POSITIONS) {
          if (tx === sp) { inShaft = true; break; }
        }
        if (!inShaft) {
          spr(32, tileX, floorY);
        }
      }

      // Walls on left and right edges
      for (let wy = 0; wy < 3; wy++) {
        spr(33, 0, floorY - FLOOR_H + wy * TILE);
        spr(33, W - TILE, floorY - FLOOR_H + wy * TILE);
      }

      // Windows between floors
      if (f > 0 && f < NUM_FLOORS) {
        for (let wx = 2; wx < TILES_X - 1; wx += 3) {
          const winX = wx * TILE;
          let skip = false;
          for (const sp of SHAFT_POSITIONS) {
            if (_abs(wx - sp) < 2) { skip = true; break; }
          }
          if (!skip) {
            spr(43, winX, floorY - TILE - 8);
          }
        }
      }
    }

    // Ground floor - street level
    const groundY = (NUM_FLOORS - 1) * FLOOR_H - cy;
    if (groundY > -TILE * 2 && groundY < H + 30) {
      for (let tx = 0; tx < TILES_X; tx++) {
        rectf(tx * TILE, groundY + TILE, TILE, 16, 1);
      }
      for (let tx = 0; tx < TILES_X; tx += 3) {
        rectf(tx * TILE + 4, groundY + TILE + 4, TILE, 3, 2);
      }
    }

    // Roof
    const roofY = 0 - cy;
    if (roofY > -TILE * 2 && roofY < H + TILE) {
      for (let tx = 0; tx < TILES_X; tx++) {
        spr(32, tx * TILE, roofY);
      }
      line(W / 2, roofY - 20, W / 2, roofY, 2);
      line(W / 2 - 8, roofY - 12, W / 2 + 8, roofY - 12, 2);
    }
  }

  function drawTitle() {
    // Building silhouette background
    for (let bx = 0; bx < 10; bx++) {
      const bh = 60 + flr(rnd(90));
      const bw = 24 + flr(rnd(14));
      const x = bx * 34 - 7;
      rectf(x, H - bh, bw, bh, 0);
      rect(x, H - bh, bw, bh, 1);
      for (let wy = H - bh + 6; wy < H - 6; wy += 12) {
        for (let wx = x + 3; wx < x + bw - 4; wx += 7) {
          if (rnd(1) < 0.6) {
            rectf(wx, wy, 4, 5, rnd(1) < 0.3 ? 2 : 1);
          }
        }
      }
    }

    const ty = 20 + sin(Mono.frame * 0.04) * 3;

    text("ELEVATOR", 115, flr(ty), 3);
    text("ACTION", 125, flr(ty) + 12, 3);
    rectf(100, flr(ty) + 24, 120, 1, 2);

    // Player sprite showcase
    const px = W / 2 - 32;
    spr(1, px, flr(ty) + 32 + sin(Mono.frame * 0.08) * 2);
    spr(10, px + 24, flr(ty) + 34 + sin(Mono.frame * 0.08 + 1.5) * 2, true);
    spr(20, px + 48, flr(ty) + 32);

    text("SPY VS SPY IN A 30 FLOOR BUILDING", 55, 105, 2);

    if (flr(Mono.frame / 20) % 2 === 0) text("PRESS START", 120, 125, 3);

    text("ARROWS  MOVE/ELEVATOR", 85, 145, 2);
    text("A  SHOOT", 130, 157, 2);
    text("B  JUMP/DUCK", 115, 169, 2);
    text("UP AT DOOR  ENTER", 100, 181, 2);
    text("COLLECT ALL DOCUMENTS", 85, 198, 1);
    text("ESCAPE IN THE CAR!", 95, 210, 1);

    text("MONO DEMO V0.1", 112, 228, 1);
  }

  function drawGameOver() {
    for (const p of particles) pix(flr(p.x), flr(p.y), p.color);

    text("GAME OVER", 120, 75, 3);
    text("SCORE: " + score, 117, 98, 2);
    text("DOCS: " + docsCollected + "/" + docsTotal, 113, 111, 2);
    if (flr(Mono.frame / 20) % 2 === 0) text("PRESS START", 117, 150, 3);
  }

  function drawWin() {
    const ty = 30 + sin(Mono.frame * 0.05) * 3;

    for (let bx = 0; bx < 10; bx++) {
      const bh = 45 + flr(rnd(75));
      const bw = 24 + flr(rnd(14));
      rectf(bx * 34 - 7, H - bh, bw, bh, 0);
      rect(bx * 34 - 7, H - bh, bw, bh, 1);
    }

    text("MISSION COMPLETE!", 90, flr(ty), 3);
    text("ALL DOCUMENTS RECOVERED", 72, flr(ty) + 20, 2);

    const carX = (Mono.frame * 2) % (W + 40) - 20;
    spr(39, flr(carX), flr(ty) + 40);
    spr(39, flr(carX) + TILE, flr(ty) + 40, true);
    spr(1, flr(carX) + 4, flr(ty) + 30);

    text("SCORE: " + score, 117, flr(ty) + 64, 3);
    text("RATING:", 125, flr(ty) + 80, 2);

    let rating = "C";
    if (score > 8000) rating = "S";
    else if (score > 5000) rating = "A";
    else if (score > 3000) rating = "B";
    text(rating, 143, flr(ty) + 94, 3);

    if (flr(Mono.frame / 20) % 2 === 0) text("PRESS START", 117, 185, 3);
  }

  Mono.go(TITLE);
  Mono.boot("screen");
})();
</script>
