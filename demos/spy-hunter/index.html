<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GrayBox — Demo: Spy Hunter</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #0a0a0a;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100vh;
    font-family: monospace;
    overflow: hidden;
  }
  #frame {
    background: #111;
    border: 3px solid #333;
    border-radius: 8px;
    padding: 12px;
    box-shadow: 0 0 40px rgba(0,0,0,0.8), inset 0 0 20px rgba(0,0,0,0.5);
  }
  canvas {
    display: block;
    image-rendering: pixelated;
    image-rendering: crisp-edges;
  }
  #controls {
    margin-top: 12px;
    color: #6b6b6b;
    font-size: 11px;
    text-align: center;
    letter-spacing: 1px;
  }
  #controls span { color: #b0b0b0; }
</style>
</head>
<body>
<div id="frame">
  <canvas id="screen"></canvas>
</div>
<div id="controls">
  <span>←→</span> STEER &nbsp;&nbsp; <span>↑</span> ACCEL &nbsp;&nbsp; <span>Z</span> SHOOT &nbsp;&nbsp; <span>X</span> OIL/SMOKE &nbsp;&nbsp; <span>ENTER</span> START
</div>
<script>
(() => {
  "use strict";

  // ============================================================
  // GrayBox Runtime (inline)
  // ============================================================
  const W = 480;
  const H = 320;
  const FPS = 30;
  const COLORS = ["#1a1a1a", "#6b6b6b", "#b0b0b0", "#e8e8e8"];
  const canvas = document.getElementById("screen");
  canvas.width = W;
  canvas.height = H;
  function fitCanvas() {
    var maxW = window.innerWidth - 40;
    var maxH = window.innerHeight - 60;
    var s = Math.min(maxW / W, maxH / H);
    canvas.style.width = (W * s) + "px";
    canvas.style.height = (H * s) + "px";
  }
  fitCanvas();
  window.addEventListener("resize", fitCanvas);
  const ctx = canvas.getContext("2d");
  ctx.imageSmoothingEnabled = false;
  const buf = ctx.createImageData(W, H);
  const buf32 = new Uint32Array(buf.data.buffer);

  function hexToABGR(hex) {
    const r = parseInt(hex.slice(1, 3), 16);
    const g = parseInt(hex.slice(3, 5), 16);
    const b = parseInt(hex.slice(5, 7), 16);
    return (255 << 24) | (b << 16) | (g << 8) | r;
  }
  const COLOR_U32 = COLORS.map(hexToABGR);

  const sprites = {};
  const tilemap = {};

  const keyMap = {
    "ArrowUp": "up", "ArrowDown": "down", "ArrowLeft": "left", "ArrowRight": "right",
    "w": "up", "s": "down", "a": "left", "d": "right",
    "z": "a", "Z": "a", "x": "b", "X": "b",
    "Enter": "start", " ": "a"
  };
  const keys = {};
  const keysPrev = {};

  document.addEventListener("keydown", e => {
    const k = keyMap[e.key];
    if (k) { keys[k] = true; e.preventDefault(); }
  });
  document.addEventListener("keyup", e => {
    const k = keyMap[e.key];
    if (k) { keys[k] = false; e.preventDefault(); }
  });

  let audioCtx = null;
  const channels = [null, null];
  const channelGains = [null, null];
  function ensureAudio() {
    if (!audioCtx) {
      audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      for (let i = 0; i < 2; i++) {
        channelGains[i] = audioCtx.createGain();
        channelGains[i].gain.value = 0.15;
        channelGains[i].connect(audioCtx.destination);
      }
    }
  }

  const NOTE_NAMES = ["C","C#","D","D#","E","F","F#","G","G#","A","A#","B"];
  function noteToFreq(noteStr) {
    const match = noteStr.match(/^([A-G]#?)(\d)$/);
    if (!match) return 440;
    const name = match[1];
    const octave = parseInt(match[2]);
    const semitone = NOTE_NAMES.indexOf(name);
    if (semitone === -1) return 440;
    const midi = (octave + 1) * 12 + semitone;
    return 440 * Math.pow(2, (midi - 69) / 12);
  }

  const FONT_W = 4;
  const FONT_H = 7;
  const FONT = {};
  const fontData = {
    "A":"0110100110011111100110011001","B":"1110100110101110100110011110",
    "C":"0110100110001000100001100110","D":"1100101010011001100110101100",
    "E":"1111100010001110100010001111","F":"1111100010001110100010001000",
    "G":"0111100010001011100101100111","H":"1001100110011111100110011001",
    "I":"1110010001000100010001001110","J":"0111001000100010001010100100",
    "K":"1001101011001100101010011001","L":"1000100010001000100010001111",
    "M":"1001111111011001100110011001","N":"1001110111011001100110011001",
    "O":"0110100110011001100110010110","P":"1110100110011110100010001000",
    "Q":"0110100110011001101101100001","R":"1110100110011110101010011001",
    "S":"0111100010000110000110001110","T":"1111001000100010001000100010",
    "U":"1001100110011001100110010110","V":"1001100110011001100101100110",
    "W":"1001100110011001101111011001","X":"1001100101100110011010011001",
    "Y":"1001100101100010001000100010","Z":"1111000100100100100010001111",
    "0":"0110100111011011101110010110","1":"0100110001000100010001001110",
    "2":"0110100100010010010010001111","3":"1110000100010110000110011110",
    "4":"1001100110011111000100010001","5":"1111100010001110000100011110",
    "6":"0110100010001110100110010110","7":"1111000100010010010001001000",
    "8":"0110100110010110100110010110","9":"0110100110010111000100010110",
    " ":"0000000000000000000000000000",
    ".":"0000000000000000000001000100",
    ",":"0000000000000000001000101000",
    "!":"0100010001000100000000000100",
    "?":"0110100100010010000000000010",
    "-":"0000000000001110000000000000",
    "+":"0000001001001110010000100000",
    ":":"0000010001000000010001000000",
    "/":"0001000100100010010010001000",
    "*":"0000101001001110010010100000",
    "#":"0101111101011111010100000000",
    "(":"0010010010001000010001000010",
    ")":"0100001000010001000100100100",
    "=":"0000000011110000111100000000",
    "'":"0100010010000000000000000000",
    "\"":"1010101000000000000000000000",
    "<":"0010010010001000010000100010",
    ">":"1000010000100001001001001000",
    "_":"0000000000000000000000001111",
  };
  for (const [ch, bits] of Object.entries(fontData)) {
    FONT[ch] = [];
    for (let i = 0; i < bits.length; i++) FONT[ch].push(parseInt(bits[i]));
  }

  const API = {};
  API._init = null;
  API._update = null;
  API._draw = null;
  API.frame = 0;

  API.cls = function(c = 0) { buf32.fill(COLOR_U32[c] || COLOR_U32[0]); };
  API.pix = function(x, y, c) {
    x = Math.floor(x); y = Math.floor(y);
    if (x < 0 || x >= W || y < 0 || y >= H) return;
    buf32[y * W + x] = COLOR_U32[c] || COLOR_U32[0];
  };
  API.line = function(x0, y0, x1, y1, c) {
    x0=Math.floor(x0); y0=Math.floor(y0); x1=Math.floor(x1); y1=Math.floor(y1);
    const dx=Math.abs(x1-x0), dy=Math.abs(y1-y0);
    const sx=x0<x1?1:-1, sy=y0<y1?1:-1;
    let err=dx-dy;
    while(true) {
      API.pix(x0,y0,c);
      if(x0===x1&&y0===y1) break;
      const e2=2*err;
      if(e2>-dy){err-=dy;x0+=sx;}
      if(e2<dx){err+=dx;y0+=sy;}
    }
  };
  API.rect = function(x,y,w,h,c) {
    API.line(x,y,x+w-1,y,c); API.line(x+w-1,y,x+w-1,y+h-1,c);
    API.line(x+w-1,y+h-1,x,y+h-1,c); API.line(x,y+h-1,x,y,c);
  };
  API.rectf = function(x,y,w,h,c) {
    x=Math.floor(x); y=Math.floor(y);
    const col=COLOR_U32[c]||COLOR_U32[0];
    for(let py=Math.max(0,y);py<Math.min(H,y+h);py++)
      for(let px=Math.max(0,x);px<Math.min(W,x+w);px++)
        buf32[py*W+px]=col;
  };
  API.circ = function(cx,cy,r,c) {
    let x=r,y=0,d=1-r; cx=Math.floor(cx); cy=Math.floor(cy);
    while(x>=y){
      API.pix(cx+x,cy+y,c);API.pix(cx-x,cy+y,c);
      API.pix(cx+x,cy-y,c);API.pix(cx-x,cy-y,c);
      API.pix(cx+y,cy+x,c);API.pix(cx-y,cy+x,c);
      API.pix(cx+y,cy-x,c);API.pix(cx-y,cy-x,c);
      y++; if(d<0){d+=2*y+1;}else{x--;d+=2*(y-x)+1;}
    }
  };
  API.circf = function(cx,cy,r,c) {
    cx=Math.floor(cx); cy=Math.floor(cy);
    const col=COLOR_U32[c]||COLOR_U32[0]; const r2=r*r;
    for(let py=-r;py<=r;py++) for(let px=-r;px<=r;px++)
      if(px*px+py*py<=r2){ const sx=cx+px,sy=cy+py;
        if(sx>=0&&sx<W&&sy>=0&&sy<H) buf32[sy*W+sx]=col; }
  };
  API.sprite = function(id, data) {
    const arr = new Uint8Array(64); let i = 0;
    for (const ch of data) { if (ch>='0'&&ch<='3') { arr[i++]=parseInt(ch); if(i>=64) break; } }
    sprites[id] = arr;
  };
  API.spr = function(id, x, y, flipX, flipY) {
    const s=sprites[id]; if(!s) return;
    x=Math.floor(x); y=Math.floor(y);
    for(let py=0;py<8;py++) for(let px=0;px<8;px++){
      const sx=flipX?7-px:px, sy=flipY?7-py:py;
      const c=s[sy*8+sx], dx=x+px, dy=y+py;
      if(dx>=0&&dx<W&&dy>=0&&dy<H) buf32[dy*W+dx]=COLOR_U32[c];
    }
  };
  // Sprite draw with transparency (color 0 = transparent)
  API.sprT = function(id, x, y, flipX, flipY) {
    const s=sprites[id]; if(!s) return;
    x=Math.floor(x); y=Math.floor(y);
    for(let py=0;py<8;py++) for(let px=0;px<8;px++){
      const sx=flipX?7-px:px, sy=flipY?7-py:py;
      const c=s[sy*8+sx]; if(c===0) continue;
      const dx=x+px, dy=y+py;
      if(dx>=0&&dx<W&&dy>=0&&dy<H) buf32[dy*W+dx]=COLOR_U32[c];
    }
  };
  API.text = function(str, x, y, c) {
    str=String(str).toUpperCase(); let cx=Math.floor(x); const cy=Math.floor(y);
    const col=COLOR_U32[c]||COLOR_U32[3];
    for(const ch of str){
      const glyph=FONT[ch];
      if(glyph) for(let py=0;py<FONT_H;py++) for(let px=0;px<FONT_W;px++)
        if(glyph[py*FONT_W+px]){ const dx=cx+px,dy=cy+py;
          if(dx>=0&&dx<W&&dy>=0&&dy<H) buf32[dy*W+dx]=col; }
      cx+=FONT_W+1;
    }
  };
  API.mget = function(cx,cy) { return tilemap[cx+","+cy]||0; };
  API.mset = function(cx,cy,id) { tilemap[cx+","+cy]=id; };
  API.map = function(mx,my,mw,mh,sx,sy) {
    for(let ty=0;ty<mh;ty++) for(let tx=0;tx<mw;tx++){
      const id=API.mget(mx+tx,my+ty); if(id>0) API.spr(id,sx+tx*8,sy+ty*8); }
  };
  API.btn = function(k) { return !!keys[k]; };
  API.btnp = function(k) { return !!keys[k] && !keysPrev[k]; };
  API.note = function(ch, noteStr, dur) {
    ensureAudio(); if(ch<0||ch>1) return; API.stop(ch);
    const osc=audioCtx.createOscillator(); osc.type="square";
    osc.frequency.value=noteToFreq(noteStr);
    osc.connect(channelGains[ch]); osc.start();
    osc.stop(audioCtx.currentTime+dur); channels[ch]=osc;
  };
  API.stop = function(ch) {
    if(ch===undefined){API.stop(0);API.stop(1);return;}
    if(channels[ch]){try{channels[ch].stop();}catch(e){} channels[ch]=null;}
  };
  API.rnd = function(max) { return Math.random()*max; };
  API.flr = Math.floor;
  API.abs = Math.abs;
  API.min = Math.min;
  API.max = Math.max;
  API.sin = Math.sin;
  API.cos = Math.cos;

  function tick() {
    if (API._update) API._update();
    if (API._draw) API._draw();
    ctx.putImageData(buf, 0, 0);
    for (const k in keys) keysPrev[k] = keys[k];
    API.frame++;
  }

  // ============================================================
  // Spy Hunter Game
  // ============================================================
  const { cls, pix, line, rect, rectf, circ, circf, sprite: defSprite,
          spr, sprT, text, btn, btnp, note, stop, rnd, flr, abs: _abs,
          min, max: _max, sin, cos } = API;

  // --- Sprites ---

  // 1: Player spy car (top-down, facing up)
  defSprite(1,
    "00300300" +
    "03333300" +
    "33233230" +
    "33333330" +
    "33233230" +
    "33333330" +
    "03300330" +
    "01300310"
  );

  // 2: Enemy road blocker car (wider, aggressive)
  defSprite(2,
    "01000100" +
    "01111100" +
    "13111310" +
    "11111110" +
    "13111310" +
    "11111110" +
    "01100110" +
    "01100110"
  );

  // 3: Bulletproof enforcer car (armored, dark)
  defSprite(3,
    "00100100" +
    "01111100" +
    "11111110" +
    "12111210" +
    "11111110" +
    "11111110" +
    "01100110" +
    "00100100"
  );

  // 4: Civilian car (innocent looking, light)
  defSprite(4,
    "00200200" +
    "02222200" +
    "23222320" +
    "22222220" +
    "23222320" +
    "22222220" +
    "02200220" +
    "00200200"
  );

  // 5: Helicopter (top-down with rotors)
  defSprite(5,
    "30000030" +
    "03000300" +
    "00313100" +
    "01131110" +
    "01131110" +
    "00313100" +
    "03000300" +
    "30000030"
  );

  // 6: Weapon van (power-up vehicle)
  defSprite(6,
    "00333300" +
    "03333330" +
    "32323230" +
    "33333330" +
    "32323230" +
    "33333330" +
    "03300330" +
    "01300310"
  );

  // 7: Player bullet
  defSprite(7,
    "00000000" +
    "00030000" +
    "00030000" +
    "00020000" +
    "00020000" +
    "00000000" +
    "00000000" +
    "00000000"
  );

  // 8: Explosion frame 1
  defSprite(8,
    "00000000" +
    "00300100" +
    "01002000" +
    "00031000" +
    "00130200" +
    "01000010" +
    "00100000" +
    "00000000"
  );

  // 9: Explosion frame 2
  defSprite(9,
    "20010020" +
    "01000010" +
    "00203200" +
    "03033030" +
    "00232000" +
    "01000300" +
    "20001001" +
    "00200010"
  );

  // 10: Oil slick puddle
  defSprite(10,
    "00000000" +
    "00000000" +
    "00111000" +
    "01111100" +
    "01111100" +
    "00111000" +
    "00000000" +
    "00000000"
  );

  // 11: Bomb (helicopter drops)
  defSprite(11,
    "00000000" +
    "00010000" +
    "00030000" +
    "00131000" +
    "00131000" +
    "00030000" +
    "00000000" +
    "00000000"
  );

  // 12: Life icon (small car)
  defSprite(12,
    "00000000" +
    "00300300" +
    "03333300" +
    "33233230" +
    "33333330" +
    "03300330" +
    "00000000" +
    "00000000"
  );

  // 13: Smoke cloud
  defSprite(13,
    "00000000" +
    "00220000" +
    "02222000" +
    "22222200" +
    "02222220" +
    "00222200" +
    "00022000" +
    "00000000"
  );

  // 14: Tree (roadside decoration)
  defSprite(14,
    "00010000" +
    "00111000" +
    "01111100" +
    "01111100" +
    "00111000" +
    "00010000" +
    "00010000" +
    "00010000"
  );

  // 15: Bridge railing piece
  defSprite(15,
    "11111111" +
    "10000001" +
    "11111111" +
    "00100100" +
    "00100100" +
    "00100100" +
    "00100100" +
    "00100100"
  );

  // --- Game Constants ---
  const ROAD_W = 160;         // road width in pixels
  const ROAD_CENTER = W / 2;  // center of screen
  const ROAD_LEFT = ROAD_CENTER - ROAD_W / 2;
  const ROAD_RIGHT = ROAD_CENTER + ROAD_W / 2;
  const LANE_W = ROAD_W / 4;  // 4 lanes

  // --- Game State ---
  let state = "title";
  let player, bullets, enemies, explosions, particles, oilSlicks, bombs, smokeTrails;
  let score, lives, distance, scrollSpeed, baseSpeed;
  let roadOffset, roadCurve, roadCurveTarget, roadCurveSpeed;
  let treesLeft, treesRight;
  let weaponVan, hasOil, hasSmoke, oilCount, smokeCount;
  let shootCooldown, invincible;
  let bridgeMode, bridgeTimer;
  let forkMode, forkTimer, forkDir;
  let spawnTimer, heliSpawnTimer;
  let civilianPenaltyTimer;
  let titleCarY;

  function laneX(lane) {
    return ROAD_LEFT + lane * LANE_W + LANE_W / 2 - 4;
  }

  function resetGame() {
    player = { x: ROAD_CENTER - 4, y: H - 40, lane: 1, speed: 0 };
    bullets = [];
    enemies = [];
    explosions = [];
    particles = [];
    oilSlicks = [];
    bombs = [];
    smokeTrails = [];
    score = 0;
    lives = 3;
    distance = 0;
    baseSpeed = 2.5;
    scrollSpeed = baseSpeed;
    roadOffset = 0;
    roadCurve = 0;
    roadCurveTarget = 0;
    roadCurveSpeed = 0;
    shootCooldown = 0;
    invincible = 0;
    bridgeMode = false;
    bridgeTimer = 0;
    forkMode = false;
    forkTimer = 0;
    forkDir = 0;
    spawnTimer = 40;
    heliSpawnTimer = 200;
    weaponVan = null;
    hasOil = false;
    hasSmoke = false;
    oilCount = 0;
    smokeCount = 0;
    civilianPenaltyTimer = 0;

    treesLeft = [];
    treesRight = [];
    for (let i = 0; i < 12; i++) {
      treesLeft.push({ y: i * 30 + flr(rnd(10)) });
      treesRight.push({ y: i * 30 + flr(rnd(10)) });
    }
  }

  function addExplosion(x, y) {
    explosions.push({ x, y, timer: 14 });
    for (let i = 0; i < 6; i++)
      particles.push({
        x: x + 4, y: y + 4,
        vx: rnd(4) - 2, vy: rnd(4) - 2,
        life: 6 + flr(rnd(8)),
        color: flr(rnd(3)) + 1
      });
  }

  function shootSound() { note(0, "E5", 0.03); }
  function hitSound() { note(1, "C3", 0.06); setTimeout(() => note(1, "E3", 0.05), 40); }
  function deathSound() {
    note(0, "C3", 0.12); note(1, "G2", 0.12);
    setTimeout(() => { note(0, "A2", 0.18); note(1, "E2", 0.18); }, 120);
  }
  function pickupSound() {
    note(0, "C5", 0.08);
    setTimeout(() => note(0, "E5", 0.08), 80);
    setTimeout(() => note(0, "G5", 0.1), 160);
  }
  function penaltySound() {
    note(0, "A2", 0.15); note(1, "D2", 0.15);
  }
  function oilSound() { note(1, "F3", 0.1); }
  function smokeSound() { note(1, "A3", 0.08); setTimeout(() => note(1, "C4", 0.06), 60); }
  function engineSound() {
    // Subtle engine hum based on speed
    if (API.frame % 8 === 0 && scrollSpeed > 2) {
      note(1, scrollSpeed > 3.5 ? "A2" : "E2", 0.03);
    }
  }

  function spawnEnemy() {
    const types = ["blocker", "enforcer", "civilian"];
    // Weight civilians more, make enforcers rarer
    const weights = [3, 1 + flr(distance / 3000), 4];
    const total = weights.reduce((a, b) => a + b, 0);
    let r = rnd(total);
    let type = "civilian";
    for (let i = 0; i < types.length; i++) {
      r -= weights[i];
      if (r <= 0) { type = types[i]; break; }
    }

    const lane = flr(rnd(4));
    const sprId = type === "blocker" ? 2 : type === "enforcer" ? 3 : 4;
    const speed = type === "civilian" ? scrollSpeed * 0.6 :
                  type === "blocker" ? scrollSpeed * 0.3 :
                  scrollSpeed * 0.85;

    enemies.push({
      x: laneX(lane),
      y: -12,
      type,
      sprId,
      speed,
      lane,
      hp: type === "enforcer" ? 3 : 1,
      swerveTimer: type === "blocker" ? 30 + flr(rnd(40)) : 0,
      swerveDir: 0,
    });
  }

  function spawnHelicopter() {
    enemies.push({
      x: ROAD_LEFT + rnd(ROAD_W - 8),
      y: -12,
      type: "helicopter",
      sprId: 5,
      speed: scrollSpeed * 0.4,
      lane: -1,
      hp: 2,
      bombTimer: 40 + flr(rnd(30)),
      swerveTimer: 0,
      swerveDir: 0,
    });
  }

  function spawnWeaponVan() {
    if (weaponVan) return;
    const lane = 1 + flr(rnd(2));
    weaponVan = {
      x: laneX(lane),
      y: -12,
      speed: scrollSpeed * 0.7,
      lane,
    };
  }

  function playerDie() {
    lives--;
    addExplosion(player.x, player.y);
    deathSound();
    invincible = 90; // 3 seconds invincibility
    player.y = H - 40;
    player.x = ROAD_CENTER - 4;
    scrollSpeed = baseSpeed;
    if (lives <= 0) {
      state = "gameover";
    }
  }

  function boxCollide(ax, ay, aw, ah, bx, by, bw, bh) {
    return ax < bx + bw && ax + aw > bx && ay < by + bh && ay + ah > by;
  }

  resetGame();
  titleCarY = H;

  // ============================================================
  // Update
  // ============================================================
  API._update = function() {
    if (state === "title") {
      titleCarY -= 1.5;
      if (titleCarY < -20) titleCarY = H + 20;
      if (btnp("a") || btnp("start")) {
        state = "play";
        resetGame();
        note(0, "C5", 0.1);
        setTimeout(() => note(0, "E5", 0.1), 100);
        setTimeout(() => note(0, "G5", 0.15), 200);
      }
      return;
    }

    if (state === "gameover") {
      for (let i = particles.length - 1; i >= 0; i--) {
        const p = particles[i]; p.x += p.vx; p.y += p.vy; p.vy += 0.08; p.life--;
        if (p.life <= 0) particles.splice(i, 1);
      }
      if (btnp("a") || btnp("start")) state = "title";
      return;
    }

    // --- Play state ---

    // Increase difficulty over time
    baseSpeed = 2.5 + distance / 8000;
    if (baseSpeed > 5) baseSpeed = 5;

    // Player steering
    if (btn("left")) player.x -= 2.5;
    if (btn("right")) player.x += 2.5;

    // Player acceleration
    if (btn("up")) {
      scrollSpeed = min(baseSpeed + 2, scrollSpeed + 0.08);
    } else {
      scrollSpeed = _max(baseSpeed, scrollSpeed - 0.04);
    }

    // Clamp player to road (with small margin for shoulder)
    const roadL = ROAD_LEFT + roadCurve + 4;
    const roadR = ROAD_RIGHT + roadCurve - 12;
    player.x = _max(roadL, min(roadR, player.x));

    // Off-road detection
    if (player.x <= roadL + 2 || player.x >= roadR - 2) {
      scrollSpeed = _max(1.5, scrollSpeed - 0.15); // slow down off road
    }

    // Distance = score
    distance += scrollSpeed;
    score = flr(distance / 10);

    // Road curve
    if (API.frame % 120 === 0) {
      roadCurveTarget = rnd(60) - 30;
    }
    roadCurve += (roadCurveTarget - roadCurve) * 0.01;

    // Scroll road offset for lane markings
    roadOffset = (roadOffset + scrollSpeed) % 16;

    // Update trees
    for (const t of treesLeft) {
      t.y += scrollSpeed;
      if (t.y > H + 10) t.y -= H + 30;
    }
    for (const t of treesRight) {
      t.y += scrollSpeed;
      if (t.y > H + 10) t.y -= H + 30;
    }

    // Bridge mode
    if (bridgeMode) {
      bridgeTimer -= scrollSpeed;
      if (bridgeTimer <= 0) bridgeMode = false;
    } else if (!forkMode && rnd(1) < 0.001 && distance > 2000) {
      bridgeMode = true;
      bridgeTimer = 300;
    }

    // Fork mode
    if (forkMode) {
      forkTimer -= scrollSpeed;
      if (forkTimer <= 0) forkMode = false;
    } else if (!bridgeMode && rnd(1) < 0.0005 && distance > 5000) {
      forkMode = true;
      forkTimer = 400;
      forkDir = rnd(1) < 0.5 ? -1 : 1;
    }

    // Shooting
    if (shootCooldown > 0) shootCooldown--;
    if (btnp("a") && shootCooldown <= 0 && bullets.length < 3) {
      bullets.push({ x: player.x + 3, y: player.y - 6 });
      shootCooldown = 6;
      shootSound();
    }

    // Oil slick (B button)
    if (btnp("b") && hasOil && oilCount > 0) {
      oilSlicks.push({ x: player.x, y: player.y + 10, life: 180 });
      oilCount--;
      if (oilCount <= 0) hasOil = false;
      oilSound();
    }
    // Smoke screen (B button when no oil but has smoke)
    if (btnp("b") && !hasOil && hasSmoke && smokeCount > 0) {
      for (let i = 0; i < 5; i++) {
        smokeTrails.push({ x: player.x + rnd(8) - 2, y: player.y + 8 + i * 6, life: 90 });
      }
      smokeCount--;
      if (smokeCount <= 0) hasSmoke = false;
      smokeSound();
    }

    // Update bullets
    for (let i = bullets.length - 1; i >= 0; i--) {
      bullets[i].y -= 7;
      if (bullets[i].y < -8) bullets.splice(i, 1);
    }

    // Update oil slicks
    for (let i = oilSlicks.length - 1; i >= 0; i--) {
      oilSlicks[i].y += scrollSpeed;
      oilSlicks[i].life--;
      if (oilSlicks[i].life <= 0 || oilSlicks[i].y > H + 10) oilSlicks.splice(i, 1);
    }

    // Update smoke
    for (let i = smokeTrails.length - 1; i >= 0; i--) {
      smokeTrails[i].y += scrollSpeed * 0.5;
      smokeTrails[i].life--;
      if (smokeTrails[i].life <= 0 || smokeTrails[i].y > H + 10) smokeTrails.splice(i, 1);
    }

    // Update bombs
    for (let i = bombs.length - 1; i >= 0; i--) {
      const b = bombs[i];
      b.y += b.vy;
      b.vy += 0.1;
      // Check bomb-player collision
      if (invincible <= 0 && boxCollide(player.x, player.y, 8, 8, b.x, b.y, 6, 6)) {
        bombs.splice(i, 1);
        playerDie();
        continue;
      }
      if (b.y > H + 10) {
        bombs.splice(i, 1);
        continue;
      }
      // Bomb hits ground - explode
      if (b.y > b.targetY) {
        addExplosion(b.x - 2, b.y - 2);
        bombs.splice(i, 1);
      }
    }

    // Spawn enemies
    spawnTimer--;
    if (spawnTimer <= 0) {
      spawnEnemy();
      spawnTimer = _max(15, 50 - flr(distance / 1500));
    }

    // Spawn helicopters
    heliSpawnTimer--;
    if (heliSpawnTimer <= 0 && distance > 1500) {
      spawnHelicopter();
      heliSpawnTimer = 200 + flr(rnd(150));
    }

    // Spawn weapon van
    if (!weaponVan && API.frame % 300 === 0 && (!hasOil && !hasSmoke) && rnd(1) < 0.5) {
      spawnWeaponVan();
    }

    // Update weapon van
    if (weaponVan) {
      weaponVan.y += weaponVan.speed;
      // Player drives into van = pickup
      if (boxCollide(player.x, player.y, 8, 8, weaponVan.x, weaponVan.y, 8, 8)) {
        pickupSound();
        if (!hasOil) {
          hasOil = true;
          oilCount = 3;
        } else {
          hasSmoke = true;
          smokeCount = 3;
        }
        weaponVan = null;
      } else if (weaponVan && weaponVan.y > H + 10) {
        weaponVan = null;
      }
    }

    // Update enemies
    for (let i = enemies.length - 1; i >= 0; i--) {
      const e = enemies[i];

      if (e.type === "helicopter") {
        // Helicopter floats and drops bombs
        e.y += e.speed;
        e.x += sin(API.frame * 0.05 + i) * 0.8;
        e.bombTimer--;
        if (e.bombTimer <= 0 && e.y > 20 && e.y < H - 60) {
          bombs.push({
            x: e.x + 2,
            y: e.y + 8,
            vy: 1,
            targetY: player.y + rnd(20) - 10,
          });
          e.bombTimer = 50 + flr(rnd(30));
          note(0, "G3", 0.04);
        }
      } else {
        // Ground vehicles scroll down
        e.y += scrollSpeed - e.speed;

        // Blocker swerving behavior
        if (e.type === "blocker") {
          e.swerveTimer--;
          if (e.swerveTimer <= 0) {
            // Swerve toward player
            e.swerveDir = player.x > e.x ? 1.5 : -1.5;
            e.swerveTimer = 20 + flr(rnd(30));
          }
          e.x += e.swerveDir * 0.5;
          e.x = _max(ROAD_LEFT + roadCurve + 2, min(ROAD_RIGHT + roadCurve - 10, e.x));
        }

        // Enforcer rams toward player
        if (e.type === "enforcer") {
          if (e.y > 0 && _abs(e.y - player.y) < 80) {
            const dx = player.x - e.x;
            e.x += (dx > 0 ? 1 : -1) * 0.6;
            e.speed = scrollSpeed * 0.95; // match player speed
          }
        }
      }

      // Off screen removal
      if (e.y > H + 20 || e.y < -30) {
        enemies.splice(i, 1);
        continue;
      }

      // Check oil slick collision (spin out enemies)
      for (let j = oilSlicks.length - 1; j >= 0; j--) {
        const o = oilSlicks[j];
        if (e.type !== "helicopter" && boxCollide(e.x, e.y, 8, 8, o.x, o.y, 8, 6)) {
          addExplosion(e.x, e.y);
          if (e.type !== "civilian") score += 50;
          enemies.splice(i, 1);
          oilSlicks.splice(j, 1);
          hitSound();
          i = -1; // break outer
          break;
        }
      }
      if (i < 0) continue;

      // Check smoke trail (makes enemies swerve away)
      for (const s of smokeTrails) {
        if (e.type !== "helicopter" && boxCollide(e.x, e.y, 8, 8, s.x - 4, s.y - 4, 16, 12)) {
          e.x += (e.x < player.x ? -3 : 3);
        }
      }

      // Bullet-enemy collision
      for (let j = bullets.length - 1; j >= 0; j--) {
        const b = bullets[j];
        if (boxCollide(b.x, b.y, 4, 6, e.x, e.y, 8, 8)) {
          bullets.splice(j, 1);

          if (e.type === "civilian") {
            // Penalty for shooting civilians
            score = _max(0, score - 100);
            civilianPenaltyTimer = 60;
            penaltySound();
            addExplosion(e.x, e.y);
            enemies.splice(i, 1);
            break;
          }

          if (e.type === "enforcer") {
            e.hp--;
            if (e.hp <= 0) {
              addExplosion(e.x, e.y);
              score += 100;
              hitSound();
              enemies.splice(i, 1);
            } else {
              note(1, "A4", 0.03);
            }
            break;
          }

          // Blocker or helicopter
          e.hp--;
          if (e.hp <= 0) {
            addExplosion(e.x, e.y);
            score += e.type === "helicopter" ? 200 : 50;
            hitSound();
            enemies.splice(i, 1);
          }
          break;
        }
      }
    }

    // Enemy-player collision
    if (invincible <= 0) {
      for (let i = enemies.length - 1; i >= 0; i--) {
        const e = enemies[i];
        if (e.type === "helicopter") continue; // helicopters don't collide directly
        if (boxCollide(player.x + 1, player.y + 1, 6, 6, e.x + 1, e.y + 1, 6, 6)) {
          if (e.type === "civilian") {
            // Bumping civilian - penalty
            score = _max(0, score - 50);
            civilianPenaltyTimer = 40;
            penaltySound();
            addExplosion(e.x, e.y);
            enemies.splice(i, 1);
          } else {
            // Enemy car collision = death
            addExplosion(e.x, e.y);
            enemies.splice(i, 1);
            playerDie();
          }
          break;
        }
      }
    }

    // Invincibility countdown
    if (invincible > 0) invincible--;

    // Civilian penalty display timer
    if (civilianPenaltyTimer > 0) civilianPenaltyTimer--;

    // Explosions
    for (let i = explosions.length - 1; i >= 0; i--) {
      explosions[i].timer--;
      if (explosions[i].timer <= 0) explosions.splice(i, 1);
    }

    // Particles
    for (let i = particles.length - 1; i >= 0; i--) {
      const p = particles[i];
      p.x += p.vx; p.y += p.vy; p.vy += 0.05; p.life--;
      if (p.life <= 0) particles.splice(i, 1);
    }

    // Engine sound
    engineSound();
  };

  // ============================================================
  // Draw
  // ============================================================
  API._draw = function() {
    cls(0);

    const curveOff = flr(roadCurve);
    const rl = ROAD_LEFT + curveOff;
    const rr = ROAD_RIGHT + curveOff;

    if (state === "title") {
      // Draw a road in the background
      rectf(rl, 0, ROAD_W, H, 1);
      // Shoulder lines
      rectf(rl, 0, 3, H, 3);
      rectf(rr - 3, 0, 3, H, 3);
      // Lane dashes
      for (let ly = -16; ly < H; ly += 16) {
        const dy = flr((ly + (API.frame * 2) % 16));
        for (let lane = 1; lane < 4; lane++) {
          const lx = rl + lane * LANE_W;
          rectf(lx, dy, 2, 8, 2);
        }
      }

      // Trees
      for (let ty = 0; ty < H; ty += 30) {
        const dy = (ty + flr(API.frame * 1.5) % 30);
        sprT(14, rl - 14, dy % H, false, false);
        sprT(14, rr + 6, (dy + 15) % H, false, false);
      }

      // Title car driving up
      sprT(1, ROAD_CENTER - 4 + sin(API.frame * 0.03) * 10, flr(titleCarY), false, false);

      // Title text
      const ty = 50 + sin(API.frame * 0.04) * 4;
      text("SPY HUNTER", 185, flr(ty), 3);
      rectf(170, flr(ty) + 10, 140, 1, 2);

      text("TOP SECRET MISSION", 170, flr(ty) + 20, 2);

      // Instructions
      text("ARROWS  STEER/ACCEL", 170, 150, 2);
      text("Z  SHOOT FORWARD", 170, 162, 2);
      text("X  OIL/SMOKE", 170, 174, 2);

      // Score table
      text("-TARGETS-", 195, 200, 2);
      sprT(2, 180, 214); text("BLOCKER    50", 195, 216, 2);
      sprT(3, 180, 228); text("ENFORCER  100", 195, 230, 2);
      sprT(5, 180, 242); text("CHOPPER   200", 195, 244, 2);
      sprT(4, 180, 256); text("CIVILIAN  NO!", 195, 258, 1);

      if (flr(API.frame / 20) % 2 === 0)
        text("PRESS START", 195, 285, 3);

      text("GRAYBOX DEMO V0.1", 170, 308, 1);
      return;
    }

    if (state === "gameover") {
      // Dark road bg
      rectf(rl, 0, ROAD_W, H, 1);
      for (const p of particles) pix(flr(p.x), flr(p.y), p.color);

      text("GAME OVER", 195, 100, 3);
      text("DISTANCE: " + flr(distance / 10), 175, 130, 2);
      text("SCORE: " + score, 190, 145, 2);
      text("ENEMIES DESTROYED:", 165, 170, 2);

      if (flr(API.frame / 20) % 2 === 0)
        text("PRESS START", 195, 220, 3);
      return;
    }

    // --- Play state rendering ---

    // Grass/ground
    // Left grass
    rectf(0, 0, rl, H, 0);
    // Right grass
    rectf(rr, 0, W - rr, H, 0);
    // Road surface
    rectf(rl, 0, ROAD_W, H, 1);

    // Bridge rendering
    if (bridgeMode) {
      // Water on sides
      for (let wy = 0; wy < H; wy += 2) {
        const waveOff = sin((wy + API.frame * 2) * 0.1) * 3;
        for (let wx = 0; wx < rl; wx += 4) {
          pix(wx + flr(waveOff), wy, (wx + wy + API.frame) % 8 < 4 ? 1 : 0);
        }
        for (let wx = rr; wx < W; wx += 4) {
          pix(wx + flr(waveOff), wy, (wx + wy + API.frame) % 8 < 4 ? 1 : 0);
        }
      }
      // Bridge railings
      for (let by = -16; by < H; by += 8) {
        const dy = (by + flr(roadOffset)) % (H + 16) - 8;
        rectf(rl, dy, 3, 8, 2);
        rectf(rr - 3, dy, 3, 8, 2);
        // Railing posts
        if (dy % 16 < 8) {
          rectf(rl - 2, dy + 2, 2, 4, 2);
          rectf(rr, dy + 2, 2, 4, 2);
        }
      }
    } else {
      // Shoulder lines (white)
      rectf(rl, 0, 3, H, 3);
      rectf(rr - 3, 0, 3, H, 3);

      // Trees on sides
      for (const t of treesLeft) {
        sprT(14, rl - 14 + curveOff, flr(t.y));
      }
      for (const t of treesRight) {
        sprT(14, rr + 6 + curveOff, flr(t.y));
      }
    }

    // Fork rendering
    if (forkMode) {
      const forkX = ROAD_CENTER + curveOff + forkDir * 40;
      // Draw diverging road
      for (let fy = 0; fy < H; fy += 2) {
        const spread = (H - fy) * 0.3 * forkDir;
        rectf(flr(forkX + spread) - 20, fy, 40, 2, 1);
      }
    }

    // Lane dashes (animated scrolling)
    for (let ly = -16; ly < H; ly += 16) {
      const dy = flr(ly + roadOffset);
      if (dy < 0 || dy > H) continue;
      for (let lane = 1; lane < 4; lane++) {
        const lx = rl + lane * LANE_W;
        rectf(lx, dy, 2, 8, 2);
      }
    }

    // Oil slicks
    for (const o of oilSlicks) {
      sprT(10, flr(o.x), flr(o.y));
    }

    // Smoke trails
    for (const s of smokeTrails) {
      sprT(13, flr(s.x), flr(s.y));
    }

    // Weapon van
    if (weaponVan) {
      sprT(6, flr(weaponVan.x), flr(weaponVan.y));
      // Flashing indicator
      if (flr(API.frame / 6) % 2 === 0) {
        text("VAN", flr(weaponVan.x) - 2, flr(weaponVan.y) - 8, 3);
      }
    }

    // Enemies
    for (const e of enemies) {
      sprT(e.sprId, flr(e.x), flr(e.y));
      // Enforcer damage flash
      if (e.type === "enforcer" && e.hp < 3 && flr(API.frame / 4) % 2 === 0) {
        pix(flr(e.x) + 4, flr(e.y) + 4, 3);
      }
    }

    // Bombs
    for (const b of bombs) {
      sprT(11, flr(b.x), flr(b.y));
      // Bomb shadow
      pix(flr(b.x) + 2, flr(b.targetY), 1);
      pix(flr(b.x) + 3, flr(b.targetY), 1);
    }

    // Player bullets
    for (const b of bullets) sprT(7, flr(b.x), flr(b.y));

    // Player (blink when invincible)
    if (invincible <= 0 || flr(API.frame / 3) % 2 === 0) {
      sprT(1, flr(player.x), flr(player.y));
    }

    // Explosions
    for (const e of explosions) {
      const sprId = e.timer > 7 ? 8 : 9;
      sprT(sprId, flr(e.x), flr(e.y));
    }

    // Particles
    for (const p of particles) pix(flr(p.x), flr(p.y), p.color);

    // --- HUD ---
    rectf(0, 0, W, 14, 0);
    text("SCORE:" + score, 4, 4, 3);

    // Speed indicator
    const speedBar = flr((scrollSpeed / 5) * 40);
    text("SPD", W / 2 - 35, 4, 2);
    rectf(W / 2 - 10, 5, 42, 5, 1);
    rectf(W / 2 - 10, 5, speedBar, 5, 3);

    // Lives
    for (let i = 0; i < lives; i++) sprT(12, W - 40 + i * 12, 3);

    // Weapon indicators
    if (hasOil) {
      text("OIL:" + oilCount, 4, H - 10, 2);
    }
    if (hasSmoke) {
      text("SMK:" + smokeCount, hasOil ? 54 : 4, H - 10, 2);
    }

    // Civilian penalty warning
    if (civilianPenaltyTimer > 0) {
      if (flr(API.frame / 4) % 2 === 0) {
        text("CIVILIAN HIT! -100", 170, 30, 3);
      }
    }

    // Distance marker
    text("DIST:" + flr(distance / 10), W / 2 + 40, 4, 2);

    // Bridge indicator
    if (bridgeMode) {
      text("BRIDGE", W / 2 - 15, 20, 3);
    }
  };

  // ============================================================
  // Boot
  // ============================================================
  if (API._init) API._init();
  setInterval(tick, 1000 / FPS);
  document.addEventListener("keydown", ensureAudio, { once: true });
  document.addEventListener("click", ensureAudio, { once: true });
})();
</script>
</body>
</html>
