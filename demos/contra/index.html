  // ============================================================
  // 8x8 → 16x16 upscale helper
  // ============================================================
  function up(d) {
    let o = "";
    for (let r = 0; r < 8; r++) {
      let row = "";
      for (let c = 0; c < 8; c++) {
        const ch = d[r * 8 + c];
        row += ch + ch;
      }
      o += row + row;
    }
    return o;
  }

  // ============================================================
  // Level data generation
  // ============================================================
  function generateStage(stageNum) {
    const level = {
      width: 0,
      platforms: [],
      enemies: [],
      powerups: [],
      boss: null,
      bgElements: [],
    };

    const stageWidth = 1200 + stageNum * 400;
    level.width = stageWidth;

    // Ground with gaps
    let gx = 0;
    while (gx < stageWidth - 133) {
      const segLen = 53 + flr(rnd(107));
      level.platforms.push({ x: gx, y: GROUND_Y, w: segLen, ground: true });
      gx += segLen;

      if (rnd(1) < 0.3 && gx > 67) {
        gx += 21 + flr(rnd(16));
      }
    }
    level.platforms.push({ x: gx, y: GROUND_Y, w: 200, ground: true });
    level.width = gx + 200;

    // Elevated platforms
    for (let i = 0; i < 12 + stageNum * 4; i++) {
      const px = 80 + flr(rnd(level.width - 267));
      const py = GROUND_Y - 30 - flr(rnd(60));
      const pw = 27 + flr(rnd(40));
      level.platforms.push({ x: px, y: py, w: pw, ground: false });
    }

    // Enemies: soldiers
    for (let i = 0; i < 15 + stageNum * 8; i++) {
      const ex = 133 + flr(rnd(level.width - 333));
      level.enemies.push({
        type: "soldier", x: ex, y: 0, alive: true,
        dir: -1, speed: 0.5 + rnd(0.5) + stageNum * 0.2,
        shootTimer: 60 + flr(rnd(90)),
        animTimer: 0, patrol: 27 + flr(rnd(27)), patrolStart: ex
      });
    }

    // Turrets
    for (let i = 0; i < 4 + stageNum * 2; i++) {
      const tx = 200 + flr(rnd(level.width - 400));
      level.enemies.push({
        type: "turret", x: tx, y: 0, alive: true,
        hp: 3, shootTimer: 40 + flr(rnd(60)), dir: -1
      });
    }

    // Snipers
    for (let i = 0; i < 3 + stageNum * 2; i++) {
      const sx = 167 + flr(rnd(level.width - 333));
      level.enemies.push({
        type: "sniper", x: sx, y: 0, alive: true,
        shootTimer: 30 + flr(rnd(50)), hp: 1
      });
    }

    // Power-ups
    const pwTypes = ["spread", "laser", "rapid"];
    for (let i = 0; i < 3; i++) {
      level.powerups.push({
        type: pwTypes[i % 3],
        x: 200 + flr(i * (level.width - 400) / 3 + rnd(67)),
        y: GROUND_Y - 45 - flr(rnd(30)),
        alive: true
      });
    }

    // Boss at end
    level.boss = {
      x: level.width - 80,
      y: GROUND_Y - 48,
      hp: 15 + stageNum * 10,
      maxHp: 15 + stageNum * 10,
      phase: 0,
      shootTimer: 0,
      alive: true,
      flashTimer: 0,
      moveTimer: 0,
      moveDir: 0
    };

    // Background decoration
    for (let i = 0; i < level.width / 40; i++) {
      level.bgElements.push({
        type: rnd(1) < 0.5 ? "tree" : "mountain",
        x: flr(rnd(level.width)),
        y: GROUND_Y - 6 - flr(rnd(12)),
        parallax: 0.3 + rnd(0.3)
      });
    }

    return level;
  }

  // Place enemies on ground/platforms (using SPR=16 for offsets)
  function placeEnemiesOnGround(level) {
    for (const e of level.enemies) {
      if (e.type === "sniper") {
        const elevated = level.platforms.filter(p => !p.ground && p.x < level.width - 200);
        if (elevated.length > 0) {
          const p = elevated[flr(rnd(elevated.length))];
          e.x = p.x + flr(rnd(_max(1, p.w - SPR)));
          e.y = p.y - SPR;
        } else {
          e.y = GROUND_Y - SPR;
        }
      } else {
        e.y = getGroundY(level, e.x) - SPR;
      }
      e.patrolStart = e.x;
    }
  }

  function getGroundY(level, wx) {
    let bestY = GROUND_Y + 75;
    for (const p of level.platforms) {
      if (wx >= p.x && wx < p.x + p.w) {
        if (p.y < bestY) bestY = p.y;
      }
    }
    return bestY;
  }

  function resetGame() {

    lives = 3;
    stage = 1;

  function startStage(stageNum) {
    level = generateStage(stageNum);
    placeEnemiesOnGround(level);
    player = {
      x: 27, y: GROUND_Y - SPR,
      vx: 0, vy: 0,
      dir: 1,
      onGround: false,
      prone: false,
      aimX: 1, aimY: 0,
      animTimer: 0,
      dead: false,
      invincible: 0

    bullets = [];
    eBullets = [];
    explosions = [];
    particles = [];
    camX = 0;
    scrollSpeed = 0.5 + stageNum * 0.15;
    autoScroll = true;
    weapon = "normal";
    weaponTimer = 0;
    bossDefeated = false;
    stageClearTimer = 0;
    deathTimer = 0;
    respawnTimer = 0;
  }

  function addExplosion(x, y, big) {
    explosions.push({ x: x, y: y, timer: big ? 18 : 10 });
    const count = big ? 12 : 6;
    for (let i = 0; i < count; i++) {
      particles.push({
        x: x + 8, y: y + 8,
        vx: rnd(4) - 2, vy: rnd(4) - 3,
        life: 8 + flr(rnd(12)),
        color: flr(rnd(3)) + 1
      });
    }
  }

  // ============================================================
  // Collision helpers
  // ============================================================

  // Circle-circle collision (for round objects: bullets, explosions)
  function circOverlap(ax, ay, ar, bx, by, br) {
    const dx = ax - bx;
    const dy = ay - by;
    const distSq = dx * dx + dy * dy;
    const rSum = ar + br;
    return distSq < rSum * rSum;
  }

  // Circle-rect collision (bullet vs entity box)
  function circRectOverlap(cx, cy, cr, rx, ry, rw, rh) {
    const nearX = _max(rx, min(cx, rx + rw));
    const nearY = _max(ry, min(cy, ry + rh));
    const dx = cx - nearX;
    const dy = cy - nearY;
    return (dx * dx + dy * dy) < (cr * cr);
  }

  function isOnPlatform(wx, wy, ww) {
    const feetY = wy + SPR;
    for (const p of level.platforms) {
      if (wx + ww > p.x && wx < p.x + p.w) {
        if (feetY >= p.y && feetY < p.y + 6) {
          return p.y;
        }
      }
    }
    return null;
  }

  function isSolidBelow(wx, wy) {
    const feetY = wy + SPR;
    for (const p of level.platforms) {
      if (wx + 12 > p.x && wx + 4 < p.x + p.w) {
        if (feetY >= p.y && feetY < p.y + SPR) {
          return p.y;
        }
      }
    }
    return null;
  }

  function pointInBox(px, py, bx, by, bw, bh) {
    return px >= bx && px < bx + bw && py >= by && py < by + bh;
  }

  function boxOverlap(ax, ay, aw, ah, bx, by, bw, bh) {
    return ax < bx + bw && ax + aw > bx && ay < by + bh && ay + ah > by;
  }

  // ============================================================
  // Bullet center/radius helpers
  // ============================================================
  function bulletCenter(b) {
    // Bullets are drawn at (b.x, b.y) as 16x16 sprites
    // The actual visible part is in the center
    return { cx: b.x + 8, cy: b.y + 8 };
  }

  function bulletRadius(b) {
    if (b.type === "laser") return 5;
    if (b.type === "spread") return 4;
    return 3; // normal
  }

  function eBulletCenter(b) {
    return { cx: b.x + 8, cy: b.y + 8 };
  }

  const EBULLET_R = 3;

  // Player hitbox (rect, slightly inset from 16x16 sprite)
  const PL_HB_X = 3;   // inset from left
  const PL_HB_Y = 2;   // inset from top
  const PL_HB_W = 10;  // width
  const PL_HB_H = 14;  // height (standing)
  const PL_PRONE_HB_Y = 8;
  const PL_PRONE_HB_H = 8;

  function playerHitbox() {
    if (player.prone) {
      return { x: player.x + PL_HB_X, y: player.y + PL_PRONE_HB_Y, w: PL_HB_W, h: PL_PRONE_HB_H };
    }
    return { x: player.x + PL_HB_X, y: player.y + PL_HB_Y, w: PL_HB_W, h: PL_HB_H };
  }

  // Enemy hitbox (rect)
  function enemyHitbox(e) {
    if (e.type === "turret") {
      return { x: e.x + 2, y: e.y + 2, w: 12, h: 14 };
    }
    return { x: e.x + 2, y: e.y + 2, w: 12, h: 14 };
  }

  // Explosion center/radius
  function explosionCenter(e) {
    return { cx: e.x + 8, cy: e.y + 8 };
  }
  const EXPLOSION_R = 8;

  // ============================================================
  // Shooting
  // ============================================================
  let shootCooldown = 0;

  function getAimDir() {
    let ax = player.dir, ay = 0;
    if (btn("up")) { ay = -1; ax = btn("left") ? -1 : btn("right") ? 1 : 0; }
    else if (btn("down") && !player.onGround) { ay = 1; ax = btn("left") ? -1 : btn("right") ? 1 : 0; }
    else if (btn("down") && player.onGround) { ay = 0; ax = player.dir; }
    else { ax = player.dir; ay = 0; }
    if (ax === 0 && ay === 0) ax = player.dir;
    return { ax, ay };
  }

  function fireBullet() {
    const aim = getAimDir();
    const bx = player.x + (aim.ax >= 0 ? 10 : -4);
    const by = player.prone ? player.y + 6 : player.y + 2;
    const speed = 7;

    if (weapon === "spread") {
      const angles = [-0.3, -0.15, 0, 0.15, 0.3];
      const baseAngle = Math.atan2(aim.ay, aim.ax);
      for (const off of angles) {
        const a = baseAngle + off;
        bullets.push({
          x: bx, y: by,
          vx: Math.cos(a) * speed, vy: Math.sin(a) * speed,
          type: "spread", life: 30
        });
      }
      sfxSpread();
    } else if (weapon === "laser") {
      bullets.push({
        x: bx, y: by,
        vx: aim.ax * 10, vy: aim.ay * 10,
        type: "laser", life: 40, piercing: true
      });
      sfxLaser();
    } else {
      bullets.push({
        x: bx, y: by,
        vx: aim.ax * speed, vy: aim.ay * speed,
        type: "normal", life: 40
      });
      sfxShoot();
    }
  }

        setTimeout(() => note(0, "G5", 0.12), 100);
        Mono.go(PLAY); return;
      }
    },
    draw() {
      cls(0);
      for (let x = 0; x < W; x += 2) {
        const h1 = 45 + sin(x * 0.01 + 1) * 23 + sin(x * 0.025) * 11;
        const h2 = 60 + sin(x * 0.015 + 3) * 19 + sin(x * 0.04) * 8;
        for (let y = flr(150 - h1); y < 150; y++) pix(x, y, 1);
        for (let y = flr(150 - h1); y < 150; y++) pix(x + 1, y, 1);
        for (let y = flr(165 - h2); y < 165; y++) { pix(x, y, 1); pix(x + 1, y, 1); }
      }
      rectf(0, 165, W, 75, 1);
      rectf(0, 163, W, 2, 2);

  Mono.scene(PLAY, {

    update() {

    // Player invincibility
    if (player.invincible > 0) player.invincible--;

    // Aim direction

    // Shooting
    if (shootCooldown > 0) shootCooldown--;
    const maxCooldown = weapon === "rapid" ? 3 : weapon === "spread" ? 8 : 5;
    if (btn("b") && shootCooldown <= 0) {

    // Update enemy bullets (circle vs rect collision with player)

    for (let i = eBullets.length - 1; i >= 0; i--) {

      b.y += b.vy;
      if (b.x < camX - 20 || b.x > camX + W + 20 || b.y < -20 || b.y > H + 20) {

      }
      // Circle (enemy bullet) vs rect (player hitbox)
      if (!player.dead && player.invincible <= 0) {
        const ec = eBulletCenter(b);
        if (circRectOverlap(ec.cx, ec.cy, EBULLET_R, ph.x, ph.y, ph.w, ph.h)) {

    // Update enemies

      if (e.type === "soldier") {

        // Shoot at player

        if (e.shootTimer <= 0 && _abs(e.x - player.x) < 200) {

          const dist = Math.sqrt(dx * dx + dy * dy);
          if (dist > 0) {

          if (!b.piercing) bullets.splice(j, 1);

              score += e.type === "turret" ? 200 : e.type === "sniper" ? 150 : 100;

            addExplosion(e.x, e.y, false);
            sfxHit();

              });

        const bossHBx = boss.x - 12;
        const bossHBy = boss.y;
        const bossHBw = 32;

          const b = bullets[j];

          const br = bulletRadius(b);

  // ============================================================

  function drawPlayState() {

        if (y >= 0 && y < H) { pix(x, y, 1); pix(x + 1, y, 1); }

    }

    for (const bg of level.bgElements) {

    const livesStartX = W - (lives * 14) - 2;
