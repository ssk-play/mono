<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mono — Demo: Pong</title>
<link rel="stylesheet" href="../../runtime/mono.css">
</head>
<body>
<div id="frame">
  <canvas id="screen"></canvas>
</div>
<div id="controls">
  <span>&#8593;&#8595;</span> MOVE
</div>
<script src="../../runtime/engine.js"></script>
<script>
(() => {
  "use strict";
  const W = Mono.WIDTH, H = Mono.HEIGHT;
  const { cls, pix, line, rect, rectf, circ, circf, sprite: defSprite,
          spr, sprT, text, btn, btnp, note, stop, rnd, flr, abs: _abs,
          min, max: _max, sin, cos, dbg, dbgC } = Mono;

  // --- 8x8 -> 16x16 upscale helper ---
  function up(d) {
    let o = "";
    for (let r = 0; r < 8; r++) {
      let row = "";
      for (let c = 0; c < 8; c++) {
        const ch = d[r * 8 + c];
        row += ch + ch;
      }
      o += row + row;
    }
    return o;
  }

  // --- Sprites ---
  // Paddle sprite: 6px wide centered in 16x16, tall bar
  defSprite("paddle", up(
    "00333300" +
    "00333300" +
    "00333300" +
    "00333300" +
    "00333300" +
    "00333300" +
    "00333300" +
    "00333300"
  ));

  // Paddle top cap
  defSprite("paddle_top", up(
    "00233200" +
    "00333300" +
    "00333300" +
    "00333300" +
    "00333300" +
    "00333300" +
    "00333300" +
    "00333300"
  ));

  // Paddle bottom cap
  defSprite("paddle_bot", up(
    "00333300" +
    "00333300" +
    "00333300" +
    "00333300" +
    "00333300" +
    "00333300" +
    "00333300" +
    "00233200"
  ));

  // Ball sprite: circle-ish 6px in 8x8
  defSprite("ball", up(
    "00000000" +
    "00233200" +
    "02333320" +
    "23333332" +
    "23333332" +
    "02333320" +
    "00233200" +
    "00000000"
  ));

  // --- Constants ---
  const PADDLE_W = 12;         // visual width of paddle sprites
  const PADDLE_TILE = 16;      // sprite tile size
  const PADDLE_H = 48;         // 3 tiles tall (16*3)
  const BALL_R = 6;            // ball collision radius
  const BALL_DRAW_OFF = 8;     // offset from center to sprite corner (16/2)
  const PADDLE_SPEED = 4;
  const BALL_INIT_SPEED = 3.5;
  const BALL_SPEED_INC = 0.15;
  const BALL_MAX_SPEED = 7;
  const WIN_SCORE = 11;
  const COURT_TOP = 18;
  const COURT_BOTTOM = H - 4;
  const PADDLE_MARGIN = 14;
  const AI_REACTION_SPEED = 3.2;
  const AI_ERROR = 12;

  // --- Game state ---
  const { TITLE, PLAY, GAMEOVER } = Mono.SCENE;
  let playerY, aiY, ballX, ballY, ballVX, ballVY;
  let playerScore, aiScore;
  let serveTimer, serveDir;
  let rally;
  let ballSpeed;
  let aiTarget;
  let aiUpdateTimer;
  let titleBlink;
  let winMessage;

  function resetBall(dir) {
    ballX = W / 2;
    ballY = H / 2;
    const angle = (rnd(1) - 0.5) * 1.2;
    ballSpeed = BALL_INIT_SPEED;
    ballVX = Math.cos(angle) * ballSpeed * dir;
    ballVY = Math.sin(angle) * ballSpeed;
    rally = 0;
    aiTarget = H / 2;
    aiUpdateTimer = 0;
    serveTimer = 45;
  }

  function resetGame() {
    playerScore = 0;
    aiScore = 0;
    playerY = H / 2 - PADDLE_H / 2;
    aiY = H / 2 - PADDLE_H / 2;
    serveDir = 1;
    resetBall(serveDir);
    winMessage = "";
  }

  // Predict where the ball center will reach a given x (for AI)
  function predictBallY(targetX) {
    let px = ballX, py = ballY, vx = ballVX, vy = ballVY;
    for (let i = 0; i < 300; i++) {
      px += vx;
      py += vy;
      if (py - BALL_R < COURT_TOP) { py = COURT_TOP + BALL_R; vy = -vy; }
      if (py + BALL_R > COURT_BOTTOM) { py = COURT_BOTTOM - BALL_R; vy = -vy; }
      if ((vx > 0 && px >= targetX) || (vx < 0 && px <= targetX)) {
        return py;
      }
    }
    return py;
  }

  // --- Circle vs AABB collision ---
  function circVsRect(cx, cy, cr, rx, ry, rw, rh) {
    const nearX = _max(rx, min(cx, rx + rw));
    const nearY = _max(ry, min(cy, ry + rh));
    const dx = cx - nearX;
    const dy = cy - nearY;
    return dx * dx + dy * dy <= cr * cr;
  }

  // --- Sounds ---
  function wallBounceSound() { note(0, "G4", 0.03); }
  function paddleBounceSound() { note(0, "C5", 0.05); }
  function scoreSound() { note(0, "C3", 0.15); note(1, "E3", 0.12); }
  function winSound() {
    note(0, "C5", 0.1);
    setTimeout(() => note(0, "E5", 0.1), 100);
    setTimeout(() => note(0, "G5", 0.1), 200);
    setTimeout(() => note(0, "C6", 0.2), 300);
  }
  function loseSound() {
    note(0, "E3", 0.15);
    setTimeout(() => note(0, "C3", 0.15), 150);
    setTimeout(() => note(0, "A2", 0.25), 300);
  }

  // --- Draw paddle (3-tile tall) ---
  function drawPaddle(x, y) {
    sprT("paddle_top", x, y);
    sprT("paddle",     x, y + PADDLE_TILE);
    sprT("paddle_bot", x, y + PADDLE_TILE * 2);
  }

  // --- Draw court ---
  function drawCourt() {
    // Top and bottom walls
    rectf(0, COURT_TOP - 2, W, 2, 1);
    rectf(0, COURT_BOTTOM, W, 2, 1);
    // Dashed center line
    for (let y = COURT_TOP; y < COURT_BOTTOM; y += 10) {
      rectf(W / 2 - 1, y, 2, 5, 1);
    }
  }

  // --- Draw scores ---
  function drawScores() {
    const pStr = String(playerScore);
    const aStr = String(aiScore);
    text("P1", W / 2 - 36, 5, 1);
    text(pStr, W / 2 - 20, 5, 2);
    text(aStr, W / 2 + 15, 5, 2);
    text("CPU", W / 2 + 24, 5, 1);
  }

  // --- Title Scene ---
  Mono.scene(TITLE, {
    init() {},
    update() {
      titleBlink = (Mono.frame % 40) < 28;
      if (btnp("start") || btnp("a")) {
        resetGame();
        note(0, "C5", 0.08);
        Mono.go(PLAY); return;
      }
    },
    draw() {
      cls(0);
      text("PONG", W / 2 - 10, 50, 3);

      // Show paddles and ball on title
      drawPaddle(W / 2 - 50, 80);
      drawPaddle(W / 2 + 38, 80);
      sprT("ball", W / 2 - BALL_DRAW_OFF, 96 - BALL_DRAW_OFF);

      for (let y = 72; y < 130; y += 10) {
        rectf(W / 2 - 1, y, 2, 5, 1);
      }

      if (titleBlink) {
        text("PRESS START", W / 2 - 27, 142, 3);
      }
      text("FIRST TO 11 WINS", W / 2 - 40, 165, 1);
      text("UP/DOWN TO MOVE", W / 2 - 37, 176, 1);
    }
  });

  // --- Play Scene ---
  Mono.scene(PLAY, {
    init() {
      resetGame();
    },
    update() {
      titleBlink = (Mono.frame % 40) < 28;

      // Serve timer countdown
      if (serveTimer > 0) {
        serveTimer--;
        return;
      }

      // Player paddle movement
      if (btn("up")) playerY -= PADDLE_SPEED;
      if (btn("down")) playerY += PADDLE_SPEED;
      playerY = _max(COURT_TOP, min(COURT_BOTTOM - PADDLE_H, playerY));

      // AI paddle movement with imperfection
      aiUpdateTimer--;
      if (aiUpdateTimer <= 0) {
        if (ballVX > 0) {
          const predicted = predictBallY(W - PADDLE_MARGIN - PADDLE_W);
          aiTarget = predicted + (rnd(AI_ERROR * 2) - AI_ERROR);
        } else {
          aiTarget = H / 2 + (rnd(22) - 11);
        }
        aiUpdateTimer = 8 + flr(rnd(6));
      }

      const aiCenter = aiY + PADDLE_H / 2;
      const aiDiff = aiTarget - aiCenter;
      if (_abs(aiDiff) > 2) {
        const move = min(_abs(aiDiff), AI_REACTION_SPEED) * (aiDiff > 0 ? 1 : -1);
        aiY += move;
      }
      aiY = _max(COURT_TOP, min(COURT_BOTTOM - PADDLE_H, aiY));

      // Ball movement
      ballX += ballVX;
      ballY += ballVY;

      // Top/bottom wall bounce (circle)
      if (ballY - BALL_R < COURT_TOP) {
        ballY = COURT_TOP + BALL_R;
        ballVY = -ballVY;
        wallBounceSound();
      }
      if (ballY + BALL_R > COURT_BOTTOM) {
        ballY = COURT_BOTTOM - BALL_R;
        ballVY = -ballVY;
        wallBounceSound();
      }

      // Player paddle collision (circle vs rect)
      const pPaddleX = PADDLE_MARGIN + 2; // centered 12px within 16px tile
      if (ballVX < 0 &&
          circVsRect(ballX, ballY, BALL_R, pPaddleX, playerY, PADDLE_W, PADDLE_H)) {
        ballX = pPaddleX + PADDLE_W + BALL_R;
        rally++;
        ballSpeed = min(BALL_MAX_SPEED, BALL_INIT_SPEED + rally * BALL_SPEED_INC);
        const hitPos = (ballY - playerY) / PADDLE_H;
        const angle = (hitPos - 0.5) * 1.4;
        ballVX = Math.cos(angle) * ballSpeed;
        ballVY = Math.sin(angle) * ballSpeed;
        paddleBounceSound();
      }

      // AI paddle collision (circle vs rect)
      const aiPaddleX = W - PADDLE_MARGIN - PADDLE_W - 2;
      if (ballVX > 0 &&
          circVsRect(ballX, ballY, BALL_R, aiPaddleX, aiY, PADDLE_W, PADDLE_H)) {
        ballX = aiPaddleX - BALL_R;
        rally++;
        ballSpeed = min(BALL_MAX_SPEED, BALL_INIT_SPEED + rally * BALL_SPEED_INC);
        const hitPos = (ballY - aiY) / PADDLE_H;
        const angle = (hitPos - 0.5) * 1.4;
        ballVX = -Math.cos(angle) * ballSpeed;
        ballVY = Math.sin(angle) * ballSpeed;
        paddleBounceSound();
      }

      // Debug hitboxes
      dbg(pPaddleX, playerY, PADDLE_W, PADDLE_H);
      dbg(aiPaddleX, aiY, PADDLE_W, PADDLE_H);
      dbgC(ballX, ballY, BALL_R);

      // Score: ball off left edge
      if (ballX + BALL_R < 0) {
        aiScore++;
        scoreSound();
        if (aiScore >= WIN_SCORE) {
          winMessage = "CPU WINS";
          loseSound();
          Mono.go(GAMEOVER); return;
        } else {
          serveDir = -1;
          resetBall(serveDir);
        }
      }

      // Score: ball off right edge
      if (ballX - BALL_R > W) {
        playerScore++;
        scoreSound();
        if (playerScore >= WIN_SCORE) {
          winMessage = "YOU WIN!";
          winSound();
          Mono.go(GAMEOVER); return;
        } else {
          serveDir = 1;
          resetBall(serveDir);
        }
      }
    },
    draw() {
      cls(0);
      drawCourt();
      drawScores();

      // Paddles
      drawPaddle(PADDLE_MARGIN, playerY);
      drawPaddle(W - PADDLE_MARGIN - PADDLE_TILE, aiY);

      // Ball (blink during serve pause)
      if (serveTimer <= 0 || (serveTimer % 6) < 4) {
        sprT("ball", flr(ballX) - BALL_DRAW_OFF, flr(ballY) - BALL_DRAW_OFF);
      }
    }
  });

  // --- Game Over Scene ---
  Mono.scene(GAMEOVER, {
    init() {},
    update() {
      titleBlink = (Mono.frame % 40) < 28;
      if (btnp("start") || btnp("a")) {
        Mono.go(TITLE); return;
      }
    },
    draw() {
      cls(0);
      drawCourt();
      drawScores();

      // Paddles and ball frozen
      drawPaddle(PADDLE_MARGIN, playerY);
      drawPaddle(W - PADDLE_MARGIN - PADDLE_TILE, aiY);
      if (serveTimer <= 0 || (serveTimer % 6) < 4) {
        sprT("ball", flr(ballX) - BALL_DRAW_OFF, flr(ballY) - BALL_DRAW_OFF);
      }

      // Dim overlay box
      rectf(W / 2 - 50, H / 2 - 24, 100, 42, 0);
      rect(W / 2 - 50, H / 2 - 24, 100, 42, 1);
      text(winMessage, W / 2 - flr(winMessage.length * 2.5), H / 2 - 13, 3);
      text(playerScore + " - " + aiScore, W / 2 - 12, H / 2 - 2, 2);
      if (titleBlink) {
        text("PRESS START", W / 2 - 27, H / 2 + 10, 3);
      }
    }
  });

  Mono.go(TITLE);
  Mono.boot("screen");
})();
</script>
</body>
</html>
