          min, max: _max, sin, cos, dbg, dbgC } = Mono;

  // --- 8x8 → 16x16 upscale helper ---
  function up(d) {
    let o = "";
    for (let r = 0; r < 8; r++) {
      let row = "";
      for (let c = 0; c < 8; c++) {
        const ch = d[r * 8 + c];
        row += ch + ch;
      }
      o += row + row;
    }
    return o;
  }

  defSprite(22, up(

  // --- Game constants ---
  // Layout: 6 floors in 320x240, sprites are now 16x16
  const S = 16; // sprite size
  const NUM_FLOORS = 6;
  const HUD_H = 14;
  // Floor spacing: fit 6 floors + roof into (H - HUD_H) vertical space
  const FLOOR_H = 36;
  const FLOOR_TOP = HUD_H + 10;
  const FLOOR_THICK = 3;
  const LEVEL_LEFT = 24;
  const LEVEL_RIGHT = W - 24;
  const LEVEL_W = LEVEL_RIGHT - LEVEL_LEFT;
  const PLAYER_SPEED = 2.0;

  // Circle collision radii
  const PLAYER_R = 6;
  const CAT_R = 6;
  const ITEM_R = 7;
  const SHOCKWAVE_R = 8;

  // --- Circle collision helper ---
  function circHit(ax, ay, ar, bx, by, br) {
    const dx = ax - bx, dy = ay - by;
    return dx * dx + dy * dy < (ar + br) * (ar + br);
  }

  // --- Game state ---
  const { TITLE, PLAY, CLEAR, GAMEOVER } = Mono.SCENE;
  let player, cats, items, doors, trampolines, shockwaves, floatTexts;
  let score, lives, level, itemsLeft;
  let lastItemType, comboCount;
  let deathTimer, levelClearTimer;
  let titleBounce;

  function floorY(f) { return FLOOR_TOP + f * FLOOR_H; }

  // Trampoline columns: fixed X positions where trampolines exist between floors
  const TRAMP_COLS = [0, 1, 2, 3, 4];
  function trampX(col) { return LEVEL_LEFT + 8 + col * ((LEVEL_W - 24) / 4); }

  function buildTrampolines() {
    trampolines = [];
    for (let gap = 0; gap < NUM_FLOORS - 1; gap++) {
      for (let col = 0; col < TRAMP_COLS.length; col++) {
        trampolines.push({
          x: trampX(col),
          col: col,
          topFloor: gap,
          bottomFloor: gap + 1,
          bounces: 0,
          midY: (floorY(gap) + FLOOR_THICK + floorY(gap + 1)) / 2
        });
      }
    }
  }

  function buildDoors() {
    doors = [];
    for (let f = 0; f < NUM_FLOORS; f++) {
      const y = floorY(f) - S;
      // 4-5 doors per floor, evenly spaced
      const nd = 4 + flr(rnd(2));
      const sp = (LEVEL_W - 32) / (nd + 1);
      for (let d = 0; d < nd; d++) {
        const x = LEVEL_LEFT + 16 + (d + 1) * sp;
        doors.push({
          x: x, y: y, floor: f,
          state: "closed",
          isMicro: rnd(1) < 0.12 + level * 0.02,
          timer: 0
        });
      }
    }
  }

  const ITEM_SPRITES = [7, 8, 9, 10];
  const ITEM_NAMES = ["TV", "PC", "ART", "RADIO"];
  const ITEM_POINTS = [200, 300, 400, 500];

  function buildItems() {
    items = [];
    const numPairs = min(3 + level, 8);
    const pool = [];
    for (let i = 0; i < numPairs; i++) {
      const t = flr(rnd(ITEM_SPRITES.length));
      pool.push(t, t);
    }
    // Shuffle
    for (let i = pool.length - 1; i > 0; i--) {
      const j = flr(rnd(i + 1));
      [pool[i], pool[j]] = [pool[j], pool[i]];
    }
    // Distribute across floors 0..NUM_FLOORS-1
    let idx = 0;
    for (let f = 0; f < NUM_FLOORS && idx < pool.length; f++) {
      const n = min(2 + flr(rnd(2)), pool.length - idx);
      const sp = (LEVEL_W - 48) / (n + 1);
      for (let i = 0; i < n && idx < pool.length; i++) {
        items.push({
          x: LEVEL_LEFT + 24 + (i + 1) * sp,
          y: floorY(f) - S,
          floor: f,
          type: pool[idx],
          active: true
        });
        idx++;
      }
    }
    itemsLeft = items.filter(it => it.active).length;
  }

  function spawnCats() {
    cats = [];
    const nc = min(2 + level, 7);
    for (let i = 0; i < nc; i++) {
      const isGoro = (i === 0 && level >= 2);
      cats.push({
        x: LEVEL_LEFT + 30 + rnd(LEVEL_W - 60),
        floor: flr(rnd(NUM_FLOORS - 1)),
        dir: rnd(1) < 0.5 ? -1 : 1,
        isGoro: isGoro,
        speed: isGoro ? 1.0 + level * 0.08 : 1.2 + level * 0.12,
        stunTimer: 0,
        bouncing: false,
        bounceVY: 0,
        bounceY: 0,
        targetFloor: -1,
        animFrame: flr(rnd(12)),
        aiTimer: flr(rnd(60))
      });
    }
  }

  function resetLevel() {
    player = {
      x: W / 2 - 8,
      floor: NUM_FLOORS - 1,
      dir: 1,
      bouncing: false,
      bounceVY: 0,
      bounceY: 0,
      targetFloor: -1,
      animFrame: 0,
      dead: false,
      deadTimer: 0
    };
    buildTrampolines();
    buildDoors();
    buildItems();
    spawnCats();
    shockwaves = [];
    floatTexts = [];
    lastItemType = -1;
    comboCount = 0;
    deathTimer = 0;
    levelClearTimer = 0;
  }

  function resetGame() {
    score = 0;
    lives = 3;
    level = 1;
    resetLevel();
  }

  // --- Float text (score popups) ---
  function addFloatText(x, y, str, c) {
    floatTexts.push({ x: x, y: y, str: str, c: c, timer: 40 });
  }

  // --- Entity center helpers for circle collision ---
  function entCX(e) { return e.x + 8; }
  function entCY(e, fy) { return fy - S + 8; }

  // --- Trampoline interaction ---
  function findTrampoline(ex, efloor) {
    for (const t of trampolines) {
      if (t.bounces >= 4) continue;
      if ((efloor === t.topFloor || efloor === t.bottomFloor) && _abs(ex - t.x) < 14) {
        return t;
      }
    }
    return null;
  }

  function startBounce(ent, tramp) {
    if (tramp.bounces >= 4) return false;
    ent.bouncing = true;
    if (ent.floor === tramp.bottomFloor) {
      ent.bounceVY = -5;
      ent.targetFloor = tramp.topFloor;
    } else {
      ent.bounceVY = 5;
      ent.targetFloor = tramp.bottomFloor;
    }
    ent.bounceY = floorY(ent.floor);
    tramp.bounces++;
    return true;
  }

  function updateBounce(ent) {
    if (!ent.bouncing) return false;
    ent.bounceY += ent.bounceVY;
    const targetY = floorY(ent.targetFloor);
    if ((ent.bounceVY < 0 && ent.bounceY <= targetY) ||
        (ent.bounceVY > 0 && ent.bounceY >= targetY)) {
      ent.bounceY = targetY;
      ent.floor = ent.targetFloor;
      ent.bouncing = false;
      ent.bounceVY = 0;
      ent.targetFloor = -1;
      return true; // landed
    }
    return false;
  }

  // --- Door logic ---
  function openNearestDoor(px, pf) {
    let best = null, bestD = 32;
    for (const d of doors) {
      if (d.floor !== pf || d.state !== "closed") continue;
      const dist = _abs(d.x - px);
      if (dist < bestD) { bestD = dist; best = d; }
    }
    if (!best) return;

    const openDir = player.x < best.x ? "openRight" : "openLeft";
    best.state = openDir;
    best.timer = 50;
    note(0, "D5", 0.06);

    // Microwave door: shockwave
    if (best.isMicro) {
      const sd = openDir === "openRight" ? 1 : -1;
      shockwaves.push({ x: best.x, floor: best.floor, dir: sd, timer: 50 });
      note(1, "G5", 0.15);
    }

    // Door pushes cats (AABB check for door push range)
    for (const cat of cats) {
      if (cat.stunTimer > 0 || cat.bouncing) continue;
      if (cat.floor !== best.floor) continue;
      const dx = cat.x - best.x;
      if (openDir === "openRight" && dx > 0 && dx < 40) {
        cat.stunTimer = 150;
        score += 500;
        addFloatText(cat.x, floorY(cat.floor) - 20, "500", 3);
        note(1, "E5", 0.08);
      } else if (openDir === "openLeft" && dx < 0 && dx > -40) {
        cat.stunTimer = 150;
        score += 500;
        addFloatText(cat.x, floorY(cat.floor) - 20, "500", 3);
        note(1, "E5", 0.08);
      }
    }
  }

  // --- Main update ---
  function updatePlay() {
    const p = player;

    // Float texts
    for (let i = floatTexts.length - 1; i >= 0; i--) {
      floatTexts[i].y -= 0.5;
      floatTexts[i].timer--;
      if (floatTexts[i].timer <= 0) floatTexts.splice(i, 1);
    }

    // Death state
    if (p.dead) {
      p.deadTimer++;
      if (p.deadTimer > 60) {
        lives--;
        if (lives <= 0) { Mono.go(GAMEOVER); return; }
        else { resetLevel(); }
      }
      return;
    }

    // Level clear
    if (levelClearTimer > 0) {
      levelClearTimer--;
      if (levelClearTimer <= 0) { level++; resetLevel(); }
      return;
    }

    // Player floor Y for collision
    const pFloorY = floorY(p.floor);
    const pcx = entCX(p);
    const pcy = p.bouncing ? p.bounceY - S + 8 : entCY(p, pFloorY);

    // Player movement
    if (!p.bouncing) {
      let moved = false;
      if (btn("left")) {
        p.x -= PLAYER_SPEED;
        p.dir = -1;
        moved = true;
      } else if (btn("right")) {
        p.x += PLAYER_SPEED;
        p.dir = 1;
        moved = true;
      }
      if (moved) p.animFrame = (p.animFrame + 1) % 12;
      p.x = _max(LEVEL_LEFT, min(LEVEL_RIGHT - S, p.x));

      // Trampoline check
      const tr = findTrampoline(p.x, p.floor);
      if (tr) {
        if (startBounce(p, tr)) {
          note(0, "C5", 0.05);
          setTimeout(() => { try { note(0, "E5", 0.05); } catch(e){} }, 60);
        }
      }

      // Open door
      if (btnp("a")) { openNearestDoor(p.x, p.floor); }

      // Collect items (circle collision)
      for (const it of items) {
        if (!it.active) continue;
        const icx = it.x + 8;
        const icy = it.y + 8;
        // Debug: show item hitbox
        dbgC(icx, icy, ITEM_R);
        if (it.floor === p.floor && circHit(pcx, pcy, PLAYER_R, icx, icy, ITEM_R)) {
          it.active = false;
          let pts = ITEM_POINTS[it.type];
          if (it.type === lastItemType) {
            comboCount++;
            pts *= (comboCount + 1);
          } else {
            comboCount = 0;
          }
          lastItemType = it.type;
          score += pts;
          itemsLeft--;
          addFloatText(it.x, it.y - 4, String(pts), 3);
          note(0, "G5", 0.05);
          note(1, "C6", 0.05);

          if (itemsLeft <= 0) {
            levelClearTimer = 90;
            note(0, "C5", 0.1);
            setTimeout(() => { try { note(0, "E5", 0.1); } catch(e){} }, 120);
            setTimeout(() => { try { note(0, "G5", 0.1); } catch(e){} }, 240);
            setTimeout(() => { try { note(0, "C6", 0.2); } catch(e){} }, 360);
          }
        }
      }
    } else {
      const landed = updateBounce(p);
      if (landed) {
        for (const t of trampolines) {
          if (t.bounces >= 4 &&
              (p.floor === t.topFloor || p.floor === t.bottomFloor) &&
              _abs(p.x - t.x) < 14) {
            killPlayer();
            break;
          }
        }
      }
    }

    // Debug: player hitbox
    dbgC(pcx, pcy, PLAYER_R);

    // Shockwaves
    for (let i = shockwaves.length - 1; i >= 0; i--) {
      const sw = shockwaves[i];
      sw.x += sw.dir * 6;
      sw.timer--;
      if (sw.timer <= 0 || sw.x < LEVEL_LEFT - 16 || sw.x > LEVEL_RIGHT + 16) {
        shockwaves.splice(i, 1);
        continue;
      }
      const swcx = sw.x + 8;
      const swcy = floorY(sw.floor) - 4;
      dbgC(swcx, swcy, SHOCKWAVE_R);
      for (const cat of cats) {
        if (cat.stunTimer > 0) continue;
        const ccx = entCX(cat);
        const ccy = entCY(cat, floorY(cat.floor));
        if (cat.floor === sw.floor && circHit(swcx, swcy, SHOCKWAVE_R, ccx, ccy, CAT_R)) {
          cat.stunTimer = 200;
          score += 1000;
          addFloatText(cat.x, floorY(cat.floor) - 20, "1000", 3);
          note(1, "A5", 0.1);
        }
      }
    }

    // Cats AI
    for (const cat of cats) {
      if (cat.stunTimer > 0) {
        cat.stunTimer--;
        if (cat.stunTimer <= 0) {
          cat.floor = 0;
          cat.x = LEVEL_LEFT + 30 + rnd(LEVEL_W - 60);
          cat.dir = rnd(1) < 0.5 ? -1 : 1;
        }
        continue;
      }
      if (cat.bouncing) {
        updateBounce(cat);
        continue;
      }

      cat.animFrame = (cat.animFrame + 1) % 12;
      cat.aiTimer--;
      if (cat.aiTimer <= 0) {
        cat.aiTimer = 20 + flr(rnd(40));
        if (cat.floor === p.floor) {
          cat.dir = p.x > cat.x ? 1 : -1;
        } else {
          cat.dir = rnd(1) < 0.6 ? (p.x > cat.x ? 1 : -1) : (rnd(1) < 0.5 ? 1 : -1);
        }
      }

      cat.x += cat.dir * cat.speed;
      cat.x = _max(LEVEL_LEFT, min(LEVEL_RIGHT - S, cat.x));
      if (cat.x <= LEVEL_LEFT || cat.x >= LEVEL_RIGHT - S) cat.dir *= -1;

      // Cat trampoline usage
      if (rnd(1) < 0.04) {
        const tr = findTrampoline(cat.x, cat.floor);
        if (tr) {
          const wantUp = cat.floor > p.floor;
          const wantDown = cat.floor < p.floor;
          if ((wantUp && cat.floor === tr.bottomFloor) ||
              (wantDown && cat.floor === tr.topFloor) ||
              rnd(1) < 0.2) {
            startBounce(cat, tr);
          }
        }
      }

      // Cat catches Mappy (circle collision)
      const ccx = entCX(cat);
      const catFloorY = cat.bouncing ? cat.bounceY : floorY(cat.floor);
      const ccy = catFloorY - S + 8;
      dbgC(ccx, ccy, CAT_R);
      if (!p.bouncing && !p.dead && cat.floor === p.floor &&
          circHit(pcx, pcy, PLAYER_R, ccx, ccy, CAT_R)) {
        killPlayer();
      }
    }

    // Doors auto-close
    for (const d of doors) {
      if (d.state !== "closed") {
        d.timer--;
        if (d.timer <= 0) d.state = "closed";
      }
    }
  }

  function killPlayer() {
    player.dead = true;
    player.deadTimer = 0;
    note(0, "C3", 0.15);
    note(1, "E2", 0.2);
  }

  // --- Drawing ---
  function drawMansion() {
    // Roof
    const roofY = FLOOR_TOP - 6;
    for (let x = LEVEL_LEFT; x < LEVEL_RIGHT; x += 16) {
      line(x, roofY, x + 8, roofY - 8, 2);
      line(x + 8, roofY - 8, x + 16, roofY, 2);
    }
    rectf(LEVEL_LEFT, roofY, LEVEL_W, 3, 2);

    // Floors
    for (let f = 0; f < NUM_FLOORS; f++) {
      const fy = floorY(f);
      rectf(LEVEL_LEFT, fy, LEVEL_W, FLOOR_THICK, 2);
    }

    // Walls
    rectf(LEVEL_LEFT - 3, FLOOR_TOP, 3, (NUM_FLOORS - 1) * FLOOR_H + FLOOR_THICK, 2);
    rectf(LEVEL_RIGHT, FLOOR_TOP, 3, (NUM_FLOORS - 1) * FLOOR_H + FLOOR_THICK, 2);

    // Floor labels
    for (let f = 0; f < NUM_FLOORS; f++) {
      text(String(NUM_FLOORS - f) + "F", LEVEL_LEFT - 20, floorY(f) - 3, 1);
    }
  }

  function drawTrampolines() {
    for (const t of trampolines) {
      if (t.bounces >= 4) {
        // Broken: draw a gap/crack
        pix(t.x + 4, t.midY, 1);
        pix(t.x + 10, t.midY + 1, 1);
        continue;
      }
      const sprId = 15 + min(t.bounces, 3);
      // Support rails
      const topY = floorY(t.topFloor) + FLOOR_THICK;
      const botY = floorY(t.bottomFloor);
      line(t.x + 2, topY, t.x + 2, botY, 1);
      line(t.x + 12, topY, t.x + 12, botY, 1);
      // Bouncy pad
      spr(sprId, t.x - 1, t.midY - 6);
    }
  }

  function drawDoors() {
    for (const d of doors) {
      if (d.state === "closed") {
        spr(d.isMicro ? 14 : 11, d.x, d.y);
      } else if (d.state === "openLeft") {
        spr(12, d.x - 8, d.y);
      } else {
        spr(13, d.x + 8, d.y);
      }
      // Debug: door hitbox
      dbg(d.x, d.y, S, S);
    }
  }

  function drawItems() {
    for (const it of items) {
      if (!it.active) continue;
      spr(ITEM_SPRITES[it.type], it.x, it.y);
    }
  }

  function drawPlayer() {
    const p = player;
    if (p.dead) {
      if (p.deadTimer % 8 < 4) {
        spr(22, p.x, floorY(p.floor) - S - 2 - p.deadTimer * 0.3, p.deadTimer % 16 < 8);
      }
      return;
    }
    const py = p.bouncing ? p.bounceY - S - 2 : floorY(p.floor) - S - 2;
    const flip = p.dir < 0;
    if (p.bouncing) {
      spr(19, p.x, py, flip);
    } else {
      spr(p.animFrame < 6 ? 1 : 2, p.x, py, flip);
    }
  }

  function drawCats() {
    for (const cat of cats) {
      if (cat.stunTimer > 0) {
        if (cat.stunTimer % 6 < 4) {
          spr(21, cat.x, floorY(cat.floor) - S - 2);
        }
        continue;
      }
      const cy = cat.bouncing ? cat.bounceY - S - 2 : floorY(cat.floor) - S - 2;
      const flip = cat.dir < 0;
      if (cat.isGoro) {
        spr(cat.animFrame < 6 ? 5 : 6, cat.x, cy, flip);
      } else {
        spr(cat.animFrame < 6 ? 3 : 4, cat.x, cy, flip);
      }
    }
  }

  function drawShockwaves() {
    for (const sw of shockwaves) {
      const sy = floorY(sw.floor) - 8;
      for (let i = 0; i < 4; i++) {
        const wx = sw.x - sw.dir * i * 8;
        const c = i === 0 ? 3 : (i === 1 ? 2 : 1);
        rectf(wx, sy, 8, 4, c);
      }
    }
  }

  function drawFloatTexts() {
    for (const ft of floatTexts) {
      text(ft.str, ft.x, ft.y, ft.c);
    }
  }

  function drawHUD() {
    // Black bar at top
    rectf(0, 0, W, HUD_H, 0);
    text("SCORE " + String(score).padStart(7, "0"), 3, 3, 3);
    text("LV" + level, W / 2 - 10, 3, 2);
    text("LEFT:" + itemsLeft, W / 2 + 20, 3, 2);
    // Lives
    for (let i = 0; i < lives; i++) {
      spr(20, W - 54 + i * 16, 0);
    }
    // Combo
    if (comboCount > 0) {
      text("X" + (comboCount + 1), W / 2 - 30, 3, 3);
    }
  }

  // --- Title screen ---
  function drawTitleScreen() {
    const t = titleBounce || 0;
    const by = sin(t * 0.07) * 5;

    // Big title
    text("M A P P Y", W / 2 - 28, 38 + by, 3);
    text("POLICE MOUSE", W / 2 - 20, 51, 2);

    // Mansion
    const mx = W / 2 - 53, my = 68;
    rect(mx, my, 107, 68, 2);
    // Roof
    line(mx, my, mx + 53, my - 17, 3);
    line(mx + 53, my - 17, mx + 107, my, 3);
    // Windows
    for (let wy = 0; wy < 3; wy++) {
      for (let wx = 0; wx < 4; wx++) {
        const winX = mx + 9 + wx * 25;
        const winY = my + 6 + wy * 20;
        rectf(winX, winY, 7, 11, 0);
        rect(winX, winY, 7, 11, wy === 1 ? 3 : 2);
      }
    }
    // Door
    rectf(mx + 45, my + 51, 16, 17, 1);
    rect(mx + 45, my + 51, 16, 17, 3);

    // Characters
    spr(1, W / 2 - 8, 146 + by);
    spr(3, W / 2 - 40, 146);
    spr(3, W / 2 - 26, 148);
    spr(5, W / 2 + 24, 146);

    // Instructions
    text("PRESS START", W / 2 - 50, 170, (flr(t / 15) % 2 === 0) ? 3 : 2);
    text("ARROWS MOVE   A OPEN DOOR", W / 2 - 64, 185, 1);
    text("COLLECT ALL STOLEN ITEMS", W / 2 - 60, 194, 1);
    text("MATCHING PAIRS = BONUS!", W / 2 - 58, 203, 1);
    text("DOORS PUSH BACK CATS", W / 2 - 52, 212, 1);
    text("MONO MAPPY", W / 2 - 34, H - 10, 1);
  }

  function drawGameOverScreen() {
    text("GAME OVER", W / 2 - 24, H / 2 - 30, 3);
    text("FINAL SCORE", W / 2 - 28, H / 2 - 15, 2);
    text(String(score).padStart(7, "0"), W / 2 - 18, H / 2 - 5, 3);
    text("LEVEL " + level, W / 2 - 15, H / 2 + 11, 2);
    text("PRESS START", W / 2 - 28, H / 2 + 30, (flr((titleBounce || 0) / 15) % 2 === 0) ? 3 : 2);
    spr(22, W / 2 - 8, H / 2 + 45);
  }

  // --- Title Scene ---
  Mono.scene(TITLE, {
    init() { titleBounce = 0; },
    update() {
      titleBounce = (titleBounce || 0) + 1;
      if (btnp("a")) {
        resetGame();
        Mono.go(PLAY); return;
      }
    },
    draw() {
      cls(0);
      drawTitleScreen();
    }
  });

  // --- Play Scene ---
  Mono.scene(PLAY, {
    init() {},
    update() {
      updatePlay();
    },
    draw() {
      cls(0);
      drawMansion();
      drawTrampolines();
      drawDoors();
      drawItems();
      drawShockwaves();
      drawCats();
      drawPlayer();
      drawFloatTexts();
      drawHUD();
      if (levelClearTimer > 0) {
        rectf(W / 2 - 45, H / 2 - 12, 90, 17, 0);
        text("LEVEL CLEAR!", W / 2 - 30, H / 2 - 8, 3);
      }
    }
  });

  // --- Game Over Scene ---
  Mono.scene(GAMEOVER, {
    init() {},
    update() {
      titleBounce = (titleBounce || 0) + 1;
      if (btnp("a") || btnp("start")) { Mono.go(TITLE); return; }
    },
    draw() {
      cls(0);
      drawGameOverScreen();
    }
  });

  Mono.go(TITLE);
  Mono.boot("screen");
})();
</script>
</body>
</html>
