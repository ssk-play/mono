<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GrayBox — Demo: Flappy Bird</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #0a0a0a;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100vh;
    font-family: monospace;
    overflow: hidden;
  }
  #frame {
    background: #111;
    border: 3px solid #333;
    border-radius: 8px;
    padding: 12px;
    box-shadow: 0 0 40px rgba(0,0,0,0.8), inset 0 0 20px rgba(0,0,0,0.5);
  }
  canvas {
    display: block;
    image-rendering: pixelated;
    image-rendering: crisp-edges;
  }
  #controls {
    margin-top: 12px;
    color: #6b6b6b;
    font-size: 11px;
    text-align: center;
    letter-spacing: 1px;
  }
  #controls span { color: #b0b0b0; }
</style>
</head>
<body>
<div id="frame">
  <canvas id="screen"></canvas>
</div>
<div id="controls">
  <span>Z</span> FLAP &nbsp;&nbsp; <span>ENTER</span> START
</div>
<script src="../../runtime/engine.js"></script>
<script>
(() => {
  "use strict";
  const W = GrayBox.WIDTH, H = GrayBox.HEIGHT;
  const { cls, pix, line, rect, rectf, circ, circf, sprite: defSprite,
          spr, sprT, text, btn, btnp, note, stop, rnd, flr,
          abs: _abs, min, max: _max, sin, cos } = GrayBox;

  // --- Sprites ---

  // 1: Bird - wings up
  defSprite(1,
    "00033000" +
    "00322300" +
    "03233130" +
    "03322330" +
    "03333300" +
    "00333200" +
    "00033000" +
    "00000000"
  );
  // 2: Bird - wings mid
  defSprite(2,
    "00033000" +
    "00322300" +
    "03233130" +
    "03322330" +
    "33333300" +
    "00333200" +
    "00033000" +
    "00000000"
  );
  // 3: Bird - wings down
  defSprite(3,
    "00033000" +
    "00322300" +
    "03233130" +
    "03322330" +
    "03333300" +
    "33333200" +
    "00033000" +
    "00000000"
  );
  // 4: Pipe top cap (top of lower pipe / bottom of upper pipe opening)
  defSprite(4,
    "01111110" +
    "12222231" +
    "12222231" +
    "01111110" +
    "00000000" +
    "00000000" +
    "00000000" +
    "00000000"
  );
  // 5: Pipe body segment
  defSprite(5,
    "01222310" +
    "01222310" +
    "01222310" +
    "01222310" +
    "01222310" +
    "01222310" +
    "01222310" +
    "01222310"
  );
  // 6: Ground tile
  defSprite(6,
    "33333333" +
    "21212121" +
    "12121212" +
    "11111111" +
    "11111111" +
    "10101010" +
    "01010101" +
    "00000000"
  );
  // 7: Bush / decoration for background
  defSprite(7,
    "00000000" +
    "00000000" +
    "00010000" +
    "00111010" +
    "01111100" +
    "11111110" +
    "11111111" +
    "00000000"
  );
  // 8: Cloud
  defSprite(8,
    "00000000" +
    "00110000" +
    "01331000" +
    "13333100" +
    "33333310" +
    "13333331" +
    "01111110" +
    "00000000"
  );
  // 9: Small star / dot for background
  defSprite(9,
    "00000000" +
    "00000000" +
    "00000000" +
    "00020000" +
    "00000000" +
    "00000000" +
    "00000000" +
    "00000000"
  );
  // 10: Bird dead (X eyes)
  defSprite(10,
    "00033000" +
    "00322300" +
    "03203030" +
    "03320330" +
    "03203000" +
    "00333200" +
    "00033000" +
    "00000000"
  );
  // 11: Medal/trophy icon
  defSprite(11,
    "00333300" +
    "03222230" +
    "32322320" +
    "32232320" +
    "03222230" +
    "00333300" +
    "00033000" +
    "00033000"
  );

  // --- Constants ---
  const GROUND_Y = H - 18; // ground top y
  const GRAVITY = 0.35;
  const FLAP_VEL = -4.8;
  const PIPE_W = 24;       // pipe width in pixels (3 sprite columns)
  const PIPE_GAP = 54;     // vertical gap between pipes
  const PIPE_SPEED = 2.2;
  const PIPE_SPACING = 107; // horizontal spacing between pipes
  const BIRD_X = 53;        // bird x position (fixed)
  const BIRD_SIZE = 8;      // sprite size
  const BIRD_HITBOX = 6;    // slightly smaller than sprite for fairness

  // --- Game State ---
  let state = "title";
  let bird, pipes, score, bestScore, groundScroll;
  let deathTimer, flashTimer;
  let titleBobT;
  let clouds;
  let particles;
  let passedPipeIds;
  let pipeIdCounter;
  let difficulty; // increases scroll speed over time
  let scorePopups;

  bestScore = 0;

  function resetGame() {
    bird = { y: H / 2 - 15, vy: 0, flapAnim: 0, alive: true, angle: 0 };
    pipes = [];
    score = 0;
    groundScroll = 0;
    deathTimer = 0;
    flashTimer = 0;
    titleBobT = 0;
    passedPipeIds = new Set();
    pipeIdCounter = 0;
    difficulty = 0;
    scorePopups = [];
    particles = [];
    clouds = [];
    for (let i = 0; i < 6; i++) {
      clouds.push({
        x: flr(rnd(W + 67)),
        y: 15 + flr(rnd(75)),
        speed: 0.2 + rnd(0.4),
        size: 1 + flr(rnd(2))
      });
    }
    // Spawn initial pipes
    for (let i = 0; i < 4; i++) {
      spawnPipe(W + 40 + i * PIPE_SPACING);
    }
  }

  function spawnPipe(x) {
    const minGapY = 38;
    const maxGapY = GROUND_Y - PIPE_GAP - 38;
    const gapY = minGapY + flr(rnd(maxGapY - minGapY));
    pipes.push({
      id: pipeIdCounter++,
      x: x,
      gapY: gapY // top of the gap
    });
  }

  function getSpeed() {
    return PIPE_SPEED + difficulty * 0.15;
  }

  // --- Sounds ---
  function flapSound() { note(0, "E5", 0.04); }
  function scoreSound() {
    note(0, "C5", 0.05);
    setTimeout(() => note(0, "E5", 0.06), 50);
  }
  function hitSound() {
    note(0, "C3", 0.1);
    note(1, "E2", 0.15);
  }
  function deathSound() {
    setTimeout(() => {
      note(0, "G3", 0.08);
      note(1, "C3", 0.12);
    }, 200);
    setTimeout(() => {
      note(0, "E3", 0.1);
      note(1, "A2", 0.15);
    }, 400);
  }
  function startSound() {
    note(0, "C5", 0.06);
    setTimeout(() => note(0, "E5", 0.06), 80);
    setTimeout(() => note(0, "G5", 0.1), 160);
  }
  function bestScoreSound() {
    note(0, "C5", 0.06);
    setTimeout(() => note(0, "E5", 0.06), 80);
    setTimeout(() => note(0, "G5", 0.06), 160);
    setTimeout(() => note(0, "C6", 0.12), 240);
  }

  // --- Text helpers ---
  function textWidth(str) { return str.length * (FONT_W + 1) - 1; }
  function textCenter(str, y, c) {
    const w = textWidth(str);
    text(str, flr((W - w) / 2), y, c);
  }

  // Draw big text (2x scale)
  function textBig(str, x, y, c) {
    str = String(str).toUpperCase();
    let cx = Math.floor(x);
    const cy = Math.floor(y);
    const col = COLOR_U32[c] || COLOR_U32[3];
    for (const ch of str) {
      const glyph = FONT[ch];
      if (glyph) {
        for (let py = 0; py < FONT_H; py++) {
          for (let px = 0; px < FONT_W; px++) {
            if (glyph[py * FONT_W + px]) {
              const dx = cx + px * 2, dy = cy + py * 2;
              for (let sy = 0; sy < 2; sy++)
                for (let sx = 0; sx < 2; sx++) {
                  const fx = dx + sx, fy = dy + sy;
                  if (fx >= 0 && fx < W && fy >= 0 && fy < H)
                    buf32[fy * W + fx] = col;
                }
            }
          }
        }
      }
      cx += (FONT_W + 1) * 2;
    }
  }
  function textBigWidth(str) { return str.length * (FONT_W + 1) * 2 - 2; }
  function textBigCenter(str, y, c) {
    const w = textBigWidth(str);
    textBig(str, flr((W - w) / 2), y, c);
  }

  // Draw extra big text (3x scale)
  function textHuge(str, x, y, c) {
    str = String(str).toUpperCase();
    let cx = Math.floor(x);
    const cy = Math.floor(y);
    const col = COLOR_U32[c] || COLOR_U32[3];
    for (const ch of str) {
      const glyph = FONT[ch];
      if (glyph) {
        for (let py = 0; py < FONT_H; py++) {
          for (let px = 0; px < FONT_W; px++) {
            if (glyph[py * FONT_W + px]) {
              const dx = cx + px * 3, dy = cy + py * 3;
              for (let sy = 0; sy < 3; sy++)
                for (let sx = 0; sx < 3; sx++) {
                  const fx = dx + sx, fy = dy + sy;
                  if (fx >= 0 && fx < W && fy >= 0 && fy < H)
                    buf32[fy * W + fx] = col;
                }
            }
          }
        }
      }
      cx += (FONT_W + 1) * 3;
    }
  }
  function textHugeWidth(str) { return str.length * (FONT_W + 1) * 3 - 3; }
  function textHugeCenter(str, y, c) {
    const w = textHugeWidth(str);
    textHuge(str, flr((W - w) / 2), y, c);
  }

  // --- Collision ---
  function birdRect() {
    const margin = (BIRD_SIZE - BIRD_HITBOX) / 2;
    return {
      x: BIRD_X + margin,
      y: bird.y + margin,
      w: BIRD_HITBOX,
      h: BIRD_HITBOX
    };
  }

  function rectsOverlap(a, b) {
    return a.x < b.x + b.w && a.x + a.w > b.x &&
           a.y < b.y + b.h && a.y + a.h > b.y;
  }

  function checkCollision() {
    const br = birdRect();
    // Ground
    if (br.y + br.h >= GROUND_Y) return true;
    // Ceiling
    if (br.y <= 0) return true;
    // Pipes
    for (const p of pipes) {
      // Upper pipe
      const upper = { x: p.x, y: 0, w: PIPE_W, h: p.gapY };
      // Lower pipe
      const lower = { x: p.x, y: p.gapY + PIPE_GAP, w: PIPE_W, h: GROUND_Y - (p.gapY + PIPE_GAP) };
      if (rectsOverlap(br, upper) || rectsOverlap(br, lower)) return true;
    }
    return false;
  }

  // --- Particles ---
  function spawnDeathParticles() {
    for (let i = 0; i < 12; i++) {
      particles.push({
        x: BIRD_X + 3, y: bird.y + 3,
        vx: rnd(4) - 2, vy: rnd(3) - 2,
        life: 15 + flr(rnd(15)),
        color: 1 + flr(rnd(3))
      });
    }
  }

  // --- Draw helpers ---
  function drawPipe(p) {
    const spd = getSpeed();
    const x = flr(p.x);

    // Upper pipe body
    for (let ty = 0; ty < p.gapY - 4; ty += 8) {
      for (let tx = 0; tx < PIPE_W; tx += 8) {
        sprT(5, x + tx, ty);
      }
    }
    // Upper pipe cap (bottom of upper pipe, flipped)
    for (let tx = 0; tx < PIPE_W; tx += 8) {
      sprT(4, x + tx, p.gapY - 4, false, true);
    }

    // Lower pipe cap (top of lower pipe)
    const lowerY = p.gapY + PIPE_GAP;
    for (let tx = 0; tx < PIPE_W; tx += 8) {
      sprT(4, x + tx, lowerY);
    }
    // Lower pipe body
    for (let ty = lowerY + 4; ty < GROUND_Y; ty += 8) {
      for (let tx = 0; tx < PIPE_W; tx += 8) {
        sprT(5, x + tx, ty);
      }
    }
  }

  function drawGround() {
    const gx = flr(groundScroll) % 8;
    // Ground stripe
    rectf(0, GROUND_Y, W, 2, 2);
    for (let x = -gx; x < W; x += 8) {
      sprT(6, x, GROUND_Y + 2);
    }
    // Fill below ground tiles
    rectf(0, GROUND_Y + 10, W, H - GROUND_Y - 10, 0);
  }

  function drawClouds() {
    for (const c of clouds) {
      const cx = flr(c.x);
      const cy = flr(c.y);
      if (c.size === 1) {
        sprT(8, cx, cy);
      } else {
        sprT(8, cx, cy);
        sprT(8, cx + 7, cy - 2);
      }
    }
  }

  function drawBird() {
    // Pick animation frame
    let sprId;
    if (!bird.alive) {
      sprId = 10; // dead bird
    } else {
      const wingCycle = flr(bird.flapAnim / 4) % 3;
      sprId = wingCycle + 1; // sprites 1,2,3
    }

    // Calculate tilt based on velocity
    // We'll simulate tilt by shifting pixels - draw bird at slight angles
    const bx = flr(BIRD_X);
    const by = flr(bird.y);

    // Simple tilt: shift top/bottom rows
    const s = sprites[sprId]; if (!s) return;
    const tilt = bird.alive ? Math.max(-2, Math.min(2, flr(bird.vy / 2.5))) : 2;

    for (let py = 0; py < 8; py++) {
      // Row offset based on tilt: top rows shift one way, bottom rows the other
      const rowOff = flr((py - 3.5) * tilt / 4);
      for (let px = 0; px < 8; px++) {
        const c = s[py * 8 + px];
        if (c === 0) continue;
        const dx = bx + px + rowOff, dy = by + py;
        if (dx >= 0 && dx < W && dy >= 0 && dy < H)
          buf32[dy * W + dx] = COLOR_U32[c];
      }
    }
  }

  function drawScorePopup() {
    for (let i = scorePopups.length - 1; i >= 0; i--) {
      const sp = scorePopups[i];
      sp.y -= 0.5;
      sp.life--;
      if (sp.life <= 0) { scorePopups.splice(i, 1); continue; }
      const alpha = sp.life > 10 ? 3 : 2;
      text("+1", flr(sp.x), flr(sp.y), alpha);
    }
  }

  // --- Initialize ---
  resetGame();

  // ============================================================
  // Update
  // ============================================================
  GrayBox._update = function() {
    titleBobT++;

    if (state === "title") {
      // Bob the bird on title screen
      bird.y = H / 2 - 23 + sin(titleBobT * 0.08) * 6;
      bird.flapAnim++;
      groundScroll += 1;

      // Move clouds
      for (const c of clouds) {
        c.x -= c.speed;
        if (c.x < -13) { c.x = W + 7; c.y = 15 + flr(rnd(75)); }
      }

      if (btnp("a") || btnp("a")) {
        state = "ready";
        bird.y = H / 2 - 23;
        bird.vy = 0;
        startSound();
      }
      return;
    }

    if (state === "ready") {
      // Bird bobs, waiting for first flap
      bird.y = H / 2 - 23 + sin(titleBobT * 0.08) * 5;
      bird.flapAnim++;
      groundScroll += getSpeed();

      for (const c of clouds) {
        c.x -= c.speed;
        if (c.x < -13) { c.x = W + 7; c.y = 15 + flr(rnd(75)); }
      }

      if (btnp("a") || btnp("up")) {
        state = "play";
        bird.vy = FLAP_VEL;
        bird.flapAnim = 0;
        flapSound();
      }
      return;
    }

    if (state === "play") {
      // Flap
      if (btnp("a") || btnp("up")) {
        bird.vy = FLAP_VEL;
        bird.flapAnim = 0;
        flapSound();
      }

      // Bird physics
      bird.vy += GRAVITY;
      bird.y += bird.vy;
      bird.flapAnim++;

      // Increase difficulty over time
      difficulty = min(score / 8, 5);

      const spd = getSpeed();

      // Move pipes
      for (let i = pipes.length - 1; i >= 0; i--) {
        pipes[i].x -= spd;
        // Score: pipe center passed bird
        if (!passedPipeIds.has(pipes[i].id) && pipes[i].x + PIPE_W / 2 < BIRD_X) {
          passedPipeIds.add(pipes[i].id);
          score++;
          scoreSound();
          scorePopups.push({ x: BIRD_X + 8, y: bird.y - 4, life: 25 });
        }
        // Remove off-screen pipes and spawn new ones
        if (pipes[i].x < -PIPE_W - 10) {
          pipes.splice(i, 1);
          spawnPipe(pipes.length > 0 ? pipes[pipes.length - 1].x + PIPE_SPACING : W + 40);
        }
      }

      // Scroll ground
      groundScroll += spd;

      // Move clouds
      for (const c of clouds) {
        c.x -= c.speed + spd * 0.1;
        if (c.x < -13) { c.x = W + 7; c.y = 15 + flr(rnd(75)); }
      }

      // Collision
      if (checkCollision()) {
        state = "dying";
        bird.alive = false;
        deathTimer = 0;
        flashTimer = 3;
        hitSound();
        deathSound();
        spawnDeathParticles();
        if (score > bestScore) {
          bestScore = score;
          setTimeout(bestScoreSound, 600);
        }
      }
      return;
    }

    if (state === "dying") {
      deathTimer++;
      if (flashTimer > 0) flashTimer--;

      // Bird falls after dying
      if (bird.y < GROUND_Y - 8) {
        bird.vy += GRAVITY * 0.8;
        bird.y += bird.vy;
      } else {
        bird.y = GROUND_Y - 8;
        bird.vy = 0;
      }

      // Update particles
      for (let i = particles.length - 1; i >= 0; i--) {
        const p = particles[i];
        p.x += p.vx; p.y += p.vy; p.vy += 0.1; p.life--;
        if (p.life <= 0) particles.splice(i, 1);
      }

      if (deathTimer > 40 && (btnp("a") || btnp("a"))) {
        state = "gameover";
        deathTimer = 0;
      }
      return;
    }

    if (state === "gameover") {
      deathTimer++;
      // Update particles
      for (let i = particles.length - 1; i >= 0; i--) {
        const p = particles[i];
        p.x += p.vx; p.y += p.vy; p.vy += 0.1; p.life--;
        if (p.life <= 0) particles.splice(i, 1);
      }

      if (deathTimer > 20 && (btnp("a") || btnp("a"))) {
        state = "title";
        resetGame();
        bird.alive = true;
      }
      return;
    }
  };

  // ============================================================
  // Draw
  // ============================================================
  GrayBox._draw = function() {
    // Background - gradient sky
    cls(0);
    // Sky gradient: dark at top, slightly lighter lower
    rectf(0, 0, W, 60, 0);
    rectf(0, 60, W, 60, 0);
    // Dithered transition band
    for (let y = 98; y < 128; y++) {
      for (let x = 0; x < W; x++) {
        if ((x + y) % 3 === 0) pix(x, y, 1);
      }
    }
    rectf(0, 128, W, GROUND_Y - 128, 1);

    // Clouds
    drawClouds();

    if (state === "title") {
      // Draw some pipes in background for flavor
      drawGround();

      // Title card
      const bobY = flr(sin(titleBobT * 0.05) * 3);

      // Title background box
      rectf(W/2 - 73, 38 + bobY, 146, 38, 0);
      rect(W/2 - 73, 38 + bobY, 146, 38, 2);

      textHugeCenter("FLAPPY", 42 + bobY, 3);
      textBigCenter("BIRD", 59 + bobY, 2);

      // Draw bird
      drawBird();

      // Instructions
      textCenter("PRESS Z OR ENTER TO START", 150, 2);

      if (bestScore > 0) {
        textCenter("BEST: " + bestScore, 169, 1);
      }

      // Credits
      textCenter("GRAYBOX DEMO", H - 15, 1);

      return;
    }

    if (state === "ready") {
      // Draw pipes
      for (const p of pipes) drawPipe(p);

      drawGround();
      drawBird();

      // "Get Ready" message
      rectf(W/2 - 40, 60, 80, 21, 0);
      rect(W/2 - 40, 60, 80, 21, 2);
      textBigCenter("GET READY", 63, 3);
      textCenter("PRESS Z TO FLAP", 77, 2);

      // Score
      textBigCenter("" + score, 23, 3);

      return;
    }

    if (state === "play") {
      // Draw pipes
      for (const p of pipes) drawPipe(p);

      drawGround();

      // Particles
      for (const p of particles) {
        pix(flr(p.x), flr(p.y), p.color);
      }

      drawBird();
      drawScorePopup();

      // Score display - big centered at top
      const scoreStr = "" + score;
      // Shadow
      textBig(scoreStr, flr((W - textBigWidth(scoreStr)) / 2) + 1, 16, 0);
      textBigCenter(scoreStr, 15, 3);

      return;
    }

    if (state === "dying") {
      // Flash screen on death
      if (flashTimer > 0 && flashTimer % 2 === 1) {
        cls(3);
      } else {
        // Draw pipes
        for (const p of pipes) drawPipe(p);
        drawGround();
      }

      // Particles
      for (const p of particles) {
        pix(flr(p.x), flr(p.y), p.color);
        pix(flr(p.x)+1, flr(p.y), p.color);
      }

      drawBird();

      // Score
      const scoreStr = "" + score;
      textBig(scoreStr, flr((W - textBigWidth(scoreStr)) / 2) + 1, 16, 0);
      textBigCenter(scoreStr, 15, 3);

      return;
    }

    if (state === "gameover") {
      // Draw frozen scene
      for (const p of pipes) drawPipe(p);
      drawGround();

      // Particles
      for (const p of particles) {
        pix(flr(p.x), flr(p.y), p.color);
      }

      drawBird();

      // Game Over panel
      const panelW = 133;
      const panelH = 90;
      const panelX = flr((W - panelW) / 2);
      const panelY = flr((H - panelH) / 2) - 15;

      // Panel background
      rectf(panelX, panelY, panelW, panelH, 0);
      rect(panelX, panelY, panelW, panelH, 2);
      rect(panelX + 2, panelY + 2, panelW - 4, panelH - 4, 1);

      // "GAME OVER"
      textBigCenter("GAME OVER", panelY + 8, 3);

      // Divider line
      line(panelX + 7, panelY + 21, panelX + panelW - 7, panelY + 21, 1);

      // Score
      text("SCORE", panelX + 13, panelY + 29, 2);
      const sStr = "" + score;
      text(sStr, panelX + panelW - 13 - textWidth(sStr), panelY + 29, 3);

      // Best
      text("BEST", panelX + 13, panelY + 39, 2);
      const bStr = "" + bestScore;
      text(bStr, panelX + panelW - 13 - textWidth(bStr), panelY + 39, 3);

      // New best indicator
      if (score === bestScore && score > 0) {
        text("NEW!", panelX + panelW - 37 - textWidth(bStr), panelY + 39, 2);
        // Draw medal
        sprT(11, panelX + 6, panelY + 32);
      }

      // Divider
      line(panelX + 7, panelY + 49, panelX + panelW - 7, panelY + 49, 1);

      // Rating
      let rating = "TRY AGAIN";
      if (score >= 5) rating = "NOT BAD";
      if (score >= 15) rating = "GREAT";
      if (score >= 25) rating = "AMAZING";
      if (score >= 40) rating = "LEGENDARY";
      textCenter(rating, panelY + 56, score >= 15 ? 3 : 2);

      // Prompt
      if (deathTimer > 20) {
        const blink = flr(deathTimer / 10) % 2;
        if (blink) {
          textCenter("PRESS Z TO CONTINUE", panelY + 74, 2);
        }
      }

      return;
    }
  };
  GrayBox.boot("screen");
})();
</script>
</body>
</html>
