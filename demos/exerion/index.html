<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GrayBox — Demo: Exerion</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #0a0a0a;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100vh;
    font-family: monospace;
    overflow: hidden;
  }
  #frame {
    background: #111;
    border: 3px solid #333;
    border-radius: 8px;
    padding: 12px;
    box-shadow: 0 0 40px rgba(0,0,0,0.8), inset 0 0 20px rgba(0,0,0,0.5);
  }
  canvas {
    display: block;
    image-rendering: pixelated;
    image-rendering: crisp-edges;
  }
  #controls {
    margin-top: 12px;
    color: #6b6b6b;
    font-size: 11px;
    text-align: center;
    letter-spacing: 1px;
  }
  #controls span { color: #b0b0b0; }
</style>
</head>
<body>
<div id="frame">
  <canvas id="screen"></canvas>
</div>
<div id="controls">
  <span>ARROWS</span> MOVE &nbsp;&nbsp; <span>Z</span> SHOOT &nbsp;&nbsp; <span>Z HOLD</span> CHARGE &nbsp;&nbsp; <span>ENTER</span> START
</div>
<script src="../../runtime/engine.js"></script>
<script>
(() => {
  "use strict";
  const W = GrayBox.WIDTH, H = GrayBox.HEIGHT;
  const { cls, pix, line, rect, rectf, circ, circf, sprite: defSprite,
          spr, text, btn, btnp, note, stop, rnd, flr, abs: _abs,
          min, max: _max, sin, cos } = GrayBox;

  // --- Sprites ---

  // 1: Player ship (Exerion-style fighter with wide wings)
  defSprite(1,
    "00030000" +
    "00333000" +
    "03333300" +
    "33323330" +
    "33333330" +
    "30333030" +
    "30030030" +
    "00000000"
  );

  // 2: Player ship thrust frame
  defSprite(2,
    "00030000" +
    "00333000" +
    "03333300" +
    "33323330" +
    "33333330" +
    "30333030" +
    "30030030" +
    "01020100"
  );

  // 10: Small fighter enemy (fast)
  defSprite(10,
    "00000000" +
    "00100100" +
    "01111110" +
    "11322310" +
    "01333100" +
    "00111000" +
    "01000100" +
    "00000000"
  );

  // 11: Medium bomber enemy
  defSprite(11,
    "00333000" +
    "03333300" +
    "33323330" +
    "33333330" +
    "13333310" +
    "03333300" +
    "01030100" +
    "00010000"
  );

  // 12: Large carrier enemy
  defSprite(12,
    "01333100" +
    "33333330" +
    "33232330" +
    "33333330" +
    "33333330" +
    "33232330" +
    "33333330" +
    "01030100"
  );

  // 20: Player bullet (dual shot, left)
  defSprite(20,
    "00000000" +
    "00030000" +
    "00030000" +
    "00020000" +
    "00020000" +
    "00010000" +
    "00000000" +
    "00000000"
  );

  // 21: Charge bullet (big bright)
  defSprite(21,
    "00333000" +
    "03333300" +
    "33333330" +
    "33333330" +
    "33333330" +
    "03333300" +
    "00333000" +
    "00000000"
  );

  // 25: Enemy bullet
  defSprite(25,
    "00000000" +
    "00010000" +
    "00020000" +
    "00020000" +
    "00030000" +
    "00030000" +
    "00000000" +
    "00000000"
  );

  // 30: Explosion frame 1
  defSprite(30,
    "00000000" +
    "00200100" +
    "01002000" +
    "00031000" +
    "00130200" +
    "01000010" +
    "00100000" +
    "00000000"
  );

  // 31: Explosion frame 2
  defSprite(31,
    "20010020" +
    "01000010" +
    "00203200" +
    "03033030" +
    "00232000" +
    "01000300" +
    "20001001" +
    "00200010"
  );

  // 32: Explosion frame 3 (fading)
  defSprite(32,
    "10000010" +
    "00100000" +
    "00001100" +
    "01011010" +
    "00110000" +
    "00000100" +
    "10000001" +
    "00010000"
  );

  // 40: Life icon (small ship)
  defSprite(40,
    "00000000" +
    "00030000" +
    "00333000" +
    "03323300" +
    "33333330" +
    "30030030" +
    "00000000" +
    "00000000"
  );

  // 50: Charge indicator frame
  defSprite(50,
    "00333000" +
    "03000300" +
    "30000030" +
    "30000030" +
    "30000030" +
    "03000300" +
    "00333000" +
    "00000000"
  );

  // --- Game State ---
  let state = "title";
  let player, bullets, eBullets, enemies, explosions, particles;
  let stars1, stars2, stars3; // 3 parallax layers
  let score, lives, wave, waveTimer, waveMessage;
  let shootCooldown, chargeTime, charging;
  let invincible, invTimer;
  let hiScore = 0;
  let titleAnim = 0;
  let screenShake = 0;

  // Wave patterns
  const PATTERNS = {
    SINE: 0,
    CIRCLE: 1,
    VFORM: 2,
    SWOOP: 3,
    ZIGZAG: 4,
  };

  function makeStars(count, speedMin, speedMax) {
    const arr = [];
    for (let i = 0; i < count; i++)
      arr.push({ x: flr(rnd(W)), y: flr(rnd(H)), speed: speedMin + rnd(speedMax - speedMin), bright: flr(rnd(2)) + 1 });
    return arr;
  }

  function resetGame() {
    player = { x: W / 2 - 4, y: H - 30, speed: 2.5, yBase: H - 30 };
    bullets = [];
    eBullets = [];
    enemies = [];
    explosions = [];
    particles = [];
    score = 0;
    lives = 3;
    wave = 0;
    waveTimer = 0;
    waveMessage = 0;
    shootCooldown = 0;
    chargeTime = 0;
    charging = false;
    invincible = 0;
    invTimer = 0;
    screenShake = 0;
    stars1 = makeStars(30, 0.3, 0.6);  // far layer (slow, dim)
    stars2 = makeStars(20, 0.8, 1.5);  // mid layer
    stars3 = makeStars(10, 2.0, 3.0);  // near layer (fast, bright)
    spawnWave();
  }

  function spawnWave() {
    wave++;
    waveMessage = 90;
    const pattern = (wave - 1) % 5;
    const numEnemies = min(6 + wave * 2, 24);
    const hasCarrier = wave >= 3 && wave % 3 === 0;
    const hasBomber = wave >= 2;

    if (hasCarrier) {
      // Carrier enters alone first
      enemies.push(makeEnemy(12, W / 2 - 4, -15, PATTERNS.SWOOP, 0, 3, 100));
    }

    for (let i = 0; i < numEnemies; i++) {
      let type, hp, pts;
      if (hasBomber && i < flr(numEnemies / 3)) {
        type = 11; hp = 2; pts = 30;
      } else {
        type = 10; hp = 1; pts = 10;
      }
      let pat = pattern;
      // Mix patterns based on wave
      if (wave > 3) pat = flr(rnd(5));

      enemies.push(makeEnemy(type, 0, 0, pat, i, hp, pts));
    }
  }

  function makeEnemy(type, startX, startY, pattern, index, hp, pts) {
    const delay = index * 6;
    let entryX, entryDir;
    if (index % 2 === 0) {
      entryX = -10;
      entryDir = 1;
    } else {
      entryX = W + 10;
      entryDir = -1;
    }

    return {
      type: type,
      x: entryX,
      y: -10 - index * 12,
      hp: hp,
      pts: pts,
      pattern: pattern,
      index: index,
      delay: delay,
      timer: -delay,
      alive: true,
      entryDir: entryDir,
      phase: "enter", // enter, attack, exit
      shootTimer: 60 + flr(rnd(90)),
      baseSpeed: 1.5 + wave * 0.15,
      amplitude: 30 + rnd(22),
      freq: 0.03 + rnd(0.02),
      // For circle pattern
      cx: W / 2 + rnd(66) - 33,
      cy: 60 + rnd(45),
      radius: 20 + rnd(30),
      angle: rnd(Math.PI * 2),
      // V-formation offset
      formX: (index % 6 - 2.5) * 15,
      formY: _abs(index % 6 - 2.5) * 12,
    };
  }

  function addExplosion(x, y, big) {
    explosions.push({ x: x, y: y, timer: big ? 18 : 12 });
    const count = big ? 14 : 8;
    for (let i = 0; i < count; i++) {
      const spd = big ? 3 : 2;
      particles.push({
        x: x + 4, y: y + 4,
        vx: rnd(spd * 2) - spd, vy: rnd(spd * 2) - spd,
        life: 6 + flr(rnd(12)),
        color: flr(rnd(3)) + 1
      });
    }
    if (big) screenShake = 6;
  }

  // --- Sound effects ---
  function shootSound() { note(0, "E6", 0.03); }
  function chargeShootSound() {
    note(0, "C5", 0.06);
    setTimeout(() => note(0, "G5", 0.06), 30);
    setTimeout(() => note(0, "C6", 0.08), 60);
  }
  function hitSound() { note(1, "C3", 0.05); setTimeout(() => note(1, "E3", 0.04), 30); }
  function bigHitSound() {
    note(1, "C3", 0.1);
    setTimeout(() => note(1, "G2", 0.1), 50);
    setTimeout(() => note(1, "C2", 0.15), 100);
  }
  function deathSound() {
    note(0, "C3", 0.12); note(1, "G2", 0.12);
    setTimeout(() => { note(0, "A2", 0.18); note(1, "E2", 0.18); }, 120);
  }
  function chargeTickSound() { note(1, "A5", 0.02); }
  function waveClearSound() {
    note(0, "C5", 0.08);
    setTimeout(() => note(0, "E5", 0.08), 80);
    setTimeout(() => note(0, "G5", 0.08), 160);
    setTimeout(() => note(0, "C6", 0.12), 240);
  }

  function updateStars(arr) {
    for (const s of arr) {
      s.y += s.speed;
      if (s.y > H) { s.y = -2; s.x = flr(rnd(W)); }
    }
  }

  // ============================================================
  // Title screen init
  // ============================================================
  stars1 = makeStars(30, 0.3, 0.6);
  stars2 = makeStars(20, 0.8, 1.5);
  stars3 = makeStars(10, 2.0, 3.0);

  // ============================================================
  // Update
  // ============================================================
  GrayBox._update = function() {
    // Always update stars
    updateStars(stars1);
    updateStars(stars2);
    updateStars(stars3);
    titleAnim++;

    if (screenShake > 0) screenShake--;

    if (state === "title") {
      if (btnp("a") || btnp("a")) {
        state = "play";
        resetGame();
        note(0, "C5", 0.08);
        setTimeout(() => note(0, "E5", 0.08), 80);
        setTimeout(() => note(0, "G5", 0.12), 160);
      }
      return;
    }

    if (state === "gameover") {
      for (let i = particles.length - 1; i >= 0; i--) {
        const p = particles[i]; p.x += p.vx; p.y += p.vy; p.vy += 0.08; p.life--;
        if (p.life <= 0) particles.splice(i, 1);
      }
      if (btnp("a") || btnp("a")) {
        if (score > hiScore) hiScore = score;
        state = "title";
      }
      return;
    }

    // --- Play state ---
    if (waveMessage > 0) waveMessage--;
    if (invincible > 0) invincible--;

    // Player movement: left/right freely, up/down limited range
    if (btn("left")) player.x -= player.speed;
    if (btn("right")) player.x += player.speed;
    if (btn("up")) player.y -= player.speed * 0.7;
    if (btn("down")) player.y += player.speed * 0.7;

    // Clamp player position
    player.x = _max(4, min(W - 12, player.x));
    player.y = _max(H - 75, min(H - 15, player.y));

    // Shooting: dual diverging shots
    if (shootCooldown > 0) shootCooldown--;

    // Charge mechanic
    if (btn("a")) {
      if (!charging && shootCooldown <= 0) {
        // Fire normal dual shot immediately on press
        if (btnp("a")) {
          fireDualShot();
          shootCooldown = 6;
        }
      }
      chargeTime++;
      if (chargeTime > 10) charging = true;
      if (charging && chargeTime % 8 === 0 && chargeTime < 60) chargeTickSound();
    } else {
      if (charging && chargeTime >= 30) {
        // Release charged shot
        fireChargeShot();
        chargeShootSound();
        shootCooldown = 15;
      }
      chargeTime = 0;
      charging = false;
    }

    // Update player bullets
    for (let i = bullets.length - 1; i >= 0; i--) {
      const b = bullets[i];
      b.x += b.vx;
      b.y += b.vy;
      if (b.y < -8 || b.x < -8 || b.x > W + 8) bullets.splice(i, 1);
    }

    // Update enemies
    for (let i = enemies.length - 1; i >= 0; i--) {
      const e = enemies[i];
      if (!e.alive) { enemies.splice(i, 1); continue; }

      e.timer++;
      if (e.timer < 0) continue; // stagger delay

      const t = e.timer;
      const spd = e.baseSpeed;

      if (e.phase === "enter") {
        // Entry patterns
        switch (e.pattern) {
          case PATTERNS.SINE:
            e.x += e.entryDir * spd * 1.2;
            e.y = 30 + e.formY + sin(t * e.freq) * e.amplitude;
            if ((e.entryDir > 0 && e.x > W / 2 + e.formX) ||
                (e.entryDir < 0 && e.x < W / 2 + e.formX)) {
              e.phase = "attack";
              e.timer = 0;
            }
            break;

          case PATTERNS.CIRCLE:
            e.angle += 0.06 * e.entryDir;
            e.x = e.cx + cos(e.angle) * e.radius;
            e.y = e.cy + sin(e.angle) * e.radius * 0.7;
            if (t > 60) { e.phase = "attack"; e.timer = 0; }
            break;

          case PATTERNS.VFORM:
            e.x += e.entryDir * spd * 0.8;
            e.y += spd * 0.6;
            if (e.y > 30 + e.formY) { e.phase = "attack"; e.timer = 0; }
            break;

          case PATTERNS.SWOOP:
            // Swoop in from side in an arc
            e.x += e.entryDir * spd * 1.5;
            e.y = 22 + sin(t * 0.04) * 45 + 30;
            if (t > 80) { e.phase = "attack"; e.timer = 0; }
            break;

          case PATTERNS.ZIGZAG:
            e.x += e.entryDir * spd;
            e.y += spd * 0.5;
            if (t % 30 < 15) e.x += spd * 0.8;
            else e.x -= spd * 0.8;
            if (e.y > 38 + e.formY) { e.phase = "attack"; e.timer = 0; }
            break;
        }
      }

      if (e.phase === "attack") {
        // Attack patterns: weave and descend toward player
        switch (e.pattern) {
          case PATTERNS.SINE:
            e.x += sin(t * 0.04) * spd * 0.8;
            e.y += spd * 0.6;
            break;

          case PATTERNS.CIRCLE:
            e.angle += 0.04;
            e.x = e.cx + cos(e.angle) * (e.radius + t * 0.3);
            e.y += spd * 0.5;
            break;

          case PATTERNS.VFORM:
            // Dive toward player
            const dx = player.x - e.x;
            e.x += (dx > 0 ? 1 : -1) * spd * 0.5;
            e.y += spd * 0.8;
            break;

          case PATTERNS.SWOOP:
            // Big swoop
            e.x += sin(t * 0.03) * spd * 2;
            e.y += spd * 0.4;
            break;

          case PATTERNS.ZIGZAG:
            e.x += (t % 40 < 20 ? spd : -spd);
            e.y += spd * 0.7;
            break;
        }

        // Shoot at player
        e.shootTimer--;
        if (e.shootTimer <= 0 && e.y > 10 && e.y < H - 38) {
          const angle = Math.atan2(player.y - e.y, player.x - e.x);
          const bspd = 2.5 + wave * 0.12;
          eBullets.push({
            x: e.x + 0, y: e.y + 8,
            vx: cos(angle) * bspd,
            vy: sin(angle) * bspd
          });
          e.shootTimer = _max(25, 70 - wave * 3) + flr(rnd(40));
        }
      }

      // Off screen -> remove
      if (e.y > H + 20 || e.x < -30 || e.x > W + 30) {
        e.phase = "exit";
        enemies.splice(i, 1);
        continue;
      }

      // Bullet-enemy collision
      for (let j = bullets.length - 1; j >= 0; j--) {
        const b = bullets[j];
        if (b.x + 8 > e.x - 2 && b.x < e.x + 9 && b.y + 8 > e.y - 2 && b.y < e.y + 9) {
          const dmg = b.power || 1;
          e.hp -= dmg;
          bullets.splice(j, 1);
          if (e.hp <= 0) {
            const big = e.type === 12;
            addExplosion(e.x, e.y, big);
            score += e.pts * (charging ? 2 : 1);
            if (big) bigHitSound(); else hitSound();
            e.alive = false;
          } else {
            note(1, "A4", 0.02);
          }
          break;
        }
      }
    }

    // Update enemy bullets
    for (let i = eBullets.length - 1; i >= 0; i--) {
      const b = eBullets[i];
      b.x += b.vx;
      b.y += b.vy;
      if (b.y > H + 8 || b.y < -8 || b.x < -8 || b.x > W + 8) {
        eBullets.splice(i, 1);
        continue;
      }

      // Hit player
      if (invincible <= 0 &&
          b.x + 8 > player.x && b.x < player.x + 8 &&
          b.y + 8 > player.y && b.y < player.y + 8) {
        eBullets.splice(i, 1);
        playerHit();
      }
    }

    // Enemy-player collision
    if (invincible <= 0) {
      for (let i = enemies.length - 1; i >= 0; i--) {
        const e = enemies[i];
        if (e.timer < 0) continue;
        if (player.x + 7 > e.x && player.x < e.x + 8 &&
            player.y + 7 > e.y && player.y < e.y + 8) {
          addExplosion(e.x, e.y, false);
          e.alive = false;
          playerHit();
          break;
        }
      }
    }

    // Explosions
    for (let i = explosions.length - 1; i >= 0; i--) {
      explosions[i].timer--;
      if (explosions[i].timer <= 0) explosions.splice(i, 1);
    }

    // Particles
    for (let i = particles.length - 1; i >= 0; i--) {
      const p = particles[i];
      p.x += p.vx; p.y += p.vy; p.vy += 0.06; p.life--;
      if (p.life <= 0) particles.splice(i, 1);
    }

    // Wave clear check
    if (enemies.length === 0 && state === "play" && waveMessage <= 0) {
      waveTimer++;
      if (waveTimer === 1) waveClearSound();
      if (waveTimer > 90) {
        waveTimer = 0;
        spawnWave();
      }
    } else {
      waveTimer = 0;
    }
  };

  function playerHit() {
    lives--;
    addExplosion(player.x, player.y, true);
    deathSound();
    player.x = W / 2 - 4;
    player.y = H - 30;
    invincible = 60;
    chargeTime = 0;
    charging = false;
    if (lives <= 0) {
      state = "gameover";
      if (score > hiScore) hiScore = score;
    }
  }

  function fireDualShot() {
    // Two diverging bullets
    bullets.push({ x: player.x + 0, y: player.y - 2, vx: -0.8, vy: -6, power: 1 });
    bullets.push({ x: player.x + 0, y: player.y - 2, vx: 0.8, vy: -6, power: 1 });
    shootSound();
  }

  function fireChargeShot() {
    // 5-way spread shot
    const cx = player.x + 0;
    const cy = player.y - 4;
    const angles = [-0.35, -0.17, 0, 0.17, 0.35];
    const spd = 7;
    for (const a of angles) {
      bullets.push({
        x: cx, y: cy,
        vx: sin(a) * spd,
        vy: -cos(a) * spd,
        power: 2,
        charged: true
      });
    }
  }

  // ============================================================
  // Draw
  // ============================================================
  GrayBox._draw = function() {
    cls(0);

    const shakeX = screenShake > 0 ? flr(rnd(3)) - 1 : 0;
    const shakeY = screenShake > 0 ? flr(rnd(3)) - 1 : 0;

    // --- Parallax starfield ---
    for (const s of stars1) pix(s.x + shakeX, s.y + shakeY, 1); // far = dim
    for (const s of stars2) pix(s.x + shakeX, s.y + shakeY, s.bright);
    for (const s of stars3) {
      // Near stars are brighter and slightly bigger
      const sx = s.x + shakeX, sy = s.y + shakeY;
      pix(sx, sy, 3);
      pix(sx + 1, sy, 2);
    }

    if (state === "title") {
      drawTitle();
      return;
    }

    if (state === "gameover") {
      drawGameOver();
      return;
    }

    // --- Play state rendering ---

    // Enemy bullets
    for (const b of eBullets) {
      const bx = flr(b.x) + shakeX, by = flr(b.y) + shakeY;
      spr(25, bx, by);
    }

    // Enemies
    for (const e of enemies) {
      if (e.timer < 0) continue;
      const ex = flr(e.x) + shakeX, ey = flr(e.y) + shakeY;
      // Flash when hit (damaged multi-hp enemies)
      if (e.type === 12 && e.hp < 3 && flr(GrayBox.frame / 3) % 2 === 0) {
        // Draw slightly different (flash)
        spr(e.type, ex, ey);
      } else {
        spr(e.type, ex, ey);
      }
    }

    // Player bullets
    for (const b of bullets) {
      const bx = flr(b.x) + shakeX, by = flr(b.y) + shakeY;
      if (b.charged) {
        spr(21, bx - 3, by - 3);
      } else {
        spr(20, bx, by);
      }
    }

    // Player
    if (invincible <= 0 || flr(GrayBox.frame / 3) % 2 === 0) {
      const px = flr(player.x) + shakeX;
      const py = flr(player.y) + shakeY;
      // Animate thrust
      const shipSpr = GrayBox.frame % 6 < 3 ? 1 : 2;
      spr(shipSpr, px, py);

      // Charge indicator
      if (charging && chargeTime >= 10) {
        const chargePct = min(1, (chargeTime - 10) / 20);
        const csize = flr(chargePct * 4) + 2;
        const ccolor = chargeTime >= 30 ? 3 : 2;
        // Pulsing circle around ship
        if (chargeTime >= 30) {
          circ(px + 4, py + 4, 6 + sin(GrayBox.frame * 0.3) * 2, ccolor);
        } else {
          // Growing charge ring
          const r = 3 + chargePct * 4;
          circ(px + 4, py + 4, flr(r), 1);
        }
      }
    }

    // Explosions
    for (const e of explosions) {
      const ex = flr(e.x) + shakeX, ey = flr(e.y) + shakeY;
      if (e.timer > 12) spr(30, ex, ey);
      else if (e.timer > 6) spr(31, ex, ey);
      else spr(32, ex, ey);
    }

    // Particles
    for (const p of particles) pix(flr(p.x) + shakeX, flr(p.y) + shakeY, p.color);

    // --- HUD ---
    rectf(0, 0, W, 10, 0);
    text("SCORE:" + String(score).padStart(6, "0"), 3, 2, 3);
    text("WAVE:" + wave, W / 2 - 16, 2, 2);

    // Lives
    for (let i = 0; i < lives; i++) spr(40, W - 27 + i * 9, 1);

    // Charge bar
    if (charging && chargeTime >= 10) {
      const bw = min(30, flr((chargeTime - 10) * 1.5));
      const barColor = chargeTime >= 30 ? 3 : 2;
      rectf(player.x - 8 + shakeX, player.y + 10 + shakeY, bw, 2, barColor);
      rect(player.x - 9 + shakeX, player.y + 9 + shakeY, 32, 4, 1);
    }

    // Wave announcement
    if (waveMessage > 0) {
      const msgY = 105 + sin(waveMessage * 0.08) * 3;
      text("WAVE " + wave, W / 2 - 20, flr(msgY), 3);
      if (waveMessage > 60) text("GET READY!", W / 2 - 30, flr(msgY) + 10, 2);
    }
  };

  function drawTitle() {
    const ty = 30 + sin(titleAnim * 0.04) * 4;

    // Title shadow
    text("EXERION", W / 2 - 20, flr(ty) + 1, 1);
    // Title main
    text("EXERION", W / 2 - 21, flr(ty), 3);

    // Subtitle
    text("VERTICAL SHOOTER", W / 2 - 42, flr(ty) + 12, 2);
    rectf(W / 2 - 50, flr(ty) + 20, 100, 1, 1);

    // Animated enemies on title screen
    const cx = W / 2;
    for (let i = 0; i < 5; i++) {
      const angle = titleAnim * 0.03 + i * (Math.PI * 2 / 5);
      const ex = cx + cos(angle) * 33;
      const ey = flr(ty) + 38 + sin(angle) * 15;
      spr(10, flr(ex), flr(ey));
    }
    // Bomber in center
    spr(11, cx - 4, flr(ty) + 35 + flr(sin(titleAnim * 0.05) * 3));
    // Carrier below
    spr(12, cx - 4, flr(ty) + 53 + flr(sin(titleAnim * 0.03) * 2));

    // Player ship demo
    const shipY = 150 + sin(titleAnim * 0.06) * 2;
    spr(1, cx - 4, flr(shipY));

    if (flr(titleAnim / 20) % 2 === 0) text("PRESS A TO START", W / 2 - 42, 145, 3);

    // Score table
    text("-SCORE TABLE-", W / 2 - 36, 170, 2);
    spr(12, W / 2 - 44, 180); text("CARRIER  100 PTS", W / 2 - 30, 182, 2);
    spr(11, W / 2 - 44, 192); text("BOMBER    30 PTS", W / 2 - 30, 194, 2);
    spr(10, W / 2 - 44, 204); text("FIGHTER   10 PTS", W / 2 - 30, 206, 2);

    if (hiScore > 0) text("HI:" + String(hiScore).padStart(6, "0"), W / 2 - 25, 218, 2);

    text("GRAYBOX DEMO V0.1", W / 2 - 46, 230, 1);
  }

  function drawGameOver() {
    for (const p of particles) pix(flr(p.x), flr(p.y), p.color);

    const gy = 75 + sin(titleAnim * 0.05) * 2;
    text("GAME OVER", W / 2 - 24, flr(gy), 3);
    text("SCORE: " + String(score).padStart(6, "0"), W / 2 - 34, flr(gy) + 15, 2);
    text("WAVE: " + wave, W / 2 - 17, flr(gy) + 24, 2);

    if (score > hiScore) {
      if (flr(titleAnim / 10) % 2 === 0) text("NEW HIGH SCORE!", W / 2 - 40, flr(gy) + 36, 3);
    }

    if (flr(titleAnim / 20) % 2 === 0) text("PRESS A TO CONTINUE", W / 2 - 52, 158, 3);
  }

  GrayBox.boot("screen");
})();
</script>
</body>
</html>
