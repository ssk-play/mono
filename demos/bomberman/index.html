          spr, text, btn, btnp, note, stop, rnd, flr, abs: _abs,
          min, max: _max, sin, cos } = Mono;

  // --- Helper: upscale 8x8 sprite data to 16x16 (256 chars) ---
  function up(d){let o="";for(let r=0;r<8;r++){let row="";for(let c=0;c<8;c++){const ch=d[r*8+c];row+=ch+ch;}o+=row+row;}return o;}

  // 19: Enemy type C - fast coin
  defSprite(19, up(

  defSprite(21, up(

  // 22: Life icon
  defSprite(22, up(

  // 23: Door (level exit, hidden under soft block)
  defSprite(23, up(
    "01111100" +
    "10000010" +
    "10000010" +
    "10010010" +
    "10010010" +
    "10000010" +

  ));

  // --- Grid constants ---
  const TILE = 16; // tile pixel size = sprite size (16x16)
  const GW = 15; // odd number for classic bomberman pattern
  const GH = 13;
  const OX = flr((W - GW * TILE) / 2); // center the grid
  const OY = 18; // top HUD space

  let grid = [];
  const { TITLE, PLAY, CLEAR, GAMEOVER } = Mono.SCENE;
  let player, bombs, explosions, enemies, particles, items;
  let score, lives, level;
  let playerInvuln, moveTimer;
  let doorPos; // {gx, gy} where the exit door is hidden
  let currentScene; // track current scene for draw functions

  // Powerup types: 0=fire, 1=bomb, 2=speed
  function initGrid() {
    grid = [];
    for (let y = 0; y < GH; y++) {
      grid[y] = [];
      for (let x = 0; x < GW; x++) {
        if (x === 0 || x === GW - 1 || y === 0 || y === GH - 1) {
          grid[y][x] = 1; // border walls
        } else if (x % 2 === 0 && y % 2 === 0) {
          grid[y][x] = 1; // fixed pillar pattern
        } else {
          grid[y][x] = 0;
        }
      }
    }
    // Place soft blocks randomly, leaving player start area clear
    for (let y = 1; y < GH - 1; y++) {
      for (let x = 1; x < GW - 1; x++) {
        if (grid[y][x] !== 0) continue;
        // Keep player spawn area clear (top-left corner)
        if (x <= 2 && y <= 2) continue;
        if (Math.random() < 0.65) {
          grid[y][x] = 2; // soft block
        }
      }
    }

    // Place door under a random soft block
    const softBlocks = [];
    for (let y = 1; y < GH - 1; y++)
      for (let x = 1; x < GW - 1; x++)
        if (grid[y][x] === 2 && !(x <= 2 && y <= 2)) softBlocks.push({x, y});
    if (softBlocks.length > 0) {
      const d = softBlocks[flr(rnd(softBlocks.length))];
      doorPos = { gx: d.x, gy: d.y };
    } else {
      doorPos = { gx: 3, gy: 3 };
    }
  }

  function spawnEnemies() {
    enemies = [];
    const count = min(3 + level, 10);
    const spots = [];
    for (let y = 1; y < GH - 1; y++)
      for (let x = 1; x < GW - 1; x++)
        if (grid[y][x] === 0 && (x > 3 || y > 3)) spots.push({x, y});
    for (let i = 0; i < count && spots.length > 0; i++) {
      const idx = flr(rnd(spots.length));
      const s = spots.splice(idx, 1)[0];
      let type = 17; // balloon
      if (level >= 3 && Math.random() < 0.3) type = 18; // ghost
      if (level >= 5 && Math.random() < 0.2) type = 19; // fast
      enemies.push({
        gx: s.x, gy: s.y,
        px: OX + s.x * TILE, py: OY + s.y * TILE, // pixel position
        type: type,
        dir: flr(rnd(4)), // 0=up 1=down 2=left 3=right
        moveTimer: 0,
        speed: type === 19 ? 1.2 : (type === 18 ? 0.6 : 0.5),
        alive: true,
        wallPass: type === 18, // ghosts pass through soft blocks
      });
    }
  }

  function spawnItems() {
    items = [];
    // Hide powerups under some soft blocks
    const softBlocks = [];
    for (let y = 1; y < GH - 1; y++)
      for (let x = 1; x < GW - 1; x++)
        if (grid[y][x] === 2 && !(x === doorPos.gx && y === doorPos.gy))
          softBlocks.push({x, y});
    // Place 2-3 items per level
    const numItems = min(2 + flr(level / 2), 5);
    for (let i = 0; i < numItems && softBlocks.length > 0; i++) {
      const idx = flr(rnd(softBlocks.length));
      const s = softBlocks.splice(idx, 1)[0];
      const types = [0, 1, 2]; // fire, bomb, speed
      items.push({ gx: s.x, gy: s.y, type: types[flr(rnd(types.length))], revealed: false });
    }
  }

  // Persistent powerup state (survives between levels, resets on new game)
  let savedFireRange = 1, savedMaxBombs = 1, savedSpeed = 2;

  function resetGame() {
    score = 0;
    lives = 3;
    level = 0;
    savedFireRange = 1;
    savedMaxBombs = 1;
    savedSpeed = 2;
    startLevel();
  }

  function startLevel() {
    level++;
    bombs = [];
    explosions = [];
    particles = [];
    player = {
      gx: 1, gy: 1,
      px: OX + 1 * TILE, py: OY + 1 * TILE,
      targetPx: OX + 1 * TILE, targetPy: OY + 1 * TILE,
      moving: false,
      dir: 1, // 0=up 1=down 2=left 3=right
      fireRange: savedFireRange,
      maxBombs: savedMaxBombs,
      speed: savedSpeed,
      animFrame: 0,
      animTimer: 0,
    };
    playerInvuln = 60; // brief invulnerability at start
    initGrid();
    spawnEnemies();
    spawnItems();
  }

  function gridToPixel(gx, gy) {
    return { x: OX + gx * TILE, y: OY + gy * TILE };
  }
  function pixelToGrid(px, py) {
    return { gx: flr((px - OX + TILE / 2) / TILE), gy: flr((py - OY + TILE / 2) / TILE) };
  }

  function isWalkable(gx, gy, wallPass) {
    if (gx < 0 || gx >= GW || gy < 0 || gy >= GH) return false;
    const cell = grid[gy][gx];
    if (cell === 1) return false;
    if (cell === 2 && !wallPass) return false;
    // Check for bombs
    for (const b of bombs) {
      if (b.gx === gx && b.gy === gy) return false;
    }
    return true;
  }

  function isWalkableNoBlocks(gx, gy) {
    if (gx < 0 || gx >= GW || gy < 0 || gy >= GH) return false;
    return grid[gy][gx] === 0;
  }

  // --- Collision helpers ---
  // Circle vs circle collision (for round objects like bombs, enemies)
  function circCollide(x1, y1, r1, x2, y2, r2) {
    const dx = x1 - x2, dy = y1 - y2;
    const dist = dx * dx + dy * dy;
    const rSum = r1 + r2;
    return dist < rSum * rSum;
  }

  // Circle vs rect collision
  function circRectCollide(cx, cy, cr, rx, ry, rw, rh) {
    const nearX = _max(rx, min(cx, rx + rw));
    const nearY = _max(ry, min(cy, ry + rh));
    const dx = cx - nearX, dy = cy - nearY;
    return dx * dx + dy * dy < cr * cr;
  }

  function placeBomb() {
    const activeBombs = bombs.filter(b => !b.exploded);
    if (activeBombs.length >= player.maxBombs) return;
    const pg = pixelToGrid(player.px, player.py);
    // Don't place if one already here
    for (const b of bombs) if (b.gx === pg.gx && b.gy === pg.gy && !b.exploded) return;
    bombs.push({
      gx: pg.gx, gy: pg.gy,
      timer: 60, // 2 seconds at 30fps
      range: player.fireRange,
      exploded: false,
    });
    note(0, "C3", 0.05);
  }

  function triggerExplosion(bomb) {
    bomb.exploded = true;
    const cx = bomb.gx, cy = bomb.gy;
    const range = bomb.range;

    // Explosion center
    explosions.push({ gx: cx, gy: cy, timer: 15, type: "center" });
    addExplosionParticles(cx, cy);

    // Sound
    note(0, "C2", 0.15);
    note(1, "E2", 0.12);
    setTimeout(() => { try { note(0, "G2", 0.1); } catch(e){} }, 80);

    // Four directions
    const dirs = [{dx:1,dy:0,tip:"right",mid:"horiz"},{dx:-1,dy:0,tip:"left",mid:"horiz"},
                  {dx:0,dy:1,tip:"down",mid:"vert"},{dx:0,dy:-1,tip:"up",mid:"vert"}];
    for (const d of dirs) {
      for (let i = 1; i <= range; i++) {
        const nx = cx + d.dx * i, ny = cy + d.dy * i;
        if (nx < 0 || nx >= GW || ny < 0 || ny >= GH) break;
        if (grid[ny][nx] === 1) break; // hard wall stops
        if (grid[ny][nx] === 2) {
          // Destroy soft block
          grid[ny][nx] = 0;
          explosions.push({ gx: nx, gy: ny, timer: 15, type: "block" });
          addExplosionParticles(nx, ny);
          // Check if item revealed
          for (const it of items) {
            if (it.gx === nx && it.gy === ny) it.revealed = true;
          }
          break; // explosion stops at soft block
        }
        // Check if chain-detonates another bomb
        for (const ob of bombs) {
          if (!ob.exploded && ob.gx === nx && ob.gy === ny) {
            ob.timer = 1; // detonate next frame
          }
        }
        const isEnd = (i === range);
        const type = isEnd ? d.tip : d.mid;
        explosions.push({ gx: nx, gy: ny, timer: 15, type: type });
      }
    }
  }

  function addExplosionParticles(gx, gy) {
    const px = OX + gx * TILE + TILE / 2;
    const py = OY + gy * TILE + TILE / 2;
    for (let i = 0; i < 6; i++) {
      particles.push({
        x: px, y: py,
        vx: rnd(4) - 2, vy: rnd(4) - 2,
        life: 8 + flr(rnd(8)),
        color: flr(rnd(3)) + 1,
      });
    }
  }

  function isExplosionAt(gx, gy) {
    for (const e of explosions) {
      if (e.gx === gx && e.gy === gy && e.timer > 0) return true;
    }
    return false;
  }

  // Check player-explosion collision using circle for player center vs grid cell
  function isPlayerInExplosion() {
    const pcx = player.px + TILE / 2;
    const pcy = player.py + TILE / 2;
    const pr = 6; // player collision radius
    for (const e of explosions) {
      if (e.timer <= 0) continue;
      const ecx = OX + e.gx * TILE + TILE / 2;
      const ecy = OY + e.gy * TILE + TILE / 2;
      // Explosion fills a tile; use circle-rect check
      if (circRectCollide(pcx, pcy, pr, OX + e.gx * TILE, OY + e.gy * TILE, TILE, TILE)) {
        return true;
      }
    }
    return false;
  }

  // Check enemy-explosion collision using circle for round enemies
  function isEnemyInExplosion(e) {
    const ecx = e.px + TILE / 2;
    const ecy = e.py + TILE / 2;
    const er = 6; // enemy collision radius
    for (const ex of explosions) {
      if (ex.timer <= 0) continue;
      if (circRectCollide(ecx, ecy, er, OX + ex.gx * TILE, OY + ex.gy * TILE, TILE, TILE)) {
        return true;
      }
    }
    return false;
  }

  function killPlayer() {
    if (playerInvuln > 0) return;
    lives--;
    addExplosionParticles(pixelToGrid(player.px, player.py).gx, pixelToGrid(player.px, player.py).gy);
    note(0, "C3", 0.12); note(1, "G2", 0.12);
    setTimeout(() => { try { note(0, "A2", 0.18); note(1, "E2", 0.18); } catch(e){} }, 120);
    if (lives <= 0) {
      Mono.go(GAMEOVER);
      return;
    } else {
      // Respawn
      player.gx = 1; player.gy = 1;
      player.px = OX + TILE; player.py = OY + TILE;
      player.targetPx = player.px; player.targetPy = player.py;
      player.moving = false;
      playerInvuln = 90;
    }
  }

  // --- Title Scene ---
  Mono.scene(TITLE, {
    init() { currentScene = "title"; },
    update() {
      if (btnp("start") || btnp("a")) {
        Mono.go(PLAY);
        note(0, "C5", 0.1);
        setTimeout(() => { try { note(0, "E5", 0.1); } catch(e){} }, 100);
        setTimeout(() => { try { note(0, "G5", 0.15); } catch(e){} }, 200);
      }
    },
    draw() {
      cls(0);
      const ty = 37 + sin(Mono.frame * 0.05) * 5;
      // Center "BOMBERMAN" text (9 chars * 4px + 8 gaps = ~44px wide)
      text("BOMBERMAN", 138, flr(ty), 3);
      text("BOMBERMAN", 139, flr(ty) + 1, 1);
      rectf(125, flr(ty) + 12, 70, 1, 2);
      // Character showcase centered
      const bx = W / 2 - 40;
      spr(1, bx, flr(ty) + 22 + sin(Mono.frame * 0.08) * 3);
      spr(5, bx + 22, flr(ty) + 26 + sin(Mono.frame * 0.08 + 1) * 2);
      spr(17, bx + 44, flr(ty) + 22 + sin(Mono.frame * 0.08 + 2) * 3);
      spr(18, bx + 66, flr(ty) + 24 + sin(Mono.frame * 0.08 + 3) * 3);
      if (flr(Mono.frame / 20) % 2 === 0) text("PRESS START", 130, 135, 3);
      text("ARROWS: MOVE", 128, 155, 2);
      text("A: PLACE BOMB", 124, 165, 2);
      text("DESTROY ALL ENEMIES", 110, 180, 2);
      text("FIND THE EXIT DOOR!", 112, 190, 2);
      // Powerup legend - ensure within 320 width
      spr(14, 100, 206); text("FIRE", 118, 208, 2);
      spr(15, 152, 206); text("BOMB", 170, 208, 2);
      spr(16, 204, 206); text("SPEED", 222, 208, 2);
      text("MONO DEMO V0.1", 120, 229, 1);
    }
  });

  // --- Play Scene ---
  Mono.scene(PLAY, {
    init() { currentScene = "play"; resetGame(); },
    update() {
    // --- Play state ---
    if (playerInvuln > 0) playerInvuln--;

    // Player movement (grid-snapped)
    const spd = player.speed;
    if (!player.moving) {
      let dx = 0, dy = 0;
      if (btn("up")) { dy = -1; player.dir = 0; }
      else if (btn("down")) { dy = 1; player.dir = 1; }
      else if (btn("left")) { dx = -1; player.dir = 2; }
      else if (btn("right")) { dx = 1; player.dir = 3; }

      if (dx !== 0 || dy !== 0) {
        const ng = { gx: player.gx + dx, gy: player.gy + dy };
        if (isWalkableNoBlocks(ng.gx, ng.gy)) {
          // Also check no bomb there (player can stand on bomb they just placed)
          let bombBlocking = false;
          for (const b of bombs) {
            if (!b.exploded && b.gx === ng.gx && b.gy === ng.gy) {
              // Player can walk OFF a bomb but not ONTO one
              bombBlocking = true;
              break;
            }
          }
          if (!bombBlocking) {
            player.gx = ng.gx; player.gy = ng.gy;
            player.targetPx = OX + ng.gx * TILE;
            player.targetPy = OY + ng.gy * TILE;
            player.moving = true;
          }
        }
      }
    }

    if (player.moving) {
      const dx = player.targetPx - player.px;
      const dy = player.targetPy - player.py;
      const dist = Math.sqrt(dx * dx + dy * dy);
      if (dist <= spd) {
        player.px = player.targetPx;
        player.py = player.targetPy;
        player.moving = false;
      } else {
        player.px += (dx / dist) * spd;
        player.py += (dy / dist) * spd;
      }
      player.animTimer++;
      if (player.animTimer > 4) { player.animTimer = 0; player.animFrame = 1 - player.animFrame; }
    } else {
      player.animFrame = 0;
    }

    // Place bomb
    if (btnp("a")) placeBomb();

    // Update bombs
    for (let i = bombs.length - 1; i >= 0; i--) {
      const b = bombs[i];
      if (b.exploded) continue;
      b.timer--;
      if (b.timer <= 0) {
        triggerExplosion(b);
      }
    }

    // Clean up exploded bombs after their explosion timer
    bombs = bombs.filter(b => !b.exploded || explosions.some(e => e.gx === b.gx && e.gy === b.gy && e.timer > 0));

    // Update explosions
    for (let i = explosions.length - 1; i >= 0; i--) {
      explosions[i].timer--;
      if (explosions[i].timer <= 0) explosions.splice(i, 1);
    }

    // Check player hit by explosion (circle collision)
    if (isPlayerInExplosion()) {
      killPlayer();
    }

    // Check enemies hit by explosion (circle collision)
    for (let i = enemies.length - 1; i >= 0; i--) {
      const e = enemies[i];
      if (isEnemyInExplosion(e)) {
        e.alive = false;
        const eg = pixelToGrid(e.px, e.py);
        addExplosionParticles(eg.gx, eg.gy);
        score += e.type === 19 ? 300 : (e.type === 18 ? 200 : 100);
        note(1, "E4", 0.06);
        enemies.splice(i, 1);
      }
    }

    // Enemy movement
    for (const e of enemies) {
      e.moveTimer++;
      const moveInterval = flr(TILE / (e.speed));
      if (e.moveTimer >= moveInterval) {
        e.moveTimer = 0;
        // Try current direction
        const dirs = [{dx:0,dy:-1},{dx:0,dy:1},{dx:-1,dy:0},{dx:1,dy:0}];
        const d = dirs[e.dir];
        const nx = e.gx + d.dx, ny = e.gy + d.dy;

        // Decide whether to change direction
        let canGo = isWalkable(nx, ny, e.wallPass);
        if (canGo && Math.random() < 0.1) canGo = false; // random direction change

        if (canGo) {
          e.gx = nx; e.gy = ny;
          e.px = OX + nx * TILE; e.py = OY + ny * TILE;
        } else {
          // Pick new random direction
          const available = [];
          for (let di = 0; di < 4; di++) {
            const dd = dirs[di];
            if (isWalkable(e.gx + dd.dx, e.gy + dd.dy, e.wallPass)) available.push(di);
          }
          if (available.length > 0) {
            e.dir = available[flr(rnd(available.length))];
          }
        }
      }
    }

    // Enemy-player collision (circle vs circle)
    const pcx = player.px + TILE / 2;
    const pcy = player.py + TILE / 2;
    const pr = 6; // player radius
    for (const e of enemies) {
      const ecx = e.px + TILE / 2;
      const ecy = e.py + TILE / 2;
      const er = 6; // enemy radius
      if (circCollide(pcx, pcy, pr, ecx, ecy, er)) {
        killPlayer();
        break;
      }
    }

    // Pick up items (circle player vs rect item tile)
    const pg = pixelToGrid(player.px, player.py);
    for (let i = items.length - 1; i >= 0; i--) {
      const it = items[i];
      if (!it.revealed) continue;
      if (it.gx === pg.gx && it.gy === pg.gy) {
        if (it.type === 0) { player.fireRange = min(player.fireRange + 1, 6); }
        else if (it.type === 1) { player.maxBombs = min(player.maxBombs + 1, 5); }
        else if (it.type === 2) { player.speed = min(player.speed + 0.5, 4); }
        items.splice(i, 1);
        score += 50;
        note(0, "G5", 0.06);
        setTimeout(() => { try { note(0, "C6", 0.06); } catch(e){} }, 60);
      }
    }

    // Check for door
    if (enemies.length === 0 && doorPos) {
      // Door is revealed once its block is destroyed
      if (grid[doorPos.gy][doorPos.gx] === 0 && pg.gx === doorPos.gx && pg.gy === doorPos.gy) {
        // Level clear!
        Mono.go(CLEAR);
        moveTimer = 0;
        score += 500;
        note(0, "C5", 0.1);
        setTimeout(() => { try { note(0, "E5", 0.1); } catch(e){} }, 100);
        setTimeout(() => { try { note(0, "G5", 0.1); } catch(e){} }, 200);
        setTimeout(() => { try { note(0, "C6", 0.15); } catch(e){} }, 300);
        // Celebration particles
        for (let i = 0; i < 30; i++) {
          particles.push({
            x: W / 2 + rnd(67) - 33, y: H / 2 + rnd(45) - 23,
            vx: rnd(6) - 3, vy: -rnd(4) - 1,
            life: 20 + flr(rnd(30)),
            color: flr(rnd(3)) + 1,
          });
        }
      }
    }

    // Particles
    for (let i = particles.length - 1; i >= 0; i--) {
      const p = particles[i];
      p.x += p.vx; p.y += p.vy; p.vy += 0.06; p.life--;
      if (p.life <= 0) particles.splice(i, 1);
    }
    },
    draw() {
      cls(0);
      drawArena();
      for (const p of particles) pix(flr(p.x), flr(p.y), p.color);
      drawHUD();
    }
  });

  // --- Level Clear Scene ---
  Mono.scene(CLEAR, {
    init() { currentScene = "clear"; moveTimer = 0; },
    update() {
      for (let i = particles.length - 1; i >= 0; i--) {
        const p = particles[i]; p.x += p.vx; p.y += p.vy; p.vy += 0.05; p.life--;
        if (p.life <= 0) particles.splice(i, 1);
      }
      moveTimer = (moveTimer || 0) + 1;
      if (moveTimer > 90) {
        moveTimer = 0;
        // Save powerup state before level reset
        savedFireRange = player.fireRange;
        savedMaxBombs = player.maxBombs;
        savedSpeed = player.speed;
        startLevel();
        Mono.go(PLAY);
      }
    },
    draw() {
      cls(0);
      drawArena();
      for (const p of particles) pix(flr(p.x), flr(p.y), p.color);
      // Center the level clear messages
      const msgY = 98 + sin(Mono.frame * 0.1) * 3;
      const lvlStr = "LEVEL " + level + " CLEAR!";
      const lvlW = lvlStr.length * 4;
      text(lvlStr, flr((W - lvlW) / 2), flr(msgY), 3);
      const scrStr = "SCORE: " + score;
      const scrW = scrStr.length * 4;
      text(scrStr, flr((W - scrW) / 2), flr(msgY) + 20, 2);
      drawHUD();
    }
  });

  // --- Game Over Scene ---
  Mono.scene(GAMEOVER, {
    init() { currentScene = "gameover"; },
    update() {
      for (let i = particles.length - 1; i >= 0; i--) {
        const p = particles[i]; p.x += p.vx; p.y += p.vy; p.vy += 0.08; p.life--;
        if (p.life <= 0) particles.splice(i, 1);
      }
      if (btnp("start") || btnp("a")) Mono.go(TITLE);
    },
    draw() {
      cls(0);
      for (const p of particles) pix(flr(p.x), flr(p.y), p.color);
      text("GAME OVER", 131, 83, 3);
      const scrStr = "SCORE: " + score;
      const scrW = scrStr.length * 4;
      text(scrStr, flr((W - scrW) / 2), 101, 2);
      const lvlStr = "LEVEL: " + level;
      const lvlW = lvlStr.length * 4;
      text(lvlStr, flr((W - lvlW) / 2), 113, 2);
      if (flr(Mono.frame / 20) % 2 === 0) text("PRESS START", 130, 150, 3);
    }
  });

  function drawArena() {
    // Draw floor
    rectf(OX, OY, GW * TILE, GH * TILE, 0);

    // Draw grid
    for (let gy = 0; gy < GH; gy++) {
      for (let gx = 0; gx < GW; gx++) {
        const px = OX + gx * TILE;
        const py = OY + gy * TILE;
        const cell = grid[gy][gx];

        // Floor - subtle pattern
        if (cell === 0) {
          rectf(px, py, TILE, TILE, 0);
          if ((gx + gy) % 2 !== 0) {
            // Draw corner dots for grid visibility
            pix(px, py, 1);
          }
        }

        if (cell === 1) { spr(3, px, py); Mono.dbg(px, py, TILE, TILE); }
        if (cell === 2) { spr(4, px, py); Mono.dbg(px, py, TILE, TILE); }
      }
    }

    // Draw door (if block destroyed and enemies dead)
    if (doorPos && grid[doorPos.gy][doorPos.gx] === 0) {
      const dpx = OX + doorPos.gx * TILE;
      const dpy = OY + doorPos.gy * TILE;
      spr(23, dpx, dpy);
      Mono.dbg(dpx, dpy, TILE, TILE);
    }

    // Draw revealed items
    for (const it of items) {
      if (!it.revealed) continue;
      const sprId = it.type === 0 ? 14 : (it.type === 1 ? 15 : 16);
      const bob = sin(Mono.frame * 0.15) * 2;
      const ipx = OX + it.gx * TILE;
      const ipy = OY + it.gy * TILE + bob;
      spr(sprId, ipx, flr(ipy));
      Mono.dbg(ipx, flr(ipy), TILE, TILE);
    }

    // Draw bombs (circle debug for round bomb shape)
    for (const b of bombs) {
      if (b.exploded) continue;
      const pulse = b.timer < 20 && flr(Mono.frame / 3) % 2 === 0;
      const sprId = pulse ? 6 : 5;
      const bpx = OX + b.gx * TILE;
      const bpy = OY + b.gy * TILE;
      spr(sprId, bpx, bpy);
      Mono.dbgC(bpx + TILE / 2, bpy + TILE / 2, 7);
    }

    // Draw explosions
    for (const e of explosions) {
      const px = OX + e.gx * TILE;
      const py = OY + e.gy * TILE;
      if (e.type === "block") {
        spr(21, px, py);
      } else if (e.type === "center") {
        spr(7, px, py);
      } else if (e.type === "horiz") {
        spr(8, px, py);
      } else if (e.type === "vert") {
        spr(9, px, py);
      } else if (e.type === "right") {
        spr(10, px, py);
      } else if (e.type === "left") {
        spr(11, px, py);
      } else if (e.type === "down") {
        spr(12, px, py);
      } else if (e.type === "up") {
        spr(13, px, py);
      }
      Mono.dbg(px, py, TILE, TILE);
    }

    // Draw enemies (circle debug for round enemy shapes)
    for (const e of enemies) {
      const bob = sin(Mono.frame * 0.12 + e.gx) * 1;
      spr(e.type, flr(e.px), flr(e.py + bob));
      Mono.dbgC(flr(e.px) + TILE / 2, flr(e.py + bob) + TILE / 2, 6);
    }

    // Draw player
    if (currentScene === "play" || currentScene === "clear") {
      if (playerInvuln <= 0 || flr(Mono.frame / 3) % 2 === 0) {
        const sprId = player.animFrame === 0 ? 1 : 2;
        spr(sprId, flr(player.px), flr(player.py));
        Mono.dbgC(flr(player.px) + TILE / 2, flr(player.py) + TILE / 2, 6);
      }
    }
  }

  function drawHUD() {
    // HUD background
    rectf(0, 0, W, 16, 0);
    rectf(0, 15, W, 1, 1);

    // Left side: score
    text("SC:" + score, 2, 4, 3);

    // Center: level
    const lvStr = "LV:" + level;
    text(lvStr, 90, 4, 2);

    // Right side: lives with bounded icon count
    const maxLivesShown = min(lives, 5); // cap displayed icons to prevent overflow
    const livesStartX = W - 4 - maxLivesShown * 10;
    for (let i = 0; i < maxLivesShown; i++) {
      spr(22, livesStartX + i * 10, 0);
      Mono.dbg(livesStartX + i * 10, 0, 16, 16);
    }
    if (lives > 5) {
      text("+" + (lives - 5), W - 4 - maxLivesShown * 10 - 16, 4, 2);
    }

    // Powerup status between level and lives
    text("F:" + player.fireRange, 130, 4, 2);
    text("B:" + player.maxBombs, 165, 4, 2);

    // Enemy count at bottom - ensure it stays within bounds
    const bottomY = OY + GH * TILE + 2;
    if (bottomY + 8 <= H) { // only draw if it fits in 240px height
      if (enemies.length > 0) {
        text("ENEMIES:" + enemies.length, OX, bottomY, 1);
      } else {
        if (flr(Mono.frame / 15) % 2 === 0)
          text("FIND THE EXIT!", OX, bottomY, 3);
      }
    }
  }

  Mono.go(TITLE);
  Mono.boot("screen");
})();
</script>
