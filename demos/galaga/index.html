<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GrayBox — Demo: Galaga</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #0a0a0a;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100vh;
    font-family: monospace;
    overflow: hidden;
  }
  #frame {
    background: #111;
    border: 3px solid #333;
    border-radius: 8px;
    padding: 12px;
    box-shadow: 0 0 40px rgba(0,0,0,0.8), inset 0 0 20px rgba(0,0,0,0.5);
  }
  canvas {
    display: block;
    image-rendering: pixelated;
    image-rendering: crisp-edges;
  }
  #controls {
    margin-top: 12px;
    color: #6b6b6b;
    font-size: 11px;
    text-align: center;
    letter-spacing: 1px;
  }
  #controls span { color: #b0b0b0; }
</style>
</head>
<body>
<div id="frame">
  <canvas id="screen"></canvas>
</div>
<div id="controls">
  <span>←→</span> MOVE &nbsp;&nbsp; <span>A</span> SHOOT
</div>
<script src="../../runtime/engine.js"></script>
<script>
(() => {
  "use strict";
  const W = GrayBox.WIDTH, H = GrayBox.HEIGHT;
  const { cls, pix, line, rect, rectf, circ, circf, sprite: defSprite,
          spr, text, btn, btnp, note, stop, rnd, flr, abs: _abs,
          min, max: _max, sin, cos } = GrayBox;

  // --- Sprites ---
  // 1: Player ship (arrow up)
  defSprite(1,
    "00030000" +
    "00333000" +
    "00333000" +
    "03333300" +
    "33333330" +
    "33311330" +
    "33000030" +
    "01000010"
  );
  // 2: Enemy type A — bug/bee
  defSprite(2,
    "03000030" +
    "00300300" +
    "03333300" +
    "32333230" +
    "33333330" +
    "03033030" +
    "30300303" +
    "03000030"
  );
  // 3: Enemy type B — butterfly
  defSprite(3,
    "00300300" +
    "03030300" +
    "33333330" +
    "32323230" +
    "33333330" +
    "01333100" +
    "03030300" +
    "30000003"
  );
  // 4: Boss enemy — galaga boss
  defSprite(4,
    "03333300" +
    "33333330" +
    "32233220" +
    "33333330" +
    "33333330" +
    "03333300" +
    "00333000" +
    "03030300"
  );
  // 5: Player bullet
  defSprite(5,
    "00030000" +
    "00030000" +
    "00020000" +
    "00020000" +
    "00010000" +
    "00000000" +
    "00000000" +
    "00000000"
  );
  // 6: Enemy bullet
  defSprite(6,
    "00000000" +
    "00000000" +
    "00010000" +
    "00020000" +
    "00020000" +
    "00030000" +
    "00030000" +
    "00000000"
  );
  // 7: Explosion frame 1
  defSprite(7,
    "00000000" +
    "00200100" +
    "01002000" +
    "00031000" +
    "00130200" +
    "01000010" +
    "00100000" +
    "00000000"
  );
  // 8: Explosion frame 2
  defSprite(8,
    "20010020" +
    "01000010" +
    "00203200" +
    "03033030" +
    "00232000" +
    "01000300" +
    "20001001" +
    "00200010"
  );
  // 9: Life icon (small ship)
  defSprite(9,
    "00000000" +
    "00030000" +
    "00333000" +
    "03333300" +
    "33333330" +
    "33311330" +
    "00000000" +
    "00000000"
  );
  // 10: Star
  defSprite(10,
    "00000000" +
    "00000000" +
    "00000000" +
    "00010000" +
    "00000000" +
    "00000000" +
    "00000000" +
    "00000000"
  );

  // --- Game state ---
  const { TITLE, PLAY, GAMEOVER } = GrayBox.SCENE;
  let player, bullets, eBullets, enemies, explosions, particles, stars;
  let score, lives, wave, waveTimer, waveMessage;
  let shootCooldown;
  let formationX, formationDir, formationSpeed;
  let diveTimer;

  // Formation grid config
  const FORM_COLS = 10;
  const FORM_ROWS = 4;
  const FORM_CELL_W = 12;
  const FORM_CELL_H = 12;
  const FORM_BASE_X = (W - FORM_COLS * FORM_CELL_W) / 2;
  const FORM_BASE_Y = 30;

  function resetGame() {
    player = { x: W / 2 - 4, y: H - 24, speed: 3 };
    bullets = [];
    eBullets = [];
    enemies = [];
    explosions = [];
    particles = [];
    score = 0;
    lives = 3;
    wave = 0;
    waveTimer = 0;
    waveMessage = 0;
    shootCooldown = 0;
    formationX = 0;
    formationDir = 1;
    formationSpeed = 0.3;
    diveTimer = 0;
    stars = [];
    for (let i = 0; i < 50; i++)
      stars.push({ x: flr(rnd(W)), y: flr(rnd(H)), speed: 0.2 + rnd(0.8), bright: flr(rnd(2)) + 1 });
    spawnWave();
  }

  function spawnWave() {
    wave++;
    waveMessage = 90; // show "WAVE X" for 3 seconds
    formationSpeed = 0.3 + wave * 0.05;
    const rows = min(FORM_ROWS + flr(wave / 3), 5);
    for (let row = 0; row < rows; row++) {
      for (let col = 0; col < FORM_COLS; col++) {
        let type, hp, pts;
        if (row === 0) { type = 4; hp = 2; pts = 40; }       // boss row
        else if (row <= 1) { type = 3; hp = 1; pts = 20; }    // butterfly
        else { type = 2; hp = 1; pts = 10; }                  // bee
        enemies.push({
          formRow: row, formCol: col,
          x: 0, y: 0, // computed from formation offset
          type: type, hp: hp, pts: pts,
          state: "forming",  // "forming" | "formation" | "diving" | "returning"
          enterT: -(row * FORM_COLS + col) * 3, // stagger entrance
          // dive state
          diveAngle: 0, diveSpeed: 0,
          divePath: null, diveT: 0,
          shootTimer: 60 + flr(rnd(120)),
        });
      }
    }
    diveTimer = 60 + flr(rnd(30));
  }

  function formationPos(row, col) {
    return {
      x: FORM_BASE_X + col * FORM_CELL_W + formationX,
      y: FORM_BASE_Y + row * FORM_CELL_H
    };
  }

  function addExplosion(x, y) {
    explosions.push({ x: x, y: y, timer: 12 });
    for (let i = 0; i < 8; i++)
      particles.push({
        x: x + 4, y: y + 4,
        vx: rnd(4) - 2, vy: rnd(4) - 2,
        life: 6 + flr(rnd(10)),
        color: flr(rnd(3)) + 1
      });
  }

  function shootSound() { note(0, "C6", 0.04); }
  function hitSound() { note(1, "C3", 0.06); setTimeout(() => note(1, "E3", 0.05), 40); }
  function bossHitSound() { note(1, "A4", 0.03); }
  function deathSound() {
    note(0, "C3", 0.12); note(1, "G2", 0.12);
    setTimeout(() => { note(0, "A2", 0.18); note(1, "E2", 0.18); }, 120);
  }
  function waveClearSound() {
    note(0, "C5", 0.1);
    setTimeout(() => note(0, "E5", 0.1), 100);
    setTimeout(() => note(0, "G5", 0.1), 200);
    setTimeout(() => note(0, "C6", 0.15), 300);
  }

  function startDive(enemy) {
    enemy.state = "diving";
    enemy.diveT = 0;
    // Create a bezier-like dive path
    const startX = enemy.x;
    const startY = enemy.y;
    const midX = startX + (rnd(133) - 67);
    const midY = H * 0.4 + rnd(45);
    const endX = player.x + (rnd(53) - 27);
    const endY = H + 20;
    enemy.divePath = { sx: startX, sy: startY, mx: midX, my: midY, ex: endX, ey: endY };
    enemy.diveSpeed = 2 + rnd(1) + wave * 0.15;
  }

  function bezier(t, a, b, c) {
    const u = 1 - t;
    return u * u * a + 2 * u * t * b + t * t * c;
  }

  function updateStarsG() {
    for (const s of stars) { s.y += s.speed; if (s.y > H) { s.y = 0; s.x = flr(rnd(W)); } }
  }

  // --- Title Scene ---
  GrayBox.scene(TITLE, {
    init() { resetGame(); },
    update() {
      updateStarsG();
      if (btnp("a") || btnp("a")) {
        resetGame();
        note(0, "C5", 0.1);
        setTimeout(() => note(0, "E5", 0.1), 100);
        setTimeout(() => note(0, "G5", 0.15), 200);
        GrayBox.go(PLAY); return;
      }
    },
    draw() {
      cls(0);
      for (const s of stars) pix(s.x, s.y, s.bright);
      const ty = 53 + sin(GrayBox.frame * 0.05) * 5;
      text("GALAGA", 145, flr(ty), 3);
      text("GALAGA", 146, flr(ty) + 1, 1);
      rectf(113, flr(ty) + 12, 93, 1, 2);
      const bx = W / 2 - 40;
      spr(4, bx, flr(ty) + 25 + sin(GrayBox.frame * 0.08) * 3);
      spr(3, bx + 20, flr(ty) + 27 + sin(GrayBox.frame * 0.08 + 1) * 3);
      spr(2, bx + 40, flr(ty) + 25 + sin(GrayBox.frame * 0.08 + 2) * 3);
      spr(3, bx + 60, flr(ty) + 27 + sin(GrayBox.frame * 0.08 + 3) * 3);
      spr(4, bx + 80, flr(ty) + 25 + sin(GrayBox.frame * 0.08 + 4) * 3);
      if (flr(GrayBox.frame / 20) % 2 === 0) text("PRESS A TO START", 120, 150, 3);
      text("-SCORE TABLE-", 128, 173, 2);
      spr(4, 130, 183); text("  BOSS   40 PTS", 140, 185, 2);
      spr(3, 130, 194); text("  WING   20 PTS", 140, 195, 2);
      spr(2, 130, 205); text("  BEE    10 PTS", 140, 206, 2);
      text("GRAYBOX DEMO V0.1", 118, 229, 1);
    }
  });

  // --- Game Over Scene ---
  GrayBox.scene(GAMEOVER, {
    init() {},
    update() {
      updateStarsG();
      for (let i = particles.length - 1; i >= 0; i--) {
        const p = particles[i]; p.x += p.vx; p.y += p.vy; p.vy += 0.08; p.life--;
        if (p.life <= 0) particles.splice(i, 1);
      }
      if (btnp("a") || btnp("a")) { GrayBox.go(TITLE); return; }
    },
    draw() {
      cls(0);
      for (const s of stars) pix(s.x, s.y, s.bright);
      for (const p of particles) pix(flr(p.x), flr(p.y), p.color);
      text("GAME OVER", 138, 90, 3);
      text("SCORE: " + score, 138, 109, 2);
      text("WAVE: " + wave, 148, 120, 2);
      if (flr(GrayBox.frame / 20) % 2 === 0) text("PRESS A TO CONTINUE", 113, 158, 3);
    }
  });

  // --- Play Scene ---
  GrayBox.scene(PLAY, {
    init() {},
    update() {
    updateStarsG();

    // --- Play state ---

    // Wave message timer
    if (waveMessage > 0) waveMessage--;

    // Player movement (left/right only, like Galaga)
    if (btn("left")) player.x -= player.speed;
    if (btn("right")) player.x += player.speed;
    player.x = _max(4, min(W - 12, player.x));

    // Player shoot
    if (shootCooldown > 0) shootCooldown--;
    if (btnp("a") && shootCooldown <= 0 && bullets.length < 2) {
      bullets.push({ x: player.x + 0, y: player.y - 4 });
      shootCooldown = 8;
      shootSound();
    }

    // Update player bullets
    for (let i = bullets.length - 1; i >= 0; i--) {
      bullets[i].y -= 6;
      if (bullets[i].y < -8) bullets.splice(i, 1);
    }

    // Formation movement (sway left/right)
    formationX += formationDir * formationSpeed;
    if (formationX > 20) { formationDir = -1; }
    if (formationX < -20) { formationDir = 1; }

    // Enemy entrance and formation
    const aliveEnemies = enemies.length;
    for (let i = enemies.length - 1; i >= 0; i--) {
      const e = enemies[i];

      if (e.state === "forming") {
        e.enterT++;
        if (e.enterT < 0) continue; // staggered delay
        const target = formationPos(e.formRow, e.formCol);
        // Fly in from top
        const flyInDuration = 30;
        if (e.enterT <= flyInDuration) {
          const t = e.enterT / flyInDuration;
          const startX = W / 2 + sin(e.formCol * 0.8) * 67;
          e.x = startX + (target.x - startX) * t;
          e.y = -10 + (target.y + 10) * t;
        } else {
          e.state = "formation";
        }
      }

      if (e.state === "formation") {
        const target = formationPos(e.formRow, e.formCol);
        e.x = target.x;
        e.y = target.y;
      }

      if (e.state === "diving") {
        e.diveT += e.diveSpeed / 200;
        if (e.diveT >= 1) {
          // Return from bottom — loop back to formation
          e.state = "returning";
          e.x = e.divePath.ex;
          e.y = -10;
          e.diveT = 0;
        } else {
          const p = e.divePath;
          e.x = bezier(e.diveT, p.sx, p.mx, p.ex);
          e.y = bezier(e.diveT, p.sy, p.my, p.ey);
        }
        // Enemy shoots while diving
        e.shootTimer--;
        if (e.shootTimer <= 0 && e.y > 0 && e.y < H - 30) {
          eBullets.push({ x: e.x + 0, y: e.y + 8 });
          e.shootTimer = 30 + flr(rnd(40));
        }
      }

      if (e.state === "returning") {
        const target = formationPos(e.formRow, e.formCol);
        e.diveT += 0.02;
        if (e.diveT >= 1) {
          e.state = "formation";
          e.x = target.x;
          e.y = target.y;
        } else {
          e.x += (target.x - e.x) * 0.05;
          e.y += (target.y - e.y) * 0.05;
        }
      }

      // Bullet-enemy collision
      for (let j = bullets.length - 1; j >= 0; j--) {
        const b = bullets[j];
        if (b.x + 8 > e.x && b.x < e.x + 8 && b.y + 8 > e.y && b.y < e.y + 8) {
          bullets.splice(j, 1);
          e.hp--;
          if (e.hp <= 0) {
            addExplosion(e.x, e.y);
            score += e.pts;
            hitSound();
            enemies.splice(i, 1);
          } else {
            bossHitSound();
          }
          break;
        }
      }
    }

    // Trigger dives
    diveTimer--;
    if (diveTimer <= 0) {
      const formEnemies = enemies.filter(e => e.state === "formation");
      if (formEnemies.length > 0) {
        const diver = formEnemies[flr(rnd(formEnemies.length))];
        startDive(diver);
      }
      diveTimer = _max(15, 50 - wave * 3) + flr(rnd(20));
    }

    // Update enemy bullets
    for (let i = eBullets.length - 1; i >= 0; i--) {
      eBullets[i].y += 3;
      if (eBullets[i].y > H + 8) { eBullets.splice(i, 1); continue; }
      const b = eBullets[i];
      if (b.x + 8 > player.x && b.x < player.x + 8 && b.y + 8 > player.y && b.y < player.y + 8) {
        eBullets.splice(i, 1);
        lives--;
        addExplosion(player.x, player.y);
        deathSound();
        player.x = W / 2 - 4;
        if (lives <= 0) {
          addExplosion(player.x, player.y);
          GrayBox.go(GAMEOVER); return;
        }
      }
    }

    // Enemy-player collision (diving enemies)
    for (let i = enemies.length - 1; i >= 0; i--) {
      const e = enemies[i];
      if (e.state === "diving" &&
          player.x + 7 > e.x && player.x < e.x + 8 &&
          player.y + 7 > e.y && player.y < e.y + 8) {
        addExplosion(e.x, e.y);
        addExplosion(player.x, player.y);
        enemies.splice(i, 1);
        lives--;
        deathSound();
        player.x = W / 2 - 4;
        if (lives <= 0) { GrayBox.go(GAMEOVER); return; }
      }
    }

    // Explosions
    for (let i = explosions.length - 1; i >= 0; i--) {
      explosions[i].timer--;
      if (explosions[i].timer <= 0) explosions.splice(i, 1);
    }

    // Particles
    for (let i = particles.length - 1; i >= 0; i--) {
      const p = particles[i];
      p.x += p.vx; p.y += p.vy; p.vy += 0.05; p.life--;
      if (p.life <= 0) particles.splice(i, 1);
    }

    // Wave clear check
    if (enemies.length === 0) {
      waveClearSound();
      waveTimer++;
      if (waveTimer > 60) {
        waveTimer = 0;
        spawnWave();
      }
    }

    // Formation enemies randomly shoot
    for (const e of enemies) {
      if (e.state === "formation") {
        e.shootTimer--;
        if (e.shootTimer <= 0) {
          // Only bottom row or random chance
          const hasBelow = enemies.some(o => o.formCol === e.formCol && o.formRow > e.formRow && o.state === "formation");
          if (!hasBelow && rnd(1) < 0.4) {
            eBullets.push({ x: e.x + 0, y: e.y + 8 });
          }
          e.shootTimer = _max(40, 120 - wave * 8) + flr(rnd(60));
        }
      }
    },
    draw() {
    cls(0);
    for (const s of stars) pix(s.x, s.y, s.bright);

    // Enemy bullets
    for (const b of eBullets) spr(6, flr(b.x), flr(b.y));

    // Enemies
    for (const e of enemies) {
      if (e.state === "forming" && e.enterT < 0) continue;
      if (e.type === 4 && e.hp === 1 && flr(GrayBox.frame / 4) % 2 === 0) {
        spr(e.type, flr(e.x), flr(e.y));
      } else {
        spr(e.type, flr(e.x), flr(e.y));
      }
    }

    // Player bullets
    for (const b of bullets) spr(5, flr(b.x), flr(b.y));

    // Player
    spr(1, flr(player.x), flr(player.y));

    // Explosions
    for (const e of explosions) {
      const sprId = e.timer > 6 ? 7 : 8;
      spr(sprId, flr(e.x), flr(e.y));
    }

    // Particles
    for (const p of particles) pix(flr(p.x), flr(p.y), p.color);

    // HUD
    rectf(0, 0, W, 12, 0);
    text("SCORE:" + score, 4, 3, 3);
    text("WAVE:" + wave, W / 2 - 15, 3, 2);
    for (let i = 0; i < lives; i++) spr(9, W - 36 + i * 10, 2);

    // Wave announcement
    if (waveMessage > 0) {
      const msgY = 113 + sin(waveMessage * 0.1) * 3;
      text("WAVE " + wave, 143, flr(msgY), 3);
      if (waveMessage > 60) text("GET READY!", 135, flr(msgY) + 14, 2);
    }
    }
  });

  GrayBox.go(TITLE);
  GrayBox.boot("screen");
})();
</script>
</body>
</html>
