<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GrayBox — Demo: Snake</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #0a0a0a;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100vh;
    font-family: monospace;
    overflow: hidden;
  }
  #frame {
    background: #111;
    border: 3px solid #333;
    border-radius: 8px;
    padding: 12px;
    box-shadow: 0 0 40px rgba(0,0,0,0.8), inset 0 0 20px rgba(0,0,0,0.5);
  }
  canvas {
    display: block;
    image-rendering: pixelated;
    image-rendering: crisp-edges;
  }
  #controls {
    margin-top: 12px;
    color: #6b6b6b;
    font-size: 11px;
    text-align: center;
    letter-spacing: 1px;
  }
  #controls span { color: #b0b0b0; }
</style>
</head>
<body>
<div id="frame">
  <canvas id="screen"></canvas>
</div>
<div id="controls">
  <span>ARROWS</span> MOVE &nbsp;&nbsp; <span>ENTER</span> START
</div>
<script>
(() => {
  "use strict";

  // ============================================================
  // GrayBox Runtime (inline)
  // ============================================================
  const W = 320;
  const H = 240;
  const FPS = 30;
  const COLORS = ["#1a1a1a", "#6b6b6b", "#b0b0b0", "#e8e8e8"];
  const canvas = document.getElementById("screen");
  canvas.width = W;
  canvas.height = H;
  function fitCanvas() {
    var maxW = window.innerWidth - 40;
    var maxH = window.innerHeight - 60;
    var s = Math.min(maxW / W, maxH / H);
    canvas.style.width = (W * s) + "px";
    canvas.style.height = (H * s) + "px";
  }
  fitCanvas();
  window.addEventListener("resize", fitCanvas);
  const ctx = canvas.getContext("2d");
  ctx.imageSmoothingEnabled = false;
  const buf = ctx.createImageData(W, H);
  const buf32 = new Uint32Array(buf.data.buffer);

  function hexToABGR(hex) {
    const r = parseInt(hex.slice(1, 3), 16);
    const g = parseInt(hex.slice(3, 5), 16);
    const b = parseInt(hex.slice(5, 7), 16);
    return (255 << 24) | (b << 16) | (g << 8) | r;
  }
  const COLOR_U32 = COLORS.map(hexToABGR);

  const sprites = {};
  const tilemap = {};

  const keyMap = {
    "ArrowUp": "up", "ArrowDown": "down", "ArrowLeft": "left", "ArrowRight": "right",
    "w": "up", "s": "down", "a": "left", "d": "right",
    "z": "a", "Z": "a", "x": "b", "X": "b",
    "Enter": "start", " ": "a"
  };
  const keys = {};
  const keysPrev = {};

  document.addEventListener("keydown", e => {
    const k = keyMap[e.key];
    if (k) { keys[k] = true; e.preventDefault(); }
  });
  document.addEventListener("keyup", e => {
    const k = keyMap[e.key];
    if (k) { keys[k] = false; e.preventDefault(); }
  });

  let audioCtx = null;
  const channels = [null, null];
  const channelGains = [null, null];
  function ensureAudio() {
    if (!audioCtx) {
      audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      for (let i = 0; i < 2; i++) {
        channelGains[i] = audioCtx.createGain();
        channelGains[i].gain.value = 0.15;
        channelGains[i].connect(audioCtx.destination);
      }
    }
  }

  const NOTE_NAMES = ["C","C#","D","D#","E","F","F#","G","G#","A","A#","B"];
  function noteToFreq(noteStr) {
    const match = noteStr.match(/^([A-G]#?)(\d)$/);
    if (!match) return 440;
    const name = match[1];
    const octave = parseInt(match[2]);
    const semitone = NOTE_NAMES.indexOf(name);
    if (semitone === -1) return 440;
    const midi = (octave + 1) * 12 + semitone;
    return 440 * Math.pow(2, (midi - 69) / 12);
  }

  const FONT_W = 4;
  const FONT_H = 7;
  const FONT = {};
  const fontData = {
    "A":"0110100110011111100110011001","B":"1110100110101110100110011110",
    "C":"0110100110001000100001100110","D":"1100101010011001100110101100",
    "E":"1111100010001110100010001111","F":"1111100010001110100010001000",
    "G":"0111100010001011100101100111","H":"1001100110011111100110011001",
    "I":"1110010001000100010001001110","J":"0111001000100010001010100100",
    "K":"1001101011001100101010011001","L":"1000100010001000100010001111",
    "M":"1001111111011001100110011001","N":"1001110111011001100110011001",
    "O":"0110100110011001100110010110","P":"1110100110011110100010001000",
    "Q":"0110100110011001101101100001","R":"1110100110011110101010011001",
    "S":"0111100010000110000110001110","T":"1111001000100010001000100010",
    "U":"1001100110011001100110010110","V":"1001100110011001100101100110",
    "W":"1001100110011001101111011001","X":"1001100101100110011010011001",
    "Y":"1001100101100010001000100010","Z":"1111000100100100100010001111",
    "0":"0110100111011011101110010110","1":"0100110001000100010001001110",
    "2":"0110100100010010010010001111","3":"1110000100010110000110011110",
    "4":"1001100110011111000100010001","5":"1111100010001110000100011110",
    "6":"0110100010001110100110010110","7":"1111000100010010010001001000",
    "8":"0110100110010110100110010110","9":"0110100110010111000100010110",
    " ":"0000000000000000000000000000",
    ".":"0000000000000000000001000100",
    ",":"0000000000000000001000101000",
    "!":"0100010001000100000000000100",
    "?":"0110100100010010000000000010",
    "-":"0000000000001110000000000000",
    "+":"0000001001001110010000100000",
    ":":"0000010001000000010001000000",
    "/":"0001000100100010010010001000",
    "*":"0000101001001110010010100000",
    "#":"0101111101011111010100000000",
    "(":"0010010010001000010001000010",
    ")":"0100001000010001000100100100",
    "=":"0000000011110000111100000000",
    "'":"0100010010000000000000000000",
    "\"":"1010101000000000000000000000",
    "<":"0010010010001000010000100010",
    ">":"1000010000100001001001001000",
    "_":"0000000000000000000000001111",
  };
  for (const [ch, bits] of Object.entries(fontData)) {
    FONT[ch] = [];
    for (let i = 0; i < bits.length; i++) FONT[ch].push(parseInt(bits[i]));
  }

  const API = {};
  API._init = null;
  API._update = null;
  API._draw = null;
  API.frame = 0;

  API.cls = function(c = 0) { buf32.fill(COLOR_U32[c] || COLOR_U32[0]); };
  API.pix = function(x, y, c) {
    x = Math.floor(x); y = Math.floor(y);
    if (x < 0 || x >= W || y < 0 || y >= H) return;
    buf32[y * W + x] = COLOR_U32[c] || COLOR_U32[0];
  };
  API.line = function(x0, y0, x1, y1, c) {
    x0=Math.floor(x0); y0=Math.floor(y0); x1=Math.floor(x1); y1=Math.floor(y1);
    const dx=Math.abs(x1-x0), dy=Math.abs(y1-y0);
    const sx=x0<x1?1:-1, sy=y0<y1?1:-1;
    let err=dx-dy;
    while(true) {
      API.pix(x0,y0,c);
      if(x0===x1&&y0===y1) break;
      const e2=2*err;
      if(e2>-dy){err-=dy;x0+=sx;}
      if(e2<dx){err+=dx;y0+=sy;}
    }
  };
  API.rect = function(x,y,w,h,c) {
    API.line(x,y,x+w-1,y,c); API.line(x+w-1,y,x+w-1,y+h-1,c);
    API.line(x+w-1,y+h-1,x,y+h-1,c); API.line(x,y+h-1,x,y,c);
  };
  API.rectf = function(x,y,w,h,c) {
    x=Math.floor(x); y=Math.floor(y);
    const col=COLOR_U32[c]||COLOR_U32[0];
    for(let py=Math.max(0,y);py<Math.min(H,y+h);py++)
      for(let px=Math.max(0,x);px<Math.min(W,x+w);px++)
        buf32[py*W+px]=col;
  };
  API.circ = function(cx,cy,r,c) {
    let x=r,y=0,d=1-r; cx=Math.floor(cx); cy=Math.floor(cy);
    while(x>=y){
      API.pix(cx+x,cy+y,c);API.pix(cx-x,cy+y,c);
      API.pix(cx+x,cy-y,c);API.pix(cx-x,cy-y,c);
      API.pix(cx+y,cy+x,c);API.pix(cx-y,cy+x,c);
      API.pix(cx+y,cy-x,c);API.pix(cx-y,cy-x,c);
      y++; if(d<0){d+=2*y+1;}else{x--;d+=2*(y-x)+1;}
    }
  };
  API.circf = function(cx,cy,r,c) {
    cx=Math.floor(cx); cy=Math.floor(cy);
    const col=COLOR_U32[c]||COLOR_U32[0]; const r2=r*r;
    for(let py=-r;py<=r;py++) for(let px=-r;px<=r;px++)
      if(px*px+py*py<=r2){ const sx=cx+px,sy=cy+py;
        if(sx>=0&&sx<W&&sy>=0&&sy<H) buf32[sy*W+sx]=col; }
  };
  API.sprite = function(id, data) {
    const arr = new Uint8Array(64); let i = 0;
    for (const ch of data) { if (ch>='0'&&ch<='3') { arr[i++]=parseInt(ch); if(i>=64) break; } }
    sprites[id] = arr;
  };
  API.spr = function(id, x, y, flipX, flipY) {
    const s=sprites[id]; if(!s) return;
    x=Math.floor(x); y=Math.floor(y);
    for(let py=0;py<8;py++) for(let px=0;px<8;px++){
      const sx=flipX?7-px:px, sy=flipY?7-py:py;
      const c=s[sy*8+sx], dx=x+px, dy=y+py;
      if(dx>=0&&dx<W&&dy>=0&&dy<H) buf32[dy*W+dx]=COLOR_U32[c];
    }
  };
  API.text = function(str, x, y, c) {
    str=String(str).toUpperCase(); let cx=Math.floor(x); const cy=Math.floor(y);
    const col=COLOR_U32[c]||COLOR_U32[3];
    for(const ch of str){
      const glyph=FONT[ch];
      if(glyph) for(let py=0;py<FONT_H;py++) for(let px=0;px<FONT_W;px++)
        if(glyph[py*FONT_W+px]){ const dx=cx+px,dy=cy+py;
          if(dx>=0&&dx<W&&dy>=0&&dy<H) buf32[dy*W+dx]=col; }
      cx+=FONT_W+1;
    }
  };
  API.mget = function(cx,cy) { return tilemap[cx+","+cy]||0; };
  API.mset = function(cx,cy,id) { tilemap[cx+","+cy]=id; };
  API.map = function(mx,my,mw,mh,sx,sy) {
    for(let ty=0;ty<mh;ty++) for(let tx=0;tx<mw;tx++){
      const id=API.mget(mx+tx,my+ty); if(id>0) API.spr(id,sx+tx*8,sy+ty*8); }
  };
  API.btn = function(k) { return !!keys[k]; };
  API.btnp = function(k) { return !!keys[k] && !keysPrev[k]; };
  API.note = function(ch, noteStr, dur) {
    ensureAudio(); if(ch<0||ch>1) return; API.stop(ch);
    const osc=audioCtx.createOscillator(); osc.type="square";
    osc.frequency.value=noteToFreq(noteStr);
    osc.connect(channelGains[ch]); osc.start();
    osc.stop(audioCtx.currentTime+dur); channels[ch]=osc;
  };
  API.stop = function(ch) {
    if(ch===undefined){API.stop(0);API.stop(1);return;}
    if(channels[ch]){try{channels[ch].stop();}catch(e){} channels[ch]=null;}
  };
  API.rnd = function(max) { return Math.random()*max; };
  API.flr = Math.floor;
  API.abs = Math.abs;
  API.min = Math.min;
  API.max = Math.max;
  API.sin = Math.sin;
  API.cos = Math.cos;

  function tick() {
    if (API._update) API._update();
    if (API._draw) API._draw();
    ctx.putImageData(buf, 0, 0);
    for (const k in keys) keysPrev[k] = keys[k];
    API.frame++;
  }

  // ============================================================
  // Snake Game
  // ============================================================
  const { cls, pix, line, rect, rectf, circ, circf, sprite: defSprite,
          spr, text, btn, btnp, note, stop, rnd, flr, abs: _abs,
          min, max: _max, sin, cos } = API;

  // --- Grid config ---
  const CELL = 8;             // 8x8 pixel cells
  const BORDER_X = 4;         // border offset in pixels
  const BORDER_Y = 12;        // top border offset (room for HUD)
  const GRID_W = 37;          // (320 - 8) / 8 = 39, use 37 for border
  const GRID_H = 26;          // (240 - 12 - 8) / 8 = 27, use 26 for border
  const FIELD_PX_W = GRID_W * CELL;
  const FIELD_PX_H = GRID_H * CELL;
  const FIELD_X = BORDER_X + 4;
  const FIELD_Y = BORDER_Y + 4;

  // --- Game state ---
  let state = "title";
  let snake, dir, nextDir, food, score, highScore, moveTimer, moveInterval;
  let growCount, gameOverTimer, titleAnim;

  highScore = 0;
  titleAnim = 0;

  function resetGame() {
    const startX = flr(GRID_W / 2);
    const startY = flr(GRID_H / 2);
    snake = [
      { x: startX, y: startY },
      { x: startX - 1, y: startY },
      { x: startX - 2, y: startY },
    ];
    dir = { x: 1, y: 0 };
    nextDir = { x: 1, y: 0 };
    score = 0;
    moveTimer = 0;
    moveInterval = 8; // frames between moves (lower = faster)
    growCount = 0;
    gameOverTimer = 0;
    spawnFood();
  }

  function spawnFood() {
    let attempts = 0;
    while (attempts < 1000) {
      const fx = flr(rnd(GRID_W));
      const fy = flr(rnd(GRID_H));
      let onSnake = false;
      for (const seg of snake) {
        if (seg.x === fx && seg.y === fy) { onSnake = true; break; }
      }
      if (!onSnake) {
        food = { x: fx, y: fy };
        return;
      }
      attempts++;
    }
    // Fallback: place at first open cell
    for (let y = 0; y < GRID_H; y++) {
      for (let x = 0; x < GRID_W; x++) {
        let onSnake = false;
        for (const seg of snake) {
          if (seg.x === x && seg.y === y) { onSnake = true; break; }
        }
        if (!onSnake) { food = { x, y }; return; }
      }
    }
  }

  function eatSound() {
    note(0, "E5", 0.05);
    setTimeout(() => note(0, "G5", 0.06), 50);
  }
  function deathSound() {
    note(0, "C3", 0.12);
    note(1, "G2", 0.12);
    setTimeout(() => { note(0, "A2", 0.2); note(1, "E2", 0.2); }, 120);
  }
  function startSound() {
    note(0, "C5", 0.08);
    setTimeout(() => note(0, "E5", 0.08), 80);
    setTimeout(() => note(0, "G5", 0.1), 160);
  }

  // Centered text helper
  function textLen(str) { return str.length * (FONT_W + 1) - 1; }
  function textCenter(str, y, c) {
    text(str, flr((W - textLen(str)) / 2), y, c);
  }

  resetGame();

  // ============================================================
  // Update
  // ============================================================
  API._update = function() {
    titleAnim++;

    if (state === "title") {
      if (btnp("start") || btnp("a")) {
        state = "play";
        resetGame();
        startSound();
      }
      return;
    }

    if (state === "gameover") {
      gameOverTimer++;
      if (gameOverTimer > 30 && (btnp("start") || btnp("a"))) {
        state = "title";
      }
      return;
    }

    // --- Play state ---

    // Buffer direction input (prevent 180-degree reversal)
    if (btnp("up") && dir.y === 0) { nextDir = { x: 0, y: -1 }; }
    else if (btnp("down") && dir.y === 0) { nextDir = { x: 0, y: 1 }; }
    else if (btnp("left") && dir.x === 0) { nextDir = { x: -1, y: 0 }; }
    else if (btnp("right") && dir.x === 0) { nextDir = { x: 1, y: 0 }; }

    moveTimer++;
    if (moveTimer < moveInterval) return;
    moveTimer = 0;

    // Apply buffered direction
    dir = nextDir;

    // Compute new head position
    const head = snake[0];
    const nx = head.x + dir.x;
    const ny = head.y + dir.y;

    // Wall collision
    if (nx < 0 || nx >= GRID_W || ny < 0 || ny >= GRID_H) {
      state = "gameover";
      gameOverTimer = 0;
      if (score > highScore) highScore = score;
      deathSound();
      return;
    }

    // Self collision (check against all but last segment, unless growing)
    const checkLen = growCount > 0 ? snake.length : snake.length - 1;
    for (let i = 0; i < checkLen; i++) {
      if (snake[i].x === nx && snake[i].y === ny) {
        state = "gameover";
        gameOverTimer = 0;
        if (score > highScore) highScore = score;
        deathSound();
        return;
      }
    }

    // Move snake
    snake.unshift({ x: nx, y: ny });
    if (growCount > 0) {
      growCount--;
    } else {
      snake.pop();
    }

    // Food collision
    if (nx === food.x && ny === food.y) {
      score += 10;
      growCount += 3;
      eatSound();
      spawnFood();

      // Speed up as snake grows (decrease interval, min 2)
      moveInterval = _max(2, 8 - flr(snake.length / 8));
    }
  };

  // ============================================================
  // Draw
  // ============================================================
  API._draw = function() {
    cls(0);

    if (state === "title") {
      // Draw decorative border
      rect(13, 15, W - 26, H - 30, 1);
      rect(15, 17, W - 30, H - 34, 1);

      // Title
      textCenter("SNAKE", 45, 3);
      // Big blocky title using rectf
      const titleStr = "SNAKE";
      const bigW = 14, bigH = 18, bigGap = 4;
      const totalW = titleStr.length * (bigW + bigGap) - bigGap;
      const startX = flr((W - totalW) / 2);
      for (let i = 0; i < titleStr.length; i++) {
        const bx = startX + i * (bigW + bigGap);
        const by = 53;
        const c = (i + flr(titleAnim / 15)) % 2 === 0 ? 3 : 2;
        rectf(bx, by, bigW, bigH, c);
        // Draw letter centered in block
        text(titleStr[i], bx + flr((bigW - FONT_W) / 2), by + flr((bigH - FONT_H) / 2), 0);
      }

      // Animated snake on title
      const snakeY = 90;
      const snakeLen = 10;
      for (let i = 0; i < snakeLen; i++) {
        const sx = 93 + i * 8 + sin(titleAnim * 0.06 + i * 0.5) * 6;
        const sy = snakeY + cos(titleAnim * 0.08 + i * 0.4) * 5;
        const c = i === 0 ? 3 : 2;
        rectf(flr(sx), flr(sy), CELL, CELL, c);
      }

      // Instructions
      if (flr(titleAnim / 20) % 2 === 0) {
        textCenter("PRESS ENTER TO START", 135, 3);
      }

      textCenter("ARROWS TO MOVE", 158, 2);
      textCenter("EAT FOOD TO GROW", 167, 2);
      textCenter("DON'T HIT WALLS OR YOURSELF", 176, 2);

      if (highScore > 0) {
        textCenter("HIGH SCORE: " + highScore, 195, 2);
      }

      textCenter("GRAYBOX DEMO", 218, 1);
      return;
    }

    // --- Draw play field and game over ---

    // HUD background
    rectf(0, 0, W, BORDER_Y - 2, 0);

    // HUD
    text("SCORE:" + score, 5, 3, 3);
    text("LEN:" + snake.length, 107, 3, 2);
    text("HI:" + highScore, W - 60, 3, 2);

    // Speed indicator
    const speed = 9 - moveInterval;
    text("SPD:" + speed, 187, 3, 1);

    // Field border
    rect(FIELD_X - 1, FIELD_Y - 1, FIELD_PX_W + 2, FIELD_PX_H + 2, 1);

    // Grid dots (subtle)
    for (let gy = 0; gy < GRID_H; gy += 4) {
      for (let gx = 0; gx < GRID_W; gx += 4) {
        pix(FIELD_X + gx * CELL + 3, FIELD_Y + gy * CELL + 3, 0);
      }
    }

    // Draw food (blinking)
    if (food) {
      const blink = flr(API.frame / 4) % 3;
      const fc = blink === 0 ? 3 : 2;
      const fx = FIELD_X + food.x * CELL;
      const fy = FIELD_Y + food.y * CELL;
      rectf(fx + 1, fy + 1, CELL - 2, CELL - 2, fc);
      // Cross pattern on food
      pix(fx + 3, fy + 2, 0);
      pix(fx + 4, fy + 2, 0);
      pix(fx + 3, fy + 5, 0);
      pix(fx + 4, fy + 5, 0);
      pix(fx + 2, fy + 3, 0);
      pix(fx + 2, fy + 4, 0);
      pix(fx + 5, fy + 3, 0);
      pix(fx + 5, fy + 4, 0);
    }

    // Draw snake
    for (let i = snake.length - 1; i >= 0; i--) {
      const seg = snake[i];
      const sx = FIELD_X + seg.x * CELL;
      const sy = FIELD_Y + seg.y * CELL;

      if (state === "gameover") {
        // Flash snake on death
        const flash = flr(gameOverTimer / 4) % 2;
        if (i === 0) {
          rectf(sx, sy, CELL, CELL, flash === 0 ? 3 : 1);
        } else {
          rectf(sx, sy, CELL, CELL, flash === 0 ? 2 : 1);
        }
      } else if (i === 0) {
        // Head - brightest, full cell
        rectf(sx, sy, CELL, CELL, 3);
        // Eyes based on direction
        if (dir.x === 1) { pix(sx + 6, sy + 2, 0); pix(sx + 6, sy + 5, 0); }
        else if (dir.x === -1) { pix(sx + 1, sy + 2, 0); pix(sx + 1, sy + 5, 0); }
        else if (dir.y === -1) { pix(sx + 2, sy + 1, 0); pix(sx + 5, sy + 1, 0); }
        else { pix(sx + 2, sy + 6, 0); pix(sx + 5, sy + 6, 0); }
      } else {
        // Body - slightly inset for segment look
        const c = (i % 2 === 0) ? 2 : 3;
        rectf(sx + 1, sy + 1, CELL - 2, CELL - 2, c);
      }
    }

    // Game over overlay
    if (state === "gameover") {
      // Darken overlay using scattered pixels
      for (let py = 60; py < 150; py += 2) {
        for (let px = 67; px < 253; px += 2) {
          pix(px, py, 0);
        }
      }
      rectf(80, 75, 160, 60, 0);
      rect(80, 75, 160, 60, 1);
      rect(82, 77, 156, 56, 2);

      textCenter("GAME OVER", 86, 3);
      textCenter("SCORE: " + score, 99, 2);
      textCenter("LENGTH: " + snake.length, 108, 2);

      if (score >= highScore && score > 0) {
        textCenter("NEW HIGH SCORE!", 119, 3);
      }

      if (gameOverTimer > 30) {
        if (flr(gameOverTimer / 15) % 2 === 0) {
          textCenter("PRESS ENTER", 128, 2);
        }
      }
    }
  };

  // ============================================================
  // Main loop
  // ============================================================
  setInterval(tick, 1000 / FPS);
})();
</script>
