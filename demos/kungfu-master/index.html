  // --- Constants ---
  // NOTE: all coordinates are now in 16x16 sprite units.
  // Sprites went from 8px to 16px, so visual sizes doubled.
  // Physics/positions scaled x2 to match.
  const SPR = 16;             // sprite size
  const FLOOR_Y = 188;        // ground Y for player feet (unchanged - screen coord)
  const FLOOR_W = 640;        // total floor width in pixels
  const PLAYER_W = 24;        // player collision width (was 12, x2)
  const PLAYER_H = 32;        // player collision height (was 16, x2)
  const GRAVITY = 0.6;
  const JUMP_VEL = -6;
  const PLAYER_SPEED = 2.2;
  const ATTACK_DUR = 10;      // frames an attack is active
  const HIT_INVULN = 30;      // invulnerability frames after being hit
  const GRAB_ESCAPE = 8;      // button presses needed to escape grab
  const MAX_HP = 40;
  const TIMER_MAX = 60 * 30;  // 60 seconds at 30fps

  // Floor themes
  const FLOORS = [
    { name: "1F", enemies: ["grunt","grunt","grunt"], spawnRate: 45, bossHp: 12 },
    { name: "2F", enemies: ["grunt","knife"], spawnRate: 40, bossHp: 16 },
    { name: "3F", enemies: ["grunt","knife","jumper"], spawnRate: 35, bossHp: 20 },
    { name: "4F", enemies: ["knife","jumper","jumper"], spawnRate: 30, bossHp: 24 },
    { name: "5F", enemies: ["grunt","knife","jumper"], spawnRate: 25, bossHp: 30 },
  ];

  // ============================================================
  // Collision helpers
  // ============================================================
  function boxOverlap(ax, ay, aw, ah, bx, by, bw, bh) {
    return ax < bx + bw && ax + aw > bx && ay < by + bh && ay + ah > by;
  }

  // Circle-circle collision (for round objects: knife projectiles, hit effects)
  function circOverlap(ax, ay, ar, bx, by, br) {
    const dx = ax - bx;
    const dy = ay - by;
    const distSq = dx * dx + dy * dy;
    const rSum = ar + br;
    return distSq <= rSum * rSum;
  }

  // --- Game State ---
  const { TITLE, PLAY, GAMEOVER, WIN } = Mono.SCENE;
  let player, enemies, projectiles, effects, particles;
  let score, lives, floor, timer, camX;
  let spawnTimer, bossSpawned, bossDefeated, floorComplete;
  let titleBlink, gameOverTimer;
  let hiScore = 0;
  let floorTransition, floorTransTimer;
  let shakeTimer = 0;

  function resetGame() {
    score = 0;
    lives = 3;
    floor = 0;
    initFloor();
  }

  function initFloor() {
    player = {
      x: 27, y: FLOOR_Y, vx: 0, vy: 0,
      facingR: true, hp: MAX_HP,
      state: "idle",
      attackType: "",
      attackTimer: 0,
      hurtTimer: 0,
      invuln: 0,
      grabCount: 0,
      grabber: null,
      jumpHeld: false,
      onGround: true,
      animFrame: 0,
    };
    enemies = [];
    projectiles = [];
    effects = [];
    particles = [];
    camX = 0;
    spawnTimer = 60;
    bossSpawned = false;
    bossDefeated = false;
    floorComplete = false;
    floorTransition = false;
    floorTransTimer = 0;
    timer = TIMER_MAX;
    shakeTimer = 0;
  }

  function spawnEnemy(type, fromRight) {
    const ex = fromRight ? (camX + W + 20) : (camX - 20);
    const ey = FLOOR_Y;
    let e = {
      type: type, x: ex, y: ey, vx: 0, vy: 0,
      hp: 1, facingR: !fromRight,
      state: "walk",
      animFrame: 0, attackTimer: 0, hurtTimer: 0,
      jumpTimer: 0, shootTimer: 0,
      deathTimer: 0,
    };
    if (type === "grunt") { e.hp = 1; e.speed = 0.8 + rnd(0.4); e.score = 100; }
    else if (type === "knife") { e.hp = 1; e.speed = 0.6 + rnd(0.3); e.score = 200; e.shootTimer = 30 + flr(rnd(60)); }
    else if (type === "jumper") { e.hp = 1; e.speed = 1.0 + rnd(0.4); e.score = 300; e.jumpTimer = 20 + flr(rnd(40)); }
    else if (type === "boss") {
      e.hp = FLOORS[floor].bossHp;
      e.speed = 0.6;
      e.score = 2000;
      e.attackTimer = 30 + flr(rnd(30));
      e.x = FLOOR_W - 40;
      e.facingR = false;
    }
    enemies.push(e);
  }

  function spawnBoss() {
    if (bossSpawned) return;
    bossSpawned = true;
    spawnEnemy("boss", true);
  }

  // --- Sound ---
  function sndPunch() { note(0, "G4", 0.03); setTimeout(() => note(0, "C4", 0.04), 30); }
  function sndKick() { note(0, "E3", 0.05); setTimeout(() => note(0, "G3", 0.03), 30); }
  function sndHit() { note(1, "C3", 0.06); setTimeout(() => note(1, "E3", 0.04), 40); }
  function sndPlayerHit() { note(0, "A2", 0.08); note(1, "D3", 0.06); }
  function sndDeath() {
    note(0, "C3", 0.12); note(1, "G2", 0.12);
    setTimeout(() => { note(0, "A2", 0.18); note(1, "E2", 0.18); }, 120);
  }
  function sndBossDie() {
    note(0, "C5", 0.1);
    setTimeout(() => note(0, "E5", 0.1), 100);
    setTimeout(() => note(0, "G5", 0.1), 200);
    setTimeout(() => note(0, "C6", 0.2), 300);
  }
  function sndFloorClear() {
    note(0, "E5", 0.08);
    setTimeout(() => note(0, "G5", 0.08), 80);
    setTimeout(() => note(0, "C6", 0.08), 160);
    setTimeout(() => note(0, "E6", 0.15), 240);
    setTimeout(() => note(1, "C5", 0.15), 240);
  }

  // ============================================================
  // Hitbox helpers (all scaled for 16x16 sprites)
  // ============================================================

  // Player attack box (AABB for melee attacks)
  function getAttackBox() {
    const p = player;
    if (p.attackType === "punch" || p.attackType === "crouchpunch") {
      const px = p.facingR ? p.x + PLAYER_W : p.x - 28;
      const py = p.attackType === "crouchpunch" ? p.y - 8 : p.y - 20;
      return { x: px, y: py, w: 28, h: 12 };
    }
    if (p.attackType === "kick") {
      const px = p.facingR ? p.x + PLAYER_W : p.x - 32;
      return { x: px, y: p.y - 8, w: 32, h: 12 };
    }
    if (p.attackType === "jumpkick") {
      const px = p.facingR ? p.x + PLAYER_W : p.x - 36;
      return { x: px, y: p.y - 16, w: 36, h: 16 };
    }
    return null;
  }

  // Enemy body hitbox (AABB)
  function getEnemyBox(e) {
    if (e.type === "boss") return { x: e.x - 16, y: e.y - 32, w: 32, h: 32 };
    return { x: e.x - 10, y: e.y - 32, w: 20, h: 32 };
  }

  // Player body hitbox (AABB)
  function getPlayerBox() {
    const p = player;
    if (p.state === "crouch") return { x: p.x, y: p.y - 16, w: PLAYER_W, h: 16 };
    return { x: p.x, y: p.y - PLAYER_H, w: PLAYER_W, h: PLAYER_H };
  }

  // Circle hitbox for knife projectile
  const KNIFE_R = 6;
  function knifeCenter(pr) {
    return { cx: pr.x, cy: pr.y, r: KNIFE_R };
  }

  // --- Particles ---
  function addHitEffect(x, y) {
    for (let i = 0; i < 6; i++) {
      particles.push({
        x: x, y: y, vx: rnd(4) - 2, vy: rnd(3) - 2,
        life: 5 + flr(rnd(8)), color: flr(rnd(2)) + 2
      });
    }
    effects.push({ x: x - 8, y: y - 8, timer: 8 });
  }

  // --- Update ---
  function updateGame() {
    if (floorTransition) {
      floorTransTimer--;
      if (floorTransTimer <= 0) {
        floor++;
        if (floor >= 5) {
          gameOverTimer = 180;
          Mono.go(WIN); return;
        }
        initFloor();
      }
      return;
    }

    timer--;
    if (timer <= 0) {
      player.hp = 0;
    }

    const p = player;

    // --- Player update ---
    if (p.state !== "dead") {
      if (p.invuln > 0) p.invuln--;
      if (p.hurtTimer > 0) {
        p.hurtTimer--;
        if (p.hurtTimer <= 0) p.state = "idle";
      }

      // Grabbed state
      if (p.state === "grabbed") {
        p.hp -= 0.15;
        if (btnp("a") || btnp("b")) {
          p.grabCount++;
          sndPunch();
        }
        if (p.grabCount >= GRAB_ESCAPE) {
          p.state = "idle";
          p.invuln = HIT_INVULN;
          if (p.grabber) {
            p.grabber.state = "hurt";
            p.grabber.hurtTimer = 15;
            p.grabber.hp--;
            if (p.grabber.hp <= 0) {
              p.grabber.state = "dead";
              p.grabber.deathTimer = 20;
              score += p.grabber.score;
            }
            addHitEffect(p.grabber.x, p.grabber.y - 8);
            sndHit();
          }
          p.grabber = null;
        }
      }
      // Normal input
      else if (p.state !== "hurt" && p.attackTimer <= 0) {
        let moving = false;
        if (btn("left") && p.state !== "crouch") {
          p.x -= PLAYER_SPEED;
          p.facingR = false;
          moving = true;
        }
        if (btn("right") && p.state !== "crouch") {
          p.x += PLAYER_SPEED;
          p.facingR = true;
          moving = true;
        }

        // Crouch
        if (btn("down") && p.onGround && p.state !== "jump") {
          p.state = "crouch";
          moving = false;
        } else if (p.state === "crouch" && !btn("down")) {
          p.state = "idle";
        }

        // Jump
        if (btn("up") && p.onGround && p.state !== "crouch") {
          p.vy = JUMP_VEL;
          p.onGround = false;
          p.state = "jump";
        }

        // Walking state
        if (moving && p.onGround && p.state !== "crouch" && p.state !== "jump") {
          p.state = "walk";
        } else if (!moving && p.onGround && p.state === "walk") {
          p.state = "idle";
        }

        // Attacks
        if (btnp("a")) {
          if (p.state === "jump") {
            p.attackType = "jumpkick";
            p.attackTimer = ATTACK_DUR;
            sndKick();
          } else if (p.state === "crouch") {
            p.attackType = "crouchpunch";
            p.attackTimer = ATTACK_DUR;
            p.state = "attack";
            sndPunch();
          } else {
            p.attackType = "punch";
            p.attackTimer = ATTACK_DUR;
            p.state = "attack";
            sndPunch();
          }
        }
        if (btnp("b")) {
          if (p.state === "jump") {
            p.attackType = "jumpkick";
            p.attackTimer = ATTACK_DUR;
            sndKick();
          } else if (p.state !== "crouch") {
            p.attackType = "kick";
            p.attackTimer = ATTACK_DUR;
            p.state = "attack";
            sndKick();
          }
        }
      }

      // Attack timer
      if (p.attackTimer > 0) {
        p.attackTimer--;
        if (p.attackTimer <= 0 && p.state === "attack") {
          p.state = p.onGround ? "idle" : "jump";
        }
      }

      // Gravity
      if (!p.onGround) {
        p.vy += GRAVITY;
        p.y += p.vy;
        if (p.y >= FLOOR_Y) {
          p.y = FLOOR_Y;
          p.vy = 0;
          p.onGround = true;
          if (p.state === "jump") p.state = "idle";
          if (p.attackTimer > 0 && p.attackType === "jumpkick") {
            p.attackTimer = 0;
            p.state = "idle";
          }
        }
      }

      // Clamp player position
      p.x = _max(8, min(FLOOR_W - 16, p.x));

      // HP check
      if (p.hp <= 0) {
        p.state = "dead";
        p.hurtTimer = 60;
        sndDeath();
        shakeTimer = 15;
      }

      // Animation counter
      p.animFrame++;
    } else {
      // Dead state
      p.hurtTimer--;
      if (p.hurtTimer <= 0) {
        lives--;
        if (lives <= 0) {
          if (score > hiScore) hiScore = score;
          gameOverTimer = 120;
          Mono.go(GAMEOVER); return;
        } else {
          p.x = camX + 27;
          p.y = FLOOR_Y;
          p.hp = MAX_HP;
          p.state = "idle";
          p.invuln = 60;
          p.onGround = true;
          p.vy = 0;
          p.attackTimer = 0;
        }
      }
    }

    // --- Camera ---
    const targetCamX = p.x - W / 3;
    camX += (targetCamX - camX) * 0.08;
    camX = _max(0, min(FLOOR_W - W, camX));

    // --- Spawn enemies ---
    if (!bossSpawned && p.state !== "dead") {
      spawnTimer--;
      if (spawnTimer <= 0) {
        const fl = FLOORS[floor];
        const type = fl.enemies[flr(rnd(fl.enemies.length))];
        const fromRight = rnd(1) > 0.4;
        spawnEnemy(type, fromRight);
        spawnTimer = fl.spawnRate + flr(rnd(20));
      }

      // Spawn boss when player reaches end of floor
      if (p.x > FLOOR_W - 133) {
        spawnBoss();
      }
    }

    // --- Update enemies ---
    for (let i = enemies.length - 1; i >= 0; i--) {
      const e = enemies[i];

      if (e.state === "dead") {
        e.deathTimer--;
        if (e.deathTimer <= 0) {
          enemies.splice(i, 1);
          if (e.type === "boss") {
            bossDefeated = true;
            floorComplete = true;
            floorTransition = true;
            floorTransTimer = 90;
            sndFloorClear();
          }
        }
        continue;
      }

      if (e.state === "hurt") {
        e.hurtTimer--;
        if (e.hurtTimer <= 0) {
          if (e.hp <= 0) {
            e.state = "dead";
            e.deathTimer = 20;
            score += e.score;
            addHitEffect(e.x, e.y - 8);
          } else {
            e.state = "walk";
          }
        }
        continue;
      }

      if (e.state === "grab") continue;

      // Face player
      e.facingR = p.x > e.x;
      const dx = p.x - e.x;
      const dist = _abs(dx);

      if (e.type === "grunt") {
        if (dist > 10) {
          e.x += (e.facingR ? 1 : -1) * e.speed;
          e.state = "walk";
        } else if (dist <= 10 && p.state !== "dead") {
          if (p.state !== "grabbed" && p.invuln <= 0) {
            p.state = "grabbed";
            p.grabCount = 0;
            p.grabber = e;
            e.state = "grab";
            sndPlayerHit();
          }
        }
      }

      if (e.type === "knife") {
        if (dist > 80) {
          e.x += (e.facingR ? 1 : -1) * e.speed;
          e.state = "walk";
        } else if (dist > 40) {
          e.shootTimer--;
          if (e.shootTimer <= 0) {
            projectiles.push({
              x: e.x, y: e.y - 6,
              vx: e.facingR ? 3.5 : -3.5, vy: 0,
              type: "knife", life: 120
            });
            e.shootTimer = 50 + flr(rnd(40));
            note(1, "F#5", 0.03);
          }
          e.state = "walk";
        } else {
          e.x += (e.facingR ? -1 : 1) * e.speed * 0.5;
          e.state = "walk";
        }
      }

      if (e.type === "jumper") {
        if (dist > 50) {
          e.x += (e.facingR ? 1 : -1) * e.speed;
          e.state = "walk";
        } else {
          e.jumpTimer--;
          if (e.jumpTimer <= 0 && e.onGround !== false) {
            e.vy = -5;
            e.vx = (e.facingR ? 2 : -2);
            e.onGround = false;
            e.state = "jump";
            e.jumpTimer = 40 + flr(rnd(30));
          }
        }
        // Gravity for jumper
        if (e.onGround === false) {
          e.vy = (e.vy || 0) + GRAVITY;
          e.y += e.vy;
          e.x += e.vx || 0;
          if (e.y >= FLOOR_Y) {
            e.y = FLOOR_Y;
            e.vy = 0;
            e.vx = 0;
            e.onGround = true;
            e.state = "walk";
          }
        }
      }

      if (e.type === "boss") {
        if (dist > 40) {
          e.x += (e.facingR ? 1 : -1) * e.speed;
          e.state = "walk";
        } else {
          e.attackTimer--;
          if (e.attackTimer <= 0) {
            e.state = "attack";
            e.attackTimer = 40 + flr(rnd(30));
            if (dist < 30 && p.invuln <= 0 && p.state !== "dead" && p.state !== "grabbed") {
              p.hp -= 4;
              p.state = "hurt";
              p.hurtTimer = 12;
              p.invuln = HIT_INVULN;
              sndPlayerHit();
              shakeTimer = 5;
              addHitEffect(p.x + 6, p.y - 8);
            }
            note(0, "D3", 0.06);
            setTimeout(() => { if (e.state !== "dead") e.state = "walk"; }, 300);
          }
        }
      }

      // Enemy contact collision with player (jumper aerial kick)
      if (e.type !== "grunt" && e.type !== "boss" && e.state !== "dead" && e.state !== "hurt") {
        const eb = getEnemyBox(e);
        const pb = getPlayerBox();
        if (p.state !== "dead" && p.state !== "grabbed" && p.invuln <= 0) {
          if (boxOverlap(eb.x, eb.y, eb.w, eb.h, pb.x, pb.y, pb.w, pb.h)) {
            if (e.type === "jumper" && e.state === "jump") {
              p.hp -= 3;
              p.state = "hurt";
              p.hurtTimer = 10;
              p.invuln = HIT_INVULN;
              sndPlayerHit();
              shakeTimer = 4;
              addHitEffect(p.x + 6, p.y - 8);
            }
          }
        }
      }

      // Remove enemies that are too far off-screen
      if (e.type !== "boss" && _abs(e.x - p.x) > W + 100) {
        enemies.splice(i, 1);
      }

      e.animFrame = (e.animFrame || 0) + 1;
    }

    // --- Player attack vs enemies ---
    if (p.attackTimer > 0 && p.attackTimer > ATTACK_DUR - 5) {
      const atk = getAttackBox();
      if (atk) {
        for (let i = enemies.length - 1; i >= 0; i--) {
          const e = enemies[i];
          if (e.state === "dead" || e.state === "hurt") continue;
          const eb = getEnemyBox(e);
          if (boxOverlap(atk.x, atk.y, atk.w, atk.h, eb.x, eb.y, eb.w, eb.h)) {
            let dmg = 1;
            if (p.attackType === "jumpkick") dmg = 2;
            if (p.attackType === "kick") dmg = 1;
            e.hp -= dmg;
            e.state = "hurt";
            e.hurtTimer = 10;
            e.x += (p.facingR ? 8 : -8);
            if (e.state === "grab") {
              p.state = "idle";
              p.grabber = null;
            }
            addHitEffect(e.x, e.y - 8);
            sndHit();
            if (e.type === "boss") shakeTimer = 3;
          }
        }
      }
    }

    // --- Projectiles (knife uses circle collision vs player box) ---
    for (let i = projectiles.length - 1; i >= 0; i--) {
      const pr = projectiles[i];
      pr.x += pr.vx;
      pr.y += pr.vy;
      pr.life--;
      if (pr.life <= 0 || pr.x < camX - 20 || pr.x > camX + W + 20) {
        projectiles.splice(i, 1);
        continue;
      }
      // Hit player: circle (knife) vs AABB (player)
      const pb = getPlayerBox();
      if (p.state !== "dead" && p.state !== "grabbed" && p.invuln <= 0) {
        // Circle vs AABB: clamp circle center to box, check distance
        const closestX = _max(pb.x, min(pr.x, pb.x + pb.w));
        const closestY = _max(pb.y, min(pr.y, pb.y + pb.h));
        const ddx = pr.x - closestX;
        const ddy = pr.y - closestY;
        if (ddx * ddx + ddy * ddy <= KNIFE_R * KNIFE_R) {
          p.hp -= 3;
          p.state = "hurt";
          p.hurtTimer = 8;
          p.invuln = HIT_INVULN;
          sndPlayerHit();
          shakeTimer = 3;
          addHitEffect(p.x + 6, p.y - 8);
          projectiles.splice(i, 1);
        }
      }
    }

    // --- Effects & Particles ---
    for (let i = effects.length - 1; i >= 0; i--) {
      effects[i].timer--;
      if (effects[i].timer <= 0) effects.splice(i, 1);
    }
    for (let i = particles.length - 1; i >= 0; i--) {
      const pt = particles[i];
      pt.x += pt.vx;
      pt.y += pt.vy;
      pt.vy += 0.1;
      pt.life--;
      if (pt.life <= 0) particles.splice(i, 1);
    }

    // Shake
    if (shakeTimer > 0) shakeTimer--;
  }

  // ============================================================
  // Draw
  // ============================================================
  function drawGame() {
    cls(0);

    const shakeX = shakeTimer > 0 ? flr(rnd(4)) - 2 : 0;
    const shakeY = shakeTimer > 0 ? flr(rnd(4)) - 2 : 0;
    const ox = -flr(camX) + shakeX;
    const oy = shakeY;

    // --- Background ---
    const bgC = 0;
    rectf(0, 0, W, H, bgC);

    // Draw background pillars
    for (let px = flr(camX / 43) * 43; px < camX + W + 43; px += 43) {
      const sx = px + ox;
      rectf(sx + 19, 30 + oy, 6, FLOOR_Y - 30 + oy, 1);
      rectf(sx + 17, 29 + oy, 10, 3, 1);
      rectf(sx + 17, FLOOR_Y - 2 + oy, 10, 3, 1);
    }

    // Draw wall lines
    for (let wy = 38; wy < FLOOR_Y; wy += 18) {
      const screenWy = wy + oy;
      if (screenWy >= 0 && screenWy < H) {
        line(0, screenWy, W, screenWy, 1);
      }
    }

    // Draw floor tiles (16x16 sprites now)
    const floorTile = 42;
    for (let fx = flr(camX / SPR) * SPR; fx < camX + W + SPR; fx += SPR) {
      const sx = fx + ox;
      spr(floorTile, sx, FLOOR_Y + oy);
      spr(41, sx, FLOOR_Y + SPR + oy);
      spr(41, sx, FLOOR_Y + SPR * 2 + oy);
    }

    // --- Draw enemies ---
    for (const e of enemies) {
      const sx = e.x + ox;
      const sy = e.y + oy;
      if (sx < -40 || sx > W + 40) continue;

      const flip = !e.facingR;

      if (e.state === "dead") {
        if (e.deathTimer % 4 < 2) {
          sprT(30 + (e.deathTimer % 8 < 4 ? 0 : 1), sx - 8, sy - 32, false, false);
        }
        continue;
      }

      if (e.state === "hurt" && e.hurtTimer % 3 === 0) continue;

      if (e.type === "grunt") {
        sprT(10, sx - 8, sy - 32, flip, false);
        sprT(11, sx - 8, sy - 16, flip, false);
        if (e.state === "grab") {
          sprT(3, flip ? sx - 24 : sx + 8, sy - 20, !flip, false);
        }
        // Debug: grunt hitbox (rect)
        const eb = getEnemyBox(e);
        dbg(eb.x + ox, eb.y + oy, eb.w, eb.h);
      } else if (e.type === "knife") {
        sprT(12, sx - 8, sy - 32, flip, false);
        sprT(13, sx - 8, sy - 16, flip, false);
        // Debug: knife thrower hitbox (rect)
        const eb = getEnemyBox(e);
        dbg(eb.x + ox, eb.y + oy, eb.w, eb.h);
      } else if (e.type === "jumper") {
        sprT(15, sx - 8, sy - 32, flip, false);
        if (e.state === "jump") {
          sprT(16, sx - 8, sy - 16, flip, false);
        } else {
          sprT(11, sx - 8, sy - 16, flip, false);
        }
        // Debug: jumper hitbox (rect)
        const eb = getEnemyBox(e);
        dbg(eb.x + ox, eb.y + oy, eb.w, eb.h);
      } else if (e.type === "boss") {
        // Boss is bigger - draw larger (2x2 tile of 16x16 sprites)
        sprT(20, sx - 16, sy - 40, flip, false);
        sprT(21, sx - 16, sy - 24, flip, false);
        sprT(20, sx, sy - 40, flip, false);
        sprT(21, sx, sy - 24, flip, false);
        if (e.state === "attack") {
          sprT(22, flip ? sx - 32 : sx + 16, sy - 28, flip, false);
        }
        // Boss HP bar
        const bossHpW = 40;
        const bossHpFill = flr((e.hp / FLOORS[floor].bossHp) * bossHpW);
        rectf(sx - 8, sy - 48, bossHpW, 3, 0);
        rectf(sx - 8, sy - 48, bossHpFill, 3, 3);
        rect(sx - 9, sy - 49, bossHpW + 2, 5, 2);
        // Debug: boss hitbox (rect)
        const eb = getEnemyBox(e);
        dbg(eb.x + ox, eb.y + oy, eb.w, eb.h);
      }
    }

    // --- Draw projectiles ---
    for (const pr of projectiles) {
      const sx = pr.x + ox;
      const sy = pr.y + oy;
      if (pr.type === "knife") {
        sprT(14, sx - 8, sy - 8, pr.vx < 0, false);
        // Debug: knife projectile hitbox (circle)
        dbgC(sx, sy, KNIFE_R);
      }
    }

    // --- Draw player ---
    const p = player;
    const psx = p.x + ox;
    const psy = p.y + oy;
    const pFlip = !p.facingR;

    if (p.state !== "dead" || (p.hurtTimer % 6 < 3)) {
      if (p.invuln > 0 && p.invuln % 4 < 2 && p.state !== "dead") {
        // skip draw - blink
      } else {
        if (p.state === "crouch" || p.attackType === "crouchpunch") {
          sprT(1, psx, psy - 24, pFlip, false);
          sprT(5, psx, psy - 8, pFlip, false);
          if (p.attackTimer > 0 && p.attackType === "crouchpunch") {
            sprT(3, pFlip ? psx - 20 : psx + 16, psy - 12, pFlip, false);
          }
        } else if (p.state === "jump" || (!p.onGround && p.state !== "hurt")) {
          sprT(1, psx, psy - 32, pFlip, false);
          sprT(6, psx, psy - 16, pFlip, false);
          if (p.attackTimer > 0 && p.attackType === "jumpkick") {
            sprT(4, pFlip ? psx - 24 : psx + 16, psy - 12, pFlip, false);
          }
        } else if (p.state === "grabbed") {
          const gx = psx + flr(rnd(3)) - 1;
          sprT(1, gx, psy - 32, pFlip, false);
          sprT(2, gx, psy - 16, pFlip, false);
          if (Mono.frame % 4 < 2) sprT(33, gx - 4, psy - 24, false, false);
        } else if (p.state === "hurt") {
          sprT(1, psx, psy - 32, pFlip, false);
          sprT(2, psx, psy - 16, pFlip, false);
        } else if (p.state === "dead") {
          sprT(1, psx, psy - 16, pFlip, false);
          sprT(2, psx + (pFlip ? -16 : 16), psy - 16, pFlip, false);
        } else {
          // Normal standing/walking
          sprT(1, psx, psy - 32, pFlip, false);
          sprT(2, psx, psy - 16, pFlip, false);
          if (p.attackTimer > 0) {
            if (p.attackType === "punch") {
              sprT(3, pFlip ? psx - 20 : psx + 16, psy - 24, pFlip, false);
            } else if (p.attackType === "kick") {
              sprT(4, pFlip ? psx - 24 : psx + 16, psy - 8, pFlip, false);
            }
          }
        }
      }
    }

    // Debug: player hitbox (rect)
    const pb = getPlayerBox();
    dbg(pb.x + ox, pb.y + oy, pb.w, pb.h);

    // Debug: attack hitbox (rect)
    if (p.attackTimer > 0) {
      const atk = getAttackBox();
      if (atk) dbg(atk.x + ox, atk.y + oy, atk.w, atk.h);
    }

    // --- Draw effects ---
    for (const ef of effects) {
      const sx = ef.x + ox;
      const sy = ef.y + oy;
      if (ef.timer > 4) {
        sprT(30, sx, sy, false, false);
      } else {
        sprT(31, sx, sy, false, false);
      }
    }

    // --- Draw particles ---
    for (const pt of particles) {
      pix(pt.x + ox, pt.y + oy, pt.color);
    }

    // --- HUD ---
    // Health bar background
    rectf(5, 3, 55, 8, 0);
    rect(5, 3, 55, 8, 2);
    text("HP", 7, 5, 3);
    const hpW = flr((p.hp / MAX_HP) * 43);
    rectf(12, 5, hpW, 5, 3);
    rectf(12 + hpW, 5, 43 - hpW, 5, 1);

    // Lives: capped to prevent overflow
    const maxLivesShown = min(lives, 5);
    for (let i = 0; i < maxLivesShown; i++) {
      sprT(32, 64 + i * 18, 0, false, false);
    }

    // Score
    text("SCORE " + String(score).padStart(7, "0"), W - 73, 3, 3);

    // Floor indicator
    text("FLOOR " + FLOORS[min(floor, 4)].name, 5, 14, 2);

    // Timer
    const timerSec = _max(0, Math.ceil(timer / 30));
    const timerColor = timerSec <= 10 ? (Mono.frame % 10 < 5 ? 3 : 2) : 3;
    text("TIME " + String(timerSec).padStart(3, "0"), W / 2 - 17, 3, timerColor);

    // Hi-Score
    text("HI " + String(hiScore).padStart(7, "0"), W - 73, 11, 2);

    // Grabbed indicator
    if (p.state === "grabbed") {
      const mashText = "MASH Z/X!";
      text(mashText, W / 2 - 22, 23, Mono.frame % 6 < 3 ? 3 : 2);
    }

    // Floor transition
    if (floorTransition) {
      const msg = bossDefeated ? "FLOOR CLEAR!" : "";
      text(msg, W / 2 - 30, H / 2 - 8, 3);
      if (floor < 4) {
        text("NEXT: FLOOR " + FLOORS[min(floor + 1, 4)].name, W / 2 - 40, H / 2 + 3, 2);
      } else {
        text("FINAL FLOOR COMPLETE!", W / 2 - 52, H / 2 + 3, 3);
      }
    }
  }

  // --- Title screen ---
  function drawTitle() {
    cls(0);

    // Title art border
    rect(27, 15, W - 54, 45, 2);
    rect(29, 17, W - 58, 41, 1);

    // Title text
    text("KUNG-FU MASTER", W / 2 - 35, 26, 3);
    text("SPARTAN X", W / 2 - 22, 36, 2);

    // Decorative martial arts figure (16x16 sprites now)
    sprT(1, W / 2 - 40, 68, false, false);
    sprT(2, W / 2 - 40, 84, false, false);
    sprT(3, W / 2 - 24, 68, false, false);

    // VS enemies
    sprT(10, W / 2 + 10, 68, true, false);
    sprT(11, W / 2 + 10, 84, true, false);
    sprT(10, W / 2 + 30, 64, true, false);
    sprT(11, W / 2 + 30, 80, true, false);

    // Floor display
    text("5 FLOORS OF FURY!", W / 2 - 44, 105, 2);

    // Controls
    text("CONTROLS:", W / 2 - 22, 120, 3);
    text("ARROWS  MOVE/JUMP/CROUCH", W / 2 - 60, 131, 2);
    text("A  PUNCH    B  KICK", W / 2 - 50, 143, 2);
    text("UP+A  JUMP KICK", W / 2 - 40, 154, 2);
    text("DOWN+A  CROUCH PUNCH", W / 2 - 52, 165, 2);

    // Blink "PRESS START"
    titleBlink = (titleBlink || 0) + 1;
    if (titleBlink % 40 < 25) {
      text("PRESS START", W / 2 - 50, 195, 3);
    }

    // Hi-Score
    if (hiScore > 0) {
      text("HI-SCORE " + String(hiScore).padStart(7, "0"), W / 2 - 40, 218, 2);
    }

    // Copyright line
    text("MONO DEMO 2024", W / 2 - 42, 230, 1);
  }

  function drawGameOver() {
    drawGame();

    // Overlay
    rectf(W / 2 - 47, H / 2 - 23, 94, 45, 0);
    rect(W / 2 - 47, H / 2 - 23, 94, 45, 2);
    rect(W / 2 - 45, H / 2 - 21, 90, 42, 1);

    text("GAME OVER", W / 2 - 22, H / 2 - 12, 3);
    text("SCORE " + String(score).padStart(7, "0"), W / 2 - 30, H / 2, 2);

    if (gameOverTimer <= 60 && Mono.frame % 30 < 20) {
      text("PRESS START", W / 2 - 27, H / 2 + 12, 3);
    }
  }

  function drawWin() {
    cls(0);

    rect(40, 30, W - 80, 75, 3);
    rect(42, 32, W - 84, 71, 2);

    text("CONGRATULATIONS!", W / 2 - 42, 45, 3);
    text("YOU HAVE RESCUED", W / 2 - 42, 60, 2);
    text("THE PRINCESS!", W / 2 - 34, 72, 2);
    text("SCORE " + String(score).padStart(7, "0"), W / 2 - 30, 87, 3);

    // Player celebration (16x16 sprites)
    sprT(1, W / 2 - 8, 130, false, false);
    sprT(6, W / 2 - 8, 146, false, false);

    if (gameOverTimer <= 60 && Mono.frame % 30 < 20) {
      text("PRESS START", W / 2 - 27, 170, 3);
    }
  }

  // --- Title Scene ---
  Mono.scene(TITLE, {
    init() { titleBlink = 0; gameOverTimer = 0; },
    update() {
      if (btnp("a") || btnp("start")) { resetGame(); Mono.go(PLAY); return; }
    },
    draw() { drawTitle(); }
  });

  // --- Play Scene ---
  Mono.scene(PLAY, {
    init() {},
    update() { updateGame(); },
    draw() { drawGame(); }
  });

  // --- Game Over Scene ---
  Mono.scene(GAMEOVER, {
    init() {},
    update() {
      gameOverTimer--;
      if (gameOverTimer <= 0 && btnp("a") || btnp("start")) { Mono.go(TITLE); return; }
    },
    draw() { drawGameOver(); }
  });

  // --- Win Scene ---
  Mono.scene(WIN, {
    init() {},
    update() {
      gameOverTimer--;
      if (gameOverTimer <= 0 && btnp("a")) {
        if (score > hiScore) hiScore = score;
        Mono.go(TITLE); return;
      }
    },
    draw() { drawWin(); }
  });

  Mono.go(TITLE);
  Mono.boot("screen");
})();
</script>
</body>
</html>
