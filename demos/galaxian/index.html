<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GrayBox — Demo: Galaxian</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #0a0a0a;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100vh;
    font-family: monospace;
    overflow: hidden;
  }
  #frame {
    background: #111;
    border: 3px solid #333;
    border-radius: 8px;
    padding: 12px;
    box-shadow: 0 0 40px rgba(0,0,0,0.8), inset 0 0 20px rgba(0,0,0,0.5);
  }
  canvas {
    display: block;
    image-rendering: pixelated;
    image-rendering: crisp-edges;
  }
  #controls {
    margin-top: 12px;
    color: #6b6b6b;
    font-size: 11px;
    text-align: center;
    letter-spacing: 1px;
  }
  #controls span { color: #b0b0b0; }
</style>
</head>
<body>
<div id="frame">
  <canvas id="screen"></canvas>
</div>
<div id="controls">
  <span>←→</span> MOVE &nbsp;&nbsp; <span>Z</span> FIRE &nbsp;&nbsp; <span>ENTER</span> START
</div>
<script>
(() => {
  "use strict";

  // ============================================================
  // GrayBox Runtime (inline)
  // ============================================================
  const W = 480;
  const H = 320;
  const SCALE = 2;
  const FPS = 30;
  const COLORS = ["#1a1a1a", "#6b6b6b", "#b0b0b0", "#e8e8e8"];
  const canvas = document.getElementById("screen");
  canvas.width = W;
  canvas.height = H;
  canvas.style.width = (W * SCALE) + "px";
  canvas.style.height = (H * SCALE) + "px";
  const ctx = canvas.getContext("2d");
  ctx.imageSmoothingEnabled = false;
  const buf = ctx.createImageData(W, H);
  const buf32 = new Uint32Array(buf.data.buffer);

  function hexToABGR(hex) {
    const r = parseInt(hex.slice(1, 3), 16);
    const g = parseInt(hex.slice(3, 5), 16);
    const b = parseInt(hex.slice(5, 7), 16);
    return (255 << 24) | (b << 16) | (g << 8) | r;
  }
  const COLOR_U32 = COLORS.map(hexToABGR);

  const sprites = {};
  const tilemap = {};

  const keyMap = {
    "ArrowUp": "up", "ArrowDown": "down", "ArrowLeft": "left", "ArrowRight": "right",
    "w": "up", "s": "down", "a": "left", "d": "right",
    "z": "a", "Z": "a", "x": "b", "X": "b",
    "Enter": "start", " ": "a"
  };
  const keys = {};
  const keysPrev = {};

  document.addEventListener("keydown", e => {
    const k = keyMap[e.key];
    if (k) { keys[k] = true; e.preventDefault(); }
  });
  document.addEventListener("keyup", e => {
    const k = keyMap[e.key];
    if (k) { keys[k] = false; e.preventDefault(); }
  });

  let audioCtx = null;
  const channels = [null, null];
  const channelGains = [null, null];
  function ensureAudio() {
    if (!audioCtx) {
      audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      for (let i = 0; i < 2; i++) {
        channelGains[i] = audioCtx.createGain();
        channelGains[i].gain.value = 0.15;
        channelGains[i].connect(audioCtx.destination);
      }
    }
  }

  const NOTE_NAMES = ["C","C#","D","D#","E","F","F#","G","G#","A","A#","B"];
  function noteToFreq(noteStr) {
    const match = noteStr.match(/^([A-G]#?)(\d)$/);
    if (!match) return 440;
    const name = match[1];
    const octave = parseInt(match[2]);
    const semitone = NOTE_NAMES.indexOf(name);
    if (semitone === -1) return 440;
    const midi = (octave + 1) * 12 + semitone;
    return 440 * Math.pow(2, (midi - 69) / 12);
  }

  const FONT_W = 4;
  const FONT_H = 6;
  const FONT = {};
  const fontData = {
    "A":"0110100110011111100110011001","B":"1110100110101110100110011110",
    "C":"0110100110001000100001100110","D":"1100101010011001100110101100",
    "E":"1111100010001110100010001111","F":"1111100010001110100010001000",
    "G":"0111100010001011100101100111","H":"1001100110011111100110011001",
    "I":"1110010001000100010001001110","J":"0111001000100010001010100100",
    "K":"1001101011001100101010011001","L":"1000100010001000100010001111",
    "M":"1001111111011001100110011001","N":"1001110111011001100110011001",
    "O":"0110100110011001100110010110","P":"1110100110011110100010001000",
    "Q":"0110100110011001101101100001","R":"1110100110011110101010011001",
    "S":"0111100010000110000110001110","T":"1111001000100010001000100010",
    "U":"1001100110011001100110010110","V":"1001100110011001100101100110",
    "W":"1001100110011001101111011001","X":"1001100101100110011010011001",
    "Y":"1001100101100010001000100010","Z":"1111000100100100100010001111",
    "0":"0110100111011011101110010110","1":"0100110001000100010001001110",
    "2":"0110100100010010010010001111","3":"1110000100010110000110011110",
    "4":"1001100110011111000100010001","5":"1111100010001110000100011110",
    "6":"0110100010001110100110010110","7":"1111000100010010010001001000",
    "8":"0110100110010110100110010110","9":"0110100110010111000100010110",
    " ":"0000000000000000000000000000",
    ".":"0000000000000000000001000100",
    ",":"0000000000000000001000101000",
    "!":"0100010001000100000000000100",
    "?":"0110100100010010000000000010",
    "-":"0000000000001110000000000000",
    "+":"0000001001001110010000100000",
    ":":"0000010001000000010001000000",
    "/":"0001000100100010010010001000",
    "*":"0000101001001110010010100000",
    "#":"0101111101011111010100000000",
    "(":"0010010010001000010001000010",
    ")":"0100001000010001000100100100",
    "=":"0000000011110000111100000000",
    "'":"0100010010000000000000000000",
    "\"":"1010101000000000000000000000",
    "<":"0010010010001000010000100010",
    ">":"1000010000100001001001001000",
    "_":"0000000000000000000000001111",
  };
  for (const [ch, bits] of Object.entries(fontData)) {
    FONT[ch] = [];
    for (let i = 0; i < bits.length; i++) FONT[ch].push(parseInt(bits[i]));
  }

  const API = {};
  API._init = null;
  API._update = null;
  API._draw = null;
  API.frame = 0;

  API.cls = function(c = 0) { buf32.fill(COLOR_U32[c] || COLOR_U32[0]); };
  API.pix = function(x, y, c) {
    x = Math.floor(x); y = Math.floor(y);
    if (x < 0 || x >= W || y < 0 || y >= H) return;
    buf32[y * W + x] = COLOR_U32[c] || COLOR_U32[0];
  };
  API.line = function(x0, y0, x1, y1, c) {
    x0=Math.floor(x0); y0=Math.floor(y0); x1=Math.floor(x1); y1=Math.floor(y1);
    const dx=Math.abs(x1-x0), dy=Math.abs(y1-y0);
    const sx=x0<x1?1:-1, sy=y0<y1?1:-1;
    let err=dx-dy;
    while(true) {
      API.pix(x0,y0,c);
      if(x0===x1&&y0===y1) break;
      const e2=2*err;
      if(e2>-dy){err-=dy;x0+=sx;}
      if(e2<dx){err+=dx;y0+=sy;}
    }
  };
  API.rect = function(x,y,w,h,c) {
    API.line(x,y,x+w-1,y,c); API.line(x+w-1,y,x+w-1,y+h-1,c);
    API.line(x+w-1,y+h-1,x,y+h-1,c); API.line(x,y+h-1,x,y,c);
  };
  API.rectf = function(x,y,w,h,c) {
    x=Math.floor(x); y=Math.floor(y);
    const col=COLOR_U32[c]||COLOR_U32[0];
    for(let py=Math.max(0,y);py<Math.min(H,y+h);py++)
      for(let px=Math.max(0,x);px<Math.min(W,x+w);px++)
        buf32[py*W+px]=col;
  };
  API.circ = function(cx,cy,r,c) {
    let x=r,y=0,d=1-r; cx=Math.floor(cx); cy=Math.floor(cy);
    while(x>=y){
      API.pix(cx+x,cy+y,c);API.pix(cx-x,cy+y,c);
      API.pix(cx+x,cy-y,c);API.pix(cx-x,cy-y,c);
      API.pix(cx+y,cy+x,c);API.pix(cx-y,cy+x,c);
      API.pix(cx+y,cy-x,c);API.pix(cx-y,cy-x,c);
      y++; if(d<0){d+=2*y+1;}else{x--;d+=2*(y-x)+1;}
    }
  };
  API.circf = function(cx,cy,r,c) {
    cx=Math.floor(cx); cy=Math.floor(cy);
    const col=COLOR_U32[c]||COLOR_U32[0]; const r2=r*r;
    for(let py=-r;py<=r;py++) for(let px=-r;px<=r;px++)
      if(px*px+py*py<=r2){ const sx=cx+px,sy=cy+py;
        if(sx>=0&&sx<W&&sy>=0&&sy<H) buf32[sy*W+sx]=col; }
  };
  API.sprite = function(id, data) {
    const arr = new Uint8Array(64); let i = 0;
    for (const ch of data) { if (ch>='0'&&ch<='3') { arr[i++]=parseInt(ch); if(i>=64) break; } }
    sprites[id] = arr;
  };
  API.spr = function(id, x, y, flipX, flipY) {
    const s=sprites[id]; if(!s) return;
    x=Math.floor(x); y=Math.floor(y);
    for(let py=0;py<8;py++) for(let px=0;px<8;px++){
      const sx=flipX?7-px:px, sy=flipY?7-py:py;
      const c=s[sy*8+sx], dx=x+px, dy=y+py;
      if(dx>=0&&dx<W&&dy>=0&&dy<H) buf32[dy*W+dx]=COLOR_U32[c];
    }
  };
  API.text = function(str, x, y, c) {
    str=String(str).toUpperCase(); let cx=Math.floor(x); const cy=Math.floor(y);
    const col=COLOR_U32[c]||COLOR_U32[3];
    for(const ch of str){
      const glyph=FONT[ch];
      if(glyph) for(let py=0;py<FONT_H;py++) for(let px=0;px<FONT_W;px++)
        if(glyph[py*FONT_W+px]){ const dx=cx+px,dy=cy+py;
          if(dx>=0&&dx<W&&dy>=0&&dy<H) buf32[dy*W+dx]=col; }
      cx+=FONT_W+1;
    }
  };
  API.mget = function(cx,cy) { return tilemap[cx+","+cy]||0; };
  API.mset = function(cx,cy,id) { tilemap[cx+","+cy]=id; };
  API.map = function(mx,my,mw,mh,sx,sy) {
    for(let ty=0;ty<mh;ty++) for(let tx=0;tx<mw;tx++){
      const id=API.mget(mx+tx,my+ty); if(id>0) API.spr(id,sx+tx*8,sy+ty*8); }
  };
  API.btn = function(k) { return !!keys[k]; };
  API.btnp = function(k) { return !!keys[k] && !keysPrev[k]; };
  API.note = function(ch, noteStr, dur) {
    ensureAudio(); if(ch<0||ch>1) return; API.stop(ch);
    const osc=audioCtx.createOscillator(); osc.type="square";
    osc.frequency.value=noteToFreq(noteStr);
    osc.connect(channelGains[ch]); osc.start();
    osc.stop(audioCtx.currentTime+dur); channels[ch]=osc;
  };
  API.stop = function(ch) {
    if(ch===undefined){API.stop(0);API.stop(1);return;}
    if(channels[ch]){try{channels[ch].stop();}catch(e){} channels[ch]=null;}
  };
  API.rnd = function(max) { return Math.random()*max; };
  API.flr = Math.floor;
  API.abs = Math.abs;
  API.min = Math.min;
  API.max = Math.max;
  API.sin = Math.sin;
  API.cos = Math.cos;

  function tick() {
    if (API._update) API._update();
    if (API._draw) API._draw();
    ctx.putImageData(buf, 0, 0);
    for (const k in keys) keysPrev[k] = keys[k];
    API.frame++;
  }

  // ============================================================
  // Galaxian Game
  // ============================================================
  const { cls, pix, line, rect, rectf, circ, circf, sprite: defSprite,
          spr, text, btn, btnp, note, stop, rnd, flr, abs: _abs,
          min, max: _max, sin, cos } = API;

  // --- Sprites ---

  // 1: Player ship — classic Galaxian rocket shape
  defSprite(1,
    "00030000" +
    "00030000" +
    "00333000" +
    "00333000" +
    "03333300" +
    "33333330" +
    "33022030" +
    "30000003"
  );

  // 2: Drone (blue alien) — basic foot soldier, simple insect
  defSprite(2,
    "00300300" +
    "00333000" +
    "03333300" +
    "32333230" +
    "33333330" +
    "03033030" +
    "03000300" +
    "30000003"
  );

  // 3: Escort (purple alien) — butterfly-wing shape
  defSprite(3,
    "30000003" +
    "03300330" +
    "03333300" +
    "33233230" +
    "33333330" +
    "03333300" +
    "03300330" +
    "30000003"
  );

  // 4: Flagship — big commander, distinctive crown shape
  defSprite(4,
    "00333000" +
    "03333300" +
    "33333330" +
    "32233220" +
    "33333330" +
    "33333330" +
    "03033030" +
    "00300300"
  );

  // 5: Flagship wings open (dive animation)
  defSprite(5,
    "30333003" +
    "33333330" +
    "33333330" +
    "32233220" +
    "33333330" +
    "33333330" +
    "30333003" +
    "03030300"
  );

  // 6: Player bullet — single thin shot
  defSprite(6,
    "00030000" +
    "00030000" +
    "00020000" +
    "00020000" +
    "00000000" +
    "00000000" +
    "00000000" +
    "00000000"
  );

  // 7: Enemy bullet — downward
  defSprite(7,
    "00000000" +
    "00000000" +
    "00000000" +
    "00010000" +
    "00020000" +
    "00020000" +
    "00030000" +
    "00000000"
  );

  // 8: Explosion frame 1 — small burst
  defSprite(8,
    "00000000" +
    "00200100" +
    "01003000" +
    "00031200" +
    "00230100" +
    "01000030" +
    "00100000" +
    "00000000"
  );

  // 9: Explosion frame 2 — large burst
  defSprite(9,
    "20010030" +
    "01000010" +
    "00302300" +
    "03033030" +
    "00232100" +
    "01000200" +
    "30001002" +
    "00200010"
  );

  // 10: Life icon — tiny ship
  defSprite(10,
    "00000000" +
    "00030000" +
    "00333000" +
    "03333300" +
    "33333330" +
    "33022030" +
    "00000000" +
    "00000000"
  );

  // 11: Star (dim)
  defSprite(11,
    "00000000" +
    "00000000" +
    "00000000" +
    "00010000" +
    "00000000" +
    "00000000" +
    "00000000" +
    "00000000"
  );

  // --- Game State ---
  let state = "title";
  let player, playerBullet, eBullets, enemies, explosions, particles, stars;
  let score, hiScore, lives, wave, waveTimer, waveMessage;
  let formationX, formationDir, formationSpeed;
  let diveTimer, respawnTimer;
  let titleAnimT;

  hiScore = 0;

  // Formation layout: Galaxian classic
  // Row 0: 6 flagships (centered)
  // Row 1: 8 escorts
  // Row 2: 10 drones
  // Row 3: 10 drones
  // Row 4: 10 drones
  const FORM_CELL_W = 16;
  const FORM_CELL_H = 14;
  const MAX_COLS = 10;

  function formBaseX() { return (W - MAX_COLS * FORM_CELL_W) / 2; }
  const FORM_BASE_Y = 42;

  function resetGame() {
    player = { x: W / 2 - 4, y: H - 28, alive: true };
    playerBullet = null; // only one at a time!
    eBullets = [];
    enemies = [];
    explosions = [];
    particles = [];
    score = 0;
    lives = 3;
    wave = 0;
    waveTimer = 0;
    waveMessage = 0;
    formationX = 0;
    formationDir = 1;
    formationSpeed = 0.25;
    diveTimer = 0;
    respawnTimer = 0;
    titleAnimT = 0;
    stars = [];
    for (let i = 0; i < 60; i++)
      stars.push({ x: flr(rnd(W)), y: flr(rnd(H)), speed: 0.15 + rnd(0.6), bright: flr(rnd(2)) + 1 });
    spawnWave();
  }

  function spawnWave() {
    wave++;
    waveMessage = 90;
    formationSpeed = 0.25 + wave * 0.04;
    formationX = 0;
    formationDir = 1;

    // Row 0: Flagships (centered, fewer)
    const flagCount = min(6, 4 + flr(wave / 3));
    const flagOffset = flr((MAX_COLS - flagCount) / 2);
    for (let col = 0; col < flagCount; col++) {
      enemies.push(makeEnemy(0, flagOffset + col, 4, 2, 60));
    }

    // Row 1: Escorts
    const escortCount = min(8, 6 + flr(wave / 4));
    const escortOffset = flr((MAX_COLS - escortCount) / 2);
    for (let col = 0; col < escortCount; col++) {
      enemies.push(makeEnemy(1, escortOffset + col, 3, 1, 30));
    }

    // Rows 2-4: Drones
    const droneRows = min(3, 2 + flr(wave / 5));
    for (let row = 0; row < droneRows; row++) {
      for (let col = 0; col < MAX_COLS; col++) {
        enemies.push(makeEnemy(2 + row, col, 2, 1, 10));
      }
    }

    diveTimer = 70 + flr(rnd(30));
  }

  function makeEnemy(row, col, type, hp, pts) {
    return {
      formRow: row, formCol: col,
      x: 0, y: 0,
      type: type, hp: hp, pts: pts,
      state: "forming",
      enterT: -(row * MAX_COLS + col) * 2,
      // Dive state
      divePath: null, diveT: 0, diveSpeed: 0,
      shootTimer: 80 + flr(rnd(120)),
      escorts: null, // for flagships: references to escort divers
      wingFlap: 0,
    };
  }

  function formationPos(row, col) {
    return {
      x: formBaseX() + col * FORM_CELL_W + formationX,
      y: FORM_BASE_Y + row * FORM_CELL_H
    };
  }

  function addExplosion(x, y) {
    explosions.push({ x: x, y: y, timer: 14 });
    for (let i = 0; i < 10; i++)
      particles.push({
        x: x + 4, y: y + 4,
        vx: rnd(4) - 2, vy: rnd(4) - 2,
        life: 5 + flr(rnd(10)),
        color: flr(rnd(3)) + 1
      });
  }

  // --- Sounds ---
  function shootSound() { note(0, "E6", 0.04); }
  function hitSound() { note(1, "C3", 0.06); setTimeout(() => note(1, "F3", 0.06), 50); }
  function flagshipHitSound() { note(1, "A4", 0.04); }
  function flagshipKillSound() {
    note(0, "G5", 0.08);
    setTimeout(() => note(0, "B5", 0.08), 80);
    setTimeout(() => note(0, "D6", 0.12), 160);
  }
  function deathSound() {
    note(0, "D3", 0.12); note(1, "G2", 0.12);
    setTimeout(() => { note(0, "A2", 0.2); note(1, "D2", 0.2); }, 130);
  }
  function waveClearSound() {
    note(0, "C5", 0.08);
    setTimeout(() => note(0, "E5", 0.08), 80);
    setTimeout(() => note(0, "G5", 0.08), 160);
    setTimeout(() => note(0, "C6", 0.15), 240);
  }

  // --- Dive paths: Galaxian swooping arcs ---
  // Galaxian aliens do wide sweeping curves, not straight dives
  function startDive(enemy) {
    enemy.state = "diving";
    enemy.diveT = 0;
    enemy.wingFlap = 0;

    const sx = enemy.x;
    const sy = enemy.y;
    // Pick a side to swoop toward
    const swoopDir = (sx < W / 2) ? 1 : -1;
    // Control points for a wide arc then swoop down
    const cp1x = sx + swoopDir * (80 + rnd(60));
    const cp1y = sy + 30 + rnd(40);
    const cp2x = sx - swoopDir * (40 + rnd(60));
    const cp2y = H * 0.55 + rnd(40);
    // End: swoop past player position and off bottom
    const ex = player.alive ? player.x + rnd(60) - 30 : W / 2;
    const ey = H + 20;

    enemy.divePath = [
      { x: sx, y: sy },
      { x: cp1x, y: cp1y },
      { x: cp2x, y: cp2y },
      { x: ex, y: ey }
    ];
    enemy.diveSpeed = 1.8 + rnd(0.8) + wave * 0.12;
  }

  // Flagship dive with escorts
  function startFlagshipDive(flagship) {
    startDive(flagship);
    flagship.diveSpeed *= 0.85; // Flagships are slightly slower, more majestic

    // Find up to 2 escorts in formation near the flagship
    flagship.escorts = [];
    const nearEscorts = enemies.filter(e =>
      e !== flagship && e.state === "formation" &&
      (e.type === 3 || e.type === 2) &&
      _abs(e.formCol - flagship.formCol) <= 2 &&
      e.formRow >= 1 && e.formRow <= 2
    );
    // Pick up to 2
    for (let i = 0; i < min(2, nearEscorts.length); i++) {
      const esc = nearEscorts[flr(rnd(nearEscorts.length))];
      if (esc.state === "formation" && !flagship.escorts.includes(esc)) {
        startDive(esc);
        esc.diveSpeed = flagship.diveSpeed + 0.2; // Escorts slightly faster
        flagship.escorts.push(esc);
      }
    }
    // Flagship worth more points when diving
    flagship.pts = 150;
  }

  // Cubic bezier evaluation for 4 control points
  function cubicBez(t, p0, p1, p2, p3) {
    const u = 1 - t;
    return u*u*u*p0 + 3*u*u*t*p1 + 3*u*t*t*p2 + t*t*t*p3;
  }

  resetGame();

  // ============================================================
  // Update
  // ============================================================
  API._update = function() {
    // Stars always scroll
    for (const s of stars) {
      s.y += s.speed;
      if (s.y > H) { s.y = 0; s.x = flr(rnd(W)); }
    }

    if (state === "title") {
      titleAnimT++;
      if (btnp("a") || btnp("start")) {
        state = "play";
        resetGame();
        note(0, "C5", 0.08);
        setTimeout(() => note(0, "E5", 0.08), 80);
        setTimeout(() => note(0, "G5", 0.12), 160);
      }
      return;
    }

    if (state === "gameover") {
      for (let i = particles.length - 1; i >= 0; i--) {
        const p = particles[i]; p.x += p.vx; p.y += p.vy; p.vy += 0.06; p.life--;
        if (p.life <= 0) particles.splice(i, 1);
      }
      if (btnp("a") || btnp("start")) state = "title";
      return;
    }

    // --- Play state ---

    if (waveMessage > 0) waveMessage--;

    // Respawn timer after death
    if (respawnTimer > 0) {
      respawnTimer--;
      if (respawnTimer === 0) {
        player.alive = true;
        player.x = W / 2 - 4;
      }
    }

    // Player movement
    if (player.alive) {
      if (btn("left")) player.x -= 2.5;
      if (btn("right")) player.x += 2.5;
      player.x = _max(4, min(W - 12, player.x));

      // Fire — ONE bullet at a time (Galaxian constraint!)
      if (btnp("a") && !playerBullet) {
        playerBullet = { x: player.x + 3, y: player.y - 2 };
        shootSound();
      }
    }

    // Update player bullet
    if (playerBullet) {
      playerBullet.y -= 5;
      if (playerBullet.y < -8) playerBullet = null;
    }

    // Formation sway
    formationX += formationDir * formationSpeed;
    if (formationX > 28) formationDir = -1;
    if (formationX < -28) formationDir = 1;

    // Update enemies
    for (let i = enemies.length - 1; i >= 0; i--) {
      const e = enemies[i];

      if (e.state === "forming") {
        e.enterT++;
        if (e.enterT < 0) continue;
        const target = formationPos(e.formRow, e.formCol);
        const flyDur = 25;
        if (e.enterT <= flyDur) {
          const t = e.enterT / flyDur;
          // Fly in from top with a slight curve
          const startX = W / 2 + sin(e.formCol * 1.2 + e.formRow) * 80;
          const startY = -16;
          e.x = startX + (target.x - startX) * t * t;
          e.y = startY + (target.y - startY) * t;
        } else {
          e.state = "formation";
        }
      }

      if (e.state === "formation") {
        const target = formationPos(e.formRow, e.formCol);
        e.x = target.x;
        e.y = target.y;
      }

      if (e.state === "diving") {
        e.diveT += e.diveSpeed / 250;
        e.wingFlap++;

        if (e.diveT >= 1) {
          // Wrap around: come back from the top
          e.state = "returning";
          e.y = -12;
          e.x = formationPos(e.formRow, e.formCol).x;
          e.diveT = 0;
        } else {
          const p = e.divePath;
          e.x = cubicBez(e.diveT, p[0].x, p[1].x, p[2].x, p[3].x);
          e.y = cubicBez(e.diveT, p[0].y, p[1].y, p[2].y, p[3].y);
        }

        // Diving enemies fire
        e.shootTimer--;
        if (e.shootTimer <= 0 && e.y > 10 && e.y < H - 50) {
          eBullets.push({ x: e.x + 3, y: e.y + 8 });
          e.shootTimer = 20 + flr(rnd(30));
          note(1, "D4", 0.02);
        }
      }

      if (e.state === "returning") {
        const target = formationPos(e.formRow, e.formCol);
        e.diveT += 0.025;
        if (e.diveT >= 1) {
          e.state = "formation";
          e.x = target.x;
          e.y = target.y;
        } else {
          e.x += (target.x - e.x) * 0.06;
          e.y += (target.y - e.y) * 0.06;
        }
      }

      // Bullet-enemy collision
      if (playerBullet) {
        const b = playerBullet;
        if (b.x > e.x - 2 && b.x < e.x + 9 && b.y > e.y - 2 && b.y < e.y + 9) {
          playerBullet = null;
          e.hp--;
          if (e.hp <= 0) {
            // Flagship killed while diving = bonus
            let pts = e.pts;
            if (e.type === 4 && e.state === "diving") pts = 150;
            else if (e.type === 4 && e.state === "formation") pts = 60;
            else if (e.type === 3 && e.state === "diving") pts = 50;
            else if (e.type === 3) pts = 30;
            else if (e.state === "diving") pts = 20;
            else pts = e.pts;

            score += pts;
            addExplosion(e.x, e.y);
            if (e.type === 4) flagshipKillSound();
            else hitSound();
            enemies.splice(i, 1);
          } else {
            flagshipHitSound();
          }
        }
      }
    }

    // Trigger dives — authentic Galaxian: flagship dives with escorts
    diveTimer--;
    if (diveTimer <= 0) {
      const formEnemies = enemies.filter(e => e.state === "formation");
      if (formEnemies.length > 0) {
        // Prioritize flagships for exciting dive-bomb attacks
        const flagships = formEnemies.filter(e => e.type === 4);
        const divers = formEnemies.filter(e => e.type !== 4);

        if (flagships.length > 0 && rnd(1) < 0.35) {
          // Flagship dive with escorts!
          const flag = flagships[flr(rnd(flagships.length))];
          startFlagshipDive(flag);
        } else if (divers.length > 0) {
          const diver = divers[flr(rnd(divers.length))];
          startDive(diver);
        }
      }
      diveTimer = _max(12, 45 - wave * 3) + flr(rnd(20));
    }

    // Enemy bullets
    for (let i = eBullets.length - 1; i >= 0; i--) {
      eBullets[i].y += 2.5;
      if (eBullets[i].y > H + 8) { eBullets.splice(i, 1); continue; }
      // Hit player
      if (player.alive) {
        const b = eBullets[i];
        if (b && b.x > player.x - 1 && b.x < player.x + 9 && b.y > player.y - 1 && b.y < player.y + 9) {
          eBullets.splice(i, 1);
          killPlayer();
        }
      }
    }

    // Diving enemy-player collision
    if (player.alive) {
      for (let i = enemies.length - 1; i >= 0; i--) {
        const e = enemies[i];
        if (e.state === "diving" &&
            player.x + 7 > e.x && player.x < e.x + 8 &&
            player.y + 7 > e.y && player.y < e.y + 8) {
          addExplosion(e.x, e.y);
          score += e.pts;
          enemies.splice(i, 1);
          killPlayer();
          break;
        }
      }
    }

    // Formation enemies randomly fire (bottom-most in column only)
    for (const e of enemies) {
      if (e.state === "formation") {
        e.shootTimer--;
        if (e.shootTimer <= 0) {
          const hasBelow = enemies.some(o =>
            o.formCol === e.formCol && o.formRow > e.formRow && o.state === "formation"
          );
          if (!hasBelow && rnd(1) < 0.3) {
            eBullets.push({ x: e.x + 3, y: e.y + 8 });
          }
          e.shootTimer = _max(30, 100 - wave * 6) + flr(rnd(60));
        }
      }
    }

    // Explosions
    for (let i = explosions.length - 1; i >= 0; i--) {
      explosions[i].timer--;
      if (explosions[i].timer <= 0) explosions.splice(i, 1);
    }

    // Particles
    for (let i = particles.length - 1; i >= 0; i--) {
      const p = particles[i];
      p.x += p.vx; p.y += p.vy; p.vy += 0.05; p.life--;
      if (p.life <= 0) particles.splice(i, 1);
    }

    // Wave clear
    if (enemies.length === 0 && state === "play") {
      waveTimer++;
      if (waveTimer === 1) waveClearSound();
      if (waveTimer > 70) {
        waveTimer = 0;
        spawnWave();
      }
    }
  };

  function killPlayer() {
    addExplosion(player.x, player.y);
    deathSound();
    player.alive = false;
    lives--;
    playerBullet = null;
    if (lives <= 0) {
      state = "gameover";
      if (score > hiScore) hiScore = score;
    } else {
      respawnTimer = 60;
    }
  }

  // ============================================================
  // Draw
  // ============================================================
  API._draw = function() {
    cls(0);

    // Starfield
    for (const s of stars) pix(s.x, s.y, s.bright);

    if (state === "title") {
      drawTitle();
      return;
    }

    if (state === "gameover") {
      // Stars + particles
      for (const p of particles) pix(flr(p.x), flr(p.y), p.color);

      text("GAME OVER", 195, 100, 3);
      text("SCORE  " + padScore(score), 185, 130, 2);
      text("HI     " + padScore(hiScore), 185, 145, 2);
      text("WAVE   " + wave, 205, 165, 2);
      if (flr(API.frame / 20) % 2 === 0) text("PRESS START", 190, 210, 3);
      return;
    }

    // --- Play state rendering ---

    // Enemy bullets
    for (const b of eBullets) spr(7, flr(b.x), flr(b.y));

    // Enemies
    for (const e of enemies) {
      if (e.state === "forming" && e.enterT < 0) continue;
      let sprId = e.type;
      // Flagship flaps wings when diving
      if (e.type === 4 && e.state === "diving" && flr(e.wingFlap / 4) % 2 === 0) {
        sprId = 5;
      }
      // Flash damaged flagship
      if (e.type === 4 && e.hp === 1 && flr(API.frame / 3) % 2 === 0) {
        // Skip draw (flash effect)
      } else {
        spr(sprId, flr(e.x), flr(e.y));
      }
    }

    // Player bullet
    if (playerBullet) spr(6, flr(playerBullet.x), flr(playerBullet.y));

    // Player
    if (player.alive) {
      // Blink briefly after respawn
      if (respawnTimer > 0 && respawnTimer < 20 && flr(API.frame / 3) % 2 === 0) {
        // skip draw
      } else {
        spr(1, flr(player.x), flr(player.y));
      }
    }

    // Explosions
    for (const e of explosions) {
      const sprId = e.timer > 7 ? 8 : 9;
      spr(sprId, flr(e.x), flr(e.y));
    }

    // Particles
    for (const p of particles) pix(flr(p.x), flr(p.y), p.color);

    // HUD
    rectf(0, 0, W, 14, 0);
    text("1UP", 4, 2, 3);
    text(padScore(score), 4, 9, 3);
    text("HIGH SCORE", W / 2 - 25, 2, 2);
    text(padScore(hiScore), W / 2 - 15, 9, 3);
    text("WAVE " + wave, W - 50, 2, 2);

    // Lives
    for (let i = 0; i < lives - 1; i++) spr(10, 4 + i * 10, H - 10);

    // Wave announcement
    if (waveMessage > 0) {
      const msgY = 140 + sin(waveMessage * 0.12) * 3;
      text("WAVE " + wave, 210, flr(msgY), 3);
      if (waveMessage > 50) text("READY!", 213, flr(msgY) + 14, 2);
    }
  };

  function padScore(n) {
    let s = String(n);
    while (s.length < 6) s = "0" + s;
    return s;
  }

  function drawTitle() {
    titleAnimT++;

    // Big title with shadow
    const ty = 55 + sin(titleAnimT * 0.04) * 4;
    text("GALAXIAN", 195, flr(ty), 3);
    text("GALAXIAN", 196, flr(ty) + 1, 1);
    rectf(165, flr(ty) + 12, 150, 1, 2);

    // Animated formation on title
    const cx = W / 2;
    const baseY = flr(ty) + 28;
    // Flagship in center swaying
    spr(5, cx - 4 + sin(titleAnimT * 0.06) * 20, baseY + sin(titleAnimT * 0.07) * 3);
    // Escorts flanking
    spr(3, cx - 28 + sin(titleAnimT * 0.06 + 0.5) * 20, baseY + 3 + sin(titleAnimT * 0.07 + 1) * 3);
    spr(3, cx + 20 + sin(titleAnimT * 0.06 - 0.5) * 20, baseY + 3 + sin(titleAnimT * 0.07 - 1) * 3);
    // Drones
    for (let i = -2; i <= 2; i++) {
      spr(2, cx + i * 18 - 4 + sin(titleAnimT * 0.05) * 15, baseY + 18 + sin(titleAnimT * 0.06 + i * 0.5) * 2);
    }

    if (flr(titleAnimT / 22) % 2 === 0) text("PRESS START", 190, 180, 3);

    // Score table
    text("-- SCORE TABLE --", 175, 205, 2);
    spr(4, 178, 219); text("FLAGSHIP       60 PTS", 190, 221, 2);
    spr(4, 178, 233); text("FLAGSHIP DIVE 150 PTS", 190, 235, 2);
    spr(3, 178, 247); text("ESCORT         30 PTS", 190, 249, 2);
    spr(2, 178, 261); text("DRONE          10 PTS", 190, 263, 2);

    text("HIGH SCORE  " + padScore(hiScore), 175, 285, 2);
    text("GRAYBOX DEMO V0.1", 175, 305, 1);
  }

  // ============================================================
  // Boot
  // ============================================================
  if (API._init) API._init();
  setInterval(tick, 1000 / FPS);
  document.addEventListener("keydown", ensureAudio, { once: true });
  document.addEventListener("click", ensureAudio, { once: true });
})();
</script>
