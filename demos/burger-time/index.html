<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GrayBox — Demo: Burger Time</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #0a0a0a;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100vh;
    font-family: monospace;
    overflow: hidden;
  }
  #frame {
    background: #111;
    border: 3px solid #333;
    border-radius: 8px;
    padding: 12px;
    box-shadow: 0 0 40px rgba(0,0,0,0.8), inset 0 0 20px rgba(0,0,0,0.5);
  }
  canvas {
    display: block;
    image-rendering: pixelated;
    image-rendering: crisp-edges;
  }
  #controls {
    margin-top: 12px;
    color: #6b6b6b;
    font-size: 11px;
    text-align: center;
    letter-spacing: 1px;
  }
  #controls span { color: #b0b0b0; }
</style>
</head>
<body>
<div id="frame">
  <canvas id="screen"></canvas>
</div>
<div id="controls">
  <span>ARROWS</span> MOVE &nbsp;&nbsp; <span>Z</span> PEPPER &nbsp;&nbsp; <span>ENTER</span> START
</div>
<script>
(() => {
  "use strict";

  // ============================================================
  // GrayBox Runtime (inline)
  // ============================================================
  const W = 320;
  const H = 240;
  const FPS = 30;
  const COLORS = ["#1a1a1a", "#6b6b6b", "#b0b0b0", "#e8e8e8"];
  const canvas = document.getElementById("screen");
  canvas.width = W;
  canvas.height = H;
  function fitCanvas() {
    var maxW = window.innerWidth - 40;
    var maxH = window.innerHeight - 60;
    var s = Math.min(maxW / W, maxH / H);
    canvas.style.width = (W * s) + "px";
    canvas.style.height = (H * s) + "px";
  }
  fitCanvas();
  window.addEventListener("resize", fitCanvas);
  const ctx = canvas.getContext("2d");
  ctx.imageSmoothingEnabled = false;
  const buf = ctx.createImageData(W, H);
  const buf32 = new Uint32Array(buf.data.buffer);

  function hexToABGR(hex) {
    const r = parseInt(hex.slice(1, 3), 16);
    const g = parseInt(hex.slice(3, 5), 16);
    const b = parseInt(hex.slice(5, 7), 16);
    return (255 << 24) | (b << 16) | (g << 8) | r;
  }
  const COLOR_U32 = COLORS.map(hexToABGR);

  const sprites = {};
  const tilemap = {};

  const keyMap = {
    "ArrowUp": "up", "ArrowDown": "down", "ArrowLeft": "left", "ArrowRight": "right",
    "w": "up", "s": "down", "a": "left", "d": "right", "ㅈ": "up", "ㄴ": "down", "ㅁ": "left", "ㅇ": "right",
    "z": "a", "Z": "a", "x": "b", "X": "b", "ㅋ": "a", "ㅌ": "b",
    "Enter": "a", " ": "a"
  };
  const keys = {};
  const keysPrev = {};

  document.addEventListener("keydown", e => {
    const k = keyMap[e.key];
    if (k) { keys[k] = true; e.preventDefault(); }
  });
  document.addEventListener("keyup", e => {
    const k = keyMap[e.key];
    if (k) { keys[k] = false; e.preventDefault(); }
  });

  let audioCtx = null;
  const channels = [null, null];
  const channelGains = [null, null];
  function ensureAudio() {
    if (!audioCtx) {
      audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      for (let i = 0; i < 2; i++) {
        channelGains[i] = audioCtx.createGain();
        channelGains[i].gain.value = 0.15;
        channelGains[i].connect(audioCtx.destination);
      }
    }
  }

  const NOTE_NAMES = ["C","C#","D","D#","E","F","F#","G","G#","A","A#","B"];
  function noteToFreq(noteStr) {
    const match = noteStr.match(/^([A-G]#?)(\d)$/);
    if (!match) return 440;
    const name = match[1];
    const octave = parseInt(match[2]);
    const semitone = NOTE_NAMES.indexOf(name);
    if (semitone === -1) return 440;
    const midi = (octave + 1) * 12 + semitone;
    return 440 * Math.pow(2, (midi - 69) / 12);
  }

  const FONT_W = 4;
  const FONT_H = 7;
  const FONT = {};
  const fontData = {
    "A":"0110100110011111100110011001","B":"1110100110101110100110011110",
    "C":"0110100110001000100001100110","D":"1100101010011001100110101100",
    "E":"1111100010001110100010001111","F":"1111100010001110100010001000",
    "G":"0111100010001011100101100111","H":"1001100110011111100110011001",
    "I":"1110010001000100010001001110","J":"0111001000100010001010100100",
    "K":"1001101011001100101010011001","L":"1000100010001000100010001111",
    "M":"1001111111011001100110011001","N":"1001110111011001100110011001",
    "O":"0110100110011001100110010110","P":"1110100110011110100010001000",
    "Q":"0110100110011001101101100001","R":"1110100110011110101010011001",
    "S":"0111100010000110000110001110","T":"1111001000100010001000100010",
    "U":"1001100110011001100110010110","V":"1001100110011001100101100110",
    "W":"1001100110011001101111011001","X":"1001100101100110011010011001",
    "Y":"1001100101100010001000100010","Z":"1111000100100100100010001111",
    "0":"0110100111011011101110010110","1":"0100110001000100010001001110",
    "2":"0110100100010010010010001111","3":"1110000100010110000110011110",
    "4":"1001100110011111000100010001","5":"1111100010001110000100011110",
    "6":"0110100010001110100110010110","7":"1111000100010010010001001000",
    "8":"0110100110010110100110010110","9":"0110100110010111000100010110",
    " ":"0000000000000000000000000000",
    ".":"0000000000000000000001000100",
    ",":"0000000000000000001000101000",
    "!":"0100010001000100000000000100",
    "?":"0110100100010010000000000010",
    "-":"0000000000001110000000000000",
    "+":"0000001001001110010000100000",
    ":":"0000010001000000010001000000",
    "/":"0001000100100010010010001000",
    "*":"0000101001001110010010100000",
    "#":"0101111101011111010100000000",
    "(":"0010010010001000010001000010",
    ")":"0100001000010001000100100100",
    "=":"0000000011110000111100000000",
    "'":"0100010010000000000000000000",
    "\"":"1010101000000000000000000000",
    "<":"0010010010001000010000100010",
    ">":"1000010000100001001001001000",
    "_":"0000000000000000000000001111",
  };
  for (const [ch, bits] of Object.entries(fontData)) {
    FONT[ch] = [];
    for (let i = 0; i < bits.length; i++) FONT[ch].push(parseInt(bits[i]));
  }

  const API = {};
  API._init = null;
  API._update = null;
  API._draw = null;
  API.frame = 0;

  API.cls = function(c = 0) { buf32.fill(COLOR_U32[c] || COLOR_U32[0]); };
  API.pix = function(x, y, c) {
    x = Math.floor(x); y = Math.floor(y);
    if (x < 0 || x >= W || y < 0 || y >= H) return;
    buf32[y * W + x] = COLOR_U32[c] || COLOR_U32[0];
  };
  API.line = function(x0, y0, x1, y1, c) {
    x0=Math.floor(x0); y0=Math.floor(y0); x1=Math.floor(x1); y1=Math.floor(y1);
    const dx=Math.abs(x1-x0), dy=Math.abs(y1-y0);
    const sx=x0<x1?1:-1, sy=y0<y1?1:-1;
    let err=dx-dy;
    while(true) {
      API.pix(x0,y0,c);
      if(x0===x1&&y0===y1) break;
      const e2=2*err;
      if(e2>-dy){err-=dy;x0+=sx;}
      if(e2<dx){err+=dx;y0+=sy;}
    }
  };
  API.rect = function(x,y,w,h,c) {
    API.line(x,y,x+w-1,y,c); API.line(x+w-1,y,x+w-1,y+h-1,c);
    API.line(x+w-1,y+h-1,x,y+h-1,c); API.line(x,y+h-1,x,y,c);
  };
  API.rectf = function(x,y,w,h,c) {
    x=Math.floor(x); y=Math.floor(y);
    const col=COLOR_U32[c]||COLOR_U32[0];
    for(let py=Math.max(0,y);py<Math.min(H,y+h);py++)
      for(let px=Math.max(0,x);px<Math.min(W,x+w);px++)
        buf32[py*W+px]=col;
  };
  API.circ = function(cx,cy,r,c) {
    let x=r,y=0,d=1-r; cx=Math.floor(cx); cy=Math.floor(cy);
    while(x>=y){
      API.pix(cx+x,cy+y,c);API.pix(cx-x,cy+y,c);
      API.pix(cx+x,cy-y,c);API.pix(cx-x,cy-y,c);
      API.pix(cx+y,cy+x,c);API.pix(cx-y,cy+x,c);
      API.pix(cx+y,cy-x,c);API.pix(cx-y,cy-x,c);
      y++; if(d<0){d+=2*y+1;}else{x--;d+=2*(y-x)+1;}
    }
  };
  API.circf = function(cx,cy,r,c) {
    cx=Math.floor(cx); cy=Math.floor(cy);
    const col=COLOR_U32[c]||COLOR_U32[0]; const r2=r*r;
    for(let py=-r;py<=r;py++) for(let px=-r;px<=r;px++)
      if(px*px+py*py<=r2){ const sx=cx+px,sy=cy+py;
        if(sx>=0&&sx<W&&sy>=0&&sy<H) buf32[sy*W+sx]=col; }
  };
  API.sprite = function(id, data) {
    const arr = new Uint8Array(64); let i = 0;
    for (const ch of data) { if (ch>='0'&&ch<='3') { arr[i++]=parseInt(ch); if(i>=64) break; } }
    sprites[id] = arr;
  };
  API.spr = function(id, x, y, flipX, flipY) {
    const s=sprites[id]; if(!s) return;
    x=Math.floor(x); y=Math.floor(y);
    for(let py=0;py<8;py++) for(let px=0;px<8;px++){
      const sx=flipX?7-px:px, sy=flipY?7-py:py;
      const c=s[sy*8+sx], dx=x+px, dy=y+py;
      if(dx>=0&&dx<W&&dy>=0&&dy<H) buf32[dy*W+dx]=COLOR_U32[c];
    }
  };
  API.text = function(str, x, y, c) {
    str=String(str).toUpperCase(); let cx=Math.floor(x); const cy=Math.floor(y);
    const col=COLOR_U32[c]||COLOR_U32[3];
    for(const ch of str){
      const glyph=FONT[ch];
      if(glyph) for(let py=0;py<FONT_H;py++) for(let px=0;px<FONT_W;px++)
        if(glyph[py*FONT_W+px]){ const dx=cx+px,dy=cy+py;
          if(dx>=0&&dx<W&&dy>=0&&dy<H) buf32[dy*W+dx]=col; }
      cx+=FONT_W+1;
    }
  };
  API.mget = function(cx,cy) { return tilemap[cx+","+cy]||0; };
  API.mset = function(cx,cy,id) { tilemap[cx+","+cy]=id; };
  API.map = function(mx,my,mw,mh,sx,sy) {
    for(let ty=0;ty<mh;ty++) for(let tx=0;tx<mw;tx++){
      const id=API.mget(mx+tx,my+ty); if(id>0) API.spr(id,sx+tx*8,sy+ty*8); }
  };
  const VALID_KEYS = {up:1,down:1,left:1,right:1,a:1,b:1};
  API.btn = function(k) { if(!VALID_KEYS[k]) console.warn("GrayBox: invalid key \""+k+"\". Use: up/down/left/right/a/b"); return !!keys[k]; };
  API.btnp = function(k) { if(!VALID_KEYS[k]) console.warn("GrayBox: invalid key \""+k+"\". Use: up/down/left/right/a/b"); return !!keys[k] && !keysPrev[k]; };
  API.note = function(ch, noteStr, dur) {
    ensureAudio(); if(ch<0||ch>1) return; API.stop(ch);
    const osc=audioCtx.createOscillator(); osc.type="square";
    osc.frequency.value=noteToFreq(noteStr);
    osc.connect(channelGains[ch]); osc.start();
    osc.stop(audioCtx.currentTime+dur); channels[ch]=osc;
  };
  API.stop = function(ch) {
    if(ch===undefined){API.stop(0);API.stop(1);return;}
    if(channels[ch]){try{channels[ch].stop();}catch(e){} channels[ch]=null;}
  };
  API.rnd = function(max) { return Math.random()*max; };
  API.flr = Math.floor;
  API.abs = Math.abs;
  API.min = Math.min;
  API.max = Math.max;
  API.sin = Math.sin;
  API.cos = Math.cos;

  function tick() {
    if (API._update) API._update();
    if (API._draw) API._draw();
    ctx.putImageData(buf, 0, 0);
    for (const k in keys) keysPrev[k] = keys[k];
    API.frame++;
  }

  // ============================================================
  // Burger Time Game
  // ============================================================
  const { cls, pix, line, rect, rectf, circ, circf, sprite: defSprite,
          spr, text, btn, btnp, note, stop, rnd, flr, abs: _abs,
          min, max: _max, sin, cos } = API;

  // --- Sprites ---

  // 1: Chef (facing right) - white hat, apron
  defSprite(1,
    "00333000" +
    "03333300" +
    "00322000" +
    "03333300" +
    "00333000" +
    "00311300" +
    "00300300" +
    "00300300"
  );

  // 2: Chef walking frame 2
  defSprite(2,

  );

  // 3: Chef climbing
  defSprite(3,

  );

  // 10: Top bun left
  defSprite(10,

    "00000000" +

  );
  // 11: Top bun right
  defSprite(11,

  // 12: Patty left
  defSprite(12,

  );
  // 13: Patty right
  defSprite(13,

  );

  // 14: Lettuce left
  defSprite(14,

    "01212100" +

  );
  // 15: Lettuce right
  defSprite(15,

  // 16: Bottom bun left
  defSprite(16,

  defSprite(20,

  defSprite(21,

  defSprite(22,

  defSprite(23,

  defSprite(24,

  // 25: Ladder tile
  defSprite(25,

  // 26: Life icon (small chef hat)
  defSprite(26,

  // 27: Pepper icon (HUD)
  defSprite(27,

  // 28: Stunned enemy overlay (stars)
  defSprite(28,
    "30000030" +

  // --- Level Layout ---
  // The level is defined by platforms and ladders
  // Platforms have slots for burger ingredients
  // Each platform is at a Y position, with X start/end

  const PLAT_H = 2; // platform height in pixels (drawn as line)
  const HUD_H = 16;
  const PLAY_TOP = HUD_H;
  const PLAY_BOT = H - 8;

  // Level definitions - 5 platform rows with ladders connecting them
  // Each level can have different layouts
  function makeLevelLayout(level) {
    const layouts = [];

    // Platform Y positions (6 levels of platforms)
    const platYs = [39, 75, 111, 147, 183, 218];

    // Ingredient columns - where burger stacks go
    // Each column is a set of ingredients stacked across platforms
    const numCols = 3 + min(flr(level / 2), 2); // 3-5 burger columns

    const colXs = [];
    const spacing = 267 / (numCols + 1);
    for (let i = 0; i < numCols; i++) {
      colXs.push(flr(27 + spacing * (i + 1)) - 8);
    }

    // Platforms - horizontal walkways
    const platforms = [];
    for (let row = 0; row < platYs.length; row++) {
      const y = platYs[row];
      // Full-width platform with some gaps for variety
      if (row === platYs.length - 1) {
        // Bottom platform is always full (catch plates)
        platforms.push({ x1: 13, x2: 307, y: y });
      } else if (row === 0) {
        // Top has segments connecting ingredient columns
        for (let c = 0; c < numCols; c++) {
          const cx = colXs[c];
          platforms.push({ x1: cx - 16, x2: cx + 27, y: y });
        }
      } else {
        // Middle rows - wider platforms but with some variation
        if (level % 2 === 0 || row % 2 === 0) {
          // Full width
          platforms.push({ x1: 13, x2: 307, y: y });
        } else {
          // Split platforms
          platforms.push({ x1: 13, x2: 147, y: y });
          platforms.push({ x1: 173, x2: 307, y: y });
        }
      }
    }

    // Ladders - vertical connections between platforms
    const ladders = [];
    // Always have ladders at ingredient columns
    for (let c = 0; c < numCols; c++) {
      const lx = colXs[c] + 4;
      for (let row = 0; row < platYs.length - 1; row++) {
        ladders.push({ x: lx, y1: platYs[row], y2: platYs[row + 1] });
      }
    }
    // Extra ladders for navigation
    const extraLadderXs = [20, 87, 233, 293];
    for (const lx of extraLadderXs) {
      for (let row = 0; row < platYs.length - 1; row++) {
        if (rnd(1) < 0.6 || row === 0) {
          ladders.push({ x: lx, y1: platYs[row], y2: platYs[row + 1] });
        }
      }
    }

    // Burger ingredients
    // Each burger column has: top bun, lettuce, patty, tomato, bottom bun
    // Spread across platforms 0-4, collected at platform 5
    const ingredients = [];
    const ingTypes = [
      { name: "topbun", sprL: 10, sprR: 11 },
      { name: "lettuce", sprL: 14, sprR: 15 },
      { name: "patty", sprL: 12, sprR: 13 },
      { name: "tomato", sprL: 18, sprR: 19 },
      { name: "botbun", sprL: 16, sprR: 17 },
    ];
    for (let c = 0; c < numCols; c++) {
      for (let ing = 0; ing < 5; ing++) {
        ingredients.push({
          col: c,
          type: ingTypes[ing],
          x: colXs[c],
          platRow: ing, // which platform row it starts on
          y: platYs[ing],
          targetY: platYs[ing + 1], // where it drops to
          walked: [false, false], // left half, right half walked over
          dropping: false,
          dropSpeed: 0,
          dropped: false, // has reached final position
          stackCount: 0, // how many times it's been dropped
          finalY: 0, // computed final resting Y
          settled: false,
        });
      }
    }

    return { platforms, ladders, ingredients, platYs, colXs, numCols };
  }

  // --- Game State ---
  let state = "title";
  let chef, enemies, peppers, particles;
  let score, lives, level, pepperCount;
  let layout;
  let levelComplete, levelCompleteTimer;
  let deathTimer;
  let burgersCompleted;
  let totalBurgers;
  let enemySpawnTimer;
  let invincibleTimer;

  function resetGame() {
    score = 0;
    lives = 3;
    level = 1;
    pepperCount = 5;
    startLevel();
  }

  function startLevel() {
    layout = makeLevelLayout(level);
    chef = {
      x: 153, y: layout.platYs[2] - 10,
      dir: 1, // 1=right, -1=left
      onLadder: false,
      climbing: false,
      walkFrame: 0,
      speed: 1.5,
    };
    enemies = [];
    peppers = [];
    particles = [];
    levelComplete = false;
    levelCompleteTimer = 0;
    deathTimer = 0;
    invincibleTimer = 60; // brief invincibility at level start
    burgersCompleted = 0;
    totalBurgers = layout.numCols;
    enemySpawnTimer = 90;

    // Compute final Y positions for ingredients (stacking from bottom)
    for (let c = 0; c < layout.numCols; c++) {
      const bottomY = layout.platYs[5]; // bottom platform
      const colIngs = layout.ingredients.filter(ing => ing.col === c);
      // They stack from bottom up
      for (let i = colIngs.length - 1; i >= 0; i--) {
        colIngs[i].finalY = bottomY - (colIngs.length - 1 - i) * 5 - 5;
        colIngs[i].settled = false;
        colIngs[i].dropped = false;
        colIngs[i].dropping = false;
        colIngs[i].dropSpeed = 0;
        colIngs[i].walked = [false, false];
        colIngs[i].y = layout.platYs[colIngs[i].platRow];
        colIngs[i].targetY = layout.platYs[colIngs[i].platRow + 1];
        colIngs[i].stackCount = 0;
      }
    }
  }

  function spawnEnemy() {
    if (enemies.length >= 3 + level) return;
    const types = [20, 21, 22]; // hotdog, pickle, egg
    const type = types[flr(rnd(types.length))];
    // Spawn at edge of a random platform
    const row = flr(rnd(3)); // spawn on top 3 rows
    const side = rnd(1) < 0.5 ? 0 : 1;
    const plat = layout.platforms[flr(rnd(layout.platforms.length))];
    if (!plat) return;
    enemies.push({
      x: side === 0 ? plat.x1 : plat.x2 - 8,
      y: plat.y - 10,
      type: type,
      dir: side === 0 ? 1 : -1,
      onLadder: false,
      climbing: false,
      stunTimer: 0,
      speed: 0.6 + level * 0.1,
      walkFrame: 0,
      alive: true,
      crushed: false,
    });
  }

  function isOnPlatform(x, y, w) {
    const footY = y + 10;
    for (const p of layout.platforms) {
      if (footY >= p.y - 2 && footY <= p.y + 4 && x + w > p.x1 && x < p.x2) {
        return p;
      }
    }
    return null;
  }

  function findLadderAt(x, y, h) {
    const cx = x + 4; // center of character
    for (const l of layout.ladders) {
      if (_abs(cx - l.x - 4) < 6 && y + h > l.y1 - 2 && y < l.y2 + 2) {
        return l;
      }
    }
    return null;
  }

  function findLadderBelow(x, y) {
    const cx = x + 4;
    for (const l of layout.ladders) {
      if (_abs(cx - l.x - 4) < 6 && y + 10 >= l.y1 - 4 && y + 10 <= l.y1 + 8) {
        return l;
      }
    }
    return null;
  }

  function findLadderAbove(x, y) {
    const cx = x + 4;
    for (const l of layout.ladders) {
      if (_abs(cx - l.x - 4) < 6 && y + 10 >= l.y2 - 8 && y + 10 <= l.y2 + 4) {
        return l;
      }
    }
    return null;
  }

  // Sound effects
  function walkSound() { if (API.frame % 8 === 0) note(1, "G2", 0.02); }
  function pepperSound() { note(0, "C5", 0.05); note(1, "E4", 0.05); }
  function dropSound() { note(0, "C3", 0.08); note(1, "E2", 0.1); }
  function crushSound() { note(0, "G3", 0.06); note(1, "C3", 0.1); }
  function deathSound() {
    note(0, "C3", 0.15); note(1, "G2", 0.15);
    setTimeout(() => { note(0, "A2", 0.2); note(1, "E2", 0.2); }, 150);
  }
  function levelClearSound() {
    note(0, "C5", 0.1);
    setTimeout(() => note(0, "E5", 0.1), 100);
    setTimeout(() => note(0, "G5", 0.1), 200);
    setTimeout(() => note(0, "C6", 0.2), 300);
  }
  function bonusSound() { note(0, "A5", 0.04); note(1, "E5", 0.04); }

  function addParticles(x, y, count, color) {
    for (let i = 0; i < count; i++) {
      particles.push({
        x: x, y: y,
        vx: rnd(4) - 2, vy: rnd(3) - 2,
        life: 10 + flr(rnd(15)),
        color: color || (flr(rnd(3)) + 1),
      });
    }
  }

  // --- AI for enemies ---
  function updateEnemy(e) {
    if (e.stunTimer > 0) {
      e.stunTimer--;
      return;
    }

    e.walkFrame += 0.15;
    const speed = e.speed;

    // Simple AI: move toward chef
    const dx = chef.x - e.x;
    const dy = chef.y - e.y;

    if (e.climbing) {
      // On ladder, move vertically
      const ladder = findLadderAt(e.x, e.y, 10);
      if (ladder) {
        if (dy < -8) {
          e.y -= speed;
          if (e.y + 10 <= ladder.y1) {
            e.climbing = false;
            e.y = ladder.y1 - 10;
          }
        } else if (dy > 8) {
          e.y += speed;
          if (e.y + 10 >= ladder.y2) {
            e.climbing = false;
            e.y = ladder.y2 - 10;
          }
        } else {
          // Same height, get off ladder
          e.climbing = false;
        }
      } else {
        e.climbing = false;
      }
    } else {
      // On platform, move horizontally
      const plat = isOnPlatform(e.x, e.y, 8);
      if (plat) {
        // Check if we should use a ladder
        const shouldClimb = _abs(dy) > 20 && rnd(1) < 0.03;
        if (shouldClimb) {
          const ladder = (dy < 0) ? findLadderAbove(e.x, e.y) : findLadderBelow(e.x, e.y);
          if (ladder) {
            e.climbing = true;
            e.x = ladder.x;
            return;
          }
        }

        // Move horizontally toward chef
        if (dx > 4) {
          e.x += speed;
          e.dir = 1;
        } else if (dx < -4) {
          e.x -= speed;
          e.dir = -1;
        }

        // Stay on platform
        e.x = _max(plat.x1, min(plat.x2 - 8, e.x));

        // Snap to platform
        e.y = plat.y - 10;
      } else {
        // Falling - find nearest platform below
        e.y += 2;
        if (e.y > H + 20) e.alive = false;
      }
    }
  }

  resetGame();

  // ============================================================
  // Update
  // ============================================================
  API._update = function() {
    if (state === "title") {
      if (btnp("a") || btnp("a")) {
        state = "play";
        resetGame();
        note(0, "C5", 0.08);
        setTimeout(() => note(0, "E5", 0.08), 80);
        setTimeout(() => note(0, "G5", 0.12), 160);
      }
      return;
    }

    if (state === "gameover") {
      // Update particles
      for (let i = particles.length - 1; i >= 0; i--) {
        const p = particles[i]; p.x += p.vx; p.y += p.vy; p.vy += 0.08; p.life--;
        if (p.life <= 0) particles.splice(i, 1);
      }
      if (btnp("a") || btnp("a")) state = "title";
      return;
    }

    // --- Play state ---
    if (invincibleTimer > 0) invincibleTimer--;

    // Death animation
    if (deathTimer > 0) {
      deathTimer--;
      // Update particles during death
      for (let i = particles.length - 1; i >= 0; i--) {
        const p = particles[i]; p.x += p.vx; p.y += p.vy; p.vy += 0.06; p.life--;
        if (p.life <= 0) particles.splice(i, 1);
      }
      if (deathTimer === 0) {
        if (lives <= 0) {
          state = "gameover";
        } else {
          // Respawn chef
          chef.x = 153;
          chef.y = layout.platYs[2] - 10;
          chef.climbing = false;
          chef.onLadder = false;
          invincibleTimer = 90;
          enemies = [];
          enemySpawnTimer = 90;
        }
      }
      return;
    }

    // Level complete
    if (levelComplete) {
      levelCompleteTimer--;
      if (levelCompleteTimer <= 0) {
        level++;
        pepperCount = min(pepperCount + 2, 10);
        startLevel();
        levelComplete = false;
      }
      return;
    }

    // --- Chef movement ---
    const chefPlat = isOnPlatform(chef.x, chef.y, 8);
    const chefLadder = findLadderAt(chef.x, chef.y, 10);

    if (chef.climbing) {
      // On ladder
      if (btn("up")) {
        chef.y -= chef.speed;
        walkSound();
        chef.walkFrame += 0.2;
        // Check if reached top of ladder
        const ladder = findLadderAt(chef.x, chef.y, 10);
        if (!ladder || chef.y + 10 <= ladder.y1 + 2) {
          // Snap to platform at top
          if (ladder) chef.y = ladder.y1 - 10;
          chef.climbing = false;
        }
      }
      if (btn("down")) {
        chef.y += chef.speed;
        walkSound();
        chef.walkFrame += 0.2;
        const ladder = findLadderAt(chef.x, chef.y, 10);
        if (!ladder || chef.y + 10 >= ladder.y2 - 2) {
          if (ladder) chef.y = ladder.y2 - 10;
          chef.climbing = false;
        }
      }
      // Allow left/right to exit ladder
      if (btn("left") || btn("right")) {
        const p = isOnPlatform(chef.x, chef.y, 8);
        if (p) chef.climbing = false;
      }
    } else {
      // On platform
      let moved = false;
      if (btn("left")) {
        chef.x -= chef.speed;
        chef.dir = -1;
        moved = true;
      }
      if (btn("right")) {
        chef.x += chef.speed;
        chef.dir = 1;
        moved = true;
      }
      if (moved) {
        chef.walkFrame += 0.2;
        walkSound();
      }

      // Climbing
      if (btn("up")) {
        const ladder = findLadderBelow(chef.x, chef.y) || findLadderAt(chef.x, chef.y, 10);
        if (ladder && chef.y + 10 > ladder.y1 - 4) {
          chef.climbing = true;
          chef.x = ladder.x;
        }
      }
      if (btn("down")) {
        const ladder = findLadderBelow(chef.x, chef.y);
        if (ladder) {
          chef.climbing = true;
          chef.x = ladder.x;
        }
      }

      // Stay on platform
      if (chefPlat) {
        chef.y = chefPlat.y - 10;
        chef.x = _max(chefPlat.x1 - 2, min(chefPlat.x2 - 6, chef.x));
      } else if (!chef.climbing) {
        // Falling?? Find closest platform
        chef.y += 2;
        const p2 = isOnPlatform(chef.x, chef.y, 8);
        if (p2) chef.y = p2.y - 10;
      }
    }

    // Keep in bounds
    chef.x = _max(4, min(W - 12, chef.x));
    chef.y = _max(PLAY_TOP, min(PLAY_BOT - 10, chef.y));

    // --- Pepper throw ---
    if (btnp("a") && pepperCount > 0 && peppers.length === 0) {
      pepperCount--;
      peppers.push({
        x: chef.x + (chef.dir > 0 ? 8 : -10),
        y: chef.y - 2,
        dir: chef.dir,
        timer: 20,
      });
      pepperSound();
    }

    // Update peppers
    for (let i = peppers.length - 1; i >= 0; i--) {
      const p = peppers[i];
      p.timer--;
      if (p.timer <= 0) { peppers.splice(i, 1); continue; }

      // Check pepper-enemy collision
      for (const e of enemies) {
        if (e.stunTimer <= 0 && _abs(e.x - p.x) < 12 && _abs(e.y - p.y) < 12) {
          e.stunTimer = 120 + level * 10;
          score += 100;
          bonusSound();
          addParticles(e.x + 4, e.y + 4, 5, 3);
        }
      }
    }

    // --- Check chef walking over ingredients ---
    for (const ing of layout.ingredients) {
      if (ing.settled || ing.dropping) continue;

      // Check if chef is on the same platform and walking over ingredient
      const ingY = ing.y;
      if (_abs(chef.y + 10 - ingY) < 6) {
        // Check left half
        if (!ing.walked[0] && chef.x + 6 > ing.x && chef.x < ing.x + 8) {
          ing.walked[0] = true;
          note(1, "E4", 0.03);
        }
        // Check right half
        if (!ing.walked[1] && chef.x + 6 > ing.x + 8 && chef.x < ing.x + 16) {
          ing.walked[1] = true;
          note(1, "E4", 0.03);
        }

        // Both halves walked = drop it!
        if (ing.walked[0] && ing.walked[1] && !ing.dropping) {
          ing.dropping = true;
          ing.dropSpeed = 0;
          dropSound();
          score += 50;

          // Check if any enemies are on this ingredient
          for (let ei = enemies.length - 1; ei >= 0; ei--) {
            const e = enemies[ei];
            if (_abs(e.y + 10 - ingY) < 8 && e.x + 8 > ing.x && e.x < ing.x + 16) {
              // Enemy gets carried down with ingredient
              e.crushed = true;
              score += 500;
              crushSound();
              addParticles(e.x + 4, e.y + 4, 8, 3);
              enemies.splice(ei, 1);
            }
          }
        }
      }
    }

    // --- Update dropping ingredients ---
    for (const ing of layout.ingredients) {
      if (!ing.dropping || ing.settled) continue;

      ing.dropSpeed = min(ing.dropSpeed + 0.3, 4);
      ing.y += ing.dropSpeed;

      // Check if it lands on another ingredient or reaches final position
      // Find the next ingredient below in the same column that has settled
      let landY = ing.finalY;

      // Check for ingredients below that are settled
      const colIngs = layout.ingredients.filter(
        oi => oi.col === ing.col && oi !== ing && oi.settled && oi.y < landY + 10
      );
      if (colIngs.length > 0) {
        // Land on top of the highest settled ingredient
        const topSettled = colIngs.reduce((a, b) => a.y < b.y ? a : b);
        landY = topSettled.y - 5;
      }

      // Check if ingredient hits an unsettled, non-dropping ingredient below
      for (const other of layout.ingredients) {
        if (other === ing || other.col !== ing.col || other.settled || other.dropping) continue;
        if (other.y > ing.y && other.y < ing.y + 16) {
          // Push it down too!
          other.dropping = true;
          other.dropSpeed = ing.dropSpeed;
          other.walked = [true, true];
          score += 50;

          // Check for enemies on the pushed ingredient
          for (let ei = enemies.length - 1; ei >= 0; ei--) {
            const e = enemies[ei];
            if (_abs(e.y + 10 - other.y) < 8 && e.x + 8 > other.x && e.x < other.x + 16) {
              e.crushed = true;
              score += 500;
              crushSound();
              addParticles(e.x + 4, e.y + 4, 8, 3);
              enemies.splice(ei, 1);
            }
          }
        }
      }

      if (ing.y >= landY) {
        ing.y = landY;
        ing.dropping = false;
        ing.settled = true;
        ing.dropSpeed = 0;
        addParticles(ing.x + 8, ing.y + 4, 4, 2);
        note(1, "C3", 0.05);

        // Check if a full burger is complete in this column
        const colIngs2 = layout.ingredients.filter(oi => oi.col === ing.col);
        const allSettled = colIngs2.every(oi => oi.settled);
        if (allSettled) {
          burgersCompleted++;
          score += 1000;
          bonusSound();
          addParticles(ing.x + 8, ing.y, 12, 3);
          if (burgersCompleted >= totalBurgers) {
            levelComplete = true;
            levelCompleteTimer = 90;
            levelClearSound();
          }
        }
      }

      // Crush enemies below falling ingredient
      for (let ei = enemies.length - 1; ei >= 0; ei--) {
        const e = enemies[ei];
        if (!e.crushed && e.x + 8 > ing.x && e.x < ing.x + 16 &&
            e.y + 8 > ing.y - 2 && e.y < ing.y + 8) {
          score += 500;
          crushSound();
          addParticles(e.x + 4, e.y + 4, 8, 3);
          enemies.splice(ei, 1);
        }
      }
    }

    // --- Enemy spawning ---
    enemySpawnTimer--;
    if (enemySpawnTimer <= 0) {
      spawnEnemy();
      enemySpawnTimer = _max(60, 180 - level * 15) + flr(rnd(60));
    }

    // --- Update enemies ---
    for (let i = enemies.length - 1; i >= 0; i--) {
      const e = enemies[i];
      if (!e.alive) { enemies.splice(i, 1); continue; }
      updateEnemy(e);

      // Enemy-chef collision
      if (invincibleTimer <= 0 && deathTimer <= 0 && e.stunTimer <= 0) {
        if (_abs(e.x - chef.x) < 7 && _abs(e.y - chef.y) < 9) {
          // Chef dies
          lives--;
          deathTimer = 60;
          deathSound();
          addParticles(chef.x + 4, chef.y + 4, 15, 3);
        }
      }
    }

    // --- Update particles ---
    for (let i = particles.length - 1; i >= 0; i--) {
      const p = particles[i];
      p.x += p.vx; p.y += p.vy; p.vy += 0.06; p.life--;
      if (p.life <= 0) particles.splice(i, 1);
    }
  };

  // ============================================================
  // Draw
  // ============================================================
  API._draw = function() {
    cls(0);

    if (state === "title") {
      // Title screen
      const ty = 38 + sin(API.frame * 0.05) * 3;

      text("BURGER TIME", 133, flr(ty), 3);
      rectf(123, flr(ty) + 10, 93, 1, 2);

      // Draw a cute burger
      const bx = W / 2 - 8;
      const by = flr(ty) + 25;
      spr(10, bx, by); spr(11, bx + 8, by);
      spr(14, bx, by + 8); spr(15, bx + 8, by + 8);
      spr(12, bx, by + 14); spr(13, bx + 8, by + 14);
      spr(18, bx, by + 20); spr(19, bx + 8, by + 20);
      spr(16, bx, by + 26); spr(17, bx + 8, by + 26);

      // Chef and enemies
      const ey = flr(ty) + 53;
      spr(1, bx - 20, ey + sin(API.frame * 0.08) * 2);
      spr(20, bx + 20, ey + sin(API.frame * 0.08 + 1) * 2);
      spr(21, bx + 33, ey + sin(API.frame * 0.08 + 2) * 2);
      spr(22, bx + 46, ey + sin(API.frame * 0.08 + 3) * 2);

      if (flr(API.frame / 20) % 2 === 0) text("PRESS START", 133, 150, 3);

      text("-HOW TO PLAY-", 128, 173, 2);
      text("WALK OVER BURGERS TO", 110, 183, 2);
      text("DROP THEM DOWN!", 123, 193, 2);
      text("Z = PEPPER TO STUN ENEMIES", 93, 208, 2);

      text("GRAYBOX DEMO V0.1", 118, 229, 1);
      return;
    }

    if (state === "gameover") {
      for (const p of particles) pix(flr(p.x), flr(p.y), p.color);
      text("GAME OVER", 138, 83, 3);
      text("SCORE: " + score, 138, 101, 2);
      text("LEVEL: " + level, 148, 113, 2);
      if (flr(API.frame / 20) % 2 === 0) text("PRESS START", 133, 150, 3);
      return;
    }

    // --- Play state rendering ---

    // Draw platforms
    for (const p of layout.platforms) {
      rectf(p.x1, p.y, p.x2 - p.x1, 2, 1);
      // Add dashes for texture
      for (let dx = p.x1; dx < p.x2; dx += 6) {
        pix(dx, p.y, 2);
      }
    }

    // Draw ladders
    for (const l of layout.ladders) {
      const lh = l.y2 - l.y1;
      // Rails
      for (let dy = 0; dy < lh; dy++) {
        pix(l.x, l.y1 + dy, 1);
        pix(l.x + 7, l.y1 + dy, 1);
      }
      // Rungs
      for (let dy = 0; dy < lh; dy += 6) {
        for (let dx = 1; dx < 7; dx++) {
          pix(l.x + dx, l.y1 + dy, 1);
        }
      }
    }

    // Draw plate areas at bottom (where burgers stack)
    for (let c = 0; c < layout.numCols; c++) {
      const px = layout.colXs[c] - 2;
      const py = layout.platYs[5] + 2;
      rectf(px, py, 20, 2, 2);
    }

    // Draw ingredients
    for (const ing of layout.ingredients) {
      const y = flr(ing.y) - 5;
      spr(ing.type.sprL, flr(ing.x), y);
      spr(ing.type.sprR, flr(ing.x) + 8, y);

      // Show walk progress - dim out walked portions
      if (!ing.settled && !ing.dropping) {
        if (ing.walked[0]) {
          // Left half walked - show it slightly dropped
          rectf(flr(ing.x), y + 6, 8, 1, 2);
        }
        if (ing.walked[1]) {
          // Right half walked
          rectf(flr(ing.x) + 8, y + 6, 8, 1, 2);
        }
      }
    }

    // Draw pepper clouds
    for (const p of peppers) {
      spr(23, flr(p.x), flr(p.y));
      // Extra particles
      if (p.timer > 10) {
        pix(flr(p.x + rnd(10)), flr(p.y + rnd(10)), 3);
        pix(flr(p.x + rnd(10)), flr(p.y + rnd(10)), 2);
      }
    }

    // Draw enemies
    for (const e of enemies) {
      if (e.stunTimer > 0) {
        // Flash when stunned
        if (flr(API.frame / 4) % 2 === 0) {
          spr(e.type, flr(e.x), flr(e.y), e.dir < 0);
        }
        // Draw stun stars
        spr(28, flr(e.x), flr(e.y - 8));
      } else {
        spr(e.type, flr(e.x), flr(e.y), e.dir < 0);
      }
    }

    // Draw chef
    if (deathTimer <= 0 || flr(API.frame / 3) % 2 === 0) {
      if (invincibleTimer > 0 && flr(API.frame / 3) % 2 === 0) {
        // Blinking during invincibility - skip draw
      } else {
        let sprId;
        if (chef.climbing) {
          sprId = 3;
        } else {
          sprId = (flr(chef.walkFrame) % 2 === 0) ? 1 : 2;
        }
        spr(sprId, flr(chef.x), flr(chef.y), chef.dir < 0);
      }
    }

    // Particles
    for (const p of particles) pix(flr(p.x), flr(p.y), p.color);

    // HUD
    rectf(0, 0, W, HUD_H, 0);
    text("SCORE:" + score, 4, 3, 3);
    text("LV:" + level, W / 2 - 15, 3, 2);
    text("PEPPER:" + pepperCount, W / 2 + 20, 3, 2);

    // Lives
    for (let i = 0; i < lives; i++) spr(26, W - 40 + i * 10, 2);

    // Burgers remaining
    text("BURGERS:" + (totalBurgers - burgersCompleted) + "/" + totalBurgers, 4, 10, 1);

    // Level complete message
    if (levelComplete) {
      rectf(W / 2 - 47, 105, 94, 23, 0);
      rect(W / 2 - 47, 105, 94, 23, 3);
      text("LEVEL CLEAR!", 130, 109, 3);
      text("BONUS: " + (level * 500), 133, 119, 2);
      score += flr(level * 500 / 90); // Gradually add bonus
    }

    // Death message
    if (deathTimer > 30) {
      text("OUCH!", 148, 120, 3);
    }
  };

  // ============================================================
  // Boot
  // ============================================================
  if (API._init) API._init();
  setInterval(tick, 1000 / FPS);
  document.addEventListener("keydown", ensureAudio, { once: true });
  document.addEventListener("click", ensureAudio, { once: true });
})();
</script>
</body>
</html>
