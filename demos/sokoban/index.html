<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GrayBox — Demo: Sokoban</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #0a0a0a;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100vh;
    font-family: monospace;
    overflow: hidden;
  }
  #frame {
    background: #111;
    border: 3px solid #333;
    border-radius: 8px;
    padding: 12px;
    box-shadow: 0 0 40px rgba(0,0,0,0.8), inset 0 0 20px rgba(0,0,0,0.5);
  }
  canvas {
    display: block;
    image-rendering: pixelated;
    image-rendering: crisp-edges;
  }
  #controls {
    margin-top: 12px;
    color: #6b6b6b;
    font-size: 11px;
    text-align: center;
    letter-spacing: 1px;
  }
  #controls span { color: #b0b0b0; }
</style>
</head>
<body>
<div id="frame">
  <canvas id="screen"></canvas>
</div>
<div id="controls">
  <span>ARROWS</span> MOVE &nbsp;&nbsp; <span>X</span> UNDO &nbsp;&nbsp; <span>Z</span> RESTART &nbsp;&nbsp; <span>ENTER</span> START
</div>
<script src="../../runtime/engine.js"></script>
<script>
(() => {
  "use strict";
  const W = GrayBox.WIDTH, H = GrayBox.HEIGHT;
  const { cls, pix, line, rect, rectf, circ, circf, sprite: defSprite,
          spr, text, btn, btnp, note, stop, rnd, flr, abs: _abs,
          min, max: _max, sin, cos } = GrayBox;

  // --- Tile size: 8x8 sprites rendered at 2x = 16x16 per tile ---
  const TS = 16;

  // --- Sprites ---
  // 1: Wall - solid brick pattern
  defSprite(1,
    "33333333" +
    "32222213" +
    "32222213" +
    "33333333" +
    "22333223" +
    "22322223" +
    "22322223" +
    "33333333"
  );
  // 2: Floor - subtle texture
  defSprite(2,
    "00000000" +
    "00000000" +
    "00010000" +
    "00000000" +
    "00000000" +
    "00000100" +
    "00000000" +
    "00000000"
  );
  // 3: Target spot - diamond/X marker on floor
  defSprite(3,
    "00000000" +
    "01000100" +
    "00101000" +
    "00010000" +
    "00101000" +
    "01000100" +
    "00000000" +
    "00000000"
  );
  // 4: Box - wooden crate
  defSprite(4,
    "22222220" +
    "21122110" +
    "21222210" +
    "22211220" +
    "22211220" +
    "21222210" +
    "21122110" +
    "22222220"
  );
  // 5: Box on target - bright highlighted crate
  defSprite(5,
    "33333330" +
    "32233220" +
    "32333230" +
    "33322330" +
    "33322330" +
    "32333230" +
    "32233220" +
    "33333330"
  );
  // 10: Player facing down
  defSprite(10,
    "00222000" +
    "00232000" +
    "02333200" +
    "02323200" +
    "02333200" +
    "00323000" +
    "00202000" +
    "00202000"
  );
  // 11: Player facing up
  defSprite(11,
    "00222000" +
    "00232000" +
    "02333200" +
    "02333200" +
    "02333200" +
    "00323000" +
    "00202000" +
    "00202000"
  );
  // 12: Player facing left
  defSprite(12,
    "00222000" +
    "00232000" +
    "23333200" +
    "02323200" +
    "02333200" +
    "00323000" +
    "00202000" +
    "02000000"
  );
  // 13: Player facing right
  defSprite(13,
    "00222000" +
    "00232000" +
    "02333320" +
    "02323200" +
    "02333200" +
    "00323000" +
    "00202000" +
    "00000200"
  );

  // --- Levels (standard Sokoban notation) ---
  // # = wall, (space) = void, - = floor, . = target
  // @ = player on floor, + = player on target
  // $ = box on floor, * = box on target
  const LEVELS = [
    // Level 1 - Tutorial: 1 box, 1 target
    [
      "######",
      "#----#",
      "#-$@-#",
      "#----#",
      "#-.--#",
      "######",
    ],
    // Level 2 - Two boxes
    [
      "#######",
      "#.----#",
      "#--$--#",
      "#--@--#",
      "#--$--#",
      "#----.#",
      "#######",
    ],
    // Level 3 - L-shape room
    [
      "  ####",
      "###--#",
      "#.$--#",
      "#--$-#",
      "#.@###",
      "####  ",
    ],
    // Level 4 - Side pockets
    [
      "#######",
      "#--#--#",
      "#.$.$-#",
      "#--@--#",
      "#--#--#",
      "#######",
    ],
    // Level 5 - Three targets
    [
      " ######",
      "##----#",
      "#--$--#",
      "#.#.#.#",
      "#-$-$-#",
      "#--@--#",
      "#######",
    ],
    // Level 6 - Winding
    [
      "########",
      "#------#",
      "#-#--#-#",
      "#--$$--#",
      "#.@--.#",
      "#-#--#-#",
      "#------#",
      "########",
    ],
    // Level 7 - Three boxes offset
    [
      " ######",
      "##----#",
      "#--$--#",
      "#-.#.-#",
      "#---$-#",
      "#-@-.-#",
      "#--$--#",
      "#######",
    ],
    // Level 8 - Three box challenge
    [
      "########",
      "#------#",
      "#-$.#--#",
      "#------#",
      "#-#-$--#",
      "#--.-$-#",
      "#-@-.--#",
      "########",
    ],
    // Level 9 - Tight squeeze
    [
      " ######",
      " #----#",
      "##-$$-#",
      "#--##-#",
      "#-..-@#",
      "#-----#",
      "#######",
    ],
    // Level 10 - Four corners
    [
      "#########",
      "#.-----#",
      "#--#-#--#",
      "#--$-$--#",
      "#.--@--.#",
      "#--$-$--#",
      "#--#-#--#",
      "#------.#",
      "#########",
    ],
    // Level 11 - Maze corridors
    [
      "########",
      "#--.---#",
      "#-#$##-#",
      "#----$-#",
      "##-##--#",
      "#--$-.-#",
      "#-@-.--#",
      "########",
    ],
    // Level 12 - Grand finale: 6 boxes
    [
      "#########",
      "#---#---#",
      "#-$-.-$-#",
      "#-.#-#.-#",
      "##-$@$-##",
      "#-.#-#.-#",
      "#-$-.-$-#",
      "#---#---#",
      "#########",
    ],
  ];

  // --- Parse level ---
  function parseLevel(lvlIdx) {
    const rows = LEVELS[lvlIdx];
    const h = rows.length;
    let w = 0;
    for (const r of rows) if (r.length > w) w = r.length;
    const g = [];
    const bxs = [];
    const tgts = [];
    let px = 0, py = 0;
    for (let y = 0; y < h; y++) {
      g[y] = [];
      for (let x = 0; x < w; x++) {
        const ch = x < rows[y].length ? rows[y][x] : ' ';
        switch (ch) {
          case '#': g[y][x] = 1; break;
          case '-': g[y][x] = 2; break;
          case '.': g[y][x] = 3; tgts.push({x,y}); break;
          case '@': g[y][x] = 2; px=x; py=y; break;
          case '+': g[y][x] = 3; px=x; py=y; tgts.push({x,y}); break;
          case '$': g[y][x] = 2; bxs.push({x,y}); break;
          case '*': g[y][x] = 3; bxs.push({x,y}); tgts.push({x,y}); break;
          default:  g[y][x] = 0; break;
        }
      }
    }
    return { grid: g, w, h, boxes: bxs, targets: tgts, px, py };
  }

  // --- Game State ---
  let state = "title";
  let level = 0;
  let grid, gridW, gridH;
  let playerX, playerY, playerDir;
  let boxes, targets;
  let moves, pushes;
  let history;
  let completeTimer;
  let selectCursor = 0;
  let maxLevelReached = 0;
  let animTimer = 0;

  const PLAYER_SPR = [10, 11, 12, 13]; // down, up, left, right

  function loadLevel(lvlIdx) {
    const data = parseLevel(lvlIdx);
    grid = data.grid;
    gridW = data.w;
    gridH = data.h;
    playerX = data.px;
    playerY = data.py;
    playerDir = 0;
    boxes = data.boxes.map(b => ({...b}));
    targets = data.targets;
    moves = 0;
    pushes = 0;
    history = [];
    completeTimer = 0;
    animTimer = 0;
  }

  function resetCurrentLevel() {
    loadLevel(level);
    note(0, "C3", 0.08);
    note(1, "E3", 0.08);
  }

  // --- Helpers ---
  function boxAt(x, y) {
    for (let i = 0; i < boxes.length; i++) {
      if (boxes[i].x === x && boxes[i].y === y) return i;
    }
    return -1;
  }

  function isWall(x, y) {
    if (y < 0 || y >= gridH || x < 0 || x >= gridW) return true;
    return grid[y][x] === 1 || grid[y][x] === 0;
  }

  function isTarget(x, y) {
    for (const t of targets) {
      if (t.x === x && t.y === y) return true;
    }
    return false;
  }

  function checkWin() {
    for (const t of targets) {
      if (boxAt(t.x, t.y) === -1) return false;
    }
    return true;
  }

  function tryMove(dx, dy) {
    const nx = playerX + dx;
    const ny = playerY + dy;

    if (dy > 0) playerDir = 0;
    else if (dy < 0) playerDir = 1;
    else if (dx < 0) playerDir = 2;
    else if (dx > 0) playerDir = 3;

    if (isWall(nx, ny)) return;

    const bi = boxAt(nx, ny);
    if (bi >= 0) {
      const bx = nx + dx;
      const by = ny + dy;
      if (isWall(bx, by) || boxAt(bx, by) >= 0) return;

      history.push({ px: playerX, py: playerY, dir: playerDir, boxIdx: bi, bx: boxes[bi].x, by: boxes[bi].y });
      boxes[bi].x = bx;
      boxes[bi].y = by;
      playerX = nx;
      playerY = ny;
      moves++;
      pushes++;

      note(0, "D4", 0.06);
      note(1, "A3", 0.06);

      if (checkWin()) {
        completeTimer = 90;
        state = "complete";
        if (level + 1 > maxLevelReached) maxLevelReached = level + 1;
        note(0, "C5", 0.15);
        setTimeout(() => { try { note(0, "E5", 0.15); } catch(e){} }, 150);
        setTimeout(() => { try { note(0, "G5", 0.25); } catch(e){} }, 300);
        setTimeout(() => { try { note(1, "C6", 0.3); } catch(e){} }, 450);
      }
    } else {
      history.push({ px: playerX, py: playerY, dir: playerDir, boxIdx: -1, bx: 0, by: 0 });
      playerX = nx;
      playerY = ny;
      moves++;
      note(0, "G3", 0.03);
    }
  }

  function undo() {
    if (history.length === 0) return;
    const h = history.pop();
    playerX = h.px;
    playerY = h.py;
    playerDir = h.dir;
    if (h.boxIdx >= 0) {
      boxes[h.boxIdx].x = h.bx;
      boxes[h.boxIdx].y = h.by;
      pushes--;
    }
    moves--;
    note(1, "E3", 0.04);
  }

  // --- Draw a sprite at 2x scale ---
  function spr2x(id, sx, sy) {
    const s = sprites[id]; if (!s) return;
    sx = Math.floor(sx); sy = Math.floor(sy);
    for (let py = 0; py < 8; py++) {
      for (let px = 0; px < 8; px++) {
        const c = s[py * 8 + px];
        const dx = sx + px * 2;
        const dy = sy + py * 2;
        for (let yy = 0; yy < 2; yy++) {
          for (let xx = 0; xx < 2; xx++) {
            const fx = dx + xx, fy = dy + yy;
            if (fx >= 0 && fx < W && fy >= 0 && fy < H) {
              buf32[fy * W + fx] = COLOR_U32[c];
            }
          }
        }
      }
    }
  }

  function textCenter(str, y, c) {
    const len = str.length * (FONT_W + 1) - 1;
    text(str, flr((W - len) / 2), y, c);
  }

  // ============ Title Screen ============
  function updateTitle() {
    animTimer++;
    if (btnp("a")) {
      state = "select";
      selectCursor = min(maxLevelReached, LEVELS.length - 1);
      note(0, "C4", 0.1);
    }
  }

  function drawTitle() {
    cls(0);

    // Title text - large
    const ty = 38;
    textCenter("S O K O B A N", ty, 3);
    // Underline
    const ul = 13 * (FONT_W + 1) - 1;
    line(flr((W - ul) / 2), ty + 8, flr((W + ul) / 2), ty + 8, 2);

    // Draw decorative scene
    const cx = flr(W / 2);
    const sy = 82;
    // Floor row
    for (let i = -4; i <= 4; i++) spr2x(2, cx + i * TS - 8, sy);
    // Walls on sides
    spr2x(1, cx - 4 * TS - 8, sy);
    spr2x(1, cx + 4 * TS - 8, sy);
    // Wall top row
    for (let i = -4; i <= 4; i++) spr2x(1, cx + i * TS - 8, sy - TS);
    // Wall bottom row
    for (let i = -4; i <= 4; i++) spr2x(1, cx + i * TS - 8, sy + TS);

    // Animated player pushing box toward target
    const phase = flr(animTimer / 30) % 6;
    const pOff = min(phase, 3);
    spr2x(PLAYER_SPR[3], cx - 3 * TS - 8 + pOff * TS, sy); // player
    spr2x(4, cx - 2 * TS - 8 + pOff * TS, sy); // box
    spr2x(3, cx + 2 * TS - 8, sy); // target

    // Blinking prompt
    if (flr(animTimer / 20) % 2 === 0) {
      textCenter("PRESS ENTER", 150, 2);
    }

    textCenter("PUSH ALL BOXES ONTO TARGETS", 180, 1);
    textCenter("ARROWS:MOVE  X:UNDO  Z:RESTART", 195, 1);
  }

  // ============ Level Select ============
  function updateSelect() {
    const maxIdx = min(maxLevelReached, LEVELS.length - 1);
    if (btnp("up")) {
      selectCursor--;
      if (selectCursor < 0) selectCursor = maxIdx;
      note(0, "C4", 0.03);
    }
    if (btnp("down")) {
      selectCursor++;
      if (selectCursor > maxIdx) selectCursor = 0;
      note(0, "C4", 0.03);
    }
    if (btnp("a") || btnp("a")) {
      level = selectCursor;
      loadLevel(level);
      state = "play";
      note(0, "E4", 0.1);
      note(1, "C4", 0.1);
    }
    if (btnp("b")) {
      state = "title";
      note(0, "C3", 0.06);
    }
  }

  function drawSelect() {
    cls(0);
    textCenter("SELECT LEVEL", 12, 3);

    const maxShow = min(LEVELS.length, maxLevelReached + 1);
    const perPage = 12;
    const page = flr(selectCursor / perPage);
    const startI = page * perPage;
    const endI = min(startI + perPage, maxShow);

    const startY = 30;
    for (let i = startI; i < endI; i++) {
      const y = startY + (i - startI) * 15;
      const sel = (i === selectCursor);
      const c = sel ? 3 : 2;
      const prefix = sel ? "> " : "  ";
      text(prefix + "LEVEL " + (i + 1), 113, y, c);
      // Small box icon for completed levels
      if (i < maxLevelReached) {
        spr(5, 103, y - 1);
      }
    }
    if (maxShow < LEVELS.length) {
      const y = startY + (endI - startI) * 15;
      text("  ...", 113, y, 1);
    }

    textCenter("ENTER:START  X:BACK", 225, 1);
  }

  // ============ Play State ============
  function updatePlay() {
    animTimer++;
    if (btnp("up")) tryMove(0, -1);
    if (btnp("down")) tryMove(0, 1);
    if (btnp("left")) tryMove(-1, 0);
    if (btnp("right")) tryMove(1, 0);
    if (btnp("b")) undo();
    if (btnp("a")) resetCurrentLevel();
  }

  function drawPlay() {
    cls(0);

    // Calculate offset to center the level
    const ox = flr((W - gridW * TS) / 2);
    const oy = flr((H - gridH * TS) / 2) + 8;

    // Draw grid tiles
    for (let y = 0; y < gridH; y++) {
      for (let x = 0; x < gridW; x++) {
        const t = grid[y][x];
        const sx = ox + x * TS;
        const sy = oy + y * TS;
        if (t === 1) spr2x(1, sx, sy);
        else if (t === 2) spr2x(2, sx, sy);
        else if (t === 3) spr2x(3, sx, sy);
      }
    }

    // Draw boxes
    for (const b of boxes) {
      const onTarget = isTarget(b.x, b.y);
      spr2x(onTarget ? 5 : 4, ox + b.x * TS, oy + b.y * TS);
    }

    // Draw player (blink on target to show it)
    spr2x(PLAYER_SPR[playerDir], ox + playerX * TS, oy + playerY * TS);

    // HUD - top bar
    rectf(0, 0, W, 14, 0);
    text("LV." + (level + 1), 4, 2, 3);
    text("MOVES:" + moves, 40, 2, 2);
    text("PUSH:" + pushes, 107, 2, 2);

    // Target progress
    let done = 0;
    for (const t of targets) {
      if (boxAt(t.x, t.y) >= 0) done++;
    }
    const prog = done + "/" + targets.length;
    text(prog, W - prog.length * 5 - 4, 2, done === targets.length ? 3 : 2);

    // Controls hint
    text("X:UNDO Z:RESET", 4, H - 10, 1);

    // Undo available indicator
    if (history.length > 0) {
      text("UNDO:" + history.length, W - 37, H - 10, 1);
    }
  }

  // ============ Level Complete ============
  function updateComplete() {
    completeTimer--;
    animTimer++;
    if (completeTimer <= 0 || btnp("a")) {
      if (level + 1 >= LEVELS.length) {
        state = "allclear";
        animTimer = 0;
      } else {
        level++;
        loadLevel(level);
        state = "play";
      }
    }
  }

  function drawComplete() {
    drawPlay();

    // Dark overlay
    for (let i = 0; i < buf32.length; i++) {
      const v = buf32[i];
      const r = ((v & 0xFF) >> 1);
      const g = (((v >> 8) & 0xFF) >> 1);
      const b = (((v >> 16) & 0xFF) >> 1);
      buf32[i] = (255 << 24) | (b << 16) | (g << 8) | r;
    }

    // Popup box
    const bw = 200, bh = 52;
    const bx = flr((W - bw) / 2);
    const by = flr((H - bh) / 2);
    rectf(bx, by, bw, bh, 0);
    rect(bx, by, bw, bh, 3);
    rect(bx + 2, by + 2, bw - 4, bh - 4, 2);

    textCenter("LEVEL COMPLETE!", by + 10, 3);
    textCenter("MOVES: " + moves + "  PUSHES: " + pushes, by + 24, 2);

    if (flr(animTimer / 15) % 2 === 0) {
      if (level + 1 >= LEVELS.length) {
        textCenter("ALL LEVELS DONE!", by + 38, 3);
      } else {
        textCenter("NEXT LEVEL...", by + 38, 2);
      }
    }
  }

  // ============ All Clear ============
  function updateAllClear() {
    animTimer++;
    if (btnp("a")) {
      state = "title";
    }
  }

  function drawAllClear() {
    cls(0);
    textCenter("CONGRATULATIONS!", 52, 3);
    textCenter("ALL PUZZLES SOLVED!", 71, 2);

    // Spinning boxes celebration
    const cx = flr(W / 2);
    const cy = 135;
    for (let i = 0; i < 6; i++) {
      const angle = animTimer * 0.04 + i * 1.047;
      const bx = cx + flr(cos(angle) * 47) - 8;
      const by = cy + flr(sin(angle) * 26) - 8;
      spr2x(5, bx, by);
    }
    // Player in center
    const pd = flr(animTimer / 15) % 4;
    spr2x(PLAYER_SPR[pd], cx - 8, cy - 8);

    if (flr(animTimer / 20) % 2 === 0) {
      textCenter("PRESS ENTER", 195, 2);
    }
    textCenter("THANKS FOR PLAYING!", 214, 1);
  }

  // ============ Main Loop ============
  GrayBox._update = function() {
    switch (state) {
      case "title": updateTitle(); break;
      case "select": updateSelect(); break;
      case "play": updatePlay(); break;
      case "complete": updateComplete(); break;
      case "allclear": updateAllClear(); break;
    }
  };

  GrayBox._draw = function() {
    switch (state) {
      case "title": drawTitle(); break;
      case "select": drawSelect(); break;
      case "play": drawPlay(); break;
      case "complete": drawComplete(); break;
      case "allclear": drawAllClear(); break;
    }
  };

  // Initialize
  loadLevel(0);

  GrayBox.boot("screen");
})();
</script>
</body>
</html>
