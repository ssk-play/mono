<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GrayBox — Demo: Tower Defense</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #0a0a0a;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100vh;
    font-family: monospace;
    overflow: hidden;
  }
  #frame {
    background: #111;
    border: 3px solid #333;
    border-radius: 8px;
    padding: 12px;
    box-shadow: 0 0 40px rgba(0,0,0,0.8), inset 0 0 20px rgba(0,0,0,0.5);
  }
  canvas {
    display: block;
    image-rendering: pixelated;
    image-rendering: crisp-edges;
  }
  #controls {
    margin-top: 12px;
    color: #6b6b6b;
    font-size: 11px;
    text-align: center;
    letter-spacing: 1px;
  }
  #controls span { color: #b0b0b0; }
</style>
</head>
<body>
<div id="frame">
  <canvas id="screen"></canvas>
</div>
<div id="controls">
  <span>ARROWS</span> CURSOR &nbsp;&nbsp; <span>A</span> PLACE TOWER &nbsp;&nbsp; <span>B</span> CYCLE TYPE
</div>
<script src="../../runtime/engine.js"></script>
<script>
(() => {
  "use strict";
  const W = GrayBox.WIDTH, H = GrayBox.HEIGHT;
  const { cls, pix, line, rect, rectf, circ, circf, sprite: defSprite,
          spr, text, btn, btnp, note, stop, rnd, flr, abs: _abs,
          min, max: _max, sin, cos } = GrayBox;

  // --- Constants ---
  const CELL = 16; // grid cell size
  const GRID_W = 20; // 320 / 16
  const GRID_H = 13; // 208 / 16 (leave room for HUD at top and bottom)
  const HUD_TOP = 9;
  const GRID_OX = 0;
  const GRID_OY = HUD_TOP;
  const MAX_WAVES = 20;

  // Tower types: 0=basic, 1=sniper, 2=rapid
  const TOWER_TYPES = [
    { name: "BASIC",  cost: 10, range: 48, rate: 20, dmg: 1, color: 3, sprId: 20 },
    { name: "SNIPER", cost: 20, range: 96, rate: 50, dmg: 3, color: 2, sprId: 21 },
    { name: "RAPID",  cost: 15, range: 32, rate: 8,  dmg: 1, color: 3, sprId: 22 },
  ];

  // --- Path definition (grid coords) ---
  // A winding path from left to right
  const PATH = [
    {x:0,y:3},{x:1,y:3},{x:2,y:3},{x:3,y:3},{x:4,y:3},{x:5,y:3},
    {x:5,y:4},{x:5,y:5},{x:5,y:6},{x:5,y:7},
    {x:6,y:7},{x:7,y:7},{x:8,y:7},{x:9,y:7},
    {x:9,y:6},{x:9,y:5},{x:9,y:4},{x:9,y:3},{x:9,y:2},
    {x:10,y:2},{x:11,y:2},{x:12,y:2},{x:13,y:2},
    {x:13,y:3},{x:13,y:4},{x:13,y:5},{x:13,y:6},{x:13,y:7},{x:13,y:8},{x:13,y:9},{x:13,y:10},
    {x:14,y:10},{x:15,y:10},{x:16,y:10},
    {x:16,y:9},{x:16,y:8},{x:16,y:7},{x:16,y:6},{x:16,y:5},
    {x:17,y:5},{x:18,y:5},{x:19,y:5},
  ];

  // Build a set for fast path lookup
  const pathSet = new Set();
  for (const p of PATH) pathSet.add(p.x + "," + p.y);

  // --- Sprites ---
  // 20: Basic tower
  defSprite(20,
    "00033000" +
    "00333300" +
    "03322330" +
    "03322330" +
    "03333330" +
    "03333330" +
    "00333300" +
    "01111110"
  );
  // 21: Sniper tower (tall, thin barrel)
  defSprite(21,
    "00033300" +
    "00020000" +
    "00020000" +
    "00222000" +
    "02222200" +
    "02211220" +
    "02222200" +
    "01111110"
  );
  // 22: Rapid tower (wide, multiple barrels)
  defSprite(22,
    "03300330" +
    "03300330" +
    "03333330" +
    "33333333" +
    "33322333" +
    "33322333" +
    "03333330" +
    "01111110"
  );
  // 30: Basic enemy (small walker)
  defSprite(30,
    "00000000" +
    "00111100" +
    "01233210" +
    "01333310" +
    "01333310" +
    "00133100" +
    "00100100" +
    "00000000"
  );
  // 31: Fast enemy
  defSprite(31,
    "00000000" +
    "00322300" +
    "03222230" +
    "32222223" +
    "32222223" +
    "03222230" +
    "00322300" +
    "00000000"
  );
  // 32: Tank enemy (big, slow)
  defSprite(32,
    "01111110" +
    "13333331" +
    "13322331" +
    "13333331" +
    "13333331" +
    "13322331" +
    "13333331" +
    "01111110"
  );
  // 33: Bullet
  defSprite(33,
    "00000000" +
    "00000000" +
    "00000000" +
    "00033000" +
    "00033000" +
    "00000000" +
    "00000000" +
    "00000000"
  );
  // 34: Cursor
  defSprite(34,
    "33333333" +
    "30000003" +
    "30000003" +
    "30000003" +
    "30000003" +
    "30000003" +
    "30000003" +
    "33333333"
  );
  // 35: Heart/life icon
  defSprite(35,
    "00000000" +
    "03303300" +
    "33333330" +
    "33333330" +
    "03333300" +
    "00333000" +
    "00030000" +
    "00000000"
  );

  // --- Scenes ---
  const { TITLE, PLAY, GAMEOVER } = GrayBox.SCENE;

  let grid; // 2D array: 0=empty, -1=path, >0=tower index+1
  let towers, enemies, bullets, particles;
  let cursorX, cursorY, selectedType;
  let gold, score, lives;
  let wave, waveTimer, waveActive, waveEnemiesLeft, waveSpawnTimer, waveSpawnCount;
  let waveMessage, waveMessageTimer;
  let gameWon;
  let titleAnim;

  function resetGame() {
    grid = [];
    for (let y = 0; y < GRID_H; y++) {
      grid[y] = [];
      for (let x = 0; x < GRID_W; x++) {
        grid[y][x] = pathSet.has(x + "," + y) ? -1 : 0;
      }
    }
    towers = [];
    enemies = [];
    bullets = [];
    particles = [];
    cursorX = 10;
    cursorY = 6;
    selectedType = 0;
    gold = 40;
    score = 0;
    lives = 10;
    wave = 0;
    waveTimer = 0;
    waveActive = false;
    waveEnemiesLeft = 0;
    waveSpawnTimer = 0;
    waveSpawnCount = 0;
    waveMessage = "";
    waveMessageTimer = 0;
    gameWon = false;
    startNextWave();
  }

  function startNextWave() {
    wave++;
    if (wave > MAX_WAVES) {
      gameWon = true;
      gameWon = true;
      GrayBox.go(GAMEOVER);
      return;
    }
    waveActive = true;
    // Enemies per wave: scales up
    waveSpawnCount = 5 + wave * 2;
    waveEnemiesLeft = waveSpawnCount;
    waveSpawnTimer = 0;
    waveMessage = "WAVE " + wave;
    waveMessageTimer = 60;
  }

  function spawnEnemy() {
    // Pick enemy type based on wave
    let type = 0; // basic
    let r = Math.random();
    if (wave >= 5 && r < 0.3) type = 1;  // fast
    if (wave >= 8 && r < 0.15) type = 2; // tank
    if (wave >= 12 && r < 0.25) type = 2;

    const baseHp = [3, 2, 10];
    const baseSpeed = [0.02, 0.04, 0.012];
    const hpScale = 1 + (wave - 1) * 0.4;

    enemies.push({
      type: type,
      pathIdx: 0,       // float index along PATH
      hp: flr(baseHp[type] * hpScale),
      maxHp: flr(baseHp[type] * hpScale),
      speed: baseSpeed[type] + wave * 0.001,
      x: PATH[0].x * CELL + GRID_OX,
      y: PATH[0].y * CELL + GRID_OY,
      reward: [2, 3, 5][type] + flr(wave / 3),
      points: [10, 15, 30][type],
      sprId: 30 + type,
      hitFlash: 0,
    });
  }

  function dist(x1, y1, x2, y2) {
    const dx = x1 - x2, dy = y1 - y2;
    return Math.sqrt(dx * dx + dy * dy);
  }

  function addParticles(x, y, count, col) {
    for (let i = 0; i < count; i++) {
      particles.push({
        x: x, y: y,
        vx: rnd(3) - 1.5, vy: rnd(3) - 1.5,
        life: 8 + flr(rnd(12)),
        color: col || (flr(rnd(3)) + 1),
      });
    }
  }

  // --- Sounds ---
  function sndPlace() { note(0, "E5", 0.05); setTimeout(() => note(0, "G5", 0.06), 50); }
  function sndShoot() { note(1, "A5", 0.02); }
  function sndKill() { note(0, "C4", 0.04); setTimeout(() => note(0, "E4", 0.04), 40); }
  function sndLeak() { note(0, "C3", 0.1); note(1, "G2", 0.1); }
  function sndWave() {
    note(0, "C5", 0.08);
    setTimeout(() => note(0, "E5", 0.08), 80);
    setTimeout(() => note(0, "G5", 0.12), 160);
  }
  function sndError() { note(0, "C3", 0.08); }
  function sndWin() {
    note(0, "C5", 0.1); setTimeout(() => note(0, "E5", 0.1), 120);
    setTimeout(() => note(0, "G5", 0.1), 240); setTimeout(() => note(0, "C6", 0.2), 360);
  }
  function sndCycle() { note(1, "E5", 0.03); }

  // --- Title Scene ---
  GrayBox.scene(TITLE, {
    init() { resetGame(); },
    update() {
      if (btnp("a") || btnp("a")) { sndWave(); GrayBox.go(PLAY); return; }
    },
    draw() {
      cls(0);
      const ty = 37 + sin(GrayBox.frame * 0.04) * 3;
      text("TOWER DEFENSE", 112, flr(ty), 3);
      rectf(107, flr(ty) + 9, 107, 1, 2);
      const bx = 113; const by = flr(ty) + 21;
      spr(20, bx, by + sin(GrayBox.frame * 0.06) * 2);
      spr(21, bx + 33, by + sin(GrayBox.frame * 0.06 + 1.5) * 2);
      spr(22, bx + 67, by + sin(GrayBox.frame * 0.06 + 3) * 2);
      for (let i = 0; i < 5; i++) { const ex = 93 + i * 30 + sin(GrayBox.frame * 0.05 + i) * 6; const ey = flr(ty) + 45 + sin(GrayBox.frame * 0.08 + i * 0.7) * 3; spr(30 + (i % 3), flr(ex), flr(ey)); }
      if (flr(GrayBox.frame / 20) % 2 === 0) text("PRESS A TO START", 113, 135, 3);
      text("-- TOWERS --", 124, 154, 2);
      spr(20, 113, 164); text("BASIC   10G  MED RANGE", 121, 165, 2);
      spr(21, 113, 174); text("SNIPER  20G  LONG RANGE", 121, 176, 2);
      spr(22, 113, 184); text("RAPID   15G  SHORT RANGE", 121, 186, 2);
      text("SURVIVE 20 WAVES!", 117, 206, 3);
      text("GRAYBOX DEMO V0.1", 112, 229, 1);
    }
  });

  // --- Game Over Scene ---
  GrayBox.scene(GAMEOVER, {
    init() {},
    update() {
      for (let i = particles.length - 1; i >= 0; i--) { const p = particles[i]; p.x += p.vx; p.y += p.vy; p.vy += 0.06; p.life--; if (p.life <= 0) particles.splice(i, 1); }
      if (btnp("a") || btnp("a")) { GrayBox.go(TITLE); return; }
    },
    draw() {
      cls(0);
      for (const p of particles) pix(flr(p.x), flr(p.y), p.color);
      if (gameWon) { text("VICTORY!", 133, 75, 3); text("ALL 20 WAVES CLEARED!", 108, 94, 2); }
      else { text("GAME OVER", 130, 75, 3); text("REACHED WAVE " + wave, 122, 94, 2); }
      text("SCORE: " + score, 130, 113, 2);
      text("TOWERS BUILT: " + towers.length, 117, 124, 1);
      if (flr(GrayBox.frame / 20) % 2 === 0) text("PRESS A TO CONTINUE", 105, 158, 3);
    }
  });

  // --- Play Scene ---
  GrayBox.scene(PLAY, {
    init() { resetGame(); },
    update() {

    // Cursor movement (with repeat delay)
    if (btnp("up")) cursorY = _max(0, cursorY - 1);
    if (btnp("down")) cursorY = min(GRID_H - 1, cursorY + 1);
    if (btnp("left")) cursorX = _max(0, cursorX - 1);
    if (btnp("right")) cursorX = min(GRID_W - 1, cursorX + 1);

    // Cycle tower type
    if (btnp("b")) {
      selectedType = (selectedType + 1) % TOWER_TYPES.length;
      sndCycle();
    }

    // Place tower
    if (btnp("a")) {
      const tt = TOWER_TYPES[selectedType];
      if (grid[cursorY][cursorX] === 0 && gold >= tt.cost) {
        grid[cursorY][cursorX] = towers.length + 1;
        towers.push({
          type: selectedType,
          gx: cursorX,
          gy: cursorY,
          x: cursorX * CELL + GRID_OX + 4,
          y: cursorY * CELL + GRID_OY + 4,
          cooldown: 0,
          angle: 0,
          target: null,
        });
        gold -= tt.cost;
        sndPlace();
      } else if (grid[cursorY][cursorX] !== 0) {
        sndError();
      } else if (gold < tt.cost) {
        sndError();
      }
    }

    // Wave message timer
    if (waveMessageTimer > 0) waveMessageTimer--;

    // Spawn enemies
    if (waveActive && waveEnemiesLeft > 0) {
      waveSpawnTimer--;
      if (waveSpawnTimer <= 0) {
        spawnEnemy();
        waveEnemiesLeft--;
        waveSpawnTimer = _max(8, 30 - wave);
      }
    }

    // Update enemies along path
    for (let i = enemies.length - 1; i >= 0; i--) {
      const e = enemies[i];
      e.pathIdx += e.speed;
      if (e.hitFlash > 0) e.hitFlash--;

      const idx = flr(e.pathIdx);
      if (idx >= PATH.length - 1) {
        // Enemy reached the end
        lives--;
        sndLeak();
        addParticles(e.x + 4, e.y + 4, 6, 1);
        enemies.splice(i, 1);
        if (lives <= 0) {
          gameWon = false;
          GrayBox.go(GAMEOVER); return;
        }
        continue;
      }

      // Interpolate position between path nodes
      const frac = e.pathIdx - idx;
      const p0 = PATH[idx];
      const p1 = PATH[min(idx + 1, PATH.length - 1)];
      e.x = (p0.x + (p1.x - p0.x) * frac) * CELL + GRID_OX;
      e.y = (p0.y + (p1.y - p0.y) * frac) * CELL + GRID_OY;
    }

    // Tower AI
    for (const t of towers) {
      const tt = TOWER_TYPES[t.type];
      t.cooldown = _max(0, t.cooldown - 1);

      // Find nearest enemy in range
      let nearest = null;
      let nearDist = Infinity;
      for (const e of enemies) {
        const d = dist(t.x, t.y, e.x + 4, e.y + 4);
        if (d <= tt.range && d < nearDist) {
          nearest = e;
          nearDist = d;
        }
      }

      t.target = nearest;

      if (nearest) {
        // Point at target
        t.angle = Math.atan2(nearest.y + 4 - t.y, nearest.x + 4 - t.x);

        // Shoot
        if (t.cooldown <= 0) {
          t.cooldown = tt.rate;
          const bx = t.x;
          const by = t.y;
          const speed = t.type === 1 ? 6 : 4;
          const dx = nearest.x + 4 - bx;
          const dy = nearest.y + 4 - by;
          const d = Math.sqrt(dx * dx + dy * dy) || 1;
          bullets.push({
            x: bx, y: by,
            vx: dx / d * speed,
            vy: dy / d * speed,
            dmg: tt.dmg,
            life: 30,
          });
          sndShoot();
        }
      }
    }

    // Update bullets
    for (let i = bullets.length - 1; i >= 0; i--) {
      const b = bullets[i];
      b.x += b.vx;
      b.y += b.vy;
      b.life--;
      if (b.life <= 0 || b.x < 0 || b.x > W || b.y < 0 || b.y > H) {
        bullets.splice(i, 1);
        continue;
      }

      // Hit enemies
      for (let j = enemies.length - 1; j >= 0; j--) {
        const e = enemies[j];
        if (dist(b.x, b.y, e.x + 4, e.y + 4) < 7) {
          e.hp -= b.dmg;
          e.hitFlash = 4;
          bullets.splice(i, 1);
          if (e.hp <= 0) {
            score += e.points;
            gold += e.reward;
            addParticles(e.x + 4, e.y + 4, 10, 3);
            sndKill();
            enemies.splice(j, 1);
          }
          break;
        }
      }
    }

    // Update particles
    for (let i = particles.length - 1; i >= 0; i--) {
      const p = particles[i];
      p.x += p.vx; p.y += p.vy; p.vy += 0.05; p.life--;
      if (p.life <= 0) particles.splice(i, 1);
    }

    // Check wave complete
    if (waveActive && waveEnemiesLeft <= 0 && enemies.length === 0) {
      waveActive = false;
      waveTimer = 90; // delay before next wave
      gold += 5 + wave * 2; // wave clear bonus
      if (wave >= MAX_WAVES) {
        gameWon = true;
        sndWin();
        GrayBox.go(GAMEOVER); return;
      }
    }

    // Countdown to next wave
    if (!waveActive) {
      waveTimer--;
      if (waveTimer <= 0) { startNextWave(); sndWave(); }
    }
    },
    draw() {
      cls(0);
      for (let gy = 0; gy < GRID_H; gy++) { for (let gx = 0; gx < GRID_W; gx++) { const px = gx * CELL + GRID_OX; const py = gy * CELL + GRID_OY; if (grid[gy][gx] === 0 && (gx + gy) % 2 === 0) pix(px + 4, py + 4, 1); } }
      for (let i = 0; i < PATH.length; i++) { const p = PATH[i]; rectf(p.x * CELL + GRID_OX, p.y * CELL + GRID_OY, CELL, CELL, 1); }
      for (let i = 0; i < PATH.length - 1; i += 3) { const p = PATH[i]; const pn = PATH[i + 1]; const cx = p.x * CELL + GRID_OX + 8; const cy = p.y * CELL + GRID_OY + 8; const dx = pn.x - p.x; const dy = pn.y - p.y; pix(cx + dx * 3, cy + dy * 3, 2); pix(cx + dx * 4, cy + dy * 4, 2); }
      const ps = PATH[0]; const pe = PATH[PATH.length - 1];
      text("IN", ps.x * CELL + GRID_OX + 2, ps.y * CELL + GRID_OY + 5, 3);
      text("END", pe.x * CELL + GRID_OX - 2, pe.y * CELL + GRID_OY + 5, 3);
      for (const t of towers) { const tt = TOWER_TYPES[t.type]; spr(tt.sprId, t.gx * CELL + GRID_OX + 4, t.gy * CELL + GRID_OY + 4); if (t.target) { const lx = t.x + cos(t.angle) * 8; const ly = t.y + sin(t.angle) * 8; line(t.x, t.y, flr(lx), flr(ly), 2); } if (cursorX === t.gx && cursorY === t.gy) circ(t.x, t.y, tt.range, 1); }
      for (const e of enemies) { rectf(flr(e.x) + 1, flr(e.y) + 9, 6, 2, 1); if (e.hitFlash > 0) rectf(flr(e.x), flr(e.y), 8, 8, 3); else spr(e.sprId, flr(e.x), flr(e.y)); const hpW = 10; const hpX = flr(e.x) - 1; const hpY = flr(e.y) - 3; const hpFill = (e.hp / e.maxHp) * hpW; rectf(hpX, hpY, hpW, 2, 1); if (hpFill > 0) { const hpColor = e.hp > e.maxHp * 0.5 ? 3 : 2; rectf(hpX, hpY, flr(hpFill), 2, hpColor); } }
      for (const b of bullets) rectf(flr(b.x) - 1, flr(b.y) - 1, 2, 2, 3);
      for (const p of particles) pix(flr(p.x), flr(p.y), p.color);
      const curPx = cursorX * CELL + GRID_OX; const curPy = cursorY * CELL + GRID_OY;
      const curBlink = flr(GrayBox.frame / 4) % 2; const curCol = curBlink ? 3 : 2;
      line(curPx, curPy, curPx + 4, curPy, curCol); line(curPx, curPy, curPx, curPy + 4, curCol);
      line(curPx + CELL - 1, curPy, curPx + CELL - 5, curPy, curCol); line(curPx + CELL - 1, curPy, curPx + CELL - 1, curPy + 4, curCol);
      line(curPx, curPy + CELL - 1, curPx + 4, curPy + CELL - 1, curCol); line(curPx, curPy + CELL - 1, curPx, curPy + CELL - 5, curCol);
      line(curPx + CELL - 1, curPy + CELL - 1, curPx + CELL - 5, curPy + CELL - 1, curCol); line(curPx + CELL - 1, curPy + CELL - 1, curPx + CELL - 1, curPy + CELL - 5, curCol);
      if (grid[cursorY][cursorX] === 0) { const tt = TOWER_TYPES[selectedType]; circ(curPx + CELL / 2, curPy + CELL / 2, tt.range, 1); if (gold >= tt.cost) spr(tt.sprId, curPx + 4, curPy + 4); }
      rectf(0, 0, W, HUD_TOP, 0); line(0, HUD_TOP - 1, W, HUD_TOP - 1, 1);
      text("GOLD:" + gold, 3, 2, 3); text("SCORE:" + score, 67, 2, 2); text("WAVE:" + wave + "/" + MAX_WAVES, 140, 2, 2);
      for (let i = 0; i < min(lives, 10); i++) spr(35, W - 10 - i * 9, 0);
      const bottomY = H - 18; rectf(0, bottomY, W, 18, 0); line(0, bottomY, W, bottomY, 1);
      const st = TOWER_TYPES[selectedType];
      for (let i = 0; i < TOWER_TYPES.length; i++) { const tx = 5 + i * 53; const ty = bottomY + 3; if (i === selectedType) rect(tx - 2, ty - 2, 51, 15, 3); spr(TOWER_TYPES[i].sprId, tx, ty + 1); text(TOWER_TYPES[i].name, tx + 10, ty, i === selectedType ? 3 : 1); text(TOWER_TYPES[i].cost + "G", tx + 10, ty + 8, i === selectedType ? 2 : 1); }
      text("A:PLACE B:CYCLE", 227, bottomY + 3, 1); text("RNG:" + st.range + " DMG:" + st.dmg, 227, bottomY + 10, 1);
      if (gold < st.cost) text("NOT ENOUGH GOLD!", 227, bottomY + 3, 2);
      if (waveMessageTimer > 0) { const msgY = 105 + sin(waveMessageTimer * 0.1) * 3; const msgX = 133; rectf(msgX - 20, flr(msgY) - 4, 93, 14, 0); rect(msgX - 20, flr(msgY) - 4, 93, 14, 2); text(waveMessage, msgX, flr(msgY), 3); if (waveMessageTimer > 30) text("GET READY!", msgX - 5, flr(msgY) + 9, 2); }
      if (!waveActive && waveTimer > 0 && enemies.length === 0 && wave < MAX_WAVES) { const sec = flr(waveTimer / 30) + 1; text("NEXT WAVE IN " + sec, 122, 105, 2); text("BONUS: +" + (5 + wave * 2) + "G", 128, 114, 1); }
    }
  });

  GrayBox.go(TITLE);
  GrayBox.boot("screen");
})();
