<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GrayBox — Game Portal</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --black: #1a1a1a;
    --dark: #6b6b6b;
    --light: #b0b0b0;
    --white: #e8e8e8;
    --accent: #f0f0f0;
  }

  body {
    background: var(--black);
    color: var(--white);
    font-family: 'JetBrains Mono', monospace;
    min-height: 100vh;
  }

  /* ── Header ── */
  header {
    text-align: center;
    padding: 40px 20px 20px;
    border-bottom: 1px solid #333;
  }
  header h1 {
    font-size: 48px;
    letter-spacing: 12px;
    color: var(--white);
    text-shadow: 2px 2px 0 var(--dark);
    margin-bottom: 8px;
  }
  header p {
    color: var(--dark);
    font-size: 14px;
    letter-spacing: 3px;
  }
  .spec-bar {
    display: flex;
    justify-content: center;
    gap: 24px;
    margin-top: 16px;
    flex-wrap: wrap;
  }
  .spec-bar span {
    font-size: 11px;
    color: var(--light);
    background: #222;
    padding: 4px 10px;
    border-radius: 4px;
    border: 1px solid #333;
  }

  /* ── Controls ── */
  .toolbar {
    max-width: 1200px;
    margin: 20px auto;
    padding: 0 20px;
    display: flex;
    gap: 12px;
    align-items: center;
    flex-wrap: wrap;
  }
  .search-box {
    flex: 1;
    min-width: 200px;
    background: #222;
    border: 1px solid #444;
    border-radius: 6px;
    padding: 10px 14px;
    color: var(--white);
    font-family: inherit;
    font-size: 14px;
    outline: none;
    transition: border-color 0.2s;
  }
  .search-box:focus { border-color: var(--light); }
  .search-box::placeholder { color: var(--dark); }

  .filter-btn {
    background: #222;
    border: 1px solid #444;
    color: var(--light);
    padding: 10px 14px;
    border-radius: 6px;
    font-family: inherit;
    font-size: 12px;
    cursor: pointer;
    transition: all 0.15s;
    white-space: nowrap;
  }
  .filter-btn:hover { border-color: var(--light); color: var(--white); }
  .filter-btn.active { background: var(--dark); color: var(--white); border-color: var(--dark); }

  .game-count {
    font-size: 12px;
    color: var(--dark);
    margin-left: auto;
  }

  /* ── Grid ── */
  .grid {
    max-width: 1200px;
    margin: 0 auto;
    padding: 20px;
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
    gap: 12px;
  }

  /* ── Card ── */
  .card {
    background: #1e1e1e;
    border: 1px solid #333;
    border-radius: 8px;
    overflow: hidden;
    cursor: pointer;
    transition: all 0.2s;
    position: relative;
  }
  .card:hover {
    border-color: var(--light);
    transform: translateY(-2px);
    box-shadow: 0 8px 24px rgba(0,0,0,0.4);
  }
  .card:active { transform: translateY(0); }

  .card-preview {
    width: 100%;
    aspect-ratio: 3/2;
    background: var(--black);
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
    overflow: hidden;
  }
  .card-preview canvas {
    image-rendering: pixelated;
    image-rendering: crisp-edges;
    width: 100%;
    height: 100%;
    object-fit: contain;
  }
  .card-preview .play-overlay {
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    background: rgba(26,26,26,0.7);
    opacity: 0;
    transition: opacity 0.2s;
  }
  .card:hover .play-overlay { opacity: 1; }
  .play-icon {
    width: 48px;
    height: 48px;
    border: 2px solid var(--white);
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .play-icon::after {
    content: '';
    display: block;
    width: 0;
    height: 0;
    border-left: 16px solid var(--white);
    border-top: 10px solid transparent;
    border-bottom: 10px solid transparent;
    margin-left: 4px;
  }

  .card-info {
    padding: 10px 12px;
  }
  .card-title {
    font-size: 13px;
    font-weight: 700;
    color: var(--white);
    margin-bottom: 4px;
  }
  .card-genre {
    font-size: 10px;
    color: var(--dark);
    text-transform: uppercase;
    letter-spacing: 1px;
  }

  /* ── Fullscreen Player ── */
  .player-backdrop {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(10,10,10,0.95);
    z-index: 1000;
    align-items: center;
    justify-content: center;
    flex-direction: column;
  }
  .player-backdrop.open { display: flex; }

  .player-header {
    display: flex;
    align-items: center;
    gap: 16px;
    margin-bottom: 12px;
    width: 960px;
    max-width: 95vw;
  }
  .player-title {
    font-size: 18px;
    font-weight: 700;
    flex: 1;
  }
  .player-btn {
    background: #333;
    border: 1px solid #555;
    color: var(--white);
    padding: 8px 16px;
    border-radius: 6px;
    font-family: inherit;
    font-size: 12px;
    cursor: pointer;
    transition: all 0.15s;
  }
  .player-btn:hover { background: #444; border-color: var(--light); }

  .player-frame {
    width: 960px;
    height: 640px;
    max-width: 95vw;
    max-height: 70vh;
    border: 3px solid #333;
    border-radius: 8px;
    background: var(--black);
    box-shadow: 0 0 60px rgba(0,0,0,0.8);
  }
  .player-frame iframe {
    width: 100%;
    height: 100%;
    border: none;
    border-radius: 5px;
  }

  .player-controls-hint {
    margin-top: 12px;
    font-size: 11px;
    color: var(--dark);
    letter-spacing: 1px;
  }
  .player-controls-hint span { color: var(--light); }

  /* ── No results ── */
  .no-results {
    grid-column: 1 / -1;
    text-align: center;
    padding: 60px 20px;
    color: var(--dark);
    font-size: 14px;
  }

  /* ── Footer ── */
  footer {
    text-align: center;
    padding: 40px 20px;
    color: #333;
    font-size: 11px;
    border-top: 1px solid #222;
    margin-top: 40px;
  }
  footer a { color: var(--dark); text-decoration: none; }
  footer a:hover { color: var(--light); }

  /* ── Gamepad ── */
  .gamepad {
    display: none;
    position: fixed;
    bottom: 0;
    left: 0;
    right: 0;
    height: 160px;
    z-index: 1001;
    pointer-events: none;
    padding: 20px 30px;
  }
  .gamepad.show { display: flex; justify-content: space-between; align-items: flex-end; }

  .dpad {
    position: relative;
    width: 130px;
    height: 130px;
    pointer-events: auto;
    touch-action: none;
    user-select: none;
    -webkit-user-select: none;
  }
  .dpad-zone {
    position: absolute;
    inset: 0;
    border-radius: 50%;
    background: rgba(107,107,107,0.12);
    border: 2px solid rgba(176,176,176,0.2);
  }
  .dpad-arrow {
    position: absolute;
    width: 28px;
    height: 28px;
    display: flex;
    align-items: center;
    justify-content: center;
    color: rgba(232,232,232,0.3);
    font-size: 14px;
    pointer-events: none;
  }
  .dpad-arrow.active { color: rgba(232,232,232,0.9); }
  .dpad-arrow-up    { left: 51px; top: 4px; }
  .dpad-arrow-down  { left: 51px; bottom: 4px; }
  .dpad-arrow-left  { left: 4px; top: 51px; }
  .dpad-arrow-right { right: 4px; top: 51px; }
  .dpad-knob {
    position: absolute;
    width: 44px;
    height: 44px;
    border-radius: 50%;
    background: rgba(176,176,176,0.35);
    border: 2px solid rgba(176,176,176,0.5);
    left: 43px;
    top: 43px;
    pointer-events: none;
    transition: transform 0.05s;
  }
  .dpad-knob.active {
    background: rgba(176,176,176,0.55);
    border-color: rgba(232,232,232,0.7);
  }

  .action-btns {
    position: relative;
    width: 120px;
    height: 100px;
    pointer-events: auto;
    padding: 20px;
    margin: -20px;
  }
  .action-btn {
    position: absolute;
    width: 52px;
    height: 52px;
    border-radius: 50%;
    background: rgba(176,176,176,0.25);
    border: 2px solid rgba(176,176,176,0.4);
    display: flex;
    align-items: center;
    justify-content: center;
    color: rgba(232,232,232,0.7);
    font-family: inherit;
    font-size: 14px;
    font-weight: 700;
    user-select: none;
    -webkit-user-select: none;
    touch-action: none;
  }
  .action-btn:active, .action-btn.pressed {
    background: rgba(176,176,176,0.5);
    border-color: rgba(232,232,232,0.7);
  }
  /* Nintendo layout: B left-down, A right-up */
  .btn-b { left: 0; bottom: 0; }
  .btn-a { right: 0; top: 0; }

  /* ── Haptic Slider ── */
  .haptic-panel {
    position: fixed;
    bottom: 180px;
    right: 12px;
    display: none;
    flex-direction: column;
    align-items: center;
    gap: 4px;
    pointer-events: auto;
    z-index: 1002;
  }
  .haptic-panel.show { display: flex; }
  .haptic-label {
    color: rgba(176,176,176,0.6);
    font-size: 9px;
    font-family: inherit;
    letter-spacing: 1px;
  }
  .haptic-value {
    color: rgba(232,232,232,0.8);
    font-size: 11px;
    font-family: inherit;
    font-weight: 700;
    min-width: 30px;
    text-align: center;
  }
  .haptic-slider {
    -webkit-appearance: none;
    appearance: none;
    width: 100px;
    height: 4px;
    background: rgba(176,176,176,0.3);
    border-radius: 2px;
    outline: none;
  }
  .haptic-slider::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 18px;
    height: 18px;
    border-radius: 50%;
    background: var(--light);
    border: 2px solid var(--white);
    cursor: pointer;
  }

  /* ── Responsive ── */
  @media (max-width: 600px) {
    header h1 { font-size: 28px; letter-spacing: 6px; }
    .grid { grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 8px; }
    .player-frame { max-height: 50vh; }
    .player-header { flex-wrap: wrap; }
    .player-controls-hint { display: none; }
  }
</style>
</head>
<body>

<header>
  <h1>GRAYBOX</h1>
  <p>CONSTRAINT-DRIVEN GAME PLATFORM</p>
  <div class="spec-bar">
    <span>320x240</span>
    <span>4 GRAY</span>
    <span>30 FPS</span>
    <span>8x8 SPR</span>
    <span>2CH SQ</span>
    <span>6 KEYS</span>
  </div>
</header>

<div class="toolbar">
  <input type="text" class="search-box" id="search" placeholder="Search games..." autocomplete="off">
  <button class="filter-btn active" data-genre="all">ALL</button>
  <button class="filter-btn" data-genre="shooter">SHOOTER</button>
  <button class="filter-btn" data-genre="action">ACTION</button>
  <button class="filter-btn" data-genre="platformer">PLATFORMER</button>
  <button class="filter-btn" data-genre="puzzle">PUZZLE</button>
  <button class="filter-btn" data-genre="classic">CLASSIC</button>
  <button class="filter-btn" data-genre="fighting">FIGHTING</button>
  <button class="filter-btn" data-genre="other">OTHER</button>
  <span class="game-count" id="count">60 games</span>
</div>

<div class="grid" id="grid"></div>

<!-- Fullscreen Player -->
<div class="player-backdrop" id="player">
  <div class="player-header">
    <span class="player-title" id="playerTitle"></span>
    <button class="player-btn" id="prevBtn">← PREV</button>
    <button class="player-btn" id="nextBtn">NEXT →</button>
    <button class="player-btn" onclick="closePlayer()">✕ CLOSE (ESC)</button>
  </div>
  <div class="player-frame">
    <iframe id="playerFrame" sandbox="allow-scripts allow-same-origin"></iframe>
  </div>
  <div class="player-controls-hint">
    <span>←↑↓→</span> MOVE &nbsp;&nbsp; <span>A</span> A-BTN &nbsp;&nbsp; <span>B</span> B-BTN &nbsp;&nbsp; <span>ESC</span> BACK
  </div>
</div>

<!-- Mobile Gamepad -->
<div class="gamepad" id="gamepad">
  <div class="dpad" id="dpad">
    <div class="dpad-zone"></div>
    <div class="dpad-arrow dpad-arrow-up" id="dpadUp">▲</div>
    <div class="dpad-arrow dpad-arrow-down" id="dpadDown">▼</div>
    <div class="dpad-arrow dpad-arrow-left" id="dpadLeft">◀</div>
    <div class="dpad-arrow dpad-arrow-right" id="dpadRight">▶</div>
    <div class="dpad-knob" id="dpadKnob"></div>
  </div>
  <div class="action-btns">
    <div class="action-btn btn-b" data-key="x">B</div>
    <div class="action-btn btn-a" data-key="z">A</div>
  </div>
</div>

<!-- Settings Panel -->
<div class="haptic-panel" id="hapticPanel">
  <div class="haptic-label">HAPTIC</div>
  <div class="haptic-value" id="hapticValue">15ms</div>
  <input type="range" class="haptic-slider" id="hapticSlider" min="0" max="50" value="15" step="1">
  <div style="height:8px"></div>
  <div class="haptic-label" id="bgmToggle" style="cursor:pointer;padding:4px 8px;border:1px solid rgba(176,176,176,0.3);border-radius:4px;user-select:none">♪ BGM ON</div>
</div>

<footer>
  <a href="docs/SPEC.md">SPEC</a> &nbsp;·&nbsp;
  <a href="docs/API.md">API</a> &nbsp;·&nbsp;
  <a href="docs/ROADMAP.md">ROADMAP</a> &nbsp;·&nbsp;
  <a href="https://github.com/ssk-play/graybox">GITHUB</a>
  <br><br>
  GrayBox v0.1 — Constraint is creativity.
</footer>

<script>
const GAMES = [

  { id: "bgm-audition",      name: "BGM Audition",      genre: "tool" },
  { id: "arkanoid",          name: "Arkanoid",          genre: "classic" },
  { id: "asteroids",         name: "Asteroids",         genre: "classic" },
  { id: "balloon-fight",     name: "Balloon Fight",     genre: "platformer" },

  { id: "mappy",             name: "Mappy",             genre: "platformer" },
  { id: "missile-command",   name: "Missile Command",   genre: "other" },
  { id: "moon-patrol",       name: "Moon Patrol",       genre: "shooter" },

  { id: "pengo",             name: "Pengo",             genre: "action" },
  { id: "phoenix",           name: "Phoenix",           genre: "shooter" },
  { id: "pinball",           name: "Pinball",           genre: "other" },
  { id: "pong",              name: "Pong",              genre: "classic" },
  { id: "ponpoko",           name: "Ponpoko",           genre: "platformer" },
  { id: "qbert",             name: "Q*bert",            genre: "puzzle" },
  { id: "rally-x",           name: "Rally-X",           genre: "action" },
  { id: "road-fighter",      name: "Road Fighter",      genre: "other" },
  { id: "robotron",          name: "Robotron 2084",     genre: "shooter" },
  { id: "scramble",          name: "Scramble",          genre: "shooter" },
  { id: "simon",             name: "Simon",             genre: "puzzle" },
  { id: "snake",             name: "Snake",             genre: "classic" },
  { id: "sokoban",           name: "Sokoban",           genre: "puzzle" },
  { id: "space-invaders",    name: "Space Invaders",    genre: "shooter" },
  { id: "spy-hunter",        name: "Spy Hunter",        genre: "other" },
  { id: "star-patrol",       name: "Star Patrol",       genre: "shooter" },
  { id: "tempest",           name: "Tempest",           genre: "shooter" },
  { id: "tetris",            name: "Tetris",            genre: "puzzle" },
  { id: "time-pilot",        name: "Time Pilot",        genre: "shooter" },
  { id: "tower-defense",     name: "Tower Defense",     genre: "other" },
  { id: "tron",              name: "Tron",              genre: "classic" },
  { id: "xevious",           name: "Xevious",           genre: "shooter" },
];

const grid = document.getElementById("grid");
const search = document.getElementById("search");
const count = document.getElementById("count");
const player = document.getElementById("player");
const playerFrame = document.getElementById("playerFrame");
const playerTitle = document.getElementById("playerTitle");
const prevBtn = document.getElementById("prevBtn");
const nextBtn = document.getElementById("nextBtn");

let activeGenre = "all";
let visibleGames = [...GAMES];
let currentIndex = -1;

// ── Thumbnail generator ──
function generateThumb(canvas, gameName) {
  canvas.width = 120;
  canvas.height = 80;
  const ctx = canvas.getContext("2d");
  const COLORS = ["#1a1a1a", "#6b6b6b", "#b0b0b0", "#e8e8e8"];

  // Seed from name
  let seed = 0;
  for (let i = 0; i < gameName.length; i++) seed = ((seed << 5) - seed + gameName.charCodeAt(i)) | 0;
  const rng = () => { seed = (seed * 16807 + 0) % 2147483647; return (seed & 0x7fffffff) / 2147483647; };

  ctx.fillStyle = COLORS[0];
  ctx.fillRect(0, 0, 120, 80);

  // Scatter some pixel-art style elements
  for (let i = 0; i < 30; i++) {
    const c = COLORS[Math.floor(rng() * 3) + 1];
    ctx.fillStyle = c;
    const sz = Math.floor(rng() * 4) + 2;
    ctx.fillRect(Math.floor(rng() * 116), Math.floor(rng() * 76), sz, sz);
  }

  // Draw game initial large
  ctx.fillStyle = COLORS[3];
  ctx.font = "bold 36px monospace";
  ctx.textAlign = "center";
  ctx.textBaseline = "middle";
  ctx.fillText(gameName[0].toUpperCase(), 60, 40);

  // Scanline effect
  ctx.fillStyle = "rgba(0,0,0,0.15)";
  for (let y = 0; y < 80; y += 2) ctx.fillRect(0, y, 120, 1);
}

// ── Render ──
function render() {
  const q = search.value.toLowerCase().trim();
  visibleGames = GAMES.filter(g => {
    if (activeGenre !== "all" && g.genre !== activeGenre) return false;
    if (q && !g.name.toLowerCase().includes(q) && !g.id.includes(q) && !g.genre.includes(q)) return false;
    return true;
  });

  count.textContent = visibleGames.length + (visibleGames.length === 1 ? " game" : " games");

  grid.innerHTML = "";
  if (visibleGames.length === 0) {
    grid.innerHTML = '<div class="no-results">No games found.</div>';
    return;
  }

  visibleGames.forEach((g, i) => {
    const card = document.createElement("div");
    card.className = "card";
    card.onclick = () => openPlayer(i);

    const preview = document.createElement("div");
    preview.className = "card-preview";

    const cvs = document.createElement("canvas");
    generateThumb(cvs, g.name);
    preview.appendChild(cvs);

    const overlay = document.createElement("div");
    overlay.className = "play-overlay";
    overlay.innerHTML = '<div class="play-icon"></div>';
    preview.appendChild(overlay);

    const info = document.createElement("div");
    info.className = "card-info";
    info.innerHTML = `<div class="card-title">${g.name}</div><div class="card-genre">${g.genre}</div>`;

    card.appendChild(preview);
    card.appendChild(info);
    grid.appendChild(card);
  });
}

// ── Player ──
function openPlayer(index) {
  currentIndex = index;
  const g = visibleGames[index];
  playerTitle.textContent = g.name;
  playerFrame.src = `demos/${g.id}/index.html`;
  player.classList.add("open");
  document.body.style.overflow = "hidden";
  updateNavButtons();
  playerFrame.onload = () => { playerFrame.focus(); showGamepad(); };
  playerFrame.focus();
  showGamepad();
}

function closePlayer() {
  player.classList.remove("open");
  playerFrame.src = "";
  document.body.style.overflow = "";
  currentIndex = -1;
  hideGamepad();
}

function navPlayer(delta) {
  if (currentIndex < 0) return;
  const next = currentIndex + delta;
  if (next >= 0 && next < visibleGames.length) openPlayer(next);
}

function updateNavButtons() {
  prevBtn.style.opacity = currentIndex <= 0 ? "0.3" : "1";
  prevBtn.style.pointerEvents = currentIndex <= 0 ? "none" : "auto";
  nextBtn.style.opacity = currentIndex >= visibleGames.length - 1 ? "0.3" : "1";
  nextBtn.style.pointerEvents = currentIndex >= visibleGames.length - 1 ? "none" : "auto";
}

prevBtn.onclick = () => navPlayer(-1);
nextBtn.onclick = () => navPlayer(1);

// Keep iframe focused for keyboard input
player.addEventListener("click", (e) => {
  if (e.target !== prevBtn && e.target !== nextBtn && !prevBtn.contains(e.target) && !nextBtn.contains(e.target)) {
    playerFrame.focus();
  }
});

// ── Events ──
search.addEventListener("input", render);

document.querySelectorAll(".filter-btn").forEach(btn => {
  btn.addEventListener("click", () => {
    document.querySelectorAll(".filter-btn").forEach(b => b.classList.remove("active"));
    btn.classList.add("active");
    activeGenre = btn.dataset.genre;
    render();
  });
});

document.addEventListener("keydown", e => {
  if (e.key === "Escape" && player.classList.contains("open")) {
    closePlayer();
    e.preventDefault();
  }
});

// ── Mobile Gamepad ──
const gamepad = document.getElementById("gamepad");
const isTouchDevice = () => "ontouchstart" in window || navigator.maxTouchPoints > 0;

// ── Haptic Feedback ──
const hapticPanel = document.getElementById("hapticPanel");
const hapticSlider = document.getElementById("hapticSlider");
const hapticValue = document.getElementById("hapticValue");
let hapticMs = parseInt(localStorage.getItem("graybox_haptic") || "15");
hapticSlider.value = hapticMs;
hapticValue.textContent = hapticMs + "ms";
hapticSlider.addEventListener("input", () => {
  hapticMs = parseInt(hapticSlider.value);
  hapticValue.textContent = hapticMs + "ms";
  localStorage.setItem("graybox_haptic", hapticMs);
  if (hapticMs > 0 && navigator.vibrate) navigator.vibrate(hapticMs);
});
function haptic() {
  if (hapticMs > 0 && navigator.vibrate) navigator.vibrate(hapticMs);
}

// ── BGM Toggle ──
const bgmToggle = document.getElementById("bgmToggle");
let bgmEnabled = localStorage.getItem("graybox_bgm") !== "off";
function updateBgmToggle() {
  bgmToggle.textContent = bgmEnabled ? "♪ BGM ON" : "♪ BGM OFF";
  bgmToggle.style.color = bgmEnabled ? "rgba(232,232,232,0.8)" : "rgba(107,107,107,0.6)";
  bgmToggle.style.borderColor = bgmEnabled ? "rgba(176,176,176,0.4)" : "rgba(107,107,107,0.3)";
  // Mute/unmute iframe's BGM
  try {
    const gw = playerFrame.contentWindow;
    if (gw && gw.GrayBox) {
      if (bgmEnabled) { gw.GrayBox.bgmVol(0.08); }
      else { gw.GrayBox.bgmStop(); gw.GrayBox.bgmVol(0); }
    }
  } catch(e) {}
}
updateBgmToggle();
bgmToggle.addEventListener("click", () => {
  bgmEnabled = !bgmEnabled;
  localStorage.setItem("graybox_bgm", bgmEnabled ? "on" : "off");
  updateBgmToggle();
});
// Apply mute when game loads in iframe
playerFrame.addEventListener("load", () => {
  if (!bgmEnabled) {
    setTimeout(() => {
      try {
        const gw = playerFrame.contentWindow;
        if (gw && gw.GrayBox) { gw.GrayBox.bgmVol(0); }
      } catch(e) {}
    }, 100);
  }
});

function showGamepad() {
  if (isTouchDevice()) {
    gamepad.classList.add("show");
  }
  hapticPanel.classList.add("show"); // Settings panel always visible during play
}
function hideGamepad() {
  gamepad.classList.remove("show");
  hapticPanel.classList.remove("show");
}

function sendKey(key, type) {
  try {
    const w = playerFrame.contentWindow;
    if (w) {
      w.document.dispatchEvent(new KeyboardEvent(type, {
        key: key, code: "Key" + key.toUpperCase(),
        bubbles: true, cancelable: true
      }));
    }
  } catch(e) {}
}

// ── D-Pad: analog joystick style ──
const dpad = document.getElementById("dpad");
const dpadKnob = document.getElementById("dpadKnob");
const dpadArrows = {
  up: document.getElementById("dpadUp"),
  down: document.getElementById("dpadDown"),
  left: document.getElementById("dpadLeft"),
  right: document.getElementById("dpadRight")
};
const dpadKeyMap = { up: "ArrowUp", down: "ArrowDown", left: "ArrowLeft", right: "ArrowRight" };
const dpadState = { up: false, down: false, left: false, right: false };
let dpadTouchId = null;
let dpadCenterX = 0, dpadCenterY = 0;

function dpadUpdate(tx, ty) {
  const dx = tx - dpadCenterX;
  const dy = ty - dpadCenterY;
  const dist = Math.sqrt(dx * dx + dy * dy);
  const maxDist = 35;
  const deadzone = 12;

  // Clamp knob visual
  const clampDist = Math.min(dist, maxDist);
  const angle = Math.atan2(dy, dx);
  const kx = clampDist * Math.cos(angle);
  const ky = clampDist * Math.sin(angle);
  dpadKnob.style.transform = `translate(${kx}px, ${ky}px)`;
  dpadKnob.classList.toggle("active", dist > deadzone);

  // Determine direction
  const newState = { up: false, down: false, left: false, right: false };
  if (dist > deadzone) {
    const deg = angle * 180 / Math.PI;
    // 8-way with overlap zones for diagonals
    if (deg > -67.5 && deg < 67.5) newState.right = true;
    if (deg > 22.5 && deg < 157.5) newState.down = true;
    if (deg > 112.5 || deg < -112.5) newState.left = true;
    if (deg > -157.5 && deg < -22.5) newState.up = true;
  }

  // Diff and send key events
  for (const dir of ["up", "down", "left", "right"]) {
    if (newState[dir] && !dpadState[dir]) {
      sendKey(dpadKeyMap[dir], "keydown");
      dpadArrows[dir].classList.add("active");
      haptic();
    } else if (!newState[dir] && dpadState[dir]) {
      sendKey(dpadKeyMap[dir], "keyup");
      dpadArrows[dir].classList.remove("active");
    }
    dpadState[dir] = newState[dir];
  }
}

function dpadRelease() {
  dpadKnob.style.transform = "translate(0, 0)";
  dpadKnob.classList.remove("active");
  for (const dir of ["up", "down", "left", "right"]) {
    if (dpadState[dir]) {
      sendKey(dpadKeyMap[dir], "keyup");
      dpadArrows[dir].classList.remove("active");
      dpadState[dir] = false;
    }
  }
  dpadTouchId = null;
}

dpad.addEventListener("touchstart", (e) => {
  e.preventDefault();
  if (dpadTouchId !== null) return;
  const t = e.changedTouches[0];
  dpadTouchId = t.identifier;
  const rect = dpad.getBoundingClientRect();
  dpadCenterX = rect.left + rect.width / 2;
  dpadCenterY = rect.top + rect.height / 2;
  dpadUpdate(t.clientX, t.clientY);
}, { passive: false });

dpad.addEventListener("touchmove", (e) => {
  e.preventDefault();
  for (const t of e.changedTouches) {
    if (t.identifier === dpadTouchId) {
      dpadUpdate(t.clientX, t.clientY);
      break;
    }
  }
}, { passive: false });

dpad.addEventListener("touchend", (e) => {
  for (const t of e.changedTouches) {
    if (t.identifier === dpadTouchId) { dpadRelease(); break; }
  }
});
dpad.addEventListener("touchcancel", () => dpadRelease());

// ── Action buttons (A/B) with drift-adaptive hitbox ──
// Hitbox stays normal when touches land on-center.
// Expands only when touches drift toward the edge — up to 40%,
// but never past the midpoint between A and B.
const actionBtns = document.querySelectorAll("[data-key]");
const btnState = new Map();

actionBtns.forEach(btn => {
  btnState.set(btn, { expand: 0, pressed: false });
});

function btnKeys(b) { return b.dataset.key === "z" ? ["z", "Enter"] : [b.dataset.key]; }
function pressBtn(b) {
  const st = btnState.get(b);
  if (st.pressed) return;
  st.pressed = true;
  b.classList.add("pressed");
  btnKeys(b).forEach(k => sendKey(k, "keydown"));
  haptic();
}
function releaseBtn(b) {
  const st = btnState.get(b);
  if (!st.pressed) return;
  st.pressed = false;
  b.classList.remove("pressed");
  btnKeys(b).forEach(k => sendKey(k, "keyup"));
}

// Compute drift ratio against CURRENT hitbox (including expansion)
// 0 = center, 0.5 = halfway, 1 = edge of expanded hitbox
function touchDrift(btn, tx, ty) {
  const r = btn.getBoundingClientRect();
  const st = btnState.get(btn);
  const cx = (r.left + r.right) / 2, cy = (r.top + r.bottom) / 2;
  // Current effective radius = base radius * (1 + expand)
  const baseRadius = Math.max(r.width, r.height) / 2;
  const effectiveRadius = baseRadius * (1 + st.expand);
  const dist = Math.sqrt((tx - cx) ** 2 + (ty - cy) ** 2);
  return dist / effectiveRadius;
}

// Find the best button for a touch, considering adaptive expansion
function findBtnForTouch(tx, ty) {
  let bestBtn = null, bestDist = Infinity;
  const btnArr = [...actionBtns];

  btnArr.forEach(btn => {
    const r = btn.getBoundingClientRect();
    const st = btnState.get(btn);
    const expand = st.expand * Math.max(r.width, r.height);

    // Expand in all directions except toward the other button
    const other = btnArr.find(b => b !== btn);
    const otherR = other ? other.getBoundingClientRect() : null;
    let exL = r.left - expand, exR = r.right + expand;
    let exT = r.top - expand, exB = r.bottom + expand;
    if (otherR) {
      const mid = (r.left + r.right + otherR.left + otherR.right) / 4;
      const thisCX = (r.left + r.right) / 2;
      if (thisCX < mid) exR = Math.min(exR, mid);
      else exL = Math.max(exL, mid);
    }

    if (tx >= exL && tx <= exR && ty >= exT && ty <= exB) {
      const cx = (r.left + r.right) / 2, cy = (r.top + r.bottom) / 2;
      const d = (tx - cx) ** 2 + (ty - cy) ** 2;
      if (d < bestDist) { bestDist = d; bestBtn = btn; }
    }
  });
  return bestBtn;
}

// Common handler for both touch and mouse
// drift > 50% of current hitbox → grow +10% (max 40%)
// drift ≤ 50% → keep current size (no shrink)
function handleActionDown(tx, ty) {
  // Try direct hit first
  let hitBtn = null;
  actionBtns.forEach(btn => {
    const r = btn.getBoundingClientRect();
    if (tx >= r.left && tx <= r.right && ty >= r.top && ty <= r.bottom) hitBtn = btn;
  });
  // If no direct hit, try expanded hitbox
  if (!hitBtn) hitBtn = findBtnForTouch(tx, ty);
  if (hitBtn) {
    const drift = touchDrift(hitBtn, tx, ty);
    const st = btnState.get(hitBtn);
    if (drift > 0.5) st.expand = Math.min(st.expand + 0.1, 0.4);
    // drift ≤ 0.5 → maintain current expand (no change)
    pressBtn(hitBtn);
  }
}
function handleActionUp() {
  actionBtns.forEach(btn => releaseBtn(btn));
}

// Container: touch + mouse
const actionBtnContainer = document.querySelector(".action-btns");
if (actionBtnContainer) {
  actionBtnContainer.addEventListener("touchstart", (e) => {
    e.preventDefault();
    const t = e.changedTouches[0];
    handleActionDown(t.clientX, t.clientY);
  }, { passive: false });
  actionBtnContainer.addEventListener("touchend", (e) => { e.preventDefault(); handleActionUp(); }, { passive: false });
  actionBtnContainer.addEventListener("touchcancel", () => handleActionUp());

  actionBtnContainer.addEventListener("mousedown", (e) => {
    e.preventDefault();
    handleActionDown(e.clientX, e.clientY);
  });
  actionBtnContainer.addEventListener("mouseup", (e) => { e.preventDefault(); handleActionUp(); });
  actionBtnContainer.addEventListener("mouseleave", () => handleActionUp());
}

// Direct button: touch + mouse
actionBtns.forEach(btn => {
  btn.addEventListener("touchstart", (e) => {
    e.stopPropagation(); e.preventDefault();
    const t = e.changedTouches[0];
    handleActionDown(t.clientX, t.clientY);
  }, { passive: false });
  btn.addEventListener("touchend", (e) => { e.preventDefault(); releaseBtn(btn); }, { passive: false });
  btn.addEventListener("touchcancel", () => releaseBtn(btn));

  btn.addEventListener("mousedown", (e) => {
    e.stopPropagation(); e.preventDefault();
    handleActionDown(e.clientX, e.clientY);
  });
  btn.addEventListener("mouseup", (e) => { e.preventDefault(); releaseBtn(btn); });
});

// ── Init ──
render();
</script>
