          min, max: _max, sin, cos } = Mono;

  // --- Helper: upscale 8x8 sprite data to 16x16 ---
  function up(d){let o="";for(let r=0;r<8;r++){let row="";for(let c=0;c<8;c++){const ch=d[r*8+c];row+=ch+ch;}o+=row+row;}return o;}

  // 28: Stunned enemy overlay (stars)

  // --- Sprite size constant (now 16x16) ---
  const SS = 16;

  // --- Level Layout ---
  const PLAT_H = 2;
  const HUD_H = 16;
  const PLAY_TOP = HUD_H;
  const PLAY_BOT = H - 8;

  // Level definitions
  function makeLevelLayout(level) {
    const platYs = [39, 75, 111, 147, 183, 218];
    const numCols = 3 + min(flr(level / 2), 2);

    const colXs = [];
    const spacing = 267 / (numCols + 1);
    for (let i = 0; i < numCols; i++) {
      colXs.push(flr(27 + spacing * (i + 1)) - SS);
    }

    const platforms = [];
    for (let row = 0; row < platYs.length; row++) {
      const y = platYs[row];
      if (row === platYs.length - 1) {
        platforms.push({ x1: 13, x2: 307, y: y });
      } else if (row === 0) {
        for (let c = 0; c < numCols; c++) {
          const cx = colXs[c];
          platforms.push({ x1: cx - SS, x2: cx + SS + 16, y: y });
        }
      } else {
        if (level % 2 === 0 || row % 2 === 0) {
          platforms.push({ x1: 13, x2: 307, y: y });
        } else {
          platforms.push({ x1: 13, x2: 147, y: y });
          platforms.push({ x1: 173, x2: 307, y: y });
        }
      }
    }

    const ladders = [];
    for (let c = 0; c < numCols; c++) {
      const lx = colXs[c] + 4;
      for (let row = 0; row < platYs.length - 1; row++) {
        ladders.push({ x: lx, y1: platYs[row], y2: platYs[row + 1] });
      }
    }
    const extraLadderXs = [20, 87, 233, 293];
    for (const lx of extraLadderXs) {
      for (let row = 0; row < platYs.length - 1; row++) {
        if (rnd(1) < 0.6 || row === 0) {
          ladders.push({ x: lx, y1: platYs[row], y2: platYs[row + 1] });
        }
      }
    }

    const ingredients = [];
    const ingTypes = [
      { name: "topbun", sprL: 10, sprR: 11 },
      { name: "lettuce", sprL: 14, sprR: 15 },
      { name: "patty", sprL: 12, sprR: 13 },
      { name: "tomato", sprL: 18, sprR: 19 },
      { name: "botbun", sprL: 16, sprR: 17 },
    ];
    for (let c = 0; c < numCols; c++) {
      for (let ing = 0; ing < 5; ing++) {
        ingredients.push({
          col: c,
          type: ingTypes[ing],
          x: colXs[c],
          platRow: ing,
          y: platYs[ing],
          targetY: platYs[ing + 1],
          walked: [false, false],
          dropping: false,
          dropSpeed: 0,
          dropped: false,
          stackCount: 0,
          finalY: 0,
          settled: false,
        });
      }
    }

    return { platforms, ladders, ingredients, platYs, colXs, numCols };
  }

  // --- Game State ---
  const { TITLE, PLAY, GAMEOVER } = Mono.SCENE;
  let chef, enemies, peppers, particles;
  let score, lives, level, pepperCount;
  let layout;
  let levelComplete, levelCompleteTimer;
  let deathTimer;
  let burgersCompleted;
  let totalBurgers;
  let enemySpawnTimer;
  let invincibleTimer;

  function resetGame() {
    score = 0;
    lives = 3;
    level = 1;
    pepperCount = 5;
    startLevel();
  }

  function startLevel() {
    layout = makeLevelLayout(level);
    chef = {
      x: 153, y: layout.platYs[2] - SS + 2,
      dir: 1,
      onLadder: false,
      climbing: false,
      walkFrame: 0,
      speed: 1.5,
    };
    enemies = [];
    peppers = [];
    particles = [];
    levelComplete = false;
    levelCompleteTimer = 0;
    deathTimer = 0;
    invincibleTimer = 60;
    burgersCompleted = 0;
    totalBurgers = layout.numCols;
    enemySpawnTimer = 90;

    for (let c = 0; c < layout.numCols; c++) {
      const bottomY = layout.platYs[5];
      const colIngs = layout.ingredients.filter(ing => ing.col === c);
      for (let i = colIngs.length - 1; i >= 0; i--) {
        colIngs[i].finalY = bottomY - (colIngs.length - 1 - i) * 5 - 5;
        colIngs[i].settled = false;
        colIngs[i].dropped = false;
        colIngs[i].dropping = false;
        colIngs[i].dropSpeed = 0;
        colIngs[i].walked = [false, false];
        colIngs[i].y = layout.platYs[colIngs[i].platRow];
        colIngs[i].targetY = layout.platYs[colIngs[i].platRow + 1];
        colIngs[i].stackCount = 0;
      }
    }
  }

  function spawnEnemy() {
    if (enemies.length >= 3 + level) return;
    const types = [20, 21, 22];
    const type = types[flr(rnd(types.length))];
    const side = rnd(1) < 0.5 ? 0 : 1;
    const plat = layout.platforms[flr(rnd(layout.platforms.length))];
    if (!plat) return;
    enemies.push({
      x: side === 0 ? plat.x1 : plat.x2 - SS,
      y: plat.y - SS + 2,
      type: type,
      dir: side === 0 ? 1 : -1,
      onLadder: false,
      climbing: false,
      stunTimer: 0,
      speed: 0.6 + level * 0.1,
      walkFrame: 0,
      alive: true,
      crushed: false,
    });
  }

  // Collision helpers — character hitbox is inset from sprite
  // Characters: hitbox 10x12 centered in 16x16 sprite
  const CHR_HBX = 3;   // hitbox x inset
  const CHR_HBY = 2;   // hitbox y inset
  const CHR_HBW = 10;  // hitbox width
  const CHR_HBH = 12;  // hitbox height

  function isOnPlatform(x, y, w) {
    const footY = y + SS - 2;
    for (const p of layout.platforms) {
      if (footY >= p.y - 2 && footY <= p.y + 4 && x + w > p.x1 && x < p.x2) {
        return p;
      }
    }
    return null;
  }

  function findLadderAt(x, y, h) {
    const cx = x + 8; // center of 16px character
    for (const l of layout.ladders) {
      if (_abs(cx - l.x - 4) < 8 && y + h > l.y1 - 2 && y < l.y2 + 2) {
        return l;
      }
    }
    return null;
  }

  function findLadderBelow(x, y) {
    const cx = x + 8;
    for (const l of layout.ladders) {
      if (_abs(cx - l.x - 4) < 8 && y + SS - 2 >= l.y1 - 4 && y + SS - 2 <= l.y1 + 8) {
        return l;
      }
    }
    return null;
  }

  function findLadderAbove(x, y) {
    const cx = x + 8;
    for (const l of layout.ladders) {
      if (_abs(cx - l.x - 4) < 8 && y + SS - 2 >= l.y2 - 8 && y + SS - 2 <= l.y2 + 4) {
        return l;
      }
    }
    return null;
  }

  // Circle vs rect collision (for pepper cloud vs enemies)
  function circRectHit(cx, cy, cr, rx, ry, rw, rh) {
    const nx = _max(rx, min(cx, rx + rw));
    const ny = _max(ry, min(cy, ry + rh));
    const dx = cx - nx;
    const dy = cy - ny;
    return dx * dx + dy * dy < cr * cr;
  }

  // Circle vs circle collision
  function circCircHit(x1, y1, r1, x2, y2, r2) {
    const dx = x1 - x2;
    const dy = y1 - y2;
    const dist = r1 + r2;
    return dx * dx + dy * dy < dist * dist;
  }

  // Sound effects
  function walkSound() { if (Mono.frame % 8 === 0) note(1, "G2", 0.02); }
  function pepperSound() { note(0, "C5", 0.05); note(1, "E4", 0.05); }
  function dropSound() { note(0, "C3", 0.08); note(1, "E2", 0.1); }
  function crushSound() { note(0, "G3", 0.06); note(1, "C3", 0.1); }
  function deathSound() {
    note(0, "C3", 0.15); note(1, "G2", 0.15);
    setTimeout(() => { note(0, "A2", 0.2); note(1, "E2", 0.2); }, 150);
  }
  function levelClearSound() {
    note(0, "C5", 0.1);
    setTimeout(() => note(0, "E5", 0.1), 100);
    setTimeout(() => note(0, "G5", 0.1), 200);
    setTimeout(() => note(0, "C6", 0.2), 300);
  }
  function bonusSound() { note(0, "A5", 0.04); note(1, "E5", 0.04); }

  function addParticles(x, y, count, color) {
    for (let i = 0; i < count; i++) {
      particles.push({
        x: x, y: y,
        vx: rnd(4) - 2, vy: rnd(3) - 2,
        life: 10 + flr(rnd(15)),
        color: color || (flr(rnd(3)) + 1),
      });
    }
  }

  // --- AI for enemies ---
  function updateEnemy(e) {
    if (e.stunTimer > 0) {
      e.stunTimer--;
      return;
    }

    e.walkFrame += 0.15;
    const speed = e.speed;
    const dx = chef.x - e.x;
    const dy = chef.y - e.y;

    if (e.climbing) {
      const ladder = findLadderAt(e.x, e.y, SS);
      if (ladder) {
        if (dy < -8) {
          e.y -= speed;
          if (e.y + SS - 2 <= ladder.y1) {
            e.climbing = false;
            e.y = ladder.y1 - SS + 2;
          }
        } else if (dy > 8) {
          e.y += speed;
          if (e.y + SS - 2 >= ladder.y2) {
            e.climbing = false;
            e.y = ladder.y2 - SS + 2;
          }
        } else {
          e.climbing = false;
        }
      } else {
        e.climbing = false;
      }
    } else {
      const plat = isOnPlatform(e.x, e.y, SS);
      if (plat) {
        const shouldClimb = _abs(dy) > 20 && rnd(1) < 0.03;
        if (shouldClimb) {
          const ladder = (dy < 0) ? findLadderAbove(e.x, e.y) : findLadderBelow(e.x, e.y);
          if (ladder) {
            e.climbing = true;
            e.x = ladder.x - 4;
            return;
          }
        }

        if (dx > 4) {
          e.x += speed;
          e.dir = 1;
        } else if (dx < -4) {
          e.x -= speed;
          e.dir = -1;
        }

        e.x = _max(plat.x1, min(plat.x2 - SS, e.x));
        e.y = plat.y - SS + 2;
      } else {
        e.y += 2;
        if (e.y > H + 20) e.alive = false;
      }
    }
  }

  // --- Title Scene ---
  Mono.scene(TITLE, {
    init() {},
    update() {
      if (btnp("start") || btnp("a")) {
        Mono.go(PLAY);
        note(0, "C5", 0.08);
        setTimeout(() => note(0, "E5", 0.08), 80);
        setTimeout(() => note(0, "G5", 0.12), 160);
      }
    },
    draw() {
      cls(0);
      drawTitleScreen();
    }
  });

  // --- Play Scene ---
  Mono.scene(PLAY, {
    init() { resetGame(); },
    update() {
    if (invincibleTimer > 0) invincibleTimer--;

    // Death animation
    if (deathTimer > 0) {
      deathTimer--;
      for (let i = particles.length - 1; i >= 0; i--) {
        const p = particles[i]; p.x += p.vx; p.y += p.vy; p.vy += 0.06; p.life--;
        if (p.life <= 0) particles.splice(i, 1);
      }
      if (deathTimer === 0) {
        if (lives <= 0) {
          Mono.go(GAMEOVER); return;
        } else {
          chef.x = 153;
          chef.y = layout.platYs[2] - SS + 2;
          chef.climbing = false;
          chef.onLadder = false;
          invincibleTimer = 90;
          enemies = [];
          enemySpawnTimer = 90;
        }
      }
      return;
    }

    // Level complete
    if (levelComplete) {
      levelCompleteTimer--;
      if (levelCompleteTimer <= 0) {
        level++;
        pepperCount = min(pepperCount + 2, 10);
        startLevel();
        levelComplete = false;
      }
      return;
    }

    // --- Chef movement ---
    const chefPlat = isOnPlatform(chef.x, chef.y, SS);
    const chefLadder = findLadderAt(chef.x, chef.y, SS);

    if (chef.climbing) {
      if (btn("up")) {
        chef.y -= chef.speed;
        walkSound();
        chef.walkFrame += 0.2;
        const ladder = findLadderAt(chef.x, chef.y, SS);
        if (!ladder || chef.y + SS - 2 <= ladder.y1 + 2) {
          if (ladder) chef.y = ladder.y1 - SS + 2;
          chef.climbing = false;
        }
      }
      if (btn("down")) {
        chef.y += chef.speed;
        walkSound();
        chef.walkFrame += 0.2;
        const ladder = findLadderAt(chef.x, chef.y, SS);
        if (!ladder || chef.y + SS - 2 >= ladder.y2 - 2) {
          if (ladder) chef.y = ladder.y2 - SS + 2;
          chef.climbing = false;
        }
      }
      if (btn("left") || btn("right")) {
        const p = isOnPlatform(chef.x, chef.y, SS);
        if (p) chef.climbing = false;
      }
    } else {
      let moved = false;
      if (btn("left")) {
        chef.x -= chef.speed;
        chef.dir = -1;
        moved = true;
      }
      if (btn("right")) {
        chef.x += chef.speed;
        chef.dir = 1;
        moved = true;
      }
      if (moved) {
        chef.walkFrame += 0.2;
        walkSound();
      }

      if (btn("up")) {
        const ladder = findLadderBelow(chef.x, chef.y) || findLadderAt(chef.x, chef.y, SS);
        if (ladder && chef.y + SS - 2 > ladder.y1 - 4) {
          chef.climbing = true;
          chef.x = ladder.x - 4;
        }
      }
      if (btn("down")) {
        const ladder = findLadderBelow(chef.x, chef.y);
        if (ladder) {
          chef.climbing = true;
          chef.x = ladder.x - 4;
        }
      }

      if (chefPlat) {
        chef.y = chefPlat.y - SS + 2;
        chef.x = _max(chefPlat.x1 - 2, min(chefPlat.x2 - SS + 2, chef.x));
      } else if (!chef.climbing) {
        chef.y += 2;
        const p2 = isOnPlatform(chef.x, chef.y, SS);
        if (p2) chef.y = p2.y - SS + 2;
      }
    }

    // Keep in bounds
    chef.x = _max(2, min(W - SS - 2, chef.x));
    chef.y = _max(PLAY_TOP, min(PLAY_BOT - SS, chef.y));

    // --- Pepper throw ---
    if (btnp("a") && pepperCount > 0 && peppers.length === 0) {
      pepperCount--;
      peppers.push({
        x: chef.x + (chef.dir > 0 ? SS : -SS),
        y: chef.y,
        dir: chef.dir,
        timer: 20,
      });
      pepperSound();
    }

    // Update peppers — pepper is a circle (center + radius)
    for (let i = peppers.length - 1; i >= 0; i--) {
      const p = peppers[i];
      p.timer--;
      if (p.timer <= 0) { peppers.splice(i, 1); continue; }

      const pcx = p.x + 8;
      const pcy = p.y + 8;
      const pr = 8;

      // Pepper-enemy collision: circle (pepper) vs rect (enemy hitbox)
      for (const e of enemies) {
        if (e.stunTimer <= 0) {
          const ex = e.x + CHR_HBX;
          const ey = e.y + CHR_HBY;
          if (circRectHit(pcx, pcy, pr, ex, ey, CHR_HBW, CHR_HBH)) {
            e.stunTimer = 120 + level * 10;
            score += 100;
            bonusSound();
            addParticles(e.x + 8, e.y + 8, 5, 3);
          }
        }
      }
    }

    // --- Check chef walking over ingredients ---
    for (const ing of layout.ingredients) {
      if (ing.settled || ing.dropping) continue;

      const ingY = ing.y;
      if (_abs(chef.y + SS - 2 - ingY) < 6) {
        // Check left half
        if (!ing.walked[0] && chef.x + SS - 4 > ing.x && chef.x < ing.x + SS) {
          ing.walked[0] = true;
          note(1, "E4", 0.03);
        }
        // Check right half
        if (!ing.walked[1] && chef.x + SS - 4 > ing.x + SS && chef.x < ing.x + SS * 2) {
          ing.walked[1] = true;
          note(1, "E4", 0.03);
        }

        if (ing.walked[0] && ing.walked[1] && !ing.dropping) {
          ing.dropping = true;
          ing.dropSpeed = 0;
          dropSound();
          score += 50;

          for (let ei = enemies.length - 1; ei >= 0; ei--) {
            const e = enemies[ei];
            if (_abs(e.y + SS - 2 - ingY) < 8 && e.x + SS > ing.x && e.x < ing.x + SS * 2) {
              e.crushed = true;
              score += 500;
              crushSound();
              addParticles(e.x + 8, e.y + 8, 8, 3);
              enemies.splice(ei, 1);
            }
          }
        }
      }
    }

    // --- Update dropping ingredients ---
    for (const ing of layout.ingredients) {
      if (!ing.dropping || ing.settled) continue;

      ing.dropSpeed = min(ing.dropSpeed + 0.3, 4);
      ing.y += ing.dropSpeed;

      let landY = ing.finalY;

      const colIngs = layout.ingredients.filter(
        oi => oi.col === ing.col && oi !== ing && oi.settled && oi.y < landY + 10
      );
      if (colIngs.length > 0) {
        const topSettled = colIngs.reduce((a, b) => a.y < b.y ? a : b);
        landY = topSettled.y - 5;
      }

      for (const other of layout.ingredients) {
        if (other === ing || other.col !== ing.col || other.settled || other.dropping) continue;
        if (other.y > ing.y && other.y < ing.y + SS) {
          other.dropping = true;
          other.dropSpeed = ing.dropSpeed;
          other.walked = [true, true];
          score += 50;

          for (let ei = enemies.length - 1; ei >= 0; ei--) {
            const e = enemies[ei];
            if (_abs(e.y + SS - 2 - other.y) < 8 && e.x + SS > other.x && e.x < other.x + SS * 2) {
              e.crushed = true;
              score += 500;
              crushSound();
              addParticles(e.x + 8, e.y + 8, 8, 3);
              enemies.splice(ei, 1);
            }
          }
        }
      }

      if (ing.y >= landY) {
        ing.y = landY;
        ing.dropping = false;
        ing.settled = true;
        ing.dropSpeed = 0;
        addParticles(ing.x + SS, ing.y + 4, 4, 2);
        note(1, "C3", 0.05);

        const colIngs2 = layout.ingredients.filter(oi => oi.col === ing.col);
        const allSettled = colIngs2.every(oi => oi.settled);
        if (allSettled) {
          burgersCompleted++;
          score += 1000;
          bonusSound();
          addParticles(ing.x + SS, ing.y, 12, 3);
          if (burgersCompleted >= totalBurgers) {
            levelComplete = true;
            levelCompleteTimer = 90;
            levelClearSound();
          }
        }
      }

      // Crush enemies below falling ingredient
      for (let ei = enemies.length - 1; ei >= 0; ei--) {
        const e = enemies[ei];
        if (!e.crushed && e.x + SS > ing.x && e.x < ing.x + SS * 2 &&
            e.y + SS > ing.y - 2 && e.y < ing.y + SS) {
          score += 500;
          crushSound();
          addParticles(e.x + 8, e.y + 8, 8, 3);
          enemies.splice(ei, 1);
        }
      }
    }

    // --- Enemy spawning ---
    enemySpawnTimer--;
    if (enemySpawnTimer <= 0) {
      spawnEnemy();
      enemySpawnTimer = _max(60, 180 - level * 15) + flr(rnd(60));
    }

    // --- Update enemies ---
    for (let i = enemies.length - 1; i >= 0; i--) {
      const e = enemies[i];
      if (!e.alive) { enemies.splice(i, 1); continue; }
      updateEnemy(e);

      // Enemy-chef collision: rect vs rect using inner hitboxes
      if (invincibleTimer <= 0 && deathTimer <= 0 && e.stunTimer <= 0) {
        const cx1 = chef.x + CHR_HBX, cy1 = chef.y + CHR_HBY;
        const ex1 = e.x + CHR_HBX, ey1 = e.y + CHR_HBY;
        if (cx1 < ex1 + CHR_HBW && cx1 + CHR_HBW > ex1 &&
            cy1 < ey1 + CHR_HBH && cy1 + CHR_HBH > ey1) {
          lives--;
          deathTimer = 60;
          deathSound();
          addParticles(chef.x + 8, chef.y + 8, 15, 3);
        }
      }
    }

    // --- Update particles ---
    for (let i = particles.length - 1; i >= 0; i--) {
      const p = particles[i];
      p.x += p.vx; p.y += p.vy; p.vy += 0.06; p.life--;
      if (p.life <= 0) particles.splice(i, 1);
    }
    },
    draw() {
      cls(0);

    // Draw platforms
    for (const p of layout.platforms) {
      rectf(p.x1, p.y, p.x2 - p.x1, 2, 1);
      for (let dx = p.x1; dx < p.x2; dx += 6) {
        pix(dx, p.y, 2);
      }
    }

    // Draw ladders
    for (const l of layout.ladders) {
      const lh = l.y2 - l.y1;
      for (let dy = 0; dy < lh; dy++) {
        pix(l.x, l.y1 + dy, 1);
        pix(l.x + 7, l.y1 + dy, 1);
      }
      for (let dy = 0; dy < lh; dy += 6) {
        for (let dx = 1; dx < 7; dx++) {
          pix(l.x + dx, l.y1 + dy, 1);
        }
      }
    }

    // Draw plate areas at bottom
    for (let c = 0; c < layout.numCols; c++) {
      const px = layout.colXs[c] - 2;
      const py = layout.platYs[5] + 2;
      rectf(px, py, SS * 2 + 4, 2, 2);
    }

    // Draw ingredients (each is two 16x16 sprites side by side)
    for (const ing of layout.ingredients) {
      const y = flr(ing.y) - 5;
      spr(ing.type.sprL, flr(ing.x), y);
      spr(ing.type.sprR, flr(ing.x) + SS, y);

      if (!ing.settled && !ing.dropping) {
        if (ing.walked[0]) {
          rectf(flr(ing.x), y + 12, SS, 1, 2);
        }
        if (ing.walked[1]) {
          rectf(flr(ing.x) + SS, y + 12, SS, 1, 2);
        }
      }
    }

    // Draw pepper clouds — debug circle collision
    for (const p of peppers) {
      spr(23, flr(p.x), flr(p.y));
      Mono.dbgC(p.x + 8, p.y + 8, 8);
      if (p.timer > 10) {
        pix(flr(p.x + rnd(SS)), flr(p.y + rnd(SS)), 3);
        pix(flr(p.x + rnd(SS)), flr(p.y + rnd(SS)), 2);
      }
    }

    // Draw enemies — debug rect hitbox
    for (const e of enemies) {
      if (e.stunTimer > 0) {
        if (flr(Mono.frame / 4) % 2 === 0) {
          spr(e.type, flr(e.x), flr(e.y), e.dir < 0);
        }
        spr(28, flr(e.x), flr(e.y - SS));
      } else {
        spr(e.type, flr(e.x), flr(e.y), e.dir < 0);
      }
      Mono.dbg(e.x + CHR_HBX, e.y + CHR_HBY, CHR_HBW, CHR_HBH);
    }

    // Draw chef — debug rect hitbox
    if (deathTimer <= 0 || flr(Mono.frame / 3) % 2 === 0) {
      if (invincibleTimer > 0 && flr(Mono.frame / 3) % 2 === 0) {
        // Blinking during invincibility - skip draw
      } else {
        let sprId;
        if (chef.climbing) {
          sprId = 3;
        } else {
          sprId = (flr(chef.walkFrame) % 2 === 0) ? 1 : 2;
        }
        spr(sprId, flr(chef.x), flr(chef.y), chef.dir < 0);
      }
    }
    Mono.dbg(chef.x + CHR_HBX, chef.y + CHR_HBY, CHR_HBW, CHR_HBH);

    // Particles
    for (const p of particles) pix(flr(p.x), flr(p.y), p.color);

    // HUD — all clamped within 320x240
    rectf(0, 0, W, HUD_H, 0);
    text("SCORE:" + score, 4, 3, 3);
    text("LV:" + level, 120, 3, 2);

    // Pepper count — position so it doesn't overflow
    const pepTxt = "PEP:" + pepperCount;
    text(pepTxt, 168, 3, 2);

    // Lives icons — clamp to at most 5 icons, right-aligned safely
    const maxLivesShown = min(lives, 5);
    const livesStartX = W - 8 - maxLivesShown * 18;
    for (let i = 0; i < maxLivesShown; i++) spr(26, livesStartX + i * 18, 0);

    // Burgers remaining — second line
    const burgTxt = "LEFT:" + (totalBurgers - burgersCompleted) + "/" + totalBurgers;
    text(burgTxt, 4, 10, 1);

    // Level complete message
    if (levelComplete) {
      rectf(W / 2 - 50, 105, 100, 23, 0);
      rect(W / 2 - 50, 105, 100, 23, 3);
      text("LEVEL CLEAR!", W / 2 - 30, 109, 3);
      text("BONUS: " + (level * 500), W / 2 - 28, 119, 2);
      score += flr(level * 500 / 90);
    }

    // Death message
    if (deathTimer > 30) {
      text("OUCH!", W / 2 - 13, 120, 3);
    }
    }
  });

  // --- Game Over Scene ---
  Mono.scene(GAMEOVER, {
    init() {},
    update() {
      for (let i = particles.length - 1; i >= 0; i--) {
        const p = particles[i]; p.x += p.vx; p.y += p.vy; p.vy += 0.08; p.life--;
        if (p.life <= 0) particles.splice(i, 1);
      }
      if (btnp("start") || btnp("a")) Mono.go(TITLE);
    },
    draw() {
      cls(0);
      for (const p of particles) pix(flr(p.x), flr(p.y), p.color);
      text("GAME OVER", W / 2 - 23, 83, 3);
      text("SCORE: " + score, W / 2 - 23, 101, 2);
      text("LEVEL: " + level, W / 2 - 15, 113, 2);
      if (flr(Mono.frame / 20) % 2 === 0) text("PRESS START", W / 2 - 28, 150, 3);
    }
  });

  function drawTitleScreen() {
    const ty = 38 + sin(Mono.frame * 0.05) * 3;

    text("BURGER TIME", W / 2 - 28, flr(ty), 3);
    rectf(W / 2 - 38, flr(ty) + 10, 76, 1, 2);

    // Draw a cute burger (two 16x16 tiles per row)
    const bx = W / 2 - SS;
    const by = flr(ty) + 20;
    spr(10, bx, by); spr(11, bx + SS, by);
    spr(14, bx, by + SS); spr(15, bx + SS, by + SS);
    spr(12, bx, by + SS + 8); spr(13, bx + SS, by + SS + 8);
    spr(18, bx, by + SS * 2 + 4); spr(19, bx + SS, by + SS * 2 + 4);
    spr(16, bx, by + SS * 2 + 12); spr(17, bx + SS, by + SS * 2 + 12);

    // Chef and enemies
    const ey = by + SS * 3 + 16;
    if (ey + SS < H - 30) {
      spr(1, bx - 24, flr(ey + sin(Mono.frame * 0.08) * 2));
      spr(20, bx + SS + 8, flr(ey + sin(Mono.frame * 0.08 + 1) * 2));
      spr(21, bx + SS + 26, flr(ey + sin(Mono.frame * 0.08 + 2) * 2));
      spr(22, bx + SS + 44, flr(ey + sin(Mono.frame * 0.08 + 3) * 2));
    }

    if (flr(Mono.frame / 20) % 2 === 0) text("PRESS START", W / 2 - 28, 155, 3);

    text("-HOW TO PLAY-", W / 2 - 33, 173, 2);
    text("WALK OVER BURGERS", W / 2 - 45, 185, 2);
    text("TO DROP THEM DOWN!", W / 2 - 45, 195, 2);
    text("A = PEPPER STUN", W / 2 - 38, 210, 2);

    text("MONO DEMO V0.1", W / 2 - 35, 229, 1);
  }

  Mono.go(TITLE);
  Mono.boot("screen");
})();
</script>
