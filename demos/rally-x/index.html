<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GrayBox — Demo: Rally-X</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #0a0a0a;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100vh;
    font-family: monospace;
    overflow: hidden;
  }
  #frame {
    background: #111;
    border: 3px solid #333;
    border-radius: 8px;
    padding: 12px;
    box-shadow: 0 0 40px rgba(0,0,0,0.8), inset 0 0 20px rgba(0,0,0,0.5);
  }
  canvas {
    display: block;
    image-rendering: pixelated;
    image-rendering: crisp-edges;
  }
  #controls {
    margin-top: 12px;
    color: #6b6b6b;
    font-size: 11px;
    text-align: center;
    letter-spacing: 1px;
  }
  #controls span { color: #b0b0b0; }
</style>
</head>
<body>
<div id="frame">
  <canvas id="screen"></canvas>
</div>
<div id="controls">
  <span>ARROWS</span> STEER &nbsp;&nbsp; <span>Z</span> SMOKE &nbsp;&nbsp; <span>ENTER</span> START
</div>
<script>
(() => {
  "use strict";

  // ============================================================
  // GrayBox Runtime (inline)
  // ============================================================
  const W = 320;
  const H = 240;
  const FPS = 30;
  const COLORS = ["#1a1a1a", "#6b6b6b", "#b0b0b0", "#e8e8e8"];
  const canvas = document.getElementById("screen");
  canvas.width = W;
  canvas.height = H;
  function fitCanvas() {
    var maxW = window.innerWidth - 40;
    var maxH = window.innerHeight - 60;
    var s = Math.min(maxW / W, maxH / H);
    canvas.style.width = (W * s) + "px";
    canvas.style.height = (H * s) + "px";
  }
  fitCanvas();
  window.addEventListener("resize", fitCanvas);
  const ctx = canvas.getContext("2d");
  ctx.imageSmoothingEnabled = false;
  const buf = ctx.createImageData(W, H);
  const buf32 = new Uint32Array(buf.data.buffer);

  function hexToABGR(hex) {
    const r = parseInt(hex.slice(1, 3), 16);
    const g = parseInt(hex.slice(3, 5), 16);
    const b = parseInt(hex.slice(5, 7), 16);
    return (255 << 24) | (b << 16) | (g << 8) | r;
  }
  const COLOR_U32 = COLORS.map(hexToABGR);

  const sprites = {};
  const tilemap = {};

  const keyMap = {
    "ArrowUp": "up", "ArrowDown": "down", "ArrowLeft": "left", "ArrowRight": "right",
    "w": "up", "s": "down", "a": "left", "d": "right", "ㅈ": "up", "ㄴ": "down", "ㅁ": "left", "ㅇ": "right",
    "z": "a", "Z": "a", "x": "b", "X": "b", "ㅋ": "a", "ㅌ": "b",
    "Enter": "a", " ": "a"
  };
  const keys = {};
  const keysPrev = {};

  document.addEventListener("keydown", e => {
    const k = keyMap[e.key];
    if (k) { keys[k] = true; e.preventDefault(); }
  });
  document.addEventListener("keyup", e => {
    const k = keyMap[e.key];
    if (k) { keys[k] = false; e.preventDefault(); }
  });

  let audioCtx = null;
  const channels = [null, null];
  const channelGains = [null, null];
  function ensureAudio() {
    if (!audioCtx) {
      audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      for (let i = 0; i < 2; i++) {
        channelGains[i] = audioCtx.createGain();
        channelGains[i].gain.value = 0.15;
        channelGains[i].connect(audioCtx.destination);
      }
    }
  }

  const NOTE_NAMES = ["C","C#","D","D#","E","F","F#","G","G#","A","A#","B"];
  function noteToFreq(noteStr) {
    const match = noteStr.match(/^([A-G]#?)(\d)$/);
    if (!match) return 440;
    const name = match[1];
    const octave = parseInt(match[2]);
    const semitone = NOTE_NAMES.indexOf(name);
    if (semitone === -1) return 440;
    const midi = (octave + 1) * 12 + semitone;
    return 440 * Math.pow(2, (midi - 69) / 12);
  }

  const FONT_W = 4;
  const FONT_H = 7;
  const FONT = {};
  const fontData = {
    "A":"0110100110011111100110011001","B":"1110100110101110100110011110",
    "C":"0110100110001000100001100110","D":"1100101010011001100110101100",
    "E":"1111100010001110100010001111","F":"1111100010001110100010001000",
    "G":"0111100010001011100101100111","H":"1001100110011111100110011001",
    "I":"1110010001000100010001001110","J":"0111001000100010001010100100",
    "K":"1001101011001100101010011001","L":"1000100010001000100010001111",
    "M":"1001111111011001100110011001","N":"1001110111011001100110011001",
    "O":"0110100110011001100110010110","P":"1110100110011110100010001000",
    "Q":"0110100110011001101101100001","R":"1110100110011110101010011001",
    "S":"0111100010000110000110001110","T":"1111001000100010001000100010",
    "U":"1001100110011001100110010110","V":"1001100110011001100101100110",
    "W":"1001100110011001101111011001","X":"1001100101100110011010011001",
    "Y":"1001100101100010001000100010","Z":"1111000100100100100010001111",
    "0":"0110100111011011101110010110","1":"0100110001000100010001001110",
    "2":"0110100100010010010010001111","3":"1110000100010110000110011110",
    "4":"1001100110011111000100010001","5":"1111100010001110000100011110",
    "6":"0110100010001110100110010110","7":"1111000100010010010001001000",
    "8":"0110100110010110100110010110","9":"0110100110010111000100010110",
    " ":"0000000000000000000000000000",
    ".":"0000000000000000000001000100",
    ",":"0000000000000000001000101000",
    "!":"0100010001000100000000000100",
    "?":"0110100100010010000000000010",
    "-":"0000000000001110000000000000",
    "+":"0000001001001110010000100000",
    ":":"0000010001000000010001000000",
    "/":"0001000100100010010010001000",
    "*":"0000101001001110010010100000",
    "#":"0101111101011111010100000000",
    "(":"0010010010001000010001000010",
    ")":"0100001000010001000100100100",
    "=":"0000000011110000111100000000",
    "'":"0100010010000000000000000000",
    "\"":"1010101000000000000000000000",
    "<":"0010010010001000010000100010",
    ">":"1000010000100001001001001000",
    "_":"0000000000000000000000001111",
  };
  for (const [ch, bits] of Object.entries(fontData)) {
    FONT[ch] = [];
    for (let i = 0; i < bits.length; i++) FONT[ch].push(parseInt(bits[i]));
  }

  const API = {};
  API._init = null;
  API._update = null;
  API._draw = null;
  API.frame = 0;

  API.cls = function(c = 0) { buf32.fill(COLOR_U32[c] || COLOR_U32[0]); };
  API.pix = function(x, y, c) {
    x = Math.floor(x); y = Math.floor(y);
    if (x < 0 || x >= W || y < 0 || y >= H) return;
    buf32[y * W + x] = COLOR_U32[c] || COLOR_U32[0];
  };
  API.line = function(x0, y0, x1, y1, c) {
    x0=Math.floor(x0); y0=Math.floor(y0); x1=Math.floor(x1); y1=Math.floor(y1);
    const dx=Math.abs(x1-x0), dy=Math.abs(y1-y0);
    const sx=x0<x1?1:-1, sy=y0<y1?1:-1;
    let err=dx-dy;
    while(true) {
      API.pix(x0,y0,c);
      if(x0===x1&&y0===y1) break;
      const e2=2*err;
      if(e2>-dy){err-=dy;x0+=sx;}
      if(e2<dx){err+=dx;y0+=sy;}
    }
  };
  API.rect = function(x,y,w,h,c) {
    API.line(x,y,x+w-1,y,c); API.line(x+w-1,y,x+w-1,y+h-1,c);
    API.line(x+w-1,y+h-1,x,y+h-1,c); API.line(x,y+h-1,x,y,c);
  };
  API.rectf = function(x,y,w,h,c) {
    x=Math.floor(x); y=Math.floor(y);
    const col=COLOR_U32[c]||COLOR_U32[0];
    for(let py=Math.max(0,y);py<Math.min(H,y+h);py++)
      for(let px=Math.max(0,x);px<Math.min(W,x+w);px++)
        buf32[py*W+px]=col;
  };
  API.circ = function(cx,cy,r,c) {
    let x=r,y=0,d=1-r; cx=Math.floor(cx); cy=Math.floor(cy);
    while(x>=y){
      API.pix(cx+x,cy+y,c);API.pix(cx-x,cy+y,c);
      API.pix(cx+x,cy-y,c);API.pix(cx-x,cy-y,c);
      API.pix(cx+y,cy+x,c);API.pix(cx-y,cy+x,c);
      API.pix(cx+y,cy-x,c);API.pix(cx-y,cy-x,c);
      y++; if(d<0){d+=2*y+1;}else{x--;d+=2*(y-x)+1;}
    }
  };
  API.circf = function(cx,cy,r,c) {
    cx=Math.floor(cx); cy=Math.floor(cy);
    const col=COLOR_U32[c]||COLOR_U32[0]; const r2=r*r;
    for(let py=-r;py<=r;py++) for(let px=-r;px<=r;px++)
      if(px*px+py*py<=r2){ const sx=cx+px,sy=cy+py;
        if(sx>=0&&sx<W&&sy>=0&&sy<H) buf32[sy*W+sx]=col; }
  };
  API.sprite = function(id, data) {
    const arr = new Uint8Array(64); let i = 0;
    for (const ch of data) { if (ch>='0'&&ch<='3') { arr[i++]=parseInt(ch); if(i>=64) break; } }
    sprites[id] = arr;
  };
  API.spr = function(id, x, y, flipX, flipY) {
    const s=sprites[id]; if(!s) return;
    x=Math.floor(x); y=Math.floor(y);
    for(let py=0;py<8;py++) for(let px=0;px<8;px++){
      const sx=flipX?7-px:px, sy=flipY?7-py:py;
      const c=s[sy*8+sx], dx=x+px, dy=y+py;
      if(dx>=0&&dx<W&&dy>=0&&dy<H) buf32[dy*W+dx]=COLOR_U32[c];
    }
  };
  API.text = function(str, x, y, c) {
    str=String(str).toUpperCase(); let cx=Math.floor(x); const cy=Math.floor(y);
    const col=COLOR_U32[c]||COLOR_U32[3];
    for(const ch of str){
      const glyph=FONT[ch];
      if(glyph) for(let py=0;py<FONT_H;py++) for(let px=0;px<FONT_W;px++)
        if(glyph[py*FONT_W+px]){ const dx=cx+px,dy=cy+py;
          if(dx>=0&&dx<W&&dy>=0&&dy<H) buf32[dy*W+dx]=col; }
      cx+=FONT_W+1;
    }
  };
  API.mget = function(cx,cy) { return tilemap[cx+","+cy]||0; };
  API.mset = function(cx,cy,id) { tilemap[cx+","+cy]=id; };
  API.map = function(mx,my,mw,mh,sx,sy) {
    for(let ty=0;ty<mh;ty++) for(let tx=0;tx<mw;tx++){
      const id=API.mget(mx+tx,my+ty); if(id>0) API.spr(id,sx+tx*8,sy+ty*8); }
  };
  const VALID_KEYS = {up:1,down:1,left:1,right:1,a:1,b:1};
  API.btn = function(k) { if(!VALID_KEYS[k]) console.warn("GrayBox: invalid key \""+k+"\". Use: up/down/left/right/a/b"); return !!keys[k]; };
  API.btnp = function(k) { if(!VALID_KEYS[k]) console.warn("GrayBox: invalid key \""+k+"\". Use: up/down/left/right/a/b"); return !!keys[k] && !keysPrev[k]; };
  API.note = function(ch, noteStr, dur) {
    ensureAudio(); if(ch<0||ch>1) return; API.stop(ch);
    const osc=audioCtx.createOscillator(); osc.type="square";
    osc.frequency.value=noteToFreq(noteStr);
    osc.connect(channelGains[ch]); osc.start();
    osc.stop(audioCtx.currentTime+dur); channels[ch]=osc;
  };
  API.stop = function(ch) {
    if(ch===undefined){API.stop(0);API.stop(1);return;}
    if(channels[ch]){try{channels[ch].stop();}catch(e){} channels[ch]=null;}
  };
  API.rnd = function(max) { return Math.random()*max; };
  API.flr = Math.floor;
  API.abs = Math.abs;
  API.min = Math.min;
  API.max = Math.max;
  API.sin = Math.sin;
  API.cos = Math.cos;

  function tick() {
    if (API._update) API._update();
    if (API._draw) API._draw();
    ctx.putImageData(buf, 0, 0);
    for (const k in keys) keysPrev[k] = keys[k];
    API.frame++;
  }

  // ============================================================
  // Rally-X Game
  // ============================================================
  const { cls, pix, line, rect, rectf, circ, circf, sprite: defSprite,
          spr, text, btn, btnp, note, stop, rnd, flr, abs: _abs,
          min, max: _max, sin, cos } = API;

  // --- Sprites ---
  // 1: Player car facing up
  defSprite(1,
    "00333000" +
    "03322300" +
    "03333300" +
    "33333330" +
    "32333230" +
    "33333330" +
    "03333300" +
    "03022030"
  );
  // 2: Player car facing right
  defSprite(2,
    "00333330" +
    "03332230" +
    "33333330" +
    "33333333" +
    "03332230" +
    "00333330" +
    "00200200" +
    "00000000"
  );
  // 3: Player car facing down
  defSprite(3,
    "03022030" +
    "03333300" +
    "33333330" +
    "32333230" +
    "33333330" +
    "03333300" +
    "03322300" +
    "00333000"
  );
  // 4: Player car facing left
  defSprite(4,
    "03333300" +
    "03222330" +
    "03333333" +
    "33333333" +
    "03222330" +
    "03333300" +
    "00200200" +
    "00000000"
  );
  // 5: Enemy car facing up
  defSprite(5,
    "00111000" +
    "01122100" +
    "01111100" +
    "11111110" +
    "12111210" +
    "11111110" +
    "01111100" +
    "01011010"
  );
  // 6: Enemy car facing right
  defSprite(6,
    "00111110" +
    "01112210" +
    "11111110" +
    "11111111" +
    "01112210" +
    "00111110" +
    "00100100" +
    "00000000"
  );
  // 7: Enemy car facing down
  defSprite(7,
    "01011010" +
    "01111100" +
    "11111110" +
    "12111210" +
    "11111110" +
    "01111100" +
    "01122100" +
    "00111000"
  );
  // 8: Enemy car facing left
  defSprite(8,
    "01111100" +
    "01221110" +
    "01111111" +
    "11111111" +
    "01221110" +
    "01111100" +
    "00100100" +
    "00000000"
  );
  // 9: Flag
  defSprite(9,
    "03333300" +
    "03333300" +
    "03333300" +
    "03300000" +
    "03300000" +
    "03300000" +
    "03300000" +
    "03300000"
  );
  // 10: Special flag
  defSprite(10,
    "03333300" +
    "03212300" +
    "03333300" +
    "03300000" +
    "03300000" +
    "03300000" +
    "03300000" +
    "03300000"
  );
  // 11: Smoke puff
  defSprite(11,
    "00000000" +
    "00110000" +
    "01221100" +
    "12222210" +
    "12222210" +
    "01221100" +
    "00110000" +
    "00000000"
  );
  // 12: Wall tile
  defSprite(12,
    "22222222" +
    "21111112" +
    "21111112" +
    "21111112" +
    "21111112" +
    "21111112" +
    "21111112" +
    "22222222"
  );

  // --- Constants ---
  const MAZE_W = 32;
  const MAZE_H = 32;
  const TILE = 8;
  const MAZE_PX_W = MAZE_W * TILE;
  const MAZE_PX_H = MAZE_H * TILE;
  const VIEW_X = 0;
  const VIEW_Y = 9;
  const VIEW_W = 267;
  const VIEW_H = 222;
  const RADAR_X = 273;
  const RADAR_Y = 14;
  const RADAR_W = 41;
  const RADAR_H = 46;

  // Direction vectors: 0=up, 1=right, 2=down, 3=left
  const DX = [0, 1, 0, -1];
  const DY = [-1, 0, 1, 0];

  // --- Maze ---
  let maze = [];

  function generateMaze(lvl) {
    maze = [];
    for (let y = 0; y < MAZE_H; y++) {
      maze[y] = [];
      for (let x = 0; x < MAZE_W; x++) maze[y][x] = 1;
    }
    // Carve road grid
    const sp = 3;
    for (let y = 1; y < MAZE_H - 1; y++)
      for (let x = 1; x < MAZE_W - 1; x++)
        if (y % sp === 1 || x % sp === 1) maze[y][x] = 0;
    // Extra passages
    for (let i = 0; i < 30 + lvl * 5; i++) {
      const rx = 2 + flr(rnd(MAZE_W - 4));
      const ry = 2 + flr(rnd(MAZE_H - 4));
      maze[ry][rx] = 0;
    }
    // Block some passages for dead ends
    for (let i = 0; i < 8 + lvl * 2; i++) {
      const rx = 2 + flr(rnd(MAZE_W - 4));
      const ry = 2 + flr(rnd(MAZE_H - 4));
      if ((rx % sp === 1) !== (ry % sp === 1)) maze[ry][rx] = 1;
    }
    // Borders
    for (let x = 0; x < MAZE_W; x++) { maze[0][x] = 1; maze[MAZE_H-1][x] = 1; }
    for (let y = 0; y < MAZE_H; y++) { maze[y][0] = 1; maze[y][MAZE_W-1] = 1; }
    // Spawn area clear
    const cx = flr(MAZE_W / 2), cy = flr(MAZE_H / 2);
    for (let dy = -1; dy <= 1; dy++)
      for (let dx = -1; dx <= 1; dx++)
        if (cy+dy > 0 && cy+dy < MAZE_H-1 && cx+dx > 0 && cx+dx < MAZE_W-1)
          maze[cy+dy][cx+dx] = 0;
  }

  function isRoad(tx, ty) {
    if (tx < 0 || tx >= MAZE_W || ty < 0 || ty >= MAZE_H) return false;
    return maze[ty][tx] === 0;
  }

  function canMove(px, py) {
    const m = 1;
    const x1 = px + m, y1 = py + m, x2 = px + 7 - m, y2 = py + 7 - m;
    const tx1 = flr(x1 / TILE), ty1 = flr(y1 / TILE);
    const tx2 = flr(x2 / TILE), ty2 = flr(y2 / TILE);
    for (let ty = ty1; ty <= ty2; ty++)
      for (let tx = tx1; tx <= tx2; tx++)
        if (!isRoad(tx, ty)) return false;
    return true;
  }

  // --- State ---
  let state = "title";
  let player, enemies, flags, smokes;
  let score, lives, level, fuel, maxFuel;
  let camX, camY;
  let specialFlagIdx, doublePoints;
  let flagsCollected, totalFlags;
  let respawnTimer, levelCompleteTimer;
  let engineSndTimer;

  function dirSpr(base, dir) { return base + dir; }

  function findRoadSpot() {
    let x, y;
    do {
      x = 1 + flr(rnd(MAZE_W - 2));
      y = 1 + flr(rnd(MAZE_H - 2));
    } while (!isRoad(x, y));
    return { x: x * TILE, y: y * TILE };
  }

  function resetGame() {
    score = 0;
    lives = 3;
    level = 0;
    doublePoints = false;
    startLevel();
  }

  function startLevel() {
    level++;
    generateMaze(level);
    const cx = flr(MAZE_W / 2) * TILE, cy = flr(MAZE_H / 2) * TILE;
    player = { x: cx, y: cy, dir: 0, nextDir: -1, speed: 1.5 + level * 0.08, moving: true };
    // Flags
    totalFlags = 8 + level * 2;
    if (totalFlags > 20) totalFlags = 20;
    flags = [];
    for (let i = 0; i < totalFlags; i++) {
      let spot, ok;
      do {
        spot = findRoadSpot(); ok = true;
        if (_abs(spot.x - player.x) + _abs(spot.y - player.y) < 48) ok = false;
        for (const f of flags) if (f.x === spot.x && f.y === spot.y) ok = false;
      } while (!ok);
      flags.push({ x: spot.x, y: spot.y, collected: false });
    }
    specialFlagIdx = flr(rnd(totalFlags));
    doublePoints = false;
    flagsCollected = 0;
    // Enemies
    const ne = min(2 + level, 8);
    enemies = [];
    for (let i = 0; i < ne; i++) {
      let spot, ok;
      do { spot = findRoadSpot(); ok = true;
        if (_abs(spot.x - player.x) + _abs(spot.y - player.y) < 64) ok = false;
      } while (!ok);
      enemies.push({ x: spot.x, y: spot.y, dir: flr(rnd(4)), speed: 1.0 + level * 0.1, turnTimer: 0, stunTimer: 0 });
    }
    smokes = [];
    fuel = 1000; maxFuel = 1000;
    respawnTimer = 0; levelCompleteTimer = 0; engineSndTimer = 0;
    camX = 0; camY = 0;
  }

  function moveEnt(ent, spd) {
    const nx = ent.x + DX[ent.dir] * spd;
    const ny = ent.y + DY[ent.dir] * spd;
    if (canMove(nx, ny)) { ent.x = nx; ent.y = ny; return true; }
    return false;
  }

  function snapGrid(ent) {
    const S = 1.5;
    const gx = Math.round(ent.x / TILE) * TILE;
    const gy = Math.round(ent.y / TILE) * TILE;
    if (ent.dir === 0 || ent.dir === 2) { if (_abs(ent.x - gx) < S) ent.x = gx; }
    else { if (_abs(ent.y - gy) < S) ent.y = gy; }
  }

  function canTurn(ent, d) {
    const nx = ent.x + DX[d] * 2;
    const ny = ent.y + DY[d] * 2;
    return canMove(nx, ny);
  }

  // --- Sounds ---
  function sfxCollect() { note(0,"E5",0.05); setTimeout(()=>note(0,"G5",0.05),50); setTimeout(()=>note(0,"C6",0.07),100); }
  function sfxSpecial() { note(0,"C5",0.04); setTimeout(()=>note(0,"E5",0.04),50); setTimeout(()=>note(0,"G5",0.04),100); setTimeout(()=>note(0,"C6",0.08),150); setTimeout(()=>note(0,"E6",0.1),200); }
  function sfxSmoke() { note(1,"C2",0.03); }
  function sfxDeath() { note(0,"C4",0.07); setTimeout(()=>note(0,"A3",0.09),80); setTimeout(()=>note(0,"F3",0.11),160); setTimeout(()=>note(0,"C3",0.18),260); }
  function sfxClear() { note(0,"C5",0.07); setTimeout(()=>note(0,"E5",0.07),100); setTimeout(()=>note(0,"G5",0.07),200); setTimeout(()=>note(0,"C6",0.12),300); }
  function sfxEngine() { if (engineSndTimer <= 0) { note(1,"A1",0.025); engineSndTimer = 6; } }

  resetGame();

  // ============================================================
  // Update
  // ============================================================
  API._update = function() {
    if (state === "title") {
      if (btnp("a") || btnp("a")) { state = "play"; resetGame(); note(0,"C5",0.07); setTimeout(()=>note(0,"G5",0.1),100); }
      return;
    }
    if (state === "gameover") {
      if (btnp("a") || btnp("a")) state = "title";
      return;
    }
    if (state !== "play") return;

    // Level complete delay
    if (levelCompleteTimer > 0) { levelCompleteTimer--; if (levelCompleteTimer <= 0) startLevel(); return; }
    // Respawn delay
    if (respawnTimer > 0) {
      respawnTimer--;
      if (respawnTimer <= 0) {
        player.x = flr(MAZE_W/2)*TILE; player.y = flr(MAZE_H/2)*TILE;
        player.dir = 0; player.nextDir = -1;
      }
      return;
    }

    // Fuel depletion
    fuel -= 0.3;
    if (fuel <= 0) {
      fuel = 0; lives--;
      sfxDeath();
      if (lives <= 0) { state = "gameover"; } else { respawnTimer = 60; fuel = maxFuel; }
      return;
    }

    engineSndTimer--;

    // Player input
    if (btn("up")) player.nextDir = 0;
    else if (btn("right")) player.nextDir = 1;
    else if (btn("down")) player.nextDir = 2;
    else if (btn("left")) player.nextDir = 3;

    snapGrid(player);
    if (player.nextDir >= 0 && player.nextDir !== player.dir) {
      if (canTurn(player, player.nextDir)) { player.dir = player.nextDir; player.nextDir = -1; }
    }

    const moved = moveEnt(player, player.speed);
    if (moved) sfxEngine();

    // Smoke
    if (btn("a") && fuel > 50) {
      fuel -= 1.5;
      if (API.frame % 4 === 0) {
        smokes.push({ x: player.x - DX[player.dir]*6+1, y: player.y - DY[player.dir]*6+1, life: 90 });
        sfxSmoke();
      }
    }

    // Update smokes
    for (let i = smokes.length - 1; i >= 0; i--) { smokes[i].life--; if (smokes[i].life <= 0) smokes.splice(i,1); }

    // Flag collection
    for (let i = 0; i < flags.length; i++) {
      const f = flags[i];
      if (f.collected) continue;
      if (_abs(player.x - f.x) < 6 && _abs(player.y - f.y) < 6) {
        f.collected = true; flagsCollected++;
        if (i === specialFlagIdx) { doublePoints = true; score += 200; sfxSpecial(); }
        else { score += doublePoints ? 200 : 100; sfxCollect(); }
        if (flagsCollected >= totalFlags) { levelCompleteTimer = 90; sfxClear(); }
      }
    }

    // Enemy AI
    for (const e of enemies) {
      if (e.stunTimer > 0) { e.stunTimer--; continue; }
      // Check smoke collision
      for (const s of smokes) {
        if (_abs(e.x - s.x) < 8 && _abs(e.y - s.y) < 8) { e.stunTimer = 60; break; }
      }
      if (e.stunTimer > 0) continue;

      snapGrid(e);
      const etx = Math.round(e.x / TILE), ety = Math.round(e.y / TILE);
      const onGrid = _abs(e.x - etx*TILE) < 1.5 && _abs(e.y - ety*TILE) < 1.5;

      e.turnTimer--;
      if (e.turnTimer <= 0 && onGrid) {
        e.turnTimer = 3 + flr(rnd(4));
        const possible = [];
        for (let d = 0; d < 4; d++) if (isRoad(etx+DX[d], ety+DY[d])) possible.push(d);
        if (possible.length > 0) {
          const pdx = player.x - e.x, pdy = player.y - e.y;
          let bestD = e.dir, bestS = -99999;
          for (const d of possible) {
            if (d === (e.dir+2)%4 && possible.length > 1) continue;
            const sc = pdx*DX[d] + pdy*DY[d] + rnd(25) - 12;
            if (sc > bestS) { bestS = sc; bestD = d; }
          }
          e.dir = bestD;
        }
      }
      moveEnt(e, e.speed);

      // Collision with player
      if (_abs(player.x - e.x) < 6 && _abs(player.y - e.y) < 6) {
        lives--; sfxDeath();
        if (lives <= 0) { state = "gameover"; }
        else { respawnTimer = 60; fuel = min(fuel + 300, maxFuel); }
      }
    }

    // Camera
    camX = player.x - VIEW_W/2 + 4;
    camY = player.y - VIEW_H/2 + 4;
    camX = _max(0, min(MAZE_PX_W - VIEW_W, camX));
    camY = _max(0, min(MAZE_PX_H - VIEW_H, camY));
  };

  // ============================================================
  // Draw
  // ============================================================
  function sprW(id, wx, wy, fx, fy) {
    const sx = flr(wx - camX + VIEW_X), sy = flr(wy - camY + VIEW_Y);
    if (sx > -8 && sx < VIEW_X+VIEW_W && sy > -8 && sy < VIEW_Y+VIEW_H) spr(id,sx,sy,fx,fy);
  }

  function drawMaze() {
    const stx = _max(0, flr(camX/TILE)), sty = _max(0, flr(camY/TILE));
    const etx = min(MAZE_W, flr((camX+VIEW_W)/TILE)+2);
    const ety = min(MAZE_H, flr((camY+VIEW_H)/TILE)+2);
    for (let ty = sty; ty < ety; ty++)
      for (let tx = stx; tx < etx; tx++) {
        if (maze[ty][tx] === 1) {
          const sx = flr(tx*TILE - camX + VIEW_X), sy = flr(ty*TILE - camY + VIEW_Y);
          spr(12, sx, sy);
        }
      }
  }

  function drawRadar() {
    rectf(RADAR_X-1, RADAR_Y-1, RADAR_W+2, RADAR_H+2, 0);
    rect(RADAR_X-1, RADAR_Y-1, RADAR_W+2, RADAR_H+2, 1);
    const sx = RADAR_W / MAZE_PX_W, sy = RADAR_H / MAZE_PX_H;
    // Walls (sampled)
    for (let ty = 0; ty < MAZE_H; ty += 2)
      for (let tx = 0; tx < MAZE_W; tx += 2)
        if (maze[ty][tx] === 1) pix(flr(RADAR_X+tx*TILE*sx), flr(RADAR_Y+ty*TILE*sy), 1);
    // Flags
    for (const f of flags) {
      if (f.collected) continue;
      const rx = flr(RADAR_X+f.x*sx), ry = flr(RADAR_Y+f.y*sy);
      pix(rx,ry,3); pix(rx+1,ry,3);
    }
    // Enemies
    for (const e of enemies) {
      const rx = flr(RADAR_X+e.x*sx), ry = flr(RADAR_Y+e.y*sy);
      if (API.frame % 6 < 4) { pix(rx,ry,2); pix(rx+1,ry,2); pix(rx,ry+1,2); }
    }
    // Player (blink)
    if (API.frame % 4 < 3) {
      const rx = flr(RADAR_X+player.x*sx), ry = flr(RADAR_Y+player.y*sy);
      pix(rx,ry,3); pix(rx+1,ry,3); pix(rx,ry+1,3); pix(rx+1,ry+1,3);
    }
  }

  function drawFuel() {
    const gx = RADAR_X-1, gy = RADAR_Y + RADAR_H + 9;
    const gw = RADAR_W+2, gh = 5;
    text("FUEL", gx, gy-8, 2);
    rect(gx, gy, gw, gh, 1);
    const fw = flr((fuel/maxFuel)*(gw-2));
    const fc = fuel < maxFuel*0.25 ? (API.frame%6<3?2:1) : 2;
    rectf(gx+1, gy+1, fw, gh-2, fc);
  }

  API._draw = function() {
    cls(0);

    if (state === "title") {
      const ty = 41 + sin(API.frame*0.05)*4;
      text("RALLY-X", 142, flr(ty), 3);
      rectf(112, flr(ty)+10, 96, 1, 2);

      // Animated cars
      const cx = W/2-30;
      spr(1, cx, flr(ty)+20 + sin(API.frame*0.1)*3);
      spr(5, cx+20, flr(ty)+22 + sin(API.frame*0.1+1)*3);
      spr(2, cx+40, flr(ty)+20 + sin(API.frame*0.1+2)*3);
      spr(9, cx+60, flr(ty)+20);

      if (flr(API.frame/20)%2===0) text("PRESS Z TO START", 120, 128, 3);

      text("COLLECT ALL FLAGS", 117, 149, 2);
      text("AVOID ENEMY CARS", 120, 159, 2);
      text("Z = DEPLOY SMOKE SCREEN", 102, 170, 2);
      text("ARROWS = STEER CAR", 115, 180, 2);

      text("-SCORING-", 137, 197, 2);
      spr(9, 127, 206); text("  FLAG    100 PTS", 133, 207, 2);
      spr(10, 127, 216); text("  SPECIAL  200 PTS", 133, 218, 2);
      text("2X PTS AFTER SPECIAL!", 107, 230, 1);

      text("GRAYBOX DEMO V0.1", 117, 236, 1);
      return;
    }

    if (state === "gameover") {
      text("GAME OVER", 137, 75, 3);
      text("SCORE: " + score, 130, 98, 2);
      text("LEVEL: " + level, 135, 111, 2);
      if (flr(API.frame/20)%2===0) text("PRESS Z TO CONTINUE", 110, 150, 3);
      return;
    }

    // --- Play ---
    // Clip view area
    drawMaze();

    // Smokes
    for (const s of smokes) {
      const a = s.life > 60 ? 2 : (s.life > 30 ? 1 : (API.frame%4<2?1:0));
      if (a > 0) {
        const sx = flr(s.x-camX+VIEW_X), sy = flr(s.y-camY+VIEW_Y);
        if (sx > -8 && sx < VIEW_X+VIEW_W && sy > -8 && sy < VIEW_Y+VIEW_H) circf(sx+3,sy+3,3,a);
      }
    }

    // Flags
    for (let i = 0; i < flags.length; i++) {
      const f = flags[i]; if (f.collected) continue;
      if (i === specialFlagIdx) { sprW(API.frame%8<5?10:9, f.x, f.y); }
      else sprW(9, f.x, f.y);
    }

    // Enemies
    for (const e of enemies) {
      if (e.stunTimer > 0 && API.frame%4 < 2) continue;
      sprW(dirSpr(5,e.dir), e.x, e.y);
    }

    // Player
    if (respawnTimer <= 0 || API.frame%4 < 2) sprW(dirSpr(1,player.dir), player.x, player.y);

    // Level clear overlay
    if (levelCompleteTimer > 0) {
      const ox = VIEW_W/2-38, oy = VIEW_H/2+VIEW_Y-9;
      rectf(ox,oy,77,18,0); rect(ox,oy,77,18,2);
      text("LEVEL CLEAR!", ox+8, oy+6, 3);
    }

    // --- HUD ---
    rectf(0,0,W,9,0);
    text("SCORE:"+score, 3, 2, 3);
    text("LV:"+level, 113, 2, 2);
    for (let i = 0; i < lives; i++) spr(1, 147+i*10, 1);
    const fl = totalFlags - flagsCollected;
    text("FLAGS:"+fl, 200, 2, doublePoints?3:2);

    // Right panel
    rectf(VIEW_W, VIEW_Y, W-VIEW_W, VIEW_H, 0);
    line(VIEW_W, VIEW_Y, VIEW_W, VIEW_Y+VIEW_H, 1);
    line(0, VIEW_Y-1, W, VIEW_Y-1, 1);

    drawRadar();
    drawFuel();

    // Smoke status
    const smy = RADAR_Y + RADAR_H + 22;
    text("SMOKE", RADAR_X, smy, 2);
    if (fuel > 50) text("READY", RADAR_X, smy+10, 3);
    else text("EMPTY", RADAR_X, smy+10, 1);

    if (doublePoints && API.frame%10<7) text("2X PTS!", RADAR_X-2, smy+22, 3);
  };

  // ============================================================
  // Boot
  // ============================================================
  if (API._init) API._init();
  setInterval(tick, 1000 / FPS);
  document.addEventListener("keydown", ensureAudio, { once: true });
  document.addEventListener("click", ensureAudio, { once: true });
})();
</script>
</body>
</html>
