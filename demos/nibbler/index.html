<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mono — Demo: Nibbler</title>
<link rel="stylesheet" href="../../runtime/mono.css">
</head>
<body>
<div id="frame">
  <canvas id="screen"></canvas>
</div>
<div id="controls">
  <span>ARROWS</span> MOVE &nbsp;&nbsp; <span>A</span> ACTION
</div>
<script src="../../runtime/engine.js"></script>
<script>
(() => {
  "use strict";
  const W = Mono.WIDTH, H = Mono.HEIGHT;          // 320x240
  const FPS = 30;
  const TILE = 16;                                  // 16x16 pixel tiles
  const { cls, pix, line, rect, rectf, circ, circf, sprite: defSprite,
          spr, sprT, text, btn, btnp, note, stop, rnd, flr,
          abs: _abs, min, max: _max, sin, cos, dbg, dbgC } = Mono;

  // --- 16x16 upscale helper (8x8 data -> 16x16 string) ---
  function up(d) {
    let o = "";
    for (let r = 0; r < 8; r++) {
      let row = "";
      for (let c = 0; c < 8; c++) { const ch = d[r * 8 + c]; row += ch + ch; }
      o += row + row;
    }
    return o;
  }

  // --- Sprites (8x8 art upscaled to engine-native 16x16) ---
  // 1: Wall block
  defSprite(1, up(
    "33333333" +
    "32222223" +
    "32111123" +
    "32100123" +
    "32100123" +
    "32111123" +
    "32222223" +
    "33333333"
  ));
  // 2: Snake head up
  defSprite(2, up(
    "00333300" +
    "03333330" +
    "33233230" +
    "33333330" +
    "33333330" +
    "33333330" +
    "03333300" +
    "00000000"
  ));
  // 3: Snake body
  defSprite(3, up(
    "00000000" +
    "02222200" +
    "02333200" +
    "02333200" +
    "02333200" +
    "02333200" +
    "02222200" +
    "00000000"
  ));
  // 4: Snake tail
  defSprite(4, up(
    "00000000" +
    "00222000" +
    "00233000" +
    "00233000" +
    "00233000" +
    "00222000" +
    "00000000" +
    "00000000"
  ));
  // 5: Food pellet
  defSprite(5, up(
    "00000000" +
    "00333000" +
    "03323300" +
    "03323300" +
    "03333300" +
    "00333000" +
    "00000000" +
    "00000000"
  ));
  // 6: Snake head right
  defSprite(6, up(
    "00033000" +
    "02233300" +
    "23333330" +
    "33333333" +
    "33333333" +
    "23333330" +
    "02233300" +
    "00033000"
  ));
  // 7: Bonus food (diamond)
  defSprite(7, up(
    "00030000" +
    "00323000" +
    "03232300" +
    "32323230" +
    "03232300" +
    "00323000" +
    "00030000" +
    "00000000"
  ));
  // 8: Life icon (small snake head)
  defSprite(8, up(
    "00000000" +
    "00333000" +
    "03233300" +
    "03333300" +
    "03333300" +
    "00333000" +
    "00000000" +
    "00000000"
  ));
  // 9: Corner body piece
  defSprite(9, up(
    "00000000" +
    "02222200" +
    "02333200" +
    "02333320" +
    "02333320" +
    "02222220" +
    "00000000" +
    "00000000"
  ));
  // 10: Death/explosion frame 1
  defSprite(10, up(
    "30000030" +
    "03000300" +
    "00303000" +
    "00030000" +
    "00303000" +
    "03000300" +
    "30000030" +
    "00000000"
  ));
  // 11: Death/explosion frame 2
  defSprite(11, up(
    "00300300" +
    "30000003" +
    "00000000" +
    "30000030" +
    "00000000" +
    "03000030" +
    "00300300" +
    "20020020"
  ));

  // --- Game Constants ---
  // 320/16 = 20 cols, top HUD 16px + maze + bottom HUD 16px = 208px / 16 = 13 rows
  const MAZE_W = 20;
  const MAZE_H = 13;
  const MAZE_OX = 0;     // flush left (20*16=320)
  const MAZE_OY = 16;    // below HUD bar
  const HUD_Y = 3;
  const FONT_W = 4, FONT_H = 7;

  const { TITLE, PLAY, CLEAR, GAMEOVER } = Mono.SCENE;
  const SUB_READY = 1, SUB_PLAY = 2, SUB_DYING = 3;

  // Directions: 0=up, 1=right, 2=down, 3=left
  const DX = [0, 1, 0, -1];
  const DY = [-1, 0, 1, 0];

  // Game state
  let subState, stateTimer;
  let score, lives, level;
  let snake;   // array of {x, y} in tile coords
  let dir, nextDir;
  let moveTimer, moveDelay;
  let maze;    // 2D array: 0=path, 1=wall
  let foodX, foodY, foodEaten, foodTotal;
  let bonusX, bonusY, bonusActive, bonusTimer;
  let timeLeft, timeTick;
  let hiScore = 0;
  let titleAnim = 0;
  let deathFrame = 0;
  let readyBlink = 0;
  let levelUpAnim = 0;

  // ---- Maze Definitions ----
  function createMaze(idx) {
    const m = [];
    for (let y = 0; y < MAZE_H; y++) {
      m[y] = [];
      for (let x = 0; x < MAZE_W; x++) m[y][x] = 0;
    }
    // Border walls
    for (let x = 0; x < MAZE_W; x++) { m[0][x] = 1; m[MAZE_H - 1][x] = 1; }
    for (let y = 0; y < MAZE_H; y++) { m[y][0] = 1; m[y][MAZE_W - 1] = 1; }

    const pat = idx % 6;

    if (pat === 0) {
      // Grid corridors
      for (let y = 4; y < MAZE_H - 3; y += 4) {
        for (let x = 2; x < MAZE_W - 2; x++) {
          if (x % 5 < 2) continue;
          m[y][x] = 1;
        }
      }
      for (let x = 6; x < MAZE_W - 3; x += 6) {
        for (let y = 2; y < MAZE_H - 2; y++) {
          if (y % 4 < 2) continue;
          m[y][x] = 1;
        }
      }
      // Central chamber
      const cx = flr(MAZE_W / 2), cy = flr(MAZE_H / 2);
      m[cy - 1][cx - 1] = 1; m[cy - 1][cx] = 1; m[cy - 1][cx + 1] = 1;
      m[cy + 1][cx - 1] = 1; m[cy + 1][cx] = 1; m[cy + 1][cx + 1] = 1;
      m[cy][cx - 1] = 1; m[cy][cx + 1] = 1;
      m[cy][cx] = 0; // center open
      m[cy - 1][cx] = 0; // top entrance
      m[cy + 1][cx] = 0; // bottom entrance
    }
    else if (pat === 1) {
      // Outer ring + inner ring
      for (let x = 3; x < MAZE_W - 3; x++) { m[3][x] = 1; m[MAZE_H - 4][x] = 1; }
      for (let y = 3; y < MAZE_H - 3; y++) { m[y][3] = 1; m[y][MAZE_W - 4] = 1; }
      m[3][10] = 0; m[MAZE_H - 4][10] = 0;
      m[6][3] = 0; m[6][MAZE_W - 4] = 0;
      // Inner ring
      for (let x = 7; x < MAZE_W - 7; x++) { m[5][x] = 1; m[MAZE_H - 6][x] = 1; }
      for (let y = 5; y < MAZE_H - 5; y++) { m[y][7] = 1; m[y][MAZE_W - 8] = 1; }
      m[5][10] = 0; m[MAZE_H - 6][10] = 0;
      m[6][7] = 0; m[6][MAZE_W - 8] = 0;
    }
    else if (pat === 2) {
      // Diamond pattern
      const cx = flr(MAZE_W / 2), cy = flr(MAZE_H / 2);
      for (let i = 1; i < 5; i++) {
        if (cy - i > 0 && cx - i > 0) m[cy - i][cx - i] = 1;
        if (cy - i > 0 && cx + i < MAZE_W - 1) m[cy - i][cx + i] = 1;
        if (cy + i < MAZE_H - 1 && cx - i > 0) m[cy + i][cx - i] = 1;
        if (cy + i < MAZE_H - 1 && cx + i < MAZE_W - 1) m[cy + i][cx + i] = 1;
      }
      m[cy][cx - 4] = 0; m[cy][cx + 4] = 0;
      // Horizontal corridors
      for (let x = 2; x < MAZE_W - 2; x++) {
        if (x > cx - 2 && x < cx + 2) continue;
        m[3][x] = 1; m[MAZE_H - 4][x] = 1;
      }
      for (let y = 2; y < MAZE_H - 2; y++) {
        if (y > cy - 2 && y < cy + 2) continue;
        m[y][5] = 1; m[y][MAZE_W - 6] = 1;
      }
      m[3][5] = 0; m[3][MAZE_W - 6] = 0;
      m[MAZE_H - 4][5] = 0; m[MAZE_H - 4][MAZE_W - 6] = 0;
    }
    else if (pat === 3) {
      // Rooms
      const rooms = [
        [2, 2, 5, 4], [8, 2, 5, 4], [14, 2, 5, 4],
        [2, 7, 5, 4], [8, 7, 5, 4], [14, 7, 5, 4],
      ];
      for (const [rx, ry, rw, rh] of rooms) {
        for (let x = rx; x < rx + rw && x < MAZE_W; x++) {
          if (ry < MAZE_H) m[ry][x] = 1;
          if (ry + rh - 1 < MAZE_H) m[ry + rh - 1][x] = 1;
        }
        for (let y = ry; y < ry + rh && y < MAZE_H; y++) {
          if (rx < MAZE_W) m[y][rx] = 1;
          if (rx + rw - 1 < MAZE_W) m[y][rx + rw - 1] = 1;
        }
        // Doors
        const dx1 = rx + flr(rw / 2);
        if (dx1 < MAZE_W) { m[ry][dx1] = 0; if (ry + rh - 1 < MAZE_H) m[ry + rh - 1][dx1] = 0; }
        const dy3 = ry + flr(rh / 2);
        if (dy3 < MAZE_H) { m[dy3][rx] = 0; if (rx + rw - 1 < MAZE_W) m[dy3][rx + rw - 1] = 0; }
      }
    }
    else if (pat === 4) {
      // Zigzag corridors
      for (let y = 3; y < MAZE_H - 3; y += 4) {
        const startX = (flr(y / 4) % 2 === 0) ? 2 : 6;
        for (let x = startX; x < MAZE_W - 2; x++) m[y][x] = 1;
        for (let g = startX + 3; g < MAZE_W - 2; g += 5) { m[y][g] = 0; m[y][g + 1] = 0; }
      }
      for (let x = 5; x < MAZE_W - 3; x += 7) {
        for (let y = 2; y < MAZE_H - 2; y++) { if (m[y][x] === 0) m[y][x] = 1; }
        for (let g = 2; g < MAZE_H - 2; g += 3) { m[g][x] = 0; }
      }
    }
    else if (pat === 5) {
      // Dense labyrinth -- small 4x3 room outlines
      for (let gy = 2; gy < MAZE_H - 2; gy += 3) {
        for (let gx = 2; gx < MAZE_W - 2; gx += 4) {
          for (let x = gx; x < gx + 4 && x < MAZE_W - 1; x++) {
            if (gy < MAZE_H) m[gy][x] = 1;
            if (gy + 2 < MAZE_H) m[gy + 2][x] = 1;
          }
          for (let y = gy; y < gy + 3 && y < MAZE_H - 1; y++) {
            m[y][gx] = 1;
            if (gx + 3 < MAZE_W) m[y][gx + 3] = 1;
          }
          const dx = gx + 2;
          if (dx < MAZE_W) { m[gy][dx] = 0; if (gy + 2 < MAZE_H) m[gy + 2][dx] = 0; }
          const dy = gy + 1;
          if (dy < MAZE_H) { m[dy][gx] = 0; if (gx + 3 < MAZE_W) m[dy][gx + 3] = 0; }
        }
      }
    }

    // Re-enforce border
    for (let x = 0; x < MAZE_W; x++) { m[0][x] = 1; m[MAZE_H - 1][x] = 1; }
    for (let y = 0; y < MAZE_H; y++) { m[y][0] = 1; m[y][MAZE_W - 1] = 1; }

    return m;
  }

  function findStart() {
    const cx = flr(MAZE_W / 2), cy = flr(MAZE_H / 2);
    for (let r = 0; r < 15; r++) {
      for (let dy = -r; dy <= r; dy++) {
        for (let dx = -r; dx <= r; dx++) {
          const tx = cx + dx, ty = cy + dy;
          if (tx > 1 && tx < MAZE_W - 2 && ty > 1 && ty < MAZE_H - 2) {
            if (maze[ty][tx] === 0 && maze[ty][tx + 1] === 0 && maze[ty][tx + 2] === 0 && maze[ty][tx - 1] === 0) {
              return { x: tx, y: ty };
            }
          }
        }
      }
    }
    return { x: 3, y: 3 };
  }

  function placeFood() {
    let attempts = 0;
    while (attempts < 2000) {
      const fx = 1 + flr(rnd(MAZE_W - 2));
      const fy = 1 + flr(rnd(MAZE_H - 2));
      if (maze[fy][fx] !== 0) { attempts++; continue; }
      let onSnake = false;
      for (const seg of snake) {
        if (seg.x === fx && seg.y === fy) { onSnake = true; break; }
      }
      if (onSnake) { attempts++; continue; }
      foodX = fx;
      foodY = fy;
      return;
    }
    foodX = -1; foodY = -1;
  }

  function initLevel() {
    maze = createMaze(level);
    const start = findStart();
    snake = [];
    dir = 1; nextDir = 1;
    for (let i = 0; i < 4; i++) {
      snake.push({ x: start.x - i, y: start.y });
    }
    moveDelay = _max(3, 8 - level);
    moveTimer = 0;
    foodEaten = 0;
    foodTotal = 8 + level * 2;
    if (foodTotal > 20) foodTotal = 20;
    placeFood();
    bonusActive = false;
    bonusTimer = 0;
    timeLeft = 60 + level * 10;
    if (timeLeft > 120) timeLeft = 120;
    timeTick = 0;
  }

  function isWall(tx, ty) {
    if (tx < 0 || tx >= MAZE_W || ty < 0 || ty >= MAZE_H) return true;
    return maze[ty][tx] === 1;
  }

  function isSnakeBody(tx, ty) {
    for (let i = 0; i < snake.length - 1; i++) {
      if (snake[i].x === tx && snake[i].y === ty) return true;
    }
    return false;
  }

  function canTurn(d) {
    const head = snake[0];
    return !isWall(head.x + DX[d], head.y + DY[d]);
  }

  // --- Circle collision: head center vs food/bonus center ---
  function circleHit(ax, ay, ar, bx, by, br) {
    const dx = ax - bx, dy = ay - by;
    const dist2 = dx * dx + dy * dy;
    const rSum = ar + br;
    return dist2 < rSum * rSum;
  }

  // Pixel center of a tile
  function tileCX(tx) { return MAZE_OX + tx * TILE + TILE / 2; }
  function tileCY(ty) { return MAZE_OY + ty * TILE + TILE / 2; }

  function startGame() {
    score = 0;
    lives = 3;
    level = 0;
    initLevel();
    subState = SUB_READY;
    stateTimer = 60;
  }

  // --- Title Screen ---
  function updateTitle() {
    titleAnim++;
    if (btnp("start") || btnp("a")) {
      note(0, "C4", 0.1);
      startGame();
      Mono.go(PLAY);
    }
  }

  function drawTitle() {
    cls(0);

    const blink = (flr(titleAnim / 15) % 2 === 0) ? 3 : 2;
    rect(4, 4, W - 8, H - 8, blink);
    rect(6, 6, W - 12, H - 12, 1);

    // Big title (3x scale manual glyph render)
    const t = "NIBBLER";
    const tw = t.length * 15;
    const txOff = flr((W - tw) / 2);
    const FONT_DATA = Mono._fontData || null; // fallback manual
    for (let ci = 0; ci < t.length; ci++) {
      const ch = t[ci];
      const ox = txOff + ci * 15;
      const oy = 38 + flr(sin(titleAnim * 0.08 + ci * 0.5) * 4);
      const col = (ci + flr(titleAnim / 10)) % 2 === 0 ? 3 : 2;
      // Use text() for each char at 1x but draw manually at 3x
      // Manual 4x7 glyph lookup
      const glyph = getGlyph(ch);
      if (!glyph) continue;
      for (let py = 0; py < 7; py++) {
        for (let px = 0; px < 4; px++) {
          if (glyph[py * 4 + px]) {
            rectf(ox + px * 3, oy + py * 3, 3, 3, col);
          }
        }
      }
    }

    text("SNAKE IN A MAZE", flr((W - 15 * 5) / 2), 75, 2);

    // Demo snake
    const sy = 100;
    for (let i = 0; i < 8; i++) {
      const sx = 88 + i * TILE + flr(sin(titleAnim * 0.1 + i * 0.3) * 2);
      sprT(i === 0 ? 6 : 3, sx, sy);
    }

    const blink2 = (flr(titleAnim / 20) % 2 === 0) ? 3 : 1;
    text("PRESS START", flr((W - 11 * 5) / 2), 142, blink2);
    text("ARROWS - TURN SNAKE", flr((W - 19 * 5) / 2), 165, 2);
    text("EAT ALL PELLETS", flr((W - 15 * 5) / 2), 176, 2);
    text("AVOID WALLS AND YOURSELF", flr((W - 24 * 5) / 2), 187, 2);
    text("HI " + String(hiScore).padStart(6, "0"), flr((W - 12 * 5) / 2), 210, 1);
    text("MONO 2026", flr((W - 12 * 5) / 2), 226, 1);
  }

  // Minimal font glyph lookup for title rendering
  const _fontRaw = {
    "A":"0110100110011111100110011001","B":"1110100110101110100110011110",
    "C":"0110100110001000100001100110","D":"1100101010011001100110101100",
    "E":"1111100010001110100010001111","F":"1111100010001110100010001000",
    "G":"0111100010001011100101100111","H":"1001100110011111100110011001",
    "I":"1110010001000100010001001110","J":"0111001000100010001010100100",
    "K":"1001101011001100101010011001","L":"1000100010001000100010001111",
    "M":"1001111111011001100110011001","N":"1001110111011001100110011001",
    "O":"0110100110011001100110010110","P":"1110100110011110100010001000",
    "Q":"0110100110011001101101100001","R":"1110100110011110101010011001",
    "S":"0111100010000110000110001110","T":"1111001000100010001000100010",
    "U":"1001100110011001100110010110","V":"1001100110011001100101100110",
    "W":"1001100110011001101111011001","X":"1001100101100110011010011001",
    "Y":"1001100101100010001000100010","Z":"1111000100100100100010001111",
  };
  const _glyphs = {};
  for (const [ch, bits] of Object.entries(_fontRaw)) {
    _glyphs[ch] = [];
    for (let i = 0; i < bits.length; i++) _glyphs[ch].push(parseInt(bits[i]));
  }
  function getGlyph(ch) { return _glyphs[ch] || null; }

  // --- Gameplay ---
  function updatePlay() {
    if (btnp("up") && dir !== 2) nextDir = 0;
    else if (btnp("right") && dir !== 3) nextDir = 1;
    else if (btnp("down") && dir !== 0) nextDir = 2;
    else if (btnp("left") && dir !== 1) nextDir = 3;

    if (btn("up") && dir !== 2 && dir !== 0 && canTurn(0)) nextDir = 0;
    else if (btn("right") && dir !== 3 && dir !== 1 && canTurn(1)) nextDir = 1;
    else if (btn("down") && dir !== 0 && dir !== 2 && canTurn(2)) nextDir = 2;
    else if (btn("left") && dir !== 1 && dir !== 3 && canTurn(3)) nextDir = 3;

    timeTick++;
    if (timeTick >= FPS) {
      timeTick = 0;
      timeLeft--;
      if (timeLeft <= 10 && timeLeft > 0) note(1, "A5", 0.05);
      if (timeLeft <= 0) { die(); return; }
    }

    moveTimer++;
    if (moveTimer >= moveDelay) {
      moveTimer = 0;

      if (canTurn(nextDir)) dir = nextDir;

      const head = snake[0];
      const nx = head.x + DX[dir];
      const ny = head.y + DY[dir];

      // Wall & self collision (tile-based, kept for accuracy)
      if (isWall(nx, ny) || isSnakeBody(nx, ny)) { die(); return; }

      snake.unshift({ x: nx, y: ny });

      // Debug hitboxes for head tile (rect) vs wall collision region
      dbg(MAZE_OX + nx * TILE, MAZE_OY + ny * TILE, TILE, TILE);

      // --- Circle collision: head vs food ---
      const hcx = tileCX(nx), hcy = tileCY(ny);
      const headR = 6;

      let ateFood = false;
      if (foodX >= 0) {
        const fcx = tileCX(foodX), fcy = tileCY(foodY);
        const foodR = 6;
        dbgC(hcx, hcy, headR);
        dbgC(fcx, fcy, foodR);
        if (circleHit(hcx, hcy, headR, fcx, fcy, foodR)) {
          ateFood = true;
        }
      }

      if (ateFood) {
        foodEaten++;
        score += 10 * (level + 1);
        note(0, "E5", 0.08);
        note(1, "G5", 0.06);

        if (foodEaten >= foodTotal) {
          score += timeLeft * 5;
          note(0, "C5", 0.15);
          setTimeout(() => note(0, "E5", 0.15), 150);
          setTimeout(() => note(0, "G5", 0.2), 300);
          Mono.go(CLEAR); return;
        }
        placeFood();

        if (!bonusActive && rnd(1) < 0.25) {
          bonusActive = true;
          bonusTimer = FPS * 8;
          let att = 0;
          while (att < 500) {
            const bx = 1 + flr(rnd(MAZE_W - 2));
            const by = 1 + flr(rnd(MAZE_H - 2));
            if (maze[by][bx] === 0) {
              let onSnk = false;
              for (const s of snake) { if (s.x === bx && s.y === by) { onSnk = true; break; } }
              if (!onSnk && !(bx === foodX && by === foodY)) { bonusX = bx; bonusY = by; break; }
            }
            att++;
          }
        }
      } else {
        snake.pop();
      }

      // --- Circle collision: head vs bonus food ---
      if (bonusActive) {
        const bcx = tileCX(bonusX), bcy = tileCY(bonusY);
        const bonusR = 7;
        dbgC(hcx, hcy, headR);
        dbgC(bcx, bcy, bonusR);
        if (circleHit(hcx, hcy, headR, bcx, bcy, bonusR)) {
          bonusActive = false;
          score += 50 * (level + 1);
          note(0, "C6", 0.1);
          note(1, "E6", 0.08);
        }
      }
    }

    if (bonusActive) {
      bonusTimer--;
      if (bonusTimer <= 0) bonusActive = false;
    }
  }

  function die() {
    subState = SUB_DYING;
    stateTimer = 45;
    deathFrame = 0;
    note(0, "C3", 0.3);
    note(1, "E2", 0.4);
  }

  function drawMaze() {
    for (let y = 0; y < MAZE_H; y++) {
      for (let x = 0; x < MAZE_W; x++) {
        if (maze[y][x] === 1) {
          const px = MAZE_OX + x * TILE;
          const py = MAZE_OY + y * TILE;
          sprT(1, px, py);
        }
      }
    }
  }

  function drawSnake() {
    for (let i = snake.length - 1; i >= 0; i--) {
      const seg = snake[i];
      const px = MAZE_OX + seg.x * TILE;
      const py = MAZE_OY + seg.y * TILE;

      if (i === 0) {
        // Head -- pick sprite by direction
        if (dir === 0) sprT(2, px, py);            // up
        else if (dir === 2) sprT(2, px, py, false, true); // down (flip Y)
        else if (dir === 1) sprT(6, px, py);        // right
        else sprT(6, px, py, true, false);           // left (flip X)
        // Debug rect for head hitbox
        dbg(px, py, TILE, TILE);
      } else if (i === snake.length - 1) {
        sprT(4, px, py);
      } else {
        sprT(3, px, py);
      }
    }
  }

  function drawHUD() {
    // Top bar
    rectf(0, 0, W, 16, 0);
    line(0, 15, W, 15, 1);

    text("SCORE " + String(score).padStart(6, "0"), 4, HUD_Y, 3);
    text("LV" + String(level + 1).padStart(2, "0"), 80, HUD_Y, 2);
    text("FOOD " + String(foodTotal - foodEaten).padStart(2, "0") + "/" + String(foodTotal).padStart(2, "0"), 110, HUD_Y, 2);

    for (let i = 0; i < lives; i++) {
      sprT(8, 210 + i * 18, HUD_Y - 2);
    }

    text("HI " + String(hiScore).padStart(6, "0"), 270, HUD_Y, 1);

    // Bottom bar
    const botY = MAZE_OY + MAZE_H * TILE; // 16 + 13*16 = 224
    rectf(0, botY, W, H - botY, 0);
    line(0, botY, W, botY, 1);

    const tCol = timeLeft <= 10 ? ((flr(Mono.frame / 8) % 2 === 0) ? 3 : 1) : 2;
    text("TIME " + String(timeLeft).padStart(3, "0"), 8, botY + 4, tCol);

    const barW = 255;
    const barX = 50;
    const barY = botY + 4;
    const maxTime = min(120, 60 + level * 10);
    const fill = flr((timeLeft / maxTime) * barW);
    rect(barX, barY, barW, 7, 1);
    if (fill > 0) {
      const fc = timeLeft <= 10 ? 1 : (timeLeft <= 20 ? 2 : 3);
      rectf(barX + 1, barY + 1, fill - 2, 5, fc);
    }
  }

  function drawPlay() {
    cls(0);
    drawMaze();

    // Draw food
    if (foodX >= 0) {
      const fpx = MAZE_OX + foodX * TILE;
      const fpy = MAZE_OY + foodY * TILE;
      const pulse = sin(Mono.frame * 0.15) * 0.5 + 0.5;
      if (pulse > 0.5) {
        sprT(5, fpx, fpy);
      } else {
        // Dimmer version: draw as circle
        circf(tileCX(foodX), tileCY(foodY), 5, 2);
        pix(tileCX(foodX) - 1, tileCY(foodY) - 2, 3);
      }
      // Debug circle for food hitbox
      dbgC(tileCX(foodX), tileCY(foodY), 6);
    }

    // Draw bonus food
    if (bonusActive) {
      const bpx = MAZE_OX + bonusX * TILE;
      const bpy = MAZE_OY + bonusY * TILE;
      const blinkV = flr(Mono.frame / 4) % 2;
      if (bonusTimer > 60 || blinkV === 0) {
        sprT(7, bpx, bpy);
      }
      dbgC(tileCX(bonusX), tileCY(bonusY), 7);
    }

    drawSnake();
    drawHUD();
  }

  function updateReady() {
    stateTimer--;
    readyBlink++;
    if (stateTimer <= 0) subState = SUB_PLAY;
  }

  function drawReady() {
    cls(0);
    drawMaze();
    drawSnake();
    drawHUD();

    const blink = flr(readyBlink / 10) % 2 === 0 ? 3 : 2;
    rectf(flr((W - 80) / 2), flr((H - 30) / 2), 80, 30, 0);
    rect(flr((W - 80) / 2), flr((H - 30) / 2), 80, 30, blink);
    text("READY!", flr((W - 6 * 5) / 2), flr(H / 2) - 3, blink);
    text("LV " + String(level + 1), flr((W - 4 * 5) / 2), flr(H / 2) + 8, 2);
  }

  function updateDying() {
    stateTimer--;
    deathFrame++;
    if (stateTimer <= 0) {
      lives--;
      if (lives <= 0) {
        if (score > hiScore) hiScore = score;
        Mono.go(GAMEOVER); return;
      } else {
        initLevel();
        subState = SUB_READY;
        stateTimer = 60;
      }
    }
  }

  function drawDying() {
    cls(0);
    drawMaze();
    drawHUD();

    const head = snake[0];
    const hpx = MAZE_OX + head.x * TILE + TILE / 2;
    const hpy = MAZE_OY + head.y * TILE + TILE / 2;

    if (flr(deathFrame / 3) % 2 === 0) drawSnake();

    if (deathFrame < 15) {
      const r = 3 + deathFrame;
      circ(hpx, hpy, r, 3);
      circ(hpx, hpy, _max(1, r - 3), 2);
    } else if (deathFrame < 30) {
      const r = 18 - (deathFrame - 15);
      circ(hpx, hpy, r, 2);
      circ(hpx, hpy, _max(1, r - 2), 1);
    }
  }

  function updateLevelUp() {
    stateTimer--;
    levelUpAnim++;
    if (stateTimer <= 0) {
      level++;
      initLevel();
      subState = SUB_READY;
      stateTimer = 60;
      Mono.go(PLAY);
    }
  }

  function drawLevelUp() {
    cls(0);
    drawMaze();
    drawSnake();
    drawHUD();

    const blink = flr(levelUpAnim / 8) % 2 === 0 ? 3 : 2;
    rectf(flr((W - 120) / 2), flr((H - 45) / 2), 120, 45, 0);
    rect(flr((W - 120) / 2), flr((H - 45) / 2), 120, 45, blink);

    text("MAZE CLEAR!", flr((W - 11 * 5) / 2), flr(H / 2) - 14, 3);
    text("TIME BONUS +" + String(timeLeft * 5), flr((W - 18 * 5) / 2), flr(H / 2) - 3, 2);
    text("NEXT MAZE...", flr((W - 12 * 5) / 2), flr(H / 2) + 9, blink);

    for (let i = 0; i < 6; i++) {
      const angle = levelUpAnim * 0.05 + i * 1.047;
      const r = 30 + flr(sin(levelUpAnim * 0.1 + i) * 12);
      const ppx = flr(W / 2 + cos(angle) * r);
      const ppy = flr(H / 2 + sin(angle) * r);
      pix(ppx, ppy, 3);
      pix(ppx + 1, ppy, 2);
    }
  }

  function updateGameOver() {
    stateTimer--;
    titleAnim++;
    if (stateTimer <= 0 && (btnp("start") || btnp("a"))) {
      Mono.go(TITLE);
    }
  }

  function drawGameOver() {
    cls(0);
    drawMaze();
    drawHUD();

    rectf(flr((W - 120) / 2), flr((H - 60) / 2), 120, 60, 0);
    rect(flr((W - 120) / 2), flr((H - 60) / 2), 120, 60, 1);
    rect(flr((W - 118) / 2), flr((H - 58) / 2), 116, 56, 2);

    const blink = flr(titleAnim / 15) % 2 === 0 ? 3 : 2;
    text("GAME OVER", flr((W - 9 * 5) / 2), flr(H / 2) - 19, blink);
    text("SCORE " + String(score).padStart(6, "0"), flr((W - 12 * 5) / 2), flr(H / 2) - 6, 3);
    text("HI    " + String(hiScore).padStart(6, "0"), flr((W - 12 * 5) / 2), flr(H / 2) + 4, 2);

    if (stateTimer <= 0) {
      const blink2 = flr(titleAnim / 20) % 2 === 0 ? 3 : 1;
      text("PRESS START", flr((W - 11 * 5) / 2), flr(H / 2) + 16, blink2);
    }
  }

  // --- Scenes ---
  Mono.scene(TITLE, {
    init() { stateTimer = 0; titleAnim = 0; },
    update() { updateTitle(); },
    draw() { drawTitle(); }
  });

  Mono.scene(PLAY, {
    init() {},
    update() {
      switch (subState) {
        case SUB_READY: updateReady(); break;
        case SUB_PLAY: updatePlay(); break;
        case SUB_DYING: updateDying(); break;
      }
    },
    draw() {
      switch (subState) {
        case SUB_READY: drawReady(); break;
        case SUB_PLAY: drawPlay(); break;
        case SUB_DYING: drawDying(); break;
      }
    }
  });

  Mono.scene(CLEAR, {
    init() { stateTimer = 90; levelUpAnim = 0; },
    update() { updateLevelUp(); },
    draw() { drawLevelUp(); }
  });

  Mono.scene(GAMEOVER, {
    init() { stateTimer = 120; if (score > hiScore) hiScore = score; },
    update() { updateGameOver(); },
    draw() { drawGameOver(); }
  });

  Mono.go(TITLE);
  Mono.boot("screen");
})();
</script>
</body>
