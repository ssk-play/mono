<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GrayBox — Demo: Breakout</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #0a0a0a;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100vh;
    font-family: monospace;
    overflow: hidden;
  }
  #frame {
    background: #111;
    border: 3px solid #333;
    border-radius: 8px;
    padding: 12px;
    box-shadow: 0 0 40px rgba(0,0,0,0.8), inset 0 0 20px rgba(0,0,0,0.5);
  }
  canvas {
    display: block;
    image-rendering: pixelated;
    image-rendering: crisp-edges;
  }
  #controls {
    margin-top: 12px;
    color: #6b6b6b;
    font-size: 11px;
    text-align: center;
    letter-spacing: 1px;
  }
  #controls span { color: #b0b0b0; }
</style>
</head>
<body>
<div id="frame">
  <canvas id="screen"></canvas>
</div>
<div id="controls">
  <span>←→</span> MOVE &nbsp;&nbsp; <span>Z</span> LAUNCH &nbsp;&nbsp; <span>ENTER</span> START
</div>
<script>
(() => {
  "use strict";

  // ============================================================
  // GrayBox Runtime (inline)
  // ============================================================
  const W = 480;
  const H = 320;
  const SCALE = 2;
  const FPS = 30;
  const COLORS = ["#1a1a1a", "#6b6b6b", "#b0b0b0", "#e8e8e8"];
  const canvas = document.getElementById("screen");
  canvas.width = W;
  canvas.height = H;
  canvas.style.width = (W * SCALE) + "px";
  canvas.style.height = (H * SCALE) + "px";
  const ctx = canvas.getContext("2d");
  ctx.imageSmoothingEnabled = false;
  const buf = ctx.createImageData(W, H);
  const buf32 = new Uint32Array(buf.data.buffer);

  function hexToABGR(hex) {
    const r = parseInt(hex.slice(1, 3), 16);
    const g = parseInt(hex.slice(3, 5), 16);
    const b = parseInt(hex.slice(5, 7), 16);
    return (255 << 24) | (b << 16) | (g << 8) | r;
  }
  const COLOR_U32 = COLORS.map(hexToABGR);

  const sprites = {};
  const tilemap = {};

  const keyMap = {
    "ArrowUp": "up", "ArrowDown": "down", "ArrowLeft": "left", "ArrowRight": "right",
    "w": "up", "s": "down", "a": "left", "d": "right",
    "z": "a", "Z": "a", "x": "b", "X": "b",
    "Enter": "start", " ": "a"
  };
  const keys = {};
  const keysPrev = {};

  document.addEventListener("keydown", e => {
    const k = keyMap[e.key];
    if (k) { keys[k] = true; e.preventDefault(); }
  });
  document.addEventListener("keyup", e => {
    const k = keyMap[e.key];
    if (k) { keys[k] = false; e.preventDefault(); }
  });

  let audioCtx = null;
  const channels = [null, null];
  const channelGains = [null, null];
  function ensureAudio() {
    if (!audioCtx) {
      audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      for (let i = 0; i < 2; i++) {
        channelGains[i] = audioCtx.createGain();
        channelGains[i].gain.value = 0.15;
        channelGains[i].connect(audioCtx.destination);
      }
    }
  }

  const NOTE_NAMES = ["C","C#","D","D#","E","F","F#","G","G#","A","A#","B"];
  function noteToFreq(noteStr) {
    const match = noteStr.match(/^([A-G]#?)(\d)$/);
    if (!match) return 440;
    const name = match[1];
    const octave = parseInt(match[2]);
    const semitone = NOTE_NAMES.indexOf(name);
    if (semitone === -1) return 440;
    const midi = (octave + 1) * 12 + semitone;
    return 440 * Math.pow(2, (midi - 69) / 12);
  }

  const FONT_W = 4;
  const FONT_H = 6;
  const FONT = {};
  const fontData = {
    "A":"0110100110011111100110011001","B":"1110100110101110100110011110",
    "C":"0110100110001000100001100110","D":"1100101010011001100110101100",
    "E":"1111100010001110100010001111","F":"1111100010001110100010001000",
    "G":"0111100010001011100101100111","H":"1001100110011111100110011001",
    "I":"1110010001000100010001001110","J":"0111001000100010001010100100",
    "K":"1001101011001100101010011001","L":"1000100010001000100010001111",
    "M":"1001111111011001100110011001","N":"1001110111011001100110011001",
    "O":"0110100110011001100110010110","P":"1110100110011110100010001000",
    "Q":"0110100110011001101101100001","R":"1110100110011110101010011001",
    "S":"0111100010000110000110001110","T":"1111001000100010001000100010",
    "U":"1001100110011001100110010110","V":"1001100110011001100101100110",
    "W":"1001100110011001101111011001","X":"1001100101100110011010011001",
    "Y":"1001100101100010001000100010","Z":"1111000100100100100010001111",
    "0":"0110100111011011101110010110","1":"0100110001000100010001001110",
    "2":"0110100100010010010010001111","3":"1110000100010110000110011110",
    "4":"1001100110011111000100010001","5":"1111100010001110000100011110",
    "6":"0110100010001110100110010110","7":"1111000100010010010001001000",
    "8":"0110100110010110100110010110","9":"0110100110010111000100010110",
    " ":"0000000000000000000000000000",
    ".":"0000000000000000000001000100",
    ",":"0000000000000000001000101000",
    "!":"0100010001000100000000000100",
    "?":"0110100100010010000000000010",
    "-":"0000000000001110000000000000",
    "+":"0000001001001110010000100000",
    ":":"0000010001000000010001000000",
    "/":"0001000100100010010010001000",
    "*":"0000101001001110010010100000",
    "#":"0101111101011111010100000000",
    "(":"0010010010001000010001000010",
    ")":"0100001000010001000100100100",
    "=":"0000000011110000111100000000",
    "'":"0100010010000000000000000000",
    "\"":"1010101000000000000000000000",
    "<":"0010010010001000010000100010",
    ">":"1000010000100001001001001000",
    "_":"0000000000000000000000001111",
  };
  for (const [ch, bits] of Object.entries(fontData)) {
    FONT[ch] = [];
    for (let i = 0; i < bits.length; i++) FONT[ch].push(parseInt(bits[i]));
  }

  const API = {};
  API._init = null;
  API._update = null;
  API._draw = null;
  API.frame = 0;

  API.cls = function(c = 0) { buf32.fill(COLOR_U32[c] || COLOR_U32[0]); };
  API.pix = function(x, y, c) {
    x = Math.floor(x); y = Math.floor(y);
    if (x < 0 || x >= W || y < 0 || y >= H) return;
    buf32[y * W + x] = COLOR_U32[c] || COLOR_U32[0];
  };
  API.line = function(x0, y0, x1, y1, c) {
    x0=Math.floor(x0); y0=Math.floor(y0); x1=Math.floor(x1); y1=Math.floor(y1);
    const dx=Math.abs(x1-x0), dy=Math.abs(y1-y0);
    const sx=x0<x1?1:-1, sy=y0<y1?1:-1;
    let err=dx-dy;
    while(true) {
      API.pix(x0,y0,c);
      if(x0===x1&&y0===y1) break;
      const e2=2*err;
      if(e2>-dy){err-=dy;x0+=sx;}
      if(e2<dx){err+=dx;y0+=sy;}
    }
  };
  API.rect = function(x,y,w,h,c) {
    API.line(x,y,x+w-1,y,c); API.line(x+w-1,y,x+w-1,y+h-1,c);
    API.line(x+w-1,y+h-1,x,y+h-1,c); API.line(x,y+h-1,x,y,c);
  };
  API.rectf = function(x,y,w,h,c) {
    x=Math.floor(x); y=Math.floor(y);
    const col=COLOR_U32[c]||COLOR_U32[0];
    for(let py=Math.max(0,y);py<Math.min(H,y+h);py++)
      for(let px=Math.max(0,x);px<Math.min(W,x+w);px++)
        buf32[py*W+px]=col;
  };
  API.circ = function(cx,cy,r,c) {
    let x=r,y=0,d=1-r; cx=Math.floor(cx); cy=Math.floor(cy);
    while(x>=y){
      API.pix(cx+x,cy+y,c);API.pix(cx-x,cy+y,c);
      API.pix(cx+x,cy-y,c);API.pix(cx-x,cy-y,c);
      API.pix(cx+y,cy+x,c);API.pix(cx-y,cy+x,c);
      API.pix(cx+y,cy-x,c);API.pix(cx-y,cy-x,c);
      y++; if(d<0){d+=2*y+1;}else{x--;d+=2*(y-x)+1;}
    }
  };
  API.circf = function(cx,cy,r,c) {
    cx=Math.floor(cx); cy=Math.floor(cy);
    const col=COLOR_U32[c]||COLOR_U32[0]; const r2=r*r;
    for(let py=-r;py<=r;py++) for(let px=-r;px<=r;px++)
      if(px*px+py*py<=r2){ const sx=cx+px,sy=cy+py;
        if(sx>=0&&sx<W&&sy>=0&&sy<H) buf32[sy*W+sx]=col; }
  };
  API.sprite = function(id, data) {
    const arr = new Uint8Array(64); let i = 0;
    for (const ch of data) { if (ch>='0'&&ch<='3') { arr[i++]=parseInt(ch); if(i>=64) break; } }
    sprites[id] = arr;
  };
  API.spr = function(id, x, y, flipX, flipY) {
    const s=sprites[id]; if(!s) return;
    x=Math.floor(x); y=Math.floor(y);
    for(let py=0;py<8;py++) for(let px=0;px<8;px++){
      const sx=flipX?7-px:px, sy=flipY?7-py:py;
      const c=s[sy*8+sx], dx=x+px, dy=y+py;
      if(dx>=0&&dx<W&&dy>=0&&dy<H) buf32[dy*W+dx]=COLOR_U32[c];
    }
  };
  API.text = function(str, x, y, c) {
    str=String(str).toUpperCase(); let cx=Math.floor(x); const cy=Math.floor(y);
    const col=COLOR_U32[c]||COLOR_U32[3];
    for(const ch of str){
      const glyph=FONT[ch];
      if(glyph) for(let py=0;py<FONT_H;py++) for(let px=0;px<FONT_W;px++)
        if(glyph[py*FONT_W+px]){ const dx=cx+px,dy=cy+py;
          if(dx>=0&&dx<W&&dy>=0&&dy<H) buf32[dy*W+dx]=col; }
      cx+=FONT_W+1;
    }
  };
  API.mget = function(cx,cy) { return tilemap[cx+","+cy]||0; };
  API.mset = function(cx,cy,id) { tilemap[cx+","+cy]=id; };
  API.map = function(mx,my,mw,mh,sx,sy) {
    for(let ty=0;ty<mh;ty++) for(let tx=0;tx<mw;tx++){
      const id=API.mget(mx+tx,my+ty); if(id>0) API.spr(id,sx+tx*8,sy+ty*8); }
  };
  API.btn = function(k) { return !!keys[k]; };
  API.btnp = function(k) { return !!keys[k] && !keysPrev[k]; };
  API.note = function(ch, noteStr, dur) {
    ensureAudio(); if(ch<0||ch>1) return; API.stop(ch);
    const osc=audioCtx.createOscillator(); osc.type="square";
    osc.frequency.value=noteToFreq(noteStr);
    osc.connect(channelGains[ch]); osc.start();
    osc.stop(audioCtx.currentTime+dur); channels[ch]=osc;
  };
  API.stop = function(ch) {
    if(ch===undefined){API.stop(0);API.stop(1);return;}
    if(channels[ch]){try{channels[ch].stop();}catch(e){} channels[ch]=null;}
  };
  API.rnd = function(max) { return Math.random()*max; };
  API.flr = Math.floor;
  API.abs = Math.abs;
  API.min = Math.min;
  API.max = Math.max;
  API.sin = Math.sin;
  API.cos = Math.cos;

  function tick() {
    if (API._update) API._update();
    if (API._draw) API._draw();
    ctx.putImageData(buf, 0, 0);
    for (const k in keys) keysPrev[k] = keys[k];
    API.frame++;
  }

  // ============================================================
  // Breakout Game
  // ============================================================
  const { cls, pix, line, rect, rectf, circ, circf, sprite: defSprite,
          spr, text, btn, btnp, note, stop, rnd, flr, abs: _abs,
          min, max: _max, sin, cos } = API;

  // --- Sprites ---
  // 1: Ball
  defSprite(1,
    "00330000" +
    "03333000" +
    "33333300" +
    "33233300" +
    "33333300" +
    "03333000" +
    "00330000" +
    "00000000"
  );
  // 2: Power-up: Wide paddle (W icon)
  defSprite(2,
    "01111110" +
    "10000001" +
    "12000021" +
    "12030021" +
    "12333321" +
    "12322321" +
    "10000001" +
    "01111110"
  );
  // 3: Power-up: Multi-ball (3 dots icon)
  defSprite(3,
    "01111110" +
    "10000001" +
    "10300301" +
    "10000001" +
    "10030001" +
    "10000001" +
    "10000001" +
    "01111110"
  );
  // 4: Power-up: Slow ball (S icon)
  defSprite(4,
    "01111110" +
    "10000001" +
    "10033001" +
    "10300001" +
    "10033001" +
    "10000301" +
    "10033001" +
    "01111110"
  );
  // 5: Life icon (small paddle)
  defSprite(5,
    "00000000" +
    "00000000" +
    "00000000" +
    "00333300" +
    "03333330" +
    "00000000" +
    "00000000" +
    "00000000"
  );
  // 6: Particle / spark
  defSprite(6,
    "00000000" +
    "00000000" +
    "00030000" +
    "00323000" +
    "00030000" +
    "00000000" +
    "00000000" +
    "00000000"
  );

  // --- Constants ---
  const PADDLE_Y = 295;
  const PADDLE_H = 6;
  const PADDLE_DEFAULT_W = 48;
  const PADDLE_WIDE_W = 72;
  const PADDLE_SPEED = 5;
  const BALL_SIZE = 6;
  const BRICK_W = 28;
  const BRICK_H = 10;
  const BRICK_GAP = 2;
  const BRICK_COLS = 15;
  const BRICK_AREA_X = (W - BRICK_COLS * (BRICK_W + BRICK_GAP)) / 2;
  const BRICK_AREA_Y = 40;
  const BALL_BASE_SPEED = 4.0;
  const POWERUP_DROP_CHANCE = 0.15;
  const POWERUP_SPEED = 1.8;

  // Brick types: 0=empty, 1=normal(1hp), 2=strong(2hp), 3=unbreakable
  // --- Game State ---
  let state = "title";
  let paddle, balls, bricks, powerups, particles;
  let score, lives, level;
  let ballOnPaddle;
  let paddleW;
  let ballSpeed;
  let wideTimer, slowTimer;
  let shakeTimer;
  let levelMsg;
  let comboCount;
  let totalBreakable;

  // --- Level Patterns ---
  // Each level is a function that returns a 2D array of brick types
  // 0=empty, 1=normal, 2=strong, 3=unbreakable
  function levelPattern(lv) {
    const rows = 8;
    const cols = BRICK_COLS;
    const grid = [];
    const pat = ((lv - 1) % 7);

    for (let r = 0; r < rows; r++) {
      grid[r] = [];
      for (let c = 0; c < cols; c++) {
        grid[r][c] = 0;
      }
    }

    if (pat === 0) {
      // Classic rows
      for (let r = 0; r < rows; r++) {
        for (let c = 0; c < cols; c++) {
          if (r < 2) grid[r][c] = 2;
          else grid[r][c] = 1;
        }
      }
    } else if (pat === 1) {
      // Checkerboard
      for (let r = 0; r < rows; r++) {
        for (let c = 0; c < cols; c++) {
          if ((r + c) % 2 === 0) grid[r][c] = 1;
          else if (r < 2) grid[r][c] = 2;
        }
      }
    } else if (pat === 2) {
      // Diamond with unbreakable border
      const midC = flr(cols / 2);
      const midR = flr(rows / 2);
      for (let r = 0; r < rows; r++) {
        for (let c = 0; c < cols; c++) {
          const dist = _abs(r - midR) + _abs(c - midC);
          if (dist <= 5) {
            if (dist === 5) grid[r][c] = 3;
            else if (dist <= 2) grid[r][c] = 2;
            else grid[r][c] = 1;
          }
        }
      }
    } else if (pat === 3) {
      // Fortress with walls
      for (let r = 0; r < rows; r++) {
        for (let c = 0; c < cols; c++) {
          if (r === 0 || r === rows - 1) grid[r][c] = 3;
          else if (c === 0 || c === cols - 1) grid[r][c] = 3;
          else if (r % 2 === 0 && c % 3 === 0) grid[r][c] = 2;
          else grid[r][c] = 1;
        }
      }
    } else if (pat === 4) {
      // Zigzag
      for (let r = 0; r < rows; r++) {
        for (let c = 0; c < cols; c++) {
          const zigRow = (r + flr(c / 2)) % 3;
          if (zigRow === 0) grid[r][c] = 2;
          else if (zigRow === 1) grid[r][c] = 1;
        }
      }
    } else if (pat === 5) {
      // Invader shape
      const shape = [
        "..111111111111.",
        ".1..1111111..1.",
        ".1.111111111.1.",
        ".11.1.111.1.11.",
        "111111111111111",
        ".1.111111111.1.",
        "1...1.....1...1",
        ".1...........1.",
      ];
      for (let r = 0; r < rows; r++) {
        for (let c = 0; c < cols; c++) {
          if (r < shape.length && c < shape[r].length) {
            if (shape[r][c] === '1') {
              grid[r][c] = (r < 2) ? 2 : 1;
            }
          }
        }
      }
    } else if (pat === 6) {
      // Striped with strong cores
      for (let r = 0; r < rows; r++) {
        for (let c = 0; c < cols; c++) {
          if (r % 2 === 0) {
            if (c >= 3 && c < cols - 3) {
              grid[r][c] = (c >= 6 && c < cols - 6) ? 2 : 1;
            }
          } else {
            grid[r][c] = 1;
          }
        }
      }
    }

    // Scale difficulty with level
    if (lv > 7) {
      // After first cycle, add more strong/unbreakable
      for (let r = 0; r < rows; r++) {
        for (let c = 0; c < cols; c++) {
          if (grid[r][c] === 1 && Math.random() < 0.15 * (lv - 7)) {
            grid[r][c] = 2;
          }
        }
      }
    }

    return grid;
  }

  function countBreakable() {
    let count = 0;
    for (const b of bricks) {
      if (b.type !== 3 && b.type !== 0) count++;
    }
    return count;
  }

  function resetGame() {
    score = 0;
    lives = 3;
    level = 0;
    particles = [];
    shakeTimer = 0;
    nextLevel();
  }

  function nextLevel() {
    level++;
    ballSpeed = BALL_BASE_SPEED + (level - 1) * 0.2;
    paddleW = PADDLE_DEFAULT_W;
    wideTimer = 0;
    slowTimer = 0;
    comboCount = 0;
    paddle = { x: W / 2 - paddleW / 2 };
    balls = [];
    powerups = [];
    bricks = [];
    ballOnPaddle = true;
    levelMsg = 90;

    const pattern = levelPattern(level);
    for (let r = 0; r < pattern.length; r++) {
      for (let c = 0; c < pattern[r].length; c++) {
        if (pattern[r][c] > 0) {
          bricks.push({
            x: BRICK_AREA_X + c * (BRICK_W + BRICK_GAP),
            y: BRICK_AREA_Y + r * (BRICK_H + BRICK_GAP),
            type: pattern[r][c],
            hp: pattern[r][c] === 3 ? 999 : pattern[r][c],
            hitFlash: 0,
          });
        }
      }
    }
    totalBreakable = countBreakable();
  }

  function spawnBall(x, y, vx, vy) {
    const spd = slowTimer > 0 ? ballSpeed * 0.6 : ballSpeed;
    const len = Math.sqrt(vx * vx + vy * vy) || 1;
    balls.push({
      x: x, y: y,
      vx: (vx / len) * spd,
      vy: (vy / len) * spd,
    });
  }

  function launchBall() {
    ballOnPaddle = false;
    const cx = paddle.x + paddleW / 2;
    spawnBall(cx - BALL_SIZE / 2, PADDLE_Y - BALL_SIZE - 1, 0.5 - rnd(1), -1);
  }

  function spawnPowerup(x, y) {
    if (Math.random() > POWERUP_DROP_CHANCE) return;
    const types = [2, 3, 4]; // wide, multi, slow
    const type = types[flr(rnd(types.length))];
    powerups.push({ x: x, y: y, type: type });
  }

  function addParticles(x, y, c, count) {
    for (let i = 0; i < count; i++) {
      particles.push({
        x: x, y: y,
        vx: rnd(4) - 2, vy: rnd(3) - 2,
        life: 8 + flr(rnd(12)),
        color: c,
      });
    }
  }

  // --- Sounds ---
  function sndPaddleHit() { note(0, "E5", 0.04); }
  function sndBrickHit() { note(0, "C5", 0.03); }
  function sndBrickBreak() { note(0, "G5", 0.05); note(1, "C4", 0.03); }
  function sndStrongHit() { note(0, "A3", 0.04); }
  function sndWallHit() { note(1, "G3", 0.02); }
  function sndUnbreakable() { note(0, "C3", 0.04); note(1, "C3", 0.04); }
  function sndPowerup() {
    note(0, "C5", 0.06);
    setTimeout(() => note(0, "E5", 0.06), 60);
    setTimeout(() => note(0, "G5", 0.08), 120);
  }
  function sndLoseLife() {
    note(0, "E3", 0.12); note(1, "C3", 0.12);
    setTimeout(() => { note(0, "C3", 0.2); note(1, "A2", 0.2); }, 120);
  }
  function sndLevelClear() {
    note(0, "C5", 0.08);
    setTimeout(() => note(0, "E5", 0.08), 80);
    setTimeout(() => note(0, "G5", 0.08), 160);
    setTimeout(() => note(0, "C6", 0.12), 240);
  }
  function sndLaunch() { note(0, "G4", 0.05); }

  // --- Collision helpers ---
  function ballBrickCollide(ball, brick) {
    const bx = ball.x, by = ball.y;
    const bw = BALL_SIZE, bh = BALL_SIZE;
    return bx < brick.x + BRICK_W && bx + bw > brick.x &&
           by < brick.y + BRICK_H && by + bh > brick.y;
  }

  resetGame();

  // ============================================================
  // Update
  // ============================================================
  API._update = function() {
    // Timers
    if (shakeTimer > 0) shakeTimer--;

    // Particles always update
    for (let i = particles.length - 1; i >= 0; i--) {
      const p = particles[i];
      p.x += p.vx; p.y += p.vy; p.vy += 0.1; p.life--;
      if (p.life <= 0) particles.splice(i, 1);
    }

    // ---- TITLE ----
    if (state === "title") {
      if (btnp("a") || btnp("start")) {
        state = "play";
        resetGame();
        note(0, "C5", 0.08);
        setTimeout(() => note(0, "E5", 0.08), 80);
        setTimeout(() => note(0, "G5", 0.12), 160);
      }
      return;
    }

    // ---- GAME OVER ----
    if (state === "gameover") {
      if (btnp("a") || btnp("start")) state = "title";
      return;
    }

    // ---- LEVEL CLEAR ----
    if (state === "levelclear") {
      if (levelMsg > 0) levelMsg--;
      if (levelMsg <= 0) {
        state = "play";
        nextLevel();
      }
      return;
    }

    // ---- PLAY ----
    // Level message timer
    if (levelMsg > 0) levelMsg--;

    // Power-up timers
    if (wideTimer > 0) {
      wideTimer--;
      paddleW = PADDLE_WIDE_W;
      if (wideTimer <= 0) paddleW = PADDLE_DEFAULT_W;
    }
    if (slowTimer > 0) {
      slowTimer--;
      if (slowTimer <= 0) {
        // Restore ball speeds
        for (const b of balls) {
          const len = Math.sqrt(b.vx * b.vx + b.vy * b.vy) || 1;
          b.vx = (b.vx / len) * ballSpeed;
          b.vy = (b.vy / len) * ballSpeed;
        }
      }
    }

    // Brick hit flash
    for (const br of bricks) {
      if (br.hitFlash > 0) br.hitFlash--;
    }

    // Paddle movement
    if (btn("left")) paddle.x -= PADDLE_SPEED;
    if (btn("right")) paddle.x += PADDLE_SPEED;
    paddle.x = _max(4, min(W - paddleW - 4, paddle.x));

    // Ball on paddle
    if (ballOnPaddle) {
      if (btnp("a")) {
        launchBall();
        sndLaunch();
      }
      return;
    }

    // Update balls
    for (let bi = balls.length - 1; bi >= 0; bi--) {
      const b = balls[bi];
      const curSpeed = slowTimer > 0 ? ballSpeed * 0.6 : ballSpeed;

      // Normalize speed each frame to handle transitions
      const len = Math.sqrt(b.vx * b.vx + b.vy * b.vy) || 1;
      b.vx = (b.vx / len) * curSpeed;
      b.vy = (b.vy / len) * curSpeed;

      b.x += b.vx;
      b.y += b.vy;

      // Wall collision
      if (b.x <= 2) { b.x = 2; b.vx = _abs(b.vx); sndWallHit(); }
      if (b.x + BALL_SIZE >= W - 2) { b.x = W - 2 - BALL_SIZE; b.vx = -_abs(b.vx); sndWallHit(); }
      if (b.y <= 16) { b.y = 16; b.vy = _abs(b.vy); sndWallHit(); }

      // Ball fell below
      if (b.y > H + 8) {
        balls.splice(bi, 1);
        if (balls.length === 0) {
          // Lose a life
          lives--;
          comboCount = 0;
          sndLoseLife();
          shakeTimer = 12;
          if (lives <= 0) {
            state = "gameover";
          } else {
            ballOnPaddle = true;
            wideTimer = 0;
            slowTimer = 0;
            paddleW = PADDLE_DEFAULT_W;
            powerups = [];
          }
        }
        continue;
      }

      // Paddle collision
      if (b.vy > 0 &&
          b.y + BALL_SIZE >= PADDLE_Y && b.y + BALL_SIZE <= PADDLE_Y + PADDLE_H + 4 &&
          b.x + BALL_SIZE > paddle.x && b.x < paddle.x + paddleW) {
        // Calculate bounce angle based on where ball hits paddle
        const hitPos = (b.x + BALL_SIZE / 2 - paddle.x) / paddleW; // 0..1
        const angle = -Math.PI * (0.15 + 0.7 * (1 - hitPos)); // -165 to -27 degrees
        b.vx = Math.cos(angle) * curSpeed;
        b.vy = Math.sin(angle) * curSpeed;
        b.y = PADDLE_Y - BALL_SIZE;
        comboCount = 0;
        sndPaddleHit();
      }

      // Brick collision
      for (let bri = bricks.length - 1; bri >= 0; bri--) {
        const br = bricks[bri];
        if (br.type === 0) continue;
        if (!ballBrickCollide(b, br)) continue;

        // Determine collision side for bounce
        const overlapLeft = (b.x + BALL_SIZE) - br.x;
        const overlapRight = (br.x + BRICK_W) - b.x;
        const overlapTop = (b.y + BALL_SIZE) - br.y;
        const overlapBottom = (br.y + BRICK_H) - b.y;
        const minOverlapX = min(overlapLeft, overlapRight);
        const minOverlapY = min(overlapTop, overlapBottom);

        if (minOverlapX < minOverlapY) {
          b.vx = -b.vx;
          if (overlapLeft < overlapRight) b.x = br.x - BALL_SIZE;
          else b.x = br.x + BRICK_W;
        } else {
          b.vy = -b.vy;
          if (overlapTop < overlapBottom) b.y = br.y - BALL_SIZE;
          else b.y = br.y + BRICK_H;
        }

        if (br.type === 3) {
          // Unbreakable
          br.hitFlash = 4;
          sndUnbreakable();
          addParticles(br.x + BRICK_W / 2, br.y + BRICK_H / 2, 1, 3);
        } else {
          br.hp--;
          br.hitFlash = 4;
          if (br.hp <= 0) {
            // Brick destroyed
            comboCount++;
            const pts = br.type === 2 ? 20 : 10;
            score += pts * (1 + flr(comboCount / 5));
            addParticles(br.x + BRICK_W / 2, br.y + BRICK_H / 2, br.type === 2 ? 3 : 2, 6);
            spawnPowerup(br.x + BRICK_W / 2 - 4, br.y);
            bricks.splice(bri, 1);
            sndBrickBreak();
          } else {
            // Strong brick hit
            sndStrongHit();
            addParticles(br.x + BRICK_W / 2, br.y + BRICK_H / 2, 3, 3);
          }
        }
        break; // only collide with one brick per frame per ball
      }
    }

    // Speed increase as bricks clear
    const remaining = countBreakable();
    if (totalBreakable > 0) {
      const cleared = 1 - remaining / totalBreakable;
      ballSpeed = BALL_BASE_SPEED + (level - 1) * 0.2 + cleared * 1.5;
    }

    // Update powerups
    for (let i = powerups.length - 1; i >= 0; i--) {
      const p = powerups[i];
      p.y += POWERUP_SPEED;
      if (p.y > H) { powerups.splice(i, 1); continue; }

      // Paddle catch
      if (p.y + 8 >= PADDLE_Y && p.y <= PADDLE_Y + PADDLE_H &&
          p.x + 8 > paddle.x && p.x < paddle.x + paddleW) {
        sndPowerup();
        if (p.type === 2) {
          // Wide paddle
          wideTimer = 300; // 10 seconds
          paddleW = PADDLE_WIDE_W;
        } else if (p.type === 3) {
          // Multi-ball
          if (balls.length > 0 && balls.length < 8) {
            const src = balls[0];
            const spd = Math.sqrt(src.vx * src.vx + src.vy * src.vy) || ballSpeed;
            const ang = Math.atan2(src.vy, src.vx);
            spawnBall(src.x, src.y, Math.cos(ang + 0.5) * spd, Math.sin(ang + 0.5) * spd);
            spawnBall(src.x, src.y, Math.cos(ang - 0.5) * spd, Math.sin(ang - 0.5) * spd);
          }
        } else if (p.type === 4) {
          // Slow ball
          slowTimer = 240; // 8 seconds
        }
        powerups.splice(i, 1);
      }
    }

    // Check level clear
    if (countBreakable() <= 0 && !ballOnPaddle) {
      state = "levelclear";
      levelMsg = 90;
      score += 500 + level * 100;
      sndLevelClear();
    }
  };

  // ============================================================
  // Draw
  // ============================================================
  API._draw = function() {
    cls(0);

    const sx = shakeTimer > 0 ? flr(rnd(4)) - 2 : 0;
    const sy = shakeTimer > 0 ? flr(rnd(4)) - 2 : 0;

    // ---- TITLE ----
    if (state === "title") {
      // Background bricks decoration
      for (let r = 0; r < 6; r++) {
        for (let c = 0; c < BRICK_COLS; c++) {
          const bc = (r + c) % 3 === 0 ? 2 : (r + c) % 3 === 1 ? 1 : 0;
          if (bc > 0) {
            const bx = BRICK_AREA_X + c * (BRICK_W + BRICK_GAP);
            const by = 30 + r * (BRICK_H + BRICK_GAP);
            // Animate: pulse
            const alpha = (sin(API.frame * 0.04 + r * 0.5 + c * 0.3) + 1) * 0.5;
            if (alpha > 0.3) rectf(bx, by, BRICK_W, BRICK_H, bc);
          }
        }
      }

      // Title
      const titleY = 115;
      text("BREAKOUT", W / 2 - 4 * 5 * 4 / 2 + 10, titleY, 3);

      // Korean subtitle
      text("- BLOCK BREAKER -", W / 2 - 9 * 5 / 2 - 35, titleY + 16, 2);

      // Bouncing ball animation
      const ballAnimX = W / 2 + sin(API.frame * 0.08) * 60;
      const ballAnimY = 165 + _abs(sin(API.frame * 0.12)) * -20;
      spr(1, ballAnimX - 4, ballAnimY - 4);

      // Blinking text
      if (flr(API.frame / 20) % 2 === 0) {
        text("PRESS Z OR ENTER", W / 2 - 40, 210, 3);
      }

      // Credits
      text("LEFT/RIGHT: MOVE", W / 2 - 42, 248, 1);
      text("Z: LAUNCH BALL", W / 2 - 37, 258, 1);

      drawParticles();
      return;
    }

    // ---- GAME OVER ----
    if (state === "gameover") {
      text("GAME OVER", W / 2 - 22, H / 2 - 20, 3);
      text("SCORE: " + score, W / 2 - 25, H / 2, 2);
      text("LEVEL: " + level, W / 2 - 18, H / 2 + 12, 2);
      if (flr(API.frame / 20) % 2 === 0) {
        text("PRESS Z TO CONTINUE", W / 2 - 48, H / 2 + 36, 1);
      }
      drawParticles();
      return;
    }

    // ---- LEVEL CLEAR ----
    if (state === "levelclear") {
      drawPlayfield(sx, sy);
      // Overlay
      rectf(W / 2 - 80, H / 2 - 20, 160, 40, 0);
      rect(W / 2 - 80, H / 2 - 20, 160, 40, 2);
      text("LEVEL " + level + " CLEAR!", W / 2 - 38, H / 2 - 8, 3);
      text("BONUS: " + (500 + level * 100), W / 2 - 30, H / 2 + 6, 2);
      return;
    }

    // ---- PLAY ----
    drawPlayfield(sx, sy);

    // Level message overlay
    if (levelMsg > 0) {
      const msgAlpha = levelMsg > 60 ? 1 : levelMsg / 60;
      if (msgAlpha > 0.3) {
        text("LEVEL " + level, W / 2 - 18, H / 2 - 4, 3);
      }
    }
  };

  function drawPlayfield(sx, sy) {
    // HUD bar at top
    rectf(0, 0, W, 14, 0);
    line(0, 14, W, 14, 1);
    text("SCORE:" + score, 4 + sx, 4 + sy, 3);
    text("LV:" + level, W / 2 - 12 + sx, 4 + sy, 2);

    // Lives
    for (let i = 0; i < lives; i++) {
      spr(5, W - 40 + i * 12 + sx, 3 + sy);
    }

    // Power-up indicators
    let indX = W / 2 + 30;
    if (wideTimer > 0) {
      text("W", indX + sx, 4 + sy, wideTimer < 90 && flr(API.frame / 6) % 2 ? 1 : 2);
      indX += 10;
    }
    if (slowTimer > 0) {
      text("S", indX + sx, 4 + sy, slowTimer < 90 && flr(API.frame / 6) % 2 ? 1 : 2);
      indX += 10;
    }

    // Walls
    rectf(0 + sx, 15 + sy, 2, H - 15, 1);
    rectf(W - 2 + sx, 15 + sy, 2, H - 15, 1);

    // Bricks
    for (const br of bricks) {
      if (br.type === 0) continue;
      let c;
      if (br.hitFlash > 0) {
        c = 3;
      } else if (br.type === 3) {
        c = 1; // unbreakable = dark
      } else if (br.type === 2 || br.hp === 2) {
        c = 3; // strong = white
      } else {
        c = 2; // normal = light
      }
      rectf(br.x + sx, br.y + sy, BRICK_W, BRICK_H, c);
      // Inner detail line for depth
      if (br.hitFlash <= 0) {
        if (c === 3) {
          line(br.x + 1 + sx, br.y + BRICK_H - 1 + sy, br.x + BRICK_W - 1 + sx, br.y + BRICK_H - 1 + sy, 2);
          line(br.x + BRICK_W - 1 + sx, br.y + 1 + sy, br.x + BRICK_W - 1 + sx, br.y + BRICK_H - 1 + sy, 2);
        } else if (c === 2) {
          line(br.x + 1 + sx, br.y + BRICK_H - 1 + sy, br.x + BRICK_W - 1 + sx, br.y + BRICK_H - 1 + sy, 1);
          line(br.x + BRICK_W - 1 + sx, br.y + 1 + sy, br.x + BRICK_W - 1 + sx, br.y + BRICK_H - 1 + sy, 1);
        } else if (c === 1) {
          // Unbreakable: cross-hatch pattern
          for (let px = 0; px < BRICK_W; px += 4) {
            pix(br.x + px + sx, br.y + 2 + sy, 0);
            pix(br.x + px + 2 + sx, br.y + 6 + sy, 0);
          }
        }
      }
    }

    // Paddle
    const pw = paddleW;
    rectf(paddle.x + sx, PADDLE_Y + sy, pw, PADDLE_H, 3);
    // Paddle detail: darker center stripe
    rectf(paddle.x + 2 + sx, PADDLE_Y + 2 + sy, pw - 4, 2, 2);
    // Paddle edges
    rectf(paddle.x + sx, PADDLE_Y + sy, 2, PADDLE_H, 2);
    rectf(paddle.x + pw - 2 + sx, PADDLE_Y + sy, 2, PADDLE_H, 2);

    // Balls
    for (const b of balls) {
      spr(1, flr(b.x) + sx, flr(b.y) + sy);
    }

    // Ball on paddle indicator
    if (ballOnPaddle) {
      const bx = paddle.x + pw / 2 - BALL_SIZE / 2;
      const by = PADDLE_Y - BALL_SIZE - 1;
      spr(1, flr(bx) + sx, flr(by) + sy);
      // Blinking "PRESS Z" hint
      if (flr(API.frame / 15) % 2 === 0) {
        text("PRESS Z", W / 2 - 17, PADDLE_Y - 22, 2);
      }
    }

    // Powerups
    for (const p of powerups) {
      spr(p.type, flr(p.x) + sx, flr(p.y) + sy);
      // Sparkle
      if (flr(API.frame / 4) % 2 === 0) {
        pix(p.x - 1 + sx, p.y + 4 + sy, 3);
        pix(p.x + 9 + sx, p.y + 4 + sy, 3);
      }
    }

    // Particles
    drawParticles();

    // Combo display
    if (comboCount >= 5) {
      const comboText = comboCount + " COMBO!";
      text(comboText, W / 2 - comboText.length * 2.5, PADDLE_Y - 38,
           flr(API.frame / 4) % 2 === 0 ? 3 : 2);
    }
  }

  function drawParticles() {
    for (const p of particles) {
      pix(flr(p.x), flr(p.y), p.color);
      if (p.life > 5) pix(flr(p.x) + 1, flr(p.y), p.color);
    }
  }

  // ============================================================
  // Boot
  // ============================================================
  state = "title";
  setInterval(tick, 1000 / FPS);
})();
</script>
</body>
