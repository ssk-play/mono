<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GrayBox — Demo: Sokoban</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #0a0a0a;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100vh;
    font-family: monospace;
    overflow: hidden;
  }
  #frame {
    background: #111;
    border: 3px solid #333;
    border-radius: 8px;
    padding: 12px;
    box-shadow: 0 0 40px rgba(0,0,0,0.8), inset 0 0 20px rgba(0,0,0,0.5);
  }
  canvas {
    display: block;
    image-rendering: pixelated;
    image-rendering: crisp-edges;
  }
  #controls {
    margin-top: 12px;
    color: #6b6b6b;
    font-size: 11px;
    text-align: center;
    letter-spacing: 1px;
  }
  #controls span { color: #b0b0b0; }
</style>
</head>
<body>
<div id="frame">
  <canvas id="screen"></canvas>
</div>
<div id="controls">
  <span>ARROWS</span> MOVE &nbsp;&nbsp; <span>X</span> UNDO &nbsp;&nbsp; <span>Z</span> RESTART &nbsp;&nbsp; <span>ENTER</span> START
</div>
<script>
(() => {
  "use strict";

  // ============================================================
  // GrayBox Runtime (inline)
  // ============================================================
  const W = 480;
  const H = 320;
  const FPS = 30;
  const COLORS = ["#1a1a1a", "#6b6b6b", "#b0b0b0", "#e8e8e8"];
  const canvas = document.getElementById("screen");
  canvas.width = W;
  canvas.height = H;
  function fitCanvas() {
    var maxW = window.innerWidth - 40;
    var maxH = window.innerHeight - 60;
    var s = Math.min(maxW / W, maxH / H);
    canvas.style.width = (W * s) + "px";
    canvas.style.height = (H * s) + "px";
  }
  fitCanvas();
  window.addEventListener("resize", fitCanvas);
  const ctx = canvas.getContext("2d");
  ctx.imageSmoothingEnabled = false;
  const buf = ctx.createImageData(W, H);
  const buf32 = new Uint32Array(buf.data.buffer);

  function hexToABGR(hex) {
    const r = parseInt(hex.slice(1, 3), 16);
    const g = parseInt(hex.slice(3, 5), 16);
    const b = parseInt(hex.slice(5, 7), 16);
    return (255 << 24) | (b << 16) | (g << 8) | r;
  }
  const COLOR_U32 = COLORS.map(hexToABGR);

  const sprites = {};
  const tilemap = {};

  const keyMap = {
    "ArrowUp": "up", "ArrowDown": "down", "ArrowLeft": "left", "ArrowRight": "right",
    "w": "up", "s": "down", "a": "left", "d": "right",
    "z": "a", "Z": "a", "x": "b", "X": "b",
    "Enter": "start", " ": "a"
  };
  const keys = {};
  const keysPrev = {};

  document.addEventListener("keydown", e => {
    const k = keyMap[e.key];
    if (k) { keys[k] = true; e.preventDefault(); }
  });
  document.addEventListener("keyup", e => {
    const k = keyMap[e.key];
    if (k) { keys[k] = false; e.preventDefault(); }
  });

  let audioCtx = null;
  const channels = [null, null];
  const channelGains = [null, null];
  function ensureAudio() {
    if (!audioCtx) {
      audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      for (let i = 0; i < 2; i++) {
        channelGains[i] = audioCtx.createGain();
        channelGains[i].gain.value = 0.15;
        channelGains[i].connect(audioCtx.destination);
      }
    }
  }

  const NOTE_NAMES = ["C","C#","D","D#","E","F","F#","G","G#","A","A#","B"];
  function noteToFreq(noteStr) {
    const match = noteStr.match(/^([A-G]#?)(\d)$/);
    if (!match) return 440;
    const name = match[1];
    const octave = parseInt(match[2]);
    const semitone = NOTE_NAMES.indexOf(name);
    if (semitone === -1) return 440;
    const midi = (octave + 1) * 12 + semitone;
    return 440 * Math.pow(2, (midi - 69) / 12);
  }

  const FONT_W = 4;
  const FONT_H = 7;
  const FONT = {};
  const fontData = {
    "A":"0110100110011111100110011001","B":"1110100110101110100110011110",
    "C":"0110100110001000100001100110","D":"1100101010011001100110101100",
    "E":"1111100010001110100010001111","F":"1111100010001110100010001000",
    "G":"0111100010001011100101100111","H":"1001100110011111100110011001",
    "I":"1110010001000100010001001110","J":"0111001000100010001010100100",
    "K":"1001101011001100101010011001","L":"1000100010001000100010001111",
    "M":"1001111111011001100110011001","N":"1001110111011001100110011001",
    "O":"0110100110011001100110010110","P":"1110100110011110100010001000",
    "Q":"0110100110011001101101100001","R":"1110100110011110101010011001",
    "S":"0111100010000110000110001110","T":"1111001000100010001000100010",
    "U":"1001100110011001100110010110","V":"1001100110011001100101100110",
    "W":"1001100110011001101111011001","X":"1001100101100110011010011001",
    "Y":"1001100101100010001000100010","Z":"1111000100100100100010001111",
    "0":"0110100111011011101110010110","1":"0100110001000100010001001110",
    "2":"0110100100010010010010001111","3":"1110000100010110000110011110",
    "4":"1001100110011111000100010001","5":"1111100010001110000100011110",
    "6":"0110100010001110100110010110","7":"1111000100010010010001001000",
    "8":"0110100110010110100110010110","9":"0110100110010111000100010110",
    " ":"0000000000000000000000000000",
    ".":"0000000000000000000001000100",
    ",":"0000000000000000001000101000",
    "!":"0100010001000100000000000100",
    "?":"0110100100010010000000000010",
    "-":"0000000000001110000000000000",
    "+":"0000001001001110010000100000",
    ":":"0000010001000000010001000000",
    "/":"0001000100100010010010001000",
    "*":"0000101001001110010010100000",
    "#":"0101111101011111010100000000",
    "(":"0010010010001000010001000010",
    ")":"0100001000010001000100100100",
    "=":"0000000011110000111100000000",
    "'":"0100010010000000000000000000",
    "\"":"1010101000000000000000000000",
    "<":"0010010010001000010000100010",
    ">":"1000010000100001001001001000",
    "_":"0000000000000000000000001111",
  };
  for (const [ch, bits] of Object.entries(fontData)) {
    FONT[ch] = [];
    for (let i = 0; i < bits.length; i++) FONT[ch].push(parseInt(bits[i]));
  }

  const API = {};
  API._init = null;
  API._update = null;
  API._draw = null;
  API.frame = 0;

  API.cls = function(c = 0) { buf32.fill(COLOR_U32[c] || COLOR_U32[0]); };
  API.pix = function(x, y, c) {
    x = Math.floor(x); y = Math.floor(y);
    if (x < 0 || x >= W || y < 0 || y >= H) return;
    buf32[y * W + x] = COLOR_U32[c] || COLOR_U32[0];
  };
  API.line = function(x0, y0, x1, y1, c) {
    x0=Math.floor(x0); y0=Math.floor(y0); x1=Math.floor(x1); y1=Math.floor(y1);
    const dx=Math.abs(x1-x0), dy=Math.abs(y1-y0);
    const sx=x0<x1?1:-1, sy=y0<y1?1:-1;
    let err=dx-dy;
    while(true) {
      API.pix(x0,y0,c);
      if(x0===x1&&y0===y1) break;
      const e2=2*err;
      if(e2>-dy){err-=dy;x0+=sx;}
      if(e2<dx){err+=dx;y0+=sy;}
    }
  };
  API.rect = function(x,y,w,h,c) {
    API.line(x,y,x+w-1,y,c); API.line(x+w-1,y,x+w-1,y+h-1,c);
    API.line(x+w-1,y+h-1,x,y+h-1,c); API.line(x,y+h-1,x,y,c);
  };
  API.rectf = function(x,y,w,h,c) {
    x=Math.floor(x); y=Math.floor(y);
    const col=COLOR_U32[c]||COLOR_U32[0];
    for(let py=Math.max(0,y);py<Math.min(H,y+h);py++)
      for(let px=Math.max(0,x);px<Math.min(W,x+w);px++)
        buf32[py*W+px]=col;
  };
  API.circ = function(cx,cy,r,c) {
    let x=r,y=0,d=1-r; cx=Math.floor(cx); cy=Math.floor(cy);
    while(x>=y){
      API.pix(cx+x,cy+y,c);API.pix(cx-x,cy+y,c);
      API.pix(cx+x,cy-y,c);API.pix(cx-x,cy-y,c);
      API.pix(cx+y,cy+x,c);API.pix(cx-y,cy+x,c);
      API.pix(cx+y,cy-x,c);API.pix(cx-y,cy-x,c);
      y++; if(d<0){d+=2*y+1;}else{x--;d+=2*(y-x)+1;}
    }
  };
  API.circf = function(cx,cy,r,c) {
    cx=Math.floor(cx); cy=Math.floor(cy);
    const col=COLOR_U32[c]||COLOR_U32[0]; const r2=r*r;
    for(let py=-r;py<=r;py++) for(let px=-r;px<=r;px++)
      if(px*px+py*py<=r2){ const sx=cx+px,sy=cy+py;
        if(sx>=0&&sx<W&&sy>=0&&sy<H) buf32[sy*W+sx]=col; }
  };
  API.sprite = function(id, data) {
    const arr = new Uint8Array(64); let i = 0;
    for (const ch of data) { if (ch>='0'&&ch<='3') { arr[i++]=parseInt(ch); if(i>=64) break; } }
    sprites[id] = arr;
  };
  API.spr = function(id, x, y, flipX, flipY) {
    const s=sprites[id]; if(!s) return;
    x=Math.floor(x); y=Math.floor(y);
    for(let py=0;py<8;py++) for(let px=0;px<8;px++){
      const sx=flipX?7-px:px, sy=flipY?7-py:py;
      const c=s[sy*8+sx], dx=x+px, dy=y+py;
      if(dx>=0&&dx<W&&dy>=0&&dy<H) buf32[dy*W+dx]=COLOR_U32[c];
    }
  };
  API.text = function(str, x, y, c) {
    str=String(str).toUpperCase(); let cx=Math.floor(x); const cy=Math.floor(y);
    const col=COLOR_U32[c]||COLOR_U32[3];
    for(const ch of str){
      const glyph=FONT[ch];
      if(glyph) for(let py=0;py<FONT_H;py++) for(let px=0;px<FONT_W;px++)
        if(glyph[py*FONT_W+px]){ const dx=cx+px,dy=cy+py;
          if(dx>=0&&dx<W&&dy>=0&&dy<H) buf32[dy*W+dx]=col; }
      cx+=FONT_W+1;
    }
  };
  API.mget = function(cx,cy) { return tilemap[cx+","+cy]||0; };
  API.mset = function(cx,cy,id) { tilemap[cx+","+cy]=id; };
  API.map = function(mx,my,mw,mh,sx,sy) {
    for(let ty=0;ty<mh;ty++) for(let tx=0;tx<mw;tx++){
      const id=API.mget(mx+tx,my+ty); if(id>0) API.spr(id,sx+tx*8,sy+ty*8); }
  };
  API.btn = function(k) { return !!keys[k]; };
  API.btnp = function(k) { return !!keys[k] && !keysPrev[k]; };
  API.note = function(ch, noteStr, dur) {
    ensureAudio(); if(ch<0||ch>1) return; API.stop(ch);
    const osc=audioCtx.createOscillator(); osc.type="square";
    osc.frequency.value=noteToFreq(noteStr);
    osc.connect(channelGains[ch]); osc.start();
    osc.stop(audioCtx.currentTime+dur); channels[ch]=osc;
  };
  API.stop = function(ch) {
    if(ch===undefined){API.stop(0);API.stop(1);return;}
    if(channels[ch]){try{channels[ch].stop();}catch(e){} channels[ch]=null;}
  };
  API.rnd = function(max) { return Math.random()*max; };
  API.flr = Math.floor;
  API.abs = Math.abs;
  API.min = Math.min;
  API.max = Math.max;
  API.sin = Math.sin;
  API.cos = Math.cos;

  function tick() {
    if (API._update) API._update();
    if (API._draw) API._draw();
    ctx.putImageData(buf, 0, 0);
    for (const k in keys) keysPrev[k] = keys[k];
    API.frame++;
  }

  // ============================================================
  // Sokoban Game
  // ============================================================
  const { cls, pix, line, rect, rectf, circ, circf, sprite: defSprite,
          spr, text, btn, btnp, note, stop, rnd, flr, abs: _abs,
          min, max: _max, sin, cos } = API;

  // --- Tile size: 8x8 sprites rendered at 2x = 16x16 per tile ---
  const TS = 16;

  // --- Sprites ---
  // 1: Wall - solid brick pattern
  defSprite(1,
    "33333333" +
    "32222213" +
    "32222213" +
    "33333333" +
    "22333223" +
    "22322223" +
    "22322223" +
    "33333333"
  );
  // 2: Floor - subtle texture
  defSprite(2,
    "00000000" +
    "00000000" +
    "00010000" +
    "00000000" +
    "00000000" +
    "00000100" +
    "00000000" +
    "00000000"
  );
  // 3: Target spot - diamond/X marker on floor
  defSprite(3,
    "00000000" +
    "01000100" +
    "00101000" +
    "00010000" +
    "00101000" +
    "01000100" +
    "00000000" +
    "00000000"
  );
  // 4: Box - wooden crate
  defSprite(4,
    "22222220" +
    "21122110" +
    "21222210" +
    "22211220" +
    "22211220" +
    "21222210" +
    "21122110" +
    "22222220"
  );
  // 5: Box on target - bright highlighted crate
  defSprite(5,
    "33333330" +
    "32233220" +
    "32333230" +
    "33322330" +
    "33322330" +
    "32333230" +
    "32233220" +
    "33333330"
  );
  // 10: Player facing down
  defSprite(10,
    "00222000" +
    "00232000" +
    "02333200" +
    "02323200" +
    "02333200" +
    "00323000" +
    "00202000" +
    "00202000"
  );
  // 11: Player facing up
  defSprite(11,
    "00222000" +
    "00232000" +
    "02333200" +
    "02333200" +
    "02333200" +
    "00323000" +
    "00202000" +
    "00202000"
  );
  // 12: Player facing left
  defSprite(12,
    "00222000" +
    "00232000" +
    "23333200" +
    "02323200" +
    "02333200" +
    "00323000" +
    "00202000" +
    "02000000"
  );
  // 13: Player facing right
  defSprite(13,
    "00222000" +
    "00232000" +
    "02333320" +
    "02323200" +
    "02333200" +
    "00323000" +
    "00202000" +
    "00000200"
  );

  // --- Levels (standard Sokoban notation) ---
  // # = wall, (space) = void, - = floor, . = target
  // @ = player on floor, + = player on target
  // $ = box on floor, * = box on target
  const LEVELS = [
    // Level 1 - Tutorial: 1 box, 1 target
    [
      "######",
      "#----#",
      "#-$@-#",
      "#----#",
      "#-.--#",
      "######",
    ],
    // Level 2 - Two boxes
    [
      "#######",
      "#.----#",
      "#--$--#",
      "#--@--#",
      "#--$--#",
      "#----.#",
      "#######",
    ],
    // Level 3 - L-shape room
    [
      "  ####",
      "###--#",
      "#.$--#",
      "#--$-#",
      "#.@###",
      "####  ",
    ],
    // Level 4 - Side pockets
    [
      "#######",
      "#--#--#",
      "#.$.$-#",
      "#--@--#",
      "#--#--#",
      "#######",
    ],
    // Level 5 - Three targets
    [
      " ######",
      "##----#",
      "#--$--#",
      "#.#.#.#",
      "#-$-$-#",
      "#--@--#",
      "#######",
    ],
    // Level 6 - Winding
    [
      "########",
      "#------#",
      "#-#--#-#",
      "#--$$--#",
      "#.@--.#",
      "#-#--#-#",
      "#------#",
      "########",
    ],
    // Level 7 - Three boxes offset
    [
      " ######",
      "##----#",
      "#--$--#",
      "#-.#.-#",
      "#---$-#",
      "#-@-.-#",
      "#--$--#",
      "#######",
    ],
    // Level 8 - Three box challenge
    [
      "########",
      "#------#",
      "#-$.#--#",
      "#------#",
      "#-#-$--#",
      "#--.-$-#",
      "#-@-.--#",
      "########",
    ],
    // Level 9 - Tight squeeze
    [
      " ######",
      " #----#",
      "##-$$-#",
      "#--##-#",
      "#-..-@#",
      "#-----#",
      "#######",
    ],
    // Level 10 - Four corners
    [
      "#########",
      "#.-----#",
      "#--#-#--#",
      "#--$-$--#",
      "#.--@--.#",
      "#--$-$--#",
      "#--#-#--#",
      "#------.#",
      "#########",
    ],
    // Level 11 - Maze corridors
    [
      "########",
      "#--.---#",
      "#-#$##-#",
      "#----$-#",
      "##-##--#",
      "#--$-.-#",
      "#-@-.--#",
      "########",
    ],
    // Level 12 - Grand finale: 6 boxes
    [
      "#########",
      "#---#---#",
      "#-$-.-$-#",
      "#-.#-#.-#",
      "##-$@$-##",
      "#-.#-#.-#",
      "#-$-.-$-#",
      "#---#---#",
      "#########",
    ],
  ];

  // --- Parse level ---
  function parseLevel(lvlIdx) {
    const rows = LEVELS[lvlIdx];
    const h = rows.length;
    let w = 0;
    for (const r of rows) if (r.length > w) w = r.length;
    const g = [];
    const bxs = [];
    const tgts = [];
    let px = 0, py = 0;
    for (let y = 0; y < h; y++) {
      g[y] = [];
      for (let x = 0; x < w; x++) {
        const ch = x < rows[y].length ? rows[y][x] : ' ';
        switch (ch) {
          case '#': g[y][x] = 1; break;
          case '-': g[y][x] = 2; break;
          case '.': g[y][x] = 3; tgts.push({x,y}); break;
          case '@': g[y][x] = 2; px=x; py=y; break;
          case '+': g[y][x] = 3; px=x; py=y; tgts.push({x,y}); break;
          case '$': g[y][x] = 2; bxs.push({x,y}); break;
          case '*': g[y][x] = 3; bxs.push({x,y}); tgts.push({x,y}); break;
          default:  g[y][x] = 0; break;
        }
      }
    }
    return { grid: g, w, h, boxes: bxs, targets: tgts, px, py };
  }

  // --- Game State ---
  let state = "title";
  let level = 0;
  let grid, gridW, gridH;
  let playerX, playerY, playerDir;
  let boxes, targets;
  let moves, pushes;
  let history;
  let completeTimer;
  let selectCursor = 0;
  let maxLevelReached = 0;
  let animTimer = 0;

  const PLAYER_SPR = [10, 11, 12, 13]; // down, up, left, right

  function loadLevel(lvlIdx) {
    const data = parseLevel(lvlIdx);
    grid = data.grid;
    gridW = data.w;
    gridH = data.h;
    playerX = data.px;
    playerY = data.py;
    playerDir = 0;
    boxes = data.boxes.map(b => ({...b}));
    targets = data.targets;
    moves = 0;
    pushes = 0;
    history = [];
    completeTimer = 0;
    animTimer = 0;
  }

  function resetCurrentLevel() {
    loadLevel(level);
    note(0, "C3", 0.08);
    note(1, "E3", 0.08);
  }

  // --- Helpers ---
  function boxAt(x, y) {
    for (let i = 0; i < boxes.length; i++) {
      if (boxes[i].x === x && boxes[i].y === y) return i;
    }
    return -1;
  }

  function isWall(x, y) {
    if (y < 0 || y >= gridH || x < 0 || x >= gridW) return true;
    return grid[y][x] === 1 || grid[y][x] === 0;
  }

  function isTarget(x, y) {
    for (const t of targets) {
      if (t.x === x && t.y === y) return true;
    }
    return false;
  }

  function checkWin() {
    for (const t of targets) {
      if (boxAt(t.x, t.y) === -1) return false;
    }
    return true;
  }

  function tryMove(dx, dy) {
    const nx = playerX + dx;
    const ny = playerY + dy;

    if (dy > 0) playerDir = 0;
    else if (dy < 0) playerDir = 1;
    else if (dx < 0) playerDir = 2;
    else if (dx > 0) playerDir = 3;

    if (isWall(nx, ny)) return;

    const bi = boxAt(nx, ny);
    if (bi >= 0) {
      const bx = nx + dx;
      const by = ny + dy;
      if (isWall(bx, by) || boxAt(bx, by) >= 0) return;

      history.push({ px: playerX, py: playerY, dir: playerDir, boxIdx: bi, bx: boxes[bi].x, by: boxes[bi].y });
      boxes[bi].x = bx;
      boxes[bi].y = by;
      playerX = nx;
      playerY = ny;
      moves++;
      pushes++;

      note(0, "D4", 0.06);
      note(1, "A3", 0.06);

      if (checkWin()) {
        completeTimer = 90;
        state = "complete";
        if (level + 1 > maxLevelReached) maxLevelReached = level + 1;
        note(0, "C5", 0.15);
        setTimeout(() => { try { note(0, "E5", 0.15); } catch(e){} }, 150);
        setTimeout(() => { try { note(0, "G5", 0.25); } catch(e){} }, 300);
        setTimeout(() => { try { note(1, "C6", 0.3); } catch(e){} }, 450);
      }
    } else {
      history.push({ px: playerX, py: playerY, dir: playerDir, boxIdx: -1, bx: 0, by: 0 });
      playerX = nx;
      playerY = ny;
      moves++;
      note(0, "G3", 0.03);
    }
  }

  function undo() {
    if (history.length === 0) return;
    const h = history.pop();
    playerX = h.px;
    playerY = h.py;
    playerDir = h.dir;
    if (h.boxIdx >= 0) {
      boxes[h.boxIdx].x = h.bx;
      boxes[h.boxIdx].y = h.by;
      pushes--;
    }
    moves--;
    note(1, "E3", 0.04);
  }

  // --- Draw a sprite at 2x scale ---
  function spr2x(id, sx, sy) {
    const s = sprites[id]; if (!s) return;
    sx = Math.floor(sx); sy = Math.floor(sy);
    for (let py = 0; py < 8; py++) {
      for (let px = 0; px < 8; px++) {
        const c = s[py * 8 + px];
        const dx = sx + px * 2;
        const dy = sy + py * 2;
        for (let yy = 0; yy < 2; yy++) {
          for (let xx = 0; xx < 2; xx++) {
            const fx = dx + xx, fy = dy + yy;
            if (fx >= 0 && fx < W && fy >= 0 && fy < H) {
              buf32[fy * W + fx] = COLOR_U32[c];
            }
          }
        }
      }
    }
  }

  function textCenter(str, y, c) {
    const len = str.length * (FONT_W + 1) - 1;
    text(str, flr((W - len) / 2), y, c);
  }

  // ============ Title Screen ============
  function updateTitle() {
    animTimer++;
    if (btnp("start")) {
      state = "select";
      selectCursor = min(maxLevelReached, LEVELS.length - 1);
      note(0, "C4", 0.1);
    }
  }

  function drawTitle() {
    cls(0);

    // Title text - large
    const ty = 50;
    textCenter("S O K O B A N", ty, 3);
    // Underline
    const ul = 13 * (FONT_W + 1) - 1;
    line(flr((W - ul) / 2), ty + 8, flr((W + ul) / 2), ty + 8, 2);

    // Draw decorative scene
    const cx = flr(W / 2);
    const sy = 110;
    // Floor row
    for (let i = -4; i <= 4; i++) spr2x(2, cx + i * TS - 8, sy);
    // Walls on sides
    spr2x(1, cx - 4 * TS - 8, sy);
    spr2x(1, cx + 4 * TS - 8, sy);
    // Wall top row
    for (let i = -4; i <= 4; i++) spr2x(1, cx + i * TS - 8, sy - TS);
    // Wall bottom row
    for (let i = -4; i <= 4; i++) spr2x(1, cx + i * TS - 8, sy + TS);

    // Animated player pushing box toward target
    const phase = flr(animTimer / 30) % 6;
    const pOff = min(phase, 3);
    spr2x(PLAYER_SPR[3], cx - 3 * TS - 8 + pOff * TS, sy); // player
    spr2x(4, cx - 2 * TS - 8 + pOff * TS, sy); // box
    spr2x(3, cx + 2 * TS - 8, sy); // target

    // Blinking prompt
    if (flr(animTimer / 20) % 2 === 0) {
      textCenter("PRESS ENTER", 200, 2);
    }

    textCenter("PUSH ALL BOXES ONTO TARGETS", 240, 1);
    textCenter("ARROWS:MOVE  X:UNDO  Z:RESTART", 260, 1);
  }

  // ============ Level Select ============
  function updateSelect() {
    const maxIdx = min(maxLevelReached, LEVELS.length - 1);
    if (btnp("up")) {
      selectCursor--;
      if (selectCursor < 0) selectCursor = maxIdx;
      note(0, "C4", 0.03);
    }
    if (btnp("down")) {
      selectCursor++;
      if (selectCursor > maxIdx) selectCursor = 0;
      note(0, "C4", 0.03);
    }
    if (btnp("start") || btnp("a")) {
      level = selectCursor;
      loadLevel(level);
      state = "play";
      note(0, "E4", 0.1);
      note(1, "C4", 0.1);
    }
    if (btnp("b")) {
      state = "title";
      note(0, "C3", 0.06);
    }
  }

  function drawSelect() {
    cls(0);
    textCenter("SELECT LEVEL", 16, 3);

    const maxShow = min(LEVELS.length, maxLevelReached + 1);
    const perPage = 12;
    const page = flr(selectCursor / perPage);
    const startI = page * perPage;
    const endI = min(startI + perPage, maxShow);

    const startY = 40;
    for (let i = startI; i < endI; i++) {
      const y = startY + (i - startI) * 20;
      const sel = (i === selectCursor);
      const c = sel ? 3 : 2;
      const prefix = sel ? "> " : "  ";
      text(prefix + "LEVEL " + (i + 1), 170, y, c);
      // Small box icon for completed levels
      if (i < maxLevelReached) {
        spr(5, 155, y - 1);
      }
    }
    if (maxShow < LEVELS.length) {
      const y = startY + (endI - startI) * 20;
      text("  ...", 170, y, 1);
    }

    textCenter("ENTER:START  X:BACK", 300, 1);
  }

  // ============ Play State ============
  function updatePlay() {
    animTimer++;
    if (btnp("up")) tryMove(0, -1);
    if (btnp("down")) tryMove(0, 1);
    if (btnp("left")) tryMove(-1, 0);
    if (btnp("right")) tryMove(1, 0);
    if (btnp("b")) undo();
    if (btnp("a")) resetCurrentLevel();
  }

  function drawPlay() {
    cls(0);

    // Calculate offset to center the level
    const ox = flr((W - gridW * TS) / 2);
    const oy = flr((H - gridH * TS) / 2) + 12;

    // Draw grid tiles
    for (let y = 0; y < gridH; y++) {
      for (let x = 0; x < gridW; x++) {
        const t = grid[y][x];
        const sx = ox + x * TS;
        const sy = oy + y * TS;
        if (t === 1) spr2x(1, sx, sy);
        else if (t === 2) spr2x(2, sx, sy);
        else if (t === 3) spr2x(3, sx, sy);
      }
    }

    // Draw boxes
    for (const b of boxes) {
      const onTarget = isTarget(b.x, b.y);
      spr2x(onTarget ? 5 : 4, ox + b.x * TS, oy + b.y * TS);
    }

    // Draw player (blink on target to show it)
    spr2x(PLAYER_SPR[playerDir], ox + playerX * TS, oy + playerY * TS);

    // HUD - top bar
    rectf(0, 0, W, 18, 0);
    text("LV." + (level + 1), 4, 2, 3);
    text("MOVES:" + moves, 60, 2, 2);
    text("PUSH:" + pushes, 160, 2, 2);

    // Target progress
    let done = 0;
    for (const t of targets) {
      if (boxAt(t.x, t.y) >= 0) done++;
    }
    const prog = done + "/" + targets.length;
    text(prog, W - prog.length * 5 - 4, 2, done === targets.length ? 3 : 2);

    // Controls hint
    text("X:UNDO Z:RESET", 4, H - 10, 1);

    // Undo available indicator
    if (history.length > 0) {
      text("UNDO:" + history.length, W - 55, H - 10, 1);
    }
  }

  // ============ Level Complete ============
  function updateComplete() {
    completeTimer--;
    animTimer++;
    if (completeTimer <= 0 || btnp("start")) {
      if (level + 1 >= LEVELS.length) {
        state = "allclear";
        animTimer = 0;
      } else {
        level++;
        loadLevel(level);
        state = "play";
      }
    }
  }

  function drawComplete() {
    drawPlay();

    // Dark overlay
    for (let i = 0; i < buf32.length; i++) {
      const v = buf32[i];
      const r = ((v & 0xFF) >> 1);
      const g = (((v >> 8) & 0xFF) >> 1);
      const b = (((v >> 16) & 0xFF) >> 1);
      buf32[i] = (255 << 24) | (b << 16) | (g << 8) | r;
    }

    // Popup box
    const bw = 220, bh = 70;
    const bx = flr((W - bw) / 2);
    const by = flr((H - bh) / 2);
    rectf(bx, by, bw, bh, 0);
    rect(bx, by, bw, bh, 3);
    rect(bx + 2, by + 2, bw - 4, bh - 4, 2);

    textCenter("LEVEL COMPLETE!", by + 12, 3);
    textCenter("MOVES: " + moves + "  PUSHES: " + pushes, by + 30, 2);

    if (flr(animTimer / 15) % 2 === 0) {
      if (level + 1 >= LEVELS.length) {
        textCenter("ALL LEVELS DONE!", by + 48, 3);
      } else {
        textCenter("NEXT LEVEL...", by + 48, 2);
      }
    }
  }

  // ============ All Clear ============
  function updateAllClear() {
    animTimer++;
    if (btnp("start")) {
      state = "title";
    }
  }

  function drawAllClear() {
    cls(0);
    textCenter("CONGRATULATIONS!", 70, 3);
    textCenter("ALL PUZZLES SOLVED!", 95, 2);

    // Spinning boxes celebration
    const cx = flr(W / 2);
    const cy = 180;
    for (let i = 0; i < 6; i++) {
      const angle = animTimer * 0.04 + i * 1.047;
      const bx = cx + flr(cos(angle) * 70) - 8;
      const by = cy + flr(sin(angle) * 35) - 8;
      spr2x(5, bx, by);
    }
    // Player in center
    const pd = flr(animTimer / 15) % 4;
    spr2x(PLAYER_SPR[pd], cx - 8, cy - 8);

    if (flr(animTimer / 20) % 2 === 0) {
      textCenter("PRESS ENTER", 260, 2);
    }
    textCenter("THANKS FOR PLAYING!", 285, 1);
  }

  // ============ Main Loop ============
  API._update = function() {
    switch (state) {
      case "title": updateTitle(); break;
      case "select": updateSelect(); break;
      case "play": updatePlay(); break;
      case "complete": updateComplete(); break;
      case "allclear": updateAllClear(); break;
    }
  };

  API._draw = function() {
    switch (state) {
      case "title": drawTitle(); break;
      case "select": drawSelect(); break;
      case "play": drawPlay(); break;
      case "complete": drawComplete(); break;
      case "allclear": drawAllClear(); break;
    }
  };

  // Initialize
  loadLevel(0);
  setInterval(tick, 1000 / FPS);

})();
</script>
</body>
