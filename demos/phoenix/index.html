<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mono — Demo: Phoenix</title>
<link rel="stylesheet" href="../../runtime/mono.css">
</head>
<body>
<div id="frame">
  <canvas id="screen"></canvas>
</div>
<div id="controls">
  <span>&#8592;&#8594;</span> MOVE &nbsp;&nbsp; <span>A</span> SHOOT &nbsp;&nbsp; <span>B</span> SHIELD
</div>
<script src="../../runtime/engine.js"></script>
<script>
(() => {
  "use strict";
  const W = Mono.WIDTH, H = Mono.HEIGHT;
  const { cls, pix, line, rect, rectf, circ, circf, sprite: defSprite,
          spr, text: drawText, btn, btnp, note, stop, rnd, flr,
          abs: _abs, min, max: _max, sin, cos } = Mono;

  // --- 8→16 upscale helper ---
  function up(d) {
    let o = "";
    for (let r = 0; r < 8; r++) {
      let row = "";
      for (let c = 0; c < 8; c++) {
        const ch = d[r * 8 + c];
        row += ch + ch;
      }
      o += row + row;
    }
    return o;
  }

  // --- Circle collision helper ---
  function circCollide(x1, y1, r1, x2, y2, r2) {
    const dx = x1 - x2, dy = y1 - y2;
    const dist = dx * dx + dy * dy;
    const rSum = r1 + r2;
    return dist < rSum * rSum;
  }

  // --- Rect collision helper (fallback) ---
  function rectCollide(x1, y1, w1, h1, x2, y2, w2, h2) {
    return x1 + w1 > x2 && x1 < x2 + w2 && y1 + h1 > y2 && y1 < y2 + h2;
  }

  // --- Sprites (8x8 data upscaled to 16x16) ---

  // 1: Player ship
  defSprite(1, up(
    "00030000" +
    "00333000" +
    "00333000" +
    "03333300" +
    "33333330" +
    "33322330" +
    "33000030" +
    "01000010"
  ));

  // 2: Small bird - wings up
  defSprite(2, up(
    "30000030" +
    "03000300" +
    "03300330" +
    "03322330" +
    "00333300" +
    "00033000" +
    "00300300" +
    "00000000"
  ));

  // 3: Small bird - wings down
  defSprite(3, up(
    "00000000" +
    "00300300" +
    "00033000" +
    "00333300" +
    "03322330" +
    "03300330" +
    "03000300" +
    "30000030"
  ));

  // 4: Phoenix bird - wings up (large, multi-hit)
  defSprite(4, up(
    "30000030" +
    "33000330" +
    "33300330" +
    "33322330" +
    "03333300" +
    "03333300" +
    "00333000" +
    "00300300"
  ));

  // 5: Phoenix bird - wings down
  defSprite(5, up(
    "00300300" +
    "00333000" +
    "03333300" +
    "03333300" +
    "33322330" +
    "33300330" +
    "33000330" +
    "30000030"
  ));

  // 6: Phoenix damaged (no wings)
  defSprite(6, up(
    "00000000" +
    "00000000" +
    "00300300" +
    "00322300" +
    "00333300" +
    "00333300" +
    "00033000" +
    "00300300"
  ));

  // 7: Mothership body (alien inside)
  defSprite(7, up(
    "00333000" +
    "03222300" +
    "32222230" +
    "32233230" +
    "32222230" +
    "03222300" +
    "00333000" +
    "00030000"
  ));

  // 8: Shield segment (rotating barrier piece)
  defSprite(8, up(
    "00000000" +
    "00000000" +
    "33333330" +
    "22222220" +
    "22222220" +
    "33333330" +
    "00000000" +
    "00000000"
  ));

  // 9: Player bullet
  defSprite(9, up(
    "00030000" +
    "00030000" +
    "00020000" +
    "00020000" +
    "00010000" +
    "00000000" +
    "00000000" +
    "00000000"
  ));

  // 10: Enemy bullet
  defSprite(10, up(
    "00000000" +
    "00000000" +
    "00010000" +
    "00020000" +
    "00020000" +
    "00030000" +
    "00030000" +
    "00000000"
  ));

  // 11: Explosion frame 1
  defSprite(11, up(
    "00000000" +
    "00200100" +
    "01002000" +
    "00031000" +
    "00130200" +
    "01000010" +
    "00100000" +
    "00000000"
  ));

  // 12: Explosion frame 2
  defSprite(12, up(
    "20010020" +
    "01000010" +
    "00203200" +
    "03033030" +
    "00232000" +
    "01000300" +
    "20001001" +
    "00200010"
  ));

  // 13: Life icon
  defSprite(13, up(
    "00000000" +
    "00030000" +
    "00333000" +
    "03333300" +
    "33333330" +
    "33322330" +
    "00000000" +
    "00000000"
  ));

  // 14: Shield icon (player shield active)
  defSprite(14, up(
    "00333000" +
    "03333300" +
    "33333330" +
    "33333330" +
    "33333330" +
    "03333300" +
    "00333000" +
    "00030000"
  ));

  // 15: Mothership shield block (solid)
  defSprite(15, up(
    "33333333" +
    "32222223" +
    "32222223" +
    "32222223" +
    "32222223" +
    "32222223" +
    "32222223" +
    "33333333"
  ));

  // 16: Star
  defSprite(16, up(
    "00000000" +
    "00000000" +
    "00000000" +
    "00010000" +
    "00000000" +
    "00000000" +
    "00000000" +
    "00000000"
  ));

  // --- Game Constants (16x16 sprite scale) ---
  const SPR = 16;                 // sprite dimension
  const HALF = SPR / 2;           // 8 — center offset

  const FORM_COLS = 10;
  const FORM_ROWS = 4;
  const FORM_CELL_W = 20;         // wider cells for 16px sprites
  const FORM_CELL_H = 20;
  const FORM_BASE_X = (W - FORM_COLS * FORM_CELL_W) / 2;
  const FORM_BASE_Y = 30;

  // Max lives icons to display (layout overflow guard)
  const MAX_LIVES_DISPLAY = 5;

  // Collision radii
  const PLAYER_R = 6;
  const SMALLBIRD_R = 7;
  const PHOENIX_R = 7;
  const BULLET_R = 3;
  const EBULLET_R = 3;

  // --- Game State ---
  const { TITLE, PLAY, GAMEOVER } = Mono.SCENE;
  let player, bullets, eBullets, enemies, explosions, particles, stars;
  let score, lives, phase, loop, waveTimer, waveMessage;
  let shootCooldown;
  let formationX, formationDir, formationSpeed;
  let diveTimer;
  let shieldEnergy, shieldActive, shieldCooldown;
  let boss, bossShieldAngle;
  let invincibleTimer;
  let hiScore = 0;

  function resetGame() {
    player = { x: W / 2 - HALF, y: H - 32, speed: 3 };
    bullets = [];
    eBullets = [];
    enemies = [];
    explosions = [];
    particles = [];
    score = 0;
    lives = 3;
    phase = 0;
    loop = 0;
    waveTimer = 0;
    waveMessage = 0;
    shootCooldown = 0;
    formationX = 0;
    formationDir = 1;
    formationSpeed = 0.3;
    diveTimer = 0;
    shieldEnergy = 90;
    shieldActive = false;
    shieldCooldown = 0;
    boss = null;
    bossShieldAngle = 0;
    invincibleTimer = 0;
    stars = [];
    for (let i = 0; i < 60; i++)
      stars.push({ x: flr(rnd(W)), y: flr(rnd(H)), speed: 0.2 + rnd(0.8), bright: flr(rnd(2)) + 1 });
    spawnPhase();
  }

  function spawnPhase() {
    phase++;
    const actualPhase = ((phase - 1) % 5) + 1;
    waveMessage = 90;
    formationSpeed = 0.3 + loop * 0.1;
    enemies = [];
    bullets = [];
    eBullets = [];
    boss = null;

    if (actualPhase <= 2) {
      // Small birds
      const rows = 3 + flr(loop / 2);
      const cols = _max(8, FORM_COLS);
      for (let row = 0; row < min(rows, 4); row++) {
        for (let col = 0; col < cols; col++) {
          enemies.push({
            formRow: row, formCol: col,
            x: 0, y: 0,
            type: "smallbird", hp: 1, pts: 10 + loop * 5,
            state: "forming",
            enterT: -(row * cols + col) * 3,
            diveSpeed: 0, divePath: null, diveT: 0,
            shootTimer: 60 + flr(rnd(120)),
            wingTimer: 0,
          });
        }
      }
    } else if (actualPhase <= 4) {
      // Phoenix birds - take multiple hits, regenerate wings
      const rows = 2 + flr(loop / 2);
      const cols = 8;
      for (let row = 0; row < min(rows, 3); row++) {
        for (let col = 0; col < cols; col++) {
          enemies.push({
            formRow: row, formCol: col,
            x: 0, y: 0,
            type: "phoenix", hp: 3 + loop, maxHp: 3 + loop, pts: 30 + loop * 10,
            state: "forming",
            enterT: -(row * cols + col) * 4,
            diveSpeed: 0, divePath: null, diveT: 0,
            shootTimer: 40 + flr(rnd(80)),
            wingTimer: 0,
            regenTimer: 0,
            damaged: false,
          });
        }
      }
    } else {
      // Phase 5: Mothership boss
      spawnBoss();
    }
    diveTimer = 60 + flr(rnd(30));
  }

  function spawnBoss() {
    boss = {
      x: W / 2 - HALF, y: 45,
      hp: 20 + loop * 10,
      maxHp: 20 + loop * 10,
      shieldAngle: 0,
      shieldSegments: 12,
      shieldRadius: 32,
      shieldHp: [],
      state: "entering",
      enterT: 0,
      moveDir: 1,
      moveSpeed: 0.5 + loop * 0.2,
      shootTimer: 30,
      pts: 500 + loop * 200,
      phaseTimer: 0,
    };
    for (let i = 0; i < boss.shieldSegments; i++) {
      boss.shieldHp.push(3 + loop);
    }
  }

  function formationPos(row, col) {
    return {
      x: FORM_BASE_X + col * FORM_CELL_W + formationX,
      y: FORM_BASE_Y + row * FORM_CELL_H
    };
  }

  function addExplosion(x, y, big) {
    explosions.push({ x: x, y: y, timer: big ? 18 : 12 });
    const count = big ? 16 : 8;
    for (let i = 0; i < count; i++)
      particles.push({
        x: x + HALF, y: y + HALF,
        vx: rnd(big ? 6 : 4) - (big ? 3 : 2),
        vy: rnd(big ? 6 : 4) - (big ? 3 : 2),
        life: 6 + flr(rnd(big ? 16 : 10)),
        color: flr(rnd(3)) + 1
      });
  }

  // --- Sounds ---
  function shootSound() { note(0, "C6", 0.04); }
  function hitSound() { note(1, "C3", 0.06); setTimeout(() => note(1, "E3", 0.05), 40); }
  function phoenixHitSound() { note(1, "A4", 0.03); }
  function bossHitSound() { note(1, "G3", 0.04); setTimeout(() => note(1, "B3", 0.04), 30); }
  function deathSound() {
    note(0, "C3", 0.12); note(1, "G2", 0.12);
    setTimeout(() => { note(0, "A2", 0.18); note(1, "E2", 0.18); }, 120);
  }
  function shieldSound() { note(1, "E5", 0.03); }
  function phaseClearSound() {
    note(0, "C5", 0.1);
    setTimeout(() => note(0, "E5", 0.1), 100);
    setTimeout(() => note(0, "G5", 0.1), 200);
    setTimeout(() => note(0, "C6", 0.15), 300);
  }
  function bossDeathSound() {
    note(0, "C4", 0.1); note(1, "E4", 0.1);
    setTimeout(() => { note(0, "G4", 0.1); note(1, "B4", 0.1); }, 100);
    setTimeout(() => { note(0, "C5", 0.15); note(1, "E5", 0.15); }, 200);
    setTimeout(() => { note(0, "G5", 0.2); note(1, "C6", 0.2); }, 300);
  }

  function startDive(enemy) {
    enemy.state = "diving";
    enemy.diveT = 0;
    const startX = enemy.x;
    const startY = enemy.y;
    const midX = startX + (rnd(133) - 67);
    const midY = H * 0.4 + rnd(45);
    const endX = player.x + (rnd(53) - 27);
    const endY = H + 20;
    enemy.divePath = { sx: startX, sy: startY, mx: midX, my: midY, ex: endX, ey: endY };
    enemy.diveSpeed = 2 + rnd(1) + loop * 0.3;
  }

  function bezier(t, a, b, c) {
    const u = 1 - t;
    return u * u * a + 2 * u * t * b + t * t * c;
  }

  function getPhaseLabel() {
    const actualPhase = ((phase - 1) % 5) + 1;
    if (actualPhase <= 2) return "PHASE " + phase + " - SMALL BIRDS";
    if (actualPhase <= 4) return "PHASE " + phase + " - PHOENIX";
    return "PHASE " + phase + " - MOTHERSHIP";
  }

  function killPlayer() {
    if (invincibleTimer > 0) return;
    lives--;
    addExplosion(player.x, player.y, true);
    deathSound();
    player.x = W / 2 - HALF;
    invincibleTimer = 60;
    if (lives <= 0) {
      if (score > hiScore) hiScore = score;
      Mono.go(GAMEOVER); return;
    }
  }

  resetGame();

  // ============================================================
  // Update
  // ============================================================
  function updateStars() {
    for (const s of stars) { s.y += s.speed; if (s.y > H) { s.y = 0; s.x = flr(rnd(W)); } }
  }

  function updatePlayState() {
    if (waveMessage > 0) waveMessage--;
    if (invincibleTimer > 0) invincibleTimer--;

    // Player movement
    if (btn("left")) player.x -= player.speed;
    if (btn("right")) player.x += player.speed;
    player.x = _max(2, min(W - SPR - 2, player.x));

    // Player shoot
    if (shootCooldown > 0) shootCooldown--;
    if (btnp("a") && shootCooldown <= 0 && bullets.length < 3) {
      bullets.push({ x: player.x + HALF - 1, y: player.y - 6 });
      shootCooldown = 7;
      shootSound();
    }

    // Player shield
    if (shieldCooldown > 0) shieldCooldown--;
    if (btn("b") && shieldEnergy > 0 && shieldCooldown <= 0) {
      shieldActive = true;
      shieldEnergy -= 1;
      if (shieldEnergy <= 0) { shieldActive = false; shieldCooldown = 60; }
    } else {
      shieldActive = false;
      if (shieldEnergy < 90) shieldEnergy += 0.25;
    }

    // Update player bullets
    for (let i = bullets.length - 1; i >= 0; i--) {
      bullets[i].y -= 6;
      if (bullets[i].y < -SPR) bullets.splice(i, 1);
    }

    // Boss phase
    if (boss) {
      updateBoss();
      updateExplosionsParticles();
      return;
    }

    // Formation movement
    formationX += formationDir * formationSpeed;
    if (formationX > 20) formationDir = -1;
    if (formationX < -20) formationDir = 1;

    // Update enemies
    for (let i = enemies.length - 1; i >= 0; i--) {
      const e = enemies[i];
      e.wingTimer++;

      // Phoenix wing regeneration
      if (e.type === "phoenix" && e.damaged && e.regenTimer > 0) {
        e.regenTimer--;
        if (e.regenTimer <= 0) {
          e.damaged = false;
          e.hp = min(e.hp + 1, e.maxHp);
        }
      }

      if (e.state === "forming") {
        e.enterT++;
        if (e.enterT < 0) continue;
        const target = formationPos(e.formRow, e.formCol);
        const flyInDuration = 30;
        if (e.enterT <= flyInDuration) {
          const t = e.enterT / flyInDuration;
          const startX = W / 2 + sin(e.formCol * 0.8) * 67;
          e.x = startX + (target.x - startX) * t;
          e.y = -16 + (target.y + 16) * t;
        } else {
          e.state = "formation";
        }
      }

      if (e.state === "formation") {
        const target = formationPos(e.formRow, e.formCol);
        e.x = target.x;
        e.y = target.y;
      }

      if (e.state === "diving") {
        e.diveT += e.diveSpeed / 200;
        if (e.diveT >= 1) {
          e.state = "returning";
          e.x = e.divePath.ex;
          e.y = -16;
          e.diveT = 0;
        } else {
          const p = e.divePath;
          e.x = bezier(e.diveT, p.sx, p.mx, p.ex);
          e.y = bezier(e.diveT, p.sy, p.my, p.ey);
        }
        e.shootTimer--;
        if (e.shootTimer <= 0 && e.y > 0 && e.y < H - 40) {
          eBullets.push({ x: e.x + HALF - 1, y: e.y + SPR });
          e.shootTimer = _max(20, 40 - loop * 3) + flr(rnd(30));
        }
      }

      if (e.state === "returning") {
        const target = formationPos(e.formRow, e.formCol);
        e.diveT += 0.02;
        if (e.diveT >= 1) {
          e.state = "formation";
          e.x = target.x;
          e.y = target.y;
        } else {
          e.x += (target.x - e.x) * 0.05;
          e.y += (target.y - e.y) * 0.05;
        }
      }

      // Bullet-enemy collision (circle)
      const eCx = e.x + HALF, eCy = e.y + HALF;
      const eR = e.type === "phoenix" ? PHOENIX_R : SMALLBIRD_R;
      for (let j = bullets.length - 1; j >= 0; j--) {
        const b = bullets[j];
        const bCx = b.x + HALF, bCy = b.y + HALF;
        if (circCollide(bCx, bCy, BULLET_R, eCx, eCy, eR)) {
          Mono.dbgC(bCx, bCy, BULLET_R);
          Mono.dbgC(eCx, eCy, eR);
          bullets.splice(j, 1);
          e.hp--;
          if (e.type === "phoenix") {
            e.damaged = true;
            e.regenTimer = 90 - loop * 5;
          }
          if (e.hp <= 0) {
            addExplosion(e.x, e.y, e.type === "phoenix");
            score += e.pts;
            hitSound();
            enemies.splice(i, 1);
          } else {
            phoenixHitSound();
          }
          break;
        }
      }
    }

    // Trigger dives
    diveTimer--;
    if (diveTimer <= 0) {
      const formEnemies = enemies.filter(e => e.state === "formation");
      if (formEnemies.length > 0) {
        const count = min(1 + flr(loop / 2), 3);
        for (let d = 0; d < count; d++) {
          const available = enemies.filter(e => e.state === "formation");
          if (available.length > 0) {
            startDive(available[flr(rnd(available.length))]);
          }
        }
      }
      diveTimer = _max(15, 45 - loop * 5) + flr(rnd(20));
    }

    // Update enemy bullets
    for (let i = eBullets.length - 1; i >= 0; i--) {
      eBullets[i].y += 3 + loop * 0.3;
      if (eBullets[i].y > H + SPR) { eBullets.splice(i, 1); continue; }
      const b = eBullets[i];
      const bCx = b.x + HALF, bCy = b.y + HALF;
      const pCx = player.x + HALF, pCy = player.y + HALF;
      if (circCollide(bCx, bCy, EBULLET_R, pCx, pCy, PLAYER_R)) {
        Mono.dbgC(bCx, bCy, EBULLET_R);
        Mono.dbgC(pCx, pCy, PLAYER_R);
        eBullets.splice(i, 1);
        if (shieldActive) {
          shieldSound();
          shieldEnergy -= 10;
          if (shieldEnergy < 0) shieldEnergy = 0;
        } else {
          killPlayer();
        }
      }
    }

    // Enemy-player collision (circle)
    for (let i = enemies.length - 1; i >= 0; i--) {
      const e = enemies[i];
      if (e.state === "diving") {
        const eCx = e.x + HALF, eCy = e.y + HALF;
        const eR = e.type === "phoenix" ? PHOENIX_R : SMALLBIRD_R;
        const pCx = player.x + HALF, pCy = player.y + HALF;
        if (circCollide(eCx, eCy, eR, pCx, pCy, PLAYER_R)) {
          Mono.dbgC(eCx, eCy, eR);
          Mono.dbgC(pCx, pCy, PLAYER_R);
          addExplosion(e.x, e.y, false);
          enemies.splice(i, 1);
          if (shieldActive) {
            shieldSound();
            shieldEnergy -= 20;
            score += 5;
          } else {
            killPlayer();
          }
        }
      }
    }

    updateExplosionsParticles();

    // Formation enemies shoot
    for (const e of enemies) {
      if (e.state === "formation") {
        e.shootTimer--;
        if (e.shootTimer <= 0) {
          const hasBelow = enemies.some(o => o.formCol === e.formCol && o.formRow > e.formRow && o.state === "formation");
          if (!hasBelow && rnd(1) < 0.5) {
            eBullets.push({ x: e.x + HALF - 1, y: e.y + SPR });
          }
          e.shootTimer = _max(30, 100 - loop * 8) + flr(rnd(50));
        }
      }
    }

    // Phase clear check
    if (enemies.length === 0 && !boss) {
      phaseClearSound();
      waveTimer++;
      if (waveTimer > 60) {
        waveTimer = 0;
        if (phase % 5 === 0) loop++;
        spawnPhase();
      }
    }
  }

  // --- Boss Update ---
  function updateBoss() {
    const b = boss;

    if (b.state === "entering") {
      b.enterT++;
      b.y = -20 + b.enterT * 1.5;
      if (b.y >= 45) {
        b.y = 45;
        b.state = "fighting";
      }
      return;
    }

    b.phaseTimer++;
    b.shieldAngle += 0.02 + loop * 0.005;

    // Boss movement
    b.x += b.moveDir * b.moveSpeed;
    if (b.x > W - 40) b.moveDir = -1;
    if (b.x < 24) b.moveDir = 1;
    // Slight vertical bob
    b.y = 45 + sin(b.phaseTimer * 0.03) * 11;

    // Boss shoots
    b.shootTimer--;
    if (b.shootTimer <= 0) {
      const spread = 2 + flr(loop / 2);
      for (let s = 0; s < spread; s++) {
        const angle = Math.PI / 2 + (s - (spread - 1) / 2) * 0.2;
        eBullets.push({
          x: b.x + HALF - 1, y: b.y + SPR + 4,
          vx: cos(angle) * 2,
          vy: sin(angle) * 2.5,
          aimed: true,
        });
      }
      b.shootTimer = _max(15, 40 - loop * 3);
    }

    // Update aimed enemy bullets
    for (let i = eBullets.length - 1; i >= 0; i--) {
      const eb = eBullets[i];
      if (eb.aimed) {
        eb.x += eb.vx;
        eb.y += eb.vy;
      } else {
        eb.y += 3 + loop * 0.3;
      }
      if (eb.y > H + SPR || eb.x < -SPR || eb.x > W + SPR) { eBullets.splice(i, 1); continue; }
      const bCx = eb.x + HALF, bCy = eb.y + HALF;
      const pCx = player.x + HALF, pCy = player.y + HALF;
      if (circCollide(bCx, bCy, EBULLET_R, pCx, pCy, PLAYER_R)) {
        Mono.dbgC(bCx, bCy, EBULLET_R);
        Mono.dbgC(pCx, pCy, PLAYER_R);
        eBullets.splice(i, 1);
        if (shieldActive) {
          shieldSound();
          shieldEnergy -= 10;
          if (shieldEnergy < 0) shieldEnergy = 0;
        } else {
          killPlayer();
        }
      }
    }

    // Player bullets vs boss shield and body
    for (let j = bullets.length - 1; j >= 0; j--) {
      const bul = bullets[j];
      let hitShield = false;
      const bulCx = bul.x + HALF, bulCy = bul.y + HALF;

      // Check shield segments (circle collision)
      for (let s = 0; s < b.shieldSegments; s++) {
        if (b.shieldHp[s] <= 0) continue;
        const angle = b.shieldAngle + (s / b.shieldSegments) * Math.PI * 2;
        const sx = b.x + HALF + cos(angle) * b.shieldRadius;
        const sy = b.y + HALF + sin(angle) * b.shieldRadius;
        if (circCollide(bulCx, bulCy, BULLET_R, sx, sy, 5)) {
          Mono.dbgC(bulCx, bulCy, BULLET_R);
          Mono.dbgC(sx, sy, 5);
          bullets.splice(j, 1);
          b.shieldHp[s]--;
          phoenixHitSound();
          if (b.shieldHp[s] <= 0) {
            addExplosion(flr(sx) - HALF, flr(sy) - HALF, false);
            score += 20;
          }
          hitShield = true;
          break;
        }
      }

      if (!hitShield && j < bullets.length) {
        // Check boss body (circle)
        const bossCx = b.x + HALF, bossCy = b.y + HALF;
        const bossR = 7;
        if (circCollide(bulCx, bulCy, BULLET_R, bossCx, bossCy, bossR)) {
          Mono.dbgC(bulCx, bulCy, BULLET_R);
          Mono.dbgC(bossCx, bossCy, bossR);
          bullets.splice(j, 1);
          b.hp--;
          bossHitSound();
          score += 10;
          if (b.hp <= 0) {
            addExplosion(b.x - 4, b.y - 4, true);
            addExplosion(b.x + 8, b.y, true);
            addExplosion(b.x, b.y + 8, true);
            score += b.pts;
            bossDeathSound();
            boss = null;
            break;
          }
        }
      }
    }

    updateExplosionsParticles();

    // Phase clear
    if (!boss) {
      phaseClearSound();
      waveTimer++;
      if (waveTimer > 60) {
        waveTimer = 0;
        loop++;
        spawnPhase();
      }
    }
  }

  function updateExplosionsParticles() {
    for (let i = explosions.length - 1; i >= 0; i--) {
      explosions[i].timer--;
      if (explosions[i].timer <= 0) explosions.splice(i, 1);
    }
    for (let i = particles.length - 1; i >= 0; i--) {
      const p = particles[i];
      p.x += p.vx; p.y += p.vy; p.vy += 0.05; p.life--;
      if (p.life <= 0) particles.splice(i, 1);
    }
  }

  // ============================================================
  // Draw
  // ============================================================
  function drawStarsCommon() { for (const s of stars) pix(s.x, s.y, s.bright); }

  function drawTitle() {
    const ty = 45 + sin(Mono.frame * 0.05) * 5;

    // Title text
    drawText("PHOENIX", 122, flr(ty), 3);
    drawText("PHOENIX", 123, flr(ty) + 1, 1);
    rectf(100, flr(ty) + 12, 120, 1, 2);

    // Animated phoenix sprites
    const bx = W / 2 - 48;
    const wingUp = flr(Mono.frame / 10) % 2 === 0;
    spr(wingUp ? 4 : 5, bx, flr(ty) + 18 + flr(sin(Mono.frame * 0.08) * 3));
    spr(wingUp ? 2 : 3, bx + 20, flr(ty) + 20 + flr(sin(Mono.frame * 0.08 + 1) * 3));
    spr(7, bx + 40, flr(ty) + 18 + flr(sin(Mono.frame * 0.08 + 2) * 3));
    spr(wingUp ? 2 : 3, bx + 60, flr(ty) + 20 + flr(sin(Mono.frame * 0.08 + 3) * 3));
    spr(wingUp ? 4 : 5, bx + 80, flr(ty) + 18 + flr(sin(Mono.frame * 0.08 + 4) * 3));

    if (flr(Mono.frame / 20) % 2 === 0) drawText("PRESS START", 120, 142, 3);

    // Score table
    drawText("-SCORE TABLE-", 118, 161, 2);
    spr(2, 115, 172); drawText("  BIRD     10 PTS", 133, 175, 2);
    spr(4, 115, 190); drawText("  PHOENIX  30 PTS", 133, 193, 2);
    spr(7, 115, 208); drawText("  BOSS    500 PTS", 133, 211, 2);

    drawText("B = SHIELD   Z = SHOOT", 95, 226, 1);
    if (hiScore > 0) drawText("HI:" + hiScore, 140, 234, 2);
  }

  function drawGameOver() {
    for (const p of particles) pix(flr(p.x), flr(p.y), p.color);

    drawText("GAME OVER", 128, 82, 3);
    drawText("SCORE: " + score, 128, 101, 2);
    drawText("PHASE: " + phase, 128, 112, 2);
    if (score >= hiScore && score > 0) drawText("NEW HIGH SCORE!", 113, 128, 3);
    if (flr(Mono.frame / 20) % 2 === 0) drawText("PRESS START", 120, 158, 3);
  }

  function drawPlay() {
    // Enemy bullets
    for (const b of eBullets) {
      spr(10, flr(b.x), flr(b.y));
      Mono.dbgC(flr(b.x) + HALF, flr(b.y) + HALF, EBULLET_R);
    }

    // Boss
    if (boss) drawBoss();

    // Enemies
    for (const e of enemies) {
      if (e.state === "forming" && e.enterT < 0) continue;
      const ex = flr(e.x), ey = flr(e.y);

      if (e.type === "smallbird") {
        const wingUp = flr(e.wingTimer / 8) % 2 === 0;
        spr(wingUp ? 2 : 3, ex, ey);
      } else if (e.type === "phoenix") {
        if (e.damaged && e.hp <= 1) {
          if (flr(Mono.frame / 3) % 2 === 0) spr(6, ex, ey);
          else spr(6, ex, ey);
        } else {
          const wingUp = flr(e.wingTimer / 10) % 2 === 0;
          spr(wingUp ? 4 : 5, ex, ey);
        }
      }
      // Debug: enemy hitbox
      const eR = e.type === "phoenix" ? PHOENIX_R : SMALLBIRD_R;
      Mono.dbgC(ex + HALF, ey + HALF, eR);
    }

    // Player bullets
    for (const b of bullets) {
      spr(9, flr(b.x), flr(b.y));
      Mono.dbgC(flr(b.x) + HALF, flr(b.y) + HALF, BULLET_R);
    }

    // Player
    if (invincibleTimer <= 0 || flr(Mono.frame / 3) % 2 === 0) {
      spr(1, flr(player.x), flr(player.y));
      Mono.dbgC(flr(player.x) + HALF, flr(player.y) + HALF, PLAYER_R);
      // Shield visual
      if (shieldActive) {
        circ(flr(player.x) + HALF, flr(player.y) + HALF, 10, 2);
        circ(flr(player.x) + HALF, flr(player.y) + HALF, 11, 3);
      }
    }

    // Explosions
    for (const e of explosions) {
      const sprId = e.timer > 6 ? 11 : 12;
      spr(sprId, flr(e.x), flr(e.y));
    }

    // Particles
    for (const p of particles) pix(flr(p.x), flr(p.y), p.color);

    // HUD — stays within 320x240
    rectf(0, 0, W, 14, 0);
    drawText("SCORE:" + score, 4, 3, 3);

    const actualPhase = ((phase - 1) % 5) + 1;
    let phaseLabel = "PH" + phase;
    if (actualPhase <= 2) phaseLabel += " BIRDS";
    else if (actualPhase <= 4) phaseLabel += " PHNX";
    else phaseLabel += " BOSS";
    drawText(phaseLabel, W / 2 - 20, 3, 2);

    // Lives — cap icons to MAX_LIVES_DISPLAY to prevent overflow
    const livesToShow = min(lives, MAX_LIVES_DISPLAY);
    const livesStartX = W - 4 - livesToShow * 18;
    for (let i = 0; i < livesToShow; i++) spr(13, livesStartX + i * 18, 0);
    if (lives > MAX_LIVES_DISPLAY) {
      drawText("+" + (lives - MAX_LIVES_DISPLAY), W - 4 - 20, 3, 2);
    }

    // Shield bar
    const barX = W - 53;
    const barY = H - 8;
    drawText("SH", barX - 15, barY - 1, 1);
    rect(barX, barY - 2, 35, 5, 1);
    const barW = flr(shieldEnergy / 90 * 33);
    if (barW > 0) rectf(barX + 1, barY - 1, barW, 3, shieldActive ? 3 : 2);

    // Phase announcement
    if (waveMessage > 0) {
      const msgY = 105 + sin(waveMessage * 0.1) * 3;
      const pLabel = getPhaseLabel();
      const textW = pLabel.length * 5;
      drawText(pLabel, W / 2 - textW / 2, flr(msgY), 3);
      if (waveMessage > 60) drawText("GET READY!", 125, flr(msgY) + 12, 2);
    }
  }

  function drawBoss() {
    const b = boss;

    // Draw shield segments
    for (let s = 0; s < b.shieldSegments; s++) {
      if (b.shieldHp[s] <= 0) continue;
      const angle = b.shieldAngle + (s / b.shieldSegments) * Math.PI * 2;
      const sx = flr(b.x + HALF + cos(angle) * b.shieldRadius);
      const sy = flr(b.y + HALF + sin(angle) * b.shieldRadius);
      const size = min(b.shieldHp[s], 3);
      if (size >= 3) {
        rectf(sx - 4, sy - 4, 9, 9, 2);
        rect(sx - 4, sy - 4, 9, 9, 1);
      } else if (size >= 2) {
        rectf(sx - 3, sy - 3, 7, 7, 2);
      } else {
        rectf(sx - 2, sy - 2, 5, 5, 1);
      }
      Mono.dbgC(sx, sy, 5);
    }

    // Boss body
    spr(7, flr(b.x), flr(b.y));
    Mono.dbgC(flr(b.x) + HALF, flr(b.y) + HALF, 7);

    // HP bar
    const hpBarW = 50;
    const hpX = flr(b.x) + HALF - hpBarW / 2;
    const hpY = flr(b.y) - 14;
    rect(hpX, hpY, hpBarW + 2, 5, 1);
    const hpFill = flr((b.hp / b.maxHp) * hpBarW);
    if (hpFill > 0) rectf(hpX + 1, hpY + 1, hpFill, 3, b.hp < b.maxHp / 3 ? 3 : 2);
  }

  // --- Title Scene ---
  Mono.scene(TITLE, {
    init() {},
    update() {
      updateStars();
      if (btnp("start") || btnp("a")) {
        resetGame();
        note(0, "C5", 0.1); setTimeout(() => note(0, "E5", 0.1), 100); setTimeout(() => note(0, "G5", 0.15), 200);
        Mono.go(PLAY); return;
      }
    },
    draw() { cls(0); drawStarsCommon(); drawTitle(); }
  });

  // --- Play Scene ---
  Mono.scene(PLAY, {
    init() {},
    update() { updateStars(); updatePlayState(); },
    draw() { cls(0); drawStarsCommon(); drawPlay(); }
  });

  // --- Game Over Scene ---
  Mono.scene(GAMEOVER, {
    init() {},
    update() {
      updateStars();
      for (let i = particles.length - 1; i >= 0; i--) {
        const p = particles[i]; p.x += p.vx; p.y += p.vy; p.vy += 0.08; p.life--;
        if (p.life <= 0) particles.splice(i, 1);
      }
      if (btnp("start") || btnp("a")) { Mono.go(TITLE); return; }
    },
    draw() { cls(0); drawStarsCommon(); drawGameOver(); }
  });

  Mono.go(TITLE);
  Mono.boot("screen");
})();
</script>
</body>
</html>
