<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GrayBox — Demo: Pong</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #0a0a0a;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100vh;
    font-family: monospace;
    overflow: hidden;
  }
  #frame {
    background: #111;
    border: 3px solid #333;
    border-radius: 8px;
    padding: 12px;
    box-shadow: 0 0 40px rgba(0,0,0,0.8), inset 0 0 20px rgba(0,0,0,0.5);
  }
  canvas {
    display: block;
    image-rendering: pixelated;
    image-rendering: crisp-edges;
  }
  #controls {
    margin-top: 12px;
    color: #6b6b6b;
    font-size: 11px;
    text-align: center;
    letter-spacing: 1px;
  }
  #controls span { color: #b0b0b0; }
</style>
</head>
<body>
<div id="frame">
  <canvas id="screen"></canvas>
</div>
<div id="controls">
  <span>↑↓</span> MOVE &nbsp;&nbsp; <span>ENTER</span> START
</div>
<script src="../../runtime/engine.js"></script>
<script>
(() => {
  "use strict";
  const W = GrayBox.WIDTH, H = GrayBox.HEIGHT;
  const { cls, pix, line, rect, rectf, circ, circf, sprite: defSprite,
          spr, text, btn, btnp, note, stop, rnd, flr, abs: _abs,
          min, max: _max, sin, cos } = GrayBox;

  // --- Constants ---
  const PADDLE_W = 6;
  const PADDLE_H = 24;
  const BALL_SIZE = 4;
  const PADDLE_SPEED = 4;
  const BALL_INIT_SPEED = 3.5;
  const BALL_SPEED_INC = 0.15;   // speed increase per rally hit
  const BALL_MAX_SPEED = 7;
  const WIN_SCORE = 11;
  const COURT_TOP = 15;          // leave room for score
  const COURT_BOTTOM = H - 3;
  const PADDLE_MARGIN = 13;      // distance from edge to paddle
  const AI_REACTION_SPEED = 3.2;
  const AI_ERROR = 9;            // max pixels of imperfection

  // --- Game state ---
  let state = "title";
  let playerY, aiY, ballX, ballY, ballVX, ballVY;
  let playerScore, aiScore;
  let serveTimer, serveDir;
  let rally;
  let ballSpeed;
  let aiTarget;           // where the AI thinks the ball will arrive
  let aiUpdateTimer;      // frames until AI recalculates
  let titleBlink;
  let winMessage;

  function resetBall(dir) {
    ballX = W / 2 - BALL_SIZE / 2;
    ballY = H / 2 - BALL_SIZE / 2;
    const angle = (rnd(1) - 0.5) * 1.2;  // random angle +-~34 degrees
    ballSpeed = BALL_INIT_SPEED;
    ballVX = Math.cos(angle) * ballSpeed * dir;
    ballVY = Math.sin(angle) * ballSpeed;
    rally = 0;
    aiTarget = H / 2;
    aiUpdateTimer = 0;
    serveTimer = 45;  // brief pause before ball moves
  }

  function resetGame() {
    playerScore = 0;
    aiScore = 0;
    playerY = H / 2 - PADDLE_H / 2;
    aiY = H / 2 - PADDLE_H / 2;
    serveDir = 1;
    resetBall(serveDir);
    winMessage = "";
  }

  // Predict where the ball will reach a given x position (for AI)
  function predictBallY(targetX) {
    let px = ballX, py = ballY, vx = ballVX, vy = ballVY;
    // Simulate up to 300 steps
    for (let i = 0; i < 300; i++) {
      px += vx;
      py += vy;
      // Bounce off top/bottom
      if (py < COURT_TOP) { py = COURT_TOP; vy = -vy; }
      if (py + BALL_SIZE > COURT_BOTTOM) { py = COURT_BOTTOM - BALL_SIZE; vy = -vy; }
      if ((vx > 0 && px >= targetX) || (vx < 0 && px <= targetX)) {
        return py + BALL_SIZE / 2;
      }
    }
    return py + BALL_SIZE / 2;
  }

  function wallBounceSound() { note(0, "G4", 0.03); }
  function paddleBounceSound() { note(0, "C5", 0.05); }
  function scoreSound() { note(0, "C3", 0.15); note(1, "E3", 0.12); }
  function winSound() {
    note(0, "C5", 0.1);
    setTimeout(() => note(0, "E5", 0.1), 100);
    setTimeout(() => note(0, "G5", 0.1), 200);
    setTimeout(() => note(0, "C6", 0.2), 300);
  }
  function loseSound() {
    note(0, "E3", 0.15);
    setTimeout(() => note(0, "C3", 0.15), 150);
    setTimeout(() => note(0, "A2", 0.25), 300);
  }

  resetGame();

  // ============================================================
  // Update
  // ============================================================
  GrayBox._update = function() {
    titleBlink = (GrayBox.frame % 40) < 28;

    // --- Title ---
    if (state === "title") {
      if (btnp("a") || btnp("a")) {
        state = "play";
        resetGame();
        note(0, "C5", 0.08);
      }
      return;
    }

    // --- Game Over ---
    if (state === "gameover") {
      if (btnp("a") || btnp("a")) {
        state = "title";
      }
      return;
    }

    // --- Play state ---

    // Serve timer countdown
    if (serveTimer > 0) {
      serveTimer--;
      return;
    }

    // Player paddle movement
    if (btn("up")) playerY -= PADDLE_SPEED;
    if (btn("down")) playerY += PADDLE_SPEED;
    playerY = _max(COURT_TOP, min(COURT_BOTTOM - PADDLE_H, playerY));

    // AI paddle movement with imperfection
    aiUpdateTimer--;
    if (aiUpdateTimer <= 0) {
      // Recalculate AI target periodically
      if (ballVX > 0) {
        // Ball moving toward AI
        const predicted = predictBallY(W - PADDLE_MARGIN - PADDLE_W);
        aiTarget = predicted + (rnd(AI_ERROR * 2) - AI_ERROR);
      } else {
        // Ball moving away, drift toward center
        aiTarget = H / 2 + (rnd(22) - 11);
      }
      aiUpdateTimer = 8 + flr(rnd(6));  // recalculate every 8-14 frames
    }

    const aiCenter = aiY + PADDLE_H / 2;
    const aiDiff = aiTarget - aiCenter;
    if (_abs(aiDiff) > 2) {
      const move = min(_abs(aiDiff), AI_REACTION_SPEED) * (aiDiff > 0 ? 1 : -1);
      aiY += move;
    }
    aiY = _max(COURT_TOP, min(COURT_BOTTOM - PADDLE_H, aiY));

    // Ball movement
    ballX += ballVX;
    ballY += ballVY;

    // Top/bottom wall bounce
    if (ballY < COURT_TOP) {
      ballY = COURT_TOP;
      ballVY = -ballVY;
      wallBounceSound();
    }
    if (ballY + BALL_SIZE > COURT_BOTTOM) {
      ballY = COURT_BOTTOM - BALL_SIZE;
      ballVY = -ballVY;
      wallBounceSound();
    }

    // Player paddle collision (left side)
    const pPaddleX = PADDLE_MARGIN;
    if (ballVX < 0 &&
        ballX <= pPaddleX + PADDLE_W &&
        ballX + BALL_SIZE >= pPaddleX &&
        ballY + BALL_SIZE >= playerY &&
        ballY <= playerY + PADDLE_H) {
      // Bounce
      ballX = pPaddleX + PADDLE_W;
      rally++;
      ballSpeed = min(BALL_MAX_SPEED, BALL_INIT_SPEED + rally * BALL_SPEED_INC);
      // Angle based on where ball hits paddle
      const hitPos = (ballY + BALL_SIZE / 2 - playerY) / PADDLE_H;  // 0..1
      const angle = (hitPos - 0.5) * 1.4;  // max ~40 degrees
      ballVX = Math.cos(angle) * ballSpeed;
      ballVY = Math.sin(angle) * ballSpeed;
      paddleBounceSound();
    }

    // AI paddle collision (right side)
    const aiPaddleX = W - PADDLE_MARGIN - PADDLE_W;
    if (ballVX > 0 &&
        ballX + BALL_SIZE >= aiPaddleX &&
        ballX <= aiPaddleX + PADDLE_W &&
        ballY + BALL_SIZE >= aiY &&
        ballY <= aiY + PADDLE_H) {
      // Bounce
      ballX = aiPaddleX - BALL_SIZE;
      rally++;
      ballSpeed = min(BALL_MAX_SPEED, BALL_INIT_SPEED + rally * BALL_SPEED_INC);
      const hitPos = (ballY + BALL_SIZE / 2 - aiY) / PADDLE_H;
      const angle = (hitPos - 0.5) * 1.4;
      ballVX = -Math.cos(angle) * ballSpeed;
      ballVY = Math.sin(angle) * ballSpeed;
      paddleBounceSound();
    }

    // Score: ball off left edge
    if (ballX + BALL_SIZE < 0) {
      aiScore++;
      scoreSound();
      if (aiScore >= WIN_SCORE) {
        state = "gameover";
        winMessage = "CPU WINS";
        loseSound();
      } else {
        serveDir = -1;
        resetBall(serveDir);
      }
    }

    // Score: ball off right edge
    if (ballX > W) {
      playerScore++;
      scoreSound();
      if (playerScore >= WIN_SCORE) {
        state = "gameover";
        winMessage = "YOU WIN!";
        winSound();
      } else {
        serveDir = 1;
        resetBall(serveDir);
      }
    }
  };

  // ============================================================
  // Draw
  // ============================================================
  GrayBox._draw = function() {
    cls(0);

    if (state === "title") {
      // Title screen
      text("PONG", W / 2 - 10, 60, 3);

      // Draw decorative paddles and ball on title
      rectf(W / 2 - 40, 90, PADDLE_W, PADDLE_H, 2);
      rectf(W / 2 + 34, 90, PADDLE_W, PADDLE_H, 2);
      rectf(W / 2 - 2, 100, BALL_SIZE, BALL_SIZE, 3);

      // Dashed center line on title too
      for (let y = 82; y < 120; y += 8) {
        rectf(W / 2 - 1, y, 2, 4, 1);
      }

      if (titleBlink) {
        text("PRESS START", W / 2 - 27, 142, 3);
      }

      text("FIRST TO 11 WINS", W / 2 - 40, 165, 1);
      text("UP/DOWN TO MOVE", W / 2 - 37, 176, 1);
      return;
    }

    // --- Draw court ---

    // Top and bottom walls
    rectf(0, COURT_TOP - 2, W, 2, 1);
    rectf(0, COURT_BOTTOM, W, 2, 1);

    // Dashed center line
    for (let y = COURT_TOP; y < COURT_BOTTOM; y += 8) {
      rectf(W / 2 - 1, y, 2, 4, 1);
    }

    // Scores
    const pScoreStr = String(playerScore);
    const aScoreStr = String(aiScore);
    text(pScoreStr, W / 2 - 20, 5, 2);
    text(aScoreStr, W / 2 + 15, 5, 2);

    // Player label and AI label
    text("P1", W / 2 - 33, 5, 1);
    text("CPU", W / 2 + 23, 5, 1);

    // Paddles
    rectf(PADDLE_MARGIN, playerY, PADDLE_W, PADDLE_H, 3);
    rectf(W - PADDLE_MARGIN - PADDLE_W, aiY, PADDLE_W, PADDLE_H, 3);

    // Ball (only if not in serve pause, or blink it)
    if (serveTimer <= 0 || (serveTimer % 6) < 4) {
      rectf(flr(ballX), flr(ballY), BALL_SIZE, BALL_SIZE, 3);
    }

    // Game over overlay
    if (state === "gameover") {
      // Dim overlay
      rectf(W / 2 - 47, H / 2 - 22, 94, 38, 0);
      rect(W / 2 - 47, H / 2 - 22, 94, 38, 1);
      text(winMessage, W / 2 - flr(winMessage.length * 2.5), H / 2 - 11, 3);
      text(playerScore + " - " + aiScore, W / 2 - 10, H / 2 - 2, 2);
      if (titleBlink) {
        text("PRESS START", W / 2 - 27, H / 2 + 9, 3);
      }
    }
  };

  GrayBox.boot("screen");
})();
</script>
</body>
</html>
