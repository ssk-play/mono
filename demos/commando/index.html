<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GrayBox — Demo: Commando</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #0a0a0a;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100vh;
    font-family: monospace;
    overflow: hidden;
  }
  #frame {
    background: #111;
    border: 3px solid #333;
    border-radius: 8px;
    padding: 12px;
    box-shadow: 0 0 40px rgba(0,0,0,0.8), inset 0 0 20px rgba(0,0,0,0.5);
  }
  canvas {
    display: block;
    image-rendering: pixelated;
    image-rendering: crisp-edges;
  }
  #controls {
    margin-top: 12px;
    color: #6b6b6b;
    font-size: 11px;
    text-align: center;
    letter-spacing: 1px;
  }
  #controls span { color: #b0b0b0; }
</style>
</head>
<body>
<div id="frame">
  <canvas id="screen"></canvas>
</div>
<div id="controls">
  <span>ARROWS</span> MOVE &nbsp;&nbsp; <span>A</span> SHOOT &nbsp;&nbsp; <span>B</span> GRENADE
</div>
<script src="../../runtime/engine.js"></script>

  // --- Game State ---
  const { TITLE, PLAY, GAMEOVER } = GrayBox.SCENE;
  let score = 0;
  let highScore = 0;
  let lives = 3;
  let grenadeCount = 5;
  let scrollY = 0; // world scroll offset (increases as player advances)
  let scrollSpeed = 0.5;
  let levelSection = 0;

  // Player
  let px = 160, py = 195;
  let pdir = 0; // 0=up,1=right,2=down,3=left
  let pInvuln = 0;
  let pWalkFrame = 0;
  let pDead = false;
  let pDeadTimer = 0;

  // Bullets
  let bullets = []; // {x,y,dx,dy,owner:'p'|'e'}
  // Grenades
  let grenades = []; // {x,y,dx,dy,z,dz,timer}
  // Explosions
  let explosions = []; // {x,y,timer}

  // Enemies
  let enemies = []; // {x,y,type,hp,timer,dir,state,shootTimer}
  // POWs
  let pows = []; // {x,y,state:'waiting'|'freed'|'gone',timer}
  // Obstacles (world coords)
  let obstacles = []; // {x,wy,type,hp} wy = world Y
  // Boss
  let boss = null; // {x,y,hp,maxHp,timer,phase,shootTimer}
  let bossActive = false;
  let bossDefeated = false;

  // Spawning
  let spawnTimer = 0;
  let nextObstacleY = 0;
  let sectionLength = 0;
  let gameOverTimer = 0;
  let titleAnim = 0;

  // Terrain features (parallax ground detail)
  let groundDetails = []; // {x,wy,type}

  function resetGame() {
    score = 0;
    lives = 3;
    grenadeCount = 5;
    scrollY = 450;
    scrollSpeed = 0.5;
    levelSection = 0;
    px = 160; py = 195;
    pdir = 0;
    pInvuln = 0;
    pDead = false;
    pDeadTimer = 0;
    bullets = [];
    grenades = [];
    explosions = [];
    enemies = [];
    pows = [];
    obstacles = [];
    boss = null;
    bossActive = false;
    bossDefeated = false;
    spawnTimer = 0;
    nextObstacleY = 900;
    sectionLength = 0;
    gameOverTimer = 0;
    groundDetails = [];
    // Pre-populate some ground details
    for (let i = 0; i < 80; i++) {
      groundDetails.push({
        x: flr(rnd(W)),
        wy: flr(rnd(450)),
        type: flr(rnd(3))
      });
    }
  }

  function worldToScreen(wy) {
    return scrollY - wy;
  }

  function spawnEnemy(x, wy, type) {
    enemies.push({
      x: x, y: wy, type: type || 0,
      hp: type === 1 ? 2 : 1,
      timer: 0, dir: 2, // face down initially
      state: "idle",
      shootTimer: flr(rnd(60)) + 30,
      moveTimer: 0,
      vx: 0, vy: 0
    });
  }

  function spawnPOW(x, wy) {
    pows.push({ x: x, y: wy, state: "waiting", timer: 0 });
  }

  function spawnObstacle(x, wy, type) {
    obstacles.push({ x: x, wy: wy, type: type, hp: type === 1 ? 5 : (type === 2 ? 8 : 0) });
  }

  function addExplosion(x, y) {
    explosions.push({ x: x, y: y, timer: 0 });
    note(1, "C2", 0.1);
  }

  function shoot(x, y, dx, dy, owner) {
    bullets.push({ x: x, y: y, dx: dx, dy: dy, owner: owner });
  }

  function throwGrenade() {
    if (grenadeCount <= 0) return;
    grenadeCount--;
    let dx = 0, dy = -3;
    if (pdir === 1) { dx = 3; dy = -1; }
    else if (pdir === 2) { dx = 0; dy = 3; }
    else if (pdir === 3) { dx = -3; dy = -1; }
    grenades.push({ x: px + 4, y: py + 4, dx: dx, dy: dy, z: 0, dz: 4, timer: 0 });
    note(0, "G4", 0.05);
  }

  function boxCollide(ax, ay, aw, ah, bx, by, bw, bh) {
    return ax < bx + bw && ax + aw > bx && ay < by + bh && ay + ah > by;
  }

  function generateSection() {
    const baseY = scrollY + H + 38;

    // Trees and bushes
    for (let i = 0; i < 4; i++) {
      let tx = flr(rnd(W - 16));
      // Avoid center corridor sometimes
      if (rnd(1) < 0.4) tx = tx < 160 ? flr(rnd(67)) : W - 67 + flr(rnd(53));
      spawnObstacle(tx, baseY + flr(rnd(150)), 0);
    }

    // Sandbags / barricades
    if (rnd(1) < 0.5) {
      let bx = 53 + flr(rnd(200));
      for (let j = 0; j < 3; j++) {
        spawnObstacle(bx + j * 10, baseY + 60 + flr(rnd(30)), 3);
      }
    }

    // Trenches
    if (rnd(1) < 0.3) {
      let tx = 40 + flr(rnd(200));
      for (let j = 0; j < 5; j++) {
        spawnObstacle(tx + j * 9, baseY + 113, 4);
      }
    }

    // Enemies
    let numEnemies = 3 + flr(levelSection * 0.5);
    if (numEnemies > 10) numEnemies = 10;
    for (let i = 0; i < numEnemies; i++) {
      spawnEnemy(20 + flr(rnd(W - 40)), baseY + flr(rnd(188)), rnd(1) < 0.3 ? 1 : 0);
    }

    // Bunker
    if (rnd(1) < 0.35) {
      let bx = 40 + flr(rnd(W - 80));
      spawnObstacle(bx, baseY + 90, 1);
      // Guards near bunker
      spawnEnemy(bx - 20, baseY + 98, 0);
      spawnEnemy(bx + 20, baseY + 98, 0);
    }

    // Truck
    if (rnd(1) < 0.25) {
      let tx = 53 + flr(rnd(W - 107));
      spawnObstacle(tx, baseY + 45, 2);
      // Enemies around truck
      for (let i = 0; i < 3; i++) {
        spawnEnemy(tx + flr(rnd(30)) - 15, baseY + 60 + flr(rnd(15)), 0);
      }
    }

    // POW
    if (rnd(1) < 0.4) {
      spawnPOW(40 + flr(rnd(W - 80)), baseY + 75 + flr(rnd(75)));
    }

    // More ground details
    for (let i = 0; i < 10; i++) {
      groundDetails.push({
        x: flr(rnd(W)),
        wy: baseY + flr(rnd(225)),
        type: flr(rnd(3))
      });
    }

    // Grenade pickup (random ammo)
    if (rnd(1) < 0.3) {
      pows.push({ x: 33 + flr(rnd(W - 67)), y: baseY + 135, state: "ammo", timer: 0 });
    }

    sectionLength = 225;
    nextObstacleY = baseY + sectionLength;
  }

  function spawnBoss() {
    bossActive = true;
    boss = {
      x: 133, y: scrollY - 30,
      hp: 30, maxHp: 30,
      timer: 0, phase: 0,
      shootTimer: 0,
      vx: 1
    };
    scrollSpeed = 0;
  }

  // --- UPDATE ---
  function playUpdate() {
    // --- PLAY STATE ---

    // Scroll
    if (!bossActive) {
      scrollY += scrollSpeed;
    }

    // Check if it's time for a new section
    if (!bossActive && scrollY > nextObstacleY - H - 150) {
      levelSection++;
      generateSection();
      // Boss every 5 sections
      if (levelSection > 0 && levelSection % 5 === 0 && !bossActive) {
        spawnBoss();
      }
    }

    if (pDead) {
      pDeadTimer++;
      if (pDeadTimer > 60) {
        lives--;
        if (lives <= 0) {
          if (score > highScore) highScore = score;
          GrayBox.go(GAMEOVER); return;
        } else {
          pDead = false;
          pInvuln = 90;
          px = 160; py = 195;
          grenadeCount = 5;
        }
      }
      goto_after_player: ;
    }

    if (!pDead) {
      // Player movement
      let mx = 0, my = 0;
      if (btn("left")) { mx = -2; pdir = 3; }
      if (btn("right")) { mx = 2; pdir = 1; }
      if (btn("up")) { my = -2; pdir = 0; }
      if (btn("down")) { my = 2; pdir = 2; }
      // Diagonal normalize
      if (mx !== 0 && my !== 0) {
        mx = mx > 0 ? 1.4 : -1.4;
        my = my > 0 ? 1.4 : -1.4;
      }

      let npx = px + mx;
      let npy = py + my;

      // Bounds
      if (npx < 4) npx = 4;
      if (npx > W - 12) npx = W - 12;
      if (npy < 15) npy = 15;
      if (npy > H - 16) npy = H - 16;

      // Obstacle collision
      let blocked = false;
      for (const ob of obstacles) {
        const osy = worldToScreen(ob.wy);
        if (ob.type === 0 || ob.type === 1 || ob.type === 2) { // tree, bunker, truck
          if (boxCollide(npx, npy, 8, 8, ob.x, osy, 8, ob.type === 2 ? 16 : 8)) {
            blocked = true;
          }
        }
      }
      if (!blocked) {
        px = npx;
        py = npy;
      }

      if (mx !== 0 || my !== 0) pWalkFrame++;

      // Shoot
      if (btnp("a")) {
        let bdx = 0, bdy = -5;
        if (pdir === 1) { bdx = 5; bdy = 0; }
        else if (pdir === 2) { bdx = 0; bdy = 5; }
        else if (pdir === 3) { bdx = -5; bdy = 0; }
        shoot(px + 0, py + 2, bdx, bdy, "p");
        note(0, "E5", 0.05);
      }

      // Grenade
      if (btnp("b")) {
        throwGrenade();
      }

      if (pInvuln > 0) pInvuln--;
    }

    // Update bullets
    for (let i = bullets.length - 1; i >= 0; i--) {
      const b = bullets[i];
      b.x += b.dx;
      b.y += b.dy;
      // Off screen
      if (b.x < -8 || b.x > W + 8 || b.y < -8 || b.y > H + 8) {
        bullets.splice(i, 1);
        continue;
      }
      if (b.owner === "p") {
        // Hit enemies
        let hit = false;
        for (let j = enemies.length - 1; j >= 0; j--) {
          const e = enemies[j];
          const esy = worldToScreen(e.y);
          if (boxCollide(b.x, b.y, 3, 3, e.x, esy, 8, 8)) {
            e.hp--;
            if (e.hp <= 0) {
              addExplosion(e.x, esy);
              enemies.splice(j, 1);
              score += e.type === 1 ? 200 : 100;
            }
            hit = true;
            break;
          }
        }
        // Hit destructible obstacles (bunker, truck)
        if (!hit) {
          for (let j = obstacles.length - 1; j >= 0; j--) {
            const ob = obstacles[j];
            if (ob.type === 1 || ob.type === 2) {
              const osy = worldToScreen(ob.wy);
              if (boxCollide(b.x, b.y, 3, 3, ob.x, osy, 8, ob.type === 2 ? 16 : 8)) {
                ob.hp--;
                if (ob.hp <= 0) {
                  addExplosion(ob.x, osy);
                  obstacles.splice(j, 1);
                  score += ob.type === 1 ? 500 : 300;
                }
                hit = true;
                break;
              }
            }
          }
        }
        // Hit boss
        if (!hit && boss) {
          const bsy = worldToScreen(boss.y);
          if (boxCollide(b.x, b.y, 3, 3, boss.x, bsy, 16, 16)) {
            boss.hp--;
            hit = true;
            if (boss.hp <= 0) {
              addExplosion(boss.x, bsy);
              addExplosion(boss.x + 8, bsy + 4);
              addExplosion(boss.x + 4, bsy + 8);
              score += 2000;
              bossActive = false;
              bossDefeated = true;
              boss = null;
              scrollSpeed = 0.5;
            }
          }
        }
        if (hit) {
          bullets.splice(i, 1);
        }
      } else {
        // Enemy bullet hits player
        if (!pDead && pInvuln === 0 && boxCollide(b.x, b.y, 3, 3, px, py, 8, 8)) {
          addExplosion(px, py);
          pDead = true;
          pDeadTimer = 0;
          bullets.splice(i, 1);
        }
      }
    }

    // Update grenades
    for (let i = grenades.length - 1; i >= 0; i--) {
      const g = grenades[i];
      g.x += g.dx;
      g.y += g.dy;
      g.z += g.dz;
      g.dz -= 0.3;
      g.timer++;
      if (g.z <= 0 && g.timer > 5) {
        // Explode
        addExplosion(g.x - 4, g.y - 4);
        addExplosion(g.x + 4, g.y + 4);
        // Damage in radius
        for (let j = enemies.length - 1; j >= 0; j--) {
          const e = enemies[j];
          const esy = worldToScreen(e.y);
          const dist = Math.sqrt((e.x - g.x) ** 2 + (esy - g.y) ** 2);
          if (dist < 24) {
            addExplosion(e.x, esy);
            enemies.splice(j, 1);
            score += 100;
          }
        }
        // Damage obstacles
        for (let j = obstacles.length - 1; j >= 0; j--) {
          const ob = obstacles[j];
          if (ob.type === 1 || ob.type === 2) {
            const osy = worldToScreen(ob.wy);
            const dist = Math.sqrt((ob.x - g.x) ** 2 + (osy - g.y) ** 2);
            if (dist < 24) {
              ob.hp -= 3;
              if (ob.hp <= 0) {
                addExplosion(ob.x, osy);
                obstacles.splice(j, 1);
                score += ob.type === 1 ? 500 : 300;
              }
            }
          }
        }
        // Damage boss
        if (boss) {
          const bsy = worldToScreen(boss.y);
          const dist = Math.sqrt((boss.x + 8 - g.x) ** 2 + (bsy + 8 - g.y) ** 2);
          if (dist < 24) {
            boss.hp -= 5;
            if (boss.hp <= 0) {
              addExplosion(boss.x, bsy);
              addExplosion(boss.x + 8, bsy + 4);
              score += 2000;
              bossActive = false;
              bossDefeated = true;
              boss = null;
              scrollSpeed = 0.5;
            }
          }
        }
        grenades.splice(i, 1);
        note(1, "C2", 0.15);
      }
    }

    // Update explosions
    for (let i = explosions.length - 1; i >= 0; i--) {
      explosions[i].timer++;
      if (explosions[i].timer > 16) explosions.splice(i, 1);
    }

    // Update enemies
    for (let i = enemies.length - 1; i >= 0; i--) {
      const e = enemies[i];
      const esy = worldToScreen(e.y);

      // Remove if off screen far
      if (esy > H + 60) {
        enemies.splice(i, 1);
        continue;
      }

      e.timer++;

      // Only active when on screen
      if (esy < -20 || esy > H + 20) continue;

      // AI: move toward player sometimes
      e.moveTimer++;
      if (e.moveTimer > 30) {
        e.moveTimer = 0;
        const dx = px - e.x;
        const dsy = py - esy;
        const dist = Math.sqrt(dx * dx + dsy * dsy);
        if (dist > 40) {
          e.vx = (dx / dist) * 0.8;
          e.vy = (dsy / dist) * 0.8;
        } else {
          // Strafe
          e.vx = rnd(2) - 1;
          e.vy = rnd(1) - 0.5;
        }
      }
      e.x += e.vx;
      e.y -= e.vy; // world Y movement (negated: screen up = world forward)

      // Clamp to screen
      if (e.x < 4) e.x = 4;
      if (e.x > W - 12) e.x = W - 12;

      // Shoot at player
      e.shootTimer--;
      if (e.shootTimer <= 0 && !pDead) {
        e.shootTimer = 40 + flr(rnd(40));
        const dx = px - e.x;
        const dy = py - esy;
        const dist = Math.sqrt(dx * dx + dy * dy);
        if (dist > 0 && dist < 150) {
          shoot(e.x + 0, esy + 0, (dx / dist) * 3, (dy / dist) * 3, "e");
        }
      }

      // Collide with player
      if (!pDead && pInvuln === 0 && boxCollide(px, py, 7, 7, e.x, esy, 7, 7)) {
        addExplosion(px, py);
        addExplosion(e.x, esy);
        pDead = true;
        pDeadTimer = 0;
        enemies.splice(i, 1);
        score += 100;
      }
    }

    // Update POWs
    for (let i = pows.length - 1; i >= 0; i--) {
      const p = pows[i];
      const psy = worldToScreen(p.y);

      if (psy > H + 40) {
        pows.splice(i, 1);
        continue;
      }

      if (p.state === "waiting" || p.state === "ammo") {
        // Player touches POW
        if (!pDead && boxCollide(px, py, 8, 8, p.x, psy, 8, 8)) {
          if (p.state === "ammo") {
            grenadeCount = min(grenadeCount + 3, 9);
            note(0, "A5", 0.1);
            pows.splice(i, 1);
          } else {
            p.state = "freed";
            p.timer = 0;
            score += 1000;
            note(0, "G5", 0.1);
            setTimeout(() => note(0, "A5", 0.1), 80);
          }
        }
      } else if (p.state === "freed") {
        p.timer++;
        p.y -= 1.5; // run down/away (world Y decreases = screen Y increases)
        if (p.timer > 60) pows.splice(i, 1);
      }
    }

    // Update boss
    if (boss) {
      boss.timer++;
      const bsy = worldToScreen(boss.y);

      // Move boss into view
      if (bsy < 23) {
        boss.y -= 0.5;
      } else {
        // Strafe
        boss.x += boss.vx;
        if (boss.x < 27 || boss.x > W - 40) boss.vx = -boss.vx;

        // Shoot
        boss.shootTimer++;
        if (boss.shootTimer > 15) {
          boss.shootTimer = 0;
          const sby = worldToScreen(boss.y);
          shoot(boss.x + 6, sby + 16, 0, 3, "e");
          if (boss.timer % 60 < 30) {
            shoot(boss.x + 6, sby + 16, -1.5, 2.5, "e");
            shoot(boss.x + 6, sby + 16, 1.5, 2.5, "e");
          }
          note(1, "D3", 0.04);
        }
      }
    }

    // Gradually speed up
    if (!bossActive && scrollSpeed < 1.0) {
      scrollSpeed += 0.0001;
    }
  }

  // --- Title draw ---
  function drawTitle() {
    cls(0);

    // Animated background
    for (let i = 0; i < 30; i++) {
      const yy = (titleAnim * 0.5 + i * 23) % H;
      const xx = (i * 37 + flr(sin(titleAnim * 0.02 + i) * 10)) % W;
      pix(xx, yy, 1);
    }

    // Title
    const tx = 140;
    rectf(tx - 10, 53, 107, 30, 0);
    rect(tx - 10, 53, 107, 30, 2);
    text("COMMANDO", tx, 60, 3);
    text("GRAYBOX EDITION", 123, 71, 1);

    // Soldier graphic
    sprT(1, 156, 98);
    sprT(10, 156, 89);

    text("PRESS A TO START", 110, 128, 2);

    text("ARROWS - MOVE", 128, 158, 1);
    text("Z - SHOOT", 138, 167, 1);
    text("B - GRENADE", 133, 176, 1);

    if (highScore > 0) {
      text("HIGH SCORE " + highScore, 120, 203, 2);
    }

    text("2026 GRAYBOX", 130, 225, 1);
  }

  // --- Game Over draw ---
  function drawGameOver() {
    cls(0);
    text("GAME OVER", 138, 98, 3);
    text("SCORE " + score, 130, 116, 2);
    if (score >= highScore && score > 0) {
      text("NEW HIGH SCORE!", 123, 131, 3);
    }
    if (gameOverTimer > 90) {
      text("PRESS A", 133, 158, (flr(gameOverTimer / 15) % 2 === 0) ? 2 : 0);
    }
  }

  // --- PLAY DRAW ---
  function playDraw() {
    // --- PLAY DRAW ---
    // Background: dark ground
    cls(0);

    // Draw ground details (dirt patches, grass tufts)
    for (const gd of groundDetails) {
      const sy = worldToScreen(gd.wy);
      if (sy < -4 || sy > H + 4) continue;
      if (gd.type === 0) {
        pix(gd.x, sy, 1); // dots
        pix(gd.x + 1, sy, 1);
      } else if (gd.type === 1) {
        pix(gd.x, sy, 1);
        pix(gd.x, sy - 1, 1);
        pix(gd.x + 1, sy, 1);
      } else {
        // Tiny cross
        pix(gd.x, sy, 1);
        pix(gd.x - 1, sy, 1);
        pix(gd.x + 1, sy, 1);
        pix(gd.x, sy - 1, 1);
      }
    }

    // Draw obstacles
    for (const ob of obstacles) {
      const osy = worldToScreen(ob.wy);
      if (osy < -16 || osy > H + 16) continue;
      if (ob.type === 0) {
        sprT(60, ob.x, osy); // tree
      } else if (ob.type === 1) {
        sprT(30, ob.x, osy); // bunker
      } else if (ob.type === 2) {
        sprT(31, ob.x, osy); // truck top
        sprT(32, ob.x, osy + 8); // truck bottom
      } else if (ob.type === 3) {
        sprT(61, ob.x, osy); // sandbag
      } else if (ob.type === 4) {
        sprT(62, ob.x, osy); // trench
      }
    }

    // Draw POWs
    for (const p of pows) {
      const psy = worldToScreen(p.y);
      if (psy < -8 || psy > H + 8) continue;
      if (p.state === "ammo") {
        // Grenade ammo pickup - blink
        if (flr(GrayBox.frame / 8) % 2 === 0) {
          sprT(81, p.x, psy);
        }
      } else if (p.state === "waiting") {
        sprT(40, p.x, psy);
        // Blink "HELP" indicator
        if (flr(GrayBox.frame / 15) % 2 === 0) {
          text("!", p.x + 2, psy - 8, 3);
        }
      } else if (p.state === "freed") {
        sprT(41, p.x, psy);
        text("+1000", p.x - 4, psy - 10, 3);
      }
    }

    // Draw enemies
    for (const e of enemies) {
      const esy = worldToScreen(e.y);
      if (esy < -8 || esy > H + 8) continue;
      const sid = (flr(e.timer / 8) % 2 === 0) ? 20 : 21;
      sprT(sid, e.x, esy);
      if (e.type === 1) {
        // Tougher enemy - mark with highlight
        pix(e.x + 3, esy, 3);
        pix(e.x + 4, esy, 3);
      }
    }

    // Draw boss
    if (boss) {
      const bsy = worldToScreen(boss.y);
      sprT(70, boss.x, bsy);
      sprT(71, boss.x + 8, bsy);
      sprT(72, boss.x, bsy + 8);
      sprT(73, boss.x + 8, bsy + 8);
      // HP bar
      const barW = 32;
      const hpRatio = boss.hp / boss.maxHp;
      rectf(boss.x, bsy - 6, barW, 3, 1);
      rectf(boss.x, bsy - 6, flr(barW * hpRatio), 3, 3);
    }

    // Draw player
    if (!pDead) {
      if (pInvuln > 0 && flr(pInvuln / 3) % 2 === 0) {
        // flicker
      } else {
        let psid = 1;
        if (pdir === 1) psid = 3;
        else if (pdir === 2) psid = 2;
        else if (pdir === 3) psid = 4;
        sprT(psid, px, py);
      }
    }

    // Draw bullets
    for (const b of bullets) {
      if (b.owner === "p") {
        // Determine bullet sprite from direction
        if (_abs(b.dy) > _abs(b.dx)) {
          sprT(b.dy < 0 ? 10 : 11, b.x - 2, b.y - 2);
        } else {
          sprT(b.dx > 0 ? 12 : 13, b.x - 2, b.y - 2);
        }
      } else {
        // Enemy bullet: small dot
        rectf(flr(b.x), flr(b.y), 2, 2, 3);
      }
    }

    // Draw grenades
    for (const g of grenades) {
      const gz = g.z > 0 ? g.z : 0;
      sprT(50, g.x - 3, g.y - 3 - gz);
      // Shadow
      pix(flr(g.x), flr(g.y + 2), 1);
    }

    // Draw explosions
    for (const ex of explosions) {
      const t = ex.timer;
      let sid;
      if (t < 4) sid = 51;
      else if (t < 8) sid = 52;
      else if (t < 12) sid = 53;
      else sid = 54;
      sprT(sid, ex.x, ex.y);
    }

    // --- HUD ---
    rectf(0, 0, W, 12, 0);
    line(0, 12, W, 12, 1);

    // Score
    text("SCORE " + score, 3, 3, 3);

    // Lives
    for (let i = 0; i < lives; i++) {
      sprT(80, 120 + i * 10, 2);
    }

    // Grenades
    text("G", 173, 3, 2);
    text("" + grenadeCount, 183, 3, 3);

    // Section
    text("AREA " + (levelSection + 1), 213, 3, 1);

    // High score
    text("HI " + highScore, 273, 3, 1);

    // Boss warning
    if (bossActive && boss && flr(GrayBox.frame / 10) % 2 === 0) {
      text("WARNING - BOSS!", 123, 20, 3);
    }
  }

  // --- Scenes ---
  GrayBox.scene(TITLE, {
    init() { titleAnim = 0; },
    update() {
      titleAnim++;
      if (btnp("a")) {
        note(0, "C5", 0.1);
        GrayBox.go(PLAY); return;
      }
    },
    draw() { drawTitle(); }
  });

  GrayBox.scene(GAMEOVER, {
    init() { gameOverTimer = 0; },
    update() {
      gameOverTimer++;
      if (gameOverTimer > 90 && btnp("a")) { GrayBox.go(TITLE); return; }
    },
    draw() { drawGameOver(); }
  });

  GrayBox.scene(PLAY, {
    init() { resetGame(); },
    update() { playUpdate(); },
    draw() { playDraw(); }
  });

  GrayBox.go(TITLE);
  GrayBox.boot("screen");
})();
</script>
