<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GrayBox — Demo: Pong</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #0a0a0a;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100vh;
    font-family: monospace;
    overflow: hidden;
  }
  #frame {
    background: #111;
    border: 3px solid #333;
    border-radius: 8px;
    padding: 12px;
    box-shadow: 0 0 40px rgba(0,0,0,0.8), inset 0 0 20px rgba(0,0,0,0.5);
  }
  canvas {
    display: block;
    image-rendering: pixelated;
    image-rendering: crisp-edges;
  }
  #controls {
    margin-top: 12px;
    color: #6b6b6b;
    font-size: 11px;
    text-align: center;
    letter-spacing: 1px;
  }
  #controls span { color: #b0b0b0; }
</style>
</head>
<body>
<div id="frame">
  <canvas id="screen"></canvas>
</div>
<div id="controls">
  <span>↑↓</span> MOVE &nbsp;&nbsp; <span>ENTER</span> START
</div>
<script>
(() => {
  "use strict";

  // ============================================================
  // GrayBox Runtime (inline)
  // ============================================================
  const W = 320;
  const H = 240;
  const FPS = 30;
  const COLORS = ["#1a1a1a", "#6b6b6b", "#b0b0b0", "#e8e8e8"];
  const canvas = document.getElementById("screen");
  canvas.width = W;
  canvas.height = H;
  function fitCanvas() {
    var maxW = window.innerWidth - 40;
    var maxH = window.innerHeight - 60;
    var s = Math.min(maxW / W, maxH / H);
    canvas.style.width = (W * s) + "px";
    canvas.style.height = (H * s) + "px";
  }
  fitCanvas();
  window.addEventListener("resize", fitCanvas);
  const ctx = canvas.getContext("2d");
  ctx.imageSmoothingEnabled = false;
  const buf = ctx.createImageData(W, H);
  const buf32 = new Uint32Array(buf.data.buffer);

  function hexToABGR(hex) {
    const r = parseInt(hex.slice(1, 3), 16);
    const g = parseInt(hex.slice(3, 5), 16);
    const b = parseInt(hex.slice(5, 7), 16);
    return (255 << 24) | (b << 16) | (g << 8) | r;
  }
  const COLOR_U32 = COLORS.map(hexToABGR);

  const sprites = {};
  const tilemap = {};

  const keyMap = {
    "ArrowUp": "up", "ArrowDown": "down", "ArrowLeft": "left", "ArrowRight": "right",
    "w": "up", "s": "down", "a": "left", "d": "right", "ㅈ": "up", "ㄴ": "down", "ㅁ": "left", "ㅇ": "right",
    "z": "a", "Z": "a", "x": "b", "X": "b", "ㅋ": "a", "ㅌ": "b",
    "Enter": "start", " ": "a"
  };
  const keys = {};
  const keysPrev = {};

  document.addEventListener("keydown", e => {
    const k = keyMap[e.key];
    if (k) { keys[k] = true; e.preventDefault(); }
  });
  document.addEventListener("keyup", e => {
    const k = keyMap[e.key];
    if (k) { keys[k] = false; e.preventDefault(); }
  });

  let audioCtx = null;
  const channels = [null, null];
  const channelGains = [null, null];
  function ensureAudio() {
    if (!audioCtx) {
      audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      for (let i = 0; i < 2; i++) {
        channelGains[i] = audioCtx.createGain();
        channelGains[i].gain.value = 0.15;
        channelGains[i].connect(audioCtx.destination);
      }
    }
  }

  const NOTE_NAMES = ["C","C#","D","D#","E","F","F#","G","G#","A","A#","B"];
  function noteToFreq(noteStr) {
    const match = noteStr.match(/^([A-G]#?)(\d)$/);
    if (!match) return 440;
    const name = match[1];
    const octave = parseInt(match[2]);
    const semitone = NOTE_NAMES.indexOf(name);
    if (semitone === -1) return 440;
    const midi = (octave + 1) * 12 + semitone;
    return 440 * Math.pow(2, (midi - 69) / 12);
  }

  const FONT_W = 4;
  const FONT_H = 7;
  const FONT = {};
  const fontData = {
    "A":"0110100110011111100110011001","B":"1110100110101110100110011110",
    "C":"0110100110001000100001100110","D":"1100101010011001100110101100",
    "E":"1111100010001110100010001111","F":"1111100010001110100010001000",
    "G":"0111100010001011100101100111","H":"1001100110011111100110011001",
    "I":"1110010001000100010001001110","J":"0111001000100010001010100100",
    "K":"1001101011001100101010011001","L":"1000100010001000100010001111",
    "M":"1001111111011001100110011001","N":"1001110111011001100110011001",
    "O":"0110100110011001100110010110","P":"1110100110011110100010001000",
    "Q":"0110100110011001101101100001","R":"1110100110011110101010011001",
    "S":"0111100010000110000110001110","T":"1111001000100010001000100010",
    "U":"1001100110011001100110010110","V":"1001100110011001100101100110",
    "W":"1001100110011001101111011001","X":"1001100101100110011010011001",
    "Y":"1001100101100010001000100010","Z":"1111000100100100100010001111",
    "0":"0110100111011011101110010110","1":"0100110001000100010001001110",
    "2":"0110100100010010010010001111","3":"1110000100010110000110011110",
    "4":"1001100110011111000100010001","5":"1111100010001110000100011110",
    "6":"0110100010001110100110010110","7":"1111000100010010010001001000",
    "8":"0110100110010110100110010110","9":"0110100110010111000100010110",
    " ":"0000000000000000000000000000",
    ".":"0000000000000000000001000100",
    ",":"0000000000000000001000101000",
    "!":"0100010001000100000000000100",
    "?":"0110100100010010000000000010",
    "-":"0000000000001110000000000000",
    "+":"0000001001001110010000100000",
    ":":"0000010001000000010001000000",
    "/":"0001000100100010010010001000",
    "*":"0000101001001110010010100000",
    "#":"0101111101011111010100000000",
    "(":"0010010010001000010001000010",
    ")":"0100001000010001000100100100",
    "=":"0000000011110000111100000000",
    "'":"0100010010000000000000000000",
    "\"":"1010101000000000000000000000",
    "<":"0010010010001000010000100010",
    ">":"1000010000100001001001001000",
    "_":"0000000000000000000000001111",
  };
  for (const [ch, bits] of Object.entries(fontData)) {
    FONT[ch] = [];
    for (let i = 0; i < bits.length; i++) FONT[ch].push(parseInt(bits[i]));
  }

  const API = {};
  API._init = null;
  API._update = null;
  API._draw = null;
  API.frame = 0;

  API.cls = function(c = 0) { buf32.fill(COLOR_U32[c] || COLOR_U32[0]); };
  API.pix = function(x, y, c) {
    x = Math.floor(x); y = Math.floor(y);
    if (x < 0 || x >= W || y < 0 || y >= H) return;
    buf32[y * W + x] = COLOR_U32[c] || COLOR_U32[0];
  };
  API.line = function(x0, y0, x1, y1, c) {
    x0=Math.floor(x0); y0=Math.floor(y0); x1=Math.floor(x1); y1=Math.floor(y1);
    const dx=Math.abs(x1-x0), dy=Math.abs(y1-y0);
    const sx=x0<x1?1:-1, sy=y0<y1?1:-1;
    let err=dx-dy;
    while(true) {
      API.pix(x0,y0,c);
      if(x0===x1&&y0===y1) break;
      const e2=2*err;
      if(e2>-dy){err-=dy;x0+=sx;}
      if(e2<dx){err+=dx;y0+=sy;}
    }
  };
  API.rect = function(x,y,w,h,c) {
    API.line(x,y,x+w-1,y,c); API.line(x+w-1,y,x+w-1,y+h-1,c);
    API.line(x+w-1,y+h-1,x,y+h-1,c); API.line(x,y+h-1,x,y,c);
  };
  API.rectf = function(x,y,w,h,c) {
    x=Math.floor(x); y=Math.floor(y);
    const col=COLOR_U32[c]||COLOR_U32[0];
    for(let py=Math.max(0,y);py<Math.min(H,y+h);py++)
      for(let px=Math.max(0,x);px<Math.min(W,x+w);px++)
        buf32[py*W+px]=col;
  };
  API.circ = function(cx,cy,r,c) {
    let x=r,y=0,d=1-r; cx=Math.floor(cx); cy=Math.floor(cy);
    while(x>=y){
      API.pix(cx+x,cy+y,c);API.pix(cx-x,cy+y,c);
      API.pix(cx+x,cy-y,c);API.pix(cx-x,cy-y,c);
      API.pix(cx+y,cy+x,c);API.pix(cx-y,cy+x,c);
      API.pix(cx+y,cy-x,c);API.pix(cx-y,cy-x,c);
      y++; if(d<0){d+=2*y+1;}else{x--;d+=2*(y-x)+1;}
    }
  };
  API.circf = function(cx,cy,r,c) {
    cx=Math.floor(cx); cy=Math.floor(cy);
    const col=COLOR_U32[c]||COLOR_U32[0]; const r2=r*r;
    for(let py=-r;py<=r;py++) for(let px=-r;px<=r;px++)
      if(px*px+py*py<=r2){ const sx=cx+px,sy=cy+py;
        if(sx>=0&&sx<W&&sy>=0&&sy<H) buf32[sy*W+sx]=col; }
  };
  API.sprite = function(id, data) {
    const arr = new Uint8Array(64); let i = 0;
    for (const ch of data) { if (ch>='0'&&ch<='3') { arr[i++]=parseInt(ch); if(i>=64) break; } }
    sprites[id] = arr;
  };
  API.spr = function(id, x, y, flipX, flipY) {
    const s=sprites[id]; if(!s) return;
    x=Math.floor(x); y=Math.floor(y);
    for(let py=0;py<8;py++) for(let px=0;px<8;px++){
      const sx=flipX?7-px:px, sy=flipY?7-py:py;
      const c=s[sy*8+sx], dx=x+px, dy=y+py;
      if(dx>=0&&dx<W&&dy>=0&&dy<H) buf32[dy*W+dx]=COLOR_U32[c];
    }
  };
  API.text = function(str, x, y, c) {
    str=String(str).toUpperCase(); let cx=Math.floor(x); const cy=Math.floor(y);
    const col=COLOR_U32[c]||COLOR_U32[3];
    for(const ch of str){
      const glyph=FONT[ch];
      if(glyph) for(let py=0;py<FONT_H;py++) for(let px=0;px<FONT_W;px++)
        if(glyph[py*FONT_W+px]){ const dx=cx+px,dy=cy+py;
          if(dx>=0&&dx<W&&dy>=0&&dy<H) buf32[dy*W+dx]=col; }
      cx+=FONT_W+1;
    }
  };
  API.mget = function(cx,cy) { return tilemap[cx+","+cy]||0; };
  API.mset = function(cx,cy,id) { tilemap[cx+","+cy]=id; };
  API.map = function(mx,my,mw,mh,sx,sy) {
    for(let ty=0;ty<mh;ty++) for(let tx=0;tx<mw;tx++){
      const id=API.mget(mx+tx,my+ty); if(id>0) API.spr(id,sx+tx*8,sy+ty*8); }
  };
  API.btn = function(k) { return !!keys[k]; };
  API.btnp = function(k) { return !!keys[k] && !keysPrev[k]; };
  API.note = function(ch, noteStr, dur) {
    ensureAudio(); if(ch<0||ch>1) return; API.stop(ch);
    const osc=audioCtx.createOscillator(); osc.type="square";
    osc.frequency.value=noteToFreq(noteStr);
    osc.connect(channelGains[ch]); osc.start();
    osc.stop(audioCtx.currentTime+dur); channels[ch]=osc;
  };
  API.stop = function(ch) {
    if(ch===undefined){API.stop(0);API.stop(1);return;}
    if(channels[ch]){try{channels[ch].stop();}catch(e){} channels[ch]=null;}
  };
  API.rnd = function(max) { return Math.random()*max; };
  API.flr = Math.floor;
  API.abs = Math.abs;
  API.min = Math.min;
  API.max = Math.max;
  API.sin = Math.sin;
  API.cos = Math.cos;

  function tick() {
    if (API._update) API._update();
    if (API._draw) API._draw();
    ctx.putImageData(buf, 0, 0);
    for (const k in keys) keysPrev[k] = keys[k];
    API.frame++;
  }

  // ============================================================
  // Pong Game
  // ============================================================
  const { cls, pix, line, rect, rectf, circ, circf, sprite: defSprite,
          spr, text, btn, btnp, note, stop, rnd, flr, abs: _abs,
          min, max: _max, sin, cos } = API;

  // --- Constants ---
  const PADDLE_W = 6;
  const PADDLE_H = 24;
  const BALL_SIZE = 4;
  const PADDLE_SPEED = 4;
  const BALL_INIT_SPEED = 3.5;
  const BALL_SPEED_INC = 0.15;   // speed increase per rally hit
  const BALL_MAX_SPEED = 7;
  const WIN_SCORE = 11;
  const COURT_TOP = 15;          // leave room for score
  const COURT_BOTTOM = H - 3;
  const PADDLE_MARGIN = 13;      // distance from edge to paddle
  const AI_REACTION_SPEED = 3.2;
  const AI_ERROR = 9;            // max pixels of imperfection

  // --- Game state ---
  let state = "title";
  let playerY, aiY, ballX, ballY, ballVX, ballVY;
  let playerScore, aiScore;
  let serveTimer, serveDir;
  let rally;
  let ballSpeed;
  let aiTarget;           // where the AI thinks the ball will arrive
  let aiUpdateTimer;      // frames until AI recalculates
  let titleBlink;
  let winMessage;

  function resetBall(dir) {
    ballX = W / 2 - BALL_SIZE / 2;
    ballY = H / 2 - BALL_SIZE / 2;
    const angle = (rnd(1) - 0.5) * 1.2;  // random angle +-~34 degrees
    ballSpeed = BALL_INIT_SPEED;
    ballVX = Math.cos(angle) * ballSpeed * dir;
    ballVY = Math.sin(angle) * ballSpeed;
    rally = 0;
    aiTarget = H / 2;
    aiUpdateTimer = 0;
    serveTimer = 45;  // brief pause before ball moves
  }

  function resetGame() {
    playerScore = 0;
    aiScore = 0;
    playerY = H / 2 - PADDLE_H / 2;
    aiY = H / 2 - PADDLE_H / 2;
    serveDir = 1;
    resetBall(serveDir);
    winMessage = "";
  }

  // Predict where the ball will reach a given x position (for AI)
  function predictBallY(targetX) {
    let px = ballX, py = ballY, vx = ballVX, vy = ballVY;
    // Simulate up to 300 steps
    for (let i = 0; i < 300; i++) {
      px += vx;
      py += vy;
      // Bounce off top/bottom
      if (py < COURT_TOP) { py = COURT_TOP; vy = -vy; }
      if (py + BALL_SIZE > COURT_BOTTOM) { py = COURT_BOTTOM - BALL_SIZE; vy = -vy; }
      if ((vx > 0 && px >= targetX) || (vx < 0 && px <= targetX)) {
        return py + BALL_SIZE / 2;
      }
    }
    return py + BALL_SIZE / 2;
  }

  function wallBounceSound() { note(0, "G4", 0.03); }
  function paddleBounceSound() { note(0, "C5", 0.05); }
  function scoreSound() { note(0, "C3", 0.15); note(1, "E3", 0.12); }
  function winSound() {
    note(0, "C5", 0.1);
    setTimeout(() => note(0, "E5", 0.1), 100);
    setTimeout(() => note(0, "G5", 0.1), 200);
    setTimeout(() => note(0, "C6", 0.2), 300);
  }
  function loseSound() {
    note(0, "E3", 0.15);
    setTimeout(() => note(0, "C3", 0.15), 150);
    setTimeout(() => note(0, "A2", 0.25), 300);
  }

  resetGame();

  // ============================================================
  // Update
  // ============================================================
  API._update = function() {
    titleBlink = (API.frame % 40) < 28;

    // --- Title ---
    if (state === "title") {
      if (btnp("start") || btnp("a")) {
        state = "play";
        resetGame();
        note(0, "C5", 0.08);
      }
      return;
    }

    // --- Game Over ---
    if (state === "gameover") {
      if (btnp("start") || btnp("a")) {
        state = "title";
      }
      return;
    }

    // --- Play state ---

    // Serve timer countdown
    if (serveTimer > 0) {
      serveTimer--;
      return;
    }

    // Player paddle movement
    if (btn("up")) playerY -= PADDLE_SPEED;
    if (btn("down")) playerY += PADDLE_SPEED;
    playerY = _max(COURT_TOP, min(COURT_BOTTOM - PADDLE_H, playerY));

    // AI paddle movement with imperfection
    aiUpdateTimer--;
    if (aiUpdateTimer <= 0) {
      // Recalculate AI target periodically
      if (ballVX > 0) {
        // Ball moving toward AI
        const predicted = predictBallY(W - PADDLE_MARGIN - PADDLE_W);
        aiTarget = predicted + (rnd(AI_ERROR * 2) - AI_ERROR);
      } else {
        // Ball moving away, drift toward center
        aiTarget = H / 2 + (rnd(22) - 11);
      }
      aiUpdateTimer = 8 + flr(rnd(6));  // recalculate every 8-14 frames
    }

    const aiCenter = aiY + PADDLE_H / 2;
    const aiDiff = aiTarget - aiCenter;
    if (_abs(aiDiff) > 2) {
      const move = min(_abs(aiDiff), AI_REACTION_SPEED) * (aiDiff > 0 ? 1 : -1);
      aiY += move;
    }
    aiY = _max(COURT_TOP, min(COURT_BOTTOM - PADDLE_H, aiY));

    // Ball movement
    ballX += ballVX;
    ballY += ballVY;

    // Top/bottom wall bounce
    if (ballY < COURT_TOP) {
      ballY = COURT_TOP;
      ballVY = -ballVY;
      wallBounceSound();
    }
    if (ballY + BALL_SIZE > COURT_BOTTOM) {
      ballY = COURT_BOTTOM - BALL_SIZE;
      ballVY = -ballVY;
      wallBounceSound();
    }

    // Player paddle collision (left side)
    const pPaddleX = PADDLE_MARGIN;
    if (ballVX < 0 &&
        ballX <= pPaddleX + PADDLE_W &&
        ballX + BALL_SIZE >= pPaddleX &&
        ballY + BALL_SIZE >= playerY &&
        ballY <= playerY + PADDLE_H) {
      // Bounce
      ballX = pPaddleX + PADDLE_W;
      rally++;
      ballSpeed = min(BALL_MAX_SPEED, BALL_INIT_SPEED + rally * BALL_SPEED_INC);
      // Angle based on where ball hits paddle
      const hitPos = (ballY + BALL_SIZE / 2 - playerY) / PADDLE_H;  // 0..1
      const angle = (hitPos - 0.5) * 1.4;  // max ~40 degrees
      ballVX = Math.cos(angle) * ballSpeed;
      ballVY = Math.sin(angle) * ballSpeed;
      paddleBounceSound();
    }

    // AI paddle collision (right side)
    const aiPaddleX = W - PADDLE_MARGIN - PADDLE_W;
    if (ballVX > 0 &&
        ballX + BALL_SIZE >= aiPaddleX &&
        ballX <= aiPaddleX + PADDLE_W &&
        ballY + BALL_SIZE >= aiY &&
        ballY <= aiY + PADDLE_H) {
      // Bounce
      ballX = aiPaddleX - BALL_SIZE;
      rally++;
      ballSpeed = min(BALL_MAX_SPEED, BALL_INIT_SPEED + rally * BALL_SPEED_INC);
      const hitPos = (ballY + BALL_SIZE / 2 - aiY) / PADDLE_H;
      const angle = (hitPos - 0.5) * 1.4;
      ballVX = -Math.cos(angle) * ballSpeed;
      ballVY = Math.sin(angle) * ballSpeed;
      paddleBounceSound();
    }

    // Score: ball off left edge
    if (ballX + BALL_SIZE < 0) {
      aiScore++;
      scoreSound();
      if (aiScore >= WIN_SCORE) {
        state = "gameover";
        winMessage = "CPU WINS";
        loseSound();
      } else {
        serveDir = -1;
        resetBall(serveDir);
      }
    }

    // Score: ball off right edge
    if (ballX > W) {
      playerScore++;
      scoreSound();
      if (playerScore >= WIN_SCORE) {
        state = "gameover";
        winMessage = "YOU WIN!";
        winSound();
      } else {
        serveDir = 1;
        resetBall(serveDir);
      }
    }
  };

  // ============================================================
  // Draw
  // ============================================================
  API._draw = function() {
    cls(0);

    if (state === "title") {
      // Title screen
      text("PONG", W / 2 - 10, 60, 3);

      // Draw decorative paddles and ball on title
      rectf(W / 2 - 40, 90, PADDLE_W, PADDLE_H, 2);
      rectf(W / 2 + 34, 90, PADDLE_W, PADDLE_H, 2);
      rectf(W / 2 - 2, 100, BALL_SIZE, BALL_SIZE, 3);

      // Dashed center line on title too
      for (let y = 82; y < 120; y += 8) {
        rectf(W / 2 - 1, y, 2, 4, 1);
      }

      if (titleBlink) {
        text("PRESS START", W / 2 - 27, 142, 3);
      }

      text("FIRST TO 11 WINS", W / 2 - 40, 165, 1);
      text("UP/DOWN TO MOVE", W / 2 - 37, 176, 1);
      return;
    }

    // --- Draw court ---

    // Top and bottom walls
    rectf(0, COURT_TOP - 2, W, 2, 1);
    rectf(0, COURT_BOTTOM, W, 2, 1);

    // Dashed center line
    for (let y = COURT_TOP; y < COURT_BOTTOM; y += 8) {
      rectf(W / 2 - 1, y, 2, 4, 1);
    }

    // Scores
    const pScoreStr = String(playerScore);
    const aScoreStr = String(aiScore);
    text(pScoreStr, W / 2 - 20, 5, 2);
    text(aScoreStr, W / 2 + 15, 5, 2);

    // Player label and AI label
    text("P1", W / 2 - 33, 5, 1);
    text("CPU", W / 2 + 23, 5, 1);

    // Paddles
    rectf(PADDLE_MARGIN, playerY, PADDLE_W, PADDLE_H, 3);
    rectf(W - PADDLE_MARGIN - PADDLE_W, aiY, PADDLE_W, PADDLE_H, 3);

    // Ball (only if not in serve pause, or blink it)
    if (serveTimer <= 0 || (serveTimer % 6) < 4) {
      rectf(flr(ballX), flr(ballY), BALL_SIZE, BALL_SIZE, 3);
    }

    // Game over overlay
    if (state === "gameover") {
      // Dim overlay
      rectf(W / 2 - 47, H / 2 - 22, 94, 38, 0);
      rect(W / 2 - 47, H / 2 - 22, 94, 38, 1);
      text(winMessage, W / 2 - flr(winMessage.length * 2.5), H / 2 - 11, 3);
      text(playerScore + " - " + aiScore, W / 2 - 10, H / 2 - 2, 2);
      if (titleBlink) {
        text("PRESS START", W / 2 - 27, H / 2 + 9, 3);
      }
    }
  };

  // ============================================================
  // Boot
  // ============================================================
  resetGame();
  setInterval(tick, 1000 / FPS);
})();
</script>
</body>
</html>
