<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mono — Demo: Snake</title>
<link rel="stylesheet" href="../../runtime/mono.css">
</head>
<body>
<div id="frame">
  <canvas id="screen"></canvas>
</div>
<div id="controls">
  <span>ARROWS</span> MOVE
</div>
<script src="../../runtime/engine.js"></script>
<script>
(() => {
  "use strict";
  const W = Mono.WIDTH, H = Mono.HEIGHT;
  const { cls, pix, line, rect, rectf, circ, circf, sprite: defSprite,
          spr, sprT, text, btn, btnp, note, stop, rnd, flr, abs: _abs,
          min, max: _max, sin, cos, dbg, dbgC } = Mono;

  // --- Helper: upscale 8x8 sprite data to 16x16 (256 chars) ---
  function up(d){let o="";for(let r=0;r<8;r++){let row="";for(let c=0;c<8;c++){const ch=d[r*8+c];row+=ch+ch;}o+=row+row;}return o;}

  // ============================================================
  // Sprites (all 16x16 via up())
  // ============================================================

  // 1: Snake head right
  defSprite(1, up(
    "00333300" +
    "03333330" +
    "33030330" +
    "33333330" +
    "33333330" +
    "33030330" +
    "03333330" +
    "00333300"
  ));
  // 2: Snake head up
  defSprite(2, up(
    "00333300" +
    "03303300" +
    "33333330" +
    "33333330" +
    "33333330" +
    "33333330" +
    "03333300" +
    "00333300"
  ));
  // 3: Snake head down
  defSprite(3, up(
    "00333300" +
    "03333300" +
    "33333330" +
    "33333330" +
    "33333330" +
    "33333330" +
    "03303300" +
    "00333300"
  ));
  // 4: Snake head left
  defSprite(4, up(
    "00333300" +
    "03333330" +
    "33030330" +
    "03333330" +
    "03333330" +
    "33030330" +
    "03333330" +
    "00333300"
  ));
  // 5: Snake body segment (alternating color A)
  defSprite(5, up(
    "00222200" +
    "02222220" +
    "22222220" +
    "22222220" +
    "22222220" +
    "22222220" +
    "02222220" +
    "00222200"
  ));
  // 6: Snake body segment (alternating color B)
  defSprite(6, up(
    "00333300" +
    "03333300" +
    "33333300" +
    "33333300" +
    "33333300" +
    "33333300" +
    "03333300" +
    "00333300"
  ));
  // 7: Food (apple / fruit)
  defSprite(7, up(
    "00010000" +
    "00323200" +
    "03232330" +
    "32323230" +
    "32323230" +
    "03232330" +
    "00323200" +
    "00020000"
  ));
  // 8: Food blink frame
  defSprite(8, up(
    "00010000" +
    "00232200" +
    "02323230" +
    "23232320" +
    "23232320" +
    "02323230" +
    "00232200" +
    "00020000"
  ));
  // 9: Snake tail
  defSprite(9, up(
    "00022000" +
    "00222200" +
    "02222200" +
    "22222200" +
    "22222200" +
    "02222200" +
    "00222200" +
    "00022000"
  ));
  // 10: Wall/border corner piece
  defSprite(10, up(
    "11111111" +
    "12222221" +
    "12111121" +
    "12111121" +
    "12111121" +
    "12111121" +
    "12222221" +
    "11111111"
  ));
  // 11: Title snake segment for animation
  defSprite(11, up(
    "00222200" +
    "02333320" +
    "23333320" +
    "23333320" +
    "23333320" +
    "23333320" +
    "02333320" +
    "00222200"
  ));

  // --- Constants (engine 16x16, screen 320x240) ---
  const CELL = 16;            // 16x16 pixel cells
  const HUD_H = 16;           // HUD area height at top
  const BORDER = 2;           // thin border line width around field
  const FIELD_X = BORDER;                     // field left edge
  const FIELD_Y = HUD_H + BORDER;             // field top edge
  const GRID_W = flr((W - BORDER * 2) / CELL);     // cells that fit horizontally
  const GRID_H = flr((H - HUD_H - BORDER * 2) / CELL); // cells that fit vertically
  const FIELD_PX_W = GRID_W * CELL;
  const FIELD_PX_H = GRID_H * CELL;

  // Layout overflow guard: clamp grid so field never exceeds screen
  // With 16px cells: GRID_W = floor((320-4)/16) = 19, FIELD_PX_W = 304
  // GRID_H = floor((240-16-4)/16) = 13, FIELD_PX_H = 208
  // Total: 304+4 = 308 < 320, 208+20 = 228 < 240  -- fits

  // Circle collision radius for food (used for food-head collision)
  const FOOD_R = 6;           // food circle hitbox radius
  const HEAD_R = 7;           // head circle hitbox radius

  // Max HUD items to display (layout overflow guard)
  const MAX_SCORE_DIGITS = 6; // cap score display to prevent overflow
  const FONT_W = 4;
  const FONT_H = 7;

  // --- Game state ---
  const { TITLE, PLAY, GAMEOVER } = Mono.SCENE;
  let snake, dir, nextDir, food, score, highScore, moveTimer, moveInterval;
  let growCount, gameOverTimer, titleAnim;

  highScore = 0;
  titleAnim = 0;

  function resetGame() {
    const startX = flr(GRID_W / 2);
    const startY = flr(GRID_H / 2);
    snake = [
      { x: startX, y: startY },
      { x: startX - 1, y: startY },
      { x: startX - 2, y: startY },
    ];
    dir = { x: 1, y: 0 };
    nextDir = { x: 1, y: 0 };
    score = 0;
    moveTimer = 0;
    moveInterval = 8; // frames between moves (lower = faster)
    growCount = 0;
    gameOverTimer = 0;
    spawnFood();
  }

  function spawnFood() {
    let attempts = 0;
    while (attempts < 1000) {
      const fx = flr(rnd(GRID_W));
      const fy = flr(rnd(GRID_H));
      let onSnake = false;
      for (const seg of snake) {
        if (seg.x === fx && seg.y === fy) { onSnake = true; break; }
      }
      if (!onSnake) {
        food = { x: fx, y: fy };
        return;
      }
      attempts++;
    }
    // Fallback: place at first open cell
    for (let y = 0; y < GRID_H; y++) {
      for (let x = 0; x < GRID_W; x++) {
        let onSnake = false;
        for (const seg of snake) {
          if (seg.x === x && seg.y === y) { onSnake = true; break; }
        }
        if (!onSnake) { food = { x, y }; return; }
      }
    }
  }

  // --- Circle-circle collision ---
  function circCollide(ax, ay, ar, bx, by, br) {
    const dx = ax - bx;
    const dy = ay - by;
    const distSq = dx * dx + dy * dy;
    const rSum = ar + br;
    return distSq <= rSum * rSum;
  }

  // Get pixel center of a grid cell
  function cellCenter(gx, gy) {
    return {
      cx: FIELD_X + gx * CELL + CELL / 2,
      cy: FIELD_Y + gy * CELL + CELL / 2
    };
  }

  // --- Sounds ---
  function eatSound() {
    note(0, "E5", 0.05);
    setTimeout(() => note(0, "G5", 0.06), 50);
  }
  function deathSound() {
    note(0, "C3", 0.12);
    note(1, "G2", 0.12);
    setTimeout(() => { note(0, "A2", 0.2); note(1, "E2", 0.2); }, 120);
  }
  function startSound() {
    note(0, "C5", 0.08);
    setTimeout(() => note(0, "E5", 0.08), 80);
    setTimeout(() => note(0, "G5", 0.1), 160);
  }

  // Centered text helper
  function textLen(str) { return str.length * (FONT_W + 1) - 1; }
  function textCenter(str, y, c) {
    text(str, flr((W - textLen(str)) / 2), y, c);
  }

  // --- Draw HUD (shared between play/gameover) ---
  function drawHUD() {
    rectf(0, 0, W, HUD_H, 0);
    // Layout overflow guard: truncate score string
    const scoreStr = ("" + score).slice(0, MAX_SCORE_DIGITS);
    const hiStr = ("" + highScore).slice(0, MAX_SCORE_DIGITS);
    text("SCORE:" + scoreStr, 4, 4, 3);
    // Cap length display
    const lenStr = "" + min(snake.length, 999);
    text("LEN:" + lenStr, 110, 4, 2);
    text("HI:" + hiStr, W - 55, 4, 2);
    line(0, HUD_H - 1, W - 1, HUD_H - 1, 1);
  }

  // --- Draw field border & background dots ---
  function drawField() {
    rect(FIELD_X - 1, FIELD_Y - 1, FIELD_PX_W + 2, FIELD_PX_H + 2, 1);
    // Subtle grid dots
    for (let gy = 0; gy < GRID_H; gy++) {
      for (let gx = 0; gx < GRID_W; gx++) {
        pix(FIELD_X + gx * CELL + CELL / 2, FIELD_Y + gy * CELL + CELL / 2, 0);
      }
    }
  }

  // --- Draw food with sprite ---
  function drawFood() {
    if (!food) return;
    const blink = flr(Mono.frame / 8) % 2;
    const fx = FIELD_X + food.x * CELL;
    const fy = FIELD_Y + food.y * CELL;
    sprT(blink === 0 ? 7 : 8, fx, fy);

    // Debug circle hitbox for food
    const fc = cellCenter(food.x, food.y);
    dbgC(fc.cx, fc.cy, FOOD_R);
  }

  // --- Draw snake with sprites ---
  function drawSnake(flash) {
    for (let i = snake.length - 1; i >= 0; i--) {
      const seg = snake[i];
      const sx = FIELD_X + seg.x * CELL;
      const sy = FIELD_Y + seg.y * CELL;

      if (flash !== undefined) {
        // Game over flash mode
        const f = flr(flash / 4) % 2;
        if (i === 0) {
          rectf(sx, sy, CELL, CELL, f === 0 ? 3 : 1);
        } else {
          rectf(sx + 2, sy + 2, CELL - 4, CELL - 4, f === 0 ? 2 : 1);
        }
      } else if (i === 0) {
        // Head sprite based on direction
        let headSpr = 1; // right
        if (dir.x === -1) headSpr = 4; // left
        else if (dir.y === -1) headSpr = 2; // up
        else if (dir.y === 1) headSpr = 3; // down
        sprT(headSpr, sx, sy);

        // Debug circle hitbox for head
        const hc = cellCenter(seg.x, seg.y);
        dbgC(hc.cx, hc.cy, HEAD_R);
      } else if (i === snake.length - 1) {
        // Tail
        sprT(9, sx, sy);
        // Debug rect hitbox for tail
        dbg(sx + 2, sy + 2, CELL - 4, CELL - 4);
      } else {
        // Body alternation
        sprT(i % 2 === 0 ? 5 : 6, sx, sy);
        // Debug rect hitbox for body segments
        dbg(sx + 2, sy + 2, CELL - 4, CELL - 4);
      }
    }
  }

  // --- Title Scene ---
  Mono.scene(TITLE, {
    init() { titleAnim = 0; },
    update() {
      titleAnim++;
      if (btnp("start") || btnp("a")) {
        resetGame();
        startSound();
        Mono.go(PLAY); return;
      }
    },
    draw() {
      cls(0);
      // Double border frame
      rect(10, 12, W - 20, H - 24, 1);
      rect(12, 14, W - 24, H - 28, 1);

      // Title: "SNAKE" in big styled blocks
      const titleStr = "SNAKE";
      const bigW = 28, bigH = 28, bigGap = 6;
      const totalW = titleStr.length * (bigW + bigGap) - bigGap;
      const startX = flr((W - totalW) / 2);
      for (let i = 0; i < titleStr.length; i++) {
        const bx = startX + i * (bigW + bigGap);
        const by = 35;
        const c = (i + flr(titleAnim / 15)) % 2 === 0 ? 3 : 2;
        rectf(bx, by, bigW, bigH, c);
        rect(bx, by, bigW, bigH, 1);
        // Center letter in block
        text(titleStr[i], bx + flr((bigW - FONT_W) / 2), by + flr((bigH - FONT_H) / 2), 0);
      }

      // Animated snake on title screen using sprites
      const snakeY = 85;
      const snakeLen = 8;
      for (let i = 0; i < snakeLen; i++) {
        const sx = 45 + i * 18 + sin(titleAnim * 0.06 + i * 0.5) * 8;
        const sy = snakeY + cos(titleAnim * 0.08 + i * 0.4) * 8;
        if (i === 0) {
          sprT(1, flr(sx), flr(sy));
        } else {
          sprT(11, flr(sx), flr(sy));
        }
      }

      // Instructions
      if (flr(titleAnim / 20) % 2 === 0) {
        textCenter("PRESS START", 130, 3);
      }
      textCenter("ARROWS TO MOVE", 155, 2);
      textCenter("EAT FOOD TO GROW", 167, 2);
      textCenter("DON'T HIT WALLS", 179, 2);
      textCenter("OR YOURSELF!", 191, 2);

      if (highScore > 0) {
        textCenter("HIGH SCORE: " + highScore, 210, 2);
      }
      textCenter("MONO DEMO", 226, 1);
    }
  });

  // --- Play Scene ---
  Mono.scene(PLAY, {
    init() { resetGame(); },
    update() {
      titleAnim++;
      // Input: direction change (prevent 180-degree reversal)
      if (btnp("up") && dir.y === 0) { nextDir = { x: 0, y: -1 }; }
      else if (btnp("down") && dir.y === 0) { nextDir = { x: 0, y: 1 }; }
      else if (btnp("left") && dir.x === 0) { nextDir = { x: -1, y: 0 }; }
      else if (btnp("right") && dir.x === 0) { nextDir = { x: 1, y: 0 }; }

      moveTimer++;
      if (moveTimer < moveInterval) return;
      moveTimer = 0;

      dir = nextDir;
      const head = snake[0];
      const nx = head.x + dir.x;
      const ny = head.y + dir.y;

      // Wall collision
      if (nx < 0 || nx >= GRID_W || ny < 0 || ny >= GRID_H) {
        gameOverTimer = 0;
        if (score > highScore) highScore = score;
        deathSound();
        Mono.go(GAMEOVER); return;
      }

      // Self collision
      const checkLen = growCount > 0 ? snake.length : snake.length - 1;
      for (let i = 0; i < checkLen; i++) {
        if (snake[i].x === nx && snake[i].y === ny) {
          gameOverTimer = 0;
          if (score > highScore) highScore = score;
          deathSound();
          Mono.go(GAMEOVER); return;
        }
      }

      // Move head
      snake.unshift({ x: nx, y: ny });
      if (growCount > 0) { growCount--; } else { snake.pop(); }

      // Food collision using circle-circle test
      const hc = cellCenter(nx, ny);
      const fc = cellCenter(food.x, food.y);
      if (circCollide(hc.cx, hc.cy, HEAD_R, fc.cx, fc.cy, FOOD_R)) {
        score += 10;
        growCount += 3;
        eatSound();
        spawnFood();
        // Speed up as snake grows
        moveInterval = _max(2, 8 - flr(snake.length / 8));
      }
    },
    draw() {
      cls(0);
      drawHUD();
      drawField();
      drawFood();
      drawSnake();
    }
  });

  // --- Game Over Scene ---
  Mono.scene(GAMEOVER, {
    init() {},
    update() {
      titleAnim++;
      gameOverTimer++;
      if (gameOverTimer > 30 && (btnp("start") || btnp("a"))) {
        Mono.go(TITLE); return;
      }
    },
    draw() {
      cls(0);
      drawHUD();
      drawField();

      // Draw food (frozen)
      if (food) {
        const fx = FIELD_X + food.x * CELL;
        const fy = FIELD_Y + food.y * CELL;
        sprT(7, fx, fy);
      }

      // Draw snake flashing
      drawSnake(gameOverTimer);

      // Darken overlay
      for (let py = FIELD_Y + 30; py < FIELD_Y + FIELD_PX_H - 30; py += 2) {
        for (let px = FIELD_X + 20; px < FIELD_X + FIELD_PX_W - 20; px += 2) {
          pix(px, py, 0);
        }
      }

      // Game over dialog box - layout overflow guard: centered, clamped size
      const boxW = min(180, FIELD_PX_W - 20);
      const boxH = 70;
      const boxX = flr((W - boxW) / 2);
      const boxY = flr((H - boxH) / 2);
      rectf(boxX, boxY, boxW, boxH, 0);
      rect(boxX, boxY, boxW, boxH, 1);
      rect(boxX + 2, boxY + 2, boxW - 4, boxH - 4, 2);

      textCenter("GAME OVER", boxY + 10, 3);
      textCenter("SCORE: " + score, boxY + 24, 2);
      textCenter("LENGTH: " + snake.length, boxY + 34, 2);

      if (score >= highScore && score > 0) {
        textCenter("NEW HIGH SCORE!", boxY + 46, 3);
      }
      if (gameOverTimer > 30) {
        if (flr(gameOverTimer / 15) % 2 === 0) {
          textCenter("PRESS START", boxY + 56, 2);
        }
      }
    }
  });

  Mono.go(TITLE);
  Mono.boot("screen");
})();
</script>
</body>
</html>
