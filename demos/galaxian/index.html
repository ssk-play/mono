<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GrayBox — Demo: Galaxian</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #0a0a0a;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100vh;
    font-family: monospace;
    overflow: hidden;
  }
  #frame {
    background: #111;
    border: 3px solid #333;
    border-radius: 8px;
    padding: 12px;
    box-shadow: 0 0 40px rgba(0,0,0,0.8), inset 0 0 20px rgba(0,0,0,0.5);
  }
  canvas {
    display: block;
    image-rendering: pixelated;
    image-rendering: crisp-edges;
  }
  #controls {
    margin-top: 12px;
    color: #6b6b6b;
    font-size: 11px;
    text-align: center;
    letter-spacing: 1px;
  }
  #controls span { color: #b0b0b0; }
</style>
</head>
<body>
<div id="frame">
  <canvas id="screen"></canvas>
</div>
<div id="controls">
  <span>←→</span> MOVE &nbsp;&nbsp; <span>A</span> FIRE
</div>
<script src="../../runtime/engine.js"></script>
<script>
(() => {
  "use strict";
  const W = GrayBox.WIDTH, H = GrayBox.HEIGHT;
  const { cls, pix, line, rect, rectf, circ, circf, sprite: defSprite,
          spr, text, btn, btnp, note, stop, rnd, flr, abs: _abs,
          min, max: _max, sin, cos } = GrayBox;

  // --- Sprites ---

  // 1: Player ship — classic Galaxian rocket shape
  defSprite(1,
    "00030000" +
    "00030000" +
    "00333000" +
    "00333000" +
    "03333300" +
    "33333330" +
    "33022030" +
    "30000003"
  );

  // 2: Drone (blue alien) — basic foot soldier, simple insect
  defSprite(2,
    "00300300" +
    "00333000" +
    "03333300" +
    "32333230" +
    "33333330" +
    "03033030" +
    "03000300" +
    "30000003"
  );

  // 3: Escort (purple alien) — butterfly-wing shape
  defSprite(3,
    "30000003" +
    "03300330" +
    "03333300" +
    "33233230" +
    "33333330" +
    "03333300" +
    "03300330" +
    "30000003"
  );

  // 4: Flagship — big commander, distinctive crown shape
  defSprite(4,
    "00333000" +
    "03333300" +
    "33333330" +
    "32233220" +
    "33333330" +
    "33333330" +
    "03033030" +
    "00300300"
  );

  // 5: Flagship wings open (dive animation)
  defSprite(5,
    "30333003" +
    "33333330" +
    "33333330" +
    "32233220" +
    "33333330" +
    "33333330" +
    "30333003" +
    "03030300"
  );

  // 6: Player bullet — single thin shot
  defSprite(6,
    "00030000" +
    "00030000" +
    "00020000" +
    "00020000" +
    "00000000" +
    "00000000" +
    "00000000" +
    "00000000"
  );

  // 7: Enemy bullet — downward
  defSprite(7,
    "00000000" +
    "00000000" +
    "00000000" +
    "00010000" +
    "00020000" +
    "00020000" +
    "00030000" +
    "00000000"
  );

  // 8: Explosion frame 1 — small burst
  defSprite(8,
    "00000000" +
    "00200100" +
    "01003000" +
    "00031200" +
    "00230100" +
    "01000030" +
    "00100000" +
    "00000000"
  );

  // 9: Explosion frame 2 — large burst
  defSprite(9,
    "20010030" +
    "01000010" +
    "00302300" +
    "03033030" +
    "00232100" +
    "01000200" +
    "30001002" +
    "00200010"
  );

  // 10: Life icon — tiny ship
  defSprite(10,
    "00000000" +
    "00030000" +
    "00333000" +
    "03333300" +
    "33333330" +
    "33022030" +
    "00000000" +
    "00000000"
  );

  // 11: Star (dim)
  defSprite(11,
    "00000000" +
    "00000000" +
    "00000000" +
    "00010000" +
    "00000000" +
    "00000000" +
    "00000000" +
    "00000000"
  );

  // --- Game State ---
  const { TITLE, PLAY, GAMEOVER } = GrayBox.SCENE;
  let player, playerBullet, eBullets, enemies, explosions, particles, stars;
  let score, hiScore, lives, wave, waveTimer, waveMessage;
  let formationX, formationDir, formationSpeed;
  let diveTimer, respawnTimer;
  let titleAnimT;

  hiScore = 0;

  // Formation layout: Galaxian classic
  // Row 0: 6 flagships (centered)
  // Row 1: 8 escorts
  // Row 2: 10 drones
  // Row 3: 10 drones
  // Row 4: 10 drones
  const FORM_CELL_W = 11;
  const FORM_CELL_H = 10;
  const MAX_COLS = 10;

  function formBaseX() { return (W - MAX_COLS * FORM_CELL_W) / 2; }
  const FORM_BASE_Y = 32;

  function resetGame() {
    player = { x: W / 2 - 4, y: H - 21, alive: true };
    playerBullet = null; // only one at a time!
    eBullets = [];
    enemies = [];
    explosions = [];
    particles = [];
    score = 0;
    lives = 3;
    wave = 0;
    waveTimer = 0;
    waveMessage = 0;
    formationX = 0;
    formationDir = 1;
    formationSpeed = 0.25;
    diveTimer = 0;
    respawnTimer = 0;
    titleAnimT = 0;
    stars = [];
    for (let i = 0; i < 60; i++)
      stars.push({ x: flr(rnd(W)), y: flr(rnd(H)), speed: 0.15 + rnd(0.6), bright: flr(rnd(2)) + 1 });
    spawnWave();
  }

  function spawnWave() {
    wave++;
    waveMessage = 90;
    formationSpeed = 0.25 + wave * 0.04;
    formationX = 0;
    formationDir = 1;

    // Row 0: Flagships (centered, fewer)
    const flagCount = min(6, 4 + flr(wave / 3));
    const flagOffset = flr((MAX_COLS - flagCount) / 2);
    for (let col = 0; col < flagCount; col++) {
      enemies.push(makeEnemy(0, flagOffset + col, 4, 2, 60));
    }

    // Row 1: Escorts
    const escortCount = min(8, 6 + flr(wave / 4));
    const escortOffset = flr((MAX_COLS - escortCount) / 2);
    for (let col = 0; col < escortCount; col++) {
      enemies.push(makeEnemy(1, escortOffset + col, 3, 1, 30));
    }

    // Rows 2-4: Drones
    const droneRows = min(3, 2 + flr(wave / 5));
    for (let row = 0; row < droneRows; row++) {
      for (let col = 0; col < MAX_COLS; col++) {
        enemies.push(makeEnemy(2 + row, col, 2, 1, 10));
      }
    }

    diveTimer = 70 + flr(rnd(30));
  }

  function makeEnemy(row, col, type, hp, pts) {
    return {
      formRow: row, formCol: col,
      x: 0, y: 0,
      type: type, hp: hp, pts: pts,
      state: "forming",
      enterT: -(row * MAX_COLS + col) * 2,
      // Dive state
      divePath: null, diveT: 0, diveSpeed: 0,
      shootTimer: 80 + flr(rnd(120)),
      escorts: null, // for flagships: references to escort divers
      wingFlap: 0,
    };
  }

  function formationPos(row, col) {
    return {
      x: formBaseX() + col * FORM_CELL_W + formationX,
      y: FORM_BASE_Y + row * FORM_CELL_H
    };
  }

  function addExplosion(x, y) {
    explosions.push({ x: x, y: y, timer: 14 });
    for (let i = 0; i < 10; i++)
      particles.push({
        x: x + 4, y: y + 4,
        vx: rnd(4) - 2, vy: rnd(4) - 2,
        life: 5 + flr(rnd(10)),
        color: flr(rnd(3)) + 1
      });
  }

  // --- Sounds ---
  function shootSound() { note(0, "E6", 0.04); }
  function hitSound() { note(1, "C3", 0.06); setTimeout(() => note(1, "F3", 0.06), 50); }
  function flagshipHitSound() { note(1, "A4", 0.04); }
  function flagshipKillSound() {
    note(0, "G5", 0.08);
    setTimeout(() => note(0, "B5", 0.08), 80);
    setTimeout(() => note(0, "D6", 0.12), 160);
  }
  function deathSound() {
    note(0, "D3", 0.12); note(1, "G2", 0.12);
    setTimeout(() => { note(0, "A2", 0.2); note(1, "D2", 0.2); }, 130);
  }
  function waveClearSound() {
    note(0, "C5", 0.08);
    setTimeout(() => note(0, "E5", 0.08), 80);
    setTimeout(() => note(0, "G5", 0.08), 160);
    setTimeout(() => note(0, "C6", 0.15), 240);
  }

  // --- Dive paths: Galaxian swooping arcs ---
  // Galaxian aliens do wide sweeping curves, not straight dives
  function startDive(enemy) {
    enemy.state = "diving";
    enemy.diveT = 0;
    enemy.wingFlap = 0;

    const sx = enemy.x;
    const sy = enemy.y;
    // Pick a side to swoop toward
    const swoopDir = (sx < W / 2) ? 1 : -1;
    // Control points for a wide arc then swoop down
    const cp1x = sx + swoopDir * (53 + rnd(40));
    const cp1y = sy + 22 + rnd(30);
    const cp2x = sx - swoopDir * (27 + rnd(40));
    const cp2y = H * 0.55 + rnd(30);
    // End: swoop past player position and off bottom
    const ex = player.alive ? player.x + rnd(40) - 20 : W / 2;
    const ey = H + 15;

    enemy.divePath = [
      { x: sx, y: sy },
      { x: cp1x, y: cp1y },
      { x: cp2x, y: cp2y },
      { x: ex, y: ey }
    ];
    enemy.diveSpeed = 1.8 + rnd(0.8) + wave * 0.12;
  }

  // Flagship dive with escorts
  function startFlagshipDive(flagship) {
    startDive(flagship);
    flagship.diveSpeed *= 0.85; // Flagships are slightly slower, more majestic

    // Find up to 2 escorts in formation near the flagship
    flagship.escorts = [];
    const nearEscorts = enemies.filter(e =>
      e !== flagship && e.state === "formation" &&
      (e.type === 3 || e.type === 2) &&
      _abs(e.formCol - flagship.formCol) <= 2 &&
      e.formRow >= 1 && e.formRow <= 2
    );
    // Pick up to 2
    for (let i = 0; i < min(2, nearEscorts.length); i++) {
      const esc = nearEscorts[flr(rnd(nearEscorts.length))];
      if (esc.state === "formation" && !flagship.escorts.includes(esc)) {
        startDive(esc);
        esc.diveSpeed = flagship.diveSpeed + 0.2; // Escorts slightly faster
        flagship.escorts.push(esc);
      }
    }
    // Flagship worth more points when diving
    flagship.pts = 150;
  }

  // Cubic bezier evaluation for 4 control points
  function cubicBez(t, p0, p1, p2, p3) {
    const u = 1 - t;
    return u*u*u*p0 + 3*u*u*t*p1 + 3*u*t*t*p2 + t*t*t*p3;
  }

  function updateStarsGx() {
    for (const s of stars) { s.y += s.speed; if (s.y > H) { s.y = 0; s.x = flr(rnd(W)); } }
  }

  // --- Title Scene ---
  GrayBox.scene(TITLE, {
    init() { resetGame(); titleAnimT = 0; },
    update() {
      updateStarsGx();
      titleAnimT++;
      if (btnp("a") || btnp("a")) {
        resetGame();
        note(0, "C5", 0.08);
        setTimeout(() => note(0, "E5", 0.08), 80);
        setTimeout(() => note(0, "G5", 0.12), 160);
        GrayBox.go(PLAY); return;
      }
    },
    draw() {
      cls(0);
      for (const s of stars) pix(s.x, s.y, s.bright);
      drawTitle();
    }
  });

  // --- Game Over Scene ---
  GrayBox.scene(GAMEOVER, {
    init() {},
    update() {
      updateStarsGx();
      titleAnimT++;
      for (let i = particles.length - 1; i >= 0; i--) {
        const p = particles[i]; p.x += p.vx; p.y += p.vy; p.vy += 0.06; p.life--;
        if (p.life <= 0) particles.splice(i, 1);
      }
      if (btnp("a") || btnp("a")) { GrayBox.go(TITLE); return; }
    },
    draw() {
      cls(0);
      for (const s of stars) pix(s.x, s.y, s.bright);
      for (const p of particles) pix(flr(p.x), flr(p.y), p.color);
      text("GAME OVER", 138, 75, 3);
      text("SCORE  " + padScore(score), 128, 98, 2);
      text("HI     " + padScore(hiScore), 128, 109, 2);
      text("WAVE   " + wave, 140, 124, 2);
      if (flr(GrayBox.frame / 20) % 2 === 0) text("PRESS A", 133, 158, 3);
    }
  });

  // --- Play Scene ---
  GrayBox.scene(PLAY, {
    init() {},
    update() {
    updateStarsGx();

    // --- Play state ---

    if (waveMessage > 0) waveMessage--;

    // Respawn timer after death
    if (respawnTimer > 0) {
      respawnTimer--;
      if (respawnTimer === 0) {
        player.alive = true;
        player.x = W / 2 - 4;
      }
    }

    // Player movement
    if (player.alive) {
      if (btn("left")) player.x -= 2.5;
      if (btn("right")) player.x += 2.5;
      player.x = _max(4, min(W - 12, player.x));

      // Fire — ONE bullet at a time (Galaxian constraint!)
      if (btnp("a") && !playerBullet) {
        playerBullet = { x: player.x + 0, y: player.y - 2 };
        shootSound();
      }
    }

    // Update player bullet
    if (playerBullet) {
      playerBullet.y -= 5;
      if (playerBullet.y < -8) playerBullet = null;
    }

    // Formation sway
    formationX += formationDir * formationSpeed;
    if (formationX > 19) formationDir = -1;
    if (formationX < -19) formationDir = 1;

    // Update enemies
    for (let i = enemies.length - 1; i >= 0; i--) {
      const e = enemies[i];

      if (e.state === "forming") {
        e.enterT++;
        if (e.enterT < 0) continue;
        const target = formationPos(e.formRow, e.formCol);
        const flyDur = 25;
        if (e.enterT <= flyDur) {
          const t = e.enterT / flyDur;
          // Fly in from top with a slight curve
          const startX = W / 2 + sin(e.formCol * 1.2 + e.formRow) * 53;
          const startY = -16;
          e.x = startX + (target.x - startX) * t * t;
          e.y = startY + (target.y - startY) * t;
        } else {
          e.state = "formation";
        }
      }

      if (e.state === "formation") {
        const target = formationPos(e.formRow, e.formCol);
        e.x = target.x;
        e.y = target.y;
      }

      if (e.state === "diving") {
        e.diveT += e.diveSpeed / 250;
        e.wingFlap++;

        if (e.diveT >= 1) {
          // Wrap around: come back from the top
          e.state = "returning";
          e.y = -12;
          e.x = formationPos(e.formRow, e.formCol).x;
          e.diveT = 0;
        } else {
          const p = e.divePath;
          e.x = cubicBez(e.diveT, p[0].x, p[1].x, p[2].x, p[3].x);
          e.y = cubicBez(e.diveT, p[0].y, p[1].y, p[2].y, p[3].y);
        }

        // Diving enemies fire
        e.shootTimer--;
        if (e.shootTimer <= 0 && e.y > 10 && e.y < H - 38) {
          eBullets.push({ x: e.x + 0, y: e.y + 8 });
          e.shootTimer = 20 + flr(rnd(30));
          note(1, "D4", 0.02);
        }
      }

      if (e.state === "returning") {
        const target = formationPos(e.formRow, e.formCol);
        e.diveT += 0.025;
        if (e.diveT >= 1) {
          e.state = "formation";
          e.x = target.x;
          e.y = target.y;
        } else {
          e.x += (target.x - e.x) * 0.06;
          e.y += (target.y - e.y) * 0.06;
        }
      }

      // Bullet-enemy collision
      if (playerBullet) {
        const b = playerBullet;
        if (b.x + 8 > e.x && b.x < e.x + 8 && b.y + 8 > e.y && b.y < e.y + 8) {
          playerBullet = null;
          e.hp--;
          if (e.hp <= 0) {
            // Flagship killed while diving = bonus
            let pts = e.pts;
            if (e.type === 4 && e.state === "diving") pts = 150;
            else if (e.type === 4 && e.state === "formation") pts = 60;
            else if (e.type === 3 && e.state === "diving") pts = 50;
            else if (e.type === 3) pts = 30;
            else if (e.state === "diving") pts = 20;
            else pts = e.pts;

            score += pts;
            addExplosion(e.x, e.y);
            if (e.type === 4) flagshipKillSound();
            else hitSound();
            enemies.splice(i, 1);
          } else {
            flagshipHitSound();
          }
        }
      }
    }

    // Trigger dives — authentic Galaxian: flagship dives with escorts
    diveTimer--;
    if (diveTimer <= 0) {
      const formEnemies = enemies.filter(e => e.state === "formation");
      if (formEnemies.length > 0) {
        // Prioritize flagships for exciting dive-bomb attacks
        const flagships = formEnemies.filter(e => e.type === 4);
        const divers = formEnemies.filter(e => e.type !== 4);

        if (flagships.length > 0 && rnd(1) < 0.35) {
          // Flagship dive with escorts!
          const flag = flagships[flr(rnd(flagships.length))];
          startFlagshipDive(flag);
        } else if (divers.length > 0) {
          const diver = divers[flr(rnd(divers.length))];
          startDive(diver);
        }
      }
      diveTimer = _max(12, 45 - wave * 3) + flr(rnd(20));
    }

    // Enemy bullets
    for (let i = eBullets.length - 1; i >= 0; i--) {
      eBullets[i].y += 2.5;
      if (eBullets[i].y > H + 8) { eBullets.splice(i, 1); continue; }
      // Hit player
      if (player.alive) {
        const b = eBullets[i];
        if (b && b.x + 8 > player.x && b.x < player.x + 8 && b.y + 8 > player.y && b.y < player.y + 8) {
          eBullets.splice(i, 1);
          killPlayer();
        }
      }
    }

    // Diving enemy-player collision
    if (player.alive) {
      for (let i = enemies.length - 1; i >= 0; i--) {
        const e = enemies[i];
        if (e.state === "diving" &&
            player.x + 7 > e.x && player.x < e.x + 8 &&
            player.y + 7 > e.y && player.y < e.y + 8) {
          addExplosion(e.x, e.y);
          score += e.pts;
          enemies.splice(i, 1);
          killPlayer();
          break;
        }
      }
    }

    // Formation enemies randomly fire (bottom-most in column only)
    for (const e of enemies) {
      if (e.state === "formation") {
        e.shootTimer--;
        if (e.shootTimer <= 0) {
          const hasBelow = enemies.some(o =>
            o.formCol === e.formCol && o.formRow > e.formRow && o.state === "formation"
          );
          if (!hasBelow && rnd(1) < 0.3) {
            eBullets.push({ x: e.x + 0, y: e.y + 8 });
          }
          e.shootTimer = _max(30, 100 - wave * 6) + flr(rnd(60));
        }
      }
    }

    // Explosions
    for (let i = explosions.length - 1; i >= 0; i--) {
      explosions[i].timer--;
      if (explosions[i].timer <= 0) explosions.splice(i, 1);
    }

    // Particles
    for (let i = particles.length - 1; i >= 0; i--) {
      const p = particles[i];
      p.x += p.vx; p.y += p.vy; p.vy += 0.05; p.life--;
      if (p.life <= 0) particles.splice(i, 1);
    }

    // Wave clear
    if (enemies.length === 0) {
      waveTimer++;
      if (waveTimer === 1) waveClearSound();
      if (waveTimer > 70) {
        waveTimer = 0;
        spawnWave();
      }
    }
    },
    draw() {
    cls(0);
    for (const s of stars) pix(s.x, s.y, s.bright);

    // Enemy bullets
    for (const b of eBullets) spr(7, flr(b.x), flr(b.y));

    // Enemies
    for (const e of enemies) {
      if (e.state === "forming" && e.enterT < 0) continue;
      let sprId = e.type;
      if (e.type === 4 && e.state === "diving" && flr(e.wingFlap / 4) % 2 === 0) { sprId = 5; }
      if (e.type === 4 && e.hp === 1 && flr(GrayBox.frame / 3) % 2 === 0) {
      } else {
        spr(sprId, flr(e.x), flr(e.y));
      }
    }

    // Player bullet
    if (playerBullet) spr(6, flr(playerBullet.x), flr(playerBullet.y));

    // Player
    if (player.alive) {
      if (respawnTimer > 0 && respawnTimer < 20 && flr(GrayBox.frame / 3) % 2 === 0) {
      } else {
        spr(1, flr(player.x), flr(player.y));
      }
    }

    // Explosions
    for (const e of explosions) {
      const sprId = e.timer > 7 ? 8 : 9;
      spr(sprId, flr(e.x), flr(e.y));
    }

    // Particles
    for (const p of particles) pix(flr(p.x), flr(p.y), p.color);

    // HUD
    rectf(0, 0, W, 10, 0);
    text("1UP", 3, 2, 3);
    text(padScore(score), 3, 7, 3);
    text("HIGH SCORE", W / 2 - 17, 2, 2);
    text(padScore(hiScore), W / 2 - 10, 7, 3);
    text("WAVE " + wave, W - 33, 2, 2);

    // Lives
    for (let i = 0; i < lives - 1; i++) spr(10, 3 + i * 10, H - 8);

    // Wave announcement
    if (waveMessage > 0) {
      const msgY = 105 + sin(waveMessage * 0.12) * 3;
      text("WAVE " + wave, 140, flr(msgY), 3);
      if (waveMessage > 50) text("READY!", 142, flr(msgY) + 14, 2);
    }
    }
  });

  function killPlayer() {
    addExplosion(player.x, player.y);
    deathSound();
    player.alive = false;
    lives--;
    playerBullet = null;
    if (lives <= 0) {
      if (score > hiScore) hiScore = score;
      GrayBox.go(GAMEOVER); return;
    } else {
      respawnTimer = 60;
    }
  }

  // (Scene draw functions defined above)

  function padScore(n) {
    let s = String(n);
    while (s.length < 6) s = "0" + s;
    return s;
  }

  function drawTitle() {
    titleAnimT++;

    // Big title with shadow
    const ty = 41 + sin(titleAnimT * 0.04) * 4;
    text("GALAXIAN", 140, flr(ty), 3);
    text("GALAXIAN", 141, flr(ty) + 1, 1);
    rectf(110, flr(ty) + 12, 100, 1, 2);

    // Animated formation on title
    const cx = W / 2;
    const baseY = flr(ty) + 28;
    // Flagship in center swaying
    spr(5, cx - 4 + sin(titleAnimT * 0.06) * 13, baseY + sin(titleAnimT * 0.07) * 3);
    // Escorts flanking
    spr(3, cx - 19 + sin(titleAnimT * 0.06 + 0.5) * 13, baseY + 3 + sin(titleAnimT * 0.07 + 1) * 3);
    spr(3, cx + 13 + sin(titleAnimT * 0.06 - 0.5) * 13, baseY + 3 + sin(titleAnimT * 0.07 - 1) * 3);
    // Drones
    for (let i = -2; i <= 2; i++) {
      spr(2, cx + i * 12 - 4 + sin(titleAnimT * 0.05) * 10, baseY + 14 + sin(titleAnimT * 0.06 + i * 0.5) * 2);
    }

    if (flr(titleAnimT / 22) % 2 === 0) text("PRESS A", 133, 135, 3);

    // Score table
    text("-- SCORE TABLE --", 115, 154, 2);
    spr(4, 119, 164); text("FLAGSHIP       60 PTS", 127, 166, 2);
    spr(4, 119, 175); text("FLAGSHIP DIVE 150 PTS", 127, 177, 2);
    spr(3, 119, 186); text("ESCORT         30 PTS", 127, 188, 2);
    spr(2, 119, 197); text("DRONE          10 PTS", 127, 199, 2);

    text("HIGH SCORE  " + padScore(hiScore), 115, 214, 2);
    text("GRAYBOX DEMO V0.1", 115, 229, 1);
  }

  GrayBox.go(TITLE);
  GrayBox.boot("screen");
})();
</script>
