  // --- Constants for 16x16 sprite sizes ---

  // --- Game State ---
  const { TITLE, PLAY, GAMEOVER } = Mono.SCENE;
  let score = 0;

  // Player

  // Bullets

  // Explosions

  // Enemies

  // POWs
  let pows = []; // {x,y,state:'waiting'|'freed'|'gone',timer}
  // Obstacles (world coords)
  let obstacles = []; // {x,wy,type,hp} wy = world Y
  // Boss
  let boss = null; // {x,y,hp,maxHp,timer,phase,shootTimer}

  let bossDefeated = false;

  // Spawning
  let spawnTimer = 0;
  let nextObstacleY = 0;
  let sectionLength = 0;
  let gameOverTimer = 0;
  let titleAnim = 0;

  // Terrain features (parallax ground detail)
  let groundDetails = []; // {x,wy,type}

  function resetGame() {
    score = 0;
    lives = 3;
    grenadeCount = 5;
    scrollY = 450;
    scrollSpeed = 0.5;
    levelSection = 0;
    px = 152; py = 190;
    pdir = 0;
    pInvuln = 0;
    pDead = false;
    pDeadTimer = 0;
    bullets = [];
    grenades = [];
    explosions = [];
    enemies = [];
    pows = [];
    obstacles = [];
    boss = null;
    bossActive = false;
    bossDefeated = false;
    spawnTimer = 0;
    nextObstacleY = 900;
    sectionLength = 0;
    gameOverTimer = 0;
    groundDetails = [];
    // Pre-populate some ground details
    for (let i = 0; i < 80; i++) {
      groundDetails.push({
        x: flr(rnd(W)),
        wy: flr(rnd(450)),
        type: flr(rnd(3))
      });
    }
  }

  function worldToScreen(wy) {
    return scrollY - wy;
  }

  function spawnEnemy(x, wy, type) {
    enemies.push({
      x: x, y: wy, type: type || 0,
      hp: type === 1 ? 2 : 1,
      timer: 0, dir: 2,
      state: "idle",
      shootTimer: flr(rnd(60)) + 30,
      moveTimer: 0,
      vx: 0, vy: 0
    });
  }

  function spawnPOW(x, wy) {
    pows.push({ x: x, y: wy, state: "waiting", timer: 0 });
  }

  function spawnObstacle(x, wy, type) {
    obstacles.push({ x: x, wy: wy, type: type, hp: type === 1 ? 5 : (type === 2 ? 8 : 0) });
  }

  function addExplosion(x, y) {
    explosions.push({ x: x, y: y, timer: 0 });
    note(1, "C2", 0.1);
  }

  function shoot(x, y, dx, dy, owner) {
    bullets.push({ x: x, y: y, dx: dx, dy: dy, owner: owner });
  }

  function throwGrenade() {
    if (grenadeCount <= 0) return;
    grenadeCount--;
    let dx = 0, dy = -3;
    if (pdir === 1) { dx = 3; dy = -1; }
    else if (pdir === 2) { dx = 0; dy = 3; }
    else if (pdir === 3) { dx = -3; dy = -1; }
    grenades.push({ x: px + SPH, y: py + SPH, dx: dx, dy: dy, z: 0, dz: 4, timer: 0 });
    note(0, "G4", 0.05);
  }

  // --- Collision helpers ---
  function boxCollide(ax, ay, aw, ah, bx, by, bw, bh) {
    return ax < bx + bw && ax + aw > bx && ay < by + bh && ay + ah > by;
  }

  // Circle-circle collision (for round objects like bullets, grenades)
  function circCollide(ax, ay, ar, bx, by, br) {
    const dx = ax - bx;
    const dy = ay - by;
    const dist = dx * dx + dy * dy;
    const radSum = ar + br;
    return dist < radSum * radSum;
  }

  // Circle-rect collision (bullet circle vs entity rect)
  function circRectCollide(cx, cy, cr, rx, ry, rw, rh) {
    const closestX = cx < rx ? rx : (cx > rx + rw ? rx + rw : cx);
    const closestY = cy < ry ? ry : (cy > ry + rh ? ry + rh : cy);
    const dx = cx - closestX;
    const dy = cy - closestY;
    return (dx * dx + dy * dy) < (cr * cr);
  }

  function generateSection() {
    const baseY = scrollY + H + 38;

    // Trees and bushes
    for (let i = 0; i < 4; i++) {
      let tx = flr(rnd(W - SP));
      if (rnd(1) < 0.4) tx = tx < 160 ? flr(rnd(60)) : W - 60 + flr(rnd(44));
      spawnObstacle(tx, baseY + flr(rnd(150)), 0);
    }

    // Sandbags / barricades
    if (rnd(1) < 0.5) {
      let bx = 50 + flr(rnd(190));
      for (let j = 0; j < 3; j++) {
        spawnObstacle(bx + j * 18, baseY + 60 + flr(rnd(30)), 3);
      }
    }

    // Trenches
    if (rnd(1) < 0.3) {
      let tx = 40 + flr(rnd(180));
      for (let j = 0; j < 5; j++) {
        spawnObstacle(tx + j * 17, baseY + 113, 4);
      }
    }

    // Enemies
    let numEnemies = 3 + flr(levelSection * 0.5);
    if (numEnemies > 10) numEnemies = 10;
    for (let i = 0; i < numEnemies; i++) {
      spawnEnemy(20 + flr(rnd(W - 40)), baseY + flr(rnd(188)), rnd(1) < 0.3 ? 1 : 0);
    }

    // Bunker
    if (rnd(1) < 0.35) {
      let bx = 40 + flr(rnd(W - 80));
      spawnObstacle(bx, baseY + 90, 1);
      spawnEnemy(bx - 24, baseY + 98, 0);
      spawnEnemy(bx + 24, baseY + 98, 0);
    }

    // Truck
    if (rnd(1) < 0.25) {
      let tx = 50 + flr(rnd(W - 100));
      spawnObstacle(tx, baseY + 45, 2);
      for (let i = 0; i < 3; i++) {
        spawnEnemy(tx + flr(rnd(30)) - 15, baseY + 60 + flr(rnd(15)), 0);
      }
    }

    // POW
    if (rnd(1) < 0.4) {
      spawnPOW(40 + flr(rnd(W - 80)), baseY + 75 + flr(rnd(75)));
    }

    // More ground details
    for (let i = 0; i < 10; i++) {
      groundDetails.push({
        x: flr(rnd(W)),
        wy: baseY + flr(rnd(225)),
        type: flr(rnd(3))
      });
    }

    // Grenade pickup
    if (rnd(1) < 0.3) {
      pows.push({ x: 33 + flr(rnd(W - 67)), y: baseY + 135, state: "ammo", timer: 0 });
    }

    sectionLength = 225;
    nextObstacleY = baseY + sectionLength;
  }

  function spawnBoss() {
    bossActive = true;
    boss = {
      x: 128, y: scrollY - 30,
      hp: 30, maxHp: 30,
      timer: 0, phase: 0,
      shootTimer: 0,
      vx: 1
    };
    scrollSpeed = 0;
  }

  // --- UPDATE ---
  function playUpdate() {
    // Scroll
    if (!bossActive) {
      scrollY += scrollSpeed;
    }

    // Check if it's time for a new section
    if (!bossActive && scrollY > nextObstacleY - H - 150) {
      levelSection++;
      generateSection();
      if (levelSection > 0 && levelSection % 5 === 0 && !bossActive) {
        spawnBoss();
      }
    }

    if (pDead) {
      pDeadTimer++;
      if (pDeadTimer > 60) {
        lives--;
        if (lives <= 0) {
          if (score > highScore) highScore = score;
          Mono.go(GAMEOVER); return;
        } else {
          pDead = false;
          pInvuln = 90;
          px = 152; py = 190;
          grenadeCount = 5;
        }
      }
    }

    if (!pDead) {
      // Player movement
      let mx = 0, my = 0;
      if (btn("left")) { mx = -2; pdir = 3; }
      if (btn("right")) { mx = 2; pdir = 1; }
      if (btn("up")) { my = -2; pdir = 0; }
      if (btn("down")) { my = 2; pdir = 2; }
      if (mx !== 0 && my !== 0) {
        mx = mx > 0 ? 1.4 : -1.4;
        my = my > 0 ? 1.4 : -1.4;
      }

      let npx = px + mx;
      let npy = py + my;

      // Bounds (16x16 player)
      if (npx < 2) npx = 2;
      if (npx > W - SP - 2) npx = W - SP - 2;
      if (npy < 18) npy = 18;
      if (npy > H - SP) npy = H - SP;

      // Obstacle collision (player hitbox is slightly inset: 12x14 centered)
      const phx = npx + 2, phy = npy + 1, phw = 12, phh = 14;
      let blocked = false;
      for (const ob of obstacles) {
        const osy = worldToScreen(ob.wy);
        if (ob.type === 0 || ob.type === 1 || ob.type === 2) {
          const obw = SP;
          const obh = ob.type === 2 ? 32 : SP;
          if (boxCollide(phx, phy, phw, phh, ob.x, osy, obw, obh)) {
            blocked = true;
          }
        }
      }
      if (!blocked) {
        px = npx;
        py = npy;
      }

      if (mx !== 0 || my !== 0) pWalkFrame++;

      // Shoot
      if (btnp("a")) {
        let bdx = 0, bdy = -5;
        if (pdir === 1) { bdx = 5; bdy = 0; }
        else if (pdir === 2) { bdx = 0; bdy = 5; }
        else if (pdir === 3) { bdx = -5; bdy = 0; }
        shoot(px + SPH, py + SPH, bdx, bdy, "p");
        note(0, "E5", 0.05);
      }

      // Grenade
      if (btnp("b")) {
        throwGrenade();
      }

      if (pInvuln > 0) pInvuln--;
    }

    // Bullet radius for circle collision
    const bulletR = 3;

    // Update bullets
    for (let i = bullets.length - 1; i >= 0; i--) {
      const b = bullets[i];
      b.x += b.dx;
      b.y += b.dy;
      // Off screen
      if (b.x < -16 || b.x > W + 16 || b.y < -16 || b.y > H + 16) {
        bullets.splice(i, 1);
        continue;
      }
      if (b.owner === "p") {
        // Hit enemies (circle bullet vs rect enemy)
        let hit = false;
        for (let j = enemies.length - 1; j >= 0; j--) {
          const e = enemies[j];
          const esy = worldToScreen(e.y);
          if (circRectCollide(b.x, b.y, bulletR, e.x, esy, SP, SP)) {
            e.hp--;
            if (e.hp <= 0) {
              addExplosion(e.x, esy);
              enemies.splice(j, 1);
              score += e.type === 1 ? 200 : 100;
            }
            hit = true;
            break;
          }
        }
        // Hit destructible obstacles (bunker, truck)
        if (!hit) {
          for (let j = obstacles.length - 1; j >= 0; j--) {
            const ob = obstacles[j];
            if (ob.type === 1 || ob.type === 2) {
              const osy = worldToScreen(ob.wy);
              const obh = ob.type === 2 ? 32 : SP;
              if (circRectCollide(b.x, b.y, bulletR, ob.x, osy, SP, obh)) {
                ob.hp--;
                if (ob.hp <= 0) {
                  addExplosion(ob.x, osy);
                  obstacles.splice(j, 1);
                  score += ob.type === 1 ? 500 : 300;
                }
                hit = true;
                break;
              }
            }
          }
        }
        // Hit boss (circle bullet vs rect boss 32x32)
        if (!hit && boss) {
          const bsy = worldToScreen(boss.y);
          if (circRectCollide(b.x, b.y, bulletR, boss.x, bsy, 32, 32)) {
            boss.hp--;
            hit = true;
            if (boss.hp <= 0) {
              addExplosion(boss.x, bsy);
              addExplosion(boss.x + SP, bsy + SPH);
              addExplosion(boss.x + SPH, bsy + SP);
              score += 2000;
              bossActive = false;
              bossDefeated = true;
              boss = null;
              scrollSpeed = 0.5;
            }
          }
        }
        if (hit) {
          bullets.splice(i, 1);
        }
      } else {
        // Enemy bullet hits player (circle bullet vs rect player hitbox)
        if (!pDead && pInvuln === 0) {
          if (circRectCollide(b.x, b.y, bulletR, px + 2, py + 1, 12, 14)) {
            addExplosion(px, py);
            pDead = true;
            pDeadTimer = 0;
            bullets.splice(i, 1);
          }
        }
      }
    }

    // Update grenades (circle collision for grenade blast radius)
    for (let i = grenades.length - 1; i >= 0; i--) {
      const g = grenades[i];
      g.x += g.dx;
      g.y += g.dy;
      g.z += g.dz;
      g.dz -= 0.3;
      g.timer++;
      if (g.z <= 0 && g.timer > 5) {
        // Explode
        addExplosion(g.x - SPH, g.y - SPH);
        addExplosion(g.x + SPH, g.y + SPH);
        const blastR = 28;
        // Damage enemies in radius (circle vs circle: enemy center vs blast center)
        for (let j = enemies.length - 1; j >= 0; j--) {
          const e = enemies[j];
          const esy = worldToScreen(e.y);
          const ecx = e.x + SPH, ecy = esy + SPH;
          if (circCollide(g.x, g.y, blastR, ecx, ecy, SPH)) {
            addExplosion(e.x, esy);
            enemies.splice(j, 1);
            score += 100;
          }
        }
        // Damage obstacles
        for (let j = obstacles.length - 1; j >= 0; j--) {
          const ob = obstacles[j];
          if (ob.type === 1 || ob.type === 2) {
            const osy = worldToScreen(ob.wy);
            const ocx = ob.x + SPH, ocy = osy + SPH;
            if (circCollide(g.x, g.y, blastR, ocx, ocy, SPH)) {
              ob.hp -= 3;
              if (ob.hp <= 0) {
                addExplosion(ob.x, osy);
                obstacles.splice(j, 1);
                score += ob.type === 1 ? 500 : 300;
              }
            }
          }
        }
        // Damage boss (circle vs rect)
        if (boss) {
          const bsy = worldToScreen(boss.y);
          if (circRectCollide(g.x, g.y, blastR, boss.x, bsy, 32, 32)) {
            boss.hp -= 5;
            if (boss.hp <= 0) {
              addExplosion(boss.x, bsy);
              addExplosion(boss.x + SP, bsy + SPH);
              score += 2000;
              bossActive = false;
              bossDefeated = true;
              boss = null;
              scrollSpeed = 0.5;
            }
          }
        }
        grenades.splice(i, 1);
        note(1, "C2", 0.15);
      }
    }

    // Update explosions
    for (let i = explosions.length - 1; i >= 0; i--) {
      explosions[i].timer++;
      if (explosions[i].timer > 16) explosions.splice(i, 1);
    }

    // Update enemies
    for (let i = enemies.length - 1; i >= 0; i--) {
      const e = enemies[i];
      const esy = worldToScreen(e.y);

      if (esy > H + 60) {
        enemies.splice(i, 1);
        continue;
      }

      e.timer++;

      if (esy < -20 || esy > H + 20) continue;

      // AI: move toward player
      e.moveTimer++;
      if (e.moveTimer > 30) {
        e.moveTimer = 0;
        const dx = (px + SPH) - (e.x + SPH);
        const dsy = (py + SPH) - (esy + SPH);
        const dist = Math.sqrt(dx * dx + dsy * dsy);
        if (dist > 48) {
          e.vx = (dx / dist) * 0.8;
          e.vy = (dsy / dist) * 0.8;
        } else {
          e.vx = rnd(2) - 1;
          e.vy = rnd(1) - 0.5;
        }
      }
      e.x += e.vx;
      e.y -= e.vy;

      if (e.x < 2) e.x = 2;
      if (e.x > W - SP - 2) e.x = W - SP - 2;

      // Shoot at player
      e.shootTimer--;
      if (e.shootTimer <= 0 && !pDead) {
        e.shootTimer = 40 + flr(rnd(40));
        const dx = (px + SPH) - (e.x + SPH);
        const dy = (py + SPH) - (esy + SPH);
        const dist = Math.sqrt(dx * dx + dy * dy);
        if (dist > 0 && dist < 150) {
          shoot(e.x + SPH, esy + SPH, (dx / dist) * 3, (dy / dist) * 3, "e");
        }
      }

      // Collide with player (rect vs rect)
      if (!pDead && pInvuln === 0 && boxCollide(px + 2, py + 1, 12, 14, e.x + 2, esy + 1, 12, 14)) {
        addExplosion(px, py);
        addExplosion(e.x, esy);
        pDead = true;
        pDeadTimer = 0;
        enemies.splice(i, 1);
        score += 100;
      }
    }

    // Update POWs
    for (let i = pows.length - 1; i >= 0; i--) {
      const p = pows[i];
      const psy = worldToScreen(p.y);

      if (psy > H + 40) {
        pows.splice(i, 1);
        continue;
      }

      if (p.state === "waiting" || p.state === "ammo") {
        if (!pDead && boxCollide(px + 2, py + 1, 12, 14, p.x, psy, SP, SP)) {
          if (p.state === "ammo") {
            grenadeCount = min(grenadeCount + 3, 9);
            note(0, "A5", 0.1);
            pows.splice(i, 1);
          } else {
            p.state = "freed";
            p.timer = 0;
            score += 1000;
            note(0, "G5", 0.1);
            setTimeout(() => note(0, "A5", 0.1), 80);
          }
        }
      } else if (p.state === "freed") {
        p.timer++;
        p.y -= 1.5;
        if (p.timer > 60) pows.splice(i, 1);
      }
    }

    // Update boss
    if (boss) {
      boss.timer++;
      const bsy = worldToScreen(boss.y);

      if (bsy < 23) {
        boss.y -= 0.5;
      } else {
        boss.x += boss.vx;
        if (boss.x < 20 || boss.x > W - 52) boss.vx = -boss.vx;

        boss.shootTimer++;
        if (boss.shootTimer > 15) {
          boss.shootTimer = 0;
          const sby = worldToScreen(boss.y);
          shoot(boss.x + SP, sby + 32, 0, 3, "e");
          if (boss.timer % 60 < 30) {
            shoot(boss.x + SP, sby + 32, -1.5, 2.5, "e");
            shoot(boss.x + SP, sby + 32, 1.5, 2.5, "e");
          }
          note(1, "D3", 0.04);
        }
      }
    }

    // Gradually speed up
    if (!bossActive && scrollSpeed < 1.0) {
      scrollSpeed += 0.0001;
    }
  }

  // --- Title draw ---
  function drawTitle() {
    cls(0);

    // Animated background
    for (let i = 0; i < 30; i++) {
      const yy = (titleAnim * 0.5 + i * 23) % H;
      const xx = (i * 37 + flr(sin(titleAnim * 0.02 + i) * 10)) % W;
      pix(xx, yy, 1);
    }

    // Title
    const tx = 100;
    rectf(tx - 6, 50, 132, 30, 0);
    rect(tx - 6, 50, 132, 30, 2);
    text("COMMANDO", tx, 57, 3);
    text("MONO EDITION", tx + 10, 68, 1);

    // Soldier graphic
    sprT(1, 152, 95);
    sprT(10, 152, 78);

    text("PRESS START", 115, 128, 2);

    text("ARROWS - MOVE", 110, 155, 1);
    text("Z - SHOOT", 125, 165, 1);
    text("X - GRENADE", 120, 175, 1);

    if (highScore > 0) {
      text("HIGH SCORE " + highScore, 100, 200, 2);
    }

    text("2026 MONO", 130, 228, 1);
  }

  // --- Game Over draw ---
  function drawGameOver() {
    cls(0);
    text("GAME OVER", 120, 95, 3);
    text("SCORE " + score, 120, 115, 2);
    if (score >= highScore && score > 0) {
      text("NEW HIGH SCORE!", 100, 130, 3);
    }
    if (gameOverTimer > 90) {
      text("PRESS START", 115, 158, (flr(gameOverTimer / 15) % 2 === 0) ? 2 : 0);
    }
  }

  // --- PLAY DRAW ---
  function playDraw() {
    cls(0);

    // Draw ground details
    for (const gd of groundDetails) {
      const sy = worldToScreen(gd.wy);
      if (sy < -4 || sy > H + 4) continue;
      if (gd.type === 0) {
        pix(gd.x, sy, 1);
        pix(gd.x + 1, sy, 1);
      } else if (gd.type === 1) {
        pix(gd.x, sy, 1);
        pix(gd.x, sy - 1, 1);
        pix(gd.x + 1, sy, 1);
      } else {
        pix(gd.x, sy, 1);
        pix(gd.x - 1, sy, 1);
        pix(gd.x + 1, sy, 1);
        pix(gd.x, sy - 1, 1);
      }
    }

    // Draw obstacles
    for (const ob of obstacles) {
      const osy = worldToScreen(ob.wy);
      if (osy < -32 || osy > H + 16) continue;
      if (ob.type === 0) {
        sprT(60, ob.x, osy); // tree
        dbg(ob.x, osy, SP, SP);
      } else if (ob.type === 1) {
        sprT(30, ob.x, osy); // bunker
        dbg(ob.x, osy, SP, SP);
      } else if (ob.type === 2) {
        sprT(31, ob.x, osy);       // truck top
        sprT(32, ob.x, osy + SP);  // truck bottom
        dbg(ob.x, osy, SP, 32);
      } else if (ob.type === 3) {
        sprT(61, ob.x, osy); // sandbag
      } else if (ob.type === 4) {
        sprT(62, ob.x, osy); // trench
      }
    }

    // Draw POWs
    for (const p of pows) {
      const psy = worldToScreen(p.y);
      if (psy < -SP || psy > H + SP) continue;
      if (p.state === "ammo") {
        if (flr(Mono.frame / 8) % 2 === 0) {
          sprT(81, p.x, psy);
        }
        dbg(p.x, psy, SP, SP);
      } else if (p.state === "waiting") {
        sprT(40, p.x, psy);
        if (flr(Mono.frame / 15) % 2 === 0) {
          text("!", p.x + 4, psy - 10, 3);
        }
        dbg(p.x, psy, SP, SP);
      } else if (p.state === "freed") {
        sprT(41, p.x, psy);
        text("+1000", p.x - 4, psy - 12, 3);
      }
    }

    // Draw enemies
    for (const e of enemies) {
      const esy = worldToScreen(e.y);
      if (esy < -SP || esy > H + SP) continue;
      const sid = (flr(e.timer / 8) % 2 === 0) ? 20 : 21;
      sprT(sid, e.x, esy);
      if (e.type === 1) {
        pix(e.x + 6, esy, 3);
        pix(e.x + 7, esy, 3);
        pix(e.x + 8, esy, 3);
        pix(e.x + 9, esy, 3);
      }
      // Debug: enemy hitbox (inset rect for contact collision)
      dbg(e.x + 2, esy + 1, 12, 14);
    }

    // Draw boss
    if (boss) {
      const bsy = worldToScreen(boss.y);
      sprT(70, boss.x, bsy);
      sprT(71, boss.x + SP, bsy);
      sprT(72, boss.x, bsy + SP);
      sprT(73, boss.x + SP, bsy + SP);
      // HP bar
      const barW = 32;
      const hpRatio = boss.hp / boss.maxHp;
      rectf(boss.x, bsy - 6, barW, 3, 1);
      rectf(boss.x, bsy - 6, flr(barW * hpRatio), 3, 3);
      // Debug: boss hitbox
      dbg(boss.x, bsy, 32, 32);
    }

    // Draw player
    if (!pDead) {
      if (pInvuln > 0 && flr(pInvuln / 3) % 2 === 0) {
        // flicker - don't draw
      } else {
        let psid = 1;
        if (pdir === 1) psid = 3;
        else if (pdir === 2) psid = 2;
        else if (pdir === 3) psid = 4;
        sprT(psid, px, py);
      }
      // Debug: player hitbox
      dbg(px + 2, py + 1, 12, 14);
    }

    // Draw bullets
    for (const b of bullets) {
      if (b.owner === "p") {
        if (_abs(b.dy) > _abs(b.dx)) {
          sprT(b.dy < 0 ? 10 : 11, b.x - SPH, b.y - SPH);
        } else {
          sprT(b.dx > 0 ? 12 : 13, b.x - SPH, b.y - SPH);
        }
      } else {
        // Enemy bullet: small dot
        circf(flr(b.x), flr(b.y), 2, 3);
      }
      // Debug: bullet circle
      dbgC(b.x, b.y, 3);
    }

    // Draw grenades
    for (const g of grenades) {
      const gz = g.z > 0 ? g.z : 0;
      sprT(50, g.x - SPH, g.y - SPH - gz);
      pix(flr(g.x), flr(g.y + 2), 1); // shadow
      // Debug: grenade circle
      dbgC(g.x, g.y, 4);
    }

    // Draw explosions
    for (const ex of explosions) {
      const t = ex.timer;
      let sid;
      if (t < 4) sid = 51;
      else if (t < 8) sid = 52;
      else if (t < 12) sid = 53;
      else sid = 54;
      sprT(sid, ex.x, ex.y);
    }

    // --- HUD ---
    rectf(0, 0, W, 15, 0);
    line(0, 15, W, 15, 1);

    // Score (left side)
    text("SCORE " + score, 3, 4, 3);

    // Lives (capped display to prevent overflow; max 5 icons shown)
    const maxLivesShown = min(lives, 5);
    for (let i = 0; i < maxLivesShown; i++) {
      sprT(80, 110 + i * 18, 0);
    }
    if (lives > 5) {
      text("+" + (lives - 5), 110 + 5 * 18, 4, 2);
    }

    // Grenades
    text("G", 210, 4, 2);
    text("" + grenadeCount, 220, 4, 3);

    // Section/area (right side, ensure fits within 320)
    const areaStr = "AREA " + (levelSection + 1);
    text(areaStr, 260, 4, 1);

    // High score omitted from HUD to save space; shown on title/gameover only

    // Boss warning
    if (bossActive && boss && flr(Mono.frame / 10) % 2 === 0) {
      text("WARNING - BOSS!", 95, 22, 3);
    }
  }

  // --- Scenes ---
  Mono.scene(TITLE, {
    init() { titleAnim = 0; },
    update() {
      titleAnim++;
      if (btnp("a")) {
        note(0, "C5", 0.1);
        Mono.go(PLAY); return;
      }
    },
    draw() { drawTitle(); }
  });

  Mono.scene(GAMEOVER, {
    init() { gameOverTimer = 0; },
    update() {
      gameOverTimer++;
      if (gameOverTimer > 90 && btnp("a") || btnp("start")) { Mono.go(TITLE); return; }
    },
    draw() { drawGameOver(); }
  });

  Mono.scene(PLAY, {
    init() { resetGame(); },
    update() { playUpdate(); },
    draw() { playDraw(); }
  });

  Mono.go(TITLE);
  Mono.boot("screen");
})();
</script>
</body>
