<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mono — Demo: Pinball</title>
<link rel="stylesheet" href="../../runtime/mono.css">
</head>
<body>
<div id="frame">
  <canvas id="screen"></canvas>
</div>
<div id="controls">
  <span>&larr;/Z</span> L-FLIP &nbsp;&nbsp; <span>&rarr;/X</span> R-FLIP &nbsp;&nbsp; <span>&darr;</span> PLUNGER
</div>
<script src="../../runtime/engine.js"></script>
<script>
(() => {
  "use strict";
  const W = Mono.WIDTH, H = Mono.HEIGHT; // 320x240
  const { cls, pix, line, rect, rectf, circ, circf, sprite: defSprite,
          spr, sprT, text, btn, btnp, note, stop, rnd, flr, abs: _abs,
          min, max: _max, sin, cos, dbg, dbgC } = Mono;

  // --- 8->16 upscale helper ---
  function up(d) {
    let o = "";
    for (let r = 0; r < 8; r++) {
      let row = "";
      for (let c = 0; c < 8; c++) { const ch = d[r * 8 + c]; row += ch + ch; }
      o += row + row;
    }
    return o;
  }

  // --- Sprites (8x8 source, upscaled to 16x16) ---

  // Ball sprite (shiny chrome ball)
  defSprite(1, up(
    "00330000" +
    "03333000" +
    "33333300" +
    "33233300" +
    "33333300" +
    "03333000" +
    "00330000" +
    "00000000"
  ));

  // Bumper sprite (round bumper, idle)
  defSprite(2, up(
    "00222000" +
    "02332200" +
    "23322320" +
    "23312320" +
    "23322320" +
    "02332200" +
    "00222000" +
    "00000000"
  ));

  // Bumper sprite (hit flash)
  defSprite(3, up(
    "00333000" +
    "03333300" +
    "33333330" +
    "33313330" +
    "33333330" +
    "03333300" +
    "00333000" +
    "00000000"
  ));

  // Target unlit
  defSprite(4, up(
    "00000000" +
    "01111100" +
    "01222100" +
    "01222100" +
    "01222100" +
    "01111100" +
    "00000000" +
    "00000000"
  ));

  // Target lit
  defSprite(5, up(
    "00000000" +
    "02222200" +
    "02333200" +
    "02333200" +
    "02333200" +
    "02222200" +
    "00000000" +
    "00000000"
  ));

  // Flipper base pivot
  defSprite(6, up(
    "00000000" +
    "00330000" +
    "03333000" +
    "03333000" +
    "00330000" +
    "00000000" +
    "00000000" +
    "00000000"
  ));

  // Plunger head
  defSprite(7, up(
    "00000000" +
    "00000000" +
    "01333100" +
    "13333310" +
    "13323310" +
    "01333100" +
    "00000000" +
    "00000000"
  ));

  // Slingshot marker
  defSprite(8, up(
    "00000000" +
    "00200000" +
    "02220000" +
    "22222000" +
    "02220000" +
    "00200000" +
    "00000000" +
    "00000000"
  ));

  // --- Table layout constants ---
  const TBL_X = 93;
  const TBL_Y = 8;
  const TBL_W = 133;
  const TBL_H = 225;
  const TBL_R = TBL_X + TBL_W;
  const TBL_B = TBL_Y + TBL_H;

  // Plunger lane
  const LANE_W = 13;
  const LANE_X = TBL_R - LANE_W;

  // Flipper geometry
  const FLIP_LEN = 20;
  const FLIP_Y = TBL_B - 30;
  const FLIP_LX = TBL_X + 23;
  const FLIP_RX = LANE_X - 23;
  const FLIP_MAX_ANG = 0.55;

  // Drain
  const DRAIN_Y = TBL_B - 8;

  // --- Game objects ---
  const { TITLE, PLAY, GAMEOVER } = Mono.SCENE;
  let ball, balls, score, highScore, ballSaved;
  let leftFlipAng, rightFlipAng;
  let plungerPow, plungerHeld;
  let bumpers, targets, allTargetsLit;
  let multiball, multiballs;
  let tiltCount, tiltTimer, tilted, tiltCooldown;
  let particles;
  let bonusTimer, bonusText;
  let shakeTimer, shakeX, shakeY;
  let titleBlink;

  highScore = 0;

  // Bumper definitions
  function makeBumpers() {
    return [
      { x: TBL_X + 40,  y: TBL_Y + 60,  r: 8, hit: 0 },
      { x: TBL_X + 67,  y: TBL_Y + 45,  r: 8, hit: 0 },
      { x: TBL_X + 93,  y: TBL_Y + 64,  r: 8, hit: 0 },
      { x: TBL_X + 53,  y: TBL_Y + 98,  r: 7, hit: 0 },
      { x: TBL_X + 80,  y: TBL_Y + 90,  r: 7, hit: 0 },
    ];
  }

  // Target definitions (rectangular)
  function makeTargets() {
    return [
      { x: TBL_X + 20,  y: TBL_Y + 38,  w: 4, h: 12, lit: false },
      { x: TBL_X + 20,  y: TBL_Y + 53,  w: 4, h: 12, lit: false },
      { x: TBL_X + 20,  y: TBL_Y + 68,  w: 4, h: 12, lit: false },
      { x: TBL_X + 103, y: TBL_Y + 38,  w: 4, h: 12, lit: false },
      { x: TBL_X + 103, y: TBL_Y + 53,  w: 4, h: 12, lit: false },
      { x: TBL_X + 103, y: TBL_Y + 68,  w: 4, h: 12, lit: false },
    ];
  }

  function resetGame() {
    score = 0;
    balls = 3;
    bumpers = makeBumpers();
    targets = makeTargets();
    allTargetsLit = false;
    multiball = false;
    multiballs = [];
    tiltCount = 0;
    tiltTimer = 0;
    tilted = false;
    tiltCooldown = 0;
    particles = [];
    bonusTimer = 0;
    bonusText = "";
    shakeTimer = 0;
    shakeX = 0;
    shakeY = 0;
    leftFlipAng = 0;
    rightFlipAng = 0;
    plungerPow = 0;
    plungerHeld = false;
    ballSaved = true;
    spawnBall();
  }

  function spawnBall() {
    ball = {
      x: LANE_X + LANE_W / 2,
      y: TBL_B - 23,
      vx: 0,
      vy: 0,
      launched: false,
      r: 3
    };
    plungerPow = 0;
    tilted = false;
  }

  function addParticle(x, y, c) {
    particles.push({
      x: x, y: y,
      vx: rnd(4) - 2, vy: rnd(4) - 2,
      life: 8 + flr(rnd(8)), color: c
    });
  }

  function showBonus(txt) {
    bonusText = txt;
    bonusTimer = 60;
  }

  function shake(t) { shakeTimer = t; }

  // --- Sound effects ---
  function sndBumper() { note(0, "E5", 0.04); note(1, "G5", 0.03); }
  function sndFlipper() { note(0, "C4", 0.02); }
  function sndTarget() { note(0, "A5", 0.05); note(1, "C6", 0.04); }
  function sndLaunch() { note(0, "C3", 0.08); }
  function sndDrain() { note(0, "C3", 0.15); note(1, "G2", 0.2); }
  function sndMultiball() {
    note(0, "C5", 0.08);
    setTimeout(() => note(0, "E5", 0.08), 80);
    setTimeout(() => note(0, "G5", 0.08), 160);
    setTimeout(() => note(0, "C6", 0.12), 240);
  }
  function sndTilt() { note(0, "A2", 0.3); note(1, "A2", 0.3); }
  function sndBallSave() { note(0, "G4", 0.06); note(1, "C5", 0.08); }
  function sndRamp() {
    note(0, "E5", 0.05);
    setTimeout(() => note(0, "G5", 0.05), 50);
    setTimeout(() => note(0, "B5", 0.08), 100);
  }

  // --- Physics helpers ---
  function dist(ax, ay, bx, by) {
    const dx = ax - bx, dy = ay - by;
    return Math.sqrt(dx * dx + dy * dy);
  }

  function reflectBallOffBumper(b, bmp) {
    const dx = b.x - bmp.x;
    const dy = b.y - bmp.y;
    const d = Math.sqrt(dx * dx + dy * dy);
    if (d === 0) return;
    const nx = dx / d, ny = dy / d;
    b.x = bmp.x + nx * (bmp.r + b.r + 1);
    b.y = bmp.y + ny * (bmp.r + b.r + 1);
    const dot = b.vx * nx + b.vy * ny;
    b.vx = b.vx - 2 * dot * nx + nx * 2.5;
    b.vy = b.vy - 2 * dot * ny + ny * 2.5;
    const spd = Math.sqrt(b.vx * b.vx + b.vy * b.vy);
    if (spd > 10) { b.vx = b.vx / spd * 10; b.vy = b.vy / spd * 10; }
  }

  function flipperTip(baseX, baseY, ang, side) {
    const restAng = side === -1 ? 0.4 : Math.PI - 0.4;
    const flipAng = restAng + side * ang;
    return {
      x: baseX + Math.cos(flipAng) * FLIP_LEN,
      y: baseY - Math.sin(flipAng) * FLIP_LEN
    };
  }

  function pointToSegDist(px, py, ax, ay, bx, by) {
    const dx = bx - ax, dy = by - ay;
    const len2 = dx * dx + dy * dy;
    if (len2 === 0) return dist(px, py, ax, ay);
    let t = ((px - ax) * dx + (py - ay) * dy) / len2;
    t = _max(0, min(1, t));
    const cx = ax + t * dx, cy = ay + t * dy;
    return { d: dist(px, py, cx, cy), cx: cx, cy: cy, t: t };
  }

  // --- Ramp zone ---
  const RAMP_X = TBL_X + 40;
  const RAMP_W = 40;
  const RAMP_Y = TBL_Y + 11;
  const RAMP_H = 9;

  function checkRamp(b) {
    if (b.x > RAMP_X && b.x < RAMP_X + RAMP_W && b.y < RAMP_Y + RAMP_H && b.y > RAMP_Y && b.vy < -1) {
      score += 500;
      showBonus("RAMP BONUS 500!");
      sndRamp();
      shake(6);
      b.vy = 4;
      b.vx = (rnd(4) - 2);
      for (let i = 0; i < 10; i++) addParticle(b.x, b.y, 3);
      return true;
    }
    return false;
  }

  // --- Circle-circle collision test ---
  function circleCollide(ax, ay, ar, bx, by, br) {
    const dx = ax - bx, dy = ay - by;
    const d2 = dx * dx + dy * dy;
    const rr = ar + br;
    return d2 < rr * rr;
  }

  // --- Update ball physics ---
  function updateBall(b) {
    if (!b.launched) return;

    const GRAVITY = 0.12;
    const FRICTION = 0.999;

    b.vy += GRAVITY;
    b.vx *= FRICTION;
    b.vy *= FRICTION;

    b.x += b.vx;
    b.y += b.vy;

    // Debug: ball circle hitbox
    dbgC(b.x, b.y, b.r);

    // Wall collisions (left)
    if (b.x - b.r < TBL_X) {
      b.x = TBL_X + b.r;
      b.vx = _abs(b.vx) * 0.8;
    }
    // Right wall (not in plunger lane area when ball is low)
    const inLane = b.x > LANE_X - 5 && b.y > TBL_Y + 38;
    if (!inLane && b.x + b.r > LANE_X) {
      b.x = LANE_X - b.r;
      b.vx = -_abs(b.vx) * 0.8;
    }
    // Plunger lane right wall
    if (b.x + b.r > TBL_R) {
      b.x = TBL_R - b.r;
      b.vx = -_abs(b.vx) * 0.8;
    }
    // Plunger lane left wall (only when in lane area)
    if (inLane && b.x - b.r < LANE_X && b.y > FLIP_Y - 8) {
      b.x = LANE_X + b.r;
      b.vx = _abs(b.vx) * 0.8;
    }

    // Top wall
    if (b.y - b.r < TBL_Y) {
      b.y = TBL_Y + b.r;
      b.vy = _abs(b.vy) * 0.6;
    }

    // Curved top arch - circle collision against corner arcs
    const archR = 20;
    // Top-left corner arc
    const tlcx = TBL_X + archR, tlcy = TBL_Y + archR;
    if (b.x < tlcx && b.y < tlcy) {
      const d = dist(b.x, b.y, tlcx, tlcy);
      if (d > archR - b.r) {
        const nx = (b.x - tlcx) / d, ny = (b.y - tlcy) / d;
        b.x = tlcx + nx * (archR - b.r - 1);
        b.y = tlcy + ny * (archR - b.r - 1);
        const dot = b.vx * nx + b.vy * ny;
        if (dot < 0) {
          b.vx -= 1.6 * dot * nx;
          b.vy -= 1.6 * dot * ny;
        }
      }
    }
    // Top-right corner arc
    const trcx = LANE_X - archR, trcy = TBL_Y + archR;
    if (b.x > trcx && b.y < trcy && b.x < LANE_X) {
      const d = dist(b.x, b.y, trcx, trcy);
      if (d > archR - b.r) {
        const nx = (b.x - trcx) / d, ny = (b.y - trcy) / d;
        b.x = trcx + nx * (archR - b.r - 1);
        b.y = trcy + ny * (archR - b.r - 1);
        const dot = b.vx * nx + b.vy * ny;
        if (dot < 0) {
          b.vx -= 1.6 * dot * nx;
          b.vy -= 1.6 * dot * ny;
        }
      }
    }

    // Bumper collisions (circle-circle)
    for (const bmp of bumpers) {
      if (circleCollide(b.x, b.y, b.r, bmp.x, bmp.y, bmp.r)) {
        reflectBallOffBumper(b, bmp);
        bmp.hit = 8;
        score += 100;
        sndBumper();
        shake(3);
        for (let i = 0; i < 5; i++) addParticle(b.x, b.y, 3);
      }
      // Debug: bumper circle hitbox
      dbgC(bmp.x, bmp.y, bmp.r);
    }

    // Target collisions (circle-rect)
    for (const tgt of targets) {
      // Debug: target rect hitbox
      dbg(tgt.x, tgt.y, tgt.w, tgt.h);

      if (!tgt.lit) {
        // Circle vs AABB collision
        const closestX = _max(tgt.x, min(b.x, tgt.x + tgt.w));
        const closestY = _max(tgt.y, min(b.y, tgt.y + tgt.h));
        const dx = b.x - closestX, dy = b.y - closestY;
        if (dx * dx + dy * dy < b.r * b.r) {
          tgt.lit = true;
          score += 200;
          sndTarget();
          const tcx = tgt.x + tgt.w / 2;
          const tcy = tgt.y + tgt.h / 2;
          const ddx = b.x - tcx, ddy = b.y - tcy;
          const dd = Math.sqrt(ddx * ddx + ddy * ddy) || 1;
          b.vx += (ddx / dd) * 3;
          b.vy += (ddy / dd) * 3;
          for (let i = 0; i < 5; i++) addParticle(tcx, tcy, 2);
          if (!allTargetsLit && targets.every(t => t.lit)) {
            allTargetsLit = true;
            triggerMultiball();
          }
        }
      }
    }

    // Ramp (debug rect hitbox)
    dbg(RAMP_X, RAMP_Y, RAMP_W, RAMP_H);
    checkRamp(b);

    // Flipper collisions
    if (!tilted) {
      collideFlipperBall(b, FLIP_LX, FLIP_Y, leftFlipAng, -1, btn("left") || btn("a"));
      collideFlipperBall(b, FLIP_RX, FLIP_Y, rightFlipAng, 1, btn("right") || btn("b"));
    }

    // Slingshot triangles (above flippers)
    const slingLX = TBL_X + 10, slingLY = FLIP_Y - 23;
    const slingRX = LANE_X - 10, slingRY = FLIP_Y - 23;
    // Left slingshot
    if (b.x < slingLX + 10 && b.y > slingLY && b.y < slingLY + 30 && b.x > TBL_X) {
      const d = b.x - (TBL_X + 5);
      if (d < b.r + 5) {
        b.vx = 3 + rnd(2);
        b.vy = -2;
        score += 50;
        sndBumper();
        shake(2);
      }
    }
    // Right slingshot
    if (b.x > slingRX - 10 && b.y > slingRY && b.y < slingRY + 30 && b.x < LANE_X) {
      const d = (LANE_X - 5) - b.x;
      if (d < b.r + 5) {
        b.vx = -3 - rnd(2);
        b.vy = -2;
        score += 50;
        sndBumper();
        shake(2);
      }
    }

    // Debug: slingshot zones
    dbg(TBL_X, slingLY, slingLX + 10 - TBL_X, 30);
    dbg(slingRX - 10, slingRY, LANE_X - (slingRX - 10), 30);

    // Speed cap
    const spd = Math.sqrt(b.vx * b.vx + b.vy * b.vy);
    if (spd > 12) { b.vx = b.vx / spd * 12; b.vy = b.vy / spd * 12; }
  }

  function collideFlipperBall(b, baseX, baseY, ang, side, active) {
    const tip = flipperTip(baseX, baseY, ang, side);
    const seg = pointToSegDist(b.x, b.y, baseX, baseY, tip.x, tip.y);

    // Debug: flipper pivot and tip
    dbgC(baseX, baseY, 3);
    dbgC(tip.x, tip.y, 2);

    if (seg.d < b.r + 3) {
      const nx = (b.x - seg.cx), ny = (b.y - seg.cy);
      const nd = Math.sqrt(nx * nx + ny * ny) || 1;
      b.x = seg.cx + (nx / nd) * (b.r + 4);
      b.y = seg.cy + (ny / nd) * (b.r + 4);
      if (active) {
        const power = 6 + ang * 4;
        b.vy = -power;
        b.vx += side * (2 + seg.t * 3);
        sndFlipper();
      } else {
        const dot = b.vx * (nx / nd) + b.vy * (ny / nd);
        if (dot < 0) {
          b.vx -= 1.5 * dot * (nx / nd);
          b.vy -= 1.5 * dot * (ny / nd);
        }
      }
    }
  }

  function triggerMultiball() {
    multiball = true;
    showBonus("MULTIBALL!");
    sndMultiball();
    shake(10);
    for (let i = 0; i < 2; i++) {
      multiballs.push({
        x: TBL_X + 40 + rnd(40),
        y: TBL_Y + 38,
        vx: rnd(4) - 2,
        vy: 2 + rnd(2),
        launched: true,
        r: 3
      });
    }
  }

  function drainBall() {
    if (ballSaved) {
      ballSaved = false;
      showBonus("BALL SAVED!");
      sndBallSave();
      ball.x = TBL_X + TBL_W / 2;
      ball.y = FLIP_Y - 23;
      ball.vx = rnd(2) - 1;
      ball.vy = -4;
      return;
    }
    balls--;
    sndDrain();
    shake(8);
    if (balls <= 0) {
      if (score > highScore) highScore = score;
      Mono.go(GAMEOVER); return;
    } else {
      spawnBall();
    }
  }

  // --- Tilt detection ---
  function checkTilt() {
    if (tilted) return;
    if (btnp("left") || btnp("a") || btnp("right") || btnp("b")) {
      tiltCount++;
      tiltTimer = 20;
    }
    if (tiltTimer > 0) {
      tiltTimer--;
    } else {
      tiltCount = 0;
    }
    if (tiltCount >= 8) {
      tilted = true;
      tiltCooldown = 90;
      sndTilt();
      showBonus("TILT!");
    }
  }

  // --- Title Scene ---
  Mono.scene(TITLE, {
    init() { titleBlink = true; },
    update() {
      titleBlink = (Mono.frame % 40) < 25;
      if (btnp("a")) {
        resetGame();
        Mono.go(PLAY); return;
      }
    },
    draw() {
      cls(0);
      rect(13, 15, W - 26, H - 30, 1);
      rect(16, 18, W - 32, H - 36, 1);
      text("MONO PINBALL", W / 2 - 75, 40, 3);
      // Decorative ball
      sprT(1, W / 2 - 8, 78);
      // Decorative bumpers
      for (let i = 0; i < 3; i++) {
        const bx = W / 2 - 40 + i * 40;
        const by = 72 + flr(sin(Mono.frame * 0.08 + i * 2) * 4);
        sprT((Mono.frame + i * 10) % 20 < 10 ? 3 : 2, bx - 8, by - 8);
      }
      if (titleBlink) {
        text("PRESS START", W / 2 - 98, 150, 3);
      }
      text("LEFT/A = LEFT FLIPPER", W / 2 - 103, 172, 2);
      text("RIGHT/B = RIGHT FLIPPER", W / 2 - 112, 184, 2);
      text("DOWN = PLUNGER", W / 2 - 68, 196, 2);
      text("HIT ALL TARGETS FOR MULTIBALL", W / 2 - 143, 214, 1);
    }
  });

  // --- Play Scene ---
  Mono.scene(PLAY, {
    init() { resetGame(); },
    update() {
      // Tilt cooldown
      if (tilted) {
        tiltCooldown--;
        if (tiltCooldown <= 0) tilted = false;
      }

      // Flippers
      if (!tilted) {
        const flipSpeed = 0.15;
        if (btn("left") || btn("a")) {
          leftFlipAng = min(leftFlipAng + flipSpeed, FLIP_MAX_ANG);
        } else {
          leftFlipAng = _max(leftFlipAng - flipSpeed * 0.7, 0);
        }
        if (btn("right") || btn("b")) {
          rightFlipAng = min(rightFlipAng + flipSpeed, FLIP_MAX_ANG);
        } else {
          rightFlipAng = _max(rightFlipAng - flipSpeed * 0.7, 0);
        }
      } else {
        leftFlipAng = _max(leftFlipAng - 0.05, 0);
        rightFlipAng = _max(rightFlipAng - 0.05, 0);
      }

      // Plunger
      if (!ball.launched) {
        if (btn("down")) {
          plungerPow = min(plungerPow + 0.8, 30);
          plungerHeld = true;
        } else if (plungerHeld) {
          ball.vy = -plungerPow * 0.35;
          ball.vx = -0.5;
          ball.launched = true;
          plungerHeld = false;
          sndLaunch();
        }
      }

      // Tilt check
      checkTilt();

      // Update main ball
      if (ball.launched) {
        updateBall(ball);
        if (ball.y > DRAIN_Y + 10) {
          if (multiball && multiballs.length > 0) {
            const mb = multiballs.pop();
            ball.x = mb.x; ball.y = mb.y;
            ball.vx = mb.vx; ball.vy = mb.vy;
            ball.launched = true;
          } else {
            multiball = false;
            drainBall();
          }
        }
      }

      // Update multiball extra balls
      for (let i = multiballs.length - 1; i >= 0; i--) {
        updateBall(multiballs[i]);
        if (multiballs[i].y > DRAIN_Y + 10) {
          multiballs.splice(i, 1);
        }
      }
      if (multiballs.length === 0 && multiball) {
        multiball = false;
        allTargetsLit = false;
        for (const t of targets) t.lit = false;
      }

      // Bumper hit flash decay
      for (const bmp of bumpers) if (bmp.hit > 0) bmp.hit--;

      // Particles
      for (let i = particles.length - 1; i >= 0; i--) {
        const p = particles[i];
        p.x += p.vx; p.y += p.vy;
        p.vy += 0.1;
        p.life--;
        if (p.life <= 0) particles.splice(i, 1);
      }

      // Bonus text timer
      if (bonusTimer > 0) bonusTimer--;

      // Shake
      if (shakeTimer > 0) {
        shakeTimer--;
        shakeX = flr(rnd(5)) - 2;
        shakeY = flr(rnd(5)) - 2;
      } else {
        shakeX = 0; shakeY = 0;
      }
    },
    draw() {
      cls(0);
      const ox = shakeX, oy = shakeY;

      // Table background and border
      rectf(TBL_X + ox, TBL_Y + oy, TBL_W, TBL_H, 0);
      rect(TBL_X + ox, TBL_Y + oy, TBL_W, TBL_H, 1);
      rect(TBL_X + 3 + ox, TBL_Y + 3 + oy, TBL_W - 6, TBL_H - 6, 1);

      // Plunger lane
      line(LANE_X + ox, TBL_Y + 30 + oy, LANE_X + ox, TBL_B + oy, 1);

      // Top arches
      const archR = 20;
      for (let a = 0; a < Math.PI / 2; a += 0.15) {
        const x1 = TBL_X + archR - Math.cos(a) * archR + ox;
        const y1 = TBL_Y + archR - Math.sin(a) * archR + oy;
        const x2 = TBL_X + archR - Math.cos(a + 0.15) * archR + ox;
        const y2 = TBL_Y + archR - Math.sin(a + 0.15) * archR + oy;
        line(x1, y1, x2, y2, 1);
      }
      for (let a = 0; a < Math.PI / 2; a += 0.15) {
        const x1 = LANE_X - archR + Math.cos(a) * archR + ox;
        const y1 = TBL_Y + archR - Math.sin(a) * archR + oy;
        const x2 = LANE_X - archR + Math.cos(a + 0.15) * archR + ox;
        const y2 = TBL_Y + archR - Math.sin(a + 0.15) * archR + oy;
        line(x1, y1, x2, y2, 1);
      }

      // Ramp
      rectf(RAMP_X + ox, RAMP_Y + oy, RAMP_W, RAMP_H, 0);
      rect(RAMP_X + ox, RAMP_Y + oy, RAMP_W, RAMP_H, 2);
      text("RAMP", RAMP_X + 10 + ox, RAMP_Y + 2 + oy, 2);

      // Slingshots - draw sprite markers at triangle centers
      const sly = FLIP_Y - 26;
      line(TBL_X + 5 + ox, sly + oy, TBL_X + 5 + ox, sly + 30 + oy, 2);
      line(TBL_X + 5 + ox, sly + oy, TBL_X + 17 + ox, sly + 15 + oy, 2);
      line(TBL_X + 17 + ox, sly + 15 + oy, TBL_X + 5 + ox, sly + 30 + oy, 2);
      sprT(8, TBL_X + 2 + ox, sly + 7 + oy);

      line(LANE_X - 5 + ox, sly + oy, LANE_X - 5 + ox, sly + 30 + oy, 2);
      line(LANE_X - 5 + ox, sly + oy, LANE_X - 17 + ox, sly + 15 + oy, 2);
      line(LANE_X - 17 + ox, sly + 15 + oy, LANE_X - 5 + ox, sly + 30 + oy, 2);
      sprT(8, LANE_X - 18 + ox, sly + 7 + oy, true);

      // Drain guides
      line(TBL_X + 3 + ox, FLIP_Y - 45 + oy, TBL_X + 3 + ox, FLIP_Y + 4 + oy, 1);
      line(LANE_X - 3 + ox, FLIP_Y - 45 + oy, LANE_X - 3 + ox, FLIP_Y + 4 + oy, 1);

      // Drain slopes
      const drainL = FLIP_LX - 10;
      const drainR = FLIP_RX + 10;
      line(TBL_X + ox, DRAIN_Y + oy, drainL + ox, DRAIN_Y + 9 + oy, 1);
      line(LANE_X + ox, DRAIN_Y + oy, drainR + ox, DRAIN_Y + 9 + oy, 1);

      // Bumpers (use sprites)
      for (const b of bumpers) {
        const sid = b.hit > 0 ? 3 : 2;
        sprT(sid, b.x - 8 + ox, b.y - 8 + oy);
        text("100", b.x - 7 + ox, b.y - 3 + oy, b.hit > 0 ? 0 : 1);
      }

      // Targets (use sprites)
      for (const t of targets) {
        sprT(t.lit ? 5 : 4, t.x - 6 + ox, t.y - 2 + oy);
      }

      // Flippers
      const ltip = flipperTip(FLIP_LX, FLIP_Y, leftFlipAng, -1);
      for (let i = -2; i <= 2; i++) {
        line(FLIP_LX + ox, FLIP_Y + i + oy, ltip.x + ox, ltip.y + i + oy, tilted ? 1 : 3);
      }
      sprT(6, FLIP_LX - 8 + ox, FLIP_Y - 8 + oy);
      circf(flr(ltip.x) + ox, flr(ltip.y) + oy, 2, 3);

      const rtip = flipperTip(FLIP_RX, FLIP_Y, rightFlipAng, 1);
      for (let i = -2; i <= 2; i++) {
        line(FLIP_RX + ox, FLIP_Y + i + oy, rtip.x + ox, rtip.y + i + oy, tilted ? 1 : 3);
      }
      sprT(6, FLIP_RX - 8 + ox, FLIP_Y - 8 + oy);
      circf(flr(rtip.x) + ox, flr(rtip.y) + oy, 2, 3);

      // Plunger
      if (!ball.launched) {
        const plX = LANE_X + LANE_W / 2 + ox;
        const plBase = TBL_B - 4 + oy;
        const plTop = plBase - 15 + plungerPow * 0.5;
        rectf(plX - 3, plTop, 6, plBase - plTop, 2);
        sprT(7, plX - 8, plTop - 10);
        for (let sy = plTop + 5; sy < plBase; sy += 4) {
          line(plX - 2, sy, plX + 2, sy + 2, 1);
        }
      }

      // Ball (use sprite)
      drawBall(ball.x + ox, ball.y + oy);
      for (const mb of multiballs) {
        drawBall(mb.x + ox, mb.y + oy);
      }

      // Particles
      for (const p of particles) {
        pix(p.x + ox, p.y + oy, p.color);
      }

      // HUD (no shake offset, clamped inside 320x240)
      drawHUD();

      // Decorative dots
      for (let dy = TBL_Y + 15; dy < TBL_B - 15; dy += 11) {
        pix(TBL_X + 1 + ox, dy + oy, 1);
        pix(TBL_R - 2 + ox, dy + oy, 1);
      }
    }
  });

  // --- Game Over Scene ---
  Mono.scene(GAMEOVER, {
    init() {},
    update() {
      if (btnp("a")) {
        Mono.go(TITLE); return;
      }
    },
    draw() {
      cls(0);
      rect(13, 15, W - 26, H - 30, 1);
      text("GAME OVER", W / 2 - 44, 55, 3);
      text("FINAL SCORE", W / 2 - 54, 85, 2);
      const ss = String(score);
      text(ss, W / 2 - flr(ss.length * 2.5), 100, 3);
      if (score >= highScore && score > 0) {
        text("NEW HIGH SCORE!", W / 2 - 73, 122, (Mono.frame % 10 < 6) ? 3 : 2);
      }
      text("HIGH SCORE  " + String(highScore), W / 2 - 73, 143, 2);
      if ((Mono.frame % 40) < 25) {
        text("PRESS START", W / 2 - 54, 175, 3);
      }
    }
  });

  // --- Drawing helpers ---
  function drawBall(bx, by) {
    sprT(1, flr(bx) - 8, flr(by) - 8);
  }

  function drawHUD() {
    // Score panel (left side, fits within 0..90 x 0..55)
    rectf(3, 8, 83, 45, 0);
    rect(3, 8, 83, 45, 1);
    text("SCORE", 8, 11, 2);
    text(String(score), 8, 19, 3);
    text("HIGH", 8, 30, 2);
    text(String(highScore), 8, 38, 3);

    // Ball count (right side, fits within 230..315 x 8..42)
    rectf(230, 8, 85, 34, 0);
    rect(230, 8, 85, 34, 1);
    text("BALL", 236, 11, 2);
    for (let i = 0; i < balls; i++) {
      circf(244 + i * 14, 29, 4, 3);
    }

    // Ball save indicator
    if (ballSaved) {
      text("SAVE", 236, 36, (Mono.frame % 20 < 12) ? 3 : 1);
    }

    // Multiball indicator (below ball count, inside bounds)
    if (multiball) {
      const mc = (Mono.frame % 10 < 5) ? 3 : 2;
      text("MULTIBALL!", 236, 45, mc);
    }

    // Target progress (fits within 230..315 x 53..68)
    const litCount = targets.filter(t => t.lit).length;
    rectf(230, 53, 85, 15, 0);
    rect(230, 53, 85, 15, 1);
    text("TARGETS " + litCount + "/" + targets.length, 236, 56, litCount === targets.length ? 3 : 2);

    // Bonus text (centered on table)
    if (bonusTimer > 0) {
      const bx = TBL_X + TBL_W / 2 - flr(bonusText.length * 2.5);
      const by = TBL_Y + TBL_H / 2 - 15;
      const bc = (Mono.frame % 6 < 3) ? 3 : 2;
      text(bonusText, bx, by, bc);
    }

    // Tilt warning
    if (tilted) {
      const tc = (Mono.frame % 8 < 4) ? 3 : 1;
      text("TILT!", TBL_X + TBL_W / 2 - 12, TBL_Y + TBL_H / 2, tc);
    }
  }

  Mono.go(TITLE);
  Mono.boot("screen");
})();
</script>
