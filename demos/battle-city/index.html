<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GrayBox — Demo: Battle City</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #0a0a0a;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100vh;
    font-family: monospace;
    overflow: hidden;
  }
  #frame {
    background: #111;
    border: 3px solid #333;
    border-radius: 8px;
    padding: 12px;
    box-shadow: 0 0 40px rgba(0,0,0,0.8), inset 0 0 20px rgba(0,0,0,0.5);
  }
  canvas {
    display: block;
    image-rendering: pixelated;
    image-rendering: crisp-edges;
  }
  #controls {
    margin-top: 12px;
    color: #6b6b6b;
    font-size: 11px;
    text-align: center;
    letter-spacing: 1px;
  }
  #controls span { color: #b0b0b0; }
</style>
</head>
<body>
<div id="frame">
  <canvas id="screen"></canvas>
</div>
<div id="controls">
  <span>ARROWS</span> MOVE &nbsp;&nbsp; <span>Z</span> SHOOT &nbsp;&nbsp; <span>ENTER</span> START
</div>
<script>
(() => {
  "use strict";

  // ============================================================
  // GrayBox Runtime (inline)
  // ============================================================
  const W = 320;
  const H = 240;
  const FPS = 30;
  const COLORS = ["#1a1a1a", "#6b6b6b", "#b0b0b0", "#e8e8e8"];
  const canvas = document.getElementById("screen");
  canvas.width = W;
  canvas.height = H;
  function fitCanvas() {
    var maxW = window.innerWidth - 40;
    var maxH = window.innerHeight - 60;
    var s = Math.min(maxW / W, maxH / H);
    canvas.style.width = (W * s) + "px";
    canvas.style.height = (H * s) + "px";
  }
  fitCanvas();
  window.addEventListener("resize", fitCanvas);
  const ctx = canvas.getContext("2d");
  ctx.imageSmoothingEnabled = false;
  const buf = ctx.createImageData(W, H);
  const buf32 = new Uint32Array(buf.data.buffer);

  function hexToABGR(hex) {
    const r = parseInt(hex.slice(1, 3), 16);
    const g = parseInt(hex.slice(3, 5), 16);
    const b = parseInt(hex.slice(5, 7), 16);
    return (255 << 24) | (b << 16) | (g << 8) | r;
  }
  const COLOR_U32 = COLORS.map(hexToABGR);

  const sprites = {};
  const tilemap = {};

  const keyMap = {
    "ArrowUp": "up", "ArrowDown": "down", "ArrowLeft": "left", "ArrowRight": "right",
    "w": "up", "s": "down", "a": "left", "d": "right",
    "z": "a", "Z": "a", "x": "b", "X": "b",
    "Enter": "start", " ": "a"
  };
  const keys = {};
  const keysPrev = {};

  document.addEventListener("keydown", e => {
    const k = keyMap[e.key];
    if (k) { keys[k] = true; e.preventDefault(); }
  });
  document.addEventListener("keyup", e => {
    const k = keyMap[e.key];
    if (k) { keys[k] = false; e.preventDefault(); }
  });

  let audioCtx = null;
  const channels = [null, null];
  const channelGains = [null, null];
  function ensureAudio() {
    if (!audioCtx) {
      audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      for (let i = 0; i < 2; i++) {
        channelGains[i] = audioCtx.createGain();
        channelGains[i].gain.value = 0.15;
        channelGains[i].connect(audioCtx.destination);
      }
    }
  }

  const NOTE_NAMES = ["C","C#","D","D#","E","F","F#","G","G#","A","A#","B"];
  function noteToFreq(noteStr) {
    const match = noteStr.match(/^([A-G]#?)(\d)$/);
    if (!match) return 440;
    const name = match[1];
    const octave = parseInt(match[2]);
    const semitone = NOTE_NAMES.indexOf(name);
    if (semitone === -1) return 440;
    const midi = (octave + 1) * 12 + semitone;
    return 440 * Math.pow(2, (midi - 69) / 12);
  }

  const FONT_W = 4;
  const FONT_H = 7;
  const FONT = {};
  const fontData = {
    "A":"0110100110011111100110011001","B":"1110100110101110100110011110",
    "C":"0110100110001000100001100110","D":"1100101010011001100110101100",
    "E":"1111100010001110100010001111","F":"1111100010001110100010001000",
    "G":"0111100010001011100101100111","H":"1001100110011111100110011001",
    "I":"1110010001000100010001001110","J":"0111001000100010001010100100",
    "K":"1001101011001100101010011001","L":"1000100010001000100010001111",
    "M":"1001111111011001100110011001","N":"1001110111011001100110011001",
    "O":"0110100110011001100110010110","P":"1110100110011110100010001000",
    "Q":"0110100110011001101101100001","R":"1110100110011110101010011001",
    "S":"0111100010000110000110001110","T":"1111001000100010001000100010",
    "U":"1001100110011001100110010110","V":"1001100110011001100101100110",
    "W":"1001100110011001101111011001","X":"1001100101100110011010011001",
    "Y":"1001100101100010001000100010","Z":"1111000100100100100010001111",
    "0":"0110100111011011101110010110","1":"0100110001000100010001001110",
    "2":"0110100100010010010010001111","3":"1110000100010110000110011110",
    "4":"1001100110011111000100010001","5":"1111100010001110000100011110",
    "6":"0110100010001110100110010110","7":"1111000100010010010001001000",
    "8":"0110100110010110100110010110","9":"0110100110010111000100010110",
    " ":"0000000000000000000000000000",
    ".":"0000000000000000000001000100",
    ",":"0000000000000000001000101000",
    "!":"0100010001000100000000000100",
    "?":"0110100100010010000000000010",
    "-":"0000000000001110000000000000",
    "+":"0000001001001110010000100000",
    ":":"0000010001000000010001000000",
    "/":"0001000100100010010010001000",
    "*":"0000101001001110010010100000",
    "#":"0101111101011111010100000000",
    "(":"0010010010001000010001000010",
    ")":"0100001000010001000100100100",
    "=":"0000000011110000111100000000",
    "'":"0100010010000000000000000000",
    "\"":"1010101000000000000000000000",
    "<":"0010010010001000010000100010",
    ">":"1000010000100001001001001000",
    "_":"0000000000000000000000001111",
  };
  for (const [ch, bits] of Object.entries(fontData)) {
    FONT[ch] = [];
    for (let i = 0; i < bits.length; i++) FONT[ch].push(parseInt(bits[i]));
  }

  const API = {};
  API._init = null;
  API._update = null;
  API._draw = null;
  API.frame = 0;

  API.cls = function(c = 0) { buf32.fill(COLOR_U32[c] || COLOR_U32[0]); };
  API.pix = function(x, y, c) {
    x = Math.floor(x); y = Math.floor(y);
    if (x < 0 || x >= W || y < 0 || y >= H) return;
    buf32[y * W + x] = COLOR_U32[c] || COLOR_U32[0];
  };
  API.line = function(x0, y0, x1, y1, c) {
    x0=Math.floor(x0); y0=Math.floor(y0); x1=Math.floor(x1); y1=Math.floor(y1);
    const dx=Math.abs(x1-x0), dy=Math.abs(y1-y0);
    const sx=x0<x1?1:-1, sy=y0<y1?1:-1;
    let err=dx-dy;
    while(true) {
      API.pix(x0,y0,c);
      if(x0===x1&&y0===y1) break;
      const e2=2*err;
      if(e2>-dy){err-=dy;x0+=sx;}
      if(e2<dx){err+=dx;y0+=sy;}
    }
  };
  API.rect = function(x,y,w,h,c) {
    API.line(x,y,x+w-1,y,c); API.line(x+w-1,y,x+w-1,y+h-1,c);
    API.line(x+w-1,y+h-1,x,y+h-1,c); API.line(x,y+h-1,x,y,c);
  };
  API.rectf = function(x,y,w,h,c) {
    x=Math.floor(x); y=Math.floor(y);
    const col=COLOR_U32[c]||COLOR_U32[0];
    for(let py=Math.max(0,y);py<Math.min(H,y+h);py++)
      for(let px=Math.max(0,x);px<Math.min(W,x+w);px++)
        buf32[py*W+px]=col;
  };
  API.circ = function(cx,cy,r,c) {
    let x=r,y=0,d=1-r; cx=Math.floor(cx); cy=Math.floor(cy);
    while(x>=y){
      API.pix(cx+x,cy+y,c);API.pix(cx-x,cy+y,c);
      API.pix(cx+x,cy-y,c);API.pix(cx-x,cy-y,c);
      API.pix(cx+y,cy+x,c);API.pix(cx-y,cy+x,c);
      API.pix(cx+y,cy-x,c);API.pix(cx-y,cy-x,c);
      y++; if(d<0){d+=2*y+1;}else{x--;d+=2*(y-x)+1;}
    }
  };
  API.circf = function(cx,cy,r,c) {
    cx=Math.floor(cx); cy=Math.floor(cy);
    const col=COLOR_U32[c]||COLOR_U32[0]; const r2=r*r;
    for(let py=-r;py<=r;py++) for(let px=-r;px<=r;px++)
      if(px*px+py*py<=r2){ const sx=cx+px,sy=cy+py;
        if(sx>=0&&sx<W&&sy>=0&&sy<H) buf32[sy*W+sx]=col; }
  };
  API.sprite = function(id, data) {
    const arr = new Uint8Array(64); let i = 0;
    for (const ch of data) { if (ch>='0'&&ch<='3') { arr[i++]=parseInt(ch); if(i>=64) break; } }
    sprites[id] = arr;
  };
  API.spr = function(id, x, y, flipX, flipY) {
    const s=sprites[id]; if(!s) return;
    x=Math.floor(x); y=Math.floor(y);
    for(let py=0;py<8;py++) for(let px=0;px<8;px++){
      const sx=flipX?7-px:px, sy=flipY?7-py:py;
      const c=s[sy*8+sx], dx=x+px, dy=y+py;
      if(dx>=0&&dx<W&&dy>=0&&dy<H) buf32[dy*W+dx]=COLOR_U32[c];
    }
  };
  API.text = function(str, x, y, c) {
    str=String(str).toUpperCase(); let cx=Math.floor(x); const cy=Math.floor(y);
    const col=COLOR_U32[c]||COLOR_U32[3];
    for(const ch of str){
      const glyph=FONT[ch];
      if(glyph) for(let py=0;py<FONT_H;py++) for(let px=0;px<FONT_W;px++)
        if(glyph[py*FONT_W+px]){ const dx=cx+px,dy=cy+py;
          if(dx>=0&&dx<W&&dy>=0&&dy<H) buf32[dy*W+dx]=col; }
      cx+=FONT_W+1;
    }
  };
  API.mget = function(cx,cy) { return tilemap[cx+","+cy]||0; };
  API.mset = function(cx,cy,id) { tilemap[cx+","+cy]=id; };
  API.map = function(mx,my,mw,mh,sx,sy) {
    for(let ty=0;ty<mh;ty++) for(let tx=0;tx<mw;tx++){
      const id=API.mget(mx+tx,my+ty); if(id>0) API.spr(id,sx+tx*8,sy+ty*8); }
  };
  API.btn = function(k) { return !!keys[k]; };
  API.btnp = function(k) { return !!keys[k] && !keysPrev[k]; };
  API.note = function(ch, noteStr, dur) {
    ensureAudio(); if(ch<0||ch>1) return; API.stop(ch);
    const osc=audioCtx.createOscillator(); osc.type="square";
    osc.frequency.value=noteToFreq(noteStr);
    osc.connect(channelGains[ch]); osc.start();
    osc.stop(audioCtx.currentTime+dur); channels[ch]=osc;
  };
  API.stop = function(ch) {
    if(ch===undefined){API.stop(0);API.stop(1);return;}
    if(channels[ch]){try{channels[ch].stop();}catch(e){} channels[ch]=null;}
  };
  API.rnd = function(max) { return Math.random()*max; };
  API.flr = Math.floor;
  API.abs = Math.abs;
  API.min = Math.min;
  API.max = Math.max;
  API.sin = Math.sin;
  API.cos = Math.cos;

  function tick() {
    if (API._update) API._update();
    if (API._draw) API._draw();
    ctx.putImageData(buf, 0, 0);
    for (const k in keys) keysPrev[k] = keys[k];
    API.frame++;
  }

  // ============================================================
  // Battle City Game
  // ============================================================
  const { cls, pix, line, rect, rectf, circ, circf, sprite: defSprite,
          spr, text, btn, btnp, note, stop, rnd, flr, abs: _abs,
          min, max: _max, sin, cos } = API;

  // --- Sprite definitions ---
  // 1: Player tank facing up
  defSprite(1,
    "00300300" +
    "03333300" +
    "32333230" +
    "32333230" +
    "33333330" +
    "33233230" +
    "33233230" +
    "03300330"
  );
  // 2: Bullet
  defSprite(2,

    "00333000" +
    "00030000" +

  );
  // 3: Brick wall
  defSprite(3,

  );
  // 4: Steel wall
  defSprite(4,

  );
  // 5: Water
  defSprite(5,

    "01010101" +

  );
  // 6: Trees/bushes
  defSprite(6,

    "01020102" +
    "20102010" +

    "01020102" +

  );
  // 7: Ice
  defSprite(7,
    "22322232" +
    "23222322" +
    "22322232" +
    "32223222" +
    "22322232" +

  );
  // 8: Eagle/base alive
  defSprite(8,

  defSprite(9,

  defSprite(10,

  defSprite(11,

  // 13: Explosion frame 1
  defSprite(13,

  defSprite(15,

  defSprite(18,

  defSprite(19,

  defSprite(20,

  // --- Game Constants ---
  const ARENA_X = 53;
  const ARENA_Y = 6;
  const GRID_W = 26;
  const GRID_H = 26;
  const TILE = 8;
  const ARENA_PW = GRID_W * TILE;
  const ARENA_PH = GRID_H * TILE;

  const T_EMPTY = 0, T_BRICK = 1, T_STEEL = 2, T_WATER = 3, T_TREE = 4, T_ICE = 5;
  const DIR_UP = 0, DIR_DOWN = 1, DIR_LEFT = 2, DIR_RIGHT = 3;
  const DX = [0, 0, -1, 1];
  const DY = [-1, 1, 0, 0];

  // --- Game State ---
  let state = "title";
  let level, score, lives;
  let player, bullets, enemies, explosions, powerups;
  let spawnTimer, spawnCount, enemiesLeft, totalEnemies;
  let baseAlive, gameOverTimer, levelCompleteTimer;
  let grid;
  let shieldTimer, shovelTimer, freezeTimer;
  let spawnSlot, titleBlink = 0, moveSoundTimer = 0;

  // --- Level builder ---
  function buildLevel(lv) {
    grid = [];
    for (let y = 0; y < GRID_H; y++) {
      grid[y] = [];
      for (let x = 0; x < GRID_W; x++) grid[y][x] = T_EMPTY;
    }

    const seed = lv * 7 + 13;
    function sr(i) {
      let v = (seed * 1103515245 + i * 12345 + 12345) & 0x7fffffff;
      return (v % 1000) / 1000;
    }

    // Brick clusters
    for (let i = 0; i < 8 + flr(lv * 0.5); i++) {
      const cx = flr(sr(i*3) * (GRID_W-4)) + 2;
      const cy = flr(sr(i*3+1) * (GRID_H-8)) + 3;
      const sw = flr(sr(i*3+2) * 3) + 2;
      const sh = flr(sr(i*3+50) * 3) + 2;
      for (let dy = 0; dy < sh; dy++)
        for (let dx = 0; dx < sw; dx++) {
          const gx = cx+dx, gy = cy+dy;
          if (gx < GRID_W && gy >= 2 && gy < GRID_H-3) grid[gy][gx] = T_BRICK;
        }
    }

    // Steel
    for (let i = 0; i < 2 + flr(lv*0.5); i++) {
      const cx = flr(sr(i*5+100)*(GRID_W-2))+1;
      const cy = flr(sr(i*5+101)*(GRID_H-8))+3;
      const horiz = sr(i*5+102) > 0.5;
      for (let j = 0; j < flr(sr(i*5+103)*3)+2; j++) {
        const gx = horiz ? cx+j : cx, gy = horiz ? cy : cy+j;
        if (gx < GRID_W && gy >= 2 && gy < GRID_H-3) grid[gy][gx] = T_STEEL;
      }
    }

    // Water
    for (let i = 0; i < 1+flr(lv*0.3); i++) {
      const cx = flr(sr(i*7+200)*(GRID_W-4))+2;
      const cy = flr(sr(i*7+201)*(GRID_H-10))+4;
      for (let dy = 0; dy < flr(sr(i*7+203)*2)+2; dy++)
        for (let dx = 0; dx < flr(sr(i*7+202)*2)+2; dx++) {
          const gx = cx+dx, gy = cy+dy;
          if (gx < GRID_W && gy >= 2 && gy < GRID_H-3) grid[gy][gx] = T_WATER;
        }
    }

    // Trees
    for (let i = 0; i < 1+flr(lv*0.3); i++) {
      const cx = flr(sr(i*11+300)*(GRID_W-4))+2;
      const cy = flr(sr(i*11+301)*(GRID_H-10))+4;
      for (let dy = 0; dy < flr(sr(i*11+303)*2)+2; dy++)
        for (let dx = 0; dx < flr(sr(i*11+302)*3)+2; dx++) {
          const gx = cx+dx, gy = cy+dy;
          if (gx < GRID_W && gy >= 2 && gy < GRID_H-3) grid[gy][gx] = T_TREE;
        }
    }

    // Ice (from level 2)
    if (lv >= 2) {
      for (let i = 0; i < flr(lv*0.3); i++) {
        const cx = flr(sr(i*13+400)*(GRID_W-4))+2;
        const cy = flr(sr(i*13+401)*(GRID_H-10))+4;
        for (let dy = 0; dy < flr(sr(i*13+403)*2)+2; dy++)
          for (let dx = 0; dx < flr(sr(i*13+402)*3)+2; dx++) {
            const gx = cx+dx, gy = cy+dy;
            if (gx < GRID_W && gy >= 2 && gy < GRID_H-3) grid[gy][gx] = T_ICE;
          }
      }
    }

    // Base walls (brick)
    fortifyBase(T_BRICK);
    // Clear base interior
    const bx = flr(GRID_W/2)-1, by = GRID_H-2;
    grid[by][bx] = T_EMPTY; grid[by][bx+1] = T_EMPTY;
    grid[by+1][bx] = T_EMPTY; grid[by+1][bx+1] = T_EMPTY;

    // Clear spawn points
    const spawnXs = [0, flr(GRID_W/2)-1, GRID_W-2];
    for (const sx of spawnXs)
      for (let dy = 0; dy < 2; dy++)
        for (let dx = 0; dx < 2; dx++)
          if (sx+dx < GRID_W) grid[dy][sx+dx] = T_EMPTY;

    // Clear player spawn
    const px = flr(GRID_W/2) - 5;
    for (let dy = 0; dy < 2; dy++)
      for (let dx = 0; dx < 2; dx++)
        if (px+dx >= 0 && px+dx < GRID_W) grid[GRID_H-2+dy][px+dx] = T_EMPTY;
  }

  function fortifyBase(type) {
    const bx = flr(GRID_W/2)-1, by = GRID_H-2;
    for (let dy = -1; dy <= 1; dy++)
      for (let dx = -1; dx <= 2; dx++) {
        const gx = bx+dx, gy = by+dy;
        if (gx >= 0 && gx < GRID_W && gy >= 0 && gy < GRID_H)
          if (dy === -1 || dx === -1 || dx === 2) grid[gy][gx] = type;
      }
  }

  function makeTank(x, y, dir, isPlayer, type) {
    return {
      x, y, dir, isPlayer, type,
      speed: isPlayer ? 1.2 : (type === 2 ? 1.2 : (type === 3 ? 0.5 : 0.8)),
      hp: type === 3 ? 3 : 1,
      alive: true, cooldown: 0, aiTimer: 0, aiDir: dir,
    };
  }

  function startLevel() {
    buildLevel(level);
    baseAlive = true;
    bullets = []; enemies = []; explosions = []; powerups = [];
    spawnTimer = 0; spawnCount = 0; spawnSlot = 0;
    totalEnemies = min(20, 6 + level * 2);
    enemiesLeft = totalEnemies;
    shieldTimer = 90; shovelTimer = 0; freezeTimer = 0;
    levelCompleteTimer = 0;
    const px = flr(GRID_W/2) - 5;
    player = makeTank(ARENA_X + px*TILE, ARENA_Y + (GRID_H-2)*TILE, DIR_UP, true, 0);
  }

  function spawnEnemy() {
    if (spawnCount >= totalEnemies) return;
    const sxs = [ARENA_X, ARENA_X + flr(GRID_W/2-1)*TILE, ARENA_X + (GRID_W-2)*TILE];
    const sx = sxs[spawnSlot % 3]; spawnSlot++;
    let type = 1;
    const r = rnd(10);
    if (level >= 3 && r < 2) type = 3;
    else if (level >= 2 && r < 4) type = 2;
    if (spawnCount === totalEnemies-1 && level >= 2) type = 3;
    enemies.push(makeTank(sx, ARENA_Y, DIR_DOWN, false, type));
    spawnCount++;
  }

  // --- Collision ---
  function tileAt(px, py) {
    const gx = flr((px - ARENA_X) / TILE);
    const gy = flr((py - ARENA_Y) / TILE);
    if (gx < 0 || gx >= GRID_W || gy < 0 || gy >= GRID_H) return T_STEEL;
    return grid[gy][gx];
  }

  function tankHitsTerrain(t) {
    const pts = [
      [t.x,t.y],[t.x+13,t.y],[t.x,t.y+13],[t.x+13,t.y+13],
      [t.x+7,t.y],[t.x+7,t.y+13],[t.x,t.y+7],[t.x+13,t.y+7]
    ];
    for (const [cx,cy] of pts) {
      const tile = tileAt(cx,cy);
      if (tile === T_BRICK || tile === T_STEEL || tile === T_WATER) return true;
    }
    return false;
  }

  function rectsOverlap(ax,ay,aw,ah,bx,by,bw,bh) {
    return ax < bx+bw && ax+aw > bx && ay < by+bh && ay+ah > by;
  }

  function tankHitsTanks(t) {
    if (!t.isPlayer) {
      if (player && player.alive && rectsOverlap(t.x,t.y,14,14,player.x,player.y,14,14)) return true;
    }
    const list = t.isPlayer ? enemies : enemies;
    for (const o of list) {
      if (o === t || !o.alive) continue;
      if (rectsOverlap(t.x,t.y,14,14,o.x,o.y,14,14)) return true;
    }
    if (t.isPlayer) {
      for (const e of enemies) {
        if (e.alive && rectsOverlap(t.x,t.y,14,14,e.x,e.y,14,14)) return true;
      }
    }
    return false;
  }

  // --- Sound ---
  function sfxShoot() { note(0, "C5", 0.05); }
  function sfxHit() { note(1, "C3", 0.08); }
  function sfxExplode() { note(1, "C2", 0.15); }
  function sfxPowerup() { note(0, "G5", 0.05); setTimeout(() => { try { note(0, "C6", 0.1); } catch(e){} }, 60); }
  function sfxMove() { note(0, "A2", 0.04); }
  function sfxGameOver() { note(0, "C3", 0.2); setTimeout(() => { try { note(1, "G2", 0.3); } catch(e){} }, 200); }
  function sfxLevelClear() { note(0, "C5", 0.1); setTimeout(() => { try { note(0, "E5", 0.1); } catch(e){} }, 120); setTimeout(() => { try { note(0, "G5", 0.2); } catch(e){} }, 240); }

  // --- Actions ---
  function shoot(t) {
    if (t.cooldown > 0) return;
    if (bullets.some(b => b.owner === t)) return;
    const speed = t.isPlayer ? 3 : 2;
    bullets.push({
      x: t.x + 5 + DX[t.dir]*4, y: t.y + 5 + DY[t.dir]*4,
      dx: DX[t.dir]*speed, dy: DY[t.dir]*speed,
      owner: t, isPlayer: t.isPlayer
    });
    t.cooldown = t.isPlayer ? 10 : 25;
    sfxShoot();
  }

  function addExplosion(x, y, big) {
    explosions.push({ x, y, timer: big ? 20 : 12, big });
  }

  function spawnPowerup() {
    const types = ["star","shield","grenade","shovel"];
    powerups.push({
      x: ARENA_X + flr(rnd(GRID_W-2))*TILE + TILE,
      y: ARENA_Y + flr(rnd(GRID_H-6)+2)*TILE,
      type: types[flr(rnd(types.length))],
      timer: 300
    });
  }

  function applyPowerup(type) {
    sfxPowerup();
    if (type === "star") { player.speed = min(player.speed + 0.4, 2.5); }
    else if (type === "shield") { shieldTimer = 300; }
    else if (type === "grenade") {
      for (const e of enemies) if (e.alive) {
        e.alive = false; addExplosion(e.x,e.y,true);
        score += e.type===3?300:e.type===2?200:100; enemiesLeft--;
      }
      sfxExplode();
    }
    else if (type === "shovel") { fortifyBase(T_STEEL); shovelTimer = 600; }
  }

  // --- Movement ---
  function moveTank(t) {
    if (!t.isPlayer && freezeTimer > 0) return;
    const spd = t.speed;
    let nx = t.x, ny = t.y;
    const onIce = tileAt(t.x+7, t.y+7) === T_ICE;

    if (t.isPlayer) {
      let moved = false;
      let wantDir = -1;
      if (btn("up")) wantDir = DIR_UP;
      else if (btn("down")) wantDir = DIR_DOWN;
      else if (btn("left")) wantDir = DIR_LEFT;
      else if (btn("right")) wantDir = DIR_RIGHT;

      if (wantDir >= 0) {
        t.dir = wantDir;
        nx = t.x + DX[wantDir]*spd;
        ny = t.y + DY[wantDir]*spd;
        moved = true;
      } else if (onIce) {
        nx = t.x + DX[t.dir]*spd*0.5;
        ny = t.y + DY[t.dir]*spd*0.5;
        moved = true;
      }
      if (moved) {
        moveSoundTimer--;
        if (moveSoundTimer <= 0) { sfxMove(); moveSoundTimer = 8; }
      }
    } else {
      t.aiTimer--;
      if (t.aiTimer <= 0) {
        const r = rnd(10);
        if (r < 4) t.aiDir = DIR_DOWN;
        else if (r < 6 && player && player.alive) {
          t.aiDir = _abs(player.x-t.x) > _abs(player.y-t.y)
            ? (player.x < t.x ? DIR_LEFT : DIR_RIGHT)
            : (player.y < t.y ? DIR_UP : DIR_DOWN);
        } else t.aiDir = flr(rnd(4));
        t.aiTimer = 30 + flr(rnd(60));
      }
      t.dir = t.aiDir;
      nx = t.x + DX[t.dir]*spd;
      ny = t.y + DY[t.dir]*spd;
    }

    nx = _max(ARENA_X, min(ARENA_X + ARENA_PW - 14, nx));
    ny = _max(ARENA_Y, min(ARENA_Y + ARENA_PH - 14, ny));
    const ox = t.x, oy = t.y;
    t.x = nx; t.y = ny;
    if (tankHitsTerrain(t) || tankHitsTanks(t)) {
      t.x = ox; t.y = oy;
      if (!t.isPlayer) t.aiTimer = 0;
    }
  }

  // --- Bullet update ---
  function updateBullets() {
    for (let i = bullets.length-1; i >= 0; i--) {
      const b = bullets[i];
      b.x += b.dx; b.y += b.dy;

      // Out of arena
      if (b.x < ARENA_X || b.x >= ARENA_X+ARENA_PW || b.y < ARENA_Y || b.y >= ARENA_Y+ARENA_PH) {
        bullets.splice(i,1); continue;
      }

      // Hit terrain
      const gx = flr((b.x-ARENA_X)/TILE), gy = flr((b.y-ARENA_Y)/TILE);
      if (gx >= 0 && gx < GRID_W && gy >= 0 && gy < GRID_H) {
        const tile = grid[gy][gx];
        if (tile === T_BRICK) {
          grid[gy][gx] = T_EMPTY;
          addExplosion(ARENA_X+gx*TILE, ARENA_Y+gy*TILE, false);
          sfxHit(); bullets.splice(i,1); continue;
        }
        if (tile === T_STEEL) {
          addExplosion(ARENA_X+gx*TILE, ARENA_Y+gy*TILE, false);
          sfxHit(); bullets.splice(i,1); continue;
        }
      }

      // Hit eagle
      const ebx = flr(GRID_W/2)-1, eby = GRID_H-2;
      const eagleX = ARENA_X+ebx*TILE, eagleY = ARENA_Y+eby*TILE;
      if (baseAlive && b.x + 8 > eagleX && b.x < eagleX+16 && b.y + 8 > eagleY && b.y < eagleY+16) {
        baseAlive = false;
        addExplosion(eagleX, eagleY, true);
        sfxExplode(); bullets.splice(i,1);
        state = "gameover"; gameOverTimer = 120; sfxGameOver();
        continue;
      }

      // Bullet-bullet collision
      let bulletHit = false;
      for (let j = bullets.length-1; j >= 0; j--) {
        if (j === i) continue;
        const o = bullets[j];
        if (b.isPlayer !== o.isPlayer && _abs(b.x-o.x) < 4 && _abs(b.y-o.y) < 4) {
          bullets.splice(_max(i,j), 1);
          bullets.splice(min(i,j), 1);
          bulletHit = true; break;
        }
      }
      if (bulletHit) continue;

      // Hit tanks
      let hit = false;
      if (b.isPlayer) {
        for (const e of enemies) {
          if (!e.alive) continue;
          if (b.x + 8 > e.x && b.x < e.x+14 && b.y + 8 > e.y && b.y < e.y+14) {
            e.hp--;
            if (e.hp <= 0) {
              e.alive = false; addExplosion(e.x,e.y,true); sfxExplode();
              score += e.type===3?300:e.type===2?200:100;
              enemiesLeft--;
              if (rnd(10) < 2) spawnPowerup();
            } else sfxHit();
            hit = true; break;
          }
        }
      } else {
        if (player && player.alive) {
          if (b.x + 8 > player.x && b.x < player.x+14 && b.y + 8 > player.y && b.y < player.y+14) {
            if (shieldTimer <= 0) {
              lives--;
              addExplosion(player.x, player.y, true); sfxExplode();
              if (lives <= 0) {
                player.alive = false; state = "gameover"; gameOverTimer = 120; sfxGameOver();
              } else {
                const ppx = flr(GRID_W/2)-5;
                player.x = ARENA_X+ppx*TILE; player.y = ARENA_Y+(GRID_H-2)*TILE;
                player.dir = DIR_UP; shieldTimer = 90;
              }
            }
            hit = true;
          }
        }
      }
      if (hit) bullets.splice(i,1);
    }
  }

  // --- Main update ---
  API._update = function() {
    titleBlink++;

    if (state === "title") {
      if (btnp("start")) {
        state = "play"; level = 1; score = 0; lives = 3; startLevel();
      }
      return;
    }
    if (state === "gameover") {
      gameOverTimer--;
      if (gameOverTimer <= 0 && btnp("start")) state = "title";
      return;
    }
    if (state !== "play") return;

    // Level complete
    if (enemiesLeft <= 0 && enemies.every(e => !e.alive)) {
      levelCompleteTimer++;
      if (levelCompleteTimer === 1) sfxLevelClear();
      if (levelCompleteTimer > 90) { level++; startLevel(); }
      return;
    }

    if (shieldTimer > 0) shieldTimer--;
    if (shovelTimer > 0) { shovelTimer--; if (shovelTimer === 0) fortifyBase(T_BRICK); }
    if (freezeTimer > 0) freezeTimer--;

    // Spawn
    const alive = enemies.filter(e => e.alive).length;
    if (spawnCount < totalEnemies && alive < 4) {
      spawnTimer++;
      if (spawnTimer >= 60) { spawnEnemy(); spawnTimer = 0; }
    }

    // Player
    if (player && player.alive) {
      moveTank(player);
      if (player.cooldown > 0) player.cooldown--;
      if (btnp("a")) shoot(player);
    }

    // Enemies
    for (const e of enemies) {
      if (!e.alive) continue;
      moveTank(e);
      if (e.cooldown > 0) e.cooldown--;
      if (rnd(60) < 2) shoot(e);
    }

    updateBullets();

    // Explosions
    for (let i = explosions.length-1; i >= 0; i--) {
      explosions[i].timer--;
      if (explosions[i].timer <= 0) explosions.splice(i,1);
    }

    // Power-ups
    for (let i = powerups.length-1; i >= 0; i--) {
      powerups[i].timer--;
      if (powerups[i].timer <= 0) { powerups.splice(i,1); continue; }
      if (player && player.alive) {
        const p = powerups[i];
        if (rectsOverlap(player.x,player.y,14,14,p.x,p.y,8,8)) {
          applyPowerup(p.type); powerups.splice(i,1);
        }
      }
    }

    // Cleanup dead enemies
    enemies = enemies.filter(e => e.alive);
  };

  // --- Rotated sprite draw ---
  function drawRotSprite(id, x, y, dir) {
    const s = sprites[id]; if (!s) return;
    x = flr(x); y = flr(y);
    for (let py = 0; py < 8; py++)
      for (let px = 0; px < 8; px++) {
        let sx, sy;
        if (dir === DIR_LEFT) { sx = py; sy = 7-px; }
        else { sx = 7-py; sy = px; }
        const c = s[sy*8+sx], dx = x+px, dy = y+py;
        if (dx >= 0 && dx < W && dy >= 0 && dy < H) buf32[dy*W+dx] = COLOR_U32[c];
      }
  }

  function drawTank(t) {
    if (!t.alive) return;
    const px = flr(t.x)+3, py = flr(t.y)+3;
    const sid = t.isPlayer ? 1 : t.type===2 ? 11 : t.type===3 ? 12 : 10;
    if (t.dir === DIR_UP) spr(sid, px, py);
    else if (t.dir === DIR_DOWN) spr(sid, px, py, false, true);
    else drawRotSprite(sid, px, py, t.dir);

    // Shield glow
    if (t.isPlayer && shieldTimer > 0 && (shieldTimer > 30 || API.frame%4 < 2))
      spr(19, px, py);
  }

  // --- Main draw ---
  API._draw = function() {
    cls(0);

    if (state === "title") {
      text("BATTLE CITY", 133, 60, 3);
      text("TANK GAME", 138, 75, 2);
      spr(1, 147, 98); spr(10, 160, 98); spr(12, 173, 98);
      if (flr(titleBlink/20) % 2 === 0)
        text("PRESS ENTER TO START", 110, 135, 3);
      text("ARROWS: MOVE  Z: SHOOT", 103, 165, 1);
      text("DESTROY ALL ENEMY TANKS", 103, 180, 1);
      text("PROTECT YOUR BASE!", 115, 192, 2);
      text("GRAYBOX DEMO", 131, 225, 1);
      return;
    }

    // Arena background
    rectf(ARENA_X, ARENA_Y, ARENA_PW, ARENA_PH, 0);

    // Tiles (except trees)
    for (let gy = 0; gy < GRID_H; gy++)
      for (let gx = 0; gx < GRID_W; gx++) {
        const t = grid[gy][gx];
        const px = ARENA_X+gx*TILE, py = ARENA_Y+gy*TILE;
        if (t === T_BRICK) spr(3, px, py);
        else if (t === T_STEEL) spr(4, px, py);
        else if (t === T_WATER) spr(5, px, py);
        else if (t === T_ICE) spr(7, px, py);
      }

    // Eagle
    const ebx = flr(GRID_W/2)-1, eby = GRID_H-2;
    const ex = ARENA_X+ebx*TILE, ey = ARENA_Y+eby*TILE;
    const eid = baseAlive ? 8 : 9;
    spr(eid, ex, ey); spr(eid, ex+8, ey);
    spr(eid, ex, ey+8); spr(eid, ex+8, ey+8);

    // Power-ups
    for (const p of powerups)
      if (p.timer > 30 || API.frame%4 < 2) {
        const sid = p.type==="star"?15:p.type==="shield"?16:p.type==="grenade"?17:18;
        spr(sid, flr(p.x), flr(p.y));
      }

    // Player
    if (player && player.alive) drawTank(player);

    // Enemies
    for (const e of enemies) drawTank(e);

    // Bullets
    for (const b of bullets) spr(2, flr(b.x)-3, flr(b.y)-3);

    // Trees on top
    for (let gy = 0; gy < GRID_H; gy++)
      for (let gx = 0; gx < GRID_W; gx++)
        if (grid[gy][gx] === T_TREE) spr(6, ARENA_X+gx*TILE, ARENA_Y+gy*TILE);

    // Explosions
    for (const ex2 of explosions) {
      const sid = ex2.timer > (ex2.big?10:6) ? 13 : 14;
      spr(sid, flr(ex2.x), flr(ex2.y));
      if (ex2.big) {
        spr(sid, flr(ex2.x)+8, flr(ex2.y));
        spr(sid, flr(ex2.x), flr(ex2.y)+8);
        spr(sid, flr(ex2.x)+8, flr(ex2.y)+8);
      }
    }

    // --- HUD ---
    const hudX = ARENA_X + ARENA_PW + 11;

    // Enemy icons
    text("ENEMY", hudX, 8, 2);
    const rem = _max(0, totalEnemies-spawnCount) + enemies.filter(e => e.alive).length;
    for (let i = 0; i < rem; i++) {
      const ix = hudX + (i%2)*10, iy = 17 + flr(i/2)*10;
      rectf(ix+2, iy+2, 4, 4, 1);
    }

    text("LV", hudX, 120, 2);
    text(String(level), hudX+11, 120, 3);

    text("P1", hudX, 135, 2);
    for (let i = 0; i < lives; i++) spr(20, hudX+i*10, 143);

    text("SCORE", hudX, 165, 2);
    text(String(score), hudX, 173, 3);

    // Left side
    text("BATTLE", 3, 8, 2);
    text("CITY", 5, 15, 2);
    if (shieldTimer > 0) text("SHIELD", 3, 38, 3);
    if (freezeTimer > 0) text("FREEZE", 3, 45, 3);

    // Level complete
    if (levelCompleteTimer > 0) {
      rectf(93, 105, 133, 30, 0); rect(93, 105, 133, 30, 3);
      text("STAGE CLEAR!", 130, 111, 3);
      text("SCORE: " + score, 133, 122, 2);
    }

    // Game over
    if (state === "gameover") {
      rectf(107, 90, 107, 60, 0); rect(107, 90, 107, 60, 3);
      text("GAME OVER", 138, 101, 3);
      text("SCORE: " + score, 130, 116, 2);
      text("LEVEL: " + level, 130, 128, 2);
      if (gameOverTimer <= 0 && flr(titleBlink/15)%2 === 0)
        text("PRESS ENTER", 133, 139, 1);
    }
  };

  // ============================================================
  // Boot
  // ============================================================
  if (API._init) API._init();
  setInterval(tick, 1000 / FPS);
  document.addEventListener("keydown", ensureAudio, { once: true });
  document.addEventListener("click", ensureAudio, { once: true });
})();
</script>
</body>
</html>
