<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GrayBox — Demo: Mappy</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #0a0a0a;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100vh;
    font-family: monospace;
    overflow: hidden;
  }
  #frame {
    background: #111;
    border: 3px solid #333;
    border-radius: 8px;
    padding: 12px;
    box-shadow: 0 0 40px rgba(0,0,0,0.8), inset 0 0 20px rgba(0,0,0,0.5);
  }
  canvas {
    display: block;
    image-rendering: pixelated;
    image-rendering: crisp-edges;
  }
  #controls {
    margin-top: 12px;
    color: #6b6b6b;
    font-size: 11px;
    text-align: center;
    letter-spacing: 1px;
  }
  #controls span { color: #b0b0b0; }
</style>
</head>
<body>
<div id="frame">
  <canvas id="screen"></canvas>
</div>
<div id="controls">
  <span>←→</span> MOVE &nbsp;&nbsp; <span>Z</span> OPEN DOOR &nbsp;&nbsp; <span>ENTER</span> START
</div>
<script>
(() => {
  "use strict";

  // ============================================================
  // GrayBox Runtime (inline)
  // ============================================================
  const W = 320;
  const H = 240;
  const FPS = 30;
  const COLORS = ["#1a1a1a", "#6b6b6b", "#b0b0b0", "#e8e8e8"];
  const canvas = document.getElementById("screen");
  canvas.width = W;
  canvas.height = H;
  function fitCanvas() {
    var maxW = window.innerWidth - 40;
    var maxH = window.innerHeight - 60;
    var s = Math.min(maxW / W, maxH / H);
    canvas.style.width = (W * s) + "px";
    canvas.style.height = (H * s) + "px";
  }
  fitCanvas();
  window.addEventListener("resize", fitCanvas);
  const ctx = canvas.getContext("2d");
  ctx.imageSmoothingEnabled = false;
  const buf = ctx.createImageData(W, H);
  const buf32 = new Uint32Array(buf.data.buffer);

  function hexToABGR(hex) {
    const r = parseInt(hex.slice(1, 3), 16);
    const g = parseInt(hex.slice(3, 5), 16);
    const b = parseInt(hex.slice(5, 7), 16);
    return (255 << 24) | (b << 16) | (g << 8) | r;
  }
  const COLOR_U32 = COLORS.map(hexToABGR);

  const sprites = {};
  const tilemap = {};

  const keyMap = {
    "ArrowUp": "up", "ArrowDown": "down", "ArrowLeft": "left", "ArrowRight": "right",
    "w": "up", "s": "down", "a": "left", "d": "right", "ㅈ": "up", "ㄴ": "down", "ㅁ": "left", "ㅇ": "right",
    "z": "a", "Z": "a", "x": "b", "X": "b", "ㅋ": "a", "ㅌ": "b",
    "Enter": "a", " ": "a"
  };
  const keys = {};
  const keysPrev = {};

  document.addEventListener("keydown", e => {
    const k = keyMap[e.key];
    if (k) { keys[k] = true; e.preventDefault(); }
  });
  document.addEventListener("keyup", e => {
    const k = keyMap[e.key];
    if (k) { keys[k] = false; e.preventDefault(); }
  });

  let audioCtx = null;
  const channels = [null, null];
  const channelGains = [null, null];
  function ensureAudio() {
    if (!audioCtx) {
      audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      for (let i = 0; i < 2; i++) {
        channelGains[i] = audioCtx.createGain();
        channelGains[i].gain.value = 0.15;
        channelGains[i].connect(audioCtx.destination);
      }
    }
  }

  const NOTE_NAMES = ["C","C#","D","D#","E","F","F#","G","G#","A","A#","B"];
  function noteToFreq(noteStr) {
    const match = noteStr.match(/^([A-G]#?)(\d)$/);
    if (!match) return 440;
    const name = match[1];
    const octave = parseInt(match[2]);
    const semitone = NOTE_NAMES.indexOf(name);
    if (semitone === -1) return 440;
    const midi = (octave + 1) * 12 + semitone;
    return 440 * Math.pow(2, (midi - 69) / 12);
  }

  const FONT_W = 4;
  const FONT_H = 7;
  const FONT = {};
  const fontData = {
    "A":"0110100110011111100110011001","B":"1110100110101110100110011110",
    "C":"0110100110001000100001100110","D":"1100101010011001100110101100",
    "E":"1111100010001110100010001111","F":"1111100010001110100010001000",
    "G":"0111100010001011100101100111","H":"1001100110011111100110011001",
    "I":"1110010001000100010001001110","J":"0111001000100010001010100100",
    "K":"1001101011001100101010011001","L":"1000100010001000100010001111",
    "M":"1001111111011001100110011001","N":"1001110111011001100110011001",
    "O":"0110100110011001100110010110","P":"1110100110011110100010001000",
    "Q":"0110100110011001101101100001","R":"1110100110011110101010011001",
    "S":"0111100010000110000110001110","T":"1111001000100010001000100010",
    "U":"1001100110011001100110010110","V":"1001100110011001100101100110",
    "W":"1001100110011001101111011001","X":"1001100101100110011010011001",
    "Y":"1001100101100010001000100010","Z":"1111000100100100100010001111",
    "0":"0110100111011011101110010110","1":"0100110001000100010001001110",
    "2":"0110100100010010010010001111","3":"1110000100010110000110011110",
    "4":"1001100110011111000100010001","5":"1111100010001110000100011110",
    "6":"0110100010001110100110010110","7":"1111000100010010010001001000",
    "8":"0110100110010110100110010110","9":"0110100110010111000100010110",
    " ":"0000000000000000000000000000",
    ".":"0000000000000000000001000100",
    ",":"0000000000000000001000101000",
    "!":"0100010001000100000000000100",
    "?":"0110100100010010000000000010",
    "-":"0000000000001110000000000000",
    "+":"0000001001001110010000100000",
    ":":"0000010001000000010001000000",
    "/":"0001000100100010010010001000",
    "*":"0000101001001110010010100000",
    "#":"0101111101011111010100000000",
    "(":"0010010010001000010001000010",
    ")":"0100001000010001000100100100",
    "=":"0000000011110000111100000000",
    "'":"0100010010000000000000000000",
    "\"":"1010101000000000000000000000",
    "<":"0010010010001000010000100010",
    ">":"1000010000100001001001001000",
    "_":"0000000000000000000000001111",
  };
  for (const [ch, bits] of Object.entries(fontData)) {
    FONT[ch] = [];
    for (let i = 0; i < bits.length; i++) FONT[ch].push(parseInt(bits[i]));
  }

  const API = {};
  API._init = null;
  API._update = null;
  API._draw = null;
  API.frame = 0;

  API.cls = function(c = 0) { buf32.fill(COLOR_U32[c] || COLOR_U32[0]); };
  API.pix = function(x, y, c) {
    x = Math.floor(x); y = Math.floor(y);
    if (x < 0 || x >= W || y < 0 || y >= H) return;
    buf32[y * W + x] = COLOR_U32[c] || COLOR_U32[0];
  };
  API.line = function(x0, y0, x1, y1, c) {
    x0=Math.floor(x0); y0=Math.floor(y0); x1=Math.floor(x1); y1=Math.floor(y1);
    const dx=Math.abs(x1-x0), dy=Math.abs(y1-y0);
    const sx=x0<x1?1:-1, sy=y0<y1?1:-1;
    let err=dx-dy;
    while(true) {
      API.pix(x0,y0,c);
      if(x0===x1&&y0===y1) break;
      const e2=2*err;
      if(e2>-dy){err-=dy;x0+=sx;}
      if(e2<dx){err+=dx;y0+=sy;}
    }
  };
  API.rect = function(x,y,w,h,c) {
    API.line(x,y,x+w-1,y,c); API.line(x+w-1,y,x+w-1,y+h-1,c);
    API.line(x+w-1,y+h-1,x,y+h-1,c); API.line(x,y+h-1,x,y,c);
  };
  API.rectf = function(x,y,w,h,c) {
    x=Math.floor(x); y=Math.floor(y);
    const col=COLOR_U32[c]||COLOR_U32[0];
    for(let py=Math.max(0,y);py<Math.min(H,y+h);py++)
      for(let px=Math.max(0,x);px<Math.min(W,x+w);px++)
        buf32[py*W+px]=col;
  };
  API.circ = function(cx,cy,r,c) {
    let x=r,y=0,d=1-r; cx=Math.floor(cx); cy=Math.floor(cy);
    while(x>=y){
      API.pix(cx+x,cy+y,c);API.pix(cx-x,cy+y,c);
      API.pix(cx+x,cy-y,c);API.pix(cx-x,cy-y,c);
      API.pix(cx+y,cy+x,c);API.pix(cx-y,cy+x,c);
      API.pix(cx+y,cy-x,c);API.pix(cx-y,cy-x,c);
      y++; if(d<0){d+=2*y+1;}else{x--;d+=2*(y-x)+1;}
    }
  };
  API.circf = function(cx,cy,r,c) {
    cx=Math.floor(cx); cy=Math.floor(cy);
    const col=COLOR_U32[c]||COLOR_U32[0]; const r2=r*r;
    for(let py=-r;py<=r;py++) for(let px=-r;px<=r;px++)
      if(px*px+py*py<=r2){ const sx=cx+px,sy=cy+py;
        if(sx>=0&&sx<W&&sy>=0&&sy<H) buf32[sy*W+sx]=col; }
  };
  API.sprite = function(id, data) {
    const arr = new Uint8Array(64); let i = 0;
    for (const ch of data) { if (ch>='0'&&ch<='3') { arr[i++]=parseInt(ch); if(i>=64) break; } }
    sprites[id] = arr;
  };
  API.spr = function(id, x, y, flipX, flipY) {
    const s=sprites[id]; if(!s) return;
    x=Math.floor(x); y=Math.floor(y);
    for(let py=0;py<8;py++) for(let px=0;px<8;px++){
      const sx=flipX?7-px:px, sy=flipY?7-py:py;
      const c=s[sy*8+sx], dx=x+px, dy=y+py;
      if(dx>=0&&dx<W&&dy>=0&&dy<H) buf32[dy*W+dx]=COLOR_U32[c];
    }
  };
  API.text = function(str, x, y, c) {
    str=String(str).toUpperCase(); let cx=Math.floor(x); const cy=Math.floor(y);
    const col=COLOR_U32[c]||COLOR_U32[3];
    for(const ch of str){
      const glyph=FONT[ch];
      if(glyph) for(let py=0;py<FONT_H;py++) for(let px=0;px<FONT_W;px++)
        if(glyph[py*FONT_W+px]){ const dx=cx+px,dy=cy+py;
          if(dx>=0&&dx<W&&dy>=0&&dy<H) buf32[dy*W+dx]=col; }
      cx+=FONT_W+1;
    }
  };
  API.mget = function(cx,cy) { return tilemap[cx+","+cy]||0; };
  API.mset = function(cx,cy,id) { tilemap[cx+","+cy]=id; };
  API.map = function(mx,my,mw,mh,sx,sy) {
    for(let ty=0;ty<mh;ty++) for(let tx=0;tx<mw;tx++){
      const id=API.mget(mx+tx,my+ty); if(id>0) API.spr(id,sx+tx*8,sy+ty*8); }
  };
  const VALID_KEYS = {up:1,down:1,left:1,right:1,a:1,b:1};
  API.btn = function(k) { if(!VALID_KEYS[k]) console.warn("GrayBox: invalid key \""+k+"\". Use: up/down/left/right/a/b"); return !!keys[k]; };
  API.btnp = function(k) { if(!VALID_KEYS[k]) console.warn("GrayBox: invalid key \""+k+"\". Use: up/down/left/right/a/b"); return !!keys[k] && !keysPrev[k]; };
  API.note = function(ch, noteStr, dur) {
    ensureAudio(); if(ch<0||ch>1) return; API.stop(ch);
    const osc=audioCtx.createOscillator(); osc.type="square";
    osc.frequency.value=noteToFreq(noteStr);
    osc.connect(channelGains[ch]); osc.start();
    osc.stop(audioCtx.currentTime+dur); channels[ch]=osc;
  };
  API.stop = function(ch) {
    if(ch===undefined){API.stop(0);API.stop(1);return;}
    if(channels[ch]){try{channels[ch].stop();}catch(e){} channels[ch]=null;}
  };
  API.rnd = function(max) { return Math.random()*max; };
  API.flr = Math.floor;
  API.abs = Math.abs;
  API.min = Math.min;
  API.max = Math.max;
  API.sin = Math.sin;
  API.cos = Math.cos;

  function tick() {
    if (API._update) API._update();
    if (API._draw) API._draw();
    ctx.putImageData(buf, 0, 0);
    for (const k in keys) keysPrev[k] = keys[k];
    API.frame++;
  }

  // ============================================================
  // Mappy Game
  // ============================================================
  const { cls, pix, line, rect, rectf, circ, circf, sprite: defSprite,
          spr, text, btn, btnp, note, stop, rnd, flr, abs: _abs,
          min, max: _max, sin, cos } = API;

  // --- Sprites ---
  // 1: Mappy (police mouse) facing right
  defSprite(1,
    "00333000" +
    "03222300" +
    "32323230" +
    "03222300" +
    "00333000" +
    "03131300" +
    "03030300" +
    "03000300"
  );
  // 2: Mappy walking frame 2
  defSprite(2,

  // 3: Meowky (cat enemy) frame 1
  defSprite(3,

  defSprite(4,

  // 5: Goro (boss cat) frame 1
  defSprite(5,

    "33222330" +

  );
  // 6: Goro walking frame 2
  defSprite(6,

    "32232230" +

  );
  // 7: TV item
  defSprite(7,

    "31111130" +
    "31223130" +
    "31223130" +
    "31111130" +

  );
  // 8: Computer item
  defSprite(8,

  );
  // 9: Painting item
  defSprite(9,

  defSprite(10,

  defSprite(11,

  defSprite(15,

  // --- Game constants ---
  const NUM_FLOORS = 6;
  const FLOOR_H = 35;
  const FLOOR_TOP = 16;
  const FLOOR_THICK = 3;
  const LEVEL_LEFT = 21;
  const LEVEL_RIGHT = W - 21;
  const LEVEL_W = LEVEL_RIGHT - LEVEL_LEFT;
  const PLAYER_SPEED = 2.0;

  // --- Game state ---
  let state = "title";
  let player, cats, items, doors, trampolines, shockwaves, floatTexts;
  let score, lives, level, itemsLeft;
  let lastItemType, comboCount;
  let deathTimer, levelClearTimer;
  let titleBounce;

  function floorY(f) { return FLOOR_TOP + f * FLOOR_H; }

  // Trampoline columns: fixed X positions where trampolines exist between floors
  const TRAMP_COLS = [0, 1, 2, 3, 4];
  function trampX(col) { return LEVEL_LEFT + 4 + col * ((LEVEL_W - 13) / 4); }

  function buildTrampolines() {
    trampolines = [];
    for (let gap = 0; gap < NUM_FLOORS - 1; gap++) {
      for (let col = 0; col < TRAMP_COLS.length; col++) {
        trampolines.push({
          x: trampX(col),
          col: col,
          topFloor: gap,
          bottomFloor: gap + 1,
          bounces: 0,
          midY: (floorY(gap) + FLOOR_THICK + floorY(gap + 1)) / 2
        });
      }
    }
  }

  function buildDoors() {
    doors = [];
    for (let f = 0; f < NUM_FLOORS; f++) {
      const y = floorY(f) - 8;
      // 5-6 doors per floor, evenly spaced
      const nd = 5 + flr(rnd(2));
      const sp = (LEVEL_W - 20) / (nd + 1);
      for (let d = 0; d < nd; d++) {
        const x = LEVEL_LEFT + 10 + (d + 1) * sp;
        doors.push({
          x: x, y: y, floor: f,
          state: "closed",
          isMicro: rnd(1) < 0.12 + level * 0.02,
          timer: 0
        });
      }
    }
  }

  const ITEM_SPRITES = [7, 8, 9, 10];
  const ITEM_NAMES = ["TV", "PC", "ART", "RADIO"];
  const ITEM_POINTS = [200, 300, 400, 500];

  function buildItems() {
    items = [];
    const numPairs = min(3 + level, 8);
    const pool = [];
    for (let i = 0; i < numPairs; i++) {
      const t = flr(rnd(ITEM_SPRITES.length));
      pool.push(t, t);
    }
    // Shuffle
    for (let i = pool.length - 1; i > 0; i--) {
      const j = flr(rnd(i + 1));
      [pool[i], pool[j]] = [pool[j], pool[i]];
    }
    // Distribute across floors 0..NUM_FLOORS-1
    let idx = 0;
    for (let f = 0; f < NUM_FLOORS && idx < pool.length; f++) {
      const n = min(2 + flr(rnd(2)), pool.length - idx);
      const sp = (LEVEL_W - 27) / (n + 1);
      for (let i = 0; i < n && idx < pool.length; i++) {
        items.push({
          x: LEVEL_LEFT + 13 + (i + 1) * sp,
          y: floorY(f) - 9,
          floor: f,
          type: pool[idx],
          active: true
        });
        idx++;
      }
    }
    itemsLeft = items.filter(it => it.active).length;
  }

  function spawnCats() {
    cats = [];
    const nc = min(2 + level, 7);
    for (let i = 0; i < nc; i++) {
      const isGoro = (i === 0 && level >= 2);
      cats.push({
        x: LEVEL_LEFT + 20 + rnd(LEVEL_W - 40),
        floor: flr(rnd(NUM_FLOORS - 1)),
        dir: rnd(1) < 0.5 ? -1 : 1,
        isGoro: isGoro,
        speed: isGoro ? 1.0 + level * 0.08 : 1.2 + level * 0.12,
        stunTimer: 0,
        bouncing: false,
        bounceVY: 0,
        bounceY: 0,
        targetFloor: -1,
        animFrame: flr(rnd(12)),
        aiTimer: flr(rnd(60))
      });
    }
  }

  function resetLevel() {
    player = {
      x: W / 2 - 4,
      floor: NUM_FLOORS - 1,
      dir: 1,
      bouncing: false,
      bounceVY: 0,
      bounceY: 0,
      targetFloor: -1,
      animFrame: 0,
      dead: false,
      deadTimer: 0
    };
    buildTrampolines();
    buildDoors();
    buildItems();
    spawnCats();
    shockwaves = [];
    floatTexts = [];
    lastItemType = -1;
    comboCount = 0;
    deathTimer = 0;
    levelClearTimer = 0;
  }

  function resetGame() {
    score = 0;
    lives = 3;
    level = 1;
    resetLevel();
  }

  // --- Float text (score popups) ---
  function addFloatText(x, y, str, c) {
    floatTexts.push({ x: x, y: y, str: str, c: c, timer: 40 });
  }

  // --- Trampoline interaction ---
  function findTrampoline(ex, efloor) {
    for (const t of trampolines) {
      if (t.bounces >= 4) continue;
      if ((efloor === t.topFloor || efloor === t.bottomFloor) && _abs(ex - t.x) < 10) {
        return t;
      }
    }
    return null;
  }

  function startBounce(ent, tramp) {
    if (tramp.bounces >= 4) return false;
    ent.bouncing = true;
    if (ent.floor === tramp.bottomFloor) {
      ent.bounceVY = -5;
      ent.targetFloor = tramp.topFloor;
    } else {
      ent.bounceVY = 5;
      ent.targetFloor = tramp.bottomFloor;
    }
    ent.bounceY = floorY(ent.floor);
    tramp.bounces++;
    return true;
  }

  function updateBounce(ent) {
    if (!ent.bouncing) return false;
    ent.bounceY += ent.bounceVY;
    const targetY = floorY(ent.targetFloor);
    if ((ent.bounceVY < 0 && ent.bounceY <= targetY) ||
        (ent.bounceVY > 0 && ent.bounceY >= targetY)) {
      ent.bounceY = targetY;
      ent.floor = ent.targetFloor;
      ent.bouncing = false;
      ent.bounceVY = 0;
      ent.targetFloor = -1;
      return true; // landed
    }
    return false;
  }

  // --- Door logic ---
  function openNearestDoor(px, pf) {
    let best = null, bestD = 24;
    for (const d of doors) {
      if (d.floor !== pf || d.state !== "closed") continue;
      const dist = _abs(d.x - px);
      if (dist < bestD) { bestD = dist; best = d; }
    }
    if (!best) return;

    const openDir = player.x < best.x ? "openRight" : "openLeft";
    best.state = openDir;
    best.timer = 50;
    note(0, "D5", 0.06);

    // Microwave door: shockwave
    if (best.isMicro) {
      const sd = openDir === "openRight" ? 1 : -1;
      shockwaves.push({ x: best.x, floor: best.floor, dir: sd, timer: 50 });
      note(1, "G5", 0.15);
    }

    // Door pushes cats
    for (const cat of cats) {
      if (cat.stunTimer > 0 || cat.bouncing) continue;
      if (cat.floor !== best.floor) continue;
      const dx = cat.x - best.x;
      if (openDir === "openRight" && dx > 0 && dx < 32) {
        cat.stunTimer = 150;
        score += 500;
        addFloatText(cat.x, floorY(cat.floor) - 16, "500", 3);
        note(1, "E5", 0.08);
      } else if (openDir === "openLeft" && dx < 0 && dx > -32) {
        cat.stunTimer = 150;
        score += 500;
        addFloatText(cat.x, floorY(cat.floor) - 16, "500", 3);
        note(1, "E5", 0.08);
      }
    }
  }

  // --- Main update ---
  function updatePlay() {
    const p = player;

    // Float texts
    for (let i = floatTexts.length - 1; i >= 0; i--) {
      floatTexts[i].y -= 0.5;
      floatTexts[i].timer--;
      if (floatTexts[i].timer <= 0) floatTexts.splice(i, 1);
    }

    // Death state
    if (p.dead) {
      p.deadTimer++;
      if (p.deadTimer > 60) {
        lives--;
        if (lives <= 0) { state = "gameover"; }
        else { resetLevel(); }
      }
      return;
    }

    // Level clear
    if (levelClearTimer > 0) {
      levelClearTimer--;
      if (levelClearTimer <= 0) { level++; resetLevel(); }
      return;
    }

    // Player movement
    if (!p.bouncing) {
      let moved = false;
      if (btn("left")) {
        p.x -= PLAYER_SPEED;
        p.dir = -1;
        moved = true;
      } else if (btn("right")) {
        p.x += PLAYER_SPEED;
        p.dir = 1;
        moved = true;
      }
      if (moved) p.animFrame = (p.animFrame + 1) % 12;
      p.x = _max(LEVEL_LEFT, min(LEVEL_RIGHT - 8, p.x));

      // Trampoline check
      const tr = findTrampoline(p.x, p.floor);
      if (tr) {
        if (startBounce(p, tr)) {
          note(0, "C5", 0.05);
          setTimeout(() => { try { note(0, "E5", 0.05); } catch(e){} }, 60);
        }
      }

      // Open door
      if (btnp("a")) { openNearestDoor(p.x, p.floor); }

      // Collect items
      for (const it of items) {
        if (!it.active) continue;
        if (it.floor === p.floor && _abs(it.x - p.x) < 12) {
          it.active = false;
          let pts = ITEM_POINTS[it.type];
          if (it.type === lastItemType) {
            comboCount++;
            pts *= (comboCount + 1);
          } else {
            comboCount = 0;
          }
          lastItemType = it.type;
          score += pts;
          itemsLeft--;
          addFloatText(it.x, it.y - 4, String(pts), 3);
          note(0, "G5", 0.05);
          note(1, "C6", 0.05);

          if (itemsLeft <= 0) {
            levelClearTimer = 90;
            note(0, "C5", 0.1);
            setTimeout(() => { try { note(0, "E5", 0.1); } catch(e){} }, 120);
            setTimeout(() => { try { note(0, "G5", 0.1); } catch(e){} }, 240);
            setTimeout(() => { try { note(0, "C6", 0.2); } catch(e){} }, 360);
          }
        }
      }
    } else {
      const landed = updateBounce(p);
      if (landed) {
        // If player lands and the trampoline there is broken, they fall to death
        // Check: is there a broken trampoline at this spot?
        for (const t of trampolines) {
          if (t.bounces >= 4 &&
              (p.floor === t.topFloor || p.floor === t.bottomFloor) &&
              _abs(p.x - t.x) < 10) {
            // Landed on broken trampoline = fall through = death
            killPlayer();
            break;
          }
        }
      }
    }

    // Shockwaves
    for (let i = shockwaves.length - 1; i >= 0; i--) {
      const sw = shockwaves[i];
      sw.x += sw.dir * 6;
      sw.timer--;
      if (sw.timer <= 0 || sw.x < LEVEL_LEFT - 10 || sw.x > LEVEL_RIGHT + 10) {
        shockwaves.splice(i, 1);
        continue;
      }
      for (const cat of cats) {
        if (cat.stunTimer > 0) continue;
        if (cat.floor === sw.floor && _abs(cat.x - sw.x) < 14) {
          cat.stunTimer = 200;
          score += 1000;
          addFloatText(cat.x, floorY(cat.floor) - 16, "1000", 3);
          note(1, "A5", 0.1);
        }
      }
    }

    // Cats AI
    for (const cat of cats) {
      if (cat.stunTimer > 0) {
        cat.stunTimer--;
        if (cat.stunTimer <= 0) {
          cat.floor = 0;
          cat.x = LEVEL_LEFT + 20 + rnd(LEVEL_W - 40);
          cat.dir = rnd(1) < 0.5 ? -1 : 1;
        }
        continue;
      }
      if (cat.bouncing) {
        updateBounce(cat);
        continue;
      }

      cat.animFrame = (cat.animFrame + 1) % 12;
      cat.aiTimer--;
      if (cat.aiTimer <= 0) {
        cat.aiTimer = 20 + flr(rnd(40));
        if (cat.floor === p.floor) {
          cat.dir = p.x > cat.x ? 1 : -1;
        } else {
          // Move toward a trampoline to reach player
          cat.dir = rnd(1) < 0.6 ? (p.x > cat.x ? 1 : -1) : (rnd(1) < 0.5 ? 1 : -1);
        }
      }

      cat.x += cat.dir * cat.speed;
      cat.x = _max(LEVEL_LEFT, min(LEVEL_RIGHT - 8, cat.x));
      if (cat.x <= LEVEL_LEFT || cat.x >= LEVEL_RIGHT - 8) cat.dir *= -1;

      // Cat trampoline usage
      if (rnd(1) < 0.04) {
        const tr = findTrampoline(cat.x, cat.floor);
        if (tr) {
          const wantUp = cat.floor > p.floor;
          const wantDown = cat.floor < p.floor;
          if ((wantUp && cat.floor === tr.bottomFloor) ||
              (wantDown && cat.floor === tr.topFloor) ||
              rnd(1) < 0.2) {
            startBounce(cat, tr);
          }
        }
      }

      // Cat catches Mappy
      if (!p.bouncing && !p.dead && cat.floor === p.floor && _abs(cat.x - p.x) < 7) {
        killPlayer();
      }
    }

    // Doors auto-close
    for (const d of doors) {
      if (d.state !== "closed") {
        d.timer--;
        if (d.timer <= 0) d.state = "closed";
      }
    }
  }

  function killPlayer() {
    player.dead = true;
    player.deadTimer = 0;
    note(0, "C3", 0.15);
    note(1, "E2", 0.2);
  }

  // --- Drawing ---
  function drawMansion() {
    // Roof
    const roofY = FLOOR_TOP - 6;
    for (let x = LEVEL_LEFT; x < LEVEL_RIGHT; x += 11) {
      line(x, roofY, x + 5, roofY - 6, 2);
      line(x + 5, roofY - 6, x + 11, roofY, 2);
    }
    rectf(LEVEL_LEFT, roofY, LEVEL_W, 3, 2);

    // Floors
    for (let f = 0; f < NUM_FLOORS; f++) {
      const fy = floorY(f);
      rectf(LEVEL_LEFT, fy, LEVEL_W, FLOOR_THICK, 2);
    }

    // Walls
    rectf(LEVEL_LEFT - 3, FLOOR_TOP, 3, (NUM_FLOORS - 1) * FLOOR_H + FLOOR_THICK, 2);
    rectf(LEVEL_RIGHT, FLOOR_TOP, 3, (NUM_FLOORS - 1) * FLOOR_H + FLOOR_THICK, 2);

    // Floor labels
    for (let f = 0; f < NUM_FLOORS; f++) {
      text(String(NUM_FLOORS - f) + "F", LEVEL_LEFT - 15, floorY(f) - 3, 1);
    }
  }

  function drawTrampolines() {
    for (const t of trampolines) {
      if (t.bounces >= 4) {
        // Broken: draw a gap/crack
        pix(t.x + 2, t.midY, 1);
        pix(t.x + 5, t.midY + 1, 1);
        continue;
      }
      const sprId = 15 + min(t.bounces, 3);
      // Support rails
      const topY = floorY(t.topFloor) + FLOOR_THICK;
      const botY = floorY(t.bottomFloor);
      line(t.x + 1, topY, t.x + 1, botY, 1);
      line(t.x + 6, topY, t.x + 6, botY, 1);
      // Bouncy pad
      spr(sprId, t.x - 1, t.midY - 3);
    }
  }

  function drawDoors() {
    for (const d of doors) {
      if (d.state === "closed") {
        spr(d.isMicro ? 14 : 11, d.x, d.y);
      } else if (d.state === "openLeft") {
        spr(12, d.x - 5, d.y);
      } else {
        spr(13, d.x + 5, d.y);
      }
    }
  }

  function drawItems() {
    for (const it of items) {
      if (!it.active) continue;
      spr(ITEM_SPRITES[it.type], it.x, it.y);
    }
  }

  function drawPlayer() {
    const p = player;
    if (p.dead) {
      if (p.deadTimer % 8 < 4) {
        spr(22, p.x, floorY(p.floor) - 10 - p.deadTimer * 0.3, p.deadTimer % 16 < 8);
      }
      return;
    }
    const py = p.bouncing ? p.bounceY - 10 : floorY(p.floor) - 10;
    const flip = p.dir < 0;
    if (p.bouncing) {
      spr(19, p.x, py, flip);
    } else {
      spr(p.animFrame < 6 ? 1 : 2, p.x, py, flip);
    }
  }

  function drawCats() {
    for (const cat of cats) {
      if (cat.stunTimer > 0) {
        if (cat.stunTimer % 6 < 4) {
          spr(21, cat.x, floorY(cat.floor) - 10);
        }
        continue;
      }
      const cy = cat.bouncing ? cat.bounceY - 10 : floorY(cat.floor) - 10;
      const flip = cat.dir < 0;
      if (cat.isGoro) {
        spr(cat.animFrame < 6 ? 5 : 6, cat.x, cy, flip);
      } else {
        spr(cat.animFrame < 6 ? 3 : 4, cat.x, cy, flip);
      }
    }
  }

  function drawShockwaves() {
    for (const sw of shockwaves) {
      const sy = floorY(sw.floor) - 5;
      for (let i = 0; i < 4; i++) {
        const wx = sw.x - sw.dir * i * 6;
        const c = i === 0 ? 3 : (i === 1 ? 2 : 1);
        rectf(wx, sy, 6, 3, c);
      }
    }
  }

  function drawFloatTexts() {
    for (const ft of floatTexts) {
      text(ft.str, ft.x, ft.y, ft.c);
    }
  }

  function drawHUD() {
    // Black bar at top
    rectf(0, 0, W, 10, 0);
    text("SCORE " + String(score).padStart(7, "0"), 3, 2, 3);
    text("LV" + level, W / 2 - 7, 2, 2);
    text("LEFT:" + itemsLeft, W / 2 + 20, 2, 2);
    // Lives
    for (let i = 0; i < lives; i++) {
      spr(20, W - 33 + i * 7, 1);
    }
    // Combo
    if (comboCount > 0) {
      text("X" + (comboCount + 1), W / 2 - 27, 2, 3);
    }
  }

  // --- Title screen ---
  function drawTitleScreen() {
    const t = titleBounce || 0;
    const by = sin(t * 0.07) * 5;

    // Big title
    text("M A P P Y", W / 2 - 28, 38 + by, 3);
    text("POLICE MOUSE", W / 2 - 20, 51, 2);

    // Mansion
    const mx = W / 2 - 53, my = 68;
    rect(mx, my, 107, 68, 2);
    // Roof
    line(mx, my, mx + 53, my - 17, 3);
    line(mx + 53, my - 17, mx + 107, my, 3);
    // Windows
    for (let wy = 0; wy < 3; wy++) {
      for (let wx = 0; wx < 4; wx++) {
        const winX = mx + 9 + wx * 25;
        const winY = my + 6 + wy * 20;
        rectf(winX, winY, 7, 11, 0);
        rect(winX, winY, 7, 11, wy === 1 ? 3 : 2);
      }
    }
    // Door
    rectf(mx + 45, my + 51, 16, 17, 1);
    rect(mx + 45, my + 51, 16, 17, 3);

    // Characters
    spr(1, W / 2 - 4, 146 + by);
    spr(3, W / 2 - 33, 146);
    spr(3, W / 2 - 23, 148);
    spr(5, W / 2 + 27, 146);

    // Instructions
    text("PRESS ENTER TO START", W / 2 - 50, 165, (flr(t / 15) % 2 === 0) ? 3 : 2);
    text("ARROWS MOVE   Z OPEN DOOR", W / 2 - 64, 180, 1);
    text("COLLECT ALL STOLEN ITEMS", W / 2 - 60, 189, 1);
    text("MATCHING PAIRS = BONUS!", W / 2 - 58, 198, 1);
    text("DOORS PUSH BACK CATS", W / 2 - 52, 207, 1);
    text("GRAYBOX MAPPY", W / 2 - 34, H - 10, 1);
  }

  function drawGameOverScreen() {
    text("GAME OVER", W / 2 - 24, H / 2 - 30, 3);
    text("FINAL SCORE", W / 2 - 28, H / 2 - 15, 2);
    text(String(score).padStart(7, "0"), W / 2 - 18, H / 2 - 5, 3);
    text("LEVEL " + level, W / 2 - 15, H / 2 + 11, 2);
    text("PRESS ENTER", W / 2 - 28, H / 2 + 30, (flr((titleBounce || 0) / 15) % 2 === 0) ? 3 : 2);
    spr(22, W / 2 - 4, H / 2 + 45);
  }

  // --- State machine ---
  API._update = function() {
    if (state === "title") {
      titleBounce = (titleBounce || 0) + 1;
      if (btnp("a")) {
        state = "play";
        resetGame();
      }
    } else if (state === "play") {
      updatePlay();
    } else if (state === "gameover") {
      titleBounce = (titleBounce || 0) + 1;
      if (btnp("a")) { state = "title"; }
    }
  };

  API._draw = function() {
    cls(0);
    if (state === "title") {
      drawTitleScreen();
    } else if (state === "play") {
      drawMansion();
      drawTrampolines();
      drawDoors();
      drawItems();
      drawShockwaves();
      drawCats();
      drawPlayer();
      drawFloatTexts();
      drawHUD();
      if (levelClearTimer > 0) {
        rectf(W / 2 - 40, H / 2 - 11, 80, 15, 0);
        text("LEVEL CLEAR!", W / 2 - 30, H / 2 - 8, 3);
      }
    } else if (state === "gameover") {
      drawGameOverScreen();
    }
  };

  // --- Init ---
  API._init = function() {
    state = "title";
    titleBounce = 0;
  };

  if (API._init) API._init();
  setInterval(tick, 1000 / FPS);
  document.addEventListener("keydown", ensureAudio, { once: true });
  document.addEventListener("click", ensureAudio, { once: true });
})();
</script>
</body>
</html>
