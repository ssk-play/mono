<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GrayBox — Demo: Xevious</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #0a0a0a;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100vh;
    font-family: monospace;
    overflow: hidden;
  }
  #frame {
    background: #111;
    border: 3px solid #333;
    border-radius: 8px;
    padding: 12px;
    box-shadow: 0 0 40px rgba(0,0,0,0.8), inset 0 0 20px rgba(0,0,0,0.5);
  }
  canvas {
    display: block;
    image-rendering: pixelated;
    image-rendering: crisp-edges;
  }
  #controls {
    margin-top: 12px;
    color: #6b6b6b;
    font-size: 11px;
    text-align: center;
    letter-spacing: 1px;
  }
  #controls span { color: #b0b0b0; }
</style>
</head>
<body>
<div id="frame">
  <canvas id="screen"></canvas>
</div>
<div id="controls">
  <span>ARROWS</span> MOVE &nbsp;&nbsp; <span>A</span> SHOOT &nbsp;&nbsp; <span>B</span> BOMB
</div>
<script src="../../runtime/engine.js"></script>
<script>
(() => {
  "use strict";
  const W = GrayBox.WIDTH, H = GrayBox.HEIGHT;
  const { cls, pix, line, rect, rectf, circ, circf, sprite: defSprite,
          spr, sprT, text, btn, btnp, note, stop, rnd, flr, abs: _abs,
          min, max: _max, sin, cos } = GrayBox;

  // --- Sprites ---

  // 1: Player ship (Solvalou) - sleek forward-facing fighter

  // 8: Tank (ground target - boxy)

  // 9: Bunker (ground defense - dome shape)
  defSprite(9,

  // 10: Turret (rotating ground gun)

  // 11: Fortress core (boss - center piece)

  // 12: Fortress wing (boss - side piece)

  // 14: Explosion frame 1
  defSprite(14,

  );

  // 15: Explosion frame 2
  defSprite(15,

  // 16: Ground explosion frame 1
  defSprite(16,

  // 17: Ground explosion frame 2
  defSprite(17,
    "10001001" +

  );

  // 18: Life icon
  defSprite(18,
    "00000000" +
    "00030000" +
    "00333000" +
    "03333300" +
    "33323330" +

    "00000000"
  );

  // 19: Bacura (indestructible rotating plate)
  defSprite(19,
    "01111110" +
    "13333310" +
    "13222310" +
    "13232310" +
    "13232310" +
    "13222310" +
    "13333310" +
    "01111110"
  );

  // --- Terrain tile sprites ---
  // 20: Grass/field (light ground)
  defSprite(20,
    "00000000" +
    "00100000" +
    "00000010" +
    "01000000" +
    "00000100" +
    "00010000" +
    "00000001" +
    "00000000"
  );
  // 21: Forest/dense
  defSprite(21,
    "01001010" +
    "10010001" +
    "01100110" +
    "10011001" +
    "01001010" +
    "10110001" +
    "01001010" +
    "10010101"
  );
  // 22: River/water
  defSprite(22,
    "00000000" +
    "00000000" +
    "01111110" +
    "11111111" +
    "11111111" +
    "01111110" +
    "00000000" +
    "00000000"
  );
  // 23: Road
  defSprite(23,
    "00011000" +
    "00011000" +
    "00011000" +
    "00011000" +
    "00011000" +
    "00011000" +
    "00011000" +
    "00011000"
  );

  // --- Scenes ---
  const { TITLE, PLAY, GAMEOVER } = GrayBox.SCENE;
  let _scene = TITLE;

  let player, zapper, bombs, bombReticle, airEnemies, groundTargets;
  let eBullets, explosions, particles;
  let score, lives, scrollY, scrollSpeed;
  let shootCd, bombCd;
  let bossActive, boss;
  let distanceTraveled, nextBossAt;
  let invincibleTimer;

  // Terrain map - procedurally generated strips
  const TERRAIN_W = 40; // tiles wide
  const TERRAIN_H = 2000; // tiles tall (scrolling)
  const terrain = new Uint8Array(TERRAIN_W * TERRAIN_H);

  function genTerrain() {
    // Seed-based procedural terrain
    for (let y = 0; y < TERRAIN_H; y++) {
      for (let x = 0; x < TERRAIN_W; x++) {
        const n = Math.sin(x * 0.3 + y * 0.1) * 0.5 + Math.sin(x * 0.1 + y * 0.25) * 0.5;
        const n2 = Math.sin(x * 0.05 + y * 0.02) * 0.5 + 0.5;
        if (n2 > 0.7 && _abs(n) < 0.3) {
          terrain[y * TERRAIN_W + x] = 22; // water/river
        } else if (n > 0.4) {
          terrain[y * TERRAIN_W + x] = 21; // forest
        } else if (n > -0.1) {
          terrain[y * TERRAIN_W + x] = 20; // field
        } else {
          // road segments
          if (_abs(Math.sin(y * 0.05) * 10 + 20 - x) < 2) {
            terrain[y * TERRAIN_W + x] = 23;
          } else {
            terrain[y * TERRAIN_W + x] = 20;
          }
        }
      }
    }
  }

  // Air enemy wave patterns
  const PATTERNS = [
    // V-formation sweeping left
    function(wave) {
      const enemies = [];
      for (let i = 0; i < 5; i++) {
        enemies.push({
          type: 5, hp: 1, pts: 100,
          startX: -20 - i * 10, startY: 30 + _abs(i - 2) * 15,
          pattern: "sweep_right", delay: i * 5, speed: 2.5 + wave * 0.1
        });
      }
      return enemies;
    },
    // Column dive from top
    function(wave) {
      const enemies = [];
      const cx = 40 + flr(rnd(W - 80));
      for (let i = 0; i < 4; i++) {
        enemies.push({
          type: 6, hp: 1, pts: 150,
          startX: cx, startY: -20 - i * 20,
          pattern: "dive_zigzag", delay: i * 8, speed: 2 + wave * 0.1
        });
      }
      return enemies;
    },
    // Circle formation
    function(wave) {
      const enemies = [];
      for (let i = 0; i < 6; i++) {
        enemies.push({
          type: 5, hp: 1, pts: 100,
          startX: W + 20, startY: 45 + i * 19,
          pattern: "sweep_left", delay: i * 4, speed: 2.2 + wave * 0.1
        });
      }
      return enemies;
    },
    // Fast arrows
    function(wave) {
      const enemies = [];
      for (let i = 0; i < 3; i++) {
        enemies.push({
          type: 7, hp: 1, pts: 200,
          startX: rnd(W - 27) + 13, startY: -20 - i * 23,
          pattern: "fast_dive", delay: i * 10, speed: 3.5 + wave * 0.15
        });
      }
      return enemies;
    },
    // Bacura wave (indestructible)
    function(wave) {
      const enemies = [];
      for (let i = 0; i < 2; i++) {
        enemies.push({
          type: 19, hp: 999, pts: 0,
          startX: 67 + i * 133, startY: -20,
          pattern: "slow_descent", delay: i * 20, speed: 1.5
        });
      }
      return enemies;
    },
    // Wide V from top
    function(wave) {
      const enemies = [];
      for (let i = 0; i < 7; i++) {
        enemies.push({
          type: 6, hp: 1, pts: 150,
          startX: W/2 - 60 + i * 20, startY: -20 - _abs(i - 3) * 11,
          pattern: "dive_spread", delay: i * 3, speed: 2 + wave * 0.1
        });
      }
      return enemies;
    }
  ];

  function resetGame() {
    player = { x: W / 2 - 4, y: H - 30, speed: 2.5 };
    zapper = [];
    bombs = [];
    bombReticle = { x: W / 2 - 4, y: H - 60, active: false };
    airEnemies = [];
    groundTargets = [];
    eBullets = [];
    explosions = [];
    particles = [];
    score = 0;
    lives = 3;
    scrollY = 0;
    scrollSpeed = 0.8;
    shootCd = 0;
    bombCd = 0;
    bossActive = false;
    boss = null;
    distanceTraveled = 0;
    nextBossAt = 1500 + flr(rnd(500));
    invincibleTimer = 60;
    genTerrain();
    spawnGroundTargets();
  }

  let waveTimer = 0;
  let waveCount = 0;

  function spawnAirWave() {
    waveCount++;
    const patIdx = flr(rnd(PATTERNS.length));
    const newEnemies = PATTERNS[patIdx](waveCount);
    for (const def of newEnemies) {
      airEnemies.push({
        x: def.startX, y: def.startY,
        type: def.type, hp: def.hp, pts: def.pts,
        pattern: def.pattern, delay: def.delay,
        speed: def.speed, t: 0, alive: true,
        originX: def.startX, originY: def.startY,
        shootTimer: 40 + flr(rnd(60))
      });
    }
  }

  function spawnGroundTargets() {
    // Spread ground targets across the terrain
    for (let i = 0; i < 120; i++) {
      const ty = 50 + i * 15 + flr(rnd(10));
      const tx = 13 + flr(rnd(W - 27));
      const type = flr(rnd(3));
      let sprId, hp, pts;
      if (type === 0) { sprId = 8; hp = 1; pts = 200; }       // tank
      else if (type === 1) { sprId = 9; hp = 2; pts = 300; }   // bunker
      else { sprId = 10; hp = 1; pts = 250; }                  // turret
      groundTargets.push({
        x: tx, mapY: ty * 8, // mapY = position in scrolling world
        sprId: sprId, hp: hp, pts: pts,
        alive: true, type: type,
        angle: rnd(6.28), // for turret rotation
        shootTimer: 60 + flr(rnd(120))
      });
    }
  }

  function spawnBoss() {
    bossActive = true;
    boss = {
      x: W / 2 - 20, y: -30,
      hp: 30, maxHp: 30,
      phase: "enter", // enter, fight, flee
      t: 0, pts: 5000,
      shootTimer: 0, moveAngle: 0,
      coreHit: 0
    };
  }

  function addExplosion(x, y, ground) {
    explosions.push({ x: x, y: y, timer: 12, ground: !!ground });
    const count = ground ? 12 : 8;
    for (let i = 0; i < count; i++)
      particles.push({
        x: x + 4, y: y + 4,
        vx: rnd(4) - 2, vy: rnd(4) - 2,
        life: 6 + flr(rnd(10)),
        color: ground ? flr(rnd(2)) + 1 : flr(rnd(3)) + 1
      });
  }

  function shootSound() { note(0, "E6", 0.03); }
  function bombDropSound() { note(1, "C4", 0.08); }
  function bombHitSound() {
    note(0, "C3", 0.1);
    setTimeout(() => note(0, "G2", 0.08), 50);
  }
  function hitSound() { note(1, "C3", 0.05); setTimeout(() => note(1, "E3", 0.04), 30); }
  function deathSound() {
    note(0, "C3", 0.12); note(1, "G2", 0.12);
    setTimeout(() => { note(0, "A2", 0.18); note(1, "E2", 0.18); }, 120);
  }
  function bossDeathSound() {
    note(0, "C4", 0.1);
    setTimeout(() => note(0, "E4", 0.1), 80);
    setTimeout(() => note(0, "G4", 0.1), 160);
    setTimeout(() => { note(0, "C5", 0.2); note(1, "E5", 0.2); }, 240);
  }

  // --- Title Scene ---
  GrayBox.scene(TITLE, {
    init() { resetGame(); _scene = TITLE; },
    update() {
      scrollY += 0.3;
      if (btnp("a") || btnp("a")) {
        note(0, "C5", 0.08);
        setTimeout(() => note(0, "E5", 0.08), 80);
        setTimeout(() => note(0, "G5", 0.12), 160);
        GrayBox.go(PLAY); return;
      }
    },
    draw() { drawAll(); }
  });

  // --- Game Over Scene ---
  GrayBox.scene(GAMEOVER, {
    init() { _scene = GAMEOVER; },
    update() {
      scrollY += 0.2;
      for (let i = particles.length - 1; i >= 0; i--) { const p = particles[i]; p.x += p.vx; p.y += p.vy; p.vy += 0.08; p.life--; if (p.life <= 0) particles.splice(i, 1); }
      if (btnp("a") || btnp("a")) { GrayBox.go(TITLE); return; }
    },
    draw() { drawAll(); }
  });

  // --- Play Scene ---
  GrayBox.scene(PLAY, {
    init() { resetGame(); _scene = PLAY; },
    update() {
    // --- Play state ---
    scrollY += scrollSpeed;
    distanceTraveled += scrollSpeed;

    // Invincibility
    if (invincibleTimer > 0) invincibleTimer--;

    // Player movement (all 4 directions)
    if (btn("left")) player.x -= player.speed;
    if (btn("right")) player.x += player.speed;
    if (btn("up")) player.y -= player.speed;
    if (btn("down")) player.y += player.speed;
    player.x = _max(4, min(W - 12, player.x));
    player.y = _max(12, min(H - 12, player.y));

    // Bomb reticle follows player, offset ahead
    bombReticle.x = player.x;
    bombReticle.y = player.y - 38;
    if (bombReticle.y < 12) bombReticle.y = 12;

    // A button: Zapper (air shot)
    if (shootCd > 0) shootCd--;
    if (btn("a") && shootCd <= 0 && zapper.length < 3) {
      zapper.push({ x: player.x + 0, y: player.y - 6 });
      shootCd = 6;
      shootSound();
    }

    // B button: Bomb (ground targeting)
    if (bombCd > 0) bombCd--;
    if (btnp("b") && bombCd <= 0 && bombs.length < 1) {
      bombs.push({
        x: player.x + 2, y: player.y - 4,
        targetX: bombReticle.x + 2, targetY: bombReticle.y + 2,
        progress: 0
      });
      bombCd = 20;
      bombDropSound();
    }

    // Update zapper bullets
    for (let i = zapper.length - 1; i >= 0; i--) {
      zapper[i].y -= 7;
      if (zapper[i].y < -8) zapper.splice(i, 1);
    }

    // Update bombs
    for (let i = bombs.length - 1; i >= 0; i--) {
      const b = bombs[i];
      b.progress += 0.06;
      // Lerp toward target
      b.x += (b.targetX - b.x) * 0.08;
      b.y += (b.targetY - b.y) * 0.08;
      if (b.progress >= 1) {
        // Bomb hits ground
        addExplosion(b.targetX - 4, b.targetY - 4, true);
        bombHitSound();
        // Check ground target hits
        for (let j = groundTargets.length - 1; j >= 0; j--) {
          const gt = groundTargets[j];
          if (!gt.alive) continue;
          const screenY = scrollY - gt.mapY;
          if (_abs(b.targetX - gt.x) < 12 && _abs(b.targetY - screenY) < 12) {
            gt.hp--;
            if (gt.hp <= 0) {
              gt.alive = false;
              score += gt.pts;
              addExplosion(gt.x, screenY, true);
            }
          }
        }
        // Check boss hit by bomb
        if (bossActive && boss && boss.phase === "fight") {
          if (_abs(b.targetX - (boss.x + 20)) < 20 && _abs(b.targetY - (boss.y + 16)) < 20) {
            boss.hp -= 3;
            boss.coreHit = 6;
            hitSound();
          }
        }
        bombs.splice(i, 1);
      }
    }

    // Spawn air enemy waves
    waveTimer--;
    if (waveTimer <= 0) {
      spawnAirWave();
      waveTimer = 90 + flr(rnd(60)) - min(waveCount * 2, 40);
    }

    // Update air enemies
    for (let i = airEnemies.length - 1; i >= 0; i--) {
      const e = airEnemies[i];
      if (e.delay > 0) { e.delay--; continue; }
      e.t++;

      // Movement patterns
      switch (e.pattern) {
        case "sweep_right":
          e.x = e.originX + e.t * e.speed;
          e.y = e.originY + sin(e.t * 0.08) * 30;
          break;
        case "sweep_left":
          e.x = e.originX - e.t * e.speed;
          e.y = e.originY + sin(e.t * 0.08) * 30;
          break;
        case "dive_zigzag":
          e.x = e.originX + sin(e.t * 0.1) * 40;
          e.y = e.originY + e.t * e.speed;
          break;
        case "fast_dive": {
          const targetX = player.x;
          e.x += (targetX - e.x) * 0.02;
          e.y += e.speed;
          break;
        }
        case "slow_descent":
          e.x = e.originX + sin(e.t * 0.03) * 20;
          e.y = e.originY + e.t * e.speed * 0.5;
          break;
        case "dive_spread":
          e.x = e.originX + sin(e.t * 0.06) * 13;
          e.y = e.originY + e.t * e.speed * 0.8;
          break;
      }

      // Enemy shoots
      e.shootTimer--;
      if (e.shootTimer <= 0 && e.y > 8 && e.y < H - 23 && e.x > 0 && e.x < W) {
        // Aimed shot toward player
        const dx = player.x - e.x, dy = player.y - e.y;
        const dist = Math.sqrt(dx * dx + dy * dy) || 1;
        eBullets.push({
          x: e.x + 0, y: e.y + 6,
          vx: (dx / dist) * 2.5, vy: (dy / dist) * 2.5
        });
        e.shootTimer = 40 + flr(rnd(50));
      }

      // Off-screen removal
      if (e.y > H + 30 || e.x < -50 || e.x > W + 50) {
        airEnemies.splice(i, 1);
        continue;
      }

      // Zapper vs air enemy collision
      for (let j = zapper.length - 1; j >= 0; j--) {
        const b = zapper[j];
        if (b.x + 8 > e.x - 2 && b.x < e.x + 10 && b.y + 8 > e.y - 2 && b.y < e.y + 10) {
          zapper.splice(j, 1);
          e.hp--;
          if (e.hp <= 0) {
            addExplosion(e.x, e.y, false);
            score += e.pts;
            hitSound();
            airEnemies.splice(i, 1);
          }
          break;
        }
      }
    }

    // Ground turrets shoot at player
    for (const gt of groundTargets) {
      if (!gt.alive || gt.type !== 2) continue; // only turrets shoot
      const screenY = scrollY - gt.mapY;
      if (screenY < -10 || screenY > H + 10) continue;
      gt.shootTimer--;
      gt.angle = Math.atan2(player.y - screenY, player.x - gt.x);
      if (gt.shootTimer <= 0) {
        const dx = cos(gt.angle), dy = sin(gt.angle);
        eBullets.push({
          x: gt.x + 4, y: screenY + 4,
          vx: dx * 2, vy: dy * 2
        });
        gt.shootTimer = 80 + flr(rnd(60));
      }
    }

    // Update enemy bullets
    for (let i = eBullets.length - 1; i >= 0; i--) {
      const b = eBullets[i];
      b.x += b.vx; b.y += b.vy;
      if (b.x < -10 || b.x > W + 10 || b.y < -10 || b.y > H + 10) {
        eBullets.splice(i, 1); continue;
      }
      // Hit player
      if (invincibleTimer <= 0 &&
          b.x + 8 > player.x && b.x < player.x + 8 &&
          b.y + 8 > player.y && b.y < player.y + 8) {
        eBullets.splice(i, 1);
        playerDie();
      }
    }

    // Air enemy vs player collision
    if (invincibleTimer <= 0) {
      for (let i = airEnemies.length - 1; i >= 0; i--) {
        const e = airEnemies[i];
        if (e.delay > 0) continue;
        if (player.x + 7 > e.x && player.x < e.x + 8 &&
            player.y + 7 > e.y && player.y < e.y + 8) {
          if (e.hp < 999) { // not bacura
            addExplosion(e.x, e.y, false);
            airEnemies.splice(i, 1);
          }
          playerDie();
          break;
        }
      }
    }

    // Boss logic
    if (!bossActive && distanceTraveled > nextBossAt) {
      spawnBoss();
      nextBossAt = distanceTraveled + 2000 + flr(rnd(500));
    }

    if (bossActive && boss) {
      boss.t++;
      if (boss.coreHit > 0) boss.coreHit--;

      if (boss.phase === "enter") {
        boss.y += 0.8;
        if (boss.y >= 23) { boss.phase = "fight"; boss.t = 0; }
      } else if (boss.phase === "fight") {
        boss.moveAngle += 0.02;
        boss.x = W / 2 - 20 + sin(boss.moveAngle) * 53;
        boss.y = 23 + sin(boss.moveAngle * 0.7) * 11;

        // Boss shoots
        boss.shootTimer--;
        if (boss.shootTimer <= 0) {
          for (let a = 0; a < 5; a++) {
            const angle = -Math.PI / 2 + (a - 2) * 0.3;
            eBullets.push({
              x: boss.x + 20, y: boss.y + 24,
              vx: cos(angle) * 2.5, vy: sin(angle) * 2.5
            });
          }
          boss.shootTimer = 25 + flr(rnd(15));
        }

        // Zapper vs boss
        for (let j = zapper.length - 1; j >= 0; j--) {
          const b = zapper[j];
          if (b.x + 8 > boss.x - 2 && b.x < boss.x + 42 && b.y + 8 > boss.y - 2 && b.y < boss.y + 26) {
            zapper.splice(j, 1);
            boss.hp--;
            boss.coreHit = 4;
            if (boss.hp <= 0) {
              // Boss destroyed
              for (let ex = 0; ex < 6; ex++)
                addExplosion(boss.x + rnd(40) - 4, boss.y + rnd(24) - 4, false);
              score += boss.pts;
              bossDeathSound();
              bossActive = false;
              boss = null;
            } else {
              note(1, "A4", 0.02);
            }
            break;
          }
        }
      }
    }

    // Explosions
    for (let i = explosions.length - 1; i >= 0; i--) {
      explosions[i].timer--;
      if (explosions[i].timer <= 0) explosions.splice(i, 1);
    }

    // Particles
    for (let i = particles.length - 1; i >= 0; i--) {
      const p = particles[i];
      p.x += p.vx; p.y += p.vy; p.vy += 0.06; p.life--;
      if (p.life <= 0) particles.splice(i, 1);
    }
    },
    draw() { drawAll(); }
  });

  function playerDie() {
    lives--;
    addExplosion(player.x, player.y, false);
    deathSound();
    player.x = W / 2 - 4;
    player.y = H - 30;
    invincibleTimer = 90;
    if (lives <= 0) {
      addExplosion(player.x - 5, player.y + 3, false);
      GrayBox.go(GAMEOVER);
    }
  }

  function drawAll() {
    cls(0);

    // --- Draw terrain (parallax scrolling ground) ---
    const tileOffY = -(scrollY % 8);
    const mapRow = -flr(scrollY / 8);
    // Far layer (slower parallax - subtle dots)
    const farOff = -flr(scrollY * 0.3);
    for (let py = -1; py < H / 8 + 1; py++) {
      for (let px = 0; px < W / 8; px++) {
        const my = (flr(farOff / 8) + py) % TERRAIN_H;
        if (my < 0) continue;
        const tile = terrain[(my % TERRAIN_H) * TERRAIN_W + (px % TERRAIN_W)];
        if (tile === 22) {
          // Water shimmer (far)
          const sx = px * 8, sy = py * 8 - (farOff % 8);
          if (sy > 8 && sy < H) {
            pix(sx + 3, sy + 2, 1);
            pix(sx + 6, sy + 5, 1);
          }
        } else if (tile === 21) {
          // Forest shadow (far)
          const sx = px * 8, sy = py * 8 - (farOff % 8);
          if (sy > 8 && sy < H) {
            pix(sx + 2, sy + 3, 1);
            pix(sx + 5, sy + 1, 1);
          }
        }
      }
    }

    // Near layer (main terrain)
    for (let py = -1; py < H / 8 + 2; py++) {
      for (let px = 0; px < W / 8; px++) {
        const my = (mapRow + py) % TERRAIN_H;
        if (my < 0) continue;
        const tile = terrain[(my % TERRAIN_H) * TERRAIN_W + (px % TERRAIN_W)];
        const sx = px * 8, sy = py * 8 - tileOffY;
        if (sy < 8 || sy > H) continue;

        if (tile === 21) {
          // Forest - scattered dots
          pix(sx + 1, sy + 0, 1);
          pix(sx + 4, sy + 2, 1);
          pix(sx + 0, sy + 4, 1);
          pix(sx + 6, sy + 3, 1);
          pix(sx + 3, sy + 6, 1);
          pix(sx + 2, sy + 1, 1);
        } else if (tile === 22) {
          // Water - horizontal lines
          const waveOff = flr(sin((sy + GrayBox.frame * 2) * 0.15) * 2);
          for (let wx = 0; wx < 8; wx += 2) {
            pix(sx + wx + waveOff, sy + 2, 1);
            pix(sx + wx + 1 - waveOff, sy + 5, 1);
          }
        } else if (tile === 23) {
          // Road
          pix(sx + 3, sy, 1); pix(sx + 4, sy, 1);
          pix(sx + 3, sy + 2, 1); pix(sx + 4, sy + 2, 1);
          pix(sx + 3, sy + 4, 1); pix(sx + 4, sy + 4, 1);
          pix(sx + 3, sy + 6, 1); pix(sx + 4, sy + 6, 1);
        } else if (tile === 20) {
          // Field - very sparse dots
          if ((px + my) % 5 === 0) pix(sx + 3, sy + 4, 1);
        }
      }
    }

    // --- Draw ground targets ---
    for (const gt of groundTargets) {
      if (!gt.alive) continue;
      const screenY = scrollY - gt.mapY;
      if (screenY < 8 || screenY > H + 8) continue;

      if (gt.type === 2) {
        // Turret with rotation indicator
        sprT(gt.sprId, flr(gt.x), flr(screenY));
        // Draw gun barrel direction
        const bx = gt.x + 4 + cos(gt.angle) * 5;
        const by = screenY + 4 + sin(gt.angle) * 5;
        pix(flr(bx), flr(by), 3);
      } else {
        sprT(gt.sprId, flr(gt.x), flr(screenY));
      }
    }

    // --- Draw bomb reticle ---
    if (_scene === PLAY) {
      const rx = flr(bombReticle.x), ry = flr(bombReticle.y);
      const blink = flr(GrayBox.frame / 4) % 2;
      if (blink) {
        // Crosshair
        line(rx + 3, ry - 3, rx + 3, ry + 10, 2);
        line(rx - 3, ry + 3, rx + 10, ry + 3, 2);
        rect(rx - 1, ry + 1, 10, 6, 2);
      }
    }

    // --- Draw bombs in flight ---
    for (const b of bombs) {
      const bx = flr(b.x), by = flr(b.y);
      sprT(3, bx, by);
      // Shadow growing as bomb descends
      const shadowSize = flr(b.progress * 4) + 1;
      circ(flr(b.targetX + 3), flr(b.targetY + 3), shadowSize, 1);
    }

    // --- Draw enemy bullets ---
    for (const b of eBullets) {
      pix(flr(b.x), flr(b.y), 3);
      pix(flr(b.x), flr(b.y) + 1, 2);
    }

    // --- Draw air enemies ---
    for (const e of airEnemies) {
      if (e.delay > 0) continue;
      if (e.x < -8 || e.x > W + 8 || e.y < -8 || e.y > H + 8) continue;
      sprT(e.type, flr(e.x), flr(e.y));
    }

    // --- Draw zapper bullets ---
    for (const b of zapper) sprT(2, flr(b.x), flr(b.y));

    // --- Draw boss ---
    if (bossActive && boss) {
      const bx = flr(boss.x), by = flr(boss.y);
      // Left wing
      sprT(12, bx, by);
      sprT(12, bx, by + 8);
      // Core
      if (boss.coreHit > 0 && flr(GrayBox.frame / 2) % 2) {
        // Flash on hit
        rectf(bx + 8, by, 24, 24, 3);
      } else {
        sprT(11, bx + 8, by);
        sprT(11, bx + 16, by);
        sprT(11, bx + 24, by);
        sprT(11, bx + 8, by + 8);
        sprT(11, bx + 16, by + 8);
        sprT(11, bx + 24, by + 8);
      }
      // Right wing
      sprT(12, bx + 32, by, true);
      sprT(12, bx + 32, by + 8, true);
      // Bottom
      sprT(11, bx + 8, by + 16);
      sprT(11, bx + 16, by + 16);
      sprT(11, bx + 24, by + 16);

      // HP bar
      const hpW = flr((boss.hp / boss.maxHp) * 40);
      rectf(bx, by - 5, 40, 3, 1);
      rectf(bx, by - 5, hpW, 3, 3);
    }

    // --- Draw player ---
    if (_scene === PLAY) {
      if (invincibleTimer > 0 && flr(GrayBox.frame / 3) % 2) {
        // Blink during invincibility
      } else {
        sprT(1, flr(player.x), flr(player.y));
        // Engine glow
        if (GrayBox.frame % 4 < 2) {
          pix(flr(player.x) + 3, flr(player.y) + 7, 2);
          pix(flr(player.x) + 3, flr(player.y) + 8, 3);
        } else {
          pix(flr(player.x) + 3, flr(player.y) + 7, 3);
        }
      }
    }

    // --- Explosions ---
    for (const e of explosions) {
      const sprId = e.ground ? (e.timer > 6 ? 16 : 17) : (e.timer > 6 ? 14 : 15);
      sprT(sprId, flr(e.x), flr(e.y));
    }

    // --- Particles ---
    for (const p of particles) pix(flr(p.x), flr(p.y), p.color);

    // --- HUD ---
    rectf(0, 0, W, 9, 0);
    text("SCORE:" + score, 3, 2, 3);
    // Lives
    for (let i = 0; i < lives; i++) sprT(18, W - 27 + i * 10, 1);

    // --- Title screen ---
    if (_scene === TITLE) {
      rectf(67, 38, 187, 165, 0);

      const ty = 53 + sin(GrayBox.frame * 0.05) * 3;
      text("XEVIOUS", W / 2 - 20, flr(ty), 3);
      rectf(W / 2 - 27, flr(ty) + 10, 53, 1, 2);

      // Show sample enemies
      const bx = W / 2 - 33;
      sprT(5, bx, flr(ty) + 17 + sin(GrayBox.frame * 0.08) * 2);
      sprT(6, bx + 17, flr(ty) + 18 + sin(GrayBox.frame * 0.08 + 1) * 2);
      sprT(7, bx + 33, flr(ty) + 17 + sin(GrayBox.frame * 0.08 + 2) * 2);
      sprT(19, bx + 50, flr(ty) + 18 + sin(GrayBox.frame * 0.08 + 3) * 2);
      sprT(5, bx + 67, flr(ty) + 17 + sin(GrayBox.frame * 0.08 + 4) * 2);

      if (flr(GrayBox.frame / 20) % 2 === 0) text("PRESS A", W / 2 - 28, 128, 3);

      text("- AIR TARGETS -", W / 2 - 38, 143, 2);
      sprT(5, W / 2 - 32, 152); text("TORKAN  100", W / 2 - 20, 153, 2);
      sprT(6, W / 2 - 32, 162); text("TOROID  150", W / 2 - 20, 163, 2);
      sprT(7, W / 2 - 32, 172); text("ZOSHI   200", W / 2 - 20, 173, 2);

      text("- GROUND TARGETS -", W / 2 - 48, 184, 2);
      sprT(8, W / 2 - 32, 193); text("TANK    200", W / 2 - 20, 194, 2);
      sprT(9, W / 2 - 32, 203); text("BUNKER  300", W / 2 - 20, 204, 2);

      text("Z=ZAPPER  X=BOMB", W / 2 - 42, 216, 1);
      text("GRAYBOX DEMO V0.1", W / 2 - 43, 229, 1);
      return;
    }

    // --- Game over ---
    if (_scene === GAMEOVER) {
      rectf(W / 2 - 40, 75, 80, 60, 0);
      text("GAME OVER", W / 2 - 24, 86, 3);
      text("SCORE: " + score, W / 2 - 24, 101, 2);
      if (flr(GrayBox.frame / 20) % 2 === 0) text("PRESS A", W / 2 - 28, 120, 3);
    }
  }

  GrayBox.go(TITLE);
  GrayBox.boot("screen");
})();
</script>
