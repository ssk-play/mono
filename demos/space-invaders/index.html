<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mono — Demo: Space Invaders</title>
<link rel="stylesheet" href="../../runtime/mono.css">
</head>
<body>
<div id="frame">
  <canvas id="screen"></canvas>
</div>
<div id="controls">
  <span>←→</span> MOVE &nbsp;&nbsp; <span>A</span> SHOOT
</div>
<script src="../../runtime/engine.js"></script>
<script>
(() => {
  "use strict";
  const W = Mono.WIDTH, H = Mono.HEIGHT;                  // 320x240
  const S = 16;                                            // sprite size
  const { cls, pix, line, rect, rectf, circ, circf,
          sprite: defSprite, spr, text, btn, btnp,
          note, stop, rnd, flr, abs: _abs, min, max: _max,
          sin, cos, dbg, dbgC } = Mono;

  // --- 8x8 → 16x16 upscale helper (doubles each pixel) ---
  function up(d) {
    let o = "";
    for (let r = 0; r < 8; r++) {
      let row = "";
      for (let c = 0; c < 8; c++) {
        const ch = d[r * 8 + c];
        row += ch + ch;
      }
      o += row + row;   // double the row vertically
    }
    return o;
  }

  // --- Circle-vs-circle collision ---
  function circHit(ax, ay, ar, bx, by, br) {
    const dx = ax - bx, dy = ay - by;
    const dist = ar + br;
    return dx * dx + dy * dy < dist * dist;
  }

  // --- Sprites (all upscaled 8x8 → 16x16) ---

  // 1: Player ship (cannon)
  defSprite(1, up(
    "00030000" +
    "00333000" +
    "00333000" +
    "03333300" +
    "33333330" +
    "33333330" +
    "33333330" +
    "00000000"
  ));

  // 2: Alien type A — squid (top row) frame 1
  defSprite(2, up(
    "00030000" +
    "00333000" +
    "03333300" +
    "33023030" +
    "33333330" +
    "00300300" +
    "03020300" +
    "30000030"
  ));

  // 3: Alien type A — squid frame 2
  defSprite(3, up(
    "00030000" +
    "00333000" +
    "03333300" +
    "33023030" +
    "33333330" +
    "01303010" +
    "30020030" +
    "03000300"
  ));

  // 4: Alien type B — crab (middle rows) frame 1
  defSprite(4, up(
    "03000300" +
    "00333000" +
    "03232300" +
    "33333330" +
    "30333030" +
    "30333030" +
    "00300300" +
    "03000300"
  ));

  // 5: Alien type B — crab frame 2
  defSprite(5, up(
    "03000300" +
    "30333030" +
    "33232330" +
    "33333330" +
    "03333300" +
    "00333000" +
    "03000300" +
    "30000030"
  ));

  // 6: Alien type C — octopus (bottom rows) frame 1
  defSprite(6, up(
    "00333000" +
    "03333300" +
    "33232330" +
    "33333330" +
    "33333330" +
    "03030300" +
    "30303030" +
    "03030300"
  ));

  // 7: Alien type C — octopus frame 2
  defSprite(7, up(
    "00333000" +
    "03333300" +
    "33232330" +
    "33333330" +
    "33333330" +
    "03030300" +
    "03030300" +
    "30000030"
  ));

  // 8: UFO bonus ship
  defSprite(8, up(
    "00000000" +
    "00333000" +
    "03333300" +
    "32323230" +
    "33333330" +
    "01303010" +
    "00000000" +
    "00000000"
  ));

  // 9: Player bullet
  defSprite(9, up(
    "00030000" +
    "00030000" +
    "00020000" +
    "00020000" +
    "00000000" +
    "00000000" +
    "00000000" +
    "00000000"
  ));

  // 10: Alien bullet type 1 (zigzag)
  defSprite(10, up(
    "00010000" +
    "00020000" +
    "00100000" +
    "00020000" +
    "00010000" +
    "00020000" +
    "00100000" +
    "00020000"
  ));

  // 11: Alien bullet type 2 (cross)
  defSprite(11, up(
    "00020000" +
    "00030000" +
    "00020000" +
    "00030000" +
    "00020000" +
    "00030000" +
    "00020000" +
    "00030000"
  ));

  // 12: Explosion frame 1
  defSprite(12, up(
    "00000000" +
    "00200100" +
    "01003200" +
    "00031000" +
    "00130200" +
    "02000010" +
    "00100000" +
    "00000000"
  ));

  // 13: Explosion frame 2
  defSprite(13, up(
    "20010020" +
    "01000010" +
    "00303200" +
    "03033030" +
    "00232000" +
    "01000300" +
    "20001001" +
    "00200010"
  ));

  // 14: Shield block (full)
  defSprite(14, up(
    "02222200" +
    "23333320" +
    "33333330" +
    "33333330" +
    "33333330" +
    "33333330" +
    "33333330" +
    "33333330"
  ));

  // 15: Life icon (small ship)
  defSprite(15, up(
    "00000000" +
    "00030000" +
    "00333000" +
    "03333300" +
    "33333330" +
    "33333330" +
    "00000000" +
    "00000000"
  ));

  // 16: Alien death flash
  defSprite(16, up(
    "10000010" +
    "01020100" +
    "00233200" +
    "02333320" +
    "00233200" +
    "01020100" +
    "10000010" +
    "00000000"
  ));

  // --- Shield data ---
  // Destructible pixel-level shields (48x36, doubled from 24x18 for 16px scale)
  const SHIELD_W = 48;
  const SHIELD_H = 36;
  const NUM_SHIELDS = 4;
  let shields = [];

  function createShieldPixels() {
    const px = [];
    for (let y = 0; y < SHIELD_H; y++) {
      px[y] = [];
      for (let x = 0; x < SHIELD_W; x++) {
        // Top rounded corners
        if (y < 8) {
          const cornerDist = flr(y / 2);
          if (x < 8 - cornerDist * 2 || x >= SHIELD_W - 8 + cornerDist * 2) {
            px[y][x] = 0; continue;
          }
        }
        // Bottom notch (invader-shaped cutout)
        if (y >= SHIELD_H - 12 && x >= 16 && x < 32) {
          px[y][x] = 0; continue;
        }
        px[y][x] = (y < 4 || y >= SHIELD_H - 2) ? 2 : 3;
      }
    }
    return px;
  }

  function initShields() {
    shields = [];
    const margin = 30;
    const usable = W - margin * 2 - SHIELD_W;
    const spacing = usable / (NUM_SHIELDS - 1);
    for (let i = 0; i < NUM_SHIELDS; i++) {
      shields.push({
        x: flr(margin + i * spacing),
        y: 178,
        pixels: createShieldPixels()
      });
    }
  }

  function drawShield(s) {
    for (let y = 0; y < SHIELD_H; y++) {
      for (let x = 0; x < SHIELD_W; x++) {
        if (s.pixels[y][x] > 0) {
          pix(s.x + x, s.y + y, s.pixels[y][x]);
        }
      }
    }
  }

  function damageShield(s, hx, hy, radius) {
    const lx = hx - s.x;
    const ly = hy - s.y;
    for (let dy = -radius; dy <= radius; dy++) {
      for (let dx = -radius; dx <= radius; dx++) {
        if (dx * dx + dy * dy <= radius * radius) {
          const px = lx + dx;
          const py = ly + dy;
          if (px >= 0 && px < SHIELD_W && py >= 0 && py < SHIELD_H) {
            s.pixels[py][px] = 0;
          }
        }
      }
    }
  }

  function shieldHitTest(s, bx, by, bw, bh) {
    for (let y = 0; y < bh; y++) {
      for (let x = 0; x < bw; x++) {
        const px = flr(bx + x - s.x);
        const py = flr(by + y - s.y);
        if (px >= 0 && px < SHIELD_W && py >= 0 && py < SHIELD_H) {
          if (s.pixels[py][px] > 0) return true;
        }
      }
    }
    return false;
  }

  // --- Collision radii ---
  const PLAYER_R   = 6;   // player hitbox radius
  const ALIEN_R    = 6;   // alien hitbox radius
  const BULLET_R   = 3;   // player bullet radius
  const EBULLET_R  = 3;   // enemy bullet radius
  const UFO_R      = 7;   // UFO hitbox radius

  // --- Scenes ---
  const { TITLE, PLAY, GAMEOVER } = Mono.SCENE;

  let player, bullet, eBullets, aliens, explosions, particles, stars;
  let score, hiScore, lives, wave;
  let shootCooldown, invulnTimer, respawnTimer;
  // Alien march state
  let marchDir, marchSpeed, marchTimer, marchCount, marchBaseSpeed;
  let dropDown, totalAliens;
  // UFO
  let ufo, ufoTimer, ufoScoreShow, ufoScoreTimer, ufoScoreX;
  // March sound
  let marchSoundIdx;
  const MARCH_NOTES = ["C2", "D2", "E2", "F2"];

  hiScore = 0;

  function resetGame() {
    player = { x: W / 2 - S / 2, y: 218 };
    bullet = null;
    eBullets = [];
    aliens = [];
    explosions = [];
    particles = [];
    score = 0;
    lives = 3;
    wave = 0;
    shootCooldown = 0;
    invulnTimer = 0;
    respawnTimer = 0;
    ufo = null;
    ufoTimer = 300 + flr(rnd(300));
    ufoScoreShow = 0;
    ufoScoreTimer = 0;
    marchSoundIdx = 0;
    stars = [];
    for (let i = 0; i < 40; i++)
      stars.push({ x: flr(rnd(W)), y: flr(rnd(H)), bright: flr(rnd(2)) + 1 });
    initShields();
    spawnWave();
  }

  function spawnWave() {
    wave++;
    aliens = [];
    eBullets = [];
    bullet = null;
    marchDir = 1;
    dropDown = 0;
    marchSoundIdx = 0;

    const COLS = 11;
    const ROWS = 5;

    // Alien grid: row 0 = squid(30pts), rows 1-2 = crab(20pts), rows 3-4 = octopus(10pts)
    for (let row = 0; row < ROWS; row++) {
      for (let col = 0; col < COLS; col++) {
        let type, pts;
        if (row === 0) { type = "squid"; pts = 30; }
        else if (row <= 2) { type = "crab"; pts = 20; }
        else { type = "octo"; pts = 10; }
        aliens.push({
          col, row, type, pts,
          alive: true,
          baseX: 14 + col * 20,
          baseY: 34 + row * 20,
        });
      }
    }

    totalAliens = COLS * ROWS;
    marchBaseSpeed = _max(4, 20 - wave * 2);
    marchSpeed = marchBaseSpeed;
    marchTimer = marchSpeed;
    marchCount = 0;

    // Reset shields only on wave 1
    if (wave === 1) initShields();
  }

  // Alien formation offset (march position)
  let alienOffX = 0;
  let alienOffY = 0;

  function getAlienPos(a) {
    return {
      x: a.baseX + alienOffX,
      y: a.baseY + alienOffY
    };
  }

  function getAlienSprite(a) {
    const frame = (marchCount % 2 === 0) ? 0 : 1;
    if (a.type === "squid") return frame === 0 ? 2 : 3;
    if (a.type === "crab") return frame === 0 ? 4 : 5;
    return frame === 0 ? 6 : 7;
  }

  function addExplosion(x, y, big) {
    explosions.push({ x, y, timer: big ? 16 : 10 });
    const count = big ? 12 : 6;
    for (let i = 0; i < count; i++)
      particles.push({
        x: x + S / 2, y: y + S / 2,
        vx: rnd(4) - 2, vy: rnd(4) - 2,
        life: 6 + flr(rnd(10)),
        color: flr(rnd(3)) + 1
      });
  }

  // --- Sound Effects ---
  function shootSound() { note(0, "C6", 0.03); }
  function alienHitSound() { note(1, "E3", 0.06); setTimeout(() => note(1, "C3", 0.05), 30); }
  function playerDeathSound() {
    note(0, "C3", 0.15); note(1, "G2", 0.15);
    setTimeout(() => { note(0, "A2", 0.2); note(1, "E2", 0.2); }, 120);
  }
  function ufoSound() { note(1, "B4", 0.04); }
  function ufoHitSound() {
    note(0, "G5", 0.08);
    setTimeout(() => note(0, "C6", 0.1), 80);
  }
  function waveClearSound() {
    note(0, "C5", 0.1);
    setTimeout(() => note(0, "E5", 0.1), 100);
    setTimeout(() => note(0, "G5", 0.1), 200);
    setTimeout(() => note(0, "C6", 0.15), 300);
  }
  function marchSound() {
    note(0, MARCH_NOTES[marchSoundIdx % 4], 0.04);
    marchSoundIdx++;
  }

  let _playing = false;

  // --- Title Scene ---
  Mono.scene(TITLE, {
    init() { resetGame(); _playing = false; },
    update() {
      if (btnp("start") || btnp("a")) {
        note(0, "C5", 0.1);
        setTimeout(() => note(0, "E5", 0.1), 100);
        setTimeout(() => note(0, "G5", 0.15), 200);
        Mono.go(PLAY); return;
      }
    },
    draw() {
      cls(0);
      for (const s of stars) pix(s.x, s.y, s.bright);
      const ty = 30 + sin(Mono.frame * 0.05) * 4;
      text("SPACE INVADERS", 126, flr(ty), 3);
      rectf(110, flr(ty) + 10, 100, 1, 2);
      const bx = W / 2 - 60;
      const by = flr(ty) + 22;
      const aFrame = flr(Mono.frame / 15) % 2;
      spr(aFrame ? 2 : 3, bx, by + sin(Mono.frame * 0.08) * 2);
      spr(aFrame ? 4 : 5, bx + 28, by + sin(Mono.frame * 0.08 + 1) * 2);
      spr(aFrame ? 6 : 7, bx + 56, by + sin(Mono.frame * 0.08 + 2) * 2);
      spr(aFrame ? 4 : 5, bx + 84, by + sin(Mono.frame * 0.08 + 3) * 2);
      spr(aFrame ? 2 : 3, bx + 112, by + sin(Mono.frame * 0.08 + 4) * 2);
      if (flr(Mono.frame / 20) % 2 === 0) text("PRESS START", 120, 128, 3);
      text("- SCORE TABLE -", 123, 148, 2);
      spr(8, 123, 160); text("  UFO     ???", 143, 164, 2);
      spr(2, 123, 180); text("  SQUID    30", 143, 184, 2);
      spr(4, 123, 200); text("  CRAB     20", 143, 204, 2);
      if (hiScore > 0) text("HI-SCORE: " + hiScore, 123, 226, 1);
      text("MONO DEMO V0.1", 118, 233, 1);
    }
  });

  // --- Play Scene ---
  Mono.scene(PLAY, {
    init() { resetGame(); _playing = true; },
    update() {
      // Respawn delay
      if (respawnTimer > 0) {
        respawnTimer--;
        for (let i = explosions.length - 1; i >= 0; i--) {
          explosions[i].timer--;
          if (explosions[i].timer <= 0) explosions.splice(i, 1);
        }
        for (let i = particles.length - 1; i >= 0; i--) {
          const p = particles[i]; p.x += p.vx; p.y += p.vy; p.vy += 0.05; p.life--;
          if (p.life <= 0) particles.splice(i, 1);
        }
        return;
      }

      if (invulnTimer > 0) invulnTimer--;
      if (btn("left")) player.x -= 3;
      if (btn("right")) player.x += 3;
      player.x = _max(4, min(W - S - 4, player.x));
      if (shootCooldown > 0) shootCooldown--;
      if (btnp("a") && bullet === null && shootCooldown <= 0) {
        bullet = { x: player.x + S / 2 - S / 2, y: player.y - 4 };
        shootCooldown = 6;
        shootSound();
      }
      if (bullet) { bullet.y -= 6; if (bullet.y < -S) bullet = null; }

      // Alien March
      marchTimer--;
      if (marchTimer <= 0) {
        marchCount++;
        marchSound();
        let needDrop = false;
        const la = aliens.filter(a => a.alive);
        let leftMost = W, rightMost = 0;
        for (const a of la) {
          const pos = getAlienPos(a);
          if (pos.x < leftMost) leftMost = pos.x;
          if (pos.x + S > rightMost) rightMost = pos.x + S;
        }
        if (marchDir === 1 && rightMost + 2 >= W - 4) { needDrop = true; marchDir = -1; }
        else if (marchDir === -1 && leftMost - 2 <= 4) { needDrop = true; marchDir = 1; }
        if (needDrop) {
          alienOffY += 8;
          for (const a of la) {
            const pos = getAlienPos(a);
            if (pos.y + S >= player.y) {
              addExplosion(player.x, player.y, true);
              playerDeathSound();
              if (score > hiScore) hiScore = score;
              Mono.go(GAMEOVER); return;
            }
          }
        } else {
          alienOffX += marchDir * 4;
        }
        const aliveCount = la.length;
        if (aliveCount <= 1) marchSpeed = 1;
        else if (aliveCount <= 4) marchSpeed = 2;
        else if (aliveCount <= 10) marchSpeed = 3;
        else if (aliveCount <= 20) marchSpeed = _max(3, marchBaseSpeed - 6);
        else if (aliveCount <= 35) marchSpeed = _max(4, marchBaseSpeed - 3);
        else marchSpeed = marchBaseSpeed;
        marchTimer = marchSpeed;
      }

      // --- Bullet vs Alien (circle collision) ---
      if (bullet) {
        const bcx = bullet.x + S / 2, bcy = bullet.y + S / 2;
        for (let i = 0; i < aliens.length; i++) {
          const a = aliens[i]; if (!a.alive) continue;
          const pos = getAlienPos(a);
          const acx = pos.x + S / 2, acy = pos.y + S / 2;
          if (circHit(bcx, bcy, BULLET_R, acx, acy, ALIEN_R)) {
            a.alive = false; score += a.pts;
            addExplosion(pos.x, pos.y, false);
            alienHitSound(); bullet = null; break;
          }
        }
      }
      // Bullet vs Shield
      if (bullet) {
        for (const s of shields) {
          if (shieldHitTest(s, bullet.x + 5, bullet.y, 4, 8)) {
            damageShield(s, flr(bullet.x + S / 2), flr(bullet.y), 5);
            bullet = null; break;
          }
        }
      }
      // Bullet vs UFO (circle collision)
      if (bullet && ufo) {
        const bcx = bullet.x + S / 2, bcy = bullet.y + S / 2;
        const ucx = ufo.x + S / 2, ucy = ufo.y + S / 2;
        if (circHit(bcx, bcy, BULLET_R, ucx, ucy, UFO_R)) {
          const ufoPoints = [50, 100, 150, 200, 300][flr(rnd(5))];
          score += ufoPoints;
          ufoScoreShow = ufoPoints; ufoScoreTimer = 60; ufoScoreX = ufo.x;
          addExplosion(ufo.x, ufo.y, true); ufoHitSound(); ufo = null; bullet = null;
        }
      }

      // Alien shooting
      const liveAliens = aliens.filter(a => a.alive);
      if (Mono.frame % _max(3, 15 - wave * 2) === 0 && liveAliens.length > 0) {
        const cols = {};
        for (const a of liveAliens) { if (!cols[a.col] || a.row > cols[a.col].row) cols[a.col] = a; }
        const bottomAliens = Object.values(cols);
        if (bottomAliens.length > 0 && eBullets.length < 3 + wave) {
          const shooter = bottomAliens[flr(rnd(bottomAliens.length))];
          const pos = getAlienPos(shooter);
          eBullets.push({ x: pos.x, y: pos.y + S, type: flr(rnd(2)) });
        }
      }

      // Update enemy bullets
      for (let i = eBullets.length - 1; i >= 0; i--) {
        const b = eBullets[i]; b.y += 2.5 + wave * 0.2;
        let hitShield = false;
        for (const s of shields) {
          if (shieldHitTest(s, b.x + 5, b.y, 4, 8)) {
            damageShield(s, flr(b.x + S / 2), flr(b.y + 4), 5);
            eBullets.splice(i, 1); hitShield = true; break;
          }
        }
        if (hitShield) continue;
        // Enemy bullet vs player (circle collision)
        if (invulnTimer <= 0) {
          const ebcx = b.x + S / 2, ebcy = b.y + S / 2;
          const pcx = player.x + S / 2, pcy = player.y + S / 2;
          if (circHit(ebcx, ebcy, EBULLET_R, pcx, pcy, PLAYER_R)) {
            eBullets.splice(i, 1); lives--;
            addExplosion(player.x, player.y, true); playerDeathSound();
            if (lives <= 0) { if (score > hiScore) hiScore = score; Mono.go(GAMEOVER); return; }
            else { respawnTimer = 45; invulnTimer = 60; player.x = W / 2 - S / 2; bullet = null; }
            continue;
          }
        }
        if (b.y > H + S) eBullets.splice(i, 1);
      }

      // Aliens touching shields
      for (const a of liveAliens) {
        const pos = getAlienPos(a);
        for (const s of shields) {
          if (pos.x + S > s.x && pos.x < s.x + SHIELD_W && pos.y + S > s.y && pos.y < s.y + SHIELD_H) {
            for (let dy = 0; dy < S; dy++) {
              for (let dx = 0; dx < S; dx++) {
                const px = flr(pos.x + dx - s.x);
                const py = flr(pos.y + dy - s.y);
                if (px >= 0 && px < SHIELD_W && py >= 0 && py < SHIELD_H) s.pixels[py][px] = 0;
              }
            }
          }
        }
      }

      // UFO
      ufoTimer--;
      if (ufoTimer <= 0 && !ufo) {
        const dir = rnd(1) > 0.5 ? 1 : -1;
        ufo = { x: dir === 1 ? -S : W + S, y: 16, dir: dir, speed: 1.5 };
        ufoTimer = 400 + flr(rnd(400));
      }
      if (ufo) {
        ufo.x += ufo.dir * ufo.speed;
        if (ufo.x < -S * 2 || ufo.x > W + S * 2) ufo = null;
        else if (Mono.frame % 8 === 0) ufoSound();
      }
      if (ufoScoreTimer > 0) ufoScoreTimer--;

      // Explosions
      for (let i = explosions.length - 1; i >= 0; i--) {
        explosions[i].timer--;
        if (explosions[i].timer <= 0) explosions.splice(i, 1);
      }
      // Particles
      for (let i = particles.length - 1; i >= 0; i--) {
        const p = particles[i]; p.x += p.vx; p.y += p.vy; p.vy += 0.05; p.life--;
        if (p.life <= 0) particles.splice(i, 1);
      }

      // Wave clear check
      if (liveAliens.length === 0 && _playing) {
        waveClearSound(); alienOffX = 0; alienOffY = 0;
        setTimeout(() => { if (_playing) spawnWave(); }, 1500);
        aliens.push({ alive: false, col: -1, row: -1, baseX: -100, baseY: -100, type: "squid", pts: 0 });
      }
    },
    draw() {
      cls(0);
      // Starfield
      for (const s of stars) pix(s.x, s.y, s.bright);
      // Ground line
      rectf(0, 233, W, 1, 1);
      // Shields
      for (const s of shields) drawShield(s);
      // Aliens
      for (const a of aliens) {
        if (!a.alive) continue;
        const pos = getAlienPos(a);
        spr(getAlienSprite(a), flr(pos.x), flr(pos.y));
        dbgC(flr(pos.x) + S / 2, flr(pos.y) + S / 2, ALIEN_R);
      }
      // UFO
      if (ufo) {
        spr(8, flr(ufo.x), flr(ufo.y));
        dbgC(flr(ufo.x) + S / 2, flr(ufo.y) + S / 2, UFO_R);
      }
      if (ufoScoreTimer > 0) text("" + ufoScoreShow, flr(ufoScoreX), 18, 3);
      // Enemy bullets
      for (const b of eBullets) {
        spr(b.type === 0 ? 10 : 11, flr(b.x), flr(b.y));
        dbgC(flr(b.x) + S / 2, flr(b.y) + S / 2, EBULLET_R);
      }
      // Player bullet
      if (bullet) {
        spr(9, flr(bullet.x), flr(bullet.y));
        dbgC(flr(bullet.x) + S / 2, flr(bullet.y) + S / 2, BULLET_R);
      }
      // Player
      if (respawnTimer <= 0) {
        if (invulnTimer <= 0 || flr(Mono.frame / 3) % 2 === 0) {
          spr(1, flr(player.x), flr(player.y));
        }
        dbgC(flr(player.x) + S / 2, flr(player.y) + S / 2, PLAYER_R);
      }
      // Explosions
      for (const e of explosions) {
        const sprId = e.timer > 5 ? 12 : (e.timer > 2 ? 13 : 16);
        spr(sprId, flr(e.x), flr(e.y));
      }
      // Particles
      for (const p of particles) pix(flr(p.x), flr(p.y), p.color);
      // HUD
      rectf(0, 0, W, 14, 0);
      text("SCORE:" + score, 4, 4, 3);
      text("WAVE:" + wave, W / 2 - 20, 4, 2);
      text("" + lives, W - 56, 4, 3);
      for (let i = 0; i < lives - 1; i++) spr(15, W - 44 + i * 18, 1);
    }
  });

  // --- Game Over Scene ---
  Mono.scene(GAMEOVER, {
    init() { _playing = false; },
    update() {
      for (let i = particles.length - 1; i >= 0; i--) {
        const p = particles[i]; p.x += p.vx; p.y += p.vy; p.vy += 0.08; p.life--;
        if (p.life <= 0) particles.splice(i, 1);
      }
      if (btnp("start") || btnp("a")) { Mono.go(TITLE); return; }
    },
    draw() {
      cls(0);
      for (const s of stars) pix(s.x, s.y, s.bright);
      for (const p of particles) pix(flr(p.x), flr(p.y), p.color);
      text("GAME OVER", 138, 83, 3);
      text("SCORE: " + score, 130, 101, 2);
      text("WAVE: " + wave, 140, 113, 2);
      if (hiScore > 0) text("HI-SCORE: " + hiScore, 123, 128, 1);
      if (flr(Mono.frame / 20) % 2 === 0) text("PRESS START", 113, 158, 3);
    }
  });

  Mono.go(TITLE);
  Mono.boot("screen");
})();
</script>
</body>
</html>
