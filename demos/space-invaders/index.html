<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GrayBox — Demo: Space Invaders</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #0a0a0a;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100vh;
    font-family: monospace;
    overflow: hidden;
  }
  #frame {
    background: #111;
    border: 3px solid #333;
    border-radius: 8px;
    padding: 12px;
    box-shadow: 0 0 40px rgba(0,0,0,0.8), inset 0 0 20px rgba(0,0,0,0.5);
  }
  canvas {
    display: block;
    image-rendering: pixelated;
    image-rendering: crisp-edges;
  }
  #controls {
    margin-top: 12px;
    color: #6b6b6b;
    font-size: 11px;
    text-align: center;
    letter-spacing: 1px;
  }
  #controls span { color: #b0b0b0; }
</style>
</head>
<body>
<div id="frame">
  <canvas id="screen"></canvas>
</div>
<div id="controls">
  <span>←→</span> MOVE &nbsp;&nbsp; <span>Z</span> SHOOT &nbsp;&nbsp; <span>ENTER</span> START
</div>
<script src="../../runtime/engine.js"></script>
<script>
(() => {
  "use strict";
  const W = GrayBox.WIDTH, H = GrayBox.HEIGHT;
  const { cls, pix, line, rect, rectf, circ, circf, sprite: defSprite,
          spr, text, btn, btnp, note, stop, rnd, flr, abs: _abs,
          min, max: _max, sin, cos } = GrayBox;

  // --- Sprites ---

  // 1: Player ship (cannon)
  defSprite(1,
    "00030000" +
    "00333000" +
    "00333000" +
    "03333300" +
    "33333330" +
    "33333330" +
    "33333330" +
    "00000000"
  );

  // 2: Alien type A — squid (top row) frame 1
  defSprite(2,
    "00030000" +
    "00333000" +
    "03333300" +
    "33023030" +
    "33333330" +
    "00300300" +
    "03020300" +
    "30000030"
  );

  // 3: Alien type A — squid frame 2
  defSprite(3,
    "00030000" +
    "00333000" +
    "03333300" +
    "33023030" +
    "33333330" +
    "01303010" +
    "30020030" +
    "03000300"
  );

  // 4: Alien type B — crab (middle rows) frame 1
  defSprite(4,
    "03000300" +
    "00333000" +
    "03232300" +
    "33333330" +
    "30333030" +
    "30333030" +
    "00300300" +
    "03000300"
  );

  // 5: Alien type B — crab frame 2
  defSprite(5,
    "03000300" +
    "30333030" +
    "33232330" +
    "33333330" +
    "03333300" +
    "00333000" +
    "03000300" +
    "30000030"
  );

  // 6: Alien type C — octopus (bottom rows) frame 1
  defSprite(6,
    "00333000" +
    "03333300" +
    "33232330" +
    "33333330" +
    "33333330" +
    "03030300" +
    "30303030" +
    "03030300"
  );

  // 7: Alien type C — octopus frame 2
  defSprite(7,
    "00333000" +
    "03333300" +
    "33232330" +
    "33333330" +
    "33333330" +
    "03030300" +
    "03030300" +
    "30000030"
  );

  // 8: UFO bonus ship
  defSprite(8,
    "00000000" +
    "00333000" +
    "03333300" +
    "32323230" +
    "33333330" +
    "01303010" +
    "00000000" +
    "00000000"
  );

  // 9: Player bullet
  defSprite(9,
    "00030000" +
    "00030000" +
    "00020000" +
    "00020000" +
    "00000000" +
    "00000000" +
    "00000000" +
    "00000000"
  );

  // 10: Alien bullet type 1 (zigzag)
  defSprite(10,
    "00010000" +
    "00020000" +
    "00100000" +
    "00020000" +
    "00010000" +
    "00020000" +
    "00100000" +
    "00020000"
  );

  // 11: Alien bullet type 2 (cross)
  defSprite(11,
    "00020000" +
    "00030000" +
    "00020000" +
    "00030000" +
    "00020000" +
    "00030000" +
    "00020000" +
    "00030000"
  );

  // 12: Explosion frame 1
  defSprite(12,
    "00000000" +
    "00200100" +
    "01003200" +
    "00031000" +
    "00130200" +
    "02000010" +
    "00100000" +
    "00000000"
  );

  // 13: Explosion frame 2
  defSprite(13,
    "20010020" +
    "01000010" +
    "00303200" +
    "03033030" +
    "00232000" +
    "01000300" +
    "20001001" +
    "00200010"
  );

  // 14: Shield block (full)
  defSprite(14,
    "02222200" +
    "23333320" +
    "33333330" +
    "33333330" +
    "33333330" +
    "33333330" +
    "33333330" +
    "33333330"
  );

  // 15: Life icon (small ship)
  defSprite(15,
    "00000000" +
    "00030000" +
    "00333000" +
    "03333300" +
    "33333330" +
    "33333330" +
    "00000000" +
    "00000000"
  );

  // 16: Alien death flash
  defSprite(16,
    "10000010" +
    "01020100" +
    "00233200" +
    "02333320" +
    "00233200" +
    "01020100" +
    "10000010" +
    "00000000"
  );

  // --- Shield data ---
  // Shields are stored as 2D arrays of pixels (24x16 each, using 8x8 sprite tiles)
  // We'll use a pixel-level destructible shield system
  const SHIELD_W = 24;
  const SHIELD_H = 18;
  const NUM_SHIELDS = 4;
  let shields = [];

  function createShieldPixels() {
    const px = [];
    // Classic shield shape: arch with notch at bottom
    for (let y = 0; y < SHIELD_H; y++) {
      px[y] = [];
      for (let x = 0; x < SHIELD_W; x++) {
        // Top rounded corners
        if (y < 4) {
          const cornerDist = y;
          if (x < 4 - cornerDist || x >= SHIELD_W - 4 + cornerDist) {
            px[y][x] = 0; continue;
          }
        }
        // Bottom notch (invader-shaped cutout)
        if (y >= SHIELD_H - 6 && x >= 8 && x < 16) {
          px[y][x] = 0; continue;
        }
        px[y][x] = (y < 2 || y >= SHIELD_H - 1) ? 2 : 3;
      }
    }
    return px;
  }

  function initShields() {
    shields = [];
    const spacing = (W - 40) / NUM_SHIELDS; // area between margins
    const startX = 40;
    for (let i = 0; i < NUM_SHIELDS; i++) {
      shields.push({
        x: flr(startX + i * spacing),
        y: 188,
        pixels: createShieldPixels()
      });
    }
  }

  function drawShield(s) {
    for (let y = 0; y < SHIELD_H; y++) {
      for (let x = 0; x < SHIELD_W; x++) {
        if (s.pixels[y][x] > 0) {
          pix(s.x + x, s.y + y, s.pixels[y][x]);
        }
      }
    }
  }

  function damageShield(s, hx, hy, radius) {
    // Destroy pixels in a radius around hit point
    const lx = hx - s.x;
    const ly = hy - s.y;
    for (let dy = -radius; dy <= radius; dy++) {
      for (let dx = -radius; dx <= radius; dx++) {
        if (dx*dx + dy*dy <= radius*radius) {
          const px = lx + dx;
          const py = ly + dy;
          if (px >= 0 && px < SHIELD_W && py >= 0 && py < SHIELD_H) {
            s.pixels[py][px] = 0;
          }
        }
      }
    }
  }

  function shieldHitTest(s, bx, by, bw, bh) {
    // Check if a bullet rect overlaps any solid shield pixel
    for (let y = 0; y < bh; y++) {
      for (let x = 0; x < bw; x++) {
        const px = flr(bx + x - s.x);
        const py = flr(by + y - s.y);
        if (px >= 0 && px < SHIELD_W && py >= 0 && py < SHIELD_H) {
          if (s.pixels[py][px] > 0) return true;
        }
      }
    }
    return false;
  }

  // --- Game State ---
  let state = "title";
  let player, bullet, eBullets, aliens, explosions, particles, stars;
  let score, hiScore, lives, wave;
  let shootCooldown, invulnTimer, respawnTimer;
  // Alien march state
  let marchDir, marchSpeed, marchTimer, marchCount, marchBaseSpeed;
  let dropDown, totalAliens;
  // UFO
  let ufo, ufoTimer, ufoScoreShow, ufoScoreTimer, ufoScoreX;
  // March sound
  let marchSoundIdx;
  const MARCH_NOTES = ["C2", "D2", "E2", "F2"];

  hiScore = 0;

  function resetGame() {
    player = { x: W / 2 - 4, y: 218 };
    bullet = null;
    eBullets = [];
    aliens = [];
    explosions = [];
    particles = [];
    score = 0;
    lives = 3;
    wave = 0;
    shootCooldown = 0;
    invulnTimer = 0;
    respawnTimer = 0;
    ufo = null;
    ufoTimer = 300 + flr(rnd(300));
    ufoScoreShow = 0;
    ufoScoreTimer = 0;
    marchSoundIdx = 0;
    stars = [];
    for (let i = 0; i < 40; i++)
      stars.push({ x: flr(rnd(W)), y: flr(rnd(H)), bright: flr(rnd(2)) + 1 });
    initShields();
    spawnWave();
  }

  function spawnWave() {
    wave++;
    aliens = [];
    eBullets = [];
    bullet = null;
    marchDir = 1;
    dropDown = 0;
    marchSoundIdx = 0;

    const COLS = 11;
    const ROWS = 5;

    // Alien grid: row 0 = squid(10pts), rows 1-2 = crab(20pts), rows 3-4 = octopus(30pts)
    for (let row = 0; row < ROWS; row++) {
      for (let col = 0; col < COLS; col++) {
        let type, pts;
        if (row === 0) { type = "squid"; pts = 30; }
        else if (row <= 2) { type = "crab"; pts = 20; }
        else { type = "octo"; pts = 10; }
        aliens.push({
          col, row, type, pts,
          alive: true,
          // Position: will be set based on grid offset
          baseX: 31 + col * 11,
          baseY: 38 + row * 11,
        });
      }
    }

    totalAliens = COLS * ROWS;
    marchBaseSpeed = _max(4, 20 - wave * 2);
    marchSpeed = marchBaseSpeed;
    marchTimer = marchSpeed;
    marchCount = 0;

    // Reset shields only on wave 1
    if (wave === 1) initShields();
  }

  // Alien formation offset (march position)
  let alienOffX = 0;
  let alienOffY = 0;

  function getAlienPos(a) {
    return {
      x: a.baseX + alienOffX,
      y: a.baseY + alienOffY
    };
  }

  function getAlienSprite(a) {
    const frame = (marchCount % 2 === 0) ? 0 : 1;
    if (a.type === "squid") return frame === 0 ? 2 : 3;
    if (a.type === "crab") return frame === 0 ? 4 : 5;
    return frame === 0 ? 6 : 7;
  }

  function addExplosion(x, y, big) {
    explosions.push({ x, y, timer: big ? 16 : 10 });
    const count = big ? 12 : 6;
    for (let i = 0; i < count; i++)
      particles.push({
        x: x + 4, y: y + 4,
        vx: rnd(4) - 2, vy: rnd(4) - 2,
        life: 6 + flr(rnd(10)),
        color: flr(rnd(3)) + 1
      });
  }

  // --- Sound Effects ---
  function shootSound() { note(0, "C6", 0.03); }
  function alienHitSound() { note(1, "E3", 0.06); setTimeout(() => note(1, "C3", 0.05), 30); }
  function playerDeathSound() {
    note(0, "C3", 0.15); note(1, "G2", 0.15);
    setTimeout(() => { note(0, "A2", 0.2); note(1, "E2", 0.2); }, 120);
  }
  function ufoSound() { note(1, "B4", 0.04); }
  function ufoHitSound() {
    note(0, "G5", 0.08);
    setTimeout(() => note(0, "C6", 0.1), 80);
  }
  function waveClearSound() {
    note(0, "C5", 0.1);
    setTimeout(() => note(0, "E5", 0.1), 100);
    setTimeout(() => note(0, "G5", 0.1), 200);
    setTimeout(() => note(0, "C6", 0.15), 300);
  }
  function marchSound() {
    note(0, MARCH_NOTES[marchSoundIdx % 4], 0.04);
    marchSoundIdx++;
  }

  resetGame();
  state = "title";

  // ============================================================
  // Update
  // ============================================================
  GrayBox._update = function() {
    // --- Title ---
    if (state === "title") {
      if (btnp("a") || btnp("a")) {
        state = "play";
        resetGame();
        note(0, "C5", 0.1);
        setTimeout(() => note(0, "E5", 0.1), 100);
        setTimeout(() => note(0, "G5", 0.15), 200);
      }
      return;
    }

    // --- Game Over ---
    if (state === "gameover") {
      for (let i = particles.length - 1; i >= 0; i--) {
        const p = particles[i]; p.x += p.vx; p.y += p.vy; p.vy += 0.08; p.life--;
        if (p.life <= 0) particles.splice(i, 1);
      }
      if (btnp("a") || btnp("a")) state = "title";
      return;
    }

    // --- Play State ---

    // Respawn delay
    if (respawnTimer > 0) {
      respawnTimer--;
      // Update explosions/particles during respawn
      for (let i = explosions.length - 1; i >= 0; i--) {
        explosions[i].timer--;
        if (explosions[i].timer <= 0) explosions.splice(i, 1);
      }
      for (let i = particles.length - 1; i >= 0; i--) {
        const p = particles[i]; p.x += p.vx; p.y += p.vy; p.vy += 0.05; p.life--;
        if (p.life <= 0) particles.splice(i, 1);
      }
      return;
    }

    // Invulnerability timer
    if (invulnTimer > 0) invulnTimer--;

    // Player movement
    if (btn("left")) player.x -= 3;
    if (btn("right")) player.x += 3;
    player.x = _max(4, min(W - 12, player.x));

    // Player shoot
    if (shootCooldown > 0) shootCooldown--;
    if (btnp("a") && bullet === null && shootCooldown <= 0) {
      bullet = { x: player.x + 0, y: player.y - 4 };
      shootCooldown = 6;
      shootSound();
    }

    // Update player bullet
    if (bullet) {
      bullet.y -= 6;
      if (bullet.y < -8) bullet = null;
    }

    // --- Alien March ---
    marchTimer--;
    if (marchTimer <= 0) {
      // Move aliens one step
      marchCount++;
      marchSound();

      let needDrop = false;

      // Check edges
      const liveAliens = aliens.filter(a => a.alive);
      let leftMost = W, rightMost = 0;
      for (const a of liveAliens) {
        const pos = getAlienPos(a);
        if (pos.x < leftMost) leftMost = pos.x;
        if (pos.x + 8 > rightMost) rightMost = pos.x + 8;
      }

      if (marchDir === 1 && rightMost + 2 >= W - 4) {
        needDrop = true;
        marchDir = -1;
      } else if (marchDir === -1 && leftMost - 2 <= 4) {
        needDrop = true;
        marchDir = 1;
      }

      if (needDrop) {
        alienOffY += 6;
        // Check if aliens reached player level
        for (const a of liveAliens) {
          const pos = getAlienPos(a);
          if (pos.y + 8 >= player.y) {
            // Aliens win — game over
            state = "gameover";
            addExplosion(player.x, player.y, true);
            playerDeathSound();
            if (score > hiScore) hiScore = score;
            return;
          }
        }
      } else {
        alienOffX += marchDir * 4;
      }

      // Speed up based on how many aliens remain
      const aliveCount = liveAliens.length;
      if (aliveCount <= 1) marchSpeed = 1;
      else if (aliveCount <= 4) marchSpeed = 2;
      else if (aliveCount <= 10) marchSpeed = 3;
      else if (aliveCount <= 20) marchSpeed = _max(3, marchBaseSpeed - 6);
      else if (aliveCount <= 35) marchSpeed = _max(4, marchBaseSpeed - 3);
      else marchSpeed = marchBaseSpeed;

      marchTimer = marchSpeed;
    }

    // --- Bullet vs Alien collision ---
    if (bullet) {
      for (let i = 0; i < aliens.length; i++) {
        const a = aliens[i];
        if (!a.alive) continue;
        const pos = getAlienPos(a);
        if (bullet.x + 8 > pos.x && bullet.x < pos.x + 8 &&
            bullet.y + 8 > pos.y && bullet.y < pos.y + 8) {
          a.alive = false;
          score += a.pts;
          addExplosion(pos.x, pos.y, false);
          alienHitSound();
          bullet = null;
          break;
        }
      }
    }

    // --- Bullet vs Shield collision (player bullet) ---
    if (bullet) {
      for (const s of shields) {
        if (shieldHitTest(s, bullet.x, bullet.y, 2, 4)) {
          damageShield(s, flr(bullet.x), flr(bullet.y), 3);
          bullet = null;
          break;
        }
      }
    }

    // --- Bullet vs UFO ---
    if (bullet && ufo) {
      if (bullet.x + 8 > ufo.x && bullet.x < ufo.x + 8 &&
          bullet.y + 8 > ufo.y && bullet.y < ufo.y + 8) {
        const ufoPoints = [50, 100, 150, 200, 300][flr(rnd(5))];
        score += ufoPoints;
        ufoScoreShow = ufoPoints;
        ufoScoreTimer = 60;
        ufoScoreX = ufo.x;
        addExplosion(ufo.x, ufo.y, true);
        ufoHitSound();
        ufo = null;
        bullet = null;
      }
    }

    // --- Alien shooting ---
    // Find bottom-most alive alien in each column and have them occasionally shoot
    const liveAliens = aliens.filter(a => a.alive);
    if (GrayBox.frame % _max(3, 15 - wave * 2) === 0 && liveAliens.length > 0) {
      // Pick a random column with alive aliens
      const cols = {};
      for (const a of liveAliens) {
        if (!cols[a.col] || a.row > cols[a.col].row) cols[a.col] = a;
      }
      const bottomAliens = Object.values(cols);
      if (bottomAliens.length > 0 && eBullets.length < 3 + wave) {
        const shooter = bottomAliens[flr(rnd(bottomAliens.length))];
        const pos = getAlienPos(shooter);
        eBullets.push({
          x: pos.x + 0, y: pos.y + 8,
          type: flr(rnd(2))
        });
      }
    }

    // --- Update enemy bullets ---
    for (let i = eBullets.length - 1; i >= 0; i--) {
      const b = eBullets[i];
      b.y += 2.5 + wave * 0.2;

      // Bullet vs shield
      let hitShield = false;
      for (const s of shields) {
        if (shieldHitTest(s, b.x, b.y, 2, 4)) {
          damageShield(s, flr(b.x), flr(b.y + 2), 3);
          eBullets.splice(i, 1);
          hitShield = true;
          break;
        }
      }
      if (hitShield) continue;

      // Bullet vs player
      if (invulnTimer <= 0 &&
          b.x + 8 > player.x && b.x < player.x + 8 &&
          b.y + 8 > player.y && b.y < player.y + 8) {
        eBullets.splice(i, 1);
        lives--;
        addExplosion(player.x, player.y, true);
        playerDeathSound();
        if (lives <= 0) {
          state = "gameover";
          if (score > hiScore) hiScore = score;
        } else {
          respawnTimer = 45;
          invulnTimer = 60;
          player.x = W / 2 - 4;
          bullet = null;
        }
        continue;
      }

      if (b.y > H + 8) eBullets.splice(i, 1);
    }

    // --- Aliens touching shields (erode from top) ---
    for (const a of liveAliens) {
      const pos = getAlienPos(a);
      for (const s of shields) {
        if (pos.x + 8 > s.x && pos.x < s.x + SHIELD_W &&
            pos.y + 8 > s.y && pos.y < s.y + SHIELD_H) {
          // Alien overlaps shield — destroy the overlapping area
          for (let dy = 0; dy < 8; dy++) {
            for (let dx = 0; dx < 8; dx++) {
              const px = flr(pos.x + dx - s.x);
              const py = flr(pos.y + dy - s.y);
              if (px >= 0 && px < SHIELD_W && py >= 0 && py < SHIELD_H) {
                s.pixels[py][px] = 0;
              }
            }
          }
        }
      }
    }

    // --- UFO ---
    ufoTimer--;
    if (ufoTimer <= 0 && !ufo) {
      const dir = rnd(1) > 0.5 ? 1 : -1;
      ufo = { x: dir === 1 ? -10 : W + 10, y: 20, dir: dir, speed: 1.5 };
      ufoTimer = 400 + flr(rnd(400));
    }
    if (ufo) {
      ufo.x += ufo.dir * ufo.speed;
      if (ufo.x < -16 || ufo.x > W + 16) ufo = null;
      else if (GrayBox.frame % 8 === 0) ufoSound();
    }
    if (ufoScoreTimer > 0) ufoScoreTimer--;

    // --- Explosions ---
    for (let i = explosions.length - 1; i >= 0; i--) {
      explosions[i].timer--;
      if (explosions[i].timer <= 0) explosions.splice(i, 1);
    }

    // --- Particles ---
    for (let i = particles.length - 1; i >= 0; i--) {
      const p = particles[i];
      p.x += p.vx; p.y += p.vy; p.vy += 0.05; p.life--;
      if (p.life <= 0) particles.splice(i, 1);
    }

    // --- Wave clear check ---
    if (liveAliens.length === 0 && state === "play") {
      waveClearSound();
      alienOffX = 0;
      alienOffY = 0;
      setTimeout(() => {
        if (state === "play") spawnWave();
      }, 1500);
      // Temporarily set totalAliens to prevent re-trigger
      // We'll use a flag
      aliens.push({ alive: false, col: -1, row: -1, baseX: -100, baseY: -100, type: "squid", pts: 0 });
    }
  };

  // ============================================================
  // Draw
  // ============================================================
  GrayBox._draw = function() {
    cls(0);

    // Stars
    for (const s of stars) pix(s.x, s.y, s.bright);

    // --- Title Screen ---
    if (state === "title") {
      const ty = 38 + sin(GrayBox.frame * 0.05) * 4;

      // Title text
      text("SPACE INVADERS", 126, flr(ty), 3);
      rectf(110, flr(ty) + 10, 100, 1, 2);

      // Animated aliens parade
      const bx = W / 2 - 55;
      const by = flr(ty) + 22;
      const aFrame = flr(GrayBox.frame / 15) % 2;
      spr(aFrame ? 2 : 3, bx, by + sin(GrayBox.frame * 0.08) * 2);
      spr(aFrame ? 4 : 5, bx + 24, by + sin(GrayBox.frame * 0.08 + 1) * 2);
      spr(aFrame ? 6 : 7, bx + 48, by + sin(GrayBox.frame * 0.08 + 2) * 2);
      spr(aFrame ? 4 : 5, bx + 72, by + sin(GrayBox.frame * 0.08 + 3) * 2);
      spr(aFrame ? 2 : 3, bx + 96, by + sin(GrayBox.frame * 0.08 + 4) * 2);

      if (flr(GrayBox.frame / 20) % 2 === 0) text("PRESS A TO START", 120, 128, 3);

      // Score table
      text("- SCORE TABLE -", 123, 146, 2);
      spr(8, 123, 158); text("  UFO     ???", 133, 160, 2);
      spr(2, 123, 168); text("  SQUID    30", 133, 170, 2);
      spr(4, 123, 178); text("  CRAB     20", 133, 180, 2);
      spr(6, 123, 188); text("  OCTOPUS  10", 133, 190, 2);

      if (hiScore > 0) {
        text("HI-SCORE: " + hiScore, 123, 210, 1);
      }

      text("GRAYBOX DEMO V0.1", 118, 229, 1);
      return;
    }

    // --- Game Over ---
    if (state === "gameover") {
      for (const p of particles) pix(flr(p.x), flr(p.y), p.color);

      text("GAME OVER", 138, 83, 3);
      text("SCORE: " + score, 130, 101, 2);
      text("WAVE: " + wave, 140, 113, 2);
      if (hiScore > 0) text("HI-SCORE: " + hiScore, 123, 128, 1);
      if (flr(GrayBox.frame / 20) % 2 === 0) text("PRESS A TO CONTINUE", 113, 158, 3);
      return;
    }

    // --- Play State Rendering ---

    // Ground line
    rectf(0, 229, W, 1, 1);

    // Shields
    for (const s of shields) drawShield(s);

    // Aliens
    for (const a of aliens) {
      if (!a.alive) continue;
      const pos = getAlienPos(a);
      spr(getAlienSprite(a), flr(pos.x), flr(pos.y));
    }

    // UFO
    if (ufo) {
      spr(8, flr(ufo.x), flr(ufo.y));
    }
    // UFO score display
    if (ufoScoreTimer > 0) {
      text("" + ufoScoreShow, flr(ufoScoreX), 20, 3);
    }

    // Enemy bullets
    for (const b of eBullets) {
      spr(b.type === 0 ? 10 : 11, flr(b.x), flr(b.y));
    }

    // Player bullet
    if (bullet) spr(9, flr(bullet.x), flr(bullet.y));

    // Player (blink during invulnerability)
    if (respawnTimer <= 0) {
      if (invulnTimer <= 0 || flr(GrayBox.frame / 3) % 2 === 0) {
        spr(1, flr(player.x), flr(player.y));
      }
    }

    // Explosions
    for (const e of explosions) {
      const sprId = e.timer > 5 ? 12 : (e.timer > 2 ? 13 : 16);
      spr(sprId, flr(e.x), flr(e.y));
    }

    // Particles
    for (const p of particles) pix(flr(p.x), flr(p.y), p.color);

    // --- HUD ---
    rectf(0, 0, W, 14, 0);
    text("SCORE:" + score, 4, 4, 3);
    text("WAVE:" + wave, W / 2 - 20, 4, 2);
    // Lives
    text("" + lives, W - 48, 4, 3);
    for (let i = 0; i < lives - 1; i++) spr(15, W - 38 + i * 10, 3);
  };

  GrayBox.boot("screen");
})();
</script>
