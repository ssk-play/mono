<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GrayBox — Demo: Centipede</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #0a0a0a;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100vh;
    font-family: monospace;
    overflow: hidden;
  }
  #frame {
    background: #111;
    border: 3px solid #333;
    border-radius: 8px;
    padding: 12px;
    box-shadow: 0 0 40px rgba(0,0,0,0.8), inset 0 0 20px rgba(0,0,0,0.5);
  }
  canvas {
    display: block;
    image-rendering: pixelated;
    image-rendering: crisp-edges;
  }
  #controls {
    margin-top: 12px;
    color: #6b6b6b;
    font-size: 11px;
    text-align: center;
    letter-spacing: 1px;
  }
  #controls span { color: #b0b0b0; }
</style>
</head>
<body>
<div id="frame">
  <canvas id="screen"></canvas>
</div>
<div id="controls">
  <span>ARROWS</span> MOVE &nbsp;&nbsp; <span>Z</span> SHOOT &nbsp;&nbsp; <span>ENTER</span> START
</div>
<script>
(() => {
  "use strict";

  // ============================================================
  // GrayBox Runtime (inline)
  // ============================================================
  const W = 480;
  const H = 320;
  const SCALE = 2;
  const FPS = 30;
  const COLORS = ["#1a1a1a", "#6b6b6b", "#b0b0b0", "#e8e8e8"];
  const canvas = document.getElementById("screen");
  canvas.width = W;
  canvas.height = H;
  canvas.style.width = (W * SCALE) + "px";
  canvas.style.height = (H * SCALE) + "px";
  const ctx = canvas.getContext("2d");
  ctx.imageSmoothingEnabled = false;
  const buf = ctx.createImageData(W, H);
  const buf32 = new Uint32Array(buf.data.buffer);

  function hexToABGR(hex) {
    const r = parseInt(hex.slice(1, 3), 16);
    const g = parseInt(hex.slice(3, 5), 16);
    const b = parseInt(hex.slice(5, 7), 16);
    return (255 << 24) | (b << 16) | (g << 8) | r;
  }
  const COLOR_U32 = COLORS.map(hexToABGR);

  const sprites = {};
  const tilemap = {};

  const keyMap = {
    "ArrowUp": "up", "ArrowDown": "down", "ArrowLeft": "left", "ArrowRight": "right",
    "w": "up", "s": "down", "a": "left", "d": "right",
    "z": "a", "Z": "a", "x": "b", "X": "b",
    "Enter": "start", " ": "a"
  };
  const keys = {};
  const keysPrev = {};

  document.addEventListener("keydown", e => {
    const k = keyMap[e.key];
    if (k) { keys[k] = true; e.preventDefault(); }
  });
  document.addEventListener("keyup", e => {
    const k = keyMap[e.key];
    if (k) { keys[k] = false; e.preventDefault(); }
  });

  let audioCtx = null;
  const channels = [null, null];
  const channelGains = [null, null];
  function ensureAudio() {
    if (!audioCtx) {
      audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      for (let i = 0; i < 2; i++) {
        channelGains[i] = audioCtx.createGain();
        channelGains[i].gain.value = 0.15;
        channelGains[i].connect(audioCtx.destination);
      }
    }
  }

  const NOTE_NAMES = ["C","C#","D","D#","E","F","F#","G","G#","A","A#","B"];
  function noteToFreq(noteStr) {
    const match = noteStr.match(/^([A-G]#?)(\d)$/);
    if (!match) return 440;
    const name = match[1];
    const octave = parseInt(match[2]);
    const semitone = NOTE_NAMES.indexOf(name);
    if (semitone === -1) return 440;
    const midi = (octave + 1) * 12 + semitone;
    return 440 * Math.pow(2, (midi - 69) / 12);
  }

  const FONT_W = 4;
  const FONT_H = 6;
  const FONT = {};
  const fontData = {
    "A":"0110100110011111100110011001","B":"1110100110101110100110011110",
    "C":"0110100110001000100001100110","D":"1100101010011001100110101100",
    "E":"1111100010001110100010001111","F":"1111100010001110100010001000",
    "G":"0111100010001011100101100111","H":"1001100110011111100110011001",
    "I":"1110010001000100010001001110","J":"0111001000100010001010100100",
    "K":"1001101011001100101010011001","L":"1000100010001000100010001111",
    "M":"1001111111011001100110011001","N":"1001110111011001100110011001",
    "O":"0110100110011001100110010110","P":"1110100110011110100010001000",
    "Q":"0110100110011001101101100001","R":"1110100110011110101010011001",
    "S":"0111100010000110000110001110","T":"1111001000100010001000100010",
    "U":"1001100110011001100110010110","V":"1001100110011001100101100110",
    "W":"1001100110011001101111011001","X":"1001100101100110011010011001",
    "Y":"1001100101100010001000100010","Z":"1111000100100100100010001111",
    "0":"0110100111011011101110010110","1":"0100110001000100010001001110",
    "2":"0110100100010010010010001111","3":"1110000100010110000110011110",
    "4":"1001100110011111000100010001","5":"1111100010001110000100011110",
    "6":"0110100010001110100110010110","7":"1111000100010010010001001000",
    "8":"0110100110010110100110010110","9":"0110100110010111000100010110",
    " ":"0000000000000000000000000000",
    ".":"0000000000000000000001000100",
    ",":"0000000000000000001000101000",
    "!":"0100010001000100000000000100",
    "?":"0110100100010010000000000010",
    "-":"0000000000001110000000000000",
    "+":"0000001001001110010000100000",
    ":":"0000010001000000010001000000",
    "/":"0001000100100010010010001000",
    "*":"0000101001001110010010100000",
    "#":"0101111101011111010100000000",
    "(":"0010010010001000010001000010",
    ")":"0100001000010001000100100100",
    "=":"0000000011110000111100000000",
    "'":"0100010010000000000000000000",
    "\"":"1010101000000000000000000000",
    "<":"0010010010001000010000100010",
    ">":"1000010000100001001001001000",
    "_":"0000000000000000000000001111",
  };
  for (const [ch, bits] of Object.entries(fontData)) {
    FONT[ch] = [];
    for (let i = 0; i < bits.length; i++) FONT[ch].push(parseInt(bits[i]));
  }

  const API = {};
  API._init = null;
  API._update = null;
  API._draw = null;
  API.frame = 0;

  API.cls = function(c = 0) { buf32.fill(COLOR_U32[c] || COLOR_U32[0]); };
  API.pix = function(x, y, c) {
    x = Math.floor(x); y = Math.floor(y);
    if (x < 0 || x >= W || y < 0 || y >= H) return;
    buf32[y * W + x] = COLOR_U32[c] || COLOR_U32[0];
  };
  API.line = function(x0, y0, x1, y1, c) {
    x0=Math.floor(x0); y0=Math.floor(y0); x1=Math.floor(x1); y1=Math.floor(y1);
    const dx=Math.abs(x1-x0), dy=Math.abs(y1-y0);
    const sx=x0<x1?1:-1, sy=y0<y1?1:-1;
    let err=dx-dy;
    while(true) {
      API.pix(x0,y0,c);
      if(x0===x1&&y0===y1) break;
      const e2=2*err;
      if(e2>-dy){err-=dy;x0+=sx;}
      if(e2<dx){err+=dx;y0+=sy;}
    }
  };
  API.rect = function(x,y,w,h,c) {
    API.line(x,y,x+w-1,y,c); API.line(x+w-1,y,x+w-1,y+h-1,c);
    API.line(x+w-1,y+h-1,x,y+h-1,c); API.line(x,y+h-1,x,y,c);
  };
  API.rectf = function(x,y,w,h,c) {
    x=Math.floor(x); y=Math.floor(y);
    const col=COLOR_U32[c]||COLOR_U32[0];
    for(let py=Math.max(0,y);py<Math.min(H,y+h);py++)
      for(let px=Math.max(0,x);px<Math.min(W,x+w);px++)
        buf32[py*W+px]=col;
  };
  API.circ = function(cx,cy,r,c) {
    let x=r,y=0,d=1-r; cx=Math.floor(cx); cy=Math.floor(cy);
    while(x>=y){
      API.pix(cx+x,cy+y,c);API.pix(cx-x,cy+y,c);
      API.pix(cx+x,cy-y,c);API.pix(cx-x,cy-y,c);
      API.pix(cx+y,cy+x,c);API.pix(cx-y,cy+x,c);
      API.pix(cx+y,cy-x,c);API.pix(cx-y,cy-x,c);
      y++; if(d<0){d+=2*y+1;}else{x--;d+=2*(y-x)+1;}
    }
  };
  API.circf = function(cx,cy,r,c) {
    cx=Math.floor(cx); cy=Math.floor(cy);
    const col=COLOR_U32[c]||COLOR_U32[0]; const r2=r*r;
    for(let py=-r;py<=r;py++) for(let px=-r;px<=r;px++)
      if(px*px+py*py<=r2){ const sx=cx+px,sy=cy+py;
        if(sx>=0&&sx<W&&sy>=0&&sy<H) buf32[sy*W+sx]=col; }
  };
  API.sprite = function(id, data) {
    const arr = new Uint8Array(64); let i = 0;
    for (const ch of data) { if (ch>='0'&&ch<='3') { arr[i++]=parseInt(ch); if(i>=64) break; } }
    sprites[id] = arr;
  };
  API.spr = function(id, x, y, flipX, flipY) {
    const s=sprites[id]; if(!s) return;
    x=Math.floor(x); y=Math.floor(y);
    for(let py=0;py<8;py++) for(let px=0;px<8;px++){
      const sx=flipX?7-px:px, sy=flipY?7-py:py;
      const c=s[sy*8+sx], dx=x+px, dy=y+py;
      if(dx>=0&&dx<W&&dy>=0&&dy<H) buf32[dy*W+dx]=COLOR_U32[c];
    }
  };
  API.text = function(str, x, y, c) {
    str=String(str).toUpperCase(); let cx=Math.floor(x); const cy=Math.floor(y);
    const col=COLOR_U32[c]||COLOR_U32[3];
    for(const ch of str){
      const glyph=FONT[ch];
      if(glyph) for(let py=0;py<FONT_H;py++) for(let px=0;px<FONT_W;px++)
        if(glyph[py*FONT_W+px]){ const dx=cx+px,dy=cy+py;
          if(dx>=0&&dx<W&&dy>=0&&dy<H) buf32[dy*W+dx]=col; }
      cx+=FONT_W+1;
    }
  };
  API.mget = function(cx,cy) { return tilemap[cx+","+cy]||0; };
  API.mset = function(cx,cy,id) { tilemap[cx+","+cy]=id; };
  API.map = function(mx,my,mw,mh,sx,sy) {
    for(let ty=0;ty<mh;ty++) for(let tx=0;tx<mw;tx++){
      const id=API.mget(mx+tx,my+ty); if(id>0) API.spr(id,sx+tx*8,sy+ty*8); }
  };
  API.btn = function(k) { return !!keys[k]; };
  API.btnp = function(k) { return !!keys[k] && !keysPrev[k]; };
  API.note = function(ch, noteStr, dur) {
    ensureAudio(); if(ch<0||ch>1) return; API.stop(ch);
    const osc=audioCtx.createOscillator(); osc.type="square";
    osc.frequency.value=noteToFreq(noteStr);
    osc.connect(channelGains[ch]); osc.start();
    osc.stop(audioCtx.currentTime+dur); channels[ch]=osc;
  };
  API.stop = function(ch) {
    if(ch===undefined){API.stop(0);API.stop(1);return;}
    if(channels[ch]){try{channels[ch].stop();}catch(e){} channels[ch]=null;}
  };
  API.rnd = function(max) { return Math.random()*max; };
  API.flr = Math.floor;
  API.abs = Math.abs;
  API.min = Math.min;
  API.max = Math.max;
  API.sin = Math.sin;
  API.cos = Math.cos;

  function tick() {
    if (API._update) API._update();
    if (API._draw) API._draw();
    ctx.putImageData(buf, 0, 0);
    for (const k in keys) keysPrev[k] = keys[k];
    API.frame++;
  }

  // ============================================================
  // Centipede Game
  // ============================================================
  const { cls, pix, line, rect, rectf, circ, circf, sprite: defSprite,
          spr, text, btn, btnp, note, stop, rnd, flr, abs: _abs,
          min, max: _max, sin, cos } = API;

  // --- Sprites ---
  // 1: Player ship (blaster pointing up)
  defSprite(1,
    "00030000" +
    "00333000" +
    "00232000" +
    "03323300" +
    "33222330" +
    "33222330" +
    "03233200" +
    "00300300"
  );
  // 2: Centipede head (facing right, with eyes and mandibles)
  defSprite(2,
    "01333100" +
    "13333310" +
    "33233230" +
    "33333330" +
    "33333330" +
    "33233230" +
    "13333310" +
    "01333100"
  );
  // 3: Centipede body segment (round with pattern)
  defSprite(3,
    "01222100" +
    "12222210" +
    "22322320" +
    "22222220" +
    "22222220" +
    "22322320" +
    "12222210" +
    "01222100"
  );
  // 4: Mushroom (full health - 4 hits)
  defSprite(4,
    "00333000" +
    "03333300" +
    "33233230" +
    "33333330" +
    "03333300" +
    "00211000" +
    "00211000" +
    "00111000"
  );
  // 5: Mushroom (3 hits left - slight damage)
  defSprite(5,
    "00333000" +
    "03333300" +
    "33233230" +
    "33333330" +
    "00333000" +
    "00211000" +
    "00210000" +
    "00110000"
  );
  // 6: Mushroom (2 hits left - medium damage)
  defSprite(6,
    "00333000" +
    "03333300" +
    "33033030" +
    "33333330" +
    "00330000" +
    "00210000" +
    "00210000" +
    "00100000"
  );
  // 7: Mushroom (1 hit left - nearly destroyed)
  defSprite(7,
    "00330000" +
    "03330000" +
    "33033000" +
    "33330000" +
    "00300000" +
    "00200000" +
    "00100000" +
    "00000000"
  );
  // 8: Player bullet
  defSprite(8,
    "00030000" +
    "00030000" +
    "00020000" +
    "00020000" +
    "00000000" +
    "00000000" +
    "00000000" +
    "00000000"
  );
  // 9: Spider (bouncy enemy in player area)
  defSprite(9,
    "30000030" +
    "03300330" +
    "00333300" +
    "03322330" +
    "33333330" +
    "30333030" +
    "30033000" +
    "03000300"
  );
  // 10: Flea (drops down creating mushrooms)
  defSprite(10,
    "00322000" +
    "00333000" +
    "03333300" +
    "33233230" +
    "00333000" +
    "00030000" +
    "00303000" +
    "03000300"
  );
  // 11: Explosion frame 1
  defSprite(11,
    "00000000" +
    "00200100" +
    "01002000" +
    "00031000" +
    "00130200" +
    "01000010" +
    "00100000" +
    "00000000"
  );
  // 12: Explosion frame 2
  defSprite(12,
    "20010020" +
    "01000010" +
    "00203200" +
    "03033030" +
    "00232000" +
    "01000300" +
    "20001001" +
    "00200010"
  );
  // 13: Life icon
  defSprite(13,
    "00000000" +
    "00030000" +
    "00333000" +
    "00232000" +
    "03323300" +
    "33222330" +
    "00000000" +
    "00000000"
  );
  // 14: Centipede head (facing left)
  defSprite(14,
    "01333100" +
    "13333310" +
    "32332330" +
    "33333330" +
    "33333330" +
    "32332330" +
    "13333310" +
    "01333100"
  );

  // --- Grid constants ---
  const GRID_W = 60;   // 480 / 8
  const GRID_H = 40;   // 320 / 8
  const HUD_H = 2;     // top 2 rows for HUD
  const PLAYER_ROWS = 6; // bottom 6 rows for player movement
  const PLAYER_MIN_Y = (GRID_H - PLAYER_ROWS) * 8;

  // --- Game state ---
  let state = "title";
  let player, bullet, centipedes, mushrooms, spider, flea, explosions, particles;
  let score, lives, wave, waveTimer, waveMessage;
  let shootCooldown, respawnTimer;
  let fleaTimer, spiderTimer;
  let titleCentipede; // decorative centipede on title screen

  function resetGame() {
    player = { x: W / 2 - 4, y: H - 24, speed: 2.5 };
    bullet = null;
    centipedes = [];
    mushrooms = {};
    spider = null;
    flea = null;
    explosions = [];
    particles = [];
    score = 0;
    lives = 3;
    wave = 0;
    waveTimer = 0;
    waveMessage = 0;
    shootCooldown = 0;
    respawnTimer = 0;
    fleaTimer = 200 + flr(rnd(200));
    spiderTimer = 150 + flr(rnd(150));
    // Generate random mushroom field
    generateMushrooms();
    spawnWave();
  }

  function mushKey(gx, gy) { return gx + "," + gy; }

  function getMush(gx, gy) { return mushrooms[mushKey(gx, gy)] || 0; }
  function setMush(gx, gy, hp) {
    if (hp <= 0) delete mushrooms[mushKey(gx, gy)];
    else mushrooms[mushKey(gx, gy)] = hp;
  }

  function generateMushrooms() {
    mushrooms = {};
    // Scatter mushrooms in the play area (not in HUD or bottom player rows)
    const count = 30 + flr(rnd(20));
    for (let i = 0; i < count; i++) {
      const gx = flr(rnd(GRID_W));
      const gy = HUD_H + 1 + flr(rnd(GRID_H - HUD_H - PLAYER_ROWS - 2));
      setMush(gx, gy, 4);
    }
  }

  function spawnWave() {
    wave++;
    waveMessage = 90;
    // Create a centipede with length based on wave
    const len = min(12, 8 + flr(wave / 2));
    const startX = flr(rnd(GRID_W - len));
    const dir = rnd(1) < 0.5 ? 1 : -1;
    const segments = [];
    for (let i = 0; i < len; i++) {
      segments.push({
        gx: startX + i * (-dir),
        gy: HUD_H,
        px: (startX + i * (-dir)) * 8,
        py: HUD_H * 8,
        dir: dir,
        isHead: i === 0,
        moveTimer: 0,
        speed: _max(2, 5 - flr(wave / 3)),
        descending: false,
        targetY: 0,
      });
    }
    centipedes.push(segments);
    // Also spawn some solo heads in later waves
    if (wave > 2) {
      const soloCount = min(flr(wave / 3), 4);
      for (let i = 0; i < soloCount; i++) {
        const sx = flr(rnd(GRID_W));
        const sd = rnd(1) < 0.5 ? 1 : -1;
        centipedes.push([{
          gx: sx, gy: HUD_H,
          px: sx * 8, py: HUD_H * 8,
          dir: sd, isHead: true,
          moveTimer: 0,
          speed: _max(1, 4 - flr(wave / 3)),
          descending: false, targetY: 0,
        }]);
      }
    }
  }

  function addExplosion(x, y) {
    explosions.push({ x: x, y: y, timer: 12 });
    for (let i = 0; i < 6; i++)
      particles.push({
        x: x + 4, y: y + 4,
        vx: rnd(3) - 1.5, vy: rnd(3) - 1.5,
        life: 5 + flr(rnd(8)),
        color: flr(rnd(3)) + 1
      });
  }

  function shootSound() { note(0, "C6", 0.03); }
  function hitMushroomSound() { note(1, "E3", 0.03); }
  function hitCentiSound() { note(1, "C4", 0.05); setTimeout(() => note(1, "E4", 0.04), 30); }
  function hitSpiderSound() { note(0, "G4", 0.06); note(1, "B4", 0.06); }
  function hitFleaSound() { note(1, "A3", 0.05); }
  function deathSound() {
    note(0, "C3", 0.12); note(1, "G2", 0.12);
    setTimeout(() => { note(0, "A2", 0.18); note(1, "E2", 0.18); }, 120);
  }
  function waveClearSound() {
    note(0, "C5", 0.08);
    setTimeout(() => note(0, "E5", 0.08), 80);
    setTimeout(() => note(0, "G5", 0.08), 160);
    setTimeout(() => note(0, "C6", 0.12), 240);
  }

  resetGame();

  // ============================================================
  // Update
  // ============================================================
  API._update = function() {
    if (state === "title") {
      if (btnp("a") || btnp("start")) {
        state = "play";
        resetGame();
        note(0, "C5", 0.08);
        setTimeout(() => note(0, "E5", 0.08), 80);
        setTimeout(() => note(0, "G5", 0.12), 160);
      }
      return;
    }

    if (state === "gameover") {
      for (let i = particles.length - 1; i >= 0; i--) {
        const p = particles[i]; p.x += p.vx; p.y += p.vy; p.vy += 0.08; p.life--;
        if (p.life <= 0) particles.splice(i, 1);
      }
      if (btnp("a") || btnp("start")) state = "title";
      return;
    }

    // --- Play state ---
    if (waveMessage > 0) waveMessage--;

    // Respawn timer
    if (respawnTimer > 0) {
      respawnTimer--;
      if (respawnTimer === 0) {
        player.x = W / 2 - 4;
        player.y = H - 24;
      }
      // Still update enemies and such during respawn
    }

    // Player movement (arrows, constrained to bottom area)
    if (respawnTimer <= 0) {
      if (btn("left")) player.x -= player.speed;
      if (btn("right")) player.x += player.speed;
      if (btn("up")) player.y -= player.speed;
      if (btn("down")) player.y += player.speed;
      player.x = _max(0, min(W - 8, player.x));
      player.y = _max(PLAYER_MIN_Y, min(H - 10, player.y));
    }

    // Player shoot
    if (shootCooldown > 0) shootCooldown--;
    if (respawnTimer <= 0 && btnp("a") && !bullet && shootCooldown <= 0) {
      bullet = { x: player.x + 3, y: player.y - 4 };
      shootCooldown = 4;
      shootSound();
    }

    // Update bullet
    if (bullet) {
      bullet.y -= 7;
      if (bullet.y < 0) bullet = null;
    }

    // Bullet collision: mushrooms
    if (bullet) {
      const bgx = flr(bullet.x / 8);
      const bgy = flr(bullet.y / 8);
      // Check 2x2 grid cells around bullet
      for (let dy = -1; dy <= 0; dy++) {
        for (let dx = 0; dx <= 0; dx++) {
          const cx = bgx + dx;
          const cy = bgy + dy;
          const mhp = getMush(cx, cy);
          if (mhp > 0) {
            // Pixel-level check
            const mx = cx * 8, my = cy * 8;
            if (bullet.x + 2 > mx && bullet.x < mx + 8 && bullet.y > my && bullet.y < my + 8) {
              setMush(cx, cy, mhp - 1);
              if (mhp - 1 <= 0) score += 1;
              else score += 0;
              hitMushroomSound();
              bullet = null;
              break;
            }
          }
        }
        if (!bullet) break;
      }
    }

    // Bullet collision: centipede segments
    if (bullet) {
      let hit = false;
      for (let ci = centipedes.length - 1; ci >= 0; ci--) {
        const segs = centipedes[ci];
        for (let si = segs.length - 1; si >= 0; si--) {
          const s = segs[si];
          if (bullet.x + 2 > s.px && bullet.x < s.px + 8 &&
              bullet.y > s.py && bullet.y < s.py + 8) {
            // Hit!
            bullet = null;
            hit = true;
            const pts = s.isHead ? 100 : 10;
            score += pts;
            addExplosion(s.px, s.py);
            hitCentiSound();

            // Place a mushroom where segment died
            const mgx = flr(s.px / 8);
            const mgy = flr(s.py / 8);
            if (mgy >= HUD_H && mgy < GRID_H - 1) {
              setMush(mgx, mgy, 4);
            }

            // Split centipede: segments before become one chain, segments after become another
            if (segs.length === 1) {
              centipedes.splice(ci, 1);
            } else {
              const before = segs.slice(0, si);
              const after = segs.slice(si + 1);
              centipedes.splice(ci, 1);
              if (before.length > 0) {
                // Reverse direction of the "before" part (it was following)
                before[before.length - 1].isHead = true;
                centipedes.push(before);
              }
              if (after.length > 0) {
                after[0].isHead = true;
                centipedes.push(after);
              }
            }
            break;
          }
        }
        if (hit) break;
      }
    }

    // Bullet collision: spider
    if (bullet && spider) {
      if (bullet.x + 2 > spider.x && bullet.x < spider.x + 8 &&
          bullet.y > spider.y && bullet.y < spider.y + 8) {
        // Distance-based scoring
        const dist = _abs(player.x - spider.x) + _abs(player.y - spider.y);
        if (dist < 40) score += 900;
        else if (dist < 80) score += 600;
        else score += 300;
        addExplosion(spider.x, spider.y);
        hitSpiderSound();
        spider = null;
        bullet = null;
      }
    }

    // Bullet collision: flea
    if (bullet && flea) {
      if (bullet.x + 2 > flea.x && bullet.x < flea.x + 8 &&
          bullet.y > flea.y && bullet.y < flea.y + 8) {
        flea.hp--;
        bullet = null;
        if (flea.hp <= 0) {
          score += 200;
          addExplosion(flea.x, flea.y);
          hitFleaSound();
          flea = null;
        }
      }
    }

    // Update centipedes
    for (let ci = centipedes.length - 1; ci >= 0; ci--) {
      const segs = centipedes[ci];
      // Move head, body follows
      const head = segs[0];
      head.moveTimer--;
      if (head.moveTimer <= 0) {
        head.moveTimer = head.speed;

        // Store previous positions for followers
        const prevPositions = segs.map(s => ({ gx: s.gx, gy: s.gy, dir: s.dir }));

        if (head.descending) {
          // Move down one row
          head.gy++;
          head.descending = false;
          // Reverse direction
          head.dir = -head.dir;
          // If reached bottom, wrap to top
          if (head.gy >= GRID_H - 1) {
            head.gy = HUD_H;
          }
        } else {
          // Try to move horizontally
          const nextX = head.gx + head.dir;
          // Check if we hit a wall or mushroom
          const hitWall = nextX < 0 || nextX >= GRID_W;
          const hitMush = !hitWall && getMush(nextX, head.gy) > 0;

          if (hitWall || hitMush) {
            // Descend
            head.descending = true;
            head.gy++;
            head.dir = -head.dir;
            if (head.gy >= GRID_H - 1) {
              head.gy = HUD_H;
            }
          } else {
            head.gx = nextX;
          }
        }

        // Body follows
        for (let si = 1; si < segs.length; si++) {
          segs[si].gx = prevPositions[si - 1].gx;
          segs[si].gy = prevPositions[si - 1].gy;
          segs[si].dir = prevPositions[si - 1].dir;
        }

        // Update pixel positions (smooth interpolation target)
        for (const s of segs) {
          s.px = s.gx * 8;
          s.py = s.gy * 8;
        }
      } else {
        // Smooth interpolation between grid positions
        for (const s of segs) {
          const tx = s.gx * 8;
          const ty = s.gy * 8;
          s.px += (tx - s.px) * 0.4;
          s.py += (ty - s.py) * 0.4;
        }
      }
    }

    // Centipede-player collision
    if (respawnTimer <= 0) {
      for (const segs of centipedes) {
        for (const s of segs) {
          if (player.x + 6 > s.px && player.x < s.px + 7 &&
              player.y + 6 > s.py && player.y < s.py + 7) {
            playerDied();
            break;
          }
        }
        if (respawnTimer > 0) break;
      }
    }

    // Spider AI
    if (spider) {
      spider.x += spider.vx;
      spider.y += spider.vy;
      spider.bounceTimer--;
      if (spider.bounceTimer <= 0) {
        spider.vx = (rnd(3) - 1.5) * 1.5;
        spider.vy = (rnd(3) - 1.5) * 1.5;
        spider.bounceTimer = 10 + flr(rnd(20));
      }
      // Keep spider in player area
      if (spider.x < 0 || spider.x > W - 8) spider.vx = -spider.vx;
      if (spider.y < PLAYER_MIN_Y - 16) spider.vy = _abs(spider.vy);
      if (spider.y > H - 10) spider.vy = -_abs(spider.vy);
      spider.x = _max(0, min(W - 8, spider.x));
      // Spider eats mushrooms it touches
      const sgx = flr((spider.x + 4) / 8);
      const sgy = flr((spider.y + 4) / 8);
      if (getMush(sgx, sgy) > 0 && rnd(1) < 0.3) setMush(sgx, sgy, 0);
      // Spider leaves after a while
      spider.life--;
      if (spider.life <= 0) spider = null;
      // Spider-player collision
      if (spider && respawnTimer <= 0) {
        if (player.x + 6 > spider.x && player.x < spider.x + 7 &&
            player.y + 6 > spider.y && player.y < spider.y + 7) {
          addExplosion(spider.x, spider.y);
          spider = null;
          playerDied();
        }
      }
    }
    spiderTimer--;
    if (spiderTimer <= 0 && !spider) {
      const side = rnd(1) < 0.5 ? 0 : W - 8;
      spider = {
        x: side, y: PLAYER_MIN_Y + rnd(40),
        vx: side === 0 ? 2 : -2, vy: rnd(2) - 1,
        bounceTimer: 10, life: 200 + flr(rnd(150))
      };
      spiderTimer = 200 + flr(rnd(200));
    }

    // Flea AI
    if (flea) {
      flea.y += flea.speed;
      // Drop mushrooms as it falls
      const fgy = flr(flea.y / 8);
      const fgx = flr(flea.x / 8);
      if (fgy !== flea.lastDropY && fgy >= HUD_H && fgy < GRID_H - PLAYER_ROWS && rnd(1) < 0.4) {
        if (getMush(fgx, fgy) === 0) setMush(fgx, fgy, 4);
        flea.lastDropY = fgy;
      }
      if (flea.y > H + 8) flea = null;
      // Flea-player collision
      if (flea && respawnTimer <= 0) {
        if (player.x + 6 > flea.x && player.x < flea.x + 7 &&
            player.y + 6 > flea.y && player.y < flea.y + 7) {
          addExplosion(flea.x, flea.y);
          flea = null;
          playerDied();
        }
      }
    }
    fleaTimer--;
    // Spawn flea when mushroom count in player area is low
    if (fleaTimer <= 0 && !flea) {
      const fx = flr(rnd(GRID_W)) * 8;
      flea = { x: fx, y: -8, speed: 2 + wave * 0.2, hp: 2, lastDropY: -1 };
      fleaTimer = 300 + flr(rnd(300));
    }

    // Explosions
    for (let i = explosions.length - 1; i >= 0; i--) {
      explosions[i].timer--;
      if (explosions[i].timer <= 0) explosions.splice(i, 1);
    }

    // Particles
    for (let i = particles.length - 1; i >= 0; i--) {
      const p = particles[i];
      p.x += p.vx; p.y += p.vy; p.vy += 0.05; p.life--;
      if (p.life <= 0) particles.splice(i, 1);
    }

    // Wave clear check
    let totalSegs = 0;
    for (const segs of centipedes) totalSegs += segs.length;
    if (totalSegs === 0 && state === "play") {
      waveTimer++;
      if (waveTimer > 45) {
        waveTimer = 0;
        waveClearSound();
        spawnWave();
      }
    } else {
      waveTimer = 0;
    }
  };

  function playerDied() {
    lives--;
    addExplosion(player.x, player.y);
    deathSound();
    if (lives <= 0) {
      state = "gameover";
    } else {
      respawnTimer = 60;
      player.x = -100;
      player.y = -100;
    }
  }

  // ============================================================
  // Draw
  // ============================================================
  API._draw = function() {
    cls(0);

    if (state === "title") {
      drawTitle();
      return;
    }

    if (state === "gameover") {
      drawGameOver();
      return;
    }

    // --- Play state rendering ---

    // Draw mushrooms
    for (const key in mushrooms) {
      const hp = mushrooms[key];
      const [gxs, gys] = key.split(",");
      const gx = parseInt(gxs), gy = parseInt(gys);
      const sprId = 4 + (4 - hp); // 4=full, 5=3hp, 6=2hp, 7=1hp
      spr(sprId, gx * 8, gy * 8);
    }

    // Draw centipedes
    for (const segs of centipedes) {
      for (let si = segs.length - 1; si >= 0; si--) {
        const s = segs[si];
        if (s.isHead) {
          spr(s.dir > 0 ? 2 : 14, flr(s.px), flr(s.py));
        } else {
          spr(3, flr(s.px), flr(s.py));
        }
      }
    }

    // Draw spider
    if (spider) {
      // Spider flickers/animates
      if (flr(API.frame / 4) % 2 === 0) {
        spr(9, flr(spider.x), flr(spider.y));
      } else {
        spr(9, flr(spider.x), flr(spider.y) + 1);
      }
    }

    // Draw flea
    if (flea) {
      spr(10, flr(flea.x), flr(flea.y));
    }

    // Draw bullet
    if (bullet) spr(8, flr(bullet.x), flr(bullet.y));

    // Draw player
    if (respawnTimer <= 0 || flr(API.frame / 4) % 2 === 0) {
      if (respawnTimer <= 0) {
        spr(1, flr(player.x), flr(player.y));
      }
    }

    // Explosions
    for (const e of explosions) {
      const sprId = e.timer > 6 ? 11 : 12;
      spr(sprId, flr(e.x), flr(e.y));
    }

    // Particles
    for (const p of particles) pix(flr(p.x), flr(p.y), p.color);

    // HUD
    rectf(0, 0, W, HUD_H * 8, 0);
    text("SCORE:" + score, 4, 3, 3);
    text("WAVE:" + wave, W / 2 - 22, 3, 2);
    for (let i = 0; i < lives; i++) spr(13, W - 40 + i * 10, 2);

    // Player area divider line (subtle)
    for (let x = 0; x < W; x += 4) pix(x, PLAYER_MIN_Y - 1, 1);

    // Wave announcement
    if (waveMessage > 0) {
      const msgY = 140 + sin(waveMessage * 0.1) * 3;
      text("WAVE " + wave, W / 2 - 17, flr(msgY), 3);
      if (waveMessage > 60) text("GET READY!", W / 2 - 27, flr(msgY) + 12, 2);
    }
  };

  function drawTitle() {
    const ty = 50 + sin(API.frame * 0.04) * 4;

    // Title text
    text("CENTIPEDE", W / 2 - 25, flr(ty), 3);
    rectf(W / 2 - 50, flr(ty) + 10, 100, 1, 2);

    // Animated centipede on title
    const cx = W / 2 - 40;
    const cy = flr(ty) + 25;
    spr(2, cx + flr(sin(API.frame * 0.1) * 8), cy);
    for (let i = 1; i < 8; i++) {
      spr(3, cx + flr(sin(API.frame * 0.1 - i * 0.5) * 8) + i * 9, cy + flr(sin(API.frame * 0.08 + i) * 2));
    }

    // Decorative mushrooms
    const mx = W / 2 - 30;
    const my = flr(ty) + 50;
    for (let i = 0; i < 7; i++) {
      spr(4, mx + i * 10 + flr(sin(i + API.frame * 0.02) * 2), my);
    }

    if (flr(API.frame / 20) % 2 === 0) text("PRESS A TO START", W / 2 - 42, 180, 3);

    // Score table
    text("-SCORE TABLE-", W / 2 - 35, 210, 2);
    spr(2, W / 2 - 40, 222); text("  HEAD   100 PTS", W / 2 - 28, 224, 2);
    spr(3, W / 2 - 40, 234); text("  BODY    10 PTS", W / 2 - 28, 236, 2);
    spr(9, W / 2 - 40, 246); text("  SPIDER 300-900", W / 2 - 28, 248, 2);
    spr(10, W / 2 - 40, 258); text("  FLEA   200 PTS", W / 2 - 28, 260, 2);

    text("GRAYBOX DEMO V0.1", W / 2 - 45, 305, 1);
  }

  function drawGameOver() {
    // Draw remaining mushrooms as backdrop
    for (const key in mushrooms) {
      const hp = mushrooms[key];
      const [gxs, gys] = key.split(",");
      const gx = parseInt(gxs), gy = parseInt(gys);
      spr(4 + (4 - hp), gx * 8, gy * 8);
    }
    for (const p of particles) pix(flr(p.x), flr(p.y), p.color);

    // Dark overlay
    rectf(W / 2 - 70, 100, 140, 70, 0);
    rect(W / 2 - 70, 100, 140, 70, 1);

    text("GAME OVER", W / 2 - 25, 112, 3);
    text("SCORE: " + score, W / 2 - 25, 130, 2);
    text("WAVE: " + wave, W / 2 - 18, 142, 2);
    if (flr(API.frame / 20) % 2 === 0) text("PRESS A TO CONTINUE", W / 2 - 52, 200, 3);
  }

  // ============================================================
  // Boot
  // ============================================================
  if (API._init) API._init();
  setInterval(tick, 1000 / FPS);
  document.addEventListener("keydown", ensureAudio, { once: true });
  document.addEventListener("click", ensureAudio, { once: true });
})();
</script>
</body>
