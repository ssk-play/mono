<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GrayBox — Demo: Circus Charlie</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #0a0a0a;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100vh;
    font-family: monospace;
    overflow: hidden;
  }
  #frame {
    background: #111;
    border: 3px solid #333;
    border-radius: 8px;
    padding: 12px;
    box-shadow: 0 0 40px rgba(0,0,0,0.8), inset 0 0 20px rgba(0,0,0,0.5);
  }
  canvas {
    display: block;
    image-rendering: pixelated;
    image-rendering: crisp-edges;
  }
  #controls {
    margin-top: 12px;
    color: #6b6b6b;
    font-size: 11px;
    text-align: center;
    letter-spacing: 1px;
  }
  #controls span { color: #b0b0b0; }
</style>
</head>
<body>
<div id="frame">
  <canvas id="screen"></canvas>
</div>
<div id="controls">
  <span>&larr;&rarr;</span> MOVE &nbsp;&nbsp; <span>Z</span> JUMP &nbsp;&nbsp; <span>ENTER</span> START
</div>
<script>
(() => {
  "use strict";

  // ============================================================
  // GrayBox Runtime (inline)
  // ============================================================
  const W = 320;
  const H = 240;
  const FPS = 30;
  const COLORS = ["#1a1a1a", "#6b6b6b", "#b0b0b0", "#e8e8e8"];
  const canvas = document.getElementById("screen");
  canvas.width = W;
  canvas.height = H;
  function fitCanvas() {
    var maxW = window.innerWidth - 40;
    var maxH = window.innerHeight - 60;
    var s = Math.min(maxW / W, maxH / H);
    canvas.style.width = (W * s) + "px";
    canvas.style.height = (H * s) + "px";
  }
  fitCanvas();
  window.addEventListener("resize", fitCanvas);
  const ctx = canvas.getContext("2d");
  ctx.imageSmoothingEnabled = false;
  const buf = ctx.createImageData(W, H);
  const buf32 = new Uint32Array(buf.data.buffer);

  function hexToABGR(hex) {
    const r = parseInt(hex.slice(1, 3), 16);
    const g = parseInt(hex.slice(3, 5), 16);
    const b = parseInt(hex.slice(5, 7), 16);
    return (255 << 24) | (b << 16) | (g << 8) | r;
  }
  const COLOR_U32 = COLORS.map(hexToABGR);

  const sprites = {};
  const tilemap = {};

  const keyMap = {
    "ArrowUp": "up", "ArrowDown": "down", "ArrowLeft": "left", "ArrowRight": "right",
    "w": "up", "s": "down", "a": "left", "d": "right", "ㅈ": "up", "ㄴ": "down", "ㅁ": "left", "ㅇ": "right",
    "z": "a", "Z": "a", "x": "b", "X": "b", "ㅋ": "a", "ㅌ": "b",
    "Enter": "start", " ": "a"
  };
  const keys = {};
  const keysPrev = {};

  document.addEventListener("keydown", e => {
    const k = keyMap[e.key];
    if (k) { keys[k] = true; e.preventDefault(); }
  });
  document.addEventListener("keyup", e => {
    const k = keyMap[e.key];
    if (k) { keys[k] = false; e.preventDefault(); }
  });

  let audioCtx = null;
  const channels = [null, null];
  const channelGains = [null, null];
  function ensureAudio() {
    if (!audioCtx) {
      audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      for (let i = 0; i < 2; i++) {
        channelGains[i] = audioCtx.createGain();
        channelGains[i].gain.value = 0.15;
        channelGains[i].connect(audioCtx.destination);
      }
    }
  }

  const NOTE_NAMES = ["C","C#","D","D#","E","F","F#","G","G#","A","A#","B"];
  function noteToFreq(noteStr) {
    const match = noteStr.match(/^([A-G]#?)(\d)$/);
    if (!match) return 440;
    const name = match[1];
    const octave = parseInt(match[2]);
    const semitone = NOTE_NAMES.indexOf(name);
    if (semitone === -1) return 440;
    const midi = (octave + 1) * 12 + semitone;
    return 440 * Math.pow(2, (midi - 69) / 12);
  }

  const FONT_W = 4;
  const FONT_H = 7;
  const FONT = {};
  const fontData = {
    "A":"0110100110011111100110011001","B":"1110100110101110100110011110",
    "C":"0110100110001000100001100110","D":"1100101010011001100110101100",
    "E":"1111100010001110100010001111","F":"1111100010001110100010001000",
    "G":"0111100010001011100101100111","H":"1001100110011111100110011001",
    "I":"1110010001000100010001001110","J":"0111001000100010001010100100",
    "K":"1001101011001100101010011001","L":"1000100010001000100010001111",
    "M":"1001111111011001100110011001","N":"1001110111011001100110011001",
    "O":"0110100110011001100110010110","P":"1110100110011110100010001000",
    "Q":"0110100110011001101101100001","R":"1110100110011110101010011001",
    "S":"0111100010000110000110001110","T":"1111001000100010001000100010",
    "U":"1001100110011001100110010110","V":"1001100110011001100101100110",
    "W":"1001100110011001101111011001","X":"1001100101100110011010011001",
    "Y":"1001100101100010001000100010","Z":"1111000100100100100010001111",
    "0":"0110100111011011101110010110","1":"0100110001000100010001001110",
    "2":"0110100100010010010010001111","3":"1110000100010110000110011110",
    "4":"1001100110011111000100010001","5":"1111100010001110000100011110",
    "6":"0110100010001110100110010110","7":"1111000100010010010001001000",
    "8":"0110100110010110100110010110","9":"0110100110010111000100010110",
    " ":"0000000000000000000000000000",
    ".":"0000000000000000000001000100",
    ",":"0000000000000000001000101000",
    "!":"0100010001000100000000000100",
    "?":"0110100100010010000000000010",
    "-":"0000000000001110000000000000",
    "+":"0000001001001110010000100000",
    ":":"0000010001000000010001000000",
    "/":"0001000100100010010010001000",
    "*":"0000101001001110010010100000",
    "#":"0101111101011111010100000000",
    "(":"0010010010001000010001000010",
    ")":"0100001000010001000100100100",
    "=":"0000000011110000111100000000",
    "'":"0100010010000000000000000000",
    "\"":"1010101000000000000000000000",
    "<":"0010010010001000010000100010",
    ">":"1000010000100001001001001000",
    "_":"0000000000000000000000001111",
  };
  for (const [ch, bits] of Object.entries(fontData)) {
    FONT[ch] = [];
    for (let i = 0; i < bits.length; i++) FONT[ch].push(parseInt(bits[i]));
  }

  const API = {};
  API._init = null;
  API._update = null;
  API._draw = null;
  API.frame = 0;

  API.cls = function(c = 0) { buf32.fill(COLOR_U32[c] || COLOR_U32[0]); };
  API.pix = function(x, y, c) {
    x = Math.floor(x); y = Math.floor(y);
    if (x < 0 || x >= W || y < 0 || y >= H) return;
    buf32[y * W + x] = COLOR_U32[c] || COLOR_U32[0];
  };
  API.line = function(x0, y0, x1, y1, c) {
    x0=Math.floor(x0); y0=Math.floor(y0); x1=Math.floor(x1); y1=Math.floor(y1);
    const dx=Math.abs(x1-x0), dy=Math.abs(y1-y0);
    const sx=x0<x1?1:-1, sy=y0<y1?1:-1;
    let err=dx-dy;
    while(true) {
      API.pix(x0,y0,c);
      if(x0===x1&&y0===y1) break;
      const e2=2*err;
      if(e2>-dy){err-=dy;x0+=sx;}
      if(e2<dx){err+=dx;y0+=sy;}
    }
  };
  API.rect = function(x,y,w,h,c) {
    API.line(x,y,x+w-1,y,c); API.line(x+w-1,y,x+w-1,y+h-1,c);
    API.line(x+w-1,y+h-1,x,y+h-1,c); API.line(x,y+h-1,x,y,c);
  };
  API.rectf = function(x,y,w,h,c) {
    x=Math.floor(x); y=Math.floor(y);
    const col=COLOR_U32[c]||COLOR_U32[0];
    for(let py=Math.max(0,y);py<Math.min(H,y+h);py++)
      for(let px=Math.max(0,x);px<Math.min(W,x+w);px++)
        buf32[py*W+px]=col;
  };
  API.circ = function(cx,cy,r,c) {
    let x=r,y=0,d=1-r; cx=Math.floor(cx); cy=Math.floor(cy);
    while(x>=y){
      API.pix(cx+x,cy+y,c);API.pix(cx-x,cy+y,c);
      API.pix(cx+x,cy-y,c);API.pix(cx-x,cy-y,c);
      API.pix(cx+y,cy+x,c);API.pix(cx-y,cy+x,c);
      API.pix(cx+y,cy-x,c);API.pix(cx-y,cy-x,c);
      y++; if(d<0){d+=2*y+1;}else{x--;d+=2*(y-x)+1;}
    }
  };
  API.circf = function(cx,cy,r,c) {
    cx=Math.floor(cx); cy=Math.floor(cy);
    const col=COLOR_U32[c]||COLOR_U32[0]; const r2=r*r;
    for(let py=-r;py<=r;py++) for(let px=-r;px<=r;px++)
      if(px*px+py*py<=r2){ const sx=cx+px,sy=cy+py;
        if(sx>=0&&sx<W&&sy>=0&&sy<H) buf32[sy*W+sx]=col; }
  };
  API.sprite = function(id, data) {
    const arr = new Uint8Array(64); let i = 0;
    for (const ch of data) { if (ch>='0'&&ch<='3') { arr[i++]=parseInt(ch); if(i>=64) break; } }
    sprites[id] = arr;
  };
  API.spr = function(id, x, y, flipX, flipY) {
    const s=sprites[id]; if(!s) return;
    x=Math.floor(x); y=Math.floor(y);
    for(let py=0;py<8;py++) for(let px=0;px<8;px++){
      const sx=flipX?7-px:px, sy=flipY?7-py:py;
      const c=s[sy*8+sx], dx=x+px, dy=y+py;
      if(dx>=0&&dx<W&&dy>=0&&dy<H) buf32[dy*W+dx]=COLOR_U32[c];
    }
  };
  API.text = function(str, x, y, c) {
    str=String(str).toUpperCase(); let cx=Math.floor(x); const cy=Math.floor(y);
    const col=COLOR_U32[c]||COLOR_U32[3];
    for(const ch of str){
      const glyph=FONT[ch];
      if(glyph) for(let py=0;py<FONT_H;py++) for(let px=0;px<FONT_W;px++)
        if(glyph[py*FONT_W+px]){ const dx=cx+px,dy=cy+py;
          if(dx>=0&&dx<W&&dy>=0&&dy<H) buf32[dy*W+dx]=col; }
      cx+=FONT_W+1;
    }
  };
  API.mget = function(cx,cy) { return tilemap[cx+","+cy]||0; };
  API.mset = function(cx,cy,id) { tilemap[cx+","+cy]=id; };
  API.map = function(mx,my,mw,mh,sx,sy) {
    for(let ty=0;ty<mh;ty++) for(let tx=0;tx<mw;tx++){
      const id=API.mget(mx+tx,my+ty); if(id>0) API.spr(id,sx+tx*8,sy+ty*8); }
  };
  API.btn = function(k) { return !!keys[k]; };
  API.btnp = function(k) { return !!keys[k] && !keysPrev[k]; };
  API.note = function(ch, noteStr, dur) {
    ensureAudio(); if(ch<0||ch>1) return; API.stop(ch);
    const osc=audioCtx.createOscillator(); osc.type="square";
    osc.frequency.value=noteToFreq(noteStr);
    osc.connect(channelGains[ch]); osc.start();
    osc.stop(audioCtx.currentTime+dur); channels[ch]=osc;
  };
  API.stop = function(ch) {
    if(ch===undefined){API.stop(0);API.stop(1);return;}
    if(channels[ch]){try{channels[ch].stop();}catch(e){} channels[ch]=null;}
  };
  API.rnd = function(max) { return Math.random()*max; };
  API.flr = Math.floor;
  API.abs = Math.abs;
  API.min = Math.min;
  API.max = Math.max;
  API.sin = Math.sin;
  API.cos = Math.cos;

  function tick() {
    if (API._update) API._update();
    if (API._draw) API._draw();
    ctx.putImageData(buf, 0, 0);
    for (const k in keys) keysPrev[k] = keys[k];
    API.frame++;
  }

  // ============================================================
  // Circus Charlie Game
  // ============================================================
  const { cls, pix, line, rect, rectf, circ, circf, sprite: defSprite,
          spr, text, btn, btnp, note, stop, rnd, flr, abs: _abs,
          min, max: _max, sin, cos } = API;

  // --- Sprites ---

  // 1: Lion body (running right)
  defSprite(1,
    "00333300" +
    "03333330" +
    "33233230" +
    "33333330" +
    "03333300" +
    "03300330" +
    "03000030" +
    "03000030"
  );
  // 2: Lion body frame 2 (legs moved)
  defSprite(2,
    "00333300" +
    "03333330" +
    "33233230" +
    "33333330" +
    "03333300" +
    "00330330" +
    "00300030" +
    "03000300"
  );
  // 3: Lion mane/head
  defSprite(3,
    "00022200" +
    "00233320" +
    "02333320" +
    "23332320" +
    "23333200" +
    "02333200" +
    "00222000" +
    "00000000"
  );
  // 4: Charlie sitting on lion
  defSprite(4,
    "00333000" +
    "00323000" +
    "00333000" +
    "03333300" +
    "00333000" +
    "00313100" +
    "00300300" +
    "00000000"
  );
  // 5: Charlie jumping
  defSprite(5,

    "00323000" +
    "00333000" +
    "03333300" +
    "00333000" +
    "03030300" +

  );
  // 6: Fire ring (top half)
  defSprite(6,

    "03211230" +
    "32000023" +
    "30000003" +
    "00000000" +
    "00000000" +
    "00000000" +

  );
  // 7: Fire ring (bottom half)
  defSprite(7,

    "00000000" +
    "00000000" +
    "00000000" +
    "30000003" +
    "32000023" +
    "03211230" +
    "00333300"
  );
  // 8: Fire flame
  defSprite(8,

    "00121000" +
    "01232100" +
    "01232100" +
    "12323210" +
    "12332310" +
    "01232100" +

  );
  // 9: Bonus star
  defSprite(9,
    "00030000" +
    "00030000" +
    "03333300" +

    "00333000" +
    "03030300" +

  );
  // 10: Tightrope walker Charlie
  defSprite(10,

    "00323000" +
    "00333000" +

  // 11: Monkey
  defSprite(11,

  defSprite(12,

  defSprite(13,

  defSprite(14,

  defSprite(15,

  defSprite(17,

  defSprite(18,

  // 19: Life icon (small Charlie head)
  defSprite(19,

  // 20: Fire pot/brazier
  defSprite(20,

  // 21: Tent peak (decoration)
  defSprite(21,

  // 22: Ball bonus
  defSprite(22,

  // 23: Ground tile
  defSprite(23,

  );
  // 24: Horse frame 2
  defSprite(24,
    "30000000" +

    "00030030" +
    "00300300"
  );

  // --- Game State ---
  let state = "title";
  let score, lives, stage, loop;
  let scrollX, scrollSpeed, stageLen;
  let playerX, playerY, playerVY, onGround, jumping;
  let obstacles, bonuses, particles;
  let stageTimer, stageComplete, stageClearTimer;
  let invincible, invTimer;
  let animFrame;
  // Stage-specific
  let ropeY; // tightrope
  let trampolines; // trampoline positions
  let horses; // horse positions
  let trapezes; // trapeze data
  let onTrapeze, currentTrapeze, swingAngle, swingDir;

  const GROUND_Y = 195;
  const PLAYER_W = 8;
  const PLAYER_H = 8;

  // Stage names
  const STAGE_NAMES = [
    "FIRE RINGS",
    "TIGHTROPE",
    "TRAMPOLINES",
    "HORSE VAULT",
    "TRAPEZE"
  ];

  function resetGame() {
    score = 0;
    lives = 3;
    stage = 0;
    loop = 0;
    initStage();
  }

  function initStage() {
    scrollX = 0;
    scrollSpeed = 1.2 + loop * 0.3;
    stageComplete = false;
    stageClearTimer = 0;
    obstacles = [];
    bonuses = [];
    particles = [];
    invincible = false;
    invTimer = 0;
    animFrame = 0;
    jumping = false;
    onGround = true;
    playerVY = 0;
    onTrapeze = false;
    currentTrapeze = -1;
    swingAngle = 0;
    swingDir = 1;

    const diff = 1 + loop * 0.3;

    if (stage === 0) {
      // Stage 1: Fire rings - lion ride
      stageLen = 1600 + loop * 267;
      playerX = 40;
      playerY = GROUND_Y - 16;
      // Generate fire rings at intervals
      for (let x = 133; x < stageLen - 67; x += 53 + flr(rnd(40))) {
        obstacles.push({ type: "fire", x: x, y: GROUND_Y - 30 - flr(rnd(12)), w: 8, h: 24 });
      }
      // Bonus items
      for (let x = 200; x < stageLen - 133; x += 100 + flr(rnd(67))) {
        bonuses.push({ type: "star", x: x, y: GROUND_Y - 41 - flr(rnd(15)), alive: true });
      }
    }
    else if (stage === 1) {
      // Stage 2: Tightrope
      stageLen = 1467 + loop * 267;
      ropeY = GROUND_Y - 45;
      playerX = 40;
      playerY = ropeY - 8;
      onGround = true;
      // Monkeys as obstacles
      for (let x = 167; x < stageLen - 67; x += 67 + flr(rnd(53))) {
        const dir = rnd(1) < 0.5 ? -1 : 1;
        obstacles.push({ type: "monkey", x: x, y: ropeY - 8, w: 8, h: 8, dir: dir, startX: x, moveRange: 20 + flr(rnd(20)) });
      }
      for (let x = 233; x < stageLen - 133; x += 120 + flr(rnd(53))) {
        bonuses.push({ type: "ball", x: x, y: ropeY - 18, alive: true });
      }
    }
    else if (stage === 2) {
      // Stage 3: Trampolines
      stageLen = 1733 + loop * 267;
      playerX = 40;
      playerY = GROUND_Y - 16;
      trampolines = [];
      // Trampolines and barrels
      let tx = 120;
      while (tx < stageLen - 67) {
        trampolines.push({ x: tx, y: GROUND_Y - 8 });
        // Barrel after some trampolines
        if (rnd(1) < 0.6) {
          obstacles.push({ type: "barrel", x: tx + 33 + flr(rnd(20)), y: GROUND_Y - 8, w: 8, h: 8 });
        }
        tx += 60 + flr(rnd(33));
      }
      for (let x = 200; x < stageLen - 133; x += 133 + flr(rnd(67))) {
        bonuses.push({ type: "star", x: x, y: GROUND_Y - 53, alive: true });
      }
    }
    else if (stage === 3) {
      // Stage 4: Horse vault
      stageLen = 1600 + loop * 267;
      playerX = 40;
      playerY = GROUND_Y - 16;
      horses = [];
      for (let x = 133; x < stageLen - 67; x += 47 + flr(rnd(27))) {
        horses.push({ x: x, y: GROUND_Y - 16, w: 16, h: 16 });
        obstacles.push({ type: "horse", x: x, y: GROUND_Y - 16, w: 16, h: 16 });
      }
      for (let x = 167; x < stageLen - 133; x += 107 + flr(rnd(53))) {
        bonuses.push({ type: "ball", x: x, y: GROUND_Y - 38, alive: true });
      }
    }
    else if (stage === 4) {
      // Stage 5: Trapeze
      stageLen = 1867 + loop * 267;
      playerX = 27;
      playerY = 75;
      trapezes = [];
      let tx = 40;
      for (let i = 0; i < 20; i++) {
        const ty = 45 + flr(rnd(30));
        trapezes.push({ x: tx, y: ty, angle: rnd(Math.PI * 2), speed: 0.04 + rnd(0.03), ropeLen: 30 + flr(rnd(15)) });
        tx += 67 + flr(rnd(40));
      }
      onTrapeze = true;
      currentTrapeze = 0;
      for (let x = 200; x < stageLen - 133; x += 133 + flr(rnd(67))) {
        bonuses.push({ type: "star", x: x, y: 45 + flr(rnd(30)), alive: true });
      }
    }

    stageTimer = 90; // show stage name
  }

  function addParticle(x, y, count, color) {
    for (let i = 0; i < count; i++) {
      particles.push({
        x: x, y: y,
        vx: rnd(4) - 2, vy: rnd(3) - 2,
        life: 8 + flr(rnd(12)),
        color: color || (flr(rnd(3)) + 1)
      });
    }
  }

  function jumpSound() { note(0, "E5", 0.06); setTimeout(() => note(0, "G5", 0.04), 50); }
  function bonusSound() { note(0, "C6", 0.05); setTimeout(() => note(0, "E6", 0.05), 50); setTimeout(() => note(0, "G6", 0.06), 100); }
  function hitSound() { note(0, "C3", 0.12); note(1, "G2", 0.12); setTimeout(() => { note(0, "A2", 0.18); }, 120); }
  function clearSound() {
    note(0, "C5", 0.1); setTimeout(() => note(0, "E5", 0.1), 100);
    setTimeout(() => note(0, "G5", 0.1), 200); setTimeout(() => note(0, "C6", 0.15), 300);
  }
  function marchSound() {
    const notes = ["C4","E4","G4","C5"];
    const n = notes[flr(API.frame / 8) % notes.length];
    if (API.frame % 8 === 0) note(1, n, 0.06);
  }

  function playerHit() {
    if (invincible) return;
    lives--;
    hitSound();
    addParticle(playerX, playerY, 12, 3);
    if (lives <= 0) {
      state = "gameover";
    } else {
      invincible = true;
      invTimer = 60;
      playerX = 40 + scrollX;
      if (stage === 1) { playerY = ropeY - 8; }
      else if (stage === 4) { onTrapeze = true; currentTrapeze = _max(0, currentTrapeze - 1); }
      else { playerY = GROUND_Y - 16; jumping = false; playerVY = 0; onGround = true; }
    }
  }

  function boxOverlap(ax, ay, aw, ah, bx, by, bw, bh) {
    return ax < bx + bw && ax + aw > bx && ay < by + bh && ay + ah > by;
  }

  resetGame();

  // ============================================================
  // Update
  // ============================================================
  API._update = function() {
    animFrame++;

    if (state === "title") {
      if (btnp("a") || btnp("start")) {
        state = "play";
        resetGame();
        note(0, "C5", 0.1);
        setTimeout(() => note(0, "E5", 0.1), 100);
        setTimeout(() => note(0, "G5", 0.15), 200);
      }
      return;
    }

    if (state === "gameover") {
      for (let i = particles.length - 1; i >= 0; i--) {
        const p = particles[i]; p.x += p.vx; p.y += p.vy; p.vy += 0.08; p.life--;
        if (p.life <= 0) particles.splice(i, 1);
      }
      if (btnp("a") || btnp("start")) state = "title";
      return;
    }

    // Stage clear
    if (stageComplete) {
      stageClearTimer++;
      if (stageClearTimer > 90) {
        stage++;
        if (stage >= 5) { stage = 0; loop++; }
        initStage();
      }
      return;
    }

    // Stage timer
    if (stageTimer > 0) { stageTimer--; return; }

    // Invincibility
    if (invincible) { invTimer--; if (invTimer <= 0) invincible = false; }

    // March music
    marchSound();

    // Auto-scroll
    scrollX += scrollSpeed;

    // Check stage completion
    if (scrollX >= stageLen) {
      stageComplete = true;
      stageClearTimer = 0;
      clearSound();
      score += 1000;
      return;
    }

    // --- Stage-specific update ---
    if (stage === 0) updateFireRings();
    else if (stage === 1) updateTightrope();
    else if (stage === 2) updateTrampolines();
    else if (stage === 3) updateHorseVault();
    else if (stage === 4) updateTrapeze();

    // Update particles
    for (let i = particles.length - 1; i >= 0; i--) {
      const p = particles[i]; p.x += p.vx; p.y += p.vy; p.vy += 0.06; p.life--;
      if (p.life <= 0) particles.splice(i, 1);
    }

    // Bonus collection
    for (let i = bonuses.length - 1; i >= 0; i--) {
      const b = bonuses[i];
      if (!b.alive) continue;
      const bsx = b.x - scrollX;
      if (boxOverlap(playerX - scrollX, playerY, PLAYER_W, PLAYER_H, bsx, b.y, 8, 8)) {
        b.alive = false;
        score += 200;
        bonusSound();
        addParticle(bsx + 4, b.y + 4, 6, 3);
      }
    }
  };

  // --- Stage 1: Fire Rings ---
  function updateFireRings() {
    const screenPX = playerX - scrollX;

    // Player auto-runs with lion, can move slightly
    playerX = scrollX + 40;
    if (btn("right")) playerX = scrollX + 53;
    if (btn("left")) playerX = scrollX + 27;

    // Jump
    if (btnp("a") && onGround) {
      playerVY = -6.5;
      onGround = false;
      jumping = true;
      jumpSound();
    }

    if (!onGround) {
      playerVY += 0.32;
      playerY += playerVY;
      if (playerY >= GROUND_Y - 16) {
        playerY = GROUND_Y - 16;
        playerVY = 0;
        onGround = true;
        jumping = false;
      }
    }

    // Collision with fire rings
    const px = playerX;
    const py = playerY;
    for (const obs of obstacles) {
      const ox = obs.x;
      // Only check nearby
      if (_abs(ox - px) > 20) continue;
      // Fire ring: you need to jump THROUGH the ring (pass through center OK, hit edges = damage)
      const ringCenterY = obs.y + 9;
      const relX = px - ox;
      if (relX > -4 && relX < 12) {
        // Inside ring horizontal zone
        if (py > obs.y - 2 && py < obs.y + 5) {
          // Hit top of ring
          playerHit(); break;
        }
        if (py + 8 > obs.y + 18 && py + 8 < obs.y + 26) {
          // Hit bottom of ring
          playerHit(); break;
        }
      }
    }
  }

  // --- Stage 2: Tightrope ---
  function updateTightrope() {
    playerX = scrollX + 40;
    if (btn("right")) playerX = scrollX + 53;
    if (btn("left")) playerX = scrollX + 27;

    // Jump
    if (btnp("a") && onGround) {
      playerVY = -5;
      onGround = false;
      jumping = true;
      jumpSound();
    }

    if (!onGround) {
      playerVY += 0.3;
      playerY += playerVY;
      if (playerY >= ropeY - 8) {
        playerY = ropeY - 8;
        playerVY = 0;
        onGround = true;
        jumping = false;
      }
    }

    // Fall off rope check (player always on rope when grounded)
    if (onGround) playerY = ropeY - 8;

    // Monkey obstacles move
    for (const obs of obstacles) {
      if (obs.type === "monkey") {
        obs.x += obs.dir * (0.5 + loop * 0.2);
        if (obs.x > obs.startX + obs.moveRange) obs.dir = -1;
        if (obs.x < obs.startX - obs.moveRange) obs.dir = 1;
      }
    }

    // Collision with monkeys
    for (const obs of obstacles) {
      const ox = obs.x;
      if (boxOverlap(playerX, playerY, PLAYER_W, PLAYER_H, ox, obs.y, obs.w, obs.h)) {
        // If jumping and above monkey, bounce off
        if (jumping && playerVY > 0 && playerY + 6 < obs.y + 4) {
          playerVY = -4;
          score += 100;
          addParticle(ox + 4, obs.y, 4, 2);
          note(0, "A5", 0.04);
        } else {
          playerHit(); break;
        }
      }
    }
  }

  // --- Stage 3: Trampolines ---
  function updateTrampolines() {
    playerX = scrollX + 40;
    if (btn("right")) playerX = scrollX + 53;
    if (btn("left")) playerX = scrollX + 27;

    // Jump / auto-bounce on trampolines
    if (btnp("a") && onGround) {
      playerVY = -7;
      onGround = false;
      jumping = true;
      jumpSound();
    }

    if (!onGround) {
      playerVY += 0.28;
      playerY += playerVY;

      // Check trampoline landing
      for (const t of trampolines) {
        const tx = t.x - scrollX;
        if (playerVY > 0 && _abs((playerX - scrollX) - tx) < 12 && playerY + 8 > t.y && playerY + 8 < t.y + 8) {
          playerVY = btn("a") ? -8.5 : -6;
          playerY = t.y - 8;
          jumpSound();
          addParticle(tx + 4, t.y, 3, 2);
          break;
        }
      }

      if (playerY >= GROUND_Y - 16) {
        playerY = GROUND_Y - 16;
        playerVY = 0;
        onGround = true;
        jumping = false;
      }
    } else {
      // Auto-bounce when walking onto a trampoline
      for (const t of trampolines) {
        const tx = t.x - scrollX;
        if (_abs((playerX - scrollX) - tx) < 10 && _abs(playerY - (t.y - 8)) < 4) {
          playerVY = -6;
          onGround = false;
          jumping = true;
          jumpSound();
          break;
        }
      }
    }

    // Barrel collision
    for (const obs of obstacles) {
      const ox = obs.x - scrollX;
      if (boxOverlap(playerX - scrollX, playerY, PLAYER_W, PLAYER_H, ox, obs.y, obs.w, obs.h)) {
        if (jumping && playerVY > 0 && playerY + 4 < obs.y) {
          playerVY = -5;
          score += 100;
          addParticle(ox + 4, obs.y, 4, 2);
        } else {
          playerHit(); break;
        }
      }
    }
  }

  // --- Stage 4: Horse Vault ---
  function updateHorseVault() {
    playerX = scrollX + 40;
    if (btn("right")) playerX = scrollX + 53;
    if (btn("left")) playerX = scrollX + 27;

    if (btnp("a") && onGround) {
      playerVY = -7.5;
      onGround = false;
      jumping = true;
      jumpSound();
    }

    if (!onGround) {
      playerVY += 0.3;
      playerY += playerVY;
      if (playerY >= GROUND_Y - 16) {
        playerY = GROUND_Y - 16;
        playerVY = 0;
        onGround = true;
        jumping = false;
      }
    }

    // Horse collision - jump over or land on top
    for (const obs of obstacles) {
      const ox = obs.x;
      const relX = playerX - ox;
      if (_abs(relX) > 24) continue;
      if (boxOverlap(playerX, playerY, PLAYER_W, PLAYER_H, ox, obs.y, obs.w, obs.h)) {
        if (jumping && playerVY > 0 && playerY + 6 < obs.y + 4) {
          // Land on horse top -> bounce
          playerVY = -6;
          score += 150;
          addParticle(ox + 8, obs.y, 4, 2);
          note(0, "G5", 0.04);
        } else if (!jumping || playerVY < 0) {
          // Side collision
          playerHit(); break;
        } else {
          playerHit(); break;
        }
      }
    }
  }

  // --- Stage 5: Trapeze ---
  function updateTrapeze() {
    // Update all trapeze swinging
    for (const t of trapezes) {
      t.angle += t.speed;
    }

    if (onTrapeze && currentTrapeze >= 0 && currentTrapeze < trapezes.length) {
      const t = trapezes[currentTrapeze];
      const bx = t.x + sin(t.angle) * 20;
      const by = t.y + t.ropeLen + cos(t.angle) * 8;
      playerX = bx;
      playerY = by;

      // Jump to next trapeze
      if (btnp("a")) {
        onTrapeze = false;
        playerVY = -4 + sin(t.angle) * 2;
        const vx = cos(t.angle) * 4;
        playerX = bx;
        jumping = true;
        jumpSound();
      }

      // Auto-scroll follows player
      scrollX = _max(0, t.x - 80);
    } else {
      // Flying through air
      playerVY += 0.22;
      playerX += 2.5;
      playerY += playerVY;

      scrollX = _max(0, playerX - 80);

      // Check if can grab a trapeze
      for (let i = 0; i < trapezes.length; i++) {
        if (i === currentTrapeze) continue;
        const t = trapezes[i];
        const bx = t.x + sin(t.angle) * 20;
        const by = t.y + t.ropeLen + cos(t.angle) * 8;
        if (_abs(playerX - bx) < 14 && _abs(playerY - by) < 14) {
          onTrapeze = true;
          currentTrapeze = i;
          score += 100;
          note(0, "C5", 0.05);
          addParticle(bx, by, 4, 3);
          break;
        }
      }

      // Fall to death
      if (playerY > GROUND_Y + 15) {
        playerHit();
      }
    }

    // Check stage completion by trapeze index
    if (scrollX >= stageLen - W) {
      scrollX = stageLen;
    }
  }

  // ============================================================
  // Draw
  // ============================================================
  API._draw = function() {
    cls(0);

    if (state === "title") {
      drawTitle();
      return;
    }

    if (state === "gameover") {
      drawGameOver();
      return;
    }

    // --- Play state ---
    const camX = flr(scrollX);

    // Draw background
    drawBackground(camX);

    // Stage-specific drawing
    if (stage === 0) drawFireRingStage(camX);
    else if (stage === 1) drawTightropeStage(camX);
    else if (stage === 2) drawTrampolineStage(camX);
    else if (stage === 3) drawHorseVaultStage(camX);
    else if (stage === 4) drawTrapezeStage(camX);

    // Draw bonuses
    for (const b of bonuses) {
      if (!b.alive) continue;
      const sx = b.x - camX;
      if (sx < -10 || sx > W + 10) continue;
      const bobY = b.y + sin(animFrame * 0.1) * 3;
      if (b.type === "star") spr(9, flr(sx), flr(bobY));
      else if (b.type === "ball") spr(22, flr(sx), flr(bobY));
    }

    // Draw player
    if (!invincible || flr(animFrame / 3) % 2 === 0) {
      drawPlayer(camX);
    }

    // Draw particles
    for (const p of particles) pix(flr(p.x), flr(p.y), p.color);

    // HUD
    drawHUD();

    // Stage announcement
    if (stageTimer > 0) {
      rectf(67, 98, 187, 45, 0);
      rect(69, 100, 183, 42, 2);
      text("STAGE " + (stage + 1), 128, 109, 3);
      text(STAGE_NAMES[stage], 133 - STAGE_NAMES[stage].length * 2.5, 120, 2);
      if (loop > 0) text("LOOP " + (loop + 1), 140, 131, 1);
    }

    // Stage clear
    if (stageComplete) {
      const flash = flr(stageClearTimer / 4) % 2;
      rectf(93, 98, 133, 38, 0);
      rect(95, 100, 129, 34, flash ? 3 : 2);
      text("STAGE CLEAR!", 130, 107, 3);
      text("BONUS: 1000", 133, 119, 2);
    }

    // Progress bar
    const progress = min(1, scrollX / stageLen);
    rectf(67, H - 8, 187, 4, 0);
    rect(67, H - 8, 187, 4, 1);
    rectf(68, H - 7, flr(185 * progress), 2, 2);
  };

  function drawBackground(camX) {
    // Circus tent stripes at top
    for (let x = 0; x < W; x += 16) {
      const stripe = (flr((x + camX * 0.1) / 16)) % 2;
      rectf(x, 0, 16, 15, stripe ? 0 : 1);
    }
    // Tent edge
    line(0, 15, W, 15, 2);
    line(0, 16, W, 16, 1);

    // Stars in the circus ceiling
    for (let i = 0; i < 15; i++) {
      const sx = ((i * 73 + camX * 0.05) % W);
      const sy = 4 + (i * 37) % 10;
      pix(flr(sx), sy, (i + flr(animFrame / 10)) % 2 ? 2 : 1);
    }

    // Ground
    if (stage !== 4) { // No ground for trapeze
      for (let x = 0; x < W; x += 8) {
        spr(23, x, GROUND_Y);
        spr(23, x, GROUND_Y + 8);
      }
    }
  }

  function drawFireRingStage(camX) {
    // Draw fire pots and fire rings
    for (const obs of obstacles) {
      const sx = obs.x - camX;
      if (sx < -16 || sx > W + 16) continue;

      // Fire pot below ring
      spr(20, flr(sx), flr(obs.y + 21));

      // Fire ring
      spr(6, flr(sx), flr(obs.y));
      spr(7, flr(sx), flr(obs.y + 18));

      // Animated flames
      const flameOff = sin(animFrame * 0.3 + obs.x) * 2;
      spr(8, flr(sx - 4), flr(obs.y + 6 + flameOff));
      spr(8, flr(sx + 4), flr(obs.y + 8 - flameOff));

      // Flickering fire particles
      if (animFrame % 4 === 0) {
        pix(flr(sx + rnd(8)), flr(obs.y + rnd(23)), flr(rnd(2)) + 2);
      }
    }

    // Draw lion
    const lionX = playerX - camX - 8;
    const lionY = GROUND_Y - 16;
    const lionSpr = flr(animFrame / 4) % 2 === 0 ? 1 : 2;
    spr(3, flr(lionX + 8), flr(lionY - 2)); // mane/head in front
    spr(lionSpr, flr(lionX), flr(lionY));     // body
  }

  function drawTightropeStage(camX) {
    // Draw rope
    line(0, ropeY, W, ropeY, 2);
    line(0, ropeY + 1, W, ropeY + 1, 1);

    // Rope supports
    for (let x = 0; x < W + 40; x += 133) {
      const sx = x - (camX % 133);
      rectf(flr(sx), ropeY, 3, GROUND_Y - ropeY, 1);
      rectf(flr(sx) - 2, ropeY - 4, 7, 5, 2);
    }

    // Draw monkeys
    for (const obs of obstacles) {
      if (obs.type !== "monkey") continue;
      const sx = obs.x - camX;
      if (sx < -10 || sx > W + 10) continue;
      const monkSpr = flr(animFrame / 6) % 2 === 0 ? 11 : 12;
      spr(monkSpr, flr(sx), flr(obs.y), obs.dir < 0);
    }
  }

  function drawTrampolineStage(camX) {
    // Draw trampolines
    for (const t of trampolines) {
      const sx = t.x - camX;
      if (sx < -10 || sx > W + 10) continue;
      spr(13, flr(sx), flr(t.y));
    }

    // Draw barrels
    for (const obs of obstacles) {
      const sx = obs.x - camX;
      if (sx < -10 || sx > W + 10) continue;
      spr(14, flr(sx), flr(obs.y));
    }
  }

  function drawHorseVaultStage(camX) {
    // Draw horses
    for (const obs of obstacles) {
      const sx = obs.x - camX;
      if (sx < -16 || sx > W + 16) continue;
      const horseSpr = flr(animFrame / 6) % 2 === 0 ? 15 : 24;
      spr(16, flr(sx + 8), flr(obs.y - 8)); // head
      spr(horseSpr, flr(sx), flr(obs.y));     // body
    }
  }

  function drawTrapezeStage(camX) {
    // Draw safety net
    for (let y = GROUND_Y; y < GROUND_Y + 15; y += 4) {
      for (let x = 0; x < W; x += 6) {
        pix(x, y, 1);
      }
    }
    line(0, GROUND_Y - 2, W, GROUND_Y - 2, 1);

    // Draw trapeze ropes and bars
    for (let i = 0; i < trapezes.length; i++) {
      const t = trapezes[i];
      const sx = t.x - camX;
      if (sx < -60 || sx > W + 60) continue;

      const bx = sx + sin(t.angle) * 20;
      const by = t.y + t.ropeLen + cos(t.angle) * 8;

      // Ropes
      line(flr(sx), flr(t.y), flr(bx - 3), flr(by), 2);
      line(flr(sx), flr(t.y), flr(bx + 3), flr(by), 2);

      // Bar
      rectf(flr(bx - 4), flr(by), 8, 2, 3);

      // Ceiling anchor
      rectf(flr(sx - 1), flr(t.y - 2), 3, 4, 2);
    }
  }

  function drawPlayer(camX) {
    const px = flr(playerX - camX);
    const py = flr(playerY);

    if (stage === 0) {
      // Charlie on lion
      if (jumping) {
        spr(5, px, py); // jumping pose
      } else {
        spr(4, px, py - 2); // sitting on lion
      }
    } else if (stage === 1) {
      // Tightrope walker
      if (jumping) spr(5, px, py);
      else spr(10, px, py);
    } else if (stage === 2) {
      // Trampoline
      if (!onGround) spr(5, px, py);
      else spr(4, px, py);
    } else if (stage === 3) {
      // Horse vault
      if (jumping) spr(5, px, py);
      else spr(4, px, py);
    } else if (stage === 4) {
      // Trapeze
      if (onTrapeze) spr(18, px, py);
      else spr(5, px, py);
    }
  }

  function drawHUD() {
    rectf(0, 17, W, 14, 0);
    text("SCORE:" + score, 3, 19, 3);
    text("STAGE " + (stage + 1), W / 2 - 20, 19, 2);
    for (let i = 0; i < lives; i++) spr(19, W - 40 + i * 10, 18);
    if (loop > 0) text("*" + (loop + 1), W / 2 + 30, 19, 1);
  }

  function drawTitle() {
    // Animated tent background
    for (let x = 0; x < W; x += 16) {
      const stripe = flr((x + animFrame * 0.3) / 16) % 2;
      rectf(x, 0, 16, H, stripe ? 0 : 1);
    }

    // Spotlight effect
    circf(W / 2, H / 2, 97, 0);
    circ(W / 2, H / 2, 97, 1);
    circ(W / 2, H / 2, 98, 1);

    // Title
    const ty = 45 + sin(animFrame * 0.05) * 4;
    text("CIRCUS CHARLIE", 125, flr(ty), 3);
    text("CIRCUS CHARLIE", 126, flr(ty) + 1, 1);
    rectf(113, flr(ty) + 12, 107, 1, 2);

    // Show characters
    const bx = W / 2 - 33;
    const bounce = sin(animFrame * 0.08) * 3;

    // Lion with Charlie
    spr(3, flr(bx), flr(ty + 23 + bounce));
    spr(1, flr(bx - 5), flr(ty + 24 + bounce));
    spr(4, flr(bx - 3), flr(ty + 18 + bounce));

    // Fire ring
    spr(6, flr(bx + 20), flr(ty + 19));
    spr(7, flr(bx + 20), flr(ty + 37));
    spr(8, flr(bx + 16), flr(ty + 26 + sin(animFrame * 0.2) * 2));

    // Monkey
    const monkSpr = flr(animFrame / 8) % 2 === 0 ? 11 : 12;
    spr(monkSpr, flr(bx + 37), flr(ty + 23 + sin(animFrame * 0.1 + 1) * 3));

    // Horse
    spr(16, flr(bx + 52), flr(ty + 17 + bounce));
    spr(15, flr(bx + 47), flr(ty + 23 + bounce));

    // Star bonus
    spr(9, flr(bx + 67), flr(ty + 21 + sin(animFrame * 0.12 + 2) * 4));

    if (flr(animFrame / 20) % 2 === 0) text("PRESS A TO START", 120, 143, 3);

    // Stage list
    text("-STAGES-", 140, 161, 2);
    text("1. FIRE RINGS", 123, 171, 2);
    text("2. TIGHTROPE", 123, 179, 2);
    text("3. TRAMPOLINES", 123, 187, 2);
    text("4. HORSE VAULT", 123, 195, 2);
    text("5. TRAPEZE", 123, 203, 2);

    text("GRAYBOX DEMO V0.1", 117, 229, 1);
  }

  function drawGameOver() {
    // Dark background
    cls(0);

    // Spotlight
    circf(W / 2, 120, 60, 0);
    circ(W / 2, 120, 60, 1);

    for (const p of particles) pix(flr(p.x), flr(p.y), p.color);

    text("GAME OVER", 138, 83, 3);
    text("SCORE: " + score, 130, 105, 2);
    text("STAGE: " + (stage + 1), 130, 116, 2);
    if (loop > 0) text("LOOP: " + (loop + 1), 130, 128, 2);
    if (flr(animFrame / 20) % 2 === 0) text("PRESS A TO CONTINUE", 110, 158, 3);
  }

  // ============================================================
  // Boot
  // ============================================================
  if (API._init) API._init();
  setInterval(tick, 1000 / FPS);
  document.addEventListener("keydown", ensureAudio, { once: true });
  document.addEventListener("click", ensureAudio, { once: true });
})();
</script>
</body>
</html>
