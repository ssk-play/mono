<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Resolution Comparison — 16 Grayscale</title>
<style>
  body { background: #111; color: #ccc; font-family: monospace; margin: 20px; }
  h1 { color: #fff; font-size: 16px; margin-bottom: 24px; }
  .row { display: flex; flex-wrap: wrap; gap: 24px; margin-bottom: 40px; }
  .col { display: flex; flex-direction: column; align-items: center; }
  .label { font-size: 12px; margin-bottom: 4px; color: #888; }
  .label b { color: #fff; }
  .sub { font-size: 10px; color: #555; margin-top: 2px; }
  canvas { image-rendering: pixelated; border: 1px solid #333; }
  .section { margin-bottom: 32px; }
  .section-title { color: #fff; font-size: 13px; border-bottom: 1px solid #333; padding-bottom: 4px; margin-bottom: 12px; }
</style>
</head>
<body>
<h1>Resolution Comparison — 16 Grayscale, all displayed at same physical size</h1>
<div id="app"></div>
<script>
const DISPLAY_W = 512, DISPLAY_H = 384; // fixed display size for fair comparison
const PAL = [];
for (let i = 0; i < 16; i++) PAL.push(Math.round((i / 15) * 255));

const RESOLUTIONS = [
  { w: 128, h: 128, name: '128×128', note: 'PICO-8' },
  { w: 160, h: 144, name: '160×144', note: 'Game Boy' },
  { w: 128, h: 96,  name: '128×96',  note: '4:3 micro' },
  { w: 160, h: 120, name: '160×120', note: '4:3 tiny' },
  { w: 192, h: 144, name: '192×144', note: '4:3 small' },
  { w: 256, h: 192, name: '256×192', note: '4:3 medium' },
  { w: 256, h: 240, name: '256×240', note: 'NES-ish' },
  { w: 256, h: 256, name: '256×256', note: '1:1 square' },
  { w: 320, h: 240, name: '320×240', note: 'Current Mono' },
];

function q(v) {
  const idx = Math.round(v * 15);
  const c = PAL[Math.max(0, Math.min(15, idx))];
  return `rgb(${c},${c},${c})`;
}

function mkrng(s) { return () => { s = (s * 16807 + 0) % 2147483647; return s / 2147483647; }; }

function rect(ctx, x, y, w, h, v) { ctx.fillStyle = q(v); ctx.fillRect(x, y, w, h); }
function px(ctx, x, y, v) { ctx.fillStyle = q(v); ctx.fillRect(x, y, 1, 1); }
function circ(ctx, cx, cy, r, v) { ctx.fillStyle = q(v); ctx.beginPath(); ctx.arc(cx, cy, r, 0, Math.PI*2); ctx.fill(); }
function txt(ctx, s, x, y, v) { ctx.fillStyle = q(v); ctx.font = '8px monospace'; ctx.fillText(s, x, y+7); }

// ── RPG SCENE (scales with resolution) ──
function drawRPG(ctx, W, H) {
  const rng = mkrng(77);
  const ts = Math.max(8, Math.round(W / 20)); // tile size scales

  // grass
  const cols = Math.ceil(W / ts), rows = Math.ceil(H / ts);
  for (let ty = 0; ty < rows; ty++) {
    for (let tx = 0; tx < cols; tx++) {
      const base = 0.18 + rng() * 0.06;
      rect(ctx, tx*ts, ty*ts, ts, ts, base);
      for (let i = 0; i < 3; i++) {
        px(ctx, tx*ts + Math.floor(rng()*(ts-2))+1, ty*ts + Math.floor(rng()*(ts-2))+1, base + 0.05);
      }
    }
  }

  // path
  const pathCol = Math.floor(cols / 2);
  for (let ty = 0; ty < rows; ty++) {
    for (let dx = -1; dx <= 1; dx++) {
      const pc = pathCol + dx + Math.floor(Math.sin(ty * 0.5) * 1.2);
      if (pc >= 0 && pc < cols) rect(ctx, pc*ts, ty*ts, ts, ts, 0.3 + rng()*0.04);
    }
  }

  // trees
  const treePositions = [[1,1],[3,4],[1,7],[cols-3,2],[cols-2,5],[cols-3,8],[2,rows-3],[cols-2,0]];
  treePositions.forEach(([tx,ty]) => {
    if (tx >= cols || ty >= rows) return;
    const r = Math.max(3, ts/2 - 1);
    rect(ctx, tx*ts+ts/2-1, ty*ts+ts*0.6, 2, ts*0.4, 0.15);
    for (let i = r; i > 0; i--) {
      circ(ctx, tx*ts+ts/2, ty*ts+ts*0.4, i, 0.12 + (r-i)/r*0.18);
    }
  });

  // house
  const hx = Math.floor(cols*0.25)*ts, hy = Math.floor(rows*0.3)*ts;
  const hw = ts*3, hh = ts*2;
  rect(ctx, hx, hy, hw, hh, 0.35);
  rect(ctx, hx, hy, hw, ts*0.3, 0.22); // roof
  for (let i = 0; i < hw/2; i++) {
    rect(ctx, hx+i, hy-i*0.4, hw-i*2, 1, 0.22 + i*0.003);
  }
  rect(ctx, hx+hw*0.4, hy+hh*0.4, hw*0.2, hh*0.6, 0.12); // door
  rect(ctx, hx+hw*0.1, hy+hh*0.35, ts*0.5, ts*0.5, 0.5); // window
  rect(ctx, hx+hw*0.7, hy+hh*0.35, ts*0.5, ts*0.5, 0.5);

  // hero
  const heroX = pathCol*ts + ts/4, heroY = Math.floor(rows*0.5)*ts;
  const hs = Math.max(4, ts*0.5);
  circ(ctx, heroX+hs/2, heroY+hs*0.3, hs*0.4, 0.7);
  rect(ctx, heroX, heroY+hs*0.6, hs, hs*0.5, 0.5);
  rect(ctx, heroX, heroY+hs*1.1, hs*0.4, hs*0.3, 0.3);
  rect(ctx, heroX+hs*0.6, heroY+hs*1.1, hs*0.4, hs*0.3, 0.3);
  // sword
  rect(ctx, heroX+hs+1, heroY+hs*0.2, 1, hs*0.7, 0.9);

  // NPC
  const npx = (pathCol-1)*ts + ts/4, npy = Math.floor(rows*0.35)*ts + ts/2;
  circ(ctx, npx+hs/2, npy+hs*0.3, hs*0.35, 0.6);
  rect(ctx, npx+1, npy+hs*0.5, hs-1, hs*0.4, 0.45);

  // dialog
  const dh = Math.max(24, H*0.18);
  rect(ctx, 4, H-dh-4, W-8, dh, 0.05);
  rect(ctx, 5, H-dh-3, W-10, dh-2, 0.1);
  if (W >= 160) {
    txt(ctx, 'The ancient sword lies', 10, H-dh, 0.9);
    txt(ctx, 'in the shadow cave...', 10, H-dh+12, 0.9);
  } else {
    txt(ctx, 'The sword lies', 8, H-dh, 0.9);
    txt(ctx, 'in the cave...', 8, H-dh+10, 0.9);
  }

  // minimap
  const ms = Math.max(20, Math.round(W*0.15));
  rect(ctx, W-ms-4, 4, ms, ms, 0.05);
  rect(ctx, W-ms-3, 5, ms-2, ms-2, 0.12);
  circ(ctx, W-ms/2-3, ms/2+4, 2, 0.9);
}

// ── ACTION SCENE ──
function drawAction(ctx, W, H) {
  const rng = mkrng(33);

  // sky
  for (let y = 0; y < H*0.5; y++) {
    rect(ctx, 0, y, W, 1, 0.3 + y/(H*0.5)*0.15);
  }

  // clouds
  const ccount = Math.max(2, Math.floor(W/100));
  for (let i = 0; i < ccount; i++) {
    const cx = W/(ccount+1) * (i+1), cy = H*0.1 + rng()*H*0.1;
    for (let j = 0; j < 3; j++) {
      circ(ctx, cx + j*W*0.03, cy + Math.sin(j)*2, W*0.025, 0.52 + j*0.03);
    }
  }

  // buildings
  const bcount = Math.max(4, Math.floor(W/25));
  for (let i = 0; i < bcount; i++) {
    const bx = i * (W/bcount);
    const bh = H*0.15 + rng()*H*0.25;
    const bw = W/bcount - 2;
    rect(ctx, bx, H*0.5-bh, bw, bh, 0.12+rng()*0.08);
    // windows
    const wsize = Math.max(2, Math.floor(bw/5));
    for (let wy = H*0.5-bh+3; wy < H*0.48; wy += wsize*2) {
      for (let wx = bx+2; wx < bx+bw-2; wx += wsize*2) {
        rect(ctx, wx, wy, wsize, wsize*1.3, rng()>0.3 ? 0.4 : 0.08);
      }
    }
  }

  // ground
  rect(ctx, 0, H*0.85, W, H*0.15, 0.15);
  rect(ctx, 0, H*0.85, W, 2, 0.25);

  // platforms
  const plats = [
    [0, 0.83, 0.25], [0.32, 0.75, 0.18], [0.55, 0.68, 0.16],
    [0.2, 0.6, 0.12], [0.78, 0.73, 0.2], [0.42, 0.55, 0.14],
  ];
  plats.forEach(([px2, py, pw]) => {
    const x = px2*W, y = py*H, w = pw*W;
    rect(ctx, x, y, w, Math.max(4, H*0.03), 0.25);
    rect(ctx, x, y, w, 2, 0.35);
  });

  // hero
  const hx = W*0.4, hy = H*0.55 - 14;
  const s = Math.max(4, Math.round(W*0.025));
  circ(ctx, hx+s/2, hy, s*0.8, 0.75);
  rect(ctx, hx-s*0.1, hy+s*0.8, s*1.2, s, 0.55);
  rect(ctx, hx, hy+s*1.8, s*0.4, s*0.6, 0.4);
  rect(ctx, hx+s*0.6, hy+s*1.8, s*0.4, s*0.5, 0.4);
  // cape
  for (let i = 0; i < 4; i++) {
    rect(ctx, hx-2-i, hy+s*0.5+i*2, 2, 2, 0.35-i*0.03);
  }

  // enemy
  const ex = W*0.8, ey = H*0.73 - 10;
  rect(ctx, ex, ey, s*1.5, s*1.8, 0.3);
  rect(ctx, ex+1, ey+1, s*0.5, s*0.5, 0.8);
  rect(ctx, ex+s, ey+1, s*0.5, s*0.5, 0.8);

  // coins
  for (let i = 0; i < 4; i++) {
    circ(ctx, W*0.32 + i*W*0.04, H*0.73, 3, 0.7);
    circ(ctx, W*0.32 + i*W*0.04, H*0.73, 1.5, 0.9);
  }

  // HUD
  rect(ctx, 0, 0, W, Math.max(10, H*0.06), 0.03);
  txt(ctx, 'STAGE 3-2', 4, 1, 1);
  // health bar
  const bw2 = Math.max(20, W*0.15);
  rect(ctx, W*0.35, 2, bw2, 6, 0.15);
  rect(ctx, W*0.35+1, 3, bw2*0.7, 4, 0.6);
  if (W >= 160) txt(ctx, 'TIME 184', W-65, 1, 0.8);
}

// ── ADVENTURE SCENE ──
function drawAdventure(ctx, W, H) {
  const rng = mkrng(99);

  // sky gradient
  for (let y = 0; y < H*0.45; y++) {
    rect(ctx, 0, y, W, 1, 0.35 + (y/(H*0.45))*0.2);
  }

  // moon
  const mr = Math.max(6, W*0.06);
  circ(ctx, W*0.8, H*0.15, mr, 0.85);
  circ(ctx, W*0.8+mr*0.25, H*0.15-mr*0.15, mr*0.75, 0.38);

  // mountains
  for (let x = 0; x < W; x++) {
    const h1 = Math.sin(x*0.02)*H*0.1 + Math.sin(x*0.05)*H*0.04 + H*0.25;
    for (let y = Math.floor(H*0.45-h1); y < H*0.45; y++) {
      if (y >= 0) px(ctx, x, y, 0.15 + (y-(H*0.45-h1))/h1*0.08);
    }
    const h2 = Math.sin(x*0.025+1)*H*0.08 + Math.sin(x*0.06+2)*H*0.03 + H*0.2;
    for (let y = Math.floor(H*0.45-h2*0.6); y < H*0.45; y++) {
      if (y >= 0) px(ctx, x, y, 0.2 + (y-(H*0.45-h2*0.6))/(h2*0.6)*0.06);
    }
  }

  // castle
  const cw = W*0.22, cx = W*0.35;
  const cy = H*0.45;
  rect(ctx, cx, cy-H*0.2, cw*0.12, H*0.2, 0.12);
  rect(ctx, cx+cw*0.88, cy-H*0.2, cw*0.12, H*0.2, 0.12);
  rect(ctx, cx+cw*0.12, cy-H*0.14, cw*0.76, H*0.14, 0.1);
  rect(ctx, cx+cw*0.4, cy-H*0.1, cw*0.18, H*0.1, 0.06);
  // windows
  rect(ctx, cx+cw*0.25, cy-H*0.1, cw*0.06, H*0.025, 0.45);
  rect(ctx, cx+cw*0.68, cy-H*0.1, cw*0.06, H*0.025, 0.45);

  // ground
  for (let y = Math.floor(H*0.45); y < H; y++) {
    rect(ctx, 0, y, W, 1, 0.12 + (y-H*0.45)/(H*0.55)*0.05);
  }

  // cave
  const caveCx = W*0.15, caveCy = H*0.68;
  for (let a = 0; a < Math.PI; a += 0.03) {
    const cw2 = Math.cos(a) * W*0.1;
    const ch = Math.sin(a) * H*0.1;
    rect(ctx, caveCx-cw2, caveCy-ch, cw2*2, 1, 0.03);
  }

  // character with torch
  const px2 = W*0.2, py = H*0.62;
  const s = Math.max(3, W*0.025);
  circ(ctx, px2, py, s, 0.65);
  rect(ctx, px2-s*0.6, py+s, s*1.2, s*1.2, 0.4);
  // torch light
  for (let r = Math.max(8, W*0.08); r > 0; r--) {
    circ(ctx, px2+s, py-s*0.5, r, 0.05 + (W*0.08-r)/(W*0.08)*0.3);
  }
  circ(ctx, px2+s, py-s*0.8, Math.max(2, s*0.5), 0.9);

  // inventory
  const ih = Math.max(16, H*0.08);
  rect(ctx, 4, H-ih-4, W*0.6, ih, 0.08);
  const slotW = Math.max(10, ih-4);
  for (let i = 0; i < Math.min(6, Math.floor(W*0.6/slotW)); i++) {
    rect(ctx, 6+i*(slotW+2), H-ih-2, slotW, ih-4, 0.15);
  }

  // HP
  for (let i = 0; i < 5; i++) {
    circ(ctx, W-20+i*8, H-ih/2-2, 2.5, i < 3 ? 0.8 : 0.2);
  }
}

const app = document.getElementById('app');
const scenes = [
  ['RPG — Top-down', drawRPG],
  ['ACTION — Platformer', drawAction],
  ['ADVENTURE — Exploration', drawAdventure],
];

scenes.forEach(([title, drawFn]) => {
  const section = document.createElement('div');
  section.className = 'section';
  const st = document.createElement('div');
  st.className = 'section-title';
  st.textContent = title;
  section.appendChild(st);

  const row = document.createElement('div');
  row.className = 'row';

  RESOLUTIONS.forEach(res => {
    const col = document.createElement('div');
    col.className = 'col';

    const label = document.createElement('div');
    label.className = 'label';
    label.innerHTML = `<b>${res.name}</b>`;

    const sub = document.createElement('div');
    sub.className = 'sub';
    sub.textContent = res.note + ` (${res.w*res.h} px)`;

    const canvas = document.createElement('canvas');
    canvas.width = res.w;
    canvas.height = res.h;
    // scale to same physical height
    const scale = Math.round(DISPLAY_H / res.h);
    canvas.style.width = (res.w * scale) + 'px';
    canvas.style.height = (res.h * scale) + 'px';

    const ctx2 = canvas.getContext('2d');
    ctx2.imageSmoothingEnabled = false;
    drawFn(ctx2, res.w, res.h);

    col.appendChild(label);
    col.appendChild(sub);
    col.appendChild(canvas);
    row.appendChild(col);
  });

  section.appendChild(row);
  app.appendChild(section);
});
</script>
</body>
</html>
