<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mono — Demo: Moon Patrol</title>
<link rel="stylesheet" href="../../runtime/mono.css">
</head>
<body>
<div id="frame">
  <canvas id="screen"></canvas>
</div>
<div id="controls">
  <span>&#x2190;&#x2192;</span> SPEED &nbsp;&nbsp; <span>A</span> JUMP &nbsp;&nbsp; <span>B</span> SHOOT
</div>
<script src="../../runtime/engine.js"></script>
<script>
(() => {
  "use strict";
  const W = Mono.WIDTH, H = Mono.HEIGHT;
  const { cls, pix, line, rect, rectf, circ, circf, sprite: defSprite,
          spr, sprT, text: drawText, btn, btnp, note, stop, rnd, flr,
          abs: _abs, min, max: _max, sin, cos, dbg, dbgC } = Mono;
  const sprTrans = sprT;

  // --- 8x8 to 16x16 upscale helper ---
  function up(d) {
    let o = "";
    for (let r = 0; r < 8; r++) {
      let row = "";
      for (let c = 0; c < 8; c++) {
        const ch = d[r * 8 + c];
        row += ch + ch;
      }
      o += row + row;
    }
    return o;
  }

  // --- Circle collision helper ---
  function circCollide(x1, y1, r1, x2, y2, r2) {
    const dx = x1 - x2, dy = y1 - y2;
    const dist = dx * dx + dy * dy;
    const rSum = r1 + r2;
    return dist < rSum * rSum;
  }

  // Sprite size constant (all sprites are 16x16 after upscale)
  const SP = 16;

  // --- Sprites (all 16x16 via upscale) ---

  // 1: Moon buggy body
  defSprite(1, up(
    "00000000" +
    "00033000" +
    "00333300" +
    "03333330" +
    "33322330" +
    "33322330" +
    "03333300" +
    "00000000"
  ));

  // 2: Moon buggy wheel
  defSprite(2, up(
    "00000000" +
    "00000000" +
    "00033000" +
    "00322300" +
    "03211230" +
    "00322300" +
    "00033000" +
    "00000000"
  ));

  // 3: Buggy turret/antenna
  defSprite(3, up(
    "00000000" +
    "00030000" +
    "00030000" +
    "00330000" +
    "00000000" +
    "00000000" +
    "00000000" +
    "00000000"
  ));

  // 4: UFO
  defSprite(4, up(
    "00000000" +
    "00333300" +
    "03222230" +
    "33333333" +
    "32323232" +
    "03333330" +
    "00011000" +
    "00000000"
  ));

  // 5: Forward bullet
  defSprite(5, up(
    "00000000" +
    "00000000" +
    "00000000" +
    "00033300" +
    "00033300" +
    "00000000" +
    "00000000" +
    "00000000"
  ));

  // 6: Upward bullet
  defSprite(6, up(
    "00030000" +
    "00030000" +
    "00020000" +
    "00020000" +
    "00010000" +
    "00000000" +
    "00000000" +
    "00000000"
  ));

  // 7: Enemy bomb
  defSprite(7, up(
    "00000000" +
    "00010000" +
    "00020000" +
    "00232000" +
    "00232000" +
    "00020000" +
    "00030000" +
    "00000000"
  ));

  // 8: Rock obstacle
  defSprite(8, up(
    "00000000" +
    "00000000" +
    "00022000" +
    "00233200" +
    "02333320" +
    "23333332" +
    "33222233" +
    "32111123"
  ));

  // 9: Mine obstacle
  defSprite(9, up(
    "00000000" +
    "00030000" +
    "00303000" +
    "00333000" +
    "03232300" +
    "03333300" +
    "00333000" +
    "00000000"
  ));

  // 10: Explosion frame 1
  defSprite(10, up(
    "00000000" +
    "00200100" +
    "01002000" +
    "00031000" +
    "00130200" +
    "01000010" +
    "00100000" +
    "00000000"
  ));

  // 11: Explosion frame 2
  defSprite(11, up(
    "20010020" +
    "01000010" +
    "00203200" +
    "03033030" +
    "00232000" +
    "01000300" +
    "20001001" +
    "00200010"
  ));

  // 12: Life icon (small buggy)
  defSprite(12, up(
    "00000000" +
    "00000000" +
    "00330000" +
    "03333300" +
    "33322330" +
    "03030300" +
    "00000000" +
    "00000000"
  ));

  // 13: Checkpoint flag
  defSprite(13, up(
    "00000000" +
    "03333000" +
    "03223000" +
    "03333000" +
    "03000000" +
    "03000000" +
    "03000000" +
    "03000000"
  ));

  // --- Game Constants ---
  const GROUND_Y = 195;
  const BUGGY_Y = GROUND_Y - SP;
  const SCROLL_SPEED = 2;
  const JUMP_POWER = -7;
  const GRAVITY = 0.4;
  const CHECKPOINT_DIST = 800;

  // Collision radii
  const BUGGY_R = 7;
  const UFO_R = 7;
  const BULLET_R = 3;
  const BOMB_R = 4;
  const ROCK_R = 6;

  // --- Game State ---
  const { TITLE, PLAY, GAMEOVER } = Mono.SCENE;
  let scrollX, scrollSpeed, distance;
  let buggy, bullets, bombs, ufos, explosions, particles;
  let terrain, obstacles, checkpoints;
  let score, lives, checkpoint;
  let shootCooldown, invincible;
  let titleBounce;

  // Parallax layers: far mountains, mid hills
  let mountainSeed, hillSeed;

  function seededRandom(seed) {
    let s = seed;
    return function() {
      s = (s * 1103515245 + 12345) & 0x7fffffff;
      return (s >> 16) / 32768;
    };
  }

  // Generate terrain: craters and ground rocks
  let craters = [];
  let groundRocks = [];

  function generateTerrain(startTile, count) {
    const rng = seededRandom(startTile * 7 + 42);
    for (let i = 0; i < count; i++) {
      const tx = startTile + i;
      const wx = tx * 8;
      if (rng() < 0.03 && wx > 200) {
        const cw = flr(rng() * 3 + 2) * 8;
        craters.push({ x: wx, w: cw });
      }
      if (rng() < 0.02 && wx > 150) {
        groundRocks.push({ x: wx, alive: true });
      }
    }
  }

  function resetGame() {
    scrollX = 0;
    scrollSpeed = SCROLL_SPEED;
    distance = 0;
    buggy = {
      x: 53, y: BUGGY_Y,
      vy: 0, onGround: true, jumping: false,
      wheelAnim: 0
    };
    bullets = [];
    bombs = [];
    ufos = [];
    explosions = [];
    particles = [];
    craters = [];
    groundRocks = [];
    score = 0;
    lives = 3;
    checkpoint = 0;
    shootCooldown = 0;
    invincible = 0;
    mountainSeed = flr(rnd(10000));
    hillSeed = flr(rnd(10000));
    generateTerrain(0, 200);
  }

  function addExplosion(x, y) {
    explosions.push({ x, y, timer: 12 });
    for (let i = 0; i < 6; i++)
      particles.push({
        x: x + 8, y: y + 8,
        vx: rnd(4) - 2, vy: rnd(4) - 2,
        life: 6 + flr(rnd(10)),
        color: flr(rnd(3)) + 1
      });
  }

  function shootSound() { note(0, "E5", 0.03); setTimeout(() => note(0, "G5", 0.02), 30); }
  function jumpSound() { note(1, "C5", 0.05); setTimeout(() => note(1, "E5", 0.04), 40); }
  function hitSound() { note(1, "C3", 0.06); setTimeout(() => note(1, "E3", 0.05), 40); }
  function deathSound() {
    note(0, "C3", 0.12); note(1, "G2", 0.12);
    setTimeout(() => { note(0, "A2", 0.18); note(1, "E2", 0.18); }, 120);
  }
  function checkpointSound() {
    note(0, "C5", 0.08);
    setTimeout(() => note(0, "E5", 0.08), 80);
    setTimeout(() => note(0, "G5", 0.08), 160);
    setTimeout(() => note(0, "C6", 0.12), 240);
  }

  function isCrater(wx) {
    for (const c of craters) {
      if (wx >= c.x && wx < c.x + c.w) return true;
    }
    return false;
  }

  function spawnUFO() {
    const dir = rnd(1) < 0.5 ? 1 : -1;
    ufos.push({
      x: dir === 1 ? scrollX - 20 : scrollX + W + 20,
      y: 30 + rnd(45),
      vx: dir * (1.5 + rnd(1.5)),
      vy: 0,
      sinOffset: rnd(6.28),
      alive: true,
      shootTimer: 30 + flr(rnd(60)),
      type: rnd(1) < 0.3 ? "bomber" : "normal"
    });
  }

  resetGame();

  function updateGameoverEffects() {
    for (let i = particles.length - 1; i >= 0; i--) {
      const p = particles[i]; p.x += p.vx; p.y += p.vy; p.vy += 0.08; p.life--;
      if (p.life <= 0) particles.splice(i, 1);
    }
    for (let i = explosions.length - 1; i >= 0; i--) {
      explosions[i].timer--;
      if (explosions[i].timer <= 0) explosions.splice(i, 1);
    }
  }

  function updatePlay() {
    // Scrolling
    if (btn("right")) scrollSpeed = SCROLL_SPEED + 1.5;
    else if (btn("left")) scrollSpeed = _max(0.5, SCROLL_SPEED - 1);
    else scrollSpeed = SCROLL_SPEED;

    scrollX += scrollSpeed;
    distance += scrollSpeed;

    buggy.wheelAnim += scrollSpeed * 0.5;

    // Jump
    if (btnp("a") && buggy.onGround) {
      buggy.vy = JUMP_POWER;
      buggy.onGround = false;
      buggy.jumping = true;
      jumpSound();
    }

    // Apply gravity
    if (!buggy.onGround) {
      buggy.vy += GRAVITY;
      buggy.y += buggy.vy;
      if (buggy.y >= BUGGY_Y) {
        const buggyWorldX = scrollX + buggy.x;
        const inCrater = isCrater(buggyWorldX) && isCrater(buggyWorldX + 14);
        if (inCrater) { killBuggy(); return; }
        buggy.y = BUGGY_Y;
        buggy.vy = 0;
        buggy.onGround = true;
        buggy.jumping = false;
      }
    } else {
      const buggyWorldX = scrollX + buggy.x;
      if (isCrater(buggyWorldX + 4) && isCrater(buggyWorldX + 12)) { killBuggy(); return; }
    }

    // Shoot
    if (shootCooldown > 0) shootCooldown--;
    if (btnp("b") && shootCooldown <= 0) {
      bullets.push({
        x: scrollX + buggy.x + SP, y: buggy.y + 4,
        vx: 5, vy: 0, type: "fwd"
      });
      bullets.push({
        x: scrollX + buggy.x + 8, y: buggy.y - 4,
        vx: 0, vy: -5, type: "up"
      });
      shootCooldown = 6;
      shootSound();
    }

    // Update bullets (world coords)
    for (let i = bullets.length - 1; i >= 0; i--) {
      const b = bullets[i];
      b.x += b.vx;
      b.y += b.vy;
      const sx = b.x - scrollX;
      if (sx < -20 || sx > W + 20 || b.y < -20) {
        bullets.splice(i, 1);
      }
    }

    if (invincible > 0) invincible--;

    // Generate more terrain as we scroll
    const currentTile = flr(scrollX / 8);
    const furthestGenerated = flr((scrollX + W + 400) / 8);
    if (furthestGenerated > (craters.length > 0 ? flr((craters[craters.length - 1].x + 100) / 8) : 200)) {
      generateTerrain(furthestGenerated - 50, 100);
    }

    while (craters.length > 0 && craters[0].x + craters[0].w < scrollX - 50) craters.shift();
    while (groundRocks.length > 0 && groundRocks[0].x < scrollX - 50) groundRocks.shift();

    // Spawn UFOs
    if (Mono.frame % 60 === 0 && rnd(1) < 0.4 + distance * 0.00005) {
      spawnUFO();
    }

    // Update UFOs
    for (let i = ufos.length - 1; i >= 0; i--) {
      const u = ufos[i];
      u.x += u.vx;
      u.y += sin(Mono.frame * 0.08 + u.sinOffset) * 0.5;
      u.shootTimer--;

      if (u.shootTimer <= 0 && u.alive) {
        const sx = u.x - scrollX;
        if (sx > 20 && sx < W - 20) {
          bombs.push({ x: u.x + 4, y: u.y + 8, vy: 1.5 + rnd(1) });
          u.shootTimer = 40 + flr(rnd(60));
        }
      }

      const sx = u.x - scrollX;
      if (sx < -40 || sx > W + 40) { ufos.splice(i, 1); continue; }

      // Bullet-UFO collision (circle)
      if (u.alive) {
        const ucx = u.x + 8, ucy = u.y + 8;
        for (let j = bullets.length - 1; j >= 0; j--) {
          const b = bullets[j];
          const bcx = b.x + 8, bcy = b.y + 8;
          if (circCollide(bcx, bcy, BULLET_R, ucx, ucy, UFO_R)) {
            bullets.splice(j, 1);
            u.alive = false;
            addExplosion(u.x - scrollX, u.y);
            score += 100;
            hitSound();
            ufos.splice(i, 1);
            break;
          }
        }
      }
    }

    // Update bombs
    for (let i = bombs.length - 1; i >= 0; i--) {
      const b = bombs[i];
      b.vy += 0.05;
      b.y += b.vy;
      const sx = b.x - scrollX;

      // Bomb hits ground
      if (b.y >= GROUND_Y - 4) {
        addExplosion(sx, b.y - 4);
        bombs.splice(i, 1);
        // Check if near buggy (circle)
        const bcx = sx + 8, bcy = b.y + 4;
        const pcx = buggy.x + 8, pcy = buggy.y + 8;
        if (circCollide(bcx, bcy, BOMB_R + 4, pcx, pcy, BUGGY_R) && invincible <= 0) {
          killBuggy();
        }
        continue;
      }

      // Bomb hits buggy (circle)
      if (invincible <= 0) {
        const bcx = sx + 8, bcy = b.y + 8;
        const pcx = buggy.x + 8, pcy = buggy.y + 8;
        if (circCollide(bcx, bcy, BOMB_R, pcx, pcy, BUGGY_R)) {
          bombs.splice(i, 1);
          killBuggy();
          continue;
        }
      }

      // Bullet-bomb collision (circle)
      const bombcx = b.x + 8, bombcy = b.y + 8;
      for (let j = bullets.length - 1; j >= 0; j--) {
        const bl = bullets[j];
        const blcx = bl.x + 8, blcy = bl.y + 8;
        if (circCollide(blcx, blcy, BULLET_R, bombcx, bombcy, BOMB_R)) {
          bullets.splice(j, 1);
          addExplosion(sx, b.y);
          score += 50;
          bombs.splice(i, 1);
          hitSound();
          break;
        }
      }
    }

    // Check rock collisions (circle)
    for (let i = groundRocks.length - 1; i >= 0; i--) {
      const r = groundRocks[i];
      if (!r.alive) continue;
      const sx = r.x - scrollX;
      const rcx = sx + 8, rcy = GROUND_Y - 8 + 8;

      // Bullet-rock collision (circle)
      for (let j = bullets.length - 1; j >= 0; j--) {
        const b = bullets[j];
        if (b.type === "fwd") {
          const bsx = b.x - scrollX;
          const bcx = bsx + 8, bcy = b.y + 8;
          if (circCollide(bcx, bcy, BULLET_R, rcx, rcy, ROCK_R)) {
            bullets.splice(j, 1);
            r.alive = false;
            addExplosion(sx, GROUND_Y - 10);
            score += 30;
            hitSound();
            break;
          }
        }
      }

      // Buggy-rock collision (circle)
      if (r.alive && invincible <= 0 && buggy.onGround) {
        const pcx = buggy.x + 8, pcy = buggy.y + 8;
        if (circCollide(pcx, pcy, BUGGY_R, rcx, rcy, ROCK_R)) {
          killBuggy();
          r.alive = false;
          addExplosion(sx, GROUND_Y - 10);
        }
      }
    }

    // Checkpoint system
    const currentCheckpoint = flr(distance / CHECKPOINT_DIST);
    if (currentCheckpoint > checkpoint && currentCheckpoint <= 26) {
      checkpoint = currentCheckpoint;
      score += 500;
      checkpointSound();
    }

    // Explosions
    for (let i = explosions.length - 1; i >= 0; i--) {
      explosions[i].timer--;
      if (explosions[i].timer <= 0) explosions.splice(i, 1);
    }

    // Particles
    for (let i = particles.length - 1; i >= 0; i--) {
      const p = particles[i];
      p.x += p.vx; p.y += p.vy; p.vy += 0.05; p.life--;
      if (p.life <= 0) particles.splice(i, 1);
    }
  }

  function killBuggy() {
    if (invincible > 0) return;
    lives--;
    addExplosion(buggy.x, buggy.y);
    deathSound();
    if (lives <= 0) {
      Mono.go(GAMEOVER); return;
    } else {
      buggy.y = BUGGY_Y;
      buggy.vy = 0;
      buggy.onGround = true;
      buggy.jumping = false;
      invincible = 90;
    }
  }

  // ============================================================
  // Draw
  // ============================================================

  function getMountainH(wx, seed) {
    const s1 = sin(wx * 0.003 + seed) * 22;
    const s2 = sin(wx * 0.007 + seed * 2.1) * 11;
    const s3 = sin(wx * 0.015 + seed * 0.7) * 6;
    return s1 + s2 + s3;
  }

  function getHillH(wx, seed) {
    const s1 = sin(wx * 0.005 + seed) * 15;
    const s2 = sin(wx * 0.012 + seed * 1.3) * 8;
    return s1 + s2;
  }

  function drawStars() {
    const starSeed = seededRandom(123);
    for (let i = 0; i < 60; i++) {
      const sx = flr(starSeed() * W);
      const sy = flr(starSeed() * 90);
      const bright = starSeed() < 0.3 ? 2 : 1;
      if (bright === 2 && (Mono.frame + i * 7) % 40 < 5) continue;
      pix(sx, sy, bright);
    }
  }

  function drawPlayScene() {
    // Parallax background: far mountains (scroll at 0.15x)
    const mScrollX = scrollX * 0.15;
    for (let x = 0; x < W; x++) {
      const wx = x + mScrollX;
      const mh = getMountainH(wx, mountainSeed);
      const baseY = 120 + mh;
      for (let y = flr(baseY); y < 150; y++) { if (y >= 0 && y < H) pix(x, y, 1); }
    }
    const hScrollX = scrollX * 0.4;
    for (let x = 0; x < W; x++) {
      const wx = x + hScrollX;
      const hh = getHillH(wx, hillSeed);
      const baseY = 150 + hh;
      for (let y = flr(baseY); y < 172; y++) { if (y >= 0 && y < H) pix(x, y, 1); }
    }
    rectf(0, GROUND_Y, W, H - GROUND_Y, 1);
    for (let x = 0; x < W; x++) {
      const wx = x + scrollX;
      if (!isCrater(wx)) {
        pix(x, GROUND_Y, 2);
        if ((wx + flr(sin(wx * 0.3) * 2)) % 7 === 0) pix(x, GROUND_Y + 1, 2);
        if (wx % 13 === 0) pix(x, GROUND_Y + 3, 0);
        if (wx % 19 === 0) pix(x, GROUND_Y + 5, 0);
      } else {
        for (let y = GROUND_Y; y < H; y++) pix(x, y, 0);
        const craterObj = craters.find(c => wx >= c.x && wx < c.x + c.w);
        if (craterObj) {
          if (wx === craterObj.x || wx === craterObj.x + craterObj.w - 1) { for (let y = GROUND_Y; y < GROUND_Y + 22; y++) pix(x, y, 1); }
          if (GROUND_Y + 21 < H) pix(x, GROUND_Y + 21, 1);
        }
      }
    }

    // Ground rocks (16x16)
    for (const r of groundRocks) {
      if (!r.alive) continue;
      const sx = r.x - scrollX;
      if (sx > -SP && sx < W + SP) {
        sprTrans(8, flr(sx), GROUND_Y - SP + 2);
        dbgC(flr(sx) + 8, GROUND_Y - SP + 2 + 8, ROCK_R);
      }
    }

    // Checkpoint markers
    for (let cp = 1; cp <= 26; cp++) {
      const cpx = cp * CHECKPOINT_DIST - scrollX;
      if (cpx > -SP && cpx < W + SP) {
        line(flr(cpx), GROUND_Y - 24, flr(cpx), GROUND_Y, 2);
        sprTrans(13, flr(cpx), GROUND_Y - 24);
        drawText(String.fromCharCode(64 + cp), flr(cpx) - 2, GROUND_Y + 3, 3);
      }
    }

    // Progress bar — clamped within screen
    const barY = 16;
    const barX = 28;
    const barW = 264;
    rectf(barX, barY, barW, 5, 0);
    rect(barX, barY, barW, 5, 1);
    dbg(barX, barY, barW, 5);
    for (let i = 0; i < 26; i++) {
      const px = barX + flr(i * barW / 26);
      pix(px, barY + 4, 2);
    }
    if (checkpoint > 0) {
      const fillW = flr(min(checkpoint, 25) * barW / 26);
      rectf(barX, barY + 1, fillW, 3, 2);
    }
    const posMarker = barX + flr((distance % (26 * CHECKPOINT_DIST)) / (26 * CHECKPOINT_DIST) * barW);
    const clampedMarker = min(_max(posMarker, barX), barX + barW - 3);
    rectf(clampedMarker - 1, barY - 1, 3, 7, 3);
    if (checkpoint > 0) drawText(String.fromCharCode(64 + min(checkpoint, 26)), barX - 8, barY - 1, 3);
    const nextCp = min(checkpoint + 1, 26);
    drawText(String.fromCharCode(64 + nextCp), min(barX + barW + 3, W - 8), barY - 1, 2);

    // UFOs (16x16)
    for (const u of ufos) {
      if (!u.alive) continue;
      const sx = u.x - scrollX;
      if (sx > -SP && sx < W + SP) {
        sprTrans(4, flr(sx), flr(u.y));
        dbgC(flr(sx) + 8, flr(u.y) + 8, UFO_R);
      }
    }

    // Bombs (16x16)
    for (const b of bombs) {
      const sx = b.x - scrollX;
      if (sx > -SP && sx < W + SP) {
        sprTrans(7, flr(sx), flr(b.y));
        dbgC(flr(sx) + 8, flr(b.y) + 8, BOMB_R);
      }
    }

    // Bullets (16x16)
    for (const b of bullets) {
      const sx = b.x - scrollX;
      if (sx > -SP && sx < W + SP) {
        const sprId = b.type === "fwd" ? 5 : 6;
        sprTrans(sprId, flr(sx), flr(b.y));
        dbgC(flr(sx) + 8, flr(b.y) + 8, BULLET_R);
      }
    }

    // Buggy (16x16 sprites)
    if (invincible <= 0 || flr(Mono.frame / 3) % 2 === 0) {
      sprTrans(3, flr(buggy.x + 4), flr(buggy.y - 10));
      spr(1, flr(buggy.x), flr(buggy.y));
      spr(1, flr(buggy.x + SP), flr(buggy.y), true);
      dbgC(flr(buggy.x) + 8, flr(buggy.y) + 8, BUGGY_R);
      if (buggy.onGround) {
        spr(2, flr(buggy.x - 2), flr(buggy.y + 10));
        spr(2, flr(buggy.x + SP + 2), flr(buggy.y + 10));
        if (scrollSpeed > 1 && Mono.frame % 3 === 0) particles.push({ x: buggy.x - 2, y: GROUND_Y - 2, vx: -rnd(2), vy: -rnd(1.5), life: 5 + flr(rnd(5)), color: 1 });
      } else {
        spr(2, flr(buggy.x - 2), flr(buggy.y + 10));
        spr(2, flr(buggy.x + SP + 2), flr(buggy.y + 10));
      }
    }

    // Explosions (16x16)
    for (const e of explosions) {
      const sprId = e.timer > 6 ? 10 : 11;
      sprTrans(sprId, flr(e.x), flr(e.y));
    }

    // Particles
    for (const p of particles) pix(flr(p.x), flr(p.y), p.color);

    // HUD — top bar (clamped to prevent overflow)
    rectf(0, 0, W, 14, 0);
    drawText("SCORE:" + score, 4, 3, 3);
    dbg(4, 3, 60, 7);
    drawText("PT:" + String.fromCharCode(65 + min(checkpoint, 25)), W / 2 - 15, 3, 2);
    dbg(W / 2 - 15, 3, 30, 7);

    // Lives icons — capped to prevent overflow (max 5 shown)
    const maxLivesShown = min(lives, 5);
    const livesStartX = W - 10 - maxLivesShown * (SP + 2);
    for (let i = 0; i < maxLivesShown; i++) {
      const lx = livesStartX + i * (SP + 2);
      if (lx >= 0 && lx + SP <= W) sprTrans(12, lx, 0);
    }
    dbg(livesStartX, 0, maxLivesShown * (SP + 2), SP);

    // Distance — positioned to not overflow right edge
    const distStr = flr(distance) + "M";
    const distX = min(W - distStr.length * 5 - 4, livesStartX - distStr.length * 5 - 8);
    drawText(distStr, distX, 3, 1);
    dbg(distX, 3, distStr.length * 5, 7);

    // Checkpoint announcement
    if (checkpoint > 0 && distance - checkpoint * CHECKPOINT_DIST < 100) {
      const alpha = 1 - (distance - checkpoint * CHECKPOINT_DIST) / 100;
      if (alpha > 0) {
        const cpMsg = "CHECKPOINT " + String.fromCharCode(64 + min(checkpoint, 26));
        const cpX = W / 2 - cpMsg.length * 5 / 2;
        drawText(cpMsg, flr(cpX), 30, 3);
      }
    }
  }

  // --- Title Scene ---
  Mono.scene(TITLE, {
    init() {},
    update() {
      if (btnp("start") || btnp("a")) {
        resetGame();
        note(0, "C5", 0.1); setTimeout(() => note(0, "E5", 0.1), 100); setTimeout(() => note(0, "G5", 0.15), 200);
        Mono.go(PLAY); return;
      }
    },
    draw() {
      cls(0); drawStars();
      for (let x = 0; x < W; x++) { const mh = getMountainH(x * 3, 42); const baseY = 135 + mh; for (let y = flr(baseY); y < 165; y++) { if (y >= 0 && y < H) pix(x, y, 1); } }
      rectf(0, 165, W, 75, 1); line(0, 165, W, 165, 2);
      const ty = 45 + sin(Mono.frame * 0.05) * 3;
      drawText("MOON PATROL", 105, flr(ty), 3); drawText("MOON PATROL", 106, flr(ty) + 1, 1);
      rectf(90, flr(ty) + 12, 140, 1, 2); drawText("- LUNAR PATROL -", 120, flr(ty) + 14, 2);
      // Title buggy (16x16)
      const bx = 130; const by = 152;
      spr(1, bx, by); spr(1, bx + SP, by, true); sprTrans(3, bx + 6, by - 10);
      spr(2, bx - 2, by + 10); spr(2, bx + SP + 2, by + 10);
      // Flying UFOs
      const u1x = (Mono.frame * 2) % (W + 40) - 20; const u1y = 75 + sin(Mono.frame * 0.07) * 6;
      sprTrans(4, flr(u1x), flr(u1y));
      const u2x = ((Mono.frame * 2) + 120) % (W + 40) - 20; const u2y = 90 + sin(Mono.frame * 0.09 + 2) * 5;
      sprTrans(4, flr(u2x), flr(u2y));
      if (flr(Mono.frame / 20) % 2 === 0) drawText("PRESS START", 132, 195, 3);
      drawText("-HOW TO PLAY-", 127, 210, 2); drawText("Z:JUMP  X:SHOOT  LR:SPEED", 95, 219, 2);
      drawText("MONO DEMO V0.1", 118, 232, 1);
    }
  });

  // --- Play Scene ---
  Mono.scene(PLAY, {
    init() {},
    update() { updatePlay(); },
    draw() { cls(0); drawStars(); drawPlayScene(); }
  });

  // --- Game Over Scene ---
  Mono.scene(GAMEOVER, {
    init() {},
    update() {
      updateGameoverEffects();
      if (btnp("start") || btnp("a")) { Mono.go(TITLE); return; }
    },
    draw() {
      cls(0); drawStars();
      for (const p of particles) pix(flr(p.x), flr(p.y), p.color);
      for (const e of explosions) { const sprId = e.timer > 6 ? 10 : 11; sprTrans(sprId, flr(e.x), flr(e.y)); }
      drawText("GAME OVER", 125, 75, 3);
      drawText("SCORE: " + score, 117, 94, 2);
      drawText("CHECKPOINT: " + String.fromCharCode(65 + min(checkpoint, 25)), 103, 106, 2);
      drawText("DISTANCE: " + flr(distance), 103, 118, 1);
      if (flr(Mono.frame / 20) % 2 === 0) drawText("PRESS START", 132, 150, 3);
    }
  });

  Mono.go(TITLE);
  Mono.boot("screen");
})();
</script>
</body>
</html>
